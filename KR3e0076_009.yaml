body:
  text: 赤水元珠卷九明孫一奎撰氣門内經曰百病皆生于氣氣一也因所觸而為九怒喜悲恐寒熱驚思勞也故怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂思則氣結勞則氣耗九氣見症怒氣所至為嘔血為飱泄為煎厥為薄厥為陽厥為胷滿脇痛食則氣逆而不下為喘渴煩心為消瘅為肥氣為目暴盲耳暴閉筋縱發于外為癰腫喜氣所至為笑不休為毛革焦為肉病為陽氣所收甚則為狂悲氣所至為陰縮為筋攣為肌痺為脈痿男為數溲血女為血崩為酸鼻辛頞為目昏為少氣不能報息為泣則臂麻恐氣所至為破㬷脫肉為骨痠痿厥為暴下綠水為面熱膚急為陰痿為懼而脫頤驚氣所至為潮涎為目睘為口呿為痴癎為不省人事為僵仆乆則為􅍙痺􅍙音裙痺也勞氣所至為噎病為喘促為嗽血為腰痛骨痿為肺鳴為高骨壞為陰痿為唾血為冥視為耳閉男為少精女為不月思氣所至為不眠為嗜卧為昏目為中痞三焦閉塞為咽嗌不利為瘅疸嘔苦為筋痿為白淫為不嗜食寒氣所至為上下所出水液澄徹清冷炅氣所至為喘嘔吐酸暴注下迫凡此九氣内經以五行相勝之理治之故悲可以治怒以愴惻苦楚之言感之喜可以治悲以謔浪䙝狎之言娯之恐可以治喜以遽迫死亡之言怖之怒可以治思以汚辱欺罔之言觸之思可以治恐以慮彼忘此之言奪之五者之外炅可以治寒寒可以治炅逸可以治勞習可以治驚要在審証察脈而施治之不可執一也脈沈實者宜下絃急者宜温虚細微弱者宜補痛在上者宜散痛在下者宜利氣虚者宜鎮墜氣結者宜疎順夫治氣之法惟在適中氣積于中固宜疎順疎導過劑則又反耗元氣元氣走泄則下虚中滿之証生焉故曰疎啓于中峻補于下中滿既除下虚斯實此之謂也治有餘之症脈沈實而中滿大便秘按之疼則宜下法當用大黄然亦須入桂皮以辛温和其氣以苦寒泄其實氣得泄越痛亦隨愈凡用利藥其法有三駛利則用大黄芒硝温利則用硫黄乳粉瀉積則用巴豆碙砂他如磨積化結聚則以三稜蓬术為先導引閉塞則以木香㯽榔先使温散凝滯則以薑桂為主疎順暴戾則以蘇橘為宜補虛益氣則以人參白术為君墜下輔陽者以黒錫養正為鎮生生子曰治氣之劑東垣有法可凖如枳壳利肺氣多服損胸中至高之氣青皮瀉肝氣多服損真氣木香行中下焦氣香附快滯氣陳皮泄逆氣紫蘇散表氣厚朴瀉胃氣㯽榔瀉至高之氣藿香馨香上行胃氣沈香升降真氣腦麝散真氣若此之類氣實所宜設認冷生氣而槩以燥熱投之是以火濟火病日益甚丹溪曰氣有餘即是火乃戒好用温熱治氣者之悞也原病式曰氣為陽而主輕微諸所動亂勞傷乃為陽火之化子和河間治喜怒悲恐思之証皆以平心火為主至于勞者傷于動動便屬陽驚者駭于心心便屬火故治皆以平心火為主深中病情又曰五志過極皆為火也若用香辛散氣燥熱傷氣真氣耗散濁氣上騰猶曰腎虚弗能攝氣歸原遂用降氣鎮墜之劑不悟肺受火炎子氣亦弱降令不行火無所制丹溪有曰上升之氣自肝而出中挾相火其熱為甚自覺其冷非真冷也火氣似水積熱之甚陽亢陰微故有此証認假作真似是之禍可勝言哉又曰氣無補法俗論也痞悶壅塞似難于補不思正氣虚者由七情勞傷所致脾土受傷轉輸失職胃雖受榖不能運化故陽升陰降而成天地不交之否清濁相混若不補養邪何由行脈法下手脈沈便知是氣極沈則伏濇弱難愈其或沈滑氣兼痰飲滑者血多少氣濇者少血多氣大者氣血俱多脈來大而堅者血氣俱實小者血氣俱少七氣湯治七情之氣鬱結心腹絞痛人參炙甘草肉桂各一錢五分半夏一錢姜三片水煎服指迷七氣湯治同上香附二錢青皮陳皮桔梗蓬术官桂益智仁藿香半夏甘草炙各等分薑三片棗二枚水煎服縮砂香附湯調中快氣治心腹刺痛香附炒十兩烏藥五兩炙甘草二兩砂仁二兩右為末每服一錢紫蘇葉三片鹽少許沸湯調下大便秘陳皮湯下一方去烏藥加沈香五錢大七氣湯治喜怒不節致臟氣不平心腹脹滿半夏茯苓各四錢原朴三錢紫蘇二錢加薑水煎服木香流氣飲諸氣痞塞不通胸膈膨脹面目虚浮四肢腫滿半夏厚朴青皮紫蘇香附甘草各一錢陳皮二錢桂莪术丁皮大腹皮麥門冬㯽榔木香草果各六分木通八分藿香白芷四分茯苓白术木𤓰人參石菖蒲加薑棗水煎服秘𫝊降氣湯上盛下衰氣不升降頭目昏眩痰實嘔逆胸膈不快怒則氣上驚則氣亂尤宜骨碎補訶子草果五加皮半夏各五分桔梗五分桑白皮地骨皮枳壳陳皮甘草各一錢水煎服升陽順氣湯七情所傷及勞役飲食不節滿悶短氣恐則氣下者尤宜升麻柴胡陳皮各一錢五分半夏人參各三錢黄茋四錢甘草黄栢各五分川歸一錢神曲炒一錢五分草荳仁二錢每服五六錢薑三片水煎服蘇子降氣湯治中脘不快心腹脹滿噎塞喘促咳嗽痰涎宿食留飲脇下支結及脚氣沖心方在痰飲門分心氣飲憂思留滯致使心胸痞悶脇肋脹滿噫氣吞酸頭目昏眩日漸瘦弱或大腸虚秘紫蘇莖葉四両羌活半夏肉桂青皮陳皮桑白皮大腹皮木通芍藥炙甘草赤茯苓各一兩每服五六錢姜三片棗二枚燈心十根水煎四磨湯治七情傷感上氣喘息妨悶不食方在喘門推氣丸治三焦痞塞大便澁小便赤黄方在脹滿門神保丸治諸氣刺痛流入背膂及脇下諸藥不效者方在脹滿門㯽榔木香丸疎導三焦破痰飲快氣消食木香㯽榔枳壳杏仁去皮麩炒青皮各一兩半夏曲皂角去白酥炙郁李仁去皮各二兩各為末另以皂角四兩用漿水一碗搓揉成膏更入熟蜜少許和丸如梧桐子大每服五十丸薑湯下九氣丸治九氣膈氣風氣寒氣熱氣憂氣喜氣驚氣怒氣瘴氣積聚堅牢如杯心腹疼痛時作時止姜黄甘草香附為末每服一錢入鹽少許百沸湯㸃空心服立效賺氣散治胸膈痞悶腹脇虚脹氣不宣通及傷寒兩脇刺痛攻心三稜蓬术煨各五錢白术三錢枳壳一錢木香五分每服二錢加薑三片水一鍾半煎八分食前服用砂糖少許壓下分氣紫蘇飲治心下脹滿脇疼氣塞嘔逆不止方在喘門匀氣散胸膈脹滿宿冷不消心腹刺痛嘔吐丁香檀香木香白豆仁各一兩藿香甘草炙各八両砂仁四両為末每服二錢入鹽一字沸湯調服復元通氣散氣不宣通流利并閃挫腰脇氣痛茴香炒穿山甲蛤粉炒二兩延胡索炒白丑炒陳皮甘草各一兩木香一兩五錢為末每服二錢熱酒調服一方加乳香没藥清膈丸因濕熱氣滯黄芩黄連炒各五錢香附一兩半蒼术二兩為末取黄熟𤓰蔞去皮搗爛和丸菉豆大每服三五十丸桔梗枳壳湯諸氣痞結滿悶桔梗枳壳各四錢甘草炙一錢二分生薑五片水煎服升降六一湯香附六兩炒藿香一兩為末每服二錢白湯下二聖散諸氣痛芫花醋煮乾五錢延胡索炒一兩五錢二味為細末每服一錢男子元臟氣痛葱酒調下婦人血氣痛川歸酒下諸氣痛薄荷湯下小腸氣痛茴香湯下勝金散治男婦一切冷氣烏藥酒浸微炒茴香炒青皮去白良姜等分右為末每服二錢空心温酒調下婦人用姜煎童便調服半夏湯治上氣嘔吐不能下食半夏三錢陳皮白术甘草炙桂心各五錢人參一兩厚朴二兩每服五錢姜五片棗三枚水煎服手拈散一切氣痛草果延胡索乳香沒藥五靈脂酒拌炒等分為末每服二錢好酒調下一方加良姜一人病氣上沖口中出如烟霧耳内常鳴此衝脈逆上與八物湯加炒黄連二分黄栢三分數劑而愈蘇合香丸和劑方専能順氣化痰并治𫝊尸骨蒸癆瘵卒暴心痛鬼魅瘴瘧赤白下利小兒驚搐等症沈香麝香研丁香青木香訶梨勒煨用皮安息香另為末用無灰酒一升熬膏香附子炒去毛蓽撥白术白檀香硃砂研飛烏犀角各二兩薫陸香另研龍腦研蘇合油入安息香膏内右末研匀用安息膏并蜜丸梧子大空心温水化下四丸酒亦可諸見血症摠論内經曰陽明厥逆喘咳身熱善驚衂吐血又曰大怒則形氣絶而血菀于上又曰脾移熱于肝則為驚衂胞移熱于膀胱則癃而尿血又曰結陰者便血一升再結二升三結三升夫血者生化于脾總綂于心蔵受于肝宣布于肺施泄于腎灌溉一身陰氣一傷變生多病妄行于上則吐衂衰涸于中則虚勞忘反于下則便紅移熱膀胱則癃閉溺血滲透腸間則為腸風陰虚陽搏則為崩中濕蒸熱淤則為滯下熱極腐化則為臟血火極似水血多紫黒熱勝于陰則為瘡瘍濕滯于血則為痛痒隱疹皮膚則為冷痺畜之在上則人喜忘畜之在下則人喜狂墮恐跌仆則淤血内凝又細分之則咳血衂血出于肺嘔吐出于胃痰涎血出于脾咯血唾血出于腎便血清者屬營虚有熱濁者屬熱與濕色鮮者屬火黒者火極血與泄物並下者屬有積或絡脈傷也尿血因房勞過度陰虚火動以致營血妄行而或者又以此為得之虚寒當以脈别有嘔吐紫凝血者原病式云此非冷凝由熱甚銷鑠以為稠濁而熱甚則水化制之故赤兼黒而紫也又有汗血者由夫大喜傷心喜則氣散血隨氣行故也又下血先見血後見便為近血自大腸來先見便後見血此逺血自小腸來腸胃中本無血良由氣虚腸薄故血滲入而從下出也東垣曰除傷寒家衂血外雜病見血多責其熱㫖哉言乎大凡血上行為逆其治難下行為順其治易若血上行或唾或嘔或吐忽變而下行為惡痢者吉兆也丹溪曰口鼻出血皆是陽盛陰衰有升無降血隨氣上越出上竅法當補陰抑陽氣降則血歸經矣素問曰有病胸脇支滿者妨於食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名為何何以得之岐伯曰病名血枯此得之年少時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也帝曰治之奈何復以何術岐伯曰以四烏鰂骨一藘茹二物并合之丸以雀卵大如小荳以五丸為後飯飲以鮑魚汁利腸中及傷肝也王海藏云胸中聚集之殘火腹裏積乆之太陰上下隔絶脈絡部分陰陽不通用苦熱以定于中使辛熱以行于分升以甘温降以辛潤化嚴肅為春温變凜冽為和氣汗而愈也然餘毒土苴猶有存者周身陽和尚未泰然胸中微躁而思涼飲因食冷物服涼劑陽氣復消餘陰再作脈退而小絃細而遲激而為衂血唾血者有之心肺受邪也下而為便血溺血者有之腎肝受邪也三焦出血色紫不鮮此重沓寒濕化毒凝泣水穀道路浸積而成若見血証不詳本源便用涼折變乃生矣陽証溢出鮮血隂証下如豚肝上而血者黄茋桂枝湯白芍當歸湯中而血者當歸建中湯増損胃中湯下而血者芎歸术附湯桂附六合湯若三血証在行陽二十五度見黄茋四君子主之若三血証在行陰二十五度見當歸四逆加呉茱茰主之生生子曰按海藏此論雖為傷寒而發實戒用藥者要認血來本原不可妄治以致變亂夫治血當明血出何經時師多宗丹溪有曰吐血衂血多是火載血上錯經妄行越出上竅此論固是猶有未盡乃所以啓後人過用寒涼之惑也夫火者無形之氣也非水可比安能稱載葢血隨氣行氣和則血循經氣逆則血亂氣有餘即是火也實由氣逆而血妄行兼于火化因此為甚經曰怒則氣逆甚則嘔血暴癉内逆肝肺相摶血溢鼻口是也又東垣曰血妄行上出于鼻口者皆氣逆也況血得寒則凝得熱則行見黒則止迹此觀之治血若不兼之調氣而純以寒涼是施則血不歸經而且為寒涼所凝滯雖暫止而復來也且脾統諸血寒涼傷脾脾虚尤不能約束諸血其變証可勝言哉素問示從容論曰夫傷肺者脾氣不守胃氣不清經氣不為使真臟壞決經脈傍絶五臟漏泄不衂則嘔綱目云傷肺即傷氣也當于氣虚不能攝血條叅治戴元禮云吐血者榮氣溢入濁道留聚膈間滿則吐血名曰内衂宜蘇子降氣湯加人參阿膠飲酒太過傷胃吐血用理中湯加青皮梔子乾葛川芎勞太過吐血不止蘇子降氣湯加人參芍藥打損吐血黒神散童便調服有時或吐血兩口隨即無事過數日又發經年累月不愈者宜黒神散吐血發渴名為血渴也或四物湯十全大補湯統㫖云吐血先哲皆以為熱其因于寒者理亦有之何則寒邪屬陰人之榮血亦屬陰古人云風傷衛寒傷榮各從其類人果身受寒邪口受寒物邪入血分血得冷而凝則被寒矣在上則從口而出在下則從便而出若此者實病機之所有焉得為盡無也但其血色之黒與吐血因熱極而反兼水化者相似兹則宜于脈証間求之脈微遲而身又清涼者寒也脈洪數而身又煩熱者熱也寒則温之熱則清之治法大不同矣嘔吐血生生子曰吐血成碗吐出者甚至有出而盈盆者丹溪云多是陽盛陰虚故血不得下行因火炎上之勢而上出脈必大而芤大者發熱芤者血滯與失血也又曰有氣虚中寒陰陽不相守血乃妄行而吐出者經所謂陽虚陰必走者是也當用四物理中湯加乾姜甘草煎服中温則血自歸經矣切不可投苦寒之劑丹溪云山梔子最能清胃脘之血先吐紅後見痰𠻳多是陰虚火動痰不下降四物湯加痰藥火藥先痰𠻳後見紅多是痰積熱降痰火為急痰𠻳涎帶血出此是胃口清血熱蒸而出重者梔子輕者藍實或暴吐紫血一碗者無事吐出為好此熱傷血死于中用四物湯解毒湯之類吐血挾痰積吐一二碗者亦只補陰降火四物湯加火劑之類挾痰若用血藥則泥而不行只治火自止吐血乃火病也大吐血不止以乾姜炮黒為末童便調從治㗋脘痰血荆芥散妙又云嘔吐血出于胃也實者犀角地黄湯主之虚者小建中湯加黄連主之千金方云吐血有三種有内衂有肺疽有傷胃内衂者出血如鼻衂不從鼻孔出是近在心肺間津液出還流入胃中或如荳羹汁或如切􅀈血凝停胃中因即滿悶便吐或出數斗至一石者是也得之于勞倦飲食過常也按韻書􅀈音勘凝血也肺疽者或飲酒後熱毒滿悶吐之時血從吐後出或一合半合半升一升是也傷胃者因飲食大飽之後胃中冷不能消化便煩悶强嘔吐使所食之物與氣共上衝䠞因傷裂胃今吐血色鮮正赤腹亦絞痛自汗出其脈𦂳而數者為難治也劉宗厚曰凡治血必血屬之藥欲求血屬之藥其四物之謂乎河間謂隨証輔佐謂之六合湯者詳言之矣余故陳其氣味専司之要不可不察夫川芎血中氣藥也通肝經性味辛散能行血滯于氣也地黄血中血藥也通腎經性味甘寒能補真陰之虚也當歸分三治血中主藥也通肝經性辛温全用能活血各歸其經也芍藥陰分藥也通脾經味酸寒能涼血治血虚腹痛也若求陰藥之屬必于此而取則焉脾胃論有云若善治者隨經損益摘其一二味之所宜為主治可也此特論治血病而求血藥之屬者也若氣虚血弱又當從仲景血虚以人參補之陽旺則生陰血也若四物湯者獨能主血分受傷為氣不虚也輔佐之屬若桃仁紅花蘇木血竭丹皮者血滯所宜蒲黄阿膠地榆百草霜棕櫚灰者血崩所宜乳香没藥五靈脂凌霄花者血痛所宜蓯蓉瑣陽牛膝枸杞子益母草夏枯草敗龜板者血虚所宜乳酪血液之物血燥所宜乾姜桂者血寒所宜生地苦參血熱所宜特取其証治大畧耳若能觸類而長可謂應無窮之變矣脈訣舉要曰諸症失血皆見芤脈隨其上下以騐所出大凡失血脈貴沈細設見浮大後必難治治火之劑大薊散治辛熱傷肺嘔吐血或一碗或半升名曰肺疽大薊根犀角屑升麻桑白皮蒲黄杏仁去皮尖桔梗各二錢甘草炙五分右分作二服每服薑三片水煎服四生丸治吐衂血熱妄行生荷葉生艾葉側栢葉生地黄各等分搗爛為丸如鷄子大每服一丸用水二鍾煎至一鍾去渣服犀角地黄湯治血積胸中吐血衂血犀角鎊赤芍藥牡丹皮生地各一錢水煎服此方若有痰者及氣逆不降者服之皆不效予每用加枳壳桃仁滑石效茜根湯治吐血咯血嘔血等症四物湯加童便浸香附一錢五分茜草根二錢半忌鉄水煎服二三服立愈治吐血大黄末一錢生地黄汁一合水半鍾煎四五沸服即愈又方好墨煨去膠氣為細末每服二錢以白湯化阿膠清調服治吐血暴甚昏暈不止人參一兩為末用雞子清調如稀糊以匙挑服服盡效五更服之尤妙治吐血生地黄五斤搗汁生蜜二斤半共以瓦器盛貯鍋内重湯桑柴文武火熬三日夜取出入人參末四兩茯苓末六兩攪勻不拘時服此即瓊玉膏也又方加入青蒿汁熬膏再加㯽榔末一兩以降其氣使下行也竒方治飲酒過多藴熱胸膈以致吐血衂血葛花二兩黄連四兩右為末以大黄末熬膏為丸如梧桐子大每服百丸温湯下或煎服亦可辰膠散治大人小兒吐血阿膠炒蛤粉各一兩辰砂少許右為末藕節搗汁和蜜調下食後服龍腦鷄蘇丸治膈熱咳𠻳或吐血衂血方在火熱門茯苓補心湯治心虚為邪氣所傷吐血方在心痛門藕節散治吐衂不止藕汁生地黄汁生蜜五匙大薊汁各三合右和勻每服一小鍾不拘時服拔萃犀角地黄湯治熱甚而血積胸中生地黄二兩黄芩黄連各一兩大黄五錢每服一兩水二鍾煎一鍾食後服雙荷散治卒暴吐血藕節七个荷葉頂七个搗碎入蜜用水二鍾煎八分去渣温服或研末蜜調下枇杷散治暑毒攻心嘔吐鮮血方在暑門龍肝膏治吐血不止伏龍肝一兩生地汁麥冬汁小薊汁藕汁各三合姜汁一合入蜜半匙慢火熬成膏每服一匙帶補之劑竒方治肺損𠻳血吐血生地四兩取汁鹿角膠一兩炒為末右以地黄汁拌和毎服三錢童便加姜汁少許調下側栢散治内損吐血下血或用酒太過勞傷于内其血妄行出如湧泉口鼻皆流須臾不救則死側栢葉一兩半蒸焙人參荆芥穂燒灰存性各一兩為末每服二錢麪一錢新汲水調如糊啜服麥冬飲子治吐血乆不愈者五味子十粒麥門冬黄茋各一錢當歸人參生地黄各五分水煎服白术散治飲食過度負重傷胃吐血白术人參黄茋炙白茯苓各二錢炙甘草一錢山藥百合柴胡前胡各六錢分作三帖每服加姜棗水煎又方治同上理中湯加葛根鷄蘇散治勞傷肺經吐紅咽喉不利紫蘇葉白茅花黄茋生地阿膠各二錢麥門冬桑白皮桔梗貝母蒲黄炒甘草加姜棗煎服天門冬湯治思慮傷心吐衂不止天門冬白芍藥麥門冬生地黄逺志藕節黄茋阿膠没藥當歸甘草各一錢五分人參一錢分作三服姜三片水煎服蓮心散治同上蓮子心糯米各五十粒為末空心温酒調服歸脾湯治思慮傷脾心多徤忘其血妄行或吐或下白术茯神黄茋炙人參酸棗仁炒各二錢五分木香一錢炙甘草五分圓眼肉五枚姜一片棗一枚水煎服赤茯苓湯治大怒傷肝氣逆于胸吐血衂血赤茯苓人參桔梗陳皮各三錢麥門冬芍藥㯽榔各一錢五分分二服姜三片水煎丹溪方治見血後脾胃弱精神少血不止者人參一錢黄茋二錢五味子十三粒芍藥甘草當歸麥門冬各五分加鬱金尤妙水煎服又方治同上人參白术茯苓陳皮各一錢甘草川芎半夏曲各五分神曲青皮各三分水煎服如胃不和加藿香渇者加葛根五分痰結塊者加貝母一錢黄芩橘紅各五分小便赤加黄栢五分大便燥結加當歸七分心煩加酒晒黄連五分小便滑加牡蠣若見血多去半夏恐燥加生地一錢牡丹皮五分桃仁三分若胃中不足飲食少進加炒山梔五分若血溢入濁道留聚膈間滿則吐紅蘇子降氣湯加人參阿膠各五分上膈熱壅吐血者以四物湯加荆芥阿膠各五分更不止于本方中加大黄滑石各五分胃傷吐血宜理中湯加川芎乾葛各五分此是飲酒傷胃也吐血不止茜根為末用二錢待冷食後服良必勝散治男婦血妄流溢或吐或咳或衂小薊人參蒲黄當歸熟地川芎烏梅去核各一兩每服六錢水煎服大阿膠丸治肺虚客熱咳𠻳咽乾多唾涎沬或有鮮血勞傷脾胃吐血嘔血並皆治之方在後咳血門止血之劑白芨散治吐血白芨末井花水調服每服二錢地黄飲治衂血吐血新生地搗煮日服數升三日愈此方治經閉效甚乾姜散治吐血不止姜炭為末童便調服治諸血上行用韮菜汁姜汁童便磨鬱金飲之其血自清如無鬱金以山茶花代之又方用血餘灰三錢為末冷水調下冶吐血咯血用藕節搗汁飲之花蕋石散治勞証五内崩損湧噴血出成升斗者服之立止花蕋石煆過為末童便一鍾煎温調藥末三錢極甚者五錢食逺服如男子病則和酒一半婦人病則和醋一半與童便和調服之立止其瘀血化為黄水服此藥後患人必疎解其體却服獨參湯補之調氣止血之劑芎附散治衂吐血不歸經川芎二兩香附四兩為末每服二錢茶湯調下綱目云治怒氣傷肝氣而嘔血以黄連香附青黛柴胡甘草平其肝自愈宜服赤茯苓瀉心湯大七氣湯入川芎煎調蘇合香丸咳血咳𠻳有聲而痰内有血者是也或咳出純是血痰丹溪云乃火升痰盛身熱多是血虚四物湯加減用丹溪云痰帶血絲出童便竹􅅹止之經血逆行或血腥吐血唾血韮汁服立效咯血用姜汁童便青黛入血藥中如四物湯牛膝膏地黄膏之類又方用韮汁童便二物加鬱金研細末合和服之其血自消脈大發熱喉中痛者是氣虚用參茋蜜炙黄栢荆芥地黄當歸韮汁童便姜汁磨鬱金飲之其血自消此補兼解鬱也統㫖云𠻳出痰内有血者名咳血又云𠻳血其因有二熱壅于肺者易治不過涼之而已乆𠻳損於肺者難治此已成勞也熱𠻳有血宜金沸草散加阿膠痰盛加𤓰蔞仁貝母勞𠻳有血宜補肺湯加阿膠白芨𠻳血而氣急者加杏仁痰中帶血絲者此是陰虚火動勞傷肺臟宜滋陰保肺湯入方香附童便浸北杏仁童便浸去皮尖炒山梔仁炒青黛海粉𤓰蔞仁訶子馬兠鈴為細末入白硼砂少許煉蜜少加姜汁為丸噙化一丸白湯下天一丸此壯水之主以鎮陽光劑也與前方相兼服治陰虚火動咳血等症甚效懷地黄牡丹皮黄栢童便浸晒乾知母童便浸晒乾枸杞子五味子麥門冬牛膝白茯苓為末煉蜜為丸梧子大空心白湯吞下八九十丸天門冬丸潤肺止𠻳治咯血吐血咳血方在咳𠻳門丹溪鹿黄丸治酒色過度飢飽失時吐血咳血痰血神效枇杷葉款冬花北紫苑杏仁去皮尖木通鹿茸炙桑白皮各一兩大黄五錢為末煉蜜為丸臨睡含化七傷散治血汚血鬱血熱勞𠻳吐血血痰丹溪方黄藥子白藥子各一兩赤芍藥七錢五分𤣥胡索知母各五錢鬱金二錢半當歸五錢山藥乳香沒藥血竭各二錢為末每服二錢茶湯下綱目云肺熱此方極有交本草云白藥子黄藥子治肺熱大有功一方紅花當歸煎湯調下海藏甘桔加阿膠紫苑湯治肺痿咳唾膿血方見綱目傷寒咽痛門羅太無大阿膠丸治血虚𠻳血吐血阿膠微炒卷栢生地熟地大薊山藥鷄蘇葉五味子各一兩栢子仁另研麥門冬茯苓百部逺志人參防風各五錢為末煉蜜丸如彈子大煎小麥麥門冬湯嚼下一丸綱目云保養精血純補劑也血虚有潮熱者宜之刼勞散治肺痿痰𠻳痰中有紅線盜汗發熱過則冷飲食減少方在咳𠻳門陳日華云有一女子及笄病症甚危百藥不效偶得此只一料除根羅太無五味黄茋散治𠻳咯血成勞眼痛四肢困倦脚膝無力麥門冬熟地黄黄茋桔梗各五錢白芍藥五味子各二分人參二錢甘草一分每服五錢水煎服一日三服人參黄茋散治虚勞客熱肌肉消瘦四肢倦怠五心煩熱咽乾頰赤心沖潮熱盜汗減食咳𠻳臟血人參一兩秦芄茯苓各二兩知母二錢五分桔梗一兩桑白皮一兩五錢紫苑柴胡各二兩五錢半夏洗一兩五錢黄茋三兩五錢鱉甲去裙酥炙二兩每服五錢水煎服人參蛤蚧散治二三年間肺氣上喘咳𠻳咯吐膿血滿面生瘡遍身黄腫蛤蚧一對全者河水浸五宿逐日換水洗去腥氣酥炙黄色杏仁去皮尖炒五兩甘草炙三兩人參茯苓貝母知母各三兩桑白皮二兩為細末每日如茶㸃服神效海藏云蛤蚧補肺勞虚𠻳治乆𠻳不愈肺間積虚熱久則成瘡故𠻳出膿血曉夕不止喉中氣塞胸膈噎痛用蛤蚧阿膠生犀角鹿角膠羚羊角各一兩除膠外皆為屑次入膠分四服每服用河水三升於銀石器内慢火煮至半升去渣臨卧微温細細呷之其渣侯服盡再槌都作一服以水三升煎至半升如前服病人久虚不喜水當減水蛤蚧係補中有通乆𠻳不愈者宜之麥門冬湯治傷寒後傷肺咳唾膿血胸脅脹滿上氣羸瘦麥門冬桑白皮生地黄各一兩紫苑竹茹半夏洗桔梗炒麻黄去根節各七錢五分五味子甘草各五錢為粗末每服五七錢加棗三枚去核姜三片水煎服羅太無續斷散治骨蒸勞熱𫝊屍瘦病潮熱煩躁喘𠻳氣急身疼盜汗兼治咳𠻳吐膿血續斷紫苑桔梗竹茹五味子各三錢生地桑白皮各五兩甘草炙二兩赤小豆半斤每服五七錢入小麥五十粒水煎日三服海藏紫苑湯治咳𠻳吐血虚勞症肺痿變㿈方在咳𠻳門本事方云治勞瘵吐血損肺及血妄行神𫝊膏用剪草一觔婺台州皆有惟婺州者可用狀如茜草又加細辛每用一觔浄洗為末加入生蜜一觔和為膏以器盛之不得犯鉄九蒸九晒日一蒸曝病人五更起面東坐不得語用匙挑藥如粥服每服四匙良久用稀粟米粥壓之藥冷服粥飲亦不可太熱或吐或下皆不妨如久病肺損咯血只一服愈尋常咳𠻳血妄行每服一匙可也神驗治肺經嘔咳諸血及痰中有血初生用蘿蔔汁半盞入鹽少許服之立效如無生蘿蔔用蘿蔔子一錢紫蘇葉一錢同煎服次用鷄蘇散加阿膠治之本草云蘿蔔大下氣氣下則血亦下也經騐方治咳𠻳甚者或有吐血鮮桑白皮一觔米泔浸三宿浄刮去上黄皮右剉細入糯米四兩焙乾同搗為末每服一二錢米飲調下本事方治久𠻳咯血成肺痿及吐白涎胸膈滿悶不食扁荳散扁荳生姜各五錢枇杷葉去毛半夏人參白术各一分白茅根三分右水三升煎一升去渣加㯽榔末一錢和勻分作四服不拘時候千金方治上氣咳𠻳喘息㗋中有物唾血生姜汁杏仁各二升糖蜜各一升猪膏二合右五味先以猪膏煎杏仁色黄出之以紙拭令浄搗如膏和姜汁蜜糖等合煎令可丸每服杏仁一枚日夜服六七服款花補肺湯人參麥門冬各一錢二分五味子十五粒款冬花紫苑桑白皮炒各一錢當歸一錢五分芍藥知母貝母茯苓橘紅各八分甘草五分水煎服寧𠻳湯五味子十五粒茯苓一錢桑白皮一錢二分陳皮一錢知母一錢馬兠鈴一錢五分川芎一錢麥門冬一錢二分粉草五分滋陰保肺湯黄栢鹽水炒知母天門冬一錢二分當歸一錢五分芍藥生地橘紅紫苑桑白皮炒各八分大粉草五分阿膠一錢二分蛤粉炒五味子十五粒水煎服咯血唾血痰涎血咯血者㗋中常有血腥一咯血即出或鮮或紫者是也又如細屑者亦是也治法四物入姜汁童便青黛之類有咯出痰帶血絲者同治但宜加痰火藥唾血者鮮血隨唾而出者是也二者皆出于腎亦有瘀血内積肺氣壅逼不能下降用天門冬知母貝母桔梗黄栢熟地逺志或加炮姜生生子曰唾血症曽見二人口中津唾皆是紫黒血水如猪血之色晦而不鮮形瘦體熱盜汗為有怫鬱所致如此者年餘治以清痰降火開鬱等藥或止或發其一乃姪婦也後因注船大吐痰涎數椀其症再不復萌由是觀之唾血亦有木鬱之症不可不知痰涎血出于脾以葛根黄茋黄連芍藥當歸甘草沈香之類主之丹溪曰咯血痰帶血絲出者用姜汁青黛童便竹􅅹入血藥中用如四物湯如地黄膏牛膝膏之類滑伯仁曰寒涼之溢水乃瀉火也温熱之助火乃折水也衂血手陽明循手經上行入清氣道中咯血乃入于所合也所合肺也又曰咯血為病最重且難治者以肺手太陰之經氣多血少又肺者金象為清肅之臟今為火所制迫而上行以為咯血逆之甚矣上氣見血下聞病音謂喘而咯血且咳𠻳也唾血責在下焦陽火煎迫而為之也腎主唾為足少陰少血多氣故其証亦為難治恩袍散治咯血吐血唾血及煩躁咳𠻳生蒲黄乾荷葉茅根各等分為末每服三錢濃煎桑白皮湯食後温服丹溪方治咯血桑白皮一錢五分半夏炒知母貝母茯苓各一錢生地黄陳皮各一錢阿膠炒甘草杏仁炒各五分山梔子桔梗各七分栁桂二分入此以治上焦姜葱白水煎服又方治咯血衂血白芍藥一兩犀角二錢五分各為末新汲水調服一錢血止為限又方治咯血荷葉焙乾為末米湯調下二錢又方治痰中血白术一錢五分貝母芍藥桑白皮桃仁各一錢甘草三分山梔炒黒一錢二分牡丹皮一錢五分水煎服又方治痰中血橘紅一錢五分半夏茯苓貝母牡丹皮桃仁各一錢黄連甘草大青各五分姜三片水煎服又方治痰中血橘紅二錢半夏茯苓白术枳殻黄芩桑白皮各一錢五味子十五粒甘草三分人參五分或加青黛五分水煎服地黄散治一切吐血咯血能解一切毒及諸熱煩躁茜草根四錢大荳子黄藥子甘草各二兩右為末每服二錢新汲水調下加人參二兩治痰𠻳有血又方治吐血熱渴茅根一味絞汁飲之一日三服效治虚勞乆𠻳咯血五棓子炒為末每服一錢温茶調勻米飲送下白芨散治咯血白芨一兩藕節五錢為細末每服一錢白湯調下神效或云白芨下咽直至血竅竅為之填而血止也醫説云治肺損咳血殊效四血散治衂血吐血便血益元散加當歸井泉石淋者加梔子莖中痛加蒲黄水瀉加車前子米飲調下元戎方治鼻血口血大小便血服時隨病上下食前後服丹參蒲黄紫蘇滑石等分為末調服鼻血陳無擇曰衂者因傷風寒暑濕流𫝊經絡涌泄于清氣道中而致者皆外所因積怒傷肝積憂傷肺煩思傷脾失志傷腎暴喜傷心皆能動血隨氣上溢而致者皆内所因飲酒過多啖炙煿辛熱或墜墮車馬傷損而致者皆不内外因也原病式曰衂者陽熱怫鬱干於陽明而上熱則血妄行而鼻衂也丹溪云衂與吐血同涼血行血為主犀角地黄湯加鬱金又曰衂血出于肺以犀角升麻梔子黄芩芍藥生地黄紫苑丹參阿膠之類主之愚謂言肺者以竅言也言陽明者以血海言也其治亦多相須戴元禮曰鼻通於腦血上溢於腦所以從鼻而出治宜茅花湯調止衂散服之有頭風自衂頭風纔發則血不止治頭風兼止衂之劑有因虚致衂者此為下虚上熱不宜過用涼劑宜四物湯加參茋沈香磨服傷濕而衂腎著湯加川芎伏暑而衂茅花湯調五苓散上膈極熱而衂犀角地黄湯加黄芩茅花荆芥虚者茯苓補心湯飲酒過多而衂茅花湯加川芎乾葛病衂愈後血因舊路一月或三四衂又有洗面而衂日以為常四物湯加阿膠蒲黄仍佐以蘇子降氣湯使血隨氣下統㫖謂風行水動氣行血流治衂者則知血藥以治衂而不知氣降則血歸經古人所以血藥中必加氣藥一二味如上所謂蘇子降氣湯之類是也前人謂身熱則死寒則生亦是大槩言之耳豈無熱生而寒死者乎必兼詳脈症而後可也治風寒之劑桂枝湯方見傷寒治熱之劑犀角地黄湯方見吐血門茜根散治鼻衂不止茜根阿膠蛤粉炒黄芩側栢葉生地各一兩甘草五錢加薑三片水煎服黄芩芍藥湯治鼻血不止黄芩芍藥甘草水煎服川芎三黄散直指方治實熱衂血大黄濕紙煨川芎黄連黄芩各等分右為末每服二錢井水調下食後服黄連散經騐方治大人小兒盛熱乗于血血隨熱氣散溢于鼻謂之鼻衂凡血得寒則凝澁結聚得熱則流散妄行黄連黄芩栢葉甘草各等分豆䜴三十粒右每服一兩水煎服治血衂血汗以人中白新瓦上焙乾為末入麝香少許酒調下生地黄湯治榮中有熱及肺壅鼻衂生瘡一切丹毒等疾生地赤芍當歸川芎各等分水煎食後温服若鼻衂加蒲黄生瘡加黄芩丹毒加防風濟生麥冬飲治衂血不止麥門冬生地黄各等分每服一兩水煎服一方治鼻衂及酒疸黄沙淋萱草根搗汁一鍾生薑汁相和時時細呷貫衆散治鼻衂貫衆根為細末水調一錢立止羅太無寸金散治鼻衂不止黄藥子五錢土馬􅂒五錢有足者生甘草一錢右為末每服二錢新水調下未止再服立差本草云土馬􅂒即苔與垣衣之類垣衣生牆垣之側土馬􅂒生牆垣之上背隂古牆上有一方治衂血蛀竹末米糊調下二錢效茅花湯治衂茅花一大握剉水煎飲之立止清熱帶補之劑生地黄散治咯血衂血吐血諸血証皆治之枸杞子柴胡黄連地骨皮天門冬白芍藥甘草黄芩生地黄熟地黄各等分水煎服治便血加地榆海藏龍腦鷄蘇丸治上焦熱除煩解勞去肺熱咳衂血熱驚悸脾胃口疳吐血肝膽熱泣出口苦腎熱神志不定上而酒毒膈熱消渴下而血滯五淋血崩等疾薄荷一觔麥門冬去心阿膠炒黄茋蒲黄炒人參已上俱浄藥木通銀柴胡各二兩剉同木通浸一宿絞出汁生地黄六兩甘草一兩五錢黄連一兩右為細末好蜜二觔先煎一二沸然後下生地黄末不住手攪匀加木通柴胡汁浸熬成膏勿令火𦂳焦了然後加前藥末和丸如豌豆大每服二十丸白湯下虚勞虚煩梔子湯下肺熱黄芩湯下心熱驚悸恍惚人參湯下咯唾吐衂麥門冬湯下肝熱防風湯下腎熱黄栢湯下治五淋及婦人漏下車前子湯下痰𠻳者生薑湯吞下莖中痛蒲黄滑石水一鍾調下氣逆者橘皮湯下室女虚勞寒熱潮作柴胡人參湯下地黄飲治衂血往來乆不愈者甚效生地黄熟地黄枸杞子地骨皮各等分右為末每服二錢蜜湯調下日三服補虚之劑止衂散黄茋六錢赤茯苓白芍藥當歸生地阿膠炒各三錢為末以黄茋湯調下三錢産後鼻衂大全云産後口鼻黒氣起及鼻衂者名胃絶此証不可治遇有此者急取緋線一條并産婦頂心髪兩條𦂳繫中指節即止治産後鼻衂中風以荆芥為末童便調下氣虚者不可用齒衂又名牙宣統㫖云血從齒縫中或齒根出者謂之齒衂有風壅有腎虚風壅者消風散外以袪風擦牙散腎虚者以腎主骨齒者骨之餘虚火上炎服涼藥而愈甚此屬腎經下虚而上盛宜鹽湯下安腎丸間服黒錫丹仍用青鹽炒香附黒色為末擦之亦有胃熱而牙齗出血者宜清其熱清胃散主之附方肘後方治牙血不止苦竹茹以醋浸一宿含之千金方治同礬石一兩滚湯三升煮取一升先拭齒乃含之又方濃煎竹葉湯入鹽少許含之衍義方治齒縫出血不止用紙撚蘸蟾酥少許挿入出血處立止靈苑方治虚氣攻牙齒痛血出牙齦痒痛骨碎補二兩細剉炒黒色為末擦之早晨潄久吐出臨睡擦畢俟津液滿口嚥之丹溪治陰虚牙齒出鮮血氣鬱四物湯加香附牛膝生甘草側栢葉服羅太無治牙痛腫痒動搖牙齗宣露出血口氣等疾當歸藁本地骨皮防風白芷槐花川芎甘草升麻北細辛各等分為末擦痛處甚者取三錢水鍾半黒豆半合生薑三片煎至一鍾乗熱潄之冷則吐出本事方治一切牙疼風熱齗常出鮮血以至崩落口臭不可近人者宜服之大黄米泔浸軟切片生地黄大者薄切右二味旋切各用一二片合定貼所患牙上一夜即愈未全可再如前用忌説話恐引風毒津液漬患䖏舌衂舌上或出血如簮孔者香薷汁服一升日三服又方髪灰二錢米醋調敷舌上血出䖏文蛤散治熱壅舌上出血如泉五棓子洗白膠香牡蠣粉各等分右為末每用少許摻患䖏或燒熱鉄熨孔上槐花散治舌上無故出血如線槐花炒為末摻之仍用麥冬煎湯調下妙香散妙香散方在婦人門第二卷夢與鬼交條下肌衂一名血汗河間定命散治膽受熱熱血妄行鼻中衂衊并血汗不止硃砂寒水石麝香為末每用五分新汲水調下不拘時候看老幼虚實加減肌衂者血從毛孔而出前人多主于肺熱古方以男胎髪燒灰撲之大全竹茹湯方見便血條黄茋建中湯辰砂妙香散小便血尿血不痛痛者乃血淋也當與淋門參治經云胞移熱于膀胱則癃溺血仲景曰熱在下焦則尿血亦令淋閟不通𤣥珠經云小便出血是心伏熱在于小腸宜鏡面竹自然汁加生蜜一匙服之或以八正散加麥門冬葱煎服如小便澁痛以海金沙細末調治之綱目云胞絡絶則溲血故經曰悲哀太甚則胞絡絶胞絡絶則陽氣内動發則心下崩數溲血也凡咳而溲血脱形其脈小勁是逆也凡淋不可發汗汗之必便血便血不止用柿一箇燒存性為末米飲調下統㫖云屬熱屬血虚有因心腎氣結所致或憂勞房室過度此得之虚寒不可専以血為熱而淖二者皆致溺血熱用小薊湯四物湯煎服效虚用四物湯調牛膝膏火動榮血妄行者再加黄栢知母虚寒者十全大補湯加炒蒲黄滑伯仁曰小便血足太陽隨經入膀胱也與小腸血同附方治房室勞傷小便出血山藥一兩鹿角五錢髪灰二錢為末苧根搗汁打糊為丸梧子大每服五十丸空心食前白湯吞下治大小便出血不止劉寄奴為末茶清調服立止治尿後有乾血乾柿餅三枚燒灰陳米湯調服羅太無髪灰散治小便尿血髪灰本草云髪灰能消瘀血通闗格利水道破癰疽血衂丹溪云髪補陰甚捷右一味每用一二錢以米醋二合湯少許服井花水調亦可一法茅草根車前子煎湯調下尤妙兼治肺疽心衂内崩吐血一兩口或舌上出血如針孔若鼻衂吹内立已葛氏方治小便出血當歸四兩酒三升煎一升頓服肘後方治尿血苧麻根十根水五升煎取二升一服效外臺秘要治尿血車前草汁五合空心服茅草根汁亦妙或加酒少許沖服小薊飲子治下焦結熱尿血成淋生地四兩小薊根滑石通草山梔仁當歸酒洗淡竹葉藕節蒲黄炒甘草各五錢右每服一兩水煎空心服丹溪云尿血有實熱者可用當歸承氣湯後以四物湯加山梔當歸承氣湯即調胃承氣湯加當歸是也又方治溺血屬熱山梔炒水煎服或用小薊琥珀血虚者四物湯加牛膝膏又方治血淋木通甘草梢瞿麥山梔水煎服濟生鹿角膠丸治房室勞傷小便尿血鹿角膠五錢沒藥另研油頭髪灰各三錢右為末用茅根湯打糊為丸如梧桐子大每五十丸鹽湯送下王屑膏治氣虚尿血并五淋砂石疼痛不可忍黄茋人參各等分為末用大蘿蔔切一指厚三四片蜜淹少時蘸蜜炙乾復蘸復炙盡蜜二兩為度勿令焦至熟蘸黄茋人參末吃不時仍以鹽湯送下又方治老人小兒尿血不止川升麻一兩半作一帖水煎服妙又方治虚而尿血阿膠三兩炙搗為末酒二升和温服當歸散治婦人小便出血或時尿血當歸羚羊角赤芍藥各五錢生地黄一兩大薊葉七錢半分作三帖水煎食前服六味地黄丸治老人尿血及陰虚尿血𤣥胡散治尿血作痛𤣥胡索一兩朴硝三分水煎服五棓湯治尿血不止五棓子煎湯露一宿次早取上面清者温服龍骨散治尿血龍骨末一錢五分水調服日三服瘥此二方皆收澁之劑治溺血血淋方小薊根琥珀二味為末水煎服葢二味能治下焦熱結琥珀散治五淋澁痛小便膿血琥珀海金沙沒藥蒲黄各一兩為極細末每服三錢食前煎萱草湯調下治血淋及小便閉方杜牛膝根二兩朴硝一兩用雪水二碗煎牛膝至一碗去渣入朴硝攪匀空心服治小便出血莖痛不可忍淡豆䜴一撮煎湯温服之甚效治血淋方牛膝一兩黄栢知母澤瀉各一兩麥門冬天門冬山梔仁各一兩半生地黄二兩為末粥糊丸如梧桐子大每空心白湯吞下八九十丸又方治同上人參白术川歸熟地川芎山查茯苓各八分黄茋七分升麻三分水煎服又方治同上牡丹皮當歸生地山梔子白芍甘草梢滑石澤瀉白茯苓木通各等分每服五七錢加生薑皮二分灯心一分水煎食前服下血素問云結陰者便血一升再結二升三結三升駱龍吉云結陰之病陰氣内結不得外行血無所稟滲入腸間故便血也其脈虚澁因血結不行故下本事方云如下清血色鮮者腸風也血濁而色黯者臟毒也肛門射血如線者蟲痔也仲景云下血先便後血者此逺血也黄土湯主之先血後便者此近血也赤小豆當歸散主之潔古云治血下防風為上使黄連為中使地榆為下使若血瘀色紫者陳血也加熟地黄若血鮮色紅者新血也加生地黄若寒熱者加柴胡若肌熱者加地骨皮若脈洪實痛甚者加酒浸大黄生生子曰便血有濕有熱有虚有寒有食積有酒積有風入大腸治之之法切不可純以寒涼損壞脾胃脾虚尤不能約束其血也故丹溪戒人凡用血藥不可單行單止不可純用寒涼必于寒涼中加辛味為佐乆不愈者復用温藥必兼升舉藥中加酒炒酒煮涼藥如酒煮黄連之類丹溪曰腸風獨在胃與大腸出治用黄芩秦芁槐角升麻青黛定腸風痛用蒼术滑石當歸生地黄芩甘草下血屬虚者當温散之四物湯加乾薑升麻便血過多者四物湯加蝟皮有熱者四物湯加山梔升麻秦芁阿膠有兼風者蒼术秦芁芍藥香附胃清血非藍實不除𤣥珠經云大便下血曰腸風切勿止澁究其本末症狀先清其表後攻其裏其血自止如脈洪大又當以四物合解毒湯調理熱則流通虚則下溜故便血屬熱屬虚亦有風傷肝而下陷及濕盛而傷血者熱而下血或清或濁宜四物湯加黄芩山梔炒槐花秦芁膠珠虚者四物加乾薑升麻涼藥隨虚實加減風傷胃獨下清血者宜四物湯加防風升麻荆芥柴胡升提之濕入腸胃下如豆汁色者宜四物加蒼术白术黄連黄栢地榆槐花陰虚下血無熱者十全大補湯加止血之劑統㫖云便血或清或濁或鮮或黒或在便前或在便後或與泄物並下此由内外有所感傷凝停在胃隨氣下通亦是妄行之意便血清者屬榮虚有熱濁屬熱與濕色鮮者屬火黒者火極先血後糞為近先糞後血為逺與泄物並下者屬有積在内或絡脈傷也並宜分治又當别其色而分寒熱也色鮮多因腸胃藴熱必是飲酒過多辛熱煿炙之故也宜連蒲散或黄連阿膠湯色瘀或因寒邪凝滯血逐冷氣入客腸胃宜理中湯加膠珠炒黒香附其應甚捷大抵下血後必以胃藥收功胃氣囘血自循其經絡矣伏暑純下鮮血黄連香薷飲治之方見傷暑門風熱流入大腸經下血不止敗毒散治之方見傷風門風濕乗虚入於腸胃下清血或下瘀血胃風湯治之滑伯仁曰大便前後下血便前由手陽明隨經下行滲入大腸𫝊于廣腸而下也便後由足陽明隨經入胃淫溢而下者也古人謂近血逺血者是也又有所謂腸風臟毒者腸風則足陽明積熱乆而為風風以動之也臟毒則足太陰積熱乆而生濕從而下流也風則陽受之濕則陰受之和中去濕之劑東垣升麻補胃湯治宿有腸血症因五月大熱吃杏腸癖下血逺三四尺散漫如篩腰沈沈然腹中不痛血色紫黒病名濕毒腸澼是陽明少陽經血症升麻柴胡防風各一錢半羌活一錢當歸身葛根各三分獨活白芍生地丹皮熟地甘草炙各五分黄茋一錢肉桂少許水煎食前服和中益胃湯治太陰陽明腹痛大便常溏泄設不泄即秘結在後𫝊為濕熱毒下鮮紅血腹中微痛脇下急縮脈緩而洪弦中指下得之按之空虚熟地三錢歸身酒洗甘草炙益智各三分升麻柴胡各五分蘇木一分藁本二分水煎食前服升陽除濕和血湯治腸澼下血另作一派其血􅫶出有力而逺射四散如篩下春二月中旬日下二行腹中大作痛乃陽明氣沖熱毒所作也當升陽去濕熱和血脈不兩服而愈生地丹皮甘草生炙各五分白芍一錢半熟地黄茋各一錢升麻七分歸身蒼术秦芁各三分肉桂陳皮各二分水煎食前服當歸和血散治腸澼下血濕毒下血槐花青皮荆芥熟地白术各六分當歸升麻各一錢川芎四分為末食前米飲調下椿皮丸本事方臭椿皮十四兩蒼术枳殻各二兩為末醋糊丸梧子大空心食前米飲下三四十丸玉屑丸治腸風瀉血乆不止者槐根白皮去粗皮苦楝根去皮各三兩椿根白皮四兩三味于九月後二月前採陰乾天南星半夏各五錢並生用葳靈仙一兩寒食麵三兩右末滴水丸梧子大每服三十丸以水一鍾煎沸下丸子煮令浮以匙抄起温温送下不要嚼空心食前服有人下血幾盈盆頓爾疲萎諸藥不效許學士以此治之良愈槐花飲治腸風有濕脹滿下血蒼术厚朴陳皮當歸枳殻各一兩槐花二兩甘草烏梅各五錢每服一兩水煎空心服治下血方椿根白皮去粗皮枯白礬一兩甘草滑石等分血竭五錢人參三錢黄連二錢共為末米飲下治寒之劑烏荆丸治腸風川烏頭一兩泡去皮尖荆芥穂二兩為末醋丸桐子大每服二十丸酒送下白湯亦可下病發時日進三服不發時日進一服黄土湯治先便後血名逺血粉草熟地白术附子炮阿膠黄芩已上各三兩灶中土半升右七味以水八升煮取三升分作三服赤豆當歸散治先血後便名近血赤小豆五兩浸令芽出晒乾當歸一兩為末白湯調下二錢日三服梅師云治熱毒下血或因食熱物發動以赤小豆杵末水調下方寸七又方治腸風赤小豆炒黒為末每服二錢米飲調下由此觀之赤小豆寒熱皆能治也益智和中湯治腸澼下血紅或深紫黒色腹中疼腹皮惡寒右三部脈中指下得之俱弦按之無力闗脈甚𦂳肌表陽明分涼腹皮熱而喜熱物熨之内寒明矣升麻甘草炙歸身黄茋各一錢葛根益智半夏丹皮柴胡白芍錢半桂枝肉桂乾薑少許水煎食後服羅太無治真定摠管因免强飲酸酒得腹痛次𫝊泄瀉十餘日便後見血或紅或紫腸鳴腹痛醫以諸見血皆熱治以芍藥栢皮湯之類前証如故仍不欲飲食食則嘔酸形體愈瘦面青黄不澤心下痞惡冷物口乾時有煩躁不得安卧請予治之診得脈弦細而微遲手足稍冷内經曰結陰便血一升再結二升三結三升又曰邪至五臟則陰脈不和陰脈不和則血留之結陰者病陰氣内結不得外行血無所稟滲入腸間故便血也以平胃地榆湯主之蒼术一錢厚朴陳皮茯苓白术乾葛甘草炙各五分乾薑當歸炒麯白芍人參益智仁各三分地榆七分升麻黒附子炮各一錢生薑三片棗二枚水煎食前温服此藥温中散寒除濕和胃數服病減大半又灸中脘二七壯引胃氣上升次灸氣海百壯生發元氣以還少丹服之以長肌肉至春再灸三里三七壯治脾壯胃生發元氣次服芳香之劑慎言語節飲食而安王海藏云治楊師醉醒發大渴飲水三大盞又飲冷茶三碗後病便鮮血四次得一盆先與呉茱萸丸次日又與平胃五苓各半散三大服血止後自利又與神應丸四服自利乃止或問曰何不用黄連之類以解毒予曰若用寒藥其疾大變難治寒飲内傷復用寒藥非其治也況血為寒所凝入大腸間而便下血温之乃所以得熱則自止楊氏飲冷酒瀉血對金散止之亦是理中脘分别陰陽安定血脈之意也唐生病因飲酪水及食生物下利紫黒血十餘行脾胃受寒濕與六神平胃散半兩加白术三錢以利腰臍間血一服愈胃風湯治大人小兒風冷乗虚入客腸胃水穀不化泄㵼注下及腸胃濕毒下如豆汁或下瘀血日夜無度人參茯苓川芎官桂白术當歸芍藥各等分每服五六錢加粟米百粒同煎稍熱服若加熟地黄茋甘草等分名十全大補湯若虚勞𠻳加五味子有痰加半夏發熱加柴胡有汗加牡蠣虚寒加附子寒甚加乾薑皆依本方等分骨蒸發熱飲食自若者用十補湯加柴胡一兩氣弱加人參小便不利加茯苓脈弦澁加川芎惡風加官桂脈澁加當歸腹痛加白芍胃熱濕盛加白术草豆蔲散治丈夫傷血婦人血崩漬入大腸出血草豆蔲梹榔各炒紫色鶯粟殻燒灰等分為末每服二錢米飲下濟生剪紅丸治臟腑虚寒下血不止面色痿黄日乆羸痩側栢葉炒黄鹿茸火去毛酥炙附子炮去皮臍川續斷酒浸黄茋阿膠蛤粉炒白礬枯五錢當歸酒浸各一兩為末醋煮米糊為丸如桐子大每服七十丸空心米飲下羅太無結陰丹寒濕下血者為結隂治腸風下血臟毒下血諸大血疾枳壳麩炒葳靈仙黄茋橘紅椿根白皮何首鳥荆芥穂各五錢為末酒糊丸桐子大每服七十丸陳皮飲入醋少許煎過少冷送下血熱之劑黄連湯治大便後下血腹中不疼謂之濕毒下血黄連當歸各五錢甘草炙錢五分水煎食前服聚金丸治腸胃積熱或酒毒大便下血腹中熱痛煩渴脈弦數黄連四兩四製生一兩酒炒一兩灰火煨一兩姜汁炒一兩黄芩一兩防風一兩右為末糊丸桐子大每服五十丸米泔浸枳壳水下保命集芍藥黄連湯治大便後下血腹中痛謂之熱毒下血芍藥黄連當歸各五錢淡桂五分甘草炙二錢大黄右每服一兩水煎服如痛甚者加木香㯽榔末各一錢調下拔萃涼血地黄湯如飲食不節起居不時陰受之陰受之則入五臟入五臟則填滿閉塞下為飱泄乆為腸澼水穀與血另作一派唧出也時令值夏濕熱太盛正當客氣勝而主氣弱也故腸澼之証甚此湯主之熟地當歸青皮槐花炒各五分知母炒黄栢炒各一錢水煎服如臍下悶小便澁或大便後重調木香㯽榔末各五分稍熱空心服如裏急後重又不去者宜下之如有𫝊變隨症加減治之一方槐花荆芥穂各等分為末酒調下一錢半空心仍食猪血妙連蒲散黄連蒲黄炒各一錢二分黄芩當歸生地黄枳壳麩皮炒槐角芍藥川芎各一錢甘草五分如酒毒加青皮乾葛去枳壳濕毒加蒼术白术水二鍾煎一鍾食前服槐角丸治五種腸風下血痔漏脫肛槐角三兩地榆黄芩當歸防風枳壳麩炒各二兩右為末酒糊丸桐子大毎服七十丸空心米飲下大臟丸治腸風下血及痔疾神效黄連半觔去蘆為末入肥大腸臟頭一段内前後用線縳定蒸爛為度搗為丸桐子大每服百丸空心米飲下秘方栢葉散治便血甚効扁栢葉晒乾為末糯米炒黄為末等分每服五錢空心白湯調下如未止再加炒黒木耳末一錢又方治臟毒不止當歸枳殻側栢葉槐角百草霜芍藥各一兩右共一處炒令烟微起為度研末每服二錢空心温酒調下日午米湯下甚妙又方治積血便血蒼术陳皮各二錢五分黄栢黄芩各七錢五分連翹五分右為末以生地黄膏六兩為丸桐子大空心及食前白湯下七八十丸丹溪方治脈緩大口渴便血及婦人月水紫色勞挾濕熱白术五錢地黄黄栢炒白芍藥各三錢地榆香附各二錢黄芩一錢為末鉦餅為丸又方治便血久久傷血并麻風症癬瘡見面者龜板二兩升麻香附各五錢白芍兩半側栢葉一兩椿根皮七錢五分為末粥丸桐子大以四物湯加白术黄連甘草陳皮煎湯下槐花散治腸風臟毒槐花炒側栢葉焙荆芥枳壳炒等分俱為末每服二錢米飲下空心食前服又方治下血槐花炒枳壳炒地榆蜜炒各三錢水煎露一宿頓温空心服栢黄丸治腸風臟毒下血鮮紅生地黄黄栢炒各一觔為末煉蜜丸桐子大每空心食前米飲下八九十丸枳壳散治諸便血枳壳麩炒黄色十兩甘草炙三錢為末每服一錢空心米飲調下酒煮黄連丸酒煮黄連丸黄連去蘆十二兩好酒五升煮黄連以酒乾為度焙乾為末麵糊丸桐子大每服三十丸空心服加減四物湯治腸風下血側栢葉生地川歸川芎各八兩枳壳槐花炒荆芥甘草炙各四分地榆條芩各六分防風六分加烏梅一個薑三片水煎服參栢丸治腸風下血苦參黄栢等分為末酒打米糊丸空心酒吞百丸補虚之劑竹茹湯治婦人汗血吐血尿血下血竹茹熟地各二兩人參白芍桔梗川芎當歸甘草炙桂心各一兩每服一兩水煎食逺服參苓白术散治脾氣虚不能約束其血或為寒涼藥傷以致飲食少進面色痿黄補中益氣湯加阿膠蒲黄治清氣下陷中氣不足下血不止十全大補湯理中湯胃風湯雜方固榮散治吐血便血白芷五錢蒲黄炒地榆各一兩甘草一錢五分右為末每服二錢温酒調服氣壯者加石膏一兩一方治糞後下血不止艾葉汁生薑汁各三合和服一方治中毒下血刺蝟皮炒成珠為末每服二錢水調下日三服烏梅丸治便血下血烏梅三兩燒存性為末醋糊丸桐子大空心米飲下七十丸一方治便血白芷五棓子為末粥丸桐子大每服五十丸米湯下靈苑方治腸風下血乆不止茄蒂煅存性為末每服三錢食前米飲下丹溪云茄蒂燒存性山梔炒等分為末丸之米飲吞下百丸效本事方治腸風絲𤓰燒存性空心酒調下二錢五槐丸治臟毒五棓子槐花陳者百藥煎好者各等分為末酒糊丸桐子大每服廿丸空心米飲下日三服又方治腸風臟毒酒痢下血黄連生薑二味煎湯下二氣丸次服五槐丸又方金星草五兩味苦寒大解丹石毒陳乾薑右為末空心新汲水調下一錢蒜連丸治臟毒黄連為末以大蒜煨熟去衣研和丸桐子大每服五十丸陳米飲下蒜能清血東垣烏梅丸治腸風下血真僵蚕烏梅肉各一兩焙乾為末糊丸鷄頭子大每服百丸白湯吞下日三服一方治腸風下血馬鞭草搗自然汁服良一方治腸風下血及血崩丹溪云亦治汚血五靈脂炒去火為末每服二錢二麯散治酒積下血不止糞後見諸藥不效者神麯兩半白酒藥二丸俱為末清水調揑成餅子慢火上炙黄為末毎服二錢白湯下亦治泄瀉神效丹溪方治腸澼陳年棕櫚燒存性百藥煎為丸服又方治臟毒便血生藕節切片清晨蘸平胃散嚼下治腸痔大便常血葱白三五觔煎湯盆中坐浸之瘥又灸法平直量骨脊與臍中處椎上灸七壯或年深者更于椎骨兩傍各一寸灸七壯除根治腸風下血椿根皮好酒濃煎服即愈治下血不止木賊二兩作二帖水煎空心服如人行五里再服九竅出血耳目口鼻大小便皆出血者是也黄金散治九竅出血牛黄鬱金等分為末血餘散治血淋兼治内崩吐血舌血小便出血亂髪皂角水洗浄晒乾燒灰為末每服二錢以茅草根車前草煎湯下本草謂髪灰消瘀血通闗格利水道破癥瘕血衂有人生血瘤大如栗常被衣擦破則血出不止血餘灰敷之愈一人刀傷血流不止用胎髪灰敷之立愈孫真人治九竅出血用黄荆葉搗汁酒和服之丹溪治九竅出血以大薊一握搗汁以酒和服之如無生者以乾者為末冷水調下三錢一方龍骨末酒煎通口服中蠱下血綱目云唾水沈者心腹絞痛下血如爛肉者為蠱千金方治中蠱下血如鷄肝出其餘四臟俱壞惟心未毁或鼻破待死取馬藺根末水服方寸匕隨吐即出極神此苗葛蔓綠紫生子似橘梅師方治卒中蠱毒下血如鷄肝晝夜不絶臟腑敗壞待死用白蘘荷葉密置病人卧席下勿令病人知覺自呼蠱主姓名百一選方治中蠱毒或吐血下血如爛肝者取蚯蚓十四條以苦酒三升漬之蚓死但服其汁已將死者皆可治千金翼治蠱毒下血蝟毛燒末服方寸匕當吐蠱毒肘後方治中蠱吐血下血皆如爛肝者苦瓠一枚水二升煮取一升服之吐即愈又方用苦酒一升煮苦瓠令消服之神效金瘡出血軍中方治金瘡出血不止半夏生用為末摻之𦂳扎立止又方風化石灰五月端陽日取苧葉搗汁拌勻做成大餅子陰乾每用研極細末罨上立止桃花散治金瘡出血及杖瘡風化石灰一觔將軍末子四兩先將灰炒漸投將軍末子候看灰如桃花色即止每用少許敷之血立止杖瘡以調做膏藥貼之一方胎髪傅之立止三七末罨上立止血竭末末𫝊之立止一子墮車血滯于中大黄川歸各等分每服一兩水煎服或五錢血鬱湯桃仁香附撫芎紅花青黛等分右糊丸桐子大每服白湯下四五十丸赤水元珠卷九
