body:
  text: 赤水元珠卷十九明孫一奎撰藥誤傷人凡應用小柴胡湯和解誤用承氣湯致身發黃者死中暑作熱病誤用燥劑者死腎虗受寒內逼浮陽之火泛上面赤煩躁身有微熱渴欲飲水不能下咽大便閉或自利小水淡黃或嘔逆或氣短或鄭聲或咽痛狀似陽證醫見面赤煩渴便閉認作陽證誤投寒涼立死隂證身熱面赤足冷煩躁揭去衣被脈來數大無力不急用加減五積散冷服誤用涼藥者死傷寒汗多用利小便藥者死陽明病潮熱汗多小便因少若利之加喘渴者死濕病若發其汗使人耳聾不知痛處者死病人煩躁自覺甚熱他人以手按其肌膚殊無大熱此為無根失守之火用涼藥者死病人應死證頭重視身此天柱骨倒元氣已敗死大便濁氣極臭者死目精正圓者死卵縮入腹胍見離經者死瘥後小便澀有血名曰內外瘡皆黑靨不出膿者死少隂下利止頭眩時時自冒者死熱盛躁急不得汗出是陽脈極死舌上黑胎生芒刺刮不去易生者死夏月可治鼻衄自汗者死胃寒發厄丁茴香柿蒂良薑湯調服脈不出加膽汁合生脈散其脈又不出或暴出者皆死望色昔肥今瘦主痰大肉脫去主不治平人消瘦主脾熱眼眶黑主內有痰鼻色青主腹中痛苦冷者死鼻色微黑者有水氣鼻色黃主小便難鼻色白者屬氣虗鼻色赤者屬肺熱鼻色鮮明者有留飲鼻孔乾燥者必衄血鼻色燥如煙煤者是陽毒熱極鼻孔冷滑色黑者是隂毒冷極鼻流濁涕者屬風熱鼻流清涕者是肺寒鼻孔癖脹者屬肺熱有風唇口焦紅者吉唇口焦黑者凶唇口俱腫赤者是熱極唇口俱青黑者是寒熱唇口舌胎斷紋者難治唇口燥裂者是脾熱唇青舌捲者死唇吻色青者死環口黧黑者死口張氣直出者死齒燥無津液者是陽明熱極前板齒燥兼脈虗者是中暑齒如熱者難治耳色黑枯燥者是腎憊目赤唇焦舌黑者屬陽毒目熏黃色暗者屬濕毒目黃兼小便利大便黑小腹滿痛者屬畜血目瞑者將欲衄血目之白睛黃兼冷無熱不渴脈沉細者屬隂黃兩眥黃者病欲愈凡開目見人者屬陽閉目不欲見人者屬隂睛昏不識人目反上視睛小瞪目直視目邪視目睛正圓戴眼反折眼􅀈陷下此八者皆死證目睛微定暫時稍轉動者屬痰目中不了了睛不和不明白者此因邪熱結實在內不了了者謂見一半目不見一半目是也舌腫者難治舌出者死面顴頰赤在午後此虗火上升不可作傷寒治面赤脈數無力此伏隂病其證煩躁引飲虗陽上升面赤脈沉細此少隂病外熱內寒隂盛格陽宜溫誤用寒涼者死面赤脈弦數此少陽病宜小柴胡和解緣面赤赤乃陽氣怫欎在表汗不徹之故宜發汗面部通赤色此陽明表證未解不可攻裏宜解肌面唇青是隂寒極面青兼舌捲囊縮亦是隂寒面青兼小腹絞痛是夾隂傷寒面目身黃兼小水短澀是濕熱面目身黃兼小腹滿硬痛小便利是畜血傷寒面白為無神或汗多或脫血所致面白人不宜大汗黑氣在魚尾相牽入太陽者死黑氣自人中入口者死黑氣自入耳目鼻舌者死面黑人在傷寒內涉虗不宜參术大補聞聲聲清聲濁病邪在表其聲清而響喨病邪入裏其聲濁而不喨聲輕聲重病在陽分其聲前輕後重病在隂分其聲前重後輕聲斷聲續病邪表淺併有餘陽證其聲續病邪入深併內傷不足其聲斷言壯言怯外感陽病有餘出言壯厲則寒熱交作內傷隂證不足出言懶怯則寒熱間作嘆嘆是心變動之聲欠腎主欠隂氣積下陽氣未盡陽引而上隂引而下隂陽相引故數欠也噫噫是心變動之聲是胸中氣不交通寒氣客于胃厥逆從上下復出于胃故為噫嚏嚏是腎變動之聲有病發嚏是傷風或傷熱無病發嚏是陽氣和滿於心吞吞是脾變動之聲厄其聲皆從胃中至胸嗌間而為厄有胃中實熱失下者有胃中痰飲者有服寒涼藥過多者有胃中虗冷者咳咳是肺變動之聲俗呼為嗽肺為邪干氣逆不下也有肺寒咳者有停食咳者有邪在半表半裏咳者唏隂氣實陽氣虗隂氣速陽氣遲隂氣盛陽氣絶故為唏怒怒是肝變動之聲歌歌是脾變動之聲哭哭是肺變動之聲笑笑是心變動之聲太息憂思則心系急急則氣約氣約則不利故太息以伸屈之錯語意錯言亂自知言錯邪氣尚輕自不知覺此熱甚正氣衰呢喃病邪入輕則睡中發此聲也聲嘶肺有風熱聲啞聲啞唇口見生瘡是狐惑病有風熱傷心肺而聲啞者少隂病咽中生瘡者有痓病口禁者有熱病三四日不得汗出者死口禁口禁難言見手足攣搐是風痓口噤不言難治陽明病渴欲飲水口噤舌乾白虎加人參湯咽乾不可汗舌哽舌短舌強病邪入深主難治口噤咬牙是風痓喉中有聲喉中􅀈􅀈有聲者是痰也卒然無音寒氣客於厭會則厭不能發發不能下至其開闔不便故無音聲如鼻鼾聲如鼻鼾者難治久病耳聾屬氣虗咽喉不得息寸脈微浮或沉伏胸中痞鞭氣上衝此胸中有寒宜吐之鼻息如鼾睡屬風溫耳聾兼脅痛宜和解寒熱咽而口苦屬少陽耳聾兼耳腫耳痛是少陽風熱問因口苦口甜口苦是膽熱口甜是肝熱舌乾口燥是胃家熱極心下滿因下早致滿為痞氣手按拍之有聲又耎此停水手按則散此虗氣手按鞭痛此宿食喜明喜暗喜明屬陽元氣實喜暗屬隂元氣虗睡向壁向外向壁屬隂元氣虗向外屬陽元氣實病起覺不舒快少情緒否有此證是夾氣傷寒病起覺倦卧骨腿酸疼脅痛否有此證是勞力傷寒要知病在肝經問婦人乳頭縮不縮耳聾耳聾邪氣入深難治或兼虗證有少陽證不可不知切生死形狀六經六絶脈雀啄連來三五啄屋漏半日一點落彈石鞭來尋即散搭指散亂真解索魚翔似有亦似無蝦遊靜中跳一躍寄語醫家仔細看六脈一見休下藥一動一止兩日死兩動一止四日通三動一止六日亡四動一止八日事五動一止只十日十動一止一年去春草生時即死期二十一動二年住清明節後始傾亡三十動一止三年次立秋節後病則危四十動一止四年住小麥一熟是死期五十一動一止五年試草枯水寒時死矣此為太素脈玄祕左右手脈俱急緊盛是夾食傷寒右手脈來空虗左手脈來緊盛是勞力傷寒左手脈來緊盛右手洪滑或寸脈沉身熱惡寒隱隱頭痛喘咳煩悶胸脅體痛是夾痰傷寒左手脈來緊澀右手脈沉數心胸脅下小腹有痛處是血鬱內傷外感鬼脈得病之初便讝語或發狂六部無脈大指之下寸口之上有脈動者是反關脈如病人六部無脈便不可言其無要在掌後切看脈來動者是傷寒不可發汗口燥舌乾者口苦咽乾者咽喉痛者吐血下血者淋血者小便淋瀝者大便㵼利者內傷勞倦者尺脈微弱者房勞隂虗者夢遺泄精者風濕者濕溫者中暑者瘡漏者傷寒發汗不出燻法用發表藥汗不出將蘇葉燒湯以器盛之至於被內兩膝下燻之又法用薑柦綿裹周身擦之其汗自出此良法也傷寒汗出不住止法將病人髮披在水盆中足冷于外用炒麩皮糯米粉龍骨牡蠣煅為末和勻周身撲之其汗自止此良法也傷寒可吐胸中懊惱者喉中有痰聲者胸滿鬱鬱微煩者中風寒痰涎擁塞者乾霍亂心腹刺痛欲死者傷寒三四日邪在胸中者脈大胸滿多痰者下利日數行寸口脈滑者寸口脈沉伏或浮滑有痰者傷寒不可吐病人元氣虛羸者房勞隂虗者勞倦內傷者胎産崩漏者寸脈虗細弱無力者經水適斷適來者少陽膽病者傷寒吐不出探法用梔子豉湯大瓜蒂散不得吐隨用三山丸合解毒散煎服再不吐將鵝羽在喉中探吐傷寒吐不住止法用炒糯米一撮生薑自然汁少許水煎服凡嘔吐不止者亦用此二味入各藥中同煎服嘔吐自止如胃實嘔吐不可用傷寒不可下六脈虗細者嘔吐者腹中時滿時減者不轉屎氣者少陽膽病者腹如雷鳴者陽明面冷赤色者咽中閉塞者血氣兩虗者內傷勞倦者隂虛勞倦者經水適斷適來者胎前崩漏者小便清白者夾隂面赤者心下鞭者脈雖大無力者傷寒小便不通燻法一切小便不利先將麝香半夏填患人臍中上用蔥白田螺各搗爛成餅封於臍上用布帶縳住良久下用皂夾燒煙燻入隂中其水竇自通婦人亦用皂夾煎湯洗玉户立通傷寒胸膈不寬尉法一切寒結熱結水結食結痞結血結痰結支結大小結胸痞氣結者俱用生薑搗爛如泥去汁取柦炒熱絹包漸漸揉尉心胸脅下其滿痛豁然自愈如薑查冷再入薑汁再炒再尉揉之以愈為效惟熱結用冷薑查揉之不可炒熱醫當慎之又有傷寒衄血將解未盡或熱極及吐血不盡醫不知其證遂用涼藥之劑止住其衄血留結於心胸之分故滿痛而成血結胸也用加味犀角地黃湯妊娠傷寒護胎法用井底泥青黛伏龍肝各為末調勻塗於孕婦臍中二寸許如乾再塗上以保胎孕也到傷寒家不染病法凡入病家須避其邪氣不使染著為上以雄黃末塗鼻孔行動從客位而入男子病穢氣出於口女子病穢氣出于隂門其相對坐立之間必須識其向背用藥寒溫合宜論如麻黃得桂枝則能發汗芍藥得桂枝則能止汗黃茋得白术則止虗汗防風得羌活則治諸風蒼术得羌活則止身痛柴胡得黃芩則寒附子得乾薑則熱羌活得川芎則止頭疼川藭得天麻則止頭眩乾薑得天花粉則止消渴石膏得知母則止渴香薷得扁豆則消暑黃芩得連翹則消毒桑皮得蘇子則止喘杏仁得五味則止嗽丁香得柿蒂乾薑則止厄乾薑得半夏則止嘔半夏得薑汁則消痰貝母得瓜蔞則開結痰桔梗得升麻開提血氣枳實得黃連則消心下痞枳殼得桔梗能使胸中寬知母黃柏得山梔則降火豆豉得山梔治懊憹辰砂得酸棗則安神白术得黃芩則安胎陳皮得白术則補脾人參得五味麥門則生腎水蒼术得香附開鬱結厚朴得腹皮開膨脹草果得山查消肉積神麯得麥牙能消食烏梅得乾葛則消酒砂仁得枳殼則寬中木香得薑汁則散氣烏梅得香附則順氣芍藥得甘草治腹痛吳茱茰得良薑亦止腹痛乳香得沒藥大止諸痛芥子得青皮治脅痛黃茋得大附子則補陽知母黃柏得當歸則補隂當歸得生地則生血薑汁磨京墨則止血紅花得當歸則活血歸尾得桃仁則破血大黃得芒硝則潤下皂夾得麝香則通竅訶子得肉果則止㵼木香得檳榔治後重澤㵼得豬苓則能利水澤㵼得白术則能收濕此用藥相得之大端也妊娠傷寒禁忌藥蚖斑水蛭及虻蟲烏頭附子配天雄野葛水銀并巴豆牛膝薏苡與蜈蚣三稜代赭芫花麝大戟蛇蛻黃雌雄礞石芒硝牡丹桂槐花牽牛皂角同半夏南星與通草瞿麥乾薑桃仁通碙砂乾漆蟹甲爪地膽茅根都不中蒸臍法用麝香半夏皂莢末一字填患者臍中後用生薑薄苛貼于臍上放大艾火于薑片上蒸二七壯灸關元氣海二十壯熱氣通于內逼于外隂自退而陽自復矣尉臍法用蔥頭縳一把切去葉留白根切餅二寸許連縳四五餅先將麝香硫黃二字填于臍中放蔥餅于臍上以尉斗盛火于餅上尉之餅爛再換餅再尉熱氣入腹以通陽氣如大小便不利以利則止中寒中寒寒邪卒時直中隂經即病如中太隂脾經用藿香正氣散合理中湯寒甚加附子如寒中少隂腎經用五積散加茱茰寒熱足冷加附子四逆湯寒熱手足甲唇皆青舌卷囊縮脈伏絶者用蒸臍法及大劑薑附溫之不然則死矣傷寒合病三陽若與三隂合病即是兩感所以三隂無併合例也大抵傷寒二陽經合病必用二陽經藥合治三陽經合病必用三陽經藥合治隂毒傷寒咽喉不利致毒氣攻心如傷寒時氣得病一二日便結成隂毒或服藥後三四日或十餘日變成隂毒身重背強腹中絞痛咽喉不利毒氣攻心心下脹滿硬如石短氣不息嘔逆唇青面黑四體如氷身如被杖其脈沉細而疾或伏絶用隂毒甘草湯先進一服如人行十里再進一服取汗出乃愈蓋隂毒之氣隨汗而出也五六日可治七日不可治如湯藥不受面唇指甲皆青黑色或時鄭聲舌卷囊縮煩躁冷汗不止腰背眼痛此皆隂寒毒氣入深急用蒸臍法如手足溫暖即止知人事者生灌入生薑汁照前用藥不可與涼劑誤服必死夾隂傷寒隂極發躁用四逆湯合生脈散入辰砂細茶白蜜冷服隂利用四逆湯加人參茯苓肉桂肉果砂仁木通燈心升麻少許服之虗陽伏隂用加減五積散冷服藥服下嗌冷體既消熱性乃發熱因寒用也寒疫寒疫四時皆有之若初起病頭疼發熱增寒拘急或吐逆惡心中脘痞滿或飲食停留不化或腹中作痛未發熱者宜藿香正氣散加減治之若已發熱者十味藭蘇散汗之若身體痛骨節疼發熱者羌活沖和湯加蘇蔥主之若有汗不得再發汗宜加減沖和湯主之若邪熱不解傳入裏變證者宜從正傷寒條內治之大頭傷寒若先發於鼻額紅瘇以至兩目盛腫而不開并額上面部皆赤而腫者此屬陽明也或壯熱氣喘口乾舌燥咽喉腫痛不利脈來數大者用普濟消毒飲主之內實熱盛者用通聖消毒飲若發於耳之上下前後并頭角紅腫此屬少陽也或肌熱日晡熱潮熱往來寒熱口苦咽乾目疼脅下滿宜小柴胡加天花粉羌活荆芥連翹芩連主之若發於頭上并腦後項下及目後赤腫者此屬太陽也宜荆芥敗毒散主之若三陽俱受邪併於頭面耳目鼻者以普濟消毒散外用清涼救苦散敷之治法當先緩後急則邪伏也先緩者宜退熱消毒虗人兼扶元氣胃虗食少者宜助胃氣候其大便內熱甚以大黃下之拔其毒根此緩之法蓋此毒先腫於鼻額次腫於目又次腫於耳從耳至頭上絡後腦結塊則止不散必膿也普濟消毒飲如無板藍根用大青或青黛虗人脈弱加人參引至毒處加皂角刺胃弱食少加白术橘紅如大便不通加酒浸大黃服後就卧使藥氣上行內熱用荆芥則毒散加酒炒黃芩熱盛加酒炒黃連口渴加天花粉凡頭面腫盛目不開鼻塞悶口乾舌燥內外有熱或咽喉腫痛不利或內實大便祕結脈洪數煩渴宜用通聖消毒散不消加牛蒡子玄參或生犀角水薑汁服凡時毒頭面赤腫咽嗌堵塞水藥不受若臟腑素有積熱發為腫毒疙瘩一切惡瘡紅腫並宜漏蘆湯大便實加大黃芒硝凡雷頭風頭面疙瘩腫痛增寒壯熱四肢拘急狀似傷寒用清震湯治咽喉腫病用緑雲散以細竹管吹入喉中病處食積身不痛惡食噯氣作嘔欲吐不出惡心短氣痞滿腹脹胃口痛按亦痛中濕類傷寒太陽病關節疼痛脈沉細者此名濕痺其人小便不利大便反快但當利小便凡濕病頭汗出背強欲得被覆向火胸滿小便不利舌上白胎者此丹田有熱胸中有寒渴欲得水而不飲則口燥煩也若誤下則噦為難治若下之額上汗出微喘小便利者死若下利不止者亦死也痰證類傷寒如病人目睛微定暫時轉動目如炭煤昔肥今瘦喘嗽轉側半難臂痛皆痰證也痰在上部寸口脈浮滑痰在中部右關脈滑大痰在下部尺脈洪滑或痰飲發寒熱胸滿氣粗語出無倫此夾痰如見祟用二陳湯加蘇子枳實芩連瓜蔞貝母桔梗山梔前胡薑汁調辰砂溫服內傷瘀血證發熱狀類傷寒或被踼打相撲閃肭一時不覺過至半日或一二三日而發者有至十數日半月一月而發者胸脅小腹滿痛手不可近者而發寒熱此有瘀血也或一時傷重就發寒熱瘀血上沖則昏迷不醒如死之狀良久復蘇輕則當歸導滯湯重則桃仁承氣湯加蘇木紅花牛膝桔梗薑汁量其元氣下其瘀血自愈漱水不欲咽漱水不欲咽者此屬陽明胃熱也欲飲不欲咽是邪熱循經裏無熱也陽明氣血俱多熱逐血妄行作衄但欲嗽水不欲咽口燥者用犀角地黃湯外無寒熱喜忘如狂小便自利大便黑色口燥舌乾但嗽水不欲咽者此有瘀血結於下焦宜桃仁承氣湯下盡黑物則愈少隂證脈沉細手足冷或時煩燥渴嗽水不欲咽者宜四逆湯下利厥逆無脈乾嘔煩渴嗽水不欲咽下宜白通湯加豬膽汁入人尿煮之厥隂蛔厥煩躁吐蛔口燥舌乾但欲涼水浸舌并口唇時不可離不欲咽下宜理中湯加烏梅花椒主之大抵隂證發躁煩渴不能飲水或欲勉強飲下良久誠復吐出或飲水而嘔噦者皆內寒也宜四逆湯溫之蓋無根失守之火遊於咽嗌之間假作燥渴則不能飲水也晝夜偏劇凡病晝靜夜劇者熱在血分宜四物湯加黃柏知母芩連山梔丹皮耎柴胡主之若夜靜晝劇此熱在氣分宜小柴加山梔連母地骨主之心下滿傷寒心下滿者當心下髙起滿硬者是也不經下後而滿者則有吐下之分若下後心滿者有結胸痞氣之别若發熱者以小柴胡加枳實薑炒黃連去黃芩治之若按之拍拍有聲而軟者此停水五苓散主之若按之硬痛者有宿食也輕則消導重則用承氣下之寒在胸中心下滿而煩飢不能食宜瓜蒂散吐之陽明病心下滿硬者不可下下之則利不止者死脈浮大有力心下硬有燥渴讝語大便實者此屬臟病宜攻之此言屬臟者宿屎在臟也故下之若食在胃口未入於胃未可下也大抵腹中滿心下滿胸中滿俱不可用甘草糖棗甘甜之物蓋甘能補氣填實故也外用薑擦法甚良遺尿遺尿者小便自出而不知也大抵熱盛神昏遺尿者可治若隂證下寒逆冷遺尿脈沉者多難治宜四逆湯加益智仁主之厥隂囊縮逆冷脈沉遺尿者宜四物加茱茰湯陽不回者死傷寒汗下之後熱不解隂虗火動而遺尿者用人參三白湯加黃柏知母麥冬五味歸地主之大便自利下利微熱渴脈弱自愈下利脈數微熱汗出自愈驚惕傷寒八九日胸滿煩驚小便不利讝語一身盡通用柴胡龍骨牡蠣湯主之大抵傷寒汗吐下之後虗極之人或因事驚恐遂生驚惕宜養心血安神之劑厄逆橘皮半夏生薑湯加茯苓枳實陳皮桔梗凡其氣自臍下直衝於胸嗌間厄忒者此隂證厄忒也其病不在胃因下虗內有伏隂或誤服寒藥遂至冷極於下迫火上衝發為厄忒而欲盡也又病人煩躁自覺甚熱他人以手按其肌膚則冷此為無根失守之火散亂為熱非實熱也乃水極似火隂證似陽若不識此誤用涼藥下咽則死當用羌活附子湯加官桂人參木香陳皮半夏砂仁急溫其下真陽回隂火降厄忒止也隂證及因胃寒厄忒不止者外用乳香硫黃散嗅法內用丁香柿蒂散服之則止再灸期門中脘氣海關元此良法也但手足溫暖脈重者為有生矣灸期門穴法以婦人之乳頭向下盡處骨間動脈是穴男女乳小者以手一指為率陷中動脈是穴男左女右灸三五壯讝語諸讝語脈浮大者生沉小四逆者死也太陽本病邪結膀胱其人如狂與五苓散利之加辰砂末虗甚錯語柴胡三白湯加黃連麥冬五味主之鄭聲鄭聲者喉中鄭重而不接續如氣息不促手足頗溫其脈沉細者急以白虎湯加人參五味麥冬助其元氣或濃煎獨參湯徐徐呷之其脈微細大小便自利手足冷用白通湯瘖啞不言瘖啞不言者若少隂病咽中生瘡不能言語者以雞子苦酒湯若狐惑上唇青瘡聲嗄者在本條痓病口噤不能言治在本條熱病瘖啞不言三四日不得汗出者死熱甚大腸肺金不能言者宜清肺降火則愈風熱擁盛咳嗽聲啞者以消風熱降痰火則愈又有失於發散風邪伏於肺中者當以發散為主也隂證似陽又云面赤目赤引飲脈來七八至按之則散者此無根之脈用人參四逆湯治之又夾隂中寒面色青脈沉厥冷囊縮舌卷下利清榖裏寒外熱者身痛脈沉厥冷脈微欲絶者並用四逆湯㵼多加肉果訶子粟殼炒陳壁土熟艾木通燈心二十莖取土氣嘔吐不止加薑汁半夏陳皮胃氣寒嘔不止加丁香咽喉痛不利加桔梗大腹痛加肉桂乾薑小腹絞痛加茱茰青皮藿香腹痛甚不止加木香乳香沒藥砂仁熟艾玄胡口食寒物身受寒氣加砂仁草果藿葉惡寒戰栗加麻黃桂枝骨體疼痛甚加桂枝羌活蒼术胃寒發厄加丁香柿蒂茴香良薑為末薑湯調服或入前湯調服立止口吐涎沫加鹽炒茱茰名茱茰四逆有寒痰加半夏薑陳皮誤服寒涼藥過多胸腹脹滿關格不通嘔逆不止湯藥不受欲死者加丁沉木香蘇子檳榔枳實陳皮薑汁傳送去甘草凡尼姑女冠寡婦室女與其有夫妻妾不同患隂寒證者倍加附子不必疑乃隂多陽少故也冷結凡人手足厥冷脈沉細無結胸但小腹脹滿按之痛者此冷結膀胱須灸關元穴也宜服茱茰當歸四逆湯磨木香溫服外用揉尉法蛔厥舌乾口燥常欲冷水不欲咽蛔上煩躁昏亂欲死兩手脈沉遲足冷至膝甚者連蛔并屎俱出大便不行此證雖出多端可救治也加味理中安蛔湯主之又有胃中空虗蟲無所安反食其真臟之血病人心胸脅下有痛陳必撮眉呻吟或時下血如豚肝色或如濕毒膿狀或鮮血下利急迫或昏沉不省人事者一切吐蛔雖身大熱不可與涼劑服之必死俱用理中安蛔湯加減治之待蛔定却以小柴胡退熱又有厥隂病消渴氣上沖心飢不能食食即吐蛔既曰胃寒復有消渴之證蓋熱在上焦而中下焦但寒而無熱若大便實用理中湯加大黃主之吐蛔未止加黃連苦楝樹皮細辛治蛔不可用甘草鬱冒不仁四逆湯加人參歸桂枝藭蓍天麻主之凡頭目眩暈非鬱冒也蓋眩暈為輕鬱冒為重肉瞤筋愓太陽病發汗出不解仍發汗頭身瞤動振振欲劈地用真武湯合人參養榮湯倍用歸蓍若不因汗過多其人筋脈跳動者此人稟素血少邪熱傳干六脈之中火動愓也用加味人參養榮湯汗後虗煩不得眠筋惕肉瞤內有熱以加味溫膽湯肉苛肉苛者雖著衣絮猶尚苛也傷寒發汗過多亡其血者乃變此證蓋榮虗而衛實則血氣不得和通肉失所養故頑痺不仁痛癢不知也用羌活沖和湯加桂枝當歸木香主之治肉苛肌肉不仁路龍吉升麻湯治榮虗衛實肌肉不仁滿身痛癢用肉苛羌活湯百合若惡寒嘔者病在上焦二十三日愈若腹滿微喘大便堅三四日一行微溏者病在中焦六十三日愈若小便淋瀝難者病在下焦三十三日愈並宜百合湯主治百合病也已經發汗後更發者用百合知母湯已經下後更發者用百合代赭湯已經吐後更發者用百合雞子湯瘈瘲不因汗所生者當平肝木降心火佐以和血之劑用羌防荆連柴芍歸地川芎天麻參類若兼痰者必加南星半夏竹瀝薑汁如風邪急搐須兼全蝎薑蠶若曽經汗下之後多日傳變得此證者為病劇虗極生風用小續命湯加減凡傷寒汗出露風則汗不流通遂變筋脈攣急手足搐搦用牛蒡根散主之若用小續命湯有汗去麻黃無汗去黃芩須要通變治之循衣摸牀凡循衣摸牀直視讝語脈弦者生脈澀者死小便利者可治不利者不可治謂津液枯竭也大抵隂陽二氣俱絶則妄言撮空也若大便祕結撮空讝語燥渴者此為實熱宜承氣湯下之舌卷囊縮有陽證有隂證其陽證囊縮者因熱極而縮急用大承氣湯下之隂證囊縮者因寒極而縮急用四逆湯加吳茱茰湯溫之婦人無囊觀其乳頭縮者即是也凡治此症先灸關元氣海丹田及蒸尉法甚效瘥後發腫傷寒方愈後浮腫者此水氣也用牡蠣澤瀉散主之胃虗食少五苓散加蒼术陳皮木香砂仁胃不虗者以商陸一味煮粥食之亦妙傷寒大病瘥後足腫者不妨但節飲食戒酒色胃氣強腫自消瘥後遺毒傷寒汗下不徹餘邪結在耳後一寸二三分或兩耳下俱硬腫者名曰遺毒宜速消散緩之必成膿以連翹敗毒散治之項腫痛加威靈仙大便實加大黃川山甲發腫有膿不消或已破未破者但用內托消毒散加皂莢升麻金銀花甘草瘥後發碗頭瘡碗頭瘡者亦因汗下後餘毒不盡瘥後故發碗頭瘡也只以黃連甘草歸尾紅花防風苦參荆芥連翹羌活白芷煎服外用芒硝赤小豆青黛為末以雞子清和豬膽汁調敷瘡上最效勿動待其脫落傷寒瘥後小便澀有血者名曰內外瘡皆有靨不出膿者死亦是餘熱毒也用黃連解毒湯加生地歸翹木通滑石牛膝萹蓄琥珀甘草梢瘥後勞復氣虛煩嘔竹葉石膏湯燥渴去半夏知母倍天花粉虗熱不止者千金麥冬湯瘥後女勞復其候頭重不舉目中生花腰背痛小腹裏急絞痛或增寒發熱或時隂火上衝頭面烘熱心胸煩悶者竹皮燒裩散猳鼠屎有熱加柴胡調赤衣散人虗弱者用參胡三白湯調赤衣散小腹急痛脈沉足冷用當歸四逆湯加熟附茱茰送下赤衣散若見卵縮入腹脈見離經者死瘥後隂陽易若傷腎經虗損真陽有寒無熱脈虗足冷者以人參四逆湯調下燒裩散若傷肝經以當歸四逆湯加茱茰熟附下燒裩散用分寒熱而治隂易熱氣上衝胸中煩悶手足攣拳搐搦如風狀用瓜蔞竹茹湯婦人病未平復有犯房事小腸急痛連腰膝痛四肢不仁無熱者當歸白术散隂陽易不瘥大便不通心神昏亂驚惕不安用妙香丸瘥後虗弱瘥後虗熱盜汗不止屬隂虗用當歸六黃湯陽虗自汗無熱惡寒無力下虗用加味黃茋建中湯瘥後心神恍惚不寧夜卧煩躁不安或亂夢虗驚不眠因汗下過多心血虧少用硃砂安神丸加逺志酸棗仁茯神有痰加橘紅瘥後昏沉若用知母麻黃取汗者但慮病後血氣兩虗豈可再大汗之若人元氣壯實脈來有力者乃可行之脈虛人弱者只用十味溫膽湯有寒熱潮熱日晡發熱者柴胡溫膽湯加芩連主之瘥後飲酒復劇緣傷寒病熱未解而飲酒者則病增劇轉加熱盛脈弦數者用小柴胡合解毒湯加烏梅乾葛砂仁脈洪者用人參白虎湯合黃連解毒湯加乾葛烏梅砂仁主之妊娠傷寒若有表證宜汗者用羌活沖和湯加柴胡當歸芍藥蘇葉蔥白即四物沖和湯汗之有氣滿喘急加香附砂仁去生地外用護胎法若裏實熱證大便不通燥渴者當用大黃轉藥不必疑矣須酒制用有病則病當之設患真寒脈伏厥冷用薑桂附子不必慮也附薑桂雖熱炒制無害必加黃連甘草制之沉香墜之産後傷寒産後傷寒不可輕易汗下恐産時傷力其發熱有去血過多有惡露不盡有三日蒸乳發熱或早起勞動或飲食停滯俱有發熱惡寒狀類傷寒不可便用發表攻裏之劑産後惡露不盡亦有發熱惡寒必脅肋脹滿連大小腹有塊作痛産後飲食停滯發熱頭痛必有噫氣作酸惡聞食臭胸膈飽悶右關脈緊用治中湯加山柦神麯砂仁炒黃連川芎當歸佐之若産後蒸乳發熱惡寒者必乳間脹硬疼痛令産婦揉乳汁通其熱自除不藥而愈矣若果産後不謹虗中入風者當以四物湯加防風荆芥白芷人參香附烏梅薑蠶乾薑産後不謹感冒傷寒發熱惡寒頭疼骨疼脈浮緊表證宜汗者用四物湯加羌活蒼术白术乾薑蘇葉梔子少佐用蔥白頭水煎取微汗自汗去蒼术蘇葉加白术熱甚加軟柴胡乾薑少許黃芩佐之炒用熱邪傳裏口燥渴大便不通脈沉實或熱甚讝語宜下之輕則蜜導法重則用四物加柴胡炒黃芩枳殼熟大黃徹下就用四物湯加乾薑少許參术大用以溫補其血氣若熱邪傳至半表半裏證寒熱嘔口苦脈洪數者四物湯合小柴胡主之不可水水停心下微微喘汗吐下而脾胃寒腹滿結胸兼不食縱貪切勿與之餐傷寒大吐下後外氣怫鬱胃中寒也發汗後尤不可水與之則噦嘔喘咳發熱惡寒濡弱相摶臟氣裏微胸中苦煩非結也不可水漬青布冷貼胸中誤下後寒氣相摶腸鳴得水令汗大出即成􅀈陽明病潮熱誤下腹滿不能食或胃中虗冷不能食皆不可水下利脈浮大不可水當溫之傷寒結胸無熱證者宜平和藥若與水益令熱不得出當汗而不汗則煩假令汗出後腹中痛亦服和氣之藥再三汗下熱不退汗下再三熱弗休長沙公見應心憂人參白虎加蒼术解毒湯和涼膈儔經云三下而熱不退者即死後人有四五次下加至十數次行而生者此乃偶誤中耳活者未一二死者已千百觀是之言後之學者切不可以為法但當解毒合涼膈多服調之使陽熱徐退隂脈漸生庶不失事是知權變者矣傷寒下後自汗虗熱不已白虎湯加人參蒼术一服如神汗出身涼此通仙之妙法也汗下之後熱不退不問有汗無汗皆宜白虎加蒼术湯解之又加人參亦妙仍服涼膈合解毒調之發汗之後熱不解脈尚浮者白虎加蒼术湯傷寒表解傳裏熱而不退或有汗而未愈調和隂陽湯病在半表半裏熱不退小柴胡湯半表半裏大便微實小柴胡湯加大黃半表半裏大便不通者除膈熱湯裏熱微者宜除胃熱湯熱勢未退宜六一順氣湯兩除表裏之熱病至六七日裏熱已甚表熱漸微脈雖浮數先用大柴胡湯不退宜解裏熱湯病在半裏半表熱不退脈尚浮洪者當微表小柴胡合白虎湯和之病在半表半裏脈沉實當微利除膈熱湯輕下之汗吐下三法之後别無異證但些微熱或無熱並小柴胡和之口舌乾燥合解毒湯涼之汗吐下之後别無異證大便硬結不通涼膈散病熱已去微熱者以益元散和之無令再病熱不退發黃斑涼膈散加當歸下後熱不退或證未全退雙解散雙和表裏大汗前後逆氣熱勢不退雙解散瘥後遺熱不退雙解散再解之次用小柴胡和之他人病氣汗毒傳染或食豬羊牛馬酒毒再復發熱不退雙解散除膈熱湯風寒暑濕飢飽勞逸憂愁思慮恚怒悲恐四時中外諸邪所傷意覺身熱頭項拘倦強痛發熱惡寒惡風汗下後熱不退並宜服雙解散有汗去麻黃無汗加葛根身微熱不退表虗汗出不已或過發汗以致表虗脈不實海藏黃蓍湯嗇嗇惡寒發熱不退其人大渴飲水者其腹必滿小便不利而自汗出其病欲解此為肝乘肺名曰縱當刺期門發熱不退腹滿讝語寸口脈浮緊此為肝乘脾名曰橫當刺期門男女下血發熱不退讝語者此為熱入血室但額上汗出者當刺期門婦人經水適來適斷者為熱入血室四肢冷附四肢沉重四肢不收下利肢疼屬厥隂欲眠默默風溫尋身如被杖施真武厥利脈沉四逆珍四肢疼下利厥逆惡寒脈沉弱四逆湯