大抵羌活散治頭痛惡風石膏湯治身熱自汗芍藥散治腹中痛柴胡散治寒熱而嘔四物湯治血虗四君子治氣虗無汗加蒼术川芎防風自汗加白术黃蓍茯苓有是諸證臨時選用合服不可執一而無權也瘡瘍發熱類傷寒瘡瘍發熱要詳看初發防荆敗毒安已潰還須托裏散忌投汗劑與涼寒經曰諸脈浮數當發熱而灑淅惡寒若有痛處飲食如常畜積有膿也又曰數脈不時則生惡瘡也所以惡瘡初生必寒熱交作不可便以傷寒治之須視病人頭面脊背有無瘡頭若有小紅白膿頭瘡須當仔細辨之凡發背初作只起一小瘡也不過二三日則大發也若疔瘡初作全與傷寒相似要當識之也若一例而發汗或妄投寒涼之劑則誤之矣若識其瘡毒須尋瘡科治之庶不誤也若毒氣走散則難救矣初生在表瘡毒正發而未潰發熱惡寒宜防荆敗毒散行涼敗毒散隨證加減服之若有涼血止痛草藥可增入數味在內和服亦可取效速如小薊五爪龍紫金皮金銀花之類皆可用如瘡毒已潰宜托裏解毒湯隨證加減或有草藥乾膿散血之劑亦可增入數味可也如小薊穿山蜈蚣紫金皮之類是也初生未成者速塗令消散宜拔毒散已潰爛者用鐵箍散赤膈傷寒赤膈傷寒胸膈上疼痛赤腫號為名防風敗毒宜加減裏實防風通聖靈夫受傷於寒變故萬狀未易默悟也然胸膈赤腫疼痛頭疼發熱惡寒身體痛此非正傷寒乃類傷寒也名之赤膈傷寒宜防荆敗毒散加瓜蔞子黃連黃芩紫金皮玄參赤芍升麻白芷有表復有裏胸膈赤腫疼痛防風通聖散加瓜蔞子黃連紫金皮表證已退大便燥實胸膈腫痛涼膈解毒加瓜蔞子枳殼桔梗紫金皮赤芍藥又宜稜針刺腫處出血半表半裏胸膈腫痛柴胡枳桔湯加瓜蔞子紫金皮赤芍藥黃耳傷寒黃耳傷寒耳痛詳要知風入腎經戕不治卒變成危證續命防荆敗毒良凡耳中䇿䇿痛者皆是風入於腎經也不治流入腎則卒然變惡風發熱脊強背直如痓之狀曰黃耳傷寒也此不可作正傷寒治乃類傷寒法也治宜小續命去附子加白附子殭蠶天麻羌活獨活蔓荆子細辛次用防荆敗毒散加細辛蔓荆子白芷蟬蛻黃芩赤芍紫金皮又法用苦參磨冷水滴入耳中熱則去之再易又虎耳草取汁滴入耳中又猴薑根取汁滴入耳中又苦薄苛土木香擂汁滴入耳中解㑊類傷寒解㑊傷寒出內經四肢骨節苦伶仃寒如不寒熱不熱治法通舒血氣寧解者肌肉解散㑊者筋不束骨解㑊之證似寒非寒似熱非熱四體骨節解散懈惰倦怠煩疼飲食不美食不知味俗呼為砂病內經名為解㑊原其因或傷酒或中濕或感冒風寒或房事過多或婦人經水不調血氣不和皆能為解㑊證與砂病相似實非真砂病也治宜先用熱水蘸搭臂膊而以苧麻刮之甚者更以針刺十宣及委中出血或以香油燈照視身背有紅點處皆烙之皆能使腠理開通血氣舒暢而愈又宜服蘇合香丸砂病類傷寒嶺南砂病類傷寒壯熱憎寒肢痛酸鸂鶒鸀􅀈毛糞煅酒調灰服勝金丹夫沙病者嶺南閩廣之地多有之矣乃溪毒砂虱水弩射工蟈短狐蝦鬚之類俱能含砂射人被其毒者則憎寒壯熱百體分解似傷寒初發之狀彼土人治法以手捫摸痛處用角筒入肉以口吸出其砂外用大蒜煨搗膏封貼瘡口即愈諸蟲惟蝦鬚最毒若不早治十死八九其毒深入於骨若蝦鬚之狀其瘡類平疔腫彼地有鸂鶒鸀􅀈等鳥専食已上諸蟲以此鳥毛糞燒灰服之及籠此鳥於被毒病者身畔吸之其砂聞氣自出而病愈也搖頭搖頭直視似煙熏真病心家已絶根痓證反張并口噤頭中痛者戰而言頭者諸陽之會陽脈有乖則頭為之搖動然有心絶而搖動者有風盛而搖頭者形證皆不類焉隂根於陽陽根於隂隂陽互根氣血所以周流而無間若心絶則神去而隂竭陽獨無根不能自主是以頭搖經所謂陽獨留形體如煙熏直視搖頭者此也至於太陽發痓則風盛於上風主乎動是以頭搖經所謂獨搖頭卒口噤而背反張者此也言搖頭中有痛也言則甚痛又云裏動言則為虗不言為實均是搖頭析而分之曰實邪曰虗邪曰真邪當明其臧否可灸百會上星風府其搖即定身癢隂陽虗弱渾身癢未解桂枝各半靈風盛防風通聖散血虗四物入浮萍陽明反無汗皮中如蟲行以久虗也术附湯黃蓍建中湯風熱盛身癢發熱無汗口燥舌乾大小便祕澀防風通聖散加羌活風證身癢小續命去附子加白附子血虗身癢四物湯加浮萍蒺䔧防風未交接而作易病治新痊瘥後未交接曽與言談起欲心思欲切心因病復女勞易病共條尋夫男子病新瘥未與婦人交接而男子感動其情思其欲事心切而得病者治與女勞復同人迎氣口脈左手關前一分為人迎之位凡脈緊盛乃傷寒也右手關前一分為氣口之位凡脈緊盛乃傷食也若人迎氣口俱緊盛此為夾食傷寒又曰內傷夾外感也衝陽脈衝陽脈在足面去指縫陷谷三寸動脈中此陽明胃經之脈動於此夫胃為水穀之本人之所主若胃氣已憊水穀不進穀神以去其脈不動而死也故傷寒疹衝陽者以察胃氣之有無也仲景又謂之跌陽脈太溪脈太溪脈在足內踝後陷中動脈是也此少隂腎經脈動於此蓋腎者乃人身之命蒂真氣之所主然其脈動而不息者真氣在也若真氣以憊腎氣以絶其脈不動而死雖衝陽有脈而少能進食者亦主死也結脈結者間至而動緩而一止復來者曰結此隂盛之脈凡傷寒脈結代心動悸者炙甘草湯若脈結足冷腹中痛陽氣以微者大建中湯若雜病之脈結者主有老痰食積死血在內為之可治若內無宿積其脈結者此為不相應病發多難治也促脈促者間至而動數而一止復來曰促此陽盛之脈凡熱極發班發喘等證皆脈促也雜病則多因怒氣傷肝與夫畜血在於上焦者皆脈促也大抵促脈漸退則生漸加則死矣代脈代者止也動而歇至不能自還曰代乃真氣以憊不可治若結而代者可治非結而獨代者為不可治也或問近世多用藿香正氣散傷寒可用否然此方宋時所制治內傷脾胃外感寒邪增寒拘急頭痛嘔逆胸中滿悶與夫傷食傷冷傷濕中暑霍亂山嵐瘴氣不伏水土寒熱作瘧並宜增損用之乃良方也非正傷寒之藥若病在太陽經頭疼發熱骨節疼痛者此方全無相干如妄用之先虗正氣逆其經絡雖出汗亦不解此乃無益而反有害往往誤用之遂至變逆危殆而不救良可悲夫凡傷寒發熱脈沉與元氣虗人并夾隂傷寒發熱者皆不可用切宜戒之或問局方十神湯傷寒發散可用否然此湯用升麻葛根能解利陽明經瘟疫時氣發散之藥也蓋非正傷寒之藥若太陽經傷寒發熱用之則引邪入陽明經傳變發斑不可勝言也易老云太陽病服葛根是引賊破家也要當辨而用之或問小柴胡湯近世治傷寒發熱不分隂陽而用之何也然柴胡之苦平乃足少陽經傷寒發熱之藥解半表半裏之熱除往來寒熱小有日晡潮熱也佐以黃芩之苦寒以退熱半夏生薑之辛以散寒人參大棗之甘溫以助正氣解渴生津液則隂陽和而邪熱解矣但太陽經之表熱陽明經之標熱皆不能解之也如誤用不無害乎若夾隂傷寒面赤發熱脈沉足冷者服之立至危殆可不慎哉及內虗有寒大便不實脈息小弱及婦人新産發熱皆不可用之也或問大青龍湯仲景治傷寒發熱惡寒煩躁者服之可用否夫傷寒邪熱在表不得汗出其人則躁亂不安身心無如奈何如脈浮緊或浮數者急用此湯發汗則愈乃仲景之妙法也譬若亢熱已極一雨而涼其理可見也若不曉此理見其躁熱投以寒涼之藥為害豈勝言哉若脈不浮緊數無惡風惡寒身疼者亦不可用之也如誤用其害亦不淺也所以脈證之不明者多不敢用或問隂證傷寒用附子湯冷服何也蓋隂極於下陽浮在上之治法也余曽治一人傷寒十餘日脈息沉細手溫而足冷大便不通面赤嘔煩渴藥不能下惟喜涼水二三口或西瓜一二塊食下良久而復吐出此隂寒於內逼其浮陽失守之火聚於胸中上沖咽嗌故為面赤嘔煩也遂用附子一箇以生薑自然汁和白麵包裹煨熟去麵取附子去皮臍切作八片又以人參三錢乾薑炮二錢水二鍾煎取一鍾浸於冷水中待藥冷與之即愈此良法也或問三陽知可解者何以辨之曰太陽知可解者頭不痛項不強肢節不痛知表已解也陽明知可解者無發熱無惡寒無口渴不便難知裏已解也少陽知可解者寒熱移其時早移於晚氣移於血晚移於早血移於氣是邪無可容之地知可解也如寒熱日作不移其時是邪未退也或問太陽禁忌不可犯者何也曰小便不利利之是犯本犯本則邪熱入裏不能解此犯之輕也大便不利不可利利之是動血動血是犯禁此犯之重也或問治病必求標本治何標本耶曰假令太陽證傷寒自外入標本有二説以主言之膀胱為本經絡為標以客邪言之先得者為本後得者為標此標先受之即是本也後入于膀胱本却為標也此乃客邪之標本治當從客之標本如麻黃桂枝治其標羌活藳本治其本也或問陽明證禁忌不可犯者何也曰不當發汗不當利小便犯之竭其津液則生蓄血證唯當益津液為上以其火就燥也益津液者連鬚蔥白是也或問半表半裏有幾曰邪在榮衛之間謂之半表半裏太陽陽明之間少陽居身之半表裏五苓散分隂陽膀胱經之半表裏理中湯治吐㵼上下之半表裏或問傷寒惡寒傷風惡風理之昭然不可易也緣麻黃湯下止言惡風桂枝湯下反言惡寒者何也曰仲景言傷寒惡寒傷風惡風言之常也桂枝治傷風麻黃治傷寒一定理也今桂枝湯下反言惡寒麻黃湯下止言惡風言之變也然惡寒者必惡風惡風者未必不惡寒也或問傷風汗自出桂枝湯以散其邪傷寒無汗麻黃湯以發其汗又言表證未解者用桂枝湯理似相反耶曰傷風汗出腠理自開傷寒已汗後腠理既開故並用桂枝湯以解肌可謂宜矣或問病有身重不能轉側者有身疼不能轉側者何也曰身重不能轉側者下後血虗津液不榮於外也身疼不能轉側者風濕相摶於經而裏無邪也經曰傷寒八九日風濕相摶身體煩疼不能轉側不嘔不渴脈浮虗而澀者桂枝附子湯主之又曰傷寒八九日下之後胸滿煩驚小便不利讝語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之二者頗類皆係不能轉側但有差殊耳或問發熱惡寒發於陽無熱惡寒發於隂且如傷寒或發熱或未發熱必惡寒體痛二説皆曰惡寒如何辨之曰傷寒或發熱或未發熱必惡寒體痛嘔逆頭痛項強脈浮緊此在陽可發汗若隂證則無頭疼無項強但惡寒而倦脈沉細此在隂可溫裏也或問傷風自汗與中暍自汗皆相似傷寒無汗與冬溫無汗皆相類敢問如何不同曰傷風不渴中暍即渴傷寒脈浮緊冬溫脈不浮也或問經言用藥有言可與某湯或言不可與又有言宜某湯及某湯主之凡此數節旨意不同敢問曰傷寒論中一字不苟觀是書片言隻字之間當求古人之用意處輕重是非得其至理而後始可言醫矣所問有言可與某湯或言不可與者此設法禦病也又言宜某湯者此臨證審決也言某湯主之者乃對病施藥也此三者即方法之條目也或問時人言下不厭遲汗不厭早斯言若何曰凡汗證固宜早仲景謂不避晨夜者此也夫下證須從宜定奪當急則急當緩則緩安可一槩而論假如陽明病已有可下之理但合面赤其在後之熱尤未斂又如嘔多雖有陽明證謂熱在上焦未全入府皆言不可攻凡此之類固宜遲也或問傷寒論中有證同而藥異有藥同而證異皆非愚陋之可知也且如小青龍與小柴胡證皆治嘔而發熱表裏之病大槩倣佛何故二方用藥之不同誠為可疑也曰治病之要當究病源夫傷寒表不解裏熱未甚而渴欲飲水飲不能多不當與之以腹中熱尚少而不解消水飲停蓄故作諸證然水寒作病非溫熱不能解故用小青龍湯發汗散水其水氣內漬則所摶不一故有或為之病因隨證增損以解化之原其理初無裏證自水寒以然也其小柴胡證係傷寒發熱之邪傳裏在乎半裏間熱氣內盛故生或為諸證緣二證雖曰表裏俱病其中寒熱不同故用藥有薑桂柴芩之異苟能循理以推之其事之異同自然明矣更復何疑或問煩躁不得眠與虗不得眠皆汗下後之餘證夫煩躁以理言則為熱也虗煩者既言虗字非實熱也何故煩躁反與薑附湯虗煩仍用梔子䜴湯二藥天壤之隔其理何如曰煩躁本為熱分晝夜則知陽虗虗煩不得眠無間斷故為裏熱經曰下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈沉微身無大熱乾薑附子湯退隂復陽其虗煩不得眠若劇者必反覆顛倒心中懊憹梔子䜴湯以吐胸中之邪雖曰二證俱煩而不得眠却有寒熱之異故不同然或問經言脈浮而緊法當身痛宜用汗解之又曰發汗後身疼痛脈沉遲新加湯主之夫身疼痛皆係表邪不盡固宜汗解何故復加人參生薑芍藥以益血也曰表邪盛則身疼血虗則身亦痛其脈浮緊者邪盛也其脈沉遲者血虗也盛者宜損之則安虗者宜益之則愈或問經言服桂枝湯或下之仍頭項強翕翕發熱無汗心下滿微痛小便不利者桂枝去桂加茯苓白术湯主之夫頭項強痛為邪氣仍在表也雖經汗下而未解猶宜解之何故去桂加茯苓白术是無意於解表也曰此非桂枝證乃屬飲家也夫頭項強痛既經汗下而不解心下滿而微痛小便不利此為水飲內蓄邪不在表故云去桂枝加茯苓白术若得小便利水消腹滿減而熱自除則頭項強痛悉愈矣或問經言結胸證其脈浮大者不可下下之則死既不可下復作何術以治之曰夫陽沉浮關沉乃結胸不可下之脈浮大心下雖結其表邪尚多未全結也若輒下之重虗其裏外邪復聚而必死矣仲景言此為針戒使無踵其弊也其脈既不可攻當以俟其變而待其實假如小結胸證其脈浮滑按之則痛故知邪非深結亦不敢下無過解除心下之熱耳或問病方入胃何為不傳曰經言陽明居中土萬物所歸無所復傳注曰胃為水榖之海主養四旁四旁有病皆能傳之於胃入胃則更不復傳如太陽傳之入胃則更不傳陽明陽明傳之入胃則更不傳少陽少陽傳之入胃則更不傳三隂已上所言入胃不傳之理乃聖賢之至論也或問經言病人無表裏證發熱七八日雖脈浮數者可下之緣攻下之法須外無表邪裏有下證庶幾可攻今言無表裏證况脈更浮數何故言可下之然此證此理非僕所知敢問曰此非外感乃內傷也若外不惡寒裏無讝語七八日消爍津液乃陽盛隂虗之時苟不攻之其熱不已而變生焉故云脈雖浮數可下之言不待脈浮而數浮則傷胃數則動脾此非本病特醫之所為也仲景之意不外是矣凡傷寒當下之證皆從太陽陽明可下之邪而入於府也故下之今不言陽明病而止云病人無表裏證此非自表之裏而病也但為可下故編于陽明篇中此章之理非初學所能備悉其意也或問六經傷寒惟少隂與厥隂有不治之證以二經較之少隂死證尤多未審其理何如曰少隂者腎也位居子正而一陽生於其中是為復卦乃天地之根宰輔之職周旋運用承上使下一動一靜莫非腎之功也病至其經已至危殆隂陽兩全雖危弗咎蓋無陽而隂獨居故言其死然子中之陽氣微弱凡病則易為消減其言死多於厥隂也赤水元珠卷十九
