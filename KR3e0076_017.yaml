body:
  text: 赤水元珠卷十七明孫一奎撰熱論黃帝問曰今夫熱病者皆傷寒之類也或愈或死其死皆以六七日之間其愈皆以十日以上者何也不知其解願聞其故岐伯曰巨陽者諸陽之屬也其脉連於風府故為諸陽主氣也人之傷於寒也則為病熱熱雖甚不死其兩感于寒而病者必不免于死帝曰願聞其狀岐伯曰傷寒一日巨陽受之故頭項痛腰脊强二日陽明受之陽明主肉其脉俠鼻絡于目故身熱目疼而鼻乾不得卧也三日少陽受之少陽主膽其脉循脅絡于耳故胸脅痛而耳聾三陽經絡皆受其病而未入於臟者故可汗而已四日太陰受之太陰脉布胃中絡於嗌故腹滿而嗌乾五日少陰受之少陰脉貫腎絡于肺繫舌本故口燥舌乾而渴六日厥陰受之厥陰脉循陰器而絡于肝故煩滿而囊縮三陰三陽五臟六腑皆受病榮衛不行五臟不通則死矣其不兩感于寒者七日巨陽病衰頭痛少愈八日陽明病衰身熱少愈九日少陽病衰耳聾微聞十日太陰病衰腹減如故則思食十一日少陰病衰渴止不滿舌乾已而嚏十二日厥陰病衰囊縱小腹微下大氣皆去病日已矣帝曰治之奈何岐伯曰治之各通其臟脉病日衰已矣其未滿三日可汗而已其滿三日可泄而已帝曰熱病已愈時有所遺者何也岐伯曰諸遺者熱甚而强食之故有所遺也若此者皆病已衰而熱有所藏因其穀氣相薄兩熱相合故有所遺也帝曰善治遺奈何岐伯曰視其虛實調其逆從可使必已帝曰病熱當何禁之岐伯曰病熱少愈食肉則復多食則遺此其禁也帝曰其病兩感于寒者其脉應與其病形何如岐伯曰兩感于寒者病一日則巨陽與少陰俱病則頭痛口乾而煩滿二日則陽明與太陰俱病則腹滿身熱不欲食讝言三日則少陽與厥陰俱病則耳聾囊縮而厥水漿不入不知人三日死帝曰五臟已傷六腑不通榮衛不行如是之後三日乃死何也岐伯曰陽明者十二經脉之長也其血氣盛故不知人三日其氣乃盡故死矣凡病傷寒而成瘟者先夏至乃病溫後夏至日為病暑暑當與汗皆出勿止仲景傷寒例陰陽大論云春氣溫和夏氣暑熱秋氣清涼冬氣冷冽此則四時正氣之序也冬時嚴寒萬類深藏君子固密則不傷于寒觸冒之者乃名傷寒耳其傷於四時之氣者皆能為病以傷寒為毒者以其最成殺厲之氣也中而即病者名曰傷寒不即病者寒毒藏于肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也是以辛苦之人春夏多溫熱病皆由冬時觸寒所致非時行之氣也凡時行者春時變暖而復大寒夏時應大熱而反大涼秋時應涼而反大熱冬時應寒而反大溫此非其時而有其氣是以一嵗之中長幼之病多相似者此其時行之氣也夫欲候知四時正氣為病及時行疫氣之法皆當按斗厯占之九月霜降節後宜漸寒向冬大寒至正月雨水節後宜解也所以謂之雨水者以氷雪解而為雨水故也至驚蟄二月節後氣漸和暖向夏大熱至秋便涼從霜降以後至春分以前凡有觸冒霜露體中寒即病者謂之傷寒也其冬有非節之暖者名曰冬溫冬溫之毒與傷寒大異冬溫復有先後更相重沓亦有輕重為治不同證如後章從立春節後其中無暴大寒又不氷雪而有人壯熱為病者此屬春時陽氣發於冬時伏寒變為溫病成云此為溫病也內經曰冬傷于寒春必病溫從春分以後至秋分節前天有暴寒者皆為時行寒疫也三月四月或有暴寒其時陽氣尚弱為寒所折病熱猶輕五月六月陽氣已盛為寒所折病熱則重七月八月陽氣已衰為寒所折病熱亦微其病與溫及暑病相似但治有殊耳中云此時天令漸熱一時不正之寒感之包時令熱氣在內故發為疫病非冬傷寒之謂也故成云此疫氣也十五日得一氣於四時之中一時有六氣四六名為二十四氣成云節氣十二中氣十二共二十四內經曰五日謂之候三候謂之氣六氣謂之時四時謂之嵗中云節氣者如立春正月節之類也中氣者如雨水正月中之類也然氣候亦有應至而不至或有未應至而至者或有至而不去者或有至而太過者皆成病氣也金匱要略曰冬至之後甲子夜半少陽起少陰之時陽始生天得溫和以未得甲子天因溫和此為未至而至也以得甲子而天未溫和此為至而不至也以得甲子天大寒不解此為至而不去也以得甲子而天溫如盛夏五六月時此為至而太過也內經曰至而和則平至而甚則病至而反者病至而不至者病未至而至者病中云非特冬為然餘三時亦當以此法觀之但冬甲子尤一嵗氣運所關耳但天地動靜陰陽鼓擊者各正一氣耳成云天地之氣鼓擊而生春夏秋冬寒熱溫涼各正一氣也是以彼春之暖為夏之暑彼秋之忿為冬之怒成云春暖為夏暑從生而至長也秋忿為冬怒從肅而至殺也是故冬至之後一陽爻升一陰爻降也夏至之後一陽氣下一陰氣上也斯則冬夏二至陰陽合也春秋二分陰陽離也陰陽交易人變病焉此君子春夏養陽秋冬養陰順天地之剛柔也小人觸冒必攖暴疹須知毒烈之氣留在何經而發何病詳而取之是以春傷於風夏必餐泄夏傷於暑秋必病瘧秋傷於濕冬必咳嗽冬傷于寒春必病溫此必然之道可不審明之成云當春之時風氣大行春傷于風風氣通於肝肝以春適王風雖入之不能即發至夏肝衰然後始動風淫末疾則當發於四肢夏以陽氣外盛風不能外發故攻內而為飱泄飱泄者下利米榖不化而色黃當秋之時濕氣大行秋傷於濕濕則干於肺肺以秋適王濕雖入之不能即發至冬肺衰然後濕始動也雨淫腹疾則當發為下利冬以陽氣固濕氣不能下行故上逆而為咳嗽當夏之時暑氣大行夏傷于暑夏以陰主內暑雖入之勢未能動及秋陰出而陽為內主然後暑動𫝊陰而為痎瘧痎者二日一發瘧者一日一發當冬之時寒氣大行冬傷于寒冬以陽為主內寒雖入之勢未能動及春陽出而陰為內主然後寒動𫝊陽而為溫病是感冒四時正氣為病必然之道陶節庵辨仲景傷寒論客有過豫而問之曰甚矣傷寒之藴奧桂枝麻黃二湯之難用也服之而愈者才一二不愈而變重者嘗八九仲景立法之大賢也何其方之難慿有如此哉今人畏而不用以參蘇飲和解散等平和之劑代之然亦未見其妙也子盍與我言之答曰吁難言也請以經語證之經曰冬氣嚴寒萬類潜藏君子固密則不傷於寒觸冒之者乃名傷寒耳其傷於四時皆能為病以傷寒為毒者以其最成殺厲之氣也中而即病名曰傷寒不即病者其寒毒藏于肌膚至春變為溫病至夏變為暑病暑病者熱極重於溫也以此言之傷寒者乃冬時感寒即病之名桂枝麻黃二湯為當時之傷寒設與過時之溫暑有何預焉夫受病之源則同亦可均謂之傷寒所發之時既異治之則不可混也請略陳之夫春溫夏熱秋涼冬寒者四時之正氣也以成生長收藏之用風亦因四時之氣成溫涼寒熱也若氣候嚴寒風亦凜冽天道和煦風亦溫暖冬時坎水用事天令閉藏水氷地凍風與寒相因而成殺厲之氣人觸冒之腠理鬱塞乃有惡風惡寒之證其餘月時則無此證也仲景固知傷寒乃冬時殺厲之氣所成非比他病可緩故其言特詳於此書而略于雜病也倘能因名以求其實則思過半矣不幸此書𫝊世久逺遺帖頗多晉太醫令王叔和得散亡之餘注次流𫝊其功博矣惜乎以已論混經未免穿鑿附㑹成無已氏因之順文注釋並無闕疑正誤之言以致將冬時傷寒之方通解溫暑遺禍至今而未已也溫暑必别有方今皆失而無徵也我朝宋景濓學士嘗嘆傷寒非全書得其㫖哉蓋傷寒之初中人必先入表表者何即足太陽寒水之經此經行身之後自頭貫脊乃有頭疼脊强惡寒之證在他經則無此證矣況此經乃一身之綱維為諸陽之主氣猶四通八達之衢治之一差其變不可勝言者矣故宜此二湯發散表中寒邪經曰辛甘發散為陽者是也若以此湯通治春溫夏熱之病則誤之甚矣曰傷寒發于冬時已聞命矣邪之在表為太陽經也一經而有二藥之分又何耶曰在經雖一然則有榮衛之别焉寒則傷榮證乃惡寒發熱無汗脉浮緊為傷寒有寒則見無寒則不見也當用麻黃湯輕揚之劑發而去之寒邪退汗出表和而愈矣曰緊脉固為寒矣脉之緩者亦用桂枝湯又何耶曰風則傷衛衛傷則自汗緣太陽受風不能衛護腠理䟱而汗泄所以脉見浮緩也脉雖浮緩其受寒則一故亦宜桂枝辛溫之藥解散寒邪腠理閉而汗止表和而愈又有榮衛俱傷者二湯又難用也故復設大青龍湯然此藥難用非庸俗得而識也曰溫暑既無方法治之則將奈何脉證與傷寒有何分别曰溫暑雖亦冬時感受風寒而不即散在人身中伏藏歷過二三時之久天道大變寒化為熱人在氣交之中亦隨天地之氣而化觀仲景以即病之傷寒與傷暑時令為病之名豈無異哉治之之方亦必隨時以辛涼苦矣安得槩用冬時治寒之方乎今無其方者蓋散亡之也經既稱變為溫變為熱則已改易冬時之寒為溫熱矣方亦不容不隨時改更也夫溫病欲出值天時和煦自內達表脉反見于右關不浮緊而微數曰惡寒否乎曰傷寒自冬月風寒而成外則有惡風惡寒之證既名為溫則無此症矣曰然則子之言有所據乎曰據乎經耳經曰太陽病發熱不惡寒而渴者溫病也不惡寒則病非因外來渴則明其自內達表曰春夏之病亦有頭疼惡寒脉浮緊者何也曰此非冬時所受之寒乃冒非時暴寒之氣耳或溫暑將發又受暴寒雖有脉浮之證未若冬時之甚也宜辛涼之藥通其內熱而解之斷不可用桂枝等劑矣曰溫熱與傷寒治之不同也已聞命矣敢問傷寒之在三陽則為邪熱既𫝊三陰則為陰證矣以熱治固其宜也三隂篇以四逆散涼藥以治四逆大承氣湯以治少陰其故又何耶嗚呼此蓋叔和以殘闕之經作全書銓次將𫝊經陰證混同立論所以遺禍至今而未已也姑略陳之蓋風寒之初中人無常或入于陰或入于陽皆無定體非但始太陽終厥陰或自太陽始曰𫝊一經六日至厥陰邪氣衰不𫝊而愈者亦有不罷再𫝊者或有間經而𫝊者或有𫝊至二三經而止者或有始終只在一經者或有越經而𫝊者或有初入太陽不作鬱熱便入少陰而成真陰證者或有直中陰經而成寒證者緣經無明文後人有妄治之失若夫自三陽𫝊次三陰之陰證外雖有厥逆內則熱邪耳若不發熱四肢便厥冷而惡寒者此則直中陰經之寒證也自前人立說之差使後人䝉害者多矣太陽受邪行盡三陽氣分𫝊次三陰之血分則熱入深矣熱入既深表雖厥冷真熱邪也經曰亢則害承乃制熱極反兼寒化也若先熱後厥逆者𫝊經之陰證也經云厥深熱亦深厥微熱亦微是也故宜四逆散承氣湯看微甚而治之如其初病便厥但寒無熱此則直中陰之寒證也急宜四逆輩以溫之經曰發熱惡寒發于陽也無熱惡寒發于陰也尚何疑哉又有日𫝊二經為兩感者𫝊經未終而斃矣病有標本治有逆從豈可槩論之乎曰陰證之不同已聞命矣嘗讀劉守真書云傷寒無陰證人傷於寒則為熱病熱病乃汗病也造化汗液皆陽氣也遍考內經靈樞諸篇並無寒證陰證乃雜病也叔和誤入之耳守真高明之士亦私淑仲景者而議論之異者何耶曰雖守真之明達蓋亦因傷寒論以桂枝麻黃通治溫暑之誤而有是說故叮嚀云天道溫熱之時用桂枝湯必加冷藥於其中免致黃生斑出之患若知此湯自與冬時即病之傷寒設不與過時之溫暑設則無此論矣觀其晚年悟道著病機氣宜保命集其中羌活湯辛涼之藥以治非時傷寒其妙如神足可補仲景之遺㫖何其高哉夫內經言傷寒即為熱病而無寒者語其常也仲景之論有寒有熱者語其變也合常與變而無遺者也所謂道並行而不相悖而反相為用也此其所以為醫家萬世之準繩標的也歟王執中曰傷寒雖是一病然所感不同而證亦懸絶有冬傷于風寒即時便發名曰正傷寒者有至春變為溫病至夏變為熱病名曰伏熱病傷寒者有雖伏病在身至春夏亦未發偶因暴感風寒或色欲不謹或飲食不節觸動而發者亦曰伏熱病傷寒有冬月飲食不節誤傷冷物而發者亦名冬月正傷寒此其所感之不同也若夫春夏秋本無伏病在身而偶感風寒謂之四時傷寒即雜病也非仲景節菴之所謂傷寒也故用參蘇飲藿香正氣散等藥與仲景節菴傷寒門藥大異至於所見之證則又不同有頭痛項强腰脊痛惡寒發熱者有滿身骨節痛有不頭疼不項强無腰脊痛寒熱骨節痛俱無者有頭不疼而即腰脊痛惡寒發熱骨節疼者有只頭疼而諸證俱無者有只腰脊痛而諸證俱無者有只惡寒發熱而諸證俱無者有只骨節痛而諸證俱無者有寒熱交爭狀似􅒻疾者有協熱利下利清水狀似痢疾者有白㵼腹痛狀似水㵼者有既吐且利揮癨撩亂名曰霍亂者有傷在一經以次𫝊遍者有始終只在一經者有越一經而𫝊者有越兩經三經而𫝊者有𫝊一二經而止者有𫝊變六經而再𫝊者有從陽經𫝊入陽明腑中者有從陰經𫝊入陽明腑中有不從六經𫝊來直中陽腑者此其症之不同也至於用藥一差則壞症百出莫測端倪不可言紀曰衄血曰吐血曰便血曰發斑曰發黃曰發狂曰如狂曰腹痛曰讝語曰鄭聲曰噦曰嘔曰吐曰㵼曰利曰小水不利曰大便自利曰除中曰不寐曰自汗曰盜汗曰手足汗曰頭汗曰陰結曰陽結曰能食曰不能食曰狐惑曰脾約曰吐蛔曰陰陽易曰勞復曰食復曰尋衣摸牀曰撮空曰動氣曰奔豚曰肉苛曰舌卷囊縮不能枚舉此其壞之不同也然非愚之臆說仲景先師分為太陽等篇每條開示某經某症某脉了了明白東垣先師撮其大綱究其𤣥㫖陶莭菴先師又著家祕瑣言别門分類便覽初學今具在十二卷中醫家檢之洞然自悉何至妄投藥劑乃有殺人之慘也傷寒至捷法發熱惡寒身體痛脉浮無汗怎生醫十神湯與香蘇散有汗傷風用桂枝四五日來口舌乾發熱身疼卧不安先服人參敗毒散小柴胡湯在後畨七八日來熱在內口渴心煩腹脹彚小便赤少大便難大柴胡湯好通利發熱口乾大便㵼小便赤少煩燥結小柴胡湯兼五苓加上黃連真一絶汗下之後病不解依然熱渴如見怪解毒湯兼小柴胡諸般熱病皆無礙十勸歌彭用光一傷寒頭痛及身熱便是陽證不可服熱藥傷寒𫝊三陰三陽共六經內太陰病頭不痛身不熱少陰病有反熱而無頭疼厥陰病有頭疼而無發熱故知頭疼身熱即是陽證若妄投熱藥決致死亡二傷寒必須直攻毒氣不可補益邪氣在經絡中若隨證早攻之只三四日痊安若妄謂先須正氣却行補益使毒氣流熾多致殺人三傷寒不思飲食不可服溫脾胃藥且傷寒不思飲食自是常事終無餓死之理如理中丸之類不可輕服若陽病服之致熱氣增重或至不救丁香巴豆之類猶不可服四傷寒腹疼亦有熱證不可輕服溫暖藥難經云疼為實故仲景論腹滿時痛之證有曰疼甚者加大黃疼甚而加大黃意可見也惟身冷厥逆而腹疼者方是陰證須消息之每見腹疼便投熱藥多致殺人五傷寒自利當看陰陽證不可例服補藥止㵼藥自利惟身不熱手足溫者屬太陰身冷四逆者屬少陰厥陰其餘身熱下利皆屬陽當隨證依仲景法治之每見下利使投暖藥及止㵼藥者致多死亡六傷寒胸脅疼及腹脹滿不可妄用艾灸常見村落間有此證無藥便用艾灸多致毒氣隨火而盛膨脹發喘以不知胸脅疼自屬少陽腹脹雖屬太陰仲景以為當下之病此外惟陰證脉微弱可灸七傷寒手足厥冷當看陰陽不可例作陰證有陰厥有陽厥醫者少能分辨陽厥而投熱藥殺人速於用刃蓋陽病不至極熱不能發厥仲景所謂熱深厥亦深熱深更與熱藥寧復得生而身熱至三四日後熱氣已深大便祕小便赤或譫言昏憒及别熱證而發厥必是陽厥宜急用承氣湯以下之若初得病身不熱大便不祕自引衣蓋身或下利或小便數不見熱證而厥者即是陰厥方可用四逆湯之類二厥所以使人疑者緣為其脉皆沉然陽厥脉沉而滑數陰厥脉沉而弱又陽厥時復指瓜却溫或有時發熱陰厥則常冷此為可别八傷寒病已在裏即不可用藥發汗然傷寒證須看表裏如發熱惡寒則是在表正宜發汗如不惡寒反惡熱即是裏證若一例發汗則真氣已涸死者必矣又别有半在表半在裏之證不惟皆不可下亦皆不可汗但隨證治之九傷寒飲水為欲愈不可令病人恣飲過度病人大渴當與之水以消熱故仲景以飲水為欲愈人見此說遂令病者縱飲因而為嘔為喘為咳逆為下利為腫為悸為痞為結胸小便下利者多矣且如病人欲飲一碗只可與半碗常令不足為善十傷寒病初安不可過飽及勞動或食羊肉行房及食諸肉骨汁并飲酒如病方愈不須再服藥兼脾胃尚弱食飽不能消化病即再來謂之食復病方好氣血尚虛勞動大早病即再來謂之勞復又食羊肉行房並死食諸肉骨汁并飲酒再病必重右傷寒十勸誠可為病家醫家之便益治法也治傷寒看證法則陶莭庵凡看傷寒先觀兩目或赤或黃陽毒六脉洪大有力燥渴者輕則三黃石膏湯重則大承氣黃為疸證如小水不利或赤兼小腹脹滿不痛渴而大便實脉來沉實有力者為濕熱發黃輕則茵陳五苓散重則茵陳湯分利小水清白為愈黃自退矣劫法開在殺車槌方前次看口舌有無胎狀如見滑白色者邪未入腑屬半表半裏證宜小柴和解舌上黃胎者胃腑有邪熱也宜下之調胃承氣湯大便燥實脉沉有力而大渴者方可下便不實脉不沉微渴者未可下猶宜小柴胡湯舌上黑胎生芒刺者是腎水尅于心火十有九死急用大承氣下之無疑矣此邪熱已極也劫法開在殺車槌方前已後以手按其心胸至小腹有無痛處若按之當心下鞭痛手不可近燥渴讝語大便實脈來沉實有力為結胸證急用大陷胸湯加枳桔下之量元氣虛實宜從緩治若按心胸雖滿悶不痛尚為在表未入乎腑乃邪氣填乎胸中只消小柴胡枳桔以治其悶如未效本方對小陷胸一服如神若按之當心下脹滿而不通者宜㵼心湯加枳梗是痞滿也以手按之小腹若痛而小水自來利大便黑兼或身黃讝妄燥渴脈沉實者為畜血桃仁承氣下盡黑物則愈若按之小腹脹滿不鞕痛小水不利即溺澀也五苓散加木通山梔利之不可大利恐耗竭津液也若按其小腹繞臍鞕痛渴而小水短赤大便實者有燥屎也大承氣下之劫法備開殺車槌方前再後問其大小便通利若何有何痛處及服過何藥方知端的務使一一明白證脈相對庶得下藥不差凡看傷寒若見吐蛔者雖有大熱忌下涼藥犯之必死蓋胃中有寒則蛔上膈大凶之兆人皆未知急用炮乾薑理中湯一服加烏梅二箇花椒十粒服後待蛔定却以小柴胡退熱蓋蛔聞酸則靜見苦則安矣凡治傷寒若煩渴欲飲水者因內水消竭欲得外水自救大渴欲飲一升止可與一杯常令不足不可太過若恣飲過量使水停心下則為水結胸等證射于肺為喘為咳留於胃為噎為噦溢於皮膚為腫畜于下焦為癃滲於腸間則為利下皆飲水多之過也又不可不與又不可强與經云若還不飲非其治强飲須教别病生正此謂也凡治傷寒若經十餘日已上尚有表證宜汗者與羌活冲和湯微汗之十餘日若有裏證宜下者可與大柴胡湯下之蓋傷寒過經正氣多虛恐麻黃承氣太峻誤用麻黃令人亡陽誤用承氣令人不禁故有此戒若表證尚未除而裏證又急不得不下者只得以大柴胡通表裏而緩治之又老弱及血氣兩虛之人有下證者亦用大柴胡下之不傷元氣如其年壯力盛者不在禁例從病制宜凡治傷寒尺脈弱而無力者切忌汗下寸脈弱而無力者切忌發吐俱宜小柴胡和之凡治傷寒若汗下後不可便用參耆大補宜用小柴胡加減和之若大補使邪氣得補而熱愈盛復變生他證矣所謂治傷寒無補法也如曾經汗下後果是虛弱之甚脈見無力者方可用甘溫之劑補之此為良法其勞力感寒之證不在禁補之例看消息用之凡治傷暑與傷寒俱有熱若誤治之害矣傷寒則外惡寒而脈浮緊傷暑則不惡寒而脉虛此為不同治經云脈盛身寒得之傷寒脈虛身熱得之傷暑治宜小柴胡湯加石膏知母或人參白虎湯天久淫雨濕令併行蒼术白虎湯若元氣素弱而傷重者用清暑益氣湯治之中云治暑不宜輕用小柴胡夾暴感風寒者或可用一二劑蓋傷暑非傷寒至夏變熱病之暑病也辨表裏中三證王好古假令少陽證頭痛往來寒熱脈浮弦此三症但有一者是為表也口失滋味腹中不和大小便或閉而不通或泄而不調但有一者是為裏也如無上下表裏餘症者皆虛熱也是在其中矣辨陰陽二證王好古陰證身靜重語無聲氣難布息目睛不了了鼻中呼不出吸不入往來口與鼻中氣冷水漿不入大小便不禁面上惡寒有如刀刮身表涼知在陰經也名曰陰證陽證身動輕語有聲目睛了了鼻中呼吸出入能往而能來口與鼻中氣皆然身表熱知在陽經也名曰陽證太陽六𫝊王好古太陽者乃巨陽也為諸陽之首膀胱經病若渴者自入于本也名曰𫝊本太陽𫝊陽明胃土者名曰巡經𫝊為發汗不徹利小便餘邪不盡透入于裏也太陽𫝊少陽膽木者名曰越經𫝊為原受病脉浮無汗當用麻黃而不用之故也太陽𫝊少陰腎水者名曰表𫝊裏為得病急當發汗而反下汗不發所以𫝊也太陽𫝊太陰脾土者名誤下𫝊為原受病脉緩有汗當用桂枝而反下之所致也當時腹痛四肢沉重太陽𫝊厥陰肝木者為三陰不至于首惟厥陰與督脉上行與太陽相接名曰巡經得度𫝊太陽證太陽證頭痛發熱自汗惡風脉當緩而反緊傷風得傷寒脈也太陽證頭痛發熱無汗惡寒脈當緊而反緩傷寒得傷風脈也王執中云冬月此二證用九味羌活湯不應仍用桂枝麻黃各半湯蓋穩於大青龍也二證脈不同本經大青龍湯主之易老初用桂枝麻黃各半湯後用大青龍湯以其有厥逆筋惕肉瞤及亡陽之失也易老後又改為九味羌活湯而不用桂枝麻黃也太陽證發熱惡寒自汗脉緩太陽證發熱惡風無汗脉緩此二證易老原將麻黃一桂枝二為治後復改用羌活湯太陽頭痛太陽膀胱脉浮緊直至寸口所以頭痛者頭與寸口俱髙之分也兼厥陰與督脉㑹於巔逆太陽之經上而不能得下故壅滯為頭痛於上也左手浮弦胸中痛也沉弦背俞痛右手浮弦者亦然頭痛者木也最高之分惟風可到風則溫也治以辛涼秋尅春之意故頭痛皆以風藥治之者總其體之常也然各有三陰三陽之異焉故太陽則宜川芎陽明則宜白芷少陽則宜柴胡太陰則宜蒼术少陰則宜細辛厥陰則宜吳茱茰也王執中曰此即論風而不及寒者風亦寒氣所化初從下起後從上來風與寒本相因但感之不同耳故治傷寒者初分有汗無汗到𫝊經後則不分矣由此觀之風藥亦能散寒其理同也治太陽則不可越經王好古假令治太陽陽明不可遺太陽而只用陽明藥餘倣此用三陽經解藥後身畨覆重者若煩則是有陽明也若不煩而畨覆輕者知不𫝊三陰也不𫝊三陰則為解也大抵三陰之體靜重與濕相同傷寒五日後無汗謂穀消水去形亡故下之三日前謂內有水穀故汗之問桂枝湯發汗發汗或云當得汗解或云當發汗更發汗并發汗宜桂枝湯者數方是用桂枝發汗也復云無汗不得服桂枝又曰汗家不得重發汗又曰發汗過多者却用桂枝甘草湯是閉汗也一藥二用如何說得仲景發汗與本草之義合而為一答曰本草云桂枝味辛甘熱無毒能為百藥長通血脉止煩出汗者是調血而汗自出也仲景云臟無他病發熱自汗者此衛氣不和也又云自汗者為榮氣和榮氣和則外不諧衛氣不與榮氣相諧和也榮氣和則愈故皆桂枝湯調和榮衛榮衛既和則汗自出矣風邪由此而解非桂枝能開腠理發出汗也以其固閉榮血衛氣自和邪無容地而出矣其實則閉汗孔也昧者不解閉汗之意凡見病者便用桂枝湯發汗若與中風自汗者合其效桴鼓因見其取效而病愈則曰此桂枝發出汗也遂不問傷寒無汗者亦與桂枝湯誤之甚矣故仲景云無汗不得服桂枝是閉汗孔也又云發汗多又手心悸欲得按者用桂枝甘草湯是亦閉汗孔也又曰汗家不得重發汗若桂枝發汗是重發汗也凡桂枝條下言發字當認作出字是汗自然出也非若麻黃能開腠理而發出汗也本草出汗二字上文有通血脉一句是非三焦衛氣皮毛中藥是為榮血中藥也如是則出汗二字當認作榮衛和自然汗出非桂開腠理而發出汗也故後人用桂治虛汗讀者當逆察其意則可矣噫神農之作於其前仲景之述於其後前聖後聖其揆一也太陽禁忌不可犯小便不利不可使利之利之是謂犯本以是知五苓散不可妄用大便不可易動動之是謂動血此為犯禁表在不可下下之猶犯禁也太陽證亦有當汗不當汗者咽乾淋渴鼻衄小便不利已經發汗不得重發如無已上忌證雖經發汗倘邪氣未盡亦當重發之當汗而不汗生黃其證為風寒所傷陽氣下陷入於內而排寒水上行于經絡之間本當發汗因以徹其邪醫失汗之故生黃也脾主肌肉四肢寒濕與內熱相合而生黃也當汗而發汗過多成痓其證因發汗太過腠理開泄汗漏不止故四肢急難以屈伸不當汗而汗成蓄血蓄血其證燥火也當益津液為上而反汗以亡其津液其毒擾陽之極則慢陰也故燥血而蓄於胸中也血證見血自愈太陽病入膀胱小便利而赤蓄血證也血自下者愈也知可解戰而汗解者太陽也不戰有汗而解者陽明也不戰無汗而解者少陽也若先差經必不爾矣太陽𫝊陽明其中或有下證陽明證反退而熱兼不竭却退顯少陽證是知可解也太陽知可解者頭不痛項不强肢節不痛則知表邪退也陽明知可解者為無發熱惡寒知裏易解也少陽病知可解者寒熱日不移時而作邪未退也若用柴胡而移其時早移之於晏晏移之于早氣移之於血血移之于氣是邪無可容之地知可解也知不可解服解藥而去沉困只頭痛目悶是知濕去而風不去則欲解也若風去而濕不去則不解何以然風則高濕則下而入裏也脈知可解不可解可解之脈浮而虛不可解之脈浮而實浮而虛者只是在表浮而實者知已在裏也汗多不解者轉屬陽明也傷寒不頭痛知邪不在經若頭痛者知邪在經也易老九味羌活湯解利法羌活治太陽肢節痛君主之藥也乃撥亂反正之主故大無不通小無不入關節非此不治也防風治一身盡痛乃軍卒中卑下之職一聽君令而行隨所使引之而至者也蒼术别有雄壯上行之氣能除濕下安太陰使邪氣不𫝊于足太陰脾細辛治少陰腎經頭痛川芎治厥陰頭痛在腦白芷治陽明頭痛在巔生地黃治少陰心熱在內黃芩治太陰肺熱有神甘草能緩裏急調和諸藥已上九味雖為一方然亦不可執執中無權猶執一也當視其經絡前後左右之不同從其多少大小之不一增損用之如神右水煎服若欲急汗當熱服以羹粥投之若緩汗溫服之而不用湯投之也脈浮而不解者先急而後緩脈沉而不解者先緩而後急本湯不獨解利傷寒治雜病亦有神中風行經者加附子中風祕澀者加大黃中風并三氣合而成痺等症各隨十二經上下內外寒熱溫涼四時六氣加減補㵼用之煉蜜作丸猶妙當汗而下之成協熱利當各隨三陽本證表藥發之表解下利自愈若不愈者方可以利藥治之太陽一下有八變太陽病下之其脉促不結胸者此為欲解也脉浮者必結胸脉緊者必咽痛脉弦者必兩脅拘急脉細數者頭痛不止脉緊數者必欲嘔脉沉緩者協熱利脉浮滑者必下血裏𫝊表太陽反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之至於大實痛者胃也桂枝加大黃湯主之已𫝊戊婦告夫也所以為裏𫝊表即名誤下𫝊也三陽三陰辨證用藥治法彭用光太陽無汗麻黃為最太陽有汗桂枝可先小柴胡為少陽之要領大柴胡行陽明之祕堅至三陰則難拘定法或可溫而或可下宜數變以曲全生意或可方而或可圓傷寒表證分别治法以便四時取用傷寒表證是如何左手脉浮緊無汗惡寒身熱多頭項俱疼脉浮取輕手按之脉浮大而緊施方施劑汗之和冬麻黃湯十神湯春夏羌活冲和湯傷寒裏證治法宜次苐傷寒裏證心腹疼邪𫝊入裏脉重取數洪不惡寒而惡熱蒸其脉數沉兼自汗二便祕少下之生輕則大柴胡湯重則三承氣湯選用陽證陽證身熱及頭疼體重咽乾難臥動或有譫語及循衣脉息弦洪宜審用脉洪大有力十神湯大九味羌活湯氶解肌湯第葛根湯柴胡湯三氣湯次選用陰證陰證身涼二便清病初自汗也頭疼也無煩躁也無渴脉息沉微自可明脉沉微無力五積散四逆湯理中湯三建湯陰毒手足甲青至莭三建湯此症極危灸關元氣海丹田臍中陽證似陰陽證身涼冷四肢小便赤少大便稀心煩口燥脉沉數白虎湯兼竹葉竒脉沉數有力竹葉石膏湯三黃解毒湯柴胡五苓陰證似陽陰證如陽面赤紅小便清利大便通渾身微熱沉遲脉真武湯佳兼理中脉沉遲弱五積散中羌附湯附子理湯灸服藥而脉不回宜灸氣海神闕丹田陽厥陽厥時時指爪溫心煩便祕口乾論脉來沉細中還疾承氣柴胡最可吞陰厥陰厥身涼熱不回二便通滑不煩時脉來沉伏知端的三建湯兼四逆宜脉沉微昏憒先以星烏乾姜湯隨用三建湯灸此證倉卒無藥只灸關元氣海丹田妙血發黃發黃恰似烟薰色小便自利大便黑唇焦潄水血家黃桃仁承氣湯堪擇蓄血黃此由脾胃熱甚失于汗下以致之宜抵當湯桃仁承氣選用濕症黃疸發黃渾似橘皮明小便不利大便行濕熱相蒸名曰疸茵陳湯共五苓平蓄熱陰黃頭汗出四肢沉重如瘧俱用茵湯陳湯加五苓兼小柴胡加梔子發斑發狂陽毒發斑是如何梔子大黃黑奴科此症甚危紅赤白易治如黑斑則胃爛難治如陽毒五日內可治六日七日難治人參石膏化斑湯𤣥參升麻石膏湯大青四物湯溫毒葛根橘皮湯黃連橘皮湯調胃承氣湯猪膽雞子湯黑奴丸方治陽毒發斑煩躁大渴倍常時行熱病六七日未得汗脉洪大或數面赤目脹身痛大熱煩躁狂言欲走渴甚又五六日以上不解熱在胸中口噤不能言為壞傷寒醫所不治棄為死人精魂已竭心下才暖撥開其口灌下即活人凡灌藥下咽便能即時蘇醒黃芩芒硝麻黃釡底煤小麥奴灶突墨梁上塵各一兩大黃一兩一錢右為末煉蜜為丸彈子大井水化下即當發寒寒已汗出乃差若時頃不汗再服一丸須見微利若不大渴不可與此藥問兩感邪從何道而入王好古答曰經云兩感者死不治一日太陽與少陰俱病頭痛發熱惡寒口乾煩滿而渴太陽者腑也自背俞而入之人之所共知之少陰者臟也自鼻息而入人所不知也鼻氣通於天故寒邪無形之氣從鼻而入腎為水也水流濕故腎受之經曰傷于濕者下先受之同氣相求耳又云天之邪氣感則害人五臟以是知內外兩感臟府俱病欲表之則有裏欲下之則有表表裏既不能一治故死矣故云兩感者不治然所稟有虛實所感有淺深虛而感之深者必死實而感之淺者猶或可治治之而不救者有矣夫未有不治而獲生者也豫嘗用此間有生者十得二三故立此方以待好生君子用之大羌活湯防風羌活獨活防己黃芩黃連白术蒼术炙甘草細辛各三錢知母川芎地黃各一兩右每服五錢水煎熱服不解再服三四次必解病愈則止若有餘證並依仲景隨經法治之傷寒誤下變有輕重或問曰傷寒雜證一體若誤下之甚者變大答曰非一體也傷寒誤下變無定體雜病誤下變有定體何以然傷寒自外而入陽也陽主動雜病自內而出陰也陰主靜動者犯之其變無窮靜者犯之其變止痞腹脅痛而已故變無窮者為重痞與腹脅痛者為輕也辨內外傷傷風鼻中氣出粗合口不開肺氣通于天也傷食口無味涎不納鼻息氣勻脾氣通于地也外傷一身盡熱先太陽也從外而之內者先無形也內傷手足不和兩脅俱熱先少陽也從內而之外者先有形也內外俱傷人迎氣口俱盛或舉按皆實大表發熱而惡寒腹不和而口液此內外兩傷也凡診則必捫手心手背手心熱則內傷手背熱則外傷次以脉别之冬傷于寒者春必溫病夏為熱病長夏為大熱病蓋因房失勞傷與辛苦之人水虧無以奉春生之令故春陽氣長而為溫病也夏為熱病者是火先動于火未動之時水預虧于已旺之日故邪但藏而不為病也夏令炎蒸其火既旺與前所動者客邪與主氣二火相接所以為熱病也長夏為大熱病者火之方與秋之分皆手經居之水之方與春之分皆足經居之所傷者皆經不足故夏火旺客氣助于手經則不足者愈不足矣故所用之藥皆泄有餘而非足經藥何以然泄有餘則不足者補矣此傷寒本足經只言足經而不言手經也大意如此至于𫝊手經者亦有之當作别論與夫竒經之病亦在其中矣狂言讝語鄭聲辨狂言者大開目與人語語所未嘗見之事即為狂言也讝語者合目自言言所日用常見常行之事即為讝語也鄭聲者聲戰無力不相接續造字出于喉中即鄭聲也陽明症不可犯禁忌不當發汗不當利小便若發汗利小便竭其津液則生蓄血症也惟當益津液為上以其火就燥也益津液者蓮鬚葱白湯是也汗多亡陽下多亡陰小便重利之走氣三者雖異為言少津液則一也汗多亡陽汗者本所以助陽也若陽受陰邪寒結無形須當發去陰邪以復陽氣所謂益陽而除風寒客氣也陰邪已去而復汗之反傷陽經曰重陽必陰故陽氣自亡汗多亡陽此之謂也下多傷陰下者本所以助陰也若陰受陽邪熱結有形須當除去已敗壞者以致新陰此所謂益陰而除火熱邪氣也陽邪已去而復下之反亡陰也經曰重陰必陽故陰氣自亡下多亡陰此之謂也傷寒五臟受病脉證相尅訣心臟心病舌强笑靣赤燥煩掌熱口乾讝臍上動氣洪緊數反得沉微命不全肝臟肝家靣青目痛閉筋急怒容臍左氣脉當弦急或兼長浮澀短兮名不治脾臟脾家不食面皮黃體重肢痛喜卧床動氣當臍脉緩大弦長而緊是凶殃肺臟肺家面白帶憂愁吐血寒溫喘嗽求臍右氣兮沉細澀大而牢者死根由腎臟腎家面黑爪甲青耳閉足寒泄腹疼臍下氣兮脉沉滑緩而大者死之形已上皆受尅之脉為賊邪故凶也赤水元珠卷十七
