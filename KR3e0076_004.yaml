body:
  text: 赤水元珠卷四明孫一奎撰腹痛門附水鳴小腹痛生生子曰腹痛極要體認真切庶投劑有功有寒熱脉沉而遅者寒脉浮而數者熱有虚實脉散大而無力者虚脉弦而有力者實有痰涎脉滑者痰沉弦者飲有積聚脉沉弦而伏者積或伏或弦者聚有䖝痛脉多沉滑或乍大乍有死血脉沉而濇或結或促寒痛者綿綿而痛無增减也以薑桂附子之属温之熱痛者時痛而或時吐也得熱物而痛止者盖辛熱能冲開欝結氣道疎通暫得少愈而隂血日虧燥火愈熾不久復發遷延嵗月此為積熱輕者以山梔黄連白芍香附之類重者調胃承氣湯下之虚痛者以手重按至痛處而止者是也宜参术白芍加温煖藥實痛者手不可近按之愈痛或消或下詳症施治飲食所傷作痛者宜温脾行氣以消導之盖飲食得寒則滯得熱則化若痛漸下及日久不愈者宜推蕩之詳見内傷飲食門痰痛者必小便不利痰隔中焦氣閉下焦上下不相流通故痛治當導痰開欝又伏飲作痛者或吐或下視形氣何如當與痰飲門相恭治䖝痛者面上有白班㸃唇若塗硃痛後便能食時作時止詳見䖝門食積死血痛者痛有常處而不移動者是也宜按門尋治腹中水鳴丹溪曰腹中水鳴乃火撃動其水也盖水欲下火欲上相觸而然用二陳湯加芩連梔子亦有臓寒而水聲汩汩者宜分三隂部分而治中脘太隂當臍少隂小腹厥隂各從其宜温之又有腸胃空虚而鳴者宜参术之類補之腹中水鳴而痛亦有因于火因于欝者生生子曰觀丹溪治腹痛無定方盖欲使人認病自擇且方者隅也隅于一則不能圎活而貫通是以後人有守死方之誚凡臍下痛而人中黒者多死感暑而痛或泄痢併作其脉必虚宜十味香薷飲或六和湯感濕而痛大便溏泄小便不利其脉必濡宜胃苓湯食積痛常欲大便去後而痛减者是也宜温宜消久者遇仙丹神芎丸等擇而下之當與傷食門相恭治氣滯而痛其脉必沉宜木香順氣散死血痛痛有常處宜桃仁承氣湯痛而欲得熱手按及熱物熨者是寒宜香砂理中湯或五積散痛而熱手熱物熨不止者是熱宜黄連解毒之類實則以硝黄下之絞腸沙痛極是急速先與鹽湯探吐或委中并十指出血藿香正氣散正氣天香散酒積痛酒傷則發宜泄其積痛自止也多年敗田螺殻煅存性加三倍于木香㯽榔丸中更加山茵陳等分衆藥中其效甚速禦痛湯治火痛黄連薑汁炒山梔仁炒各二錢橘紅茯苓各一錢半草蔲仁七分半夏一錢甘草四分薑三片食前服星半安中湯痰積作痛南星半夏各一錢半􅉸石香附枳殻青皮木香山梔仁炒黑蒼术砂仁茯苓橘紅各一錢甘草四分生薑四片煎服氣攻痛者去南星􅉸石加厚朴𤣥胡索各一錢痰甚者加白螺殻焼灰一錢臨服調下木香順氣散氣滯腹痛木香香附㯽榔青皮陳皮厚朴蒼术枳壳炒砂仁各一錢甘草五分薑三片煎服香砂理中湯即理中湯加藿香砂仁小腹痛傷寒家蓄血在下焦宜抵當桃仁承氣之類若因氣欝而痛以青皮主之寒者以桂枝吴茱茰温之若因疝奔豚癥聚者又當循各門施治苦楝丸治奔豚小腹痛寒也苦楝茴香大附子三味酒煮焙乾末之每兩入𤣥胡末半兩全蝎炒丁香各十八箇為末酒糊丸梧桐子大每食前温酒下五十丸酒煮當歸丸治小腹下痛及疝當歸一兩茴香半兩附子七錢良薑七錢四味酒煮乾冄焙加後藥塩炒丁香各半兩全蝎二錢柴胡升麻木香各一錢苦楝五分甘草炙五分𤣥胡索四錢為末酒煮糊丸梧子大每二三十丸空心白湯下小腸癰作痛者其身甲錯腹皮急按之濡如腫状腹常痛或遶臍生瘡急宜下之或以雲母膏太乙膏為丸服之自愈脇痛門有風寒脉浮弦而數者是也有食積脉沉弦而伏者是也有痰飲或弦或􅉸或結或促有死血脉濇有虚脉弦而細數或大而無力有氣欝脉沉而細有火脉洪􅉸而數當分條類析明别左右施治經曰左右者隂陽之道路氣之所終始也又曰肝木氣實則脇痛肝氣實則怒夫謂實者指邪氣而言經曰邪氣盛則實是也脇痛属肝木及胆火木氣實者以柴胡川芎青皮蒼术踈之肝火盛者以當歸龍㑹丸㵼之死血積者以桃仁紅花香附川芎破之痰飲流注者以南星半夏蒼术川芎豁之欝宜開欝寒宜散寒此大法也兩脇走痛是痰實者可用控涎丹方見痰飲門左脇痛為肝經受邪宜枳芎散或柴胡踈肝散右脇痛為肝經移病于肺宜推氣散食積痛凡痛有一條扛起者也當于積塊門檢治氣弱人脇痛脉細𦂳或弦多從劳役怒氣得者八物湯加木香青皮肥白人氣虚發寒熱而脇下痛用参茋補氣柴胡黄芩退熱木香青皮調氣瘦人發寒熱脇痛多怒者必有瘀血宜桃仁紅花柴胡青皮大黄􅉸石去滯氣必用青皮乃肝胆二經之藥若二經血不足者先當補血少加青皮可也脇痛發寒熱似覺有積塊必從飲食大飽勞力所致必用龍㑹丸痰飲停伏脇痛宜導痰湯脇下痛而大便秘結者木香梹榔丸或龍㑹丸亦有虚寒而作痛者一人脇痛連膈服氣藥不效後用辛熱補劑下黒鉛丹而愈觧痛外以琥珀膏貼之或以白芥子水研敷之或吴茱茰醋研敷之韮菜炒熨亦佳當歸龍㑹丸肝木實火兩脇痛之要藥當歸龍胆草各酒洗山梔黄連黄芩各一兩半蘆薈大黄酒煨各五錢木香一錢半黄柏一兩青皮一兩柴胡五錢麝香少許右末神麯糊丸梧子大每薑湯下三五十丸枳芎散左脇痛枳實麸炒川芎各五錢甘草炙一錢半為末每二三錢薑棗湯或酒調下推氣散右脇痛片薑黄枳壳麸炒桂心各五錢甘草炙三錢為末每服二錢薑湯調下鷄鳴散趺蹼損傷瘀血停積脇内日久作痛復元活血湯從髙墜下惡血流於脇下疼痛不可忍二方見跌蹼門柴胡㵼肝湯欝怒傷肝左脇痛柴胡一錢二分甘草五分青皮芍藥各一錢黄連炒山梔炒龍膽草各八分川歸一錢二分水煎服死血作痛瘦人多怒者常患此桃仁九箇紅花川芎柴胡青皮各八分芍藥香附各一錢歸尾一錢半水煎服治脇下氣痛神方小茴香一兩炒枳壳五錢炒為末每二錢鹽湯調下心痛門真心痛者手足青至莭旦發夕死夕發旦死寒邪傷其君主也今之治例皆非真心痛也以其在心之部位而名或心之脉絡或手心主之脉絡或胃脘或胸膈或食傷或寒傷或氣逆或痰飲或死血或䖝或欝火皆致痛也鍼經曰足太隂之脉其支者復從胃别上膈注心中是動則病舌本強食則嘔胃脘痛腹脹善噫心下急痛胃病者腹䐜脹胃脘當心而痛上支兩脇咽鬲不通脉經曰憂愁思慮則傷心傷心則苦驚喜忘善怒心傷者其人勞倦即頭面赤而下重心中痛徹背其脉弦此心臓傷所致也諸䖝痛者如心腹痛懊憹發作腫聚往来上下行痛有休作心腹中熱善渇涎出靣色乍青乍白乍赤嘔吐清水者蚘也病機機要曰有大實而心中痛者因氣而食卒然發痛大便或秘久而心胸髙起按之至痛不能飲食急以煮黄丸利之利後以藁本湯去其邪也有寒厥心痛者手足逆而通身冷汗出便溺清利或大便利而不渇氣㣲力弱急以术附湯温之寒厥暴痛非久病也朝發暮死急當救之是知久病無寒暴病非熱也陳無擇云若謂經心痛心與背相引心痛徹背背痛徹心若諸府心痛難以俛仰小腹上冲卒不知人嘔吐泄㵼此皆外感内滛則其氣閉塞鬱於中焦氣與邪争發為疼痛又曰九種心痛曰飲曰食曰風曰冷曰熱曰悸曰䖝曰疰曰去来痛者除風熱冷属外所因餘皆不内外更婦人惡血入心脾經發作疼痛尤甚於諸痛更有卒中客忤鬼撃尸疰使人心痛亦属不内外因在人以意推充施治丹溪云凡心膈之痛湏分新久若明知身受寒氣口食寒物而病於初得之時當用温散或温利之藥若其病得之稍久則成欝矣欝則蒸熱熱乆必生火原病式中備言之矣若欲行温散温利寧無助火添病耶由是古方多以山梔為君加熱藥為嚮導則邪易伏病易退然向安之後若縱恣口味病必復作凡治此病必要先問平日起居何如假如心痛有因平日喜食熱物以致死血留於胃口作痛者用桃仁承氣湯下之治寒之劑金匱赤石脂丸心痛徹背背痛徹心此寒厥心痛烏頭三錢炮附子五錢炮蜀椒乾薑赤石脂各一兩右末蜜丸梧子大食後白湯下一丸日三服术附湯寒厥暴痛脉㣲氣弱甘草炙一兩白术四兩附子一兩半炮每三錢薑棗煎立應散寒痛氣痛腹痛皆効良薑香附各炒等分為末白湯調下二錢二薑丸養脾温胃去冷消痰治心脾痛寛胸下氣進飲食一切冷物所傷並皆治之乾薑炮良薑等分為末麺糊丸梧子大每服十五丸至二十丸食後陳皮湯下姙娠婦人不宜服此皆温中之藥也散寒之劑麻黄桂枝湯外因心痛惡寒發熱内攻五臓拘急不得轉側麻黄桂心芍藥細辛乾薑甘草炙各七錢半半夏香附各五錢每服五錢薑五片水煎食前服大便秘入大黄量虚實加減一人心痛諸藥不效服此而愈㯽榔桂心葛根甘草减半細辛半夏桔梗枳壳川芎防風等分水煎服草豆蔲丸客寒犯胃草豆蔲一錢半煨吴茱茰炮益智仁殭蠶炒當歸身青皮各六分神曲薑黄各四分甘草三分桃仁七個半夏一錢泡澤㵼一錢小便利减半麥芽錢半炒炙甘草六分柴胡四分詳脇痛多少與之人参黄茋陳皮右除桃仁另研如泥外為極細末同研勻湯浸蒸餅為丸梧子大每三十丸熱湯下食逺服治心痛荔枝核焼存性為末醋湯下二錢内傷飲食之劑煮黄丸治飲食過多心腹脹滿脇肋走氣痃癖刺痛雄黄一兩研巴豆五錢去皮心研如泥入白麺二両同研勻滴水丸梧子大滚水煮十二丸濾入冷水内令沉冷每用時用浸藥冷水下一丸一日十二時盡十二丸以利為度不必盡劑藁本湯治大實心痛大便已利宜以此徹其痛也藁本半兩蒼术一兩水煎温服飲食在膈上未入胃者宜吐之經曰在上者因而越之如𤓰蒂散之類氣痛之劑正氣天香散但忍氣則發七氣湯蘓子降氣湯見氣門治痰飲痛劑丹溪方痰飲停積胃脘作痛螺螄殻墻上年乆者煅􅉸石炒蒼术山梔香附南星各二兩枳殻青皮木香半夏砂仁各五錢右末生薑汁浸􅔻餅為丸菉豆大每三四十丸薑湯下春加川芎夏加黄連冬加吴茱茰半兩又方治痰心痛半夏油炒為末每服二錢薑湯下痛甚者大䧟胸湯或為丸亦可治死血痛劑丹溪方治死血胃脘痛者𤣥胡索一兩半桂􅉸石紅花紅麯各五錢桃仁三十個右末湯浸􅔻餅糊為丸桃仁承氣湯方見傷寒門斗門方血氣攻心痛不可忍蓼根剉酒浸服之瘥治火欝之劑丹溪方治火痛黄連山梔炒各二錢陳皮茯苓各一錢半半夏一錢草豆蔲七分甘草四分薑三片水煎食前服又方治火痛山梔仁薑汁炒一兩水煎磨木香三分或加川芎二錢雜方牡蠣煆為末每二錢酒調下失笑散有人心痛百藥不效用此而愈五靈脂蒲黄等分為極細末以醋調二錢熬成膏入水一盞食前温服有瘀血作痛加𤣥胡沒藥螺螄殻陳年日久者治心痛洗浄為末熱酒調下一錢半乾漆丸九種心痛腹脇積聚滯氣乾漆二兩搗碎炒去烟細研醋煮麺糊丸梧子大每服十五丸至十七丸熱酒下醋湯亦好不拘時日進二服蚕沙散男婦心氣痛不可忍晚蚕砂不拘多少為末用滚水泡過濾净取清水服之立止熨法治心腹俱痛以包川椒薄注腹上火熨令椒汗出良梅硫丸酸熱以收散寒凡服辛劑反甚者改服酸劑立愈氷梅一箇去核生硫黄為末相和搗勻以可丸為度作一丸白湯下立愈病不冄作濟世方治心痛豨薟草搗汁醋汁相和服立效昔有人服此吐䖝二條終身不發緑礬止痛方緑礬七八分好酒化下冄不發衍義方治心痛銅青一味淡醋湯些小服之治䖝之劑可與虫部恭治化䖝丸寉虱梹榔胡粉炒苦楝根去厚皮各五十兩白礬飛十二兩為末麺糊丸桐子大小兒疾病多有諸䖝或因臓腑虚弱而動或咽食甘肥而動動即腹中疼痛往来上下攻心痛則笑不休合眼仰身撲手心神悶亂嘔噦涎沫或吐清水四肢羸困靣青黄色飲食雖進不生肌肉或寒或熱沉沉黙黙不眀知病處一嵗五丸温水下入香油一二㸃打勻下之米飲亦得其䖝自下生生子曰已上論寒熱痰氣䖝痛火食等痛治法皆已備矣但病久正氣虚損及禀賦素弱之人或被峻利克伐太過以致羸弱而痛不愈者皆虚痛也當從補飬氣血此根本之治不可全恃攻克以致虚虚之禍予嘗治于病壊之後以補藥収功者多黄茋建中湯随症加减治虚弱及被克伐藥傷損者局方蘓合丸治疰忤鬼氣卒心痛甚妙山梔并刼藥止之不效者𤣥明粉一服立止胸滿胸痛胸痺肝虚則胸痛引背脇實則胸痛不能轉側喜太息仲景曰肝中寒者両臂不舉舌本燥喜太息胸中痛不得轉側食則吐而出汗也肝著其人常欲踏其胸上先未苦時但欲飲熱旋覆花湯主之素問曰陽明所謂胸痛短氣者水氣在臓腑也水者隂氣也隂氣在内故胸痛少氣也仲景治胸痺之病喘息咳唾胸背短氣寸口脉沉而遅闗上小𦂳數者宜以𤓰蒌薤白白酒湯主之大𤓰蒌一個搗碎薤白半斤白酒七升三味同煮取二升分温冄服一婦人患胸中痞急不得喘息按之則痛脉數且濇此胸痺也因與小䧟胸湯二劑而愈支飲胸滿者枳朴大黄湯主之厚朴一兩大黄六兩枳實一兩水五升煮取二升分温冄服斗門方治胸腹壅滯去痰開胃半夏泡净焙乾為末生薑自然汁和為餅子用濕紙包於慢火中煨令香熟水一盞用餅子一塊如弹子大入塩半錢煎取一盞温服大能去胸膈壅逆大壓痰毒及治酒食所傷其功效大矣一人年二十三嵗膈有一㸃相引痛吸氣皮覺急此有汚血也􅉸石一兩桃仁五錢黄連五錢枳壳一兩炒甘草炙二錢為末每服一錢半以蘿蔔自然汁煎熟飲之一日五六服一人因服温補藥又妄自學吐納以致氣亂血熱𠻳血消瘦膈間有一㸃氣梗痛似有一條絲垂映在腰與小腹皆痛大率偏在左邉此肝部有惡血也􅉸石枳壳炒各一兩黄丹炒三錢黄連柴胡各五錢紅花一錢桃仁二兩甘草生二錢為末每服錢半以蘿蔔汁煎沸服之有寒邪干于胸中者宜發散之如紫蘓前胡杏仁防風桂枝葛根之類茯苓杏仁甘草湯治胸痺胸中氣塞短氣茯苓二兩杏仁五十箇甘草一兩水一斗煮五升温服一升一日三服橘枳薑湯治同上陳皮一斤枳實二兩生薑半斤水五升煮二升分温再服千金方治胸痺氣滿壅心膈不利枳實二兩麸炒為末清米飲下二錢仲景薏苡附子湯治胸痺緩急苡仁十五兩大附子十個炮為末每服方寸七日三旋覆花湯治胸中嘈囃汪洋常覺冷涎泛上兀兀欲吐飽悶旋覆花橘紅半夏茯苓甘草厚朴芍藥細辛薑三片水煎服䖝痛䖝本濕熱所生臓腑虚則侵蝕療寸白虫錫灰蕪荑梹榔極佳宜和中一人每覺心中多嘈雜意欲作飲又疑䖝漫依此方翌日下長䖝二條一長二尺五寸頭匾濶尾尖銳每寸作二節班如錦紋一條皆寸斷矣千金方云勞則熱熱則生虫心䖝曰蛔脾䖝曰寸白腎䖝如刀截絲縷肝䖝如爛杏肺䖝如蚕皆能殺人惟肺䖝為急居肺葉内蝕人肺系故成瘵疾咯血聲嘶藥所不到治之為難道藏中載諸䖝頭皆向下行惟自初一至初五日以前頭上行故服藥多取月出以前盖為此也取寸白䖝方錫灰一兩木鱉子盧㑹二十文黄丹十文輕粉十文為末猪膏油丸桐子大先一日食素晩莫喫飯次早五更温水調下分二服又方畫粉蜜佗僧各等分為末每二錢用麻油調服空心下頃刻成涎取下䖝􅉶之生由飲食不節傷饑過飽喜啖腥膾多食生冷酷嗜麯蘖愛食肥甘臓腑虚弱濕熱内滛則生䖝積也三䖝者謂長䖝赤䖝蟯䖝也乃有九種而蟯人多病之寸白䖝從食牛肉飲白酒所成相連一尺則殺人服藥下之盡出乃佳蟯䖝多小児患之大人亦有令人口吐清汁痛煩躁乍作乍止其餘各種縂不利於人胃中若有者宜化䖝丸速除之腹内熱腸胃虚䖝行求食上唇有瘡曰惑䖝食其臓下唇有瘡曰狐䖝食其肛得此疾者十無一生也寸白䖝上半月䖝頭向上易治下半月向下難治先以肉汁或糖蜜引䖝頭向上然後用藥集效丸木香鶴虱炒梹榔訶子麺包煨去核蕪荑炒附子炮去臍乾薑各七錢半大黄一兩半烏梅十四個去核右末煉蜜丸麻子大每三四十丸陳皮湯下秘方萬應丸大人小児腹内有䖝及積氣塊痛小兒疳病三稜莪术各醋炒陳皮麸炒橘紅史君子肉麥蘖麯炒神麯炒雷丸乾漆炒烟盡各五錢梹榔一兩蕪荑二錢半鶴虱畧炒胡黄連炒甘草炙各三錢木香良薑陳壁土炒砂仁各二錢右末醋米糊為丸菉豆大每三五十丸空心淡薑湯下靈礬散治小兒䖝咬心痛欲絶五靈脂末二錢白礬枯五錢每服二錢水煎服不拘時䖝出即愈安䖝散凡䖝不可盡去宜安之梹榔胡粉炒黄川楝子去皮核鶴虱炒各二兩枯礬二錢半右末每服一錢米飲調下川楝丸上中二焦虚或胃寒䖝動作痛乾漆炒烟盡二分雄黄五分巴豆霜一錢右末麺糊丸黍米大㸔大小與服取東向石榴根煎湯下痛者苦楝根湯或蕪荑湯下蕪荑散治諸䖝作痛臨發時服白蕪荑去扇乾漆炒烟盡各等分為末每一錢米飲下化䖝丸治小兒疳䖝五心煩熱蕪荑黄連神麯炒麥蘖炒各等分右末麺糊丸黍米大空心米飲下制䖝制勞悦肌膚去勞熱梹榔一兩半龍膽草一兩乾漆五錢為末煉蜜丸梧桐子大每十丸至十五丸滚水下木香三稜散腹中有䖝靣色痿黄一切積滯黒丑半生半熟大腹子炙梹榔雷丸錫灰醋炒三􅏢煨蓬术煨木香大黄各一兩為極細末每三錢空心蜜水調下或砂糖水下湏先將焼肉一片口中嚼之休嚥下吐出口中肉汁後服藥丹溪治蛔䖝吐清水氣口刺痛取生艾汁隔夜勿食次早五更以肥香脯方寸匕先喫令䖝聞香随即飲汁一升必下蛔䖝凡胸喉中覺有䖝上下偏喜聞葱豉油食之香者兩三日不食開口而卧将豉煎葱油令香放口邉䖝當自出引而去之但随喜所物用之亦可古有一人忽患一疾凡惡心則吐䖝數條後乃頻作累治不效每用殺䖝藥則吐䖝愈多招孫尚先生診之曰六脉皆細非䖝也今雖吐䖝乃臓寒而䖝不安失居上膈因而吐出復用殺䖝藥䖝為藥所苦不能自安所以䖝吐愈多也硫黄附子各一兩為末粳米糊丸每服三十丸飲下之五服後再不吐䖝而痛亦止仲景曰凡腹中痛其脉當沉弦今反洪大故有蛔䖝熱則生䖝故脉洪大嘔吐噦門生生子曰機要云有聲有物謂之嘔無聲有物謂之吐空嘔濁惡而聲長謂之噦要知噦属陽而吐属隂也無形者肺有形者胃以胃兼氣血言也又云上焦吐者為氣中焦吐者為食積下焦吐者為寒内經云食不得入是有火也食入復出是無火也有飽後逢怒或傷力跌撲以致瘀血積於胃脘者有膽虚及風痰作吐者有胃虚而䖝行求食者有中氣虚弱者有風寒外􅊞者有欝火作痛而吐者有傷酒而嘔吐者有脚氣發而吐者惟細心體認治之無不愈矣東垣云大便閉者通利之隂虚邪氣逆上窒塞嘔噦不足之病此地道不通也正當用生地黄當歸桃仁紅花之類和血潤燥兼用甘草以補其氣㣲加大黄芒硝以通其閉大便利邪氣去則氣降嘔噦自不見矣復有胷中虚熱榖氣大虚發而為嘔噦者但得五榖之隂以和之則嘔噦自止五榖皆属隂或食或飲白湯或喜凉水皆能止嘔噦不必用藥也治嘔吐生薑半夏橘皮必用之聖藥但只治上焦氣壅表實之病若胃虚榖氣不行胸中閉塞而嘔者惟宜益胃推揚榖氣而已勿作表實以辛藥㵼之東垣嘔吐噦分為三陽經云嘔吐噦者皆属於胃胃者縂司也以其氣血多少為異耳且如嘔者陽明也陽明多血多氣故有聲有物氣血俱病也仲景云嘔多雖有陽明症慎不可下孫真人云嘔家多服生薑乃嘔吐之聖藥也氣逆者必散之故以生薑為主吐者太陽也太陽多血少氣故有物無聲乃血病也有食入則吐有食已則吐以陳皮去白主之噦者少陽也少陽多氣少血故有聲無物乃氣病也以薑製半夏為主故朱奉議治嘔吐噦以生薑半夏陳皮之類䆒其三者之源皆因其脾虚弱或因寒氣飲食所傷而致也宜丁香藿香半夏茯苓陳皮之類若但只内傷宜察其虚實使内消之痰飲者下之當分何經對症用藥不可亂也嘔吐膈氣縂論潔古云吐有三氣積寒也皆從三焦論之上焦在胃口上通天氣主納而不出中焦在中脘上通天氣下通地氣主腐熟水榖下焦在臍下下通地氣主出而不納是故上焦吐者皆從於氣氣者天之陽也其脉浮而洪食已暴吐渇欲飲水大便燥結氣上衝胸而發痛其治當降氣和中中焦吐者皆從於積有隂有陽食與氣相假為積為痛其脉浮而弦其症或先痛而後吐或先吐而後痛治法當以小毒藥去其積梹榔木香和其氣下焦吐者皆從於地道也其脉大而遅其症朝食暮吐暮食朝吐小便清利大便閉而不通治法宜毒藥通其閉温其寒氣大便漸通以中焦藥和之不令大便閉結而自安也右潔古論三焦吐盖本黄帝所謂氣為上膈食飲入而還出為下膈食晬時乃反出之其上焦食已暴出者今世謂之嘔吐也中下二焦朝食暮吐暮食朝吐者今世謂之膈氣反胃也今分嘔吐膈食為二門仲景云諸嘔吐榖不得下小半夏湯主之嘔家本渇渇者為欲解今反不渇心下有支飲故也小半夏湯主之卒嘔吐心下痞膈間有水眩悸者小半夏加茯苓湯主之胃反嘔吐者大半夏湯主之服前小半夏湯諸湯不愈者此胃虚當以甘益之立愈治氣之劑仲景陳皮湯乾嘔手足厥者治宜辛散橘紅四兩生薑八兩水七升煎三升温服一升下咽即愈木香散木香梹榔等分為細末以後桔梗湯調下㓗古桔梗湯上焦氣熱上衝食已暴吐脉浮洪宜先降氣和中桔梗白术各一两半半夏麯二兩橘紅枳實炒茯苓厚朴各一兩每服一兩水煎調木香散二錢隔夜空腹服之三服後氣漸下吐漸去然後去木香散加芍藥黄茋一兩半同煎服之病愈則止如大腑燥結食不盡下以大承氣湯去朴硝㣲下之少利為度冄服前藥補之如大便復結又依前㣲下之㯽榔橘紅散治嘔吐白梹榔一枚橘紅二錢半水煎服治寒之劑加减二陳湯痰火為患嘔噦頭眩心悸中脘不快發寒熱或食生冷脾胃不和並治丁香一兩半夏陳皮各五兩茯苓二兩甘草一兩半每服四五錢薑三片烏梅一枚水煎熱服治痰痞加草豆蔲一兩半藿香安胃散脾胃虚弱不飲食嘔吐不時藿香一錢半丁香人参各二錢橘紅五錢每服二錢薑三片水煎服東垣丁香吴茱茰湯治嘔吐噦胃寒所致丁香甘草茯苓柴胡半夏乾薑各五分吴茱茰草豆仁蒼术黄芩人参各一錢升麻七分當歸一錢半每服五錢薑三片水煎食前熱服忌生冷藿香平胃散治嘔吐不止藿香厚朴各一兩半夏甘草炙各二兩蒼术三兩陳皮去白二兩每服五錢薑三片棗三枚水煎温服羅太無紅豆丸諸嘔吐逆膈氣反胃亦治寒濕丁香胡椒砂仁紅豆各二十粒右末薑汁糊為丸皂角子大每一丸以大棗一枚去核填藥麺裹焼麺熟去麺細嚼白湯下食前進三服效丁香附子散膈氣吐食及下焦寒而奔豚上冲黒附子炮去皮臍丁香各五錢梹榔一大枚硫黄去石胡椒各二錢右先将四味為末次入硫黄冄研勻每服二錢用蝙蝠一箇去翅足腸肚填藥在内用濕紙五七重裹定置慢火内焼熟取出細嚼用温酒送下一日三服米飲送下亦可仲景吴茱茰湯治嘔而胸滿者吴茱茰湯泡一兩半人参三分生薑一兩半大棗三枚水煎治火之劑蘆根湯熱而嘔吐不止及治惡阻蘆根取土中新白者半斤水二碗煎一碗熱服竹茹湯治胃熱而嘔乾葛半夏薑汁煮各三錢甘草二錢每服五錢薑三片竹茹錢半棗一枚水煎温服昔有人病傷寒得汗後數日忽嘔吐藥食俱不得下醫皆進丁香藿香􅉸石等藥下咽即吐後以此竹茹湯與之即愈枇杷散治嘔吐利膈氣止嘔啘又治卒嘔吐不食单煮枇杷葉汁飲之此物味苦平下氣枇杷葉去毛人参半夏各一錢茯苓五錢茅根二兩薑七片水煎磨梹榔末五分和勻服之丹溪治膈上有熱胃中有痰二陳湯加炒梔子黄連生薑主之嘔而發熱者小柴胡湯主之温膽湯治嘔吐不下飲食極妙仲景青鎮丸治寒熱往来脉弦嘔吐頭痛即小柴胡湯加青黛以薑汁打糊為丸白湯下劉河間治暴吐上焦氣熱所冲經曰諸嘔吐酸暴注下廹皆属於火脉浮而洪者荆黄湯主之荆芥一兩人参五錢甘草二錢半大黄二錢右水煎調梹榔散二錢空心服㯽榔散梹榔二錢木香一錢半輕粉少許右為細末同前煎藥下如欲作丸子用蒸餅糊為丸小豆大每二十丸食後服治瘀血之劑香靈丸又名六丁丸治嘔吐如神及産後嘔不止者丁香辰砂六錢五靈脂一兩又香脂先研末後入砂再研勻用狗膽汁或猪膽汁為丸鷄頭子大每服一丸生薑陳皮湯磨下治瘀血獨以五靈脂狗膽汁為丸鷄頭子大每服一丸生薑湯磨下及生薑酒送下極熱服草靈丹五靈脂薑汁煮透甘草焼酒煮透焙乾為末每服五分置掌中用舌䑛下此方治膈氣反胃嘔吐梅核氣及胃脘疼痛効治虚之劑丹溪云乆病嘔者胃虚不納榖也生薑人参黄茋白术香附之類治之李浲治反胃嘔吐無常粥飯入口即吐困倦無力垂死者以人参三兩作一服水煮帶熱頓服愈理中湯治脾胃虚寒嘔吐不食調中湯治脾胃虚弱嘔吐治中湯治霍亂吐㵼即理中湯加橘紅青皮各一兩是也六君子加砂仁治脾胃虚弱惡心欲吐及吐食或不思食治積氣之劑遇仙丹木香梹榔丸枳實導滯丸七聖丸皆可選用治風痰之劑金花丸吐食而脉弦肝乘脾也由脾胃之虚宜治風安胃半夏湯泡一兩梹榔二錢䧺黄一錢半右末薑汁浸􅔻餅糊為丸桐子大小兒另丸薑湯下從少至多漸次服之以吐止為度風痰覊絆於脾故飲食不下也治水飲之劑小半夏湯治嘔吐榖不得下者半夏一斤生薑半斤水七升煮取一升半分温冄服小半夏加茯苓湯治卒嘔吐心下痞膈間有水眩悸者即前方加茯苓四兩大半夏湯治胃反嘔吐服前小半夏湯諸藥不愈者此胃虚宜以甘益之服此立愈半夏二斤人参三兩白蜜一斤右水一斗三升和蜜揚之二百四十遍煮藥取三升從服一升餘分冄服猪苓湯治嘔吐而病在膈上後思水解急與之思水者此方主之猪苓茯苓白术各等分為末飲調方寸七日三胃風胃風之症治嘔愈嘔者是也用川烏一兩洗净去皮臍不去尖以漿水一碗煮乾每枚切作二片復用漿水一碗煮盡更切作四片每細嚼一片以少温水下少頃嘔遂止此皆好食甘甜之物膏粱之味積久成熱因而生風非一朝一夕之故也雜方碧霞丸治吐逆立效黄丹四兩篩過用好米醋半斤用藥入銚内煎乾却用炭火三斤就銚内煅透紅冷取出研細末用粟米飯搗為丸梧子大煎酵湯下七丸效木𤓰湯主嘔啘風氣又吐而轉筋者煮木𤓰汁飲之甚良此酸収之劑欲吐不吐者是也惡心丹溪云惡心有熱有痰皆用生薑随症用藥仲景生薑半夏湯治胸中似喘不喘似嘔不嘔似噦不噦徹心中憒憒然無奈者半夏半斤生薑一斤取汁右二味以水三升煮半夏取二升内生薑汁同煮二升半少冷分四服日三夜一如病止住後藥此濕痰症也東垣茯苓半夏湯胃風虚弱身重有痰惡心欲吐是邪氣覊絆於脾胃之間當先實其脾胃炒麯三錢大麥芽炒黄五錢陳皮天麻各二錢白术茯苓半夏各一兩每五錢薑五片煎熱服柴胡半夏湯治舊有風症不敢見風眼澁眼黒胸中有痰惡心兀兀欲吐但遇風覺皮肉𦂳手足難舉動重如石若在暖室少出㣲汗其症随減冄遇風病復如是方見痰門嘔苦水丹溪治一婦人清早嘔苦水脉濇而㣲起轉如常此胃弱而上脘有濕黄芩七錢􅉸石蒼术炒陳皮山查半夏各一兩桔梗五錢飛礬二兩薑水煎服二陳湯加山梔子一倍黄連减半香附撫芎白豆仁煎服或臨服時磨梹榔末少許治欝火惡心嘔沫反胃症沬大吐者多死予目擊十數人矣仲景治乾嘔吐逆吐涎沬半夏乾薑散主之半夏乾薑各等分二味為末取方寸也漿水一升煎七合頓服之嘔膿予一族嫂中年患此半載咳𠻳嘔膿血後竟無事此亦肺􅏴症也膿盡即愈仲景云嘔家有癰膿不可治嘔膿盡自愈嘔長䖝丹溪治吐䖝用黒錫灰㯽榔末米飲調下仲景治蚘厥當吐蚘今病静而復時煩此為臓寒蚘上入膈故煩須臾復止得食而嘔又煩者聞食臭出其人當自吐蚘蚘厥者烏梅丸主之又主痢方在厥證門傷酒嘔吐東垣葛花觧酲湯方見傷飲門益元散薑汁為丸治酒熱嘔惡殊騐乾薑丸治酒癖成飲吐酸水乾薑葛根枳殻橘紅前胡各五錢半夏麯白术各一兩吴茱萸甘草各二錢半右末煉蜜丸桐子大每三十丸米飲下嘔吐清水許學士神术丸治嘔吐清水如神蒼术一斤去皮切片為末用白芝蔴半兩水二盞研濾取汁大棗十五枚煮爛去皮核以芝蔴汁研勻成稀膏搜和入臼搗熟丸如桐子大每空心温湯下五十丸加至百丸忌桃李雀鴿初服時膈上㣲燥且以茅术製覺燥甚再進山梔子散一服久之不覺燥也山梔散山梔一味乾之為末沸湯㸃服仲景茯苓㪚治心胸中有停痰宿水自吐出水後心胸間虚氣滿不能食消痰氣能飲食人参白术茯苓各三兩枳實二兩陳皮五錢生薑三兩三兩右水煎温服如人行八九里許又進之一日三服丹溪治兩手脈弦飲後嘔清水神麯蒼术香附各五錢益元散一兩半夏七錢半右末薑汁浸􅔻餅為丸丹溪治一人年四十因灸艾火太多病腸内下血糞肚痛今痛自止善嘔清水食不下宜清胃口之熱黄芩甘草茯苓各五錢陳皮地黄各一錢白术連翹各一錢半薑三片水煎服仲景治渇欲飲水水入則吐名曰水逆五苓散主之千金方治痰飲吐水無時節者其原因冷飲過度遂令脾胃氣羸不能消於飲食飲食入胃則皆變成冷水反吐不停皆用赤石脂散主之赤石脂一斤研細末毎服方寸匕酒飲調下時稍加至三匕服盡一斤終身不吐痰水又不下痢補五臟令人肥健有人痰飲服藥不愈用此方愈經云諸病水液澄徹清冷皆属於寒是也白荳蔲散治胃口寒作吐及作痛者白荳仁三錢為末酒送下效噎膈内經隂陽别論篇曰三陽結謂之膈結謂熱結也三陽者小腸膀胱也小腸熱結則血脉燥膀胱熱結則津液涸故隔塞而不便焉其始也或由飲食不節痰飲停滯或因七情過用脾胃内虚而作或者不察悉指為寒例用香熱之藥治之反動七情之火脾胃之隂反有所耗是以病日益深今治此疾或見咽嗌閉塞胸膈痞悶似属氣滯然有服耗氣藥過多中氣不運而致者當補氣而自運有大便燥結如羊屎者似属血熱然有服通利藥過多致血耗竭而愈結者補血潤血而自行有因火逆冲上食不得入其脉洪大有力而數者有痰飲阻滯而脉結濇者當清痰泄熱其火自降又有脾胃陽火衰弱其脉沉細而㣲者當以辛香之藥温其氣仍以益隂飬胃為之輔可也大概又有寒熱之辨若食已即吐者火也食久始吐者寒也王註曰食不得入是有火也食入復出是無火也按内經王註曰少陽一陽也陽明二陽也太陽三陽也一陽膽與三焦二陽大腸與胃三陽小腸膀胱張子和乃曰三陽者大小腸膀胱也并大腸而言不知從何所據耶傷寒論云食入反吐榖不得前者腎水乾也王氷曰病嘔而吐食久反出是無水也此與内經病能篇註異氣厥論云膈中陽氣與寒相搏故隔食而陽氣不通此論亦云陽與寒相搏未嘗専主於寒也丹溪曰大率属血虚氣虚有痰血虚者脉必數而無力氣虚者脉必緩而無力有痰者脉必沉或伏而大又有氣滯結者寸闗沉而濇又有擊跌内積瘀血忽然嘔吐食不能納者其脉必芤張鷄峰曰噎當是神思間病惟内觀自飬庶或可安又曰噎生於血乾血隂也隂主静内外両静則臓腑之火不起而金水二臓有飬隂血自生腸胃津液𫝊化合宜何噎之有古方用人參以補脾御米以解毒竹瀝以清痰乾薑以養血粟米以實胃蜜以潤燥薑以去噦有氣結者用開導之劑有隂火上炎者作隂虚治有積血者當消息去之糞如羊屎者不治五十以上者不治口中多出白沫者不治治法大槩用童便韭汁薑汁竹瀝牛羊乳氣虚入四君子湯血虚入四物湯切不可驟用辛燥之藥宜薄滋味宜用乾蒸餅等物少用湯粥六節藏象云人迎四倍以上為格陽盖陽上之極故格拒而食不得入金匱云病人脈數數為熱當消榖引飲而反吐者以發其汗令陽微膈氣虚脈乃數數為客熱不能消穀胃中虚冷故也脈弦者虚也胃氣無餘朝食暮吐變為胃反寒在于上醫反下之今脈反弦故名曰虚趺陽脈浮而濇浮則為虚濇為傷脾脾傷則不磨朝食暮吐暮食朝吐宿榖不化名曰胃反脈緊而濇其病難治氣虚胃反右手脈無力者四君子湯加蘆根以伏龍肝浸長流水澄清煎之臨服入童便韭汁牛羊乳入黒驢尿和服以防其生蟲參苓白术散錢氏白术散皆治中氣虚弱胃反血虚胃反左手脈無力者以四物湯加童便或再加桃仁紅花有酒積加甘蔗汁二陳湯合平胃散治有痰而胃反者人參利膈丸治胸中不利痰𠻳喘滿而膈木香檳榔各七錢半人參川歸藿香甘草枳實各一兩大黄酒浸厚朴各二兩右末滴水丸梧子大温水送下千葉白木槿花隂乾為末陳皮湯調下三五口不轉再服竒方未出毛啄木鳥蝙蝠小鮎鴨魚三味入新瓦内鹽泥固濟煅存性為末外用狗寳為末和勻每服五七分漸至一錢薑湯下义方陳蜆殻焼灰米飲下老牛涎如棗核大水中飲之終身不復噎又方蘆根茅根各二兩水四鍾煮二鍾頓服之良薑附散膈氣不通胸膈間結塊大如拳堅如石嘔吐惡心飲食不下香附子一斤生薑三斤搗取薑汁浸香附一宿晒乾再浸再晒以薑汁盡為度為末每二錢米飲下病機紫沈丸治中焦吐食由食積與寒氣相格故吐而痛半夏麯代赭石砂仁各三錢杏仁沈香木香白术各一錢烏梅仁丁香檳榔各二錢陳皮五錢巴豆霜另研肉果各五分右末醋糊丸黍米大每五十丸柿霜湯下愈東垣厚朴丸主反胃吐逆飲食噎塞氣上冲腹中諸疾藥味即與萬病紫苑丸同厚朴蜀椒去目微炒川烏泡去皮各一兩半紫苑吳茱萸柴胡菖蒲桔梗茯苓官桂皂角乾薑泡人參各二兩黄連二兩半巴豆霜五錢右蜜為丸桐子大每服三丸漸加至五七丸以利為度薑湯下食後而卧此丸治效與局方温白丸同及治處暑已後秋冬下痢大效加減法春夏加黄連二兩秋冬再加厚朴二兩如治風於春秋所加黄連厚朴外更加菖蒲茯苓各一兩半如治風痛不愈者依春秋加藥外更加人參菖蒲茯苓各一兩半如心之積加菖蒲茯苓為輔如肝之積加柴胡蜀椒如肺積加黄連人參如脾積加茱萸乾薑秋冬乆瀉不止加黄連茯苓脾胃氣弱食不消化嘔逆反胃湯飲不下用粟米半升為粉水丸梧子大煮令熟㸃少塩空心和汁吞下本事云馿尿極治反胃外䑓載昔㓜年經患此疾每食餅及羮粥湏臾吐出貞觀中許奉御兄弟及柴蔣等時稱名醫奉勅令治醫竭其術竟不能療漸至羸􅉵死在旦夕忽有士云馿尿極騐旦服二合後食唯吐一半晡時又服二合人定時食粥吐則便定後奏知大内中五六人患反胃同服一時俱瘥此藥稍有毒服時不可過多盛取熱服二合病深者日服之良驗本草云馿尿治癥瘕反胃又云性冷味甘服之不生䖝濟世方馿尿調平胃散亦效新瓦散治反胃用多年瓦一片焼紅入馿尿内淬二十一次研末倉米飯焦為末二分飯末一分瓦末蠟精和飯丸以馿尿和平胃散服之丹溪畨胃方黄連薑汁炒三錢山查肉一錢保和末六錢右粥丸桐子大以人參湯入竹瀝再煎沸熱下六十丸本事大黄湯治冷涎畨胃其症欲發時先流冷涎次則吐食此乃勞症治不早死在旦夕用大黄一兩生薑自然汁半茶盞炙大黄令燥又淬入薑汁内如此淬汁盡切焙為末每服二錢陳米一撮葱白二莖水一大盞煎七分先食葱白次服藥不十日即除根羅太無云𤣥明粉硝提八九次入瓦礶煅成汁不拘再加頂火煅其煅過净硝一斤入甘草末一兩和勻名曰𤣥明粉每用一二錢桃花湯或葱白湯調下治膈上氣壅滯五藏秘結邪熱忌魚及藕丹溪治畨胃積飲通用益元散生薑自然汁澄清白脚丸小丸子時時服治畨胃用吳茱萸貝母瓜蔞根牛膝草本事治積聚停飲痰水生䖝乆成反胃及變為胃癰其説在靈樞及巢氏病源芫花丸芫花醋炙一兩牛膝狼牙根桔梗炒藜蘆炒梹榔各五錢巴豆大粒炒黒右末醋糊丸如赤豆大每服二三丸加至五七丸食前薑湯下此方常服化痰消堅殺䖝予患飲癖三十年暮年常是多雜痰飲来潮遅即吐有時飲半杯酒即止盖合此症也因讀巢氏病源論酒癥云飲酒多而食榖少積久漸瘦其病常欲思酒不得酒則吐多睡不復能食是胃中有䖝使然名為酒瘕此方治之要之湏痛禁酒則易治不禁無益也羅太無桂香散治膈氣反胃諸藥難瘥朝食暮吐甚者食已輙出其效神速此重劑也水銀黒錫各三錢硫黄五錢右三味銚内用桞木槌熬研㣲火上細研為灰取出後用丁香末二錢桂末二錢生薑末三錢都一處研令勻每服三錢米飲調下一服效甚者冄服神效又云男婦小兒逺近畨胃吐食或有汚血停蓄胸膈者方用五靈脂一味為末以黄狗膽汁為丸龍眼大每服一丸好酒半盞温服不止冄服即效丹溪治東陽王仲延咽膈間常覺有物悶悶每食物必屈曲自膈而下且梗濇作㣲痛食亦减他無所苦予脉之右甚濇而闗甚沉左却和予曰汚血在胃脘之口氣因而欝為痰此必食物所致眀以告我彼不自覺予又曰汝去冬好食何物為多曰我每日早必单飲㸃刴酒兩三杯逼寒氣為製一方用生韮汁半盞令細呷之一日三服盡韮二斤而安濟世方治噎食雞腹内榖袋不拘多少不可失包内物一粒用泥固濟火煆存性用薑汁炒香附末半兩配榖袋一箇為末神麯糊為丸薑湯送下治氣噎不下飲枇杷葉去毛蜜炙青皮陳皮去白右等分每服三錢生薑五片水煎服金匱玉函五噎心膈氣滯煩悶吐逆不食蘆根五兩剉水三大盞煮二盞温服永徽中有僧惟則病噎不能食嘱諸弟子曰吾死後便可開吾胷㗋視有何物自經而辛弟子果開㗋胸中得一物形似魚而有兩頭遍體皆肉鱗弟子置碗中跳躍不止戯以諸味皆随化盡時夏中盛藍作澱適有一僧以澱置碗中此䖝遂遶碗而走須臾化為水此乃䖝瘕非噎比因此後人多以藍治噎悮矣秘方潤腸膏治膈噎大便燥結飲食良久復出及朝食暮吐暮食朝吐其功甚㨗新取葳靈仙四兩搗汁生薑四兩取汁真麻油二兩白沙蜜四兩熬沸右四味同入銀石器内慢火熬成膏時時以匙挑食之良騐雄黄二豆丸治畨胃噎食神騐大烏梅三十枚水洗净取肉硇砂雄黄各二錢乳香一錢真百草霜黒豆菉豆各四十九粒右五味為細末烏梅肉搗丸弹子大每服一丸噙化待一炷香時藥力方行烙白麵餅一枚清熱湯泡開吃之無碍為妙設仍有㣲碍一二日後再噙一丸三五丸除根紫蘇子飲欬逆上氣噎膈因怒氣呌喊未定便挾氣進飲食或飲食甫畢便用性恚怒以致食與氣相逆氣不得下或咳𠻳不透心氣逆惡心蘇子炒訶子煨去核蘿葡子㣲炒杏仁去皮尖麸炒人參木香各一錢半青皮甘草炙各三錢右分二服生薑三片水煎服太倉丸脾胃虚弱不思飲食畨胃不食亦宜服之砂仁白豆仁各二兩陳倉米一升用朝東向陽壁土炒去土不用右末生薑自然汁丸桐子大每服百丸淡生薑湯下體仁彚編曰硫汞結成砂子吐送立痊方用嚴氏青金丹治一切吐逆水銀八錢生硫黄一錢為末入銚内慢火化開以柳木棍攪炒或有煙熖以醋沃之結成砂子再研為末用粽尖杵和丸菉豆大每服三十丸生薑陳皮煎湯送下青囊治反胃乆藥不效及小兒吐不止者硫黄五錢為末入水銀二錢半同研無星為度每服二錢先取生薑汁酒一盞煎熟調藥空心服調時逐漸著酒緩調令勻服訖以被盖出汗安又曰人參治畨胃之良用人參二兩拍破每服一兩水一鍾半煎四分熱服兼以人參汁煮粥吃愈有人患畨胃諸方不瘥只服人參而愈若卒嘔吐逆凡粥飲入口即吐困弱為丸服良劉宗厚曰按古治畨胃諸方悉是香燥大熱之藥皆不足為法今姑採一二方以偹用耳至於丹溪所言補血益隂潤燥和胃調中等藥雖無其方自宜随証設施觀其立論則思過半矣治噎禁方皂角黄三分每春夏兩后樹上生如菌様蘆根浮露水上者三錢橘紅七分烏藥一錢桔梗二錢枳實八分水二鍾煎一鍾先服一酒杯漸漸加之渣冄煎生生子曰噎膈之病氣欝居多然亦有隂血不足者少壮之人日以酒色是躭胃中之火沸騰則上焦肺金先受邪矣金主降令者也火凌於肺津液成濁况又下竭腎水将何攝伏其火以下行耶經曰大便者腎之所主隂血既虧則大便燥結結則下焦閉而氣反上冲經曰幽門不通上冲吸門又曰肺出氣腎納氣虚則失司乃職是有陽而無隂有升而無降也故守真子和丹溪皆以火熱而言戒用剛燥其意深矣然用藥必假滋隂潤燥為主隂血生則大便潤潤則下焦開開則氣降腎司聀而病尋愈矣噫用藥之法固為詳悉然人不能鐵石其心痛斷酒色則雖日飲瓊漿亦莫能以致其生也予特附於篇末俾病者自加珍重孰非愈病之藥石耶腰痛門腰痛有腎虚有濕熱有痰有氣滯有趺撲瘀血脉大而無力為虚弦而隂虚濇為死血沉􅉸為痰沉細為氣濡弱為濕𦂳數為風東垣曰大抵寒濕多而風熱少然有房室勞傷腎虚腰痛者是陽氣虚弱不能運動故也經曰腰者腎之腑轉揺不能腎将敗矣宜腎氣丸茴香丸之類以補陽之不足也膏梁之人乆服湯藥醉以入房損其真氣則腎氣熱而腰脊痛不能舉乆則髄减骨枯發為骨痿宜六味地黄丸滋腎丸鳳髄丹之類以補隂之不足也丹溪曰乆痛必用官桂以開之方止腹脇痛亦然煨腎丸肝腎脾損穀不化治宜益精緩中消穀腰不起者神效川萆薢杜仲薑汁炒牛膝破故紙蘆巴兔絲子肉蓯蓉沙苑蒺藜各一兩桂心半兩右酒煮猪腰子為丸桐子大每服五七十丸空心鹽酒送下金剛丸腎損骨痿不能起床川萆薢杜仲炒照前法丸服麋茸丸腎虚腰痛不能轉側麋茸一兩鹿茸亦可用兔絲子一兩舶上硫黄五錢右末以羊腎二對酒煮爛去膜研如泥和丸梧子大隂乾如羊腎不敷入酒糊佐之每服三五十丸温酒或鹽湯下鹿角散新角刮去黑皮取白者炒黄為末酒服一錢日進三服禁生魚餘不禁陳者不用角中心黄亦不用此方治腰痛神效東垣曰鹿角能去惡血羊腎散羊腎為末酒服一錢日進三服本草云羊腎補腎氣益精髄腎氣丸茴香丸青娥丸已上皆補陽之不足也八味丸治虚勞小腹拘急小便不利此則隂陽兼補也六味地黄丸虎潛丸滋腎丸大補丸已上皆補隂之不足也治隂虚脈大者杜仲龜板黄蘖知母枸杞子五味子等分為末以猪脊髄為丸每服五七十丸空心鹽酒送下補腎丸治腎虚腰痛效烏藥葉本草云烏藥嫩葉補中益氣側柏葉右酒蒸晒乾為末粥丸梧子大照前服腰腿濕痛方龜板酒炙五錢黄蘖酒炙四錢青皮三錢甘草生一錢半右末研薑一大片次入藥末一錢研細以蒼耳汁煎令沸服治隂虚性急腰痛者龜板黄蘖知母側柏右為末地黄膏為丸治濕熱腰腿疼痛龜板酒炙二兩黄蘖酒炒蒼耳子各一兩側柏半兩葳靈仙酒浸二兩右以牛膝膏為丸以黑豆汁兼四物湯加陳皮生甘草生薑一片煎吞下又方治腰腿疼痛龜板一兩半黄蘖白芍藥各酒炒一兩陳皮知母葳靈仙蒼术蒼耳子各半兩為末蜜丸服治濕熱腰痛大便瀉龜板酒炙一兩楮皮炒蒼术􅉸石各半兩芍藥酒浸香附各四錢為末粥丸如内傷白术山查湯下東垣蒼术湯治濕熱腰腿疼痛蒼术三錢去濕止痛柴胡二錢行經絡防風黄蘖各一錢水煎空心服陳無擇牛膝酒治傷風毒攻刺腰痛不可忍牛膝川芎羌活地骨皮甘草薏苡仁各二兩海桐皮二兩生地黄十兩俱以絹袋盛入好酒二斗浸二七日夏三五日每服一杯一日三四服常令酒氣不絶為佳一法入杜仲一兩治痰痛以二陳湯加天南星川蘖蒼术葳靈仙之類丹溪治老人因跌撲腰痛蘇木一錢歸身頭陳皮各一錢人參黄芪木香木通各五分桃仁九枚煎湯送下自然銅末子五分脈濇者有淤血也用熟大黄湯治墜墮閃剉腰痛不能屈伸大黄剉如指大生薑切片各半兩二味炒令焦黄以水一鍾浸一宿五更去渣服天明取下如雞肝者即惡血也治食積腰腿痛龜板酒炙側柏葉酒炒香附五錢白芥子凌霄花錢半右酒糊丸以四物湯加陳皮甘草山查莪术青皮煎湯下痰積食積指下有力或沈􅉸有力皆宜下之治腰痛用葳靈仙此治痛之要藥為細末每服二錢以猪腰子一枚批開糝藥在内濕紙煨熟五更細嚼熱酒下千金方用葳靈仙一錢温酒送下逐日以微利為度病人稍虚者禁用治腰痛不可忍牽牛不以多少研取頭末去渣取大蒜每一瓣切開入巴豆一粒在内外用濕紙包定火煨令蒜熟去巴豆将蒜細研和牽牛末為丸梧子大每服五丸醋湯或茶空心送下量虚實服藥棋子治腰痛氣滯者黒牽牛不拘多少以新瓦火焼赤便以牽牛倒在瓦上自然一半生一半熟不得攪動取頭末一兩入硫黄一分同研勻分三服每用白麺一匙水和揑如棋子様五更初用水一盞煮熟送下痛住即止未住明日五更冄服許學士曰予嘗有此疾每發只一服痛立止按此二方皆濕熱痰氣壅滯不能流通故痛猛而用藥峻也此様方法亦不可無但㸔病虚實用之獨活寄生湯治腎虚弱卧冷濕地腰腿拘急筋骨攣痛或當風取凉過度風邪流入脚膝為偏枯冷痺緩弱疼痛獨活杜仲牛膝細辛秦芁茯苓桂心防風川芎人參甘草桑寄生當歸熟地一方加續斷三兩每服三錢薑五片水煎食前服王海藏防風湯治傷寒後腰痛或皮肉痺及腿膝疼痛行步艱難不能俛仰防風川芎附子炒當歸芍藥羌活續斷各一兩麻黄去節桂枝去皮杜仲炒各七錢牛膝五加皮丹參各五錢每五錢薑二錢煎食前服此二方皆治寒濕之劑也東垣川芎肉桂湯卧寒濕之地腰痛不能轉側兩脇搐急作痛月餘不愈腰痛論中所説皆為足太陽足少隂血絡中有凝血作痛間有一二症屬少陽膽經外絡病皆宜去血絡之凝乃愈羌活一錢半柴胡肉桂蒼术歸稍甘草炙川芎各一錢獨活麯炒各五分防風防已各三分桃仁五箇去皮尖另研水酒煎食逺熱服陳無擇曰小續命湯加炒桃仁治風腰痛最妙五積㪚加桃仁治寒濕腰痛東垣羌活勝濕湯治脊痛項強腰似折項似拔此足太陽經不行也羌活獨活藁本防風各一錢蔓荆子三分川芎二分甘草炙五分水二鍾煎温服若身重沈沈然及經中有濕熱也此方加黄蘖一錢大附子五分蒼术二錢予嘗治一人腰下濕中宫有痰腰痛而小便白濁身重如山乃以二陳湯合五苓散以蒼术換白术加羌活服之效有熱再加黄蘖木通陳無擇桃仁酒腎虚風勞所傷毒腫掣痛牽引小腹連腰痛桃仁麩皮炒去皮尖研細每服一錢熱酒調下出汗即愈東垣地龍湯腰脊痛或打撲傷損從髙墜下惡血在太陽經中令人腰膝痛或脛腨臂膊中痛不可忍鼻壅塞不通中桂四分桃仁六箇羌活二錢獨活甘草黄蘖各一兩麻黄五分地龍四分焙乾者蘇木六分歸尾一錢每服五錢水煎食逺熱服橘核酒治打撲腰痛瘀血積蓄痛不可忍用橘核炒去皮研細每服二錢酒調下或用猪腰子一枚去筋膜破開入藥同葱白茴香鹽以濕紙包煨熟嚼下温酒送之以上二方皆該入前打撲瘀血條下摩腰丹治老人腰痛及婦人白𢃄附子尖烏頭尖天南星各一錢半硃砂樟腦丁香各一錢半乾薑一錢麝香三分雄黄錢半為末煉蜜丸如圓眼大臨用以生薑汁化開如厚糊様火上烘熱抹掌上擦腰中候藥盡貼腰上即烘綿衣縛之俟腰熱如火隔二日用一丸皂角膏治諸腰痛脚痛用皂角一斤去皮弦搗碎好酒二大碗熬去一半濾去渣再用前汁入磁瓶内熬為膏子隨痛處貼之如神湯治男婦腰痛𤣥胡索當歸桂心杜仲各等分為末酒調下三錢甚者不過數服橘核散治腰痛諸般滯氣橘核乳香各五錢破故紙二兩山查𤣥胡索菴䕡没藥五加皮紅麯各一兩為末酒調下丹溪治瘧疾初安因冲風又發腰痛兼又白濁已與人參白术檳榔半夏等補藥又教以煅牡蠣一錢木通五分炒蘖三分入前藥同煎服痢後腰痛兩脚無力陳皮半夏白芍一錢茯苓蒼术當歸黄芩酒炒五分白术二錢甘草炙一錢薑三片煎食前服赤水元珠卷四
