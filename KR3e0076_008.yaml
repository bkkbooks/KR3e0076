body:
  text: 赤水元珠卷八明孫一奎撰瘧門內經黃帝問曰夫痎瘧皆生於風其蓄作有時者何也岐伯曰瘧之始發也先起於毫毛伸缺乃作寒栗鼓頷腰脊俱痛寒去則內外皆熱頭痛如破渴欲飲冷帝曰何氣使然願聞其道岐伯對曰隂陽上下交爭虛實更作隂陽相移也陽并於隂則隂實而陽虛陽明虛則寒栗鼓頷也巨陽虛則腰背頭項痛三陽俱虛則隂氣勝隂氣勝則骨寒而痛寒生於內故中外皆寒陽盛則外熱隂虛則內熱內外皆熱則喘而渴故飲冷也此皆得之夏傷暑熱氣盛藏於皮膚之內腸胃之外此營氣之所舍也此令人汗空疏腠理開因得秋氣汗出遇風及得之以浴水氣舍於皮膚之內與衛氣並居衛氣者晝日行於陽夜行於隂此氣得陽而外出得隂而內薄內外相薄是以日作帝曰其間日而作者何也岐伯曰其氣之舍深內薄於隂陽氣獨發隂邪內著隂與陽爭不得出是以間日而作也帝曰善其作日晏與日早者何氣使然也岐伯曰邪氣客於風府循膂而下衛氣一日一夜大㑹於風府其明日日下一節故其作也晏此先客於脊背也每至於風府則腠理開腠理開則邪氣入邪氣入則病作以此作日稍晏也其出於風府日下一節二十五日下至骶骨二十六日入於脊內注於伏膂之脉其氣上行九日出於缺盆之中其氣日髙故作日益早也其間日發者由邪氣內薄於五臟橫連募原也其道逺其氣深其行遲不能與衛氣俱行不得皆出故間日乃作也帝曰夫子言衛氣每至於風府腠理乃發發則邪氣入入則病作今衛氣日下一節其氣之始發也不當風府其日作者奈何岐伯曰此邪氣客於頭項循膂而下者也故虛實不同邪中異所則不當其風府也故邪中於頭項者氣至頭項而病中於背者氣至背而病中於腰脊者氣至腰脊而病中於手足者氣至手足而病衛氣之所在與邪氣相合則病作故風無常府衛氣之發必開其腠理邪氣之所舍則其府也帝曰瘧先寒而後熱者何也岐伯曰夏傷於大暑其汗大出腠理開發因遇夏氣凄愴之水寒藏於腠理皮膚之中秋傷於風則病成矣夫寒者隂氣也風者陽氣也先傷於寒而後傷於風故先寒而後熱也病以時作名曰寒瘧帝曰先熱而後寒者何也此先傷於風而後傷於寒故先熱而後寒也亦以時作名曰溫瘧帝曰夫病溫瘧與寒瘧而皆安舍舍於何藏岐伯曰溫瘧得之冬傷於風寒氣藏於骨髓之中至春則陽氣大發邪氣不能自出因遇大暑腦髓爍肌肉消腠理發泄或有所用力邪氣與汗皆出此病藏於腎其氣先從內出之於外者也如是者陰虛而陽盛陽盛則熱矣衰則氣復反入入則陽虛陽虛則寒矣故先熱而後寒名曰溫瘧其但熱不寒者陰氣先絶陽氣獨發則少氣煩寃手足熱而欲嘔名曰疸瘧帝曰疸瘧何如岐伯曰疸瘧者肺素有熱氣盛於身厥逆上衝中氣實而不外泄因有所用力腠理開風寒舍於皮膚之內分肉之間而發發則陽氣盛陽氣盛而不衰則病矣其氣不及於隂故但熱而不寒氣內藏於心而外舍於分肉之間令人消爍肌肉故名曰疸瘧帝曰瘧未發其應何如岐伯曰瘧氣者必更盛更虛當氣之所在也病在陽則熱而脉躁在陰則寒而脉靜極則陰陽俱衰衛氣相離故病得休衛氣集則復病也衛與邪相并則病作與邪相離則病休其并於陰則寒并於陽則熱離於陰則寒已離於陽則熱已至次日又集而并合則復病也帝曰時有間二日或至數日或渴或不渴其故何也岐伯曰其間日發者邪氣與衛氣客於六府而有時相失不能相得故休數日乃作也瘧者陰陽更勝也或甚或不甚故或渴或不渴帝曰夫經言有餘者瀉之不足者補之今熱為有餘寒為不足夫瘧者之寒湯火不能溫也及其熱氷水不能寒也此皆有餘不足之類當此之時良工不能止必須其自衰乃刺之其故何也願聞其說岐伯曰經言無刺熇熇之熱無刺渾渾之脉無刺漉漉之汗故為其病逆未可治也夫瘧之始發也陽氣并於陰當是之時陽虛而隂盛外無氣故先寒栗也陰氣逆極則復出之陽陽與陰復并於外則陰虛而陽實故先熱而渴夫瘧氣者并於陽則陽勝并於陰則陰勝陰勝則寒陽勝則熱瘧者風寒之不常也病極則復至病之熱也如火之熱如風雨不可當也故經言曰方其盛時必毁因其衰也事必大昌此之謂也夫瘧之未發也陰未并陽陽未并陰因而調之真氣得安邪氣乃亡故工不能治其已發為其氣逆也帝曰善攻之奈何早晏何如岐伯曰瘧之且發也陰陽之且移也必從四末始也陽已傷陰從之故先其時堅束其處令邪氣不得入陰氣不得出審候見之在孫絡盛堅而血者皆取之此真往而未得并者也以上俱內經瘧論保命集云夏傷於暑秋必痎瘧蓋傷之淺也近而暴傷之重也逺而深痎瘧者久瘧也是知夏傷於暑濕熱閉藏而不能發泄於外邪氣內行至秋而發為瘧也初不知何經受病隨其受而取之有中三陽者有中三陰者大抵經中邪氣其症各殊同傷寒論之也故內經曰五臟皆有瘧其治各别太陽經者謂之風瘧治多汗之在陽明經者謂之熱瘧治多下之在少陽經者謂之風熱瘧治多和之此三陽受病皆謂之暴瘧也發在夏至後處暑前者此乃傷之淺者近而暴也在陰經者則不分三經皆謂之溫瘧宜以太陰經論之其發處暑後冬至前者此乃傷之重者逺而深也痎瘧者老瘧也故謂之久瘧丹溪云風暑之瘧當發汗夏月多在風凉處歇遂閉其汗而不泄故也惡飲食者必自飲食上得之無汗者要有汗發散為主帶補有汗者要無汗扶正氣為主帶散邪瘧病感虛者須以人參白术一二帖托住其氣不使下陷後使他藥內傷挾外邪同發必內生痰外以汗解散二陳湯加柴胡黃芩常山草果煎服久瘧不得汗者二陳湯加檳榔倍加蒼朮一方加柴胡葛根川芎一補一發不可直截老瘧係風暑入於陰分用血藥引出陽分則散當以當歸紅花黃柏川芎白朮蒼朮甘草白芷水煎露一宿空心服按瘧在隂分須徹起陽分者即格致論中云臟傳出至府亂而失期也又當因其汗之多寡而為補養升發之下陷謂陽氣下陷入陰血中無汗要有汗多用川芎葛根蒼朮升麻柴胡之屬此丹溪治瘧之微旨也心法附餘曰世用砒霜等毒藥截瘧差誤甚矣且俗名脾寒此因名而迷其實也苟因飲食所傷而得亦未必全是寒况其他乎在陽分者易治陰分者難治瘧毋必用毒藥消之行氣消堅為主脉訣舉要曰瘧脉自弦弦數多熱弦遲多寒隨時變遷心法附録曰有病久脉極虛微而無力似乎不弦然而必於虛微之中見弦但不搏手耳細察可見也生生子曰世俗皆視瘧為小病不分外感內傷勞倦虛弱在陽在陰之旨率以砒丹常山等毒劑劫之或以草藥嘗之又或指為鬼祟而以符水巫呪禁之禀受厚邪輕者偶中僥幸禀弱邪重者愈劫而愈陷矣於是遷延歲月咳嗽潮熱飲食減少每每變虛怯之候不思經曰邪之所凑其氣必虛輕病重治必成重病都緣不能脫俗故耳良可悲夫桂枝羌活湯處暑前後頭痛項强脉浮惡風有汗桂枝羌活防風甘草炙各等分為粗末每服五錢水一盞半煎至一盞迎發日溫服吐者加半夏麴麻黃羌活湯頭痛項强脉浮惡風無汗麻黃羌活防風甘草炙各等分煎法如前如吐加半夏麴等分二方皆太陽經白芷湯治瘧身熱目疼熱多寒少脉長睡卧不安先以大柴胡湯下之微利為度如下後微邪未盡者以此湯盡之白芷知母各一兩石膏四兩服法如前此陽明經桂枝石膏湯隔日一發先寒後熱寒少熱多桂枝五錢石膏知母各一兩半黃芩一兩右分作三服間日者邪氣所舍深也如外邪已罷內邪未已再下之從卯至午發者宜大柴胡湯下之從午至酉者知邪在內也宜大承氣湯下之從酉至子或至寅發者知邪在血宜桃仁承氣湯下之前項下藥微利為度再以小柴胡湯徹其微邪之氣桂枝芍藥湯寒熱大作不拘先後此太陽陽明合病也謂之大爭寒熱作則必戰動經曰熱勝則動也發熱則必汗泄經云汗出不愈知為熱也陽盛隂虛之症治當內實外虛不治恐久而傳入陰經也宜桂枝芍藥湯主之桂枝二錢黃芩知母芍藥石膏各五錢右服七錢水煎服如服前藥而寒熱轉大者知太陽陽明少陽合病也宜桂枝黃芩湯以和之桂枝黃芩湯治三陽合病甘草四錢五分石膏五錢知母五錢桂枝二錢柴胡一兩二錢黃芩四錢五分人參四錢五分半夏四錢右水煎服服後如外邪已罷內邪未已用大柴胡大承氣等湯下之麻黃黃芩湯治夜發者桃仁承氣湯亦治夜發者麻黃一兩去節甘草炙三兩桃仁三十枚去皮黃芩去蘆桂二錢五分服法同前桃仁味苦甘辛肝為血海血受邪則肝氣燥經云肝苦急急食甘以緩之故桃仁散血緩肝謂邪氣深逺而入血故夜發乃陰經有邪此發散血中風寒之劑麻黃桂枝桃仁乃太陽經血藥非三陰經藥也生生子曰已上皆劉守真分經治療法也與內經之旨皆相符合明其邪自外而來故治同傷寒也豫驗今之所發者除傷風所發外亦有多挾內傷者或從飲食所得或從勞倦所得此必先有所感而邪氣潛伏今為新傷所啓發也雖涉內傷而頭疼寒熱口渴等症亦不出前數法外矣豫每用所挾症之藥加於前各經治方之內錯綜治之亦不失古人意也故所向輒有功濟世方治先熱後寒者以小柴胡湯先寒後熱者小柴胡加桂枝湯多熱但熱者白虎加桂枝湯多寒但寒者柴胡薑桂湯按此亦前分經法也但此以寒熱多少定治然寒多而但寒不熱脉洪實或滑多有熱極而似水者為有餘治當下之若便以桂枝投之誤也如或多熱而但有熱者脉虛大或微弱當作虛治若便以白虎湯投之誤也故必須細心體認詳之以脉而以寒熱多少𠫭治庶為穩當仲景白虎加桂枝湯治朝發暮解暮發朝解其脉如平但熱無寒骨節疼煩便難此治溫瘧知母六兩甘草炙二兩石膏一斤粳米二合桂枝去皮三兩水煎服出汗愈柴胡桂薑湯治往來寒熱胸膈疼小便不利嘔而不渴治瘧寒多熱少或寒不熱柴胡半斤桂枝三兩去皮乾薑二兩括蔞根四兩黃芩二兩甘草炙二兩牡蠣二兩煅水煎服初服微煩再服得汗便愈柴胡去半夏加括蔞湯治瘧病後渴者亦治勞瘧柴胡八兩人參黃芩各三兩括蔞根四兩生薑二兩大棗十二枚甘草炙三兩水煎服一日兩三服效局方雙解飲子治瘧疾辟瘴氣神效食瘧尤佳肉豆䓻草豆蔲各二枚一枚麵煨熱一枚生用粉草二兩一半生一半炙厚朴二寸一半用薑汁炒一半生用生薑二塊如棗大一塊裹煨一塊生用右水煎空心服東垣云秋暮暑氣衰病熱瘧知其寒也此方主之實治寒瘧也人參養胃湯治飲食傷脾治寒多而熱少者胸膈痞悶不思飲食寒多者加薑桂熱多者加黃芩黃連柴胡方在寒門清脾飲治疸瘧脉來弦數或但熱不寒或熱多寒少口苦咽乾小便赤澀青皮去白厚朴薑製白朮半夏泡黃芩草果仁柴胡茯苓甘草炙各等分右每服七八錢薑五片不拘時服草果飲治內傷飲食作瘧胸腹飽悶草果蒼朮厚朴陳皮半夏甘草烏梅去核薑棗同煎寒多者加乾薑附子熱多者只加柴胡瘴瘧加檳榔柴苓湯寒熱汗後或大便作瀉方出傷寒門三聖飲治胸膈飽悶口渴熱多寒少蒼朮枳殼知母各三錢水煎服四聖飲治久瘧何首烏白芷青皮陳皮水煎空心服良方四將軍飲治瘧作仆厥不知人手足俱冷此雖一時救急之方用之有驗大附子炮去皮一枚訶子四枚去核陳皮四枚洗淨甘草炙四兩分作四服水一鍾半薑七片棗七枚煎折一半熱灌下立蘇方廣云瘧疾發作而僵仆不省人事者蓋由頑痰膠固於中營衛不行故也所以中風中暑而卒倒不省人事亦由痰之所致也附子性大熱走而不守本是治寒濕之藥今瘧僵仆而用之以其性能開散頑痰營衛流通故耳乃是劫劑不得已而用之也淡寮露薑飲胃中痰飲為瘧一方加蜜治痰嗽作吐生薑四兩搗汁露一宿空心冷服大治脾胃聚痰發為寒熱方廣云生薑自然汁凡中風中暑中氣乾霍亂一應卒暴之疾與童便同用立可解散蓋生薑能開痰童便能降火故也截瘧溫脾飲治脾虛痰涎上湧瘧發作則吐神效白朮五錢生薑五錢水煎空心服生生子曰按此亦丹溪白朮丸意也彼以白朮一味久服得汗乃愈此以生薑佐之故取汗速而效亦速也以上五方皆禁方王節齊治瘧活套柴胡白朮各一錢蒼朮一錢以上三味瘧疾必用之藥陳皮七分粉草炙五分乾葛一錢二分若一日一發及午前發者邪在陽分加枯黃芩茯苓半夏各一錢熱甚頭疼再加川芎軟石膏各一錢口渴加石膏知母麥冬各一錢若間日或三日發午後或夜發者邪在隂分加川芎當歸酒炒芍藥熟地黃酒炒知母各一錢酒洗紅花酒炒黃柏各四分提起陽分可截之若間一日連發二日或日夜各發者氣血俱病加八物湯再加黃茋補之若陽瘧多汗用黃茋人參白朮以斂之無汗柴胡蒼朮白朮黃芩乾葛以發之若陰瘧多汗用當歸白芍熟地黃黃蓍黃柏以斂之無汗柴胡蒼朮川芎紅花升麻以發之若病人胃氣弱飲食少或服截藥傷脾胃而少食者加人參一錢半酒炒芍藥大麥芽各一錢若飲食痞悶或有食積者加神麴麥芽枳實炒各二錢若痰盛加薑製半夏南星枳實炒各一錢黃芩黃連各六分若欲截之加檳榔黃芩青皮常山各一錢烏梅肉二枚若日久虛瘧寒熱不多或無寒而但微熱者邪氣已無只用八物湯加柴胡黃芩黃蓍陳皮以滋補氣血瘧母濟生鱉甲飲子瘧久不愈脅下痞滿腹中結塊名曰瘧母草果鱉甲醋炙黃蓍白朮白芍厚朴薑製檳榔橘紅川芎甘草炙各等分每服四錢水一鍾薑七片棗一枚烏梅少許煎服又方治瘧母鱉甲醋炙二兩三稜莪朮香附俱醋炒各一兩半橘紅一兩阿魏五兩右醋糊為丸梧子大薑湯下三十丸瘧母丸青皮桃仁紅花神麴麥芽鱉甲醋炙三稜蓬术海粉香附俱用醋煮右用神麴糊為丸梧桐子大每服五七十丸白湯下十將軍丸久瘧有瘧母不瘥或腹疼三稜去毛土炒蓬朮生用青皮去白橘紅各一兩草果去殼常山各二兩砂仁檳榔烏梅半夏泡各一兩右先將常山草果二味銼好酒醋各一碗入瓦器內先浸一宿後入八味藥同浸至晚炭火煮乾取出晒如無日色用火焙乾為末酒醋各半打糊為丸如梧桐子大每服三四十丸白湯吞下日進三服忌生冷魚腥醎酸油膩麵諸死毒物服四兩或八兩乃除根凡有積聚及行瘴濕地方並宜服小兒瘧疾痞塊生地白芍各一錢半陳皮川芎黃芩半夏各一錢粉草三分薑水煎調鱉甲末服瘧脹秋深久瘧胸中無物又無痰癖腹髙而食少俗謂瘧氣入腹宜蒼朮湯主之蒼朮四兩草頭烏一錢杏仁三十個右分作三服水煎一日服盡愈産後瘧草果飲子産後瘧疾多由汙血挾寒熱而作大法宜柴胡四物湯調之熱多者宜服此半夏泡赤茯苓草果煨去皮甘草炙陳皮川芎白芷各一錢二分紫蘇良薑青皮各六分乾薑二錢四分右分作二帖薑五片棗二枚當發日空心連進三服無不愈者生熟飲子治寒多者肉豆蔲草果仁厚朴半夏陳皮甘草大棗去核生薑各二錢半右以一半以濕紙裹煨香熟和勻一半生用和勻分作二帖水煎空心一服食後一服二渣並煎午前服盡彭用光治瘧活套如連日或間日惡寒發熱頭項腰背痛此太陽經二陳加柴胡羌活藁本防風如連日或間日先寒後熱或寒少熱多或但熱不寒目痛鼻乾此陽明經二陳加葛根升麻石膏知母白芷如連日或間日先寒後熱或寒熱間作脅痛口苦嘔惡此少陽經二陳加柴胡黃芩青皮如子午卯酉日發寒熱嘔吐舌乾口燥此少陰瘧二陳加當歸川芎黃柏黃連柴胡如辰戌丑未日發寒熱嘔吐不嗜食或腹滿自利此太陰瘧二陳加蒼朮白朮柴胡芍藥如寅申己亥日惡寒發熱寒多熱少或腹痛引陰器如淋狀善恐此厥陰瘧二陳加桂枝附子乾薑柴胡升麻三陽之瘧宜汗宜吐麻黃葛根柴胡常山草果烏梅之屬三陰之瘧宜下宜溫宜和大柴胡湯柴胡桂薑湯柴胡四物湯附子理中湯加升麻柴胡之類泄痢生生子曰仲景河間東垣諸公多以泄痢混同論治究其源皆本之於難經五十七難五泄中來云小腸泄大瘕泄即是腸癖膿血也故治法亦多相須但初學之士未易尋繹故豫不揣庸腐芟繁入簡以經文列之於前而諸賢次之以見古人著方立法之意然後發明泄痢形狀而以丹溪之見折而衷之仍分泄痢為二門初不敢遽分者以其有先痢而後泄有先泄而後痢有痢不因泄有泄不因痢治有次第症有輕重也以古論不可分者為綱以今之名症者為目使後學易以辨别而難治之症亦得以備參考也難經云有胃泄有脾泄有大腸泄有小腸泄有大瘕泄名曰後重保命集云胃泄者飲食不化色黃以大承氣湯下之脾泄者腹脹滿泄注食即嘔吐逆建中理中湯主之大腸泄者食已窘迫大便色白腸鳴切痛乾薑附子湯主之小腸泄者溲而便膿血少腹痛承氣湯下之大瘕泄者裏急後重數至圊而不能便莖中痛胃大小腸三症皆清凉飲子主之其泄自止厥陰症莖中痛加甘草以隂症裏急後重加大黃滑伯仁曰瘕結也謂因有凝結而成者也裏急謂腹內急迫後重謂肛門下墜惟其裏急後重故數至圊而不能便莖中痛者小便亦不利也出難經本義謝堅白曰小腸大瘕二泄今所謂痢疾也內經曰腸澼故下利赤白者灸小腸俞是也穴在第十六椎下兩旁各一寸五分纍驗出難經本義四明陳氏曰胃泄即飱泄也脾泄即濡泄也大腸泄即洞泄也小腸泄謂凡泄則小便先下而便血即血泄也大瘕泄即腸澼也靈樞經曰腸中寒即腸鳴飱泄腸中熱即出黃如麋脉要精微論曰胃脉虛則泄仲景曰大腸有寒者多騖溏有熱者便腸垢下痢脉微弱數者為欲自止雖發熱不死下痢有微熱而渴脉弱者亦自愈下痢脉數而渴者合自愈設不愈必清膿血以有熱故也下痢脉數有微熱汗出合自愈設脉緊為未解下痢脉反弦身熱汗者自愈下痢脉沈而遲其人面少赤身有微熱下痢清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也下痢脉沈弦者下重下痢寸口反浮數尺中自澀者必清膿溲病若腹大而泄者脉當細微而澀反緊大而實者死下痢脉大者為不止下痢一日十餘行脉反實者死素問云泄而脉大難治病泄脉洪大是逆也靈樞云飱泄脉小者手足寒難已飱泄脉小手足溫易已腹鳴而滿四肢清泄其脉大是逆也如是者不過十五日死矣腹大脹四末清脫形泄甚是逆也如是者不及一時死矣經云五虛者死脉細皮寒氣少泄痢前後飲食不入此謂五虛其漿粥入胃泄注止則虛者活丹溪嘗謂治數人在下則泄瀉不止上則吐痰不已皆死蓋氣脫無所管攝故也若用參朮膏救之早者十活二三病機機要云臟腑瀉痢其症亦多大抵從風濕熱論之是知寒少熱多寒則不能久也故曰暴泄非隂久瀉非陽論曰春宜緩形形動則肝木乃榮反靜密則是行秋令金能制木風氣內藏夏至則火盛而金去獨火木旺而脾土損矣輕則飱泄身熱脉洪穀不能化重則下利膿血稠粘裏急後重故曰諸泄稠粘皆屬於火經云溲而便膿血知氣行而血止也宜大黃湯下之是為重劑黃芩芍藥湯是為輕劑是實則瀉其子木能自虛而脾土實矣故曰春傷於風夏必飱泄此逆四時之氣人所自為也此一節謂熱泄而滯下也又有自太陰經脾受濕而為水泄虛滑微滿身重不知穀味假令春宜益黃散補之夏宜泄之法云宜補宜泄宜和宜止和則芍藥湯止則訶子湯久則防變為膿血是脾經傳受於腎謂之賊邪故難愈也若先利而後瀉謂之微邪故易安此皆脾土受濕天之所為也雖聖智不能逃口食味鼻食氣從鼻而入留積於脾而為水泄也此一節濕泄所謂泄瀉也有厥陰經動下利不止其脉沈而遲手足厥逆涕唾膿血此證難治宜麻黃小續命湯汗之法云為有表邪縮於內當散之而自愈此一節風泄所謂久泄也有暴下無聲身冷自汗小便清利大便不禁氣難布息脉遲嘔吐急以重藥溫之漿水散是也此一節寒泄所謂暴泄也故法云後重則宜下腹痛則宜和身重則除濕脉弦則去風血膿稠粘以重藥竭之身冷自汗以毒藥溫之風邪內縮汗之鶩溏為利溫之又云在表者汗之在裏者下之在上者湧之在下者竭之身表熱者內疏之小便澀者分利之又曰盛者和之去者送之過者止之兵法云避其來鋭擊其惰歸此之謂也凡病泄而惡寒是太陰傳少陰是土來尅水也用除濕白朮茯苓安脾白芍藥桂枝黃連破血也火邪不能勝水太陰不能傳少陰而反火邪上乘肺經而痢必白膿也加芍藥當歸之類又裏急後重脉大而洪實為裏實痛甚者是有物結墜也宜下之若脉浮大甚不宜下雖裏急後重而脉沈細弱者謂寒邪在內而氣散也可溫養而自愈裏急後重閉者大腸經氣不宣通也宜加檳榔木香宣通其氣如痢或泄而嘔者胃中氣不和也上焦不和治以生薑橘皮中焦不和治以當歸茯苓桂下焦寒不和治以輕熱藥甚者重熱藥大便虛祕澀久不愈恐太陰𫝊少隂多傳變為痢太陰傳少陰是為賊邪先以枳實厚朴湯以防其變若四肢懶倦小便少或不利大便走沈困飲食減宜調胃去濕白朮芍藥茯苓三味水煎服以白术之甘能入胃而除脾胃之濕芍藥之酸澀除胃中之濕熱四肢沈困茯苓之淡泄能通水道走濕此三味泄痢須用此如發熱惡寒腹不痛加黃芩為主如未見膿而惡寒乃太陰欲傳少陰也加黃連為主桂佐之如腹痛甚者加當歸倍芍藥如見血加黃連為主桂當歸佐之如煩躁或先便白膿後血或發熱或惡寒非黃芩不止上部血也如惡寒脉沈先血後便非地榆不能除下部血也如惡寒脉沈或腰痛或臍下痛非黃連不除此中部血也如便膿血相雜而脉浮大慎不可以大黃下之下之必死謂氣下竭也而陽無所收凡陰陽不和惟以分陰陽藥治之又云暴泄非陰久泄非陽大便完穀下有熱者脉疾身動聲亮暴注下迫此陽也寒者脉沈而細身困鼻息微薑附湯主之身重不樂朮附湯主之渴引飲者是熱在膈上水多入則自胸膈入胃中胃本無熱因不勝其水名曰水恣胃受水攻故水穀一時下此證當灸大椎三五壯立己乃督脉瀉也如用藥使車前子白朮茯苓之類五苓散亦可又有寒泄者大腹滿而泄又有鶩溏瀉者是寒泄也鶩者鴨也大便如水其中有少結糞者是也如此者當用天麻附子乾薑之類又法云泄有虛實寒熱虛則無力不及拈衣未便已泄出謂不能禁固也實則數至圊而不便俗云虛坐努責是也裏急後重皆依前法進退大承氣湯主之按已上述泄利寒熱虛實脉證輕重治法極為詳悉最當深玩泄痢辨丹溪云泄瀉之症水穀或化或不化並無努責惟覺困倦若滯下則不然或膿或血或膿血相雜或腸垢或無糟粕或糟粕相雜雖有痛不痛之異然皆無裏急後重逼迫惱人泄瀉門生生子曰泄瀉要分新久時令寒熱虛實及飲食痰積數者內經曰濕勝則濡泄甲乙經云氣客下焦傳為濡泄羅太無曰夫脾者五臟之至陰惡寒濕今寒濕之氣內客於脾故不能禆助胃氣腐熟水穀致清濁不分水入腸間虛莫能制故洞泄如水隨氣而下謂之濡泄法當除濕利小便治之以對金飲子平胃散五錢五苓散二錢五分草豆蔲麵煨五錢右分二服薑棗同煎出濟世方名對金飲子王叔和曰濕多成五泄生生子曰新泄瀉多是濕治濕瀉之法宜燥脾利水胃苓湯五苓散之類胃中氣下快心不痞氣加枳殼木香如有痰加半夏如惡心加藿香砂仁如腫滿加桑白皮赤小豆有熱加黃芩木通滑石之類减桂有寒加髙良薑乾薑桂心之類稍久不止者東垣升陽滲濕湯或蒼朮防風湯用風藥者謂風能勝濕也若飲食所傷以平胃散加消導之劑久泄多是積劉河間云有太陰陽明二症當進退大承氣湯主之既久泄矣而又以承氣湯下之者必其積滯膠固脉結實不虛非常法可效故用此推陳致新不可姑息也太陰症不能食也當先補而後瀉乃進藥法也先煎厚朴半兩俱依本方加减水一盞半煎七分服若三兩服後未已如稍加食尚有熱毒加大黃二錢推過泄止住藥如泄未止謂腸胃有塵垢滑粘加􅉭硝三錢令宿垢去盡則愈也陽明症能食是也當先瀉而後補乃退藥法也先用大承氣湯五錢水一盞半煎七分稍熱服如泄未止去芒硝後熱少退减大黃一半煎兩服如熱氣雖已其人必腹滿又减去大黃以枳實厚朴湯服三兩服如腹脹滿退泄亦自愈後服厚朴湯數服則已仲景云下痢已瘥至其月日又復發者以其積去不盡故也當下之以大承氣湯此熱積寒下也本事方治痼冷在腸胃間頻年腹痛泄瀉休作無時服諸熱藥不效宜先取去積滯然後調治不可畏藥以養病也厚朴丸厚朴乾薑甘草桂心附子生各二錢大黃生細切水一盞浸半日煎汁用之右水二碗煎八分後下大黃汁再煎六合溫服自夜至曉分三服之盡止或更以乾薑丸佐之乾薑丸乾薑巴豆去心殼研碎炒黃大黃人參各一兩右為末同巴豆研勻加煉蜜為丸如梧桐子大食前用湯吞下一丸陳米飲吞亦可後服白术散白术散推後以此溫補之白术木香附子人參各等分右為末每服二錢生薑三片棗一枚煎六分溫服痰積泄瀉海石青黛黃芩神麴半夏麴霞天膏造者尤妙右為丸每服三五十丸右積滯泄瀉必腹中耕痛痛而泄泄而痛止者是也或肚滿按之堅者亦是也受病淺者以保合丸等消導之深而頑者必須推去陳積然後乃止也實脾固腸丸泄瀉月久不止及脾泄無度者白术陳土炒四兩粟殼去膜蜜炒二兩蒼术米泔浸厚朴薑製陳皮各一兩半人參炮乾薑炙甘草茯苓各二兩肉果麵煨訶子去核各二兩砂仁一兩酒糊為丸梧桐子大每服七十丸空心米湯下虛寒加附子一錢滑脫不禁加龍骨赤石脂俱煅一兩飱泄素問云清氣在下則生飱泄又云春傷於風夏必飱泄又云久風為飱泄劉河間曰飱泄者乃水穀不化而完出因水入胃亦非前水恣症也先以宣風散導之出錢氏方中四味者是也後服蒼朮防風湯蒼朮去皮四兩麻黃去根節四兩防風去蘆五錢右為粗末每服一兩生薑七片水二盞煎至一盞溫服泄止後服椒朮丸椒朮丸蒼朮二兩川椒一兩去目炒為極細末醋糊為丸如梧桐子大每服三十丸食前溫湯下如惡痢久不愈者彌佳小兒亦佳東垣曰飱泄是清氣在下乃胃氣不升上古聖人皆以升浮藥扶持胃氣一服而愈知病在中焦脾胃也脉訣曰濕多成泄病本在胃真氣弱真氣者穀氣也不能尅化飲食乃濕盛故也以此論之正以脾胃之弱故也初病奪食或絶不食一二日使胃氣日勝泄不作也今已成大泄矣經云治濕不利小便非其治也又云在下者引而竭之惟此症不然此病既得之於胃氣下流清氣不升陽道不行只宜升宜舉不宜利小便靈樞云頭有疾取之足謂陽病在陰也足有疾取之上謂陰病在陽也中有疾傍取之傍者少陽甲膽是也中者脾胃也甲膽者甲風是也東方春也胃中穀氣者便是風化也作一體而認故曰胃中濕勝而成泄瀉宜助甲膽風以勝尅之又是升陽氣助清氣上行之法也又一說中焦元氣不足溲便為之變腸為之苦鳴亦緣胃氣不升故令甲氣上行又云風勝濕也大抵此症本謂氣弱不能化食奪食則一日而可止夫奪食之理為胃弱不能尅化食則為泄如食不下何以作泄更當以藥滋養元氣令和候泄止漸與食胃勝則安矣若食不化者於升陽風藥內加炒麴同煎兼食入頓至心頭者胃之上口也必吐沃沫或食入反出皆胃土停寒其右手關脉中弦按之洪緩是風熱濕相合穀氣不行清氣不升為弦脉之寒所隔故不下也麴之熱亦能去之若翻胃者更加半夏生薑入前風藥內同煎奪食少食欲使胃氣强盛也若藥劑大則胃氣不勝藥泄亦不止當漸漸與之今病既久已至衰弱當以常法治之不可多服餌也人之肌肉如地之土豈可人而無肉故肉消盡則死矣消瘦人有必死者八內經有七外經有一又病肌肉去盡勿治之天命也如肌肉不至瘦盡當急療之宜先奪食而益氣便與升陽先助真氣次用風藥勝濕以助升騰之氣病可已矣餘皆勿論此治之上法也治用升陽除濕湯之類車前子散治水瀉不止以車前子炒為末米飲調下二錢立止若夏秋之間濕熱大行暴注水泄以益元散治之或五苓散加木通口渴者加葛根黃芩芍藥若胸膈飽悶腹中作脹以胃苓湯治之又泄暴而不止者以止泄丸治之止泄丸肉豆蔲五兩滑石飛右為末擂飯丸惟滑石夏三兩五錢秋二兩春冬一兩二錢升陽除濕湯治脾胃虛弱不思飲食泄瀉無度小便黃四肢困倦自下而上引而去之升麻防風柴胡羌活神麴澤瀉猪苓陳皮各五分甘草炙麥芽各三分右水煎食逺服如胃寒腸鳴加益智半夏各五分薑棗同煎非腸鳴不用白朮芍藥湯潔古治太隂脾經受濕水瀉注下體重微滿困弱無力不欲食暴泄無數水穀不化先宜白朮芍藥湯白朮芍藥各一兩粉草五錢俱要炒黃效速分作二服水煎溫服腹疼甚者宜蒼朮芍藥湯蒼朮芍藥湯治水瀉腹疼並治痢蒼朮芍藥各一兩黃芩五錢桂一錢三分分二服水煎溫服脉弦頭疼者宜蒼术防風湯蒼朮防風湯治水泄飱泄脉弦頭疼皆效蒼朮五錢防風五錢水煎溫服此已上症如心下痞每服加枳實一錢如小便不利加茯苓二錢如腹疼漸已泄下漸少宜訶子散主之寒泄者大便完穀不化或口不渴而小水清利腹中鳴時常喜熱手按摩或過食凉藥所致調中散治虛寒停食嘔吐腸鳴泄瀉砂仁蓬朮乾薑炮桂心茴香炒草果麥芽炒橘紅益智仁藿香葉各一錢蒼朮炒神麴炒桔梗各一錢半甘草炙三分薑棗煎臨服加鹽少許大藿香散治一切脾胃虛寒嘔吐霍亂心腹撮痛如泄瀉不己最能取效藿香二兩陳皮厚朴薑汁炒青皮炒木香人參肉豆蔲煨良薑炒大麥芽炒神麴訶子煨去核白茯苓去皮甘草炒各一兩乾薑炮五錢為末吐逆泄瀉不下食或嘔酸苦水用水一大盞煨生薑半塊鹽一撮煎服養胃湯治脾胃虛寒嘔逆惡心腹脅脹疼腸鳴泄瀉方出瘧門理中湯寒而虛者桃花丸赤石脂乾薑胡椒扶脾丸脾胃虛寒腹中痛溏泄無度飲食不化白朮茯苓甘草炙訶子半夏烏梅肉各二錢紅豆乾薑肉桂各五錢麥芽神麴各四錢陳皮一錢右為末荷葉燒飯為丸如梧桐子大每服五十丸溫湯下二方加藿香一錢乾薑散治水瀉無度乾薑為末粥飲調下一錢效衍義云一人大腸寒小便精出諸熱藥服至一斗二升不效後教服赤石脂乾薑各一兩胡椒五錢同為末醋糊為丸如梧桐子大空心及食前米飲下五七十丸服四劑遂愈本事方訶子丸脾胃不和泄瀉不止諸藥不效訶子皮乾薑肉豆蔲龍骨木香附子赤石脂各等分為末糊丸每服三四十丸米飲下漿水散治暴泄如水周身汗出一身盡冷脉沈弱氣少而不能語甚者加吐此為緊病潔古方附子乾薑甘草良薑半夏桂右為末每服五錢水煎熱服甚者三四服若下痢為鶩溏大腸不能禁固大便欲了不了小便清此寒也宜溫之春夏桂枝湯秋冬白朮散羅謙甫云鶩溏者大便如水其中有少結糞是也桂枝湯桂枝芍藥白朮各五錢粉草炙一錢分四服水煎服小白朮散白朮芍藥各三錢乾薑炮五錢甘草炙二錢如前煎服甚者除乾薑加附子一二錢謂辛能發散也熱瀉口渴小水短赤糞如糜益元散燈心湯或井花水調下白芍黃芩木通湯治水瀉小水短赤白芍二錢黃芩二錢木通八分白朮一錢澤瀉一錢茯苓七分水煎溫服厚腸散治腹疼瀉黃及瀉久不止熱藥不效者及治酒積泄川黃連好酒煮日夜煮乾炒為末每用二錢空心米飲下豆蔲香連丸治泄瀉不問寒熱陰陽不調下痢赤白腹脹攻痛其效如神黃連二錢肉豆蔲木香各一錢右為末粟米飲為丸如米粒大每服十丸米飲下漸加二三十丸日夜各四五服清六丸去三焦濕熱泄瀉兼治産後腹痛或自痢者能補脾亦治血痢六一散三兩紅麴炒五錢用此活血酒糊為丸多與清化丸同服並不單用虛瀉脉弱無力飲食少四肢倦足背浮腫口渴皆所當補錢氏白朮散治瀉久虛弱清氣下陷口渴或腹中氣不轉運或不思食或惡心人參白朮茯苓粉草葛根木香藿香俱為末每服二錢米飲調下參苓白朮散脾虛泄瀉浮腫人參二斤半白朮二斤薏苡仁一斤扁豆二斤半山藥桔梗各一斤蓮肉二斤半砂仁一斤茯苓一斤甘草炒半斤為末每服二錢米飲調下人參升胃湯大便一日三四次溏而不多有時腹鳴泄瀉小便黃黃蓍二錢甘草炙二分升麻六分柴胡歸身陳皮益智各二錢紅花少許人參六分水煎食前熱服一味白朮散治久瀉脾虛脾泄如神土白朮米泔水洗淨切片每一斤用陳皮半斤入甑一層層間隔蒸一日炒乾去陳皮為末每服二錢米飲調下理中湯虛寒作瀉或吐瀉不止精神虛憊甚者加大附子名附子理中湯方在寒門參苓滑石湯治泄而困倦小便不利脉數有虛熱白朮滑石各一兩黃芩人參芍藥各五錢木通陳皮各三錢乾薑一錢甘草炙一錢分八帖水煎服桂香丸臟腑虛為風寒所搏冷滑注下不禁老人虛人危篤纍效大附子炮去皮臍肉果炮白茯苓各一兩桂心乾薑木香泡各五錢丁香一分糊丸梧桐子大米飲下五十丸固中丸治脾久泄去後與氣不快者蒼朮肉果煨各一兩粥丸桐子大每服五十丸固下丸治腎久泄即前方加破故紙一兩炒東垣白朮神麴丸老人奉養太過飲食傷脾常時脾泄白朮炒二兩白芍酒炒一兩神麴炒一兩半山查二兩半夏製一兩黃芩炒五錢右為末用青荷葉燒飯為丸菉豆大每服百丸實泄泄瀉腹疼或有積滯維明新久新者以消導之劑久者以前久泄門按寒熱調治枳實導滯丸木香檳榔丸七聖丸腎泄早晨瀉一次者也愚謂亦不止如此曽記一老人脾泄二十年一日夜三五次夜多日少以破故紙鹽水炒五錢白朮炒二錢杜仲鹽水炒三錢澤瀉一錢水煎空心服二帖即愈緣腎者胃之關腎虛則下焦不約故也東坡四神丸治腎泄下元虛寒尤宜破故紙炒四兩肉蔲麵煨二兩木香五錢小茴香炒一兩以生薑四兩煮紅棗肉為丸如梧桐子大每空心鹽湯吞下五六十丸金鎖正元丹腎虛泄瀉小便頻數盜汗遺精一切虛冷之症龍骨煅朱砂另研各三兩茯苓八兩紫巴㦸去心一斤肉從蓉洗焙葫蘆巴焙各一斤補骨脂酒浸炒十兩五棓子八兩右為末酒糊丸桐子大每服三十丸空心溫酒鹽湯下五味子丸治下元虛寒火不生土及腎中之土不足以致關門不閉名曰腎泄亦名脾腎泄人參五味子破故紙炒白朮各二兩山藥炒白茯苓各一兩半吳茱萸川巴㦸去心肉果麵煨各一兩龍骨煅五錢右酒為丸如梧桐子大每服七十丸空心鹽湯下痢門已前諸公皆釋名滯下經書又云腸澼泄痢二症前綱中病機機要論寒熱虛實治法甚詳陳無擇朱丹溪劉宗厚王節齊諸公又各有發明今摘其緊要逐一詮次以便按治內經曰飲食不節起居不時者陰受之陰受之則入五臟䐜滿閉塞下為飱泄久為腸澼是也內經曰腸澼便血身熱則死寒則生腸澼下白沫脉沈則生浮則死腸澼之屬身不熱脉不懸絶滑大者生懸澀者死以臟期之脉經曰腸澼下膿血脉沈小留連者生數疾且大有熱者死又腸澼筋攣其脉小細安靜生浮大緊死脉訣舉要曰無積不痢脉宜滑大浮弦急死沈細無害祕藏云假令傷寒飲食䐜脹滿而傳飱泄者宜溫熱之劑以消導之傷濕熱之物而成膿血者宜苦寒之劑以內疏之風邪下陷升舉之濕氣內勝者分利之裏急者下之後重者調之腹痛者和之洞泄腸鳴無力不足拈衣其脉弦細而弱者溫之收之膿血稠粘數至圊而不能便其脉洪大而有力者寒之下之陳無擇云滯下之症內經所載血溢血泄血便注下古方則有清膿血近世呼為痢疾其實一也多由脾胃不和飲食過度停積於腸胃不能化又為風寒暑濕之氣干之故為此疾傷熱則赤傷冷則白傷風則純下清血傷濕則下如豆汁治法當先用通利之藥疏調臟腑原病式曰或言下痢白為寒者誤也若果為寒則不能消穀何由反化為膿也所謂下痢穀反化為膿血如榖肉果菜濕熱甚則自化腐爛潰發化為膿血也其熱為赤熱屬心火故也其濕為黃濕屬脾土故也燥鬱為白屬肺金也然諸瀉痢皆屬於濕濕熱甚於腸胃之內而腸胃怫鬱以致氣液不得宣通而成腸胃之燥使煩渴不止也假如下痢赤白俗言寒熱相兼其說尤誤豈知水火陰陽寒熱者猶權衡也一髙則必一下一盛則必一衰豈有寒熱俱甚於腸胃之間而同為痢乎如熱瘡瘍而出白膿者亦可以白為寒歟其在皮膚之分屬金故色白也次在血分屬心火故為血也在肌肉屬脾土故作黃膿在筋部屬肝木故其膿色帶蒼深至骨屬腎水故紫黑血出也各隨五臟而見五色是其標也本則一出於熱但分淺深而巳大法下迫窘痛後重裏急小便赤澀皆屬於燥熱而下痢白者必多有之然則為熱明矣玉機微義云河間謂赤白不當分冷熱乃屬心火肺金之化也五色各屬五臟本則一出於熱其論甚當緣心主血肺主氣白屬肺金此氣受病也赤屬心火此血受病也赤白相雜氣血俱受病也知此則肝青脾黃腎黑之說亦可得而互明矣丹溪謂赤自小腸而來白自大腸而來愚謂大小腸亦心肺之腑也但不若劉宗厚以氣血言尤為明白統旨曰河間發明痢本於濕熱最為詳切至行血則便膿自愈調氣而後重自除誠哉至言也又謂痢雖有赤白而一本之於熱此足以破局方好行辛熱者之弊也然痢之白者不可盡歸之於熱亦有因於寒者痢如凍膠或如鼻涕明是冷症此緣多啖生冷脾胃受傷氣微而滯下生焉非薑桂之辛熱不可也又其日久而不愈腸胃氣虛始為熱而末變寒或過服冷藥以致脾胃中寒此亦宜有以溫之也滯下亦有挾虛挾寒丹溪曰或問河間之言滯下似無挾虛挾寒者然乎否乎豫曰泄利之病水穀或化或不化並無努圊惟覺困倦若滯下則不然或膿或血或膿血相雜或腸垢或無糟粕或糟粕相混雖有痛不痛大痛之異然皆裏急後重逼迫惱人似乎皆熱症實症也豫近年涉歷亦有大虛大寒者不可不知如治豫從叔婁長官等皆用參朮及乾薑薑汁之類是也劉宗厚曰按滯下之症古人多與泄瀉同論至三因方始能另立條目蓋實有不同夫病有從外感而得者須分六氣之異外既受傷腸胃欎結遂成赤白等症當隨其寒熱溫凉以調之有因臟氣發動干犯腸胃而得者須察其何臟相兼以平治之又有因飲食失節而得者則又審其何物所傷以消尅之但其受病之後腸胃怫鬱膿血稠粘裏急後重諸方雖有寒熱虛實之論劉河間則以為一出於熱然考之內經似亦熱多而寒少也我丹溪先生則以為亦有挾虛挾寒之症深戒學者須宜識此世之局方不辨三因專用澀熱之藥其失甚矣至河間立說專用苦寒疏下之藥則亦未甚為當何則蓋病有虛實治有先後若病氣暴至元氣壯實積滯膠固須宜下之病久氣脫腸胃虛滑不禁者亦宜溫之澀之大抵治痢當從仲景河間之法可溫則溫可下則下或解表或利小便或待其自已劉河間分在裡在表挾風挾熱挾寒等症後之作者無越於斯但氣血一條未嘗表出立論其於芍藥湯下有曰行血則便膿自愈調氣而後重自除蓋謂便膿血是血之滯下也故曰行血自愈奔迫後重氣之實也故曰調氣自除誠哉是言但膿血赤白亦有氣病血病之分後重裡急亦有氣實血實之異學者尤不可不察裏急後重有寒熱虛實及在氣在血之異滑伯仁曰裏急謂腹內急迫後重謂肛門下墜惟其裏急後重故數至圊而不能便也愚謂此皆脾胃不和或為風寒暑濕令氣所干或為積滯膠固纒墜或病久陽氣下陷丹溪曰後重本因邪壓大腸不能升上而重墜也用大黃檳榔藥者乃瀉其所墜之邪也及久痢與通蕩之後而後重仍在者知大腸虛滑不能自收而重是以用御米殼訶子五棓子等澀劑收其氣而固其滑也然大腸為邪壓下之重其重至圊後不减虛滑不收之重其重至圊後隨減以此辨之百發百中也愚謂氣虛下陷而重者雖用收澀之劑仍必以升補藥兼之又云有服升消藥不效者用秦芁皂角子大黃當歸桃仁枳殼黃連等劑若大腸風盛者可作丸服綱目云自古治裏急後重但用檳榔木香調氣及大黃下積至丹溪始用桃仁滑石滑其死血如鼓應桴實發前人所未發也又云下墜在血活之後此為氣滯宜前藥加檳榔一枚蓋後重者當和氣積與氣墜下者當兼升兼消升謂升麻之類消謂木香檳榔之類發熱丹溪曰發熱惡寒身首俱痛此為表症宜微汗和解蒼朮川芎陳皮芍藥粉草生薑又云有外感者小柴胡湯去人參又云下痢發熱久不止者屬陰虛用寒凉藥必兼升散並熱藥薑桂之屬是也又云下痢初發熱必用承氣湯下後參症用藥發熱不惡寒脉洪者宜大承湯若惡寒者忌下愚謂發熱而小便不利者柴苓湯加滑石木通夏秋發熱惡心胸腹飽悶不思飲食藿香正氣散不飽悶者倉廩湯令氣及時疫痢綱目云夏月痢疾用黃連香薷飲加甘草芍藥生薑神效者蓋夏月之痢多屬於暑潔古治處暑後秋冬間下痢用厚朴湯大效者蓋秋冬之痢多屬寒大全良方云有一境內上下傳染長幼相似是疫毒痢也治法雖當參運氣之相勝亦不可拘泥當先審虛實冷熱首用敗毒散加人參甘草陳皮薑隨症用之身重身重不知穀味及下如豆汁者皆是足太陰脾經受濕也東垣升陽除濕防風湯升陽益胃湯和中益胃湯出蘭室祕藏濕熱中腹痛病機機要云腹痛者宜和劉宗厚云和之一字總言之耳因氣鬱結不行宜行氣開欎挾寒者溫中湯大熱者黃芩芍藥湯積滯者木香導氣湯血虛者當歸芍藥湯亦有因肺金之氣鬱在大腸之間以苦梗發之丹溪云下痢腹痛用薑桂溫散之法如建中湯加薑是也內經云寒氣客於小腸小腸不得成聚故腹痛後泄又云太陽病冬月感寒則泄當臍而痛是以今之用溫散者良以此也仲景治痢不分赤白久新但腹痛甚其脉弦急或澀浮大按之空虛或舉按皆無力以建中治之甚效白膿玉機微義曰白屬肺金此氣受病也統旨曰痢如凍膠或如鼻涕者為冷非薑桂之辛熱莫效丹溪方治白痢蒼朮白朮神麴茯苓地榆甘草水煎服又方治白痢腹脹飲水過度者蒼朮白朮厚朴茯苓滑石神麴粉草水煎食前服飲食不思吞保和丸三五十丸蒼朮芍藥湯痢疾痛甚者方在泄瀉戊巳丸治脾經受濕泄痢不止米穀不化臍腹刺痛黃連吳茱萸白芍藥各三錢右為末麵糊為丸梧桐子大每空心米飲吞下三十丸升陽去濕防風湯如大便閉或裏急後重數至圊而不能便或少有白膿或少有血慎勿利之升舉其陽則陰自降矣蒼朮四兩米泔製防風三錢白朮一錢茯苓一錢白芍一錢右每服一兩先用蒼朮以水二盞半煎至二盞納諸藥同煎至一盞空心稍熱服胃風湯治風入腸胃作痢或白或赤或如豆汁方在下血溫中湯治白痢腹疼飽脹不思飲食蒼朮木香乾薑炮各一錢五分厚朴砂仁青皮芍藥炒各一錢二分加煨薑二片水煎食前服又方治大人小兒白痢如魚凍白鴨血用好酒泡乘熱服下立止赤膿玉機微義曰赤屬心火此血受病也治赤白痢香連丸治冷熱不調下痢赤白膿血相雜裏急後重黃連去蘆二十兩吳茱萸十兩煎湯浸同炒赤色去茱萸不用木香五兩不見火右為細末醋糊為丸如梧桐子大每空心白米飲下祕法以生薑細茶濃煎吞下尤妙導氣湯治下痢赤白裏急後重日夜無度白芍藥一兩當歸五錢大黃二錢五分黃連一錢黃芩二錢五分木香一錢檳榔一錢每服一兩水煎食前溫服木香枳殼湯治痢疾裏急後重開胸膈進飲食破滯氣散內熱木香檳榔陳皮去白黃連蓬朮煨當歸枳殼去穰炒青皮去穰各五錢香附黃柏各一兩半黑牽牛取頭末淨一兩右為末滴水為丸梧桐子大每服五十丸或七十丸薑湯下如腫毒加至二百丸利五七行立消木香檳榔丸治症同前木香檳榔青皮蓬朮枳殼黃柏大黃各五錢香附二兩黑丑取頭末二兩右為末滴水為丸梧桐子大每服五六十丸白湯下黃連阿膠丸治冷熱不調下痢赤白裏急後重臍腹疼痛口燥煩渴小便不利阿膠炒二兩黃連三兩茯苓三兩右黃連茯苓為末水化阿膠為丸如梧桐子大每服三五十丸米飲下木香導滯湯木香二錢白芍當歸枳殼各一錢二分檳榔一錢五分大黃二錢黃連一錢水煎食前溫服純鮮血傷風而下清血者宜祛逐之風傷肝肝藏血故下清血者為風也右謂下痢純血者死此亦要看兼症及以脉參之未必盡死豫嘗治數人皆生方用佛手散加阿膠秦艽炮薑地黃黃連地榆蒲黃之類或以四物湯擇前所加藥一二味增入不必盡加也又不可純用寒凉衍義云有一男子患血痢醫用寒凉藥逆制專用黃連木香治之此藥始感便用則可久病腸虛者不宜服戒之又云地榆性沈寒苦惟下熱血痢則可用若寒人及水瀉白痢皆未可輕用王好古曰血痢當服胃風湯膠艾湯之類仲景治下痢便膿血者桃花湯主之丹溪云桃花湯為下血虛且寒者而用非乾薑之溫石脂之澀且重不能止其血也用糯米之甘以引入腸胃集驗方治血痢用乾薑燒黑存性出火毒為末每服一錢米飲下黃連香茹飲治感暑下痢純血清暑益氣湯治暑病內傷下痢不思飲食發熱六合湯治伏熱煩悶或成痢疾俱見中暑出附餘已上治因暑下痢之劑敗毒散加石蓮肉治下痢熱毒不進飲食倉廩湯即敗毒散加陳倉米薑棗治下痢赤白或先因寒邪中臟腑致發熱者防風芍藥湯治泄痢飱泄身熱脉弦腹痛而渴及頭疼微汗防風白芍黃芩各四錢水煎食前通口服已上治痢疾身熱者之劑丹溪治血痢乾薑一錢當歸二錢五分烏梅三箇黃柏一錢五分黃連三錢水煎食前服或加枳殼丹溪治血痢後重熱盛者大黃黃連黃芩黃柏枳殼當歸白芍滑石桃仁甘草白朮右各等分為末或作丸用麵糊或神麴糊丸服又云誤服熱藥及澀藥毒氣犯胃者當明審以祛其毒當歸導氣湯治膿血痢無度腹中痛當歸芍藥各一錢甘草一錢五分青皮七分槐花七分生地酒洗二錢水二鍾煎至一鍾食前溫服若後重加木香檳榔末各三分澤瀉五分小便利去澤瀉茜根丸治一切毒痢及蠱注下血如雞肝心煩腹痛茜根升麻犀角地榆當歸黃連枳殼炒白芍右等分為末醋米糊為丸梧桐子大每服七十丸空心米飲下潔古蒼朮地榆湯治脾經受濕下血痢蒼朮三兩地榆一兩右每服一兩水二鍾煎至一鍾食逺溫服丹溪青六丸治血痢清濕熱補脾消瘀血用此止痛活血消食酒糊為丸方在泄瀉門當歸芍藥湯治血虛而下血痢當歸川芎各一錢五分芍藥酒炒三錢生地黃連酒炒木香各一錢水煎食前服黃芩芍藥湯治火熱下痢膿血黃芩五錢甘草炙一錢芍藥炒三錢水煎食前服大黃湯治泄痢久不愈膿血稠粘裏急後重日夜無度久不愈者用此微利大黃一兩用好酒二鍾浸半日煎至一鍾去大黃分為二服如未止再服盡以利為度後服芍藥湯和之利止再服黃芩芍藥湯以徹其毒也劉宗厚云此乃陽明經蕩滌之藥用酒煮者欲其上至頂顚外徹皮毛也芍藥湯治腹痛下痢膿血日夜無度裏急後重是以行血則便膿自愈調氣而後重自除白芍一兩當歸黃連各五錢檳榔木香各二錢桂二錢五分大黃三錢黃芩五錢甘草炙二錢右每服五錢水煎食逺溫服如痢不减加大黃劉宗厚云此行血調氣不熱之藥也大凡用藥之雜與用藥之多者難以細分經絡當觀其大體如何此太陽桂枝例藥也附禁方木香散治腹痛下痢膿血裏急後重木香五錢地榆一兩黃連七錢赤芍青皮枳殼乳香甘草各五錢右為末每服二錢白湯下延胡止痛散治血痢疼痛飲食不進延胡炒為末每用二錢米飲調下三服全愈木香甘連湯治血痢如神黃連一兩甘草二錢木香二錢水二鍾煎至一鍾食前服先一日預服五苓散三帖次早服此即止又方韭菜連根取自然汁和好酒一盞溫飲極驗又治婦人心痛及治淋散氣行血故也黃連烏梅丸治濕熱痢不瘥烏梅肉炒黃連各四兩淨為末煉蜜為丸如梧桐子大每服二十丸米飲下車前湯治熱痢不止及小便不利車前子搗爛取汁一鍾入蜜一合煎服已上治濕熱傷血赤痢之劑苦參丸治血痢苦參不拘多少炒焦為末滴水為丸如梧桐子大每服五十丸米飲下黃柏丸下痢純血黃柏蜜炙令香黃色一兩為末每服三錢空心溫漿水調下一方地錦草不拘多少晒乾為末每服二錢空心米飲調下加劑四物湯保命集治下痢川芎當歸白芍生地槐花黃連御米殼各等分水煎服樗皮丸治痢清血腹中刺痛樗根白皮不拘多少炒為末米醋糊為丸如梧桐子大空心米飲下三四十丸地榆散治中暑昏迷不省人事欲死並治血痢暑痢地榆赤芍黃連青皮去白等分為末每服三錢湯水調下血痢煎服烏梅丸治熱留腸胃臍腹㽲痛下痢純血或服熱藥過多毒藴於內滲成血痢烏梅肉二兩黃連三兩當歸二兩枳殼去白二兩右為末醋糊為丸如梧桐子大每服七十丸米飲下血痢極效方當歸一錢赤芍地榆黃連生地甘草嬰粟殼各五分石榴皮三分水煎服五香散治血痢脉滑五棓子炒焦存性香白芷炒等分為末每服二錢白湯調服一日三次紫黑血丹溪云其或下墜異常積滯中有紫黑血而又痛甚者此為死血證當以桃仁滑石行之或口渴及肛門燥辣是挾熱加黃芩或口不渴身不熱喜熱手尉蕩者是挾寒即加乾薑下痢身熱舌黑下如煤色或去瘀血用犀角人參湯犀角人參黃連白芍生地甘草丹皮水煎服臟毒下血衍義云曽治洛陽一婦年近五十耽飲無度多食魚蟹攝理之方蔑如也後以飲啖過常蓄毒在臟日夜二三十度大便與膿血雜下大腸連肛門痛難任醫以治血痢藥不效又以腸風藥則益甚蓋腸風則有血而無膿又如此已半年餘氣血漸弱食漸减肌肉漸瘦稍服熱藥則腹愈痛血愈下稍服凉藥則泄注氣羸粥愈减服溫平藥則病不知將朞歲醫告技窮垂命待盡或有人教服人參散病家亦不敢主當謾與服之才一服二服减三服膿皆定自此不十服其疾遂愈後問其方云治大腸風虛飲酒過度挾熱下痢膿血疼痛多日不差樗根白皮人參各一兩為末空心米飲調下二錢忌油膩濕麵青菜果子甜物雞魚蒜等槐花散治血痢久不止腹中不疼不裏急後重此臟毒也青皮槐花荆芥穗各等分為末水煎空心熱服又方治腸風血痢鯽魚一具破開去腸膽入白礬二錢燒存性為末米飲空心調下逐瘀血治赤痢血痢應驗如響病雖垂殆一服即愈阿膠麵炒成珠枳殼麩炒茯苓川芎蓬朮白芷木通茯神去木生地生甘草赤芍五靈脂炒烟盡各一錢大黃桃仁去皮尖各一錢五分水鍾半蜜三茶匙煎七分去渣入大黃仍煎一沸空心溫服豆汁陳無擇云傷濕則下如豆汁嚴用和云傷濕而下豆汁者分利之劉宗厚云濕喜傷脾脾胃為五穀之海無物不受常兼四臟蓋豆汁之色如五色之相雜故下豆羮汁者濕也泄痢作嘔病機機要云如痢或泄而嘔者胃中氣不和也上焦不和治以生薑橘皮中焦不和治以芍藥當歸下焦寒不和治以輕熱藥甚以重熱藥劉宗厚謂亦有胃火沖上而嘔者有陰虛而嘔者有胃虛而嘔者有積滯毒氣上攻而嘔者統旨謂痢而嘔者乃胃氣不和用生薑橘皮白朮湯因火上逆而嘔者加薑汁炒黃連胃虛加人參倍朮積滯毒氣上攻而嘔者木香導滯湯陰虛者四物加參朮苓柏陳皮下痢吃逆同治噤口痢百一選方云噤口痢是毒上沖心肺所致用石蓮子以通心氣便覺思食玉機微義云痢而能食知胃未病也若脾胃濕熱之毒薰蒸清道而上以致胃口閉塞而成噤口之症理宜除胃口之邪熱而此云毒氣上沖心肺其毒不知指何者之邪然亦有脾胃虛而得者有誤服利劑毒藥犯胃者又有服澀熱之劑太早而邪氣閉遏於胃口者必當求責丹溪曰禁口痢胃中熱甚大虛大熱故也用人參二錢黃連薑汁炒一錢濃煎汁終日細細呷之如吐再服但得一呷下咽便開又宜引熱下行用田螺肉搗碎罨臍中入麝香少許又云黃連與參各一錢加砂仁三粒煎服統旨云毒氣上沖心肺用人參茯苓石蓮肉入些少菖蒲以通心氣胸次一開自然思食有脾胃虛弱不能納穀用參朮以健脾胃或參苓白朮散之類加石菖蒲陳倉米濟世方云治痢疾不納飲食者謂之噤口痢以脉症辨之如脾胃不弱而知其頭疼心煩手足溫熱未嘗多服凉藥者此乃毒氣上沖心肺所以嘔而不食宜用敗毒散每服四錢陳倉米百粒薑三片棗一枚水煎溫服又方加石蓮子白蔲仁尤妙若其脉微弱或心腹膨脹手足厥冷初病則不嘔因服嬰粟烏梅苦澀凉藥太過以致聞食先嘔者此乃脾胃虛弱用山藥一味一半生一半炒為末米飲調下虛寒甚脉微弱者理中湯治噤口痢枇杷葉蜜炙一兩砂仁蜜炒五錢為末蜜調抹口中咽下石蓮肉日乾為末每服二錢陳倉米飲調下便覺思食或以受日陳壁土炒橘紅為末薑棗略煎佐之又方黃連半斤生薑四兩切片與黃連同炒待薑焦黃色去薑只取黃連為末以陳米飯搗為丸如梧桐子大每服七八十丸赤者陳米飲下白者陳皮湯下赤白相雜者陳皮米飲下又方獨核肥皂一枚去核用鹽填實其內火燒存性為末先煮白米粥用少許入在粥內食之立效又方梨子一枚去心入好蜜一匙蒸熟食之下痢吃逆俗名發厄丹溪曰吃逆病氣從下冲上屬火之象古方悉以胃弱言之殊不知胃弱者陰弱也虛之甚也滯下之久多見此症乃因久下而陰虛也詳見吃逆本門一人年五十質弱多怒暑月因饑索食不遂後得瀉痢口乾七八日後發吃遂以人參白朮煎湯調益元散數日安此虛熱之治痢倘未止者將此藥蜜丸服之數日全止下痢大孔痛大孔痛暴病身熱或脉洪大此熱沈於下也宜清之若久病身冷自汗脉沈小宜溫之又方治大孔痛熱流於下者檳榔木香黃連黃芩加乾薑丹溪治一人年二十性好酒色奉養過厚適有事多憂恐患瘧發寒熱忽一日大發熱大便下皆是積滯極臭大孔極痛呻吟不絶其孔陷入囑付後事豫曰此大虛也脉皆弦大而浮遂以瓦片令敲如銅錢圓樣燒紅投入童便中急乘熱取起令乾以紙裹安痛處其時寒恐外寒乘虛而入也以人參當歸陳皮作濃湯飲之食淡味至半月而安又有用瓦片燒紅投入槐花湯照上用者久下赤白大孔痛不可忍炒鹽尉之又炙枳實尉之日華子云痢久大孔急痛亦有寒熱者熟艾黃蠟訶子燒薰之治痢大便不禁其大孔開如空洞不閉者用花椒為末葱搗爛塞榖道中併服酸收澀腸之劑如御米殼訶子皮之類收之神效痢疾脫肛初起裏急後重脫肛此為邪壓大腸其氣不得宣通而脫下也宜木香導滯湯內有木香檳榔調其氣黃芩清上熱大黃下其積滯歸芍活其血而愈也若用推積滯調氣之後而脫肛者此為氣虛宜補而升之痢久氣血俱虛虛中有寒滑下不收者補中加溫澀之劑如真人養臟湯之類有濕熱在大腸因裏急後重而脫肛者宜清之如保命集地榆芍藥湯之類是也虛坐努圊東垣曰虛坐而不得大便者皆因血虛也血虛則裏急加當歸身若後重逼迫而得大便者為有物而然今虛坐努圊而不得大便知其血虛也故用當歸為君生血藥佐之痢而小便少劉河間治身發熱下痢赤白小水不利以益元散蕩胃中積聚又泄熱從小便中出也丹溪治一老人年七十面白脉弦數獨胃沈滑因飲白酒作痢下血如淡膿水腹痛小便不利裏急後重以參朮為君甘草滑石檳榔木香蒼朮為佐下保和丸二十五粒第二日前症俱減惟小便不利以益元散服之安糟粕不實痢疾已愈惟糟粕不實此腸胃虛間或有濕參苓白朮散錢氏白朮散吞樗根白皮丸或訶子皮散桃花丸之類擇而用之異功散加肉豆蔲亦好久痢滑泄不固有寒有熱有虛濟世方治熱滑側柏葉一錢甘草三錢御米殼蜜炒二錢久者倍之水煎服仲景治寒滑不禁桃花湯主之王好古曰大凡痢疾乃心腹之患老年人尤非所宜若果首尾用平和之劑决難作效必致危篤雖欲服此則已晚矣其秦艽地揄黃柏木通之類其性苦寒却難輕服白痢當服理中湯血痢當服胃風湯若五色雜下泄瀉無常用熟烏頭一兩厚朴乾薑甘草各等分生薑煎服今之治痢多用駐車丸黃連阿膠丸之類其中止有黃連肥腸其性本冷若所感積輕及餘痢休息不已則服取效若病稍重則非此可療豫嘗用斷下湯加减調治百發百中易簡斷下湯治下痢無問新舊赤白老幼白朮一錢茯苓一錢甘草五分草果一枚連皮用御米殼十四枚去筋膜醋炒生薑七片棗子烏梅各七箇水煎服赤痢加黑豆二粒白痢加乾薑五分又云御米殼治痢如神但性緊澀多令人嘔逆既以醋製加以烏梅不致為害然嘔吐則不可服又云大率痢疾古方謂滯下多因腸胃素有積滯而成此疾始得之時不可遽止先以巴豆感應丸十餘粒白梅湯下令大便微痢仍以煎藥服之無不應手作效若脾素弱用橘紅豆蔲粟殼各等分煮麵糊為丸桐子大每服五十丸烏梅湯下兼治泄瀉暴下不止一服即愈更令藥力相倍為佳如覺惡心却以理中湯四物湯加豆蔲木香輩調其胃氣仍以二陳湯水煮木香膏等定其嘔逆又方治冷痢腸滑頻併治泄瀉服之神效白朮炒三兩乾薑炒甘草炙各一兩半木香粟殼蜜炙訶子去核各一兩肉果生十枚右為末糊丸梧子大每服五十丸米湯下錢氏白朮散治氣血俱虛神氣衰弱或瀉或痢脾虛口渴惡心等症方在泄瀉又方治白痢久不效乃寒滑症也治當溫澀酸石榴皮半箇草果一箇陳皮三箇烏梅一箇甘草一寸乾薑一錢水煎食前服遇仙立效散治諸惡痢或赤或白或濃淡相雜裏急後重臍腹結痛或下五色或如魚腦日夜無度或禁不食不問大人小兒虛弱老人産婦並宜服之御米殼去蒂鹽水炒當歸各二兩甘草地榆赤芍酸石榴皮各一兩右每服一兩水煎食前服忌生冷油膩神效參香散治大人小兒臟氣虛怯冷熱不調積而成痢或鮮血或豆汁或如魚腦或下紫黑瘀血或赤白相雜裏急後重日夜無度不問新久並治白扁豆人參木香各一兩茯苓肉果煨各四兩橘紅御米殼去蒂各十二兩右為末每服三錢米飲下水煮木香丸治一切下痢赤白膿血相雜裏急後重御米殼去穰二兩一錢青皮去白二兩四錢甘草炙三兩當歸訶子肉木香不見火各六兩右為末煉蜜為丸如彈子大每服一丸水一鍾煎化至六七分空心食前服真人養臟湯治大人小兒冷熱不調下痢赤白膿血或如魚腦髓裏急後重臍腹疼痛或脫肛墜下酒毒便血並治御米殼去蒂蜜炒三兩六錢人參當歸各六錢肉桂八錢訶子去核一兩二錢木香不見火二兩四錢肉果麵煨五錢白术炒六錢白芍一兩六錢甘草一兩八錢右每服五六錢水煎食前服臟寒者加大附子固腸湯三因方治冷熱不調下痢赤白御米殼去蒂醋炙三兩白芍一兩當歸甘草各一兩陳皮訶子白薑炮各五錢人參木香各三錢右每服五六錢水煎七分食前服豆蔲固腸湯治脾胃虛弱臟腑頻滑下痢赤白木香赤石脂乾薑砂仁厚朴製肉果煨各三兩為末麵糊為丸梧桐子大每服五十丸米飲食前服白朮安胃散東垣治一切瀉痢膿血相雜裏急後重日夜無度又治男子小腸氣痛婦人臍虛冷並産後兒枕塊痛亦治産後虛弱寒熱不止白茯苓白朮車前子各一兩五味子烏梅各五錢御米殼蜜炙二兩右每服一兩水煎服仲景桃花湯治下便膿血不止赤石脂乾薑粳米水煎服異功散治久痢脾胃虛弱四君子湯各一錢加陳皮二錢水二鍾煎八分加薑棗食前服休息痢休息痢者愈後數日又復痢下時作時止積年纍月不肯斷根者是也此因始得之時不曽推下就以調理之劑因循而致也又或用兜澀藥太早以致邪不盡去綿延於腸胃之間而作者或痢愈之後而腸胃虛弱復為飲食所傷而作者當看輕重調理或熱或寒或消導或再推下然後以異功散等補劑加收澀之藥張文仲治痢久下經時不愈者此名休息痢取虎骨炙焦為末日服三次每服二錢縮砂散止休息痢砂仁炒為末空心米飲下一錢木香飲治隔年痢不止並治血痢尤佳木香黃連各五錢二味同炒右為末入麝香少許每服二錢米飲下芎粟散治噤口紅白久不愈者川芎嬰粟殼去蒂膜各一兩為末空心蜜湯調下八分蟲痢濟世方治似痢非痢挾熱者苦楝根皮去粗皮晒乾為末糯米飲為丸米飲下瘧痢瘧未已因食生冷痢作人參白朮茯苓陳皮半夏甘草生薑草果烏梅用鹽少許淹少時以厚紙裹水濕煨熱水煎未發前服痢未愈繼之以瘧十味六和湯藿香厚朴赤茯苓人參木瓜香茹扁豆杏仁甘草砂仁丹溪治痢活套丹溪曰下痢初得之時元氣未虛必推蕩之此通因通用之法稍久氣虛則不可下壯實初病宜下虛弱衰老久病宜升之其或下積腹痛後重小水短此為裏症宜和中疏氣用炒枳殼製厚朴芍藥陳皮滑石甘草其或在下則纒住在上則嘔食此為毒積未化胃氣未平寒則溫之熱則清之虛則用參朮補之毒解積下飲食自進其或身倦自覺氣少惡食此為挾虛證宜加白朮當歸身尾甚者加人參又十分重者止用此一條加陳皮補之虛回而痢自止其或氣行積少但虛坐努責此為無血症倍用當歸身尾却以生芍藥生地桃仁佐之陳皮和之血生自安其或纒墜减退十之七八穢積已盡糟粕未實當炒芍藥炒白朮炙甘草陳皮茯苓煎湯下固腸丸三十粒然固腸丸性燥恐尚有滯氣未盡行者但當單飲此湯固腸丸未可遽用蓋固腸丸有去濕實腸之功其或痢後糟粕未實或粥食積多或饑甚方食腹中作痛切不可驚恐當以陳皮白朮各半煎服和之而安其或久痢後體虛氣弱滑下不止又當以藥澀之可用訶子皮肉豆蔲白礬半夏甚者牡蠣可擇用之然須用陳皮為佐恐太澀亦能作痛又甚者灸天樞氣海右前方用厚朴專瀉凝滯之氣然厚朴性太溫而散氣久服大能虛人滯氣稍行則去之餘滯未盡則用炒枳殼陳皮然枳殼亦能耗氣比之厚朴稍緩比陳皮稍重滯氣稍退亦當去之只用陳皮以和衆藥然陳皮去白有補瀉之功若為參朮之佐亦純作補藥用凡痢疾腹痛必以白芍甘草為君當歸白朮為臣惡寒者加桂惡熱者加黃柏逹者更能參以歲氣時令用藥則萬舉萬全豈在乎執方而已哉禁方乳香止痛散治下痢赤白疼痛不已御米殼去穰蜜炒五錢橘紅五錢炙甘草五錢乳香二錢另為末沒藥二錢另為末水煎去渣入乳沒食前服如白痢熱服紅痢冷服如痢不止加青皮四錢治男婦老幼赤白痢紅花胡椒等分為末紅棗煮肉搗為丸如梧桐子大白麵為衣赤痢甘草湯下三十一丸白痢薑湯下先通為度次早空心再服三十丸不拘紅白俱以滾水下即愈不治症及危症下如魚腦者半生半死下如塵腐色死下如屋漏水者死下如竹筒注者不治下痢純血身熱而脉洪數者死王節齊治例痢乃是濕熱食積三者别赤白青黃黑五色以屬五臟白者濕熱傷氣分赤者濕熱傷血分赤白相雜氣血俱傷黃者食積治法瀉腸胃之濕熱開鬱結之氣消化積滯通因通用其初只是下之下症未愈隨症調理稍久者不可下胃虛故也痢多屬熱亦有虛與寒者虛者宜補寒者宜溫年老及虛弱人不宜下主方黃芩炒二錢五分黃連炒一錢五分白芍炒二錢已上三味痢疾必用之藥木香枳殼炒一錢五分檳榔三分甘草炙三分若腹痛加當歸一錢五分砂仁一錢再加木香芍藥各五分若後重加滑石炒一錢五分再加枳殼檳榔各五分芍藥生用再加五分條芩亦加五分若白痢加白朮茯苓炒滑石陳皮各一錢初欲下之加大黃五錢兼食積加山查枳實各一錢若紅痢加當歸川芎桃仁各一錢五分初欲下之再加大黃五錢若紅白相雜加當歸桃仁川芎各一錢五分以理血滑石陳皮蒼朮各一錢五分以理氣有山查枳實若白痢久胃弱氣虛或下後未愈减連芩芍藥各七分加白朮一錢五分黃蓍茯苓陳皮各一錢砂仁五分去檳榔枳殼再加乾薑炮五分若紅痢人虛弱血虛或下後未愈减芩連各五分加當歸川芎熟地黃阿膠陳皮各一錢白朮一錢五分若色赤黑相雜此濕勝也小便赤澀少加木通澤瀉茯苓各一錢山梔炒五分以分利之若血痢加當歸生地桃仁炒槐花各一錢久不愈减芩連各七分去檳榔枳殼再加阿膠炒側柏葉各一錢五分乾薑炒黑一錢白朮一錢五分陳皮二錢若痢已久而後重不去此大腸墜下去檳榔枳殼用條芩加升麻一錢以升提之若嘔吐食不得下加軟石膏一錢五分陳皮一錢山梔仁炒五分入生薑汁緩呷之以瀉胃口之熱有一樣氣血虛而痢者四物湯加人參白朮陳皮黃連黃芩阿膠補之而痢自止有一樣寒痢用黃連木香芍藥當歸乾薑砂仁厚朴肉桂之類若得痢而誤服溫熱止澀之藥則雖稍久亦宜用前法以下之後方補之若得痢便用前正法下之而未愈又用前調理法治之而久不愈此屬虛寒而滑脫可於前虛補寒溫二條擇用更加龍骨赤石脂御米殼烏梅肉等收澀之藥胎前痢疾本事方治婦人胎前産後不拘赤白生薑二斤搗取自然汁以鴨子一枚打碎入薑汁內攪勻煎之至八分入蒲黃三錢再煎五七沸空心溫服立效大全良方治妊娠素弱下痢頻併腹痛瘦甚面色痿黃不進飲食厚朴一兩半白朮川芎白芍熟地黃當歸乾薑人參各二兩訶子三錢甘草一錢右服五六錢薑三片水煎服黃蓍當歸湯治妊娠下痢腹痛小便澀當歸黃蓍各一兩糯米一合右和勻水煎分四服羅太無大寧散治妊娠下痢赤白灰色泄瀉疼痛垂死者黑豆三十五粒粟殼二兩一半生一半炒甘草二兩半生半炒右加薑三片水煎食前服神效大全良方治妊娠挾熱下痢亦治男子常痢黃連黃柏各二兩梔子二十枚右每服六七錢水煎濃服若嘔者加陳皮一兩半生薑三兩黃連湯治妊娠下痢赤白膿血不止黃連八分厚朴製阿膠炒當歸乾薑各六分艾葉黃柏各四分右為末空心米飲調下方寸匕日三服厚朴散治妊娠下痢黃水不絶厚朴薑製三兩黃連三兩肉豆蔲一枚連皮用右為粗末水煎頓服肉果飲治妊娠臟氣本虛脾胃衰弱臟腑虛滑臍腹疼痛日夜無度厚朴薑製二兩肉豆蔲一枚麵裹煨右㕮咀每服五錢薑三片水煎服阿膠湯治妊娠腹中絞痛心下急痛及療産後血暈崩中久痢阿膠二兩酒二升半煎取一升頓服宣明白朮湯白朮黃芩當歸各等分水煎食前服産後痢救急散治産後赤白痢腹中絞痛白芍好酒炒阿膠艾葉熟地各一兩甘草當歸各三兩每服二兩水煎濃空心服當歸芍藥散治妊娠腹中絞痛心下急痛及療産後血暈崩中久痢方見妊娠腹痛經驗方治産後胎前痢疾龜甲一枚米醋炙為末醋湯調下丹溪治婦人患墮胎後膈滿食少痢不止脉虛左手尤甚滑石白芍蒼朮各五錢白朮二錢半乾薑四錢茯苓一錢訶子煨二錢為末水煎下保和丸四五十粒雲箕子治産後血痢臍腹疼痛四物湯加槐花黃連御米殼等藥仲景白頭翁甘草阿膠湯脉經謂新産重下虛極熱痢白頭翁阿膠各三兩黃連黃柏秦皮各三兩甘草二兩分三服水煎食逺服産後血痢小便不通臍腹疼痛生馬齒莧搗汁二合煎一二沸下蜜一合調頓服赤水元珠卷八
