body:
  text: 赤水元珠卷十六眀孫一奎撰霍亂門霍亂者揮癨撩亂其勢急暴有似鬼祟實非邪也乃内有所傷外有所感陰陽乖隔而成此前人格論内經曰嵗土不及風乃大行民病飱泄霍亂體重腹痛筋骨揺併盖言木乗土而為病也夫霍亂者揮霍撩亂也其症心腹卒痛嘔吐下痢發熱増寒頭痛眩暈或吐而不㵼或㵼而不吐或吐㵼並作夫邪在上焦則先心痛而吐邪在中焦則先腹痛而㵼邪客上中二焦則吐㵼俱作甚則轉筋入腹則斃盖陰陽反戾清濁相干陽氣暴升陰氣頓墜陰陽痞隔上下奔逆治之惟冝温煖更詳别三因以調之外因諸風則惡風有汗傷寒則惡寒無汗冐湿則重著傷暑則煩熱又有内因九氣所致鬱聚痰飲痞隔不通遂致滿悶隨其勝復必作吐利或諸飽食膾炙恣餐乳酪寒漿㫖酒脾胃受傷遂成吐利又有轉筋者盖陽明胃主養宗筋今暴吐下津液頓忘宗筋失養以致攣轉甚則邜縮舌捲為不治之症又有乾霍亂者上不得吐下不得利壅閉正氣闗格陰陽躁擾喘脹命在須臾若湿霍亂則所傷之物因吐㵼而出吐㵼盡則止故猶可治大抵熱勝痰鬱則悶亂濕勝飲鬱則利下其治湿霍亂宜霍香正氣散加生薑不惟可以温散風濕抑亦可以調理吐㵼其若傷暑所致者亦不可遽用香薷沉冷之劑合先用橘皮半夏生薑之類開散結滯次則以香薷五苓温服散暑解煩或挾寒而手足厥逆腹中絞痛宜以四逆理中之類温之亦不可遽用峻補兠澁之劑則邪愈滋而變症百出治乾霍亂急以鹽湯灌之令其大吐庶有可生切不可與穀食恐胃中邪物吐㵼不盡新穀一入脾不能化轉増危殆慎之慎之大槩其脉浮洪者易治若脉㣲遲加以氣少昏沉不語者皆難治也丹溪曰内有所積外有所感致成吐㵼仍用二陳湯加減作吐以提其氣切莫與穀食雖米飲一呷入口即死必待吐㵼盡過二三時直至饑甚方可與稀粥其脉多伏欲絶又曰雖已吐㵼不徹還用吐提其氣或用樟木煎湯吐之大法生薑理中湯最好不渇者可用如渇者用五苓散亦可下者乾霍亂最難治死在須臾升降不通邪無從出當吐提其氣極是良法世多用鹽湯為内有食傷外有邪遏故吐之吐中就有發散之義轉筋不住男子以手挽其陰女子以手牽其乳近兩邊此千金妙法也轉筋入腹者死脉訣舉要曰滑數為嘔代者霍亂㣲滑者生濇數凶斷又曰滑而不匀必是吐㵼霍亂之候脉代勿訝内經曰脉伏者霍亂脉㣲而澁或代而散或隠而伏或大而虚脉右闗滑為霍亂吐㵼脉結促代皆不可斷以死脉大者生脉洪者為熱絃者為飲氣口脉絃滑膈間有宿食留飲縮脾飲解伏熱除煩渇消暑毒止吐㵼宜沉冷頻服草果仁四兩烏梅肉三兩甘草炙二兩半每服五錢薑十片水煎服藿香正氣散中濕霍亂吐㵼蒼术陳皮半夏藿香各二錢甘草炙一錢薑五片棗二枚水煎服桂苓甘露飲中暑霍亂吐㵼發渇引飲方見中暑不換金正氣散霍亂轉筋嘔吐泄㵼頭疼方見疫門五苓散方見暑門藿苓湯外感風寒内傷飲食霍亂轉筋吐㵼藿香厚朴白术茯苓各一錢二分甘草炙五分大腹皮紫蘇白芷桔梗半夏陳皮各一錢肉桂六分猪苓澤㵼各一錢薑五片水煎服訶子散霍亂吐利如神又治心脾冷痛訶子甘草厚朴乾薑草果仁陳皮良薑茯苓神麯麥芽等分水煎入鹽服二香散暑濕相搏霍亂轉筋煩渇悶亂藿香白术厚朴陳皮茯苓半夏白扁豆紫蘓桔梗白芷香薷黄連各一錢大腹皮甘草炙五分薑五片葱白三根水煎服加味四君子湯霍亂轉筋吐㵼腹中痛體重脉沉而細人參白术茯苓各二錢甘草炙芍藥良薑各一錢薑三片棗二枚水煎服通脉四逆湯霍亂多寒内冷脉絶吳茱茰炒三兩附子炮一兩桂心木通白芍藥細辛甘草炙各五錢當歸三錢每服七錢水一鍾酒半鍾薑七片棗一枚煎七分温服七氣湯七氣鬱五臟之間互相刑尅陰陽不和揮霍變亂吐利交作半夏五兩厚朴桂心各三兩白芍藥茯苓各四兩紫蘇葉橘皮各二兩人參一兩每七錢水一盞半酒半盞薑七片棗一枚煎温服木𤓰湯霍亂吐㵼轉筋擾悶酸木𤓰二兩茴香㣲炒二錢半甘草炙二錢吳茱萸炒三兩每服五六錢薑七片紫蘇十葉水煎服一方無茴香薑附湯霍亂轉筋手足厥冷多汗嘔逆方見寒門加味香薷飲伏暑吐利不止煩悶多渇本方加㯽榔黄連每五錢水酒各半煎服冷香湯夏秋伏暑引飲過食生冷遂成霍亂良薑附子甘草檀香各一錢乾薑炒一錢草菓一錢半丁香三分分二服水煎連瓶沉井内待冷服人參散霍亂體痛四肢逆冷服理中四順不效者人參白芍川歸炒良薑各一兩附子陳皮桂心白术各三錢每五錢加紅棗三枚水煎服活命散霍亂吐㵼不止面色青黑垂死者防風羌活獨活乾薑細辛各一分草豆蔲肉豆蔲川芎各五錢官桂半分吳茱萸木𤓰各一兩每三錢濃煎木𤓰湯調服囬生散霍亂不已吐利不止但有一㸃胃氣存無不效者陳皮藿香葉各五錢水煎或為末熱酒調服秘方霍亂吐利轉筋神効白扁豆葉一根研取汁一碗入米醋同服立瘥加減理中湯霍亂嘔吐白术人參乾薑各三錢甘草炙一錢水煎服若為寒氣濕氣所干者加附子一錢名附子理中湯若霍亂吐㵼加陳皮青皮各一錢名治中湯若乾霍亂心腹作痛先以鹽湯少許頻服候吐出令透即進此藥若嘔吐者加丁香半夏各一錢薑十片同煎泄㵼者加橘紅茯苓各一錢名補中湯溏㵼不已於補中湯内加附子二錢不喜飲食及米穀不化再加砂仁一錢霍亂吐下心腹作痛手足逆冷于本方内去白术加熟附子名為四順湯傷寒結胷先以桔梗枳殻等分煎服不效者及諸吐利後胷痞欲絶心膈高起脹痛手不可近者加枳實茯苓各一錢名枳實理中湯若渇者再于枳實理中湯内加𤓰萎根一錢霍亂轉筋者理中湯内加火煅石膏一錢若臍上築者乃腎間動氣也去术加官桂一錢半腎惡燥去术恐作奔豚也故加桂取辛以潤之若悸者加茯苓一錢渇欲飲水者加白术五分腹滿者去白术加附子一錢若寒者再加乾薑一錢飲酒過多及啖炮炙熱物發為鼻衂者加川芎一錢傷胃吐血以此藥能理中脘分利陰陽安定血脉只用本方三因白术散中暑嘔吐眩暈及大病後調理失宜勞復及脾胃虚損面色青黄飲食不思口吐酸水滑泄腹鳴飲食所傷霍亂吐㵼並宜服之白芷甘草炙青皮白茯苓桔梗香附子山藥各三兩乾薑五錢白术陳皮各一兩每一兩薑三片棗一枚木𤓰一片紫蘓三葉水煎服若吐㵼加白梅煎喘加桑白皮杏仁傷寒勞復加薄荷膈氣加木通入麝香少許中暑嘔逆加香薷霍亂加藿香産後泄㵼加荆芥氣厥加鹽煎服調中白术散大病後吐㵼煩渇霍亂虚損氣弱及酒毒嘔噦白术茯苓人參各五錢藿香五錢甘草炙一兩五錢木香一錢葛根為末白湯調服二錢煩渇加滑石二兩甚者加薑汁經驗方人參散止吐逆及㵼後煩渇常服調中和氣人參茯苓各五錢葛根一兩藿香木香甘草炙各一錢半分三帖水煎服㵼後渇甚者加滑石一錢止渇湯霍亂煩渇甘草炙人參麥冬茯苓桔梗𤓰蔞根澤㵼葛根各五錢右末蜜湯調下二錢薑鹽飲霍亂欲吐不吐欲㵼不㵼鹽一兩生薑五錢搗碎同炒令色變以水一碗煎熱温服甚者加童便一盞蓼湯霍亂轉筋不止蓼一大握水煎湯薫洗或以帛蘸湯熨患處一方每遇轉筋時即以鹽揩擦痛處三五十匝即雖皮破亦不妨可以斷根灸法霍亂已死腹中尚煖猶未絶氣者用鹽納臍中令滿大艾炷灸三五七壮甦麥冬湯霍亂已愈煩熱多渇小水不利麥門冬茯苓半夏陳皮白术各一錢半人參小麥甘草各一錢生薑五片烏梅半箇煎服青金丹霍亂吐㵼不止及轉筋諸藥不效者硫黄一兩水銀八錢右二味銚子内炒栁木箆子不住手攪匀更以栁枝蘸冷醋頻灑候結如鐡色即成青金丹乃刮下再研如粉留小半為散餘以粽子尖三箇醋約半盞研稀稠得所成膏丸如雞豆子大硃砂為衣每服一丸煎丁香湯磨化下熱服如作散服以丁香湯調下一錢傷寒陰陽乗伏用龍腦冷水磨下一日二三服海藏云吐㵼轉筋身熱脉長陽明本病也宜和中四君子湯平胃散建中湯每一兩薑五片水煎服如吐㵼轉筋自汗脉浮者四君子湯加桂五錢吐㵼轉筋脇下痛脉絃者宜建中加木𤓰柴胡湯平胃散加木𤓰五錢亦可也建中木𤓰柴胡湯桂枝二兩半芍藥三兩甘草一兩膠飴糖半斤生薑一兩半大棗六枚木𤓰五錢柴胡五錢每一兩水煎臨服加飴糖兩匙吐㵼後小便不通胸中實痛者四君子湯加大黄一兩吐㵼腹中痛轉筋體重脉沉而細者宜四君子加高良薑白芍藥四君子四味各一兩芍藥良薑各五錢同前煎法服吐㵼霍亂四肢拘急脉沉而遲者宜四君子湯加薑附厚朴湯四君子四味各一兩生薑附子厚朴炮製各三錢同前煎服吐㵼轉筋四肢厥冷脉㣲緩者宜建中加附子當歸湯桂枝一兩當歸二錢芍藥二兩粉草五錢飴糖半升生薑一兩附子炮三錢大棗六枚同前煎服吐後轉筋木𤓰一味煎服良轉筋尋常轉筋四時皆有不因霍亂而發者其發多于睡中或伸欠而作丹溪謂此多屬血熱以四物湯加蒼术紅花酒芩南星水煎服有筋轉于足大指轉上至大腿近腰結了乃因奉養過厚飲冷感寒而作寒遏其熱寒主收引勁急故筋轉而疼也前方加薑汁臨時服之足太陽之下血氣皆少則善轉筋踵下痛丹溪曰轉筋徧身入肚不忍者作極醎鹽湯于槽中暖浸之礬湯亦妙蓼湯亦好仲景云轉筋之為病其臂脚直脉上下行㣲絃轉筋入腹者雞屎白散主之雞屎白炒為末取方寸匕以水六合和温服聖惠方肝虚轉筋用赤蓼莖葉切作三合水一盞酒三合煎四合分二服孫尚藥脚轉筋疼痛攣急松莭二兩剉如米粒乳香一錢以瓦器内慢火炒令焦只留一分出火毒為末每一錢至二錢熱木𤓰酒調下但是筋病疼痛皆妙不獨轉筋而已外䑓治轉筋取舊綿以釅醋浸甑中蒸及熱用綿裹患脚上冷則易勿傷皮以瘥為止秘方脚轉筋無時甚好雄猪陰莖一條全者薄切香油煎熱細嚼鹽酒送下空心服連進三朝竒驗中惡客忤門中惡客忤者無故忽然而病倒者是也多受于道途及早晚門外忽得之卒受非節之氣令人心腹絞痛脹滿呌喚氣冲心胷不急治則死磨好真烟墨一盞熱湯解服之又有鹽湯探吐亦好卒死鬼擊或先病因睡卧間忽然而絶皆是中惡之候若脉氣應指心頭仍暖者擣石菖蒲灌之立甦如口噤須灌從鼻入中惡暴死石菖蒲為末每用五分安舌底又吹入兩耳及鼻中則甦中惡入心須死阿魏末鹽酒調下一錢半連進二服效中惡吐血生桔梗取汁每服一鍾日三無生者以乾者為末仍以桔梗湯調下中惡客忤蘇合香丸薑湯調下妙欬逆門内經曰嵗金太過欬逆金鬱之發欬逆少陰二氣欬逆古謂之􅰝逆氣上逆作聲之名也經曰諸逆衝上皆屬于火是心火刑于肺金也易老曰欬逆者火熱奔急上行而肺金不納何其當哉俗以為噦者非盖噦者出聲也噦出其氣噦聲盡然後呼也出入呼吸大有不同況噦者本于胃欬逆者本于肺又豈可例論哉然是症或由水漬于肺而心痞或喜笑過多而氣噎或嚥飲錯喉而氣嗆或急食乾物而氣塞皆令作欬逆之聲連續不絶俗謂吃忒是也人或以紙撚取鼻嚏而止或寃以盜賊因恐而止或鼻熱聞食香調氣而止皆抑之駭之而使氣下也又有胃氣寒而呃元禮戴氏以雜病發呃者皆屬寒惟有傷寒發呃屬熱盖由陽明内實過經失下清濁不得升降以致氣不宣通而作或又有飲食填塞胷中而氣不得升降者或有痰閉于上火起于下而氣不得伸越者又有吐利後胃虚膈熱而作呃者又有氣血虚作呃者不可以不辨也傷寒陽症欬逆者盖由陰消將盡陽火暴甚直冲而上出于胃入于肺而作聲所以東垣用涼藥以㵼熱降火其陰症欬逆者盖以陰氣先消陽火將竭浮于胷中亦欲散也故反用丁香乾薑之屬以養胃中陽氣胃氣一和陽生則陰長也丹溪云傷寒發呃亦有四症不同有中氣不足脉虚微氣不相續而發呃者宜補中益氣湯加生脉散加黄栢以降虚火或少加附子服之立愈有陽明内實失下而發呃宜大承氣湯下之有渇而飲水太過成水結胷而發呃者宜小䧟胷湯或小青龍湯去麻黄加附子治水寒相摶發呃者妙有𫝊經傷寒熱症誤用薑桂熱藥助起火邪痰火相搏而為呃者宜用黄連解毒白虎湯及竹瀝之類大凡食呃便秘者大承氣下之便軟者㵼心湯主之乆病虚者見此症最危心法云欬逆有痰有氣虚有陰火視其有餘不足治之其詳在格致餘論不足者人參白虎下大補丸有餘并有痰者吐之人參蘆之類痰碍氣而吃逆者用蜜水吐此乃燥痰不能出痰者以陳皮半夏氣虚人參白术陰火黄連黄栢滑石欬逆自痢者活石甘草炒黄栢白芍藥人參白术陳皮加竹瀝服戴元禮云欬逆因痰與熱及胃火者極多橘皮竹茹湯胃熱多渇噦􅰝不進飲食赤茯苓陳皮枇杷葉麥門冬竹茹半夏各二錢五分甘草炙人參一錢二分分二服每服薑七片水煎一方只用人參陳皮甘草竹茹小柴胡湯加薑三片杮蒂三枚輕服治同上橘皮乾薑湯胃寒欬逆陳皮通草乾薑桂心人參甘草各等分水煎丁香柿蒂散病後胃中虚寒欬逆至八九聲相連收氣不回者難治人參茯苓陳皮半夏良薑炒丁香柿蒂各一兩生薑一兩半甘草五錢水煎服調蘇合香丸服尤妙一方只用良薑丁香杮蒂甘草四味水煎服柿蒂湯胷滿欬逆不止杮蒂丁香各三錢一方加人參薑五片水煎服皂莢半夏湯治欬逆欲死半夏一兩皂莢八錢去皮弦酥炙為末煉蜜丸梧子大每三丸棗湯吞日三服夜一服羌活附子湯吐痢後胃寒欬逆羌活附子炮去皮臍茴香炒炙半兩乾薑炮丁香各一兩每二三錢水一鍾鹽少許煎七分服灸欬逆法乳下一指許與乳相直骨間䧟處婦人三壯男左女右只灸一處火至則瘥不瘥即不治又云其穴只當取乳下骨間動脉䖏是無病偶然致􅰝此縁逆氣而生宜小半夏茯苓湯加枳實半夏湯或用煎湯泡蘿蔔子研取汁調木香調氣散乗熱服逆氣用之佳人參白术湯人參黄芩柴胡乾薑甘草炙梔子仁各五錢白术防風半夏炮五味子每服五六錢加薑五片水煎服宣明桂苓白术散消痰止欬逆散痞塞開堅結痛悶進飲食和臟腑乾生薑官桂各二錢半茯苓半夏各一兩白术橘紅澤㵼各五錢右末麵糊丸小豆大薑湯下三十丸日三服一方加黄連半兩黄栢二兩水丸效尤速噫門俗作噯氣靈樞曰寒氣客于胃厥逆從下上散復出于胃故為噫又曰心為噫胃為噦釋之者曰神不守心故噫胃精内竭故噦傷寒書上焦不至其部故為噫中焦不至其部故為噦什之曰上焦竭善噫以上焦受中焦氣中焦不和不能消穀故令噫又曰緩者胃氣有餘噫而吞酸此言有餘者謂胃中有穀物未消故使噫而吞酸由此觀之一由于胃寒一由于胃有宿食然亦有胃火衝逆而致者也有陰虚火因上炎而致者難以槩論也治法寒者溫之熱者涼之中焦未和者則消導以通之至于病乆虚憊而噫則為神不守心而為死症矣噫與欬逆不同噫乃出氣欬逆則為入氣然治法胃寒亦宜橘皮乾薑湯胃熱宜橘皮竹茹湯中焦未和而熱壅鬱或以調胃承氣下之或以加減平胃散以消之陰虛宜以四物湯或芎歸湯加知母甘草以滋之靈樞註云噫象火烟隨焰出心不受邪故噫出之宜甘草㵼心湯以生薑易乾薑若有㣲熱時噫者小柴胡湯二陽一陰發病主驚駭背痛善噫欠也仲景旋覆代赭湯治痞而噫本事方枳殻散心下蓄積痞悶或作痛多噫敗卵氣枳殻白术各五錢香附一兩㯽榔一兩為末每二錢米飲調下日三服丹溪云噫氣胃中有痰有火又云曽治宣州一人氣上築心膈噫氣脉之右闗短弱左闗尺洪長而大數此肝有熱宜㵼肝補脾青皮一錢白术二錢五分木通甘草二分水煎下保和丸十五粒抑青丸二十粒清胃中痰火鬱熱噯氣南星製半夏各一兩半軟石膏香附各一兩山梔子七錢每八錢水煎服下氣門下氣屬心虚經云夏脉者心也心脉不及下為氣泄者是也河間云腸胃鬱結穀氣内發而不能宣通于腸胃之外故善噫而或下氣也診論云顛癎癆瘵若氣下泄不止者必死此真氣竭絶腸胃腠理閉塞穀氣不能宣通于腸胃之外故從腸胃中泄出也漏氣走哺門病者身背皆熱肘臂攣痛其氣不續膈間厭悶食入則先吐而後下名曰漏氣此由上焦傷風開其腠理經氣失道邪氣内著麥冬湯主之麥門冬生蘆根竹茹白术人參甘草茯苓陳皮萎𬎼走哺病者下焦實熱大小便不通氣逆不續嘔逆不禁名走哺人參湯主之人參湯即前方加知母石膏黄芩嘈雜門生生子曰内經云胃為水穀之海無物不受若夫濕麫魚腥水果生冷以及烹餁粘滑難化等物恣食無節脾氣受傷失其健運之常清痰稠飲由此而生嘈雜由此而作也夫嘈雜之為症似饑不饑似痛不痛而有懊惱不自寧之態是也或兼噯氣痞滿惡心漸至胃脘作痛數者多挾痰火故丹溪云嘈雜是痰因火動治法宜以南星半夏橘紅之類以消其痰芩連知母石膏梔子之類以降其火蒼术白术芍藥之類以健脾行濕又食鬱者梔子薑炒黄連山查之類又有濕熱鬱滯不喜食者宜三補丸加蒼术倍香附蔣氏云心嘈索食白术黄連陳皮作丸白湯下七八十丸數服而愈要在臨症加減脉法右寸脉𦂳而滑兩寸弦滑胸中有留飲寸脉横者膈上有横積也右闗弦急甚者為木乗土位欲作胃反難治嘈雜亦有中氣不足者以六君子湯加竹茹黄連三補丸黄芩黄連黄栢等分蒸餅糊丸服三聖丸白术四兩黄連四錢陳皮一兩神麴糊丸薑湯下右闗脉沉嘈雜二陳湯加藿香若吐而有物有聲者加砂仁有聲無物加薑炒黄連眩暈門丹溪曰眩言其黒暈言其轉林氏曰眩者𤣥也謂忽然眼見黑花昏亂少頃方定暈者運也謂頭目若坐舟車而旋轉運也甚有至于卒倒而不知者丹溪又曰此症屬痰者多盖無痰不能作眩雖因于風亦必有痰痰在上火在下火炎上而動其痰則作眩也治宜二陳湯加黄芩蒼术羌活挾氣虛者亦治痰為主兼補氣降火如東垣白术半夏天麻湯之類傷濕者降濕湯加川芎左脉數熱多脉澁有死血右脉實有痰積脉大乆病眩暈不可當者以大黄酒炒為末茶湯調下甚效戴云有因虚致暈雖暈然醒時面常欲得熱手按之盖頭者乃諸陽之㑹陽氣不足故耳有頭眩而耳中常鳴頭上如鳥雀啾啾之聲切不可全謂耳鳴為虛此頭腦挾風所為也原病式曰諸風掉眩皆屬肝木風主動故也所謂風氣甚而頭目眩暈者由金虛不能制木而復生火風火皆屬陽陽主動兩動相搏則為之旋轉也成無已曰傷寒頭暈與眩冒者皆發汗吐下後所致由陽虚也嚴用和曰眩暈之症經雖云皆屬于肝風上攻然體虚之人外感六滛内傷七情皆能眩暈當以脉証别之風則脉浮有汗項强不仁寒則脉𦂳無汗筋攣掣痛暑則脉虚煩悶濕則脉沉重則吐逆及其七情所感遂使臟氣不平鬱而生涎結而為飲隨氣上逆令人眩暈眉􅏢骨痛眼不可開寸脉多沉此為異耳若疲勞過度下虚上實金瘡吐衂便利及婦人崩傷産後去血過多皆令人眩暈當隨其因治之張子和曰頭風眩暈手足麻痺胃腕發痛皆風寒暑濕之氣雜至合而為痺也在上為之停飲可用獨聖散吐之吐後服清上辛涼之藥劉宗厚曰眩暈一証人皆稱為上盛下虚所致而不明言其所以然之故所謂虚者血與氣也所謂實者痰涎風火也原病之由有氣虚者乃清氣不能上升或多汗亡陽當升陽補氣有血虛者乃因亡血過多陽無所附當益陰補血此皆不足之症也有因痰涎鬱遏者宜導痰開鬱重則吐下有因風火所動者宜清上降火又有外感而得者嚴氏雖分四氣之異皆當散邪為主此皆有餘之症也世所謂氣不歸元而用丹藥鎮墜沉香降氣之法盖香竄散氣丹藥助火其不歸之氣豈能因此而復耶内經所謂治病必求其本氣之不歸求其本而用藥則善矣林氏曰滛慾過度腎家不能納氣歸元使清氣逆奔而上此眩暈出于氣虚也吐衂崩漏肝家不能收攝榮氣使諸血失道妄行此眩暈生于血虚也氣虚者宜益氣補腎湯血虚者宜補肝養榮湯若專用温熱鎮墜丹藥多致飛越之元其害有不可勝言者矣生生子曰按劉林二公慎丹劑戒燥熱俱為保金水二臟真陰而言也木之有餘則挾火勢而侮肺金金受火侮津液枯涸降令不行生化之源絶矣況斵䘮枯燥之腎曷能為其母復仇耶由是假藥餌以相濟也既知其腎虚不能納氣歸元矣寧復更以燥熱傷其母可乎都縁滯于温補下元之説不體認夫真陰真陽之虚實以故相循習俗而為流弊也凡物各有屬也肺出氣腎納氣今氣不歸元是腎之真陰不足當益腎陰以全其職可也腎雖屬陰臟而用藥亦自有氣血之分焉氣虚則用補骨脂杜仲兎絲子之類如安腎丸之謂也若血虚則以山藥山茱萸熟地黄之類如六味地黄丸之謂也氣是無形者至清所以能走空竅而施精明非有形之丹石所能鎮墜二公辨之允矣或曰經云形不足者温之以氣精不足者補之以味吾子以温補為謬可乎予曰前人已註之矣温是温存之温非專指温暖之藥而言也味是味之厚者乃陰中之至陰本乎天造非偏厚出于人為之味也是皆不以温熱為補明矣前証若果屬腎虚木旺火亢金衰則當從東方實西方虚㵼南方補北方之治則其氣自平而無偏倚之患也矣眩暈一証前賢著述病因方藥可謂周且偹矣原其著述各有所發明也劉河間之肝木兼于風火之化成無已之傷寒引汗吐下後之虛嚴用和之四氣七情張子和之停飲吐法朱丹溪之痰火濕熱氣虛血虛死血乆病戴氏之陽虚劉宗厚林億公之陰虚戒温熱香竄之丹劑各剖其衷製方立論誠後學之寶鑒一展視之毫髮畢覩原其設意盖以人之司命為重故不以研心為勞也庸是窮究精㣲不為成説所縛補前人所未盡開來學之䝉蔽得非仁人之心其心歟今之醫者每每檢方治疾至于經㫖病機全不攷究甚至有得一僥倖之方就以足為世世𫝊家至寶不妄泄人噫何其鄙哉方前諸君子吐心露膽者為何如人耶聖人未嘗以聖自期也盖以其有公天下之心立徳不衰而後人稱之也賢人未嘗以腎自待也盖以其有同天下之志繼聖不怠而後人誦之也後之視今亦猶今之視古也學者能不以聖腎之心為心焉鈎藤散肝厥頭暈清目鈎藤陳皮半夏麥冬茯苓石膏人參甘菊防風各五錢甘草一錢半每服四錢薑七片水煎温服肝厥狀如癎疾不醒嘔吐醒後頭虚暈發熱麻黄鈎藤取皮石膏乾薑半夏曲柴胡甘草枳殻甘菊每四錢薑三片棗一枚水煎温服婦人患頭風眩者十居其半每發必掉眩如在車上盖因血虚肝有風熱故耳余嘗取此方以授人比他藥捷而效速名曰芎藭散川芎一兩川歸三兩羌活旋復花蔓荆子細辛石膏藁本荆芥穗半夏曲炒防風熟地甘草各半兩每五錢薑三片水煎温服天麻半夏湯風痰内作胸膈不利頭旋眼黒兀兀欲吐上熱下寒不得安卧天麻半夏各一錢橘紅柴胡各七分酒芩前胡甘草炙白茯苓各五分黄連三分薑三片水煎食後温服忌生冷酒麫益氣補腎湯滛慾過度腎家不能納氣歸元使諸氣逆奔而上此眩暈出于氣虚也人參黄茋蜜炙各一錢二分白术二錢山藥山茱萸各一錢半白茯苓一錢甘草炙五分棗二枚水煎服補肝養榮湯吐衂崩漏肝家不能收攝榮氣使諸血失道妄行此眩暈生于血虚也當歸川芎各二錢芍藥熟地陳皮各一錢半甘菊一錢甘草五分水煎食前服若腎虛氣不降者去菊花入前補腎湯清眩化痰湯痰火上攻作眩及氣不降胸滿者川芎酒芩各一錢半天麻一錢半夏湯泡二錢白茯苓橘紅各一錢二分桔梗枳殻各一錢甘草四分痰結眩暈甚者加南星旋覆花各一錢六合湯風虚頭暈及血虛或去血過多當歸川芎各二錢白芍藥熟地各一錢半秦芁一錢羌活七分水煎食逺服川芎散勞倦後身體發熱眩暈神魂不安山茱茰一兩山藥甘菊花人參茯神小川芎各半兩右末每服二錢酒調下安腎丸腎虚頭眩牙齒疼痛腰痛破故紙炒胡蘆巴炒茴香炒川棟炒續斷炒各三兩桃仁炒杏仁炒各一兩山茱茰茯苓各一兩半右末蜜丸梧子大空心鹽湯下五十丸六味地黄丸見虚損門加味參夏湯七情相干眩暈欲倒者人參半夏各一兩半肉桂一兩甘草炙五錢乳香三錢每五錢薑五片水煎服又治七情之氣鬱於心腹痛不可忍脉沉遲一服立效枯礬散治痰暈枯礬為末薑湯調下一錢吐之立愈清上丸安神治痰火眩暈石菖蒲酸棗仁膽星茯苓黄連半夏神麴橘紅各一兩殭蠶青黛木香各五錢柴胡七錢半竹瀝打糊為丸食後茶下一錢五分瘖門瘖者邪入陰部也經云邪搏陰則為瘖然有二症一曰舌瘖乃中風舌不轉運之類是也一曰喉瘖乃勞嗽失音之類是也盖舌瘖但舌本不能轉運言語而咽喉音聲則如故也喉喑但喉中聲嘶而舌本則能轉運言語也痰涎乗虚閉塞舌本之脉道令人瘖丹溪謂一人年三十五連日勞倦發噉發􅒻醫與􅒻藥三發後變為發熱舌短言語不辯喉間痰吼有聲脉洪數似滑遂以獨參湯加竹瀝兩蚶殻許兩服後吐膠痰三塊舌本正而言可辯餘症未退遂煎人參黄茋湯服半月而諸症皆退粥食調補兩月方能起一中年舌短言語不辯始傷寒身熱師與傷寒藥五帖後變神昏而瘖遂作體虛有痰治以人參五錢黄茋當歸白术陳皮各一錢煎湯入竹瀝薑汁飲之十二日其舌始能語得一字又服之半月舌漸能轉運言語熱除而痊足少陰脉挾舌本足太陰之脉連舌本手少陰别繫舌本若此三脉虚則痰涎乗虚而閉塞其脉道故舌不能轉運言語也若此三脉亡血則舌無血營養而瘖經云刺舌下中脉太過血出不止為瘖治當補氣血一男子年五十餘嗜酒吐血桶許後不食舌不能語但渇飲水脉畧數與四物各一兩參术各二兩陳皮一兩半甘草二錢入竹瀝童便薑汁至二十餘帖乃能言凡此三脉風熱中之則其脉弛縱故舌亦弛縱不能轉運而瘖風寒客之則其脉縮急故舌强舌卷而瘖治在中風半身不收求之也脉要精㣲篇岐伯謂心脉搏堅而長當病舌轉不能言丹溪治俞繼道遺精誤服參茋及升浮劑遂氣壅于上焦而音聲不出用童便浸香附為末調服而疎通上焦以治瘖又用蛤粉青黛為君黄栢知母香附佐之為丸而填補下焦以治遺十餘日良愈本草云童便主乆嗽失音故治瘖多用之由其能降火故也出音聲方訶子炮去核木通各一兩甘草半兩用水三升煎一升半入生薑地黄汁一合再煎數沸放温分六服食後日三服訶子治逆氣破結氣木通利九竅治肺癰甚當訶子湯治失音不能言語訶子四兩半生半煨桔梗一兩半生半炒甘草二寸半炙半生右末每服二錢童便一盞水一盞煎至七沸温服甚者不過三服愈桔梗通利肺氣訶子泄肺導氣童便降火甚速又方桔梗三兩大訶子四箇甘草炙二兩每服三四錢水煎入砂糖一小塊次入童便時時細呷一日服盡其效甚速發聲散治咽喉語聲不出括萎皮白殭蠶去頭甘草俱炒黄等分為末每温酒調下三錢或生薑自然汁調下用五分綿裹噙化咽津亦可日二三次不拘時肘後方咽喉卒失音不出陳皮五兩水三升煮取一升頓服玉粉丸冬月寒痰結在咽喉語聲不出半夏炮五次草烏炒二分半桂二分半為末生薑汁浸􅔻餅糊為丸雞豆大每夜噙化一丸多年不愈皆效黄帝針經中説寒氣客于㑹厭卒然而啞此藥主之蛤蚧丸治肺間邪氣胸中積血作痛失音并治乆欬失音蛤蚧一對去嘴足温水浸去膜刮了血脉用好醋炙訶子煨阿膠炒生地麥門冬北細辛甘草炙各五錢為末蜜丸棗子大每食噙化一丸千金方暴失音語聲不出杏仁泥薑汁沙糖白蜜各一升五味子紫苑各三兩通草貝母各四兩桑白皮五兩右水九升煮五味紫苑通草貝母桑皮取三升去渣納杏仁泥薑汁蜜糖㣲火攪煎取四升初服三合日再服一合後稍加通聲膏五味子欵冬花通草各三兩人參石菖蒲細辛桂心竹茹各二兩杏仁一升白蜜二斤棗膏薑汁一升酥五升水五升㣲火煎三上三下去滓納薑汁棗膏酥蜜煎令調和酒服如棗大二丸丹溪治欬嗽聲嘶者此血虚受熱也用青黛蛤粉蜜調服之濟世方治失音及咯血槐花瓦上炒香出火毒三更後床上仰卧隨意吞之又方治卒啞杏仁去皮尖三分桂一分研如泥和取杏核大綿裹含細細呷之日五夜三丹溪治失音以桂末着舌下嚥津妙子金斗門食忌聖惠方同内侍曹都使新造一宅落成入居半月飲酒大醉卧起失音不能語召孫至診曰因新宅故得此疾耳半月當愈但服補心氣薯蕷丸治濕用川芎細辛又十日其病漸減二十日全愈曹既安見上問誰治曰孫兆郎中上乃召問曰曹何疾也對曰凡新宅壁上皆濕地亦陰多人乍來陰氣未散曹心氣素虚飲酒至醉毛竅皆開陰濕之氣乗虛而客心經所以不能語臣先用薯蕷丸使心氣壯熱然後以川芎細辛去其濕所以能語也靈樞經黄帝問于少師曰人之卒然憂恚而言無音者何道之塞何氣出行使音不彰願聞其方少師曰咽喉者水穀之道路也喉嚨者氣之所以上下者也㑹厭者聲音之户也口唇者音聲之扇也舌者音聲之機也懸雍垂者音聲之闗也頏顙者分氣之所泄也横骨者神氣所使主發舌者也故人之鼻洞涕出不收者頏顙不開分氣失也是故厭小而疾薄則發氣疾其開闔利其出氣易其厭大而厚則開闔難其氣出遲故重言也人卒然無音者寒氣客于厭不能發發不能下至其開闔不至故無音黄帝曰刺之奈何岐伯曰足之少陰上繫于舌絡于横骨終于㑹厭兩㵼其血脉濁氣乃辟㑹厭之脉上絡任脉取之天突其厭乃發也胎前産後瘖素問黄帝曰人有重身九月而瘖此為何也岐伯曰胞之絡脉絶也帝曰何以言之岐伯曰胞絡者繫于腎少陰之脉貫腎係舌本故不能言帝曰治之奈何岐伯曰無治也當十月復郭氏論産後不語者何荅曰人身有七孔三毛産後虚弱多致停積敗血閉于心竅神志不能明了心氣通于舌心氣閉塞則舌亦强矣故令不語但服七珍散七珍散産後敗血閉塞心竅令人不語人參石菖蒲生地川芎各一兩細辛防風辰砂另研各半兩為末每服一錢薄荷湯調下胡氏孤鳳丹産後閉目不語白礬研末每一錢熱水調服疸門夫疸者謂濕與熱鬱蒸于脾面目肢體為之發黄是也疸之名有五一曰黄汗者身體俱腫汗出不渇其汗能染衣黄如蘗汁此由脾胃有熱汗出為風所閉熱結于中其汗黄也二曰黄疸食已即饑遍身俱黄但欲卧小便澁黄増寒壯熱此酒麫􅏼炙藴熱瘀滯而得也三曰穀疸食畢即頭眩心中怫鬱不安遍身發黄此脾胃有熱因大饑過食有傷胃氣所致也四曰酒疸身目俱黄心中懊痛足脛滿小便黄面發赤班此由饑中飲酒大醉當風入水所致也五曰女勞疸大勞滛慾大熱交接袵席未幾遽就浴室以致發熱惡寒小腹滿急而身目俱黄也五者之証雖不同而其為黄則一也原其所自未有不由濕熱而致者也濕也熱也而豈無輕重之别乎濕氣勝則如薫黄而晦熱氣勝則如橘黄而明盖脾主肌肉土色本黄濕熱内蒸或重或輕自然見于外矣自其濕熱瘀而傷血此又為血症發黄何以明之疸症之黄小便不利血症之黄小便自利夫脾受濕熱鬱而不行亦多有腹脹之疾治法大要疎導濕熱于大小便之中如茵陳五苓黄連三黄之劑皆要藥也然又單陽無陰病熱已極疸而不渇猶為可療疸而復渇加之腹膨則為難治矣甚者寸口無脉鼻出冷氣與夫形如烟薫揺頭直視為心絶環口黧黒柔汗發黄為脾絶雖遇盧扁亦將不救孰謂黒疸其可療乎加減五苓散飲食伏暑鬱發為疸煩渇引飲小便不利茵陳猪苓白术赤茯苓澤㵼各二錢水煎食前服一方有桂心七分葛根荳豉湯治酒疸葛根三錢山梔仁枳實麩炒荳豉各二錢炙甘草一錢水煎服秦芁飲子五疸口乾發熱㣲寒秦芁當歸芍藥白术官桂熟地黄茯苓陳皮小草川芎半夏甘草炙各一錢加薑五片水煎服山茵陳湯疸症發熱大小便秘澁山茵陳梔子赤茯苓枳實各一錢半葶藶甘草各一錢薑二片水煎服加味四君子湯治色疸人參白术茯苓白芍藥黄茋炙白扁豆炒各二錢甘草炙一錢薑五片棗二枚水煎服茵陳湯時行瘀熱在裏鬱蒸不散通身發黄茵陳一兩梔子仁一錢半大黄三錢水煎服當歸白术湯酒疸發黄心胸堅滿不進飲食小便黄赤脉弦濇當歸黄芩茵陳甘草炙各一錢白术二錢半夏杏仁麩炒去皮尖枳實麩炒前胡各一錢半茯苓二錢薑三片水煎服白术湯酒疸因下後變為黑疸目青面黒心下如啖蒜虀狀大便黑皮膚不仁脉㣲而數白术桂心各二錢枳實荳䜴葛根杏仁炒去皮尖甘草炙各一錢水煎服桂枝加黄茋湯黄汗身腫汗出已輒輕乆乆必身潤胸中痛腰已下無汗其腰弛痛如有物在皮中劇者不能飲食煩燥小便不利桂枝二錢芍藥三錢甘草炙一錢黄茋三錢薑五片棗三枚水煎服忌生冷茵陳散黄疸食已即饑身體面目爪甲牙齒及小便悉黄寒熱或身體多赤多青皆由酒食過度為風濕所搏熱氣鬱蒸而成茵陳木通大黄炒梔子各一兩石膏二兩𤓰蒌一箇甘草炙半兩每五錢薑五片葱白一莖煎至八分服大小便秘加枳實赤茯苓葶藶又有傷寒瘀血不解鬱于表發為黄疸其脉浮𦂳當以汗解獨煎麻黄湯飲之黄茋湯黄汗身體腫發熱不渇汗出染衣黄色黄茋蜜炙赤芍茵陳各二兩石膏四兩麥門冬淡豆豉各一兩甘草炙半兩竹葉十四片薑三片水煎服滑石散治女勞疸枯礬五錢滑石一兩半為細末每二錢用大麥粥湯調服以小便出黄水為度㗜藥𤓰蒂散黄疸遍身如金色累效𤓰蒂二錢母丁香四錢黍米四十九粒赤小豆五分為末每夜以少許吹兩鼻内㗜入便睡明日取下黄水次服黄連散黄連散黄疸大小便秘臟腑壅熱黄連大黄醋炒各二兩黄芩甘草炙各一兩每服二錢白湯下日三犀角散發黄心膈煩躁目赤痛犀角屑黄芩梔子仁升麻各一兩茵陳朴硝各二兩每五錢竹葉七片水煎服紫金丸脾胃食積結塊令人四肢怠惰身面俱黄肚腹膨脹俗名黄胖病此藥能理脾胃消積聚退黄去脹進飲食針砂銀鍋内醋炒赤色研紫金皮酒浸香附炒京三稜煨蒼术米泔浸炒陳皮厚樸砂仁各一兩麵糊丸梧子大每三十丸白湯下或酒或川椒湯亦可忌牛肉沙魚等物大温中丸食積黄腫病蒼术厚朴陳皮三稜蓬术青皮各五兩香附一斤甘草二兩針砂醋炒紅三兩醋糊丸梧子大每五十丸空心薑湯下午後鹽湯下臨卧酒下金黄丸食積酒積諸積面黄積塊堅硬疸症京三稜黑丑各二錢巴豆四十九粒去油為末黍米粉香附各半兩澤㵼一錢半為末梔子煎湯和丸菉豆大每三五丸食逺白湯下穀疸丸專治穀疸苦參三兩龍膽草一兩牛膽一兩為末以膽汁入少煉蜜丸梧子大每五十丸空心滚水或生薑甘草煎湯下治黄疸效方生蘿蔔子焙為末白湯調下日三服每用二錢厥證門脉沉㣲而不數謂之寒厥沉伏而數謂之熱厥内經曰厥之寒熱者何也陽氣衰于下則為寒厥陰氣衰于下則為熱厥熱厥之為熱必起于足者陽氣起于足五指之表陰脉集于足下而聚于足心故陽氣勝則足下熱也寒厥之為寒必從五指而上于膝者陰氣起于足五指之裏集于膝下而聚于膝上故陰氣勝則從五指至膝上寒也寒厥何如而然前陰者宗筋之所聚太陰陽明之所合也春夏則陽氣多而陰氣少秋冬則陰氣盛而陽氣衰此人質壯秋冬多慾而奪其精則陽氣日衰不能滲榮其經絡陰氣獨在邪氣因從之而上故手足為之寒也熱厥何如而然酒氣盛而慓悍酒入于胃則絡脉滿而經脉虛脾主為胃行其冿液者也陰氣虚則陽氣入而胃不和胃不和則精氣竭而不榮其四肢此人數醉若飽以入房氣聚于脾中不得散酒氣與穀氣相搏熱盛于中故腎氣日衰陽氣獨勝熱遍于身熱内而溺赤手足為之熱也此内經論寒厥為手足寒熱厥為手足熱不専以厥為手足冷矣故以六經厥狀言之太陽之厥腫首頭重足不能行發為眴仆陽明之厥癲疾走呼腹滿不得卧面赤而熱妄見妄言少陽之厥頰腫而熱暴聾脇痛胻不可以運太陰之厥腹滿䐜脹後不利不欲食食則嘔不得卧少陰之厥口乾溺赤腹滿心痛厥陰之厥少腹腫痛腹脹溲不利好卧屈膝陰囊腫胻内熱此分六經之厥亦不出寒熱二證劉宗厚謂陽證至為眴仆為癲疾為妄見陰證至為䐜脹大小便不利或嘔或心痛之類皆素多痰氣因虚所乗之為病陳無擇謂攻其所因多以不勝乗其所勝氣不得行遂致厥逆如腎移寒于脾則水乘于土水既不行乃成寒厥如心移熱于腎則火乗于水火既不行乃成熱厥六經皆然可次第論也再考張仲景傷寒論陰陽二厥之證則皆指手足逆冷而言不以陽厥為手足熱也原病式謂陰厥者原病脉候皆為陰證身涼不渇脉遲而㣲陽厥者原病脉候皆為陽證煩渴譫語身熱脉數若陽厥極深或失下變為身冷脉㣲欲絶反見陰證者正為熱極而然若悞作陰證而用熱藥治之必死王安道云熱極而成厥逆者陽極似陰也寒極而成厥逆者獨陰無陽也陽極似陰用寒藥獨陰無陽用熱藥今詳内經所論寒熱二厥由腎之精氣内竭而成乃常病虚損之證寒厥當補陽熱厥當補陰王氷所謂益火之原以消陰翳壯水之主以鎮陽光是也若仲景河間安道所論厥證乃傷寒𫝊變手足厥冷者病情不同治法亦異診察之間生死反掌醫者當詳究焉按傷寒陽厥者先自三陽氣分感寒起于頭痛發熱惡寒後𫝊入三陰血分變出四肢厥冷大便燥實譫語煩渇揚手擲足不惡寒反怕熱脉沉有力等証此因大實失下使血氣壅閉不通故手足厥冷其手冷上不過肘足冷上不過膝或有時而乍温是外雖厥冷内實熱邪耳如火煉金熱極則金反化水所謂亢則害其物承乃制其極也厥㣲者熱㣲四逆散厥深者熱深大承氣湯若悞作寒証而投熱藥是抱薪救火矣傷寒陰厥者是因三陰血分自受寒邪初病無身熱頭痛就便惡寒四肢冷過肘膝引衣踡卧或腹痛吐利小便清白或戰慄面如刀刮口吐涎沫脉沉遲無力此陰証也又有病自三陽𫝊入三陰乆而變寒者亦陰厥也輕者理中湯甚者四逆湯且夫人之手足乃胃土之末凡脾胃有熱手足必熱有寒手足必寒此理之常至于亢極反成兼化此又病形之變也故凡厥無脉可診未辯其為陰陽者且與理中丸加甘草一倍試之若陽厥便當見出熱証陰厥則無熱証矣此法記之汪子良内外厥論曰素問云盛則㵼之虚則補之不盛不虛以經取之靈樞引此以言人迎寸口經刺之法難經引此以言子母本經補㵼之方而王氏真邪相持之註尤别夫聖人之言所該自廣固可推而無不通然此段屬之六經厥狀病能之下而意實兼承上文寒熱之厥而着其所以治之之法故盛則㵼之言熱厥也虚則補之言寒厥也皆主内傷不虛以經取之言六經厥狀此主外感按經有言熱為有餘寒為不足寒熱盛衰之别乆矣而人之一身臓腑咽喉之類屬内經脉四肢皮膚頭頂之類屬外故内傷之治在臟腑外感之治在經絡不可紊也觀上文云熱厥之故因酒入内氣薄于脾胃酒氣慓悍腎氣獨衰陽氣獨盛故手足為之熱矣陽挾酒毒鬱而為熱非盛而何故其治當㵼陽氣之有餘也又觀上文云寒厥之故因秋冬勞傷脾胃陽虚不能滲營其經絡陽氣獨損陰氣獨存故手足為之寒也陽為陰搏痞而為寒非虚而何故其治當補陽氣之不足也此二治者皆主内傷也非因内傷則臟腑之内無盛虚之分由外感邪氣客于經脉之間須審兼某經之証則取其經隨病盛衰而施補㵼也如腫首頭重足不能行發為眴仆者取之太陽如胻急攣心痛引腹者取之太陰之類是知此則聖言各有所指而意亦可以觸類而通矣有人冐犯不正之氣忽然手足逆冷肌膚粟起頭面青黒精神不守牙𦂳口噤昏不知人頭旋暈倒者此尸厥也凡弔死問䘮入廟登塜飛尸鬼擊多有此病急以蘇合香丸灌之候稍甦省以調氣散合平胃散治之名調氣和胃散一法急用薑汁半盞酒半盞煎沸灌之灸百㑹四十九壯氣海丹田二三百壯覺體暖即止後以陰毒法治之此臓氣虚寒之証也世俗不識多作中風而治鮮不斃矣靈樞云邪客于手足少陰太陰足陽明之絡此五絡皆㑹于耳中上絡左角若臟氣相刑或外邪相忤則氣遏不行五絡俱絶諸脉伏匿令人身脉皆動而形無所知其狀若尸故名尸厥昔扁鵲治虢太子之尸厥針三陽五㑹而愈正此謂也有人七情内傷卒然氣逆身冷僵仆牙闗𦂳急痰涎潮壅昏不知人者此氣厥也凡忿怒太甚多有此病勿悞作中風而用踈風散之藥急以蘓合香丸灌之候省以八味順氣散或木香調氣散調降其氣自然平復有痰者以四七湯加南星木香治之然暴厥不知人有不治自愈者昔宋仁宗最寵貴妃一日食次忽仆倒遍身卒冷急召孫尚杜任至奏曰不妨此氣厥耳少頃吐即復甦御坐良乆果而甦上問因何而得二人並奏曰貴妃方食因憂怒氣上與食相併故如此吐即氣通故復甦也素問云厥或令人腹滿或令人暴不知人或至半日逺至一日乃知人者陰氣盛于上則下虛下虛則腹脹滿陽氣盛于上則下氣重上而邪氣逆逆則陽氣亂陽氣亂則不知人也又云血之與氣并走于上則為大厥厥則暴死氣復反則生不復反則死者是也厥因氣虛而得者其脉細小宜四君子湯加黄茋附子因血虛而得者脉洪大宜四物湯加酒炒黄柏知母因氣血兩虚而得者宜十全大補氣血加附子有吐衂不知人而厥者此血厥也治之無論其脉急用芎歸養榮湯十全大補湯或獨參湯以救之厥因飲酒而得者宜二陳湯加黄連梔子乾葛青皮或葛根解酲湯加減治之有人醉飽之後或感風寒或着惱怒忽然厥逆昏迷口不能言肢不能舉者此食厥也盖食滯胸中陰陽痞隔升降不通故生此症若悞作中風而用祛風散氣之劑則胃氣重傷死可立待宜煎薑鹽湯探吐其食後以平胃散加茯苓白术麥芽半夏之類調理若有風寒尚在者以藿香正氣散解之氣滯不行者以八味順氣散調之有小兒手足搐搦而發厥者此風厥也宜加減續命湯五色篇雷公曰人不病而卒死何以知之黄帝曰火氣入于臟腑者不病而卒死矣雷公曰病小愈而卒死者何以知之黄帝曰赤色出兩顴大如拇指者病雖小愈必卒死黑色出于天庭大如拇指必不病而卒死薑附湯乾薑炮附子水煎涼服星香散南星四錢木香臨熟磨五分薑三片水煎服順元散木香磨五分川烏炮一錢南星二錢附子炮一錢薑三片水煎服導痰湯南星半夏枳實橘紅赤茯苓甘草炙薑三片水煎服調氣和胃散白豆蔲木香丁香檀香藿香葉砂仁甘草蒼术厚朴陳皮水煎服八味順氣散白术茯苓青皮陳皮人參白芷烏藥甘草水煎服木香調氣散木香藿香丁香檀香白豆蔲砂仁甘草為末沸湯入鹽少許㸃服二錢芎歸養榮湯當歸川芎白芍藥熟地黄黄栢知母人參枸杞子麥門冬甘草水煎服加減續命湯防風防己人參黄芩白芍藥川芎甘草炙麻黄杏仁桂枝附子炮生薑水煎服右方太陽無汗去桂枝附子有汗去麻黄杏仁陽明無汗加石膏知母有汗加葛根黄芩傷寒病有胃中虚寒蛔䖝攻胃而手足厥冷口吐清水或吐蚘者此蛔厥也宜理中湯加炒川椒㯽榔煎吞烏梅丸如不止用烏梅川椒黄栢煎服盖蛔見酸則安見辛則伏見苦則不敢動也烏梅丸烏梅二十五枚細辛附子炮人參黄栢桂枝五錢乾薑八錢黄連一兩三錢當歸川椒二錢右末以醋浸烏梅取肉蒸爛杵膏加煉蜜和丸每十五丸食前服四逆散甘草炙柴胡芍藥枳實等分為末白湯調服方寸匕日三服蘇合香丸治厥方見氣門論吐法王海藏曰病有當吐而不可吐者如尺中脉按之有力則當吐之若尺中按之無力不可吐也有力則陽氣下䧟于陰中為陰中所遏故吐之使陽氣得上升而復其平也綱目論病不可吐者有六病勢劇甚老弱氣衰者不可吐吐不止則亡陽血虛者不可吐諸吐血嘔血咯血衂血嗽血血崩失血者皆不可吐病人無正性妄言妄從者不可吐主病者不辨邪正之説不可吐性行剛暴好怒喜滛之人不可吐張子和曰凡涌後有頓快者有徐快者有反悶者悶者病未盡也有反熱者不可不下也大抵三日後無不快者凡下不止者以氷水解之凡藥熱即行寒即止生生子曰經云上部有脉下部無脉其人當吐不吐者死王海藏謂尺脉按之無力不可吐非與經背也經云下部無脉者謂病人當其正吐之時氣脉皆上逆而下虚是言病勢脉勢也若其人不吐而脉不至于尺乃腎經之原氣絶矣故云下部無脉者死也海藏謂尺脉按之無力不可吐者是言治法也凡尺脉有力則腎間有原氣當吐去其邪則安矣若尺脉無力是腎陰已虚吐則復傷其陽陰陽俱虛必致顛蹶故曰尺脉無力者不可吐也經言其病王言其治也茶調散一名二仙散𤓰蒂不以多少好茶中停右細末每二錢虀汁調下空心服獨聖散𤓰蒂不以多少為細末每一二錢虀汁調下服之脇痛加全蝎頭痛加蔚金碧雲散治小兒驚風有涎膽礬半兩銅青一分粉霜一錢輕粉一分右細末每一字薄荷湯下中風以漿水調赤水元珠卷十六
