body:
  text: 赤水元珠卷二十三明孫一奎撰産後乍見鬼神産後如見鬼神或言語譫妄皆由血氣虧損隂虛發熱或瘀血停滯以致心神煩躁而然也宜以調經散治之薛氏曰若敗血停滯用調經散若血虛發熱用八珍加炮薑若心血虛損用柏子仁散大抵此證皆由心脾血少所致但調補胃氣則痰清而神自安矣若果係鬼祟所附即灸鬼哭穴可愈其或不起者多因豁痰降火攻伐之過也一産婦患前症或用調經散愈而復作仍服前散益甚痰涎上湧朝寒暮熱乃早用八珍散夕用加味歸脾湯各五十餘劑而愈調經散治血虛經閉心神煩躁渾身疼痛或時見怪沒藥琥珀桂心各一錢白芍炒當歸各七分細辛五分麝香少許右為末每服半錢薑湯酒各少許調服柏子仁散治産後元氣虛弱瘀血停滯狂言亂語柏子仁逺志人參桑寄生防風當歸炒生地甘草炙各等分用白羊心一個水三盞煮清汁七分入藥五錢煎服産後心神驚悸薛氏曰人之所主者心心之所主者血心血一虛神氣不守此驚悸所由作也當補血氣為主一産婦患前症二度服琥珀地黃丸局方妙香散隨效再患服之其症益甚而脈浮大按之如無發熱惡寒此血氣俱虛乃以十全大補加味歸脾二湯各百餘劑而愈後遇驚恐勞怒復作仍服前藥而安琥珀地黃丸治産婦惡露未盡胸腹作痛或小便不利琥珀延胡索糯米同炒去米川歸各一兩蒲黃四兩大生地研取汁留滓生薑各二斤研取汁留滓生薑汁石銀器內炒地黃滓以地黃汁炒生薑滓各乾為度右為末蜜丸如彈子大每服一丸當歸煎湯化下治血虛驚悸少寐及産後敗血停留少腹作痛辰砂琥珀沒藥當歸等分右為末每服二錢空心日午臨卧白湯調下治産後驚悸亂語精神不定用好硃砂為細末每以酒調下一錢産後中風恍惚産後恍惚因元氣俱虛心經血少或外邪所侵以致心神恍惚怔忡不寧薛氏曰當大補氣血為主而佐以後方為善蓋風乃虛極之假象也固其本元諸病自退若專治其風則速其危矣一産後患前症盜汗自汗發熱晡熱面色黃白四肢畏冷此氣血俱虛用八珍湯不應更用十全大補加味歸脾二湯始應後因勞怒發厥昏憒左目牽緊兩唇抽動小便自遺作肝火熾盛用十全大補加鈎藤山梔而安再用辰砂逺志丸而愈辰砂逺志丸産後中風驚狂起卧不安或痰涎上湧石菖蒲逺志去心蘆用甘草湯煮人參茯神辰砂各三錢川芎山藥鐵粉麥冬細辛天麻半夏南星白附子各一兩為末薑汁糊為丸菉豆大别以硃砂為衣每服三十丸薑湯送下産後極虛生風産後生風因去血過多氣無所主以致唇青肉冷汗出目眩神昏急服濟危上丹若投以風藥則誤甚矣薛氏曰若心脾氣血虛用十全大補湯如不應加附子鈎藤鈎若肝經血虛用逍遙散加鈎藤經云脾之榮在唇心之液為汗乃心脾二臟虛極急用參附湯救之一婦患前症或用諸補劑四肢逆冷自汗泄㵼腸鳴腹疼以為陽氣虛寒用六君子薑附各加至五錢不應以參附加至一兩始應良久不服仍前腸鳴腹痛後灸關元穴百餘壯及服十全大補湯方效濟危上丹乳香五靈脂硫黃玄精石阿膠卷柏桑寄生陳皮各等分將上四味入石器微火炒再研入餘末用生地黃汁丸梧子大每服二十丸食前溫酒或當歸酒下當歸建中湯治産後腹痛拘急痛連腰背自汗少食當歸桂心各三兩白芍六兩炙甘草二兩每服五錢薑棗水煎入飴糖一匙以效為止獨參湯一切失血惡寒發熱作渴煩躁或口噤痰鳴自汗盜汗氣虛脈脫手足逆冷蓋血生於氣補氣者乃陽生而隂長也産後虛汗不止産後汗不止者皆陽氣頓虛腠理不密而津液妄泄也若遇風則變痙縱虛乏短氣則身體消瘦唇口乾燥久則經水斷絶由津液竭故也薛氏曰若血氣俱虛急用十全大補湯如不應參附芪附湯恐汗多亡陽發痙尤當用之王好古曰頭汗出至頸而還額上偏多蓋額為六陽之所會也由虛熱薰蒸而出竊謂前症當以部位分之額左屬肝額右屬肺鼻屬脾頥屬腎額屬心治者審之一産婦略聞音響其汗如水而昏瞶諸藥到口即嘔作脾氣虛憊用參附末為細丸時含三五粒液下乃漸加至錢許却服參附湯而痊一産婦盜汗不止遂致廢寐神思疲甚口乾引飲乃血虛有熱用當歸補血湯以代茶又以當歸六黃湯內黃芩黃柏炒黑倍加人參五味子二劑而愈麻黃根湯産後虛汗不止身熱發渴驚悸不安當歸黃茋炒麻黃根牡礪煆炙甘草人參各等分水煎服産後氣脫汗不止小便短少四肢難以屈伸炙甘草一兩附子炮五錢桂心白芍炒各一兩五錢每服三五錢加薑棗水煎服以效為止止汗散牡蠣煆五錢小麥麩炒八兩右為細末每服三五錢豬油汁調下人參湯産後諸虛不足發熱盜汗內熱晡熱等症人參當歸等分為末豬腰子一枚切片水二鍾糯米半合蔥白二根煮取汁八分入藥三錢煎服當歸六黃湯治氣血虛熱盜汗不止如不應加人參白术心血不足加炒酸棗仁當歸熟地黃茋炒各二錢生地黃柏炒黑黃芩炒黑黃連炒黑各一錢水煎服參附湯治陽氣虛寒自汗惡寒手足逆冷大便自利或臍腹疼痛呝逆不食或汗多發痙等症人參一兩大附子炮五錢作一服加薑棗水煎徐徐飲下當歸補血湯治肌熱燥熱目赤面紅煩渴引飲晝夜不息脈洪大而虛重按全無者當歸三錢黃茋炙一兩水煎服茋附湯治陽氣虛脫惡寒自汗或口噤痰湧四肢逆冷或吐㵼腹痛飲食不入及一切虛寒等症黃茋一兩附子炮五錢作一服加薑棗水煎如不應倍加附子乃得全濟汗多變痙産後汗多變痙因氣血虧損肉理不密風邪所乘口噤背強如癎或搖頭馬嘶不時舉發氣息如絶宜速灌小續命湯若汗出兩手拭不及者不治薛氏曰此因去血過多元氣虧損或外邪相搏以致牙關緊急四肢痙強或隂火內動或腰背反張肢體抽搐若有汗而不惡寒者曰柔痙若無汗而惡寒者曰剛痙由亡血過多筋無所養故傷寒汗下過多及潰瘍而濃血大泄者多患此乃敗症也急以十全大補湯治之如不應急加大附子多有復蘇者一産婦牙關緊急腰背反張四肢抽搐兩目連劄此去血過多元氣虧損隂火熾盛用十全大補加炮薑一劑而蘇數劑而安小續命湯治剛痙或腳氣痺弱不能轉舒行步欹側或口眼喎邪牙關緊急角弓反張麻黃桂心甘草各五錢防風白芍炒白术炒人參川芎大附子炮防已酒洗黃芩炒各等分每用五錢水煎入薑汁少許溫服若自汗為柔痙者去麻黃有熱去附子減桂一半盛冬初春去黃芩産後口噤腰背反張産後口噤由血氣虛而風邪乘於手三陽經也蓋手三陽之筋循結于頷得風冷則筋急故致口噤腰背攣急角弓反張者是風邪入於諸陽之經也薛氏曰若因血氣耗損腠理不密汗出過多而患之者乃虛象也宜固氣血為主佐以本方丹溪謂産後當大補氣血為先雖有它症以末治之如惡寒發熱等症乃氣血虛甚之極也宜大劑參茋歸术肉桂以培養之如不應急用炮附子再不應用人參一兩附子二三錢名參附湯倘猶不應乃藥力未能及也宜多用之婦人産後不省人事吐涎瘈瘲當歸荆芥穗等分三錢水一盞酒少許煎灌之下即蘇倘未應者當改用大補氣血藥張文仲治前症用白术四兩以酒濃煎頓服産後中風産後中風或氣血未復風寒所感以致筋攣拘急口眼歪斜或肢體緩弱入臟則恍惚驚悸郭稽中云産後強力下床或誤入房或憂怒內傷臟腑陳無擇曰當以脈辨而治之若努力下床月內入房憂怒者著艾非中風類乃蓐勞火邪之症薛氏曰若果外邪所屬形氣不足病氣有餘當補元氣為主稍佐以治病之藥若強力下床月內入房屬形氣病氣俱不足當純補元氣多有復蘇者若誤投風藥乃促其危也治産後身背拘急妄言發熱四肢拘攣不時驚悸川芎羌活羚羊角酸棗仁炒芍藥炒各四兩桑白皮一兩五錢防風一兩二錢五分每服六七錢水煎服治産後中風唇青鼻黑用小續命湯連進三服即愈産後中風煩渴用紅花子五合炒水煎徐徐呷之産後四肢筋攣産後中風四肢筋脈攣急乃氣血俱虛或風邪客於皮膚則頑痺羸乏若入於筋脈則四肢攣急皆由大經空虛風寒乘虛而漸入也薛氏謂肝屬木而主筋若肝經風熱血燥用加味逍遙散如不應當用六味丸以補腎水一産婦筋攣臂軟筋肉掣動此氣血俱虛而自熱也用十全大補湯而安一産婦手麻服愈風丹遍身皆麻神思倦怠乃氣血虛弱以十全大補湯加炮薑數劑漸愈去薑繼服而安産後遍身疼痛産後遍身疼痛者由氣虛百節開張血流骨節以致肢體沉重不利筋脈引急發熱頭痛宜用趂痛散治之陳無擇云若兼感寒傷食宜用五積散若誤作傷寒發汗則筋脈抽搐手足厥冷則變為痙當補氣血為主薛氏曰若以手按而痛益甚是血瘀滯也用四物炮薑紅花桃仁澤蘭補而散之若按而痛稍緩此是血虛也用四物炮薑人參白术補而養之趂痛散産後骨節疼痛發熱頭重四肢不舉牛膝酒炒甘草炙薤白各一兩當歸桂心白术炒黃茋炒獨活生薑各半兩每用五錢水煎服五積散治風寒所傷遍身疼痛腳氣疼痛或寒熱拘急嘔吐不食等症當歸浸白芍川芎桔梗各炒厚朴薑炒乾薑人參茯苓陳皮白芷蒼术半夏薑制肉桂麻黃炙甘草各五分入薑棗水煎服産後腰痛腎主腰腳産後腰痛者蓋腎為胞胎所繫此因産勞傷腎以致風冷客之若連背脊痛久未已後遇有孕必至損動薛氏曰若真氣虛而邪乘之者當歸黃茋湯或十全大補為主佐以寄生湯如不應須十全大補加附子一産婦腰痛腹脹善噫諸藥皆嘔乃脾虛血弱用白术一味炒黃每劑一兩米泔煎時飲一匙四劑後漸安服百劑全愈如神湯即生料五積散加桃仁逐敗血去風濕産後惡露不盡腰重痛或兩股痛如錐刺宜服桃仁湯若作癰用五香連翹湯桃仁湯治産後惡露不盡腹中作痛或流注腿股作痛急用此湯治之如未應多變作癰須用五香連翹湯桃仁去皮尖蘇木生地各半兩虻蟲去足翅炒水蛭炒各十三枚每服五錢薑水煎空心熱服以惡露下為度五香連翹湯木香丁香沉香麝香升麻獨活連翹木通桑寄生各二兩每劑五錢水煎入竹瀝少許服當歸黃茋湯治腰痛不可轉側或汗出壯熱氣短黃茋炒白芍藥炒各二兩當歸三兩每劑五錢水煎服産後腰痛兒枕痛産後腹痛或因外感內傷瘀血壅滯所致瘀血以失笑散風寒外感以五積散內傷飲食以養胃湯加山查治之産後兒枕痛者乃母胎中宿血也其痛在小腹大抵小腹痛多由惡露凝滯或外寒相搏若久而不散必成血瘕月水因之而不調也生生子曰設以手按之痛甚者瘀血也按之而痛緩者或喜熱物尉之者此虛中有寒也當補而溫之山查濃煎汁入砂糖少許服之極治兒枕痛以其能消瘀血故痛止也隱居澤蘭湯産後惡露腹痛或胸滿少氣澤蘭生地當歸芍藥炒生薑各一錢甘草炙五分大棗四枚水煎服失笑散治心腹痛産後瘀血上攻心腹疼痛而牙關緊急一服而愈五靈脂蒲黃各一錢醋水煎服五靈脂一味尤妙大岩密湯治湯氣虛寒心腹作痛不食四肢厥冷生地當歸獨活吳茱茰炮薑白芍藥炒甘草炙桂心小草各一兩細辛半兩每帖五錢水煎服延胡索散産後惡血凝滯臍下作痛或作寒熱延胡索桂心各半兩當歸一兩為末食前熱酒調下二錢失笑散尤佳當歸養血丸産後瘀血心腹脹痛或腰腳疼痛當歸赤芍丹皮延胡索炒各二兩桂心一兩為末蜜丸梧子大每服五十丸溫酒下金黃散治惡露上沖肚腹作痛或發熱口渴延胡索蒲黃各一錢桂心二分為末酒調下産後寒疝腹痛良方曰産後臍腹作痛乃冷氣乘虛也用當歸建中湯治之陳無擇云若産當寒月人門臍下脹痛手不可近者用羊肉湯治之生生子曰若驗其無瘀血而果為寒氣所侵蟠蔥散亦佳如小水短澀口渴內熱以龍膽㵼肝湯加青蒿徹其熱從小便出也亦有陽氣下陷者以補中益氣湯加芍藥桂心荔枝核羊肉湯産後脾虛寒邪所乘以致腹痛或頭眩脅臍急痛精羊肉四兩當歸川芎各半兩生薑一兩水十盞煎四盞分四次服蟠蔥散方見前痃癖疝瘕門産後兩脅脹痛良方曰此因惡露不盡或肝經血虛或肝經氣滯當分而治之宜與脅痛門恭治一産婦因怒兩脅脹痛吐血甚多發熱惡寒胸腹脹痛乃氣血俱虛用八珍加柴胡丹皮炮薑而血頓止又用十全大補湯而寒熱退此症苟非薑桂辛溫助脾肺以行藥勢不惟無以施其功而反助其脹耳經效方治産後肝經氣滯不平脅肋腹痛或寒熱往來內熱晡熱當歸一錢半芍藥炒苦梗炒檳榔枳殼炒各八分桂心青木香柴胡各六分水煎服當歸散治産後隂血虛弱或氣滯血凝以致發熱腹痛或腹脅脹滿以當歸乾薑等分每服三錢水煎服産後血瘕良方曰産後瘀血與氣相搏名曰瘕謂其痛而無定處此因夙有風冷而輕則否澀重則不通薛氏曰前症乃寒邪乘客氣血壅滯此因氣病而血病也當補養胃氣調和月經寬緩靜養為善難經云任脈為病男子內結七疝女子為瘕聚然當與瘕聚門參治治血瘕作痛臍下脹滿或月經不行發熱體倦當歸八分桂心芍藥炒血竭蒲黃炒各六分延胡索炒四分為末空心酒調分二次服葛氏方治前症桂心為末每服一錢空心酒調下産後發熱大全人參湯治産後諸虛不足發熱盜汗人參當歸等分為末以豬腰子一具去脂膜切小片子以水三升糯米半合䓤白二條煮米熟取清汁一盞入藥末二錢煎至八分不拘時溫服羅氏犀角飲子治産後亡津液虛損時自汗出發熱困倦唇口乾燥犀角麥冬白术各半兩柴胡一兩枳殼麩炒生地地骨皮炙甘草當歸人參茯苓黃芩黃茋各七錢右每服六錢入浮小麥七十粒薑三片水煎服産後發熱多屬不足虛中有寒丹溪每以乾薑加入補藥中取效不可不知産後虛煩發熱薛氏曰虛煩發熱乃陽隨隂散氣血俱虛若惡寒發熱煩燥作渴急用十全大補湯若熱愈甚急加桂附若作渴面赤宜用當歸補血湯若誤認為火症投以涼劑禍在反掌王氷先生云大寒而甚熱之不熱是無火也熱來復去晝見夜伏夜發晝止不時而熱是無火也當治其心如大熱而甚寒之不寒是無水也熱動復止倐忽往來時動時止是無水也當助其腎故心盛則生熱腎盛則生寒腎虛則寒動於中心虛則熱收於內又熱不勝寒是無火也寒不勝熱是無水也治法前症無水者六味丸無火者八味丸氣血俱虛者八珍湯或十全大補湯人參當歸湯治産後虛煩短氣發熱人參當歸麥冬桂心生地各二錢大棗四枚粳米一合淡竹葉二錢芍藥炒一錢水煎服産後血弱虛煩四物加茯神逺志服之産後餘血不盡奔心煩悶生藕汁飲一二盞甚效竹瀝亦佳竹葉湯産後短氣欲絶心中煩悶以此補之竹葉麥冬小麥各一升甘草一兩生薑二兩大棗十四枚水一斗煮小麥竹葉至八升去渣納餘藥煮取三升去渣溫服虛悸加人參二兩氣力少加糯米五合産後血渴薛氏曰若出血過多虛火上炎用童子小便或四物白术麥冬丹皮若胃氣虛而有熱用竹葉歸茋湯若血虛發熱用八珍加麥冬五味若血脫發熱煩躁用當歸補血湯若胃氣虛弱用補中益氣湯或七味白术散七味白术散治中氣虛弱津液短少口乾作渴或因吐瀉所致人參白术炒白茯苓木香炙甘草藿香葛根各一錢水煎服竹葉歸茋湯治胃氣虛熱口乾作渴惡冷飲食竹葉一錢半當歸一錢黃茋二錢白术人參各一錢麥冬七分炙甘草五分水煎服産後乍寒乍熱産後乍寒乍熱由血氣虛損隂陽不和若隂勝則乍寒陽勝則乍熱宜用增損四物湯若因敗血不散腹內作痛宜用奪命丹後用增損四物湯隨病加減陳無擇云敗血流閉諸隂則寒流閉諸陽則熱用大調經散五積散薛氏謂陽氣不足隂氣上入於陽中而惡寒者用補中益氣湯若因隂氣不足陽氣下陷於隂中而發熱者用六味丸若氣血不足而惡寒發熱者用八珍湯若病後寒熱倦怠者用補中益氣湯若肌熱大渴目赤面紅者用當歸補血湯一産婦惡寒發熱此血氣虛寒用十全大補加炮薑而寒熱愈繼以補中益氣而肢體安增損四物湯人參當歸芍藥炒川芎乾薑炒各一兩甘草四錢每劑五錢薑水煎服大調經散治産後惡露未消寒熱自汗或肚腹作痛大豆炒去皮一兩半茯神一兩真琥珀一錢為末每服二錢空心濃煎烏豆紫蘇湯調下産後瘧疾郭稽中曰産後乍寒乍熱者多是敗血為害或隂陽不和若槩作瘧疾治之誤矣陳無擇曰産後寒熱或一二日或二三日一發或先寒後熱或先熱後寒或寒多熱少或寒少熱多或純寒純熱者皆是瘧疾最難治療可用草果飲生熟飲四獸飲選而用之薛氏曰此症當以補胃氣為主佐以草果飲之髏若胃氣稍充以草果飲為主佐以補胃之劑大抵産後瘧疾因脾胃虛弱飲食停滯或外邪所感或鬱怒傷脾或暑邪所伏審係飲食用六君子加桔梗蒼术藿香如外邪多而飲少用藿香正氣散如外邪少而飲食多用人參養胃湯勞役所傷用補中益氣湯氣血虛弱用十全大補加炮薑中氣虛寒用六君加薑桂元氣脫陷急加附子蓋氣虛則寒血虛則熱胃虛則惡寒胃氣下陷則寒熱交作或吐􅀈不食腹痛煩渴發熱譫語或手足逆冷寒戰如栗雖見百症但溫補脾胃其病自退增損柴胡湯産後虛熱寒熱如瘧食少腹脹柴胡人參甘草炙半夏陳皮川芎白芍炒各等分每帖七錢入薑棗水煎白茯苓散産後蓐勞頭目四肢疼痛寒熱如瘧白茯一兩當歸川芎桂心白芍炒黃茋炒人參各半兩熟地四錢右先以水三盞入豬腎一雙薑棗各三煎至二盞入前藥半兩再煎至一盞許服之豬腰子粥産後蓐勞發熱用豬腰子一枚去膜切片用鹽酒拌先用粳米一合入蔥椒煮粥鹽醋和將腰子鋪在碗底以熱粥傾蓋之如作盒生狀空心服黃茋建中湯産後諸虛不足發熱或惡寒腹痛黃茋炒一兩白芍炒二兩甘草炒七錢肉桂一兩每服五錢薑棗水煎日二三服虛甚者須加附子為要藿香正氣散治外感風寒內傷飲食頭痛寒熱或霍亂泄㵼或作瘧疾藿香一錢半桔梗炒大腹皮紫蘇半夏曲茯苓白芷陳皮白术炒厚朴制各一錢炙甘草五分加薑棗水煎服人參當歸散治去血過多內熱短氣頭痛悶亂骨節作痛或虛煩咽燥有似瘧者人參當歸生地桂心麥冬白芍酒炒各等分粳米一合竹葉十片水三鍾煎二鍾納前藥五錢棗二枚煎至八分服虛甚者用熟地生生子曰按病機機要云治胎産之病從厥隂經論之無犯胃氣及上中二焦謂之三禁不可汗不可下不可利小便發汗者同傷寒下之早證利大便則脈數而已動於脾利小便則內亡津液胃中枯燥治之方法能無犯此三禁則營衛自和而寒熱自釋矣又有惡露不盡或風邪乘虛陷入血室者則晝日清明夜則譫語寒熱或只發熱如見鬼狀此為熱入血室用小柴胡湯加生地丹皮或四物加柴胡桃仁嘔吐腹脹及嘔逆不食産後腹脹滿悶嘔吐者因敗血散於脾胃不能運化而致宜用抵聖湯治之薛氏謂若飲食停於脾宜用六君厚朴若飲食傷於胃宜用六君子湯或加砂仁神麯之類大凡損其脾者當節其飲食為善抵聖湯赤芍藥半夏澤蘭葉人參陳皮炙甘草各一錢生薑焙乾半兩水煎極效胃為水穀之海以養臟府産後胃氣虛弱飲食所傷必致嘔逆不食也治法不過溫養脾胃審其所傷之物而推治之或有陽氣衰微火不生土者八味丸若嘔吐泄㵼手足俱冷或肚腹作痛乃虛寒極矣急用理中湯加附子桂心而蘇者一産婦朝吐痰夜發熱日夜無寐或用清痰降火肌體日瘦飲食日少前症愈甚詎思早吐痰脾氣虛夜發熱肝血虛晝夜無寐脾血耗也遂用六君子加逍遙散歸脾湯以次調補而痊開胃散治産後胃虛嘔吐胸滿不食訶子肉一兩半人參一兩炙甘草半兩每劑五錢薑水煎服産後胃虛嘔逆橘紅一兩半夏炙甘草各半兩藿香三兩每劑五錢薑水煎服治産後嘔逆不食白术五錢生薑六錢水煎徐徐溫服石蓮散産後胃寒咳逆嘔吐不食或腹作脹石蓮肉一兩半茯苓一兩丁香半兩為末每二錢薑湯或米飲調下日三次錢氏益黃散脾土虛寒水反來侮以致嘔吐不食或肚腹作痛或大便不時手足逆冷等證陳皮一兩青皮訶子肉炙甘草丁香各二錢每服四五錢水煎服人參養胃湯治外感風寒內傷飲食寒熱頭痛或變瘧疾半夏厚朴制橘紅各八分藿香葉草果茯苓人參各五分蒼术一錢炙甘草三分右薑七片烏梅一箇水煎服産後喉中氣急喘促産後喉中氣急喘促因營血暴竭衛氣無主獨聚於肺名曰孤陽最為難治若因敗血停凝服奪命丹若因營血暴絶服芎藭湯若因風寒所傷服旋覆花湯因氣鬱結小調經散若傷飲食服見現丸薛氏曰若脾胃氣虛用六君桔梗若兼外邪更加紫蘇中氣虛寒補中益氣加炮薑肉桂若陽氣虛脫更加附子若瘀血入肺急用二味參蘇飲一産婦喘促自汗手足俱冷常以手護臍腹此陽氣虛脫用參附湯四劑而愈一味參蘇飲治産後血入於肺面黑發喘欲死人參一兩蘇木二兩水煎頓服旋覆花湯治傷風寒暑濕喘嗽太盛坐卧不寧旋覆花赤芍藥半夏曲前胡甘草荆芥穗五味子茯苓麻黃杏仁各等分每以五錢薑棗水煎服有汗者勿服五味子湯治産後喘促脈伏而厥五味子杵炒人參杏仁各二錢麥冬陳皮各一錢右薑三片棗二枚水煎服芎藭湯芎藭當歸白芍等分每五錢水煎服産後口鼻黑鼻衄産後口鼻起黑氣及鼻衄者蓋陽明經脈之海起於鼻交額中還出頰口交人中左之右右之左此産後氣虛營血散亂胃絶肺敗之症也急取緋線一條并産婦頂心髮二根緊繫中指節更無可療薛氏曰按胃脈俠口繞承漿蓋鼻凖屬脾土鼻孔屬肺金誠胃虛肺損氣脫血死之症急用二味參蘇飲加附子五錢亦有獲生者産後月水不通産後乳子周歲而經不行是其常也若半歲而經行此血有餘也若一二歲不行而無疾不必服藥若肢體倦怠食少內熱是血少也宜健脾胃若以藥通之則誤矣薛氏曰脾胃虛弱用六君子若兼鬱火傷脾用歸脾湯加丹皮山梔若怒火傷血宜四物合小柴胡氣血俱虛八珍湯加丹皮産後四肢浮腫産後四肢浮腫者乃敗血乘虛流注宜用小調經散陳無擇云若風邪乘於氣分皮膚腫而浮虛乃氣也若皮膚腫如熟李乃水也蓋氣腫者宜發汗水腫者宜利小便薛氏謂若寒水侮土宜養脾肺若氣虛浮腫宜益脾胃若水氣浮腫宜補中氣仍恭水分血分而治一産婦飲食少思服消導之劑四肢浮腫乃中氣不足朝用補中益氣湯夕用六君子而愈後因怒腹脹誤服沉香化氣丸吐瀉不止飲食不進小便不利肚腹四肢浮腫用金匱加減腎氣丸而愈小調經散沒藥琥珀桂心芍藥當歸各一錢為末每服五分薑汁溫酒調大調經散最治腫滿喘急煩渴小便不利方具乍寒乍熱卷治血虛氣腫水腫澤蘭葉防已等分為末每以二錢溫酒調下或醋湯亦可金匱加減腎氣丸治脾腎虛寒腰重腳腫濕飲留積小便不利或肚腹脹腫四肢浮腫氣喘痰甚或已成水症其效如神白茯苓三兩牛膝附子五錢桂心車前子山茱茰肉丹皮山藥澤㵼各一兩熟地黃四兩為末煉蜜丸梧子大每服七八十丸空心米飲下産後腹痛瀉利産後腹痛㵼利因腸胃虛弱寒邪乘襲或水穀不化洞泄腸鳴或手足逆冷用調中湯治之陳無擇謂若六淫七情而致者當隨所感而治之若胸膈飽脹或惡食吞酸此飲食停滯用六君枳實山查以消導若食既消而仍痛更或頭痛熱渴惡寒欲嘔此中氣被傷用補中益氣半夏茯苓以益脾胃調中湯良薑當歸桂心芍藥附子炮川芎各一兩甘草炒五錢每服五錢水煎五味子散産後泄㵼或腎泄在五更侵晨作瀉飲食不進或大便不實登厠無時五味子炒三兩吳茱茰炒五錢共為末每以二錢白湯調下為丸尤妙四神丸治脾腎虛弱侵晨五更作瀉或全不思食或食而不化大便不實破故紙炒四兩肉豆䓻二兩生用五味子二兩吳茱茰炒四兩為末用大紅棗四十九枚生薑四兩以水共煮爛去薑以棗肉和藥搗為丸梧子大空心鹽湯下二神丸治同即前四神丸減去五味子吳茱茰産後赤白痢産後痢疾因飲食六淫七情傷於脾胃或滲大腸皆為難治若飲食不進謂之虛痢氣宇不順謂之氣痢寒熱溫涼升降調補各隨所宜而施治之白屬氣分而赤屬血分也若米食所傷用六君加穀蘖若麵食所傷加麥蘖若肉食所傷加山查神曲凡兼嘔吐俱加霍香若兼咽酸或嘔吐用前藥送越鞠丸若肝木尅脾土用六君加柴胡炮薑若寒水反來侮土用錢氏益黃散若久瀉或元氣下陷兼補中益氣湯以升發陽氣若瀉痢色黃乃脾土真色宜加木香肉豆􅛌若屬脾土虛寒六君加木香薑桂若脾腎虛寒用補中益氣湯及四神丸若下元虛寒用八味丸以補土母若以小便澀滯肢體漸腫或兼喘咳用金匱腎氣丸以補脾腎利水道若胃氣虛弱而四肢浮腫須補胃為主若久而不愈是氣虧損也必用四神丸六味丸八味丸三方以補足三隂若用分利導水之劑是虛其虛也産後痢疾作渴者乃內亡津液或胃氣虛不生津液但止其渴其痢自瘥若渴而不喜冷飲屬胃氣虛故無津液宜用七味白术散或錢氏白术散如夜間發熱口渴屬腎氣虛而不能潤用六味丸並佐以益氣湯以滋化源一産婦瀉痢發熱作渴吐痰肌體消瘦飲食少思或胸膈痞滿或小腹脹墜年餘矣乃脾腎之瀉朝用二神丸夕用六君子三月餘而痊一産婦患前症形體倦怠飲食不進與死為鄰此脾胃俱虛也用四神丸十全大補湯而愈産後大便祕澀産後大便祕澀因腸胃虛弱津液不足若小腹悶脹宜服麻仁丸潤之若用寒藥則促其危矣薛氏曰若計其日期飲食數多即用藥通之禍在反掌之間必待腹滿覺脹欲去不能者乃結在直腸宜用豬膽汁導而潤之若服苦寒疏通反傷中氣通而不止或成痞症若去血過多宜用十全大補血虛火燥用加味四物氣血兩虛用八珍湯雖數日不通飲食如常腹中如故仍用八珍加杏仁桃仁治之若泥其日期飲食而強通之則誤矣一産婦大便七日不通飲食如常腹中如故此腹未滿也用八珍加桃杏仁至二十一日腹滿欲行用豬膽汁潤去而安一婦大便祕澀諸藥不應苦不可言飲人乳而安麻仁丸火麻仁研如泥枳殼人參各四兩大黃二分右為末入麻仁煉蜜丸如梧子大每服二十丸空心溫酒下未通漸加不可過服阿膠枳殼丸治産後大便祕澀以阿膠枳壳二味等分為末蜜丸梧子大滑石末為衣白湯送下二十丸未行再服産後大小便不通良方曰此因腸胃虛弱津液枯竭故也宜恭前祕結門詳治一産婦大小便不通諸藥不應將危矣令飲牛乳一日稍通三日而痊人乳尤善桃花散治膀胱氣滯血澀大小便祕桃仁葵子滑石檳榔各等分為末每以三錢空心蔥白煎湯調下産後遺糞良方取故燕窠中草燒為末或枯礬牡蠣或白斂芍藥各等分為末俱用酒調服或用固腸亦可薛氏曰若脾腎虛弱用還少丹仍以補中益氣湯為主虛寒加肉豆蔲補骨脂或四神丸若脾腎虛寒兼八味丸仍佐前二方一産婦小便出糞名大小腸交乃氣血俱虛失行常道先用六君子湯二劑又用五苓散一劑而痊循常腸交亦可效治還少丹治脾腎虛寒飲食少思發熱盜汗遺精白濁又治真氣虧損肌體瘦弱等症肉蓰蓉逺志去心茴香巴戟山藥牛膝熟地枸杞子石菖蒲山茱茰肉楮實子五味子杜仲去皮薑炒白茯苓各二兩各另為末棗肉百枚加煉蜜為丸如梧子大每服五七十丸空心酒下産後諸淋良方謂乃熱客於脬虛則頻數熱則澀痛氣虛兼熱血入胞中則血隨小便出而為血淋也薛氏曰若膀胱虛熱用六味丸若隂虛而陽無以化用滋隂腎氣丸蓋土生金金生水當滋化源也與小便淋瀝頻數卷參治滑石散治熱淋滑石五分通草車前子葵子各四分右為細末漿水調服治小腸有熱小便澀痛或為血淋􅜰麥黃芩冬葵子各二兩通草二兩大棗十二枚右水六升煎二升半分二服治脾氣不利小便不通橘紅為末以二錢空心溫酒下治肺氣不利小便不通杏仁十四枚去皮尖炒食之治脬轉小便不利滑石一錢半寒水石一錢煎服一産婦小水淋瀝或時自出用分利降火之劑二年不愈此肺腎氣虛用補中益氣湯六味地黃丸而痊凡産婦小便頻數者乃氣虛不能制故也小便不禁廣濟方治産后小便不禁用雞毛燒灰千金翼用白薇芍藥為末俱用溫酒下日三服或桑螵蛸半兩龍骨一兩為末每二錢粥飲調下薛氏謂若脾肺氣虛用補中益氣湯若肝腎隂虛六味地黃丸若肝腎虛寒用八味丸補脬飲治胞破小便淋瀝生絹黃色者一尺白牡丹用根皮白芨各一錢水一碗煎至絹爛溫服服後忌言語否則無功雞內金散治氣虛溺床用雄雞肶胵并腸燒為末以溫酒調下産後小便出血此因虛熱血滲於脬也以亂髮洗淨燒為末米飲調服或滑石末一錢生地黃汁調下一産婦尿血面黃脅脹少食此肝木乘脾土也用加味逍遙補中益氣兼服而愈後為懷抱不禁食少體倦驚悸無寐便血復出用加味歸脾湯二十餘劑將愈惑于衆論服犀角地黃湯諸症復作仍守前湯而愈産後隂脫玉門不閉此因坐産努力舉動房勞所致或脫肛隂挺逼迫腫痛小便淋瀝薛氏謂氣血虛弱宜用十全大補湯若腫脹焮痛肝經虛熱也加味逍遙散若憂怒肝脾氣血傷也加味歸脾湯若暴怒肝火血傷也龍膽瀉肝散一産婦玉門不閉發熱惡寒用十全大補湯加五味子數劑而寒熱退用補中益氣加五味子數劑而玉門閉矣硫黃散産後陽氣虛寒硫黃烏賊魚骨五味子各半兩為末摻患處一方蛇床子一升炒熱帛包尉患處亦治隂腫産後乳少或止乳汁乃氣血所化若元氣虛弱則乳汁短少初産乳房焮脹此乳未通若暴怒乳出肝經風熱若纍産無乳此內亡津液蓋乳汁資於衝任若婦人疾在衝任乳少而色黃生子則怯弱而多疾薛氏云此氣血虛弱而不能化生宜壯脾胃怒動肝膽而乳腫汁出宜清肝火屢産無乳或大便澀滯當滋化源氣血旺則乳汁溢一産婦因乳少服藥通之致乳房腫脹發熱作渴此氣血虛以玉露散補之而愈湧泉散能通乳王不留行麥門冬瞿麥龍骨各二錢右用豬蹄汁一碗酒一杯煎服良久以木梳于乳房上梳下忌薑椒辛辣玉露散乳脈不通身體壯熱頭目昏痛大便澀滯人參茯苓桔梗炒芍藥各一錢甘草炙六分右㕮咀水煎服愈凡未産而乳先出謂之乳泣生子多不育産婦氣血方盛乳房作脹或無兒飲因而脹痛增寒發熱用麥芽二三兩炒熟水煎服之立消一産婦勞役或乳汁來如湧泉昏昧吐痰此陽氣虛而厥也灌以獨參湯而蘇更以十全大補湯數劑而安矣一婦乳頭裂破以秋茄子裂開者隂乾燒存性為末水調塗之而愈婦人繭唇內經曰脾氣開於口又曰脾之榮在唇蓋燥則乾熱則裂風則瞤寒則揭若腫起白皮皺裂如蠶繭名曰繭唇有腫重出如繭者有本細末大如繭如瘤者其因或胎産經行而隂血損或七情動火而榮血虧或心火傳授脾經或厚味積熱傷脾大要審本症察兼症補腎水生脾血則燥自潤火自除風自息腫自消若患者忽略治者不察內用清熱消毒之藥外用追蝕線結之法反為敗症慎哉一婦懷抱久鬱或時胃口嘈辣胸膈不利月水不調晡熱食少體倦唇腫已年餘矣此脾經鬱火傷血用歸脾湯加薑汁炒黃連山梔少佐吳茱茰嘈辣頓去飲食少進乃去黃連加貝母逺志胸膈通利飲食如常又用加味逍遙散歸脾湯間服百餘劑月水調而唇瘡愈一婦月經不調兩足發熱至年餘而身亦熱勞則足腿痠疼又年餘唇腫裂痛又半年唇裂出血形體瘦倦飲食無味月水不通唇下腫如黑棗此肝脾血虛火症也彼不信用通經藥而殁一婦口苦脅脹此肝火之症也用小柴胡加山梔黃連少愈更以四君子加芍藥當歸柴胡調補脾胃而痊一婦每怒口苦發熱晡熱此肝火盛而血傷也以小柴胡合四物二劑以清火而生血更以四物加柴胡白术茯苓丹皮生血健脾而安一婦因怒齒痛寒熱作嘔用清胃等藥益甚乃肝火傷胃寒涼復傷故也用六君子加芍藥柴胡山梔而安一婦胃中嘈辣甚則熱痛後患齒痛此胃中痰火也以二陳加芩連吞越鞠丸而瘳一婦因怒牙疼寒熱此肝火侮脾土用小柴胡加芎歸苓术山梔而疼痛止用加味逍遙散而寒熱退清胃散治醇酒厚味唇齒作痛或齒齦潰爛或連頭面頸項作痛黃連炒一錢半川歸生地丹皮各一錢升麻二錢右水煎服如實熱便祕加大黃加味清胃散即前方加犀角甘草連翹涼膈散治積熱煩渴面赤內熱頭昏咽痛便溺赤澀狂言譫語睡卧不安大黃朴硝各一錢甘草一錢連翹二錢梔子黃芩薄荷各錢一水煎服補黃散治脾胃虛熱口舌生瘡畏冷飲食人參白术炒各一錢白芍炒陳皮甘草炙各五分右薑棗水煎服四順清涼飲加山梔大力子名加味清涼飲治臟腑實熱祕結口舌生瘡當歸赤芍甘草大黃各一錢右水煎服人參安胃散治服峻劑損脾胃口舌生瘡人參茯苓各一錢黃芪炒二錢生甘草炙甘草黃連炒各五分白芍七分水煎服溫中丸一名人參理中丸治中氣虛熱口舌生瘡不喜飲冷肢體倦怠少思飲食人參炙甘草白术炒各等分為末薑汁糊為丸梧子大每服五十丸白湯送下柳華散治熱毒口瘡黃柏炒蒲黃青黛人中白煆右等分為細末敷之四物湯治血熱口舌生瘡或牙齦腫潰發熱煩躁不安加味四物湯即四物加丹皮柴胡山梔四物二連湯治血熱口舌生瘡或夜發寒熱當歸熟地白芍炒川芎胡黃連川連炒各一錢水煎服之甘桔湯治咽喉腫痛甘草六錢苦梗二錢右水煎服赤水元珠卷二十三
