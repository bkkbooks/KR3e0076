body:
  text: 赤水元珠卷二明孫一奎撰暑門明暑篇五運六化篇曰相火之化暑主於夏夏之為言大也與午同意炎暑乃行有中有冒有傷有暑風乃三之氣也內經曰因於暑汗煩則喘渴靜則多言體若燔炭汗出而散先夏至日發者為病溫後夏至日發為病暑暑當與汗皆出勿止脈虛身熱得之傷暑難經曰傷暑得之為正邪火自病也當惡臭其病身熱而煩心痛其脈浮大而散潔古曰靜而得之為中暑動而得之為中熱中暑者隂症中熱者陽症東垣曰暑熱之時無病之人或避暑熱納涼於深堂大厦得之者名曰中暑其病必頭痛惡寒身形拘急肢節疼痛而煩心肌膚火熱無汗為房室之隂寒所遏使周身陽氣不得伸越多以大順散熱藥主之是也若行人農夫於日中勞役得之者名曰中熱其病必苦頭痛發燥熱惡熱捫之肌膚大熱必大渴引飲汗大泄無氣以動乃為天熱外傷肺氣蒼术白虎湯涼劑主之劉宗厚曰按此論中暑即仲景所謂中暍是也此只作暑熱分之可見有陰陽二症受病不同然夏月受病有隂寒所遏使周身陽氣不得伸越以大順散主之者為中暑蓋當暑月名之猶冬月發熱為傷寒也但中熱治例雖云用蒼术白虎湯而又處清暑益氣之法況大順散一方是仲景太陽例藥然東垣施用諒不如此必有若益氣湯證例發揮曄曄者惜乎無傳故使後人不能無疑也詳後所論矧中暑證亦有於勞役動而得者中熱證亦有於避暑靜而得之者大抵因人元氣虛實不同故所受亦異為治豈得而無變法哉陳無擇曰暑熱喜歸心心中之使人噎悶昏不知人入肝則眩暈頑痺入脾則昏睡不覺入肺則喘滿痿嬖入腎則消渴凡中暍者死治之切不得用冷惟宜溫養得冷則死道途中無湯即以熱土尉臍中仍以熱溺沃之槩可見矣凡覺中暑急嚼生薑一大塊水送下如已迷悶嚼大蒜一大瓣水送下如不能嚼水研灌之立醒治暑之法清心利小便甚好若自汗甚者不可利小便宜白虎湯清解之次分表裡治之如在表頭疼惡寒雙解散加香薷及二香散香薷飲之類解之如在半表半裡泄瀉煩渴飲水吐逆者五苓散治之熱甚煩渴者益元散清之若表解裏熱甚宜半夏解毒湯下神芎丸酒蒸黃連丸等或人平素弱及老人冒暑脈微下利渴而喜溫或厥冷不省人事宜竹葉石膏湯加熟附半箇冷飲次以來復丹五苓散治之凡夏暑證不可服諸熱燥劑致班毒發黃小水不通悶亂而死矣盛夏發熱有傷寒冒暑二證若熱有進退則為冒暑一向熱不止則為傷寒林氏曰中暑之證面垢悶倒昏不知人冷汗自出手足微冷或吐或瀉或喘或滿其脈浮虛名曰暑風慎不可用冷水及純大寒之劑即以蘇合香圓薑湯調灌或研蒜水灌之醒後用清暑之藥調理又有因暑氣入於心包絡而鼓激痰塞心竅卒倒不語者急宜吐出痰涎隨用導痰湯合黃連香薷飲加竹􅅹薑汁丹溪云暑乃夏月炎暑也盛熱之氣著人也有冒有傷有中三者有輕重之分虛實之辨或腹痛水瀉者脾與大腸受之惡心者胃口有痰飲也此二者冒暑也可用黃連香薷飲清暑益氣湯蓋黃連退暑熱香薷消蓄水或身熱頭疼躁亂不寧者或身如針刺者此為熱傷在分肉也當以解毒白虎湯加柴胡氣虛者加人參或咳嗽發寒熱盜汗出不止脈數者熱在肺經用清肺湯柴胡天水散之類急治則可遲則不救火乘金此為中暑凡治病須要明白辨别慎勿滚同施治春秋間亦或有之切莫執一隨病處方為妙按傷暑與傷寒身皆發熱不可不辨明施治蓋寒傷形熱傷氣傷寒則外惡寒而脈浮緊經曰脈盛身寒得之傷寒脈虛身熱得之傷暑傷暑則不惡寒而脈虛為異也故從小柴胡湯渴加知母石膏或人參白虎湯或清暑益氣湯人參白虎湯治暑熱發渴脈虛人參一錢半知母二錢石膏五錢甘草一錢粳米一合水煎服竹葉石膏湯石膏一兩半夏二錢半甘草人參各二錢麥門冬五錢竹葉十片每服一兩生薑三片水煎服十味香薷飲治伏暑身倦神昏頭重吐利香薷一兩人參陳皮白术茯苓黃耆木瓜厚朴白扁豆甘草各五錢每服一兩水煎服一方無參耆陳皮加紫蘇藿香檀香各等分名消暑十全飲除暑渴霍亂吐瀉益元散治熱而煩悶小便赤澀滑石六兩甘草一兩右為末每服二錢或三錢冷水調下燈心湯亦可熱盛加辰砂欲發汗用蔥白湯調五苓散白术茯苓豬苓各一兩半澤瀉二兩半桂一兩右為末每服二三錢熱湯調下加辰砂名辰砂五苓散縮脾飲除暑渴止吐瀉砂仁草果烏梅肉甘草炙各四兩扁豆乾葛各二兩每服六錢水煎冷服大順散治冒暑伏熱引飲過多脾胃受濕水穀不分氣逆霍亂嘔吐甘草乾薑杏仁去皮尖桂右先將甘草用白砂炒黃次入薑却下杏仁以不作聲為度篩去砂入桂為末每服二三錢水煎溫服如煩躁井花水調服以沸湯點服亦得來復丹治伏暑泄瀉身熱脈弱硝石一兩同硫黃火上微炒用柳條攪結砂子不可火大太隂玄精石一兩研硫黃一兩青皮五靈脂去沙土陳皮各二兩右為末好醋糊為丸菉豆大空心米飲下二三十丸大黃龍丸中暑昏暈身熱惡寒頭痛或往來寒熱煩渴吐瀉舶上硫黃硝石各一兩雄黃滑石白礬各五錢寒食麵四兩右為末滴水丸如梧子大每服五丸至七丸漸加至四十丸劉宗厚曰此藥通利三焦分理隂陽溫胃開結治揮霍變亂神志昏憒元氣下陷者甚捷然病因實火濕熱者勿用子和桂苓甘露飲伏暑發渴脈虛桂人參藿香各半兩茯苓白术甘草葛根澤瀉石膏寒水石各一兩木香一錢為末白湯調三錢宣明桂苓甘露飲茯苓澤瀉各一兩石膏寒水石各二兩滑石四兩白术桂豬苓各半兩為末溫湯調下二三錢生脈散人參五味子麥門冬各二錢水煎服一方加黃耆甘草却暑散治冒暑伏熱頭目眩暈嘔吐瀉痢煩渴背寒面垢赤茯苓甘草生各四兩寒食麵生薑各一斤右為末每服二錢白湯下冷香飲子治傷暑暍霍亂腹痛煩躁脈沈微或伏草果仁三兩附子陳皮各一兩甘草五錢每服一兩水煎入薑冷服黃連解毒湯方在火門二氣丹伏暑傷冷二氣交錯中脘痞悶或頭痛惡心並治硝石硫黃各等分右為末銀器內文武火炒令鵝黃色再碾細用糯米煮糊為丸如桐子大每服四十丸新汲水下香薷丸大人小兒傷暑伏熱燥渴瞀悶頭目昏眩胸膈煩滿嘔噦惡心口苦舌乾肢體困倦不思飲食或發霍亂吐利轉筋並治香薷去根一兩木瓜紫蘇葉藿香洗茯神去心各半兩甘草炙檀香丁香各二錢半右為末煉蜜和丸雞頭子大每服一丸至二丸細嚼溫湯下或新汲水化下春澤湯伏暑發熱煩渴引飲小便不利兼治傷寒隂陽不分疑似之間最宜服此澤瀉三錢豬苓茯苓白术各二錢桂心柴胡各一錢人參麥門冬各一錢半渴甚去桂加五味子黃連各二錢香朴飲子大人小兒伏暑吐瀉虛煩悶亂人參烏梅肉茯苓甘草炙紫蘇澤瀉香薷半夏麯白扁豆木瓜厚朴薑制各一錢薑三片棗一枚水煎服清暑六和湯心脾不調氣不升降霍亂轉筋嘔吐泄瀉寒熱交作痰喘咳嗽胃脘痞滿頭目昏痛肢體浮腫嗜卧倦怠小便赤澀并傷寒隂陽不分冒暑伏熱煩悶或成痢疾中酒煩渴畏食砂仁半夏泡杏仁去皮尖人參藿香扁豆香薷赤茯苓厚朴薑制木瓜各一錢甘草炙五分薑五片棗一枚水煎服消暑十全散伏暑胃氣不和心腹滿痛香薷扁豆厚朴薑制甘草炙紫蘇白术茯苓藿香木瓜檀香各一錢薑三片水煎服黃龍丸和劑方治伏暑發熱嘔吐惡心黃連淨三十二兩好酒五升煮乾研為細末麵糊丸梧子大每服五十丸白湯下枇杷葉散治暑毒攻心衄血嘔血或吐瀉作渴香薷二錢厚朴薑炒一錢半甘草炙一錢半麥門冬木瓜茅根各一錢枇杷葉陳皮丁香各半錢每服三五錢薑水煎服注夏子和曰痿之作也皆五月六月七月之時午者少隂君火之位未者濕土庚金伏火之地申者少陽相火之分故痿發此三月之內為熱也故病痿之人其脈浮大丹溪云注夏屬隂虛元氣不足補中益氣中去柴升加炒黃柏挾痰者加南星東垣曰刺志論云氣虛身熱得之傷暑熱傷氣故也痿論曰有所逺行勞倦逢大熱而渴渴則陽氣內伐內伐則熱舍於腎腎者水藏也今水不能勝火則骨枯而髓虛足不任身發為骨痿故下經曰骨痿者生於大熱也此濕熱成痿令人骨乏無力故治痿獨取於陽明時當長夏濕熱大勝蒸蒸而熾人感之多四肢困倦精神短少懶於動作胸滿氣促肢節沈疼或氣髙而喘身熱而煩心下膨痞小便黃而數大便溏而頻或痢出黃如糜或如泔色或渴或不渴不思飲食自汗體重或汗少者血先病而氣不病也其脈中得洪緩若濕氣相搏必加之以遲病雖互換少差其天暑濕令則一也宜以清燥之劑治之內經曰陽氣者衛外而為固也熱則氣泄今暑邪干衛故身熱自汙以黃耆甘溫補之為君人參陳皮當歸甘草甘微溫補中益氣為臣蒼术白术澤瀉滲利而除濕升麻葛根苦甘平善解肌熱又以風勝濕也濕勝則食不消而作痞滿故炒麯甘辛青皮辛溫消食快氣腎惡燥急食辛以潤之故以黃柏苦寒借甘味瀉熱補水虛者滋其化源以人參五味子麥門冬酸甘微寒救天暑之傷於庚金為佐名曰清暑益氣湯黃耆一錢汗少減五分人參澤瀉白术神麯陳皮各五分甘草炙葛根黃柏酒浸麥冬歸身各三分升麻蒼术各一錢五味子九粒青皮三分半作一服水二大盞煎至一盞去查食逺溫服劑之多少臨時斟酌此病皆由飲食勞倦傷其脾胃乘天暑而病作也但藥中犯澤瀉豬苓茯苓燈心通草木通淡味滲利小便之類皆從時令之旺氣以泄脾胃之客邪而補金水之不及也此正方已是從權而立之若其時病濕熱脾旺之症或小便已數腎肝不受邪者誤用之必大瀉真隂竭絶腎水先損其兩目也復立變症加減法於後如心火乘脾乃血受火邪而不能升發陽氣伏於地中地者人之脾也必用當歸和血少用黃柏以益真隂如脾胃不足之證須少用升麻乃足陽明太隂引經之藥也使行陽道自脾胃中右遷少陽行春令生萬物之根蒂也更少加柴胡使諸經左轉生發隂陽之氣以滋春升之和氣也如脾虛緣心火亢極而乘其土也其次肺氣受邪為熱所傷必須多用黃耆甘草次之人參又次之三者皆甘溫之陽藥也脾始虛肺氣先絶故用黃耆之甘溫以益皮毛之氣而閉腠理不令自汗而損元氣也上喘氣短懶語須用人參以補之心火乘脾須用炙甘草以瀉火熱而補胃脾中元氣甘草最少恐滿也若脾胃之急痛并脾胃大虛腹中急縮腹皮急縮者却宜多用經曰急者緩之咳甚者去人參如口乾嗌乾者加乾葛如脾胃既虛不能升浮為隂火傷其生發之氣榮血大虧榮氣伏於地中隂火熾盛日漸煎熬血氣虧少且心包與心主血血減則心無所養致使心亂而煩病名曰寃寃者心惑而煩悶不安也是由清氣不升濁氣不降清濁相干亂於胸中使周身血氣逆行而亂經云從下上者引而去之故當加辛溫甘溫之劑生陽陽生而隂長也已有甘溫三味之論或曰甘溫何能生血又非血藥也曰仲景之法血虛以人參補之陽旺則能生隂血也更加當歸和血又宜少加黃柏以救腎水蓋甘寒瀉熱火火減則心氣得平而安也如煩亂猶不能止少加黃連以去之蓋將補腎水使腎水旺而心火自降扶持地中陽氣也如氣浮心亂則以硃砂安神丸鎮固之煩一減勿再服以防瀉陽氣之反陷也如心下痞亦少加黃連氣亂於胸為清濁相干故以陳皮理之能助陽氣之升而散滯氣又助諸甘辛為用故長夏濕土客邪火旺可從權加蒼术白术澤瀉上下分消其濕熱之氣濕氣大勝主食不消化故食減不知穀味加炒麯以消之復加五味子麥門冬人參瀉火益肺氣助秋損也此三伏中長夏正旺之時藥也脾胃虛弱隨時為病隨病制方夫脾胃虛弱必上焦之氣不足遇夏天氣熱甚損傷元氣怠惰嗜卧四肢不收精神不足兩腳痿軟遇早晚寒厥日髙之後陽氣將旺復熱如火乃隂陽氣血俱不足故或熱厥而隂虛或寒厥而氣虛口不知味目中溜火而視物昏昏無所見小便頻數大便祕結胃脘當心而痛兩脅痛或急縮臍下周圍如繩束之急甚則如刀刺腹難舒伸胸中閉塞時濕嘔噦或有痰嗽口沃白沫舌強腰背腹皆痛頭痛時作食不下或食入即飽全不思食自汗尤甚若隂氣覆在皮毛之上皆天氣之熱助本病也乃庚大腸辛肺氣為熱所乘而作當先助元氣治庚辛之不足黃耆人參湯主之黃耆一錢如自汗過多加一錢人參白术各五分陳皮甘草當歸黃柏以救腎水之源麥冬各二分神麯炒三分五味子九粒升麻六分蒼术五分無汗一錢右俱作一服水二盞煎至一盞稍熱食逺或空心服之忌酒濕麵大料物之類及過食冷物如心下痞悶加黃連二三分如胃脘當心痛減太寒藥加草豆蔲仁五分如脅下痛或縮急加柴胡二三分如頭痛目中溜火加黃連二三分川芎三分如頭目不清利上壅上熱加蔓荆子三分藁本二分細辛一分川芎三分生地黃二分如氣短精神少或夢寐間困乏無力加五味子九粒如大便澀滯隔一二日不見者致食少食不下血少血中伏火而不得潤也加當歸身生地黃各五分桃仁三個另研麻子仁研泥五分如大便通行所加之藥勿再服如大便又不快利勿用别藥少加大黃煨五分如不利者非血結血祕而不通是熱則生風其病人必顯風症單血藥不可復加止常服人參黃耆湯藥只用羌活五錢防風五錢二味㕮咀以水四盞煎至一盞去查空心服之大便必大走也一服便止如胸中氣滯加青皮橘紅倍之去其邪氣此病本元氣不足惟當補元氣不當瀉之如氣滯太甚或補藥太過或心下有憂鬱之事更加木香二分或三分砂仁二分或三分白豆蔲仁二分與正藥同煎服如腹痛不惡寒者加白芍藥五分黃芩二分減五味子夫脾胃虛弱至六七月間河漲霖雨諸物皆潤人汗沾衣身重短氣甚則四肢痿軟行步不正腳欹眼黑欲倒者此腎水與膀胱俱竭之狀也當急救之滋肺氣以補水之上源又使庚大腸不受邪熱不令汗大泄也汗泄甚則亡津液亡津液則七神無所依經云津液相成神乃自生津者庚大腸所主三伏之義為庚金受囚也若亡津液汗大泄濕令亢盛則清肅之氣亡燥金受囚風木無可以制故風濕相搏骨節煩疼一身盡痛亢則害承乃制是也孫思邈曰五月常服五味子是瀉丙火補庚金大腸益五臟之元氣壬膀胱之寒已絶於已癸腎水已絶於午今更逢濕旺助熱為邪西方北方之寒清絶矣聖人立法夏月宜補者補天元之真氣非補熱火也令人夏食寒是也為熱傷元氣以人參麥門冬五味子生脈脈者元氣也人參之甘補元氣瀉熱火也麥門冬之苦寒補水之源而清肅燥金也五味子之酸以瀉火補庚大腸與肺金也當此之時無病之人亦或有二症況虛損脾胃有宿疾之人遇此天暑將理失所違時伐化必困乏無力懶語氣短氣弱氣促似喘非喘骨乏無力其形如夢寐朦朦如煙霧中不知身所有也必大汗泄若風犯汗眼皮膚必搐項筋皮枯毛焦身體皆重肢節時有煩疼或一身盡疼或渴或不渴或小便黃澀此風濕相摶也頭痛或頭重上熱壅盛口鼻氣短氣促身心煩亂有不樂生之意情思慘悽此隂勝陽之極也病甚則傳腎肝為痿厥厥者四肢如在火中者為熱厥四肢寒冷者為寒厥寒厥則腹中有寒熱厥腹中有熱為脾主四肢故也若肌肉濡潰痺而不仁傳為肉痿證證中皆有肺疾用藥之人當以此調之氣上衝胸皆厥證也痿者四肢痿軟而無力也其心煩寃不止心神撩亂者是也厥者氣逆也甚則大逆故曰厥逆其厥痿多相須也於前已立黃耆人參五味子麥門冬湯中每加白茯苓二分澤瀉四分豬苓白术各一分如小便快利不黃澀者只加澤瀉二分與二术上下分消其濕如行步不正腳膝痿弱兩足欹側已中痿邪者加酒洗黃柏知母三分或五分令兩足湧出力氣如汗大泄者津脫也急止之加五味子五粒炒黃柏五分炒知母三分不令妨其食當以意斟酌若妨食則止候食進再服取三里氣街以三稜針出血若汗不止不減者於三里穴下三寸上亷穴出血禁酒濕麵夫痿者濕熱乘於腎肝也當急去之不然則下焦元氣竭盡而成軟癱必腰下不能動心煩寃而不止也若身重或氣不短小便如常及濕熱之令退時或所增之病氣退者不用五味子澤瀉豬苓茯苓黃柏知母蒼术白术之藥只依本病中證候加減常服藥亦須用酒黃柏二分或三分六七月之間濕令大行子能令母實而熱旺濕熱相合而刑庚大腸故用寒涼以救之燥金受濕熱之邪絶寒水生化之源源絶則腎虧痿厥之病大作腰已下痿軟癱瘓不能動矣步行不正兩足欹側以清燥湯主之黃耆一錢半黃連蒼术白术各一錢陳皮澤瀉各五分五味子九粒人參白茯苓升麻各三分當歸一錢二分柴胡麥冬生地神麯炒豬苓黃柏酒製甘草炙各二分每服半兩水二盞煎至一盞稍熱空心服丹溪治宋某勞傷發熱當作注夏治之黃柏炒升麻各三分黃耆人參木通白芍各五分白术一錢半陳皮甘草炙各二分婦人患注夏手足痠軟而熱白术黃柏炒白芍陳皮當歸各一錢蒼术甘草生各五分解㑊音亦生生子曰平人氣象論篇云尺脈緩澀謂之解㑊王注曰尺者隂部也腹腎主之緩為熱中澀為無血故解㑊也解㑊之證懈倦困弱寒不甚寒熱不甚熱惡見人見人心惕惕然或熱多而汗出肢體百骸散解痿弱而不能任持少氣而不欲言左右儜不可以名其狀故謂之解㑊注夏之證殆相似亦虛類也其治大生脈湯足以主之加木瓜苡仁儜音能困弱也大生脈湯治注夏體倦嗜卧百凡懶動動則喘乏方出痿門又方甘枸杞子北五味子研碎貯瓶內滚水泡封口少刻取服之可泡三次每服六錢久服為妙濕門明濕篇生生子曰六氣之中濕為四之氣土之所司脾為之主五運六化篇曰土之化曰濕曰雨主於長夏長夏謂六月也土生於火長在夏中既長而旺土潤溽暑濕化行也蓋燥則土生乾則土死泉出地中濕化信矣經曰地氣上為雲天氣下為雨雨出地氣雲出天氣則土雨之化見也經曰濕勝則濡泄人每夏月泄瀉多以胃苓湯益元散五苓散取效者實治濕令之勝也生生子曰內經云諸濕腫滿皆屬脾土濕勝則濡瀉地之濕氣感則害人皮肉筋脈又曰因於濕首如裹蓋首者諸陽之會至髙至清若濕氣薰蒸而沈重似有物以蒙之也失而不治則鬱為熱熱傷血不能養筋故大筋緛短而為拘攣濕傷筋不能束骨故小筋弛長而為萎弱矣濕之為邪有自內得者有自外得者隂雨濕地皆外所因飲食湯飲􅀈酪皆內所因有濕寒者有濕熱者丹溪曰六氣之中濕熱為病十居八九濕在上宜微汗之不欲大汗濕在下宜利小便此淡滲治濕也濕雖有內外二因然治法大抵要實脾土為主緣脾惡濕苟脾土不燥則失其健運之常病易乘之內濕多則泄瀉生痰流於經絡肢節則腫痛外濕多則跗腫而肌肉濡潰原病式曰諸痙強直積飲痞膈中滿霍亂吐下體重跗腫肉如泥按之不起皆屬於濕是以蒼白二术為必用之藥加入二陳湯用之如濕在肌表及上焦加羌活防風之類取風能勝濕之意如下焦腰足跗腫及泄瀉輕者加入五苓散重者加羌活防風升麻以升提之此無上妙法也賈真孫曰濕為土氣火熱能生濕土故夏熱則萬物濕潤秋涼則萬物乾燥濕病本不自生因熱而怫鬱不能宣行水道故停滯而生濕也況脾土脆弱之人易為感冒豈必待不流而後為濕哉人只知風寒之威嚴不知暑濕之炎烈感人於冥冥之中也病式云諸痙強直積飲等症皆屬於濕或胕腫體寒而有水氣裏必小便赤少不通或渴是蓄熱入裏極深非病寒也大抵治法宜實脾清熱利小便為上故治濕不利小便非其治也宜桂苓甘露木香葶􅐗木通治之守真師曰葶􅐗木香散下神芎丸此藥下水濕消腫脹利小便理脾胃無出乎此也腹脹腳腫甚者舟車丸下之濕熱內鬱發黃茵陳湯下之或佐以防已黃耆一身盡腫痛或無汗是濕流關節邪氣在表宜五苓散加官桂蒼术微汗之不可大汗若自出汗多熱燥津液內竭小水不利切勿利之重損津液也宜防風白术甘草湯主之其濕症有二濕熱症多濕寒症少當以脈症明辨之如脈滑數小便赤澀引飲為濕熱症若小便自利清白大便瀉利身疼自汗為濕寒症治之宜五苓散加生附子蒼术木瓜主之出玉機微義金匱防已黃耆湯治風濕脈浮身重汗出惡風或疼防已黃耆各一兩甘草炙五錢白术七錢半右每服一兩入薑棗煎喘者加麻黃胃氣不和加芍藥氣上衝加桂枝下有寒加細辛按濕勝身重陽微中風則汗出惡風故用黃耆炙甘草實表防已白术勝濕也桂枝附子湯治風濕相搏身體痛煩不能轉側不嘔不渴脈浮虛而澀者此湯主之桂枝八錢生薑六錢附子三錢炙甘草四錢右作二次入棗煎服小便自利者去桂加白术湯主之服後其人如冒狀乃藥加使然也勿怪甘草附子湯治風濕相搏骨節痛煩掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫痛者甘草炙白术各四兩附子三錢桂八錢水煎服金匱方減桂枝加生薑大棗名白术附子湯麻黃加术湯治濕勝身煩痛麻黃六錢桂枝四錢甘草炙二錢杏仁二十五枚白术八錢水煎取微汗金匱減桂术加薏苡仁名麻黃薏苡杏仁甘草湯治濕勝身疼日晡所劇者元戎加味五苓散治濕勝身疼小便不利體重發渴本方加羌活此乃太陽滲利之劑治風濕寒濕之藥也局方五積散治外感風寒冒寒濕身體重痛海藏云麻黃桂芍甘草即麻黃桂枝各半湯也蒼术甘草陳皮厚朴即平胃散也枳殼桔梗陳皮茯苓半夏即桔梗半夏等湯也又川芎當歸治血兼乾薑厚朴散氣此數藥相合為解表溫中泄濕之劑去痰消痞調經之方雖為內寒外感表裏之分之所製實非仲景表裏麻黃桂枝薑附之的方也至於積冷嘔泄時疫項背拘急加蔥白豆豉厥逆加吳茱萸寒熱咳逆加棗婦人難産加醋始知用之非一途也惟知活法者其擇之此方一兩加生薑五片水煎入麝香再煎二沸治中濕而致癱瘓與中風相似二服立效局方滲濕湯治寒濕所傷身重腰冷如坐水中小便或澀大便溏瀉皆坐卧濕地或隂雨所襲之也蒼术白术甘草各一兩乾薑茯苓各二兩陳皮丁香各二錢半每服四錢入棗煎服茵陳五苓散濕熱勝發熱黃疽茵陳蒿一兩五苓散五錢水煎服大橘皮湯治濕熱內甚心腹脹滿小便不利大便滑泄橘紅一兩半木香一錢滑石六兩檳榔三錢茯苓一兩豬苓澤瀉白术桂枝各五錢甘草二錢每服七錢入薑水煎服葶藶木香散治濕熱內外餘熱水腫腹脹小便赤澀大便瀉葶藶茯苓豬苓白术各一兩木香五分澤瀉木通甘草桂枝各五錢滑石三兩右為細末每服三五錢白湯調下劉河間曰若小便不得通利而反轉泄者乃濕熱痞悶極深而攻之不開是能反為注泄此正氣已衰而多難救慎不可與此也然當滋其化源東垣清燥湯表裡有濕熱痿厥癱瘓不能行走或足踝膝上皆腫痛口乾瀉痢方在注夏吐劑瓜蒂散治中寒濕頭痛面黃鼻塞煩而脈大瓜蒂一味為末以少許吹入鼻中黃水自出按濕盛致痰液留膈上肩背重痛麻痺者宜此吐之攻下之劑宣明三花神祐丸治一切水濕腫病大腹實脹喘滿舟車丸大黃二兩甘遂大戟芫花青皮陳皮各一兩牽牛木香各半兩為末滴水丸如梧子大每服六七十丸白湯下濬川散大黃煨郁李仁各二兩甘遂一兩芒硝半兩牽牛頭末四兩右為末薑湯調下空心臨卧隨症加減服導水丸濕熱內鬱胸膈痞滿鼽衄口舌生瘡咽喉不利牙疳齒蝕口臭或遍身生濕瘡乾疥睡語咬牙驚惕怔忡大小便滯澀風熱酒毒藴熱等症大黃黃芩各二兩牽牛頭末滑石各四兩為末水丸如梧子大每服五十丸白湯下臨時隨症加減除濕丹諸濕相搏腰膝重痛足脛浮腫筋脈緊急津液凝澀便溺不利檳榔甘遂威靈仙赤芍澤㵼葶藶各二兩乳香沒藥各一兩牽牛五錢大戟炒三兩陳皮四兩右為末糊丸梧子大每服五七十丸溫水下劉宗厚曰按此出太陽例藥諸濕鬱滯於表裡重痛沈著非此不能除但中病即止虛弱者當慎東垣海金沙散脾濕太過遍身腫滿喘不得卧及腹脹如鼓牽牛微炒一兩半甘遂五錢白术一兩海金沙三錢右為末每服二錢煎逆流水調下得利止後服聖靈丹脾肺有濕喘滿腫盛小便赤澀苦葶藶炒四兩漢防已木香茯苓寒食麵包煨木通人參各二錢半右為末棗肉為丸梧子大每服三十丸桑白皮湯下續隨子丸肺經有濕通身虛腫滿悶不快或逆或喘人參防已赤茯苓如上煨檳榔木香各五錢葶􅐗炒四兩續隨子一兩海金沙半兩為末棗肉丸梧子大每三十丸桑皮湯下導滯通經湯治脾濕有餘氣不宣通面目手足腫脹悶而痛即五苓散減豬苓桂加陳皮木香對金飲子治脾胃受濕腹脹米榖不化飲食不進身體沈重肢節酸疼皮膚微腫平胃散桑白皮炒各一兩為末每服二三錢入薑煎服除濕湯半夏曲炒厚朴蒼木各二錢藿香葉橘紅白术白茯苓各一錢炙甘草七分薑三片水煎服白术酒治中濕口噤不知人白术一兩酒二鍾煎至一鍾不拘時服不飲酒以水煎撫芎湯濕流關節臂痛手重或自汗頭眩痰逆惡心撫芎白术橘紅各一兩炙甘草五錢每服五錢薑七片水煎服黃耆湯風濕相摶脈沈而絃客在皮膚四肢少力關節疼痛黃耆五兩橘紅二兩甘草一兩白茯苓一兩半防風四兩右每服六錢薑三片棗一枚水煎服羌活勝濕湯羌活獨活各一錢藁本防風甘草炙川芎各五分蔓荆子三分水煎空心溫服如身重腰沈沈然加酒洗防已五分輕者附子五分重者川烏五分清熱滲濕湯黃連茯苓澤㵼各一錢黃柏鹽水炒二錢蒼术白术各一錢半甘草五分水煎服如單用滲濕去連柏加陳皮乾薑東垣參术湯潔古云起卧不能謂之濕身重是也此方主之治脾胃虛弱元氣不能榮養心肺四肢沈重食後昏悶黃耆二錢人參陳皮青皮各五分升麻柴胡各三分甘草炙四分酒黃柏三分神麯七分蒼术一錢當歸二分水煎食前帶熱服燥門明燥篇生生子曰諸書視燥為風熱為血少是固然矣豫謂諸書僅言病機耳而令氣則未之及也夫燥是六氣中五之氣也運氣六化篇已明言之其論曰在地成形在天為氣行有五而氣有六以分君火相火之化六氣化者謂寒濕暑燥風火也乃天之元氣然後三隂三陽上奉之謂之標六氣皆有一化舉大概也而難經亦曰辛商也丙之柔則金之化明矣觀運氣以卯酉為陽明燥金司天者又豈無所本哉夫金者西方之氣在人主肺運氣所以不言肺而言陽明者緣肺為華蓋雖隂臟居膈上處陽之部位必待陽而後發故屬陽明也金之化清與燥主於秋為五之氣主秋分后六十日有竒自斗建酉正至亥之中天度至此清氣乃行萬物皆燥也一年之間有此必然之勢亦有此必然之理也何以然金屬庚辛辛為丙婦帶火之氣故燥豫故曰素問言燥者指令氣也諸書云燥者指病機也燥之胎自丙中來故古人有云莫治風莫治燥治得火時風燥了此深得夫燥之旨者同志者詳之內經病機云諸澀枯涸乾徑皴揭皆屬於燥燥本風熱論原病式云經曰風熱火同陽也寒燥濕同隂也又燥濕小異也然燥雖屬秋隂而異於寒濕故反同其風熱也故火熱盛金衰而風生則風能勝濕熱能耗液而反寒陽實隂虛則風熱勝於水濕而為燥也凡人風病多因熱甚而風燥者為其兼化以熱為其主也然陽實隂虛而風熱太甚以勝水濕因而成燥肝主於筋而風氣自甚又燥熱加之液還聚於胸膈則筋太燥也燥金主於取勝徑切緊澀故為病筋脈徑強緊急而口噤也或病燥熱太甚而脾胃乾涸成消渴者或風熱燥甚怫鬱在表而裏氣不舒善伸數欠筋脈拘急或時惡寒或筋惕而搐脈浮數而絃也風熱燥并鬱甚於裡故煩滿而或閟結也及風癎之發作者由熱甚而風燥為兼化涎溢胸膈而瘈瘲昏冒僵仆也凡此諸症皆由熱甚而生風燥各有異者由風熱燥各微甚不等故也所謂中風或筋緩者因其風熱勝濕而為燥乃燥之甚也然筋緩不收而痿痺及諸膹鬱病痿皆屬金肺乃燥之化也如秋深燥甚草木痿落而不收病之象也是以手得血而能握足得血而能步夫燥之為病者血液衰少也而又氣血不能通暢故病然也論結燥病本不同東垣曰金匱真言論云北方黑色入通於腎開竅於二隂藏精於腎又云腎主大便大便難取足少隂夫腎主五液津液潤則大便如常若飢飽勞逸損傷胃氣及食辛熱味厚之物而助火邪伏於血中耗散真隂津液衰少故大便結燥然結燥之病不一有熱燥有風燥有陽結有隂結又有年老氣虛津液不足而結者治法云腎惡燥急食辛以潤之結者散之如少隂不得大便以辛潤之太隂不得大便以苦㵼之陽結者散之隂結者熱之仲景云大便硬小便利不可攻下以脾約丸潤之食傷太隂腹滿食不化腹響然不能大便者以苦藥瀉之大抵津液耗少而燥者以辛潤之有物而結者當下之若不究其源一概用巴豆牽牛之類下之損其津液燥結愈甚有復下復結極則以至引導於下而不能通者遂成不救之症可不慎哉劉宗厚曰按此只是論結燥言裏證也河間所論則兼表裡而言醫經統旨曰燥是陽明之化雖因於風熱所成然究其原皆本於血虛津液不足所至者為多何也蓋隂血虛則不能榮運乎百體津液衰則無以滋養乎三焦由是邪熱怫鬱而燥變多端或燥於外歟則皮膚皴結或燥於內歟則精血枯涸燥於上咽鼻焦乾燥於下便溺閉結治之者外以滋益之內以培養之在上清解之在下通潤之務使水液自生而燥熱不容於不退矣張子和治一婦人大便燥結小便淋澀半生不娠惟常服迹導之藥則大便通利暫廢藥則結滯忽得孕至四五月間醫者禁疏導之劑大便依常為難臨圊則努力為之胎墜者三又孕已經三四月弦望前後溲溺結澀其分胎隕乃訪戴人戴人診其兩手脈俱滑大雖滑大以其且孕不敢陡攻遂以食療之用花鹼煮菠菱葵菜以車前子苗作茹雜豬羊血作羹食之半載居然生子其婦燥病方愈戴人曰豫見孕婦利膿血下迫極努損胎但同前法治之愈者莫知其數也為醫拘常禁不能變通非醫也非學也識醫者鮮是難説也義治一男子年六十餘病腰尻脊胯皆病數載不愈晝靜夜躁大痛往來屢求自盡天年旦夕則痛作必令人以手槌擊至四五更雞鳴則漸減向曙則痛止左右及病者皆作鬼神隂譴白虎齧朝禱暮祝覡巫僧道禁師至則其痛似減又夢鬼神戰鬬山川神廟無不祭者淹延歲月肉瘦皮枯飲食減少暴怒日增惟候一死有書生曰既云鬼神虎齧隂譴之禍如此禱祈何無一應聞陳郡有張戴人精於醫可以問其鬼神白虎與病乎彼若術窮可以委命其家從之戴人診其兩手脈皆沈滯堅徑力如張絙謂之曰病雖瘦難於食然腰尻脊胯皆痛者必大便堅燥其左右曰有五七日或八九日見燥糞一兩塊如彈丸結硬不可言曾令人剜取之僅下一兩塊渾身燥癢皮膚皺揭枯澀如麩片戴人既得病之虛實隨用大承氣湯以薑棗煎之加牽牛頭末二錢不敢言是瀉劑蓋病者聞暖則悅聞寒則懼説補則從説瀉則逆此弊非一日也而況一齊人傅之衆楚人咻之乎及煎成使稍熱咽之從少至多纍至三日天且晚臟腑下泄四五行約半盆以燈視之皆燥糞燥痺及瘀血雜臟穢不可近須臾痛減九分昏睡鼻息調如常人睡至明日將夕始覺飢而索粥溫涼與之又困睡一二日其痛盡去次令飲食調養日服導飲丸甘露飲滑利便溺之藥四十餘日乃復嗚呼世傳三十六虎書三十六黃經及小兒三十六吊誰為之耶始作俑者其無後乎古人以醫為重故醫之道行今之人以醫為輕故醫之道廢學者自局於術藝病者亦不擇精粗一槩待之常見官醫迎送長吏馬前折腰真可羞也由是博古通今者少而師傳遂絶靈柩經謂刺與汗雖久猶可拔而雪結與閉雖久猶可解而決去腰脊胯痛者足太陽膀胱經也胯痛足少陽膽經之所過也難經曰諸痛為實內經曰諸痛癢瘡痬皆屬心火注曰心寂則痛微心躁則痛甚人見巫覡僧道禁師至則病稍去者心寂也然去其後來者終不去其本也古之稱痛隨利減不利則痛何由去病者既痊乃夀八十歲故凡燥症皆三陽病也內經燥治法燥淫於內治以苦溫佐以甘辛以辛潤之以苦下之治風之劑機要大秦艽湯治血弱隂虛不能養筋筋燥而手足不能運動指爪乾枯屬風熱甚者秦艽石膏各二兩甘草川芎當歸芍藥羌活獨活防風黃芩白芷生地黃熟地白术茯苓各一兩細辛五錢春夏加知母一兩右銼每服一兩水煎服天隂兩加生薑七片麻仁丸郁李仁麻仁各六兩檳郎五錢大黃二兩五錢一半炒山藥防風枳殼炒各七錢半羌活木香各五錢半右為末煉蜜為丸如梧子大每服二三十丸溫湯下東垣潤腸丸治脾胃中伏火大便祕澀或乾燥閉塞不通全不思食乃風結祕血結祕皆令閉塞也以潤燥和血踈風自然通矣麻子仁一兩羌活歸尾大黃煨皂角仁秦芄各五錢桃仁去皮尖一兩右除二仁另研餘為末煉蜜為丸如梧桐子大每服三五十丸食前白湯下又有潤燥丸一方於本方加郁李仁防風東垣導滯通幽湯治大便難幽門不通上沖吸門不開噎塞不便燥閉氣不得下治在幽門以辛潤之當歸升麻桃仁另研各一錢紅花三分生地黃熟地各五分甘草炙三分右水煎調檳榔末五分加大黃名當歸潤燥湯脾約丸麻仁一兩二錢半枳實芍藥各二兩大黃蒸四兩杏仁去皮尖炒一兩二錢為末煉蜜丸如梧子大每二三十丸溫水下潤體丸郁李仁大黃桂心黑丑當歸黃柏各五錢輕粉少許右為末水丸梧子大每服三四十丸溫水下滋燥養榮湯治皮膚皴揭筋燥爪枯當歸酒洗二錢生地黃熟地黃白芍秦芄黃芩各一錢五分防風一錢甘草五分水煎服大補地黃丸治精血枯涸燥熱黃柏鹽酒炒四兩知母鹽酒炒二兩枸杞子三兩熟地四兩山藥三兩山茱萸白芍各二兩生地黃二兩半當歸三兩玄參肉蓯蓉酒浸各一兩半右為末煉蜜丸如桐子大每服七八十丸空心淡鹽湯送下清涼飲子治上焦積熱口舌咽鼻乾燥黃芩黃連各二錢薄荷玄參川歸芍藥各一錢半甘草一錢水二鍾煎八分不拘時服大便祕結加大黃東垣清燥湯治濕熱成痿以燥金受濕熱之邪是絶寒水生化之源源絶則腎衰痿厥之病大作腰已下痿軟癱瘓不能動方在注夏半硫丸治冷祕風祕結老人祕透明硫黃研半夏洗七次各等分為末生薑糊為丸梧子大每服二十丸薑湯下或用茐白一條薑三片煎入阿膠二片溶化食前空心送下寒門明寒篇生生子曰寒冬之令氣也六之終氣也水之所司腎為之主運氣六化篇曰冬之為言終也素問天元紀大論篇鬼臾區曰道生智元生神神在天為風在地為木在天為熱在地為火在天為濕在地為土在天為燥在地為金在天為寒在地為水又五行大論篇曰北方生寒寒生水水生鹹鹹生腎在體為骨在氣為堅在臟為腎其性為凛其德為寒其用為闔其色為黑其化為肅故造化非嚴凛殺厲以固閉之則無以藏蓄微陽為春生之本故曰冬令嚴寒萬類潛藏君子固蜜啓玄子曰冬三月此謂閉藏水氷地拆無擾乎陽夜卧晏起必待日光示人隨時調攝也設令防間少迹彼體虛者觸冒之傷太陽寒水之經而為外感之證即時而病頭項痛腰脊強脈浮而緊名曰傷寒其症浩大傳變多端愚故採諸家傷寒另為一卷以統治之兹特以病機屬於內因者條列於斯所以别內外以見先賢用心有定宗又使後習調劑有定向也故首著中寒而以雜症屬寒者亦𨽻焉中寒雜症附丹溪曰中寒非傷寒可此傷寒乃外感寒邪必大發熱循經而入以漸而深熱雖甚不死中寒乃倉卒感受其病即發而暴此胃氣之大虛也若不急治去生甚逺速當溫補生生子曰寒乃天地嚴凝殺厲之氣惟體虛乃易感之其症面青口噤四肢強直攣急疼痛甚則昏迷不省人事脈多遲緊急宜以薑附湯溫之或理中湯加附子治之雜症亦有寒者非若中寒之猛而急也又或炎天避暑乘風取涼或口食生冷皆有寒症劉守真病機曰諸病上下所出水液澄徹清冷下痢清白吐痢腥穢食已不飢堅痞腹滿急痛癥瘕㿗疝屈伸不便厥逆禁固皆屬於寒內經曰隂氣有餘為多汗身寒又曰隂盛則身寒汗出身常清數栗而寒寒則厥受寒甚者手足厥冷腹中絞痛唇青氣冷可急於臍下三寸丹田穴上灸之或三五十壯或百壯俟手足溫暖為度或用尉法亦可薑附湯治中寒口禁四肢強直失音不語忽然暈倒口吐涎沫狀如暗風手足厥冷或復煩躁兼隂症傷寒大便利而發熱者乾薑五錢熟附子三錢水二鍾煎八分作二次服或慮此方太燥即以附子理中湯相繼服薑附本治傷寒經下后又復發汗內外俱虛身無大熱晝則煩躁夜則安靜不渴六脈沈伏並宜服此不知脈者更宜審之兼治中脘虛寒久積痰水心腹冷痛霍亂轉筋四肢厥逆理中湯治五臟中寒口禁失音四肢強直兼治胃脘停痰冷氣刺痛人參乾薑炮甘草白术各二錢水二鍾煎至一鍾不拘時服加附子名附子理中湯沈附湯治虛寒無陽胃弱乾嘔附子炮乾薑炮各半兩沈香白术各二錢半甘草右分二服每服加生薑五片水二鍾煎八分食逺服生料五積散治感冒寒邪頭痛身疼項強拘急惡逆吐逆腹痛又治傷寒發熱頭痛惡風無問內傷生冷外感風寒及寒濕客於經絡腰腳痠痛及婦人經血不調或難産並治之白芷七分半夏厚朴川芎甘草枳殼炒茯苓當歸桔梗乾薑炮芍藥肉桂各八分麻黃陳皮各一錢蒼术二錢作一帖生薑三片茐白三莖水二鍾煎一鍾不拘時服正氣散治傷寒隂症增寒惡風正氣逐冷方見霍亂門理氣治中湯治寒氣攻心嘔逆心腹絞痛或泄瀉四肢厥冷或疝氣攻築小腹疼痛並宜服之青皮陳皮人參白术炒炮薑甘草炙各一錢木香七分生薑三片水煎服肉桂散治傷寒服冷藥過多心腹滿脹四肢厥冷昏沈不省人事變為隂毒惡症肉桂白术木香厚朴良薑各三錢白芍人參陳皮前胡當歸附子炮各一兩吳茱萸五錢每服五錢薑三片紅棗三枚水煎不拘時服溫中湯脈沈遲乃胃中寒也及胸膈滿悶身體拘急手足逆冷急宜溫之丁皮厚朴各一兩乾薑炮白术陳皮丁香各二錢右俱末每服二錢茐白湯調下术附理中丸治中寒急心腹痛人參附子炮炮薑白术炙甘草木香丁香各等分為末煉蜜為丸如梧子大每服六七十丸白湯食前送下沈香桂附丸治中寒心腹冷痛霍亂轉筋等症沈香附子炮炮薑良薑炒官桂茴香炒川烏炮去皮臍吳茱萸湯浸洗炒各等分為末醋煮麵糊為丸梧子大每服五七十丸米飲下空心食前二次忌生冷尉法治三隂中寒一切虛冷厥逆嘔噦隂盛陽虛及隂毒傷寒四肢厥冷臍腹痛咽喉疼嘔吐下利身背強自汗脈沈細唇青面黑諸虛冷證皆治肥蔥銼細麥麩皮各三升食鹽二兩用水一大盞同和拌勻濕遍分作二次入鍋同炒極熱用重絹縫作二包先將一包熱尉臍上冷則易之蔥包既冷再加鹽水拌濕炒焦依前尉之再炒再尉至煤爛不用别另取新蔥麥麩皮入鹽日夜不住手相續至身體溫熱陽氣復回脈起為度人參養胃湯治外感寒邪內傷生冷蒼术厚朴半夏麯各二錢人參茯苓草果藿香各一錢陳皮一錢二分甘草炙五分薑三片烏梅半個水煎服薑桂散溫中散寒乾薑良薑各一錢半桂心木香半夏麯炙甘草各一錢薑五片紅棗三枚水煎服東垣謂隂氣上溢於陽分則晝寒隂血自旺於隂分則夜寒氣分寒桂枝加附子湯桂枝加芍藥人參湯血分寒巴戟丸神珠丸桂枝加附子湯治太陽病發汗遂漏不止惡風小便難四肢微急難以屈伸桂枝芍藥各一兩半甘草炙一兩附子炮半個每服五錢薑四片棗一枚水一鍾半煎七分桂枝加芍藥生薑人參湯治發汗後身痛脈沈遲桂枝人參各一兩半芍藥二兩甘草炙一兩煎法如上巴戟丸治肝腎俱虛收領精氣補真戢陽進美飲食白术五味巴戟覆盆子茴香熟地人參蓯蓉兔絲子牡蠣益智仁骨碎補白龍骨各等分為末煉蜜丸梧子大每服三十丸食前米飲下日三服神珠丸治下焦元氣虛弱小腹冷痛皮膚燥澀小水自利足胻寒而逆又名離珠丹杜仲炒三兩訶子炮五枚萆薢二兩龍骨一兩破故紙三兩胡桃去皮百枚硃砂另研一兩半砂仁半兩為末酒糊為丸梧子大硃砂為衣每服三十丸空心下脈絃數及絃細者皆不可服詳見衛生寶鑑王海藏治三焦寒用藥大例上焦寒陳皮厚朴藿香皆可治之中焦寒大小便不通白术乾薑丁香皆可治之下焦寒肉桂附子沈香上焦寒鐵刷湯治積寒痰飲嘔吐不止胸膈不快飲食不下半夏四錢草蔲仁丁香乾薑訶子皮各三錢生薑一兩大吐不止加附子三錢生薑半兩分二服水煎桂附丸治寒邪冷氣入乘經絡令人卒心痛或引背膂川烏黑附各炮三兩炮薑赤石脂川椒去目微炒桂心各二兩右為末蜜丸梧子大每服三十丸不止加至五十丸溫水吞胡椒理中丸治肺胃虛寒咳嗽喘嘔痰水胡椒甘草欵花蓽撥良薑細辛陳皮乾薑各四兩白术五兩為末蜜丸梧子大每三十丸至五十丸溫水或酒任下中焦寒附子理中丸治脾胃冷弱心腹㽱痛嘔吐瀉利霍亂轉筋體冷微汗滿悶腹鳴飲食不進即前理中湯加附子為末用煉蜜丸梧子大每服三十丸溫水下二氣丹助陽退隂治裡寒心腹刺痛泄利嘔吐自汗厥冷小便不禁霍亂轉筋久下冷利硫黃桂心各一分炮薑二錢黑附子炮半兩硃砂二錢為末麵糊丸梧子大每服三十丸空心煎艾湯入鹽送下大建中湯治內虛少氣厥冷大小腹絃急不能食起則微汗隂縮口唇乾燥精滑自出或手足乍寒乍熱而煩寃痠痛不能久立常多夢遺黃耆當歸桂心芍藥各二錢人參甘草各一錢半夏黑附子炮各二錢半每服五錢薑三片棗二枚水煎服下焦寒張仲景八味丸補腎之不足還少丹大補心腎脾胃治一切虛損肢體倦怠小便混濁山藥牛膝逺志巴戟山茱萸杜仲茯苓楮實子五味子蓯蓉石菖蒲茴香各一兩枸杞熟地各二兩為末棗膏搗為丸梧子大空心食前溫酒鹽湯任下三五十丸日三有熱加山梔一兩心氣不寧加麥冬一兩精神少再加五味子一兩陽弱加續斷一兩天真丹治下焦陽虛沈香茴香萆薢酒浸炒巴戟酒浸去心破故紙炒葫蘆巴炒杜仲鹽水炒黑牽牛鹽水炒各一兩琥珀桂心各五錢右為末浸酒打糊為丸梧子大空心酒下五十丸通治三焦甚寒之氣大已寒丸治臟腑虛冷心腹㽱痛泄瀉腸鳴自利自汗米穀不化手足厥冷蓽撥桂心各六兩半炮薑良薑各十兩右為末麵糊丸梧子大每服二十丸食前米飲下四逆湯傷寒自利不渴嘔噦不止或吐利俱發小便或澀或利或多汗厥冷脈微欲絶炙甘草二兩炮薑一兩半附子半兩每服三四錢水一鍾半煎七分溫服海藏治下焦寒四逆湯例乾薑味苦止而不行附子味辛行而不守泄小便不通二藥皆陽氣化能作小便若薑附术三味內加茯苓以分利之為佳附生用而不炮則無火力熱則行而不止兼用水多煎少則味厚而直入下焦治五臟寒方肝寒雙和散心寒定志丸菖蒲丸脾寒益黃丸肺寒小青龍湯腎寒八味丸東垣雙和散補血益氣治虛勞少力黃耆熟地當歸川芎各一錢官桂甘草各七分白芍一錢半薑六片大棗六枚分二服水煎服無時東垣曰此方豫每治傷寒瘧疾中暑大病之後虛勞氣乏者以此調治極驗不熱不冷溫而有補乃建中四物二方化而為一也益黃散陳皮一兩青皮訶子肉炙甘草各半兩丁香二錢右為末每服二三錢水煎服海藏云此劑瀉脾以燥濕薑附湯加麻黃白术人參甘草等分名附子麻黃湯治中寒濕昏暈緩弱腰脊強急口眼喎斜語聲渾濁胸腹䐜脹氣上喘急不能轉動兼宜審而用之代灸膏治老人衰弱元氣虛冷臟腑虛滑腰腳冷痛沈重減食手足逆冷不能忍者用此代灸其效不能盡述大附子炮一枚吳茱萸桂皮木香各半兩蛇床子半兩馬藺草各一兩為細末每用藥半匙生薑汁半盞白麵半匙同煎成膏攤於紙上臨卧貼臍以油紙覆其上綿衣繫之自夜至明乃去每夜如此其腰腹如灸能除寒積若腰痛貼腰眼霹靂散乃正治溫散之劑附子一枚炮熟取出用冷灰窨之良久取出研末入真臘茶一大錢同和分二服每服水一盞煎六分臨熟入蜜半匙放溫服之寒中東垣曰夫脾胃之症始則熱中終傳寒中經云隂盛生內寒厥氣上逆寒積於胸中是腎水反來侮土此謂所勝者妄行或作中滿腹脹或作涎涕或足下痛不能任身履地骨乏無力喜睡兩丸多冷時作隂隂而痛或妄見鬼狀夜夢亡人腰脊背脾俱痛而不渴不瀉此濕氣去而寒獨存血絡凝泣故其脈盛大以澀名曰寒中以白术附子湯治之白术附子湯治寒中諸症白术附子炮陳皮蒼术炒厚朴製半夏茯苓澤㵼各一兩豬苓半兩桂心四錢每服五錢生薑三片水煎服量虛實加減背寒仲景云心下有留飲其人背惡寒冷如氷治法茯苓丸之類是也即千金化痰丸身前寒經云胃足陽明之脈氣虛則身以前皆寒栗治法宜針補三里穴是也掌中寒者腹中寒魚上白肉有清血脈者是胃中有寒也理中湯之類惡寒丹溪曰久病惡寒當用解鬱濕痰積中抑遏陽氣不得外泄身必惡寒惡寒非寒明是熱症進士周年近四十得惡寒症服附子數百帖而病甚脈絃而緩遂以江茶入生薑汁香油些少調飲之吐痰一升許減大半又與通聖散去麻黃大黃芒硝加當歸地黃百帖而安一女子惡寒用苦參赤小豆各一錢為末虀水調飲之吐痰甚多繼用後藥調理川芎南星蒼术黃芩酒打麵糊丸服上焦不通則陽氣抑遏而皮膚分肉無以溫之故寒栗東垣升陽益胃湯用升發之劑開發上焦以伸陽明之氣出於表而溫之也丹溪吐出濕痰亦開發上焦使陽氣隨吐伸發出外而溫之也故寒栗皆愈二者乃治陽虛表寒之要王海藏治一婦先病惡寒手足冷全不發熱脈八至兩脅微痛治者便作少陽治之陽在內伏於骨髓隂在外致使發寒治當不從內外從乎中治也宜以小柴胡調之倍加薑棗丹溪治一婦年近六十六月內常覺惡寒戰栗喜烈火御綿汗時如雨形肥肌厚已服附子十餘帖渾身癢甚兩手脈沈澀重取稍大知其熱甚而血虛也以四物去川芎倍地黃加白术黃耆炒黃柏生甘草人參每服一兩重始煎一帖飲之腹大泄目無視口無言知其病勢深而藥無反佐之過也仍以前藥熱炒與之蓋借火力為向導一帖利止四帖精神回十貼病全安又蔣氏婦年三十餘形瘦面黑六月喜熱惡寒兩手脈沈而澀重取則數以三黃丸下之以薑湯每服三十丸二十帖微汗而安又云三補丸亦可赤水元珠卷二
