body:
  text: 赤水元珠卷七明孫一奎撰咳嗽門臟腑皆有咳黃帝問曰肺之令人咳何也岐伯對曰五臟六腑皆令人咳非獨肺也帝曰願聞其狀岐伯曰皮毛者肺之合也皮毛先受邪氣邪氣以從其合也此邪從外受之王注云邪謂寒氣其寒飲食入胃從肺脈上至於肺則肺寒寒邪從外受也肺寒則外內合邪因而客之則為肺咳所謂肺先受邪也五臟各以其時受病王注云時謂正月也非其時各傳以與之人與天地相參故五藏各以治時感於寒則受病微則為咳甚則為泄為痛乘秋則肺先受邪乘春則肝先受之乘夏則心先受之乘至陰則脾先受之乘冬則腎先受之帝曰何以異之岐伯曰肺咳之狀咳而喘息有音甚則吐血取大淵穴也心咳之狀咳則心痛喉中介介如梗狀甚則咽腫喉痺取太陵穴也肝咳之狀咳則兩脅下痛甚則不可以轉轉則兩胠下滿取太衝穴也脾咳之狀咳則右脅下痛陰陰引肩背甚則不可以動動則咳劇取太白穴也腎咳之狀咳則腰背相引而痛甚則咳涎取太溪穴也帝曰六腑之咳奈何安所受病岐伯曰五臟之久咳乃移於府脾咳不已則胃受之胃咳之狀咳而嘔嘔甚則長蟲出取三里穴也肝咳不已則膽受之膽咳之狀咳嘔膽汁取陽陵泉穴也肺咳不已則大腸受之大腸咳狀咳而遺失取巨虛上亷也心咳不已則小腸受之小腸咳狀咳而失氣氣與咳俱失取巨虛下亷也腎咳不已則膀胱受之膀胱咳狀咳而遺溺取委中穴也久咳不已則三焦受之三焦咳狀咳而腹滿不欲食飲此皆聚於胃關於肺使人多涕唾而面浮腫氣逆也取支溝穴帝曰治之奈何岐伯曰治臟者治其俞治府者治其合浮腫者治其經見咳論按素問曰咳嗽煩寃者是腎氣之逆也示從容篇一陽發病少氣善咳善泄夏脈不及則令人上見咳唾下為氣泄凡咳嗽面赤胸腹脅常熱惟於足乍有涼時其脈洪者熱痰在胸膈也宜小陷胸湯礞石丸之類清膈降痰甚而不已者宜吐下其痰熱也面白悲嚏或脅急脹痛或脈沈弦細遲而咳者寒飲在胸腹也宜辛熱去之脈治脈經曰關上脈微為咳脈緊者肺寒雙弦者寒咳而脈弦澀為少血浮緊者虛寒脈細傷濕脈浮而緩傷風數則為熱沈數者裏熱脈弦為水偏弦為飲洪滑多痰脈沈為留飲肺脈微急為咳而唾血咳脈浮直者生浮軟者生咳證死脈咳而脈緊者咳而羸瘦脈形堅大者肌瘦下脫形熱不去咳而脫形發熱脈小堅急者咳而嘔腹脹且泄其脈弦急者皆死不治仲景曰人嗽十年其脈弱者可治實大數者死其脈虛者必苦冒其人本有支飲在胸中故也治屬飲家上氣面浮腫肩息其脈浮大不治又加利尤甚脈浮短者其人肺傷諸氣微少不過一年死法當嗽也咳嗽羸瘦脈形堅大者死咳而脫形身熱脈小堅急以疾是逆也不過十五日死全文見診論咳與嗽本一證子和云內經陰陽應象論云秋傷於濕冬生咳嗽五臟生成篇云咳嗽上氣診要經終篇云春刺秋分環為咳嗽示從容篇云咳嗽煩寃者腎氣之逆也此四篇中連言咳嗽其餘篇中止言咳而不言嗽如生氣通天論云秋傷於濕上逆而咳與大象論文義同而無嗽字乃知咳即嗽明矣謹按咳與嗽本兩字義內經已作一證連言之愚詳大抵咳者氣動也陽也嗽者兼血也陰也况是證其本雖殊其標則一故世俗不以為疑唯潔古發內經微旨其義見下病機機要云咳謂無痰而有聲肺氣傷而不清也嗽謂無聲而有痰脾濕動而為痰也咳嗽謂有聲有痰也因傷肺氣動於脾濕而然也夏月嗽而發熱者謂之熱嗽小柴胡四兩加石膏一兩知母半兩冬月嗽而發寒熱謂之寒嗽小青龍加杏仁服之蜜煎生薑湯蜜煎橘皮湯燒生薑胡桃皆治無痰而嗽者此乃大例更當隨時隨證加減之痰而能食者大承氣微下之痰而不能食者厚朴湯主之論嗽分六氣無熱無寒子和因素問言皮毛者肺之合也邪因而客之則為肺咳後人見是斷嗽然可以辨其六者之狀風乘肺者日夜無度汗出頭痛痰涎不利熱乘肺者急喘而嗽面赤潮熱手足寒乳子亦每多有之火乘肺者咳喘上壅涕唾出血甚者七竅血溢燥乘肺者氣壅不利百節內痛頭面汗出寒熱往來皮膚乾燥細瘡燥癢大便祕澀涕唾稠粘寒乘肺者或因形寒飲冷冬月臥濕地或冒冷風寒秋冬水冷中感之嗽急而喘此非六氣之云乎論濕痰主嗽潔古曰嗽者秋傷於濕積於脾經曰秋傷於濕冬必咳嗽大抵素秋之氣宜清而肅反動之則氣必上衝而為咳嗽甚則動於濕而為痰也是知脾無留濕雖傷肺氣不為痰也有痰者寒少熱多各隨五臟而治之假令濕在肝經謂之風痰也濕在心經謂之熱痰濕在脾經謂之濕痰濕在肺經謂之氣痰濕在腎經謂之寒痰宜隨證而治之咳而無痰者以辛甘潤其肺咳而嗽者治痰為先故以南星半夏勝其痰而嗽自愈枳殼陳皮利其氣而痰自下劉宗厚曰按此論咳因濕在於經致痰為咳五臟亦皆有之可謂發內經之祕矣然至氣鬱津液不降或停水飲所致或腎氣虛弱火炎水涸津液湧而為痰涎於上此氣飲及真臟為病非諸經留濕致病也故易老云半夏止能泄痰之標而不能治痰之本是矣丹溪曰咳嗽有風寒有火有痰有勞有肺脹風寒者鼻塞聲重惡寒是也宜發散行痰又有聲啞及喘嗽遇冬則發皆為寒包熱也解表則熱自除感冷則嗽膈上有痰也宜解表豁痰火者有聲痰少面赤是也勞者盜汗多兼痰多吐紅作寒熱是也宜補陰清金痰者嗽動便有痰出痰出嗽止是也主豁痰肺脹者動則喘滿氣急聲重者是也宜收斂此因火傷極遂成抑遏脹滿肺脹抑遏不得眠者難治飲水一二口而暫止者熱嗽也呷熱湯而暫停者冷嗽也熱嗽以小柴胡湯冷嗽理中湯並加五味子又有先因傷濕傷寒解利不盡病雖退然食飲減少不生肌肉身倦無力稍勞則體熱痠痛狀如勞症但不吐血不發潮熱經二三年此是餘毒伏在經絡其脈弦再發則愈又有咳而不思食飲此皆痰聚於胃關於肺令人多涕唾而面浮腫此氣逆也謂氣上逆肺壅而不下治以異功白术散治嗽最要分肺虛實新嗽挾虛者可用人參風寒邪盛及久嗽熱鬱者切不可用五味子亦然凡飲酒後嗽甚者熱嗽也飲酒後嗽減者寒嗽也涎稠黃者為熱青白者為寒凡嗽春是春升之氣或外感夏是火炎上最重秋是濕熱傷肺冬是風寒外束也丹溪曰上半日嗽多屬胃中有火用貝母石膏降胃火午後嗽多屬陰虛必用四物湯加知母炒柏先降其火黃昏嗽多此火氣浮於肺不宜用涼藥宜五味子五棓子斂而降之治嗽藥大槩多用生薑以其辛散也咳逆非蛤粉青黛瓜蔞貝母不除有痰者加痰藥用藥發散之後必以半夏逐其痰庶不再來治嗽多用粟殼不必疑但要先去病根此收後藥也夫咳之為病有一咳則出痰者脾濕勝而痰滑也有連咳十數聲不出痰者肺燥勝痰濕也滑者宜南星半夏皂角灰之屬燥其脾若利氣之劑所當忌也澀者宜枳殼紫蘇杏仁之屬利其肺若燥肺之劑所當忌也咳嗽口燥咽乾有痰不用半夏用瓜蔞貝母飲水者不用瓜蔞恐滯膈不快乾咳嗽乾咳嗽者無痰出而咳咳連聲者是也此本於氣澀澀之微者咳十數聲方有痰出澀之甚者雖咳十數聲亦無痰出丹溪云乾咳嗽極難治此係火鬱之症痰鬱火邪在中以苦桔梗開之下用補陰藥不已即成勞倒倉法好此不得志者有之宜用補陰方四物湯加竹瀝炒柏之類隂虛咳嗽四物湯加竹瀝薑汁主之陰分嗽者多屬陰虛治用知母勿用生薑以其辛散故也肺虛嗽此好色腎虛者有之人參膏以陳皮生薑佐之治咳嗽疏表之劑仲景厚朴麻黃湯咳而脈浮者厚朴五兩麻黃四兩石膏二兩杏仁半升半夏半升乾薑二兩細辛二兩小麥一升五味子半升右以水一斗三升先煮小麥熟去渣納諸藥煮取三升溫服一升一日三服三拗湯治咳嗽感冒風寒鼻塞聲重方在傷風門敗毒散治痰嗽身熱鼻塞方在瘟疫門華蓋散治感寒而嗽胸滿聲重蘇子陳皮赤茯苓桑白皮麻黃各一兩炙甘草五錢每服八錢入薑水煎服橘蘇散治傷風咳嗽身熱有汗陳皮蘇葉杏仁五味子半夏桑白皮炒貝母白术各錢半甘草六分薑三片水煎神术散治四時瘟疫發熱惡寒及傷寒咳嗽蒼朮五兩白芷細辛羌活川芎炙甘草各一兩每服五錢薑三片蔥白三寸水煎服若傷風鼻塞可為末以蔥茶調下金沸草散治感寒咳嗽發熱惡寒無汗荆芥四兩麻黃去節前胡各三錢炙甘草赤芍藥半夏各一錢旋覆花三錢分二服每薑三片水煎服橘皮湯治冷嗽陳皮紫苑麻黃當歸杏仁炙甘草黃芩各二錢分二服水煎服治暑嗽之劑白术湯治咳而脈細白术白茯苓半夏各等分每服一兩水一鍾半薑三片煎調神麴末二錢一方加黃芩白术木香散喘嗽腫滿欲變水氣者白术豬苓甘草澤瀉木香檳榔各三兩陳皮二兩桂枝二錢滑石右為末每服五錢入薑煎機要咳氣丸咳久痰喘肺氣浮腫陳皮青皮檳榔木香杏仁郁李仁茯苓澤瀉當歸馬兜鈴苦葶􅏣各三錢人參防已各五錢牽牛頭末一兩半右為末薑汁糊丸梧子大每服三十丸至六十丸白湯下大橘皮湯感濕面腫上喘滑石九錢炙甘草木香檳榔各一錢半陳皮三錢右分二帖水煎服治燥嗽之劑千金五味子湯治咳嗽不已皮膚乾燥唾中有血胸脅疼痛五味子桔梗紫苑甘草續斷各二錢竹茹三錢赤小豆一撮生地桑白皮各五錢作二帖水煎服沖和神功丸大黃煨訶子麻子仁人參右為末入麻仁研勻加煉蜜為丸梧子大每五十丸溫水下按丹溪曰訶子治肺氣因火傷極遂鬱遏脹滿取其味酸苦有收斂降火之功若佐以海粉香附瓜蔞青黛半夏麴治嗽非止澀之藥也楊文治痰嗽利胸膈方大瓜蔞去子洗淨槌破刮皮細切焙乾半夏四十九顆湯洗十遍槌碎焙乾為末以洗瓜蔞實熱水並穰同熬成膏為丸梧子大生薑下二十丸衍義云有婦人患肺熱久嗽身如炙肌瘦將成肺癆以枇杷葉木通欵冬花紫苑杏仁桑皮各等分大黃減半各如常製蜜丸櫻桃大食後夜臥含化一丸未終劑而愈丹溪潤肺散貝母一兩瓜蔞五錢青黛五錢為末薑汁蜜調成膏噙化下抑痰丸瓜蔞仁一兩半夏麴二錢貝母三錢為末炊餅丸麻子大海蛤丸咳逆上氣痰飲心痛海蛤燒為粉瓜蔞仁和穰同研和勻為丸麻子大白湯下杏仁煎哮嗽寒熱嗔多喜少面色不潤食少脈弦緊杏仁去皮尖一兩用童便浸一日一換夏月一日三換浸半月取出洗淨焙乾研令極細每服一棗大用薄荷一葉白蜜少許水一盞煎食後服甚不過二劑永瘥丹溪肺鬱痰嗽睡不安者清化丸貝母杏仁右為末沙糖入薑汁蒸餅丸噙化潤下丸治氣實有痰又治積氣並大腸經氣滯痰嗽陳皮去白六兩甘草一兩食鹽五錢右以水拌焙乾為末蒸餅丸如梧子大或為末白湯點服立效治肺燥痰多煉蜜一斤北五味四兩右用五味入蜜內浸十日後臨臥挑一匙於口內徐徐咽下潤肺消痰玉液散治久近喘嗽口渴天花粉知母貝母各一兩人參甘草各五錢右為末每服二錢先熔下黃臘二錢同入米飲中調下治火嗽之劑丹溪云火嗽宜清金化痰丸清化丸與清金丸同用專治熱嗽及咽痛蓋苦能燥濕熱輕能治上取燈籠草葉為細末􅔻餅為丸每服五十丸清金丸一名與點丸去肺火降膈上熱痰與清化丸同用黃芩一味炒為末水丸服痰因火動逆上作嗽者先治火次治痰用知母止嗽清肺金滋陰降火火鬱嗽用訶子海石瓜蔞仁青黛半夏麴香附以開之喘嗽不拘老幼久近上壅善嗽等疾槐花為末滴水丸如梧子大白湯或薑湯吞梔子仁湯發熱咳嗽煩躁面赤咽痛梔子仁赤芍大青知母各一錢升麻黃芩石膏杏仁各二錢柴胡二錢半甘草二錢䜴百粒水煎服麥門冬湯火熱乘肺咳唾有血方見血門仲景加減小柴胡湯咳而寒熱往來潔古治夏月嗽發寒熱以此三兩入石膏七錢知母三錢柴胡半夏黃芩甘草乾薑五味子水煎服地骨皮散知母柴胡甘草人參地骨皮茯苓半夏薑三片水煎服王節齋治咳嗽活套杏仁去皮尖橘紅七分五味子桔梗炙甘草各五分春多上升之氣宜潤肺抑肝加川芎芍藥各一錢半夏門冬黃芩知母各五分若傷風致咳鼻流清涕宜辛涼解散加防風薄荷紫蘇黃芩夏多火熱炎上最重宜清金降火加桑白皮知母黃芩麥冬石膏秋多濕熱傷肺宜清熱瀉濕加蒼术桑白皮各一錢防風黃芩山梔子炒冬多風寒外感宜解表行痰加麻黃桂枝半夏生乾薑防風各一錢肺經素有熱再加酒炒黃芩知母各五分若發熱頭疼鼻塞聲重再加藁本川芎前胡柴胡各一錢若有痰加半夏枳殼風痰加南星濕痰脾困少食加白朮蒼朮口燥咽乾勿用半夏南星宜加知母蜜水炒貝母黃芩瓜蔞仁若痰積食積作咳嗽者用香附瓜蔞仁貝母海石青黛半夏麴軟石膏山查子枳實黃連薑汁炒為末蜜調噙化因咳而有痰者咳為重主治在肺因痰而致咳者痰為重主治在脾設是食積痰或痰氣上升以致咳嗽只治其痰消其積而咳自止不必用肺藥以治咳也熱嗽咽喉乾痛鼻出熱氣其痰嗽而難出色黃且濃或帶血縷或出血腥臭或堅如蜆肉不似風寒之嗽痰清而白宜金沸草散仍以辰砂化痰丸或薄荷煎八風丹含化熱嗽於金沸草散中加五味杏仁茯苓有熱嗽咽痛失聲服冷藥而聲愈啞者宜以生薑汁調消風散少少進之或止一味薑汁亦得冷熱嗽後失音者尤宜嗽而失聲者非獨熱嗽有之宜審其症用藥佐以橄欖丸含化仍濃煎獨味枇杷葉熱服有嗽而吐痰與食俱出者此蓋飲食致肝氣不利而肺又有客邪肝濁道肺清道清濁相干宜二陳湯加木香杏仁細辛枳殼有飲冷熱酒或飲冷水傷肺致嗽俗謂之湊肺宜紫苑飲癆嗽者所嗽之痰或淡或濃或時有血腥異常語聲不出補肺湯半帖加杏仁貝母欵花阿膠百合各五分煎去渣調鍾乳粉咽痛者更加桔梗五分熱甚者加秦艽五分嘔者去地黃加半夏如其數時行嗽發熱惡寒頭疼鼻塞氣急用參蘇飲加細辛治寒痰嗽劑東垣曰咳嗽脈弦微面白者寒也難經云肺金太過則外症面白善嚏悲愁不樂欲哭其內症喘咳上喝逆氣煩心胸滿煩熱夜則涕出多嚏鼻塞不通肺金大實以子助母也心脾肺皆受寒邪涎出口甘水反侮土寡于畏也腹中大寒病名曰寒中痰白有泡肺中氣虛而為大寒子助母也當於肺中瀉腎水非辛熱之藥不退也口甘涎沫者胃中寒而不和以辛甘熱去之飲酒者多有此反化半夏溫肺湯治心腹中脘痰水冷氣心下汪洋嘈雜常多唾口中清水自出脅肋急脹痛不欲食此胃氣虛冷所致其脈沈弦細遲旋覆花人參細辛桂心甘草陳皮桔梗芍藥半夏各五錢赤茯苓三錢右每服六錢薑三片水煎服丁香半夏丸心下停飲冷痰頭目眩運睡臥口中多涎檳榔三錢丁香半夏各一兩細辛乾薑人參各五錢右為末生薑汁為丸梧子大每服三十丸日三次薑湯下薑桂丸治寒痰咳嗽脈沈面色黧黑小便急痛足寒而逆心多恐怖天南星半夏各一兩官桂一兩去粗皮右為末蒸餅為丸如桐子大每服五七十丸食後生薑湯下治嗽加減法如心下痞悶加枳實五錢如身熱甚加黃連五錢如體重加茯苓白朮各一兩如氣上逆者加苦葶􅏣五錢如氣促加人參桔梗各五錢如氣浮腫加郁李仁杏仁各五錢如大便祕加大黃五錢治氣嗽之劑羅太無人參欵花散肺胃虛寒久嗽不已咽膈滿悶咳嗽痰涎嘔逆惡心腹脅脹滿腰背倦疼或虛勞冷嗽及逺年近日一切嗽病欵冬花人參五味子紫苑杏仁八錢木香檳榔紫蘇葉桑白皮各一兩半夏五錢右煉蜜為丸如芡實大每服一丸食後細嚼淡薑湯下治痰壅氣嗽羣藥不成功者大半夏五十枚橘紅十枚作一帖水二鍾煎至一鍾不可攪動恐麻人食後連進三帖立效其名半橘湯蘇子降氣湯氣逆咳嗽胸膈痞滿有人患氣嗽將期或教以橘紅生薑焙乾神麴等分末為丸如梧子大食後及夜米飲吞三五十丸舊患膀胱氣因服此並瘳局方四七湯治咳而痰涎在咽喉間不下東垣加減三竒湯咳逆上氣喘促胸膈不利桔梗陳皮甘草青皮人參紫蘇桑白皮各五錢半夏七錢杏仁三錢五味子四錢右每服六七錢入薑煎服經驗方治久嗽氣嗽生訶子一枚含之咽津頻咽之瘥瘥後不知食味煎檳榔湯服之便知滋陰之劑瓊玉膏虛勞喘嗽氣促發熱金匱腎氣丸治腎虛不能攝水津液不降致成痰飲咳逆潮熱盜汗方見虛損門補肺湯治勞嗽桑白皮熟地黃各二兩人參紫苑黃蓍五味子各一兩右每服四錢水煎入蜜少許服治老人虛嗽久不愈者人參一兩胡桃肉杏仁各五錢五味子五錢棗五枚右作一服水煎食後連三服即愈黃蓍劫勞散治心腎俱勞咳嗽時復兩三聲無痰夜則發熱熱過即冷時有盜汗四肢倦怠體劣黃瘦飲食減少唾中有血絲名曰肺痿白芍藥四兩黃蓍粉草人參半夏熟地茯苓北五味子歸身阿膠各兩半右每服八錢薑三片棗二枚水煎服一日三兩服紫苑湯飲食煎煿邪熱傷肺或呌呼走氣咳嗽咽癢痰多吐血喘急胸滿脅痛紫苑欵花百合杏仁貝母蒲黃經霜桑葉半夏犀角屑炙甘草人參各七分阿膠一錢半分二帖薑三片水煎服天門冬丸咯血吐血大能潤肺止嗽天門冬一兩杏仁茯苓阿膠各五錢右為末煉蜜丸如彈子大日夜噙化三五丸一方有茯苓潤脾膏治勞證久嗽肺燥肺痿時常服羊肺一具杏仁柿霜真酥真粉各一兩白蜜二兩右先將羊肺洗淨次將杏仁膏柿霜等白蜜水解薄打攪五味稀稠得所灌入肺中白水煮熟如常服之團參飲子七情抑鬱飢飽失節咳嗽膿血漸成肺痿勞瘵人參紫苑茸阿膠百合細辛欵花杏仁天冬半夏經霜桑葉五味子各一兩炙甘草五錢每服六錢薑五片水煎服地黃煎治肺損吐血嗽血生地黃四兩鹿角膠炒一兩右為末每服三錢童便一盞暖熱入薑汁少許調下無鹿角膠阿膠亦可古方紫苑散紫苑欵冬花各五錢百部二錢半右為末烏梅湯點服薑湯亦可如嗽加五味子喘加杏仁渴加烏梅氣逆加橘紅頭疼加細辛三錢甘草二錢氣脫者加御米殼蜜炒粗末水煎服臟腑咳劑小柴胡湯治肝臟發咳兩脅下痛甚則不可以轉轉則兩脅下滿方見前熱嗽條黃芩加半夏生薑湯治膽府發咳嘔苦水若膽汁黃芩生薑各三錢炙甘草芍藥各二錢大棗二枚半夏半合右㕮咀水煎服甘桔湯治心臟發咳咳而喉中如梗狀甚則咽腫喉痺方在前芍藥甘草湯小腸府發咳咳而失氣芍藥炙甘草各四錢水煎服升麻飲脾臟發咳咳而右脅下痛痛引肩背甚則不可以動升麻白芍甘草各二錢葛根三錢水煎服烏梅丸治胃府發咳咳而嘔嘔甚則長蟲出方在蟲門麻黃湯肺臟發咳咳而喘息有聲甚則唾血麻黃三錢桂枝二錢甘草一錢杏仁二十枚水煎服赤石脂禹餘糧湯大腸府發咳咳而遺溺赤石脂禹餘糧各二兩碎水煎服麻黃附子細辛湯腎臟發咳咳則腰背相引而痛甚則咳涎麻黃細辛各一錢附子一錢水煎服茯苓甘草湯膀胱府發咳咳而遺溺茯苓二錢桂枝二錢半生薑五大片炙甘草一錢水煎服異功散久咳不已三焦受之其狀咳而腹滿不欲飲食此皆聚於胃干於肺使人多涕唾而面浮腫氣逆人參茯苓白朮甘草陳皮各一錢入薑棗水煎服已上諸方皆傷寒例藥也特存之以備其旨以三因論之則自有一臟一腑之病機亦不止於寒已也食積痰嗽凡食積痰嗽非青黛瓜蔞仁不除人面青白黃色不常面上如蟹爪路一黃一白者是也瓜蔞丸食痰壅滯喘咳瓜蔞仁半夏山查神麴各等分為末以瓜蔞穰拌為丸竹瀝薑湯送下又方治食積痰嗽杏仁蘿蔔子各二兩為末粥丸服食積痰作嗽發熱者半夏南星瓜蔞仁蘿蔔子為佐青黛石鹼為使隨證加減丸服保合丸治食積痰嗽飽悶方見痰門食飽咳嗽千金方溫脾湯治食飽便咳甘草四兩大棗二十枚水五升煮取二升分三服若咽中痛而聲鳴者加乾薑一兩醋搶喉嗽甘膽丸治吃醋搶喉因成咳嗽不止諸藥無效用甘草二兩去皮作二寸段中半劈開以豬膽汁五枚浸三日取出火上炙乾為末煉蜜為丸每服四十丸茶清吞下臥服神效曽有患此諸藥無功服此良愈酒熱傷肺咳嗽丹溪云飲酒傷肺咳嗽以竹瀝煎入韭汁就吞瓜蔞仁杏仁黃連丸又方治酒嗽青黛瓜蔞仁薑汁蜜丸含化散熱毒也丹溪白龍丸治酒積有痰半夏滑石茯苓枯礬右為末神麴糊為丸酒病嗽白礬一兩另研杏仁一升水一升煎乾攤新瓦上露一宿砂鍋內炒乾每夜飯後細嚼杏仁十五枚妙痰嗽局方桔梗湯除痰下氣胸脅脹滿痰逆惡心飲食不進陳皮去白半夏薑製桔梗炒各十兩枳實去白麩炒三兩右末每服四錢水一鍾生薑五片煎服右用陳皮枳實氣充形實者宜之寒者加薑桂些小夫南星半夏乃燥濕之劑若嗽而痰澀者忌服形肥有汗或脈緩體重嗜臥之人有咳者脾濕勝也形瘦或夏月無汗或脈澀之人咳者肺燥勝也濕者宜蒼白术星半之屬燥之是也燥者宜杏仁瓜蔞仁之屬潤之是也寒熱痰咳而嘔吐面腫蚌粉新瓦上燒紅放地上出火毒每半兩加青黛五分入麻油數點以淡韲汁調服妙妙本事丸化痰涎治咳嗽枯礬二兩白殭蠶炒去系五錢為末研薄荷令爛為丸菉豆大每服三十丸薄荷湯下日三服青礞石丸消痰消痞經絡中有痰作痛皆治之青礞石煅黃芩各五錢半夏二兩風化硝二錢陳皮茯苓各七錢半白朮一兩薑汁打神麴糊為丸又方礞石丸治痰嗽礞石南星茯苓各五錢半夏七錢半風化硝二錢神麴糊為丸風化硝丸治痰嗽黃芩酒洗兩半滑石白芥子去殼各五錢貝母南星各一兩風化硝二錢半􅔻餅丸羅太無人參半夏丸化痰墜涎止嗽定喘或風痰茶痰食痰一切痰逆嘔吐厥頭痛或風氣偏正頭風頭目昏眩耳聾鼻塞咽乾胸膈不利方在喘門丹溪墜痰丸治食積痰飲咳嗽痞悶氣逆枳實枳殼各一兩半明礬三錢一半生一半枯風化硝三錢牙皂角二錢酒炒黑丑半斤取頭末右以蘿蔔子汁為丸每服五十丸雞鳴時服初有糞次下痰治久嗽痰積半夏二兩以江子五錢打碎同煮半夏透為度去江子不用杏仁一兩以烏梅五錢同煮去烏梅不用只將半夏杏仁炒乾為末煉蜜為丸菉豆大量虛實服痰泡方若或作白泡當於肺中瀉火滑石貝母南星半夏風化硝白芥子陳皮茯苓皂角蒼朮濕加瓜蔞仁燥加枳實結加青黛黃芩熱加肺脹仲景曰咳而上氣此為肺脹其人喘目如脫狀脈浮大者越婢加半夏湯主之麻黃六兩石膏半斤生薑三兩大棗十五枚甘草二兩半夏半斤以水六升先煮麻黃去沫內諸藥同煎至二升分溫三服肺脹咳而上氣煩躁而喘脈浮者心下有水小青龍加石膏麻黃芍藥桂枝細辛甘草乾薑各三兩五味子半夏各半升石膏水一斗先煮麻黃去沫內諸藥煮取三升壯人服一升弱者減之日三服仲景之治乃傷寒法也邪從皮毛而入皮毛者肺之合也故肺脹以散邪為重丹溪之治乃陰虛火動火逼肺金及濁痰瘀血凝結於內故治以收斂消瘀之劑丹溪云肺脹而咳者用訶子青黛杏仁訶子能治肺氣因火傷極遂成鬱遏脹滿不得眠一邊取其味酸苦有收斂除火之功佐以海石香附瓜蔞仁青黛半夏麴薑蜜丸噙香附須用童便浸三日氣鬱痰嗽睡不安宜清化丸貝母杏仁為末沙糖入薑汁􅔻餅為丸噙化肺脹而嗽或左或右不得眠此痰挾瘀血礙氣而病宜養血以流動乎氣降火疏肝以清痰四物加桃仁訶子青皮竹瀝之類一法灸之妙左不得眠者灸右足三陰交右不得眠者灸左足立安張光顯年四十二患肺脹咳嗽或左或右不得眠此痰挾瘀血礙氣而病降火疏肝以清其痰四物湯加桃仁訶子青皮竹瀝八帖而安乾咳嗽前治燥條杏仁青黛貝母瓜蔞等潤劑皆可用本事補肺法生地黃洗淨二斤杏仁二兩生薑蜜各四兩右搗如泥入瓦盆中置飯上蒸五七度每五更挑三匙咽下一中年婦人乾咳寸脈滑動似豆狀餘皆散大不浮左大於右每五更躁熱有汗但怒氣則甚與桔梗不開諸藥無效遂以石膏香附為君芩連青黛瓜蔞仁陳皮黃柏當歸桔梗為臣五味砂仁川芎紫苑佐之凡二十餘帖而安咳嗽喉中作聲咳嗽氣急喉聲如鼾者為虛一男子五十餘歲病傷寒咳嗽聲如齁與獨參湯一服而鼾聲稍止至二三帖嗽亦漸退凡服三斤始得全愈喉如水雞聲者為實仲景治咳而上氣喉中水雞聲射干麻黃湯主之射干三兩麻黃生薑各四兩細辛紫苑欵冬花各三兩大棗七枚五味子半夏各半升水一斗二升先煮麻黃兩沸去上沫納諸藥煮取三升分溫三服取此虛實二條為治規暴嗽失音千金治暴熱嗽方杏仁紫蘇子一斤陳皮一兩柴胡四兩水一斗煮三升分三服又方治暴嗽百部藤根搗自然汁和蜜等分沸煎成膏咽之貝母散暴發咳嗽多日不愈貝母桑皮炒五味子炙甘草各五錢知母二錢欵花二兩杏仁麩炒三兩每服一兩薑三片水煎服白蜆殼散治暴嗽白蜆殼洗淨研細粥飲下三拗湯治寒燠不常暴嗽喘急鼻塞痰壅方見前疏表條下一服散治暴嗽生薑十片阿膠二片炒成珠烏梅二枚甘草一錢紫蘇十片杏仁去皮尖七枚大半夏三枚泡嬰粟殼炙三個水煎臨睡服治久嗽失音真蘇子二兩杏仁三十枚訶子三枚百藥煎二兩為末熱酒調一錢治暴失音用豬脂油一斤入鍋先煉出渣入白蜜一斤再煉少頃濾過淨磁器內冷定成膏不時挑一茶匙噙化大能潤肺出聲治失音不語訶子四個半生半煨桔梗一兩五錢半生半炒甘草二寸一生一炙分二服水一鍾童便一鍾煎服治久寒痰結咽喉音不出桂心草烏各一字半夏五錢右為細末薑汁浸蒸餅為丸如芡實大每服一丸至夜噙化治謳歌失音訶子肉砂仁大黃各一兩川芎兩半百藥煎二兩右為細末雞子清丸如彈子大每服一丸臨臥噙化治失音不語百藥煎杏仁百合訶子肉苡仁等分勻為末以雞子清和丸如彈子大每臨臥噙化一丸治失聲皂角一挺去皮弦子蘿蔔三箇切片水一碗煎至半碗服之不過三服能使語聲出杏仁煎治嗽失音不出杏仁三兩生薑汁蜜糖各一兩木通桑皮貝母各一兩一分紫苑五味子各一兩一方加知母一兩欵冬花一兩水三升煎半升去查入杏仁蜜糖薑汁再熬成稀膏食後臨臥每服一匙含化一方有石菖蒲訶子飲治久嗽語聲不出訶子肉杏仁各一錢炒通草一錢半分二服每服水二鍾薑三片煎一鍾食逺溫服一方治暴嗽失聲語不出杏仁薑汁砂糖蜜五味紫苑各三兩通草貝母各四兩桑白皮五兩右九味㕮咀以水九升煮取三升去滓內杏仁脂薑汁蜜糖和攪微火煎取四升初服三合日再夜一後稍加又方通聲膏五味欵冬花通草各三兩人參細辛青竹皮桂心菖蒲各二兩杏仁薑汁各一升白蜜二升棗膏三升酥五升右十三味㕮咀以水五升微火煎二上三下去查內薑汁棗膏酥蜜煎令調和酒服棗大二丸久嗽羅太無柴胡飲治虛勞羸瘦面黃無力減食盜汗咳嗽不止柴胡知母鱉甲酥炙各一兩五味子五錢地骨皮兩半右為末每服三錢烏梅二枚青蒿五葉水煎服本事鱉甲丸治勞嗽虛證及鼻流清涕耳作蟬鳴眼見黑花一切虛證丈夫婦人皆可服五味子二兩鱉甲地骨皮各三兩右為末煉蜜丸如梧子大空心食前溫酒或鹽湯任意服三五十丸婦人醋湯下此方乃曲江人家祕方服效者衆且處方有理丹溪蛤蚧丸肺臟內傷咳嗽氣急久不除漸羸瘦蛤蚧一兩炙去頭足訶子肉煨細辛炙甘草熟地阿膠蛤粉炒成珠麥門冬各五錢為末蜜丸每一兩分十五丸每含化一丸貝母湯諸嗽久不瘥貝母一兩去心薑製黃芩桑皮各五錢乾生薑五味子陳皮半夏柴胡桂心各一兩木香甘草各二錢半右每服六錢加杏仁七枚授之一服瘥以治諸般嗽通用悉效者緣方內有寒有熱有收有散也潔古枳殼湯日久痰嗽胸膈不利上焦多熱枳殼炒三兩桔梗二兩黃芩一兩半每早取二兩半水三盞煎一盞半日三服三日服盡再服後半夏湯生半夏湯半夏三錢半水盞半薑五片煎至一盞食後服一日三服服三日了再服枳殼丸盡其痰為度論曰先消胸中痰氣後去膈上痰再與枳术丸謂首尾合治盡消其氣令痰不復作也丹溪久嗽丸子海蛤粉膽星臣杏仁臣訶子佐青黛佐皂角莢使右為末薑汁丸如梧子大薑湯下久嗽乃積痰久留肺脘粘滯如膠氣不升降或挾濕與酒而作香附童便浸殭蠶炒海蛤粉瓜蔞仁蜂房杏仁薑汁竹瀝神麴各等分蜜調噙化夏月無汗久成咳嗽方在汗門衍義治久咳膿血胸膈咽痛蛤蚧阿膠生犀角鹿角膠􅀈羊角各一兩除膠外皆為末入膠河水三升煮半升臨睡細呷愈療三十年嗽以百部根二十斤搗絞取汁煎之如飴服二匙一日三服驗外臺和飴一斤熬成煎以溫粥飲調下深師方以白蜜二升更煎五六沸服三合百一方治久咳嗽上氣十年諸藥治不瘥以蝙蝠除翅足炙令存性為末飲服之紫苑散久嗽多年不愈紫苑二兩欵花二兩為末米飲調服一錢日三次三物湯大人小兒久嗽神效桑皮蜜炙百部根馬兜鈴等分水煎服清金湯逺年近日咳嗽上氣喘急喉中涎聲胸滿氣逆坐臥不安嬰粟殼蜜炙人參粉草各五錢陳皮茯苓杏仁阿膠五味桑皮苡仁紫蘇百合貝母半夏麴欵花每服六錢薑三片棗二枚烏梅半個水煎服收斂之劑肺欲收急食酸以收之羅太無九仙散治一切咳嗽桑皮人參桔梗阿膠五味子烏梅欵花各一兩貝母五錢嬰粟殼蜜炒八兩右為末每服三錢白湯調服嗽止住後服欵花清肺散治咳嗽喘促胸膈不利不得安臥人參炙甘草枯礬烏梅連核搗碎欵花各一兩粟殼醋炒四兩甜葶藶生用一錢右為末每服二錢溫米飲湯調服食後忌油膩節言語人參清肺湯治男婦肺胃虛寒咳嗽氣急胸膈咽塞腹脅脹滿迫塞短氣喜欲飲冷咽嗌隱痛及療肺痿勞吐血腥臭乾嘔煩熱聲音不出肌肉消瘦倦怠減食烏梅地骨皮人參炙甘草阿膠炒杏仁去皮尖桑皮知母粟殼去鬚蒂各一兩右每服四錢烏梅一枚水煎服人參欵花散咳嗽久不愈者人參欵花各五錢知母貝母半夏各三錢粟殼炒一兩右每服六錢烏梅同煎服人參養肺湯肺痿咳嗽清痰午後熱並聲颯者人參炙甘草阿膠珠各一錢茯苓一錢半貝母柴胡四錢杏仁五味桔梗各一錢半桑皮二錢枳實一錢半右每服八錢生薑三片棗一枚食後溫服減柴胡茯苓五味貝母桔梗枳實加地骨皮知母烏梅嬰粟殼即上人參清肺湯已上乃御米殼烏梅例收後藥也丹溪謂黃昏嗽者火浮於肺以酸味斂而降之用訶子五味五棓子白礬等是也雜方血竭散治勞嗽見血諸治不效蛤蚧一對蜜炙訶子三錢血竭一錢三味共為末以薑汁與蜜等分熬膏入前末調三五分服效治咳嗽感冒方及痰嗽熱嗽雪梨一個開一竅入明礬一錢用紙封固灰火中煨令礬化梨熟為度食之立愈甚者不過二枚又方治痰嗽細芽茶三四兩濃煎濾去渣好蜜六兩水內頓滚抹去沫入濃茶內同煮二三沸露一宿空心溫服一碗二三次全愈阿膠散一切咳嗽虛人老人皆可服阿膠馬兜鈴各一兩五靈脂桑皮各一錢炙甘草二錢半右為末每服一錢水一鍾煎六分食後夜臥通口服當歸散治男婦因打撲負重辛苦勞力傷損肺臟既損遇風寒則為咳嗽或咯紫血宜此藥去心肺之瘀血仍灸肺俞穴蘇木生地黃當歸大黃芍藥等分為末每服四錢或水酒煎服亦可活血飲自裁得效方治怒氣積血在胸脅咳嗽年久不愈每咳則隱隱而痛滑石一錢五分桃仁一錢紅花五分桔梗五分粉草四分瓜蔞二錢丹皮八分茜根八分貝母八分柴胡五分香附麴五分水煎服體厚者加大黃穿山甲或作末以韭菜汁拌為丸服本事治十六般哮嗽阿膠炒一兩馬兜鈴炙甘草半夏薑汁浸三日人參五錢杏仁去皮尖各一兩右為末每服一大錢水一盞煎至七分臨臥食後服隨病看湯使為引心嗽面赤或汗流加乾葛煎肝嗽眼淚出加烏梅一枚大米十四粒煎脾嗽不思飲食或惡心一兩時入薑二片煎胃嗽吐逆酸水入蛤粉煎膽嗽令人不睡加茯神五分茶清調下膈咳嗽出痰如員塊生薑汁調藥咽下勞嗽入秦艽末煎血嗽連頓不住當歸末棗子同煎暴嗽涕唾稠粘入烏梅生薑同煎産嗽背胛痛甘草三寸黃蠟少許同煎氣嗽肚痛脹滿入青皮去白同煎熱嗽夜甚蜜一匙蔥白同煎哮嗽喉如拽鋸入半夏三枚同煎腎嗽入黃蓍白飴糖同煎上件十六般嗽依法煎服無不效驗此方京都一家專治此疾因中官厚賂始得其方屢試有效本事劫痰方治癆嗽及哮喘痰湧青黛三錢辰砂雄黃明礬信石生用各一錢右俱為極細末淡豆豉一百粒湯浸去殼研如膏入藥丸如梧子大臨臥冷茶吞一丸瓊珠散治咳嗽不問逺近其效如神桑白皮四兩五味子二兩甘草二兩炙陳皮二兩粟殼一斤去蒂膜用醋浸三宿晒乾再入醋浸晒乾右為末用冷蜜湯調服忌煎􅏼油膩酒鹹酸等物潤肺湯治上盛下虛脾肺濕熱逺年近日氣喘咳嗽痰盛心胸氣悶不思飲食或寒熱往來或感冒風寒喘嗽氣急五癆七傷吐血等症並皆治之知母二錢紫苑五錢半洗淨山梔仁五分甘草一錢半炒麻黃五分滚湯泡去白沫晒乾荆芥五分去梗馬兜鈴五分去筋膜前胡二錢去蘆赤芍一錢桑白皮二錢半去紅皮用蜜炒半夏三錢湯泡七次晒赤茯苓二錢去皮杏仁五錢半去皮尖研成泥用黃芩二錢半去腐土如婦人加當歸川芎生地黃牡丹皮各一錢此藥製度每服一兩四錢半用水二大鍾生薑五片初感風寒加蔥白三根久患咳嗽加棗二枚不用蔥白煎至一鍾半去滓臨睡候將身右臥用絹帛頂住右軟肚次用竹筒緩緩吸藥熱服不言語呼喚切忌房勞妊娠咳嗽馬兜鈴散治胎氣壅塞咳嗽喘息馬兜鈴桔梗人參甘草貝母各五錢橘紅紫蘇大腹皮桑皮各一兩五味五錢每服六錢薑四片水煎服麻黃散妊娠外傷風冷痰逆咳嗽不食麻黃去節橘紅前胡各一兩半夏人參白朮枳殼貝母甘草各五錢每服六錢薑四片蔥白五根棗二枚水煎服竹茹紫苑湯咳嗽不止胎不安紫苑天冬各一兩桔梗五錢甘草杏仁桑皮各二錢半每服五錢竹茹一塊水煎去渣入蜜半匙再煎二沸溫服天門冬湯氣逆咳嗽天冬去心一兩貝母人參甘草桑皮桔梗紫蘇各五錢赤茯苓二兩麻黃去節七錢半每服六錢薑四片水煎服喘門岐伯曰不得臥而息有音者是陽道之逆也足三陽者下行今逆上行故息有音也陽明者胃脈也胃者六府之海其氣亦下行陽明逆不得從其道故不得臥也下經曰胃不和則臥不安逆調論又曰夫不得臥臥則喘者是水氣之客也夫水者循津液而流也腎者水臟主津液主臥與喘也東垣曰肺脹膨膨而喘咳胸膈滿壅盛而上奔者於隨證用藥方中多加五味子人參次之麥門冬又次之黃連少許如甚則交兩手而瞀者真氣大虛也若氣短加黃蓍五味子人參氣盛去五味子人參加黃芩荆芥穗冬月去荆芥穗加草豆蔲仁丹溪曰哮喘未發以扶正為要已發以攻邪為主陰虛自少腹下火起衝於上而喘者宜降心火補陰有陰虛挾痰喘者四物湯加枳殼半夏補陰降火上氣喘而躁者為肺脹欲作風水症宜發汗則愈諸喘不止者用川椒目研極細一二錢生薑湯調下劫之氣虛不用又法用蘿蔔子蒸為君皂角燒灰等分為末薑汁加煉蜜為丸小豆大每噙化五七十丸劫止之後因痰治痰因火治火氣虛者用人參蜜炙黃柏麥冬地骨皮之類氣實人因服參蓍過多而喘者用三拗湯喘甚者須用阿膠若久病氣虛而發喘者宜阿膠人參五味補之新病氣實而喘者宜桑白皮苦葶􅏣瀉之凡喘正發時無痰將愈時却吐痰者乃痰於正發之時閉塞不通故喘甚當於其時開其痰路則喘易安也宜桔梗湯及枳殼瓜蔞實杏仁蘇葉前胡等引出其痰候痰出喘退却調其虛實虛者補以參蓍歸术實者瀉以沈香滚痰丸之類是也肺虛則少氣而喘經曰秋脈者肺也秋脈不及則喘呼吸少氣而咳上氣見血下聞病音治則人參五味門冬之屬是也肺痺肺積則久喘而不已經云淫氣喘息痺聚在肺又云肺痺者煩滿喘而嘔是肺痺而喘治法或表之或吐之使氣宣通而愈也難經云肺之積名息賁在右脅下如杯久不已令人喘咳發肺􅏴治法則息賁丸是也胃喘則身熱而煩經云胃為氣逆又云犯賊風虛邪者陽受之陽受之則入六腑入六腑則身熱不得臥上為喘呼又云陽明厥則喘而啘啘則惡人或喘而死者或喘而生者何也厥逆連臟則死連經則生是也啓玄子注曰啘謂熱內鬱而煩凡此胃喘治法加減白虎湯之類是也腎喘則嘔咳經云少陰所謂嘔咳上氣喘者陰氣在下陽氣在上諸陽氣浮無所依從故咳上氣喘也東垣治以㵼白散是也凡喘不得臥其脈浮按之虛而澀者為陰虛去死不逺慎勿下之下之必死宜四物加童便竹瀝青黛門冬五味枳殼蘇葉服之東垣曰病機云諸痿喘嘔皆屬於上辨云傷寒家論喘嘔以為火熱者是明有餘之邪中於外寒變而為熱心火太旺攻肺故屬於上又云膏粱之人奉養太過及過愛小兒亦能積熱於上而為喘咳宜以甘寒之劑治之脈經又云肺盛有餘則喘嗽上氣喘渴煩心胸滿短氣皆衝脈之火行於胸中而作係在下焦非屬上也蓋雜病不足之邪起於有餘病機之邪自是標本病傳飲食勞役喜怒不節水穀之寒熱感則害人六府皆由中氣不足其䐜脹腹滿咳喘嘔食皆以大甘辛熱之劑治之立已今立熱喘寒喘二方熱用人參平肺散寒用參蘇溫肺湯三因論曰寸口陰脈實者肺實也肺必脹上氣喘逆咽中塞如嘔狀自汗皆肺實之證右寸陰脈虛者肺虛也必咽乾無津少氣不足以息喘有寒有熱有水病寒喘遇寒則發熱喘發於夏而不發於冬水病者小便澀胸膈滿悶腳微腫是也熱喘宜蛤蚧丸寒喘宜煮肺散水病宜當中分冷熱虛而冷者紫金丹實而熱者防已丸戴元禮曰有痰喘有氣急喘有胃虛喘有火炎上喘痰喘者一喘便有痰聲氣急喘者呼吸急促而無痰聲有胃氣虛喘者擡肩擷項喘而不休火炎上喘者乍進乍退得食則減食已則喘大槩胃中有實火膈上有稠痰得食入咽墜下稠痰喘則止稍久食已入胃反助其火痰再升上喘反大作俗不知此作胃虛治以燥熱之藥者以火濟火也葉都督患此諸醫作胃虛治之不愈後以導水丸利五六次而安又心法附録曰凡此證脈滑而手足溫者生脈澀而四肢寒者死傷寒必上氣急不得臥喉中有聲或聲不出以三拗湯華蓋散九寶湯神祕湯皆可選用氣不調而痰鬱喘逆四磨湯或蘇子降氣湯若虛喘脈微色青黑四肢厥小便多以活人書五味子湯或四磨湯腹滿脈沉實者為裏實羅太無治一婦年踰五十身體肥盛因飲酒及潼乳過多腹脹喘滿聲聞舍外不得安臥大小便澀滯氣口脈大兩倍於人迎關脈沈緩而有力時值八月霖雨不止豫思霖雨之濕飲食之熱濕熱大盛上攻於肺神氣躁亂故為喘滿邪氣盛則實實者下之故製平氣散以下之白牽牛二兩一半生一半炒只取頭末一兩青皮去白檳榔各三錢橘紅五錢大黃七錢內經曰肺苦氣上逆急食苦以泄之故以白牽牛苦寒瀉氣分濕熱上攻喘滿以為君陳皮青皮苦辛溫平散肺中滯氣為臣檳榔辛溫性沈重下痰降氣大黃苦寒蕩滌滿實故以為使右為末每服三錢煎生薑湯一大盞調下無時一服減半再服喘愈只有胸膈不利煩熱口乾時時咳嗽再與加減瀉白散桑白皮一兩地骨皮知母橘紅青皮去白桔梗去蘆各五錢黃芩炙甘草各三錢每服五錢水二大盞煎至一盞去渣溫服食後數服良愈華他云盛則為喘減則為枯活人云發喘者氣有餘也凡看文字惟要會得本意盛而為喘者非肺氣盛也言肺中之火盛也喘為氣有餘者亦非肺氣有餘也言肺中之火有餘也故瀉肺以苦寒之劑非瀉肺也瀉肺中之火實補肺也不可不知陰虛者補之丹溪治一人家豐好食厚味每年到四月九月內必發氣喘擡肩吐痰脈沈澀而細數諸醫用平肺之藥數年不愈用人參生地黃膏和當歸牛膝肉蓯蓉枸杞子五味子知母黃柏天門冬玄參末為丸如梧子大每服百丸空心服以救肺虛又用阿魏黃連山查沈香牛黃辰砂膽星陳皮神麴糊為丸梧子大臨臥薑湯下三四十丸以治厚味服訖復用瓊玉膏一劑繼服之而安東垣調中益氣湯加減法如秋冬月胃脈四道為衝脈所逆並脅下少陽脈二道而反上行病名曰厥逆其證氣上衝咽不得息而喘息有音不得臥加吳茱萸五分或一錢觀厥氣多少而用之如夏月有此證為大熱也蓋此證隨四時為寒熱溫涼宜以酒黃連黃柏知母各等分為細末熱湯丸如桐子大每服二百丸白湯送下空心服仍多飲熱湯服畢少時便以美食壓之使不得胃中停留直至下元以瀉衝脈之邪也大抵治飲食勞倦所得之病乃虛勞七損症也當用溫平甘多辛少之藥是治其本也如時見寒熱四時證也又將理不如法或酒食過多或食辛熱寒冷之物作病或居大寒大熱之處益其病或暫用大寒大熱之藥而取效此從權也不可以得效之故而久用之必致夭橫矣平居則氣和行動則氣促而喘者亦衝脈之火豫族兄六旬有餘素有喘症或唾吐血痰平居時則不喘稍行動則氣促喘急以黃柏知母滋腎丸空心酒服七八十丸其症大減此黃柏知母能泄衝脈之火者如此效也簡易方治肺氣喘嗽馬兜鈴二兩去殼取子秋石半兩入碗內和勻慢火炒乾甘草一兩炙二味為末每一錢水一盞煎六分溫呷之以藥末含咽津亦得肺氣虛者宜補之本事方治咳喘氣急以參一味為末雞子清投新水調下一錢昔有二人同走一含人參一不含俱走三五里許其不含者大喘含者氣息自如乃人參之力也仲景治火逆上氣咽喉不利以麥門冬湯主之止其逆而下其氣也麥冬七升半夏一升人參四兩甘草二兩粳米三合大棗十二枚右六味以水一斗二升煮取六升溫服一升日三夜一許學士治一婦年五十餘素有痰嗽忽一日大喘痰出如泉身汗如油脈浮而洪似命絶之狀豫適在彼速用麥門冬四錢人參二錢五味子一錢五分煎服一帖喘定汗止三帖後痰亦漸少再與前方內加瓜蔞仁一錢五分白朮當歸芍藥黃芩各一錢服二十餘帖而安此實麥冬五味人參之功也如自汗兼腹滿脈沈實而喘者裏實宜下之活人五味子湯治喘促脈伏而數者五味子二錢人參麥冬杏仁橘紅各二錢半薑三片紅棗三枚水煎服喘凡遇冬而發此寒包熱也解表則熱自除枳殼三錢炒麻黃防風黃芩桔梗二錢陳皮木通一錢半通利九竅治肺壅甚當紫蘇五葉右分四帖水煎服之又方治寒包熱而喘必用發散半夏枳殼炒桔梗黃芩炒紫蘇麻黃杏仁甘草如天寒加桂枝東垣麻黃定喘湯小兒寒鬱喘喉中鳴腹內響堅滿鼻流清涕脈沈急而數麻黃草蔲益智仁各兩分半甘草歸身紅花黃芩生柴胡各一分升麻神麴各五分吳茱萸三分蘇木半分全蝎右分二服水煎微微汗愈麻黃蒼朮湯治秋暮冬月每夜連聲嗽不絶口喘至天明日髙方緩口苦兩脅下痛臥而多驚筋攣肢節痛痰吐涎沫日晚呵欠不能飲食柴胡羌活蒼朮各五分麻黃一分防風甘草稍生歸尾黃芩各四分炙甘草三分五味子九分草豆蔲六分黃蓍一錢半右分二帖水煎稍熱服此二方發中外之寒七情氣鬱宜四磨湯以解之庶下其氣而止其喘急也人參檳榔沈香天台烏藥右四味各濃磨水取七分煎一二沸放溫服加木香枳殼為六磨湯有苦寒者加丁香亦可衍義云烏藥檳榔氣稍走泄但不甚剛猛與沈香同磨作湯治胸中氣膈甚當丹溪治一婦人發熱氣喘與解表藥汗出而定因夜半食粥早喘再作心痞口乾半夏枳實炒各三錢黃連白朮各二錢木通陳皮各一錢半麻黃紫蘇各一錢炙甘草加薑水煎服分氣紫蘇飲治脾胃不和灑淅惡寒氣逆喘促五味子桑白皮茯苓炙甘草草果大腹皮陳皮桔梗各等分紫蘇減半薑三片水煎服東垣人參平肺散治心火刑肺傳為肺痿咳嗽喘嘔痰涎壅盛胸膈痞悶咽嗌不利桑皮一錢知母七分炙甘草地骨皮人參各五分茯苓天冬各四分青皮陳皮各三分五味子三十粒如熱甚加黃芩紫蘇葉半夏各五分參蘇溫肺湯治形寒飲冷則傷肺喘煩心胸滿短氣不能宣暢人參肉桂甘草木香五味子陳皮半夏白朮桑皮紫蘇莖葉各二兩茯苓一兩每五七錢薑三片水煎服如冬寒月每服加不去節麻黃半分加味華蓋散肺受風寒胸滿聲重蘇子陳皮赤茯苓桑皮麻黃杏仁各二錢甘草一錢薑三片棗二枚水煎服九寶湯咳而身熱喘急惡寒麻黃薄荷陳皮肉桂紫蘇杏仁甘草桑皮大腹皮各等分加薑蔥水煎服發時有痰吐出者宜化痰婦人大全千緡湯半夏七枚破四片製之皂角去皮絃炙甘草各一寸生薑如指大右用水一碗煮去半頓服一方不用甘草但用半夏末一兩皂角去皮絃半兩生薑七片同入紗袋中水三升煎至一盞五分以手揉洗取清汁分作三服連進之效咳逆上氣時時濁唾但坐而不得臥者皂莢丸主之方在咳嗽門水氣凌肺者宜徹之東垣神祕湯治病人不得眠眠則喘急水氣逆行上乘於肺肺得水而浮使氣不流通其脈沈大蘇葉陳皮生薑桑皮人參各五錢茯苓木香各二錢右分二帖水煎服防已葶􅏣丸治肺氣喘嗽面目浮腫小便赤澀喘促不得臥漢防已木通貝母各一兩苦葶􅏣炒杏仁右為末棗肉膏為丸梧子大桑白皮湯下喘咳倚息不得臥仲景小青龍湯加石膏主之方在痰飲門汚血凝滯胸膈者宜活之丹溪治卒上氣喘鳴息急欲死者韭汁飲一升瘥蓋韭汁能去胸中惡血滯氣又方治上氣咳嗽胸膈妨悶氣喘桃仁二兩去皮尖以水一升研取汁和粳米二合煮粥食之東垣加味瀉白散治陰氣在下陽氣在上咳嘔喘促桑皮一兩青皮二兩茯苓三錢甘草地骨皮七錢陳皮五味人參各五錢每五七錢入粳米百粒水煎服清金湯治男婦不拘逺近肺氣咳嗽上氣喘急喉中涎聲胸滿氣逆坐臥不安飲食不下方在咳嗽門丹溪清金丹治食積痰喘哮嗽因厚味而發者見哮門調氣化痰丸快脾順氣化痰消食治久喘或作或止者半夏南星白礬皂角生薑右各一斤水煮南星無白點為度揀去皂角不用將生薑切作片同半夏南星晒乾再加青皮去白橘紅蘇子炒蘿蔔子炒另研乾葛杏仁去皮尖另研神麴炒麥蘖炒山查香附子右各半斤淨與前藥合和一處為細末生薑汁浸􅔻餅打糊為丸桐子大每服五七十丸食後茶湯送下飲水多者宜滲利之仲景云病人飲水多必暴喘滿以五苓散主之白术散治夏月飲冷酒生痰膈滿而喘白朮茯苓黃苓半夏各等分每服六七錢薑三片水煎調陳皮神麴末各一錢食後服開提之劑簡易方治喘急桔梗一兩半為末童便半升煎取四合去渣溫服開闔之劑安肺散治痰嗽不問新舊喘急氣逆麻黃去節二兩炙甘草二兩御米殼去蒂炒黃四兩右為末每五錢水一盞入烏梅一枚煎七分溫服人參理肺散治喘嗽不止麻黃去節炒黃川歸木香各一兩御米殼炒三兩人參杏仁麩炒各二兩每服六錢水煎服雜方保命集半夏丸傷風痰作喘逆兀兀欲吐惡心欲倒半夏一兩檳榔雄黃各三錢右為末薑汁浸􅔻餅糊為丸梧子大每服五十丸薑湯下羅太無人參半夏丸化痰墜涎止嗽定喘或風痰茶痰食痰一切痰逆嘔吐厥頭痛或風氣偏正頭風疼或壅頭目昏眩耳聾鼻塞咽乾胸膈不利人參茯苓南星薄荷各五錢半夏乾薑白礬寒水石各一兩蛤粉二兩藿香二錢半右為末水糊為丸梧子大每服三五十丸薑湯下日三服此方治久喘極效於未發時服之若已發時用沈香滾痰丸微下之纍效孫兆視雷道矩病吐痰頃間已及一升喘咳不已面氣鬱黯精神不快兆乃與仲景葶􅏣大棗瀉肺湯一服訖已覺胸中快利略無痰唾矣加味白虎湯治熱痰喘嗽火迫肺金白虎湯加瓜蔞仁枳殼黃苓神效雙玉散治火痰喘嗽痰湧如泉寒水石石膏等分為末人參湯下三錢羅太無真應散逺年喘急不能臥百藥不效者白石英四兩通明者以絹袋盛以雄豬肚一箇包之縫口煮熟取出再換豬肚一箇如前法煮三次取出藥晒乾研極細末入後用官局欵冬花散二錢入前末二錢再加桑白皮二寸生薑三片棗子一枚水一盞半煎七分通口服其豬肚亦可食只不得用醬椒醋鹽薑等調和官局欵冬散欵冬花一錢貝母知母桑葉杏仁半夏阿膠甘草各二錢麻黃去節四錢為末陳皮湯治痰喘橘紅半斤明礬二兩半共炒香炙甘草二兩半夏二兩薑汁浸礬水煮右為末每服二錢米湯下杏蘇飲治上氣喘嗽浮腫杏仁一錢半蘇葉二錢五味子大腹皮烏梅肉紫苑炙甘草各一錢橘紅麻黃去節桑皮阿膠桔梗各七分半薑三片水煎服玉華散咳嗽上喘清肺利膈甜葶􅏣桑皮半夏貝母天冬馬兜鈴杏仁紫苑百合人參百部甘草各七分定喘膏詩括一兩麻油二兩蜜半兩生薑自然汁紫苑麻黃及杏仁桔梗細辛斟酌入更加半夏與人參慢火熬來成黑漆臨睡之時三兩匙覺來定喘無蹤迹定喘治上氣喘滿倚息不能臥杏仁桃仁俱麩炒去皮尖桑皮各一兩人參五錢薑棗水煎服二竒方治水氣發喘方在水腫門杏仁煎治喘嗽杏仁去皮尖胡桃肉去皮等分研為膏入煉蜜少許丸如彈子大每嚼一二丸薑湯下又方治氣虛喘嗽極效人參三錢胡桃肉五枚薑五片水煎服又方用胡桃肉三枚生薑三片臨臥嚼下畢飲湯三兩呷再嚼桃薑如前即就枕勿行動效甚又方肺熱胸滿痰嗽瓜蔞仁研半夏二味和勻生薑自然汁打麵糊為丸如梧子大每服五十丸薑湯下又方治諸喘麻黃七分杏仁一錢甘草四分細茶炒八分石膏煅一錢半水煎服定喘竒方治稠痰壅盛體肥實而喘者廣橘紅二兩明礬五錢礬同炒香去不用半夏一兩半杏仁麩炒一兩瓜蔞仁去油一兩皂角去皮絃子燒存性三錢炙甘草七錢黃芩酒拌晒乾五錢右為末􅔻餅用淡薑湯打糊為丸菉豆大每食後白湯下一錢日二次服三五日大便下稠痰而愈虛弱人每服七分治熱嗽喘咳不已苦葶藶二兩炒另研知母蜜炒貝母各一兩杏仁三兩去皮尖研為泥右為末煉蜜丸梧子大食後臨臥桑白皮湯下五七十丸治喘哮貝母一兩香附二兩半生半炒為末食後茶調下二錢忌鹽油煎煿不拘水哮醎哮並效劫喘方牛黃散治熱痰暴喘欲死者白牽牛炒二兩大黃煨一兩蜜水下二錢又方蘿蔔子蒸皂角燒存性薑汁和蜜丸梧子大每服五十丸白湯下治喘用古文錢七個鹽梅七個水一盞同浸二宿每服一呷空心良久吐出惡痰而效子和稀涎散治痰喘氣逆下氣化痰甚速氣短氣促少氣短氣而息促似喘非喘也少氣者氣少不足以言也素問云三陽絶三陰微是為少氣方盛衰論怯然少氣者是水道不行形氣消索也示從容篇言而微終日乃復言者此奪氣也綱目云治此少氣蓋生脈散獨參湯之屬為愈也一陽發病少氣善咳善泄運氣言少氣有二一曰火熱經云火鬱之發民病少氣又云少陰之復少氣骨痿又云少陽之復少氣脈痿治以諸寒是也二曰風濕經云太陽司天之政四之氣風濕交爭風化為雨民病大熱少氣是也喘與短氣辨成無已曰短氣者氣急而不能相續者是也似喘而非喘若有喘上衝而實非氣上衝也夫喘者張口擡肩捶身滾肚謂之喘也氣上衝者腹裏時時氣上衝也所謂短氣者呼吸雖數而不能相續似喘而不搖肩似呻吟而無痛者此短氣也經所言短氣者衆實為難辨愚師莫識誤者多矣要識短氣之真者氣急而短促謂之氣短者是也脈經曰寸口脈沈胸中短氣生生子曰短氣少氣治法亦有異也短氣仍有虛有實治法有補有瀉少氣則純不足也治惟有補而已仲景曰陽脈微而緊緊則為寒微則為虛微緊相搏則為短氣又曰胸痺氣中氣寒短氣茯苓杏仁甘草湯主之橘枳薑湯亦主之方見胸痺痛門胸痺喘息咳唾胸背痛短氣括蔞薤白半夏湯主之方見胸痺痛門夫短氣有微飲當從小便去之芩桂术甘湯腎氣丸亦主之腎氣丸方見腳氣中欵花補肺湯治咳嗽短氣又曰短氣皆屬飲苓桂朮甘湯是其一法也金匱云咳逆倚息短氣不得臥其形如腫謂之支飲又曰支飲亦喘而不得臥加短氣其脈平也又云膈上有留飲其人氣短而渴四肢歷節痛脈沈者有留飲又云肺飲不弦但苦喘短氣其治法危急者小青龍湯脹滿者厚朴大黃湯冒眩者苓桂术甘湯及澤瀉湯不得息葶􅏣大棗湯吐下不愈者木防已湯之類是也東垣曰胸滿少氣短氣者肺主諸氣五臟之氣皆不足而陽道不行也氣短小便利者四君子湯中去茯苓加黃蓍以補之如腹中氣不轉者加甘草一半肺氣短促或不足者加人參白芍藥中焦用白芍藥則脾中陽升使肝膽之邪不得犯之如衣薄而短氣則添衣於無風處居止氣仍尚短則以熱湯一碗薰其口鼻則不短也如衣厚於不通風處居止而氣短則宜減衣摩揩汗孔令合於漫風處居止如久居髙屋天寒陰濕所遏令氣短者亦如前法薰之如居周密小屋或大熱而處寒涼氣短則就風日凡氣短皆宜食滋味湯飲令胃氣調和仲景曰平人無寒熱短氣不足以息者實也丹溪治許白雲先生脾疼跨痛短氣用大吐大下法是也孫尚正元散治氣不接續兼治滑泄及小便數王丞相服之有效莪术一兩金鈴子去核二錢半右件為末入硼砂一錢煉過研末和勻每服二錢鹽湯或溫酒空心調服苓桂朮甘湯治痰飲短氣方在痰飲門産後喘産後喘乃急症極危多死郭氏謂此名孤陽絶陰為難治因所下過多榮血暴竭衛氣無主獨聚肺中故令喘促喉中氣急也治此症用獨參湯為妙陳無擇云宜大料芎歸湯若惡露不快散血停凝上薰於肺亦令喘急但服奪命丹血去喘自定血沒散産後敗血沖心胸滿上喘命在須臾真血竭沒藥等分為末每服二錢用童便好酒煎一大沸溫調下方産時進一服上床良久再服其惡血自循經下行更不上沖免生百病參蘇飲産後血入于肺面赤發喘欲死者人參一兩為末蘇木二兩右以水二碗將蘇木煎至一碗去渣調人參末隨時加減服神效若因憂怒性氣抑鬱而發喘者以小調經散用桑皮杏仁煎湯調服旋覆花湯産後傷風寒咳喘嗽痰涎壅盛坐臥不寧旋覆花赤芍藥荆芥穗半夏麴五味子麻黃茯苓杏仁甘草前胡各等分薑五片棗二枚水煎服一婦孕時足腫七月初旬産後二日洗浴即氣喘但坐不得臥者五個月惡風得暖稍寬兩關脈動尺寸皆虛百藥不效牡丹皮桃仁桂枝茯苓乾薑枳實厚朴桑皮紫蘇五味瓜蔞仁煎湯服之即寬二三服得臥其痰如失蓋作汚血感寒治之也若傷醎冷飲食而喘者宜見睍丸薑黃三稜蓽澄茄陳皮良薑人參莪术右等分為末蘿蔔水煮爛研細將汁煮麵糊為丸梧子大蘿蔔子湯下小調經散産後四肢浮腫者敗血循經流入四肢淫留日久腐爛如水故令四肢腫面色黃宜服此血行腫消則愈沒藥琥珀桂心芍藥當歸各一錢細辛麝香各五分右為末每服五分薑汁酒調服之哮丹溪曰哮喘必用薄滋味專主於痰宜大吐不用涼藥須常帶表散此寒包熱也亦有虛而不可吐者哮喘遇冷則發者有二其一屬中外皆寒者治法乃東垣參蘇溫肺湯調中益氣加吳茱萸湯及紫金丹劫寒痰者是也紫金丹即砒霜豬肉煅為末蒸餅丸者其二屬寒包熱治法乃仲景趂未寒之時先用大承氣湯下其熱至冬寒時無熱可包哮自不發是也食積痰壅哮喘咳嗽清金丹遇厚味發者用之蘿蔔子淘淨蒸熟晒乾為末一兩豬牙皂角燒存性三錢用生薑汁浸蒸餅丸如小菉豆大每服三五十丸咽下劫痰以薑汁煉蜜如梧子大每服七八十丸噙下止之逺年近日哮喘痰嗽蟬退去足輕粉另研馬兜鈴各一兩五靈脂生雄黃生杏仁去皮尖砒生各五錢淡豆豉四十九粒右為末用生薑葶􅏣自然汁合輕粉諸藥為丸小彈子大每服一丸細嚼臨睡生薑湯下治齁嗽蘇子二錢麻黃去節三錢欵花桑葉蜜炙半夏各三錢杏仁去皮尖一錢半甘草白果二十一枚去衣炒黃色水三鍾不用薑煎二鍾徐徐頻服一方治同上用糯米泔水磨茶子滴入鼻中令吸入口內服之口中橫咬竹管一個片時間則涎自鼻口中流出如綿當日立愈二次絶根治水咻芫花為末大水上浮浡濾過大米粉右三味搜為粿清水煮熟恣意食之又方青皮一枚半開者入芭豆一粒鐡線縛定燒存性為末薑汁並酒各一呷同調服過口便定定喘湯白果二十一枚去殼切碎炒黃色麻黃欵冬花桑皮蜜炙法製半夏如無以甘草湯泡七次去皮用各三錢甘草一錢蘇子二錢杏仁一錢半黃芩炒一錢半右用水三鍾煎二鍾分二服不用薑不拘時徐徐服詩曰諸病原來有藥方惟愁齁喘最難當麻黃桑杏尋蘇子白果冬花更又良甘草黃芩同半夏水煎百沸不須薑病人遇此仙丹藥服後方知定喘湯金陵有一浦舍用此方專治齁疾無不取效此其真方也壓掌散治男婦哮喘痰嗽麻黃去節二錢半炙甘草二錢白果五箇打碎水煎臨臥服二黃丸濟生方治停痰在胃喘息不通呼吸欲絶好雌黃一錢雄黃一兩研極細末熔黃蠟為丸彈子大每服一丸於半夜時煮糯米粥乘熱以藥投入粥內攪轉和粥吃善悲內經云在臟為肺在志為悲又云精氣并於肺則悲是也肺虛補母仲景云婦人臟躁喜悲傷欲哭象如神靈所附數欠伸甘麥大棗湯主之甘草三兩小麥一升大棗十枚水六升煮三升分三服亦補脾氣許學士治一婦人數次無故悲泣不止或謂之有祟祈禳請禱備至終不應豫忽憶金匱有一證云婦人臟躁悲傷欲哭象如鬼神靈數欠伸者宜甘麥大棗湯豫急令治藥盡劑而愈古人識病制方種種絶妙如此運氣云悲證皆屬寒水攻心經云火不及則伏明伏明之紀其病昏惑悲忘從水化也又云太陽司天寒氣下臨心氣上從喜悲數欠又云太陽司天寒淫所勝善悲時眩仆又云太陽之復甚則入心善忘善悲治以諸熱是也妊娠善悲綱目述管先生治一妊娠四五箇月臟躁悲傷遇晝則慘感淚下數欠象若神靈如有所憑醫與巫皆無益與仲景大棗湯一投而愈肺痿金匱要略千金方脈經論同論曰寸口脈數其人病咳口中反有濁唾涎沫出何也師曰此為肺痿之病何從得之師曰病熱在上焦因咳為肺痿或從汗出或從嘔吐或從痟渴小便利數或從便難被快藥下重亡津液故得肺痿又寸口脈不出而反發汗陽脈早索陰脈不澀三焦踟蹰入而不出陰脈不澀身體反冷其內反煩多唾脣燥小便反難此為肺痿傷於津液便如爛瓜下如豚腦但坐發汗故也其病欲咳不得咳咳出乾沫久久小便不利其脈平弱肺痿吐涎沫而不咳者其人不渴必遺溺小便數所以然者上虛不能制下故也此為肺中冷必眩師曰肺痿咳唾咽燥欲飲者自愈自張口者短氣也王海藏曰此證初得可治久則難愈何者上枯水之源下竭水之本也又曰寸口脈虛小者為肺痿熱之所過初結為膿始萌可救微發渴者欲愈又曰凡傷風傷寒後咳嗽唾血者此肺虛也若不治恐乘虛而成肺痿當以小柴胡去人參大棗生薑加乾薑五味子又曰肺痿肺癰其皮如麩粳有胃脘成癰其皮緊如甲錯有腸癰裹大膿血於腸胃之間又經云陽明司天唾出白血者其狀淺紅如肺色故曰白血又曰無汗惡寒脈浮緊得自傷寒法從麻黃有汗惡熱脈沈實得自傷酒法從葛根生生子曰痿乾癟也即早發還先痿之痿甘草乾薑湯溫臟治肺痿多涎唾小便數肺中冷必眩不渴不咳上虛下不能制溲服此湯已渴者屬消渴甘草炙四兩乾薑二兩炮水三升煮取一升半分溫日二服集驗肘後有大棗十二枚甘草湯治肺痿涎唾多出血心中溫溫液液方千金翼名溫液湯甘草二兩水三升煎取一升半分三服生薑甘草湯治肺痿咳唾涎沫不止咽燥而渴生薑五兩甘草四兩人參三兩大棗十二枚右水七升煮取三升分三服桂枝皂莢湯治肺痿吐涎沫不止桂枝生薑各三兩甘草二兩皂莢一兩大棗十五枚水七升煮取三升分三服千金方麻黃湯仲景名小青龍加石膏湯治肺脹咳而上氣咽燥而喘脈浮心下有水麻黃芍藥生薑仲景用乾薑細辛桂心各三兩半夏五味子各半升石膏四兩水一斗先煮麻黃去上沫內諸藥煮取三升強壯服一升羸者減之日三服小青龍湯無石膏知母茯苓湯肺痿喘嗽不已往來寒熱自汗茯苓炙甘草各一兩知母五味子人參薄荷半夏柴胡白术欵花桔梗麥冬黃芩各五錢川芎阿膠炒各三錢右每服一兩薑三片水煎服久癆咳嗽肺痿見血知母貝母天冬麥冬欵花各三分川歸地黃苡仁杏仁天花粉各五分桔梗甘草馬兜鈴紫苑阿膠白蠟各一分半薑三片棗一枚水煎連進三服立愈人參平肺散治心火尅肺傳為肺痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利橘紅甘草炙地骨皮茯苓青皮蘇葉半夏各五錢桑白皮一兩知母七錢人參天門冬各四錢有熱加黃芩四錢五味子三百粒每服五錢薑三片水煎服或為末薑汁丸如彈子大噙化亦可人參欵花膏脾胃虛寒久嗽不已咽膈滿悶咳嗽痰涎嘔逆惡心腹脅滿脹腰背傷痛或虛勞冷嗽及逺年近日一切咳嗽諸藥不效欲成肺痿欵花人參五味子紫苑桑白皮各一兩右為末煉蜜丸芡實大每食後細嚼一丸淡薑湯下噙化亦可肺癰孫真人曰病咳唾膿血其脈數實者屬肺癰虛者屬肺痿咳而口中自有津液舌上胎滑此為浮寒非肺痿若口中辟辟燥咳即胸中隱隱痛脈反滑而數此為肺癰也問曰病者咳逆師脈之何以知為肺癰當有膿血吐之則死後竟吐膿死其脈何類何以引之師曰寸口脈微而數微則為風數則為熱微則汗出數則惡寒風中於衛呼氣不入熱過於營吸而不出風傷皮毛熱傷血脈風舍於肺其人則咳口乾喘滿咽燥不渴多唾濁沫時時振寒熱之所過血為凝滯蓄結癰膿吐如米粥始萌可救膿已成則難治寸口脈數趺陽脈緊寒熱相搏故振寒而咳趺陽脈浮緩胃氣如經此為肺癰師曰振寒發熱寸口脈滑而數其人飲食起居如故此為癰腫病醫反不知而以傷寒治之不應愈也何以知有膿膿之所在何以別知其處師曰假令膿在胸中者為肺癰其脈數咳唾有膿血設膿未成其脈自緊數緊去但數膿為已成也生生子曰按金匱要略脈經元戎論肺痿肺癰皆無分別治亦相須以其俱為肺病也愚歷見今之病此者亦稍有分別不能不為之辨也肺痿近於虛怯故王海藏援內經勞風論證入之謂上枯水之源下竭水之本也何言乎內經五痿論皆以肺熱葉焦為本故今之病肺痿者多乾咳聲啞無力緣肺主聲肺為火爍憊劇枯痿乾癟故聲不充發也虛怯者多有之肺癰雖亦為肺熱所致多有因於外感因於酒熱故間有吐盡膿血而愈者有瀉肺而愈者今分肺痿肺癰為二門祖千金也王海藏曰寸口脈實大為肺癰血為凝滯化為五色脈數為弱膿成難已不渴者難治黃昏湯治咳有微熱煩滿胸心甲錯是為肺癰者方黃昏手掌大一片是合昏皮也㕮咀以水三升煮取一升分二服又方薏苡仁瓜瓣半升桃仁五十枚葦莖切二升水二斗煮取五升去渣右四味內葦汁中煮取二升服一升當有所見吐膿血王海藏加味葶􅏣大棗瀉肺湯治脈緊數則膿已成喘而不得臥葶􅏣二兩炒紫色右件杵成丸以水三升煮大棗二十個取二升去渣內麻黃五味子各兩半取清飲頓服令三日服一劑瘥又一法治一切咳唾膿血久咳及出不止好酥三十斤三遍煉停取凝成膏醍醐服二合日三服瘥如聖丸治風熱毒氣上攻咽喉痛痺腫塞妨悶及肺癰噴嗽膿血胸滿振寒咽乾不渴時出濁沫氣息腥臭久久咯膿狀如米粥龍腦另研牛黃另研桔梗甘草生用各一錢右為細末煉蜜丸每兩作二十丸每服一丸噙化嗽藥青龍散石膏八兩朴硝甘草生用各一錢青黛半兩右為細末每服二三錢煎薄荷湯點熱嗽冷吐衍義蛤蚧散治肺虛咳久成瘡吐膿血犀角􅀈羊角鹿角阿膠蛤蚧搜膿散治諸瘡膿汁不絶腐盡黃蓍白芍藥香白芷各等分右為末乾上患處上用膏藥敷貼一日一換海藏云此方雖云治瘡吐膿血久不盡者亦宜用此藥作湯散煎調服之又宜糊為丸桐子大白湯下三五十丸或乾糝細末咽津大妙錢氏如聖散桔梗甘草阿膠炒白煎甘桔取清內膠化服黃蓍鱉甲散治虛勞客熱肌肉消瘦四肢倦怠五心煩熱口燥咽乾頰赤心忪日晚潮熱夜有盜汗胸脅不利飲食多渴咳唾稠粘時有膿血知母焙桑白皮去皮黃蓍去蘆甘草炙赤芍藥紫苑去蘆以上七味各五錢淨秦芁洗去蘆白茯苓去皮焙一本忌火今焙別有説生地黃柴胡去蘆梗地骨皮去骨以上五味各五錢五分淨肉桂去皮不見火人參苦桔梗以上三味各三錢三分淨鱉甲去頭用酥炙更佳天門冬湯洗去心焙一本忌火今聽以上二味各一兩半夏五分右為粗末每服二大錢水一盞煎至七分去渣溫服食後海藏云此方內闕黃蓍疑黃芩是黃蓍也然內有黃芩有小柴胡今治虛熱妙為有盜汗亦無妨也兼加知母地骨皮赤芍藥即錢氏地骨皮散也治盜汗亦妙內有桂本治發熱惡寒即柴胡加桂也天門冬人參地黃即三才也秦芁柴胡甘草鱉甲芍藥即黃龍湯也紫苑桔梗甘草即紫苑散也桂芍黃耆甘草即黃蓍建中湯也又云此方治本無傷寒風而得孫真人治唾膿血用麻黃升麻之類及青龍湯之類亦從傷寒而得也內多五味子皆祖仲景法無論傷寒傷風皆可加五味子又云桔梗一味有辛有苦辛以散之苦以泄之當如上下之意硃砂膏鎮心神解熱除煩唾血等證硃砂另研半兩珍珠末生犀角人參玳瑁末甘草各一兩金箔泥分半用輕粉二錢半蘇合油一分牛黃另研麝香另研龍腦另研南鵬砂琥珀逺志􅀈羊角赤茯苓已上各半兩安息香酒熬去石約半兩右為細末入研藥極細煉蜜丸蘇合油和諸藥為錠子更以金箔為衣每兩作五錠每服一皂角子大噙化人參湯下亦得並阿膠丸相雜服尤勝至寶丹定肺散知母半兩貝母二錢半人參二錢半枯礬半兩烏梅肉半兩御米殼炒二兩白朮二錢半為細末水煎生薑湯點亦得蜜丸彈子大噙化亦得定肺丸欵冬花紫苑知母貝母人參甘草炙桑白皮御米殼麥門冬百部馬兜鈴五味子烏梅肉已上各等分右為細末煉蜜丸彈子大噙化一丸古方紫苑散紫苑半兩欵冬花半兩百部二錢半右為細末烏梅湯點服生薑亦得如咳加五味子喘加杏仁渴加烏梅氣逆加陳皮頭痛加細辛三錢甘草二錢氣脫者加御米殼蜜炒粗末水煎增損防風通聖散治鼻塞不通肺氣不利桔梗桑白皮紫苑鼠粘子各半兩荆芥穗三兩甘草一兩已上各生用右為粗末防風通聖散各一半和勻每服四錢水一盞半生薑五片煎至七分去渣溫服食後葶藶大棗㵼肺湯肺癰胸滿脹一身面目浮腫鼻塞清涕出不聞香臭酸辛咳逆上氣喘鳴迫塞先服小青龍湯一帖葶藶炒研三錢大棗十二枚先以水三升煮棗取二升去棗入葶藶煮取一升服外臺桔梗白散咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗貝母各三兩巴豆七分右三味為散壯人服五分弱者減之病在膈上吐膿血膈下者瀉出若下多不止者飲冷水一杯咳而胸滿振寒脈數咽乾不渴時出濁唾腥臭久久吐膿如米粥者為肺癰桔梗湯主之亦治血痺桔梗一兩甘草二兩右二味以水三升煮取一升分溫再服則吐出膿血而愈也咳逆上氣時時濁唾但坐不得臥皂莢丸主之皂莢刮去皮酥炙為細末蜜丸梧子大以棗膏和湯服三丸日三夜一孫真人治肺癰吐膿血用甘桔湯二十餘條加減生甘草一兩桔梗二兩水煎服咳逆氣者加陳皮咳嗽者加知母貝母咳而渴者加五味吐膿血者加紫苑肺痿者加阿膠面目腫者加茯苓嘔者加生薑半夏少氣者加人參麥冬膚疼者加黃蓍目赤者加梔子黃連咽痛者加鼠粘子竹茹聲不出者加半夏桂枝疫毒頭腫者鼠粘子大黃􅉭硝胸痛膈不利者加枳殼心胸痞者加枳實不得眠者加梔子發狂者加防風荆芥酒毒者加葛根陳皮桔梗湯治肺癰心胸氣壅咳嗽膿血心神煩悶咽乾多渴兩腳腫浮小便赤黃大便多澀桔梗貝母當歸瓜蔞仁枳殼苡仁桑皮防已各一二分甘草節杏仁百合各六分黃蓍一錢八分分二服薑三片水煎溫服大便祕加大黃小便祕加木通升麻湯肺癰吐膿血作臭氣升麻苦梗苡仁地榆黃芩牡丹皮芍藥各一錢八分甘草三錢六分分二服水煎食後溫服紫苑湯治咳嗽唾中有膿血虛勞癰痿人參紫苑知母桔梗甘草五味子茯苓阿膠貝母各一錢薑三片水煎服排膿散肺癰吐膿以此排膿補肺黃蓍一兩水二鍾煎一鍾食後溫服棗膏丸肺積在右脅下如杯發為癰陳皮苦梗葶藶各等分棗肉搗為丸梧子大每服五十丸米飲下消膿飲肺有癰膿腥氣上衝嘔而咳嗽天南星半夏知母貝母生地阿膠川芎甘草桑皮防風射干桔梗天冬薄荷杏仁白芷紫蘇白芨烏梅各等分每服七錢薑三片水煎服赤水元珠卷七
