body:
  text: 赤水元珠卷二十一明孫一奎撰婦人門小便出血良方曰心主於血通行經絡循環臟腑得寒則凝澁得熱則妄行失其常道則溢滲於脬則小便出血也薛氏曰前症肝經血熱者加味逍遥散怒氣血傷者同治調送血餘灰妙若肝經風熱用前散送子芩丸氣血俱虚者八珍散送血餘灰膏梁積熱者清胃散加槐花甘草風熱傷胃者四君子加防風枳壳胃虚不能攝血者補中益氣鬱結傷脾不能攝血者濟生歸脾湯一婦小便出血服四物蒲黄之類更加𤼵熱吐痰加芩蓮之類又飲食少思虚症蜂起肝脈弦而數脾脈弦而緩此因肝經風熱為沉隂之劑脾傷不能統血發生諸臟而然也用補中益氣六味地黄丸而痊蒲黄鹿茸散治勞損尿血發熱内熱或寒熱徃來口乾作渇蒲黄炒鹿茸炙當歸生地葵子炒續㫁酒炒各等分為末毎服二錢酒調日三服髮灰散起居所傷小便尿血或忍尿脬轉臍下急痛小便不通又治肺疽心衂内崩吐血舌上出血俱妙本草云能療瘀血通闗膈利水道破癥瘕癰腫狐疝刺痛疰雜瘡療脬轉通大小便止咳嗽鼻衂右毎服二錢米醋湯調下生地黄散血熱尿血生地二錢黄芩炒五錢阿膠炒側栢葉炒各一錢右水煎食前服當歸散血分熱尿血川歸羚羊角屑赤芍各五分刺薊葉一錢生地一錢右水煎服又方治血分有熱生地黄搗汁毎用一小盞日三服又方治血分熱尿血用炒蒲黄末每以二錢温酒下鹿角膠散鹿角膠炒為末二兩作二服長流水調妙隂腫良方曰隂腫因胞絡素虚風邪客之乘于隂部血氣相搏故也薛氏曰氣血虚弱補中益氣湯肝經濕熱龍膽瀉肝湯又當與隂痒隂挺隂冷相參而治又云一婦隂中腫悶小便澁滯兩脇作腫内熱晡熱月經不調時或寒熱此因肝經鬱怒元氣下陷濕熱壅滯朝用歸脾湯加柴胡升麻解鬱結補脾氣升元氣夕用加味逍遥散清肝火生肺血除濕熱各數劑諸症悉愈又用四君芎歸丹皮調補肝脾而經水如期菖蒲散治月水澁滯隂户腫痛菖蒲當歸炒各一兩秦芁二兩右每服五錢入葱白水煎服白礬散治隂腫堅痛白礬五錢甘草五分大黄一兩右為末水調如棗大綿裹内隂中一日兩換以愈為度隂痒良方曰隂痒為三蟲在腸胃之間因臟虚而蝕輕則隂中痒甚則隂中痛也生生子曰前症亦有虚者古人有用人參一兩煎湯服之而愈予曽治一宦婦年廿一疹出未彌月而犯房事熱因下陷隂中痒甚毎一發神魂颼然兩手抓壁口中咬物鮮血淋漓爪脱肉破而不遑顧七日肌肉如削諸洗挿方厯試無功作蟲治尤劇欲懸梁求死予為籌之乃虚熱陷入至隂當從隂引陽以黄茋六錢甘草二錢防風一錢柴胡二錢水煎食前服之其疾頓止此引金伐木之法也薛氏曰前症屬肝經所化當用龍膽瀉肝湯逍遥散以主其内外以桃仁研膏和雄黄末或鷄肝内隂中以制其蟲一婦胸膈不利内熱作渇飲食不甘肢體倦怠隂中悶痒小便赤澁此鬱怒傷肝脾所致用歸脾湯加山梔而愈復因怒患處并小腹脹痛用小柴胡加芎歸山梔芍藥痛止用山梔入逍遥散而痊又因勞役患處腫脹小便仍澁用補中益氣加山梔茯苓丹皮而瘳一方新桃葉搗綿裹内隂中一日三易大黄散治隂痒大黄微炒黄芩黄茋炙各五兩赤芍𤣥參蛇床子山茱萸為末酒調服二錢又方杏仁燒灰乘熱綿裹納隂中日二易之又詩曰玉户生瘡時痛痒皆因房色損其元黄葱水洗二三次杏仁燒灰油調痊加麝香尤妙又方鯽魚膽搽之妙隂挺下脱良方曰婦人隂挺下脱或因􅀈絡傷損或因子臟虚冷或因分娩用力所致薛氏曰前症當升補元氣為主若肝脾鬱結氣虚下陷用補中益氣湯若肝火濕熱小便濇滯龍膽瀉肝湯一婦隂中突出如菌四圍腫痛小便頻數内熱晡熱似痒似痛小便重墜此肝脾鬱結蓋肝火濕熱而腫痛脾虚下陷而重墜也先以補中益氣加山梔茯苓車前子青皮以清脾火升肝氣更以加味歸脾湯調理脾鬱外以生猪脂和藜蘆末塗之而収一婦隂中挺出五寸許悶痛重墜水出淋漓小便澁滯夕與龍膽瀉肝湯分利濕熱朝與補中益氣湯升補脾氣諸症漸愈再與歸脾湯加山梔茯苓川芎黄栢間服調理而愈後因勞役或怒氣下部濕痒小水不利仍用前藥即愈一方治隂挺下脱當歸黄芩各二兩牡蠣二兩半蝟皮一兩炙赤芍兩半右為末每以二錢食前温酒調下米飲亦可治隂挺長出玉户數寸者疼痛不可忍飲食不進用前方治其内仍以大黄山茨姑石羔牡蠣乳香為細末水調揣熟揑作條子如中指大隂乾挿入玉户其痛即止隂瘡薛氏曰此症乃七情鬱火傷損肝脾濕熱下流其外症隂中突出如蛇如菌如鷄冠或生蟲濕痒或潰爛出水或腫悶墜痛其内症體倦内熱經候不調或飲食無味晡熱發熱或胸脇不利小便痞脹或赤白帶下小水淋濇其治法腫痛者四物加柴胡丹皮山梔膽草濕痒者歸脾湯加柴胡山梔丹皮淋濇者龍膽瀉肝湯加白术丹皮潰腐者逍遥散山梔川芎腫悶墜痛者補中益氣湯加山梔丹皮佐以外治之法一婦素性急隂内痛小便赤濇怒而益甚或發熱或寒熱此肝經濕熱所致用芎歸炒梔柴胡苓术丹皮澤瀉炒芍車前炒連甘草數劑漸愈乃去黄連澤瀉又數劑全愈一婦臍腹上下并玉户遍生濕瘡狀如馬𤓰瘡他處並無熱痒而痛大小便濇出黄汁食減身面微腫衆作惡瘡治反劇愈痛急令洗去乃用馬齒莧四兩青黛一兩同搗爛敷瘡上即時痒止痛定而熱亦退仍服八政散日三服分散客熱每敷藥僅得一時乆藥已乾燥再塗新濕藥又安凡如此二日僅減三之一五日減三之二自此二十日全安縁此婦嗜酒貪啗魚蟹發風之物而中下焦蓄風熱之毒氣當作腸癰内痔等疾后當禁酒及發毒之物一方治玉户生瘡杏仁燒存性雄黄明礬各五錢麝香一錢二分右為末敷之又方飛丹研極細生桐油調搽二三日效交接輒血出痛薛氏曰一婦每交接便血出作痛此肝火動脾而不能攝血用補中益氣濟生歸脾二湯而愈若出血過多而見他症但用前藥調補肝脾千金方療交接血出伏龍肝桂心等分為末毎服一錢酒調下胎前惡阻及痰逆不食惡阻者謂嘔吐惡心頭眩惡食擇食是也胍息和順但覺肢體沉重頭目昏眩好食醎酸甚者或作寒熱心中憤悶嘔吐痰水不能支持古謂之子病由胃氣怯弱中脘停痰之所致也薛氏曰脾胃虚弱嘔吐不食用茯苓半夏湯蓋半夏乃徤脾化痰滯之主藥也痰涎壅滯飲食少思胎氣不安為必用之藥須倍加白术然半夏白术陳皮砂仁善能安胎氣徤脾胃也予嘗用之驗甚若兼氣惱更加柴胡因風寒須用參蘇飲生生子曰前症亦有因火者故丹溪用抑青丸前人亦有用濟生竹茹湯者予厯厯見為火症者多寒者兼而有之亦有愈治而愈逆者便當勿藥待之俟胃氣和當自瘳矣茯苓半夏湯姙娠脾胃虚弱飲食不化嘔吐不止半夏泡炒黄陳皮各一錢白茯苓二錢砂仁炒一錢炙甘草五分薑棗烏梅水煎服二帖後用茯苓丸茯苓丸姙娠煩悶頭暈聞食吐逆或胸腹痞悶赤茯苓人參桂心炮薑半夏泡炒黄橘紅各一兩白术炒葛根甘草炙枳殻麩炒各二兩右蜜丸梧子大每服五十丸米飲下日三服白术湯胃虚惡阻吐水甚至十餘日粥湯不入白术炒一錢人參五分丁香炙甘草各二分右薑水煎服保生湯姙娠惡阻少食嘔吐或兼吐瀉作渇人參一錢炙甘草白术炒香附烏梅橘紅各五分右薑水煎服仲景乾薑人參半夏丸治姙娠嘔吐不止乾薑人參半夏等分為末薑汁糊丸梧子大米飲下十日三服歸原散惡阻嘔吐不止頭痛全不入食諸藥無效人參甘草川芎當歸芍藥丁香各五錢茯苓白术陳皮各一兩半桔梗炒枳殻炒各二兩半半夏泡炒黄一兩右每服五錢加薑六片棗一枚水煎服已上五方治寒痰惡阻之劑也竹茹湯惡阻嘔吐不下食青竹茹橘紅各二兩生薑茯苓各四兩半夏五兩右水六升煮取二升半分三服人參橘皮湯惡阻嘔吐痰水人參橘皮白术麥冬各一兩甘草三錢厚朴製白茯苓各五錢右毎服五錢加青竹茹一錢生薑三片水煎服姙娠嘔吐痰水不食生蘆根一兩橘紅七錢生薑一兩梹榔三錢右作三次水煎服姙娠惡食心中煩憒熱悶嘔吐竹茹麥冬各二兩前胡二兩橘紅一兩蘆根一握水一大升煮半升作二次食前服已上四方治熱痰惡阻之劑也羅太無半夏茯苓湯惡阻心中憒悶頭目眩暈四肢怠倦百莭煩痛胸膈痰逆嘔吐惡心嫌聞食氣好噉酸醎多卧少起全不進食先服此湯次服前茯苓丸半夏泡炒黄一兩二錢赤茯苓熟地黄各七錢半芍藥旋覆花千金方無此而有細辛紫蘇橘紅人參各半兩川芎桔梗甘草各五錢右每服五錢薑七片水煎空心服若有客熱煩渇口瘡去橘紅細辛加前胡知母七錢半若腹冷下利去地黄加炒桂心五錢若胃中虚熱大便秘小便赤濇加大黄七錢半去地黄加黄芩二錢半胎動不安姙娠胎動或飲食起居不節或衝任經虚或因過酒房室擊觸跌撲損動臟腑或脾氣虚弱誤服藥餌或感冒風寒當各推其因而施治之有因母病而胎動者但治其母而胎自安有胎不堅固動及母疾但安其胎而母自愈面赤舌青其胎已死面青舌赤吐沫其母必死唇口色青兩邉沫出子母俱死也薛氏曰前証胎氣鬱滯者紫蘇飲脾氣虚弱者六君子湯加紫蘇枳殻鬱結傷脾者歸脾湯加柴梔鬱怒傷肝脾者四七湯加芎歸怒動肝火者加味小柴胡湯若胎已死急用平胃散加朴硝腐化之丹溪曰産前當清熱養血因火動胎逆上喘急者以條芩香附之類為末調下墮胎乃氣虚血虚血熱所致懐姙嗜物乃一臟之虚黄芩安胎妙藥乃上中二焦之劑能降火下行加白术為安胎聖藥也俗不知以為寒而不取用殊不知産前宜清熱令血循經而不妄行故能養胎又曰將臨月胎熱以三補丸加炒香附白芍􅔻餅為丸服抑熱以三補丸以地黄膏為丸孕至八九個月必用順氣須枳殻紫蘇梗固胎方法川芎地黄黄芩各五分歸身人參白芍陳皮各錢白术一錢半甘草三分黄栢黄連俱少許桑寄生一錢右毎服五六錢加糯米五十粒水煎服血虚不安者加阿膠腹痛者加砂仁能止痛安胎行氣故也一方無黄連名固孕丸仲景云姙娠宜常服當歸散當歸黄芩芍藥芎藭各一兩白术半斤右為末酒調服方寸匕日二服常服之即易産胎無苦疾産後百病悉主之肘後方治胎動不安取苧根如足大指者一尺水煎服一方有生薑五片丹溪云苧根大能補隂血而行滯血立效散治胎動不安如重物所墜冷如氷即佛手散也縮砂散治胎動不安墮在須臾痛不可忍神效砂仁連殻炒黒為末毎服二錢酒下鈎藤湯姙娠胎動腹痛面青冷汗氣欲絶者鈎藤鈎當歸茯神去木人參各一錢苦梗一錢半桑寄生一錢右水煎服煩熱者加石膏黄茋湯氣虚胎動腹痛下水糯米一合炙黄茋川芎各一兩水煎分三服順氣飲子産前服之安胎紫蘇葉木香煨人參草荳蔲茯苓各一兩炙甘草五錢大腹子一兩氣虚者去之右毎服三五錢加苧根三寸糯米三十粒水煎服安胎寄生湯姙娠下血或胎不安或腰腹痛桑寄生白术各五分茯苓四分甘草一錢水煎服安胎飲體倦惡食或胎動腹痛或下血發熱腰痛炙甘草茯苓川歸熟地川芎白术黄茋白芍炒半夏泡阿膠炒地榆各五分加薑棗水煎服又方好銀煮取水入葱白作羮食之妙生生子曰按良方云姙娠婦人倘氣血虚弱無以滋養其胎終不能成也宜下之以免其禍若胃氣壯實衝任榮和如魚之處淵得其所也宜必盡方技以補養之庻無所悞設因病而胎不能安者不得不下之藥劑亦須謹慎桂心散姙娠因病而胎不能安者以此下之桂心𤓰蔞牛膝􅜰麥各五分歸尾一錢右水煎服又方牛膝一兩酒煎食前空心服下又方生鷄子一枚鹽三錢攪匀服之立下佛手散更妙凢胎死者即下生者即安胎漏下血附卒然下血下如荳汁良方曰姙娠經水時下由衝任氣虚不能約制盖心小腸二經相為表裏上為乳汁下為月水故姙娠經水壅之以養胎蓄之以為乳若經水時下名曰胞漏血盡則斃矣丹溪曰胎漏有因氣虚者有因血虚者有因血熱者不可不察也薛氏曰前症有風熱者以防風黄芩丸若因血熱加味逍遥散血虚二黄散血去太多八珍湯未應補中益氣湯若因肝火用柴胡山梔散脾虚加味歸脾湯若因事下血作痛八珍湯加阿膠熟艾脾胃虚者補中益氣湯加五味子下陷者倍升麻柴胡晡熱内熱用逍遥散亦有血氣盛養胎之外而有餘者不必服藥卒然下血良方謂冷熱不調七情失宜氣血不和所致若傷於胎則痛血去多則墮矣薛氏云前症氣怒者小柴胡湯風熱用一味防風丸血熱用一味子芩丸脾氣虚六君子湯中氣下陷補中益氣湯一婦姙娠六月毎怒下血甚至寒熱頭痛脇脹腹痛作嘔少食予謂寒熱頭痛乃肝火上沖脇脹腹痛乃肝氣不行作嘔食少乃肝侮脾胃下血乃肝火血熱用小柴胡加芍藥炒黒山梔茯苓白术而愈訶子能止胎漏及胎動欲生脹悶氣喘安胎散治卒然腰痛下血熟地艾葉白芍炒川芎黄茋炒川歸阿膠炒甘草炙地榆各五分加薑棗水煎服子芩丸治肝經有熱妄行用細條芩沉實者炒為末毎服一錢以鐡秤鎚燒赤淬酒熱調服若脾胃虚者不宜用防風丸治肝經有風血因妄動而不歸經防風為末每服一錢白湯調下防風黄芩丸治肝經有風熱致血崩便血尿血用條芩炒焦防風等分為末酒糊丸梧子大毎服三五十丸食前米飲或酒下二黄散治胎漏下血或内熱晡熱或頭痛頭暈煩躁作渇或脇肋脹痛等症生地熟地為末毎用三錢煎白术枳殻湯調服二黄杵膏為丸尤妙庶不枯稿而有力也芎歸膠艾湯姙娠下血腹中痛為胞阻以此安之艾葉阿膠炒川芎當歸各三兩甘草一兩右細切以水八升煎取三升内膠溶盡分三服立聖散治姙娠下血不止鷄肝三枚用酒一升煮熟頓食之大效阿膠散姙娠無故下血不止阿膠三兩炒為末酒一升半煎令溶一服愈又方治血熱下血及胎漏下血不止阿膠二兩為末生地黄半斤搗取汁以清酒三升絞汁分三服又方治胎漏下血不止胞乾即死宜急治之生地黄汁一升陳酒五合仝煎三五沸温三服以止為度枳殻湯治虚熱胎漏下血或因事下血枳殻黄芩各半兩白术一兩水煎食前分三服本事方治胎下血不止桃奴桃樹上乾不落桃子是也燒存性為末水調服妙姙娠胎漏下黄汁或如荳汁白漿或如赤荳汁予厯見此症不早治其胎必墮大全方治姙娠忽然下黄汁如膠或如荳汁胎動腹痛乃氣虚也糯米五升黄茋六兩水七升煎取二升分四服薛氏云若肝脾濕熱用升陽除濕湯肝脾風熱加味逍遥散肝脾鬱怒加味歸脾湯脾胃氣虚用錢氏白术散若脾氣下陷補中益氣湯風入腸胃用胃風湯東垣升陽除濕湯治婦人女子漏下惡血月事不調或暴崩不止多下水漿之物皆由飲食失節或勞傷形體或素患心氣不足因飲食勞倦致令心火乘脾其脈緩而弦急按之洪大皆脾土受邪也柴胡𦍑活蒼术黄茋炒各錢半防風升麻甘草炙藁本各一錢蔓荆子七分獨活當歸各五分右水煎食前服胃風湯治風邪乘虚客於腸胃水穀不化泄瀉下注腹脹虚滿腸鳴作痛及腸胃虚熱下如荳汁或瘀血日夜無度人參白术茯苓川芎川歸白芍桂皮粟米右水煎食逺服銀苧酒治姙娠下黄汁或如赤荳汁苧根去黒皮好銀各一斤水九升煮取四升每服入酒半升煎分二服脈經曰婦人懐軀六月七月暴下斗餘水其胎必倚而墮此非時孤漿預下也胎漏下水乃徐徐而下今暴下而多故知胎墮胎上逼子懸也姙娠將養如法則血氣調和胎得其所而産亦易否則胎動氣逆上逼臨産亦難甚至危矣陳良甫云治一婦人有孕七個月逺歸忽然胎上沖心而痛坐卧不安兩醫治之無效遂説胎已死矣用萆麻子研爛加麝香貼臍中以下之命在垂亡召陳診視兩尺脈絶他脈平和陳問二醫作何症治答曰死胎也陳曰何以知之曰兩尺脈絶是以知之陳曰否此子懸也若是胎死却有辯處面赤舌青子死母活面青舌赤吐沫母死子活唇口俱青母子俱死今面不赤舌不青其子未死是胎上逼心宜以紫蘇飲治之至十服其胎遂不逼而下安矣紫蘇飲治姙娠胎氣不和逼上脹滿疼痛謂之子懸兼治臨産驚恐氣結連日不下紫蘇葉一兩大腹皮人參川芎陳皮白芍各五錢當歸三錢甘草一錢右剉分三服毎服加薑四片葱白七寸水煎至七分空心服曽有累日産不下遍服催生藥不效此必坐草少早心存一㸃畏懼氣結而不行非不順也素問云恐則氣下蓋恐則精神怯怯則上焦閉閉則氣還還則下焦脹氣乃不行得此藥一服便産及治姙娠六七月子懸每用此數數有驗不十服胎便近下而安大全方治胎上逼煩悶併治胎動困篤葱白二七莖濃煮汁飲之若胎未死則安已死即下如未效再服若唇口青黒手足厥冷須佐以當歸湯此本草云葱白通陽氣安胎方神妙脈浮滑者宜之當歸湯治胎動煩躁或生理不順唇口青黒手足厥泠人參當歸阿膠炒炙甘草各一錢葱根連白一握右水四碗煎四味減半去渣入葱再煎至一碗分二服薛氏云一姙婦毎因恚怒其胎上逼左闗脈弦洪乃肝火内動用小柴胡加茯苓枳殻山梔而愈但體倦不食用六君子調養脾土加柴胡枳殻調和肝氣乃瘥又一姙婦胎上逼胸滿噯氣飲食少思此脾氣鬱滯用紫蘇飲頓安又用四君子加枳殻柴胡山梔而瘥大聖散治姙娠怯悸夢驚心腹脹滿連臍急痛白茯苓川芎麥冬黄茋炒川歸各一錢人參炙甘草木香各五分加生薑水煎服白术湯姙娠遍身痛或沖心欲死不能飲食白术五兩黄芩二兩芍藥四兩右水六升煮取二升半分三服縁胎有水致痛兼易産姙娠心痛腹痛姙娠心腹痛或宿有冷疾或新觸風寒或痰飲相摶若痛傷胞絡必至動胎甚則傷墮姙娠卒心痛氣欲絶川芎當歸茯苓厚朴制各一錢水煎服當歸芍藥湯姙娠心腹急痛或去血過多而眩暈白芍炒當歸茯苓白术炒澤瀉各一錢川芎二錢右水煎服阿膠散治胎動腹痛白茯苓白术炒川芎阿膠炒各一錢當歸陳皮各二錢甘草炒三分右薑棗水煎服熟艾湯治姙娠心腹痛或吐血衂血熟艾如拳大水煮服之效中惡亦妙有癥者宜去癥凡胎動多在當臍今動在臍上故知是癥也此症宜以仲景桂枝茯苓丸主之桂枝茯苓丸姙娠腹痛不能忍或偶有所傷胎動不安命將絶者砂仁不拘多少連皮炒黒色或單用仁炒為末熱酒調下二錢不飲酒者米飲下但覺腹中熱胎已安矣懸命須臾者以砂仁湯吞桂枝茯苓丸又名奪命丸專治婦人小産下血子死腹中其婦増寒手指唇口爪甲青白面色黄黒胎上搶心悶絶欲死冷汗自出或食物或誤食草藥傷動胎氣下血不止胎或未損者服此即安胎已死者服此即下腐爛者亦能取下此方原係異𫝊丹溪亦稱其神此即仲景桂枝茯苓丸但用淡醋湯嚼下耳桂枝茯苓牡丹皮桃仁去皮尖赤芍藥右各等分蜜丸彈子大淡醋湯嚼下一丸不知漸加至三丸姙娠腰背痛腎主腰胎繫于腰痛甚者或因勞役傷損則胎墮也薛氏曰若外邪所傷用獨活寄生湯勞傷元氣八珍湯杜仲砂仁膠艾脾腎不足以前藥加白术補骨脂氣血鬱滯用紫蘇飲加桔梗枳殻肝火所動以小柴胡湯加白术枳殻山梔肝脾鬱結用歸脾湯加柴胡枳殻一姙婦頸項強直腰背作痛此膀胱經風邪所致用拔萃𦍑活湯一劑而愈又用獨活寄生湯及八珍湯以祛邪固本而痊通氣散腎虚腰痛神效破故紙炒為末空心每服二錢嚼胡桃肉半個以温酒下杜仲丸治姙娠腰背痛杜仲炒川續㫁酒浸各等分為末煮棗肉為丸梧子大每服七十丸酒或米飲下膠艾湯治腰腹疼痛胎動欲落即前姙娠下血安胎飲是也熟地艾葉白芍川芎黄茋阿膠川歸甘草炒各等分加薑棗水煎服獨活寄生湯治足三隂虚風濕所侵腰膝厯節作痛獨活桑寄生續㫁酒炒杜仲薑汁炒細辛秦芁牛膝酒炒茯苓白芍炒桂心川芎防風人參熟地川歸粉草炙各五分右水煎服一婦苦腰痛數年不愈用白术一味大劑服不三月而痊乃胃氣虚閉之症白术能利腰臍之血故安胎而治痛也拔萃𦍑活勝濕湯治頭疼脊痛腰似折項似拔𦍑活獨活各一錢藁本防風炙甘草各五分川芎蔓荆子各二分右水煎服如身重腰沉沉然是濕熱也加黄栢一錢附子五分蒼术二錢姙娠小腹痛薛氏曰一姙婦小腹作痛其胎不安氣攻左右或時逆上小便不利用小柴胡湯加青皮山梔清肝火而愈後因怒小腹脹滿小便不利水道重墜胎仍不安此亦肝木熾盛所致用龍膽瀉肝湯一劑諸症頓愈乃以四君子加柴胡升麻以培脾土而安龍膽瀉肝湯治肝經濕熱兩抝腫痛或小腹痛脇痛小便澁滯等症龍膽草酒拌炒黄澤瀉各一錢木通生地川歸車前子炒山梔炒黄芩炒甘草各五分水煎服阿膠散嚴氏名膠艾湯不問姙娠月數深淺或顛仆或因毒藥胎動不安腰疼腹痛搶心短氣熟地艾葉白芍川芎黄茋阿膠川歸甘草炙各一兩右剉毎服五錢入薑棗水煎服金櫃方無黄茋姙娠心腹脹滿薛氏曰若外感風寒内傷飲食用藿香正氣散若食傷脾胃用六君子湯若陽氣壅滯用紫蘇飲一姙婦飲食停滯心腹脹滿或用人參養胃湯加山查青皮枳殻其脹益甚其胎上攻惡心不食右闗脈浮大按之則弦此脾土不足肝木所侮用六君子加升麻柴胡而愈後小腹痞悶用補中益氣湯升舉脾氣乃瘥姙娠數墮胎夫胎乃陽施隂化營衛調和經水完全十月而産若血氣虚損不能養胎所以數墮也凡姙婦腰痛多致墮胎薛氏曰丹溪云陽施隂化胎孕乃成血氣虚乏不能榮養其胎則墜譬如枝枯則果落藤痿則花墜嘗治賈氏婦毎有姙至三月前後必墜診其脈左右大而無力重則濇知其血虚也補其中氣使血自榮時正初夏教以濃煎白术湯下黄芩末二錢與數十帖得保而生因而思之墮於内熱而虚者於理為多曰熱曰虚蓋姙至三月上屬相火所以易墮不然何以黄芩熟艾阿膠等為安胎之妙如此也大抵治法須審某月屬某經育養而藥之生生子曰胎猶𤓰也𤓰生於藤藤肥而𤓰壯未熟而凋者由藤稿而風揺也胎藏母腹繫于命門命門者督脈之所循也又衝任二脈為血之海姙婦而經不行者血蓄以養胎也足月而生者猶𤓰熟而蒂落也茍内無所傷外無所感何墮之有衝任督三脈一宗衝脈由氣衝而行足少隂任脈起於胞門子户由㑹隂而行腹督脈繫廷孔由㑹隂而行背厯長强循腰腧命門而上巔騐今之墮胎者茍非衝任之不足必由色慾之縱恣滛火一動則揺撼其督脈胞門亦由之而不閉胎斯墮也胎墮必腰痛者腰腧命門皆督脈之所厯胎又繫于命門故也觀牝獸之䕶胎則可推其所慎矣牝牡交合有節懐胎之後牡獸近身則蹄而逺之是以交而必孕孕而必育者由交合之有節也懐姙而不逺慾即幸不墮生子亦必脆弱多疾痘疹亦多險逆皆滛火煆煉所致觀丹溪曰虚曰熱抑豈無其所自乎予故掲而告諸保孕者當知其所慎重至於藥劑則虚熱二字為之本矣是以八珍阿膠杜仲黄茋黄栢黄芩桑寄生香附為安胎之妙者得非治其本歟凡保胎當理脾胃脾胃為倉廩五臟六腑之所稟受胚胎由之以滋養也胃屬陽明陽明者衝任之長也一方鯉魚二斤者一尾粳米一升用鹽醬和煮食之甚善一月食三次為佳芎藭補中湯懐姙血氣不能榮養以致半産早能服此預先補之不致于墮乾薑煨阿膠炒芎藭五味子各五分黄茋炒川歸白术炒杜仲炒白芍藥各一錢人參木香甘草炙各五分右水煎服虚寒所宜千金保孕湯氣血不足每至三四月而墮當預服之人參黄茋白术川歸甘草黄芩杜仲桑寄生川續㫁白芍藥砂仁加稬米五十粒水煎食逺服若氣痞悶不舒加厚朴蘇梗若腹疼加熟艾葉香附見血下加升麻地榆椿根白皮阿膠醋附丸治數墮胎者此藥甚妙亦治崩漏帶下積聚癥瘕臍腹疞痛香附子擦去毛净用好醋煮透焙乾為末仍以醋打糊為丸梧子大每服三五十丸米飲下脈經曰婦人懐胎一月之時足厥隂脈養之二月足少陽養三月手心主脈養四月手少陽脈養五月足太隂脈養六月足陽明脈養七月手太隂脈養八月手陽明脈養九月足少隂脈養十月足太陽脈養諸隂陽脈各養三十日手少隂太陽不養者上為乳汁下主月水也值養胎之經者不可針灸犯之必墮胎胎不長良方曰姙娠而胎不長者因有宿疾或因失調以致臟腑虧損氣血虚弱而胎不長也當治其疾疚益其氣血則胎自長矣生生子曰曽見一宦婦毎姙至五六月則墮如此者三次胎甚瘦小詢知少時患哮嗽因而背駝軀亦矮小因腹中不舒其胎不能長后治其哮嗽再孕乃不墮竟足月而産一子此固偶然則良方宿疾之説似不誣矣薛氏曰一婦胎六月體倦懶食面黄晡熱而胎不長因勞欲墜此脾氣不足也用八珍湯倍加參术茯苓三十餘劑脾胃漸徤胎安而長矣生生子曰昔在西吳有張氏婦年二十三孕適三月迎予診之其脈兩尺皆濇左手短弱右闗不充據脈濇不當有姙而其夫云向已受胎者二俱彌月而産體皆不完始無舌次無水火門户産下隨死而無生氣今第三孕矣心憂之以翁治法多奇思幸投劑而保全之也予以脈參之多為神志不足因處一方曰壯神益志保孕湯即語之曰是方毎月可服十帖過八月則不必服矣彼欣然從而服之足月産一女形全而氣壯及再有姙未服藥雖生一女完矣而頭面為白膜遮蔽隠隠僅見耳目口鼻而亦隨死也後又孕適予歸省其婦心憂失措夫諭之曰無恐前保孕方在向以未服乃致乖舛今可亟服也照方服如前至期生一子而無恙舉家以此方為神録而置之香火堂中尸祝之此亦愚見之偶中者人以旋服旋效而遂神之也亦其家為富而甚不仁丘里啣之當其産而偵之其産而怪以為作惡之報迨産子而無恙即以鄙為保孕之神至今𫝊頌不衰也予因記其事并戒夫人之為惡者壯神益志保孕湯茯神當歸酸棗仁人參逺志山藥黄茋鹿角膠各一錢白术二錢砂仁三分甘草四分加圎眼肉五枚棗二枚水煎服黄茋湯治姙娠不長更安胎和氣黄茋炒白术炒陳皮麥冬白茯苓前胡人參各五分川芎甘草炒三分右薑棗水煎服集驗方用鯉魚長尺許者如食法整理飲其汁則胎漸大而長矣然亦須每月服數次為妙墮胎後血下不止墮胎後復損經脈而下血不止甚則煩悶致死皆以調補胃氣為主薛氏曰一姙婦墮胎昏憒不時吐痰自用養血化痰之劑昏憒不省自汗發搐痰涎湧出彼以為中風欲用祛風化痰予曰此屬脾氣虚寒所致遂用十全大補湯加炮薑二十餘劑尋愈墮胎下血煩滿寒熱狂悶鎊鹿角屑為末每服三錢水調下日三服墮胎下血腹痛阿膠炒一兩艾葉五錢水煎服補中益氣湯加鹿角膠一錢臨服入童便半酒杯立止人參黄茋湯治小産氣虚血下不止人參黄茋炒當歸白术炒白芍炒艾葉各一錢阿膠炒二錢水煎服未足月欲産姙娠未足月而痛欲産者知母丸佳氣血不足者芎歸補中湯倍加知母或八珍湯内加之血熱所宜薛氏曰一姙婦八月胎欲墜如産卧乆少安日晡益其此氣血虚弱朝用補中益氣湯加茯苓半夏隨愈更以八珍湯調理而安芎歸補中湯治氣血虛而欲産艾葉代薑阿膠炒川芎五味子炒杵川歸白术炒黄茋炒人參芍藥炒各錢甘草炙五分杜仲一錢水煎作二次痛知母丸十月未足而痛如産兼治産難及子煩知母為末蜜丸梧子大米飲下三十丸或酒下又方月數未足而似欲産腹痛槐子蒲黄等分為末蜜丸梧子大酒吞三十丸痛止為度蒲黄一味以井水調服亦佳千金方治月未足而欲産菖蒲根搗汁一二升灌下本草云菖蒲治胎動不安下血過期不産姙娠月足而過期不産者當補血行滯羅先生以四物湯加香附桃仁枳殻縮砂紫蘇水煎服之數帖即生姙娠咳嗽夫肺内主氣外主皮毛腠理不密寒邪乘之則咳嗽秋則肺受之冬則腎受之春則肝受之夏則心受之其嗽不已則𫝊于臟腑姙娠病乆不已則傷胎也薛氏曰若秋間風邪傷肺用金沸草散夏火邪尅金用人參平肺散冬寒邪傷肺用人參敗毒散春風邪傷肺用參蘇飲若脾肺氣虚用六君子芎歸桔梗若血虚桑皮杏仁桔梗腎火上炎用六味丸加五味子煎服脾胃氣虚風寒所傷補中益氣湯加桑皮杏仁桔梗又治一姙婦氣喘痰甚諸藥不效素有帶下始于目下有浮氣兩月其面亦然此氣虚而有痰飲也用六味丸料數劑而愈一姙婦嗽則小便出此肺氣不足腎氣虧損不能司攝用補中益氣湯以培土金六味丸加五味以生腎氣而安一姙婦咳嗽其痰上湧日五六碗許諸藥不應予以為此水泛為痰用六味丸料及四君子湯各一劑稍愈數帖而安一姙婦因怒咳嗽吐痰兩脇作痛此肝火傷肺金以小柴胡湯加山梔枳殻白术茯苓治之而愈但欲作嘔此肝侮脾也六君子加柴胡升麻而痊桔梗散治風寒咳嗽喘急不食天冬去心赤茯苓各一錢桑皮桔梗炒紫蘇貝母人參各五分麻黄去節炙甘草各三分右加薑水煎服馬兠鈴散治咳嗽氣喘馬兠鈴苦梗人參甘草貝母各五分紫蘇一錢橘紅大腹皮桑皮各一錢五味子十一粒右薑水煎服百合散咳嗽胸膈煩悶川百合紫苑麥冬苦梗桑皮各五分甘草三分竹茹二分加薑水煎服姙娠傷寒涎多咳嗽知母杏仁天冬桑皮各五分薑水煎服加味參蘇飲治項背拘急鼻塞頭眩時發寒熱咳嗽即參蘇飲加五味子杏仁是也姙娠吐血衂血姙娠吐血衂血由七情臟腑所傷氣逆于上致血上溢不止心悶甚者多死或墮胎也宜用局方必勝散薛氏曰若肝經怒火先用小柴胡山梔生地次用前藥合四物後用加味逍遥散若肝經風熱防風子芩丸心經有熱硃砂安神丸心氣不足茯苓補心湯思慮傷心妙香散胃經有火犀角地黄湯膏粱積熱加味清胃散肺經有火黄芩清肺飲因氣鬱滯紫蘇飲子氣不攝血用補中益氣湯腎經虚火六味地黄丸紫蘇飲治姙娠失調胎氣不安上攻作痛或氣逆失血方在胎上逼卷中一姙婦因怒失血兩脇脹痛小便淋濇此怒而血蓄于上隨火出也用小柴胡合四物四帖血止用六君子安胎飲調理全安必勝散治男子婦人血妄流溢或吐咳衂血並妙小薊連枝用人參蒲黄炒熟地川歸川芎烏梅去核各一錢半水煎服黄芩清肺飲治姙娠肺熱吐衂及治肺熱小便不利黄芩炒山梔炒各一錢鹽豉二十粒水煎服加味清胃散治醇酒厚味唇齒作痛或齒齦潰爛并頭面頸項疼痛及姙娠吐衂川歸黄連炒一錢半生地丹皮各一錢犀角連翹一錢二分升麻二錢甘草五分右水煎服便秘加大黄子煩良方曰姙娠苦煩悶者以四月受少隂君火以養精六月受少陽相火以養氣若母心驚膽寒多有是症産寳云是心肺虚熱或痰積于胸若三月而煩者吐涎惡食大凡停痰積飲寒熱相搏吐甚則胎動不安薛氏曰内熱子煩用竹葉湯氣滯用紫蘇飲痰滯用二陳加白术黄芩枳殻氣鬱用分氣飲加川芎脾胃虚弱用六君子加紫蘇山梔竹葉湯姙娠心驚膽怯終日煩悶名曰子煩白茯苓二錢防風黄芩麥冬各一錢竹葉十片水煎服一方有知母人參散熱乘心脾煩熱乾渇人參麥冬赤茯苓地骨皮黄芩炒乾葛甘草五分犀角鎊各一錢水煎服竹茹湯姙娠煩躁或胎不安淡竹茹一兩水煎服之知母丸知母一味炒為末棗肉丸如彈子大每服一丸人參湯下分氣飲脾胃虚弱氣血不和胸膈不利或痰氣喘嗽飲食少思陳皮茯苓半夏桔梗大腹皮蘇葉白术炒枳殻炒山梔炒各一錢甘草炙五分右加薑棗水煎服治子煩口乾不得卧用黄連為末毎服一錢米飲調下赤水元珠卷二十一
