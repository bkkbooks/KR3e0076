body:
  text: 赤水元珠卷二十一明孫一奎撰婦人門小便出血良方曰心主於血通行經絡循環臟腑得寒則凝澀得熱則妄行失其常道則溢滲於脬則小便出血也薛氏曰前症肝經血熱者加味逍遙散怒氣血傷者同治調送血餘灰妙若肝經風熱用前散送子芩丸氣血俱虛者八珍散送血餘灰膏梁積熱者清胃散加槐花甘草風熱傷胃者四君子加防風枳壳胃虛不能攝血者補中益氣鬱結傷脾不能攝血者濟生歸脾湯一婦小便出血服四物蒲黃之類更加發熱吐痰加芩蓮之類又飲食少思虛症蜂起肝脈弦而數脾脈弦而緩此因肝經風熱為沉隂之劑脾傷不能統血發生諸臟而然也用補中益氣六味地黃丸而痊蒲黃鹿茸散治勞損尿血發熱內熱或寒熱往來口乾作渴蒲黃炒鹿茸炙當歸生地葵子炒續斷酒炒各等分為末每服二錢酒調日三服髮灰散起居所傷小便尿血或忍尿脬轉臍下急痛小便不通又治肺疽心衄內崩吐血舌上出血俱妙本草云能療瘀血通關膈利水道破癥瘕癰腫狐疝刺痛疰雜瘡療脬轉通大小便止咳嗽鼻衄右每服二錢米醋湯調下生地黃散血熱尿血生地二錢黃芩炒五錢阿膠炒側柏葉炒各一錢右水煎食前服當歸散血分熱尿血川歸羚羊角屑赤芍各五分刺薊葉一錢生地一錢右水煎服又方治血分有熱生地黃搗汁每用一小盞日三服又方治血分熱尿血用炒蒲黃末每以二錢溫酒下鹿角膠散鹿角膠炒為末二兩作二服長流水調妙隂腫良方曰隂腫因胞絡素虛風邪客之乘于隂部血氣相搏故也薛氏曰氣血虛弱補中益氣湯肝經濕熱龍膽瀉肝湯又當與隂癢隂挺隂冷相參而治又云一婦隂中腫悶小便澀滯兩脅作腫內熱晡熱月經不調時或寒熱此因肝經鬱怒元氣下陷濕熱壅滯朝用歸脾湯加柴胡升麻解鬱結補脾氣升元氣夕用加味逍遙散清肝火生肺血除濕熱各數劑諸症悉愈又用四君芎歸丹皮調補肝脾而經水如期菖蒲散治月水澀滯隂户腫痛菖蒲當歸炒各一兩秦芁二兩右每服五錢入葱白水煎服白礬散治隂腫堅痛白礬五錢甘草五分大黃一兩右為末水調如棗大綿裹內隂中一日兩換以愈為度隂癢良方曰隂癢為三蟲在腸胃之間因臟虛而蝕輕則隂中癢甚則隂中痛也生生子曰前症亦有虛者古人有用人參一兩煎湯服之而愈豫曽治一宦婦年草一疹出未彌月而犯房事熱因下陷隂中癢甚每一發神魂颼然兩手抓壁口中咬物鮮血淋漓爪脫肉破而不遑顧七日肌肉如削諸洗插方厯試無功作蟲治尤劇欲懸梁求死豫為籌之乃虛熱陷入至隂當從隂引陽以黃茋六錢甘草二錢防風一錢柴胡二錢水煎食前服之其疾頓止此引金伐木之法也薛氏曰前症屬肝經所化當用龍膽瀉肝湯逍遙散以主其內外以桃仁研膏和雄黃末或雞肝內隂中以制其蟲一婦胸膈不利內熱作渴飲食不甘肢體倦怠隂中悶癢小便赤澀此鬱怒傷肝脾所致用歸脾湯加山梔而愈復因怒患處并小腹脹痛用小柴胡加芎歸山梔芍藥痛止用山梔入逍遙散而痊又因勞役患處腫脹小便仍澀用補中益氣加山梔茯苓丹皮而瘳一方新桃葉搗綿裹內隂中一日三易大黃散治隂癢大黃微炒黃芩黃茋炙各五兩赤芍𤣥參蛇床子山茱萸為末酒調服二錢又方杏仁燒灰乘熱綿裹納隂中日二易之又詩曰玉户生瘡時痛癢皆因房色損其元黃葱水洗二三次杏仁燒灰油調痊加麝香尤妙又方鯽魚膽搽之妙隂挺下脫良方曰婦人隂挺下脫或因􅀈絡傷損或因子臟虛冷或因分娩用力所致薛氏曰前症當升補元氣為主若肝脾鬱結氣虛下陷用補中益氣湯若肝火濕熱小便澀滯龍膽瀉肝湯一婦隂中突出如菌四圍腫痛小便頻數內熱晡熱似癢似痛小便重墜此肝脾鬱結蓋肝火濕熱而腫痛脾虛下陷而重墜也先以補中益氣加山梔茯苓車前子青皮以清脾火升肝氣更以加味歸脾湯調理脾鬱外以生猪脂和藜蘆末塗之而收一婦隂中挺出五寸許悶痛重墜水出淋漓小便澀滯夕與龍膽瀉肝湯分利濕熱朝與補中益氣湯升補脾氣諸症漸愈再與歸脾湯加山梔茯苓川芎黃柏間服調理而愈後因勞役或怒氣下部濕癢小水不利仍用前藥即愈一方治隂挺下脫當歸黃芩各二兩牡蠣二兩半蝟皮一兩炙赤芍兩半右為末每以二錢食前溫酒調下米飲亦可治隂挺長出玉户數寸者疼痛不可忍飲食不進用前方治其內仍以大黃山茨姑石羔牡蠣乳香為細末水調揣熟揑作條子如中指大隂乾插入玉户其痛即止隂瘡薛氏曰此症乃七情鬱火傷損肝脾濕熱下流其外症隂中突出如蛇如菌如雞冠或生蟲濕癢或潰爛出水或腫悶墜痛其內症體倦內熱經候不調或飲食無味晡熱發熱或胸脅不利小便痞脹或赤白帶下小水淋澀其治法腫痛者四物加柴胡丹皮山梔膽草濕癢者歸脾湯加柴胡山梔丹皮淋澀者龍膽瀉肝湯加白术丹皮潰腐者逍遙散山梔川芎腫悶墜痛者補中益氣湯加山梔丹皮佐以外治之法一婦素性急隂內痛小便赤澀怒而益甚或發熱或寒熱此肝經濕熱所致用芎歸炒梔柴胡苓术丹皮澤瀉炒芍車前炒連甘草數劑漸愈乃去黃連澤瀉又數劑全愈一婦臍腹上下并玉户遍生濕瘡狀如馬瓜瘡他處並無熱癢而痛大小便澀出黃汁食減身面微腫衆作惡瘡治反劇愈痛急令洗去乃用馬齒莧四兩青黛一兩同搗爛敷瘡上即時癢止痛定而熱亦退仍服八政散日三服分散客熱每敷藥僅得一時久藥已乾燥再塗新濕藥又安凡如此二日僅減三之一五日減三之二自此二十日全安緣此婦嗜酒貪啖魚蟹發風之物而中下焦蓄風熱之毒氣當作腸癰內痔等疾后當禁酒及發毒之物一方治玉户生瘡杏仁燒存性雄黃明礬各五錢麝香一錢二分右為末敷之又方飛丹研極細生桐油調搽二三日效交接輒血出痛薛氏曰一婦每交接便血出作痛此肝火動脾而不能攝血用補中益氣濟生歸脾二湯而愈若出血過多而見他症但用前藥調補肝脾千金方療交接血出伏龍肝桂心等分為末每服一錢酒調下胎前惡阻及痰逆不食惡阻者謂嘔吐惡心頭眩惡食擇食是也胍息和順但覺肢體沉重頭目昏眩好食醎酸甚者或作寒熱心中憤悶嘔吐痰水不能支持古謂之子病由胃氣怯弱中脘停痰之所致也薛氏曰脾胃虛弱嘔吐不食用茯苓半夏湯蓋半夏乃健脾化痰滯之主藥也痰涎壅滯飲食少思胎氣不安為必用之藥須倍加白术然半夏白术陳皮砂仁善能安胎氣健脾胃也豫嘗用之驗甚若兼氣惱更加柴胡因風寒須用參蘇飲生生子曰前症亦有因火者故丹溪用抑青丸前人亦有用濟生竹茹湯者豫厯厯見為火症者多寒者兼而有之亦有愈治而愈逆者便當勿藥待之俟胃氣和當自瘳矣茯苓半夏湯妊娠脾胃虛弱飲食不化嘔吐不止半夏泡炒黃陳皮各一錢白茯苓二錢砂仁炒一錢炙甘草五分薑棗烏梅水煎服二帖後用茯苓丸茯苓丸妊娠煩悶頭暈聞食吐逆或胸腹痞悶赤茯苓人參桂心炮薑半夏泡炒黃橘紅各一兩白术炒葛根甘草炙枳殼麩炒各二兩右蜜丸梧子大每服五十丸米飲下日三服白术湯胃虛惡阻吐水甚至十餘日粥湯不入白术炒一錢人參五分丁香炙甘草各二分右薑水煎服保生湯妊娠惡阻少食嘔吐或兼吐瀉作渴人參一錢炙甘草白术炒香附烏梅橘紅各五分右薑水煎服仲景乾薑人參半夏丸治妊娠嘔吐不止乾薑人參半夏等分為末薑汁糊丸梧子大米飲下十日三服歸原散惡阻嘔吐不止頭痛全不入食諸藥無效人參甘草川芎當歸芍藥丁香各五錢茯苓白术陳皮各一兩半桔梗炒枳殼炒各二兩半半夏泡炒黃一兩右每服五錢加薑六片棗一枚水煎服已上五方治寒痰惡阻之劑也竹茹湯惡阻嘔吐不下食青竹茹橘紅各二兩生薑茯苓各四兩半夏五兩右水六升煮取二升半分三服人參橘皮湯惡阻嘔吐痰水人參橘皮白术麥冬各一兩甘草三錢厚朴製白茯苓各五錢右每服五錢加青竹茹一錢生薑三片水煎服妊娠嘔吐痰水不食生蘆根一兩橘紅七錢生薑一兩檳榔三錢右作三次水煎服妊娠惡食心中煩憒熱悶嘔吐竹茹麥冬各二兩前胡二兩橘紅一兩蘆根一握水一大升煮半升作二次食前服已上四方治熱痰惡阻之劑也羅太無半夏茯苓湯惡阻心中憒悶頭目眩暈四肢怠倦百莭煩痛胸膈痰逆嘔吐惡心嫌聞食氣好噉酸醎多卧少起全不進食先服此湯次服前茯苓丸半夏泡炒黃一兩二錢赤茯苓熟地黃各七錢半芍藥旋覆花千金方無此而有細辛紫蘇橘紅人參各半兩川芎桔梗甘草各五錢右每服五錢薑七片水煎空心服若有客熱煩渴口瘡去橘紅細辛加前胡知母七錢半若腹冷下利去地黃加炒桂心五錢若胃中虛熱大便祕小便赤澀加大黃七錢半去地黃加黃芩二錢半胎動不安妊娠胎動或飲食起居不節或衝任經虛或因過酒房室擊觸跌撲損動臟腑或脾氣虛弱誤服藥餌或感冒風寒當各推其因而施治之有因母病而胎動者但治其母而胎自安有胎不堅固動及母疾但安其胎而母自愈面赤舌青其胎已死面青舌赤吐沫其母必死唇口色青兩邉沫出子母俱死也薛氏曰前證胎氣鬱滯者紫蘇飲脾氣虛弱者六君子湯加紫蘇枳殼鬱結傷脾者歸脾湯加柴梔鬱怒傷肝脾者四七湯加芎歸怒動肝火者加味小柴胡湯若胎已死急用平胃散加朴硝腐化之丹溪曰産前當清熱養血因火動胎逆上喘急者以條芩香附之類為末調下墮胎乃氣虛血虛血熱所致懷妊嗜物乃一臟之虛黃芩安胎妙藥乃上中二焦之劑能降火下行加白术為安胎聖藥也俗不知以為寒而不取用殊不知産前宜清熱令血循經而不妄行故能養胎又曰將臨月胎熱以三補丸加炒香附白芍􅔻餅為丸服抑熱以三補丸以地黃膏為丸孕至八九個月必用順氣須枳殼紫蘇梗固胎方法川芎地黃黃芩各五分歸身人參白芍陳皮各錢白术一錢半甘草三分黃柏黃連俱少許桑寄生一錢右每服五六錢加糯米五十粒水煎服血虛不安者加阿膠腹痛者加砂仁能止痛安胎行氣故也一方無黃連名固孕丸仲景云妊娠宜常服當歸散當歸黃芩芍藥芎藭各一兩白术半斤右為末酒調服方寸匕日二服常服之即易産胎無苦疾産後百病悉主之肘後方治胎動不安取苧根如足大指者一尺水煎服一方有生薑五片丹溪云苧根大能補隂血而行滯血立效散治胎動不安如重物所墜冷如氷即佛手散也縮砂散治胎動不安墮在須臾痛不可忍神效砂仁連殼炒黑為末每服二錢酒下鈎藤湯妊娠胎動腹痛面青冷汗氣欲絶者鈎藤鈎當歸茯神去木人參各一錢苦梗一錢半桑寄生一錢右水煎服煩熱者加石膏黃茋湯氣虛胎動腹痛下水糯米一合炙黃茋川芎各一兩水煎分三服順氣飲子産前服之安胎紫蘇葉木香煨人參草豆蔲茯苓各一兩炙甘草五錢大腹子一兩氣虛者去之右每服三五錢加苧根三寸糯米三十粒水煎服安胎寄生湯妊娠下血或胎不安或腰腹痛桑寄生白术各五分茯苓四分甘草一錢水煎服安胎飲體倦惡食或胎動腹痛或下血發熱腰痛炙甘草茯苓川歸熟地川芎白术黃茋白芍炒半夏泡阿膠炒地榆各五分加薑棗水煎服又方好銀煮取水入葱白作羮食之妙生生子曰按良方云妊娠婦人倘氣血虛弱無以滋養其胎終不能成也宜下之以免其禍若胃氣壯實衝任榮和如魚之處淵得其所也宜必盡方技以補養之庶無所誤設因病而胎不能安者不得不下之藥劑亦須謹慎桂心散妊娠因病而胎不能安者以此下之桂心瓜蔞牛膝􅜰麥各五分歸尾一錢右水煎服又方牛膝一兩酒煎食前空心服下又方生雞子一枚鹽三錢攪勻服之立下佛手散更妙凡胎死者即下生者即安胎漏下血附卒然下血下如豆汁良方曰妊娠經水時下由衝任氣虛不能約制蓋心小腸二經相為表裏上為乳汁下為月水故妊娠經水壅之以養胎蓄之以為乳若經水時下名曰胞漏血盡則斃矣丹溪曰胎漏有因氣虛者有因血虛者有因血熱者不可不察也薛氏曰前症有風熱者以防風黃芩丸若因血熱加味逍遙散血虛二黃散血去太多八珍湯未應補中益氣湯若因肝火用柴胡山梔散脾虛加味歸脾湯若因事下血作痛八珍湯加阿膠熟艾脾胃虛者補中益氣湯加五味子下陷者倍升麻柴胡晡熱內熱用逍遙散亦有血氣盛養胎之外而有餘者不必服藥卒然下血良方謂冷熱不調七情失宜氣血不和所致若傷於胎則痛血去多則墮矣薛氏云前症氣怒者小柴胡湯風熱用一味防風丸血熱用一味子芩丸脾氣虛六君子湯中氣下陷補中益氣湯一婦妊娠六月每怒下血甚至寒熱頭痛脅脹腹痛作嘔少食豫謂寒熱頭痛乃肝火上沖脅脹腹痛乃肝氣不行作嘔食少乃肝侮脾胃下血乃肝火血熱用小柴胡加芍藥炒黑山梔茯苓白术而愈訶子能止胎漏及胎動欲生脹悶氣喘安胎散治卒然腰痛下血熟地艾葉白芍炒川芎黃茋炒川歸阿膠炒甘草炙地榆各五分加薑棗水煎服子芩丸治肝經有熱妄行用細條芩沉實者炒為末每服一錢以鐡稱鎚燒赤淬酒熱調服若脾胃虛者不宜用防風丸治肝經有風血因妄動而不歸經防風為末每服一錢白湯調下防風黃芩丸治肝經有風熱致血崩便血尿血用條芩炒焦防風等分為末酒糊丸梧子大每服三五十丸食前米飲或酒下二黃散治胎漏下血或內熱晡熱或頭痛頭暈煩躁作渴或脅肋脹痛等症生地熟地為末每用三錢煎白术枳殼湯調服二黃杵膏為丸尤妙庶不枯稿而有力也芎歸膠艾湯妊娠下血腹中痛為胞阻以此安之艾葉阿膠炒川芎當歸各三兩甘草一兩右細切以水八升煎取三升內膠溶盡分三服立聖散治妊娠下血不止雞肝三枚用酒一升煮熟頓食之大效阿膠散妊娠無故下血不止阿膠三兩炒為末酒一升半煎令溶一服愈又方治血熱下血及胎漏下血不止阿膠二兩為末生地黃半斤搗取汁以清酒三升絞汁分三服又方治胎漏下血不止胞乾即死宜急治之生地黃汁一升陳酒五合同煎三五沸溫三服以止為度枳殼湯治虛熱胎漏下血或因事下血枳殼黃芩各半兩白术一兩水煎食前分三服本事方治胎下血不止桃奴桃樹上乾不落桃子是也燒存性為末水調服妙妊娠胎漏下黃汁或如豆汁白漿或如赤豆汁豫厯見此症不早治其胎必墮大全方治妊娠忽然下黃汁如膠或如豆汁胎動腹痛乃氣虛也糯米五升黃茋六兩水七升煎取二升分四服薛氏云若肝脾濕熱用升陽除濕湯肝脾風熱加味逍遙散肝脾鬱怒加味歸脾湯脾胃氣虛用錢氏白术散若脾氣下陷補中益氣湯風入腸胃用胃風湯東垣升陽除濕湯治婦人女子漏下惡血月事不調或暴崩不止多下水漿之物皆由飲食失節或勞傷形體或素患心氣不足因飲食勞倦致令心火乘脾其脈緩而弦急按之洪大皆脾土受邪也柴胡羌活蒼术黃茋炒各錢半防風升麻甘草炙藁本各一錢蔓荆子七分獨活當歸各五分右水煎食前服胃風湯治風邪乘虛客於腸胃水穀不化泄瀉下注腹脹虛滿腸鳴作痛及腸胃虛熱下如豆汁或瘀血日夜無度人參白术茯苓川芎川歸白芍桂皮粟米右水煎食逺服銀苧酒治妊娠下黃汁或如赤豆汁苧根去黑皮好銀各一斤水九升煮取四升每服入酒半升煎分二服脈經曰婦人懷軀六月七月暴下斗餘水其胎必倚而墮此非時孤漿預下也胎漏下水乃徐徐而下今暴下而多故知胎墮胎上逼子懸也妊娠將養如法則血氣調和胎得其所而産亦易否則胎動氣逆上逼臨産亦難甚至危矣陳良甫云治一婦人有孕七個月逺歸忽然胎上沖心而痛坐卧不安兩醫治之無效遂說胎已死矣用萆麻子研爛加麝香貼臍中以下之命在垂亡召陳診視兩尺脈絶他脈平和陳問二醫作何症治答曰死胎也陳曰何以知之曰兩尺脈絶是以知之陳曰否此子懸也若是胎死却有辨處面赤舌青子死母活面青舌赤吐沫母死子活唇口俱青母子俱死今面不赤舌不青其子未死是胎上逼心宜以紫蘇飲治之至十服其胎遂不逼而下安矣紫蘇飲治妊娠胎氣不和逼上脹滿疼痛謂之子懸兼治臨産驚恐氣結連日不下紫蘇葉一兩大腹皮人參川芎陳皮白芍各五錢當歸三錢甘草一錢右銼分三服每服加薑四片葱白七寸水煎至七分空心服曽有纍日産不下遍服催生藥不效此必坐草少早心存一㸃畏懼氣結而不行非不順也素問云恐則氣下蓋恐則精神怯怯則上焦閉閉則氣還還則下焦脹氣乃不行得此藥一服便産及治妊娠六七月子懸每用此數數有驗不十服胎便近下而安大全方治胎上逼煩悶併治胎動困篤葱白二七莖濃煮汁飲之若胎未死則安已死即下如未效再服若唇口青黑手足厥冷須佐以當歸湯此本草云葱白通陽氣安胎方神妙脈浮滑者宜之當歸湯治胎動煩躁或生理不順唇口青黑手足厥泠人參當歸阿膠炒炙甘草各一錢葱根連白一握右水四碗煎四味減半去渣入葱再煎至一碗分二服薛氏云一妊婦每因恚怒其胎上逼左關脈弦洪乃肝火內動用小柴胡加茯苓枳殼山梔而愈但體倦不食用六君子調養脾土加柴胡枳殼調和肝氣乃瘥又一妊婦胎上逼胸滿噯氣飲食少思此脾氣鬱滯用紫蘇飲頓安又用四君子加枳殼柴胡山梔而瘥大聖散治妊娠怯悸夢驚心腹脹滿連臍急痛白茯苓川芎麥冬黃茋炒川歸各一錢人參炙甘草木香各五分加生薑水煎服白术湯妊娠遍身痛或沖心欲死不能飲食白术五兩黃芩二兩芍藥四兩右水六升煮取二升半分三服緣胎有水致痛兼易産妊娠心痛腹痛妊娠心腹痛或宿有冷疾或新觸風寒或痰飲相摶若痛傷胞絡必至動胎甚則傷墮妊娠卒心痛氣欲絶川芎當歸茯苓厚朴制各一錢水煎服當歸芍藥湯妊娠心腹急痛或去血過多而眩暈白芍炒當歸茯苓白术炒澤瀉各一錢川芎二錢右水煎服阿膠散治胎動腹痛白茯苓白术炒川芎阿膠炒各一錢當歸陳皮各二錢甘草炒三分右薑棗水煎服熟艾湯治妊娠心腹痛或吐血衄血熟艾如拳大水煮服之效中惡亦妙有癥者宜去癥凡胎動多在當臍今動在臍上故知是癥也此症宜以仲景桂枝茯苓丸主之桂枝茯苓丸妊娠腹痛不能忍或偶有所傷胎動不安命將絶者砂仁不拘多少連皮炒黑色或單用仁炒為末熱酒調下二錢不飲酒者米飲下但覺腹中熱胎已安矣懸命須臾者以砂仁湯吞桂枝茯苓丸又名奪命丸專治婦人小産下血子死腹中其婦增寒手指唇口爪甲青白面色黃黑胎上搶心悶絶欲死冷汗自出或食物或誤食草藥傷動胎氣下血不止胎或未損者服此即安胎已死者服此即下腐爛者亦能取下此方原係異𫝊丹溪亦稱其神此即仲景桂枝茯苓丸但用淡醋湯嚼下耳桂枝茯苓牡丹皮桃仁去皮尖赤芍藥右各等分蜜丸彈子大淡醋湯嚼下一丸不知漸加至三丸妊娠腰背痛腎主腰胎繫于腰痛甚者或因勞役傷損則胎墮也薛氏曰若外邪所傷用獨活寄生湯勞傷元氣八珍湯杜仲砂仁膠艾脾腎不足以前藥加白术補骨脂氣血鬱滯用紫蘇飲加桔梗枳殼肝火所動以小柴胡湯加白术枳殼山梔肝脾鬱結用歸脾湯加柴胡枳殼一妊婦頸項強直腰背作痛此膀胱經風邪所致用拔萃羌活湯一劑而愈又用獨活寄生湯及八珍湯以祛邪固本而痊通氣散腎虛腰痛神效破故紙炒為末空心每服二錢嚼胡桃肉半個以溫酒下杜仲丸治妊娠腰背痛杜仲炒川續斷酒浸各等分為末煮棗肉為丸梧子大每服七十丸酒或米飲下膠艾湯治腰腹疼痛胎動欲落即前妊娠下血安胎飲是也熟地艾葉白芍川芎黃茋阿膠川歸甘草炒各等分加薑棗水煎服獨活寄生湯治足三隂虛風濕所侵腰膝厯節作痛獨活桑寄生續斷酒炒杜仲薑汁炒細辛秦芁牛膝酒炒茯苓白芍炒桂心川芎防風人參熟地川歸粉草炙各五分右水煎服一婦苦腰痛數年不愈用白术一味大劑服不三月而痊乃胃氣虛閉之症白术能利腰臍之血故安胎而治痛也拔萃羌活勝濕湯治頭疼脊痛腰似折項似拔羌活獨活各一錢藁本防風炙甘草各五分川芎蔓荆子各二分右水煎服如身重腰沉沉然是濕熱也加黃柏一錢附子五分蒼术二錢妊娠小腹痛薛氏曰一妊婦小腹作痛其胎不安氣攻左右或時逆上小便不利用小柴胡湯加青皮山梔清肝火而愈後因怒小腹脹滿小便不利水道重墜胎仍不安此亦肝木熾盛所致用龍膽瀉肝湯一劑諸症頓愈乃以四君子加柴胡升麻以培脾土而安龍膽瀉肝湯治肝經濕熱兩拗腫痛或小腹痛脅痛小便澀滯等症龍膽草酒拌炒黃澤瀉各一錢木通生地川歸車前子炒山梔炒黃芩炒甘草各五分水煎服阿膠散嚴氏名膠艾湯不問妊娠月數深淺或顛仆或因毒藥胎動不安腰疼腹痛搶心短氣熟地艾葉白芍川芎黃茋阿膠川歸甘草炙各一兩右銼每服五錢入薑棗水煎服金匱方無黃茋妊娠心腹脹滿薛氏曰若外感風寒內傷飲食用藿香正氣散若食傷脾胃用六君子湯若陽氣壅滯用紫蘇飲一妊婦飲食停滯心腹脹滿或用人參養胃湯加山查青皮枳殼其脹益甚其胎上攻惡心不食右關脈浮大按之則弦此脾土不足肝木所侮用六君子加升麻柴胡而愈後小腹痞悶用補中益氣湯升舉脾氣乃瘥妊娠數墮胎夫胎乃陽施隂化營衛調和經水完全十月而産若血氣虛損不能養胎所以數墮也凡妊婦腰痛多致墮胎薛氏曰丹溪云陽施隂化胎孕乃成血氣虛乏不能榮養其胎則墜譬如枝枯則果落藤痿則花墜嘗治賈氏婦每有妊至三月前後必墜診其脈左右大而無力重則澀知其血虛也補其中氣使血自榮時正初夏教以濃煎白术湯下黃芩末二錢與數十帖得保而生因而思之墮於內熱而虛者於理為多曰熱曰虛蓋妊至三月上屬相火所以易墮不然何以黃芩熟艾阿膠等為安胎之妙如此也大抵治法須審某月屬某經育養而藥之生生子曰胎猶瓜也瓜生於藤藤肥而瓜壯未熟而凋者由藤稿而風搖也胎藏母腹繫于命門命門者督脈之所循也又衝任二脈為血之海妊婦而經不行者血蓄以養胎也足月而生者猶瓜熟而蒂落也茍內無所傷外無所感何墮之有衝任督三脈一宗衝脈由氣衝而行足少隂任脈起於胞門子户由㑹隂而行腹督脈繫廷孔由㑹隂而行背厯長强循腰腧命門而上巔驗今之墮胎者茍非衝任之不足必由色欲之縱恣淫火一動則搖撼其督脈胞門亦由之而不閉胎斯墮也胎墮必腰痛者腰腧命門皆督脈之所厯胎又繫于命門故也觀牝獸之護胎則可推其所慎矣牝牡交合有節懷胎之後牡獸近身則蹄而逺之是以交而必孕孕而必育者由交合之有節也懷妊而不逺欲即幸不墮生子亦必脆弱多疾痘疹亦多險逆皆淫火煆煉所致觀丹溪曰虛曰熱抑豈無其所自乎豫故揭而告諸保孕者當知其所慎重至於藥劑則虛熱二字為之本矣是以八珍阿膠杜仲黃茋黃柏黃芩桑寄生香附為安胎之妙者得非治其本歟凡保胎當理脾胃脾胃為倉廩五臟六腑之所稟受胚胎由之以滋養也胃屬陽明陽明者衝任之長也一方鯉魚二斤者一尾粳米一升用鹽醬和煮食之甚善一月食三次為佳芎藭補中湯懷妊血氣不能榮養以致半産早能服此預先補之不致于墮乾薑煨阿膠炒芎藭五味子各五分黃茋炒川歸白术炒杜仲炒白芍藥各一錢人參木香甘草炙各五分右水煎服虛寒所宜千金保孕湯氣血不足每至三四月而墮當預服之人參黃茋白术川歸甘草黃芩杜仲桑寄生川續斷白芍藥砂仁加糯米五十粒水煎食逺服若氣痞悶不舒加厚朴蘇梗若腹疼加熟艾葉香附見血下加升麻地榆椿根白皮阿膠醋附丸治數墮胎者此藥甚妙亦治崩漏帶下積聚癥瘕臍腹疞痛香附子擦去毛净用好醋煮透焙乾為末仍以醋打糊為丸梧子大每服三五十丸米飲下脈經曰婦人懷胎一月之時足厥隂脈養之二月足少陽養三月手心主脈養四月手少陽脈養五月足太隂脈養六月足陽明脈養七月手太隂脈養八月手陽明脈養九月足少隂脈養十月足太陽脈養諸隂陽脈各養三十日手少隂太陽不養者上為乳汁下主月水也值養胎之經者不可針灸犯之必墮胎胎不長良方曰妊娠而胎不長者因有宿疾或因失調以致臟腑虧損氣血虛弱而胎不長也當治其疾疚益其氣血則胎自長矣生生子曰曽見一宦婦每妊至五六月則墮如此者三次胎甚瘦小詢知少時患哮嗽因而背駝軀亦矮小因腹中不舒其胎不能長后治其哮嗽再孕乃不墮竟足月而産一子此固偶然則良方宿疾之說似不誣矣薛氏曰一婦胎六月體倦懶食面黃晡熱而胎不長因勞欲墜此脾氣不足也用八珍湯倍加參术茯苓三十餘劑脾胃漸健胎安而長矣生生子曰昔在西吳有張氏婦年二十三孕適三月迎豫診之其脈兩尺皆澀左手短弱右關不充據脈澀不當有妊而其夫云向已受胎者二俱彌月而産體皆不完始無舌次無水火門户産下隨死而無生氣今第三孕矣心憂之以翁治法多奇思幸投劑而保全之也豫以脈參之多為神志不足因處一方曰壯神益志保孕湯即語之曰是方每月可服十帖過八月則不必服矣彼欣然從而服之足月産一女形全而氣壯及再有妊未服藥雖生一女完矣而頭面為白膜遮蔽隱隱僅見耳目口鼻而亦隨死也後又孕適豫歸省其婦心憂失措夫諭之曰無恐前保孕方在向以未服乃致乖舛今可亟服也照方服如前至期生一子而無恙舉家以此方為神録而置之香火堂中尸祝之此亦愚見之偶中者人以旋服旋效而遂神之也亦其家為富而甚不仁丘里銜之當其産而偵之其産而怪以為作惡之報逮産子而無恙即以鄙為保孕之神至今𫝊頌不衰也豫因記其事并戒夫人之為惡者壯神益志保孕湯茯神當歸酸棗仁人參逺志山藥黃茋鹿角膠各一錢白术二錢砂仁三分甘草四分加圎眼肉五枚棗二枚水煎服黃茋湯治妊娠不長更安胎和氣黃茋炒白术炒陳皮麥冬白茯苓前胡人參各五分川芎甘草炒三分右薑棗水煎服集驗方用鯉魚長尺許者如食法整理飲其汁則胎漸大而長矣然亦須每月服數次為妙墮胎後血下不止墮胎後復損經脈而下血不止甚則煩悶致死皆以調補胃氣為主薛氏曰一妊婦墮胎昏憒不時吐痰自用養血化痰之劑昏憒不省自汗發搐痰涎湧出彼以為中風欲用祛風化痰豫曰此屬脾氣虛寒所致遂用十全大補湯加炮薑二十餘劑尋愈墮胎下血煩滿寒熱狂悶鎊鹿角屑為末每服三錢水調下日三服墮胎下血腹痛阿膠炒一兩艾葉五錢水煎服補中益氣湯加鹿角膠一錢臨服入童便半酒杯立止人參黃茋湯治小産氣虛血下不止人參黃茋炒當歸白术炒白芍炒艾葉各一錢阿膠炒二錢水煎服未足月欲産妊娠未足月而痛欲産者知母丸佳氣血不足者芎歸補中湯倍加知母或八珍湯內加之血熱所宜薛氏曰一妊婦八月胎欲墜如産卧久少安日晡益其此氣血虛弱朝用補中益氣湯加茯苓半夏隨愈更以八珍湯調理而安芎歸補中湯治氣血虛而欲産艾葉代薑阿膠炒川芎五味子炒杵川歸白术炒黃茋炒人參芍藥炒各錢甘草炙五分杜仲一錢水煎作二次痛知母丸十月未足而痛如産兼治産難及子煩知母為末蜜丸梧子大米飲下三十丸或酒下又方月數未足而似欲産腹痛槐子蒲黃等分為末蜜丸梧子大酒吞三十丸痛止為度蒲黃一味以井水調服亦佳千金方治月未足而欲産菖蒲根搗汁一二升灌下本草云菖蒲治胎動不安下血過期不産妊娠月足而過期不産者當補血行滯羅先生以四物湯加香附桃仁枳殼縮砂紫蘇水煎服之數帖即生妊娠咳嗽夫肺內主氣外主皮毛腠理不密寒邪乘之則咳嗽秋則肺受之冬則腎受之春則肝受之夏則心受之其嗽不已則𫝊于臟腑妊娠病久不已則傷胎也薛氏曰若秋間風邪傷肺用金沸草散夏火邪尅金用人參平肺散冬寒邪傷肺用人參敗毒散春風邪傷肺用參蘇飲若脾肺氣虛用六君子芎歸桔梗若血虛桑皮杏仁桔梗腎火上炎用六味丸加五味子煎服脾胃氣虛風寒所傷補中益氣湯加桑皮杏仁桔梗又治一妊婦氣喘痰甚諸藥不效素有帶下始于目下有浮氣兩月其面亦然此氣虛而有痰飲也用六味丸料數劑而愈一妊婦嗽則小便出此肺氣不足腎氣虧損不能司攝用補中益氣湯以培土金六味丸加五味以生腎氣而安一妊婦咳嗽其痰上湧日五六碗許諸藥不應豫以為此水泛為痰用六味丸料及四君子湯各一劑稍愈數帖而安一妊婦因怒咳嗽吐痰兩脅作痛此肝火傷肺金以小柴胡湯加山梔枳殼白术茯苓治之而愈但欲作嘔此肝侮脾也六君子加柴胡升麻而痊桔梗散治風寒咳嗽喘急不食天冬去心赤茯苓各一錢桑皮桔梗炒紫蘇貝母人參各五分麻黃去節炙甘草各三分右加薑水煎服馬兜鈴散治咳嗽氣喘馬兜鈴苦梗人參甘草貝母各五分紫蘇一錢橘紅大腹皮桑皮各一錢五味子十一粒右薑水煎服百合散咳嗽胸膈煩悶川百合紫苑麥冬苦梗桑皮各五分甘草三分竹茹二分加薑水煎服妊娠傷寒涎多咳嗽知母杏仁天冬桑皮各五分薑水煎服加味參蘇飲治項背拘急鼻塞頭眩時發寒熱咳嗽即參蘇飲加五味子杏仁是也妊娠吐血衄血妊娠吐血衄血由七情臟腑所傷氣逆于上致血上溢不止心悶甚者多死或墮胎也宜用局方必勝散薛氏曰若肝經怒火先用小柴胡山梔生地次用前藥合四物後用加味逍遙散若肝經風熱防風子芩丸心經有熱硃砂安神丸心氣不足茯苓補心湯思慮傷心妙香散胃經有火犀角地黃湯膏粱積熱加味清胃散肺經有火黃芩清肺飲因氣鬱滯紫蘇飲子氣不攝血用補中益氣湯腎經虛火六味地黃丸紫蘇飲治妊娠失調胎氣不安上攻作痛或氣逆失血方在胎上逼卷中一妊婦因怒失血兩脅脹痛小便淋澀此怒而血蓄于上隨火出也用小柴胡合四物四帖血止用六君子安胎飲調理全安必勝散治男子婦人血妄流溢或吐咳衄血並妙小薊連枝用人參蒲黃炒熟地川歸川芎烏梅去核各一錢半水煎服黃芩清肺飲治妊娠肺熱吐衄及治肺熱小便不利黃芩炒山梔炒各一錢鹽豉二十粒水煎服加味清胃散治醇酒厚味唇齒作痛或齒齦潰爛并頭面頸項疼痛及妊娠吐衄川歸黃連炒一錢半生地丹皮各一錢犀角連翹一錢二分升麻二錢甘草五分右水煎服便祕加大黃子煩良方曰妊娠苦煩悶者以四月受少隂君火以養精六月受少陽相火以養氣若母心驚膽寒多有是症産寶云是心肺虛熱或痰積于胸若三月而煩者吐涎惡食大凡停痰積飲寒熱相搏吐甚則胎動不安薛氏曰內熱子煩用竹葉湯氣滯用紫蘇飲痰滯用二陳加白术黃芩枳殼氣鬱用分氣飲加川芎脾胃虛弱用六君子加紫蘇山梔竹葉湯妊娠心驚膽怯終日煩悶名曰子煩白茯苓二錢防風黃芩麥冬各一錢竹葉十片水煎服一方有知母人參散熱乘心脾煩熱乾渴人參麥冬赤茯苓地骨皮黃芩炒乾葛甘草五分犀角鎊各一錢水煎服竹茹湯妊娠煩躁或胎不安淡竹茹一兩水煎服之知母丸知母一味炒為末棗肉丸如彈子大每服一丸人參湯下分氣飲脾胃虛弱氣血不和胸膈不利或痰氣喘嗽飲食少思陳皮茯苓半夏桔梗大腹皮蘇葉白术炒枳殼炒山梔炒各一錢甘草炙五分右加薑棗水煎服治子煩口乾不得卧用黃連為末每服一錢米飲調下赤水元珠卷二十一
