body:
  text: 赤水元珠卷十五明孫一奎撰祕結門經曰大便者腎之所主腎主五液也腎氣充則大便潤虛則津液耗竭而燥結矣又飢飽勞役損傷胃氣及食辛熱厚味之物而助火邪伏于血中煎熬真隂皆能使大便燥結又有年老隂血不足而燥者惟當補而潤之不可用峻利之劑又大便燥結者不得發汗汗則重亡津液必祕結而死矣有陽結有隂結有風結有實結有虛結有氣祕有血祕仲景曰脈浮數能食不大便者此為實名曰陽結也期十七日當劇脈沈而遲不能食身體重大便反硬名曰隂結也期十四日當劇陽結者散之隂結者熱之風結者諸藥中加羌活防風之類此二味雖是風藥然味辛所以能潤燥也經曰腎惡燥急食辛以潤之潔古曰臟腑之祕不可一槩治療有虛祕有實祕胃實而祕者能食小便赤以麻仁丸七宣丸之類主之胃虛不能食而小便清利者厚朴湯主之實祕者物也虛祕者氣也東垣曰有物有積而結者當下之食傷太隂腸滿食不化腹嚮嚮然不能大便者以苦泄之仲景麻仁丸局方七宣丸皆以大黃為君之類是也治注夏大便澀滯者血少血中伏火也黃耆人參湯加生地當歸身桃仁泥潤之如潤之大便仍久不快者少加煨大黃微利之如加大黃久不快利者非血結血祕是熱生風止當服黃耆人參湯內用羌活防風各五錢水四盞煎至一盞空心服之其便必大走也丹溪戒人用峻利但宜滋養隂血使孤陽之火不熾而金行清化木邪有制脾土清健而運行津液津液入胃則腸潤而通矣須知在西北以開結為主在東南以潤燥為主慎勿膠柱而調瑟也王海藏云桃杏仁俱治大便祕當以血氣分之年老虛人大便祕脈浮在氣杏仁陳皮主之脈沈在血桃仁陳皮主之所以俱用陳皮者以其干陽明病與手太隂為表裏也脈多沈伏而結老陽結脈沈實而數啄隂結脈伏而遲或結人虛人便結脈雀者不治七宣丸柴胡枳實麩炒訶子皮木香各五兩桃仁去皮尖炒六兩甘草炙四兩大黃麵包煨十五兩右煉蜜丸桐子大每服二十丸米飲下漸加四五十丸以利為度厚朴湯胃虛而祕者不能飲食小便清利陳皮半夏麯炒枳實炒各一兩甘草炙厚朴製各二兩白术三兩每三五七錢薑三片棗一枚水煎服保命集大黃牽牛散相火之氣遊走臟腑大便祕結大黃一兩牽牛頭末五錢為細末每三錢有厥冷合用酒調無厥冷而手足煩熱者蜜湯調下食後以微利為度此謂不時而熱者溫熱也凡用大黃半兩至一兩而大便不通利者加麝香少許調于藥中則大便必大走也半硫丸治年髙虛祕冷祕方見燥門大潤腸丸治大便祕澀通用杏仁炒枳殼麻仁陳皮各五錢阿膠防風各二錢半右蜜丸桐子大每五十丸老人蘇子煎湯下壯者荆芥湯下麻仁丸實祕能飲食小便赤此丸與七宣丸主之枳殼川芎等分麻仁泥減半煉蜜丸梧子大食前溫水下又麻仁丸風祕脾約症小便數大便祕大黃枳殼赤芍藥各一兩厚朴五錢麻仁杏仁各一兩二味俱另研煉蜜丸梧子大每服三五十丸皂角丸治有風人大便祕澀牙皂枳殼羌活桑白皮檳榔杏仁麻仁防風白芷陳皮等分蜜丸梧子大每服三五十丸蜜湯下皂角枳殼丸大腸有風祕結老人宜服皂角炙去皮子枳殼炒各等分蜜丸梧子大每七十丸空心食前米飲下搜風順氣丸治大腸祕澀大黃五兩半熟半生山茱茰麻仁泥郁子仁炮去皮研兔絲子山藥牛膝檳榔各二兩防風枳殼獨活各一兩車前子二兩半煉蜜丸梧子大每二三十丸米飲下平旦臨卧各一服二仁丸治老人虛人風祕不可服大黃者妙麻仁杏仁枳殼訶子等分蜜丸梧子大每三十丸溫水下未利增之四磨湯氣滯腹急大便祕澀沈香木香檳榔烏藥等分各磨半鍾和勻溫服有熱者加大黃枳殼名六磨湯橘杏丸治氣祕老人虛弱人皆可服橘紅杏仁等分煉蜜丸梧子大每七十丸空心米飲下蘇麻粥順氣滑大便蘇子麻仁以上二味不拘多少研爛水濾取汁煮粥食之蓯蓉瑣陽粥老人隂血不足大便燥結肉蓯蓉瑣陽煮粥服小通氣散虛人憂怒傷肺致令祕澀曾服燥藥而大便祕陳皮蘇葉枳殼木通等分水煎服立通金液丹治挾冷結滯兼治傷寒隂結以杏仁麻仁煎湯吞下方在寒門神功丸治氣壅風盛祕結後重疼痛煩悶大黃訶子各四兩人參麻仁各二兩右蜜丸梧子大每二十丸米飲下食後臨卧服此藥虛實加減小柴胡湯治傷寒陽結能食而大便結檳榔丸治大腸實熱不通心腹脹滿檳榔大黃麻仁枳實羌活杏仁牽牛白芷黃芩各一兩人參五錢蜜丸梧子大每四十丸空心溫水下四順清涼飲治同前每加燈心十根枳殼十片水煎服效檳榔散治腸胃有濕大便祕結檳榔不拘多少為末每服二錢蜜湯點服香蘇散治同上加枳殼檳榔水煎服五仁丸津液枯竭大腸祕結傳道艱難桃仁杏仁各一兩柏子仁郁李仁炒黃研松子仁各二錢半陳皮四兩另為末右五仁另研為膏入陳皮末研勻蜜丸桐子大空心米飲下五十丸調氣滋補溫腸丸治發汗利小便亡津液以致祕結沈香一兩另為末肉蓯蓉二兩為末用麻子仁汁打糊為丸桐子大空心米湯下七十丸潤腸丸治脾胃中伏火祕結及風結血結桃仁麻仁當歸尾大黃羌活各五錢升麻紅花郁李仁右除桃麻仁另研為泥外餘為末煉蜜丸梧子大每三五十丸空心白湯下一方加防風三錢皂角仁燒存性兩半無升麻以下三味葳靈仙丸治年髙氣衰津液枯燥祕結黃耆枳殼葳靈仙等分煉蜜丸梧子大每五七十丸薑湯熱水任下陳黃湯治老人大便祕結黃耆陳皮各五錢為末每服三錢用火麻仁一合研爛以水投取汁一鍾濾去渣于銀石器中煎候有乳花起即入白蜜一大匙再煎令滚調藥末空心服獨棗湯治大便積日不通大棗一枚劈開入輕粉五分依舊合起以麻線縛扎慢火水煮熟嚼碎以棗汁送下丹溪治虛熱大腸祕白芍藥一兩半陳皮生地黃當歸身各一兩條芩甘草各二錢右粥丸每七八十丸白湯下潤麻丸治血燥大便不通此丹溪祕方麻仁當歸桃仁生地黃枳殼各一兩蜜丸梧子大每五十丸空心白湯下導滯通幽湯治大便難幽門不通上沖吸門不開噎塞不便燥祕氣不得下治在幽門以辛潤之當歸身桃仁泥升麻各一錢生地熟地各五分炙甘草紅花各三錢水煎食前調檳榔末五錢或加麻仁泥一錢若加大黃名當歸潤燥湯潤燥湯升麻生熟地黃各二錢當歸稍生甘草大黃煨桃仁泥麻仁泥各三錢紅花五分右除二仁另研作一服水煎數沸下二仁煎空心熱服活血潤燥丸治大便風祕血祕時常燥結當歸稍一錢防風三錢大黃紙裹煨羌活各一兩桃仁麻仁各二兩研如泥皂角燒存性一兩三錢其性得濕則滑滑則燥濕自解右除二仁另研外餘為末蜜丸梧子大空心服五十丸白湯送下三兩服後以蘇子麻仁粥每日早晚食之大便不致燥結以磁器盛藥紙封脾約麻仁丸和劑方治腸胃熱燥大便祕結厚朴去皮薑製芍藥枳實麩炒各八分杏仁去皮尖炒麻仁另研各五錢大黃蒸焙一兩六錢蜜丸梧子大每二十丸臨卧溫水下以通利為止潤腸丸治大便祕澀連日不通麻子仁一盞半細研用水浸濾去皮取汁芝麻半盞微炒研用水浸取汁桃仁泡去皮尖炒黃研如泥荆芥穗為末各一兩右前藥入鹽少許同煎可以代茶飲之以利為度三和散治七情之氣結於五臟不能流通以致脾胃不和心腹痞悶大便祕澀川芎三兩羌活去蘆紫蘇去梗沈香宣木瓜白术木香檳榔陳皮甘草各七錢半大腹皮三錢每服五錢水煎服木香三稜散治腹中有蟲面色痿黃一切積滯黑丑半生半炒君大腹子君檳榔木香三稜煨透熟雷丸莪术煨錫灰醋炒大黃已上各二兩右為末每服三錢空心蜜水調下或砂糖水亦可須先燒肉一片口中嚼之久久吐出口中肉汁然後服藥大小便不通烏桕湯治大便不通如神亦能通小便烏桕木皮方一寸匕劈破以水煎取小半盞服之立通不用多服其功神聖兼能取水或以此湯調下五苓散二錢空心服推車散治大小便祕經月欲死者推車客七枚土狗七枚如男子病推車客用頭土狗用身如女子病土狗用頭推車客用身右新瓦上焙乾為末用虎目即虎杖樹皮向南者濃煎汁調只一服經驗如神皂策散治大小便關格不通經三五日不炷皂角燒灰米湯調下三錢即通甘遂散治大小便不通甘遂二兩用赤皮者為末煉蜜二合和勻每一兩重分作四服蜜水下如未效第二服漸加之蜜硝湯治大小便不通好蜜一鍾入皮硝二錢用滚水一碗空心調下立通導引法蜜二匙蔥汁二匙豬膽汁二匙青黛二分皂角末五分玄胡索三分右同和一處以豬小腸一節將此藥灌入腸內一頭用竹筒一箇兩頭俱用線扎定將竹管入肛門內徐徐擠藥進去肛門得藥氣即通神效兊法凡諸祕結不通或兼他症及老弱虛極不可用下藥者蜜熬老入皂角末少許以蔥作骨乘熱􅐝作兊候冷硬用油塗肛門插入立通豬膽汁導法大豬膽一枚㵼汁和醋少許入竹管灌穀道中少刻即通霹靂煎用鹽與蜜乘熱􅐝如蜜兊法上頭鋭用寸許納入穀道中少刻化開即通一法用蜜兊不通者用鹽吹入肛門亦妙提盆散治雜病非隂候者草烏頭不拘多少為極細末每用蔥一枝肥者削去鬚圓頭上有汁濕蘸之納穀道中海藏用鹽與蜜兊相合如用草烏頭末相合亦可蓋鹽能軟堅潤燥草烏能化寒消結可隨症隂陽所宜用之宣積丸巴豆乾薑韭子良薑硫黃白檳榔甘遂各等分為末研飯為丸圓眼大早朝先用椒湯洗手麻油塗手掌口握藥一粒移時便瀉欲止以冷水洗之大小便不通鹽燒紅填臍內切蒜一片蓋鹽上艾炷灸三五壯即通孫尚治趙令女忽吐逆大小便不通煩亂四肢漸冷無脈凡一日半與大承氣湯一劑至夜半漸得大便通脈漸和翌日乃安此關格之病極為難治垂死而活者惟此一女耳孫兆方治大小便不通皂角燒存性為末粥飲調下三錢立通外臺祕要方治脹滿大小便不通獨蒜煨熟去皮紙包納入下部氣立通止吐透格湯藿香砂仁白蔲仁各一錢陳皮半夏各二錢茯苓厚朴蒼术各一錢半水二鍾煎七分入薑汁三匙徐徐頻服如火熱者去藿香蔲仁加黃連薑汁炒山梔竹茹鬱結氣滯者加香附貝母檳榔通關導滯散木香檳榔枳殼當歸尾厚朴各一錢半大黃三錢如小便不通加瞿麥木通滑石各一錢半或用八正散水煎食前服閉癃遺溺不禁辨生生子曰閉者小便不出塞而不通也癃者罷弱而氣不充淋淋瀝瀝點滴而出或澀而疼一日或數十次或百次俗名淋病者是也閉則多是急病癃則是緩病遺溺睡夢中溺出醒而方知是也不禁者日夜無遍數頻頻而溺也今各分枝門詳載治法以見新久虛實寒熱氣血各有所攸重也惟肝與督脈三焦膀胱主之經云肝主小便淋溲肝足厥隂之脈繞隂器所生病者遺溺閉癃又云督脈者女子入繫廷孔其孔溺孔之端也其男子循莖下至纂與女子等其生病癃痔遺溺故遺溺閉癃皆取厥隂腧穴及督脈腧穴也又三焦主之者經云三焦下脈在于足太陽之前少陽之後出于膕中外亷名曰委陽足太陽絡也三焦者足太陽少陽之所將太陽之别也上踝五寸别入貫腨腸出于委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺遺溺則補之閉癃則㵼之是也又膀胱主之者經云膀胱不利為癃不約為遺溺然遺溺閉癃不取膀胱腧穴者蓋膀胱但止藏溺其出溺皆三焦及肝督脈也又經云三焦者決瀆之府水液出焉膀胱者州都之官津液藏焉氣化則能出矣由是言之膀胱藏水三焦出水治小便不利故刺灸法但取三焦穴不取膀胱穴也小便不通門東垣謂小便不通有在氣在血之異夫小便者足太陽膀胱所主長生于申申者西方金也金能生水金者肺也肺中伏熱水不能生是絶小便之源也人法象天地膀胱之源自頭項下至于足故曰陽中之隂如渴而小便不通者肺不能降是也治法者用清燥金之正化氣味薄之藥茯苓豬苓澤㵼琥珀燈心通草車前子瞿麥萹蓄之類皆為淡滲之藥能瀉肺火而清肺金滋水之化源也若不渴熱在下焦是絶其流而溺不泄也須用氣味俱厚隂中之隂藥治之二者之病一居上焦在氣分而必渴一居下焦在血分而不渴血中有濕故不渴也二者之殊至易分別耳綱目云氣鬱于下微者香以散之甚者吐以提之血鬱于下微者輕劑行之甚者峻劑破之丹溪云小便不通有氣虛血虛有實熱有痰氣閉塞皆宜吐之以提其氣氣升則水自降蓋氣乘載其水也先哲譬之如滴水之器必使上竅通而後下竅之水出焉氣虛參术升麻先服後吐血虛四物湯先服後吐痰氣閉塞者二陳加木通香附探吐實熱當分利之或八正散大便動則小便自通老人氣短者四物加參茋吞滋腎丸下焦血氣乾者死統旨云氣虛而小便不通者經曰膀胱者津液藏焉氣化則能出矣氣虛則不能化故不通也血虛而小便不通者蓋血即津液之屬血虛即津液燥而溺道不利故不通也與痰氣閉結於下者虛實之情不同今丹溪皆用吐法乃急則治其標也雖然氣虛血虛以虛為本虛則必補之而後可夫以參术四物調其真氣而吐之誠可以通其溺而其本之虛也豈參茋四物之類頃刻下咽遂能以補益之耶吾恐病根猶在不久必復作故愚意以為若果氣虛血虛必用補氣補血之藥使其氣盛而施化血生而津潤其便自可以通不必探吐果宜吐者必須先吐俟其溺通繼服補劑庶可平復非如痰氣閉結者但吐之而可已此丹溪未盡之意豫故表而出之戴元禮云汗多而小便赤澀夏月多有此症盛暑所飲既多小便反澀緣上停為飲外發于汗津道不通小腸閉澀則水不運下五苓散然有虛勞汗多而反澀者乃是五內枯燥滋腴既去不能生津當以溫養潤肺十全大補湯或養榮湯不可過用利小便藥蓋汗者心液心主血養血則心得所養汗止金生不待通溺而自清矣諸失精血及患癰毒人或有小便反澀之症亦是枯竭不潤之故也宜六味八味以治之羅太無曰小便不利有三不可槩論若津液偏滲於腸胃大便泄㵼而小便澀少者一也宜利而已若熱搏下焦津液則濕熱不能行者二也必滲泄則愈若脾胃氣澀不能通調水道下輸膀胱而化者三也可順氣令施化而出丹溪云諸淋皆屬於熱余每用黃柏滋腎丸每百丸用四物湯加甘草稍杜牛膝木通桃仁滑石木香煎湯空心吞服兼灸三隂交如鼓應桴纍試纍效保命集云淋閉者涼膈散加滑石四兩茯苓一兩治熱在氣分之劑東垣清肺散治渴而小便閉或黃澀邪熱在氣分茯苓二錢豬苓澤㵼各三錢琥珀瞿麥桂各五分通草燈心各二分木通萹蓄各七分車前子炒一錢每服五錢水煎熱服五苓散八正散亦宜用仲景豬苓湯治脈浮發熱渴而小便不利豬苓茯苓阿膠滑石澤㵼各一兩水四升煎二升去渣內膠煎溶溫服一日三服茯苓戎鹽湯茯苓半斤白术二兩戎鹽彈丸大一枚為末白湯調下清肺飲治肺燥而小便不通黃芩一錢山梔子三枚鹽豉二十粒長流水煎服治熱在血分之劑東垣滋腎丸下焦隂虛腳膝軟無力隂汗隂痿以及足熱不能履地不渴而小便閉者邪熱在血分也黃柏知母俱酒洗焙各二兩肉桂二錢右滚水為丸梧子大每百丸加至二百丸煎百沸湯空心服潔古黃連丸治因服熱藥過小便不利諸藥莫能效者或臍下痛不可忍黃連炒黃柏炒甘草各等分水煎服如再不通加知母此藥助氣使氣得化則通矣羅太無白花散治小便不通膀胱有熱朴硝為末每服二錢煎茴香湯調下東垣導氣除燥湯小便不通乃血濕致氣不通而竅澀知母酒洗澤㵼各三分黃柏四錢滑石炒茯苓各二錢水煎不拘時服小便不通腹下狀如覆碗痛悶難忍者乃腸胃乾涸膻中氣不下則便不化啓玄子謂胞器若得氣海之氣施化則溲便下氣海之氣不及則隱祕不通故不得便利也先用木香沈香各三錢酒調下令氣通達便自通利又方煎陳皮茯苓湯調木香沈香末服之上二方正綱目所謂氣鬱于下微者香以散之是也丹溪治氣鬱於下甚者以吐法提之血鬱於下小便不利微者輕劑行之如蒲灰散滑石白魚散茯苓戎鹽湯皆主之仲景蒲灰散蒲黃粉七分滑石三分為細末白湯調一日三服滑石白魚散滑石乳髮灰白魚各二分乃衣魚也為末米飲服五分一日三服羅太無髮灰散治臍下急滿小便不通髮灰二錢米醋二合調服一法與葵子等分為末米飲服二錢訖即炒黑豆葉蓋其上即通右滑石能逐汚血蒲黃髮灰能消汚血丹溪謂髮髲補隂之功甚捷血鬱于下小便不利甚者峻劑破之本事桃仁煎治婦人積血小便不通臍腹脹痛不可忍衆醫欲作淋治如八正散之類數種皆治不效診之乃知血瘕也非暝眩藥不可去豫用此藥得愈桃仁大黃朴硝各一兩虻蟲半兩炒黑四味為末先以醇醋二升半銀石器內慢火煎取一升五合下大黃桃仁虻蟲等不住手攪良久出丸如梧子大前一日不晚食五更初溫酒吞下五丸至日午腹六痛不可忍卧少頃下血塊如拳者數枚小便如黑豆汁或如雞肝蝦蟇衣狀其痛止此藥極峻氣虛血弱者不可輕用凡用宜少服之漸加可也如見鮮血即止藥續以補藥調理此方出千金方倒換散治癃閉大小便不通小腹急痛肛門腫痛大黃小便不通減半荆芥穗大便不通減半為末每服二錢溫水調下朴硝牛膝湯治小便不通或血淋杜牛膝二兩以雪水二碗煎至一碗調朴硝一兩空心服立通雜方治小便閉用大田螺生去殼搗細封臍上即通治傷寒後小便不通生薑八九塊杵碎水十餘碗麻布五六尺同煎數沸用桶盛候可通手以布頻尉小腹良久恰用紅豆末一錢江茶二錢井花水調服神效小便如注本事方治小便難小腹脹急不速治即死蔥白一斤細切炒令熱以帕子裹分作兩處更替尉臍下即通聖通方治小便難腹滿悶不急療即死秦芁一兩去蘆以水一大碗煎七分食分二服服之瘥濟世方治小便不通杏仁二十一枚研碎水調分作二服效千金方治婦人卒不得小便用紫苑末以井水調服三撮便通如小便血五撮立止灸小便淋澀法炒鹽不拘多少熱填滿病人臍中是神闕穴也却用筯頭大艾炷灸七壯良驗或灸三隂交穴又法治小水祕澀豬膽連汁籠套玉莖少刻汁入即通婦人用藥末貯袋子安入玉户中必通玄珠經云隂陽關格前後不通利小水自行中有轉胞之症諸藥不效無救則脹滿悶亂而死曾以甘遂末水調敷臍上內以甘草節湯飲之藥汁至臍二藥相反而胞自轉小水來如湧泉此救急良方一法治小便不通諸藥無效或轉胞至死用豬尿胞一箇底頭出箇小竅用翎筒通過放在竅內根底細線繫定翎筒口子細杖子堵定上用黃蠟封尿胞口頭吹滿氣七分繫定了再用手捻定翎筒根頭放了黃蠟堵塞其翎筒放在小便頭放開翎筒根頭手其氣透入裏自然小便下神效瓜蔞散治腹脹小便不通瓜蔞仁不拘多少為末每服三錢溫酒調下如不能食酒米飲下以通為度葵子散治小便不通黃蜀葵子赤茯苓各三錢水煎服雞蘇散治小便不通雞蘇一握生地通草各四兩滑石石葦炒去毛各一兩冬葵子一兩半以水六碗煎至三碗分三服空心進一服約人行五里路又進一服一方加榆莢黃芩車前子治小便不通垂死者玄明粉一兩淡竹葉三十片燈心五分煎湯徐徐調下即通治老人虛人小便不通亦治心痛琥珀為末人參湯調下妙王海藏云脬轉小便不通非膀胱小腸厥隂之氣也蓋因強力房事或過忍小便以致此疾非可利之藥所能利之法當治氣宜以沈香湯主之沉香木香各三錢為細末煎陳皮茯苓湯空心食前調服癃門生生子曰癃罷也下元罷憊而氣餒弱不能施化故小便淋瀝點滴而下是又稱為淋也陳無擇曰淋古謂之癃名稱不同也癃者罷也淋者滴也古方皆云腎氣鬱致小腸膀胱不利復有冷淋濕淋熱淋等屬外所因既言心腎氣鬱與驚思恐憂即內所因况飲啖冷熱房失勞役及乘急忍溺多致此病豈非不內外因也大率有五曰冷曰熱曰膏曰血曰石五種不同皆以氣為本嚴氏曰五淋氣石血膏勞是也氣淋為病小便澀常有餘瀝石淋莖中痛尿不得卒出膏淋尿似膏出勞淋勞倦即發痛引氣衝血淋遇熱即發甚則溺血候其鼻頭色黃者小便難也大抵此症多由心腎不交積藴熱毒或酒後房勞服食熱燥七情鬱結所致癃閉淋閉為病皆一類也張子和曰世人多為服金石燥熱之劑得之常見農家有此症豈是服金石之人也大抵是膀胱蓄熱而成此疾如湯瓶久在火中煮瓶底白鹼而不能去沙石淋之症與此理同劉宗厚曰此譬極當內經云小腹熱溲出白液亦甚似之也東垣曰凡小便癃閉閉是無隂而陽氣不化也凡利小便之藥皆淡味滲泄為陽止是氣藥陽中之隂非北方寒水隂中之隂所化者也此乃奉養太過膏粱積熱損北方之隂腎水不足膀胱腎之室久而乾涸小便不化火又逆上而為嘔噦非膈上所生也獨為關非格病也潔古云熱在下焦填塞不便是治關格之法因治王善夫病小便不通漸成中滿腹大堅硬如石壅塞之極腿腳腫脹破裂出黃水雙睛突出晝夜不得眠飲食不下苦痛不可名狀求豫治之因問受病之始知病不渴近苦嘔噦衆醫皆用治中滿利小便滲淡之藥急難措手乃辭歸從夜至旦耿耿不寐窮究其理記素問有云無陽則隂無以生無隂則陽無以化此病小便癃閉是無隂則陽無以化也今病者內關外格之症悉具死在旦夕但治下焦可愈隨處以北方寒水所化大苦寒之氣味俱隂者黃柏知母為君桂為引名曰滋腎丸沸湯下二百丸少頃前隂如刀刺火燒之痛溺出如湧泉卧具皆濕床下成流顧盼之間腫脹消散豫驚喜曰大哉聖人之言豈可不遍覽而執一者也其症小便閉塞而不渴時見煩燥者是也凡諸病在下焦皆不渴也千金方治小便淋痛以杜牛膝酒煮服肘後方以杜牛膝根莖葉酒煮服治小便不利莖中痛欲死及治婦人血結堅痛如神蓋牛膝治淋之聖藥也但虛人當用補藥監治之耳仲景云淋家不可發汗發汗則便血寶鑑曰痺論云胞痺者小腹膀胱按之內痛若沃以湯澀於小便上為清涕夫膀胱為州都之官津液藏焉氣化則能出焉令風寒濕邪客於胞中則氣不能化出故胞滿而水道不通其症小腹膀胱按之內痛若沃以湯澀於小便以足太陽經其直行者上交額下入絡腦氣下灌於鼻竅則為清涕也劉宗厚曰按此則知淋閉有寒熱之殊大抵人之所稟虛實受病不同宜參脈理分治方古庵曰淋症其感不一或因勞房厚味醇酒忿怒所致夫房勞者隂虛火動也忿怒者氣動生火也醇酒厚味者釀成濕熱也積熱既久熱結下焦所以小便淋瀝欲去不去不去又來而痛不可忍者初則熱淋血淋久則煎熬水液稠濁如膏如沙如石也諸方中類多散熱利小便而于開鬱行氣破血滋隂蓋少焉若夫散熱利小便只能治熱淋血淋而已其膏淋沙淋石淋三者必須開鬱行氣破血滋隂方可也古方用鬱金琥珀開鬱藥也用青皮木香行氣藥也用蒲黃牛膝破血藥也用黃柏地黃滋隂藥也東垣用藥凡例小腹痛用青皮黃柏夫青皮疏肝黃柏滋腎緣小腹小便乃肝腎之部位也學者不可不知治熱之劑火府丹治心經熱小便澀及治五淋臍下滿痛生地木通黃芩甘草煉蜜杵丸梧子大每二十丸木通煎湯下導赤散治心藴虛熱小便赤澀或成淋痛生地甘草木通加竹葉水煎服車前子散治諸淋小便痛不可忍車前子五錢淡竹葉赤茯苓燈草荆芥穗各二錢分二帖水煎服地膚子湯治諸病後體虛觸熱熱結下焦小便赤澀多起少出莖痛如刺或尿血地膚子豬苓知母黃芩海藻通草瞿麥枳實升麻葵子各等分薑三片水煎服立效散治下焦結熱小便淋閉作痛有時尿血甘草炙三兩瞿麥兩山梔仁炒五錢每一兩薑三片蔥白三根燈心三十根水煎服通草湯治諸淋通草葵子茅根蒲黃當歸王不留行桃膠瞿麥滑石各一兩甘草五錢每一兩薑五片水煎服石葦散治膀胱有熱淋瀝不去臍腹急痛蓄作有時勞役即發或尿如豆汁或出沙石並治芍藥白术滑石葵子木通瞿麥各二兩當歸甘草王不留行各一兩石葦去毛二兩為末每服二錢空心小麥湯調下五淋散腎氣不足膀胱有熱水道不通淋瀝不出或如膏如沙如石如豆汁並治之赤芍藥山梔仁各十兩當歸甘草生各五兩條芩三兩赤茯苓六兩每服七八錢水煎八正散治大人小兒心經藴熱臟腑閉結小便赤澀癃閉不通熱淋血淋膏淋沙淋石淋並皆治之車前子瞿麥萹蓄滑石甘草山梔大黃麵包煨木通各等分每服五七錢入燈心十莖煎至六分食前服又方治諸淋四苓散二錢益元散山梔子各一錢燈心三十根水煎服又方益元散加車前子末一錢或加阿膠一錢石葦飲治小便不利莖中痛石葦去毛冬葵子各二兩瞿麥一兩滑石五兩車前子三兩為末每服二錢日三服熟水下葵花湯治小便淋澀葵花根洗淨搗碎水煎服又方治沙淋車前草搗汁半碗入蜜一兩懸井中五更取起溫服若是沙淋石淋則以煅寒水石為末調服如治白淋用砂糖治淋閉莖中作痛神效方石葦滑石瞿麥萹蓄木通冬葵子王不留行地膚草各等分為末每服三錢白湯調下一方治淋及尿血立效旱蓮草車前草同取汁每服半碗一方治淋痛及尿血側柏葉藕節車前子等分取汁調益元散三錢神效治石淋方杜牛膝搗碎水五碗煎至一碗去渣入麝香少許調服效一方治沙淋石首魚腦骨五對火煅滑石五錢為末分二服煎木通湯調下連服數劑看沙盡止藥海金沙散治膏淋海金沙滑石末各一兩甘草二錢半為末每二錢麥冬湯調服燈心湯亦可一方加木通瞿麥穗通草杏仁鹿角霜丸治同上鹿角霜白茯苓秋石各等分為末麵糊丸梧子大每五十丸米湯送下大海金沙散治小便淋瀝及下焦濕熱氣不施化成五種淋疾癃閉不通海金砂研木通瞿麥穗滑石通草各半兩杏仁去皮尖一兩每五錢入燈心二十根水煎服牛膝膏治死血作淋牛膝四兩去蘆酒洗一宿桃仁一兩去皮尖炒當歸尾二兩酒洗赤芍藥一兩半生地一兩半酒洗川芎五錢用水以炭火慢熬至二鍾入麝少許分作四服空心服如夏月用涼水換此膏不壞滋隂降火湯治火燥血少氣不得降而淋當歸黃柏鹽水炒各一錢半知母牛膝生地各一錢白芍一錢二分甘草稍木通各八分水煎食前服靈苑透膈散治五種淋疾氣淋熱淋勞淋石淋及小便不通至甚者硝石一兩雪白者為末每服二錢各依湯使服如勞倦虛損小便不出小腹急痛葵子煎湯下通後更須服補虛丸藥如血淋小便不出時下血疼痛並用冷水調下如氣淋小腹滿急尿後常有餘瀝木通煎湯下如石淋莖內痛尿不能出內引小腹膨脹急痛尿下砂石令人悶絶將藥末先入銚子內隔紙炒至紙焦為度再研令細溫水調下如小便不通小麥湯下卒患諸淋並以冷水調下以上並空心先調藥消散如水即服之更以湯使送下凡服藥未效者服此立愈靈苑方治卒患諸淋遺溺不止小便赤澀疼痛三葉酸漿草取嫩者搗汁一合酒一合攪勻空心服之立通酸漿草即布谷飯一方治血石淋楊樹蛀屑烏梅一大棗三水煎服羅太無石燕丸治石淋多因憂鬱氣注下焦將所食醎物結成砂石小便磣痛不可忍必俟砂石出而後小便通石燕燒赤水中淬三次研水飛過滑石石葦去毛瞿麥穗各一兩為末糊丸梧子大煎燈心瞿麥湯吞下十丸一日三服葛粉丸治男女淋病疼痛效速勿輕忽之沙糖本草云治心肺大腸熱葛粉和丸梧子大井花水化開一二丸斗門方治五淋苧麻根兩莖打碎水煎頓服大妙丹溪云苧根補隂行滯血治石淋方螻蛄一枚鹽二兩用於新瓦上鋪蓋焙乾研末溫酒調下一錢匕服下即愈白薇散治熱淋血淋白薇芍藥等分為末每服二錢溫酒調下立效或加檳榔一方治血淋諸熱淋山茵陳淡竹葉木通山梔滑石甘草豬苓瞿麥每服五七錢加燈心煎服大便祕加大黃二神散治諸淋急痛海金沙七錢半滑石五錢為末每服二錢木通麥冬車前草煎湯入蜜少許調下治淋閉便濁神方五爪龍藤連根一兩土茯苓杜牛膝根各八兩共用酒三碗煎至一碗空心服三服全愈又治下疳如神五帖後疳愈再不發他瘡毒腎瀝湯治胞痺小便不利小腹急麥冬木通桔梗桑白皮杜仲炒犀角屑五加皮各一錢赤芍五分水二鍾加羊腎一枚切碎煎至八分入竹瀝少許食前服濟生木通散小便不通小腹痛不可忍木通滑石各一兩黑丑頭末五錢每服五錢燈心十莖蔥白一莖水煎服治氣開鬱之劑芍藥檳榔散治五淋赤芍藥一兩檳榔一枚麵包煨為末每服一錢匕空心白湯調下丹溪生氣藥砂仁三錢海金沙紅麯檀香各二錢白豆仁木香丁香各一錢分五帖研桃仁十四枚入生氣藥治諸般沙石淋琥珀二錢研細末空心用蔥白頭煎濃湯調下無問諸般淋疾一二服神效本草云琥珀消汚血極驗通祕散治血淋痛不可忍陳皮香附赤茯苓等分水煎服沈香散治氣淋疼此多因五內鬱結氣不舒行隂滯於陽而致壅滯小腹脹滿便溺不通沈香石韋滑石當歸王不留行各五錢葵子芍藥各七錢半甘草陳皮木香青皮各二錢半右為末每服三錢煎大麥湯下治卒淋急痛方益元散二錢茴香一錢微炒黃木香檳榔各二分半右為末水調服琥珀散治五淋沙石淋滑石琥珀各一兩木通當歸木香鬱金萹蓄各五錢為末每五錢以蘆葦葉煎湯調服如無蘆葦葉以竹葉煎湯送下一方治同上石燕子七枚搗如黍米大新桑白皮三兩銼同拌勻二味分作七帖用水煎一日三服治肝經氣滯藴熱小便淋痛方甘草稍子五錢青皮黃柏澤㵼各一錢水煎服效補氣血之劑丹溪治朱郎小便淋痛脈大右澀此為勞傷經血勿作淋治可補血行肝經滯血自愈生地當歸赤芍各一錢川芎條芩甘草稍各三分陳皮木通各五分黃柏炒二分紅花一分杜牛膝一錢右以桃仁泥研滑石同煎待淋病退減桃仁滑石杜牛膝木通入川牛膝代木通分兩倍之氣虛者八物湯加杜牛膝黃芩煎服老人氣虛亦能淋參术中加木通山梔治勞苦傷血脈沉而大下焦藴結而淋人參歸尾白芍香附各五錢條芩三錢木通三錢山梔仁炒三錢半黃茋甘草梢生各五分分四帖煎杜牛膝湯煎服茯苓琥珀湯小便澀莖中痛不可忍相引脅下痛川棟子去核炒甘草生各一錢人參五分茯苓四分琥珀當歸梢澤㵼柴胡各三分玄胡索七分水煎服數服效六味地黃丸治久淋隂虛者清心蓮子飲治上盛下虛心火炎上口舌咽乾煩渴微熱小便赤澀或欲成淋並治之黃茋蜜炙石蓮肉赤茯苓人參各七錢半甘草炙車前子地骨皮麥門冬黃芩各五分每服七八錢水煎溫服發熱加薄荷柴胡治氣虛脾虛消渴淋濁人參滑石各一錢白术一錢半赤茯苓澤㵼各七分麥門冬甘草各五分竹葉三十片加燈心二十根水煎服治寒之劑千金茯苓丸治胞痺小便內痛赤茯苓防風細辛白术澤㵼各五錢紫苑天花粉牛膝黃茋芍藥甘草炙各三錢山藥山茱茰肉獨活半夏各一錢附子炮官桂各二錢煉蜜丸梧子大每服五六十丸空心溫酒下腎著湯治胞痺小便不通赤茯苓白术各四兩甘草炙三兩乾薑炮一兩每服五七錢水煎一日三服巴戟丸治胞痺臍腹痛小便不利巴戟去心一兩半桑螵蛸麩炒逺志去心生地黃山藥附子炮肉蓯容酒浸續斷各一兩杜仲炒鹿茸酥炙石斛兔絲子五味子山茱茰官桂龍骨各三錢煉蜜丸梧子大空心溫酒下三十丸三因生附散治淋而脈沉微小便祕澀數起不通竅中痛瞿麥木通半夏各一兩半滑石五錢附子五錢每二錢生薑三片燈心二十莖蜜半匙水煎食前服淋閉餘論生生子曰淋閉一證玉機微義闡述詳盡極當檢閲如劉河澗之熱羅知悌之寒張潔古分在氣在血之異嚴用和之五淋陳無擇之三因朱彥修之痰積死血劉宗厚之腎虛火熾述素問靈樞脈經之要旨門分類析甚便後學惟婦人治法尚略顧今時婦人患此頗多鮮獲竒效緣由未得其真括也考之經曰肝主小便淋溲婦人經未絶年皆厥隂肝經用事肝主謀慮者也婦人之性多於偏鄙鬱而不決氣道因澀鬱久成火凝滯濁液漸結成粒名曰砂石淋是也今之治淋者動手輒用五苓八正之類皆淡滲利竅之劑于病未嘗逺也而底績不樹何耶殊不知淡滲皆在天之陽也但能利肺氣是氣降而水利矣非治有形之隂病也腎乃肺之子也淡滲過劑腎氣奪矣隂血日虧鬱火日熾經曰無陽則隂無以化無隂則陽無以生淡滲皆泄氣而損血者血損則竅愈澀澀則病劇治當開鬱火養隂血兼之以導氣之藥經曰壯者氣行則愈隂血旺氣道滑病自瘳矣正如河涸舟粘縱用力多未若決水之為易也學者其可忽諸丹溪牛膝膏加鬱金以開鬱山梔以降火生地以補隂琥珀以導氣利竅則愈矣遺溺門生生子曰按遺溺遺失也睡夢中遺失醒而後覺童稚多有此大人少有也夫童稚陽氣尚微不甚約束好動而魂遊故夜多遺失也古方多用暖藥乃溫養陽氣之意經謂虛則遺溺又曰不約為遺溺從可知矣曾見數人二三十嵗仍遺失不止後皆無子得非下元虛寒所致與東垣曰小便遺失者肺金虛也宜安卧養氣禁勞役以黃茋人參之類補之不愈當責有熱加黃柏生地又曰立夏前悮用白虎湯過多致遺溺者宜溫藥升陽以解之甲乙經云肺脈不足以息卒遺失無度原病式云遺尿不禁者是熱甚客于腎部干於足厥隂之經廷孔鬱結極甚而氣不能宣通則痿痺而神無所用故液滲入膀胱而旋溺遺失不能收禁也丹溪嘗治一男子遺溺不覺脈洪大盛以黃柏知母杜牛膝為君青皮甘草為臣木香為佐桂些小為反佐服數帖大效此法與千金翼白薇散皆治熱甚廷孔鬱結神無所用不能收禁之意也生生子曰按劉河間丹溪千金翼方有認為熱者必以脈症相參看治庶無偏熱偏寒之弊豫前論寒者以大槩而論也諸病皆有寒熱虛實多有始同終異故治法不能執一而無權也桑螵蛸散治遺溺桑螵蛸酒炒為末薑湯調下二錢雞內金散治溺床失禁雞䏶胵一具即雞肫內黃皮并腸洗淨燒存性男用雌女用雄研為末每二錢酒服妙大人遺溺不知薔薇根細研酒下雞腸草湯治小便不禁或睡中遺出不覺雞腸草一兩牡蠣粉三錢龍骨麥冬白茯苓桑螵蛸各五錢每服三錢棗一枚去核煎服一方治同上補骨脂炒為末黃柏煎湯調下又方治同上桂皮末雄雞肝等分搗丸如小豆大溫水下治小兒夢中遺尿薏苡仁一合去心不去殼敲碎入鹽一小撮同炒黃色水煎空心服之效縮泉丸治小兒遺尿脬氣不足小便頻多烏藥益智仁去壳鹽水泡等分為末酒煮山藥糊為丸空心鹽湯下二錢又方治同上烏藥益智仁各五錢桑螵蛸一兩為末空心鹽湯調下二錢效治遺尿方白茯苓牡蠣醋煆桑螵蛸各五錢龍骨桂各三錢為末以雞腸一具燒存性為末和勻空心白湯調下一錢禁方治遺溺阿膠炒牡蠣煅鹿茸酒炙桑螵蛸酒炙各等分為末􅟙米為丸梧子大每五十丸空心酒下治遺溺淋瀝桑螵蛸炙焦龍骨等分為末每二錢空心鹽湯下千金翼白薇散治尿出不知時白薇白芍藥等分為末溫酒下方寸匕日三服濟世方神芎導水丸治遺尿有實熱者每百丸空心白湯下若一服得大便利止後服此謂淫氣遺溺痺聚在腎痺謂氣不宣通也雞腸散腎與膀胱虛冷不能約制故遺尿失禁或睡自出肉桂龍骨各一錢半白茯苓桑螵蛸牡蠣粉各三錢雞腸一具分二帖水煎薑三片棗二枚空心溫服小便不禁生生子曰不禁謂無禁約小便多而頻不計遍數按經云水泉不止者是膀胱不藏也有濕熱有下元虛憊數而少為熱數而多為虛老人多有此蓋陽氣衰微不能約束歷見數人卒皆不救由其不能攝養而神氣耗散故也古人有謂不通為熱不禁為寒乃心腎氣弱陽道衰冷而傳化失度法當溫補溫存以養其神藥石以堅其腎神完腎固膀胱氣充自可約束然必調治及早庶或十全三五王莭齋曰小便不禁或頻數古方多以為寒而用溫澀之藥殊不知屬熱者多蓋膀胱火邪妄動水不得寧故不能禁而頻數來也故年老人多類此是膀胱血少陽火偏旺也治法當補膀胱隂血㵼火邪為主而佐以收澀之劑如牡蠣山茱茰五味子之類不可用溫藥也病本屬熱故宜瀉火因水不足故火動而致小便多小便既多水益虛矣故冝補血㵼火治其本也收之澀之治其標也按此乃本之于原病式熱鬱廷孔之説也生生子曰按節齋此論亦是以大槩言也老人下元虛憊氣弱不能乘載其水膀胱停濕浸淫皮薄不能收持故頻數不禁必如河間節齋所云然則癃閉已主于熱矣而不禁又主于熱是無虛寒之症也何古方有溫補之法經有寒虛之文耶不若以小便頻而清白長者為虛寒頻而少黃赤澀者為熱及脈洪數有力無力或滑或澀參驗之始無差悮凡熱天小便少寒月小便多寒熱之理亦易見爾大便祕結而小便頻多屬脾約症以脾約丸治之茯苓丸心腎俱虛神志不守小便淋瀝不禁赤茯苓白茯苓等分為末新汲水挼洗澄去新沫控乾别取熟地黃汁與好酒同于銀石器內熬成膏為丸彈子大空心鹽酒嚼下一丸二氣丹治內虛裏寒膀胱積冷陽氣漸微小便不禁硫黃肉桂各二錢半乾薑炮硃砂為衣各二錢附子一枚大者炮去皮臍為末五錢右糊丸梧子大每五十丸鹽湯下薑附赤石脂丸小便數而不禁怔忡多忘夢魘不已附子生乾薑各五錢赤石脂一兩半飛硃砂伏火者一兩酒糊丸菉豆大每十五丸至三十丸大便有病米飲下小便不禁茯苓湯下王海藏云此方妙在硃砂伏火上論載玉機微義甚詳御藥院祕元丹治內虛裏寒自汗時出小便不禁白龍骨三兩訶子十枚砂仁靈砂各一兩右糯米糊為丸梧子大每五十丸空心鹽湯下兔絲子丸治小便多或致失禁兔絲子肉蓯容酒浸各二兩牡蠣煆附子炮五味子鹿茸酒炙各一兩雞䏶胵炙乾桑螵蛸酒炙各五錢右酒糊丸梧子大每七十丸空心鹽湯溫酒下三因家韭子丸下元虛冷小便不禁或成白濁家韭子炒六兩鹿茸酒炙四兩肉蓯容酒浸牛膝熟地黃當歸各二兩巴戟去心兔絲子酒浸各一兩半杜仲石斛桂心官薑炮各一兩酒糊丸梧子大每百丸空心鹽湯酒任下桑螵蛸散治小便頻數或如米泔稠濁桑螵蛸鹽水炙逺志石菖蒲鹽炙龍骨人參茯神當歸鱉甲醋炙各等分為末每二錢臨卧人參湯調服一方用龜甲五子丸治小便頻數時有白濁兔絲子酒蒸家韭子炒益智茴香炒蛇床子去皮炒各等分酒糊為丸梧子大每七十丸米飲鹽湯任下丹溪鹿茸丸治久虛冷小便白濁滑數不禁鹿茸川椒去子取頭末桂心附子牡蠣石斛沉香補骨脂肉蓯容雞䏶胵各一兩桑螵蛸三分右酒糊為丸梧子大食前酒下三十丸又方治汚血淋瀝鹿角屑炒黃為末溫酒下二錢妙本草云鹿角逐隂中邪氣惡血水芝丸治下焦真氣虛弱小便頻多日夜無度蓮子去皮先以好酒浸一二宿用豬肚一具入蓮子在內水煮熟取出蓮子切片晒乾為末醋糊丸如雞頭子大每五十丸溫酒送下一方治稟賦虛弱小便頻數不禁五味子四兩肉蓯容半斤熟地六兩兔絲子酒煮炒乾二兩右酒煮山藥糊為丸梧子大每五七十丸空心鹽湯或酒送下萆薢丸治小便頻數川萆薢不拘多少為末酒糊丸如梧子大每五十丸空心鹽湯送下一方治夜多小便老人虛人多有此症白芷一兩糯米五錢炒褐色右糯米糊丸梧子大饅頭煎湯空心下七十丸玄兔丹治小便多兔絲子酒浸焙末十兩五味子酒浸研末七兩白茯苓三兩蓮肉三兩為末乾山藥末六兩將所浸酒餘者添酒煮糊為丸搗千杵丸梧子大每五七十丸空心米飲下小兔絲丸治腎氣虛損目眩耳鳴四肢倦怠夜夢遺精石蓮子肉二兩兔絲子酒浸研五兩白茯苓一兩五錢山藥二兩五錢打糊丸梧子大每五七十丸空心溫酒或鹽湯送下一方生山藥半斤刮去片先用酒熬沸入山藥不得攪動待熟加鹽蔥白更添酒空腹下二三盞妙益智散治小便多益智三十四枚為末水一碗煎八分入鹽五分臨卧溫服本事方衛真湯治丈夫婦人元氣衰憊榮衛怯弱真隂不固三焦不和上盛下虛夜夢鬼交覺來盜汗面色精彩唇口舌燥耳內蟬鳴腰痛背倦心氣虛乏精神不寧驚悸健忘飲食無味日漸瘦瘁外腎濕癢夜多小便腫重冷痛牽引小腹足膝緩弱行步艱難婦人血海久冷經候不調或過期不至或一月兩來赤白帶下漏分五色子宫感寒久不成孕並皆治之此藥大能生氣血遇夜半子時腎水旺極之時補腎實臟男子攝血化精諸病未萌之前皆能制治使不復為梗川歸酒浸一夜丁香青皮去白各一兩熟地茯苓木香肉果山藥各三兩生地川牛膝各二兩童便煮各半盞浸一夜人參一兩半石斛五兩為末每三大盞酒調下鹽湯亦得空心食前服婦人諸病童便同酒調空心服辰砂妙香散方在婦人門溺赤諸病水液渾濁皆屬于熱小便黃者少腹中有熱也治小便黃無如黃柏知母效脈經云足脛逆冷小便赤宜服附子四逆湯綱目載小便黃有四一屬肝熱經云肝熱病者小便先黃是也二屬胃濕經云胃足陽明之脈氣盛則身已前皆熱其有餘于胃則消穀善飢溺色黃者是也三屬肺虛經云肺手太隂之脈氣虛則肩背痛寒少氣不足以息溺色變故耳四屬腎虛經云冬脈者腎脈也冬脈不及則令人眇清脊痛小便變是也脫肛門附截腸病生生子曰脫肛之症多由腸內有積而清氣不升如痢疾裏急後重而下脫也治當從滯下門先推去積滯然後升補積滯去而清氣自升不復脫下其或因下血及痢疾後脫而不收者為虛升補之藥看氣血孰重脫久當以澀劑收之腸胃有風脫而下血者以風藥舉之脫久亦有虛寒當溫藥微洗內服大補之劑丹溪曰有氣虛氣熱血虛血熱氣熱者條芩六兩升麻一兩為末麵糊為丸服之其症肛脫紅腫者是也氣虛者參耆芎歸升麻或加白术訶子有熱加條芩其症多于勞倦房欲而發者是也血熱者四物湯加炒黃柏其症多于好酒及辛辣之物而發及便血也血虛者用四物湯加升麻荆芥其症下血過多面色痿黃者是也下痢脫肛痢門參治截腸病其症大腸頭出痛苦乾又落落又出腸盡則死初出寸餘時治之以芝麻油一盞以臀坐之飲火麻子汁數升愈脫肛之症前人以為肺氣虛寒蓋肺與大腸為表裏肺臟藴熱則閉結虛寒則脫婦人有此疾者多由産育用力過多小兒有此疾皆因久痢大腸虛冷所為也有腸頭作癢者此係腸中有蟲黃桂峰云親見一人裏急後重肛脫紅腫百藥皆試乃有蟲在肛故也濟世方治男女脫肛用五倍子小便濃煎洗之聖惠方治脫肛不收蝸牛燒灰豬脂調敷之砂仁湯治大腸虛脫肛挾熱紅腫者砂仁黃連木賊等分為末每服二錢米飲下文蛤散大腸虛寒肛門脫出不收或用力太過及小兒呌呼久痢後重者五倍子為末水煎汁浸洗更入白礬蛇床子尤佳後用赤石脂為末少許摻在芭蕉葉上頻用托入或有脫出尺許者亦用此湯溫浸頻換藥水以縮為度倍榆散治小兒脫肛五倍子地榆等分為末每五分或一錢米飲調下治老人脫肛防風蘆蒼术黃柏五倍子煎湯薰洗內服清涼大腸之藥而愈治脫肛下血韭菜一大握擂碎瓦罐煎熟再用生韭菜汁沖在湯內將肛門坐在瓶口薰一二次神效槐角丸五種腸風下血痔漏脫肛並治槐角三兩地榆黃芩當歸防風枳殼麩炒各二兩右酒糊丸梧子大每七十丸空心米飲下涼血清腸散生地當歸芍藥各一錢二分防風升麻荆芥各一錢黃芩炒黃連香附炒川芎各八分甘草五分水煎服三因方香荆散大人小兒肛門脫出並治香附荆芥穗各等分一方加砂仁右為末每服三匙水一大碗煎數沸乘熱洗秦芁湯腸胃濕熱及有風而脫肛不止秦芁去蘆酒洗七錢水煎空心服服後安卧一時渣再煎補中益氣湯治勞倦脫肛效一方五倍子為末每用三錢入白礬一塊水煎洗或以五倍末用紙襯之托上一方木賊燒存性為末搽肛上按入即收二靈散治久痢腸胃俱虛肛門脫下龍骨煅五錢木賊燒存性二錢半為末搽上托之治男女脫肛五倍子荆芥小便濃煎洗之本事方腸風下血及脫肛不收皂角三莖搗碎水一碗揉令皂角消盡用絹二層濾取清汁將肛浸在汁中自收並不待手托如大腸收了即用湯蕩其肛門上下令皂角氣行則不再作蕩三次全愈集驗方治脫肛歷年不愈生鐵三斤水一斗煮取五升以汁浸洗一方用刀漿水洗亦效肘後方治腸頭脫肛出轉久不可收入生瓜蔞汁浸之豬肉汁中洗隨以手按之令暖自收濟世方治脫肛荆芥龍腦薄荷朴硝右煎湯一日洗數次自入本事方治腸風脫肛及有血蛇床子炒為末貼肛上立收蝟皮散治肛門或因洞泄或因用力脫出不收蝟皮一枚燒存性礞石煅五錢桂心五錢此寒而脫肛也右為末米飲服方寸匕忌持重及房室肘後方治女人隂脫前方加鱉頭一枚燒存性研入黑聖散治㵼多時脫肛疼痛大蜘蛛一枚瓠葉重裹線札定合于內燒存性研入黃丹少許同研凡有上件疾即先用白礬蔥椒湯洗拭乾後搽藥以手托上千金方治脫肛歷年不愈鱉頭一枚燒令煙盡為末敷上手按挼之丹溪方治脫肛葫荽燒煙薰之立入海上方諸般痔脫肛死蛇一條如指大濕者掘地坑燒之以有孔板子蓋之坐其上以肛受煙薰之煙盡為止大效濟世方治肛出皂角薰次用蜒蚰一條入蜜浸去蜒蚰將蜜調土硃敷上即入一女子脫肛用糯米一勺濃煎飲去米洗肛溫柔先以磚一片火燒通紅用醋沃濕以青布鋪磚上坐肛于青布上如太熱加布令厚其肛暖自收入又方蓮房殼荆芥枳殼槐花黃柏防風獨活煎湯洗之或以木賊灰或又蛤末敷上立收治肛門腫痛木鱉子去殼取油四五枚研如泥入水盆中以滚湯泡之乘熱洗另用少許為末敷上肛門腫癢杏仁搗膏敷上亦治穀道痛蝕外臺祕要治下部蟲齧桃葉一斛蒸之令極熱納小口器中以下部坐上受薰其蟲盡死脈經云慝蝕隂脫其脈虛小者生緊急者死一人脫肛裏急後重百方莫能收一僧教以取豬肚一具刮下垢膩入花椒末拌勻塗肛上以青綿布袋兜之再以溫湯入埕內坐其上薰之少頃肛腸收袋上蟲不計其數從此再不復發前隂諸疾前隂所過之脈有二一曰肝脈二曰督脈經云肝足厥隂之脈入毛中繞隂器抵小腹是肝脈所過也又云督脈者起于小腹以下骨中央女子入繫廷孔循隂器男子循莖中至纂與女子等是督脈所過也隂縮隂縱隂縮謂前隂受寒縮入腹內也隂縱謂前隂受熱挺長不收也經曰足厥隂之筋傷于寒則隂縮入傷熱縱挺不收治在行水清隂氣是也丹溪治鮑兄年二十玉莖挺長腫而痿皮塌常潤磨股不能行兩脅氣上手足倦弱先以小柴胡加黃連大劑行其濕熱略加黃柏降其逆上之氣其挺腫漸收漸減及半但莖中有堅塊未消遂以青皮一味為君佐以散風之劑末服外以絲瓜汁調五倍子末敷而愈平江王氏子年三十忽隂挺長腫而痛脈數而實用朴硝荆芥湯浸洗又用三乙承氣湯大下之愈內經曰隂縮而死者皆屬肝傷又云悲哀動中則傷魂魂傷則狂妄不精不精則不正當隂縮而攣筋兩脅骨不舉毛悴色夭死于秋又云厥隂終者喜溺舌卷卵上縮是也玉莖腫前隂腫是也其症不一有通身水氣㿗脛俱腫者此屬水腫以治水之法治之其腎風抓搔成瘡以致腫者以治瘡毒之法治之有妬精蝕瘡腫毒以乾瘡之藥治之此緣妬精藴結毒氣未散而成腫痛也有服金石祕澀之藥精氣壅遏不能宣揚或試緊爐之方取一時之快熱毒內藴俱能為腫有血氣凝滯㿗間竅道閉塞致使莖腫或由忍溺致氣結不行而成腫凡此諸症並以燈心湯調五苓散服之以荆芥木通煎湯淋洗此條出鈎玄隂痿隂汗隂冷隂臭隂痿皆耗散過度傷於肝筋所致經云足厥隂之經其病傷于內則不起是也東垣隂痿隂汗隂臭論一富者前隂間嘗聞臊臭又因連日飲酒腹中不和求豫治之豫應之曰夫前隂者足厥隂之脈絡隂器出其挺末臭者心之所主散入於五方為臭入肝為臊臭此其一也當于肝中瀉行間是治其本後于心經㵼少沖以治其標如惡針當用藥除之治法當求其本連日飲酒夫酒者氣味俱能生濕熱是風濕熱合于下焦為邪故經曰下焦如瀆又云在下引而竭之酒者是濕熱之水亦宜決前隂以去之是合下焦二法治之龍膽㵼肝湯是也龍膽㵼肝湯治隂部時復濕癢有臊臭柴胡梢澤瀉各一錢車前子木通各五分當歸尾龍膽草生地黃各三分水煎空心飢時熱服便以美膳壓之柴胡入肝為引用澤瀉木通車前子皆淡滲之味利小便亦除臊臭是名在下者引而竭之生地黃龍膽草之苦寒㵼酒濕熱更兼車前子之類以徹肝中邪氣肝主血用當歸以滋肝中血不足也固真湯治兩丸冷前隂痿弱隂汗如水小便後有餘瀝臊氣㞍臀并前隂冷惡寒而喜熱膝亦冷升麻柴胡羌活各一錢甘草炙澤㵼各一錢半黃柏知母炒龍膽草炒各二錢水煎空心服以美膳壓之溫腎湯面色痿黃身黃腳軟隂汗隂莖有夭色麻黃六分防風根蒼术各一錢半白术豬苓白茯苓升麻黃柏酒炒各一錢澤瀉二錢柴胡梢六分水煎食前服之候一時辰許方食補肝湯前隂如氷冷并冷汗兩腳痿弱無力黃芪七分人參葛根各三分甘草炙蒼术各五分升麻豬苓各四分知母柴胡羌活當歸身陳皮黃柏炒防風白茯苓澤㵼神麯連翹各二分水煎食前熱服忌酒麵清震湯治溺黃臊臭淋瀝兩丸如氷隂汗浸兩股隂頭亦冷正值十二月天寒凛冽寒之極矣澤瀉升麻蒼术黃芩各五分柴胡當歸身甘草炙各二分羌活黃柏酒炒各一錢防風麻黃根藁本豬苓各三分紅花一分水煎服忌酒麵柴胡勝濕湯兩外腎冷兩髀樞隂汗前隂痿弱隂囊濕癢臊氣柴胡甘草生各三錢升麻羌活澤㵼各一錢半當歸麻黃龍膽草漢防己各一錢黃柏酒炒二錢五味子二十粒紅花少許白茯苓一錢水煎熱服忌酒麵房事仲景八味丸治隂痿不起今依前方夏減桂附一半春秋減三之一病去全減桂附椒粉散治前隂兩丸濕癢秋冬尤甚麻黃一錢狗脊蛇床子各五錢斑貓二枚當歸梢豬苓小椒各三分肉桂二分輕粉紅花各少許為細末摻上避風寒濕冷處坐卧又方治腎囊濕癢先用吳茱茰湯洗過後用吳茱茰半兩寒水石三錢黃柏二錢半樟腦蛇床子各五錢輕粉一錢白礬三錢硫黃二錢檳榔三錢白芷三錢為末摻之千金方云有人隂冷漸漸冷氣入隂囊腫滿恐死日夜痛悶不得眠取生椒擇之洗淨以布帛裹著丸囊令厚半寸須臾熱氣大通日再易之取出瘥本事云曾有人隂冷漸次冷氣入隂囊腫滿晝夜疼悶不得眠煮大薊汁服立瘥隂腫隂痛隂吹婦人隂腫腎痛枳實半斤切碎炒熱布包尉之冷即易交接勞復隂卵痛是勞復隂陽易仲景云胃氣下泄隂吹而正喧此穀氣之實也膏髮煎導之其方豬膏半斤亂髮如雞子大三枚以髮入膏中煎至髮盡分再服病自從小便中出能治諸疸症殊效雄黃散隂腫大如斗核痛人所不能治者雄黃一兩礬二兩甘草生半兩以水五升煎洗荆芥散治腎腫荆芥穗一兩朴硝二兩蘿蔔蔥同煎湯洗男子隂腫大如升睪痛甚搗馬鞭草塗之和劑三白散治小兒膀胱藴熱風濕相乘隂囊腫脹大小便不利白牽牛一兩桑白皮木通白术橘紅各五錢為末薑湯調二錢㿗風俗名腎臟風㿗風之症起于下部虛熱或行路體倦及夏月久坐冷地為風濕所襲乃發為疾其症囊濕皮厚生水泡瘡疥作癢古方用蛇床子一味煎湯淋洗癢甚者以薑汁入香油數滴攪勻塗上自愈沐浴長春散治下元隂濕久冷隂囊夜癢抓之則喜手住則痛成瘡流水為患甚苦及治婦人下部隂濕子胞久冷並效牡蠣蛇床子破故紙紫梢花官桂薄荷葉各等分每用一兩半入蔥白數莖水煎一小鍋先薰後洗再用津調散搽之全安津調散治妬精瘡膿汁淋漓臭爛黃連欵冬花等分麝香少許為末先洗過或以地骨皮蛇床子煎湯洗帛拭乾津調敷忌生冷生湯洗一方無麝又方治外腎及兩腿風濕瘡全蝎檳榔蛇床子硫黃各一錢為末麻油調入手心擦熱吸三口用手抱囊一頃次擦藥兩腿上疝氣門內經四氣刺逆從篇曰厥隂脈滑則病狐風疝少隂脈滑則病肺風疝太隂脈滑則病脾風疝陽明脈滑則病心風疝太陽脈滑則病腎風疝少陽脈滑則病肝風疝又骨空篇曰任脈為病男子內結七疝女子帶下瘕聚大竒論篇曰腎脈大急沈為腎疝肝脈大急沈為肝疝心脈搏滑急為心疝肺脈沈搏為肺疝三陽急為瘕三隂急為脾疝三隂脾脈也脈經曰寸口脈弦而緊絃緊相搏則為寒疝生生子曰內經以六經脈滑為風疝又以大急沉為五藏疝按此六經五臟皆有疝也而以風字加之于六經之疝者何也意者無乃以風字作氣字者看耶或以巽為風則木之氣肝之所主也又成疝之地乃肝部也夫滑脈主痰飲食積是言各經之痰飲食積流傳于肝之部地乃成疝也因肝主風故以風字加之也又夫急者緊急之謂也緊主病為寒沈亦為寒為氣大亦為氣是亦言五臟寒氣流于下部發為疝也蓋寒喜傷下腎肝俱在下而肝之絡環繞隂器故以疝屬肝也據任脈起于胞門循腹裏與衝脈厥隂會故男為七疝女為瘕聚也其痛極為難治而諸書所言亦不一惟張戴人一主于肝搜輯甚博且曰非靈素銅人之論法皆不取要之欲窮其原耳故其歷舉經義俞穴及七疝症圖殊為詳悉但用治諸方多是渠生平所長之三法人或病其峻抑不知有是病用是藥醫而不善用此是無術也則未免有過時失機之悔顧其症積滯根固淵藪偏僻非峻劑曷能以逹第不可孟浪亂投法所當用又何畏縮在設施者消息經權務求其當可也劉守真言此症亦有熱者丹溪亦主于肝且又言有濕熱死血及痰積因寒鬱而發間亦有虛者此亦深鑒前人純擬于寒而一以剛燥為劑也今以諸賢大意述列于後以便參治劉守真曰㿗疝小腹控卵腫急絞痛也寒主拘縮故也寒極而土化制之故腫滿也經言丈夫㿗疝謂隂器連小腹急痛也故言婦人少腹腫皆厥隂肝之脈也經注曰寒氣聚而為疝也又按經言五臟皆主疝但脈急也注言脈急者寒之象也然寒則脈當短小而遲今言急者非急數而洪也由緊脈主痛急為痛甚病寒雖急亦短小也所以有痛而脈緊急者脈為心之所養也凡六氣為痛則心神不寧而緊急不得舒緩故脈亦從之而見也欲知何氣為其病者適其緊急相兼之脈而可知也如緊急洪數則為熱痛之類也又經言脾傳之腎名曰疝瘕小腹寃熱而痛出白蠱注言小腹痛溲出白液也一作客熱內結銷鑠肌肉如蠱之食故名白蠱也然經復言熱為疝瘕則亦不可止言為寒當以脈症推之丹溪曰疝主肝經與腎經絶無相干疝痛之甚者睪丸連小腹急痛也或有形或無形或有聲或無聲自素問以下皆以為寒蓋經絡得寒收引不行所以作痛世有得寒而無疝者又必有説以通之可也豫屢踢氷徒涉不曾病此以豫素無熱也因而思此病始于濕熱在經鬱遏至久又感外寒濕熱收鬱而作痛若只作寒論恐為未備或曰此症多客厥隂一經濕熱之積何由而致豫曰大勞則火起于筋醉飽則火起于胃房勞則火起于腎大怒則火起于肝火鬱之久濕氣便盛濁液凝聚并入血隧流于厥隂肝屬木性速急火性暴為寒束宜其痛甚而暴也愚見古方以烏頭梔子等分作湯用之其效亦速後因此方隨形症加減無有不應又須分濕熱多寡而治之但腫多為濕㿗是也却有水氣而腫又有挾虛而發者當以參术為君而佐以疏導診其脈沈緊而豁大者是也若不以補劑而行決裂之法禍不旋踵許學士曰大抵此疾因虛得之不可以虛而驟補經曰邪之所湊其氣必虛留而不去其病必實故必先滌所蓄之熱然後補是以諸方多借巴豆氣者蓋謂此也張戴人曰疝本肝經冝通勿塞疝有七前人論者甚多非靈樞素問銅人之論余皆不取非余好異也但要窮其原耳七疝者何寒水筋血氣狐㿗是也俗工不識目為膀胱又為腎冷又或為小腸氣小兒曰偏氣立名既謬併喪其實何哉蓋醫者既斷為膀胱腎冷小腸氣又曰虛寒所致其藥之用也不鹿茸巴戟則杜仲蓯蓉不附子烏頭則乾薑官桂不練實茴香則金鈴補骨脂朝吞暮餌曾無殊效三二十年牢不可去間因微病稍似開通執此微茫浸成大錯標既不除本必歸甚處處相傳曾無覺者豈知諸疝皆歸肝經其奈庸流歸之小腸脬囊夫膀胱水府專司滲泄小腸水道專主流通腎為少隂總統二水人之小溲自胃入小腸滲入膀胱膀胱者脬囊也氣化則水出莖端此常道也及其為疝乃是厥隂肝經蓋環隂器而上入小腹者足厥隂肝經也夫腎肝皆屬于下衝任督相附然靈樞經言足厥隂肝經病則有遺溺癃閉狐疝主腎與小腸膀胱三經則不言疝是受疝之處乃肝之部分也且內經男子宗筋為束骨之會也而肝主筋皋者囊中之丸雖主外腎非厥隂環而引之與玉莖無由伸縮在女子則為纂户其內外為二其一曰廷孔其二曰窈漏此足厥隂與衝任督之所會也靈樞言足厥隂之經筋聚于隂器其病傷於寒則隂縮入傷於熱則縱挺不收治在行卧清隂氣故陽明與太隂厥隂之筋皆會於隂器惟厥隂主筋故為疝者必本之厥隂靈樞又言足厥隂之别名曰蠡溝去內踝五寸别走少陽循脛上皋結于莖其病氣逆皋腫卒疝實則挺長虛則暴癢取之所别矣豈非厥隂為受病之處耶靈樞又言邪在小腸連皋係屬于腎貫肝絡肺系心氣盛厥逆上衝腸胃重肝散于肓結于臍故取之肓原以散之刺太隂以平之取厥隂以下之取巨虛下臁以去之按其所過之經以調之此其初雖言邪在小腸至其治法必曰取厥隂以下之乃知諸疝關于厥隂可以無疑以脈考之素問云厥隂滑為狐風疝少隂滑為肺風疝太隂滑為脾風疝云云凡此六疝雖見于他脈中皆言風疝者足厥隂肝經之氣也靈樞亦曰心脈微滑為心疝肝脈滑甚為㿉癃腎脈滑甚為癃㿉凡此三臟脈之疝亦以滑為疝也素問又云脈大急皆為疝心脈滑傳為心疝肺脈沈傳為肺疝三隂急為疝三陽急為瘕王太僕云太陽受寒血凝為瘕太隂受寒氣聚為疝此言太隂受寒傳之肝經也可以溫藥逐之不可以溫藥補之若補之者是欲病去而強挽留之也歷考素問三陽為病發寒熱其傳為㿗疝此亦言膀胱非受病之處必傳于厥隂部分然後為疝也又言病在少腹腹痛不得大小便病名曰疝得之寒言脈急者曰疝瘕少腹痛凡言少腹者豈非厥隂之部分耶又言脾氣傳胃名曰疝瘕此謂非肝木不能為風氣名曰厥疝蓋脾土虛而不能制水又為肝木所凌也又言督脈為衝疝蓋厥隂與衝任督俱會于前隂也豈不明哉至于運氣中又言嵗太陽在泉寒淫所勝民病少腹控皋蓋寒客于小腸膀胱則肝木縮而不得伸行母傳之子也陽明司天燥淫所勝丈夫㿗疝婦人小腹痛此言肝氣不得上行為金所抑鬼賊故也又言太隂在泉土勝則寒氣逆滿食飲不下甚則為疝此亦言寒客太隂濕土土不能勝水水傳之肝經也又嘗遍閲銅人俞穴亦相表裏如背上十三椎俞肝經言寒疝腹部中行惟隂交一穴言寒疝任脈之所發也關元一穴言暴疝小腸之幕足三隂任脈之會也曲骨一穴言㿉疝任脈足厥隂之會也其腹部第二行肓俞二穴言寒疝衝脈足少隂之會也四病上穴言疝瘕衝任脈足少隂腎之會也其腹部第三行大巨二穴言㿉疝足陽明脈氣之所發也氣衝二穴言㿗疝莖中痛兩丸寒痛亦足陽明脈氣之所發也其腹部四行府合二穴言疝痛足六隂厥隂隂維之交會也亦太隂部三隂陽明支别也衝門二穴言隂疝足太隂厥隂之會也其在側脅者五樞二穴言寒疝隂邪上入少腹帶脈下三寸也其在足六經者足厥隂穴十名言疝者七謂大敦行間大衝中封蠡溝中都曲泉足少陽穴十四名言疝者一謂邱墟穴也足太隂穴十一名言疝者一謂隂陵泉也足陽明穴十五名言疝者一謂隂市穴也足少隂穴十五名言疝者五謂然谷大溪照海交信築賔也足太陽穴十八名言疝者二謂金門合陽也由是言之惟厥隂言疝獨多為疝之主也其各經穴雖亦治疝終非受疝之地但與足厥隂相連耳或在泉寒勝木氣攣縮禁于此經或司天燥勝木氣抑鬱于此經或忿怒悲哀憂鬱頓挫結于此經或藥淋外固閉尾縮精壅于此經其病差别如此不知世間之藥多熱補從誰而受其方也信其方則素問靈樞銅人皆非也信素問靈樞銅人則俗方亦皆非也不知後之君子以孰為是嗚呼余立于醫四十餘年使世俗之方人人可療余莫之敢廢也諳練日久因經識病然後不惑且夫遺溺閉癃隂痿胞痺精滑白淫皆男子之疝也不可妄歸之腎冷血涸不日月罷腰膝上熱足躄嗌乾癃閉少腹有塊或定或移前隂突出後隂痔核皆女子之疝也但女子不謂之疝而謂之瘕若年少而得之不計男子婦人皆無子故隱蔽委曲之事了不干脬腎小腸之事乃足厥隂肝經之職也奈俗方只言脬腎小腸殊不言肝木一句惑人甚矣且肝經乙木也木屬東方為心火之母也凡疝者非肝木邪則肝木自甚也不可便言虛而補之難經所謂東方實西方虛㵼南方補北方此言㵼火木自平金自清水自旺矣昔審言為蔡之參軍也因坐濕地疝痛不可堪諸藥莫救余急以導水丸禹功散㵼三十餘行腫立消痛立減又項關一男子病卒疝暴痛不任倒于街衢人莫能動呼余救之余引經證之邪氣客于足厥隂之絡令人卒疝故病隂丸痛也余急㵼大敦二穴大痛立已夫大敦穴者乃是厥隂之二穴也殄冦鎮一夫病痎瘧發渴痛飲蜜漿劇傷氷水醫者莫知㵼去其濕反雜進薑附濕為燥熱所壅三焦閉溢水道不行隂道不興隂囊腫墜大于升斗余先以導水百餘丸少頃以豬腎散投之是夜㵼青赤水一斗遂失痛之所在近頴尾一夫病卒疝赤腫大痛數日不止諸藥如水投石余以導水一百五十丸令三次咽之繼以通經散三錢空腹淡酒調下五更下臟腑壅積之物數行痛腫皆去不三日平復如舊內經曰木鬱則達之達謂吐也令條達肝之積本當吐者然觀其病之上下以順為貴仲景所謂上宜吐下冝瀉者此也敢列七疝圖于左以示後之君子庶幾有所憑藉者焉寒疝其狀囊冷結硬如石隂莖不舉或控皋丸而痛得于坐卧濕地或寒月涉水或置雨雪或卧坐磚石或風冷處使內過勞宜以溫劑下之久而無子水疝其狀腎囊腫痛隂汗時出或囊腫而狀如水晶或囊癢而燥出黃水或少腹中按之作水聲得于飲水酒醉使內過勞汗出而遇風寒濕之氣聚于囊中故水多令人為卒疝宜以逐水之劑下之有漏針去水者人多不得其法筋疝其狀隂莖腫脹或潰或膿或痛而裏急筋縮或莖中痛痛極則癢或挺縱不收或白如精隨溲而下得于房失勞傷及邪術所使宜以降心之劑下之血疝其狀如黃瓜在少腹兩傍橫骨兩端約中俗云便癰得于重感春夏大燠勞動使內氣血流溢滲入脬囊留而不去結成癰腫膿少血多宜以和血之劑下之氣疝其狀上連腎區下及隂囊或因號哭忿怒則氣鬱之而脹怒止號罷則氣散者是也有一治法以針出氣而愈者然針有得失宜以散氣之藥下之或小兒亦有此疾俗曰偏氣得于父年已老或少年多病隂痿精怯強力入房因而有子胎中病也此疝不治惟築賔一穴言之狐疝其狀如瓦卧則入小腹行立則出小腹入囊中狐則晝出穴而溺夜則入穴而不溺此疝出入上下往來正與狐相類也亦與氣疝大同小異今人帶鈎鈴是也宜以逐氣流經之藥下之㿗疝其狀隂囊腫縋如升如斗不癢不痛者是也得之地氣卑濕所生故江淮之間湫塘之處多感此疾宜以去濕之藥下之女子隂户突出雖亦此類乃熱則不禁固也不可便謂虛寒而澀之燥之補之本名曰瘕宜以苦下之以苦堅之王氷曰陽氣下墜隂氣上爭上爭則寒多下墜則筋緩故皋垂縱緩因作㿗疝也已上七疝下去其病之後可調則調可補則補各量病勢勿拘俗法經所謂隂盛而腹脹不通者㿗癃疝也不可不下統旨曰或問疝氣古方有以為小腸氣者有以為膀胱氣者惟戴人丹溪專主肝經其説不同何以辨之豫曰小腸氣小腸之病膀胱氣膀胱之病疝氣肝經之病三者自是不一昔人以小腸膀胱氣為疝者誤也殊不知足厥隂之經環隂器抵小腹人之病此者發則睪丸脹痛而連及小腹則疝氣之係于肝經也可知矣且小腸氣俗謂之橫絃竪絃繞臍走注少腹攻刺而膀胱氣則在毛際之上小腹之分作痛與疝氣之有形如瓜有聲如蛙或上于腹或下于囊者不同也但小腸膀胱因經絡並于厥隂之經所以受病連及于肝則亦下控引皋丸為痛然只是二經之病不可以為疝也學者惟考張朱二公之説則庶乎其不惑矣生生子曰按統旨此論只可以言狐疝不足以盡經義然素問六經皆有疝故後之言疝者或名小腸氣或名膀胱氣或名腎冷氣張戴人朱丹溪乃獨屬之肝經要之各有所本而肝腎居多爾按靈樞經云邪在小腸連皋系屬腎貫肝絡肺系心氣盛厥氣上衝也大凡邪氣襲于人之經也隨各經而名之襲于腎為腎氣襲于膀胱為膀胱氣襲于小腸為小腸氣腎與膀胱相為表裏其氣通于外腎系于皋丸此三經與厥隂互相聮絡而又俱在下部與衝任督諸脈會也戴人亦曰腎之穴十而言疝者五丹溪乃言與腎絶無相干絶之一字未細考爾實相須也凡久立過內則傷腎勞力逺行則傷筋腎傷則膀胱虛筋傷則肝氣弱一有所傷風寒濕邪乘虛而襲入于腎則脬囊腫小腹痛而足冷舌本強此腎經受病之候入于肝則先從隂器冷痛上抵胠脅唇青足厥甚則舌卷囊縮此肝經受病之候也膀胱乃胞之室素問骨空論篇曰任脈起于中極之下以上毛際循腹裏上關元自胞上過帶脈貫臍而上故任脈為病男子內結七疝或指膀胱氣者以此也又衝脈為病逆氣裏急督脈起少腹以下骨中央女子入系廷孔其孔溺孔之端也其絡繞隂器合纂間繞纂後别繞臀至少隂其男子循莖下至纂與女子等其少腹直上者貫臍中央上貫心此生病從少腹上衝心而痛不得前後為衝疝注曰衝任督皆竒經一源而三岐都與腎肝會也由是考之各有所本匪謬也惟肝腎居多腎不得無相干肝不得獨主疝從可知矣揣戴人之意若獨屬之肝則東方實為有餘有餘者㵼之庶可以行生平所長之技也師者誠能體認不謬則通塞一適其宜丹溪戴人不多讓矣挾虛者當用參术為君佐以疏導之藥其脈豁大按之無力者虛也又按之不定者亦屬虛必用桂枝山梔炒過烏頭細切炒過為末以薑汁糊為丸每服三十丸薑湯下大能劫痛食積與死血成痛者梔子桃仁山查枳實吳茱茰並炒以生薑汁順流水煎湯調服一方加茴香附子戴元禮曰木腎者心火下降則腎水不患乎不溫真陽下行則腎水不患乎不和安有所謂木強者哉夫惟嗜欲內戕腎家虛憊故隂陽不相交水火不相濟而沈寒痼冷凝滯脹大作痛頑痺結硬不可純用燥熱當溫散溫利以逐其邪邪氣內消榮衛流轉盎如寒谷春回蓋有不疾而速不行而至之妙矣橘核散單止痛此蓋濕熱因寒鬱而發用梔子仁以除濕熱用烏頭以散寒鬱况二藥皆下行之藥而烏頭又為梔子所引其行尤速不使胃中停留也橘核桃仁梔子川烏炒吳茱茰水煎服又方劫痛烏頭細切炒梔子仁炒等分為末或加或減白湯丸服亦可積疝方山查炒一兩茴香炒柴胡炒各三錢牡丹皮一錢酒糊丸如梧子大鹽湯下六十丸又方治疝痛山查炒四兩枳殼炒茴香炒山梔仁炒各二兩牡丹皮柴胡桃仁炒大茴炒各一兩吳茱茰五錢酒糊丸鹽酒吞下五十丸又方治疝痛蒼术鹽炒香附鹽炒黃柏酒炒為君青皮玄胡索益智桃仁為臣茴香為佐大附子鹽炒甘草為使水煎服一痛過更不再作矣一人有疝腹內有塊每塊痛作疝痛止疝痛作塊痛止三稜莪术醋煮神麯炒薑黃南星各一兩山查二兩木香沈香香附各三錢黃連吳茱茰同炒去茱茰用淨黃連五錢桃仁蘿葡子山梔仁枳核炒各五錢薑汁􅔻餅糊為丸治小腸氣及木腎偏墜黑丑一斤用豬尿胞裝滿以線縫口好酒米醋各一碗于砂鍋內煮乾為度取出黑丑用青紅娘子各十九枚于鐵鍋內炒燥去青紅娘子將黑丑研取頭末四兩另入豬苓澤㵼細末各二兩醋糊為丸梧子大每服三十丸空心鹽酒送下不可多服多服令人頭眩如頭眩可服黑錫丹元戎加味五苓散治疝氣卒痛小便澀本方加川練子一分局方三白散治膀胱藴熱濕熱乘隂囊腫痛大小便不利方見前隂門復元通氣散舶上茴香川山甲蛤粉炒各二兩陳皮玄胡索黑丑炒末甘草炒各一兩木香一兩半為末每一大錢食前熱酒調服寶鑑控引皋丸小腸病結上而不下痛引心臆茴香炒川練子炒食茱茰陳皮馬閵花醋炒各一兩芫花醋炒五錢醋糊為丸梧子大每十丸至二十丸空心溫酒下三因大烏頭桂枝湯治風寒疝氣腹中刺痛手足不仁身體拘急不得轉側或致隂縮大烏頭五枚去皮尖蜜煎過洗切桂心白芍各三錢甘草一錢每服四錢薑棗煎服局方奪命丹逺年近日小腸疝氣偏墜搐痛臍下撮痛悶亂外腎腫硬日漸滋長隂間濕癢搔成瘡吳茱茰淨一斤四兩用酒醋湯童便各浸一宿焙乾澤瀉二兩酒糊為丸梧子大每五十丸空心鹽湯下葫蘆巴丸小腸氣蟠腸氣奔豚疝氣偏墜隂腫小腹有形如卵上下來去痛不可忍或絞結繞臍攻刺嘔吐者葫蘆巴炒一斤巴戟炒六兩川練子炒一斤二兩川烏炮去皮六兩茴香炒二十兩吳茱茰湯洗七次十兩酒糊為丸梧子大每二十丸空心酒下戴人禹功散黑丑頭末四兩茴香炒一兩為末以生薑自然汁調一二錢臨睡服或加白术一兩茴香練實丸治隂疝痛不可忍及小腸氣痛川練子炒茴香炒青皮陳皮芫花醋炒山茱茰食茱茰吳茱茰馬閵花各等分醋糊丸梧子大溫酒下三十丸天台烏藥散治小腸疝氣牽引臍腹疼痛烏藥木香茴香炒青皮良薑炒各五錢檳榔二枚川練子十枚巴豆七十粒右先以巴豆微打破同川練麩皮炒黑去巴豆麩皮不用外餘藥同為末每用一錢酒調下甚者薑湯下亦可濟生葵子湯膀胱實熱腹脹小便不通口舌乾燥赤茯苓豬苓葵子枳實瞿麥車前子木通黃芩滑石甘草等分每五錢入薑煎空心服局方蟠蔥散治寒疝氣疝衝心疼痛玄胡索蒼术甘草各半斤茯苓蓬术三稜青皮各六兩丁皮砂仁檳榔各四兩桂乾薑各兩每服二錢入蓮鬚蔥一莖水煎食前服金匱當歸生薑羊肉湯寒疝腹中痛及脅痛裏急當歸三兩生薑五兩羊肉一斤水八升煮三升溫服七合日三服如寒多加生薑嘔者加陳皮二兩白术一兩蜘蛛散治隂狐疝氣偏有大小時時上下蜘蛛十四枚􅘮肉桂五錢一云五分為末取八分米飲調服或蜜丸服亦可王海藏凡用以黑大者去頭足研如膏入藥中乃效炒黑不妙東垣丁香練實丸男子七疝痛不可忍婦人瘕聚帶下皆任脈所主隂經也乃腎肝受病故治法同當歸附子炮川練子茴香炒各二兩好酒三升同煮盡為度焙乾作細末每一兩入丁香木香玄胡末各五錢全蝎十三枚後四味末入在前藥末內和勻酒糊丸梧子大每三十丸加至百丸空心溫酒下尉法鹽半斤炒極熱以舊綿包尉臍腹痛處又方蔥白研碎一握置臍中上用尉斗尉之或以艾于上灸之尤妙海藻潰堅丸治木腎如斗結硬如石海藻昆布川練肉吳茱茰湯泡各一兩木香青皮小茴荔枝核炒玄胡索炒肉桂各五錢海帶橘核炒桃仁麩炒去皮尖各一兩木通七錢酒糊為丸梧子大每六十丸空心鹽酒任下㿗疝大如升斗者是也惟大不痛丹溪謂非痛斷房事厚味不可用藥惟促其夀若蒼术神麯白芷半夏山查枳實皆要藥人視其為淺鄙以啓慢心又不能斷欲以愛護其根者非徒無益而又被其害者多矣且其藥宜隨時令寒溫更按君臣佐使加減大抵㿗屬濕多蒼术神麯白芷散水山查川芎枳實南星半夏神麯糊為丸有熱加山梔一兩堅硬加朴硝五錢秋冬加吳茱茰二錢半又方治㿗疝南星山查蒼术各二兩白芷半夏枳核神麯各一兩海藻昆布各五錢玄明粉吳茱茰各二錢酒糊丸治木腎不痛方南星半夏黃柏酒洗蒼术鹽炒枳實山查白芷神麯炒滑石炒吳茱茰昆布酒糊丸空心鹽湯下一方加枸杞子治偏墜初生穿山甲茴香為末酒送下乾物壓之潔古海蛤丸治㿗疝從小便中利出惡物海蛤醋淬三次海金沙膩粉硼砂川歸各一錢海藻粉霜各五分水蛭草一條炒青黛滑石乳香各一錢硃砂二錢地龍二十一條鹽水洗去泥右用鹽煮麵糊為丸小豆大硃砂為衣每十丸燈心湯空心服之小便下冷膿惡物乃效却以黃連紫河車板藍根各二錢煎湯潄口以固牙一方去板藍根加貫衆王海藏地黃膏子男子婦人臍下奔豚氣塊小腹疼痛隂腫控皋而痛上衝心腹不可忍者血竭沉香木香人參廣茂炮玄胡索蛤蚧川歸川芎續斷白术川練子炒全蝎茴香炒柴胡沒藥吳茱茰已上分兩隨症加減用之氣多者加青皮血多者加肉桂為末地黃膏子為丸梧子大空心溫酒下二十丸日加一丸至三十丸本事方念珠丸膀胱疝氣外腎腫痛不可忍昔有人貨此藥治疝如神一日貨數千丸一國醫多與金而得之用果良驗乳香碙砂飛各三錢為末黃蠟一兩熔化分作一百單八丸以線穿之露一宿次日用蛤粉為衣旋取用乳香湯送下丹溪治鄭子敬酒後飲水及水果腎偏大時作蛙聲或作痛炒枳實一兩鹽炒茴香炒梔子各三錢研煎湯送下保和丸又一人膀胱氣下墜如蛙聲臭橘核炒十枚桃仁二十枚蘿蔔汁下保和丸七十丸一人年三十左腎核腫痛此飲食中濕墜下成熱以臭橘核五枚桃仁七枚細研順流水一盞煎沸湯熱下保和丸丹溪治木腎以水晶蒲桃葉野紫蘇葉蒼耳葉濃煎湯薰洗一方治水㿗偏大上下不定疼痛不止牡蠣不拘多少鹽泥固濟炭三斤煆令火盡冷取出二兩加乾薑一兩焙為細末二味和勻以冷水調塗病處小便大利而愈又方玄胡索鹽炒全蝎為末每二錢溫酒調下雄礬散治隂腫大如斗核痛雄黃一兩白礬二兩甘草五錢水煎先薰後洗效治偏墜一人核腫痛甚二子不分大如升遍醫不效以此治除根松江甚神此方牡丹皮二兩蒼术米泔浸三日鹽水拌炒六錢荔枝核炒一兩山查一兩半橘核炒七錢山梔仁去皮以吳茱茰湯炒三兩神麯糊丸梧子大空心白湯下五十丸解鉗丸治小腸氣及膀胱氣橫絃豎絃木腎偏墜下部諸疝氣痛木鱉子二兩淨去油用木通二兩切碎同炒焦黑色去木通茴香二兩用班貓二十一枚去頭翅足同炒香熟去班貓黑丑二兩用蘿蔔子二兩略研碎同炒香熟去蘿蔔子半夏二兩用薜荔二兩向陽者銼碎同炒黃色去薜荔補骨脂二兩用豬苓二兩銼碎同炒去豬苓酒糊丸梧子大空心服三十丸炒薑鹽燈心酒下下午後臨睡各一服五妙丸治一切下部氣速效如神黑丑補骨脂川練肉各一兩用地龍一兩同三件炒去地龍半夏一兩用豬苓一兩同炒去豬苓不用茴香一兩用班貓十四枚同炒去班貓不用丁香二分用土狗十枚同炒去土狗玄胡索一兩炒酒糊丸梧子大每服十丸加至十五丸空心鹽酒送下乳薑湯治寒疝氣上衝中脘築痛乳香末二錢生薑自然汁二錢水一大盞同煎三五沸通口服一服效香术九寒濕成疝腎腫疼痛蒼术半斤米泔水浸一宿晒乾用生薑半斤蔥白四兩搗炒蒼术乾去蔥薑不用茴香半斤用生薑汁四兩浸一二宿後用鹽炒乾吳茱茰湯泡炒四兩右為末搗蔥白成膏為丸梧子大每五十丸空心溫酒或鹽湯下又方治諸疝痛及心痛臨發時服海石香附為末薑汁調下一人患疝多服熱藥以致小便不通後用五苓散分三帖每加連鬚蔥一根麝香少許鹽五分煎服連進三服其夜下黑汁二升臍下遂寬續用碙砂丸數日全赤水元珠卷十五
