body:
  text: 赤水元珠卷十二明孫一奎撰痺門生生子曰按內經靈樞所云痺證有臟腑營衛筋脈肌皮骨及俞合刺法論包甚廣而世之認痺症者絶少丹溪擬名痛風編門論治是從內經寒氣多者為痛痺論得其一也其有不痛及各臟腑俞合等證世皆不詳載者意其以風寒濕三氣為病之本散寓於各證之下隨各證而分治之如胞痺寓淋腸痺寓飱泄心痺寓噫氣肺痺寓喘滿之類皆是然則痺之不名也久矣宜乎其有認為痿認為風認為腳氣同治者此不務研經㫖而惟務求同俗也可慨夫豫今列經㫖於篇首以全軒岐舊意以痛風復痛痺以昭中古諸腎證治得痺之一俾合前後而考之庶可因名而循其實也設不復之則痛者固可以為風而於不痛者獨不可以為風乎抑凡見筋骨作痛而亦有血虛有陰火有痰涎者又皆可以風名之乎在丹溪諸公必自能融㑹體認其如因名迷實之弊流害已久名不正則言不順豫故不能無容言也後之明哲幸鑒豫心黃帝問曰痺之安生岐伯對曰風寒濕三氣雜至合而為痺也其風氣勝者為行痺行痺者行而不定也今稱為走注疼痛及厯節風之類是也寒氣勝者為痛痺痛痺者疼痛苦楚世稱為痛風及白虎飛尸之類是也濕氣勝者為著痺著痺者著而不移世稱為麻木不仁必著而不移劉河間所謂氣之道路著而麻者得矣或痛著一處始終不移者是也啓𤣥子注曰風則陽受之故為痺行寒則陰受之濕則皮肉筋骨受之故為痺著而不去也故乃痺從風寒濕之所生也帝曰其有五者何也岐伯曰以冬遇此者為骨痺以春遇此者為筋痺以夏遇此者為脈痺以至陰遇此者為肌痺以秋遇此者為皮痺此皆以所遇之時所客之處命名非行痺痛痺著痺之外又别有此五痺也以時令配五臟所合而言也帝曰內舍五臟六腑何氣使然啓𤣥子注曰言皮肉筋脈骨痺以四時之外遇然內居腑臟何以致之岐伯曰五臟皆有合病久而不去者內舍於其合也故骨痺不已復感於邪內舍於腎筋痺不已復感於邪內舍於脈脈痺不已復感於邪內舍於心肌痺不已復感於邪內舍於脾皮痺不已復感於邪內舍於肺所謂痺者各以其時重感於風寒濕之氣也凡痺之客五臟者肺痺者煩滿喘而嘔心痺者脈不通煩則心下鼓暴上氣而喘嗌乾善厥氣上則恐肝痺者夜臥則驚多飲數小便上為引如懷孕腎痺者善脹尻以代踵脊以代頭脾痺者四肢解墮發咳嘔汁上為大塞腸痺者數飲而出不得中氣喘爭時飱泄胞痺者少腹膀胱按之內痛若沃以湯澀於小便上為清涕陰氣者靜則神藏躁則消亡飲食自倍腸胃乃傷淫氣喘息痺聚在肺淫氣憂思痺聚在心淫氣遺溺痺聚在腎淫氣乏竭痺聚在肝淫氣肌絶痺聚在脾王注淫氣謂氣之妄行者各隨藏之所主而入為痺也諸痺不已亦益內也其風氣勝者其人易已也帝曰痺其時有死者或疼久者或易已者其故何也岐伯曰其入臟者死其留連筋骨間者疼久其留皮膚間者易已帝曰其客於六腑者何也岐伯曰此亦其飲食居處為其病本也六腑亦各有俞風寒濕氣中其俞而飲食應之循俞而入各舍其腑也帝曰以針治之奈何岐伯曰五臟有俞六腑有合循脈之分各有所發各隨其故則病瘳也甲乙經以隨為治帝曰營衛之氣亦令人痺乎岐伯曰營者水榖之精氣也和調於五臟灑陳於六腑乃能入於脈也故循脈上下貫五臟絡六腑也衛者水穀之悍氣也其氣慓疾滑利不能入於脈也故循皮膚之中分肉之間熏於盲膜散於胸腹逆其氣則病從其氣則愈不與風寒濕氣合故不為痺也帝曰善痺或痛或不痛或不仁或寒或熱或燥或濕其故何也岐伯曰痛者寒氣多也有寒故痛也其不痛不仁者痛久入深營衛之行澀經絡時疏故不通甲乙經作痛皮膚不營故為不仁其寒者陽氣少陰氣多與病相益故寒也其熱者陽氣多陰氣少病氣勝陽遭陰故為痺熱其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也帝曰夫痺之為病不痛何也岐伯曰痺在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在皮則寒故具此五者則不痛也凡痺之類逢寒則急逢熱則縱帝曰善刺痺穴法冬感風寒濕者為骨痺久不已則內入於腎病腎脹足攣尻以代踵身踡脊以代頭取太溪委中春感風寒濕者為筋痺久不已則內入於肝病臥則驚多飲數小便取太衝陽陵泉夏感風寒濕者為脈痺久不已則內入於心病心下滿暴喘嗌乾善噫恐懼取太陵少海長夏感風寒濕者為肉痺久不已則內入於脾病解墮發咳嘔汁取太白三里秋感風寒濕者為皮痺久不已則內入於肺病煩滿喘嘔取太淵合谷靈樞黃帝問於岐伯曰周痺之在身也上下移徙隨脉其上下左右相應間不容空願聞此痛在血脈之中邪將在分肉之間乎何以致是其痛之移也間不及下針其搐痛之時不及定治而痛已止矣何道使然願聞其故岐伯答曰此衆痺也非周痺也黃帝曰願聞衆痺岐伯曰此各在其處更發更止更居更起以右應左以左應右非能周也更發更休也帝曰善此痛安在何因而有名岐伯曰風寒濕氣客於外分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痺發發則如是此內則不在臟而外未發於皮獨居分肉之間真氣不能周故命曰衆痺仲景金匱要略論血痺乃尊榮人骨弱肌膚盛重困疲癆汗出臥不時動搖加被微風遂得之但以脈自微澀在寸口關上小緊宜針引陽氣令脈和緊去則愈血痺陰陽俱微寸口關上微尺中小緊外證身體不仁如風痺狀黃茋桂枝五物湯主之嚴用和曰痺證因體虛腠理空疏受之而成逢寒則急逢熱則縱隨所受邪氣而生證也診其脈大而澀為痺脈來急亦為痺脈澀而緊者亦為痺又有風血痺陰邪入於血經故也劉宗厚曰人之感三氣而為痺者以其形虛血虛耳但有在肌皮血脈淺深之異故入藏者死緣痺之為證有筋攣不伸肌肉不仁者與風證絶相似故世俗類於風痿痺證通治此千古之弊也大抵固當分其所因風則陽受之痺感風寒濕之氣則陰受之為病多重痛沈著患者易得難去如錢仲陽為宋之一代明醫自患周痺止能移於手足為之偏廢不能盡去可見其為難治也况今世俗多類於風證通治宜乎不能得其病情也統㫖曰風痺者逰行上下隨其虛邪與血氣相搏聚於關節筋脈弛縱而不收也宜防風湯寒痺者四肢攣痛關節浮腫宜五積散濕痺者留而不移汗多四肢緩弱皮膚不仁精神昏塞者宜茯苓川芎湯熱痺者臟腑移熱復遇外邪客搏經絡留而不行陽遭其陰故㿏痺翕然而悶肌肉熱極體上如鼠走之狀唇口反裂皮膚色變宜升麻湯三氣合而為痺則皮膚頑厚或肌肉痠痛此為邪中周身搏於血脈積年不已則成癮疹風瘡搔之不痛頭髮脫落治宜疏風凉血腸痺者數飲而小便不通中氣喘爭時作飱泄宜五苓散加桑白皮木通麥門冬或吳茱萸散木香丸胞痺者少腹膀胱按之內痛若沃以湯澀於小便上為清涕宜腎著湯腎瀝湯方見淋閉門血痺者邪入於陰血之分其狀體常如被風所以骨弱勞瘦汗出臥則不能搖動也宜當歸湯周痺者在血脈之中上下逰行周身俱痛宜觸痺湯大豆孽湯支飲者手足麻痺臂痛不舉多睡眩冒忍尿不便膝冷成痺也宜茯苓湯東垣云身體沈重走注疼痛濕熱相搏而風熱鬱不得伸附著於有形也宜蒼术黃柏之類行痺治劑即走注疼痛仲景桂枝芍藥知母湯治諸肢節疼痛身體尫羸腳腫如脫頭眩短氣兀兀欲吐痛風神效桂枝知母防風各四兩芍藥三兩甘草麻黃附子炮各二兩生薑白术各五兩水七升煮取二升溫服一日三服烏頭湯厯節風不可屈伸疼痛麻黃芍藥黃茋各三兩甘草炙川烏五枚㕮咀以蜜二升煎取一升即去烏頭水三升煎一升去渣納蜜再煎七合不時盡服之河間防風湯治行痺走注無定痛風神效防風當歸赤茯苓杏仁去皮尖炒各一錢甘草桂各五分黃芩秦芁葛根各二分麻黃去節五分水酒各二盞棗三枚薑五片煎一盞去渣溫服本事方薏苡仁散治濕傷腎腎不能生肝肝自生風遂成風濕流注四肢筋骨或入左肩顒肌肉疼痛漸入左指薏苡一兩當歸芎藭乾薑甘草官桂川烏防風白术茵芋即山藥麻黃獨活各五錢右末每服一錢空心臨臥酒調下一日三服麝香丸治白虎歷節風疼痛逰走無定狀如蟲嚙晝靜夜劇及一切足疼痛川烏大者三箇生用全蝎二十一箇生用黑豆二十一箇生用地龍五錢右入麝香半字同研勻糯米糊為丸菉豆大每服七丸甚者十丸夜臥令膈空溫酒下微出冷汗一身便瘥豫得此方凡是歷節及不測痰痛一二服便瘥在歙州日有一貴家婦人遍身走注疼痛至夜則發如蟲嚙其肌多作鬼邪治豫曰此正歷節風病也三服愈丹溪龍虎丹治走注疼痛或麻木不遂半身疼痛蒼术草烏白芷各一兩右末水拌待發熱過再入乳香二錢當歸牛膝各半兩酒糊為丸彈子大酒化下無擇附子八物湯治歷節風四肢疼痛如鎚鍛不可忍附子炮去皮臍乾薑炮芍藥茯苓半夏桂心各三兩白术四兩人參三兩每服五六錢水煎加味二妙散痛風走注疼痛黃柏酒炒蒼术酒炒各二錢水煎調酒洗葳靈仙末羚羊角灰臣蒼术佐白芥子使生薑一片入藥末一錢擂碎以前藥再溫服東垣和血散痛湯治兩手十指一指疼了一指疼疼後又腫骨頭裏痛膝痛左膝痛了右膝痛發時多則五日少則三日晝輕夜重痛時覺熱行則痛輕腫却重注云先血後氣乃先痛後腫形傷氣也羌活升麻麻黃去節各一錢半桃仁十箇柴胡防風黃柏知母酒炒各一錢黃連酒炒防已各六分猪苓獨活各五分當歸一分甘草炙二分紅花一分分二服水煎食前熱服羅太無治真定府張大素好嗜酒五月間病手指節腫痛屈伸不利膝臏亦然心下痞滿身體沈重不欲飲食食即欲吐面色痿黃精神減少至六月間求豫治之診其脈沉而緩緩者脾也內經云諸濕腫滿皆屬脾土仲景云濕流關節肢體煩痛此之謂也宜以大羌活湯主之羌活升麻各一錢獨活七分蒼术防風甘草葳靈仙茯苓當歸澤瀉各五分分二帖水煎食前一服食後一服忌酒麵生冷硬物牛蒡子湯治風熱成歷節手指赤腫麻木甚則攻肩背兩膝遇暑熱或大便閉牛蒡子新豆䜴炒羌活各三兩生地二兩半黃茋一兩半為末湯調二錢空心食前日三服此病胸膈生痰久則赤腫附著肢節久久不退遂成厲風此孫真人預戒也宜早治之河間大豆孽散治周痺走注五臟留滯胃中結聚益氣出毒潤澤皮毛補腎大豆孽一升炒香熟為末每服五分溫酒調下空心服加至一錢日三服本草云大豆消淤血破婦人惡血治熱痺筋攣膝痛古人多用酒沃豆孽取汗蓋表藥也犀角湯治熱毒流入四肢歷節腫痛犀角二兩羚羊角一兩黃芩梔子射干大黃升麻各四兩豉一升每七八錢水二鍾煎服張子和治一稅官風寒濕痺腰腳沈重浮腫夜則痛甚兩足惡寒經五六月間猶綿纏靴足膝皮膚少有跣露則冷氣襲之流入經絡其病轉劇走注上下往來無定其痛極處便攣急而腫起肉色不變腠理如蟲行每遇風冷病必轉增食減肌體瘦之起須人扶所服者烏附薑桂種種燥熱燔針著灸莫知其數前後三年不愈一日子脈之其兩手皆沉滑有力先以導水丸通經散各一服是夜㵼三十餘行痛減半漸服赤茯苓湯川芎湯防風湯此三方在宣明論中治痺方是也日三服煎七八錢漐漐然汗出余欲作玲瓏竈法薰蒸血熱必增極諸汗法古方中多有之惟以吐法者世罕知之丹溪控涎散治身及脅走痛痰挾死血加桃仁泥丸治走注疼痛葳靈仙梔子炒蒼术當歸各一錢川芎七分肉桂一分桃仁七箇甘草五分生薑五片水二盞煎半乾入童便半盞竹瀝半盞熱服忌肉雞麵定痛方治一切風濕痺痛乳香沒藥地龍木鱉子肉金星石五靈脂等分蜜丸彈子大每一丸臨臥酒下升麻湯治熱痺肌肉熱極體上如鼠走唇口反縱皮毛黑兼治諸風升麻三兩茯神人參防風犀角鎊羚羊角羌活各一兩官桂五錢每服五六錢生薑一塊搗碎竹瀝少許同煎至一盞溫服八珍丸治痛風走注腳氣頭風乳香沒藥代赭石穿山甲生川各三錢羌活草烏生用各五錢全蝎二十一箇炒川烏生用不去皮尖一兩右末醋糊丸梧子大每服十一丸四妙散治痛風走注葳靈仙酒浸五錢白芥子一錢蒼耳子一錢五分又云是蒼木羊角灰三錢右末每服一錢薑一大片搗汁入湯調服二妙散同調尤妙濟生羌活湯治白虎歷節風毒攻注骨節疼痛發作不定羌活二兩附子炮去皮臍秦芁桂心甘草炙木香牛膝酒浸桃仁骨碎補川芎當歸防風各一兩薑五片每服五六錢水煎痛痺丹溪編為痛風門今改之以復藥從經㫖也丹溪痛風論曰痛風者四肢骨節走痛也他方謂之白虎歷節風夫氣行脈外血行脈內晝行陽二十五度夜行陰二十五度此平人之造化也得寒則行遲而不及得熱則行速而太過內傷於七情外傷於六氣則氣之運或遲或速而疾作矣彼痛風者大率因血受熱已自沸騰或再涉冷受濕取凉或坐臥當風熱血得寒汚濁凝澀所以作痛夜痛甚者行於陰也治當以辛熱之劑流散寒濕開發腠理則血行氣和而愈然亦有數種治法不能無少異也因濕痰濁血流注為病以其在下焦道路逺非烏附氣壯者不能行故用為引經若以為主治非惟無益而有殺人之毒此病必行氣流濕舒風導滯血㭪新血降陽升陰治有先後須明腫與不腫可也不可食肉肉屬火大能動火素有火盛者小水不能制若食肉厚味下有遺溺不已上有痞悶之甚雖魚麵醬醋酒皆斷之先以二陳湯加酒浸白芍藥少佐以黃連降心火看作何應而為之區處生生子曰按丹溪不以痺分門而以痛風分門謂血先受熱而後受冷濕乃所以為痛夜痛甚行於陰也及戒人不可徒以烏附為主斯言不惟補前人之餘藴而猶有深意存焉者實懲時俗與腳氣痿證混治之誤而另立痿門腳氣門分治之而又另分麻木為一門者此尤有見也麻木固亦有濕有痰所致者而氣血不足居多分而治之良有特識設一槩而作風寒濕治則虛虛之禍無有窮已不獨麻木為然而行痛著三痺其中未能無虛虛者或久作風寒濕治用疏風剛燥之劑太過而氣血為之暗損或氣血先虛而後受邪經曰邪之所凑其氣必虛此皆不可以不慎也陳無擇謂有支飲作痺此均有補於經文者誠以今之患痛痺者厯之每每如丹溪無擇所論治驗數條猶其精工故畢録之以為法大法用蒼术南星川芎白芷當歸黃芩在上者加羌活桂枝桔梗葳靈仙在下者加牛膝防已木通黃柏治痛風取薄桂者以其味淡獨此能橫行手臂㑯南星蒼术等藥至痛處一方四物湯加桃仁牛膝陳皮茯苓甘草白芷龍膽草在上屬風在下屬濕加藥同俱倍之桂等分無桔梗氣虛者加蒼术龜板痰加南星血虛加芎歸佐以桃仁紅花因痰者二陳湯加酒炒黃芩羌活蒼术因濕者蒼白术之類佐以竹瀝及行氣藥或曰有濕鬱而周身走痛者或關節間痛遇陰寒即發當作濕鬱治因於風者小續命湯極驗因血虛者芎歸之類佐以桃仁紅花肥人多是濕與痰飲流注經絡瘦人多是血虛與熱下部有濕腫痛防已龍膽草黃柏知母固是捷藥若肥人病此宜蒼术白术南星滑石茯苓之類瘦人宜當歸紅花桃仁牛膝檳榔等同用上中下痛風黃柏酒炒蒼术米泔浸一宿南星各二兩神麴炒台芎各一兩龍膽草五分白芷防已桃仁各五錢葳靈仙酒洗桂枝羌活各三錢紅花酒洗一錢五分右為末麴糊丸食前下百丸葳靈仙治上體痛風虛弱勿用肢節腫痛痛屬火腫屬濕兼受風寒而發動於經絡之中濕熱流注肢節之間而無已也用麻黃去根節赤芍藥各一錢防風荆芥羌活獨活白芷蒼术葳靈仙片芩枳實桔梗乾葛川芎各五分甘草歸尾升麻各三分下焦加酒炒黃柏婦人加酒炒紅花腫多加檳榔大腹皮澤㵼更加沒藥一錢定痛尤妙一云脨澀數者有瘀血宜桃仁紅花芎歸及大黃微利之氣血兩虛有痰濁陰火痛風人參山藥海石南星各一兩白术熟地黃柏炒黑龜板酒炙各二兩乾薑炭瑣陽各五錢右為末酒糊丸二妙散治筋骨疼痛因濕熱者有氣者加氣藥血虛加血藥痛甚者加生薑汁熱辣服之黃柏炒蒼术米泔浸炒右為末沸湯入薑汁調服二物皆有雄壯之氣表實者加酒少許佐之若痰帶熱者先以舟車丸或導水丸神芎丸下伐後以趂痛散服之一法二妙為君加甘草羌活各二錢陳皮芍藥各一錢酒炒葳靈仙半錢服之佳趂痛散乳香沒藥桃仁紅花當歸羌活地龍酒炒牛膝酒洗甘草五靈脂酒炒香附童便浸右為末每服二錢酒調或加酒炒芩柏潛行散黃柏酒浸為末入湯藥調服治酒濕痰痛風黃柏酒炒葳靈仙酒炒各五錢蒼术羌活甘草三錢陳皮芍藥各一錢右為末每服一錢或二錢沸湯入薑汁調服治氣實表實骨節痛方滑石飛六錢甘草一錢香附片芩各三錢右為末薑汁糊丸梧子大每服五七十丸白湯吞下治食積肩腿痛龜板酒浸炙一兩酒柏葉香附五錢辣芥子凌霄花一錢半右末酒糊為丸桐子大煎四物湯加陳皮甘草湯下丹溪治一男子家貧多勞秋凉忽渾身發熱兩臂膊及腕兩足并跨皆疼痛如煅晝輕夜劇醫與風藥則增痛與血藥則不效惟待斃而已脈之兩手俱澀而數右甚於左飲食則如平時形瘦削蓋大痛而瘦非病也用蒼术酒黃柏各一錢生附子一片生甘草三分麻黃五分研桃仁五箇作一帖煎入薑汁些少令辣服至四帖後去附子加牛膝一錢至八帖後來告急云氣上喘促不得睡痛似微減意其血虛因服麻黃過劑陽虛被發動而上奔當與補血鎮墜及酸劑收之遂以四物湯加川芎芍藥人參二錢五味子十二粒與二帖服之喘隨定是夜遂安三日脈之數減大半澀脈如舊問其痛則曰不減然呻吟之聲却無察其起居則疲弱無力病人却自謂不弱遂以四物湯加牛膝白术人參桃仁陳皮甘草檳榔入薑三片煎服如此藥與五十帖而安一月後因負重擔復痛作飲食亦減再與此藥加黃茋三分又二十帖全愈一人年踰六十性急作勞患兩腿痛動作則痛甚視之曰此兼虛證當補血則病自安遂與四物加桃仁陳皮牛膝生甘草煎入薑研潛行散熱飲三四十帖而安何縣長年四十餘形瘦性急因作勞背痛臂疼骨節疼足心發熱可與四物湯帶熱下大補丸保和丸共六十粒食前服一婦人腳疼怕冷夜劇日輕生地白芍歸尾各五錢黃柏炒黃芩白术右分四帖水煎帶熱服鮑子年二十餘因患血痢用澀藥取效後患痛風喊叫撼鄰里豫視之曰此惡血入經絡證血受濕熱久為凝濁所下未盡留滯隧道所以作痛經久不治恐成枯細遂與四物湯桃仁紅花牛膝黃芩陳皮甘草煎生薑汁研潛行散入少酒飲之數十帖又與刺委中出黑血近三合而安朱閫內年三十味厚性急患痛風攣縮數月醫不應豫視之曰此挾痰與氣症當和血疏痰導氣病自安遂以潛行散入生甘草牛膝枳殼通草陳皮桃仁薑汁煎飲半年而安陸郎左腿義骨舊痛小便赤澀此積憂痰涎所為白术枳殼赤芍一錢條芩連翹通草甘草稍三分右銼水煎服一婦腳義骨痛蒼术白术陳皮芍藥三分木通二錢甘草五分分二服送大補丸五十丸右丹溪治痛風法主於血熱血虛血汚或挾痰皆不離四物潛行牛膝甘草桃仁陳皮蒼术薑汁而隨症加減發前人之餘藴醫世俗之所不能醫其有功於後人也大矣凡痛在胃之脈絡者宜解食毒許學士醫檢正患鼻額間痛或麻痺不仁如是數年忽一日連口唇頰車髮際皆痛不開口言語飲食皆妨在額與頰上常如糊手觸之則痛豫作足陽明經絡受風毒𫝊入經絡血凝滯而不行故有此症或者以排風小續命透髓丹之類與之皆不效製此犀角升麻湯贈之數日愈犀角十而一錢升麻防風羌活各三兩川芎白附子白芷黃芩各五錢甘草一分右用四大錢水煎服食後臨臥各一服一日共服四次夫足陽明胃也經云腸胃為市又云陽明多血多氣胃之中腥羶五味無所不納如市㕓無所不有也以其腐熟飲食之毒聚於胃此方以犀角為主解飲食之毒也陽明經絡環唇挾舌起於鼻合額中循頰車上耳前過客主人循髮際至額顱今所患皆一經絡也故以升麻佐之餘藥皆滌降風熱升麻黃芩專入胃經稍通者自能曉海藏四物蒼术各半湯治肢腫不能舉動四物湯蒼术各半兩各煎服效與活血丹相表裏活血丹治遍身骨節疼痛如神與蒼术四物各半湯相表裏熟地黃三兩當歸白术白芍續斷人參各一兩右末酒糊丸如桐子大東垣蒼术復煎散治寒濕相合腦户痛惡寒項脊强肩背胛卯痛膝臏痛無力行步能食身沈重其脈沈緩洪上急蒼术四兩水二碗煎至二大盞去漁入下藥羌活一錢升麻柴胡藁本澤㵼白术各五分黃柏三分紅花一分右用蒼术二盞煎至一大盞空心溫服微汗為效忌酒麵緩筋湯治目如火腫痛兩足及伏菟骨筋痛膝少力身重腰痛夜惡寒痰嗽項頸筋骨背急痛目多眵淚食不下羌活獨活各二錢藁本麻黃草蔲黃柏黃芩歸身生地柴胡各三分生甘草二分升麻三分炙甘草熟地黃各二分蘇木一分蒼术五分水二鍾煎一鍾熱服羅太無活血應痛丸治風濕客於腎經血脈凝滯腰背腫痛不能轉側皮膚不仁遍身麻木上攻頭目虛腫耳目常鳴下注膝重痛少力行履艱難項背拘急不得舒暢常服和血脈壯筋骨使氣脈宣通金毛狗脊去毛六兩蒼术米泔浸十兩香附炒十二兩陳皮九兩沒藥一兩二錢草烏炮二兩五錢葳靈仙三兩右末酒糊為丸桐子大每服十五丸不拘時溫酒或熱湯送下忌食桃李雀鴿諸血物烏靈丸久患風寒痛風及麻木行步艱難五靈脂二兩川烏一兩炮去皮臍右末酒糊為丸桐子大每服十丸加至五十丸空心溫酒下忌冷物史丞相遇仙方諸般痛風手足艱難筋骨疼痛口眼喎斜言語蹇澀附子炮去皮臍川烏製同當歸川芎肉蓯蓉酒浸焙杜仲薑汁炒羌活黃茋人參白术白蒺藜牛膝酒浸防風天麻白茯苓狗脊炒去毛萆薢續斷獨活肉桂赤芍藥各一兩虎脛骨酥炙二兩五錢右以生絹袋盛之用無灰酒浸密封瓶口春三日夏二日秋七日冬十日取出晒焙乾為末酒糊丸桐子大用浸藥酒一盞空心送下五十丸忌生冷油膩豆腐麵食發風物五加皮酒治風濕遍身疼痛俗名痛風或腫或癱或腳氣不能履動者五加皮不拘多少入白麵內同釀白酒飲之效丹溪治環跳痛不已防生附骨疽方以蒼术佐黃柏之辛行以青皮冬加桂枝夏加黃芩體虛加杜仲牛膝以甘草為使大料煎入酒深者恐术柏桂枝十數帖發不動以少黃連一二帖又不動者恐毒將成撅地成坑以火煅紅沃以小便赤體坐其上以被席圍包下體使熱蒸腠理開血氣暢而愈仲景治婦人六十二種風及腹中血氣刺痛以紅藍花酒主之紅花一味以酒一大碗煎減半頓服一半頃之再服虎骨丸治經絡凝滯骨節疼痛筋脈攣急遇陰寒愈痛乳香沒藥各另研赤芍藥熟地當歸虎脛骨酥炙黃血竭五錢右末用木瓜一枚切破去核入乳香末在內以麻線纏定勿令透氣好酒六升煮酒盡取木瓜去皮研如泥更入熟蜜少許杵和為丸桐子大每服五十丸看病上下服麒麟散治寒濕𫝊於經絡疼痛不可忍血竭乳香沒藥白芍當歸各六錢水蛭杵碎炒令烟盡麝香各三錢虎脛骨酥炙黃五錢右為末和勻每服二三錢食前溫酒調下統㫖云痛痺五積散佳四肢攣痛關節浮腫殊效治白虎厯節風及腫痛者以釅醋五升熱煎三四沸切葱白二三升煮一沸濾出布帛包裏患處尉之以瘥為度嚴氏蠲痺湯治身體煩疼四肢項背拘急或疼或痛重舉動艱難手足冷痺腰腿沈重筋脈無力當歸芍藥黃茋羌活片子薑黃各一兩五錢甘草炙五錢每服六七錢薑棗煎服獨活寄生湯治肝腎虛弱感風濕致痺兩脛緩縱痺弱不仁方出腳氣門河間茯苓湯寒氣勝者為痛痺宜通氣溫經尤治四肢疼痛拘倦浮腫赤茯苓桑白皮各二兩防風官桂川芎芍藥麻黃去節各一兩半每服六七錢棗一枚水煎服繼以薑粥投之汗出愈腳跟痛有血熱有痰血熱者四物加黃柏知母牛膝之類痰用二陳加南星黃柏防已肩背痛附臂痛肩背痛不可回顧者此太陽氣鬱而不行或脊痛項强腰似折項似拔者此足太陽經不通二者俱宜通氣防風湯有因濕熱肩背沉重而痛者當歸拈痛湯有因汗出小便數而缺者風熱乘脾脾氣鬱而肩背痛也當㵼風熱則愈宜升麻柴胡湯有痰飲流注肩背作痛宜星香散或導痰湯有腎氣不循故道氣逆挾背而上致肩背作痛宜和氣飲加鹽炒小茴香少許有勞力或看書著棋久坐而致脊背疼者補中益氣湯或八物湯加黃茋背者胸之府肺主氣居胸中肺氣滯則血脈泣肺氣虛則不能運行陽道肺中有痰流注肩背皆能作脹疼肩背痛乃肺分野之病經云西風生於秋病在肺俞在肩背故秋氣者病在肩背大過為病在外則令人逆氣背痛愠愠然也臂痛臂為風寒濕所搏或痰流氣滯或因提挈重物皆致臂痛有腫者有不腫者因於風寒宜五積散加羌活因於濕蠲痺湯多加蒼术因於痰導痰湯因於氣烏藥順氣散因提重傷筋用劫勞散或和氣飲加薑黃蓋薑黃能入臂故也有人坐臥為風濕所襲但遇外有寒邪所侵即痛者宜羌活散有飲酒太過濕痰流注者用二陳加南星蒼术桔梗枳殼桂枝酒芩有血不榮於筋者用四物加薑黃秦芁羌活有氣血凝滯經絡不行所致者舒筋湯控涎散治肩背臂痛如神方在行痺控涎丹加去油木鱉子一兩桂五錢治臂痛每服二十丸加至三十丸妙丹溪治臂痛南星半夏白术香附酒芩各一錢蒼术二錢陳皮茯苓各五分葳靈仙三分甘草少許花麴散治臂痛紅花炒神麴炒為末酒調下薑黃散治臂痛非風非痰薑黃甘草羌活各一兩白术二兩腰已下痛者加海桐皮當歸芍藥東垣治臂痛分六道經絡看痛在何經絡之間以行本經藥通其氣血血氣通則愈矣若表上諸痛若便擬下之則不可當詳細辨之右東垣云認經絡用藥蓋以兩手伸直其臂貼身垂下大指居前小指居後而定之則其臂臑之前廉痛者屬陽明經以升麻白芷乾葛行之後廉痛者屬太陽經以藁本羌活行之外廉痛者屬少陽以柴胡行之內廉痛者屬厥陰以柴胡青皮行之內前廉痛者屬太陰以升麻白芷葱白行之內後廉痛者屬少陰以細辛獨活行之并用灸法視其何經而取之也通氣防風湯肩背痛不可回顧者此太陽氣鬱而不行以風藥散之脊痛項强腰似折項似拔者此足大陽經不通也羌活獨活各一錢藁本防風甘草各五分川芎蔓荆子各三分水煎服當歸拈痛湯濕熱為病肢節煩痛肩背沉重胸膈不利及遍身疼痛下注於足脛痛腫不可忍方在腳氣門加減當歸飲子治肩背忽痛當歸防風柴胡生地大黃各一兩半芍藥黃芩人參各一兩黃連五錢滑石六兩甘草一兩三錢每服六七錢水煎人參益肺散治肩背痛汗出小便數而少者風熱乘肺肺氣鬱甚也當㵼風熱則愈升麻柴胡黃茋各一錢防風羌活人參甘草陳皮各五分藁本三分青皮黃芩白豆蔲各三分水煎服如面色白脫色氣短者勿服舒筋湯臂痛不能舉有人常左臂痛或以為飲以為風以為濕諸藥悉試繼以針艾俱不效得此方服之而愈蓋是氣血凝滯經絡不行所致非風非飲非濕腰以下食前服腰以上食後服又名通氣飲子片子薑黃四兩如無用嫩莪术代也甘草炙羌活各一兩赤芍藥海桐皮去外皮白术當歸各二兩每服五錢薑三片水煎臨服入磨沈香少許治背痛薑黃四兩甘草炙羌活白术各一兩每服一兩水煎防風飲子治項筋急痛諸藥不效者黃茋附子甘草蒼术陳皮羌活防風桔梗等分每服五錢薑一片水煎丹溪治一男子忽患背胛縫有一線痛起上肩跨至胸前側脅而止其痛晝夜不歇不可忍脈弦而數重取豁大左大於右夫背胛小腸經也此必思慮傷心心臟未病而腑小腸先病故從背胛起及慮不能决又歸之於膽故痛至胸脅而止乃小腸火乘膽木子來乘母是為實邪詢之果因謀事不遂所致故用人參四分木通二分煎湯吞龍膽丸數服而愈著痺治劑麻木同經謂濕氣勝者為著痺河間曰著者留著其處而不去或四肢麻木拘攣也經又曰其不痛不仁者病久入深營衛之行澀經絡時疏故不痛皮膚不榮故為不仁夫所謂不仁者或周身或四肢淫淫然麻木不知痛癢如繩札縳初解之狀古方名為麻痺者是也靈樞曰衛氣不行則為麻木丹溪曰麻是氣虛木是濕痰死血然則曰麻曰木者以不仁中分而為二也雖然亦有氣血俱虛但麻而不木者亦有虛而感濕麻木兼作者又有因虛而感風寒濕三氣乘之故周身掣痛麻木併作者古方謂之周痺治法宜先汗而後補也當以類而推治丹溪云十指麻木乃胃中有濕痰死血宜二陳湯加蒼术白术桃仁紅花附子脈法脈沈而濡屬氣虛關前得之麻在上體關後得之麻在下體也脈浮而緩者屬濕為麻痺脈緊而緩屬寒為痛痺脈澀而芤屬死血為木不知痛癢東垣神效黃茋湯治渾身麻木不仁或左或右半身麻木或面或頭或手臂或腳腿麻木不仁並皆治之又治兩目緊急縮小羞明畏日隱澀難開或視物無力睛痛昏花手不得近或目少睛光或目熱如火服五六帖神效黃茋蔓荆子各二兩人參甘草炙白芍藥各一兩陳皮五錢每服五六錢如小便淋澀加澤㵼五分如有大熱症加黃柏三錢酒炒四次如麻木不仁雖有熱不加黃柏再加黃茋一兩如眼縮小去芍藥忌酒醋濕麵葱韭蒜大料等物及淡滲生冷硬物麻木重甚者加芍藥一兩木通一兩芍藥補氣湯治皮膚間有麻木此肺氣不行也黃茋橘紅甘草炙各一兩白芍藥一兩半澤㵼五錢每服一兩水煎如肌肉麻必待㵼營氣而愈如濕熱相合四肢沉痛當㵼濕熱此潔古立效神方東垣治杜彥逵患左手右腿麻木大指次指亦嘗麻木至腕已三四年矣諸醫不效脈之曰麻者氣之虛也真氣弱不能流通填塞經絡四肢俱虛故生麻木不仁與一藥決三日效遂製人參益氣湯服二日便覺手心熱手指中間如氣滿脹至三日後又覺兩手指中間皮肉如不敢觸者似癢痛滿脹之意知其氣已遍至乃於兩手指甲傍各以三稜針一刺之微見血如黍粘許則痺自息矣又為處第二第三方服之全安人參益氣湯治五六月間兩手麻木四肢倦怠惰嗜臥乃濕熱傷元氣也黃茋八錢人參甘草生各五錢芍藥升麻各三錢柴胡二錢半五味子一百二十粒甘草炙二錢每六七錢水煎空心服服後令少睡於麻痺處按摩屈伸少時午飯前一服日二第二次藥煎服如前黃茋八錢紅花五分陳皮一錢澤㵼一錢第三次服藥黃茋六錢黃柏一錢三分橘紅三錢白芍藥五錢升麻澤㵼各二錢黃芩八錢五味子百粒甘草炙一分生四分分四帖煎服如前秋凉去五味子冬月去黃芩效除濕補氣湯治左腿麻木沈重黃茋八錢甘草梢六錢升麻梢柴胡當歸澤㵼各二錢五味子百二十粒紅花二錢半青皮四錢陳皮一錢分四服水煎熱服治趙節使年七旬病體熱麻股膝無力飲食有汗妄喜笑善飢痰涎不利舌强難言聲啞不鳴身重如山診得左脈洪大有力是邪客於經絡兩臂外有數瘢遂問其故對以燃香所致豫曰君之病皆此也夫人之十二經灌溉周身終而復始蓋手之三陽從手至表上行至頭加之以火邪并於陽勢甚熾焉故邪熱毒行散於周身而熱麻經云胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開故涎下熱傷元氣而沈重無力飲食入胃慓悍之氣不循常度故多汗心火盛則妄喜笑脾胃熱則消穀善饑肺金衰則聲啞不鳴仲景云微數之脈慎不可灸焦枯傷筋血難復也君奉飬以膏粱之味無故加以火毒熱傷於經絡而為此病明矣乃製清陽補氣湯服之不旬日而愈清陽補氣湯蒼术四錢藁本知母酒浸當歸甘草生各二錢柴胡黃柏酒浸黃茋各三錢升麻六錢陳皮二錢半五味子一錢半每七錢水煎空心服治李正夫人病診得六脈中俱弦洪緩相合按之無力弦在其上是風熱下陷入陰中陽道不行其症閉目則渾身麻木晝減夜甚覺而目開則麻木漸退久則絶止常開其目此病不作懼其麻木不敢合眼故不得眠身體皆重時有痰嗽覺胸中常是有痰而不利時煩躁短促而喘肌膚充盛飲食大小便如常惟畏麻木不敢合眼為最苦觀其色脈形病相應而不逆內經曰陽盛瞑目而動輕陰病閉目而靜重又云諸脈皆屬於目靈樞曰開目則陽道行陽氣遍布周身合目則陽道閉而不行如晝夜之分知其陽衰而陰旺也且麻木為風雖三尺之童皆以為然細校之則非如久坐而起亦有麻木假如繩縳繫之人釋之覺麻木作而不敢動久則自己以此驗之非有風邪乃氣不行也不須治風當補其肺中之氣則麻木自去矣知其經絡隂火乘其陽分火動於中為麻木也當兼去陰火則愈矣時痰嗽者秋凉在外濕在上作也當實其皮毛以溫劑身重脈緩者濕氣伏匿而作也時見躁作當升陽助氣益血微㵼陰火去濕通行經脈調其陰陽則非五臟六腑之本有邪也補氣升陽和中湯主之補氣升陽和中湯黃茋五錢人參白芍各三錢甘草炙佛耳草各四錢陳皮白术歸身各二錢甘草生去腎熱黃柏酒浸除濕㵼火白茯苓除濕導火澤㵼同上升麻行陽明經柴胡草豆蔲益陽退寒各一錢每服三五錢水煎稍熱服八帖愈溫經除濕湯李夫人冬寒霜時病作四肢無力乃痿厥濕熱在下焦也醋心者是濁氣不降欲滿也合眼麻木者陽道不行也開眼不麻木者目開助陽道故陰寒之氣少退也頭旋眩運者風氣下陷於血分不伸越而作也羌活七分獨活當歸麻黃去節黃柏各三分白芍三錢柴胡黃連黃茋草豆蔲神麴木香各二分陳皮蒼术各二錢人參甘草炙白术猪苓澤㵼各一錢升麻五分分二服水煎熱服治肢節沈重疼痛無力之聖藥也濕氣風症不退眩運麻木不已除風濕羌活湯主之羌活防風各一兩柴胡獨活甘草炙各五分藁本陳皮黃柏川芎各三分蒼术黃茋各一錢猪苓澤㵼各二分茯苓二錢黃連一分升麻每服五六錢水煎熱服量虛實用如不盡症候依加減法用之濟世茯苓湯治停飲支飲手足麻痺多睡眩冒赤茯苓半夏陳皮各一兩枳實炒桔梗甘草炙各半兩每服五六錢薑三片水煎宣明茯苓川芎湯治著痺濕地水氣甚重著而不去多汗而濡者著痺留注不去四肢麻木拘攣浮腫赤茯苓防風川芎麻黃芍藥桑白皮甘草炙官桂當歸各五分棗三枚水煎服如欲出汗以粥投之五痺湯風寒濕之氣客留肌體手足緩弱麻頑不仁片子薑黃一兩羌活白术防己各二兩甘草炙五錢每五六錢薑三片水煎服續斷丸本事方治風濕流注四肢浮腫肌肉麻痺川續斷當歸萆薢天麻防風大附子各一兩川芎七錢半乳香沒藥各五分煉蜜為丸梧子大每四十丸溫酒米飲任下又增減續斷丸治寒濕之氣痺滯關節麻木疼痛人參防風鹿角膠白术炒各七兩黃茋續斷苡仁山芋牡丹皮麥門冬地黃桂心山茱萸白茯苓石斛各二兩蜜丸桐子大每服六七十丸空心酒下三痺湯治血氣澀滯手足拘攣風痺等疾川續斷杜仲薑汁炒防風桂心人參當歸白茯苓白芍藥甘草黃茋牛膝細辛各一兩川獨活川芎秦芁生地各五錢每服六七錢薑三片棗一枚水煎濟生黃茋酒治風濕癢痛筋脈攣急身體頑麻黃茋當歸白术虎骨萆薢雲母粉木香防風官桂天麻石斛茵芋葉仙靈脾川續斷白芍藥甘草炙各一兩用絹袋盛以好酒一斗浸之春五夏三秋七冬十日每服一盞溫飲之常令酒氣相續為佳宣明防風天麻散治風麻痺走注肢節疼痛中風偏枯或暴瘖難語內外風熱壅塞天麻甘草羌活防風白芷川芎歸尾草烏頭白附子荆芥穗各五錢滑石二兩右末熱酒化蜜少許調半錢加至一錢覺藥力運行微麻為度煉蜜丸彈子大熱酒化下半丸或一丸細嚼白湯下衍義方治風冷氣血閉手足體疼痛冷麻五靈脂二兩沒藥一兩川烏頭一兩半死去皮乳香五錢右末水丸彈子大每一丸生薑酒磨服河間前胡散治榮虛衛實肌肉不仁致令㿏重名曰肉苛前胡白芷細辛官桂白术川芎各三兩附子炮吳茱萸當歸川椒去子并閉口者生用各二兩以茶酒三升拌勻同窨一宿以煉成猪脂膏五斤入藥煎候白芷黃紫色濾其渣成膏病在處摩之凡癥瘕瘡痍皆治併去諸風瘡癢痛傷折墜損凡摩內皆可用之吳茱萸散吳茱萸肉豆䓻麵裹煨乾薑甘草炙神麴炒砂仁各一兩白术厚朴薑製陳皮各二錢為末每服二錢空心米飲調下腎瀝湯麥門冬五加皮犀角各一錢半杜仲桔梗赤芍藥木通各一錢桑螵蛸一箇水二鍾入羊腎少許煎至八分食前服加味五痺湯治五臟痺症人參茯苓當歸白芍川芎各一錢肝心腎痺倍之五味子十五粒細辛七分白术一錢脾痺倍之甘草五分薑一片水煎食逺服肝痺加酸棗仁柴胡心痺加逺志茯神麥冬犀角脾痺加厚朴枳實砂仁神麴肺痺加半夏紫苑杏仁麻黃腎痺加獨活官桂杜仲牛膝黃茋萆薢活絡丹治手足攣拳筋脈不舒皆風邪濕毒留滯經絡渾身走注疼痛南星川芎草鳥地龍各六兩乳香沒藥各二兩為末酒糊丸桐子大每服五七十丸空心酒下清凉潤燥湯治風熱血燥麻木當歸生地各一錢半黃連黃芩芍藥川芎各一錢天麻防風羌活荆芥各八分細辛六分甘草五分水煎服麻甚者加川烏炮過三分以行經絡止麻清痰飲治口舌麻木延及口角頭面者黃連一錢二分貝母瓜蔞仁黃芩茯苓桔梗枳殼橘紅南星用白礬皂角生薑同煮透各一錢天麻甘草細辛各五分血虛加當歸一錢水煎入薑汁一匙竹瀝三四匙食逺服經驗三妙丸治濕熱下流兩腳麻木如火熱蒼术六兩黃柏四兩酒炒川牛膝酒浸二兩麵糊丸桐子大每服五七十丸空心淡鹽湯下仲景治血痺桂枝五物湯血痺陰陽俱微外證身體不仁如風痺狀黃茋桂枝芍藥各三兩生薑六兩大棗十二枚水六升煮取二升溫服七合日三服木香丸腸痺腹疞痛時發餐泄氣不消化小便祕澀木香白术官桂蕪荑良薑訶子皮各一兩附子炮厚朴肉蔲各二兩乾薑三分甘草五錢半為末麴麵糊丸桐子大每服二十丸空心薑湯吞下鶴膝風羅太無蛜􅖉丸蛜􅖉用頭尾全者一條桃仁生白附子阿魏桂心安息桃仁同研白芷各一兩乳香沒藥已上童便酒浸炒熟各三分北漏蘆當歸白芍牛膝羌活地骨皮葳靈仙各一兩蜜為丸彈子大空心酒化下一丸昔人有病風痓手足指節皆如桃李痛不可忍服之悉愈宣明方安息用胡龜穰同研丹溪治一人年七十患膝腫痛此血虛而挾濕熱也生地當歸頭白芍蒼术黃柏炒各三錢川芎桂二錢木通一錢半分四帖水煎熱服又一人年近三十厚味多怒秋間髀樞左右一㸃發痛延及膝晝靜夜劇痛劇惡寒口或渴或不渴或痞或不痞醫多用風藥兼用補血至次年春其膝漸腫痛愈甚食愈減形瘦至春末膝腫大不可屈伸其脈左弦大頗實寸澀甚大率皆數知其小便必數而短乃作飲食痰積在太陽陽明治之炒柏一兩生甘草梢犀角屑蒼术鹽炒各三錢川芎二錢陳皮牛膝木通芍藥各五錢遇暄熱加條芩三錢為細末每三錢與生薑汁同研多少以水蕩起煎令沸帶熱食前飲之一日夜四次至半月後數脈漸減痛漸輕去犀角加牛膝龜板半兩當歸半兩如前服又半月腫漸減食漸進不惡寒惟腳膝痠軟未能久立久行去蒼术黃芩時當夏熱加炒黃柏至一兩半依本方內加牛膝春夏用莖葉冬用根杵取汁用之效尤速須斷酒肉濕麵胡椒當仲夏加生地半兩冬加茱萸桂枝接骨丹治諸風及鶴膝風防風牛膝當歸虎骨酥炙各一兩枸杞子二兩半羌活獨活龜板秦芁萆薢松節二蠶沙各一兩茄根二兩蒼术四兩酒糊丸空心服腳筋急痛淡酒煮木瓜令爛作粥樣用裹痛處冷則易一宿三五度便瘥攣經云肝氣熱則筋膜乾筋膜乾則筋急而攣又曰濕熱不攘大筋緛短小筋弛長緛短為拘弛為痿丹溪曰大筋緛短者熱傷血也不能飬筋故為拘攣小筋弛長者濕傷筋不能束骨故為痿弱攣皆屬於肝肝主筋故也丹溪治王秀濕熱大作腳痛後手筋拘攣足乏力生地當歸川芎白术各二錢蒼术一錢半木通甘草炙三分煎湯下大補丸三十丸其大補丸炒暖用薏苡仁散治筋脈拘攣久風濕痺薏苡仁一斗搗散以水二升取末數匙作粥空腹食之衍義云筋急拘攣有兩等內經大筋受熱則縮而短故攣急不伸則可用薏苡仁若因寒筋急則不可用也有寒攣經曰寒多則筋攣骨痛本事云張德操內子昔患筋攣腳不得伸屈逾年動則令抱持求醫於泗水楊吉老曰此筋病下三方一年而愈治筋極飬血地黃丸春夏服之熟地蔓荆各一分山茱萸五錢狗脊地膚子白术乾漆蠐螬炒天雄車前子各三錢萆薢山芋即山藥澤㵼牛膝各一兩為末煉蜜丸桐子大每服七十丸酒下治筋痺肢節束痛羚羊湯秋服之羚羊角肉桂附子獨活各一兩三錢半白芍藥防風芎藭各一兩每服五七錢水煎薑三片一日三服治寒冷濕痺留於筋脈縮不能轉側烏頭湯冬用之大烏頭細辛川椒甘草秦芁附子官桂白芍各七分乾薑防風當歸白茯苓各一兩獨活一兩三錢半每服三錢棗二枚水煎空心服千金薏苡湯治筋攣不可屈伸苡仁白斂芍藥桂心乾薑酸棗仁甘草牛膝各一兩附子三枚醇酒二斗漬一宿微火煎三沸每一升日三服扶杖起行不耐酒服五合活血通經湯董監軍臘雪初霽因事到真定忽覺風氣暴作六脈俱弦甚按之洪實有力其症手攣急大便閉澀面赤熱此風寒始加於身也四肢者脾也風寒傷之則攣痺乃風淫未疾而寒在外也內經云寒則筋攣正此謂也平素多酒實熱乘於腸胃之間內則手足陽明受邪外則足太陰脾經受風寒之邪用桂枝甘草以却其寒邪而緩其急搐用黃柏之苦寒以㵼實熱而潤燥急救腎水用升麻葛根以升陽氣行手足陽明之經不令遏絶更以桂枝辛熱入手陽明之經為引用潤燥復以芍藥甘草専補脾氣使不受風寒之邪而退木邪専益肺金也加人參以補元氣為之輔佐加當歸身去裏急而和血潤燥名之曰活血通經湯升麻葛根當歸人參甘草炙各一錢桂枝黃柏酒炒各二錢白芍藥五分水煎熱服令暖房中近火摩搓其手乃愈虛攣經所謂虛邪搏於筋則為筋攣又云脈弗榮則筋急仲景云血虛則筋急此皆血脈弗榮於筋而筋成攣故丹溪治攣用四物加減本事方治筋急極用飬血地黃丸蓋本乎此也丹溪治一村夫背傴僂而足攣已成廢人脈之兩手皆沉弦而澀遂以戴人煨腎散與之上吐下㵼過月餘久吐㵼交作如此凡三帖然後平復煨腎散甘遂末三錢獖猪腰子細批破鹽椒淹透摻藥末在內荷葉包裹火內燒熟溫酒嚼下蒼耳湯治風濕痺四肢拘攣蒼耳子三兩搗末水一升半煎七合服木瓜粥裹筋痛處佳方見鶴膝一身盡痛綱目云一身盡痛其病暴似傷寒屬濕痺並見傷寒太陽症門其留連難已者於此求之寒而一身痛者甘草附子湯熱而痛者當歸拈痛湯甘草附子湯治風濕相搏骨節煩疼掣痛不能屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草白术各一兩桂枝二兩附子炮一枚分四帖水煎服活人書云身腫者加防風一兩悸氣小便不利者加白茯苓一兩半東垣當歸拈痛湯治濕熱相搏肩背沉重疼痛上熱胸膈不利及遍身疼痛方見腳氣門東垣麻黃桂枝升麻湯李夫人患渾身麻木睡覺則少減開目久則全已閉目則麻木復至此症用藥已全去又因家事不和心中煩惱遍身骨節疼身體沈重飲食減少腹中氣不轉運麻黃人參升麻黃茋各五分桂枝甘草炙白术茯苓澤㵼各三分陳皮半夏草豆蔲厚朴黃柏附子各二分木香生薑各一分水煎熱服本事方治遍身皆痛如勞者若傷寒身體痛者不可服但少年虛損冷憊老人諸疾皆治之人參黃茋附子炮甘草木香羌活知母芍藥前胡川芎枳殼桔梗白术當歸茯苓半夏各五錢柴胡鱉甲醋炙各一兩酸棗仁桂心各三分杏仁炒五分每服二錢薑三片烏梅三箇葱白三寸同煎空心服産後身痛薤白趂痛散産後氣弱血滯遍身疼痛身熱頭疼當歸牛膝桂心白术黃茋獨活生薑各五錢甘草薤白各三錢五分每服五六錢水煎五積散加酒煎治感寒頭疼身痛方見傷寒與四物湯各半服之治一身痛甚穩加桃仁治腰痛逐敗血去風濕大全牛膝散産後遍身青腫疼痛及衆疾牛膝大麥芽為細末以新瓦壦子中填一層麥芽一層牛膝如此填滿用鹽泥固濟火煅赤放冷研末但是産後諸疾熱酒調下二錢金棗丹治一切風熱等症川烏生用去皮臍兩頭尖防風白芷獨活蔓荆子荆芥各四兩白术羌活細辛各五錢全蝎殭蠶天麻葳靈仙各二兩雄黃木香乳香各一兩蒼术八兩川芎五兩何首烏一兩八錢沒藥草烏各一兩半藁本二兩半當歸三兩右末糯米糊丸棗樣大金箔為衣每服一錠傷風流涕好酒化下中風不語生薑湯下左癱右瘓好酒調下白虎厯節風遍身走痛生薑湯或好酒下破傷風昏倒在地牙關緊急好酒調服仍磨敷患處雷頭風并乾癬麻痺溫酒調服洗頭風酒服偏正頭風及夾腦風研末吹鼻中吐涎再用生薑汁調藥塗兩太陽穴仍用茶清調服風狗咬傷噙水洗淨敷之蜈蚣傷噙水洗過敷之蛇傷入白礬少許敷患處就以津唾調搽亦可蝎咬唾調搽痔漏口潄漿水洗過敷之多年惡瘡口不合者口潄鹽水洗過敷之徐收喘嗽桑白皮湯調服紅絲魚眼褲腳腦疽發背疔瘡裡外㾾瘡用自己小便洗過井水調敷薄紙貼上再用裏外搽之丹瘤井花水調藥鵝毛掃二三次不發炙瘡噙水洗過貼上二三次起發方止赤水元珠卷十二
