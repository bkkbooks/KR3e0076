body:
  text: 赤水元珠卷二十八明孫一奎撰異痘須知夫痘有似凶而吉有似吉而凶者不可不知天根痘諸痘不起壯而天庭或曉星起灌者乃精氣外生故曰天根十有九生天空痘諸痘壯氣而天庭或曉星不壯者乃血不灌頂也故曰天空十無一生明朗痘諸痘不起而太陽太隂獨起者吉日月為明太隂太陽之謂也明蝕痘諸痘起壯而太陽太隂不起者凶海溢痘諸痘不起而耳後方圓一寸獨起者名曰宿海溢是腎經旺也可治海枯痘諸痘盡起而耳後方圓一寸獨不起泛者腎敗也名曰星宿海枯不治又云頭面遍身四肢耳上俱已起泛灌膿惟左耳下外有二三粒不起灌日後唇裂齒乾如不急救必然內攻而死有根痘凡痘出頭面多四肢密者十分危險若地角方圓略有數粒圓如珠者十有十生蓋腎為根本此痘腎旺故曰有根無根痘諸痘俱好而地角方圓陷伏乾枯或灰白不起者腎水絶也不治抱鼻痘面部俱稀而鼻梁左右密如蠶種者此毒聚於脾胃也名曰抱鼻痘其危矣單鎖口面部俱稀而口角有一粒黑痘較諸痘獨大者名曰單鎖口雙鎖口若口角兩邉各有一粒者名曰雙鎖口皆惡候也鎖項托頥痘出遍身稀疏惟項下稠密一片至於頥名鎖項托頥亦為不治之症猪頭痘出而頭頸窩太多者急用山豆根𤣥參桔梗甘草生地芎歸山查木通荆芥牛蒡水煎遲則毒結於喉而死逆痘上身少下身多者名曰逆痘此無大害兩頭痘初標時看自胸而上自臍而下俱有而中間一截全無者是也七日內急用人參歸茋湯去桂加蘇葉桔梗山查白芷厚朴紫草防風木通再加黃豆三十粒水煎救之出七日則難救矣鬼揑痘痘出遍身全無㸃粒其斑成片恰如打傷痕一般故名鬼揑不治鬼痘痘標既定手足胸背俱多而頭面全無者名曰鬼痘又曰無頭痘五日之內可救五日之外難救蓋氣血下行不能上升急用升麻川芎白芷蘇葉前胡甘草桔梗防風當歸笋尖薑水煎服如不治曲池生毒一月見骨而死若身上四肢稀少者不可遂作鬼痘看賊痘痘初出便如緑豆過一日便如黃豆大再一日又如圓眼大名曰賊痘其痘根窠與頂全無血色形雖起脹按至虛軟至四五日上下出血而死但比諸痘獨大其大甚速者就是不必大如圓眼也蛇皮痘頭面遍身再無空地平塌而色白者俗名蛇皮此必乾枯不能作漿至十一二日必死藥患痘初標紅潤至四五日忽變陷伏不起將至裏虛此名為藥患急用扶表裏為上九焦痘當額地閣顴骨胸背耳後手足皆有一二箇黑陷者名曰九焦痘不治伏隂痘痘不貫膿而㵼膿血故名伏隂急宜溫裏空倉痘痘雖肥滿而內實乾枯全無血水乃空倉也決死之症石臼痘痘中有凹而四弦特起明亮好看內實漿板不化以手摸之其硬如石因形猶石臼故名之此症斷不可治茱萸痘痘不甚起而中亦有凹四弦皆有皺紋以其形似茱萸故名之也若得根窠紅活者服內托散去防風白芷頂中發黑㸃者保元湯加芎桂身壯熱者入酒炒黃芩蟲痘痘瘡癢甚者不必夏月中蠅生蛆雖寒月亦有用簮桃去而愈或謂用桞條鋪下令兒卧於上則蛆自出此蓋毒留於皮膚延綿日久臍膚熱腐故耳譬之腐草為螢朽木生蠧其理一也血疱痘血疱痘者血協熱毒而自漿也刺疱血猶紅者尚可治急與犀角地黃湯加白芍以制血解毒血黑者不治身熱者小柴胡湯加生地血漿不能收靨者紫草煎湯調下龍腦膏血靨痘痘出稀少四五日胖如碗豆六七日血靨痂乾亦似丹砂九日而痂落此氣血充足毒少故隨出隨痂不及釀膿也此痘極佳百無一二白漿痘痘初起發瘡頭便帶白漿者此疫癘痘也但有此便不可治主七日死四圍痘若瘡起發根窠四畔又旋出小痘攢簇本瘡或發似粟米不待養漿即加搔癢而死漏瘡痘瘡出頭有孔膿水漏出堆聚乾結其色如天疱瘡及癩頭之形者或清水非膿無事自破水去而乾黑者此皆屬氣所為𫝊染相似俗名漏瘡未有能治者矣蛀痘起腫時痘上有小孔不黑不白名曰蛀痘皆腠理不密而有是痘大泄元氣急用保元湯加丁香肉桂其孔一密而痘自起矣隱血斑其形如豆殼灰白全無血色擦破而後血出亦無膿血故曰隱血斑也不治赤萍瘡痘已出齊或未齊如赤浮萍微微髙起若爬出有血急以解毒升發藥救之如成爛痘則無妨矣紫萍瘡痘已出齊紫色不起不灌漿如浮萍貼在肉上者不治白萍瘡同上草尾珠其痘遍身俱陷惟尻骨一團飽滿如珠此症可治補托灌膿即痊矣黑痘盧廉夫曰黑痘多屬血熱黑痘本為惡證世醫恆棄而不治然形狀多端猶可解救須當辨而治之但血不活者則難救矣一痘紫黑或黑㸃子隱在皮膚之間者無比散或人牙散用猪尾血三五滴酒調下小兒三分大人五分一初出便是黑㸃急用紫草茸二三錢醇酒半盞煎至三分濾查與服為妙一其形如痣皮膚發青紫紋者服透肌散或加防風荆芥一形如牽牛而色瘀敗又黑痕併黑靨者並用蟬退二十五箇紫草茸一錢水煎服一痘黑如煤炭血不紅活者用活血散一錢酒煎紫草湯下一痘黑而皮膚皆黑成片者化毒湯加蟬退地骨皮酒炒黃芩一痘黑大而軟者氣弱而熱毒盛也用保元加紫草一痘焦黑潮熱煩躁者小無比散井水磨犀角調下一錢氣血兩敗痘近看猶如水蓼花逺望胭脂紫可誇臨漿清水不成膿古聖神農無治法復出痘先見標一二㸃於面部或口唇上下如常起脹貫漿收靨不知者以為痘本稀少故也然以火照之紅㸃隱隱然藏於皮膚之內急用內托解散則痘復出不然頥下決發一毒不急散其毒而發其痘即死雲翼子二十七般異痘姑録於後以備參看一彤雲繞頂遍身痘好但頭頂一片紅赤者乃熱毒盛於膀胱也須清利之一紫雲灌頂遍身痘好但頭頂紫乾陷伏不起者不治一烏紗覆頂其症必咽喉啞塞鼻氣大粗乃血衰氣敗而元陽脫也不治一梨花漫頂用保元湯加天雄猶或可救一雲掩天庭遍身磊落光澤惟額上一片血疱如雲者乃心家客熱甚也急磨犀玳服之一紫萍鋪額其症熱甚咽痛悶亂發狂用小無比散加𤣥參升麻犀角一烏紗落額不治一灰撲印堂此症心家少血也若兼腹脹咽乾用保元湯加白芍涼血解毒湯好一楊花撲面用內托散加天雄一赤珠繞唇此乃脾經極熱也用小無比散加雄黃一烏飯沾唇此症必聲啞神昏目精不轉四肢厥冷喉響如鋸三朝七日乃死期也一霞錦穿胸此因火毒淫盛不治之症一紫雲布胸此症血枯氣滯毒來攻胸也其症必咬牙戰掉口唇焦裂頃刻命傾矣一黑棋排胸三朝決死一栁絮飛胸此乃血氣枯弱也保元湯加芎歸附主之一桃花映背此症清火解毒可生一紫萍浮背不治一黑砂落背不治一雪鋪魚背此血已枯盡也不治一赤鱗穿腹此症必大便祕小便淋澀乃胃家熱甚也用五苓甘露以和解一黑段纒腹此症必肚內膨脹聲音啞二日終矣一白梨墮腹氣血衰敗也半月之間發驚而死一葡萄落地臀間紅紫一片若葡萄者兩日命終一爛粟居臀遍身俱好惟臀上一片如粟殼臭爛者托補下元可轉一榴花散野諸痘俱好惟四肢紅赤而唇口崩裂者乃心脾肺三經熱也須涼血清火解毒一黑珠遍體四肢枯黑如火燒柴頭口中涎出氣冷朝夕死矣一楊花墮枝手足獨灰白者氣凝血滯也八珍湯加附子治之婦女痘童女出痘與童男相同無以議也但天癸通者則治法不能不異且夫發熱之初適遇經水如期而至則熱隨血解痘出亦輕不須服藥若過三四日而熱不止痘不出者此熱入血室血必妄行為內動中虛之患宜涼血地黃湯加人參治之一非經行之期於發熱之際而經忽至者此毒火內熾逼血妄行之故必痘多而毒盛急用涼血解毒湯倍加連翹牛蒡使熱得清毒得解痘得出經得止始無他變遲則內虛痘必陷矣栁花散佳一正當起發灌漿之時適遇經行過三日不止痘應起發而不起發應灌漿而不灌漿頂平形塌或灰白或黑陷此為經血去多隂血虧耗必為陷伏壞症矣急以八物湯去地黃加黃茋木香熟附子以調元氣或葫荽酒噴之使痘起發灌漿或出增痘者為吉若寒戰咬牙喘急腫滿手足厥冷者為內脫不治之症矣一起發灌漿之時經水適來忽口瘖而不能言者乃血入少隂不能上榮於口也宜先以當歸養心湯主之俟其能言後以大補湯治之或猪心血調服亦可一經水不斷之時適逢出痘身發壯熱神思昏沉言語狂妄如見鬼神尋衣撮空此行經之後血室空虛天行邪熱乘虛而入犯於衝脈蓋肝藏血開竅於目神思昏者魂亂也目妄見者視亂也妄言者肝移熱於心也宜㵼肝散或小柴胡湯加生地丹皮一正直崩漏不止氣血俱虛之後適逢出痘此必不能勝任宜大補其氣血以十全大補湯八物湯加木香黃茋官桂主之使裏氣充足毒無留停更能飲食則可保全否則倒塌不治矣一向來經閉不通血海乾涸適逢出痘毒氣拂鬱於衝任之間二陽之併發其熱必甚若攻擊之則血妄行不止痘亦不出為喘急為腫脹為陷伏矣須調其心脾使毒得發泄庶可以保其生以歸脾湯逍遙散治之脾和食進然後方可收功一痘瘡起發至泡漿數日最宜表裏無病飲食如常若當此時忽然行經者人但知厭穢以觸正痘殊不知此乃本身之血不為之厭但恐血去裏虛防生陷伏之變急宜救裏解毒大補湯主之一妊婦最忌出痘蓋熱能動胎胎落則血氣衰敗痘必不能起發灌漿命其危矣故孕婦出痘深為可慮蓋痘之用藥多主溫補如半夏肉桂之類皆妊婦所忌而烏附又非痘家所宜凡遇此症者不問輕重悉以清熱安胎為主不可觸動其胎宜安胎散加黃芩芍藥主之血動者四物湯加芩連治之及罩胎散佐之身熱足冷腹脹者八物湯加木香脾氣虛不進飲食毒發不出者四君子湯加木香糯米紫草胎動不安者安胎散加砂仁痘出稠密者參茋內托散加紫草芍藥當歸單身熱有外邪無內症者參蘇飲加木香更以如聖散為主隨症加減如初發熱加升麻葛根連翹痘出太甚加酒炒黃芩大力子山查連翹不起發加大力子白芍藥口渴加麥冬知母天花粉痰多加半夏所謂可擾而擾似乎無擾故雖有胎不忌半夏也一痘正在起發灌漿之時忽遇坐草分娩之期此氣血俱虛之候宜大補湯加熟附子主之以補氣血固表裏若産後小腹急痛者此血未盡也黑神散略與行之不必拘泥若寒戰咬牙腹脹作渴足冷身熱者此脾胃內虛外作假熱也大補湯加熟附一二劑更用四君子湯加黃茋當歸陳皮木香多服止者吉不止者凶一疹後十日或半月之間適逢出痘此無胎孕繫纍只以大補氣血為主以大補湯或八物湯去芍藥痘出多加連翹大力子大便自利者加肉豆蔲只照常一體用藥施治不必妄為而多疑之反致誤事一痘疹要訣曰妊婦出痘收靨之時胎落者多無事若發熱初出之時胎落者猶或可救若時當起脹灌膿而有犯此者多死蓋氣血衰敗無以逐其毒也一痘已出未出不起不發隱在皮膚并治麻症斑症用梅花一兩桃仁二錢絲瓜五錢辰砂二錢甘草二錢為末每服五分參蘇湯下一痘不問前後凡黑陷咬牙寒戰用梅花六錢穿山甲一兩仙靈脾五錢麝香一錢為末每服三五分咬牙寒戰加人牙二三釐內托散送下快斑散貫衆赤芍藥各一兩甘草升麻枳殼炒各五錢右為末每服一錢水一盞竹葉七片煎至五分溫服看大小與之按貫衆主腹中諸熱邪毒其性微寒凡痘瘡煩渴咽燥喘急大便祕小便赤澀目赤皆裏熱也急宜服之西來甘露飲清熱解毒如神凡發熱之初五日已前而熱不退痘色紅紫口渴大便結燥服之即能紅潤亦治疹家煩熱口乾咳嗽疹色枯燥或譫語喘急睡卧不安絲瓜藤霜降後三日近根二尺剪斷將根頭一節倒插入新瓦瓶中上以物掩之勿使灰塵飛入次日以好新罈一隻將瓶中之汁傾在罈中仍將藤照前插入瓶內三日後汁收盡將罈封固收藏聽後取用若發熱煩躁口渴未見紅㸃將茜根一兩水煎濃汁二酒杯攙絲瓜藤汁二酒杯相和服之立安痘出亦輕若已見標顔色紅紫及稠密者用紫草煎濃湯沖服便見紅潤若夾斑者犀角紫草茜根煎湯沖服寒月用酒煎沖服蓋此汁極能解毒清熱尤治天行時疫每以生薑汁少許加蜂蜜調勻服之有神功渾元汁即紫河車不拘男女初胎者尤妙入新瓦壦內封固其口上以碗覆埋於土中久則化而為水是也専治氣虛血熱痘色紅紫乾枯黑陷等症以此汁清而補之其效立見氣虛甚者人參紫草煎濃湯沖入服之已上二方有力之家可多收貯愈久愈佳臨症極便勝如積金寶造浮屠也李氏敗毒散治初熱壯盛等症即前敗毒散加升麻荆芥牛旁子蟬退山查地骨皮薄荷紫蘇紫草减獨活柴胡茯苓人參右薑一片水煎臨服加䓤白汁五茶匙如熱甚加柴胡黃芩夏加香薷冬加麻黃㵼加猪苓澤㵼蘇解散治痘初壯熱頭疼腰疼腹疼作脹一切熱毒甚者紫蘇葛根防風荆芥白芷蟬退紫草升麻牛蒡木通甘草各等分加燈心䓤白各七根水煎熱服升麻葛根湯治初熱壯盛疑似未明服此或痘已出而表熱甚不退李氏加紫蘇五分笋尖山查牛蒡各一錢冬月加麻黃一錢令痘易出易斂和解湯解表和中升麻乾葛各一錢半白芍一錢人參防風各七分川芎八分甘草五分薑一片水煎服解毒疏痘湯預服解熱去毒已出解熱毒斑疹又治紅紫口乾壯熱譫語防風荆芥羌活柴胡川芎白芷當歸連翹黃芩黃連麻黃紫草蟬退右薑葱水煎服加味葛根湯治痘失表發熱譫語升麻葛根赤芍甘草桔梗柴胡荆芥防風連翹牛旁子木通右水煎服大靈丹治壯熱顚狂驚搐譫語紅紫斑焦乾陷一切惡症白滑石飛過三兩雄黃飛過犀角各三錢辰砂飛過三錢半牛黃氷片各一錢麝香五分右研極細和勻用升麻甘草防風薄荷燈草牛蒡紅花紫草黃連各三錢水二碗煎至半碗細絹濾去渣加蜜四兩同熬滴水成珠和前藥丸如小龍眼大金箔為衣每用一丸燈心湯下暑月冷水化下無比散初熱服之甚能稀痘又治痘夾黑㸃子及黑陷黑痘等症辰砂一錢氷片麝香牛黃各五分如無牛黃用牛膽南星代之膩粉二錢一方有蟾酥右研細末一嵗兒服一字大者五分刺猪尾血三兩㸃新汲水調和送下取下惡毒如爛魚腸葡萄穗狀即愈小無比散治痘壯熱口渴小水澀大便祕口氣熱煩躁不寧或焦紫或紅斑自發熱至起壯時有熱者皆可用痘後餘熱亦可用桂府滑石飛過六兩石膏飛過一兩粉草寒水石各五錢鬱金蟬肚小者甘草湯煮乾為末七錢右俱製淨末和勻每五嵗者服二錢大人再加冬月燈心湯下夏月井水調下熱甚不解者井水磨犀角汁調下若紅紫頂陷不起加穿山甲末一分麝香半分紫草煎湯加酒一二匙調下即起大無比散治熱毒大甚驚狂譫語引飲痘瘡紅紫黑陷桂府滑石飛過六兩粉草一兩辰砂飛三錢雄黃飛一錢右末每三五嵗服一錢十嵗服二錢發熱之初用敗毒散調下亦能稀痘若報痘後用燈心湯下退火回生散治痘熱甚發渴紅紫黑陷滑石一錢辰砂一分氷片三釐右末冷水調下得睡少時神安氣靜痘轉紅活龍腦膏痘毒出不透心煩狂亂如見鬼神或已出未出留伏黑惡毒等症氷片研末新宰猪心血和丸圓眼核大小兒服半丸大人服一丸凡狂妄煩躁者心經毒盛也紫草湯下昏瞀不醒者伏熱在心經也井花水下血疱漿不回者紫草湯下漿坐疱陷者溫酒化下天真膏治黑陷乾枯紅紫及斑不退用此救之十全四五初生小兒解下黑糞用磁罐收貯加水銀二兩麝香一錢黃蠟封口埋於土中愈久愈妙久則化而為水每遇前症看兒大小熱毒盛者量與二三茶匙酒煎紫草湯對半和勻服之立時紅潤活澤真祕方也較之天靈蓋枯臭無益之物萬萬矣緣此糞原係母之真血所化蓋以血補血且入土日久又得隂氣多故能解毒百日內小兒熱而煩躁啼哭不止用少許㸃入眼角二三次便能神安氣和而睡蓋又能清心熱也猪尾膏治同龍腦膏但此二方俱以龍腦為劑虛寒者不可用惟實熱則有功凡痘過服熱藥昏昧不知人事者取猪尾血以龍腦和為丸圓眼核大溫酒化下按猪尾乃動物取其血用之使毒活動化漿而逹於外也一凡痘倒靨心神不安者片腦五分辰砂一錢猪尾血爛研膏用木香磨湯化下一凡痘不化漿倒靨者片腦一分猪尾血一錢同研新汲水調下葳靈龍腦散治痘黑陷葳靈仙一錢炒為末片腦一分右用溫水調下取下瘡瘕為效獨聖散痘不起頂或紫黑陷倒靨服此即時紅活起發有起死回生之功又名奪命丹穿山甲酒炒成珠一錢取前足及嘴角者佳麝香一分右末每小兒三分大者五分用木香煎湯入少酒調下熱甚者紫草湯下宋杏庒方內加炒紅麯川烏炒焦各五分名曰一匕金葱湯下大成散治痘出不快或頂陷或灰白黑陷一切不起發之症俱可用之穿山甲酒炒一兩甘草末三錢雄黃硃砂各一錢半紫草三錢麝香二分右每五嵗兒用二分冷症熱酒調下熱症紫草湯下寒者加入治中散內用熱症加入小無比散內人牙散治痘不起發黑陷或紅紫黑斑咬牙寒戰人牙自落者不拘多少火煆存性淬入韭菜汁內大牙三次小牙二次研極細末入麝香一分或加紅麴二分右用雞冠血調成膏好酒半盞人乳半盞入葱白一撮煎湯送下凡服牙齒不可過多每服止三分多則陽氣盡出於表恐痘斑爛無血色隂氣內盛必裏寒而濡泄急以四君子加芎歸服之無憂散治臨危痘症寒戰咬牙人牙如上製一錢雄黃珍珠各五分一方有牛黃五分右末每服三五分多則一錢荔枝煎湯下無價散治黑陷欲死者用無病小兒糞臘月將傾銀罐二箇上下合定鹽泥固濟火煅通紅取出為末蜜水調服一錢一方加麝香氷片少許烏金膏治發熱至七日已前或因風寒痘不起發或紅紫或驚搐俱可用殭蠶酒洗全蝎去足尾酒洗甘草紫草白附子味苦內白者真麻黃各五錢穿山甲炒末二錢半蟬退去頭足酒洗淨二錢右為末將紅花紫草各一兩好酒二鍾熬去大半去渣入蜜五兩慢火同熬滴水成珠為度丸如龍眼核大每服一丸燈心湯化下紫金散治出不快及倒靨亦治逺年不愈惡瘡紫草蛇退炒焦牛旁子炒各五錢右為細末每服一錢水半鍾煎減半溫服連翹升麻湯治痘一發密如針頭形勢重者當輕其表而涼其內連翹升麻黃芩葛根各一錢麥門冬去心二錢右水煎服清地退火湯治痘帶熱而出名為火裏苗急用此方以退其熱則後無青黑變陷之候地骨皮地膚子各一錢牛旁子紫草葛根各八分連翹六分當歸五分木通三分蟬退二分右加薑一片水煎服如熱不退再服一劑或為末燈心湯服紫草透肌湯治痘熱而出不快及頂陷者紫草一錢升麻五分牛蒡防風荆芥黃茋各八分甘草三分木香五分右薑水煎服如色紫腹痛加蟬退一錢化毒湯治痘已出而熱毒未解宜清熱涼血毒一解不致黑陷血一涼不致紅紫紫草升麻甘草蟬退地骨皮黃芩酒炒木通各等分水煎服解毒散治毒先發腫者名曰痘母後發者十有九死先發者吉金銀花五兩甘草一兩木通防風荆芥連翹牛子各三錢右用酒水各一鍾煎服如泄加訶子豆蔲痘紅者加炒黃芩芍藥瘡癢者加歸身生地或加何首烏尤佳疼痛者加赤藥透骨解毒湯治寒戰咬牙紫草甘草當歸防風陳皮赤芍右等分水煎服消毒飲痘已出上焦熱胸膈不快及痘後癰毒麻疹熱毒荆芥牛子各二錢甘草一錢右薑二片水煎服如聖湯痘已出身熱如火紫草升麻葛根白芍甘草木通猴梨各等分加薑一片䓤白三莖水煎熱服心煩加麥冬赤茯苓煩渴加生脈散七八九日身如火者加酒炒黃芩地骨皮四聖散黑陷倒靨不起發不紅活小便不利紫草黃茋甘草木通右水煎服熱甚色紫倍加紫草芩連紅花大便祕加枳殼如常加糯米加味四聖散痘出不快及變陷倒靨小便赤身熱未退或復冒風者紫草黃茋人參甘草川芎蟬退木通木香大便祕加枳殼不祕加糯米百粒水煎服涼血解毒湯痘出熱不退紅不分地或痘苗乾枯黑陷急用此方可起壯灌漿紫草一錢生地柴胡各八分牡丹皮七分赤芍蘇木防風荆芥黃連木通各三分牛子四分天麻紅花甘草各二分薑一片燈心二十根糯米百粒水煎服惺惺散治痘頭痛壯熱喘急此攻毒散熱之劑人參白术茯苓甘草桔梗細辛川芎各五分薄荷一方無川芎加天花粉薑三片棗一枚水煎服內托散痘不起發根窠不紅或灰白色咬牙寒戰等症人參黃茋甘草川芎當歸防風白芷桔梗白芍厚朴木香肉桂右薑一片棗一枚水煎服色紅紫者去肉桂木香加紫草蟬退漿不滿水酒各半煎服色淡白者去防風白芷加糯米大便燥加人乳蟬退膏蟬退酒洗去頭足當歸防風甘草川芎荆芥穗升麻白芍各等分右為末煉蜜丸芡實大每服一丸薄荷湯化下粉紅丸又名溫驚丸治痘後癲癎症牛膽南星四兩辰砂一錢半天竺黃五錢氷片五分胭脂丕一錢右為末牛膽汁和為丸雞豆子大每服一丸小者半丸沙糖溫水化下大保元湯治頂陷根窠雖紅而皮軟薄血有餘而氣不足黃茋三錢人參一錢半甘草川芎各一錢官桂一分加薑棗水煎服如氣不行加木香減去桂若不食加人乳半鍾又方加白何首烏黑豆蒸過用生脈健脾湯治漿既成皮軟色白乃氣不足也氣不足當補氣血不足宜養脾脾旺則血生是固其本也黃茋一錢半人參一錢炙甘草官桂各三分當歸川芎白芍白术各八分茯苓五分紫草四分薑一片紅棗一枚糯米五十粒或加酒洗紅花三分通天散治痘發熱不出或已出而色不紅活人參陳皮桂枝各八分川芎熟地芍藥各一錢當歸紫草各一錢半紅花木香各三分甘草六分知母八分荔枝殼十箇右用雞汁一鍾棗三枚糯米一撮煎服初服到頸再服到臍三服到腳神效升天散即灌膿起頂散治痘灰白或紅紫黑陷乾枯或清水不成漿八九日十日皆可服人參六分黃茋山查各八分白术土炒當歸川芎橘紅各五分甘草三分淫羊藿穿山甲土炒黃各二分肉桂三釐此引經之藥多則癢木香二分薑一片棗一枚水煎服或為末服亦可如嘔吐生薑湯下㵼米飲下肚痛神麴煎湯下煩躁麥門冬湯下渴用麥冬五味煎湯下吐㵼藿香陳皮湯下痘不成漿多服數帖無妨補漿湯痘灰白不起壯或漿清淫羊藿三分多則發癢人參八分穿山甲土炒三分黃茋一錢半枸杞子一錢川芎五分當歸八分甘草五分木香二分白术土炒六分山查八分陳皮五分官桂三釐黃豆三十粒笋尖三箇加薑棗糯米水煎服一方有白芷防風補元湯治痘頂充滿而根􅌉不聚色不紅活乃氣有餘而血不足也川芎當歸白芍酒炒熟地各一錢紫草紅花各酒洗七分陳皮甘草各三分白术土炒一錢半酒水各半盞糯米五十粒棗二枚煎服活血散治痘色淡白當歸赤芍酒炒紫草川芎紅花各五錢血竭一錢木香二錢右為末每五嵗者服一錢十嵗已上者服二錢好酒調下熱極血焦不紅活者酒煎紫草湯調下保生散治氣血俱虛灰白色不灌漿回漿者紫河車一具焙為末龜板酥炙五錢一方有鹿茸五錢右末每服五七分或一錢氣虛者保元湯下血虛芎歸紫草煎湯下渾元散治同上紫河車一具分作五七磈用白糯米三合水淘淨入無油銚內同炒以米黃色為度同為末每用五七分兒大者一錢極補氣血能助灌漿如神緣糯米性溫得紫河車之氣純化為河車故其補功最速譬之造酒米從麴化意也極妙絶異功散此方調順隂陽充實表裏凡痘灰白癢􅚥寒戰泄瀉腹脹並