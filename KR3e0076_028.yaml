神法也蓋雄黃能拔毒胭脂能活血也涼血地黃湯室女出痘遇經不止熱入血室當歸川芎白芍生地白术升麻黃連甘草人參山梔仁𤣥參水煎服涼血解毒湯治女人出痘非經期於發熱時而血忽至當歸一錢二分白芷五分升麻四分紫草一錢半紅花一錢赤芍一錢桔梗八分連翹三分燈心二十根水煎服當歸養心湯治女人出痘口瘖不能言者人參當歸麥冬甘草升麻生地各等分加燈心水煎服㵼肝散女人經水不斷適逢出痘發熱昏沉言語狂妄羌活川芎防風各八分當歸一錢山梔仁龍膽草各五分大黃酒蒸三次一錢水煎服一方有木通柴胡黃芩歸脾湯女人經閉不通血海乾涸適逢出痘以此調其心脾不使血妄行加柴胡山梔名加味歸脾湯人參白术茯神黃芪逺志地骨皮各一錢二分甘草三分木香五分酸棗仁一錢薑棗煎服逍遙散女人出痘寒熱不時經水不調服此其血不致妄動白术茯苓當歸芍藥甘草柴胡各等分加棗一枚水煎服加丹皮山梔名加味逍遙散如聖散妊婦出痘安胎白术黃芩當歸枳殼黑豆大腹皮砂仁甘草桑上羊兒藤即桑寄生各等分水煎服黑神散婦人出痘分娩後痂血作痛當歸川芎熟地炮薑桂心蒲黃炒香附童便炒木香青皮黑豆酒水各半煎服原疹生生子曰麻疹浙地呼為瘄子又曰沙子吳地呼為疹子新安呼為麻總由有生初之淫火伏於命門之間命門具太極之理而隂陽五行繫焉臟腑之所由生也蓋五行一隂陽隂陽一太極也天之與人咸相感通由其通故天寒而人身寒天熱而人身熱也天之癘氣一動則所稟之毒隨感而發陽感之則疹出焉隂感之則痘出焉陽浮而淺故疹易出易斂隂凝而深故痘難出難痂隂陽二劫之毒盡出則向安矣余故曰人之出疹出痘猶蠶之一眠二眠三眠也痘雖出於隂而實成於陽以氣為之固也疹雖出於陽而實藉於隂以血為之資也何見之痘非氣行則血不附安得結痂疹非血濟則氣失依焉能收斂斯隂陽升降之理一開必一闔血之附氣氣之依血隂根於陽陽根於隂隂陽互為其根也前人謂痘出於臟不知指何臟疹出於腑不知指何腑而云之也又謂疹出心肺故鼻涕而咳嗽余謂此皆臆度套詞而非有真知一定之見也既曰疹出於腑心肺獨非臟乎按內經鼻為肺之門户通天氣陽毒上發熱毒薰蒸蓋心肺位尊膈上又肺主毛竅毒從竅出是干於肺而非出於肺也要知痘之與疹皆出於命門之隂陽也右釋麻疹一發熱之初多似傷寒惟疹則嗽咳噴嚏鼻流清涕眼泡腫其淚汪汪面浮腮赤惡心乾嘔為異耳但見此候便宜謹避風寒戒葷腥厚味急表散之使皮膚通暢腠理開豁而疹毒易出也一疹痘之發雖曰胎毒未有不由天行癘氣故用藥必先明嵗氣兼之時令如溫暖時月以辛涼發之如防風解毒湯暄熱時月以辛寒發之黃連解毒湯大寒月以辛溫熱劑發之桂枝解毒湯時寒時暖以辛平之藥發之升麻葛根湯此因時投劑不可誤作傷寒妄施汗下而伐天和也又須看人虛實如大便祕結煩熱甚而發不出者以酒大黃微利之吐利不止以參芍之類補之一用前藥發散而疹隨見為美若發不出再加發之如加味麻黃散之類外以芫荽酒糟蒸熱擦之看其疹自頭至足為之出齊頭面愈多為佳若遲延日久而不出則腹脹氣喘昏眩悶亂煩躁而死矣一看疹之法多於耳後項上腰腿先見其頂尖而不長其形小而均淨淡紅為吉若色紅甚兼火化也化斑湯主之人參白虎湯佐之如色白者此血不足也養榮湯如色紫赤乾燥暗晦乃火盛毒熾宜六一散解之四物湯加柴胡黃芩乾葛紅花牛旁子連翹之類滋隂涼血而熱自除所謂養隂退陽之義也此亦五死一生之症外大青湯𤣥參解毒湯皆可選而用之若黑色者則熱毒尤甚為十死一生之症須明察之勿妄施治一表後看疹隱隱然見於肌膚成片切忌風寒生冷如一犯之則皮膚閉塞毒氣壅滯遂變為渾身青紫而毒反內攻煩躁腹痛氣喘悶亂諸症作矣欲出不出危亡立至一疹已出而忽沒者乃風寒所過而然也若不早治毒成內攻必致癢􅚥而死急用消毒飲合升麻湯熱服則復出而安矣一發熱之時遍身汗出者此毒從汗散𤣥府開疹易出也有鼻中血出者此毒從血解也俱不可遽止之若汗出太多血出不止者此又火甚逼迫太過致液妄流妄行矣急宜當歸六黃湯加浮小麥以止汗茅花湯加𤣥參百草霜以止血遲則汗出多而元氣虛血出多而精神散為不治之症矣一發熱之時或嘔吐或自利或滯下者此火邪內逼毒氣上行則吐下行則利毒甚則裏急後重而為滯下也吐者竹茹石膏湯利者升麻澤㵼湯滯下黃芩芍藥湯加黃連生地木通人參枳殼或少加大黃微下之一發熱之時未有不口渴者但宜以菉豆燈心炒米湯飲之人參白虎湯佐之取生津解毒而已若恣飲冷水恐生水畜之症故水入於肺為喘為咳宜用葶􅐗子以泄肺中之水水入於脾為腫為脹為自利水入於胃為嘔為利宜用猪苓澤㵼茯苓以㵼脾胃之水水入於心為悸為驚宜赤茯苓燈心湯以泄心下之水水入於肝為脅痛用芫花以泄之水入腎與膀胱為小便不利為隂囊腫用車前子木通以泄之皆當隨症而治一疹出之時咽喉腫痛不能飲食者此毒火拂鬱上薰也宜甘桔湯加𤣥參牛蒡連翹更以十全散玉鎖匙吹之不可妄用針出血也一疹出之際咳嗽口渴心煩者此毒在心肺發未盡也㵼白散加天花粉連翹𤣥參黃連以㵼之或黃連杏仁湯一疹出之時自利不止或㵼稀水頻數者有吉有凶但要看其疹若遍身稠密太盛或紫色或紅色此則為吉蓋毒在大腸非㵼則毒不解惟用平胃散加葛根連翹以解之而已疹一發透依期而收㵼自止也若疹已收而㵼猶未止者驗其體熱疹必未盡再用前藥加連翹黃連牛蒡木通澤㵼以分利之六一散亦妙絶若用訶子肉果等澀滯之劑則變喘急腹滿痞脹不治之症矣若疹色淡而體不熱口不渴大小便利飲食少進此為凶乃虛寒之症方可溫補或兼收澀一疹出常以六時辰即收為率如子時為陽午後收午後為隂子後即收乃陽生隂成隂生陽成造化自然之妙也故漸出而漸收者其勢輕可若一出之後熱不退連綿三四日而不收者此毒火太盛外發未盡內有餘邪所致須以化斑湯三味消毒飲加𤣥參石膏桔梗為治一疹出後自然熱退若遍身既出而猶拂拂煩熱頻作嘔吐者此毒尚未盡留連於肺胃之間宜化斑湯如大便祕少加大黃微利之一疹已收去渾身反發熱日夜不退此毒未盡解邪火鬱於肌肉之間久則毛髮焦乾皮膚枯槁肌肉消瘦為骨蒸癆瘵之症宜蘆薈肥兒丸加龍膽草當歸連翹等治之遲則有變睡則露睛口鼻氣冷手足厥逆瘈瘲慢脾風為不治之症矣一疹收之後身雖不見羸瘦但時發壯熱煩躁不寧搐掣驚悸神昏悶亂者此隂血衰耗致餘毒入肝而𫝊於心也宜養血安神四物湯加麥門冬酸棗仁淡竹葉燈心甘草石菖蒲龍膽草茯神黃連辰砂為治或以前藥為末用􅔻餅猪心血為丸服亦可一疹毒入胃久而不散致成牙齦黑爛血出為走馬疳𫝊於兩頰浮腫久而穿頰破腮缺唇破鼻為崩砂狐惑等危症矣外用文蛤散雄黃散搽之內用人中白蘆薈使君子龍膽草黃連五靈脂􅔻餅為丸滚水服之以清胃火亦或有得生者但不多見也一疹出之時曽作㵼痢未經清解至疹退之後變為休息痢不問赤白裏急後重日夜無度此餘毒在大腸也須分虛實治之實者三黃丸利之或香連丸和之後用黃芩湯虛者從補一疹退之後微微咳嗽者此餘毒未盡也用清肺飲加消毒飲主之若咳甚氣喘連聲不住名為頓嗽甚至飲食湯水俱嗆出或咳出血者此熱毒乘肺而然也宜多服麥門清肺飲加連翹若見胸髙如龜背作喘血從口鼻出搖首捶頭面色或白或青或紅或枯黯者乃不治之症然亦有肺氣為毒所遏而發喘連聲不已但無嗽咳血出嗆食之症者宜用清肺飲倍加人參治之尤不可拘於肺熱之一端而純用清肺解毒之藥一疹退之餘聲啞不出或咳或喘或身熱不退以致日久而不愈者此熱毒未盡肺金受尅故也宜清金降火湯加竹􅅹薑汁主之一疹退之後飲食如常動止如故而卒然心腹絞痛遍身汗出如水者此因元氣虛弱失於補養外雖無病裏實虛損偶然為惡氣所中謂之中惡此朝發夕死之症間有用蘇合香丸而蘇者一疹退之後有餘熱未盡或發癰毒肢節疼痛者以羌活散微汗微利一疹退之後有餘熱未盡或熱甚而失血者犀角地黃湯合解毒湯或四物湯加茵陳木通犀角之類以利小便使熱氣下行而愈一疹收之後餘熱未盡日夜煩躁譫語狂亂者辰砂益元散燈心湯下或辰砂五苓散加芩連治之若初起煩躁譫語者升麻葛根湯調辰砂益元散主之一麻疹一症比之出痘似輕然調治失宜其禍反不旋踵蓋痘由胎毒而發其形勢多少輕重吉凶自可預斷至疹之出則雖由感受邪氣而發然其輕者可重重者可輕皆在於調治有方故其飲食禁忌比痘尤甚若誤食雞魚則終身皮膚粟起如雞皮之狀但遇天行出疹之時又令重出誤食猪肉則每嵗出疹之月必然下痢膿血誤食鹽醋致令咳嗽則每臨出疹之月必復咳嗽誤食五辛之物則生驚熱不時必待四十九日或百日後方無禁忌也一孕婦麻疹但當以四物湯倍加白术條芩艾葉安胎清熱為主使胎無虞而疹易沒也如胎氣上衝急用苧麻根艾葉煎湯磨檳榔并服之更多服上藥為妙一熱毒薰胎胎多受傷而母實無恙也蓋疹與痘不同痘宜內實故胎落而母亡疹宜內虛故胎下而母安雖與其胎去而母存孰若子母兩全之為愈也麻疹輕重不治三症要訣或熱或退五六日而後出輕發透三日而暫沒者輕頭面多而勻淨色澤者輕頭面不出者重紅紫暗燥者重咽喉腫痛不食者重冒風沒早者重移熱大腸變痢者重黑暗乾枯一出即沒者不治鼻扇口張目無神者不治鼻清糞黑者不治心前吸氣喘者不治水痘症夫水痘亦類傷寒之狀身熱二三日而出或咳嗽面赤眼光如或噴嚏或唾涕與正痘不同易出易靨不宜燥濕苟或燥之恐結痂多變成瘡之症麥湯散古本只此一方或作湯服亦可地骨皮活石甘草各五分甜葶藶麻黃大黃知母羌活人參各一錢右為末每服五分用小麥七粒煎湯調下防風葛根湯治痘發癮疹及疹麻發熱防風葛根升麻赤芍甘草各等分水煎服防風解毒湯治麻痘初發熱如時令溫暖用此辛涼之藥發之防風薄荷荆芥石膏知母桔梗牛子甘草連翹木通枳殼竹葉燈心各等分水煎服黃連解毒湯治麻痘初發熱如時令暄熱用此辛寒之劑發之黃連黃芩黃柏山梔牛蒡子甘草防風荆芥知母石膏桔梗𤣥參木通薑三片水煎服桂枝解毒湯治麻痘初熱如時令大寒用此辛溫熱之劑發之桂枝麻黃酒炒赤芍防風荆芥羌活甘草桔梗人參川芎牛子生薑水煎服升麻解毒湯治麻痘初熱如時暖時寒用此辛平之劑發之升麻葛根羌活人參柴胡前胡甘草桔梗防風荆芥牛旁子赤芍連翹竹葉水煎服加味麻黃散麻痘發不出以此發之升麻酒洗麻黃酒炒人中黃牛旁子蟬退各等分水煎服化斑湯治麻痘色紅人參知母石膏甘草牛旁子連翹升麻地骨皮竹葉糯米水煎服養榮湯治麻痘色白人參當歸紅花赤芍桂水炒甘草水煎服大青湯麻痘紫赤暗晦乾燥𤣥參大青桔梗人中黃知母升麻石膏木通梔子仁水煎入燒人屎服如大便祕加酒大黃茅花湯治麻痘鼻䘐茅花歸頭丹皮生地甘草各等分水煎服竹茹石膏湯治麻痘嘔吐橘紅半夏石膏白茯苓竹茹甘草右水煎服升麻澤㵼湯治麻痘自利猪苓澤㵼滑石赤茯苓甘草黃連酒炒升麻各等分水煎服黃芩芍藥湯治麻痘滯下條芩三錢白芍升麻各二錢甘草一錢水煎服十全散麻症咽喉腫痛黃芩黃連黃柏苦參各酒炒一錢𤣥胡索三分硼砂乳香製各二分孩兒茶雄黃各五分共為細末每用少許吹入蘆薈肥兒丸麻後發熱日夜不退肌肉消瘦骨蒸癆瘵蘆薈龍膽草木香蚋皮人參麥芽炒使君子肉各二錢檳榔黃連酒炒白蕪荑各三錢胡黃連五錢右末猪膽汁糊為丸黍米大每服五六十丸米飲下文蛤散麻毒入胃牙肉黑爛出血走馬疳症雄黃五錢五棓子二錢枯礬五分蠶退紙燒存性一錢右細末米泔水洗淨以藥搽之雄黃散治同上雄黃一錢黃柏二錢麝香一分先用艾湯淨洗後搽藥麥冬清肺飲麻後咳嗽出血或嗆湯水知母貝母天門冬桔梗甘草杏仁牛蒡石膏煅馬兜鈴蜜水炒糯米右水煎服清火降火湯麻後熱乘肺金聲啞不出或咳或喘當歸白芍生地陳皮貝母瓜蔞仁甘草白苓枯芩酒炒山梔炒𤣥參天冬麥冬杏仁桑白皮石膏紫蘇梗酒連右各等分薑一片水煎服生生子曰麻疹咳嗽喘急每用痘門中大小無比散每服五七分大者一錢即刻喘定而睡醒後神安氣和而愈屢用屢驗乃熱毒從小便出也加減四味升麻湯此升發之劑但一二帖則止不可過表升麻葛根赤芍甘草防風桔梗紫蘇蒼术陳皮枳殼柴胡薑棗煎服水痘赤痘即此一服而愈不必他方雜治赤水元珠卷二十八
