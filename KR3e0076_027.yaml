body:
  text: 赤水元珠卷二十七上明孫一奎撰痘疹心印小引生生子曰余考痘之為症上古軒岐秦越人淳于公輩皆未之論烈也自東漢建武中南陽征虜染流中國時謂之虜瘡醫者以蜜煎升麻數數拭之然則痘盖肇於東漢也已顧柰何張仲景華元化王叔和皇甫謐禇澄孫真人王氷許學士諸名公亦未之置喙至宋錢仲陽而下陳文中李東垣王好古朱彦脩乃始言之迨劉昉之㓜㓜新書王賓湖之㓜科類萃徐用宣之袖珍冦衡之全㓜心鑑湯衡之嬰童寳鑑髙武痘疹正宗汪石山痘疹理辨魏直博愛心鑑李言聞痘疹証治痘疹要訣聞人規胡大卿八十一論李實痘疹淵源翁仲仁金鏡録萬菊軒痘疹心要俞東臯痘疹巵言皆特以痘疹為言者不下數十家各相發明似無遺漏宜乎今之嬰童可無虞矣何邇年来痘疹一臨殤輀相踵十不保五曷故哉屈數前書不為不多吐心露膽不為不悉豈多岐而亡羊耶抑其術猶有未臻者耶嗟嗟書不盡言言不盡意眀者當心得之已古謂用藥如用兵岳武穆云陣而後戰兵法之常運用之妙存乎一心書安能使人人必克勝哉矧今之業專門者以痘為秘術為禁方固不道其道心其心各師其見各顓其法而不思融洽衆理以契所歸故乃宗張喙李是甲非乙殆𣲖紛而不㑹其源曷能齊其治哉余燭斯弊每為痛心故節録各家成法叅以鄙意㑹而同之名曰痘疹心印庶好生君子得以窺其竅妙云爾原痘萬菊軒曰上古之時未聞瘡痘之􅂒素難之文鮮有及者豈其人淳龎朴野積精全神虚邪苛毒莫之能害歟或云自建武擊虜遂染其毒流布中國謂之虜瘡或曰聖瘡言其變化莫測也或曰天瘡言為天行疫癘也或曰百歲瘡言人自少至老必作一畨也或曰踠荳瘡言其形之相似也故患此者如蛇蛻皮如龍蛻骨死生存於呼吸之間夫上古所無而季世有之抑時世異耶抑人自失之耶余思其繇天地之氣春夏生養之紀也其物熈熈秋冬殺戮之紀也其物黟黟時逮末世已非泰和之景不可謂非時世之異然人日習偽不知持滿御神之道七損八益之數務快其心以散其真不可謂非人自失之也有論穢毒者有論淫火者有論時行正病者靡有定論將謂穢毒淫火耶則一歳之中大而郡縣小而村落病者相似而死相繼未必人人若此之甚也將謂時行正病耶何以自少至老但作一次厥後再無傳染也盖父母於子一體而分精血之毒已畜於陽施隂化之始固不待誕生之頃嚥其血而後有是毒也况男子惜其氣以養其精女子調其氣以養其血苟失所養即貽他日之患子之受於父母者雖殊其為毒則一也豈有男子淫火起於氣為陽毒而易治女子淫火起於血為隂毒而難治之理耶至於天行正病亦有其時但觀夫年之所加及有四時不正之氣即知有是正病也然則待時而發者胎毒也或速而危或徐而持或暴而死者氣之㣲甚所使也發則其毒洩矣所以終身但作一度後有其氣不復𫝊染焉孫季子朋来曰淫火即胎毒也天行即疫癘致痘之由端不外是二者葢淫火肇於有生之初伏而不發必俟天行煆煉一畨然後洩之雖百歳不免焉殆亦有生之後一刼也設非淫火胎毒安得一生只發一次哉矧人之出疹出痘正如蠶之蛻殻一眠二眠三眠也若謂純是胎毒不假天行何臨作之年郡縣村鎮沿鄉接境莫不皆然即卵生如雞鴨胎生如猪犬且皆不免又槩可見至於生者死者實由所感天行之輕重非干所稟之厚薄也觀今之童稚體盛神壯宜其稟氣之厚亦多死者形羸色瘁豈非所稟之薄且多生者迹此驗之死生輕重乃臨時所感天行之輕重也為父母者慎加保惜以膺天和不可純委於命而尤天也特筆此以告萬菊軒曰昔人謂在胞中饑則飡母之血渇則飲母之血余獨謂其不然盖兒始受氣之時一月胚二月胎不過一㸃精血凝結中涵生意也至三月以後其形漸成在胞之中譬諸禽鳥之雛在卵殻中渾渾然薫蒸滋養惟所受太和之氣漸自生長日月既足乃破其胎卵而出矣何以能飲食耶必謂有所飲食則胚胎之初形象未具何飲何食耶且血者渣滓之物有入必有出十月之前所飲所食之血又從何道出耶若生下口含惡血乃母臨蓐之時血穢流溢入兒口中未必便是先在腹中所食之血也但云兒在胞中滋養形體長育變化培植根蒂者則在母之血液也或有問曰兒在胞中饑則食母之血渇則飲母之血萬菊軒以為必無此事驗今之初産之孩口有穢血少頃就有黒糞從便而下是其徵也安可遽謂必無之耶孫季子朋来對曰以物理格之似無此事也兒之胞胎在腹猶𤓰菓然𤓰菓賴藤樹滋灌汁從蒂入日漸肥大成熟兒在胞胎混混沌沌懵然無知焉有饑餓葢藉母之湮從胞蔕而灌入臍中十月充足胞分而出口中之穢間或有之實分娩時胞中之餘穢惡露也大便黒糞如𤓰菓中之汁水耳此必有之物殆平時灌滲積於其中出懷之後各自立極陽升隂降陽升者啼聲上出也隂降者大便下行也此必然之勢亦必然之理也出懷之後始有出有入在腹胞中安有出入之徑竇者乎格物者自能辯之毋致疑也痘不宜毒物酵發生生子曰痘本火毒尤因天行故發熱之初看其熱盛便知毒重即宜解散使表裏疏通俾熱毒有門路出也全在頭着工夫胡大卿曰小熱宜解毒大熱宜利小便觀此可見前人慎重之意不輕易用大寒大毒之劑動其大便恐傷冲和壞脾胃也縁痘全藉脾胃尤賴冲和始能灌漿結靨所謂冲和者即胃中坤元之氣人賴之以養臓府而灌溉周身者也近觀西呉治痘罔用頭着工夫動輙便以鱖魚桑虫雞冠血虺蛇等毒物謂之酵痘習俗為常不思痘本火毒毒固宜發但當先門路未清小毒藴成大毒兹又以毒攻毒不啻火熾添油則脾胃冲和若燎毛矣故毒發之後痘粒粗大膿何得滿或潰而爛或噦而嘔或發癰毒或成外剥或致泄㵼種種之禍變難悉舉豈知門路疏通則痘縱不起發不過補助氣血而或以大成散佐之自能行漿灌膿盖痘粒小則漿易滿亦無變症是曲突徙薪之法也舍此不為而徼彼焦頭爛額之功殆亦危矣戒之戒之戒用天靈盖生生子曰醫本仁術夫仁者無大無小無貴無賤無見無隠無處不然故啓蟄不殺方長不折皆所以體天地而愛物存仁也醫之治痘逆者不治險者宜治前人方法林林種種何莫非藥何物非劑何適非宜顧乃取人之骸骨而煅煉之嗟嗟其忍心亦劇矣乎不思痘之無膿者由氣虚而血不充也補氣以氣補血以味合取其氣味之純厚者以補之則得矣如人乳紫河車鹿角膠之類皆氣純味厚者庶可以補氣血而資精神彼遺久死骸迨氣血竭絶枯朽之物猶稿木死灰已且不能延生而又能資他人乎此必無之理也且痘古稱天花貴清潔而厭腥臭其不可用一也膿少由於血虚喜潤而惡燥兹犯煅煉枯燥其不可用二也况律有禁條以無可取效之物而戕人之遺體犯律之禁傷天之和噫操殺術也焉得仁或曰有用之而痘立發者何謂也生生子對曰余非謂此物不能發特嘅其發之後燥毒交扇烈若燎原正如燈巵油盡而又益之以燈心立見焦枯良可悼夫腎無痘辯生生子曰諸書皆言四臓俱有痘獨腎無痘故發熱之初單顯四臓之症驗耳之冷則知腎無痘也余謂此皆臆度之言非見道之語也縁痘稟於有生之初父母之淫火伏於子之命門為天行癘氣感觸而發觀銅人圖命門宂在兩腎俞之中與臍相對秦越人謂兩腎中間動氣者五臓六府之本十二經脉之根呼吸之門三焦之原臓府從此而生故人之所以得不死者賴此動氣以為生生不息之根有是動則生無是動則呼吸絶而物化矣夫以耳之冷熱驗痘出之輕重則可若以耳之冷而遽謂腎之無痘則不可腎既曰無痘何前人又有變黒歸腎之説由其有出斯有歸也詳古人用四牙散一方亦可見矣盖牙者骨之餘腎之標是亦以腎補腎之意惟腎之元氣充足則其痘始能盡出且又能制伏其火而使其氣血相依故化膿結痂而愈也腎虚則不能化漿而使之盡出結痂則色變黒馴至焦枯而告殂矣故曰歸腎者猶言痘本出於腎而仍還於腎也是為辯首尾不可汗下辯萬菊軒曰今之治痘者悉云首尾不可汗下聽者和之曰痘宜温補汗下不可也此亦喜補惡攻之遺弊殊不知治痘之法莫要於觧毒或攻或補務使毒氣得解而已如其氣血和暢營衛流通表裏無邪其出則盡其發則透其收則時非但不可汗下雖温補亦不可用也設使外感風寒約束皮膚腠理痘出不快此當汗之令隂陽和營衛通而痘易出毒得解散可也苟不汗之則毒無從得出留伏於内未免閉門留冦之禍矣如大熱不退煩渇轉増譫妄昏沉便溺阻塞此毒留於腸胃之間與穀氣併宜急下之使臓府疏通陳莝滌去可也苟不下之則藏􅀢畜毒煎熬於中寜無養虎遺患之悔乎故大要曰謹守病機各司其屬有者求之無者求之必先五勝疏其血氣令其條達而致和平此之謂也審証孫季子朋来曰治痘先須審証痘固胎毒必假天行令氣或内傷飲食激而發也發熱之初預當明其輕重盖熱輕毒輕熱重毒重也設熱既重便宜察其表裏外感内傷内傷為裏夫痘全藉脾土以為依歸脾為倉廩五臓皆仰給於脾外主肌肉行漿灌膿結痂皆在肌肉脾既受傷則内熱藴悶或腹疼嘔惡急宜消之重者下之使裏無壅遏則熱自退神自清也内傷不急治六七日後痘既外出腹中虚矣内傷之物因而㵼痢則不能灌膿而成内䧟外感風邪即宜清解若頭項痛腰脊强便知為太陽經表症若鼻乾不得眠口渇便知為陽明經太陽以防風𦍑活寒月麻黄桂枝陽明升麻葛根之類古人云必使一晝一夜汗出熱退為佳盖腠理疏通則痘易出易壯遲則熱燒地盤腠理緻宻熱無從出出必稠宻或藴成癍由解散不清縱然發出日後灌漿必咳𠻳聲啞嗆喉外剥可不謹之於始哉觀乎古人呼為痘瘡以其形圓而肖荳也荳喜土鬆滋潤則易出易成熟初出最嫌土燥成熟尤怕濕淫燥則難出濕則潰爛故治痘亦如之若熱盛毒重神昏足冷者即於前解散内消之中大加解毒故曰六日以前解毒為主六日以後補託為主過六日則大事已定救無及矣是以貴在審証勿失時也右審症緫驗部位内經曰諸瘡皆屬心火心之華在面痘瘡之候但以面之部位占之思過半矣痘本火毒火性上炎諸陽皆上聚於面吉㓙善惡尤易見也額屬心火如印堂以上髪際以下横兩日月角部位先見紅㸃先作漿先結痂者此惡候也盖心為君主毒發於心故先見於其位君危則十二官皆危死殆速矣左臉屬肝木右臉屬肺金如兩臉先見紅㸃磊落者吉如相聚作塊其肉腫硬者死盖肝蔵魂肺蔵魄生意既絶魂魄相離故不治也頦屬腎承漿横抵兩頥先見紅㸃先發先痂者吉此位雖屬腎然三隂三陽之脉皆聚於此隂陽和故無虞也鼻雖為肺竅而凖頭則屬脾土若凖頭先出先痂者㓙葢四臓皆稟受於脾毒發於脾則四臓皆失所資殆土敗則四臓皆相隨而敗故延綿日久而後斃也腎之竅在耳又心之用亦在耳心者少隂君火也而少陽相火之脉行乎耳之前後凡在耳輪前後先見紅㸃者㓙盖君相二火互發燔灼之勢難以撲滅惟口唇四圍先出先起先痂者大吉縁陽明之脉俠口環唇胃與大腸主之無物不受殆猶海也乃多血多氣之經故曰大吉也驗面發熱之時面色明瑩者吉赤若塗胭脂者㓙此邪氣拂欎於陽明胃與大腸也陽明經上循於面熱盛故赤也宜清凉解毒稍通利之面垢慘黯者凶面垢者少陽候見也邪熱拂於少陽甚則面㣲壅宜表裏雙解盖少陽從中治也驗耳腎通竅於耳故耳以候腎也腎臓屬北方天一所生之水受氣之初先生兩腎如荳子離泥兩邉分開之瓣也痘疹發熱耳獨凉者瘡疹屬火外邪不干於腎故也如耳熱是邪干於腎毒不發越則反有歸腎之變凡觀痘瘡先看耳後有紅縷者盖少陽三焦之脉從膻中上出缺盆繋耳後直上出耳角紅者火色也此瘡疹之火發從少陽故色先見於其經也凡痘自耳先出未及成漿耳輪先靨者此漸萌歸腎之勢多㓙驗目目者心之使也神所寓焉發熱之初觀其兩目神倦不欲開者痘也目中汪汪若水者疹也諸瘡皆發於心故候見於目也目赤者熱甚也心惡熱急解之經云肝開竅於目瘡疹發熱目連劄者肝有風也風入於目上下左右如風吹不輕不重兒不能任故目連劄也目直視者肝有熱也熱入於目牽其筋脉兩眥俱緊不能轉盼故目直也得心熱則搐者風火相搏也痘疹發搐此其常候但㵼心肝二經之火搐止則吉不止則㓙五臓精華皆上注於目痘瘡之毒發於五臓毒之甚者目必受之故前人註有䕶眼之法良有深意凡兩眼常出淚者肝熱也此時眼中無痘宜服㵼肝火之藥葢眼中之毒常在収靨不齊之後方有如痘入目成膚翳者切不可用㸃藥恐損睛破瞳成廢人矣痘瘡収後目不開者肝熱則目澁不敢開明暗皆然心熱見明則合見暗則開謂之羞明此有餘熱在心肝也如瘡未成膿腫消目開者瘡已過期収靨不齊目閉不開者瘡壞欲變目上竄者心絶也直視不轉者腎絶也非泣而淚自出者肝絶也㣲瞑者氣脫也血貫瞳子者火勝水竭皆死候也驗鼻鼻為肺之竅痘疹發熱之初噴嚏者火邪上干於肺外應於鼻而痒則嚏鼻乾黒燥者火刑於金金體本燥得火反甚急宜清金㵼火以解其毒鼻衂者血得熱而妄行故衂出於鼻急以凉血㵼火以解其毒鼻流清涕者疹也疹發於心心肺相連以火煉金熱極而反化為水也痘出之後鼻塞不通者熱也痘已成漿収靨之時鼻塞不得息者此鼻内有瘡膿涕粘結可用金銀小簮子以通之如痘未成漿鼻端先乾者凶内經云臓真高於肺以行營衛隂陽也邪火刑肺肺敗不能輸精於皮毛故皮毛焦枯先見於鼻營衛不行隂陽不續以漸遍身皆乾枯而死矣凡瘡變壞鼻中血出者鼻孔開張喘急者肺絶之候皆死症也驗唇口脾之竅開於口其華在唇四白發熱之初口中和唇色紅潤者吉如口燥唇裂其毒必甚急解之痘出稠宻唇口痘子相粘諸痘未發此處先已戴漿諸痘未収此處先已焦黒者㓙面痘腫灌唇上痘裂成塊乾濺者重如痘出太宻口中氣臭者臓府敗壞故臭出於口也痘欲變壞唇上縮者脾絶也唇下自呷者魚口也口中涎如膠粘者脾津竭也皆不可治驗手足四肢者諸陽之本痘出欲踈其發欲透其靨欲齊如應出不出應發不發應収不収此脾胃氣虛不能旁達四肢也發熱手尋衣領亂捻物者肝熱也手搯眉目鼻口者肺熱也手足搐搦者心肝風火相搏也各隨其臓而㵼之足凉者此常候也足冷手亦冷者脾臓虛也四肢皆稟氣於胃而不得至經必因於脾乃能至也脾虚不能為胃行其津液故冷耳宜温之痘已出手足多水泡者此肝勝脾衰為鬼賊宜急治之不久便生痒􅚥也如遍身皆發手足不透是空殻者此脾胃虚弱津液耗竭營衛凝澁故其毒亦欎而不發也不能食者死能食者必發癰疽痘勢太甚手足冷者不治痘未成漿手足皮脱者必死痘已正靨惟足不収者足為純隂無陽相濟所以収遲如痘始成漿他處未収手足心先靨者其後必生怪疾也痘靨之後手足闗節腫痛者必發癰也痘痒手足搔亂者㓙夾斑斑者血之餘有色㸃而無頭粒隨出隨没者也丹則成片赤如雲頭而突皆血太過而氣不及營衛失䕶致血任三焦浮逰之火散漫於皮膚之間耳宜以輕劑散其火邪兼活血解毒之藥治之並用𤣥參升麻湯加石膏黄芩荆芥芍藥芎歸或升麻湯加紫草蟬退多磨犀角汁化下烏金丸又或結痂之後而發者餘熱煎熬肉分其斑必爛宜解毒湯加歸芍黄芩石膏甚則大連翹飲爛處以生肌散敷之無不瘳矣至若青黑紫斑乃毒氣不能發泄之故死生一反掌間耳急與四順清凉飲利之其斑既退即以四君子湯加黄蓍薑棗煎服如不止再加肉果須要預煎候之俟斑退血附即服庶可免其内䧟也大抵斑在發熱放標起脹時多用表散在灌膿収靨時多用解利遍身通紅者治同發斑有二陽毒發斑者壯熱渇躁兩目如火脉洪有力其色紅赤者胃熱也紫黒者胃爛也一則下之早故熱乗虚入胃一則下之晩故胃熱不得泄皆内外挾熱而發斑也當服𤣥參升麻白虎等湯隂症發斑者身無大熱手足指甲俱青脉沉細而急其色㣲紅或暗晦此無根失守之火聚於胃薫於肺𫝊於皮膚而為斑也若妄投以凉劑則誤矣當與升麻鱉甲湯調中温胃而斑自退夾疹疹即麻也痘毒出於隂疹毒出於陽隂主血故痘有形而灌膿結痂陽主氣故疹有色而不膿痂此皆有生初之淫火伏於命門之間本非尋常並發者惟痘出之時或天行所激觸動其毒故並出耳此亦不順之症也故急宜清散先服升麻葛根湯如不解則犀角地黄湯内既清凉則疹亦隨之而解矣錢氏云痘疹只出一様者善凡痘已見形其間碎宻若瘡子者此夾疹也由火毒薫灼於中故使疹挾出於外也急宜解毒使疹消散痘得單成可也宜荆防解毒湯主之若服後而疹不退者凶之兆也夾斑治同膚疹者熱毒之氣發越而然也暴出之時㸃如麻狀但色鮮赤成片耳用敗毒散毒當隨散越數日而痘出痘反稀疎劉宗厚云癮疹多屬脾隠隠然在皮膚間而名之也發則多痒或麻木不仁者是兼痰兼濕之殊也色紅者兼火化也用解毒防風湯若内傷外感而發者用調中湯夾沙亦麻類粒頭𤨏碎呉地呼為沙子其狀如夏月膚腠之疿子沙之形如粟一般尖員而硬中含清水夾痘而出者亦熱毒之所發也用四苓散加防風黄芩分利隂陽而􅀈自退矣夾疥瘡痘夾疥瘡而出則血氣為瘡所奪痘多不能起發成漿須連服内托散庶無坐陷之患也乾枯黒陷紫陷朋来曰凡黒如烏羽者生以其熱雖熾而血尚活治以凉血解毒可愈也黒如焦煤者死無生氣也故不治痘色初見深紅者必變紫紫必變黒紫黒必至於乾枯皆血熱乾滯而氣不能運行一定之理固如此也治須以凉血清熱為主㸔其㣲甚或利大便或利小便或為解散頂雖平陷不可以氣虛而例用參茋補劑葢補氣則熱愈甚而血愈涸也宜以絲𤓰化毒湯加當歸紅花連翹牛蒡更以麻黄解毒湯發散其毒或以紫草湯化下小靈丹或燈心湯化下大靈丹有黒疔者針挑破去其毒血兼用扶脾實土之藥古方有燒人屎者有用四聖散者有用人牙散獨聖散者有用雞冠血酒漿灌之者有用胡荽酒塗其遍身并衣服薫之者有用壁間蟢蛛如荳大者研爛入雄黄毎嵗一釐同研勻酒調服者有用黄連犀角清心火者已上皆可擇用如宣風散百祥丸牛李膏内有大㦸與牽牛峻利之藥元氣盛尚可虧損况痘後之兒尤當慎之黒陷二種因氣虚而毒不能盡出者酒炒黄蓍紫草人參黒陷甚者亦用燒人屎白陷灰陷朋来曰察其乳食少進二便清利者為寒法從温補痘色白者必變為灰慘灰慘者必變為平伏倒塌此雖氣虛而血不華色血亦虚也故當氣血兼補使血活氣行則白色可變為紅庶或可救若單用補氣之藥則氣燥血虚必致發痒抓破灰慘平伏倒塌為不治之症矣治宜補中益氣湯合四物湯有内熱者加解毒藥白䧟抓破皮薄乾燥而極痒者皆由失於補血以致氣虚則燥然也内潰心鑑曰内潰者胃爛也盖因風寒所中腠理固宻隂陽二分壅塞不通其毒内攻而臓腑之間毒火炮熾則潰而成膿口舌皆白是其驗也識者於痘未出之時或有風寒阻隔氣粗熱甚身必戰動肚腹急痛謹防此患以敗毒散或升麻葛根湯逐散寒邪開泄腠理縱毒外出必無是症痒塌痘瘡痒塌今人縂歸之氣血虛寒殊不知亦有氣盛血熱而然者須從形色及他症辯之如痘色淡白精神虚怯小便利大便頻至夜痒甚者此脾氣弱而氣血均虚也參茋内托散及四君子湯加黄茋肉果官桂白芷蝉退主之甚則陳氏木香散佐之如瘡色紅紫煩躁大小便不利渇欲飲湯水甚至抓破血流者此氣虛血熱毒盛血行氣分血味醎醃螫皮肉而痒也四物湯加參蓍連翹蝉退白芷甘草及三味消毒飲加紫草連翹主之血流者敗草散蕎麥麵炒黄土摻之又遍身痒甚抓破者不問前後皆服蝉花散外以乳香或敗荷葉茵陳燒煙薫之若穢氣衝觸作痒抓破者宜服内托散外以辟穢散薫之然發痒精神清爽自知其誤欲人拊摸者吉若悶亂不寧者揺頭扭項手足舞亂言不聽禁不止者凶也羣玉曰痘疹發痒如能食而大便堅結者此邪氣内實正氣外虚也加味四聖解毒湯治之外用升麻蒼术麻黄槐栁桑皮煎熱拭之如泄㵼者此正氣内虚邪氣外實調元托裏治之外用山茵陳白艾二味為末燃火薫之如用上二法而痒即止者吉痒不止而反甚者凶也心書曰痘瘡作痒者火邪𫝊於肌膚之間不能即出或血方流行而為風寒外束故欎滯而作痒與傷寒汗不出而作痒相同法以荆芥穗束之以紙而刺痒痘之項以散欎邪其痒即止驗之如神内服消風火化毒湯以解之以上痒症痘家之惡候兹録各家治法驗甚者以備緩急參用目睛露白人之一身必元氣固則精血為之凝聚而瞻視有常也若元氣虛損則衛氣受虧是以督脉縮促致睛上弔而露白也若謂之風則謬矣遇此候别無他証者可以保元湯加陳黄米主之無魂失志不省人事者不治雖無他証而或見於七日之前則毒尚未解而氣血已離必不可治之症也聲啞心之氣舉撃於肺而為音肺清則音清肺熱則音啞此必氣喉有痘熱毒閉塞肺竅而然也須分順逆為治如七日之後失音者乃内痘先熟而先靨則咽喉漸寛毒氣漸消聲音自亮為順症也若七日之前失音者此毒氣薫蒸失於調解致肺竅不通閉塞管籥毒無從洩内痘糜爛舌齦成坑咽門腐壞馴至呼吸俱廢為不治之症矣或有内本無痘因食辛熱之物或多服熱藥所致者急用甘桔湯射干牛蒡湯加𤣥參連翹犀角治之或能言聲不清者此火乗於肺也㵼白散加天花粉桔梗石膏片芩茯苓麥冬山梔治之或感風寒閉塞而聲不清者參蘇飲加桑白皮杏仁石膏主之如法治之而效者吉否則凶水嗆喉之竅若管籥然痘之初出細小不覺及肌表之痘成漿則内痘亦成漿而其毒壅於㑹厭然是乃飲食所進之處故飲湯水不易進納則溢入氣喉而發嗆也若穀食有渣自能咽之從食喉而下非如水溢以犯氣道矣七日後見者不藥而愈何也外痘靨而内自痊矣若七日前見則為逆症由熱毒壅塞不能發於肌表故耳治用甘桔湯合解毒湯加牛蒡𤣥参荆芥麥冬若預以甘桔湯清其氣道安致有此患哉驚搐附癲癎心者神之舍也痘毒本熱熱氣擊動心神肝不能制故神不安而發驚搐治宜㵼肝利小便盖㵼肝則風去利小便則熱除風熱既退則痘出而驚自愈矣故痘未出而見此症者則升麻湯合消毒飲主之或紫草膏或蝉酥丸不可竟投凉劑葢心一凉則氣血隨歛毒無從出也痘既見而有此症由熱毒之未解耳四苓散合消毒飲或柴苓湯或導赤散若風火相摶喉中痰鳴目晴上視面赤引飲喜居冷處者柴苓湯或抱龍丸若痘後胃弱飲食不化謂之食蒸發搐必面黄潮熱大便酸臭秘泄不調或吐利腹痛宜紫霜丸下之大便秘者四順飲痘後毒當盡解而又發驚則心氣已絶神無所依必不可治發癲癎者粉紅丸治之痘後手足麻木無汗者參附湯若手足難動常出汗者茋附湯卒然驚仆不省人事者用皂角為末吹入鼻中即甦古謂先痘後驚者不治痘正發而有此症能不為之可悼哉又痘未出毒氣内逼目上竄驚呌如驚風者乃痘欲出之候也若誤認為驚而治之則毒氣内蓄邪熱不洩而反危矣煩躁心經有熱則煩躁葢痘毒之熱撃動心火脾少津液不能濟之此所以發為煩躁不寜悶亂狂言等症也治當觀其虚實何如痰實壯熱者梔子仁湯或解毒湯或辰砂益元散二便秘則通利之虚煩而渇者保元湯加麥冬五味或麥門冬湯夏月暑甚煩渇而痘出不快宜辰砂五苓散靨後發熱煩渇麥門冬飲子此症似輕而重苟服藥而久不愈則心脾二經皆為熱毒所傷矣煩則必渇渇則必㵼㵼則必咬牙寒戰而痒塌之患立至也慎之慎之秋𫝊曰痘瘡以安靜為貴但有煩躁者必毒氣壅併表裏不寧宜審諦之如搔爬不停者痘痒也不寧者裏熱也呻吟者痛也非折肱之妙手安能識其病而起其症哉發渇渇者胃中熱也胃中津液為熱所耗故渇而飲水也始終固有用白虎湯加天花粉乾葛甘草然有汗加人參或辰砂六一散小水不利者四苓散氣虚保元湯加麥冬五味至於隂虚火動而發渇者固為難治之症理辯則謂六味地黄丸加桂心五味子乃治虚渇之聖藥也不可不知痘疹心書曰毒氣萃於陽明此時多發熱渇熱淫於内而外不得宣通故發渇也宜神功散服後猶渇者宜紅花子一味煎湯飲之如無子即用紅花湯加牛蒡子服之此藥神妙能散胃口之瘀血故也切不可用荔枝黒棗椒薑等湯以助陽經之熱噯氣熱毒欎於胃中欲發而不得發故噯氣治用半夏生薑湯加陳皮黄芩或四苓散加陳皮竹茹以利之不食痘瘡始終以脾胃為主若飲食如常者此臓腑充實脾胃完固不消服藥若不喜飲食者必須辯别而治之如泄㵼痘色灰白而不食者此脾胃虚而元氣弱也宜四君子湯或人參養胃湯七珍散治之如大便秘瘡掀腫不食者此毒盛而血熱也宜四物湯加解毒藥熱甚者加薑炒芩連便秘者下之萬氏云痘瘡不怕稠宻只要能食汗多汗乃心之液由熱氣内蒸腠理開泄故液隨氣而出也自汗盗汗俱能虚人未漿之時恐不能灌既灌恐不能靨既靨恐血脫陽虚變為他症最宜調理自汗宜保元湯加桂枝白芍浮小麥以歛之有熱加酒芩盗汗宜當歸六黄湯或當歸湯丹溪曰自汗不妨葢濕熱薫蒸而然也此特為汗少出者言耳若汗大出身冷惡寒寧不早為之治乎此宜異功散救之寒不已者死汗綴如珠者死汗而昏沉者死汗而煩渇者死不可不察諸失血夫血熱則妄行葢熱毒之氣淫佚無歸則血亦隨之而走泄也始終用犀角地黄湯加芩連梔子白芍但血之妄行或吐或下或從陽瘡痘毒而出者悉皆不治何謂也吐便者有傷於内也㵼膿血如死肝荳汁者胃爛也從瘡毒而出者肉分空虚而元氣為之走泄也鼻衂者生盖血隨毒行𫝊注督脉斬關而出不犯其内故耳至於女人失血不止尤當急治嘗有一男子口鼻出血數碗以韭菜汁半碗頓服而愈隂囊發腫痘症隂囊腫痛如瓠𤓰者乃膀胱熱甚毒氣流於小腸而然也急宜清利退火滑石木通車前牛膝梔子瞿麥燈心甘草水煎服或紫草飲子小便不利者加木通外以石燕子醋磨濃汁敷之痘後浮腫痘靨之後失於調理或傷飲食或感風濕致傷脾土濕勝而為腫也傷於食以徤脾加山查麥芽平胃之類虚者加人參俱以淡滲之劑佐之傷風濕者平胃散加防風𦍑活汗之水腫者以五皮飲消之一方用蘿蔔子殻蒲蘆煎湯洗之立消又法桕樹葉桑樹葉煎湯洗亦消驗動靜凡痘以靜為貴内有不和則動凡靜屬隂而動屬陽痘之為症隂陽俱病但息欲其勻語欲其少寐欲其安寤欲其寧觸其瘡則吟拂其欲則鳴飲食二便如時此平人之候是謂靜而吉也如呻者身有苦也自語者神不清也喘粗者内熱也腸鳴者泄也坐卧不寧者心煩也啼叫不止者痛也揺頭者風也指欲搔者痒也嚥物難者咽痛也咬牙者心肝熱也若悶亂躁擾譫妄昏眩如見鬼狀搖頭扭項手舞足擲目晴上視寒戰咬牙語音不出皆為死候如病向靜忽然擾動者異也須細察之痘色變而無他候者戾氣觸之也痘色不變又無他症此必有因但俟自定其有目瞑息㣲四肢僵直口噤痘壞昏睡不省者此真氣將脫魂魄欲離之兆又不可作靜㸔也稀痘仙方牛黄一錢蟾酥三分辰砂七分絲𤓰蒂近蒂取五寸燒存性五錢為末毎一歳服一分沙糖湯調下兎紅丸服此可免出痘辰砂甘草六安茶各等分臈八日午時取生兎子血為丸梧桐子大逢三六九與兒食之鼠肉方取雄鼠肥大者去皮毛腸穢用鹽醋爛煑與兒食之痘出稀少切不可使兒聞見亦不可對他言知但只可自設法取用不可用他人取討者恐防毒藥死的慎之或只用砂仁白水煮不用椒葱蒜韮并油煎等辛辣熱物若未食葷兒與食尤妙此屢試屢驗者四脫丹蟬退蛇退鳯凰退即哺出雞子壳神仙退即父母爪甲右各等分焙為末毎服一錢煉蜜為丸菉豆大每年除夜服服三年永不出痘𤣥兎丹𤣥參酒洗五兩兎絲子水淘凈酒煮研爛為末右二味俱不犯鉄器為末黒沙糖為丸弹子大每日與兒服三丸沙糖湯下葫蘆花湯八月採葫蘆花不拘多少隂乾入除夜蒸籠湯浴兒或不出痘縱出亦稀少苦楝子湯苦楝子不拘多少煎湯浴兒或痘瘡不出出亦稀少三花丹將出之時用之能稀少梅花桃花梨花取已開未開盛開者隂乾為末等分取兎腦為丸雄黄為衣用赤小荳菉荳黒大荳三荳湯下六味稀痘飲將發痘預服之山查紫草牛蒡子各一錢防風荆芥各一錢二分甘草五分薑三片水煎服輕斑散治痘未見㸃時服之絲𤓰近蒂三寸連皮子燒存性為末硃砂五分二味和勻沙糖調下痘出必稀多者少少者無稀痘如神散絲𤓰升麻芍藥酒炒甘草山查黒荳赤荳犀角磨用各等分毎服三錢水煎服不拘時㸔大小加减預服萬靈丹初發熱一服即輕百發百中升麻小者三錢葛根三錢甘草三分紫草茸一兩蝉退殭蠶洗連翹白附子炒各三錢山荳根五錢全蝎去毒十枚䧺黄一錢半麝香一錢蟾酥一錢好酒煮化右十二味和拌為丸皂角子大毎服一丸紫草湯下發熱有數種生生子曰凡痘疹發熱與傷寒傷風傷食驚風等相似先當辨明傷寒之熱手足梢㣲冷無汗惡寒面色青慘不舒左額有青紋傷風熱手足梢㣲濕自汗惡風面赤而光二者皆太陽症俱頭項痛腰脊强傷食熱目胞腫右額有青紋身熱而額腹最甚夜熱晝凉面色黄或吐利腹痛驚風熱面色青紅額正中有青紋手心有汗時發驚悸痘子之熱必顯四臓之症耳􅍠冷中指冷尻冷面燥腮赤呵欠頓悶乍凉乍熱多睡咳𠻳噴嚏驚悸吐利夫發熱者瘡疹常候也但熱㣲毒㣲熱甚毒甚㣲者勿藥甚者必宜及早清解原痘無逆險只在發熱之初調治之早觀其熱重神昏即以清解之劑投之或發表或攻裏法在不避必使一晝一夜表裏通和熱退為佳盖毒解則熱始退熱退痘出自然稀疎明朗若不早為疎通表裏則毒無出路雖小毒釀成大毒迨及出齊則順逆險已定順者幸而無虞逆者無所措手矣古無順逆險之名稱順逆險者自魏桂岩始也初發熱三朝証治活法凡發熱疑似之間宜投人參敗毒散一劑發之是與不是一發便見萬菊軒曰大抵痘疹只宜發盡勿使留伏於中凡用發表之劑務察天時不可固執只宜平和之説極為誤事設遇冬寒及春行冬令之候腠理緻宻血氣凝澁痘必出遲遲則藴熱熱不得汗毒莫能洩必多壅遏之變急宜辛熱之劑發之桂枝葛根湯或五積散去乾薑如天時熱則腠理疎豁氣血淖澤防其發洩太急恐罹潰爛之變必以辛凉之劑解之宜升麻葛根湯雙解散之類如春秋天時温和不寒不熱只以人參敗毒散最佳保嬰丹熱甚者用之捷效或就於前解散藥化下一丸能令重者輕輕者少以其極能解毒也初發熱時飲食二便如常精神清爽痘必稀少不須藥初發熱時渾身壯熱熇熇然不渇清便自調此邪欎在肌膚之間宜輕揚之劑發之升麻葛根湯甚者𦍑活湯初發熱時其熱烙手目赤鼻乾唇燥小便赤大便秘煩悶不安此表裏俱熱毒氣壅遏宜發表通裏雙解散主之初發熱時表不甚熱煩躁不安口渇小便赤澁熱在裏用紫草膏保嬰丹辰砂六一散犀角山荳根之類清解之甚者三黄丸㣲利之初發熱時腹中痛者此痘毒與穀氣相併急以麥芽山查紫蘇枳實砂仁陳皮温而消之若腹脹硬痛大便秘者備急丸下之初發熱時咳𠻳鼻流清涕參蘇飲主之初發熱大便秘結急宜潤之恐熱毒内蓄宜紫草飲必使大便通利為好初發熱嘔吐者要明外感内傷外感者二陳加柴胡藿香生薑枳殻和而解之内傷者二陳加藿香砂仁麥芽山查枳實蘇梗白芷消之胃弱而吐者六君子湯有毒氣上衝大吐不止者辰砂六一散甚者加石膏蘆根湯亦佳初發熱作㵼腹中不痛原無内傷者此痘内動與外邪搏激所致不必治㵼但以輕揚之劑升發之痘出而㵼自止初發熱自汗自吐自㵼者乃毒從上中下而出皆為吉兆但只在三日内裏不可多日恐元氣虚脫也㵼有冷熱熱㵼者口渇小水少而身大熱四苓散加木通若乾嘔加薑炒黄連或六一散冷㵼口不渇小水清重者理中湯輕者參苓白术散久㵼者荳冦丸初發熱二三日間有驚搐者導赤散𦍑活湯辰砂散大便秘者三黄丸㣲利之小便赤澁者導赤散渇甚者葛根解毒湯腹中痛者桂枝大黄湯腰痛者人參敗毒散自利者黄芩湯吐利者黄芩加半夏湯如脾胃素弱自利清白者理中湯丸或四君子湯荳蔲丸合而服之凡發熱及初見標時須問咽喉疼否但有㣲疼急清解之甘桔湯加牛蒡子大抵痘要解咽喉為急務不早防以致失聲乾嘔水穀不入搶喉噴吐治無及矣管氏曰發熱之初痘之吉凶皆兆於此故急宜表汗使臓腑胎毒及感不正之氣盡從汗散則痘出自然稀少葢熱甚毒甚熱㣲毒㣲不必治妄汗則表氣一虚痘不能起發反為害也盛者汗之要在身熱盡退為佳其有一切雜症皆由毒氣欲出不能故耳一表散則毒氣盡洩諸症自退矣或有當解者解之當下者下之切不可執一也胡氏曰表熱壅盛非㣲汗則表不解裏熱壅盛非㣲利則裏不解正此之謂耳失此不治則毒氣漸盛而逆症隨見世人多忽於此及見逆症而後治之將何及哉大抵治痘之訣妙在三法曰發表曰和中曰解毒知此三者於發熱見標之際預為之地則多可少重可輕自無以後變症故發表最先葢痘疹只要發得毒盡不使留伏於内凡發表必兼解毒非發表之外另行解毒也痘既已出不渇不熱表裏無邪不須服藥如痘多毒盛裏實能食可單用解毒如裏氣不和或吐或利於和中法内畧兼解毒若毒輕痘少惟裏不和胃氣虚者只用和中則不必解毒也每發表須辛甘清陽之劑𦍑活防風升麻白芷桂枝之類和中須甘温之品如人參當歸甘草芍藥之儔盖中不足甘以補之解毒須苦寒之輩如牛蒡連翹葛根芩連梔栢紫草之類葢毒者火也凡用苦寒之劑必要酒炒可以活血達表且不犯胃氣切宜識之痘宜依期施治治貴通變翁仲仁曰夫痘由中以達外用藥因期而變通以其尚未見標必發熱三日然後見標出齊三日而後起脹蒸發三日而後灌膿漿滿三日而後収靨發熱之初耳尻中指俱冷耳後起紅絲呵欠噴嚏眼目困倦兩顴之間有花紋見者預知其為痘也發熱三日當托裏解表使其易出亦有氣弱而不能出者當㣲補其氣氣和則出快初不可用茋恐腠理宻而難出也四五六日以清凉解毒為主清凉則無血熱燥毒之患解毒則無壅滯黒䧟之害七八九日以貫膿為主治法當温補氣血氣血流行而成漿自易也十與十一二日以収歛為主大和氣血補脾利水則自然結靨此特語其常也盖常者可必而變者不可必當隨候參詳安可執藥以應無窮之變哉言見紅㸃之時如痘輕少不可過表在後恐成斑爛或乾紅紫色急宜疏利不然在後必成黒陷四五日之内痘出至足心為齊苟未盡出於解毒之中宜兼發散若専於寒凉則痘遲滯不出七八日之間毒未盡解於温補之中又兼解毒若偏於燥劑則毒盛不能化漿也十一二日之間漿未滿足必大補氣血畧兼解餘毒不然恐有癰毒温疤之患此變通之妙要在隨時制宜也人參敗毒散𦍑活獨活前胡柴胡川芎枳殻桔梗白茯苓人參各等分甘草减半生薑三片水煎服一方加薄荷少許參蘇飲人參三分紫蘇葉桔梗乾葛前胡各四分陳皮茯苓各五分枳殻三分半夏二分木香一分半生三片水煎服升麻葛根湯葛根升麻白芍藥甘草各等分水煎服雙解散即防風通聖散益元散二方也防風川芎當歸白芍藥薄荷葉大黄連翹各五分石膏桔梗黄芩各八分白术桂枝荆芥穗各二分滑石二錢半甘草一錢生薑三片水煎服桂枝葛根湯葛根桂枝赤芍藥升麻防風甘草各一錢生薑三片淡䜴一錢水煎服保嬰丹紫草茸酒洗忌鉄四兩纒荳藤燒存性四兩荆芥穗防風升麻大力子炒各二兩天竺黄一錢二分如无真者以雄黄一錢二分代之牛黄一錢半辰砂用麻黄荔枝殻紫草煮過再飛蟾酥自取真正者一錢二分赤小荳菉荳黒荳各四十粒炒香甘草梢去皮二兩加紫草三兩水熬成膏半碗沙糖半碗前藥俱製净末和為丸圓眼核大辰砂飛過為衣未出之先濃煎甘草湯毎服一丸大兒加一丸凡遇發熱之時生薑葱白湯化下厚葢表汗乃解毒之神藥心要𦍑活湯𦍑活川芎防風山梔子龍膽草當歸各等分甘草减半薄荷葉三片淡竹葉五片水煎服紫草膏治紅紫黒陷熱毒紫草茸白附子麻黄去節甘草各五錢全蝎八枚炒右為細末用蜂蜜一兩酒半盞先入紫草煎熬成膏旋入各藥丸如皂角子大毎服一丸仍用紫草湯化下如治驚搐用金銀箔為衣薄荷湯下六一散桂府滑石飛凈六兩大甘草去皮一兩毎用一錢燈心薄荷湯下内加制辰砂三錢名辰砂六一散治狂言妄語驚搐用防風荆芥薄荷天麻煎湯候冷調下本方加欎金名牛黄六一治痘後瘡癤癰毒及天行瘟疫冷水調下多服大效退火丹治痘初出標大熱不退或稠宻成片者神效六一散一料加雄黄飛過三錢纒荳藤燒存性一錢外用紫草木通蝉退地骨皮紅花大力子𦍑活片芩燈心煎湯候冷調下極能解毒稀痘四苓散白术赤茯苓澤㵼猪苓右為細末毎服一錢三黄丸黄芩五錢黄連大黄各二錢半為細末雪水搗丸菉荳大辰砂為衣毎服五七十丸燈心湯下備急丸木香二錢半大黄黒丑頭末各五錢為細末神麯糊丸菉荳大毎服五七丸山查湯下甘桔湯甘草二錢桔梗一錢水煎服三荳湯赤小荳黒荳菉荳各一升甘草三兩三荳用水淘凈用水八升入甘草同煮荳熟為度逐日空心面東任意食荳飲汁服七日永不出代天宣化丸即韓氏五瘟丹也甘草甲巳年君土黄芩乙庚年君金黄栢丙辛年君水山梔丁壬年君木黄連戊癸年君火連翹佐山荳根佐牛蒡子佐先視其年所屬者為君次四味為臣君藥加一倍臣减半佐又减半共為末冬至日修合取雪水煮升麻汁打麵糊為丸辰砂為衣竹葉湯下五積散白芷川芎各三分桔梗一分半芍藥茯苓炙甘草當歸桂枝半夏各二分陳皮枳殻麻黄各五分蒼术一錢厚朴四分右除桂枳殻二味為粗末外十二味為末慢火炒令轉色攤冷次入二味末令勻水一盞半生薑三片煎一盞温服辰砂散辰砂一錢絲𤓰近蒂三寸連子燒灰存性為末蜜水調服多者可少少者全無絲𤓰解痘最妙紫草甘草湯調服尤佳連翹湯縂解諸毒散風清熱痘後一切發熱癰毒赤腫連翹防風瞿麥荆芥穂木通車前子當歸柴胡赤芍滑石蟬退黄芩山梔子甘草各五分紫草五分水煎服連翹升麻湯連翹一錢升麻葛根桔梗甘草各七分木通八分牛蒡子一錢白芍藥五分薄荷葉少許淡竹葉燈心水煎服消毒飲治咽喉腫痛上膈熱盛一方加升麻牛蒡子炒二錢荆芥一錢甘草防風各五分水煎服翁仲仁十神解毒湯専治身發壯熱腮紅臉赤毛焦色枯已出未出三日已前痘㸃煩紅燥渇欲飲睡卧不寜小便赤澁此熱盛也並皆治之歸尾生地紅花丹皮赤芍桔梗木通大腹皮連翹川芎此方治血熱痘疹以凉血活血為主佐以桔梗川芎有開提發散之功引以大腹皮木通有疏利熱毒之效誠以連翹丹皮有解毒之良用此以治血熱痘疹則能内外分消熱毒雖盛庶幾解散表裏自然和平矣古人用黄連解毒湯恐驟用寒凉不惟氷伏熱毒及出不快抑且熱毒為其所抑則欎於臓腑或肚痛腹脹内潰而死者有之豈若此方用之為穏當若不得已而用黄連芩柏亦須酒炒一以製其寒凉之性二以助其上行之勢借連栢以解毒耳加减法身熱壯盛加葛根前胡毒盛綿宻加荆芥鼠粘子渇加天花粉竹葉滑石小便血加犀角山梔大便黒加犀角黄連或桃仁吐血乾嘔加黄連犀角發紅斑加犀角黄芩黄栢山梔𤣥參小便赤加山梔小便短澁加猪苓澤㵼小便秘加滑石瞿麥大便秘加枳殻前胡嘔加橘紅泄㵼加猪苓澤㵼防風大便秘喘加枳殻前胡大黄煩躁加麥門冬天花粉煩渇狂亂譫語加知母門冬石膏嘔吐加猪苓澤㵼黄連咽喉痛加甘草鼠粘荆芥以上並用燈心十四根水煎服羗活散欎湯専治實熱擁盛欎遏不得達表氣粗喘滿腹脹煩躁狂言譫語睡卧不寜大小便秘毛竪面浮眼張若怒並有神效并為風寒外摶出不快者同治防風𦍑活白芷荆芥桔梗地骨皮川芎連翹甘草紫草大腹皮鼠粘子右為粗散水一鍾燈心十四根煎六分温服身初發熱及見㸃之際毒氣壯盛外為風寒所抑或肌肉粗厚腠理堅閉肌竅不通經絡阻塞使清氣不得引毒達表循竅而出則熱毒擁遏於内為腹脹為喘急為秘結為狂煩為驚搐為失血皮燥毛直面急眼脹睡卧不寧驚啼多哭此熱毒擁遏之症辨認不差急宜用發散開提之劑佐以和解透肌之法則熱毒不擁而其出自易矣𦍑活白芷防風有升提發散解毒之長桔梗有開提勻氣之能荆芥連翹鼠粘善解欎熱地骨皮消擁熱於筋骨之間且能肅清臓腑紫草滑肌通竅大腹皮引熱下行使内外有所分消用此以治熱擁之症效大而功用極妙若驟用寒凉如芩連升麻之類則熱為寒氣所抑不得伸越逗遛經絡為疽為癤者有之氷伏硬閉者有之至於人參黄茋白术茯苓温補之劑誤用則其擁盛禍不旋踵他如丁桂木香薑附之類以熱攻熱殺人立至尤宜戒慎故發熱之初至見㸃之後並宜以本方處治依後法而加减之加减法初發熱壯熱腮赤面赤毛焦皮燥咳𠻳喘急加升麻煩渇加天花粉乾葛腹脹喘急鼻塞面赤若怒毛直加麻黄便秘加當歸枳殻甚則加大黄嘔吐加猪苓澤㵼陳皮禁用生姜丁香半夏木香洞㵼加升麻禁用白术茯苓荳蔲龍骨等劑喘𠻳惡風加紫蘇桑皮失血加犀角地黄黄連搐加青皮發斑加黄連黄芩山梔鼻衂加黄芩犀角小便赤澁加滑石山梔地黄芍藥驚悸加木通山梔不思食加山查傷食加神麯山查麥芽煩紅赤色加生地紅花丹皮白芷防風見標二三日間出不快利加大力子山查蟬退名透肌散皮急肉𦂳身壯熱甚加葛根前胡見標三日之内並依本方加减及三日後痘瘡出齊血包已成而前症悉平不得復用此方恐發散太過難於行漿另有方藥在後其禁用藥劑並從血熱痘症法而裁治之太乙保和湯又名紫草透肌湯専治血熱痘症服十神解毒湯後熱症悉去内外和平見㸃三日之後不易長大粗肥者用之則能保和元氣活血解毒助痘成漿易痂易落也桔梗紫草川芎山查木通人參紅花生地甘草糯米五十粒右用燈心七根薑一片水一鍾煎至六分温服便澁腹脹加大腹皮繁紅不潤加當歸蝉退出不快者加䑕粘子䧟塌加黄茋痛加白芷不勻加防風水泡加白术芍藥𠻳加五味子麥門冬渇加麥門冬痒加白术芍藥七八日後漿足身復壯熱便秘煩渇腹脹喘急前胡枳殻湯漿足禁用此方另立湯飲在後益元透肌散専治擁熱痘症服𦍑活散欎湯後擁症悉開氣血和平見㸃三四日後不肥大者不成漿者用之則能勻氣解毒透肌達表領出元陽助痘成漿而易結膿窠也加减以保和湯同論漿足之後另有保嬰百補湯在後按此即太乙保和湯去生地紅花加蟬退鼠粘陳皮水一鍾加燈心十四根棗二枚煎六分温服血熱痘症禁忌血熱痘症熱毒彌盛然毒氣無所分消只宜重用升提發散使毒得以達表而從外解引以滲泄使熱得以潤下而從内消佐以清凉消毒行血凉血之劑則痘雖稠宻亦能消散而易出易化漿也所謂輕其表而凉其内十神解毒湯葢得安表和中解毒三法盡善誠痘科之神方也丹溪曰熱者清之實者平之其此方之謂歟是故發熱至見㸃之後三日以前毒氣未盡達表内外彌盛血熱之症悉具辯症不差並只以本方處治之切不得用參茋白术茯苓補氣之藥於熱症未漿之前如誤而用之是謂實其實腹脹氣喘狂亂譫語咽喉腫痛口舌生瘡變症百出所謂邪得補而愈盛也嘔吐泄㵼慎不得用半夏丁桂乾薑木香藿香訶子肉果如誤而用之則是以熱助熱氣得熱而愈亢也燥症必至咽疼狂亂失血便秘無所不至矣至於龍骨枯礬澁滯之物且能使氣道阻塞是欲其出而反閉其門也腹脹之患生而喘急之勢至矣尤宜戒之及至血包已成氣血定位頭頂白光勢將行漿又宜易方另行别議三仁膏治痘疹大便堅實不宜下者服此潤通火麻仁炒去殻一兩松子去殻去皮七錢桃仁去皮炒五錢右研爛加芝麻一合㣲炒研細入蜜水研極爛以帛濾去殻同前三仁蜜湯調下看大小用之見標三日証治活法發熱三日後退凉見標飲食二便如常形色淡紅疎朗抺過碍手者上吉不須藥發熱一日便出者凶乃表虚毒盛也急用𦍑活散加紫草牛蒡蝉退煎調紫草膏或保嬰丹若治之早十救二三若服後熱盛不退宜𦍑活散調退火丹若無保嬰丹用纒荳藤灰加辰砂㸔大小一歳三釐十嵗三分逐歳増加代之矣報痘時煩躁不寧腰腹痛不止口氣大臭痘見紫色者死標色白皮薄而光根窠全無紅色或根帶一線紅三五日即長如菉荳大此痘决不能灌漿久後成一包清水擦破而死不可因其好看妄與下藥標出全不起頂如湯泡燈火燒者一様十日後痒􅚥而死標出時一片紅斑如錦紋者六日死遍身如蛇皮者死黒斑如痣狀肌肉成塊黒者立時死凡見標疎少則毒輕不必妄治宻則毒盛但要磊落大小分眀不相粘連成片可用前藥進之或托裏解毒之劑快斑湯消毒飲主之使其易發易靨如出太宻粘連糢糊其毒尤甚托裏解毒之劑宜多飲之以防痒􅚥黒䧟之變更察外症可治則治不可治則勿治凡痘子初出最要唇口潤澤其毒則輕如唇焦裂舌燥有芒為毒火熾盛表裏欎遏急宜解之黄連解毒湯加大力子標後身熱未退清地退火湯凡見標先要頭面稀疎磊落頸項胸前稀少其毒則輕如面上一片糢糊未發壅腫䝉頭纒項胸前布宻此毒盛也慎勿治之凡頭面未見標而手足先出他處未起而手足先起他處未収而手足先収者此陽火太旺宜早解毒抑陽扶隂之劑四物湯合黄連解毒湯主之如他處俱起而手足起遲他處俱収而手足不収者此脾胃虚弱不能行其氣血達於手足宜補脾胃十全大補湯桂枝芍藥湯凡初見標之時磊磊落落似稀疎之狀其後漸加日多一日此毒伏於裏裏氣虚弱不能使之即出須大補而兼解毒庶可十救二三也十宣散加無價散石谷程氏曰凡發熱見標宻無毫縫空地稠若蠶種者急用三元秘方救之毎一歳兒用茜根芫荽子各三錢荔枝四枚若不起加葡萄一錢半好酒一鍾煎至五分候冷毎用半盞攙熟水半盞時時慢慢喂之一日服盡次日再用水煎如前慢慢喂之但服此藥之後不可雜食他物以傷胃氣小者只許食乳大者只吃粥若口渇即以此藥水飲之一以止渇又能清熱解毒切忌油膩煎炒恐滯腸作㵼㵼則誤矣或十歳二十歳藥從一歳加起依數増加作一劑服之如年多劑大不能盡煎可分作二三礶煎之按前藥用酒煎者活血也後用水者清熱也熱盛必作渇代茶飲之足可解毒葢前症不可補補則助毒又不得不補不補則不起發宜當解毒解毒又作㵼不解毒又攻内兹用三味代之既能解毒又可温脾活血誠為千金良劑凡痘發熱一二日便出或一齊擁出宻如蠶種紅紫無縫急宜服之此時切忌保元恐温補助毒以其血未活而漿不能化故用此三元解之俟其色淡血活熱勢已退然後進補庶為萬全凡皮肉間纍纍然紅㸃稠宻急用纒荳藤加製過辰砂末連進二三服或薄荷湯調退火丹仍以牛蒡為末敷顖門上以散熱毒非惟能使痘疎又且免使侵眼又方生地黄牛蒡子搗成膏貼面頰額角能退痘毒一已出未出之時口鼻出血此血熱錯經妄行不可妄投熱劑宜用生犀薄酒磨服如鼻血不止胎髪灰吹入鼻中即止口鼻既血又大小便下血恐胃為熱毒所傷腐壞而然不可不知一出與地皮相平無興起之意乃是紅斑急用凉血解毒𦍑活散加酒炒芍藥紅花紫草蝉退木通占米連進二三劑退之夾疹同此治治之遲則紅變黒黒則逆而難治大凡用紫草必用占米以制其冷性俾不損胃無洩㵼之患惟大熱大便燥者不必占米大凡用當歸活血須以芍藥収之免辛散助熱一標出他處未見獨出數粒於山根之上為毒盛氣虚犯上或發三五粒一塊者皆不吉之兆也急宜凉血解毒以防危急若腮頥地角之間疎疎朗朗淡紅潤澤三四次出者為氣正道尊上吉症也一出皮膚乾燥枯澁必難起壯用溪中白色石子數枚燒紅以井水淬之使薫蒸痘上或置被下薫之頃刻潤澤痘即起發又能解穢一色淡不紅活者血虚也以四物湯加減服之但地黄大能滯血不可輕用不得已須薑汁炒過人乳補血甚捷加酒少許佐之且血非氣不行又加四物於保元之中為陽生隂長之義一痘正出好飲水者此乃脾胃虚弱津液枯涸故也如恣飲則必傷脾洩㵼及發泡難靨之患保元湯加麥冬五味子止之一痘未起壯而頭面先腫者乃隂虚陽盛大下四物湯加人乳好酒服之以補隂與陽齊然陽易補隂難補宜急急勿遲否則誤事一出即變黒者此為惡候如有起興急用託裏解毒之劑少用保元大加紫草紅花服之外用四聖散㸃之然早能凉血解毒必無此患亦多因脾胃虚弱血熱所致凡紅變白白變黄者生紅變紫紫變黒者死一痘全藉氣勻血活腠理疎通則出快而稀疎亦無餘症倘遇寒凍及勞役瘦弱之人血凝氣滯出則不快蓄於皮膚之間肌肉之上進退兩難日久變成黒紫禍不旋踵凡有此候當按令急與和劑如𦍑活散之類以疎利之其毒氣隨痘而出庶無變症保合太和之兆也如頭面出不快此太陽經當用荆芥甘草𦍑活防風天麻湯如胷腹出不快此少陽經當用升麻紫草木通紫蘇𦍑活湯如四肢出不快當用芍藥紫蘇葛根甘草葱白連鬚𦍑活湯各加生薑連進二服痘即出快賊痘凡賊痘與好痘一般但攙先起壯皮嫩嬌軟内係淡膿當用保元湯加占米煎服亦能囘漿一出其色掀赤抺過皮軟不碍指此係賊痘過三日變成水泡甚至紫泡黒泡者危症也若未成紫黒宜少進保元大加紫草蝉退紅花解之或燈草木通湯調六一散利去心經藴熱而紅紫自退如已成水泡白泡或灰白色則保元中大下四苓利之此千金妙法也不然則遍身抓破黒爛而死起壯三日証治活法凡四五日来起壯活動一線紅暈而有根窠此為上吉葢有根窠方見氣勻血活血活則毒化成漿収功結痂全藉此也若無根窠必是氣凝血滯按法速治凡起壯肥滿乳食如常不必服藥一四五日来起壯肥大中有一小孔自頂直下至脚不黒不白與痘色相並此名蛀痘由表虚腠疎而然若不早治大洩元氣不能起發灌膿急用保元湯大加占米川芎肉桂提起内膿以實其孔庶為佳兆三二劑後孔自塞滿若孔色黒乃疔也以疔法治之一頂陷色白皮薄光洞者氣虚也火照内外光明者是大進保元倍加酒炒黄茋肉桂川芎丁香人乳酒漿和服一根窠淡枯澁不澤血虚也宜保元加酒炒紅花川芎當歸芍藥加山查以消參茋之滯再加木香一二分調氣氣調而血自活矣四五日痘色不宜紅紫乃熱毒不化若血熱仍當凉血解毒兼氣虚者保元加紫草木通紅花生地之類解之一地紅血散乃血不附氣保元加當歸大加白芍藥以収歛之葢芍藥味酸用之為君使血得以附氣且又能活血化漿此最上一乗之法切記切記一洩㵼按寒熱急治至此再不宜㵼若起壯遲緩根脚不紅活者以無價散一歳三釐㸔大小用之好酒調服或保元加人乳好酒丁香占米山查血虚者加當歸鹿角膠一黒陷及痘疔外用四聖散以油胭脂調㸃之内以凉血解毒如紫草紅花木通茜根少加保元進之其疔自退疔退㸔其虚實仍以保元補之一煩躁者内必有熱可用木通以引其火下行或以六一散燈心湯調俟冷服之譫語者加三製辰砂夏月井泉水服如飲食不進㸔痘色何如未可輕投藥劑葢其間有毒氣未盡者宜山查紅花子紫草等藥清而解之如脾胃虚弱痘色淡白宜保元加山查扁荳神麯嘔吐加霍香一倒痘頭面上未出從足底出起逆而上之縱起壯灌膿囘至心窩下則毒攻入内大叫一聲昏迷而死雖疎快亦不免死乃逆症也候其出齊至頭面遂早丢去下身不治只將保元大加川芎以升提之漸漸使其自上而下起壯灌膿自上而下収斂結痂如常痘一般此鮮有知其妙者宜謹誌之此逆痘若治之早以黄連解毒湯一帖以䕶其心可十全三五遲則百無二三矣翁仲仁曰三日四日痘當出齊㸃至足心勢方安定猶有陸續不出之狀或隠隠於皮膚之内不見不起者古名不快若非風寒欎遏之因必有氣虚不振之過是以四日已前痘毒方出身表宜凉四日已後毒出已定身宜温凉則氣血和平痘色必然潤澤温則腠理開通其毒易以成漿故至此而身不㣲熱雖未必至於氷伏而痘瘡㫁乎不長四五日来血包已成候當肥大而粗頂宜發光而白故根紅而頂白者已具行漿之勢若還赤色過頭雖見嬌紅可愛延綿六日依然到頭空殻虚花皮薄而光亮如燈内含是水頂尖而根脚不紅行漿勿實是以毒熱盛而未解則為紫為黒壅而不起則為陷為􅚥滯而不榮則為乾為枯為青為灰怯而不振則為不快為停漿或有肉先腫脹而痘反不起者漿則滯而不行面已虚浮而痘反退伏者毒則遏而不進故身不熱而痘不起已成氷硬之形赤色若還不變温之可興氣血弱而不振遂成不快之狀紅潤依然如舊補之可生紫色乾枯切忌温中帶補只宜活血鬆肌為壅為滯烈藥雖然可發透肌尤是良方溏洩惟於温補㵼甚佐以升提凡起壯時痘之根脚全然不起其頭面皮肉紅腫如𤓰之狀者死起壯時腰腹或疼或止遍身紫㸃如蚊蚤咬全不起發者死起壯時痘伏陷不起腹中膨脹不能飲食氣促神昏者死略能飲食用消膨藥治之起壯時遍身黒陷悶亂不寧神昏氣潰者死起壯時根窠紫色乾燥不活全然不起發者死頂陷不起須㸔年夀上痘起則不必憂如年夀上不起急與升天散一二服痘半起忽然平陷而色白者急與内托散或補中益氣湯痘色紅鮮反乾燥而不充肥者此火盛而血不足也宜退火凉血輕清之劑四物快斑湯主之痘充肥而帶濕者此脾中有濕而氣不足也宜㵼濕補氣兼風藥治之葢風能勝濕也四君快斑湯主之一痘不起發不拘五陷用獨聖散或胡荽酒若黒陷腹脹用猪尾膏一痘乾尅不起者外用水楊湯洗之内服補中益氣湯一起脹時手足見而復隠起而復塌者死此根本已摧枝葉先萎之象也凡假壯之痘其中有數粒起壯者是也至十二三日决不能囬漿結靨内攻而死矣白痘者可急進保元加川芎丁香生占米提氣灌膿而愈此内托法也内托散即保元加川芎便是不必千金内托散正壯之時痘雖起發而皮膚不碍手按之水漿就出内色不暗是也灌膿三朝症治活法灌膿時根窠紅潤肥滿如黄蠟色飲食二便如常者上吉不須服藥灌膿時皮白而薄純是清水與水泡相似者三四日後遍身抓破而死灌膿時吐利不止或二便下血乳食不化痘爛無膿者死若二便不下血猶可用止㵼及消食之藥灌膿時二便閉目合聲啞腹中脹滿肌肉黒者死一頂陷無膿為逆火照之内外光洞手按之軟陷者無膿也火照之内暗不光洞按之如皷者有膿也急用保元加歸芍肉桂木香占米煎成入人乳好酒温服有一等肥白痘其色白不作膿俗名木痘以其人原有痰也用二陳四物湯合而服之一消一補仍將小麥粉作麵調與食之立時膿起紅活但不可妄投人參占米而助胃中痰火恐防口疳寒戰咬牙乃隂盛陽虚也大用保元加川芎肉桂丁香主之甚者加鹿茸痘灌膿痛不止者氣滯也少用保元加山查木香以行滯氣如膿血已滿可大用四苓以利之而痛自止凡灌膿三朝之内身凉痘灰白色或不進飲食寒氣逆上嘔吐或腹脹或㵼清水手足厥冷無陽症也急用二神加入保元連進數服温而補之痒塌不止者血盛也少用保元大加何首烏牛蒡子蟬退芍藥木香紅花若將靨時㣲痒者不必治有氣血虚而痒者十全大補湯加何首烏虚甚者加鹿角膠一發白泡如弹子大者用棗針挑破去水以滑石末敷之仍服保元加白术留皮茯苓以利皮膚之水如前後發紫泡是毒盛溢於皮膚之上必死夫膿者血之化也有血方有膿無血則無膿痘至灌膿大勢已定故此時必以有膿為主有膿則生無膿則死痘至七日若頂陷不能灌膿者必由先失調治故也急看根窠血聚别無雜症速宜大補氣血以充其頂頂滿膿足猶可回生若頂陷而色灰白此氣血俱離無能為矣一頂陷無膿服内托藥而暫起不久又陷者膿未充足故也宜内托散倍加參茋當歸煎和人乳占米好酒服若色灰白欲成倒塌皮薄易破者用淫羊補漿湯保元湯加芎歸升麻人乳好酒一痘色紅紫漿不滿足欲成乾枯黒陷者當歸活血散合解毒湯加升麻石膏乾葛一遍身灌膿忽然一日變白變紅變紫者不可不察白者為虚宜内托散變紅紫為熱宜當歸活血散合解毒湯一痘起壯灌膿俱好至八日大便忽秘常欲去而不能去急用歸尾枳殻芝蔴各三錢紫草生地黄芩各一錢煎服即通若失治至靨時忽然發熱而死翁仲仁三仁膏尤妙一頂平脚濶漿不滿足十全大補湯加木香乾薑一遍身無皮膿水流沾衣蓆不能轉動者用秘𫝊茶葉方或敗草散内服内托散去桂加荆芥穗一痘發痒滿面抓去而面上瘡痕隠然㸃㸃有起發之勢此猶可治急以托裏發毒止痒之藥用内托散加蝉退立驗一痘抓破而出血者此陽瘡出血也宜當歸凉血湯主之一灰白慘黯皮薄擦破無膿血者不治二便不通目閉聲啞腹中脹滿肌肉黎黒者不治一瘡爛無膿吐利不止二便下血乳食不化者不治一痘未起頂但脚漸濶至七八日乾枯瘡皮皺起誤認結痂収靨者多不可救急與補血解毒之劑庶可回生一灌膿時眉心鼻凖耳輪唇口及兩頰先有焦枯黒靨者此名倒陷不治収靨三朝証治活法凡収靨自上而下者順自下而上者逆痘至収靨大勢已定亦有膿不滿足似靨而非真靨者此時極宜明辯若七日之間面目腫雖覺退痘雖似乾而痂薄如紙或有内症未除此痘極險時也失治則凶變立至急以補血凉解之劑庶或轉移一痘至十日血盡毒解其膿漸乾如蒼䗶色或如葡萄色從口鼻兩傍或面部収起至胷腹而下然後頷上與脚背一齊結靨逐漸剥落内症全無身漸輕快飲食二便如常者吉或手足心或手指尖或隂上先収者俱吉一人中者任督二脉交㑹之衢也凡痘自初出至収靨俱要在此部位先見者佳謂隂陽和暢也一痘収靨自人中平分上下髪際以上陽中之陽也謂之孤陽足膝以下隂中之隂也謂之孤隂孤陽寡隂所以痘瘡之収至此二處毎遲留而後靨也不必施治一鼻梁上痘先焦者任是凶逆亦不死一痘當靨而流漿不已者因表散太過則斑爛流水或飲水多則漂蕩流水俱服保元湯加防風白芷白术或除濕湯外以敗草散敷之一當靨不靨而膿充足服回漿散或象牙散一痘有靨至頭或至腰而下身數日不靨者此乃熱毒太盛不能収靨故也治當有熱則清之若小便不利者四苓散加芩連滑石木通大便秘結者當歸解毒湯利之一痘當靨不靨忽然變動灰白頂陷吐㵼腹脹寒戰咬牙者急與内助丹若痒塌氣促足冷者加附子有水泡者大加白术行去惡水而膿自乾矣一血盡漿足温潤不歛者内虚也保元加苓术以助収歛結痂或六君子湯一當靨不靨發熱譫語目閉口喘手足大亂小水不利者此熱毒乗於肺經無隂氣以収之然也急用清金導赤飲主之一漿未稠濃頂未飽滿面腫忽退目閉忽開瘡脚散濶色白皮皺乾燥似靨非靨此因津液枯竭血氣虚少内証未除之故此症之極險者也急用四君子加麥門冬牛蒡子荆芥連翹桔梗救之若誤認作結痂無事致成危殆悲哉一膿後不能結痂反成腐爛和皮脫去者此倒靨也係中氣不足急用保元湯加當歸牛蒡連翹薄桂木香治之其頭面瘡已破者復加腫灌手足遍身原無瘡處又復出一層謂之補空若治之頭面不腫空處不補不旋踵而告變矣一収靨時忽泄膿血痂皮者此亦倒靨之症乃脾强腎弱為順利盡自愈不必施治如利下水穀不分者此腎強脾弱也急用陳氏木香散送下荳蔲丸一痘因冬月嚴寒被寒氣欎遏而不能靨者以桂枝解毒湯治之一痘因夏月炎暑熱氣薫蒸而不能靨者甘露解毒湯㣲利之一遍身俱収惟頭與足不収者此隂陽不和故也以四物湯去地黄加牛膝升麻牛蒡紅花荆芥之類一多服熱藥以致熱毒猖狂痘爛不靨者小柴胡湯合囘漿散或天水散或猪尾膏外以黄連輕粉為末桕油調敷或用猪胆汁研芒硝如膏塗之古人用猪尾膏獲效神速者葢以熱毒藴併於心經致熱毒内外灌注而不結痂用此方者以血歸心引龍腦以凉之而行營衛况營衛得香則行遇臭則止也一収靨時有臭氣帶腥者佳全無氣息尚有餘毒未發也若臭氣如爛肉不可近雖似結痂未可為真急以清熱活血緩則無濟一瘡欲収而唇口乾紫連結渣滓頰紅者將成肺癰也宜解毒湯麥冬知母百合甚則大連翹飲一凡痘係危症氣血本虚多服補劑而漸有膿色將収靨雖有熱者只可於補劑中加凉藥可也若謂將靨而去補劑竟與凉藥更加下利藥欲令速靨是速其斃也葢虛者復虚毒反内攻而死此必然之理又已然之驗也逆症不治痘當靨遍身未見青膿黄色之漿而口唇上下痘先黄熟者毒氣内攻於脾也不治一痘収靨時不喫飲食口唇常如食物而動不止者不治落痂症及靨後餘症一痘瘡収後痂厚落遲離肉不粘者吉一痂落疤帶紅色而不凹凸更無他症飲食二便如常者吉一自食痘痂者雖有他症不死一痘已結痂而不焦落者餘熱為害也大連翹飲去紫草加地骨皮一痘痂至半月或一月不落或發痒者此因表發太過致肌肉不宻無力収歛故也宜人參固肌湯一痂不落反見昏迷沉睡不省人事者此脾胃大虚也宜人參清神湯一痂雖乾好但半邉掀起半邉粘著不能脫落者此過用辛熱之藥熱留肌表也宜升麻葛根湯加防風荆芥蝉退連翹以去肌表之熱即落矣一疤紅紫者乃血熱毒盛也當凉血解毒一疤白者血不足也不治雖過四十日還死此因漿水淡故疤白急用保元湯合四物湯加白术陳皮紅花老米一痂後身熱不退或寒熱徃来用小柴胡湯虚則補中益氣湯俱加黄芩一痂後唇乾口渇熱甚不解者大連翹飲主之一痂後虚煩不眠者竹葉石膏湯煩渇譫語者辰砂益元散一痂後口噤殭直腹痛遶臍冷汗如雨痛定汗止而脉弦𦂳者因疤受風寒也宜散風養血用鈎藤湯加紅花木香川芎芍藥當歸甘草白术青皮官桂生薑一痂落肌肉尚嫩出見風早遂成瘢癬有膿汁出者燒牛糞灰敷之痂不落撏掐抓搔致成痘風瘡者宜消毒飲加苦參當歸外用金華散或乳香韶粉散遺毒生瘡不已者活血當歸湯宜灸風池曲池三里則永不發一痂後遍身青紫瘈瘲口噤痰響者由氣血虚弱而受不正之氣也用蝉退一錢薑汁薄荷汁入酒一盞調服得汗即愈一痂後手足忽然拘攣不能屈伸轉動者由血少不能養筋或因風寒濕三氣使之然耳不可輕用發散反耗其血只補脾養血則瘳當歸桂枝湯治之一痂後赤火丹毒惡候也從頭上起者過心即死從足下起者過心腎即死内服𤣥參化毒湯一痂後牙齦生瘡時時出血謂之牙宣呼吸息謂之息露此走馬疳也由熱在陽明急用蠶退散敷之如唇腫面浮穿鼻破頰潰喉腐肉飲食不入者死一痂後發癮者皮膚間隠隠起成疙瘩此由毒氣未得發盡藏於皮膚或發痒搔之而成者或因受風風火相持而成者此吉兆也欲發出無使停留以變他疾如發太甚不已者内服防風葛根湯外用蜆子水洗之如無用六一散拂拭之一痂後兩目不開惡見明者謂之羞明惟向暗處敢開也凉肝眀目散主之若暗中亦不敢開者此即防目中有瘡以望月沙散治之赤水元珠巻二十七上欽定四庫全書赤水元珠卷二十七下明孫一奎撰原痘發五藏之故痘分五藏以辨順險逆三候向未有明言其故者瑣言論之而其理乃悉葢痘為胎毒原於父母絪藴之氣藏於命門遇感而發未有不自腎而出者苐父母之施受有純駁則所藴之氣有清濁氣有清濁則發有緩暴緩暴之間藏象見而順險逆呈焉矣緩者必其氣清氣清則毒輕一任氣領血載徐徐而來觸發於藴藏之地漸而升於脾絡自脾而行於肝次第而至於心肺上乗之地乃始分布於外熱故得以和緩越三日而見標漸漸而出先於頭面次及於身以至四體貫漿結痂亦自上而下所以謂心肺之痘為上氣之濁者其毒湧盛遇有感觸非若清者之從容緩布也一出本位燔熱燥渇經於脾絡一及於肝毒其莫禦非領毒之氣受壅即載毒之血被灼所以熱不三日而即見不暇論其形色各症苐驗筋抽脉惕之象而証已非輕矣所以肝經之痘為險有未及乎肝而於脾即發者勢尤猛烈一出本位毒即猖狂氣血俱受其困凡通藏府無不見其凶象苐驗其腹痛唇焦其餘症自惡矣此險中帶逆者也若濁之極者一觸其竅熱如炮烈未及離乎本位毒即肆虐并亦不容分布氣受其錮血受其瘀凡通腎藏之地無不聴其攻撃即如腰如被杖屈不能伸卜其喪無日矣要知五藏見症皆出於腎苐腎為稟受之地諸藏為分布之所緩急關生死之界緩一步則毒輕一步緩而至於心緩之至者肺則次之故心肺為順肝則界於緩急之間故為險於脾則急矣腎則急而更急若迅雷之不及掩耳故為逆然則腎痘之不救以人力之不及施也若謂腎不受毒諸藏獨可以受毒乎更有變黒歸腎之説謂黒為腎色然則赤當歸心青當歸肝黄白當歸脾肺赤白黄痘固宜有之色青獨非所忌乎何獨慮腎而不及肝耶總以血瘀則黒血為毒瘀其毒自不可解豈有變黒歸腎之理有因虚而不起者必其兼毒盛者也毒得其輕雖虚何害毒若猖狂氣血成何用哉苕上陳氏家𫝊順逆二十四痘形粗珠子痘痘如巨明珠様尖圓光潤根窠紅活順候也或痘雖順四五日不易長大補中益氣湯治之六七日不易成漿保元湯治之或以順而不以升發解毒痂後或害目或癰毒或毒痢不可不慎也細珠子痘珠如小明珠様尖圎光潤根窠紅活順候也不可見其細小而妄以毒物發之以至真元外耗或致漿清癢塌或潰爛難痂之患慎之慎之水白痘痘頂白色根無紅盤或淡紅盤血附也小綻有神屬肺經獨無紅盤而妄斷為逆非也然有平塌灰白氣虚也而無紅盤者根血不附血虚也㓙症也黒大痘一名黒痘根紅而頂黒色尖綻有神順候也此痘萬中有一人皆罕見然有渾身黒㸃而枯悴此乃氣弱不畜血血亦有為之不榮故枯悴而黒不可不辨赤小痘根頂俱赤細小堅硬起脹而略見漿影即痂順候也初見時宜以疎解散清之使肌表通暢無壅滯之患疎解散陳皮川芎牛蒡防風蘇梗甘草升麻蝉退生薑九焦痘報㸃週時即痂復又報㸃如是九番故名九焦痘治法同赤小痘散茱萸痘散稀也形如茱萸故俗名之非正論也四圍起而中心陷落者是也乃元氣不足不能續其後来而然也血雖有附氣之功氣弱而無制毒之力以致陷而不滿當以保元湯助氣血為主氣充漿滿自然綻矣否則必有内虚癢塌之患石屑茱萸痘郛郭顆粒硬小者是也此乃氣血足表裏實順也大痘髙大而飽滿者是也雖光㓗有神氣恐兒小不能充其漿足當以保元湯倍加參蓍治之若漿足難収當以芍藥湯之然亦有過發以致濶大不可不知也茱萸紋痘頂上有紋路如茱萸様是也經云茱萸紋起定空漿宜保元湯主之若失治必有漿清痒塌之患梅花痘初報㸃時五六成叢或六七成叢百餘處者是也起根發脹連成一個平塌有贈痘如珠光澤者吉贈痘平塌枯滯者㓙薄殻茱萸痘皮薄色嫩脚軟者是也宜大劑保元湯益之然皮薄者必破損若破而堆聚成靨復脹灌者吉若破而乾黒反加寒戰咬牙悶亂者㓙也瓦灰色茱萸痘色如瓦灰此乃氣分虚弱以致毒乗陽位也若脚歛血附者補中益氣湯治之可生脚塌血散者乃氣離血散不治之症也紫眼茱萸痘陷中有一㸃黒滯是也此乃毒乗氣位宜保元湯加牛蒡子之屬主之正氣盛而邪自退此症有吉有凶踈者吉而宻者凶也夾癍痘空處有雲頭紅色見者治法見夾斑痘論夾疹痘空處有細宻頭粒者有吉有凶只將正痘斷之方見夾疹痘論晃痘晃明也痘亦粗肥附血但嬌紅嫩艷必不能結實不可因其好㸔而妄斷為吉以取人之怨也板痘亦名延日痘起脹而痘肉齊平雖有黄漿其色必紫滯逆也臨証必觀兒之長大㓜小以期之驗潘子十二歳而種此痘三七而亡俞子二十三而患此痘痂俱盡脫氣血漸竭五七而亡水華痘或問痘有水華之名何也曰因兒常徃水邉受其水氣乗於肌表值時行痘因而感發見㸃如水泡一二日間泡破水去乃邪散表清而後報㸃乃正痘也治從痘例蛀痘頂有一小孔是也乃凑理不宻之故宜保元湯倍加黄蓍治之失治則正氣漸耗必有癢塌之患白悶痘悶者伏而不出也毒乗氣分故報㸃白頭如㾦以漸乾枯内攻三四日而亡或有因風寒内壅閉腠理而致毒伏不得外出不可不辨也紫悶痘毒乗血分報㸃如丹變紫黒而五六日死或有因内傷而氣血滯故伏而不出宜消化可也或有因氣血弱不能宣發伏而不出宜補中益氣湯加芍藥蝉蛻主之應藥者生𦂳悶痘悶痘因毒火彌熾煎熬肺腑壅閉氣道銷爍榮分葢毒必血載而出外血受傷不能任載而出故悶也若毒乗肺喘急而鼻中流血乗肝眼中流血入小腸小便血入大腸大便来血入腎則腰疼而耳内流血悶痘之惡二三日間而死古無治法皆因毒勢甚榮衛秘塞毒伏在内禍不勝言水痘㸃如水晶珠者是也雖與正痘相以但其形歪斜亦灌漿成痂亦有稠宻而面麻者總不在正痘數此脾肺二經受濕搏於肌表之間也初起芎蘇散主之行漿化毒湯主之化毒湯防風加荆芥山連翹不牛蒡加甘草熱盛黄芩巵易斂芍藥瑣言十五種怪痘狀象治法逰蠶是痘貫珠成條其形似蠶故名逰𧖟有稀宻有長短身上者輕頭面者重身上短而稀所見無多者輕長而宻更繁多者重重則必攻令鬆透如一赤荳莢其毒方起雁行雁行者狀似逰蠶但曲而甚長以其排行而若雁字也單見者亦重不一者更重矣攻之鬆若逰蠶而毒化矣疊錢是痘圓圎攢簇絶不成㸃錢許之大故名之也僅見一二者輕多見者重重則必攻以藥胭脂膏封貼更和猪尾膏大桑蟲於劑内透之令毒如蒸餅其勢方透蟢窩蟢窩者較叠錢而更大也另别其名者其形大其毒亦更重也即屈指無多毒已不淺攻之自不容已佐以大桑蟲猪尾膏外亦以藥胭脂貼之得鬆泛平擡方可成膿鼠跡是痘或四五粒或六七㸃相簇如鼠跡故以此名無多者輕見於周身者重重則必攻令相併成泡其毒方鬆劑内調入化毒丹并猪尾膏䕯沙䕯沙者其痘扁濶歪斜無頂無盤有細㸃如沙攢簇於囊宛似䕯沙而名之也可以數紀者輕徧及者重重則必攻務令髙擡如芡實殻其毒纔化而成漿鳥跡鳥跡者連串三條頭簇脚開其痘若鳥之跡也單見者輕五六處者重重者必攻亦如逰蠶鬆透為凖蟹爪蟹爪者貫珠連串粒細一粒尖稍有隠隠黒絲如髪竟與蟹爪無異無㡬者輕繁多者重重則必攻其形統脹成條而毒盡洩矣珠殻珠殻者其痘有頂而平四圍貼附一細圏宛如珠殻無多者輕及於周身者重重者必攻務令圓滿綻突其毒乃透螺疔其毒頭大根尖頂黒形若螺肉深入肉裏有大小有深淺按其四圍板硬治法見於餘毒若放㸃時而即見者最惡先以挑鬆即將應服之藥大人含於口中吮其數次隨用貼法蛇皮叢簇成片散漫無拘形似蛇皮而名之也見此不治或見㸃之初燈下照之隠隠簇簇細宻無倫將形未形之際即便攻之佐以猪尾膏破之不使其成庶可有為履底履底者形似蛇皮不若蛇皮散漫耳隨處皆凶其形得小更得早圖庶可有為速以猪尾膏和入攻毒劑内并大桑蟲透之急以藥胭脂膏封貼令得膿水淋漓方能慶生燕窩是痘攢簇纍纍象似燕窩而名者也單見尚重見而不一者不治急攻之務令鬆擡如餅其毒方化以油胭脂調入化毒丹用綿紙攤貼更佐以猪尾膏大桑蟲紫背癍之形似萍其色似萍之背紫而帶黯有大有小目之有㸃手按無形無㡬便重繁多者莫救亟宜攻毒破瘀務令漸淡淡而退去方可回生必須早圖環珠是痘連串環遶故以是名有臂因鐲阻痘即如鐲而遶者有項以圏繋痘即如圏而聚者於臂稍輕於項則重因阻猶重無因更重不特頂臂為然頭身亦有之凡見宜攻痘不問疎宻縂以勻朗散布為佳其有連貫攢簇者皆由梟毒衝突氣血不能駕馭而然頑而不鬆伏而不透猶賊之有巨魁也此之不治諸痘皆為抗拒巨魁授首前途自可倒戈其可習而不察或委絶棄絶乎狀其名象詳其治法以為燮理者助赤水元珠卷二十七下
