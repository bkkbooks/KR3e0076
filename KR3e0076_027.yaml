body:
  text: 赤水元珠卷二十七上明孫一奎撰痘疹心印小引生生子曰余考痘之為症上古軒岐秦越人淳于公輩皆未之論烈也自東漢建武中南陽征虜染流中國時謂之虜瘡醫者以蜜煎升麻數數拭之然則痘蓋肇於東漢也已顧奈何張仲景華元化王叔和皇甫謐禇澄孫真人王氷許學士諸名公亦未之置喙至宋錢仲陽而下陳文中李東垣王好古朱彥修乃始言之逮劉昉之幼幼新書王賓湖之幼科類萃徐用宣之袖珍冦衡之全幼心鑑湯衡之嬰童寶鑑髙武痘疹正宗汪石山痘疹理辨魏直博愛心鑑李言聞痘疹證治痘疹要訣聞人規胡大卿八十一論李實痘疹淵源翁仲仁金鏡録萬菊軒痘疹心要俞東臯痘疹巵言皆特以痘疹為言者不下數十家各相發明似無遺漏宜乎今之嬰童可無虞矣何邇年來痘疹一臨殤輀相踵十不保五曷故哉屈數前書不為不多吐心露膽不為不悉豈多岐而亡羊耶抑其術猶有未臻者耶嗟嗟書不盡言言不盡意眀者當心得之已古謂用藥如用兵嶽武穆云陳而後戰兵法之常運用之妙存乎一心書安能使人人必克勝哉矧今之業專門者以痘為祕術為禁方固不道其道心其心各師其見各顓其法而不思融洽衆理以契所歸故乃宗張喙李是甲非乙殆𣲖紛而不會其源曷能齊其治哉余燭斯弊每為痛心故節録各家成法參以鄙意會而同之名曰痘疹心印庶好生君子得以窺其竅妙云爾原痘萬菊軒曰上古之時未聞瘡痘之􅂒素難之文鮮有及者豈其人淳龎朴野積精全神虛邪苛毒莫之能害歟或云自建武擊虜遂染其毒流布中國謂之虜瘡或曰聖瘡言其變化莫測也或曰天瘡言為天行疫癘也或曰百歲瘡言人自少至老必作一畨也或曰踠豆瘡言其形之相似也故患此者如蛇蛻皮如龍蛻骨死生存於呼吸之間夫上古所無而季世有之抑時世異耶抑人自失之耶余思其繇天地之氣春夏生養之紀也其物熙熙秋冬殺戮之紀也其物黟黟時逮末世已非泰和之景不可謂非時世之異然人日習偽不知持滿御神之道七損八益之數務快其心以散其真不可謂非人自失之也有論穢毒者有論淫火者有論時行正病者靡有定論將謂穢毒淫火耶則一歲之中大而郡縣小而村落病者相似而死相繼未必人人若此之甚也將謂時行正病耶何以自少至老但作一次厥後再無傳染也蓋父母於子一體而分精血之毒已畜於陽施隂化之始固不待誕生之頃咽其血而後有是毒也况男子惜其氣以養其精女子調其氣以養其血苟失所養即貽他日之患子之受於父母者雖殊其為毒則一也豈有男子淫火起於氣為陽毒而易治女子淫火起於血為隂毒而難治之理耶至於天行正病亦有其時但觀夫年之所加及有四時不正之氣即知有是正病也然則待時而發者胎毒也或速而危或徐而持或暴而死者氣之微甚所使也發則其毒泄矣所以終身但作一度後有其氣不復傳染焉孫季子朋來曰淫火即胎毒也天行即疫癘致痘之由端不外是二者蓋淫火肇於有生之初伏而不發必俟天行煆煉一畨然後泄之雖百歲不免焉殆亦有生之後一劫也設非淫火胎毒安得一生只發一次哉矧人之出疹出痘正如蠶之蛻殼一眠二眠三眠也若謂純是胎毒不假天行何臨作之年郡縣村鎮沿鄉接境莫不皆然即卵生如雞鴨胎生如豬犬且皆不免又槩可見至於生者死者實由所感天行之輕重非干所稟之厚薄也觀今之童稚體盛神壯宜其稟氣之厚亦多死者形羸色瘁豈非所稟之薄且多生者迹此驗之死生輕重乃臨時所感天行之輕重也為父母者慎加保惜以膺天和不可純委於命而尤天也特筆此以告萬菊軒曰昔人謂在胞中飢則餐母之血渴則飲母之血余獨謂其不然蓋兒始受氣之時一月胚二月胎不過一點精血凝結中涵生意也至三月以後其形漸成在胞之中譬諸禽鳥之雛在卵殼中渾渾然薰蒸滋養惟所受太和之氣漸自生長日月既足乃破其胎卵而出矣何以能飲食耶必謂有所飲食則胚胎之初形象未具何飲何食耶且血者渣滓之物有入必有出十月之前所飲所食之血又從何道出耶若生下口含惡血乃母臨蓐之時血穢流溢入兒口中未必便是先在腹中所食之血也但云兒在胞中滋養形體長育變化培植根蒂者則在母之血液也或有問曰兒在胞中飢則食母之血渴則飲母之血萬菊軒以為必無此事驗今之初産之孩口有穢血少頃就有黑糞從便而下是其徵也安可遽謂必無之耶孫季子朋來對曰以物理格之似無此事也兒之胞胎在腹猶瓜果然瓜果賴藤樹滋灌汁從蒂入日漸肥大成熟兒在胞胎混混沌沌懵然無知焉有飢餓蓋藉母之湮從胞蒂而灌入臍中十月充足胞分而出口中之穢間或有之實分娩時胞中之餘穢惡露也大便黑糞如瓜果中之汁水耳此必有之物殆平時灌滲積於其中出懷之後各自立極陽升隂降陽升者啼聲上出也隂降者大便下行也此必然之勢亦必然之理也出懷之後始有出有入在腹胞中安有出入之徑竇者乎格物者自能辨之毋致疑也痘不宜毒物酵發生生子曰痘本火毒尤因天行故發熱之初看其熱盛便知毒重即宜解散使表裏疏通俾熱毒有門路出也全在頭著工夫胡大卿曰小熱宜解毒大熱宜利小便觀此可見前人慎重之意不輕易用大寒大毒之劑動其大便恐傷沖和壞脾胃也緣痘全藉脾胃尤賴沖和始能灌漿結靨所謂沖和者即胃中坤元之氣人賴之以養臟府而灌溉周身者也近觀西吳治痘罔用頭著工夫動輒便以鱖魚桑蟲雞冠血虺蛇等毒物謂之酵痘習俗為常不思痘本火毒毒固宜發但當先門路未清小毒藴成大毒兹又以毒攻毒不啻火熾添油則脾胃沖和若燎毛矣故毒發之後痘粒粗大膿何得滿或潰而爛或噦而嘔或發癰毒或成外剝或致泄㵼種種之禍變難悉舉豈知門路疏通則痘縱不起發不過補助氣血而或以大成散佐之自能行漿灌膿蓋痘粒小則漿易滿亦無變症是曲突徙薪之法也舍此不為而徼彼焦頭爛額之功殆亦危矣戒之戒之戒用天靈蓋生生子曰醫本仁術夫仁者無大無小無貴無賤無見無隱無處不然故啓蟄不殺方長不折皆所以體天地而愛物存仁也醫之治痘逆者不治險者宜治前人方法林林種種何莫非藥何物非劑何適非宜顧乃取人之骸骨而煅煉之嗟嗟其忍心亦劇矣乎不思痘之無膿者由氣虛而血不充也補氣以氣補血以味合取其氣味之純厚者以補之則得矣如人乳紫河車鹿角膠之類皆氣純味厚者庶可以補氣血而資精神彼遺久死骸逮氣血竭絶枯朽之物猶稿木死灰已且不能延生而又能資他人乎此必無之理也且痘古稱天花貴清潔而厭腥臭其不可用一也膿少由於血虛喜潤而惡燥兹犯煅煉枯燥其不可用二也况律有禁條以無可取效之物而戕人之遺體犯律之禁傷天之和噫操殺術也焉得仁或曰有用之而痘立發者何謂也生生子對曰余非謂此物不能發特慨其發之後燥毒交扇烈若燎原正如燈巵油盡而又益之以燈心立見焦枯良可悼夫腎無痘辨生生子曰諸書皆言四臟俱有痘獨腎無痘故發熱之初單顯四臟之症驗耳之冷則知腎無痘也余謂此皆臆度之言非見道之語也緣痘稟於有生之初父母之淫火伏於子之命門為天行癘氣感觸而發觀銅人圖命門冗在兩腎俞之中與臍相對秦越人謂兩腎中間動氣者五臟六府之本十二經脈之根呼吸之門三焦之原臟府從此而生故人之所以得不死者賴此動氣以為生生不息之根有是動則生無是動則呼吸絶而物化矣夫以耳之冷熱驗痘出之輕重則可若以耳之冷而遽謂腎之無痘則不可腎既曰無痘何前人又有變黑歸腎之説由其有出斯有歸也詳古人用四牙散一方亦可見矣蓋牙者骨之餘腎之標是亦以腎補腎之意惟腎之元氣充足則其痘始能盡出且又能制伏其火而使其氣血相依故化膿結痂而愈也腎虛則不能化漿而使之盡出結痂則色變黑馴至焦枯而告殂矣故曰歸腎者猶言痘本出於腎而仍還於腎也是為辨首尾不可汗下辨萬菊軒曰今之治痘者悉云首尾不可汗下聽者和之曰痘宜溫補汗下不可也此亦喜補惡攻之遺弊殊不知治痘之法莫要於解毒或攻或補務使毒氣得解而已如其氣血和暢營衛流通表裏無邪其出則盡其發則透其收則時非但不可汗下雖溫補亦不可用也設使外感風寒約束皮膚腠理痘出不快此當汗之令隂陽和營衛通而痘易出毒得解散可也苟不汗之則毒無從得出留伏於內未免閉門留冦之禍矣如大熱不退煩渴轉增譫妄昏沉便溺阻塞此毒留於腸胃之間與穀氣併宜急下之使臟府疏通陳莝滌去可也苟不下之則藏􅀢畜毒煎熬於中寧無養虎遺患之悔乎故大要曰謹守病機各司其屬有者求之無者求之必先五勝疏其血氣令其條達而致和平此之謂也審證孫季子朋來曰治痘先須審證痘固胎毒必假天行令氣或內傷飲食激而發也發熱之初預當明其輕重蓋熱輕毒輕熱重毒重也設熱既重便宜察其表裏外感內傷內傷為裏夫痘全藉脾土以為依歸脾為倉廩五臟皆仰給於脾外主肌肉行漿灌膿結痂皆在肌肉脾既受傷則內熱藴悶或腹疼嘔惡急宜消之重者下之使裏無壅遏則熱自退神自清也內傷不急治六七日後痘既外出腹中虛矣內傷之物因而㵼痢則不能灌膿而成內陷外感風邪即宜清解若頭項痛腰脊強便知為太陽經表症若鼻乾不得眠口渴便知為陽明經太陽以防風羌活寒月麻黃桂枝陽明升麻葛根之類古人云必使一晝一夜汗出熱退為佳蓋腠理疏通則痘易出易壯遲則熱燒地盤腠理緻密熱無從出出必稠密或藴成癍由解散不清縱然發出日後灌漿必咳嗽聲啞嗆喉外剝可不謹之於始哉觀乎古人呼為痘瘡以其形圓而肖豆也豆喜土鬆滋潤則易出易成熟初出最嫌土燥成熟尤怕濕淫燥則難出濕則潰爛故治痘亦如之若熱盛毒重神昏足冷者即於前解散內消之中大加解毒故曰六日以前解毒為主六日以後補託為主過六日則大事已定救無及矣是以貴在審證勿失時也右審症總驗部位內經曰諸瘡皆屬心火心之華在面痘瘡之候但以面之部位占之思過半矣痘本火毒火性上炎諸陽皆上聚於面吉凶善惡尤易見也額屬心火如印堂以上髮際以下橫兩日月角部位先見紅點先作漿先結痂者此惡候也蓋心為君主毒發於心故先見於其位君危則十二官皆危死殆速矣左臉屬肝木右臉屬肺金如兩臉先見紅點磊落者吉如相聚作塊其肉腫硬者死蓋肝藏魂肺藏魄生意既絶魂魄相離故不治也頦屬腎承漿橫抵兩頥先見紅點先發先痂者吉此位雖屬腎然三隂三陽之脈皆聚於此隂陽和故無虞也鼻雖為肺竅而凖頭則屬脾土若凖頭先出先痂者凶蓋四臟皆稟受於脾毒發於脾則四臟皆失所資殆土敗則四臟皆相隨而敗故延綿日久而後斃也腎之竅在耳又心之用亦在耳心者少隂君火也而少陽相火之脈行乎耳之前後凡在耳輪前後先見紅點者凶蓋君相二火互發燔灼之勢難以撲滅惟口唇四圍先出先起先痂者大吉緣陽明之脈俠口環唇胃與大腸主之無物不受殆猶海也乃多血多氣之經故曰大吉也驗面發熱之時面色明瑩者吉赤若塗胭脂者凶此邪氣拂欎於陽明胃與大腸也陽明經上循於面熱盛故赤也宜清涼解毒稍通利之面垢慘黯者凶面垢者少陽候見也邪熱拂於少陽甚則面微壅宜表裏雙解蓋少陽從中治也驗耳腎通竅於耳故耳以候腎也腎臟屬北方天一所生之水受氣之初先生兩腎如豆子離泥兩邉分開之瓣也痘疹發熱耳獨涼者瘡疹屬火外邪不干於腎故也如耳熱是邪干於腎毒不發越則反有歸腎之變凡觀痘瘡先看耳後有紅縷者蓋少陽三焦之脈從膻中上出缺盆繫耳後直上出耳角紅者火色也此瘡疹之火發從少陽故色先見於其經也凡痘自耳先出未及成漿耳輪先靨者此漸萌歸腎之勢多凶驗目目者心之使也神所寓焉發熱之初觀其兩目神倦不欲開者痘也目中汪汪若水者疹也諸瘡皆發於心故候見於目也目赤者熱甚也心惡熱急解之經云肝開竅於目瘡疹發熱目連劄者肝有風也風入於目上下左右如風吹不輕不重兒不能任故目連劄也目直視者肝有熱也熱入於目牽其筋脈兩眥俱緊不能轉盼故目直也得心熱則搐者風火相搏也痘疹發搐此其常候但㵼心肝二經之火搐止則吉不止則凶五臟精華皆上注於目痘瘡之毒發於五臟毒之甚者目必受之故前人注有護眼之法良有深意凡兩眼常出淚者肝熱也此時眼中無痘宜服㵼肝火之藥蓋眼中之毒常在收靨不齊之後方有如痘入目成膚翳者切不可用點藥恐損睛破瞳成廢人矣痘瘡收後目不開者肝熱則目澀不敢開明暗皆然心熱見明則合見暗則開謂之羞明此有餘熱在心肝也如瘡未成膿腫消目開者瘡已過期收靨不齊目閉不開者瘡壞欲變目上竄者心絶也直視不轉者腎絶也非泣而淚自出者肝絶也微瞑者氣脫也血貫瞳子者火勝水竭皆死候也驗鼻鼻為肺之竅痘疹發熱之初噴嚏者火邪上干於肺外應於鼻而癢則嚏鼻乾黑燥者火刑於金金體本燥得火反甚急宜清金㵼火以解其毒鼻衄者血得熱而妄行故衄出於鼻急以涼血㵼火以解其毒鼻流清涕者疹也疹發於心心肺相連以火煉金熱極而反化為水也痘出之後鼻塞不通者熱也痘已成漿收靨之時鼻塞不得息者此鼻內有瘡膿涕粘結可用金銀小簮子以通之如痘未成漿鼻端先乾者凶內經云臟真高於肺以行營衛隂陽也邪火刑肺肺敗不能輸精於皮毛故皮毛焦枯先見於鼻營衛不行隂陽不續以漸遍身皆乾枯而死矣凡瘡變壞鼻中血出者鼻孔開張喘急者肺絶之候皆死症也驗唇口脾之竅開於口其華在唇四白發熱之初口中和唇色紅潤者吉如口燥唇裂其毒必甚急解之痘出稠密唇口痘子相粘諸痘未發此處先已戴漿諸痘未收此處先已焦黑者凶面痘腫灌唇上痘裂成塊乾濺者重如痘出太密口中氣臭者臟府敗壞故臭出於口也痘欲變壞唇上縮者脾絶也唇下自呷者魚口也口中涎如膠粘者脾津竭也皆不可治驗手足四肢者諸陽之本痘出欲踈其發欲透其靨欲齊如應出不出應發不發應收不收此脾胃氣虛不能旁達四肢也發熱手尋衣領亂捻物者肝熱也手搯眉目鼻口者肺熱也手足搐搦者心肝風火相搏也各隨其臟而㵼之足涼者此常候也足冷手亦冷者脾臟虛也四肢皆稟氣於胃而不得至經必因於脾乃能至也脾虛不能為胃行其津液故冷耳宜溫之痘已出手足多水泡者此肝勝脾衰為鬼賊宜急治之不久便生癢􅚥也如遍身皆發手足不透是空殼者此脾胃虛弱津液耗竭營衛凝澀故其毒亦欎而不發也不能食者死能食者必發癰疽痘勢太甚手足冷者不治痘未成漿手足皮脫者必死痘已正靨惟足不收者足為純隂無陽相濟所以收遲如痘始成漿他處未收手足心先靨者其後必生怪疾也痘靨之後手足關節腫痛者必發癰也痘癢手足搔亂者凶夾斑斑者血之餘有色點而無頭粒隨出隨沒者也丹則成片赤如雲頭而突皆血太過而氣不及營衛失護致血任三焦浮逰之火散漫於皮膚之間耳宜以輕劑散其火邪兼活血解毒之藥治之並用玄參升麻湯加石膏黃芩荆芥芍藥芎歸或升麻湯加紫草蟬退多磨犀角汁化下烏金丸又或結痂之後而發者餘熱煎熬肉分其斑必爛宜解毒湯加歸芍黃芩石膏甚則大連翹飲爛處以生肌散敷之無不瘳矣至若青黑紫斑乃毒氣不能發泄之故死生一反掌間耳急與四順清涼飲利之其斑既退即以四君子湯加黃蓍薑棗煎服如不止再加肉果須要預煎候之俟斑退血附即服庶可免其內陷也大抵斑在發熱放標起脹時多用表散在灌膿收靨時多用解利遍身通紅者治同發斑有二陽毒發斑者壯熱渴躁兩目如火脈洪有力其色紅赤者胃熱也紫黑者胃爛也一則下之早故熱乘虛入胃一則下之晚故胃熱不得泄皆內外挾熱而發斑也當服玄參升麻白虎等湯隂症發斑者身無大熱手足指甲俱青脈沉細而急其色微紅或暗晦此無根失守之火聚於胃薰於肺傳於皮膚而為斑也若妄投以涼劑則誤矣當與升麻鱉甲湯調中溫胃而斑自退夾疹疹即麻也痘毒出於隂疹毒出於陽隂主血故痘有形而灌膿結痂陽主氣故疹有色而不膿痂此皆有生初之淫火伏於命門之間本非尋常並發者惟痘出之時或天行所激觸動其毒故並出耳此亦不順之症也故急宜清散先服升麻葛根湯如不解則犀角地黃湯內既清涼則疹亦隨之而解矣錢氏云痘疹只出一樣者善凡痘已見形其間碎密若瘡子者此夾疹也由火毒薰灼於中故使疹挾出於外也急宜解毒使疹消散痘得單成可也宜荆防解毒湯主之若服後而疹不退者凶之兆也夾斑治同膚疹者熱毒之氣發越而然也暴出之時點如麻狀但色鮮赤成片耳用敗毒散毒當隨散越數日而痘出痘反稀疏劉宗厚云癮疹多屬脾隱隱然在皮膚間而名之也發則多癢或麻木不仁者是兼痰兼濕之殊也色紅者兼火化也用解毒防風湯若內傷外感而發者用調中湯夾沙亦麻類粒頭瑣碎吳地呼為沙子其狀如夏月膚腠之痱子沙之形如粟一般尖員而硬中含清水夾痘而出者亦熱毒之所發也用四苓散加防風黃芩分利隂陽而􅀈自退矣夾疥瘡痘夾疥瘡而出則血氣為瘡所奪痘多不能起發成漿須連服內托散庶無坐陷之患也乾枯黑陷紫陷朋來曰凡黑如烏羽者生以其熱雖熾而血尚活治以涼血解毒可愈也黑如焦煤者死無生氣也故不治痘色初見深紅者必變紫紫必變黑紫黑必至於乾枯皆血熱乾滯而氣不能運行一定之理固如此也治須以涼血清熱為主看其微甚或利大便或利小便或為解散頂雖平陷不可以氣虛而例用參茋補劑蓋補氣則熱愈甚而血愈涸也宜以絲瓜化毒湯加當歸紅花連翹牛蒡更以麻黃解毒湯發散其毒或以紫草湯化下小靈丹或燈心湯化下大靈丹有黑疔者針挑破去其毒血兼用扶脾實土之藥古方有燒人屎者有用四聖散者有用人牙散獨聖散者有用雞冠血酒漿灌之者有用胡荽酒塗其遍身并衣服薰之者有用壁間蟢蛛如豆大者研爛入雄黃每嵗一釐同研勻酒調服者有用黃連犀角清心火者已上皆可擇用如宣風散百祥丸牛李膏內有大戟與牽牛峻利之藥元氣盛尚可虧損况痘後之兒尤當慎之黑陷二種因氣虛而毒不能盡出者酒炒黃蓍紫草人參黑陷甚者亦用燒人屎白陷灰陷朋來曰察其乳食少進二便清利者為寒法從溫補痘色白者必變為灰慘灰慘者必變為平伏倒塌此雖氣虛而血不華色血亦虛也故當氣血兼補使血活氣行則白色可變為紅庶或可救若單用補氣之藥則氣燥血虛必致發癢抓破灰慘平伏倒塌為不治之症矣治宜補中益氣湯合四物湯有內熱者加解毒藥白陷抓破皮薄乾燥而極癢者皆由失於補血以致氣虛則燥然也內潰心鑑曰內潰者胃爛也蓋因風寒所中腠理固密隂陽二分壅塞不通其毒內攻而臟腑之間毒火炮熾則潰而成膿口舌皆白是其驗也識者於痘未出之時或有風寒阻隔氣粗熱甚身必戰動肚腹急痛謹防此患以敗毒散或升麻葛根湯逐散寒邪開泄腠理縱毒外出必無是症癢塌痘瘡癢塌今人總歸之氣血虛寒殊不知亦有氣盛血熱而然者須從形色及他症辨之如痘色淡白精神虛怯小便利大便頻至夜癢甚者此脾氣弱而氣血均虛也參茋內托散及四君子湯加黃茋肉果官桂白芷蟬退主之甚則陳氏木香散佐之如瘡色紅紫煩躁大小便不利渴欲飲湯水甚至抓破血流者此氣虛血熱毒盛血行氣分血味醎醃螫皮肉而癢也四物湯加參蓍連翹蟬退白芷甘草及三味消毒飲加紫草連翹主之血流者敗草散蕎麥麵炒黃土摻之又遍身癢甚抓破者不問前後皆服蟬花散外以乳香或敗荷葉茵陳燒煙薰之若穢氣衝觸作癢抓破者宜服內托散外以辟穢散薰之然發癢精神清爽自知其誤欲人拊摸者吉若悶亂不寧者搖頭扭項手足舞亂言不聽禁不止者凶也羣玉曰痘疹發癢如能食而大便堅結者此邪氣內實正氣外虛也加味四聖解毒湯治之外用升麻蒼术麻黃槐栁桑皮煎熱拭之如泄㵼者此正氣內虛邪氣外實調元托裏治之外用山茵陳白艾二味為末燃火薰之如用上二法而癢即止者吉癢不止而反甚者凶也心書曰痘瘡作癢者火邪傳於肌膚之間不能即出或血方流行而為風寒外束故欎滯而作癢與傷寒汗不出而作癢相同法以荆芥穗束之以紙而刺癢痘之項以散欎邪其癢即止驗之如神內服消風火化毒湯以解之以上癢症痘家之惡候兹録各家治法驗甚者以備緩急參用目睛露白人之一身必元氣固則精血為之凝聚而瞻視有常也若元氣虛損則衛氣受虧是以督脈縮促致睛上弔而露白也若謂之風則謬矣遇此候别無他證者可以保元湯加陳黃米主之無魂失志不省人事者不治雖無他證而或見於七日之前則毒尚未解而氣血已離必不可治之症也聲啞心之氣舉擊於肺而為音肺清則音清肺熱則音啞此必氣喉有痘熱毒閉塞肺竅而然也須分順逆為治如七日之後失音者乃內痘先熟而先靨則咽喉漸寬毒氣漸消聲音自亮為順症也若七日之前失音者此毒氣薰蒸失於調解致肺竅不通閉塞管籥毒無從泄內痘糜爛舌齦成坑咽門腐壞馴至呼吸俱廢為不治之症矣或有內本無痘因食辛熱之物或多服熱藥所致者急用甘桔湯射干牛蒡湯加玄參連翹犀角治之或能言聲不清者此火乘於肺也㵼白散加天花粉桔梗石膏片芩茯苓麥冬山梔治之或感風寒閉塞而聲不清者參蘇飲加桑白皮杏仁石膏主之如法治之而效者吉否則凶水嗆喉之竅若管籥然痘之初出細小不覺及肌表之痘成漿則內痘亦成漿而其毒壅於會厭然是乃飲食所進之處故飲湯水不易進納則溢入氣喉而發嗆也若穀食有渣自能咽之從食喉而下非如水溢以犯氣道矣七日後見者不藥而愈何也外痘靨而內自痊矣若七日前見則為逆症由熱毒壅塞不能發於肌表故耳治用甘桔湯合解毒湯加牛蒡玄參荆芥麥冬若預以甘桔湯清其氣道安致有此患哉驚搐附癲癎心者神之舍也痘毒本熱熱氣擊動心神肝不能制故神不安而發驚搐治宜㵼肝利小便蓋㵼肝則風去利小便則熱除風熱既退則痘出而驚自愈矣故痘未出而見此症者則升麻湯合消毒飲主之或紫草膏或蟬酥丸不可竟投涼劑蓋心一涼則氣血隨斂毒無從出也痘既見而有此症由熱毒之未解耳四苓散合消毒飲或柴苓湯或導赤散若風火相摶喉中痰鳴目晴上視面赤引飲喜居冷處者柴苓湯或抱龍丸若痘後胃弱飲食不化謂之食蒸發搐必面黃潮熱大便酸臭祕泄不調或吐利腹痛宜紫霜丸下之大便祕者四順飲痘後毒當盡解而又發驚則心氣已絶神無所依必不可治發癲癎者粉紅丸治之痘後手足麻木無汗者參附湯若手足難動常出汗者茋附湯卒然驚仆不省人事者用皂角為末吹入鼻中即蘇古謂先痘後驚者不治痘正發而有此症能不為之可悼哉又痘未出毒氣內逼目上竄驚呌如驚風者乃痘欲出之候也若誤認為驚而治之則毒氣內蓄邪熱不泄而反危矣煩躁心經有熱則煩躁蓋痘毒之熱擊動心火脾少津液不能濟之此所以發為煩躁不寧悶亂狂言等症也治當觀其虛實何如痰實壯熱者梔子仁湯或解毒湯或辰砂益元散二便祕則通利之虛煩而渴者保元湯加麥冬五味或麥門冬湯夏月暑甚煩渴而痘出不快宜辰砂五苓散靨後發熱煩渴麥門冬飲子此症似輕而重苟服藥而久不愈則心脾二經皆為熱毒所傷矣煩則必渴渴則必㵼㵼則必咬牙寒戰而癢塌之患立至也慎之慎之秋傳曰痘瘡以安靜為貴但有煩躁者必毒氣壅併表裏不寧宜審諦之如搔爬不停者痘癢也不寧者裏熱也呻吟者痛也非折肱之妙手安能識其病而起其症哉發渴渴者胃中熱也胃中津液為熱所耗故渴而飲水也始終固有用白虎湯加天花粉乾葛甘草然有汗加人參或辰砂六一散小水不利者四苓散氣虛保元湯加麥冬五味至於隂虛火動而發渴者固為難治之症理辨則謂六味地黃丸加桂心五味子乃治虛渴之聖藥也不可不知痘疹心書曰毒氣萃於陽明此時多發熱渴熱淫於內而外不得宣通故發渴也宜神功散服後猶渴者宜紅花子一味煎湯飲之如無子即用紅花湯加牛蒡子服之此藥神妙能散胃口之瘀血故也切不可用荔枝黑棗椒薑等湯以助陽經之熱噯氣熱毒欎於胃中欲發而不得發故噯氣治用半夏生薑湯加陳皮黃芩或四苓散加陳皮竹茹以利之不食痘瘡始終以脾胃為主若飲食如常者此臟腑充實脾胃完固不消服藥若不喜飲食者必須辨别而治之如泄㵼痘色灰白而不食者此脾胃虛而元氣弱也宜四君子湯或人參養胃湯七珍散治之如大便祕瘡掀腫不食者此毒盛而血熱也宜四物湯加解毒藥熱甚者加薑炒芩連便祕者下之萬氏云痘瘡不怕稠密只要能食汗多汗乃心之液由熱氣內蒸腠理開泄故液隨氣而出也自汗盜汗俱能虛人未漿之時恐不能灌既灌恐不能靨既靨恐血脫陽虛變為他症最宜調理自汗宜保元湯加桂枝白芍浮小麥以斂之有熱加酒芩盜汗宜當歸六黃湯或當歸湯丹溪曰自汗不妨蓋濕熱薰蒸而然也此特為汗少出者言耳若汗大出身冷惡寒寧不早為之治乎此宜異功散救之寒不已者死汗綴如珠者死汗而昏沉者死汗而煩渴者死不可不察諸失血夫血熱則妄行蓋熱毒之氣淫佚無歸則血亦隨之而走泄也始終用犀角地黃湯加芩連梔子白芍但血之妄行或吐或下或從陽瘡痘毒而出者悉皆不治何謂也吐便者有傷於內也㵼膿血如死肝豆汁者胃爛也從瘡毒而出者肉分空虛而元氣為之走泄也鼻衄者生蓋血隨毒行傳注督脈斬關而出不犯其內故耳至於女人失血不止尤當急治嘗有一男子口鼻出血數碗以韭菜汁半碗頓服而愈隂囊發腫痘症隂囊腫痛如瓠瓜者乃膀胱熱甚毒氣流於小腸而然也急宜清利退火滑石木通車前牛膝梔子瞿麥燈心甘草水煎服或紫草飲子小便不利者加木通外以石燕子醋磨濃汁敷之痘後浮腫痘靨之後失於調理或傷飲食或感風濕致傷脾土濕勝而為腫也傷於食以健脾加山查麥芽平胃之類虛者加人參俱以淡滲之劑佐之傷風濕者平胃散加防風羌活汗之水腫者以五皮飲消之一方用蘿蔔子殼蒲蘆煎湯洗之立消又法桕樹葉桑樹葉煎湯洗亦消驗動靜凡痘以靜為貴內有不和則動凡靜屬隂而動屬陽痘之為症隂陽俱病但息欲其勻語欲其少寐欲其安寤欲其寧觸其瘡則吟拂其欲則鳴飲食二便如時此平人之候是謂靜而吉也如呻者身有苦也自語者神不清也喘粗者內熱也腸鳴者泄也坐卧不寧者心煩也啼叫不止者痛也搖頭者風也指欲搔者癢也咽物難者咽痛也咬牙者心肝熱也若悶亂躁擾譫妄昏眩如見鬼狀搖頭扭項手舞足擲目晴上視寒戰咬牙語音不出皆為死候如病向靜忽然擾動者異也須細察之痘色變而無他候者戾氣觸之也痘色不變又無他症此必有因但俟自定其有目瞑息微四肢僵直口噤痘壞昏睡不省者此真氣將脫魂魄欲離之兆又不可作靜看也稀痘仙方牛黃一錢蟾酥三分辰砂七分絲瓜蒂近蒂取五寸燒存性五錢為末每一歲服一分沙糖湯調下兔紅丸服此可免出痘辰砂甘草六安茶各等分臘八日午時取生兔子血為丸梧桐子大逢三六九與兒食之鼠肉方取雄鼠肥大者去皮毛腸穢用鹽醋爛煮與兒食之痘出稀少切不可使兒聞見亦不可對他言知但只可自設法取用不可用他人取討者恐防毒藥死的慎之或只用砂仁白水煮不用椒蔥蒜韭并油煎等辛辣熱物若未食葷兒與食尤妙此屢試屢驗者四脫丹蟬退蛇退鳯凰退即哺出雞子壳神仙退即父母爪甲右各等分焙為末每服一錢煉蜜為丸菉豆大每年除夜服服三年永不出痘玄兔丹玄參酒洗五兩兔絲子水淘淨酒煮研爛為末右二味俱不犯鐵器為末黑沙糖為丸彈子大每日與兒服三丸沙糖湯下葫蘆花湯八月採葫蘆花不拘多少隂乾入除夜蒸籠湯浴兒或不出痘縱出亦稀少苦楝子湯苦楝子不拘多少煎湯浴兒或痘瘡不出出亦稀少三花丹將出之時用之能稀少梅花桃花梨花取已開未開盛開者隂乾為末等分取兔腦為丸雄黃為衣用赤小豆菉豆黑大豆三豆湯下六味稀痘飲將發痘預服之山查紫草牛蒡子各一錢防風荆芥各一錢二分甘草五分薑三片水煎服輕斑散治痘未見點時服之絲瓜近蒂三寸連皮子燒存性為末硃砂五分二味和勻沙糖調下痘出必稀多者少少者無稀痘如神散絲瓜升麻芍藥酒炒甘草山查黑豆赤豆犀角磨用各等分每服三錢水煎服不拘時看大小加減預服萬靈丹初發熱一服即輕百發百中升麻小者三錢葛根三錢甘草三分紫草茸一兩蟬退殭蠶洗連翹白附子炒各三錢山豆根五錢全蝎去毒十枚雄黃一錢半麝香一錢蟾酥一錢好酒煮化右十二味和拌為丸皂角子大每服一丸紫草湯下發熱有數種生生子曰凡痘疹發熱與傷寒傷風傷食驚風等相似先當辨明傷寒之熱手足梢微冷無汗惡寒面色青慘不舒左額有青紋傷風熱手足梢微濕自汗惡風面赤而光二者皆太陽症俱頭項痛腰脊強傷食熱目胞腫右額有青紋身熱而額腹最甚夜熱晝涼面色黃或吐利腹痛驚風熱面色青紅額正中有青紋手心有汗時發驚悸痘子之熱必顯四臟之症耳􅍠冷中指冷尻冷面燥腮赤呵欠頓悶乍涼乍熱多睡咳嗽噴嚏驚悸吐利夫發熱者瘡疹常候也但熱微毒微熱甚毒甚微者勿藥甚者必宜及早清解原痘無逆險只在發熱之初調治之早觀其熱重神昏即以清解之劑投之或發表或攻裏法在不避必使一晝一夜表裏通和熱退為佳蓋毒解則熱始退熱退痘出自然稀疏明朗若不早為疏通表裏則毒無出路雖小毒釀成大毒逮及出齊則順逆險已定順者幸而無虞逆者無所措手矣古無順逆險之名稱順逆險者自魏桂岩始也初發熱三朝證治活法凡發熱疑似之間宜投人參敗毒散一劑發之是與不是一發便見萬菊軒曰大抵痘疹只宜發盡勿使留伏於中凡用發表之劑務察天時不可固執只宜平和之説極為誤事設遇冬寒及春行冬令之候腠理緻密血氣凝澀痘必出遲遲則藴熱熱不得汗毒莫能泄必多壅遏之變急宜辛熱之劑發之桂枝葛根湯或五積散去乾薑如天時熱則腠理疏豁氣血淖澤防其發泄太急恐罹潰爛之變必以辛涼之劑解之宜升麻葛根湯雙解散之類如春秋天時溫和不寒不熱只以人參敗毒散最佳保嬰丹熱甚者用之捷效或就於前解散藥化下一丸能令重者輕輕者少以其極能解毒也初發熱時飲食二便如常精神清爽痘必稀少不須藥初發熱時渾身壯熱熇熇然不渴清便自調此邪欎在肌膚之間宜輕揚之劑發之升麻葛根湯甚者羌活湯初發熱時其熱烙手目赤鼻乾唇燥小便赤大便祕煩悶不安此表裏俱熱毒氣壅遏宜發表通裏雙解散主之初發熱時表不甚熱煩躁不安口渴小便赤澀熱在裏用紫草膏保嬰丹辰砂六一散犀角山豆根之類清解之甚者三黃丸微利之初發熱時腹中痛者此痘毒與穀氣相併急以麥芽山查紫蘇枳實砂仁陳皮溫而消之若腹脹硬痛大便祕者備急丸下之初發熱時咳嗽鼻流清涕參蘇飲主之初發熱大便祕結急宜潤之恐熱毒內蓄宜紫草飲必使大便通利為好初發熱嘔吐者要明外感內傷外感者二陳加柴胡藿香生薑枳殼和而解之內傷者二陳加藿香砂仁麥芽山查枳實蘇梗白芷消之胃弱而吐者六君子湯有毒氣上衝大吐不止者辰砂六一散甚者加石膏蘆根湯亦佳初發熱作㵼腹中不痛原無內傷者此痘內動與外邪搏激所致不必治㵼但以輕揚之劑升發之痘出而㵼自止初發熱自汗自吐自㵼者乃毒從上中下而出皆為吉兆但只在三日內裏不可多日恐元氣虛脫也㵼有冷熱熱㵼者口渴小水少而身大熱四苓散加木通若乾嘔加薑炒黃連或六一散冷㵼口不渴小水清重者理中湯輕者參苓白术散久㵼者豆冦丸初發熱二三日間有驚搐者導赤散羌活湯辰砂散大便祕者三黃丸微利之小便赤澀者導赤散渴甚者葛根解毒湯腹中痛者桂枝大黃湯腰痛者人參敗毒散自利者黃芩湯吐利者黃芩加半夏湯如脾胃素弱自利清白者理中湯丸或四君子湯豆蔲丸合而服之凡發熱及初見標時須問咽喉疼否但有微疼急清解之甘桔湯加牛蒡子大抵痘要解咽喉為急務不早防以致失聲乾嘔水穀不入搶喉噴吐治無及矣管氏曰發熱之初痘之吉凶皆兆於此故急宜表汗使臟腑胎毒及感不正之氣盡從汗散則痘出自然稀少蓋熱甚毒甚熱微毒微不必治妄汗則表氣一虛痘不能起發反為害也盛者汗之要在身熱盡退為佳其有一切雜症皆由毒氣欲出不能故耳一表散則毒氣盡泄諸症自退矣或有當解者解之當下者下之切不可執一也胡氏曰表熱壅盛非微汗則表不解裏熱壅盛非微利則裏不解正此之謂耳失此不治則毒氣漸盛而逆症隨見世人多忽於此及見逆症而後治之將何及哉大抵治痘之訣妙在三法曰發表曰和中曰解毒知此三者於發熱見標之際預為之地則多可少重可輕自無以後變症故發表最先蓋痘疹只要發得毒盡不使留伏於內凡發表必兼解毒非發表之外另行解毒也痘既已出不渴不熱表裏無邪不須服藥如痘多毒盛裏實能食可單用解毒如裏氣不和或吐或利於和中法內略兼解毒若毒輕痘少惟裏不和胃氣虛者只用和中則不必解毒也每發表須辛甘清陽之劑羌活防風升麻白芷桂枝之類和中須甘溫之品如人參當歸甘草芍藥之儔蓋中不足甘以補之解毒須苦寒之輩如牛蒡連翹葛根芩連梔柏紫草之類蓋毒者火也凡用苦寒之劑必要酒炒可以活血達表且不犯胃氣切宜識之痘宜依期施治治貴通變翁仲仁曰夫痘由中以達外用藥因期而變通以其尚未見標必發熱三日然後見標出齊三日而後起脹蒸發三日而後灌膿漿滿三日而後收靨發熱之初耳尻中指俱冷耳後起紅絲呵欠噴嚏眼目困倦兩顴之間有花紋見者預知其為痘也發熱三日當托裏解表使其易出亦有氣弱而不能出者當微補其氣氣和則出快初不可用茋恐腠理密而難出也四五六日以清涼解毒為主清涼則無血熱燥毒之患解毒則無壅滯黑陷之害七八九日以貫膿為主治法當溫補氣血氣血流行而成漿自易也十與十一二日以收斂為主大和氣血補脾利水則自然結靨此特語其常也蓋常者可必而變者不可必當隨候參詳安可執藥以應無窮之變哉言見紅點之時如痘輕少不可過表在後恐成斑爛或乾紅紫色急宜疏利不然在後必成黑陷四五日之內痘出至足心為齊苟未盡出於解毒之中宜兼發散若専於寒涼則痘遲滯不出七八日之間毒未盡解於溫補之中又兼解毒若偏於燥劑則毒盛不能化漿也十一二日之間漿未滿足必大補氣血略兼解餘毒不然恐有癰毒溫疤之患此變通之妙要在隨時制宜也人參敗毒散羌活獨活前胡柴胡川芎枳殼桔梗白茯苓人參各等分甘草減半生薑三片水煎服一方加薄荷少許參蘇飲人參三分紫蘇葉桔梗乾葛前胡各四分陳皮茯苓各五分枳殼三分半夏二分木香一分半生三片水煎服升麻葛根湯葛根升麻白芍藥甘草各等分水煎服雙解散即防風通聖散益元散二方也防風川芎當歸白芍藥薄荷葉大黃連翹各五分石膏桔梗黃芩各八分白术桂枝荆芥穗各二分滑石二錢半甘草一錢生薑三片水煎服桂枝葛根湯葛根桂枝赤芍藥升麻防風甘草各一錢生薑三片淡䜴一錢水煎服保嬰丹紫草茸酒洗忌鐵四兩纒豆藤燒存性四兩荆芥穗防風升麻大力子炒各二兩天竺黃一錢二分如無真者以雄黃一錢二分代之牛黃一錢半辰砂用麻黃荔枝殼紫草煮過再飛蟾酥自取真正者一錢二分赤小豆菉豆黑豆各四十粒炒香甘草梢去皮二兩加紫草三兩水熬成膏半碗沙糖半碗前藥俱製淨末和為丸圓眼核大辰砂飛過為衣未出之先濃煎甘草湯每服一丸大兒加一丸凡遇發熱之時生薑蔥白湯化下厚蓋表汗乃解毒之神藥心要羌活湯羌活川芎防風山梔子龍膽草當歸各等分甘草減半薄荷葉三片淡竹葉五片水煎服紫草膏治紅紫黑陷熱毒紫草茸白附子麻黃去節甘草各五錢全蝎八枚炒右為細末用蜂蜜一兩酒半盞先入紫草煎熬成膏旋入各藥丸如皂角子大每服一丸仍用紫草湯化下如治驚搐用金銀箔為衣薄荷湯下六一散桂府滑石飛淨六兩大甘草去皮一兩每用一錢燈心薄荷湯下內加制辰砂三錢名辰砂六一散治狂言妄語驚搐用防風荆芥薄荷天麻煎湯候冷調下本方加欎金名牛黃六一治痘後瘡癤癰毒及天行瘟疫冷水調下多服大效退火丹治痘初出標大熱不退或稠密成片者神效六一散一料加雄黃飛過三錢纒豆藤燒存性一錢外用紫草木通蟬退地骨皮紅花大力子羌活片芩燈心煎湯候冷調下極能解毒稀痘四苓散白术赤茯苓澤㵼豬苓右為細末每服一錢三黃丸黃芩五錢黃連大黃各二錢半為細末雪水搗丸菉豆大辰砂為衣每服五七十丸燈心湯下備急丸木香二錢半大黃黑丑頭末各五錢為細末神麯糊丸菉豆大每服五七丸山查湯下甘桔湯甘草二錢桔梗一錢水煎服三豆湯赤小豆黑豆菉豆各一升甘草三兩三豆用水淘淨用水八升入甘草同煮豆熟為度逐日空心面東任意食豆飲汁服七日永不出代天宣化丸即韓氏五瘟丹也甘草甲巳年君土黃芩乙庚年君金黃柏丙辛年君水山梔丁壬年君木黃連戊癸年君火連翹佐山豆根佐牛蒡子佐先視其年所屬者為君次四味為臣君藥加一倍臣減半佐又減半共為末冬至日修合取雪水煮升麻汁打麵糊為丸辰砂為衣竹葉湯下五積散白芷川芎各三分桔梗一分半芍藥茯苓炙甘草當歸桂枝半夏各二分陳皮枳殼麻黃各五分蒼术一錢厚朴四分右除桂枳殼二味為粗末外十二味為末慢火炒令轉色攤冷次入二味末令勻水一盞半生薑三片煎一盞溫服辰砂散辰砂一錢絲瓜近蒂三寸連子燒灰存性為末蜜水調服多者可少少者全無絲瓜解痘最妙紫草甘草湯調服尤佳連翹湯總解諸毒散風清熱痘後一切發熱癰毒赤腫連翹防風瞿麥荆芥穗木通車前子當歸柴胡赤芍滑石蟬退黃芩山梔子甘草各五分紫草五分水煎服連翹升麻湯連翹一錢升麻葛根桔梗甘草各七分木通八分牛蒡子一錢白芍藥五分薄荷葉少許淡竹葉燈心水煎服消毒飲治咽喉腫痛上膈熱盛一方加升麻牛蒡子炒二錢荆芥一錢甘草防風各五分水煎服翁仲仁十神解毒湯専治身發壯熱腮紅臉赤毛焦色枯已出未出三日已前痘點煩紅燥渴欲飲睡卧不寧小便赤澀此熱盛也並皆治之歸尾生地紅花丹皮赤芍桔梗木通大腹皮連翹川芎此方治血熱痘疹以涼血活血為主佐以桔梗川芎有開提發散之功引以大腹皮木通有疏利熱毒之效誠以連翹丹皮有解毒之良用此以治血熱痘疹則能內外分消熱毒雖盛庶幾解散表裏自然和平矣古人用黃連解毒湯恐驟用寒涼不惟氷伏熱毒及出不快抑且熱毒為其所抑則欎於臟腑或肚痛腹脹內潰而死者有之豈若此方用之為穩當若不得已而用黃連芩柏亦須酒炒一以製其寒涼之性二以助其上行之勢借連柏以解毒耳加減法身熱壯盛加葛根前胡毒盛綿密加荆芥鼠粘子渴加天花粉竹葉滑石小便血加犀角山梔大便黑加犀角黃連或桃仁吐血乾嘔加黃連犀角發紅斑加犀角黃芩黃柏山梔玄參小便赤加山梔小便短澀加豬苓澤㵼小便祕加滑石瞿麥大便祕加枳殼前胡嘔加橘紅泄㵼加豬苓澤㵼防風大便祕喘加枳殼前胡大黃煩躁加麥門冬天花粉煩渴狂亂譫語加知母門冬石膏嘔吐加豬苓澤㵼黃連咽喉痛加甘草鼠粘荆芥以上並用燈心十四根水煎服羌活散欎湯専治實熱擁盛欎遏不得達表氣粗喘滿腹脹煩躁狂言譫語睡卧不寧大小便祕毛竪面浮眼張若怒並有神效并為風寒外摶出不快者同治防風羌活白芷荆芥桔梗地骨皮川芎連翹甘草紫草大腹皮鼠粘子右為粗散水一鍾燈心十四根煎六分溫服身初發熱及見點之際毒氣壯盛外為風寒所抑或肌肉粗厚腠理堅閉肌竅不通經絡阻塞使清氣不得引毒達表循竅而出則熱毒擁遏於內為腹脹為喘急為祕結為狂煩為驚搐為失血皮燥毛直面急眼脹睡卧不寧驚啼多哭此熱毒擁遏之症辨認不差急宜用發散開提之劑佐以和解透肌之法則熱毒不擁而其出自易矣羌活白芷防風有升提發散解毒之長桔梗有開提勻氣之能荆芥連翹鼠粘善解欎熱地骨皮消擁熱於筋骨之間且能肅清臟腑紫草滑肌通竅大腹皮引熱下行使內外有所分消用此以治熱擁之症效大而功用極妙若驟用寒涼如芩連升麻之類則熱為寒氣所抑不得伸越逗遛經絡為疽為癤者有之氷伏硬閉者有之至於人參黃茋白术茯苓溫補之劑誤用則其擁盛禍不旋踵他如丁桂木香薑附之類以熱攻熱殺人立至尤宜戒慎故發熱之初至見點之後並宜以本方處治依後法而加減之加減法初發熱壯熱腮赤面赤毛焦皮燥咳嗽喘急加升麻煩渴加天花粉乾葛腹脹喘急鼻塞面赤若怒毛直加麻黃便祕加當歸枳殼甚則加大黃嘔吐加豬苓澤㵼陳皮禁用生薑丁香半夏木香洞㵼加升麻禁用白术茯苓豆蔲龍骨等劑喘嗽惡風加紫蘇桑皮失血加犀角地黃黃連搐加青皮發斑加黃連黃芩山梔鼻衄加黃芩犀角小便赤澀加滑石山梔地黃芍藥驚悸加木通山梔不思食加山查傷食加神麯山查麥芽煩紅赤色加生地紅花丹皮白芷防風見標二三日間出不快利加大力子山查蟬退名透肌散皮急肉緊身壯熱甚加葛根前胡見標三日之內並依本方加減及三日後痘瘡出齊血包已成而前症悉平不得復用此方恐發散太過難於行漿另有方藥在後其禁用藥劑並從血熱痘症法而裁治之太乙保和湯又名紫草透肌湯専治血熱痘症服十神解毒湯後熱症悉去內外和平見點三日之後不易長大粗肥者用之則能保和元氣活血解毒助痘成漿易痂易落也桔梗紫草川芎山查木通人參紅花生地甘草糯米五十粒右用燈心七根薑一片水一鍾煎至六分溫服便澀腹脹加大腹皮繁紅不潤加當歸蟬退出不快者加鼠粘子陷塌加黃茋痛加白芷不勻加防風水泡加白术芍藥嗽加五味子麥門冬渴加麥門冬癢加白术芍藥七八日後漿足身復壯熱便祕煩渴腹脹喘急前胡枳殼湯漿足禁用此方另立湯飲在後益元透肌散専治擁熱痘症服羌活散欎湯後擁症悉開氣血和平見點三四日後不肥大者不成漿者用之則能勻氣解毒透肌達表領出元陽助痘成漿而易結膿窠也加減以保和湯同論漿足之後另有保嬰百補湯在後按此即太乙保和湯去生地紅花加蟬退鼠粘陳皮水一鍾加燈心十四根棗二枚煎六分溫服血熱痘症禁忌血熱痘症熱毒彌盛然毒氣無所分消只宜重用升提發散使毒得以達表而從外解引以滲泄使熱得以潤下而從內消佐以清涼消毒行血涼血之劑則痘雖稠密亦能消散而易出易化漿也所謂輕其表而涼其內十神解毒湯蓋得安表和中解毒三法盡善誠痘科之神方也丹溪曰熱者清之實者平之其此方之謂歟是故發熱至見點之後三日以前毒氣未盡達表內外彌盛血熱之症悉具辨症不差並只以本方處治之切不得用參茋白术茯苓補氣之藥於熱症未漿之前如誤而用之是謂實其實腹脹氣喘狂亂譫語咽喉腫痛口舌生瘡變症百出所謂邪得補而愈盛也嘔吐泄㵼慎不得用半夏丁桂乾薑木香藿香訶子肉果如誤而用之則是以熱助熱氣得熱而愈亢也燥症必至咽疼狂亂失血便祕無所不至矣至於龍骨枯礬澀滯之物且能使氣道阻塞是欲其出而反閉其門也腹脹之患生而喘急之勢至矣尤宜戒之及至血包已成氣血定位頭頂白光勢將行漿又宜易方另行别議三仁膏治痘疹大便堅實不宜下者服此潤通火麻仁炒去殼一兩松子去殼去皮七錢桃仁去皮炒五錢右研爛加芝麻一合微炒研細入蜜水研極爛以帛濾去殼同前三仁蜜湯調下看大小用之見標三日證治活法發熱三日後退涼見標飲食二便如常形色淡紅疏朗抹過礙手者上吉不須藥發熱一日便出者凶乃表虛毒盛也急用羌活散加紫草牛蒡蟬退煎調紫草膏或保嬰丹若治之早十救二三若服後熱盛不退宜羌活散調退火丹若無保嬰丹用纒豆藤灰加辰砂看大小一歲三釐十嵗三分逐歲增加代之矣報痘時煩躁不寧腰腹痛不止口氣大臭痘見紫色者死標色白皮薄而光根窠全無紅色或根帶一線紅三五日即長如菉豆大此痘決不能灌漿久後成一包清水擦破而死不可因其好看妄與下藥標出全不起頂如湯泡燈火燒者一樣十日後癢􅚥而死標出時一片紅斑如錦紋者六日死遍身如蛇皮者死黑斑如痣狀肌肉成塊黑者立時死凡見標疏少則毒輕不必妄治密則毒盛但要磊落大小分眀不相粘連成片可用前藥進之或托裏解毒之劑快斑湯消毒飲主之使其易發易靨如出太密粘連糢糊其毒尤甚托裏解毒之劑宜多飲之以防癢􅚥黑陷之變更察外症可治則治不可治則勿治凡痘子初出最要唇口潤澤其毒則輕如唇焦裂舌燥有芒為毒火熾盛表裏欎遏急宜解之黃連解毒湯加大力子標後身熱未退清地退火湯凡見標先要頭面稀疏磊落頸項胸前稀少其毒則輕如面上一片糢糊未發壅腫蒙頭纒項胸前布密此毒盛也慎勿治之凡頭面未見標而手足先出他處未起而手足先起他處未收而手足先收者此陽火太旺宜早解毒抑陽扶隂之劑四物湯合黃連解毒湯主之如他處俱起而手足起遲他處俱收而手足不收者此脾胃虛弱不能行其氣血達於手足宜補脾胃十全大補湯桂枝芍藥湯凡初見標之時磊磊落落似稀疏之狀其後漸加日多一日此毒伏於裏裏氣虛弱不能使之即出須大補而兼解毒庶可十救二三也十宣散加無價散石谷程氏曰凡發熱見標密無毫縫空地稠若蠶種者急用三元祕方救之每一歲兒用茜根芫荽子各三錢荔枝四枚若不起加葡萄一錢半好酒一鍾煎至五分候冷每用半盞攙熟水半盞時時慢慢喂之一日服盡次日再用水煎如前慢慢喂之但服此藥之後不可雜食他物以傷胃氣小者只許食乳大者只吃粥若口渴即以此藥水飲之一以止渴又能清熱解毒切忌油膩煎炒恐滯腸作㵼㵼則誤矣或十歲二十歲藥從一歲加起依數增加作一劑服之如年多劑大不能盡煎可分作二三罐煎之按前藥用酒煎者活血也後用水者清熱也熱盛必作渴代茶飲之足可解毒蓋前症不可補補則助毒又不得不補不補則不起發宜當解毒解毒又作㵼不解毒又攻內兹用三味代之既能解毒又可溫脾活血誠為千金良劑凡痘發熱一二日便出或一齊擁出密如蠶種紅紫無縫急宜服之此時切忌保元恐溫補助毒以其血未活而漿不能化故用此三元解之俟其色淡血活熱勢已退然後進補庶為萬全凡皮肉間纍纍然紅點稠密急用纒豆藤加製過辰砂末連進二三服或薄荷湯調退火丹仍以牛蒡為末敷囟門上以散熱毒非惟能使痘疏又且免使侵眼又方生地黃牛蒡子搗成膏貼面頰額角能退痘毒一已出未出之時口鼻出血此血熱錯經妄行不可妄投熱劑宜用生犀薄酒磨服如鼻血不止胎髮灰吹入鼻中即止口鼻既血又大小便下血恐胃為熱毒所傷腐壞而然不可不知一出與地皮相平無興起之意乃是紅斑急用涼血解毒羌活散加酒炒芍藥紅花紫草蟬退木通占米連進二三劑退之夾疹同此治治之遲則紅變黑黑則逆而難治大凡用紫草必用占米以制其冷性俾不損胃無泄㵼之患惟大熱大便燥者不必占米大凡用當歸活血須以芍藥收之免辛散助熱一標出他處未見獨出數粒於山根之上為毒盛氣虛犯上或發三五粒一塊者皆不吉之兆也急宜涼血解毒以防危急若腮頥地角之間疏疏朗朗淡紅潤澤三四次出者為氣正道尊上吉症也一出皮膚乾燥枯澀必難起壯用溪中白色石子數枚燒紅以井水淬之使薰蒸痘上或置被下薰之頃刻潤澤痘即起發又能解穢一色淡不紅活者血虛也以四物湯加減服之但地黃大能滯血不可輕用不得已須薑汁炒過人乳補血甚捷加酒少許佐之且血非氣不行又加四物於保元之中為陽生隂長之義一痘正出好飲水者此乃脾胃虛弱津液枯涸故也如恣飲則必傷脾泄㵼及發泡難靨之患保元湯加麥冬五味子止之一痘未起壯而頭面先腫者乃隂虛陽盛大下四物湯加人乳好酒服之以補隂與陽齊然陽易補隂難補宜急急勿遲否則誤事一出即變黑者此為惡候如有起興急用託裏解毒之劑少用保元大加紫草紅花服之外用四聖散點之然早能涼血解毒必無此患亦多因脾胃虛弱血熱所致凡紅變白白變黃者生紅變紫紫變黑者死一痘全藉氣勻血活腠理疏通則出快而稀疏亦無餘症倘遇寒凍及勞役瘦弱之人血凝氣滯出則不快蓄於皮膚之間肌肉之上進退兩難日久變成黑紫禍不旋踵凡有此候當按令急與和劑如羌活散之類以疏利之其毒氣隨痘而出庶無變症保合太和之兆也如頭面出不快此太陽經當用荆芥甘草羌活防風天麻湯如胸腹出不快此少陽經當用升麻紫草木通紫蘇羌活湯如四肢出不快當用芍藥紫蘇葛根甘草蔥白連鬚羌活湯各加生薑連進二服痘即出快賊痘凡賊痘與好痘一般但攙先起壯皮嫩嬌軟內係淡膿當用保元湯加占米煎服亦能回漿一出其色掀赤抹過皮軟不礙指此係賊痘過三日變成水泡甚至紫泡黑泡者危症也若未成紫黑宜少進保元大加紫草蟬退紅花解之或燈草木通湯調六一散利去心經藴熱而紅紫自退如已成水泡白泡或灰白色則保元中大下四苓利之此千金妙法也不然則遍身抓破黑爛而死起壯三日證治活法凡四五日來起壯活動一線紅暈而有根窠此為上吉蓋有根窠方見氣勻血活血活則毒化成漿收功結痂全藉此也若無根窠必是氣凝血滯按法速治凡起壯肥滿乳食如常不必服藥一四五日來起壯肥大中有一小孔自頂直下至腳不黑不白與痘色相並此名蛀痘由表虛腠疏而然若不早治大泄元氣不能起發灌膿急用保元湯大加占米川芎肉桂提起內膿以實其孔庶為佳兆三二劑後孔自塞滿若孔色黑乃疔也以疔法治之一頂陷色白皮薄光洞者氣虛也火照內外光明者是大進保元倍加酒炒黃茋肉桂川芎丁香人乳酒漿和服一根窠淡枯澀不澤血虛也宜保元加酒炒紅花川芎當歸芍藥加山查以消參茋之滯再加木香一二分調氣氣調而血自活矣四五日痘色不宜紅紫乃熱毒不化若血熱仍當涼血解毒兼氣虛者保元加紫草木通紅花生地之類解之一地紅血散乃血不附氣保元加當歸大加白芍藥以收斂之蓋芍藥味酸用之為君使血得以附氣且又能活血化漿此最上一乘之法切記切記一泄㵼按寒熱急治至此再不宜㵼若起壯遲緩根腳不紅活者以無價散一歲三釐看大小用之好酒調服或保元加人乳好酒丁香占米山查血虛者加當歸鹿角膠一黑陷及痘疔外用四聖散以油胭脂調點之內以涼血解毒如紫草紅花木通茜根少加保元進之其疔自退疔退看其虛實仍以保元補之一煩躁者內必有熱可用木通以引其火下行或以六一散燈心湯調俟冷服之譫語者加三製辰砂夏月井泉水服如飲食不進看痘色何如未可輕投藥劑蓋其間有毒氣未盡者宜山查紅花子紫草等藥清而解之如脾胃虛弱痘色淡白宜保元加山查扁豆神麯嘔吐加霍香一倒痘頭面上未出從足底出起逆而上之縱起壯灌膿回至心窩下則毒攻入內大叫一聲昏迷而死雖疏快亦不免死乃逆症也候其出齊至頭面遂早丢去下身不治只將保元大加川芎以升提之漸漸使其自上而下起壯灌膿自上而下收斂結痂如常痘一般此鮮有知其妙者宜謹志之此逆痘若治之早以黃連解毒湯一帖以護其心可十全三五遲則百無二三矣翁仲仁曰三日四日痘當出齊點至足心勢方安定猶有陸續不出之狀或隱隱於皮膚之內不見不起者古名不快若非風寒欎遏之因必有氣虛不振之過是以四日已前痘毒方出身表宜涼四日已後毒出已定身宜溫涼則氣血和平痘色必然潤澤溫則腠理開通其毒易以成漿故至此而身不微熱雖未必至於氷伏而痘瘡斷乎不長四五日來血包已成候當肥大而粗頂宜發光而白故根紅而頂白者已具行漿之勢若還赤色過頭雖見嬌紅可愛延綿六日依然到頭空殼虛花皮薄而光亮如燈內含是水頂尖而根腳不紅行漿勿實是以毒熱盛而未解則為紫為黑壅而不起則為陷為􅚥滯而不榮則為乾為枯為青為灰怯而不振則為不快為停漿或有肉先腫脹而痘反不起者漿則滯而不行面已虛浮而痘反退伏者毒則遏而不進故身不熱而痘不起已成氷硬之形赤色若還不變溫之可興氣血弱而不振遂成不快之狀紅潤依然如舊補之可生紫色乾枯切忌溫中帶補只宜活血鬆肌為壅為滯烈藥雖然可發透肌尤是良方溏泄惟於溫補㵼甚佐以升提凡起壯時痘之根腳全然不起其頭面皮肉紅腫如瓜之狀者死起壯時腰腹或疼或止遍身紫點如蚊蚤咬全不起發者死起壯時痘伏陷不起腹中膨脹不能飲食氣促神昏者死略能飲食用消膨藥治之起壯時遍身黑陷悶亂不寧神昏氣潰者死起壯時根窠紫色乾燥不活全然不起發者死頂陷不起須看年夀上痘起則不必憂如年夀上不起急與升天散一二服痘半起忽然平陷而色白者急與內托散或補中益氣湯痘色紅鮮反乾燥而不充肥者此火盛而血不足也宜退火涼血輕清之劑四物快斑湯主之痘充肥而帶濕者此脾中有濕而氣不足也宜㵼濕補氣兼風藥治之蓋風能勝濕也四君快斑湯主之一痘不起發不拘五陷用獨聖散或胡荽酒若黑陷腹脹用豬尾膏一痘乾尅不起者外用水楊湯洗之內服補中益氣湯一起脹時手足見而復隱起而復塌者死此根本已摧枝葉先萎之象也凡假壯之痘其中有數粒起壯者是也至十二三日決不能回漿結靨內攻而死矣白痘者可急進保元加川芎丁香生占米提氣灌膿而愈此內托法也內托散即保元加川芎便是不必千金內托散正壯之時痘雖起發而皮膚不礙手按之水漿就出內色不暗是也灌膿三朝症治活法灌膿時根窠紅潤肥滿如黃蠟色飲食二便如常者上吉不須服藥灌膿時皮白而薄純是清水與水泡相似者三四日後遍身抓破而死灌膿時吐利不止或二便下血乳食不化痘爛無膿者死若二便不下血猶可用止㵼及消食之藥灌膿時二便閉目合聲啞腹中脹滿肌肉黑者死一頂陷無膿為逆火照之內外光洞手按之軟陷者無膿也火照之內暗不光洞按之如鼓者有膿也急用保元加歸芍肉桂木香占米煎成入人乳好酒溫服有一等肥白痘其色白不作膿俗名木痘以其人原有痰也用二陳四物湯合而服之一消一補仍將小麥粉作麵調與食之立時膿起紅活但不可妄投人參占米而助胃中痰火恐防口疳寒戰咬牙乃隂盛陽虛也大用保元加川芎肉桂丁香主之甚者加鹿茸痘灌膿痛不止者氣滯也少用保元加山查木香以行滯氣如膿血已滿可大用四苓以利之而痛自止凡灌膿三朝之內身涼痘灰白色或不進飲食寒氣逆上嘔吐或腹脹或㵼清水手足厥冷無陽症也急用二神加入保元連進數服溫而補之癢塌不止者血盛也少用保元大加何首烏牛蒡子蟬退芍藥木香紅花若將靨時微癢者不必治有氣血虛而癢者十全大補湯加何首烏虛甚者加鹿角膠一發白泡如彈子大者用棗針挑破去水以滑石末敷之仍服保元加白术留皮茯苓以利皮膚之水如前後發紫泡是毒盛溢於皮膚之上必死夫膿者血之化也有血方有膿無血則無膿痘至灌膿大勢已定故此時必以有膿為主有膿則生無膿則死痘至七日若頂陷不能灌膿者必由先失調治故也急看根窠血聚别無雜症速宜大補氣血以充其頂頂滿膿足猶可回生若頂陷而色灰白此氣血俱離無能為矣一頂陷無膿服內托藥而暫起不久又陷者膿未充足故也宜內托散倍加參茋當歸煎和人乳占米好酒服若色灰白欲成倒塌皮薄易破者用淫羊補漿湯保元湯加芎歸升麻人乳好酒一痘色紅紫漿不滿足欲成乾枯黑陷者當歸活血散合解毒湯加升麻石膏乾葛一遍身灌膿忽然一日變白變紅變紫者不可不察白者為虛宜內托散變紅紫為熱宜當歸活血散合解毒湯一痘起壯灌膿俱好至八日大便忽祕常欲去而不能去急用歸尾枳殼芝麻各三錢紫草生地黃芩各一錢煎服即通若失治至靨時忽然發熱而死翁仲仁三仁膏尤妙一頂平腳濶漿不滿足十全大補湯加木香乾薑一遍身無皮膿水流沾衣席不能轉動者用祕傳茶葉方或敗草散內服內托散去桂加荆芥穗一痘發癢滿面抓去而面上瘡痕隱然點點有起發之勢此猶可治急以托裏發毒止癢之藥用內托散加蟬退立驗一痘抓破而出血者此陽瘡出血也宜當歸涼血湯主之一灰白慘黯皮薄擦破無膿血者不治二便不通目閉聲啞腹中脹滿肌肉黎黑者不治一瘡爛無膿吐利不止二便下血乳食不化者不治一痘未起頂但腳漸濶至七八日乾枯瘡皮皺起誤認結痂收靨者多不可救急與補血解毒之劑庶可回生一灌膿時眉心鼻凖耳輪唇口及兩頰先有焦枯黑靨者此名倒陷不治收靨三朝證治活法凡收靨自上而下者順自下而上者逆痘至收靨大勢已定亦有膿不滿足似靨而非真靨者此時極宜明辨若七日之間面目腫雖覺退痘雖似乾而痂薄如紙或有內症未除此痘極險時也失治則凶變立至急以補血涼解之劑庶或轉移一痘至十日血盡毒解其膿漸乾如蒼蠟色或如葡萄色從口鼻兩傍或面部收起至胸腹而下然後頷上與腳背一齊結靨逐漸剝落內症全無身漸輕快飲食二便如常者吉或手足心或手指尖或隂上先收者俱吉一人中者任督二脈交會之衢也凡痘自初出至收靨俱要在此部位先見者佳謂隂陽和暢也一痘收靨自人中平分上下髮際以上陽中之陽也謂之孤陽足膝以下隂中之隂也謂之孤隂孤陽寡隂所以痘瘡之收至此二處每遲留而後靨也不必施治一鼻梁上痘先焦者任是凶逆亦不死一痘當靨而流漿不已者因表散太過則斑爛流水或飲水多則漂蕩流水俱服保元湯加防風白芷白术或除濕湯外以敗草散敷之一當靨不靨而膿充足服回漿散或象牙散一痘有靨至頭或至腰而下身數日不靨者此乃熱毒太盛不能收靨故也治當有熱則清之若小便不利者四苓散加芩連滑石木通大便祕結者當歸解毒湯利之一痘當靨不靨忽然變動灰白頂陷吐㵼腹脹寒戰咬牙者急與內助丹若癢塌氣促足冷者加附子有水泡者大加白术行去惡水而膿自乾矣一血盡漿足溫潤不斂者內虛也保元加苓术以助收斂結痂或六君子湯一當靨不靨發熱譫語目閉口喘手足大亂小水不利者此熱毒乘於肺經無隂氣以收之然也急用清金導赤飲主之一漿未稠濃頂未飽滿面腫忽退目閉忽開瘡腳散濶色白皮皺乾燥似靨非靨此因津液枯竭血氣虛少內證未除之故此症之極險者也急用四君子加麥門冬牛蒡子荆芥連翹桔梗救之若誤認作結痂無事致成危殆悲哉一膿後不能結痂反成腐爛和皮脫去者此倒靨也係中氣不足急用保元湯加當歸牛蒡連翹薄桂木香治之其頭面瘡已破者復加腫灌手足遍身原無瘡處又復出一層謂之補空若治之頭面不腫空處不補不旋踵而告變矣一收靨時忽泄膿血痂皮者此亦倒靨之症乃脾強腎弱為順利盡自愈不必施治如利下水穀不分者此腎強脾弱也急用陳氏木香散送下豆蔲丸一痘因冬月嚴寒被寒氣欎遏而不能靨者以桂枝解毒湯治之一痘因夏月炎暑熱氣薰蒸而不能靨者甘露解毒湯微利之一遍身俱收惟頭與足不收者此隂陽不和故也以四物湯去地黃加牛膝升麻牛蒡紅花荆芥之類一多服熱藥以致熱毒猖狂痘爛不靨者小柴胡湯合回漿散或天水散或豬尾膏外以黃連輕粉為末桕油調敷或用豬膽汁研芒硝如膏塗之古人用豬尾膏獲效神速者蓋以熱毒藴併於心經致熱毒內外灌注而不結痂用此方者以血歸心引龍腦以涼之而行營衛况營衛得香則行遇臭則止也一收靨時有臭氣帶腥者佳全無氣息尚有餘毒未發也若臭氣如爛肉不可近雖似結痂未可為真急以清熱活血緩則無濟一瘡欲收而唇口乾紫連結渣滓頰紅者將成肺癰也宜解毒湯麥冬知母百合甚則大連翹飲一凡痘係危症氣血本虛多服補劑而漸有膿色將收靨雖有熱者只可於補劑中加涼藥可也若謂將靨而去補劑竟與涼藥更加下利藥欲令速靨是速其斃也蓋虛者復虛毒反內攻而死此必然之理又已然之驗也逆症不治痘當靨遍身未見青膿黃色之漿而口唇上下痘先黃熟者毒氣內攻於脾也不治一痘收靨時不喫飲食口唇常如食物而動不止者不治落痂症及靨後餘症一痘瘡收後痂厚落遲離肉不粘者吉一痂落疤帶紅色而不凹凸更無他症飲食二便如常者吉一自食痘痂者雖有他症不死一痘已結痂而不焦落者餘熱為害也大連翹飲去紫草加地骨皮一痘痂至半月或一月不落或發癢者此因表發太過致肌肉不密無力收斂故也宜人參固肌湯一痂不落反見昏迷沉睡不省人事者此脾胃大虛也宜人參清神湯一痂雖乾好但半邉掀起半邉粘著不能脫落者此過用辛熱之藥熱留肌表也宜升麻葛根湯加防風荆芥蟬退連翹以去肌表之熱即落矣一疤紅紫者乃血熱毒盛也當涼血解毒一疤白者血不足也不治雖過四十日還死此因漿水淡故疤白急用保元湯合四物湯加白术陳皮紅花老米一痂後身熱不退或寒熱往來用小柴胡湯虛則補中益氣湯俱加黃芩一痂後唇乾口渴熱甚不解者大連翹飲主之一痂後虛煩不眠者竹葉石膏湯煩渴譫語者辰砂益元散一痂後口噤殭直腹痛繞臍冷汗如雨痛定汗止而脈弦緊者因疤受風寒也宜散風養血用鈎藤湯加紅花木香川芎芍藥當歸甘草白术青皮官桂生薑一痂落肌肉尚嫩出見風早遂成瘢癬有膿汁出者燒牛糞灰敷之痂不落撏掐抓搔致成痘風瘡者宜消毒飲加苦參當歸外用金華散或乳香韶粉散遺毒生瘡不已者活血當歸湯宜灸風池曲池三里則永不發一痂後遍身青紫瘈瘲口噤痰響者由氣血虛弱而受不正之氣也用蟬退一錢薑汁薄荷汁入酒一盞調服得汗即愈一痂後手足忽然拘攣不能屈伸轉動者由血少不能養筋或因風寒濕三氣使之然耳不可輕用發散反耗其血只補脾養血則瘳當歸桂枝湯治之一痂後赤火丹毒惡候也從頭上起者過心即死從足下起者過心腎即死內服玄參化毒湯一痂後牙齦生瘡時時出血謂之牙宣呼吸息謂之息露此走馬疳也由熱在陽明急用蠶退散敷之如唇腫面浮穿鼻破頰潰喉腐肉飲食不入者死一痂後發癮者皮膚間隱隱起成疙瘩此由毒氣未得發盡藏於皮膚或發癢搔之而成者或因受風風火相持而成者此吉兆也欲發出無使停留以變他疾如發太甚不已者內服防風葛根湯外用蜆子水洗之如無用六一散拂拭之一痂後兩目不開惡見明者謂之羞明惟向暗處敢開也涼肝眀目散主之若暗中亦不敢開者此即防目中有瘡以望月沙散治之赤水元珠卷二十七上欽定四庫全書赤水元珠卷二十七下明孫一奎撰原痘發五藏之故痘分五藏以辨順險逆三候向未有明言其故者瑣言論之而其理乃悉蓋痘為胎毒原於父母絪藴之氣藏於命門遇感而發未有不自腎而出者苐父母之施受有純駁則所藴之氣有清濁氣有清濁則發有緩暴緩暴之間藏象見而順險逆呈焉矣緩者必其氣清氣清則毒輕一任氣領血載徐徐而來觸發於藴藏之地漸而升於脾絡自脾而行於肝次第而至於心肺上乘之地乃始分布於外熱故得以和緩越三日而見標漸漸而出先於頭面次及於身以至四體貫漿結痂亦自上而下所以謂心肺之痘為上氣之濁者其毒湧盛遇有感觸非若清者之從容緩布也一出本位燔熱燥渴經於脾絡一及於肝毒其莫禦非領毒之氣受壅即載毒之血被灼所以熱不三日而即見不暇論其形色各症苐驗筋抽脈惕之象而證已非輕矣所以肝經之痘為險有未及乎肝而於脾即發者勢尤猛烈一出本位毒即猖狂氣血俱受其困凡通藏府無不見其凶象苐驗其腹痛唇焦其餘症自惡矣此險中帶逆者也若濁之極者一觸其竅熱如炮烈未及離乎本位毒即肆虐并亦不容分布氣受其錮血受其瘀凡通腎藏之地無不聽其攻擊即如腰如被杖屈不能伸卜其喪無日矣要知五藏見症皆出於腎苐腎為稟受之地諸藏為分布之所緩急關生死之界緩一步則毒輕一步緩而至於心緩之至者肺則次之故心肺為順肝則界於緩急之間故為險於脾則急矣腎則急而更急若迅雷之不及掩耳故為逆然則腎痘之不救以人力之不及施也若謂腎不受毒諸藏獨可以受毒乎更有變黑歸腎之説謂黑為腎色然則赤當歸心青當歸肝黃白當歸脾肺赤白黃痘固宜有之色青獨非所忌乎何獨慮腎而不及肝耶總以血瘀則黑血為毒瘀其毒自不可解豈有變黑歸腎之理有因虛而不起者必其兼毒盛者也毒得其輕雖虛何害毒若猖狂氣血成何用哉苕上陳氏家傳順逆二十四痘形粗珠子痘痘如巨明珠樣尖圓光潤根窠紅活順候也或痘雖順四五日不易長大補中益氣湯治之六七日不易成漿保元湯治之或以順而不以升發解毒痂後或害目或癰毒或毒痢不可不慎也細珠子痘珠如小明珠樣尖圎光潤根窠紅活順候也不可見其細小而妄以毒物發之以至真元外耗或致漿清癢塌或潰爛難痂之患慎之慎之水白痘痘頂白色根無紅盤或淡紅盤血附也小綻有神屬肺經獨無紅盤而妄斷為逆非也然有平塌灰白氣虛也而無紅盤者根血不附血虛也凶症也黑大痘一名黑痘根紅而頂黑色尖綻有神順候也此痘萬中有一人皆罕見然有渾身黑點而枯悴此乃氣弱不畜血血亦有為之不榮故枯悴而黑不可不辨赤小痘根頂俱赤細小堅硬起脹而略見漿影即痂順候也初見時宜以疏解散清之使肌表通暢無壅滯之患疏解散陳皮川芎牛蒡防風蘇梗甘草升麻蟬退生薑九焦痘報點周時即痂復又報點如是九番故名九焦痘治法同赤小痘散茱萸痘散稀也形如茱萸故俗名之非正論也四圍起而中心陷落者是也乃元氣不足不能續其後來而然也血雖有附氣之功氣弱而無制毒之力以致陷而不滿當以保元湯助氣血為主氣充漿滿自然綻矣否則必有內虛癢塌之患石屑茱萸痘郛郭顆粒硬小者是也此乃氣血足表裏實順也大痘髙大而飽滿者是也雖光潔有神氣恐兒小不能充其漿足當以保元湯倍加參蓍治之若漿足難收當以芍藥湯之然亦有過發以致濶大不可不知也茱萸紋痘頂上有紋路如茱萸樣是也經云茱萸紋起定空漿宜保元湯主之若失治必有漿清癢塌之患梅花痘初報點時五六成叢或六七成叢百餘處者是也起根發脹連成一個平塌有贈痘如珠光澤者吉贈痘平塌枯滯者凶薄殼茱萸痘皮薄色嫩腳軟者是也宜大劑保元湯益之然皮薄者必破損若破而堆聚成靨復脹灌者吉若破而乾黑反加寒戰咬牙悶亂者凶也瓦灰色茱萸痘色如瓦灰此乃氣分虛弱以致毒乘陽位也若腳斂血附者補中益氣湯治之可生腳塌血散者乃氣離血散不治之症也紫眼茱萸痘陷中有一點黑滯是也此乃毒乘氣位宜保元湯加牛蒡子之屬主之正氣盛而邪自退此症有吉有凶踈者吉而密者凶也夾癍痘空處有雲頭紅色見者治法見夾斑痘論夾疹痘空處有細密頭粒者有吉有凶只將正痘斷之方見夾疹痘論晃痘晃明也痘亦粗肥附血但嬌紅嫩艷必不能結實不可因其好看而妄斷為吉以取人之怨也板痘亦名延日痘起脹而痘肉齊平雖有黃漿其色必紫滯逆也臨證必觀兒之長大幼小以期之驗潘子十二歲而種此痘三七而亡俞子二十三而患此痘痂俱盡脫氣血漸竭五七而亡水華痘或問痘有水華之名何也曰因兒常往水邉受其水氣乘於肌表值時行痘因而感發見點如水泡一二日間泡破水去乃邪散表清而後報點乃正痘也治從痘例蛀痘頂有一小孔是也乃湊理不密之故宜保元湯倍加黃蓍治之失治則正氣漸耗必有癢塌之患白悶痘悶者伏而不出也毒乘氣分故報點白頭如㾦以漸乾枯內攻三四日而亡或有因風寒內壅閉腠理而致毒伏不得外出不可不辨也紫悶痘毒乘血分報點如丹變紫黑而五六日死或有因內傷而氣血滯故伏而不出宜消化可也或有因氣血弱不能宣發伏而不出宜補中益氣湯加芍藥蟬蛻主之應藥者生緊悶痘悶痘因毒火彌熾煎熬肺腑壅閉氣道銷爍榮分蓋毒必血載而出外血受傷不能任載而出故悶也若毒乘肺喘急而鼻中流血乘肝眼中流血入小腸小便血入大腸大便來血入腎則腰疼而耳內流血悶痘之惡二三日間而死古無治法皆因毒勢甚榮衛祕塞毒伏在內禍不勝言水痘點如水晶珠者是也雖與正痘相以但其形歪斜亦灌漿成痂亦有稠密而面麻者總不在正痘數此脾肺二經受濕搏於肌表之間也初起芎蘇散主之行漿化毒湯主之化毒湯防風加荆芥山連翹不牛蒡加甘草熱盛黃芩巵易斂芍藥瑣言十五種怪痘狀象治法逰蠶是痘貫珠成條其形似蠶故名逰𧖟有稀密有長短身上者輕頭面者重身上短而稀所見無多者輕長而密更繁多者重重則必攻令鬆透如一赤豆莢其毒方起雁行雁行者狀似逰蠶但曲而甚長以其排行而若雁字也單見者亦重不一者更重矣攻之鬆若逰蠶而毒化矣疊錢是痘圓圎攢簇絶不成點錢許之大故名之也僅見一二者輕多見者重重則必攻以藥胭脂膏封貼更和豬尾膏大桑蟲於劑內透之令毒如蒸餅其勢方透蟢窩蟢窩者較疊錢而更大也另别其名者其形大其毒亦更重也即屈指無多毒已不淺攻之自不容已佐以大桑蟲豬尾膏外亦以藥胭脂貼之得鬆泛平擡方可成膿鼠迹是痘或四五粒或六七點相簇如鼠迹故以此名無多者輕見於周身者重重則必攻令相併成泡其毒方鬆劑內調入化毒丹并豬尾膏薸沙薸沙者其痘扁濶歪斜無頂無盤有細點如沙攢簇於囊宛似薸沙而名之也可以數紀者輕遍及者重重則必攻務令髙擡如芡實殼其毒才化而成漿鳥迹鳥迹者連串三條頭簇腳開其痘若鳥之迹也單見者輕五六處者重重者必攻亦如逰蠶鬆透為凖蟹爪蟹爪者貫珠連串粒細一粒尖稍有隱隱黑絲如髮竟與蟹爪無異無幾者輕繁多者重重則必攻其形統脹成條而毒盡泄矣珠殼珠殼者其痘有頂而平四圍貼附一細圈宛如珠殼無多者輕及於周身者重重者必攻務令圓滿綻突其毒乃透螺疔其毒頭大根尖頂黑形若螺肉深入肉裏有大小有深淺按其四圍板硬治法見於餘毒若放點時而即見者最惡先以挑鬆即將應服之藥大人含於口中吮其數次隨用貼法蛇皮叢簇成片散漫無拘形似蛇皮而名之也見此不治或見點之初燈下照之隱隱簇簇細密無倫將形未形之際即便攻之佐以豬尾膏破之不使其成庶可有為履底履底者形似蛇皮不若蛇皮散漫耳隨處皆凶其形得小更得早圖庶可有為速以豬尾膏和入攻毒劑內并大桑蟲透之急以藥胭脂膏封貼令得膿水淋漓方能慶生燕窩是痘攢簇纍纍象似燕窩而名者也單見尚重見而不一者不治急攻之務令鬆擡如餅其毒方化以油胭脂調入化毒丹用綿紙攤貼更佐以豬尾膏大桑蟲紫背癍之形似萍其色似萍之背紫而帶黯有大有小目之有點手按無形無幾便重繁多者莫救亟宜攻毒破瘀務令漸淡淡而退去方可回生必須早圖環珠是痘連串環繞故以是名有臂因鐲阻痘即如鐲而繞者有項以圈繫痘即如圈而聚者於臂稍輕於項則重因阻猶重無因更重不特頂臂為然頭身亦有之凡見宜攻痘不問疏密總以勻朗散布為佳其有連貫攢簇者皆由梟毒衝突氣血不能駕馭而然頑而不鬆伏而不透猶賊之有巨魁也此之不治諸痘皆為抗拒巨魁授首前途自可倒戈其可習而不察或委絶棄絶乎狀其名象詳其治法以為燮理者助赤水元珠卷二十七下
