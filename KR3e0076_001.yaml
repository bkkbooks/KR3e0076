body:
  text: 赤水元珠卷一明孫一奎撰風門明風篇生生子曰風春之令氣也木之所司肝為之主素問六化篇云木之化風主於春春之為言蠢也陽氣蠢動故風所以皷舞萬物為天號令岐伯曰東方生風風生木其臓為肝其志為怒故怒傷肝風傷肝肝為足厥隂之經以六氣言之自十二月大寒節起至二月春分節止是初之氣厥隂風木用事人有感其令氣者為傷風其有不即發於令氣而四時亦有傷風之症者時人謂之四時感冐感有淺深治有緩急令既不同治亦有異故首述經文以明風之體有所據而人天咸一之理實寓焉後别治法以見風之變症無常非簡約可盡先賢有言曰風乃百病之長善行而數變非易言也信夫傷風仲景傷寒論謂有汗惡風脉浮數為傷風外有六經之形症太陽症頭項痛腰脊強以桂枝湯治之後若𫝊經當究仲景節菴治法治之其餘不過感冐耳四時皆有之以後法按治九味羌活湯治四時傷寒傷風頭痛遍身盡痛腰脊強發熱晝夜不散不思飲食羌活防風川芎白芷細辛柴胡黄芩生地甘草蒼术薑三片棗一枚水煎熱服如惡心减黄芩如有汗加白术减蒼术如口渇加知母石膏如一二帖不觧或天寒時月加麻黄如鼻塞加紫蘇葱白夫此方予每用加柴胡乃總治傷風各經之活套也今人只知其治四時傷寒如神不知加柴胡總治各經之妙盖羌活治太陽肢節痛大無不通小無不入乃撥亂反正之主也防風治一身盡痛聽君將命令而行隨所引而至柴胡治少陽頭疼在兩頭角及寒熱脇痛耳聾白芷治陽明頭痛在額蒼术䧺壯能除足太隂經濕氣使邪不得傳脾生地黄治手少隂心熱在内黄芩治手太隂肺熱在胸細辛治足少隂腎經苦頭痛不已川芎治足厥隂頭痛在腦此方乃易老所製凢見表証悉宜服之不犯三陽禁忌實觧利之神藥也然以一藥而類治各經之証苟用其方而不知其所以立方之意則未免有執一之弊故述各藥主治本㫖使學者詳各經之症孰重以本經之藥為君迭為賔主則所治無不响應和觧散治傷風鼻塞咳𠻳胸脇吊痛發熱口渇紫蘇杏仁陳皮半夏前胡薄荷葛根甘草炙桔梗桑白皮薑三片葱白三根棗子一枚風邪重加防風桂枝湯治太陽頭項痛腰脊強自汗桂枝赤芍甘草炙薑三片棗二枚煎服取㣲汗此冬月即病宜服春分後忌之小便數及飲酒人皆不宜服飲酒人不喜甘恐中滿而嘔也参蘇飲治傷風鼻塞發熱惡心有痰胸膈不利橘紅枳殻桔梗粉草炙各一錢木香一分蘇葉半夏乾葛前胡人参茯苓各八分薑三片棗一枚咳𠻳甚者去人参木香熱盛喉疼除半夏加天花粉酒芩熱傷風咳𠻳喉疼面熱此素有痰火欝熱在内熱極生風或為風寒所束不得發越此熱為本寒為標治宜清熱散寒經云火欝則發之又曰風寒外束者可發二陳湯加桔梗天花粉𤣥参薄荷酒芩前胡𠻳不轉加𤓰蔞仁夜𠻳多加知母喉疼减半夏痰盛加貝母枳殻肺熱氣壅輕則加桑白皮地骨皮重則加石膏肺氣虚發熱咳𠻳服前發散藥其𠻳愈甚或被發散太過當用收歛之劑補之日間𠻳多吐白痰沫或惡心者為氣虚六君子湯加五味子薏苡仁欵冬夜𠻳多口渇痰不易出發熱為血虚四物湯加知母五味子馬兠鈴麥門冬𤓰蔞仁肺氣實或素有痰為風寒所閉鼻塞咳𠻳氣壅不得倒頭而卧三抝湯麻黄連根節甘草生用杏仁不去皮尖薑三片棗二枚煎服取清痰乃止火盛者瀉白散加石膏枳殻天花粉前胡效遲加𤣥明粉一錢調下立應中風内經云風之傷人也或為寒中或為熱中有中血脉有中腑有中臓東垣云中血脉者口眼喎斜中腑者肢節廢面加五色有表証拘急不仁中臓者唇緩失音鼻塞耳聾眼瞀便閉性命危急此三者治各不同如中血脉外有六經之形症則從小續命湯加减及踈風湯治之如中腑内有便溺之阻隔宜三化湯局方中麻仁丸通利之外無六經之證内無便溺之阻宜大羌活愈風湯秦艽湯中臓痰涎昏冐宜至寳丹之類鎮墜之綱目云中風世俗之稱也其證卒然仆倒口眼喎斜半身不遂或舌強不言唇吻不收是也然名各有不同卒然仆倒者經稱為撃仆世又稱為卒中乃初中風時其狀又如此也其口眼喎斜半身不遂者經稱為偏枯世又稱為左癱右瘓及腲腿風乃中倒後之症邪之淺者狀如此也其舌強不言唇吻不收者經稱為痱病世又稱為風懿風氣亦中倒後症邪之深者狀如此也東垣以中脉中腑邪淺而易治中臓為邪深而難治者得之矣凢病偏枯必先仆倒故内經連名稱為撃仆偏枯也後世迷失經意以偏枯為痱病之㫖一以中風名之遂指偏枯為枯細之枯而非左癱右瘓之症習俗之弊至於如此也殊不知仲景云骨傷則痿名曰枯盖痿緩不收則筋骨氣肉無氣以生脉道不利手足不禀水糓之氣故曰枯非細之謂也積日累月漸成細者間有之非可便指枯為細也此枯字即枯稿之枯初中倒時隨即醒者宜治若不醒者宜搯人中俾醒看痰涎壅盛宜吐之口噤亦吐之若口開手撒遺尿者為陽暴絶速宜大料参茋補接之若眼戴上者宜灸之𤣥珠經云風病口開手撒眼合遺尿鼻聲如鼾者五臓氣絶也盖口開者心絶手撒者脾絶眼合者肝絶遺尿者腎絶聲如鼾者肺絶也若見一猶可用工若面赤時黒主陽上散腎水反尅心火兼遺尿口開氣喘斷不救也按已上皆真中風症也由人元氣素虚腠理踈豁衞弱失䕶一遇風邪莫之能禦經曰邪之所凑其氣必虚救醒後多用驟補法丹溪獨参膏加竹􅅹薑汁之類與類中風症不同法也附方小續命湯麻黄去節人参黄芩芍藥防已川芎杏仁甘草桂各一兩附子五錢防風一兩五錢每服五七錢加生薑五片水煎食前熱服金匱要畧有石膏當歸無附子大凢中風不審六經之加减雖治之不能去其邪也内經云開則淅然寒閉則熱而悶知暴中風邪宜先以加减續命湯隨症治之中風無汗惡寒麻黄續命主之依本方麻黄防風杏仁合各加一倍宜針至隂足小指外側爪甲角針入二分出血崑崙足外踝後跟骨舉蹻取之中風有汗惡風桂枝續命主之依本方芍藥桂枝杏仁各加一倍宜針風府項後入髮際一寸針七分禁灸上二證皆太陽經中風也中風有汗身熱不惡寒白虎續命主之依本方甘草加一倍外加石膏知母各二兩中風有汗身熱不惡風葛根續命主之依本方桂枝黄芩各加一倍外加乾葛二兩宜針陷谷足大指次指間本節後陷中針五分去陽明之賊刺厲兊在足大指次指去爪甲如韭葉瀉陽明之實上二證皆陽明經中風中風無汗身凉附子續命主之依本方附子加一倍甘草加三兩外加乾薑二兩宜刺隠白足大指内側衣甲角去太隂之賊此太隂經中風也中風有汗無熱桂枝續命主之依本方桂枝附子甘草各加一倍宜針太谿足内踝后根骨上䧟中動脉應手針過崑崙此少隂經中風也中風六經混淆繋之於少陽厥隂或肢節攣痛或麻木不仁宜羌活連翹續命主之小續命八兩外加羗活四兩連翹用六兩古之續命混淆無症之别今各分經治療又分經鍼刺法厥隂之井大敦足大指甲後一韭葉聚毛間刺以通其經少陽之經絶骨外踝上三寸灸五壯灸以引其熱是鍼灸同象法治之大體防風通聖散防風川芎當歸芍藥大黄芒硝連翹麻黄去節薄荷山梔白术荆芥各五錢石膏桔梗黄芩各一兩滑石甘草各二兩每服一兩加生薑水煎服中風外無六經之形證内無便溺之阻隔知血弱不能飬筋故手足不能運動舌強不能言語宜飬血而筋自榮大秦艽湯主之泰艽三兩甘草川芎當歸白芍石膏各二兩細辛五錢羗活防風黄芩白芷白术生地熟地白茯苓各一兩川獨活二兩右十六味剉每服一兩水煎温服無時如遇天隂加生薑如心下痞每兩加枳實一錢同煎中風外有六經之形證先以加减續命湯隨症治之内有便溺之阻隔復以三化湯主之厚朴大黄枳實𦍑活各等分右剉如麻豆大每服三兩水三升煎至一升半終日服之以㣲利為度無時法曰四肢不禁俗曰癱瘓故經所謂太過則令四肢不禁又曰土太過則敦阜阜髙也敦厚也既厚而又髙則令除去此真所謂膏粱之疾非肝腎經虚也何以明之經所謂三陽三隂發病為偏枯痿易四肢不禁王注曰三隂不足則發偏枯三陽有餘則痿易易為變易嘗用而痿弱無力也其治則瀉令氣弱陽衰土平而愈或三化湯調胃承氣湯選而用之若脾虚則不用也經所謂土不及則卑䧟卑下也䧟坑也故脾病四肢不用四肢皆稟氣於胃而不能至經必因於脾乃得禀受也今脾不能與胃行其津液四肢不得禀水穀氣氣以日衰脉道不行筋骨肌肉皆無氣以生故不用焉其治可補十全散加减四物去邪留正愈風湯中風症内邪已除外邪已盡當服此藥以行導諸經久服大風悉除縦有㣲邪只従此藥加减治之然治病之法不可失其通塞或一氣之㣲汗或一旬之通利如此為常治之法也久則清濁自分榮衞自和如初覺風動服此不致倒仆羌活甘草防風川芎細辛枳殻人参麻黄甘菊薄荷當歸知母黄茋柴胡前胡半夏厚朴各二兩生地四兩熟地防已茯苓黄芩白芷蔓荆子枸杞地骨皮各二兩石膏蒼术各四兩桂一兩芍藥三兩獨活杜仲各二兩右剉每服一兩水二鍾煎至一鍾温服如遇天隂加生薑空心一服臨卧再煎渣服俱要食逺空心一服嚥下二丹丸為之重劑臨卧一服嚥下四白丹為之輕劑是動以安神静以清肺假令一氣之㣲汗用愈風湯三兩加麻黄一兩均作四服每服加生薑五片空心以粥投之得㣲汗則佳如一旬之通利用愈風三兩大黄一兩亦均作四服如前煎臨卧服得利則妙常服之藥不可少四時之輔如望春大寒後加半夏柴胡人参各二兩木通四兩此迎而奪少陽之氣也望夏之月加石膏黄芩知母各二兩此迎而奪陽明之氣也季夏之月加防已白术茯苓各二兩勝脾土之濕也初秋大暑之後加厚朴二兩藿香二兩桂一兩木通二兩此迎而奪太隂之氣也霜降之後望冬加附子一兩桂一兩當歸二兩勝少隂之氣也得春减冬所加藥四時類此雖立法於四時之加減更宜臨病之際審病之虚實寒熱土地之宜邪氣之多少此藥具七情六慾四氣無使五臟偏勝不動於榮衛如風秘服之則永不燥結如久㵼服之則能自調初覺風氣便服此藥及新方中天麻丸各一料相為表裏治未病之聖藥也及已病者更宜當服無問男婦及小兒驚癎抽搐急慢驚風等病服之神效如觧利四時傷風隨四時加减法又療脾腎虚筋弱言語難精神昏憒及治内弱風濕内弱者乃風熱火亢體重者乃風濕土餘内弱之為病或一臂肢體偏枯或肥而半身不遂或恐而健忘喜以多思故思忘之道皆情不足也是以心亂則百病生於心静則萬病悉去故此藥能安心飬神調隂陽無偏勝及不動榮衞四白丹能清肺氣飬魄謂中風者多昏昧氣不清利也白术茯苓人参砂仁防風川芎各五錢白芷一兩知母細辛各二錢羌活獨活薄荷各二錢半白􅀈一錢半甘草香附炒各五錢甜竹葉三兩麝一字龍腦五分牛黄五分藿香一錢半右藥二十味計八兩六錢三字為細末煉蜜為丸毎兩作十丸臨卧嚼一丸分五七次嚼之上清肺氣下强骨髄二丹丸治健忘飬神定志和血内安心神外華腠理丹参兩半丹砂五錢為衣逺志五錢茯神一兩人参五錢菖蒲五錢熟地一兩半天門冬一兩半麥冬一兩甘草五錢右為細末煉蜜丸桐子大每服五十丸至百丸空心食前常服安神定志一藥清肺一藥安神故清中清者歸肺以助其真清中濁者堅強骨髄血中之清榮飬於神血中之濁者華榮腠理如素有痰久病中風津液湧溢在胸中氣所不利用獨聖散吐之後用利氣瀉火之劑瀉青丸治中風自汗昏冐發熱不惡寒不能安卧此是風熱煩躁方在火門天麻丸行榮衞壯筋骨天麻六兩酒浸三日牛膝六兩酒浸三日杜仲炒去絲萆􅐺六兩另研𤣥參六兩當歸十兩生地一斤羌活十兩附子一兩右為末煉蜜丸桐子大常服五七十丸病大至百丸空心食前温酒或白湯下平眀服藥至日髙飢則止藥大忌壅塞失於通利故服藥半月稍覺壅㣲以七宣丸輕踈之使藥再為用也牛膝萆薢治筋骨杜仲使筋骨相著天麻羌活和風之聖藥當歸地黄飬血能和榮衛𤣥参主用附子佐之行經藥也抱拙子曰按中風之證卒然倒仆口眼喎斜半身不遂或舌強不語唇吻不收是也然名各不同有曰風癔以心悶閉不能言喉中噫噫作聲葢肺氣入心則能言邪中心肺痰涎潮塞故使然也有曰風痱者以風涎散注於關節氣不能行故使四肢不遂也有曰舌強不語者以風入心脾二經心之别脉系於舌本脾之脉俠咽連舌本散舌下今風涎入其經絡故舌不轉而不能言也有曰四肢拘攣者以風冷邪氣入於肝臓使諸經攣急屈而不伸也有曰風柔者以風熱邪氣入於肝臓使諸經弛張緩而不收也有曰風顫者以風入肝經上氣不守正位故使頭招靣揺手足顫掉也有曰風瘖者以風冷之氣客於中滯而不能發故使口禁不能言也與前涎塞心肺同候此以口噤為異耳要畧曰風之為病當半身不遂經絡空虚賊邪不瀉或左或右邪氣反緩正氣則急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於府即不識人邪入於藏即難言口吐涎已上所論皆言風従外入也劉守真曰風病多因熱甚俗云風者言末而忘其本也所以中風有癱瘓者非謂肝風實甚而卒中之也亦非外中於風良由將息失宜而心火暴甚腎水虚衰不能制之則隂虚陽實而熱氣拂欝心神昏冐筋骨不用而卒倒無知也張絜古曰人之氣以天地之疾風名之故中風者非外來風邪乃本氣自病也凢人年逾四旬氣衰者多有此疾壯歳之時無有也若肥盛之人則間有之亦是形盛氣衰故如此治法和臓腑通經絡便是治風李東垣之說與絜古同朱彦脩曰西北氣寒為風所中者誠有之東南氣温地濕有風病者非風也皆濕生痰痰生熱熱生風也已上所論皆言風従内出也夫自古論中風者悉主於外感而劉張諸子則主於内傷今詳此病葢因先傷於内而後感於外相兼成病者也但有標本輕重不同耳假如百病皆有因有證因則為本證則為標古人論中風者言其証也諸子論中風者言其因也豈可以中風一證岐而為二哉故古人所論外感風邪者未必不由本體虚弱榮衛失調之所致諸子所論火盛氣虚濕痰者未必絶無風邪外侵之所作若無風邪外侵則因火因氣因濕各為他證豈有暴仆暴瘖口眼喎斜手足不遂舌廢不用昏不識人之候乎治法外感重者宜先祛外邪而後補中氣内傷重者宜先補正氣而後攻外邪或以散風藥為君而補虚藥為佐使或以補虚藥為君而散風藥為佐使全在活法量標輕重而治之凢中風證内邪已除外邪已盡當服愈風湯以行導諸經久服大風悉去縦有㣲邪只従此藥加减葢能和榮衛踈經絡有補氣飬血之功祛濕消痰之效踈而不耗補而不治不燥不寒誠觀左右之輕重上下之緩急酌而用之無不克濟按中風五臓亦顯外證目瞀者中於肝舌不能言者中於心唇緩便秘者中於脾鼻塞者中於肺耳聾者中於腎此五者病深為難治但風中腑者多兼中臓如左關脉浮弦面目青左脇偏痛筋脉拘急目瞤頭眩手足不收坐踞不得此中膽兼中肝也用犀角散之類如左寸脉浮洪面赤汗多惡風心神顛倒悚悸恍惚言語蹇澁舌強口乾此中小腸兼中心也用麻黄散之類如右關脉浮緩或浮大面唇黄汗多惡風口喎語澁身重嗜卧肌肉不仁腹脹不食此中胃兼中脾也用防風散之類如右寸脉浮澁而短面白鼻流清涕多喘胸中冐悶短氣自汗聲嘶四肢痿弱此中大腸兼中肺也用五味子湯之類如兩尺脉浮滑面目黒黧腰脊痛引小腹不能俛仰兩耳鳴骨節痛足痿善恐此中膀胱兼中腎也用獨活散之類此皆言真中風也而有氣血之分焉氣虚而中者由元氣虚而賊風襲之則右手足不仁用六君子加鈎藤薑汁竹􅅹血虚而中者由隂血虚而賊風襲之則左手足不仁用四物湯加鈎藤竹􅅹薑汁氣血俱虚而中者則左右手足皆不仁矣用八珍湯加鈎藤竹􅅹薑汁其與中風相類者則有中寒中暑中濕中火中氣食厥勞傷房勞等證中於寒者謂冬月卒中寒氣昏昧口噤肢攣惡寒脉浮𦂳用麻黄桂枝理中湯之類中於暑者謂夏月卒冐炎暑昏冐痿厥吐瀉喘滿用十味香茹飲之類中於濕者丹溪所謂東南之人多因濕土生痰痰生熱熱生風也用清燥湯之類加竹􅅹薑汁中於火者河間所謂非肝木之風内中六滛之邪外侵良由五志過極火盛水衰熱氣拂欝昏冐而卒仆也用六味丸四君子獨参湯之類内有恚怒傷肝火動炎上者用柴胡湯之類中於氣者由七情過極氣厥昏昧或牙關𦂳急用蘇合香丸之類誤作風治者死食厥者過於飲食胃氣自傷不能運化故昏昧也用六君子加木香勞傷者過於勞役元氣虚耗不任風寒故昏冐也用補中益氣湯房勞者因腎虚精耗氣不歸原故昏冐也用六味丸此皆類中風者也邪之所凑其氣必虚故風之傷人雖云臓腑俱受而肺肝二經居多葢風邪之入先於皮毛之虚皮毛受邪則内客於肺肺主氣肺邪既盛則氣必上逆所以有痰涎壅塞昏暈倒仆之狀肝主筋属木與風其氣相感以類相従故風邪乗虚肝經受之則筋緩不榮或筋縮不舒所以有手足拘攣或四肢癱瘓之狀治風之法初得病即當順氣及日久即當活血此萬古不易之理葢風病未免有痰治痰先治氣氣順則痰清治風先活血血行風自滅順氣和血斯得病情若光不順氣便用烏附又不養血徒用麻防未見有愈者也内經治口眼喎斜多属足陽明筋病葢足陽明筋結頰上得寒則急得熱則弛左寒右熱則左頰筋急牽引右之弛者而喎向左也右寒左熱則右頰筋急牽引左之弛者而喎向左也故其治法以火灸且為之膏油熨其急者以白酒調和桂末塗其弛者後人用酒煮桂取汁以故布浸搨病上左喎斜搨右右喎斜搨左即内經用酒桂塗法也人之一身經絡貫串謂之脉脉者血之隧道也血随氣行周流不停筋者周布四肢百節聫絡而束縛之此属肝木得血以飬之則和柔而不拘急脉皆起於手足指端故十二經皆以手足而名筋則無處無之皮毛者属肺主外而易於感冐人身之血内行於脉絡而外充於皮毛渗透肌肉滋飬筋骨故百體平和運動無碍若氣滯則血滯氣逆則血逆得熱則瘀濁得寒則凝泣衰耗則順行不周渗透不徧而外邪易侵矣津液者血之餘行乎脉外流通一身如天之清露若血濁氣滯則凝聚而為痰痰乃津液之變徧身上下無處不到津液生於脾胃水糓所成濁則為痰故痰中於脾土也是以古人論中風偏枯麻木等証以血虚瘀血痰飲為言是論其致病之源至其得病則必有所感觸或因風或因寒或因濕或因酒或因七情或勞役房勞汗出因感風寒濕氣遂成此病此血病痰病為本而外邪為標其邪中於皮毛肌肉則不知痛痒麻木不仁如有物一重貼於其上或如䖝逰行或洒洒寒慓遇熱則或痒遇隂雨則沉重酸痛其邪入於血脉經絡則手足指掌肩背腰膝重硬不遂難於屈伸舉動或走注疼痛此上諸症皆外自皮毛以至筋骨之病凢脉所經所絡筋所㑹所結血氣津液所行之處皆邪氣欝滯正氣不得流通而致然治者當以飬血除風順氣化痰為主不必強度某病属某經某臓而雜治之也風病遺尿属氣虚参茋補之小便不利者勿用利藥既得自汗則津液外亡小便自少若利之使榮衛枯竭無以制火煩熱愈甚當候熱退汗止小便自行兼此症乃陽明大忌利小便湏當識此婦人産後中風口噤手足瘈瘲如角弓狀或血暈四肢強直俱用荆芥畧炒為末黒豆淋酒調下三錢極妙或加當歸入酒少許水煎灌下即省秦艽升麻湯秦艽升麻乾葛芍藥人参甘草白芷防風桂枝連鬚蔥白水煎川芎石膏湯此乃防風通聖散加减法也防風川芎當歸芍藥連翹石膏黄芩桔梗薄荷人参荆芥大黄甘菊滑石甘草山梔砂仁寒水石生薑水煎服八味順氣散白术青皮白芷烏藥人参陳皮甘草白茯苓烏藥順氣散麻黄陳皮烏藥乾薑甘草殭蠶川芎枳殻白芷桔梗生薑大棗水煎服六合湯熟地當歸川芎芍藥秦艽一作防風羌活水煎服三生飲南星一兩生川烏去皮臍生附子去皮臍生各半兩木香二錢半生薑十片右每服五錢水煎省風湯南星三錢生防風三錢生半夏湯泡生甘草生黄芩各一錢半右加生薑三片水煎温服搐鼻通天散藜蘆川芎白芷細辛防風薄荷各一錢猪牙皂角三箇刮去皮子右為末吹鼻中開關散一名破棺散治中風口噤南星末五分氷片少許右五月五日午時合以中指㸃末揩齒左右其口自開攝生飲蒼术木香南星半夏細辛菖蒲甘草生生薑痰盛加全蝎水煎服稀涎散白礬一兩半生半枯牙皂四箇肥實不蛀者去皮弦炙黄右為末温水調下一二錢吐出痰涎便省觧語湯一方有石菖蒲逺志羌活防風天麻肉桂川芎南星陳皮白芷當歸人参甘草酸棗仁羚羊角水煎入竹瀝半盞再一滚服清心散青黛硼砂薄荷各二錢牛黄氷片各三分右為末先以蜜水洗舌後以薑汁擦舌將藥末蜜水調稀搽舌本上加味轉舌膏連翹逺志薄荷柿霜各一兩石菖蒲六錢梔子炒防風桔梗黄芩酒炒𤣥明粉甘草酒大黄各五錢犀角川芎各三錢右為末煉蜜丸弹子大硃砂五錢為衣食後臨卧薄荷湯嚼下一丸訶子清音湯桔梗一兩半生半炒訶子四十九箇半生半炮甘草二錢半生半炙右為末每服七錢童便一大碗煎熱調服大八風湯當歸杏仁灸草桂心乾薑炮五味升麻六分川烏炮黄芩炒芍藥炒獨活防風川芎麻黄秦艽石斛人参茯神石膏黄茋紫苑三分大豆去皮炒九分虎脛骨酒防風萆薢當歸松節龜板虎骨酥炙各二兩晩蠶沙五加皮秦艽羌活各二兩白术三兩枸杞子蒼耳子各四兩牛膝一兩鱉甲一兩乾茄根八兩飯上蒸一方有石斛續斷杜仲巴㦸各一兩右剉碎絹袋盛之以無灰酒三斗浸壜内春秋七日夏五日冬十日宻固煮滚封七日開取時不可面向壜口恐藥氣冲目每日早午晚間病人自取酒一小盃服之不許多飲又不令藥力斷絶病痊酒盡將渣晒乾再入乾浮萍一斤半木香一兩防已木𤓰各二兩麝少許研為末酒糊丸桐子大酒下五十丸日用三服忌食動風之物又曰凢中風者俱有先兆之症凡人如覺大拇指及次指麻木不仁或手足不用或肌肉蠕動者三年内必有中風之症經曰肌肉蠕動命曰㣲風宜先服八風散愈風湯天麻丸各一料為愈夫大拇指次指皆手足太隂陽明經中風多著此經也先服祛風滌熱之劑辛凉之藥治内外之邪是以聖人治未病不治已病又云善治者治皮毛是治萌芽也故初成者獲愈固久者伐形是治未病之先也丹溪云大率治風主血虚有痰治痰為先或挟火與濕葢濕生痰痰生熱而熱生風也半身不遂者大率多痰在左属死血與無血宜四物湯加桃仁紅花竹􅅹薑汁在右属氣虚属痰宜四君子湯二陳湯加竹􅅹薑汁氣虚卒倒参耆湯補之挟痰則濃煎人参湯加竹􅅹薑汁血虚四物湯補之挟痰則四物皆用薑汁炒過加竹􅅹薑汁能食者去竹􅅹加荆􅅹竹􅅹荆􅅹乃開經絡行血氣故為必用之劑肥人多濕少加烏頭附子行經肥人中者以其氣盛於外而歉於内也肺為氣出入之道肥人氣必急急則痰涎上壅邪盛可知所以治之必先理氣為急中後氣未順痰未除調理之劑惟當用藿香正氣散和星香散煎服此方非特可治中風之症中氣中惡尤宜尋常嘔吐痰厥及胸膈飽悶者皆可用之治風之法初得之必先順氣及日久則當活血此萬古不易之理有以四物吞活絡丹愈者正此意也設不先順氣化痰遽用烏附又不活血徒用防風天麻羌活輩吾未見其能治也若飲食坐卧如常但失音不語只以小續命湯去附子加石膏菖蒲一錢開關之劑稀涎散治中風不語牙關𦂳急单蛾雙蛾江子仁六粒每粒分作两半牙皂三錢切片明礬一两化開礬將二味投入攪匀待礬枯為末每用三分吹入諸病皆愈痰涎壅盛者以五分燈心湯下喉中之痰逆上者即吐膈間者即下凢中風口噤不開用白鹽梅揩齒即能開乃可進藥丹溪用藜蘆為末加麝香少許入鼻内吐之一吐不愈再吐之虚甚者不可吐救急通關散治中風中氣一應急病宜先以此開關牙皂細辛二味為末吹入鼻内得嚏佳蘇合香丸擦牙上牙關即開再以生薑自然汁并三生飲俟其甦省然後次第進以順氣之劑或排風續命之類勝金丸治中風忽然仆倒如醉形體昏悶四肢不收涎潮逆上隔氣不通命在湏臾生薄荷五錢牙皂二两搥碎水一升二味同浸取汁研成膏𤓰蒂末一两藜蘆末二两硃砂半两另研右將硃砂末二分和二味末子和匀用膏子為丸龍眼大硃砂為衣温酒化下一丸甚者二丸以吐為度得吐即醒不醒者不治桑枝法桑枝一升炒香以水三大升煎取二升一日服盡圖經云桑枝温平不凉不熱可以常服療體中風痒乾燥脚氣風氣四肢拘攣上氣眼暈肺氣咳𠻳消食利小便久服身輕聰明耳目令人光澤兼療口乾仙經云一切仙藥不得桑煎不服出抱朴子政和間何子常病两臂痛諸藥不效依此作數劑臂痛即愈凡治中風莫如續命之類然此可扶持初病若要收全功火艾為良中風皆因脉道不利血氣閉塞也灸則喚醒脉道而血氣得通故收全功中風不語用龜尿少許㸃於舌神效取龜尿法置龜新荷葉上用猪棕鼻内刺之即出一方治半身不遂口眼喎斜頭目眩運痰火熾盛筋骨時疼此乃原於血虚血熱挟痰挟火經絡肌表之間先已有其病根後因感冐風寒或過嗜醇酒膏粱而助痰火或惱怒而逆肝氣遂有此半身不遂之証其在於經絡肌表筋骨之間尚未入臓腑並以此方治之葢此方有補血活血之功不致於滯有健脾燥濕消痰之能不致於燥有清熱運動踈風開經絡通腠理内固根本外散病邪王道劑也多服見功白术一錢半川芎一錢半南星半夏芍藥茯苓天麻各一錢川歸生地熟地牛膝酸棗仁黄芩橘紅各八分羌活防風桂各六分紅花炙甘草各四分黄柏八分水煎入竹􅅹薑汁侵晨服瘖痱素問太隂所謂入中為瘖者陽氣已衰故為瘖也内奪而厥則為瘖痱此腎虚也少隂不至者厥也脉觧篇王註云痱廢也腎氣内奪則舌瘖足癈綱目云厥逆者温補之河間地黄飲子是也河間地黄飲子治瘖痱不能言足廢不能用腎氣弱其氣厥不至舌下熟地肉蓯蓉酒浸焙巴㦸石斛附子炮五味菖蒲逺志官桂麥冬山茱茰白茯苓各等分水盞半薑五片棗一枚薄荷同煎至八分不拘時服麝香散卒中風瘖瘂倒地不省左右癱瘓口眼喎斜諸藥未服者服之真麝二錢真香油二两若遇此症將麝香研細入油攪匀開口灌之其人自甦不獨治中風且全其言語不蹇手足不癱服此後方服順氣踈風之劑葢麝香通關節可以行至病所也疫門凢衆人病一般者此天行時疫治有三法宜補宜散宜䧏用大黄黄芩黄連人参桔梗蒼术防風滑石香附人中黄為末神麯糊為丸每服五七十丸氣虚四君子血虚四物痰多二陳湯作使送下熱甚者加童便生生子曰夫温病有冬傷於寒不即發過時而為春温者有冬不藏精者有感四時不正之氣者有君相二火加臨而沿門闔境相似者有用和觧法者有用補法者有用寒凉者有用漬法者各推其所因而施治之母執熱之一途而槩用寒凉法也大抵治時疫當按邪在何經及恭之時月故奏效甚捷發熱發班以𤣥参升麻湯治之頭痛先寒後熱以小柴胡湯渴加知母天花粉無汗加葛根夏加石膏知母各三錢先熱而後寒口渴無汗葛根升麻湯加柴胡熱甚及夏月加石膏知母但熱無寒口渴煩躁白虎湯加麥門冬大渇大熱譫語腹滿脉洪大有力柴胡湯或凉膈散發熱而大便㵼小便短柴苓湯發熱口渴而小便不利五苓散韓飛霞五瘟丹亦妙張子和六神通觧散治時病従外而感者頭痛體疼見風怕寒遇暖則喜不問日數皆當大汗麻黄一錢半蒼术甘草黄芩各一錢石膏滑石各二錢薑葱煎熱服如譫語神思不寕熱邪在裏而汗不能盡觧又加人参黄連二味即安此方用藥輕㣲人多不暁易而忽之不知其中自有神妙如觧汗未通更加紫蘇葉葛根白芷等助其威風得汗其病如掃治瘟病活套人中黄療時行熱毒為君蒼术香附散欝為臣黄芩黄連䧏火人参補虚桔梗防風利氣行經為佐熱欝結則内外氣液不通成燥大黄苦寒而能滌蕩燥熱滑石性滑味淡將以利竅觧結通氣液以潤燥二者一隂一陽用之為使藿香正氣散治外感發熱頭痛内因痰飲凝結作熱四時疫癘或中腕痞滿嘔逆惡心霍亂及傷寒頭疼增寒壯熱茯苓白芷紫蘇陳皮桔梗大腹皮甘草白术厚朴半夏各一两半藿香三两前胡右每服五錢薑三片棗一枚水煎熱服欲出汗以被覆之如挟飲食加枳實山查腹疼加砂仁蒼术减白术敗毒散治四時疫癘傷風有汗風濕身腫體疼惡風口乾日晡發熱茯苓甘草人参桔梗川芎柴胡前胡枳殻羌活獨活各等分生薑三片薄荷五片水煎服六神散治大熱發強譫語方在狂門漬法五枝湯治時疫用表藥太多而肺金枯燥以致腠理經宻不能得汗而熱不觧桑槐桞桃榆各四十九條煎湯浴之少頃膚潤而汗出熱因退矣辟疫丹䧺黄末一錢麝半分用黒棗肉搗為丸棗核大硃砂為衣綿包塞入鼻中男左女右入病家則不染疫氣神仙百觧散茵陳柴胡前胡人参羌活獨活蒼术米泔浸炒甘草乾葛白芍升麻防風藁本藿香半夏白术各一两立春以後不加减立夏已後一料内加柴胡赤茯苓川歸各五錢立秋已後减柴胡一分不用川歸赤茯苓只加乾葛肉桂去粗皮各一分麻黄去節五錢立冬已後並無加减一方無川歸有黄芩五錢右為細末每服三錢水一鍾半薑三片棗二枚煎一鍾熱服併進二服如要表藥加葱白三寸淡豆豉三十粒同煎服以衣被葢覆汗出而愈頭面腫俗名鸕鷀瘟蝦蟆瘟一車前草用水煎服極效大秘者加蜂宻匙多是少陽陽明二經之火上壅熱極而生風也故腫每在兩頰車及耳前後當用清䧏二法防風通聖散加减治之感之輕者只清之亦自消散不必加硝黄恐藥過於病也予嘗治多加痰藥於清散之中取效甚速今列於左白殭蠶天花粉酒芩酒連大力子甘草柴胡各三錢貝母𤣥参桔梗枳殻各八分連翹石膏各三錢升麻一錢葱白三根薑三片淡竹葉二十片食後緩緩服之大便秘結加酒煨大黄一錢若被重劑瀉下太過損傷中氣脾弱泄瀉面與項腫不退此所謂上熱未除中寒復生者也以小柴胡湯加白术山藥升麻白芷一補一消庶㡬保全大頭病與此亦相湏而治丹溪曰大頭天行病乃濕在髙巔之上用羌活酒芩酒煨大黄随病加减不可用䧏藥東垣有法有方謂陽明邪熱大甚資實少陽相火而為之視其腫熱在何部随經治之當緩勿令重劑過其病所陽明之邪首大腫少陽之邪出於耳前後先以酒炒黄芩黄連炙甘草煎頻頻少與呷之食後再煎大黄大力子臨時加芒硝等分亦時時呷之俟邪氣少殺只服前藥未已再如前次第服之取大便邪氣已即止陽明渴加石膏少陽渴加括蔞根陽明行經升麻芍藥葛根甘草太陽行經羌活荆芥防風並與上藥相合服之或云頭痛酒芩口渇乾葛身疼羌活桂枝防風芍藥海藏神术湯治内傷冷飲外感寒邪無汗者蒼术製防風各二两甘草一两炒右㕮咀加葱生薑同煎服如太陽症發熱惡寒脉浮而𦂳者加羌活二錢如太陽證脉浮𦂳中𢃄弦數者是兼少陽也加柴胡二錢如太陽證脉浮𦂳中𢃄洪者是兼陽明也加黄芩二錢婦人服者加當歸或加藁本湯各二錢如治吹妳煎成調六一散三五錢神效又神术湯六氣加减例太陽寒水司天加羌活桂枝餘嵗非時變寒亦加冬亦加陽明燥金司天加白芷升麻餘嵗非時變凉温亦加秋亦加少陽相火司天加黄芩地黄餘嵗非時變雨濕亦加夏亦加太隂濕土司天加白术藁本餘嵗非時變熱濕亦加夏末秋初亦加少隂君火司天加細辛獨活餘嵗非時變熱亦加春末夏初亦加厥陰風木司天加川芎防風餘嵗非時變温和亦加春亦加已上神术湯六氣加减法非止為司天之氣設也至于嵗之主氣與月建日時同前應見者皆當随所見依例加减之按海藏此論與戴人云病不如是當年氣看與何年運氣同便向此中求妙法方知皆在至真中之歌相表裏實發前人之所未發也葢海藏此論所謂某氣司天加某藥者治常氣之法也所謂随所應見加减者治變氣之法也戴人所謂㸔與何年同氣求治法者亦治變氣之法也能將二公之法擴充行之則内經運氣之本義燦然矣夫内經論運氣有常氣有變氣常氣有定紀如某年属某氣司天當寒某年属某氣司天當熱是也變氣者無定紀如某年属某氣司天當寒反變熱當熱反變寒是也王氏注文釋以經無定紀之變氣作有定紀之常氣使後學皆以年嵗占運氣而其應者十無一二是以人莫之信而其道湮晦乆矣二公生於數千百年之後復啟其端而續之功亦巨矣火熱門火之與熱㣲甚之間而已各標門户近贅今歸之於一便尋治也明火篇五運六化篇曰君火之化熱主春末夏初行暄淑之令而不行炎暑應君之徳也生生子曰諸書言火不一於雜症中言者徃徃至言火雜症而兼令氣者雖間有之而未暢也愚謂天有六氣火居其二地有五行火居其一人之五臓徳合五行火之有二君相是已火之在易為離離者内隂外陽主乎動者也動則生故曰天不能逺火以生物人不能逺火以有生過動則變而反消爍於物也在禦之何如爾按内經氣交變大論篇云南方生熱熱生火其令熱其變消爍其災燔炳又運氣五行生死順逆篇曰火主於南應夏火之為言化也言能化生萬物也顧其為疾不獨待於君相凢五志之火皆致𤯝也岐伯舉病機一十九條而属火者五此先聖論火者大抵也後之言火者無論其他且以丹溪之特識乃分君火為人火相火為天火而後之人翕然頌之愚竊以為未然也夫火有天人不可以君相而分属天人何也六六之氣以君火為二之氣經以熱稱之以相火為三之氣經以暑稱之是君相皆可以火稱也惟人之攝飬失宜則五臓之火随觸而見觸之於心之經心之絡心之臓皆君火也固可以人火稱之若觸之於包絡觸之於三焦此相火也亦可以人火稱也而獨以天火稱之何哉又曰見於天者出於龍雷則木之氣出於海則水之氣雖其取譬無非欲狀相火之烈然但可以論五臓厥陽之火而非君相令氣有定位有倫序者言也彼造化之所以生生無窮者以其有不易之定體為之主然後四時行而萬物生葢天人之理一致若外内君相之火亦必先有定位而後可以言變化惟善攝生者其五行五志之火有以黙禆其生生之功故人莫得而見其端及其過極則酷烈之勢始見書謂寂然不動感而遂通是已愚故曰治火熱之症必先察夫令氣之流行而恭治之可也雖非火令司天之年然一嵗中既有此君相二節之氣治病者安得舎令氣而不加察之乎諸書义妄以命門為相火而主方即以滋隂䧏火湯為專劑以故今之治虚怯者未數月而多至殞促固司命者隂柄其權或亦治火之源未徹而妄投藥劑有以致之乎吾祁汪子良醫學質疑有外内君相篇言之頗悉言外者有曰火邪自天氣血感之而為病也得非令氣之天火歟言内者有曰乃人之調飬失宜正氣自傷而為病也得非所觸五志之人火者歟外内之因不同補瀉之治自别以外君相言之則有令氣之序以内君相言之則少隂少陽厥隂自明五志之火自見也况内外証治甚該瑩然可法似補前人所未臻雖其所約諸方未必能一一中其肻綮推其意極欲正其外内君相之名表其虚虚實實之治為後人作梯堦工之與緻不遑計也而亦不以君相分天人也愚故録之於左以俟明哲採焉外内君相篇祁邑汪子良著夫火者明曜燔灼者也其性升燥其氣鬰蒸其色為赤其聲為鳴其味為苦其始為温其變為寒其為害也十二經絡臓腑無所不至諸書以心為君火以黄連瀉之右腎命門為相火以黄柏制之以君相二火限於心腎非也随其所寓而名之君火相火之說始於運氣諸篇而近世諸書繼之曰實火虚火人火龍火腎肝隂火五志之火之類其意雖各有所指而天人外内之未瑩則亦猶有惑也夫外者火邪自天氣血感之而為病也内者人之調飬失宜正氣自傷而為病也外内之因不同補瀉之治自别以外君相言之經有六節之序始於風木終於寒水自春分至小滿為二氣君火其令熱自小滿至大暑為三氣相火其令暑夫風火暑濕寒燥之六氣迭相盛衰以應六六之節而君相當其二焉君相云者乃熱暑㣲甚之分耳應則為平變則為病當其時則㣲非其時則甚如非時而有大熱則為瘟疫之病矣如君火之化熱感之則手少隂心太陽小腸臓腑主之相火之化暑人感之則手厥隂膻中少陽三焦臓腑主之夫君少隂也而心又主血血属隂為病主静相火少陽也而膻中又主氣氣属陽為病主動故凢静者皆君火之症也如痛痒瘡痬癰疽瘤氣結核紅腫鼻塞鼽嚏吐酸瞀欝血溢血泄笑悲譫妄惡寒戰慄身熱轉筋腹脹有聲小便渾濁淋秘暴注下廹舊有霍亂吐下太隂之症今去之之類皆君火使之然也凢動者皆相火之症也如瞀瘛暴瘖冐昧躁攘狂越詈罵驚駭嘔涌溢食氣逆上衝諸禁鼓慄如喪神守喉痺耳鳴耳聾暴注􅀈瘛跗腫疼酸暴病暴病之類皆相火使之然也夫君相之火俱主於熱宜用寒凉正治但熱㣲甚之不同耳其在表者發之在裏者瀉之利之下之半表半裏者和之如柴胡黄芩瀉肝胆之火黄連瀉心火木通瀉小腸火芍藥瀉脾火石膏瀉胃火黄芩瀉肺火與大腸火知母瀉腎火黄栢㵼膀胱火此外君相之症治者也内之君相者正氣自傷為病有似火邪所發而實非也如諸書所謂實火可㵼虚火可補之類夫實者正氣之有餘也虚者正氣之不足也葢人之氣生發於胃聚於膻中膻中者乃心前空虚之位名曰氣海又曰宗氣其氣之餘由肺運於一身通調水道下輸膀胱水精四布五經並行以為生生不息之運用若夫起居動静調飬失宜過於勞倦房事醉飽耽食肥甘辛辣厚味之属以致經絡臓腑因之受傷則夫膻中之氣随其所寓欝滯而為病氣之有餘則為實火氣之不足則為虚火故曰君火者猶人火也可以水㓕可以正治惟黄連之苦瀉之相火者猶龍火也不以水㓕不以正治順其性而折之惟黄栢之辛制之又曰實火可瀉黄連觧毒之属虚火可補参术生甘草之属兼瀉兼緩故内之君火者實火也猶人火也宜用寒凉之味瀉之如肝臓素熱復加酒熱上行而為目赤腫痛者治用柴胡黄芩龍胆草之属又有肝經素有濕熱又復感滛穢以致肝經熱欝而為下疳者治用龍胆瀉肝湯之属或為便毒者治用大消毒散之属或為楊梅瘡者治用防風通聖散之属又有膽癉因於謀慮不决故胆虚氣上溢而為口苦者治以胆募俞又如小兒因聞異聲内激胆熱而為驚搐者治用瀉青丸之味又如過食膏粱之属熱積於心而為癰疽者治用黄連觧毒湯之属經曰膏粱之變足生大疔足充足也又醉以入房或臨房忍精以致小腸膀胱熱欝不散而為淋濁者治用黄栢知母木通梔子之属又如有因勞動熱起於脾而為痰涎𢃄血者治用黄連芍藥之属又如過食肥甘而為消中或為中滿等症治用三補丸之属經曰肥者令人内熱甘者令人中滿又曰消中熱中皆富貴人也又如醉以入房酒熱欝於脾胃而為熱厥者治宜觧酒散熱間服滋隂之劑岐伯言熱厥者此人必醉飽以入房酒聚於脾胃不得散酒氣與穀氣相薄熱盛於中云云腎氣日衰陽氣獨盛故手足為之熱也又有因於飽食熱積大腸而為痔漏下血者治用黄連枳殻之属經曰因於飽食筋脉横解腸癖為痔又如食滯腸胃鬱熱不散而為下痢赤白者治用大承氣湯之属經曰通因通用者此也又如色慾不遂腎熱内熾而為遺精者治用珍珠丸加椿根皮之属内之君火之大意葢如是内之相火者虚火也猶龍火也宜分氣血而用甘温之味補之有因乆視傷血以致肝熱上騰而為目赤腫痛者治用四物湯加黄連黄芩柴胡之属又有肝血内虚而為發熱者治用四物湯加黄栢知母之属又有胆腑虚熱而為不寐者治用酸棗仁竹葉之属又有少陽胆經血枯不足以配陽氣則氣鬱為熱而為瘰􅊓者治用四物湯生地柴胡黄芩連翹𤣥參夏枯草之属或為耳鳴者治用清氣化痰丸之属又有勞心過度以致神不守舎而為驚悸不寐等症治用八物湯加酸棗仁逺志間服硃砂安神丸之属又有因於失志心神受傷而為癲風者治用四物湯間用硃砂安神丸之属又有抑鬱傷心而為癰疽不起者治用人參黄芪白术附子之属又有内傷心之元陽而為惡寒者治用人參附子赤石脂之属王太僕云益火之原以消隂翳之類是也又有小腸膀胱氣虛不能運化小便而為淋秘者治用參茋术茯木通之属經曰膀胱者州都之官津液藏焉氣化則能出矣又有勞倦傷脾而為大熱氣喘虛煩者治用補中益氣湯之属經曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣薰胷中故内熱又有勞倦傷脾症現頭痛發熱悮食寒凉之藥過多而増譫語鄭聲脉數不鼓者治用參茋白术當歸附子乾薑之属又有勞傷脾胃陽氣不能上榮而為頭痛耳鳴鼻塞口淡等症治用補中益氣湯加蔓荆子之属經曰頭痛耳鳴九竅不利腸胃之所生也又有飲食失節與夫素齋内傷脾胃而脉虛身熱咳𠻳腹脹泄㵼等症補中益氣加減治之又有内傷胃腑胃氣太虚而為嘔吐者治用參茋白术砂仁石菖蒲之屬或為消穀善飢者治用參茋甘草之屬或為吐血者治用參术附子之屬或為左齒痛者治用參茋术歸白芷升麻之屬或為腹脹者治用參茋白术砂仁木香之屬經曰塞因塞用之類是也又有過慾腎虚火炎於肺而為喘𠻳等症治用六味地黄丸加黄栢知母貝母麥冬五味之属又有肺氣内虚不能運行而為喘𠻳憤欝等症治用参茋术附麥冬五味欵冬花之属又有大腸氣虚不能傳送而為裡急後重或為虚秘等症治用補中益氣湯之属又有過慾傷腎隂火内熾而為耳鳴者治用清上實下之劑或為口鼻血溢者治用四物湯加苑根大小薊阿膠之属或為骨蒸者治用當歸生地黄胡黄連知母地骨皮之属或為熱従臍下起者或為熱従足上起者治用四物加黄栢知母間服六味地黄丸之属或為午後發熱者治用當歸地黄枸杞龜板之属王太僕云壯水之主以制陽光之類是己内之相火之大意葢如是此外猶有五志之火亦属正氣自傷但因五志所發之不同耳經曰人有五志以生喜怒悲思恐若夫五志過度則火發於中而為病耳怒則氣上喜則氣緩悲則氣消思則氣結恐則氣下之類夫五志過傷非藥可治乃以所勝治之悲勝怒喜勝悲恐勝喜怒勝思思勝恐之類是已夫悲可以勝怒以悽惻苦楚之言感之喜可以勝悲以浪謔褻狎之言娱之恐可以勝喜以迫遽死亡之言怖之怒可以勝思以汙辱之言觸之思可以勝恐以慮彼亡此之言奪之之類是也夫五志所傷未甚正氣未虚或可以藥治者有之如青皮以瀉怒氣之逆参茋以補悲氣之消香附以開思氣之結升柴以舉恐氣之䧏惟夫喜則氣和志逹雖病亦㣲不治可也此五志之症治者也又有内外两傷之火正氣自傷復加火邪外傷而為倦怠少氣自汗身熱失於視聽脉虚等症治用清暑益氣湯之属經曰陽氣者煩勞則張精絶澼積於夏使人煎厥目肓不可以視耳瞶不可以聽之類是也又如元氣素虚遇夏外熱傷氣而為倦怠無力頭疼口淡等症俗謂之注夏治用参茋白术麥冬五味黄芩之類又如足之太陽經氣不足感受暑氣而為惡寒發熱身重疼痛手足厥冷小便已洒然毛聳小有勞身即熱口開前板齒燥脉弦細芤遲仲景所謂中暍是也治用白虎加人参湯之類又有勞倦復感暑氣而為身熱神昏溺澁等証治用辰砂五苓散之類又如胃氣内虚因感暑氣而為頭疼身熱泄㵼脉洪而實者治用柴苓散之類又如逺行勞倦逢大熱而渇渇則熱舎於腎而為足不任身骨痿者治用人参黄茋之類經曰骨痿者生於大熱也又如腎虚隂火上炎而為勞熱咳𠻳等症復感夏暑傷之其氣益甚治用滋隂䧏火之劑經曰春夏劇秋冬瘥之類是也又如内有痰火外感暑氣皷激痰飲塞碍心竅而為卒倒手足不知動躡者俗謂之暑風是也二陳湯加黄連香薷主之又如冬月過於房勞精氣内竭至春則無發生之氣而為瘟疫者治宜補中加以辛凉觧表之劑經曰冬不藏精春必病瘟又如冬月傷寒寒邪未發至春復感熱氣而為大熱頭疼口渴心躁脉浮𦂳者防風通聖散主之經曰冬傷於寒春必病瘟此皆内外兩傷症治並行而不悖焉者也是知君相二火以外言之有春熱夏暑陽動隂静之分也以内言之有實瀉虚補五志勝治藥治之分也以外内兩傷言之有表裏邪正補瀉兼施之分也是故外内君相醫之廣用者也其為道甚大其為説甚雜其為病甚多其為變也甚速其為御也甚難非一方一法所可盡也能明乎此醫之為道思過半矣病機篇内經曰諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大皷之如皷癰疽痬疹瘤氣結核霍亂瞀悶欝腫鼻塞鼽衂血溢血泄淋閉身熱惡寒戰慄驚惑悲笑譫妄衂衊血汚此皆少隂君火之熱乃心小腸之氣所為也又曰諸熱瞀瘈暴瘖冐昧躁擾狂越罵詈驚駭胕腫酸痛氣逆衝上禁慄如喪神守嚏嘔瘡瘍喉痺耳鳴及聾嘔飲溢食不下目迷不明暴注瞤瘈暴病暴死此皆少陽相火包絡三焦之氣所為也内經曰夫熱病者皆傷寒之類也陽勝則熱隂虚則内熱陽勝則外熱内外皆熱則喘而渴故欲飲冷也陽勝則身熱腠理閉喘粗為之俛仰汗不出而熱齒乾以煩冤腹滿死能冬不能夏有四肢熱逢風寒如炙於火者是人隂虚陽氣盛也人身非常熱也為之熱而煩滿者隂氣少而陽氣勝故熱而煩滿也大熱病氣熱脉滿是謂重實尺寸脉俱虚是謂重虚粗大者隂不足陽有餘為熱中也脉經曰弦數多熱數為熱極脉數為虚為熱寸口脉浮大而數者名曰陽中之陽病苦煩滿身熱頭疼腹中熱寸口脉實熱在脾肺數為吐為熱在胃口關脉滑數胃中有客熱緩而滑為熱中尺脉實為身熱心痛數為臍下熱痛又曰熱病脉小或細喘逆不得大小便腹大而脹汗出而厥逆泄注脉大小不調皆難治熱病已得汗而脉仍躁盛此陽脉之極也死熱病不得汗而脉躁盛者此陽脉之極也死脉浮而濇濇而身有熱者死熱病脉躁盛得汗而脉静身凉者生論熱在血氣之分東垣曰晝則發熱夜則安静是陽氣自旺於陽分也宜柴胡飲子晝則安静夜則發熱煩躁是陽氣下䧟入隂中也宜四順飲子名曰熱入血室晝發熱煩躁夜亦發熱煩躁是重陽無隂也急瀉其陽峻補其隂論五臓有邪身熱各異以手捫摸有三法輕手捫之則熱重手捫之則不熱是熱在皮毛血脉也重按之筋骨之分則熱蒸手極甚輕手則不熱是邪在筋骨之間也輕手捫之不熱重力按之亦不熱不輕不重按之而熱是在筋骨之上皮毛血脉之下乃熱在肌肉也肺熱者輕手乃得㣲按全無日西熱甚乃皮毛之熱其証必見喘咳寒熱輕者瀉白散重者凉膈散地骨皮散心熱者㣲按至皮膚之下肌肉之上輕手乃得㣲按至皮毛之下則熱少加力按之則全不熱是熱在血脉也其症心煩心痛掌中熱而噦以黄連瀉心湯導赤散硃砂安神丸脾熱者輕手捫之不熱重按之筋骨又不熱不輕不重在輕手重手之間熱在肌肉遇夜尤甚其証必怠惰嗜卧四肢不收無氣以動㵼黄散肝熱者重按之肌肉之下至骨之上乃肝之熱寅夘間尤甚其脉弦四肢滿悶便難轉筋多怒多驚四肢困熱筋病不能起於床瀉青丸柴胡飲子腎熱者輕手重手俱不熱極重力按至骨分其熱蒸手如火其人骨蘇蘇如䖝蝕其骨因熱不任亦不能起於床滋腎丸主之靣熱者足陽明口中熱如膠足少隂口熱舌乾足少隂耳鼽熱若寒手太陽掌中熱手厥隂少隂太隂足下熱而痛足少隂足外熱足少陽身熱膚痛手少隂身前熱足陽明洒淅寒熱手太隂肩上熱肩似拔手太陽中熱而喘足少隂肩背熱及足小指外膁脛踝後皆熱足太陽一身盡熱狂而妄聞妄見妄言足陽明熱而筋縦緩不收隂痿足陽明論表裏熱病機機要云有表而熱者謂之表熱無表而熱者謂之裡熱有暴熱而為熱者乃久不宣通而致也有服温藥而為熱者有惡寒戰慄熱者治法小熱之氣凉以和之大熱之氣寒以取之甚熱之氣以汗發之發之不盡則逆制之制不盡求其属以衰之苦者治臓臓属隂而居内辛者治腑腑属陽而在外故内者下之外者發之又宜飬血益隂其熱自愈内經曰隂虚生内熱者因有所勞倦形氣衰少糓氣不盛上焦不行下脘不通胃氣熱熱氣薫胸中故内熱陽盛則外熱者因上焦不通利則皮膚緻宻腠理閉塞𤣥府不通衛氣不得泄故外熱東垣曰發熱惡寒大渴不止煩躁肌熱不欲近衣其脉洪大按之無力者或無目痛鼻乾者非白虎湯證也此血虚發躁當歸補血湯主之又曰仲景論内外不足發熱自汗之症大禁發汗若飲食勞倦雜病發熱自汗表虚之症認作有餘便用麻黄發之汗大出則表益虚也内經曰人數醉若飽以入房氣聚於脾中不得散酒氣與糓氣相薄熱盛於中遍於身内熱而溺赤也飲食不節起居不時者隂受之入六腑則身熱不得卧上為喘呼王好古曰一身盡熱先太陽也從外而之内者先無形也為外傷手足不和两脇俱熱如火先少陽也從内而之外者先有形也為内傷要畧曰發熱身疼而身如薰橘者濕也一身盡痛發熱日晡轉劇者名風濕汗出而身熱者風也身熱脉弦數戰慄而不惡寒者瘅瘧也發熱惡寒脈浮數者温病也身熱頭疼自汗多眠陽脉浮滑隂脉濡弱者風濕也中脘有痰令人增寒惡熱自汗惡風寸口脉浮胸痞滿有類傷寒但頭不痛項不強為異耳虚煩與傷寒相似身熱脉不浮𦂳不惡寒但熱而煩惟頭不痛四脉熱者火乗脾土脾主四肢故熱也手心熱者心與包絡火盛也身體沉重走注疼痛乃濕熱相搏風熱鬰而不得伸也東垣云四脉發熱者或口乾舌乾咽乾葢心生火小腸主熱火熱来乗主位乃濕熱相合故煩躁悶亂也王太僕曰熱来復去晝見夜伏夜發晝伏時節而動是無火也論雜病發熱惡寒與傷寒不同許學士曰仲景云假令寸口脉㣲名曰陽不足隂氣上入陽中則洒淅惡寒也尺脉弱名曰隂不足陽氣下䧟入隂中則發熱也此謂元受病而然也又云陽㣲則惡寒隂弱則發熱此醫發其汗使陽氣㣲又大下之令隂氣弱此謂醫所病而然也大抵隂不足陽徃従之故陽内䧟則發熱陽不足隂往乗之故隂上入陽中則惡寒隂陽不歸其分故寒熱交爭是以發熱而惡寒也原病式曰身熱惡寒熱在表也邪熱在表而淺邪畏其正故病熱而反惡寒也或言惡寒為寒在表或言身熱惡寒為熱在皮膚寒在骨髓者皆悞也仲景法曰無陽病寒不可發汗又言身熱惡寒麻黄湯汗之汗泄熱去身凉即安然則豈有寒者歟大法煩躁多渇欲寒惡熱為病熱也亦有亢則害承乃制之則病熱甚而反覺其冷者也雖覺其冷而病為熱實非冷也其病熱欝甚而反惡寒得寒轉甚而得煖少愈者謂煖則腠理踈通而陽氣得散怫熱稍退故少愈也其寒則腠理固宻陽氣怫欝而熱轉甚故病加尓上下中外周身皆然俗因之妄謂寒病誤以熱藥投之為害多矣劉宗厚曰按此數論並言雜病隂陽相乗及火熱甚反兼水化為病亢則害承乃制之例但河間所引傷寒身熱寒熱與仲景及明理論義不相合詳趙嗣真明理論云往来寒熱者邪正分爭也邪氣之入也正氣不與之爭則但熱而無寒若邪正分爭於是寒熱作矣葢以寒邪為隂熱邪為陽裡分為隂表分為陽邪之客於表也為寒邪與陽爭則為寒矣邪之入於裡也為熱邪與隂爭則為熱矣若邪在半表半裡之間外與陽争而為寒内與隂争而為熱表裏之不拘内外之無定由是寒熱且徃且來日有至於三五甚者則數發也若以隂陽相勝陽不足則先寒後熱隂不足則先熱後寒此特論雜病隂陽二氣自相乘勝然也非可以語傷寒斯論為甚精切深合仲景之意葢不惟釋疑於活人書而已又按河間言惡寒為寒在表或身熱惡寒為熱在皮膚寒在骨髄皆悞也而活人書亦以此為表裏言之故趙氏曰詳分皮膚骨髄而不曰表裏者葢以皮脉肉筋骨五者素問以為五臟之合主於外而充於身者也惟曰臟曰腑方可言裏可見皮膚即骨髄之上外部浮淺之分骨髄則皮膚之下外部深沉之分與經絡属表臟腑属裏之例不同况仲景出此症於太陽篇首其為表症明矣是知虚弱素寒之人感邪發熱熱邪浮淺不勝沉寒故外怯而欲得近衣此所謂熱在皮膚寒在骨髄用辛温至於壮盛素熱之或酒客輩感邪之初寒未變熱隂邪閉於伏熱隂凝於外熱欝於内故内煩而不欲近衣此所謂寒在皮膚熱在骨髄用辛凉必矣一發之餘表觧正和此仲景不言之妙若以皮膚為表骨髄為裡則麻黄湯証骨節疼痛其可名為有表復有裡之症耶然仲景傷寒一書人但知為方家之祖而未觧作秦漢文字看故於大經大法之意反有疑似而後世頼其餘澤者往徃類輯傷寒方論其間失其本義及穿鑿者亦有之矧以雜病為論但引其例乎兹趙氏釋疑可謂得其㫖趣且黄帝針經有論皮寒熱肌寒熱骨寒熱等例如此則仲景所論分邪在皮膚骨髄之殊雖欲以盡症例之變葢自有所本云惡寒非寒惡熱非熱論丹溪曰經云惡寒戰慄者皆属於熱又云禁慄如䘮神守皆属於火惡寒者雖當暑月若遇風霜重綿在身自覺凛凛戰慄禁慄動揺之貌如䘮神守惡寒之甚原病式曰病熱甚而反覺其寒此為病熱實非寒也或曰往往見有得熱藥而少愈者何也予曰病熱之人其氣炎上欝為痰飲抑遏清道隂氣不升病熱尤甚積痰得熱亦為暫退熱勢助邪其病益深或曰寒勢如此誰敢以寒凉與之非殺而何予曰古人遇戰慄之症有以大承氣湯下燥糞而愈者惡寒戰慄明是熱症但有虚實之分耳經曰隂虚則發熱夫陽在外為隂之衛隂在内為陽之守精神外馳嗜欲無節隂氣耗散陽無所附遂致浮散於肌表之間而惡熱也實非有熱當作隂虚治之而用補飬之法可也㵼白散治肺熱桑白皮地骨皮各一两甘草五錢為末水調服清金丸瀉肺火黄芩炒為末水丸沸湯下黄連瀉心湯治心熱黄連炒為末水調二三分量人大小與之導赤散治小腸實熱生地木通甘草各等分入竹葉煎服調胃承氣湯治脾熱胃熱大黄芒硝各一两甘草五錢水煎服㵼黄散藿香七錢山梔一两石膏五錢甘草三两防風四两右為末用蜜酒拌畧炒服柴胡飲子治肝熱柴胡人参黄芩甘草大黄川歸芍藥各等分每服七錢薑三片水煎服抑青丸㵼肝黄連薑汁炒為末粥丸沸湯下左金丸治肝火黄連六两吳茱茰湯煮少時為末粥丸陳皮白术湯吞下㵼青丸川歸川芎山梔大黄羌活防風龍胆草為末蜜丸本方去川芎羌活防風加黄連黄栢黄芩蘆薈青黛各五錢木香一錢麝香五分名當歸龍薈丸滋腎丸治腎熱黄栢三錢知母三錢桂一錢半為末蜜丸凉膈散治積熱煩渴面熱唇焦咽燥舌腫喉閉目赤鼻衂項結硬口舌生瘡譫妄燥澁便溺閉結連翹四两朴硝大黄各二两薄荷黄芩枝子甘草炙各一两為末每服三錢加竹葉五七片水煎洗心散治心肺積熱頭目昏疼肩背拘急肢節煩痛唇焦咽腫痰壅唾粘溺澁便秘白术一两半麻黄川歸荆芥芍藥甘草大黄各六两每服二錢入生薑薄荷少許同煎服三黄丸通治三焦熱去大黄加黄栢名三補丸黄連黄芩大黄各等分為末煉蜜丸桐子大每服三十丸四順清凉飲子治一切丹毒積熱壅滯咽痛川芎甘草炙赤芍大黄每服七錢水煎服黄連觧毒湯治大熱甚煩躁不得眠黄連七錢半黄栢梔子各五錢黄芩一两每服五錢水煎服加防風連翹為大金花丸治風熱加柴胡治小兒潮熱與四物相合治婦人潮熱當歸承氣湯治熱發於上不利於下陽狂奔走詈罵不避親踈當歸大黄各五錢芒硝四錢半甘草二錢半右分二帖薑二片棗二枚水煎服人参散治身熱頭痛積熱在胸服此神妙石膏甘草各一两滑石四两寒水石三两人参五錢為末每服一錢或二錢温水調下早晩各一服兼服金花丸妙四製黄栢丸黄栢去粗皮净四斤一斤米泔水浸一斤以好酒侵一斤蜜糖水浸右俱用磁器浸三味俱要沒二指為度冬月浸七日夏浸三日春秋五日濾出晒乾仍存餘汁待後用再將黄栢一斤切作五寸長用真酥油半斤以磁碗乗之先將銅銚將水熬滚再將酥油連碗入水溶化將黄栢以㣲火炒熱用棕刷蘸酥徐徐刷上且刷且炙各使透徹切忌焦黒炙畢放於冷地上以磁碗覆之二日去火毒并前共為細末以前存原汁和為丸如汁不敷再為蜜酒兊匀和之丸如梧子大每空心及臨卧酒吞下五七十丸徐以乾物壓之此藥滋腎䧏火化痰之聖藥也若吐血遺精服半月即愈如相火周身疼痛减黄栢二斤加犀角一两為末入前丸中天門冬膏以生天門冬不拘多少去皮心搗絞汁盛磁器内以鍋熬滚水入門冬連磁器于中煮至滴水成珠以磁礶收貯每服二三匙沸湯㸃服如無生者以乾者煮汁熬膏亦可或以天門冬制為末每服二三錢亦可前胡散治胃氣實熱唇口乾裂中心熱躁大便秘結非時煩渇睡中口内生涎大黄五錢桔梗枳殻前胡杏仁各一錢葛根二錢右為末每服二錢入生薑煎服赤茯苓湯治膀胱實熱腹脹小便不通口苦舌乾咽腫不利猪苓葵子枳實瞿麥木通黄芩滑石甘草赤芩車前子各等分入薑水煎食前服東垣㵼隂火升陽湯治肌熱煩熱面赤食少喘咳痰盛脉右關緩弱或弦或浮數羌活甘草炙黄茋蒼术各一两升麻八錢柴胡一两半人参黄芩各七錢黄連酒炒五錢石膏五錢秋深勿用右每服一两或五七錢水煎服升麻散火湯治男子婦人四肢發熱肌熱筋脾熱骨髓中熱發困熱如燎捫之烙手此多血虚而得之或胃虚過食冷物抑遏陽氣於脾土之中火鬰則發之升麻葛根羌活獨活各五錢防風三分柴胡八分甘草炙三分白芍五分生甘草二分水煎稍熱服千金麥門冬湯治諸疾後火熱乗肺咳𠻳有血胸脇賬滿上氣羸瘦五心煩熱渴而煩悶麥冬桑白皮生地各一两半夏紫苑每服七錢水煎服拔萃方地骨皮散治渾身壯熱脉長而滑陽毒火熾發渇地骨皮茯苓各五錢柴胡黄芩生地知母各一两石膏二两羌活麻黄各七錢半若有汗者减此二味右每服一两入薑煎服麥門冬散治丈夫婦人藴積邪熱心胸煩悶咽乾口燥睡卧不安或大小腸不利口舌生瘡芒硝一两麥冬三錢小草黄連升麻犀角屑甘草炙黄芩枳殻大青各五錢每服三錢水煎服真珠散治男婦五臓積熱毒氣上攻心胸煩悶口乾舌燥精神恍惚悶亂坐卧不安琥珀真珠粉天花粉鉄粉硃砂甘草牙硝寒水石煅大黄各等分為極細末每一錢竹葉湯下紫雪治内外煩熱不觧口中生瘡狂易呌走觧諸熱毒藥毒邪熱驚癎百病黄金百两寒水石磁石石膏活石各一斤研已上用水一石煮至四斗去查入下項炙甘草八两羚羊角屑犀角屑青木香沉香各五两丁香一两升麻𤣥参並剉細各一斤已上再煮至一斗五升入下項硝石四斤芒亦得每斤得七两七錢五分朴硝十斤净已上入前汁中㣲火煎桺枝不住手攪候有七斤投放木盆中半日欲凝入下項藥攪令匀入硃砂三两當門子一两二錢五分右藥成紫色霜雪每服二錢或一錢冷水調下大人小兒消息虚實加减食後服千金黒奴丸治火熱陽毒發班發狂煩躁大渇倍常黄芩斧底煤芒硝灶突墨梁上塵麻黄小麥奴大黄各一两右為末煉蜜為丸彈子大新汲水化服不定再服半丸飲水盡足當發寒寒已汗出乃差未汗再服半丸渴不甚者勿與之赤水元珠卷一
