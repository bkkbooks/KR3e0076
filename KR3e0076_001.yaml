body:
  text: 赤水元珠卷一明孫一奎撰風門明風篇生生子曰風春之令氣也木之所司肝為之主素問六化篇云木之化風主於春春之為言蠢也陽氣蠢動故風所以鼓舞萬物為天號令岐伯曰東方生風風生木其臟為肝其志為怒故怒傷肝風傷肝肝為足厥隂之經以六氣言之自十二月大寒節起至二月春分節止是初之氣厥隂風木用事人有感其令氣者為傷風其有不即發於令氣而四時亦有傷風之症者時人謂之四時感冒感有淺深治有緩急令既不同治亦有異故首述經文以明風之體有所據而人天咸一之理實寓焉後别治法以見風之變症無常非簡約可盡先賢有言曰風乃百病之長善行而數變非易言也信夫傷風仲景傷寒論謂有汗惡風脈浮數為傷風外有六經之形症太陽症頭項痛腰脊強以桂枝湯治之後若傳經當究仲景節菴治法治之其餘不過感冒耳四時皆有之以後法按治九味羌活湯治四時傷寒傷風頭痛遍身盡痛腰脊強發熱晝夜不散不思飲食羌活防風川芎白芷細辛柴胡黃芩生地甘草蒼术薑三片棗一枚水煎熱服如惡心減黃芩如有汗加白术減蒼术如口渴加知母石膏如一二帖不解或天寒時月加麻黃如鼻塞加紫蘇蔥白夫此方豫每用加柴胡乃總治傷風各經之活套也今人只知其治四時傷寒如神不知加柴胡總治各經之妙蓋羌活治太陽肢節痛大無不通小無不入乃撥亂反正之主也防風治一身盡痛聽君將命令而行隨所引而至柴胡治少陽頭疼在兩頭角及寒熱脅痛耳聾白芷治陽明頭痛在額蒼术雄壯能除足太隂經濕氣使邪不得傳脾生地黃治手少隂心熱在內黃芩治手太隂肺熱在胸細辛治足少隂腎經苦頭痛不已川芎治足厥隂頭痛在腦此方乃易老所製凡見表證悉宜服之不犯三陽禁忌實解利之神藥也然以一藥而類治各經之證苟用其方而不知其所以立方之意則未免有執一之弊故述各藥主治本旨使學者詳各經之症孰重以本經之藥為君迭為賔主則所治無不響應和解散治傷風鼻塞咳嗽胸脅吊痛發熱口渴紫蘇杏仁陳皮半夏前胡薄荷葛根甘草炙桔梗桑白皮薑三片蔥白三根棗子一枚風邪重加防風桂枝湯治太陽頭項痛腰脊強自汗桂枝赤芍甘草炙薑三片棗二枚煎服取微汗此冬月即病宜服春分後忌之小便數及飲酒人皆不宜服飲酒人不喜甘恐中滿而嘔也參蘇飲治傷風鼻塞發熱惡心有痰胸膈不利橘紅枳殼桔梗粉草炙各一錢木香一分蘇葉半夏乾葛前胡人參茯苓各八分薑三片棗一枚咳嗽甚者去人參木香熱盛喉疼除半夏加天花粉酒芩熱傷風咳嗽喉疼面熱此素有痰火鬱熱在內熱極生風或為風寒所束不得發越此熱為本寒為標治宜清熱散寒經云火鬱則發之又曰風寒外束者可發二陳湯加桔梗天花粉玄參薄荷酒芩前胡嗽不轉加瓜蔞仁夜嗽多加知母喉疼減半夏痰盛加貝母枳殼肺熱氣壅輕則加桑白皮地骨皮重則加石膏肺氣虛發熱咳嗽服前發散藥其嗽愈甚或被發散太過當用收斂之劑補之日間嗽多吐白痰沫或惡心者為氣虛六君子湯加五味子薏苡仁欵冬夜嗽多口渴痰不易出發熱為血虛四物湯加知母五味子馬兜鈴麥門冬瓜蔞仁肺氣實或素有痰為風寒所閉鼻塞咳嗽氣壅不得倒頭而卧三拗湯麻黃連根節甘草生用杏仁不去皮尖薑三片棗二枚煎服取清痰乃止火盛者瀉白散加石膏枳殼天花粉前胡效遲加玄明粉一錢調下立應中風內經云風之傷人也或為寒中或為熱中有中血脈有中腑有中臟東垣云中血脈者口眼喎斜中腑者肢節廢面加五色有表證拘急不仁中臟者唇緩失音鼻塞耳聾眼瞀便閉性命危急此三者治各不同如中血脈外有六經之形症則從小續命湯加減及踈風湯治之如中腑內有便溺之阻隔宜三化湯局方中麻仁丸通利之外無六經之證內無便溺之阻宜大羌活愈風湯秦艽湯中臟痰涎昏冒宜至寶丹之類鎮墜之綱目云中風世俗之稱也其證卒然仆倒口眼喎斜半身不遂或舌強不言唇吻不收是也然名各有不同卒然仆倒者經稱為擊仆世又稱為卒中乃初中風時其狀又如此也其口眼喎斜半身不遂者經稱為偏枯世又稱為左癱右瘓及腲腿風乃中倒後之症邪之淺者狀如此也其舌強不言唇吻不收者經稱為痱病世又稱為風懿風氣亦中倒後症邪之深者狀如此也東垣以中脈中腑邪淺而易治中臟為邪深而難治者得之矣凡病偏枯必先仆倒故內經連名稱為擊仆偏枯也後世迷失經意以偏枯為痱病之旨一以中風名之遂指偏枯為枯細之枯而非左癱右瘓之症習俗之弊至於如此也殊不知仲景云骨傷則痿名曰枯蓋痿緩不收則筋骨氣肉無氣以生脈道不利手足不稟水穀之氣故曰枯非細之謂也積日纍月漸成細者間有之非可便指枯為細也此枯字即枯稿之枯初中倒時隨即醒者宜治若不醒者宜搯人中俾醒看痰涎壅盛宜吐之口噤亦吐之若口開手撒遺尿者為陽暴絶速宜大料參茋補接之若眼戴上者宜灸之玄珠經云風病口開手撒眼合遺尿鼻聲如鼾者五臟氣絶也蓋口開者心絶手撒者脾絶眼合者肝絶遺尿者腎絶聲如鼾者肺絶也若見一猶可用工若面赤時黑主陽上散腎水反尅心火兼遺尿口開氣喘斷不救也按已上皆真中風症也由人元氣素虛腠理踈豁衛弱失護一遇風邪莫之能禦經曰邪之所湊其氣必虛救醒後多用驟補法丹溪獨參膏加竹􅅹薑汁之類與類中風症不同法也附方小續命湯麻黃去節人參黃芩芍藥防已川芎杏仁甘草桂各一兩附子五錢防風一兩五錢每服五七錢加生薑五片水煎食前熱服金匱要略有石膏當歸無附子大凡中風不審六經之加減雖治之不能去其邪也內經云開則淅然寒閉則熱而悶知暴中風邪宜先以加減續命湯隨症治之中風無汗惡寒麻黃續命主之依本方麻黃防風杏仁合各加一倍宜針至隂足小指外側爪甲角針入二分出血崑崙足外踝後跟骨舉蹻取之中風有汗惡風桂枝續命主之依本方芍藥桂枝杏仁各加一倍宜針風府項後入髮際一寸針七分禁灸上二證皆太陽經中風也中風有汗身熱不惡寒白虎續命主之依本方甘草加一倍外加石膏知母各二兩中風有汗身熱不惡風葛根續命主之依本方桂枝黃芩各加一倍外加乾葛二兩宜針陷谷足大指次指間本節後陷中針五分去陽明之賊刺厲兊在足大指次指去爪甲如韭葉瀉陽明之實上二證皆陽明經中風中風無汗身涼附子續命主之依本方附子加一倍甘草加三兩外加乾薑二兩宜刺隱白足大指內側衣甲角去太隂之賊此太隂經中風也中風有汗無熱桂枝續命主之依本方桂枝附子甘草各加一倍宜針太溪足內踝后根骨上陷中動脈應手針過崑崙此少隂經中風也中風六經混淆繫之於少陽厥隂或肢節攣痛或麻木不仁宜羌活連翹續命主之小續命八兩外加羌活四兩連翹用六兩古之續命混淆無症之别今各分經治療又分經針刺法厥隂之井大敦足大指甲後一韭葉聚毛間刺以通其經少陽之經絶骨外踝上三寸灸五壯灸以引其熱是針灸同象法治之大體防風通聖散防風川芎當歸芍藥大黃芒硝連翹麻黃去節薄荷山梔白术荆芥各五錢石膏桔梗黃芩各一兩滑石甘草各二兩每服一兩加生薑水煎服中風外無六經之形證內無便溺之阻隔知血弱不能飬筋故手足不能運動舌強不能言語宜飬血而筋自榮大秦艽湯主之泰艽三兩甘草川芎當歸白芍石膏各二兩細辛五錢羌活防風黃芩白芷白术生地熟地白茯苓各一兩川獨活二兩右十六味銼每服一兩水煎溫服無時如遇天隂加生薑如心下痞每兩加枳實一錢同煎中風外有六經之形證先以加減續命湯隨症治之內有便溺之阻隔復以三化湯主之厚朴大黃枳實羌活各等分右銼如麻豆大每服三兩水三升煎至一升半終日服之以微利為度無時法曰四肢不禁俗曰癱瘓故經所謂太過則令四肢不禁又曰土太過則敦阜阜髙也敦厚也既厚而又髙則令除去此真所謂膏粱之疾非肝腎經虛也何以明之經所謂三陽三隂發病為偏枯痿易四肢不禁王注曰三隂不足則發偏枯三陽有餘則痿易易為變易嘗用而痿弱無力也其治則瀉令氣弱陽衰土平而愈或三化湯調胃承氣湯選而用之若脾虛則不用也經所謂土不及則卑陷卑下也陷坑也故脾病四肢不用四肢皆稟氣於胃而不能至經必因於脾乃得稟受也今脾不能與胃行其津液四肢不得稟水穀氣氣以日衰脈道不行筋骨肌肉皆無氣以生故不用焉其治可補十全散加減四物去邪留正愈風湯中風症內邪已除外邪已盡當服此藥以行導諸經久服大風悉除縱有微邪只從此藥加減治之然治病之法不可失其通塞或一氣之微汗或一旬之通利如此為常治之法也久則清濁自分榮衛自和如初覺風動服此不致倒仆羌活甘草防風川芎細辛枳殼人參麻黃甘菊薄荷當歸知母黃茋柴胡前胡半夏厚朴各二兩生地四兩熟地防已茯苓黃芩白芷蔓荆子枸杞地骨皮各二兩石膏蒼术各四兩桂一兩芍藥三兩獨活杜仲各二兩右銼每服一兩水二鍾煎至一鍾溫服如遇天隂加生薑空心一服臨卧再煎渣服俱要食逺空心一服咽下二丹丸為之重劑臨卧一服咽下四白丹為之輕劑是動以安神靜以清肺假令一氣之微汗用愈風湯三兩加麻黃一兩均作四服每服加生薑五片空心以粥投之得微汗則佳如一旬之通利用愈風三兩大黃一兩亦均作四服如前煎臨卧服得利則妙常服之藥不可少四時之輔如望春大寒後加半夏柴胡人參各二兩木通四兩此迎而奪少陽之氣也望夏之月加石膏黃芩知母各二兩此迎而奪陽明之氣也季夏之月加防已白术茯苓各二兩勝脾土之濕也初秋大暑之後加厚朴二兩藿香二兩桂一兩木通二兩此迎而奪太隂之氣也霜降之後望冬加附子一兩桂一兩當歸二兩勝少隂之氣也得春減冬所加藥四時類此雖立法於四時之加減更宜臨病之際審病之虛實寒熱土地之宜邪氣之多少此藥具七情六欲四氣無使五臟偏勝不動於榮衛如風祕服之則永不燥結如久㵼服之則能自調初覺風氣便服此藥及新方中天麻丸各一料相為表裏治未病之聖藥也及已病者更宜當服無問男婦及小兒驚癎抽搐急慢驚風等病服之神效如解利四時傷風隨四時加減法又療脾腎虛筋弱言語難精神昏憒及治內弱風濕內弱者乃風熱火亢體重者乃風濕土餘內弱之為病或一臂肢體偏枯或肥而半身不遂或恐而健忘喜以多思故思忘之道皆情不足也是以心亂則百病生於心靜則萬病悉去故此藥能安心飬神調隂陽無偏勝及不動榮衛四白丹能清肺氣飬魄謂中風者多昏昧氣不清利也白术茯苓人參砂仁防風川芎各五錢白芷一兩知母細辛各二錢羌活獨活薄荷各二錢半白􅀈一錢半甘草香附炒各五錢甜竹葉三兩麝一字龍腦五分牛黃五分藿香一錢半右藥二十味計八兩六錢三字為細末煉蜜為丸每兩作十丸臨卧嚼一丸分五七次嚼之上清肺氣下強骨髓二丹丸治健忘飬神定志和血內安心神外華腠理丹參兩半丹砂五錢為衣逺志五錢茯神一兩人參五錢菖蒲五錢熟地一兩半天門冬一兩半麥冬一兩甘草五錢右為細末煉蜜丸桐子大每服五十丸至百丸空心食前常服安神定志一藥清肺一藥安神故清中清者歸肺以助其真清中濁者堅強骨髓血中之清榮飬於神血中之濁者華榮腠理如素有痰久病中風津液湧溢在胸中氣所不利用獨聖散吐之後用利氣瀉火之劑瀉青丸治中風自汗昏冒發熱不惡寒不能安卧此是風熱煩躁方在火門天麻丸行榮衛壯筋骨天麻六兩酒浸三日牛膝六兩酒浸三日杜仲炒去絲萆􅐺六兩另研玄參六兩當歸十兩生地一斤羌活十兩附子一兩右為末煉蜜丸桐子大常服五七十丸病大至百丸空心食前溫酒或白湯下平眀服藥至日髙飢則止藥大忌壅塞失於通利故服藥半月稍覺壅微以七宣丸輕踈之使藥再為用也牛膝萆薢治筋骨杜仲使筋骨相著天麻羌活和風之聖藥當歸地黃飬血能和榮衛玄參主用附子佐之行經藥也抱拙子曰按中風之證卒然倒仆口眼喎斜半身不遂或舌強不語唇吻不收是也然名各不同有曰風癔以心悶閉不能言喉中噫噫作聲蓋肺氣入心則能言邪中心肺痰涎潮塞故使然也有曰風痱者以風涎散注於關節氣不能行故使四肢不遂也有曰舌強不語者以風入心脾二經心之别脈系於舌本脾之脈俠咽連舌本散舌下今風涎入其經絡故舌不轉而不能言也有曰四肢拘攣者以風冷邪氣入於肝臟使諸經攣急屈而不伸也有曰風柔者以風熱邪氣入於肝臟使諸經弛張緩而不收也有曰風顫者以風入肝經上氣不守正位故使頭招靣搖手足顫掉也有曰風瘖者以風冷之氣客於中滯而不能發故使口禁不能言也與前涎塞心肺同候此以口噤為異耳要略曰風之為病當半身不遂經絡空虛賊邪不瀉或左或右邪氣反緩正氣則急正氣引邪喎僻不遂邪在於絡肌膚不仁邪在於經即重不勝邪入於府即不識人邪入於藏即難言口吐涎已上所論皆言風從外入也劉守真曰風病多因熱甚俗云風者言末而忘其本也所以中風有癱瘓者非謂肝風實甚而卒中之也亦非外中於風良由將息失宜而心火暴甚腎水虛衰不能制之則隂虛陽實而熱氣拂鬱心神昏冒筋骨不用而卒倒無知也張潔古曰人之氣以天地之疾風名之故中風者非外來風邪乃本氣自病也凡人年逾四旬氣衰者多有此疾壯歲之時無有也若肥盛之人則間有之亦是形盛氣衰故如此治法和臟腑通經絡便是治風李東垣之説與潔古同朱彥修曰西北氣寒為風所中者誠有之東南氣溫地濕有風病者非風也皆濕生痰痰生熱熱生風也已上所論皆言風從內出也夫自古論中風者悉主於外感而劉張諸子則主於內傷今詳此病蓋因先傷於內而後感於外相兼成病者也但有標本輕重不同耳假如百病皆有因有證因則為本證則為標古人論中風者言其證也諸子論中風者言其因也豈可以中風一證岐而為二哉故古人所論外感風邪者未必不由本體虛弱榮衛失調之所致諸子所論火盛氣虛濕痰者未必絶無風邪外侵之所作若無風邪外侵則因火因氣因濕各為他證豈有暴仆暴瘖口眼喎斜手足不遂舌廢不用昏不識人之候乎治法外感重者宜先祛外邪而後補中氣內傷重者宜先補正氣而後攻外邪或以散風藥為君而補虛藥為佐使或以補虛藥為君而散風藥為佐使全在活法量標輕重而治之凡中風證內邪已除外邪已盡當服愈風湯以行導諸經久服大風悉去縱有微邪只從此藥加減蓋能和榮衛踈經絡有補氣飬血之功祛濕消痰之效踈而不耗補而不治不燥不寒誠觀左右之輕重上下之緩急酌而用之無不克濟按中風五臟亦顯外證目瞀者中於肝舌不能言者中於心唇緩便祕者中於脾鼻塞者中於肺耳聾者中於腎此五者病深為難治但風中腑者多兼中臟如左關脈浮弦面目青左脅偏痛筋脈拘急目瞤頭眩手足不收坐踞不得此中膽兼中肝也用犀角散之類如左寸脈浮洪面赤汗多惡風心神顛倒悚悸恍惚言語蹇澀舌強口乾此中小腸兼中心也用麻黃散之類如右關脈浮緩或浮大面唇黃汗多惡風口喎語澀身重嗜卧肌肉不仁腹脹不食此中胃兼中脾也用防風散之類如右寸脈浮澀而短面白鼻流清涕多喘胸中冒悶短氣自汗聲嘶四肢痿弱此中大腸兼中肺也用五味子湯之類如兩尺脈浮滑面目黑黧腰脊痛引小腹不能俯仰兩耳鳴骨節痛足痿善恐此中膀胱兼中腎也用獨活散之類此皆言真中風也而有氣血之分焉氣虛而中者由元氣虛而賊風襲之則右手足不仁用六君子加鈎藤薑汁竹􅅹血虛而中者由隂血虛而賊風襲之則左手足不仁用四物湯加鈎藤竹􅅹薑汁氣血俱虛而中者則左右手足皆不仁矣用八珍湯加鈎藤竹􅅹薑汁其與中風相類者則有中寒中暑中濕中火中氣食厥勞傷房勞等證中於寒者謂冬月卒中寒氣昏昧口噤肢攣惡寒脈浮緊用麻黃桂枝理中湯之類中於暑者謂夏月卒冒炎暑昏冒痿厥吐瀉喘滿用十味香茹飲之類中於濕者丹溪所謂東南之人多因濕土生痰痰生熱熱生風也用清燥湯之類加竹􅅹薑汁中於火者河間所謂非肝木之風內中六淫之邪外侵良由五志過極火盛水衰熱氣拂鬱昏冒而卒仆也用六味丸四君子獨參湯之類內有恚怒傷肝火動炎上者用柴胡湯之類中於氣者由七情過極氣厥昏昧或牙關緊急用蘇合香丸之類誤作風治者死食厥者過於飲食胃氣自傷不能運化故昏昧也用六君子加木香勞傷者過於勞役元氣虛耗不任風寒故昏冒也用補中益氣湯房勞者因腎虛精耗氣不歸原故昏冒也用六味丸此皆類中風者也邪之所湊其氣必虛故風之傷人雖云臟腑俱受而肺肝二經居多蓋風邪之入先於皮毛之虛皮毛受邪則內客於肺肺主氣肺邪既盛則氣必上逆所以有痰涎壅塞昏暈倒仆之狀肝主筋屬木與風其氣相感以類相從故風邪乘虛肝經受之則筋緩不榮或筋縮不舒所以有手足拘攣或四肢癱瘓之狀治風之法初得病即當順氣及日久即當活血此萬古不易之理蓋風病未免有痰治痰先治氣氣順則痰清治風先活血血行風自滅順氣和血斯得病情若光不順氣便用烏附又不養血徒用麻防未見有愈者也內經治口眼喎斜多屬足陽明筋病蓋足陽明筋結頰上得寒則急得熱則弛左寒右熱則左頰筋急牽引右之弛者而喎向左也右寒左熱則右頰筋急牽引左之弛者而喎向左也故其治法以火灸且為之膏油尉其急者以白酒調和桂末塗其弛者後人用酒煮桂取汁以故布浸拓病上左喎斜拓右右喎斜拓左即內經用酒桂塗法也人之一身經絡貫串謂之脈脈者血之隧道也血隨氣行周流不停筋者周布四肢百節聫絡而束縛之此屬肝木得血以飬之則和柔而不拘急脈皆起於手足指端故十二經皆以手足而名筋則無處無之皮毛者屬肺主外而易於感冒人身之血內行於脈絡而外充於皮毛滲透肌肉滋飬筋骨故百體平和運動無礙若氣滯則血滯氣逆則血逆得熱則瘀濁得寒則凝泣衰耗則順行不周滲透不遍而外邪易侵矣津液者血之餘行乎脈外流通一身如天之清露若血濁氣滯則凝聚而為痰痰乃津液之變遍身上下無處不到津液生於脾胃水穀所成濁則為痰故痰中於脾土也是以古人論中風偏枯麻木等證以血虛瘀血痰飲為言是論其致病之源至其得病則必有所感觸或因風或因寒或因濕或因酒或因七情或勞役房勞汗出因感風寒濕氣遂成此病此血病痰病為本而外邪為標其邪中於皮毛肌肉則不知痛癢麻木不仁如有物一重貼於其上或如蟲逰行或灑灑寒慓遇熱則或癢遇隂雨則沉重酸痛其邪入於血脈經絡則手足指掌肩背腰膝重硬不遂難於屈伸舉動或走注疼痛此上諸症皆外自皮毛以至筋骨之病凡脈所經所絡筋所會所結血氣津液所行之處皆邪氣鬱滯正氣不得流通而致然治者當以飬血除風順氣化痰為主不必強度某病屬某經某臟而雜治之也風病遺尿屬氣虛參茋補之小便不利者勿用利藥既得自汗則津液外亡小便自少若利之使榮衛枯竭無以制火煩熱愈甚當候熱退汗止小便自行兼此症乃陽明大忌利小便須當識此婦人産後中風口噤手足瘈瘲如角弓狀或血暈四肢強直俱用荆芥略炒為末黑豆淋酒調下三錢極妙或加當歸入酒少許水煎灌下即省秦艽升麻湯秦艽升麻乾葛芍藥人參甘草白芷防風桂枝連鬚蔥白水煎川芎石膏湯此乃防風通聖散加減法也防風川芎當歸芍藥連翹石膏黃芩桔梗薄荷人參荆芥大黃甘菊滑石甘草山梔砂仁寒水石生薑水煎服八味順氣散白术青皮白芷烏藥人參陳皮甘草白茯苓烏藥順氣散麻黃陳皮烏藥乾薑甘草殭蠶川芎枳殼白芷桔梗生薑大棗水煎服六合湯熟地當歸川芎芍藥秦艽一作防風羌活水煎服三生飲南星一兩生川烏去皮臍生附子去皮臍生各半兩木香二錢半生薑十片右每服五錢水煎省風湯南星三錢生防風三錢生半夏湯泡生甘草生黃芩各一錢半右加生薑三片水煎溫服搐鼻通天散藜蘆川芎白芷細辛防風薄荷各一錢豬牙皂角三箇刮去皮子右為末吹鼻中開關散一名破棺散治中風口噤南星末五分氷片少許右五月五日午時合以中指點末揩齒左右其口自開攝生飲蒼术木香南星半夏細辛菖蒲甘草生生薑痰盛加全蝎水煎服稀涎散白礬一兩半生半枯牙皂四箇肥實不蛀者去皮弦炙黃右為末溫水調下一二錢吐出痰涎便省解語湯一方有石菖蒲逺志羌活防風天麻肉桂川芎南星陳皮白芷當歸人參甘草酸棗仁羚羊角水煎入竹瀝半盞再一滚服清心散青黛硼砂薄荷各二錢牛黃氷片各三分右為末先以蜜水洗舌後以薑汁擦舌將藥末蜜水調稀搽舌本上加味轉舌膏連翹逺志薄荷柿霜各一兩石菖蒲六錢梔子炒防風桔梗黃芩酒炒玄明粉甘草酒大黃各五錢犀角川芎各三錢右為末煉蜜丸彈子大硃砂五錢為衣食後臨卧薄荷湯嚼下一丸訶子清音湯桔梗一兩半生半炒訶子四十九箇半生半炮甘草二錢半生半炙右為末每服七錢童便一大碗煎熱調服大八風湯當歸杏仁灸草桂心乾薑炮五味升麻六分川烏炮黃芩炒芍藥炒獨活防風川芎麻黃秦艽石斛人參茯神石膏黃茋紫苑三分大豆去皮炒九分虎脛骨酒防風萆薢當歸松節龜板虎骨酥炙各二兩晚蠶沙五加皮秦艽羌活各二兩白术三兩枸杞子蒼耳子各四兩牛膝一兩鱉甲一兩乾茄根八兩飯上蒸一方有石斛續斷杜仲巴戟各一兩右銼碎絹袋盛之以無灰酒三斗浸壜內春秋七日夏五日冬十日密固煮滚封七日開取時不可面向壜口恐藥氣沖目每日早午晚間病人自取酒一小杯服之不許多飲又不令藥力斷絶病痊酒盡將渣晒乾再入乾浮萍一斤半木香一兩防已木瓜各二兩麝少許研為末酒糊丸桐子大酒下五十丸日用三服忌食動風之物又曰凡中風者俱有先兆之症凡人如覺大拇指及次指麻木不仁或手足不用或肌肉蠕動者三年內必有中風之症經曰肌肉蠕動命曰微風宜先服八風散愈風湯天麻丸各一料為愈夫大拇指次指皆手足太隂陽明經中風多著此經也先服祛風滌熱之劑辛涼之藥治內外之邪是以聖人治未病不治已病又云善治者治皮毛是治萌芽也故初成者獲愈固久者伐形是治未病之先也丹溪云大率治風主血虛有痰治痰為先或挾火與濕蓋濕生痰痰生熱而熱生風也半身不遂者大率多痰在左屬死血與無血宜四物湯加桃仁紅花竹􅅹薑汁在右屬氣虛屬痰宜四君子湯二陳湯加竹􅅹薑汁氣虛卒倒參耆湯補之挾痰則濃煎人參湯加竹􅅹薑汁血虛四物湯補之挾痰則四物皆用薑汁炒過加竹􅅹薑汁能食者去竹􅅹加荆􅅹竹􅅹荆􅅹乃開經絡行血氣故為必用之劑肥人多濕少加烏頭附子行經肥人中者以其氣盛於外而歉於內也肺為氣出入之道肥人氣必急急則痰涎上壅邪盛可知所以治之必先理氣為急中後氣未順痰未除調理之劑惟當用藿香正氣散和星香散煎服此方非特可治中風之症中氣中惡尤宜尋常嘔吐痰厥及胸膈飽悶者皆可用之治風之法初得之必先順氣及日久則當活血此萬古不易之理有以四物吞活絡丹愈者正此意也設不先順氣化痰遽用烏附又不活血徒用防風天麻羌活輩吾未見其能治也若飲食坐卧如常但失音不語只以小續命湯去附子加石膏菖蒲一錢開關之劑稀涎散治中風不語牙關緊急單蛾雙蛾江子仁六粒每粒分作兩半牙皂三錢切片明礬一兩化開礬將二味投入攪勻待礬枯為末每用三分吹入諸病皆愈痰涎壅盛者以五分燈心湯下喉中之痰逆上者即吐膈間者即下凡中風口噤不開用白鹽梅揩齒即能開乃可進藥丹溪用藜蘆為末加麝香少許入鼻內吐之一吐不愈再吐之虛甚者不可吐救急通關散治中風中氣一應急病宜先以此開關牙皂細辛二味為末吹入鼻內得嚏佳蘇合香丸擦牙上牙關即開再以生薑自然汁并三生飲俟其蘇省然後次第進以順氣之劑或排風續命之類勝金丸治中風忽然仆倒如醉形體昏悶四肢不收涎潮逆上隔氣不通命在須臾生薄荷五錢牙皂二兩捶碎水一升二味同浸取汁研成膏瓜蒂末一兩藜蘆末二兩硃砂半兩另研右將硃砂末二分和二味末子和勻用膏子為丸龍眼大硃砂為衣溫酒化下一丸甚者二丸以吐為度得吐即醒不醒者不治桑枝法桑枝一升炒香以水三大升煎取二升一日服盡圖經云桑枝溫平不涼不熱可以常服療體中風癢乾燥腳氣風氣四肢拘攣上氣眼暈肺氣咳嗽消食利小便久服身輕聰明耳目令人光澤兼療口乾仙經云一切仙藥不得桑煎不服出抱朴子政和間何子常病兩臂痛諸藥不效依此作數劑臂痛即愈凡治中風莫如續命之類然此可扶持初病若要收全功火艾為良中風皆因脈道不利血氣閉塞也灸則喚醒脈道而血氣得通故收全功中風不語用龜尿少許點於舌神效取龜尿法置龜新荷葉上用豬棕鼻內刺之即出一方治半身不遂口眼喎斜頭目眩運痰火熾盛筋骨時疼此乃原於血虛血熱挾痰挾火經絡肌表之間先已有其病根後因感冒風寒或過嗜醇酒膏粱而助痰火或惱怒而逆肝氣遂有此半身不遂之證其在於經絡肌表筋骨之間尚未入臟腑並以此方治之蓋此方有補血活血之功不致於滯有健脾燥濕消痰之能不致於燥有清熱運動踈風開經絡通腠理內固根本外散病邪王道劑也多服見功白术一錢半川芎一錢半南星半夏芍藥茯苓天麻各一錢川歸生地熟地牛膝酸棗仁黃芩橘紅各八分羌活防風桂各六分紅花炙甘草各四分黃柏八分水煎入竹􅅹薑汁侵晨服瘖痱素問太隂所謂入中為瘖者陽氣已衰故為瘖也內奪而厥則為瘖痱此腎虛也少隂不至者厥也脈解篇王注云痱廢也腎氣內奪則舌瘖足廢綱目云厥逆者溫補之河間地黃飲子是也河間地黃飲子治瘖痱不能言足廢不能用腎氣弱其氣厥不至舌下熟地肉蓯蓉酒浸焙巴戟石斛附子炮五味菖蒲逺志官桂麥冬山茱茰白茯苓各等分水盞半薑五片棗一枚薄荷同煎至八分不拘時服麝香散卒中風瘖啞倒地不省左右癱瘓口眼喎斜諸藥未服者服之真麝二錢真香油二兩若遇此症將麝香研細入油攪勻開口灌之其人自蘇不獨治中風且全其言語不蹇手足不癱服此後方服順氣踈風之劑蓋麝香通關節可以行至病所也疫門凡衆人病一般者此天行時疫治有三法宜補宜散宜降用大黃黃芩黃連人參桔梗蒼术防風滑石香附人中黃為末神麯糊為丸每服五七十丸氣虛四君子血虛四物痰多二陳湯作使送下熱甚者加童便生生子曰夫溫病有冬傷於寒不即發過時而為春溫者有冬不藏精者有感四時不正之氣者有君相二火加臨而沿門闔境相似者有用和解法者有用補法者有用寒涼者有用漬法者各推其所因而施治之母執熱之一途而槩用寒涼法也大抵治時疫當按邪在何經及恭之時月故奏效甚捷發熱發班以玄參升麻湯治之頭痛先寒後熱以小柴胡湯渴加知母天花粉無汗加葛根夏加石膏知母各三錢先熱而後寒口渴無汗葛根升麻湯加柴胡熱甚及夏月加石膏知母但熱無寒口渴煩躁白虎湯加麥門冬大渴大熱譫語腹滿脈洪大有力柴胡湯或涼膈散發熱而大便㵼小便短柴苓湯發熱口渴而小便不利五苓散韓飛霞五瘟丹亦妙張子和六神通解散治時病從外而感者頭痛體疼見風怕寒遇暖則喜不問日數皆當大汗麻黃一錢半蒼术甘草黃芩各一錢石膏滑石各二錢薑蔥煎熱服如譫語神思不寧熱邪在裏而汗不能盡解又加人參黃連二味即安此方用藥輕微人多不曉易而忽之不知其中自有神妙如解汗未通更加紫蘇葉葛根白芷等助其威風得汗其病如掃治瘟病活套人中黃療時行熱毒為君蒼术香附散鬱為臣黃芩黃連降火人參補虛桔梗防風利氣行經為佐熱鬱結則內外氣液不通成燥大黃苦寒而能滌蕩燥熱滑石性滑味淡將以利竅解結通氣液以潤燥二者一隂一陽用之為使藿香正氣散治外感發熱頭痛內因痰飲凝結作熱四時疫癘或中腕痞滿嘔逆惡心霍亂及傷寒頭疼增寒壯熱茯苓白芷紫蘇陳皮桔梗大腹皮甘草白术厚朴半夏各一兩半藿香三兩前胡右每服五錢薑三片棗一枚水煎熱服欲出汗以被覆之如挾飲食加枳實山查腹疼加砂仁蒼术減白术敗毒散治四時疫癘傷風有汗風濕身腫體疼惡風口乾日晡發熱茯苓甘草人參桔梗川芎柴胡前胡枳殼羌活獨活各等分生薑三片薄荷五片水煎服六神散治大熱發強譫語方在狂門漬法五枝湯治時疫用表藥太多而肺金枯燥以致腠理經密不能得汗而熱不解桑槐桞桃榆各四十九條煎湯浴之少頃膚潤而汗出熱因退矣辟疫丹雄黃末一錢麝半分用黑棗肉搗為丸棗核大硃砂為衣綿包塞入鼻中男左女右入病家則不染疫氣神仙百解散茵陳柴胡前胡人參羌活獨活蒼术米泔浸炒甘草乾葛白芍升麻防風藁本藿香半夏白术各一兩立春以後不加減立夏已後一料內加柴胡赤茯苓川歸各五錢立秋已後減柴胡一分不用川歸赤茯苓只加乾葛肉桂去粗皮各一分麻黃去節五錢立冬已後並無加減一方無川歸有黃芩五錢右為細末每服三錢水一鍾半薑三片棗二枚煎一鍾熱服併進二服如要表藥加蔥白三寸淡豆豉三十粒同煎服以衣被蓋覆汗出而愈頭面腫俗名鸕鷀瘟蝦蟆瘟一車前草用水煎服極效大祕者加蜂密匙多是少陽陽明二經之火上壅熱極而生風也故腫每在兩頰車及耳前後當用清降二法防風通聖散加減治之感之輕者只清之亦自消散不必加硝黃恐藥過於病也豫嘗治多加痰藥於清散之中取效甚速今列於左白殭蠶天花粉酒芩酒連大力子甘草柴胡各三錢貝母玄參桔梗枳殼各八分連翹石膏各三錢升麻一錢蔥白三根薑三片淡竹葉二十片食後緩緩服之大便祕結加酒煨大黃一錢若被重劑瀉下太過損傷中氣脾弱泄瀉面與項腫不退此所謂上熱未除中寒復生者也以小柴胡湯加白术山藥升麻白芷一補一消庶幾保全大頭病與此亦相須而治丹溪曰大頭天行病乃濕在髙巔之上用羌活酒芩酒煨大黃隨病加減不可用降藥東垣有法有方謂陽明邪熱大甚資實少陽相火而為之視其腫熱在何部隨經治之當緩勿令重劑過其病所陽明之邪首大腫少陽之邪出於耳前後先以酒炒黃芩黃連炙甘草煎頻頻少與呷之食後再煎大黃大力子臨時加芒硝等分亦時時呷之俟邪氣少殺只服前藥未已再如前次第服之取大便邪氣已即止陽明渴加石膏少陽渴加括蔞根陽明行經升麻芍藥葛根甘草太陽行經羌活荆芥防風並與上藥相合服之或云頭痛酒芩口渴乾葛身疼羌活桂枝防風芍藥海藏神术湯治內傷冷飲外感寒邪無汗者蒼术製防風各二兩甘草一兩炒右㕮咀加蔥生薑同煎服如太陽症發熱惡寒脈浮而緊者加羌活二錢如太陽證脈浮緊中𢃄弦數者是兼少陽也加柴胡二錢如太陽證脈浮緊中𢃄洪者是兼陽明也加黃芩二錢婦人服者加當歸或加藁本湯各二錢如治吹妳煎成調六一散三五錢神效又神术湯六氣加減例太陽寒水司天加羌活桂枝餘嵗非時變寒亦加冬亦加陽明燥金司天加白芷升麻餘嵗非時變涼溫亦加秋亦加少陽相火司天加黃芩地黃餘嵗非時變雨濕亦加夏亦加太隂濕土司天加白术藁本餘嵗非時變熱濕亦加夏末秋初亦加少隂君火司天加細辛獨活餘嵗非時變熱亦加春末夏初亦加厥陰風木司天加川芎防風餘嵗非時變溫和亦加春亦加已上神术湯六氣加減法非止為司天之氣設也至于嵗之主氣與月建日時同前應見者皆當隨所見依例加減之按海藏此論與戴人云病不如是當年氣看與何年運氣同便向此中求妙法方知皆在至真中之歌相表裏實發前人之所未發也蓋海藏此論所謂某氣司天加某藥者治常氣之法也所謂隨所應見加減者治變氣之法也戴人所謂看與何年同氣求治法者亦治變氣之法也能將二公之法擴充行之則內經運氣之本義燦然矣夫內經論運氣有常氣有變氣常氣有定紀如某年屬某氣司天當寒某年屬某氣司天當熱是也變氣者無定紀如某年屬某氣司天當寒反變熱當熱反變寒是也王氏注文釋以經無定紀之變氣作有定紀之常氣使後學皆以年嵗占運氣而其應者十無一二是以人莫之信而其道湮晦久矣二公生於數千百年之後復啓其端而續之功亦巨矣火熱門火之與熱微甚之間而已各標門户近贅今歸之於一便尋治也明火篇五運六化篇曰君火之化熱主春末夏初行暄淑之令而不行炎暑應君之德也生生子曰諸書言火不一於雜症中言者往往至言火雜症而兼令氣者雖間有之而未暢也愚謂天有六氣火居其二地有五行火居其一人之五臟德合五行火之有二君相是已火之在易為離離者內隂外陽主乎動者也動則生故曰天不能逺火以生物人不能逺火以有生過動則變而反消爍於物也在禦之何如爾按內經氣交變大論篇云南方生熱熱生火其令熱其變消爍其災燔炳又運氣五行生死順逆篇曰火主於南應夏火之為言化也言能化生萬物也顧其為疾不獨待於君相凡五志之火皆致眚也岐伯舉病機一十九條而屬火者五此先聖論火者大抵也後之言火者無論其他且以丹溪之特識乃分君火為人火相火為天火而後之人翕然頌之愚竊以為未然也夫火有天人不可以君相而分屬天人何也六六之氣以君火為二之氣經以熱稱之以相火為三之氣經以暑稱之是君相皆可以火稱也惟人之攝飬失宜則五臟之火隨觸而見觸之於心之經心之絡心之臟皆君火也固可以人火稱之若觸之於包絡觸之於三焦此相火也亦可以人火稱也而獨以天火稱之何哉又曰見於天者出於龍雷則木之氣出於海則水之氣雖其取譬無非欲狀相火之烈然但可以論五臟厥陽之火而非君相令氣有定位有倫序者言也彼造化之所以生生無窮者以其有不易之定體為之主然後四時行而萬物生蓋天人之理一致若外內君相之火亦必先有定位而後可以言變化惟善攝生者其五行五志之火有以默禆其生生之功故人莫得而見其端及其過極則酷烈之勢始見書謂寂然不動感而遂通是已愚故曰治火熱之症必先察夫令氣之流行而恭治之可也雖非火令司天之年然一嵗中既有此君相二節之氣治病者安得舍令氣而不加察之乎諸書義妄以命門為相火而主方即以滋隂降火湯為專劑以故今之治虛怯者未數月而多至殞促固司命者隂柄其權或亦治火之源未徹而妄投藥劑有以致之乎吾祁汪子良醫學質疑有外內君相篇言之頗悉言外者有曰火邪自天氣血感之而為病也得非令氣之天火歟言內者有曰乃人之調飬失宜正氣自傷而為病也得非所觸五志之人火者歟外內之因不同補瀉之治自别以外君相言之則有令氣之序以內君相言之則少隂少陽厥隂自明五志之火自見也况內外證治甚該瑩然可法似補前人所未臻雖其所約諸方未必能一一中其肻綮推其意極欲正其外內君相之名表其虛虛實實之治為後人作梯階工之與緻不遑計也而亦不以君相分天人也愚故録之於左以俟明哲採焉外內君相篇祁邑汪子良著夫火者明曜燔灼者也其性升燥其氣鬱蒸其色為赤其聲為鳴其味為苦其始為溫其變為寒其為害也十二經絡臟腑無所不至諸書以心為君火以黃連瀉之右腎命門為相火以黃柏制之以君相二火限於心腎非也隨其所寓而名之君火相火之説始於運氣諸篇而近世諸書繼之曰實火虛火人火龍火腎肝隂火五志之火之類其意雖各有所指而天人外內之未瑩則亦猶有惑也夫外者火邪自天氣血感之而為病也內者人之調飬失宜正氣自傷而為病也外內之因不同補瀉之治自别以外君相言之經有六節之序始於風木終於寒水自春分至小滿為二氣君火其令熱自小滿至大暑為三氣相火其令暑夫風火暑濕寒燥之六氣迭相盛衰以應六六之節而君相當其二焉君相云者乃熱暑微甚之分耳應則為平變則為病當其時則微非其時則甚如非時而有大熱則為瘟疫之病矣如君火之化熱感之則手少隂心太陽小腸臟腑主之相火之化暑人感之則手厥隂膻中少陽三焦臟腑主之夫君少隂也而心又主血血屬隂為病主靜相火少陽也而膻中又主氣氣屬陽為病主動故凡靜者皆君火之症也如痛癢瘡痬癰疽瘤氣結核紅腫鼻塞鼽嚏吐酸瞀鬱血溢血泄笑悲譫妄惡寒戰栗身熱轉筋腹脹有聲小便渾濁淋祕暴注下迫舊有霍亂吐下太隂之症今去之之類皆君火使之然也凡動者皆相火之症也如瞀瘛暴瘖冒昧躁攘狂越詈罵驚駭嘔涌溢食氣逆上衝諸禁鼓栗如喪神守喉痺耳鳴耳聾暴注􅀈瘛跗腫疼酸暴病暴病之類皆相火使之然也夫君相之火俱主於熱宜用寒涼正治但熱微甚之不同耳其在表者發之在裏者瀉之利之下之半表半裏者和之如柴胡黃芩瀉肝膽之火黃連瀉心火木通瀉小腸火芍藥瀉脾火石膏瀉胃火黃芩瀉肺火與大腸火知母瀉腎火黃柏㵼膀胱火此外君相之症治者也內之君相者正氣自傷為病有似火邪所發而實非也如諸書所謂實火可㵼虛火可補之類夫實者正氣之有餘也虛者正氣之不足也蓋人之氣生發於胃聚於膻中膻中者乃心前空虛之位名曰氣海又曰宗氣其氣之餘由肺運於一身通調水道下輸膀胱水精四布五經並行以為生生不息之運用若夫起居動靜調飬失宜過於勞倦房事醉飽耽食肥甘辛辣厚味之屬以致經絡臟腑因之受傷則夫膻中之氣隨其所寓鬱滯而為病氣之有餘則為實火氣之不足則為虛火故曰君火者猶人火也可以水滅可以正治惟黃連之苦瀉之相火者猶龍火也不以水滅不以正治順其性而折之惟黃柏之辛制之又曰實火可瀉黃連解毒之屬虛火可補參术生甘草之屬兼瀉兼緩故內之君火者實火也猶人火也宜用寒涼之味瀉之如肝臟素熱復加酒熱上行而為目赤腫痛者治用柴胡黃芩龍膽草之屬又有肝經素有濕熱又復感淫穢以致肝經熱鬱而為下疳者治用龍膽瀉肝湯之屬或為便毒者治用大消毒散之屬或為楊梅瘡者治用防風通聖散之屬又有膽疸因於謀慮不決故膽虛氣上溢而為口苦者治以膽募俞又如小兒因聞異聲內激膽熱而為驚搐者治用瀉青丸之味又如過食膏粱之屬熱積於心而為癰疽者治用黃連解毒湯之屬經曰膏粱之變足生大疔足充足也又醉以入房或臨房忍精以致小腸膀胱熱鬱不散而為淋濁者治用黃柏知母木通梔子之屬又如有因勞動熱起於脾而為痰涎𢃄血者治用黃連芍藥之屬又如過食肥甘而為消中或為中滿等症治用三補丸之屬經曰肥者令人內熱甘者令人中滿又曰消中熱中皆富貴人也又如醉以入房酒熱鬱於脾胃而為熱厥者治宜解酒散熱間服滋隂之劑岐伯言熱厥者此人必醉飽以入房酒聚於脾胃不得散酒氣與穀氣相薄熱盛於中云云腎氣日衰陽氣獨盛故手足為之熱也又有因於飽食熱積大腸而為痔漏下血者治用黃連枳殼之屬經曰因於飽食筋脈橫解腸癖為痔又如食滯腸胃鬱熱不散而為下痢赤白者治用大承氣湯之屬經曰通因通用者此也又如色欲不遂腎熱內熾而為遺精者治用珍珠丸加椿根皮之屬內之君火之大意蓋如是內之相火者虛火也猶龍火也宜分氣血而用甘溫之味補之有因久視傷血以致肝熱上騰而為目赤腫痛者治用四物湯加黃連黃芩柴胡之屬又有肝血內虛而為發熱者治用四物湯加黃柏知母之屬又有膽腑虛熱而為不寐者治用酸棗仁竹葉之屬又有少陽膽經血枯不足以配陽氣則氣鬱為熱而為瘰􅊓者治用四物湯生地柴胡黃芩連翹玄參夏枯草之屬或為耳鳴者治用清氣化痰丸之屬又有勞心過度以致神不守舍而為驚悸不寐等症治用八物湯加酸棗仁逺志間服硃砂安神丸之屬又有因於失志心神受傷而為癲風者治用四物湯間用硃砂安神丸之屬又有抑鬱傷心而為癰疽不起者治用人參黃芪白术附子之屬又有內傷心之元陽而為惡寒者治用人參附子赤石脂之屬王太僕云益火之原以消隂翳之類是也又有小腸膀胱氣虛不能運化小便而為淋祕者治用參茋术茯木通之屬經曰膀胱者州都之官津液藏焉氣化則能出矣又有勞倦傷脾而為大熱氣喘虛煩者治用補中益氣湯之屬經曰有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣薰胸中故內熱又有勞倦傷脾症現頭痛發熱悮食寒涼之藥過多而增譫語鄭聲脈數不鼓者治用參茋白术當歸附子乾薑之屬又有勞傷脾胃陽氣不能上榮而為頭痛耳鳴鼻塞口淡等症治用補中益氣湯加蔓荆子之屬經曰頭痛耳鳴九竅不利腸胃之所生也又有飲食失節與夫素齋內傷脾胃而脈虛身熱咳嗽腹脹泄㵼等症補中益氣加減治之又有內傷胃腑胃氣太虛而為嘔吐者治用參茋白术砂仁石菖蒲之屬或為消穀善飢者治用參茋甘草之屬或為吐血者治用參术附子之屬或為左齒痛者治用參茋术歸白芷升麻之屬或為腹脹者治用參茋白术砂仁木香之屬經曰塞因塞用之類是也又有過欲腎虛火炎於肺而為喘嗽等症治用六味地黃丸加黃柏知母貝母麥冬五味之屬又有肺氣內虛不能運行而為喘嗽憤鬱等症治用參茋术附麥冬五味欵冬花之屬又有大腸氣虛不能傳送而為裡急後重或為虛祕等症治用補中益氣湯之屬又有過欲傷腎隂火內熾而為耳鳴者治用清上實下之劑或為口鼻血溢者治用四物湯加苑根大小薊阿膠之屬或為骨蒸者治用當歸生地黃胡黃連知母地骨皮之屬或為熱從臍下起者或為熱從足上起者治用四物加黃柏知母間服六味地黃丸之屬或為午後發熱者治用當歸地黃枸杞龜板之屬王太僕云壯水之主以制陽光之類是己內之相火之大意蓋如是此外猶有五志之火亦屬正氣自傷但因五志所發之不同耳經曰人有五志以生喜怒悲思恐若夫五志過度則火發於中而為病耳怒則氣上喜則氣緩悲則氣消思則氣結恐則氣下之類夫五志過傷非藥可治乃以所勝治之悲勝怒喜勝悲恐勝喜怒勝思思勝恐之類是已夫悲可以勝怒以悽惻苦楚之言感之喜可以勝悲以浪謔褻狎之言娛之恐可以勝喜以迫遽死亡之言怖之怒可以勝思以汙辱之言觸之思可以勝恐以慮彼亡此之言奪之之類是也夫五志所傷未甚正氣未虛或可以藥治者有之如青皮以瀉怒氣之逆參茋以補悲氣之消香附以開思氣之結升柴以舉恐氣之降惟夫喜則氣和志逹雖病亦微不治可也此五志之症治者也又有內外兩傷之火正氣自傷復加火邪外傷而為倦怠少氣自汗身熱失於視聽脈虛等症治用清暑益氣湯之屬經曰陽氣者煩勞則張精絶澼積於夏使人煎厥目肓不可以視耳瞶不可以聽之類是也又如元氣素虛遇夏外熱傷氣而為倦怠無力頭疼口淡等症俗謂之注夏治用參茋白术麥冬五味黃芩之類又如足之太陽經氣不足感受暑氣而為惡寒發熱身重疼痛手足厥冷小便已灑然毛聳小有勞身即熱口開前板齒燥脈弦細芤遲仲景所謂中暍是也治用白虎加人參湯之類又有勞倦復感暑氣而為身熱神昏溺澀等證治用辰砂五苓散之類又如胃氣內虛因感暑氣而為頭疼身熱泄㵼脈洪而實者治用柴苓散之類又如逺行勞倦逢大熱而渴渴則熱舍於腎而為足不任身骨痿者治用人參黃茋之類經曰骨痿者生於大熱也又如腎虛隂火上炎而為勞熱咳嗽等症復感夏暑傷之其氣益甚治用滋隂降火之劑經曰春夏劇秋冬瘥之類是也又如內有痰火外感暑氣鼓激痰飲塞礙心竅而為卒倒手足不知動躡者俗謂之暑風是也二陳湯加黃連香薷主之又如冬月過於房勞精氣內竭至春則無發生之氣而為瘟疫者治宜補中加以辛涼解表之劑經曰冬不藏精春必病瘟又如冬月傷寒寒邪未發至春復感熱氣而為大熱頭疼口渴心躁脈浮緊者防風通聖散主之經曰冬傷於寒春必病瘟此皆內外兩傷症治並行而不悖焉者也是知君相二火以外言之有春熱夏暑陽動隂靜之分也以內言之有實瀉虛補五志勝治藥治之分也以外內兩傷言之有表裏邪正補瀉兼施之分也是故外內君相醫之廣用者也其為道甚大其為説甚雜其為病甚多其為變也甚速其為御也甚難非一方一法所可盡也能明乎此醫之為道思過半矣病機篇內經曰諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大鼓之如鼓癰疽痬疹瘤氣結核霍亂瞀悶鬱腫鼻塞鼽衄血溢血泄淋閉身熱惡寒戰栗驚惑悲笑譫妄衄衊血汚此皆少隂君火之熱乃心小腸之氣所為也又曰諸熱瞀瘈暴瘖冒昧躁擾狂越罵詈驚駭胕腫酸痛氣逆衝上禁栗如喪神守嚏嘔瘡瘍喉痺耳鳴及聾嘔飲溢食不下目迷不明暴注瞤瘈暴病暴死此皆少陽相火包絡三焦之氣所為也內經曰夫熱病者皆傷寒之類也陽勝則熱隂虛則內熱陽勝則外熱內外皆熱則喘而渴故欲飲冷也陽勝則身熱腠理閉喘粗為之俯仰汗不出而熱齒乾以煩冤腹滿死能冬不能夏有四肢熱逢風寒如炙於火者是人隂虛陽氣盛也人身非常熱也為之熱而煩滿者隂氣少而陽氣勝故熱而煩滿也大熱病氣熱脈滿是謂重實尺寸脈俱虛是謂重虛粗大者隂不足陽有餘為熱中也脈經曰弦數多熱數為熱極脈數為虛為熱寸口脈浮大而數者名曰陽中之陽病苦煩滿身熱頭疼腹中熱寸口脈實熱在脾肺數為吐為熱在胃口關脈滑數胃中有客熱緩而滑為熱中尺脈實為身熱心痛數為臍下熱痛又曰熱病脈小或細喘逆不得大小便腹大而脹汗出而厥逆泄注脈大小不調皆難治熱病已得汗而脈仍躁盛此陽脈之極也死熱病不得汗而脈躁盛者此陽脈之極也死脈浮而澀澀而身有熱者死熱病脈躁盛得汗而脈靜身涼者生論熱在血氣之分東垣曰晝則發熱夜則安靜是陽氣自旺於陽分也宜柴胡飲子晝則安靜夜則發熱煩躁是陽氣下陷入隂中也宜四順飲子名曰熱入血室晝發熱煩躁夜亦發熱煩躁是重陽無隂也急瀉其陽峻補其隂論五臟有邪身熱各異以手捫摸有三法輕手捫之則熱重手捫之則不熱是熱在皮毛血脈也重按之筋骨之分則熱蒸手極甚輕手則不熱是邪在筋骨之間也輕手捫之不熱重力按之亦不熱不輕不重按之而熱是在筋骨之上皮毛血脈之下乃熱在肌肉也肺熱者輕手乃得微按全無日西熱甚乃皮毛之熱其證必見喘咳寒熱輕者瀉白散重者涼膈散地骨皮散心熱者微按至皮膚之下肌肉之上輕手乃得微按至皮毛之下則熱少加力按之則全不熱是熱在血脈也其症心煩心痛掌中熱而噦以黃連瀉心湯導赤散硃砂安神丸脾熱者輕手捫之不熱重按之筋骨又不熱不輕不重在輕手重手之間熱在肌肉遇夜尤甚其證必怠惰嗜卧四肢不收無氣以動㵼黃散肝熱者重按之肌肉之下至骨之上乃肝之熱寅卯間尤甚其脈弦四肢滿悶便難轉筋多怒多驚四肢困熱筋病不能起於床瀉青丸柴胡飲子腎熱者輕手重手俱不熱極重力按至骨分其熱蒸手如火其人骨蘇蘇如蟲蝕其骨因熱不任亦不能起於床滋腎丸主之靣熱者足陽明口中熱如膠足少隂口熱舌乾足少隂耳鼽熱若寒手太陽掌中熱手厥隂少隂太隂足下熱而痛足少隂足外熱足少陽身熱膚痛手少隂身前熱足陽明灑淅寒熱手太隂肩上熱肩似拔手太陽中熱而喘足少隂肩背熱及足小指外膁脛踝後皆熱足太陽一身盡熱狂而妄聞妄見妄言足陽明熱而筋縱緩不收隂痿足陽明論表裏熱病機機要云有表而熱者謂之表熱無表而熱者謂之裡熱有暴熱而為熱者乃久不宣通而致也有服溫藥而為熱者有惡寒戰栗熱者治法小熱之氣涼以和之大熱之氣寒以取之甚熱之氣以汗發之發之不盡則逆制之制不盡求其屬以衰之苦者治臟臟屬隂而居內辛者治腑腑屬陽而在外故內者下之外者發之又宜飬血益隂其熱自愈內經曰隂虛生內熱者因有所勞倦形氣衰少穀氣不盛上焦不行下脘不通胃氣熱熱氣薰胸中故內熱陽盛則外熱者因上焦不通利則皮膚緻密腠理閉塞玄府不通衛氣不得泄故外熱東垣曰發熱惡寒大渴不止煩躁肌熱不欲近衣其脈洪大按之無力者或無目痛鼻乾者非白虎湯證也此血虛發躁當歸補血湯主之又曰仲景論內外不足發熱自汗之症大禁發汗若飲食勞倦雜病發熱自汗表虛之症認作有餘便用麻黃發之汗大出則表益虛也內經曰人數醉若飽以入房氣聚於脾中不得散酒氣與穀氣相薄熱盛於中遍於身內熱而溺赤也飲食不節起居不時者隂受之入六腑則身熱不得卧上為喘呼王好古曰一身盡熱先太陽也從外而之內者先無形也為外傷手足不和兩脅俱熱如火先少陽也從內而之外者先有形也為內傷要略曰發熱身疼而身如薰橘者濕也一身盡痛發熱日晡轉劇者名風濕汗出而身熱者風也身熱脈弦數戰栗而不惡寒者疸瘧也發熱惡寒脈浮數者溫病也身熱頭疼自汗多眠陽脈浮滑隂脈濡弱者風濕也中脘有痰令人增寒惡熱自汗惡風寸口脈浮胸痞滿有類傷寒但頭不痛項不強為異耳虛煩與傷寒相似身熱脈不浮緊不惡寒但熱而煩惟頭不痛四脈熱者火乘脾土脾主四肢故熱也手心熱者心與包絡火盛也身體沉重走注疼痛乃濕熱相搏風熱鬱而不得伸也東垣云四脈發熱者或口乾舌乾咽乾蓋心生火小腸主熱火熱來乘主位乃濕熱相合故煩躁悶亂也王太僕曰熱來復去晝見夜伏夜發晝伏時節而動是無火也論雜病發熱惡寒與傷寒不同許學士曰仲景云假令寸口脈微名曰陽不足隂氣上入陽中則灑淅惡寒也尺脈弱名曰隂不足陽氣下陷入隂中則發熱也此謂元受病而然也又云陽微則惡寒隂弱則發熱此醫發其汗使陽氣微又大下之令隂氣弱此謂醫所病而然也大抵隂不足陽往從之故陽內陷則發熱陽不足隂往乘之故隂上入陽中則惡寒隂陽不歸其分故寒熱交爭是以發熱而惡寒也原病式曰身熱惡寒熱在表也邪熱在表而淺邪畏其正故病熱而反惡寒也或言惡寒為寒在表或言身熱惡寒為熱在皮膚寒在骨髓者皆誤也仲景法曰無陽病寒不可發汗又言身熱惡寒麻黃湯汗之汗泄熱去身涼即安然則豈有寒者歟大法煩躁多渴欲寒惡熱為病熱也亦有亢則害承乃制之則病熱甚而反覺其冷者也雖覺其冷而病為熱實非冷也其病熱鬱甚而反惡寒得寒轉甚而得暖少愈者謂暖則腠理踈通而陽氣得散怫熱稍退故少愈也其寒則腠理固密陽氣怫鬱而熱轉甚故病加尓上下中外周身皆然俗因之妄謂寒病誤以熱藥投之為害多矣劉宗厚曰按此數論並言雜病隂陽相乘及火熱甚反兼水化為病亢則害承乃制之例但河間所引傷寒身熱寒熱與仲景及明理論義不相合詳趙嗣真明理論云往來寒熱者邪正分爭也邪氣之入也正氣不與之爭則但熱而無寒若邪正分爭於是寒熱作矣蓋以寒邪為隂熱邪為陽裡分為隂表分為陽邪之客於表也為寒邪與陽爭則為寒矣邪之入於裡也為熱邪與隂爭則為熱矣若邪在半表半裡之間外與陽爭而為寒內與隂爭而為熱表裏之不拘內外之無定由是寒熱且往且來日有至於三五甚者則數發也若以隂陽相勝陽不足則先寒後熱隂不足則先熱後寒此特論雜病隂陽二氣自相乘勝然也非可以語傷寒斯論為甚精切深合仲景之意蓋不惟釋疑於活人書而已又按河間言惡寒為寒在表或身熱惡寒為熱在皮膚寒在骨髓皆誤也而活人書亦以此為表裏言之故趙氏曰詳分皮膚骨髓而不曰表裏者蓋以皮脈肉筋骨五者素問以為五臟之合主於外而充於身者也惟曰臟曰腑方可言裏可見皮膚即骨髓之上外部浮淺之分骨髓則皮膚之下外部深沉之分與經絡屬表臟腑屬裏之例不同况仲景出此症於太陽篇首其為表症明矣是知虛弱素寒之人感邪發熱熱邪浮淺不勝沉寒故外怯而欲得近衣此所謂熱在皮膚寒在骨髓用辛溫至於壯盛素熱之或酒客輩感邪之初寒未變熱隂邪閉於伏熱隂凝於外熱鬱於內故內煩而不欲近衣此所謂寒在皮膚熱在骨髓用辛涼必矣一發之餘表解正和此仲景不言之妙若以皮膚為表骨髓為裡則麻黃湯證骨節疼痛其可名為有表復有裡之症耶然仲景傷寒一書人但知為方家之祖而未解作秦漢文字看故於大經大法之意反有疑似而後世賴其餘澤者往往類輯傷寒方論其間失其本義及穿鑿者亦有之矧以雜病為論但引其例乎兹趙氏釋疑可謂得其旨趣且黃帝針經有論皮寒熱肌寒熱骨寒熱等例如此則仲景所論分邪在皮膚骨髓之殊雖欲以盡症例之變蓋自有所本云惡寒非寒惡熱非熱論丹溪曰經云惡寒戰栗者皆屬於熱又云禁栗如喪神守皆屬於火惡寒者雖當暑月若遇風霜重綿在身自覺凛凛戰栗禁栗動搖之貌如喪神守惡寒之甚原病式曰病熱甚而反覺其寒此為病熱實非寒也或曰往往見有得熱藥而少愈者何也豫曰病熱之人其氣炎上鬱為痰飲抑遏清道隂氣不升病熱尤甚積痰得熱亦為暫退熱勢助邪其病益深或曰寒勢如此誰敢以寒涼與之非殺而何豫曰古人遇戰栗之症有以大承氣湯下燥糞而愈者惡寒戰栗明是熱症但有虛實之分耳經曰隂虛則發熱夫陽在外為隂之衛隂在內為陽之守精神外馳嗜欲無節隂氣耗散陽無所附遂致浮散於肌表之間而惡熱也實非有熱當作隂虛治之而用補飬之法可也㵼白散治肺熱桑白皮地骨皮各一兩甘草五錢為末水調服清金丸瀉肺火黃芩炒為末水丸沸湯下黃連瀉心湯治心熱黃連炒為末水調二三分量人大小與之導赤散治小腸實熱生地木通甘草各等分入竹葉煎服調胃承氣湯治脾熱胃熱大黃芒硝各一兩甘草五錢水煎服㵼黃散藿香七錢山梔一兩石膏五錢甘草三兩防風四兩右為末用蜜酒拌略炒服柴胡飲子治肝熱柴胡人參黃芩甘草大黃川歸芍藥各等分每服七錢薑三片水煎服抑青丸㵼肝黃連薑汁炒為末粥丸沸湯下左金丸治肝火黃連六兩吳茱茰湯煮少時為末粥丸陳皮白术湯吞下㵼青丸川歸川芎山梔大黃羌活防風龍膽草為末蜜丸本方去川芎羌活防風加黃連黃柏黃芩蘆薈青黛各五錢木香一錢麝香五分名當歸龍薈丸滋腎丸治腎熱黃柏三錢知母三錢桂一錢半為末蜜丸涼膈散治積熱煩渴面熱唇焦咽燥舌腫喉閉目赤鼻衄項結硬口舌生瘡譫妄燥澀便溺閉結連翹四兩朴硝大黃各二兩薄荷黃芩枝子甘草炙各一兩為末每服三錢加竹葉五七片水煎洗心散治心肺積熱頭目昏疼肩背拘急肢節煩痛唇焦咽腫痰壅唾粘溺澀便祕白术一兩半麻黃川歸荆芥芍藥甘草大黃各六兩每服二錢入生薑薄荷少許同煎服三黃丸通治三焦熱去大黃加黃柏名三補丸黃連黃芩大黃各等分為末煉蜜丸桐子大每服三十丸四順清涼飲子治一切丹毒積熱壅滯咽痛川芎甘草炙赤芍大黃每服七錢水煎服黃連解毒湯治大熱甚煩躁不得眠黃連七錢半黃柏梔子各五錢黃芩一兩每服五錢水煎服加防風連翹為大金花丸治風熱加柴胡治小兒潮熱與四物相合治婦人潮熱當歸承氣湯治熱發於上不利於下陽狂奔走詈罵不避親踈當歸大黃各五錢芒硝四錢半甘草二錢半右分二帖薑二片棗二枚水煎服人參散治身熱頭痛積熱在胸服此神妙石膏甘草各一兩滑石四兩寒水石三兩人參五錢為末每服一錢或二錢溫水調下早晚各一服兼服金花丸妙四製黃柏丸黃柏去粗皮淨四斤一斤米泔水浸一斤以好酒侵一斤蜜糖水浸右俱用磁器浸三味俱要沒二指為度冬月浸七日夏浸三日春秋五日濾出晒乾仍存餘汁待後用再將黃柏一斤切作五寸長用真酥油半斤以磁碗乘之先將銅銚將水熬滚再將酥油連碗入水溶化將黃柏以微火炒熱用棕刷蘸酥徐徐刷上且刷且炙各使透徹切忌焦黑炙畢放於冷地上以磁碗覆之二日去火毒并前共為細末以前存原汁和為丸如汁不敷再為蜜酒兊勻和之丸如梧子大每空心及臨卧酒吞下五七十丸徐以乾物壓之此藥滋腎降火化痰之聖藥也若吐血遺精服半月即愈如相火周身疼痛減黃柏二斤加犀角一兩為末入前丸中天門冬膏以生天門冬不拘多少去皮心搗絞汁盛磁器內以鍋熬滚水入門冬連磁器于中煮至滴水成珠以磁罐收貯每服二三匙沸湯點服如無生者以乾者煮汁熬膏亦可或以天門冬制為末每服二三錢亦可前胡散治胃氣實熱唇口乾裂中心熱躁大便祕結非時煩渴睡中口內生涎大黃五錢桔梗枳殼前胡杏仁各一錢葛根二錢右為末每服二錢入生薑煎服赤茯苓湯治膀胱實熱腹脹小便不通口苦舌乾咽腫不利豬苓葵子枳實瞿麥木通黃芩滑石甘草赤芩車前子各等分入薑水煎食前服東垣㵼隂火升陽湯治肌熱煩熱面赤食少喘咳痰盛脈右關緩弱或弦或浮數羌活甘草炙黃茋蒼术各一兩升麻八錢柴胡一兩半人參黃芩各七錢黃連酒炒五錢石膏五錢秋深勿用右每服一兩或五七錢水煎服升麻散火湯治男子婦人四肢發熱肌熱筋脾熱骨髓中熱發困熱如燎捫之烙手此多血虛而得之或胃虛過食冷物抑遏陽氣於脾土之中火鬱則發之升麻葛根羌活獨活各五錢防風三分柴胡八分甘草炙三分白芍五分生甘草二分水煎稍熱服千金麥門冬湯治諸疾後火熱乘肺咳嗽有血胸脅帳滿上氣羸瘦五心煩熱渴而煩悶麥冬桑白皮生地各一兩半夏紫苑每服七錢水煎服拔萃方地骨皮散治渾身壯熱脈長而滑陽毒火熾發渴地骨皮茯苓各五錢柴胡黃芩生地知母各一兩石膏二兩羌活麻黃各七錢半若有汗者減此二味右每服一兩入薑煎服麥門冬散治丈夫婦人藴積邪熱心胸煩悶咽乾口燥睡卧不安或大小腸不利口舌生瘡芒硝一兩麥冬三錢小草黃連升麻犀角屑甘草炙黃芩枳殼大青各五錢每服三錢水煎服真珠散治男婦五臟積熱毒氣上攻心胸煩悶口乾舌燥精神恍惚悶亂坐卧不安琥珀真珠粉天花粉鐵粉硃砂甘草牙硝寒水石煅大黃各等分為極細末每一錢竹葉湯下紫雪治內外煩熱不解口中生瘡狂易呌走解諸熱毒藥毒邪熱驚癎百病黃金百兩寒水石磁石石膏活石各一斤研已上用水一石煮至四斗去查入下項炙甘草八兩羚羊角屑犀角屑青木香沉香各五兩丁香一兩升麻玄參並銼細各一斤已上再煮至一斗五升入下項硝石四斤芒亦得每斤得七兩七錢五分朴硝十斤淨已上入前汁中微火煎柳枝不住手攪候有七斤投放木盆中半日欲凝入下項藥攪令勻入硃砂三兩當門子一兩二錢五分右藥成紫色霜雪每服二錢或一錢冷水調下大人小兒消息虛實加減食後服千金黑奴丸治火熱陽毒發班發狂煩躁大渴倍常黃芩斧底煤芒硝灶突墨梁上塵麻黃小麥奴大黃各一兩右為末煉蜜為丸彈子大新汲水化服不定再服半丸飲水盡足當發寒寒已汗出乃差未汗再服半丸渴不甚者勿與之赤水元珠卷一
