body:
  text: 赤水元珠卷二十六明孫一奎撰脫肛門脫肛乃腸胃有積滯以致濕熱之氣下流藴於肛門而然也法當推逐其積又或貪坐冷地熱為寒凝結為內痔致每登厠肛即脫下此當從痔而治痔消而肛自收也有泄利日久中氣虛而下陷者宜大補中氣兼為升提從推從補從升皆當看症又有肛上生蟲者豫友黃桂峯丈治一人肛出百方不應乃以生豬肚子一具刮下垢物用紗囊盛之罨於肛上一夜次早細蟲不計其數盡叢於囊垢上肛即收入此亦濕熱之所生也致新湯治食積腸胃脫肛不時用此消而推之木香二分檳榔五分京三稜醋煨山查枳殼桃仁各七分滑石一錢五分黃連吳茱茰製三分右水煎食前服積甚者遇仙丹下之方見丹石散治外痔脫肛如神黃丹滑石等分右為細末新汲水調塗日三五次愈澀腸散治久痢大腸脫出不收訶子肉煨赤石脂龍骨各等分右為末用茶調肛上絹帛揉入若痢久不止米飲調服勝雪膏治翻花等痔熱痛不可忍或已成瘡冰片鉛霜右為末好酒研成膏塗上即愈僧礬散蜜陀僧二錢枯礬一錢冰片少許右為末敷上先用苦參湯或防風荆芥湯洗苦參湯治脫肛并痔枳殼黃連大黃甘草荆芥苦參芍藥黃芩各等分右每五七錢加車前子茅草同煎董洗凡腸頭作癢多是有蟲用生艾川棟根煎湯薰洗赤石脂散治瀉痢後肛門不收赤石脂伏龍肝等分右為細末敷肛上蒲黃散蒲黃五錢熬豬脂一兩同拌成膏塗肛上五倍子湯五倍子一兩煎湯入皮硝薰洗補中益氣湯加防風桔梗水煎食前服蜘蛛散大蜘蛛鹽泥包裹煅存性為末一錢鐵鏽末三分右豬膽汁調敷肛妙又方鱉頭燒灰敷上哮喘門哮喘辨孫仲子泰來曰哮之與喘極須分别疑似之間虛實攸繫非細務也夫哮以聲響名喉中痰盛膠塞肺竅氣道蹇滯呼吸不暢喉中如水雞之聲故氣髙而喘心熱而煩擡其肩擷其項不能屈體而拾物貼席而伏枕也原其痰火內鬱外被風寒束其皮腠肺氣為之不利皆上壅胸喉斯乃有餘之疾雖多日不食亦不死治惟調氣豁痰解表蓋痰出而聲自寢也顧喘以氣息言喉中無痰氣促不相接續有虛有實仲景云汗出如油喘而不休者死故前人治法有補有瀉是故不可與哮同日而語也明治哮哮發之原有三有因驚風之後而得者由治驚不調氣故痰不盡徹去有感風寒而得者有食醎酸槍喉而得者然皆不外乎利肺調氣豁痰六字也麻黃杏子草膏湯治傷寒發汗後不可更行桂枝湯汗出而喘無大熱者及下後而喘麻黃二兩去節杏仁去皮尖二十五粒石膏四兩甘草二兩右每服三四錢水煎服蘇合香丸治哮調氣豁痰極效治驚風後而得者尤佳大效雄硃化痰丸治因驚後哮喘逆觸心肺氣急口張虛煩神困雄黃硃砂蟬退全蝎焙殭蠶炒南星白附子炒各一錢輕粉五分右為末麵糊為丸麻子大每服二十丸薄荷茶清任下九寶湯治大人小兒素有喘急遇寒暄不常發則連綿不已哮喘咳嗽夜不得卧桑白皮橘紅大腹皮紫蘇杏仁薄荷甘草麻黃官桂各五分右薑三片烏梅一枚水煎服明治喘喘之原有六有風寒傷肺而得者有厚味傷脾積痰上迫於肺肺氣為之不利而得者有大病後被尅伐太過傷其脾胃而中氣虛弱者有火逼肺金金為火侮而氣不得下降者有水腫之疾水溢迫肺而喘者有破體太早腎未完固而泄其真隂以致腎虛不能納氣歸源者故治法有踈風解表有清火保肺有清中化痰有利水滲濕有峻補腎元有單補中氣較之於哮大不相侔兹特揭而明之俾認症循方不啻駕輕車就熟徑即夜行亦無顛躓之慮也矣九寶湯治風寒哮喘咳嗽不能伏枕方見哮黃芩半夏湯治寒包熱哮喘咳嗽半夏枳殼酒芩桔梗紫蘇麻黃杏仁甘草右薑棗水煎服天寒加桂枝桑白皮湯治肺氣有餘火炎痰盛作喘桑白皮半夏蘇子杏仁貝母山梔黃芩黃連右薑水煎服定喘湯治諸喘久不愈白果二十一枚去殼切炒欵冬花桑白皮蜜炒麻黃法製半夏各三錢蘇子二錢杏仁酒芩各一錢半右水煎作二次服生脈湯治肺氣大虛氣促上喘汗出而息不續命在須臾麥門冬去心五錢人參三錢五味子三十粒右水煎服星半瓜蔞丸清中化痰南星半夏瓜蔞仁香附子橘紅蘿蔔子炒杏仁皂角灰右為末神麯糊丸梧子大每服二三十丸薑湯下又方治食積痰喘壅滯不利半夏薑製瓜蔞仁山查神麯海石蘿蔔子青黛右為末用瓜蔞穰搗為丸竹瀝生薑湯下每服三十丸參术調中湯補中清熱定喘除嗽人參白术各五分桑白皮蜜炒炙甘草各三分麥門冬陳皮茯苓各錢青皮三分五味子二十粒右水煎服雙玉丸治胃火刑肺氣髙而喘每至夏月必一發者軟石膏寒水石各煅薑汁淬右等分為細末用甘草煎濃膏為丸菉豆大每夜白湯或淡薑湯送下一錢神祕湯治水氣作喘橘紅桔梗紫蘇各五分人參三分五味子七粒桑白皮一錢半夏七分檳榔五分炙甘草二分右薑三片水煎服椒目散水泛於肺肺得水而浮故喘不得卧川椒目沉水者略炒為末每一錢薑湯調下葶藶大棗瀉肺湯治上氣喘急身與面目俱浮鼻塞聲重不聞香臭胸膈脹滿將成肺癰葶藶炒研末彈子大一丸大棗十枚去核右水二盞先煎大棗至一盞去棗入葶藶煎八分食後服先服仲景小青龍湯二帖再服此八味丸治下元真氣不足腎虛不能納氣歸原而喘懷熟地四錢山藥山茱茰肉各二錢茯苓澤瀉各一錢五分大附子童便製桂心各五分右蜜丸赤豆大每服二三十丸白湯下加減八味丸治同上即前方去大附子加五味子人參胡桃湯治下元不足喘不得卧人參一錢五分胡桃肉三枚右薑一片水煎服杏仁煎治喘嗽杏仁去皮尖炒胡桃肉去皮右等分研為膏加煉蜜丸彈子大臨卧嚼下一方胡桃肉三枚薑三片臨卧嚼吃飲湯三四口再嚼再飲止嗽化痰千緡湯治痰飲喘急不能卧人扶而坐一服即安半夏泡七箇炙甘草皂角炙各一寸右生薑一片水煎服治哮喘欲成龜胸龜背者甜葶藶四兩五味子一兩紫蘇子二兩杏仁一兩五錢桑白皮蜜炒二兩右蜜丸黍米大每三五十丸淡豆豉湯下銅壁山人加靈三分神效咳嗽門有傷風嗽有傷乳食嗽有痰嗽有火嗽有虛嗽風者鼻塞或流清涕乳食者胸腹飽悶發熱日輕夜重痰者一咳便有痰喉中常有痰聲火者發熱面赤小水短澀虛者呼吸力微大小便利體倦而面色青白三拗湯治感冒風邪鼻寒聲重語音不出頭痛目眩四肢拘倦咳嗽多痰胸滿氣短麻黃杏仁不去皮尖甘草右薑蔥白煎溫服取汗有熱加前胡有痰加半夏華蓋散治肺感寒邪咳嗽上氣胸膈煩悶項背拘急聲重鼻塞頭目昏眩痰氣不利麻黃去莭蘇子炒桑白皮蜜炒杏仁茯苓陳皮各五錢甘草二錢右每服三五錢水煎服金佛草散治傷風頭目昏痛往來寒熱肢疼煩悶痰涎不利咳嗽喘涕唾稠粘壯熱惡風金佛草荆芥各一兩半前胡麻黃去節各一兩甘草五錢赤芍藥半夏各七錢右每三錢薑棗煎服嗽甚加杏仁五味子茯苓厚朴湯治傷乳食停痰咳嗽或吐白沫氣喘白茯苓半夏各一錢半厚朴製五分甘草二分右薑三片煎服白餅子治傷乳食停痰咳嗽氣粗喘急及冷痰腹痛滑石輕粉半夏南星各一錢巴豆十四粒去殼水煮乾右研勻巴豆後入糯米飯搗為丸菉豆大揑作餅子三嵗已上三五餅已下一二餅煎蔥湯下傷食麥芽湯下新傷乳食咳嗽用二陳湯加蘿蔔子杏仁枳殼麥芽山查厚朴之類服之食消而嗽自止瀉白散化痰止嗽下氣進食瀉肺火桑白皮蜜炒地骨皮各一兩甘草二錢右每三錢加粳米煎服雙玉丸治胃火食積痰火面赤氣粗喘嗽方見喘門清化丸治火刑肺金咳嗽喘急貝母知母各一兩巴豆二十粒右同炒去巴豆只用二母為末煉蜜為丸菉豆大每服一二十丸白湯下久嗽脾肺之氣不足用前諸劑不效者以六君子湯加苡仁桑白皮五味子服之即安夏月咳嗽多汗喘咳無力生脈湯佳雄黃丸治癖積痰嗽嘔吐雄黃五錢半夏神麯白麵各一兩巴霜四十九粒另研右末滴水為丸菉豆大用米粳拌炒赤色每服七丸加至十丸嘔吐薑湯下痰嗽虀菜汁下咳久連聲不已口鼻出血者茅根湯主之陳皮去白半夏麯茯苓甘草天門冬片芩梔仁貝母知母石膏生地杏仁桔梗瓜蔞根右水煎臨服加茅根汁一小酒盞同服吐瀉門小兒吐瀉不異大人當於大人門擇治故不再論兹採數方以備不時之急但審諦寒熱體認傷積證明則百投百效矣凡吐乳直出而不停留者古謂之哯乳但以炒麥芽三錢橘紅一錢丁香三分水煎服之立止凡霍亂吐不止者用蘆稷米炒黃煎湯飲之立止又方白扁豆嫩苗煎湯飲之立止如無嫩苗時月即用白扁豆炒過煎湯與之亦安二香散止吐如神真藿香一錢二分丁香一錢白滑石五錢右為末每服五七分米飲下凡冷吐者乳不消化多吐而少出面白眼慢神昏額上汗出急宜溫中理中湯參香散若將傳慢脾者可用全蝎觀音散參香散治寒吐胃虛投諸劑不效者人參沉香丁香藿香木香各等分右為末每三五分米飲調下全蝎觀音散治吐瀉截風定志庶免傳變慢驚黃蓍炙人參各二錢半木香炙甘草蓮肉扁豆炒茯苓白芷全蝎羌活防風天麻各二錢右每服三五錢薑棗煎服六神湯治脾胃虛吐瀉不進飲食黃蓍扁豆人參白术茯苓炙甘草藿香各等分右每三四錢薑棗煎服藿香散治冷吐瀉臟腑不調瀉下青黃黑白色或如雞子清或腹疼微熱橘紅藿香枳殼厚朴製炙甘草右為末每服一錢米飲下治瀉棗湯下凡熱吐者面赤氣粗唇紅吐出之勢射而逺乳已化色黃小水短少二陳湯加薑汁炒黃連黃芩枇杷葉濟生竹茹湯治熱吐口渴煩躁橘紅乾葛甘草麥門冬竹茹生薑右水煎服熱甚者加薑連益元散治熱吐面赤氣粗小水短少傷暑作吐尤佳滑石六錢甘草一錢右為末薑汁調燈心湯下吐甚者井花水下凡食傷而吐者吐出之物有餿酸氣眼胞浮面色黃足冷肚熱日輕夜重麥芽枳實青皮檳榔厚朴陳皮之類消而降之治瀉之劑凡冷瀉者面色青白小水清腸鳴漉漉腹中作疼口不渴益黃散理中湯挾風邪者藿香正氣散挾暑氣者六和湯胃苓湯治冷瀉小水不利蒼术厚朴薑汁炒陳皮炙甘草白术茯苓豬苓澤瀉桂皮右薑三片水煎服凡熱瀉者面赤唇紅小水短少口乾六一散燈心湯調下立止清六益元湯治熱瀉小水短少口乾白术炒滑石炙甘草黃連酒炒麥芽炒右水煎服四苓湯治熱瀉小水短少腹中作疼白术炒赤茯苓澤瀉豬苓白芍藥酒炒酒苓酒連右水煎服凡食傷而瀉者腹中或疼或脹噯氣如敗卵詳其所傷以對症之劑消而磨之如傷乳食以麥芽糯米食以酒麯肉以山查豆腐以蘿蔔子豆粉以杏仁諸果子以麝香肉桂傷魚以橄欖每於理脾中倍加所以之藥為君則效也凡諸內傷初未下膈之時只宜吐之如瓜蒂散或蘿蔔子擂滚水取汁多飲之即吐若食已下膈入胃則不可吐以香橘餅之類消之若腹中飽硬日數已久而痛在臍腹則宜備急丸等下之然後調補瀉始止也若補之太早恐食積不消久而變為痢疾或為脾泄或為痞滿皆由執衡者失先後次第之宜盲對症之劑之所致也又投已上諸劑不止者乃蟲瀉也當從疳治瓜蒂散治食傷胸膈脹疼兀兀欲吐煩悶不安瓜蒂三枚赤小豆一錢右為末白湯調下五七分少刻用鵝翎於喉中探之即吐香橘餅治食積瀉冷瀉腹中脹疼丁香青皮陳皮各二錢半厚朴神麯炒麥芽炒各五錢右為末煉蜜為餅紫蘇湯下米飲亦可消積丸治吐瀉大便酸臭丁香九粒砂仁十二粒巴豆二粒烏梅肉二枚右為末麵糊為丸菉豆大溫水送下一二丸保安丸治傷食瀉香附子炒砂仁炒各一兩白薑煨青皮炒陳皮京三稜蓬术俱醋煨炙甘草各五錢右為末麥芽麵糊為丸菉豆大每一二十丸薑湯下夏月作㵼或傷暑吐瀉以六和湯治之名六和者以其能和六腑也六和湯治吐瀉霍亂砂仁半夏杏仁人參炙甘草各一兩赤茯苓藿香扁豆炒木瓜各二兩右每三五錢薑棗煎服香橘膏治吐瀉砂仁二錢白豆仁一錢蓮肉山藥木香青皮炒各五錢陳皮厚朴製各一兩麥芽炒神麯炒各二兩右為末蜜丸雞頭大每服一丸吐用紫蘇湯下瀉荆芥湯下保安四聖餅治吐瀉驚疳吐瀉日久恐傳慢驚人參白术茯苓各一兩炙甘草南星炮白附子各五錢代赭石煅醋淬一兩蛇含石煅三錢右為末端陽日粽搗為餅計重一錢每服一餅吐薑湯瀉米飲驚薄荷疳米泔水下豆蔲散治腹痛腸胃虛冷滑泄不禁肉豆蔲一枚剜一小孔入乳香一塊濕麵包裹煨熟為末每服三五分米飲下睡驚太乙丹治瀉後糞青鎮驚安神止夜啼白术茯苓桔梗炒一兩藿香五錢川芎白芷各三錢扁豆炒五錢白芍藥酒炒五錢右為末煉蜜為丸櫻桃大辰砂麝香為衣每服半丸薄荷湯或棗湯化下夜啼燈心鈎藤湯化下癖門癖者血膜包水癖於脅傍時時作痛也惟癖能發潮熱能生寒熱故瘧家中脘多蓄黃水日久而後成癖此蓋小兒臟腑不和營衛不暢津液不得流通冷氣摶之則結聚而成癖矣進食丸消食丸可選而用之甚者白餅子下之治之不早恐成疳積羸瘦肚脹則難治也取癖丸治腹脅痞結氣滿不得宣通甘遂微炒芫花炒黑丑半炒半生研末辣桂蓬术青皮木香桃仁去皮炒五靈脂各二錢巴霜一錢右為末飛麵糊為丸麻子大每服一二丸薑蜜煎湯灌下泄後用冷粥補之燒丹丸治乳癖食癖午後寒熱咳嗽脅下結硬玄精石煅赤輕粉各一兩粉霜硼砂各五分右為末入寒食麵一錢水和成餅外再用濕麵包裹慢火煨黃色取出去麵將藥再研為細末滴水為丸米粒大一嵗五丸二嵗十丸夜卧白湯送下至天明取下惡物如不下漸加丸數如妳癖未消盡隔三兩日再一服以癖消盡為度紫丸子治嬰兒乳食失節宿食不化胸腹痞滿嘔吐惡心便利不調乳食減少不消內挾冷痰大便酸臭或變蒸發熱多日不解因食成癎先寒後熱代赭石醋煆赤石脂煆各一兩杏仁去皮尖麩皮炒五十個巴霜炒一錢右為末􅔻餅丸如黍米大月外兒只服一丸米飲下微利即瘥千金方云此方之妙無所不治雖為下藥並不虛人七聖丸能令黃瘦子頓作化生兒三稜莪术芫花各醋浸同炒青皮橘紅川楝子去皮核杏仁去皮尖右為末醋糊為丸黍米大食逺白湯服日間所餐之食物盡行消化永無積滯消積丸消積聚寬腹脹退面腫進飲食化滯物木香人參各一錢半黃連炒莪术醋煨各三錢橘紅青皮炒檳榔二枚右為末麵糊為丸黍米大食後米飲下萬金丸磨積塊去黃胖神效平胃散加夜明沙略炒針砂醋淬炒皂礬醋煮乾煆紅各等分右為末紅棗肉為丸菉豆大空心米飲下忌一切血及蕎麥麵靈仙丸消一切癖葳靈仙為末煉蜜丸彈子大紅絹袋盛藥一丸用精豬肉四兩煮極爛去藥聽喫其積化從大便而下以知為度撾癖散治癖立效海蛤粉黃丹硫黃各等分右初伏日修合為細末用好米醋調成膏於新烏盆中晒乾為細末一嵗兒服一分空心米飲調下取下癖積如藍汁為驗鱉甲豬肚丸治小兒痞積發熱柴胡一兩黃連鱉甲醋炙各七錢枳實炒木香青皮各五錢青蒿七錢右為末入豬肚內蒸極爛同搗為丸梧子大每服二十丸人參湯送下赤茯苓六錢赤芍藥山梔子各三錢當歸甘草各五錢右每五錢燈心煎服導赤散治血淋生乾地黃木通各二錢黃芩甘草生各一錢右為末每服一錢井水入燈心煎湯服仍以米飲調油髮灰空心灌下車前子散治小便不利茯苓豬苓香薷車前子人參各等分右為末每服五錢燈心湯下金砂益元散治小便淋瀝不通鬱金海金砂滑石甘草各等分右為末每服三錢木通燈心煎湯下或冬瓜仁湯亦可茯苓散治白尿京三稜蓬术各煨砂仁赤茯苓各半兩青皮陳皮滑石炙甘草右為末每服一錢燈心煎湯調下三稜散小兒尿白久而成疳此藥實脾土消食化積三稜蓬术益智仁甘草神麯麥芽陳皮各五錢右水煎服痰嗽加製半夏口腥氣加鹽調理諸痰加棗子淋門淋淋瀝也尿竅澀滯小便點滴而出艱澀而疼頻而數起也由熱結膀胱不能滲泄下焦之氣壅滯而然其血淋者熱自小腸而來小腸與心為表裏心主血熱則妄行滲於膀胱而致之也小兒尿出少頃如米泔狀者由乳哺失節傷於脾胃以致清白不分久則成疳而濁也尿初出時微赤良久變白乃熱疳之邪初出黃白良久變米疳者乃冷疳之候也冷者益黃散主之熱者牛黃丸冷而復挾熱者大蘆薈丸純白濁者厚朴丸諸失津液欲成疳而小便白濁者茯苓散葵子散治小兒諸淋葵子車前子木通桑白皮蜜炒瞿麥赤茯苓山梔子炙甘草各等分右水煎服八正散治心經藴熱口燥咽乾五淋小便澀眼目赤脈赤瘡滑石瞿麥木通大黃扁豆車前子梔子各五錢甘草稍二錢半右每二三錢加燈心煎服木通散治上焦熱小便閉煩躁生嗔及淋瀝諸瘡丹毒八正散加赤茯苓黃芩五淋散治膀胱有熱水道不通或尿如豆汁或如沙石或膏或血血餘散治血淋髮灰二錢生蒲黃生地黃赤茯苓甘草各一錢右煎調髮灰空心服分清飲通心氣補漏精小便餘瀝赤白濁益智仁川萆薢石菖蒲烏藥右燈心水煎服一方加白芍藥茯苓君朴丸治諸疳小便白濁久則黃瘦不長肌肉史君子肉煨厚朴製黃連各一兩木香二錢同炒右為末麵糊丸赤豆大米飲下三十丸胃苓丸治小便如米泔甚效分隂陽退潮熱消浮腫退黃疸調脾胃此銅壁山人改湯為丸即胃苓湯加草果米糊丸米飲下嘔吐薑湯下泄瀉車前子湯下浮腫長流水五加皮燈心湯下黃疸本方一料加茵陳五錢燈心湯下白濁鹽湯下疝氣茴香湯下遺尿門尿床附遺尿者謂小便日夜時出多而不禁尿床者謂夜入床睡去乃小便出而不知也良由下元不足腎與膀胱虛冷所致故古方多用溫補下元之劑腎氣實則氣固而溺有統攝則不致遺失也劉守真又謂有熱客於腎部干於足厥隂之經乃廷孔鬱結極甚而氣血不得宣通則痿痺而神無所用故夜滲入膀胱而旋溺遺失不能收禁也此又不可不知孫仲子泰來曰夫謂不禁者乃小便出多不計其遍數為下元大虛之症由陽氣虛􅉵不能收持此急症也不急治則死矣非大溫大升大補則莫能濟其虛而固其原彼尿床者嬰孩童稚常有之蓋男子十六而精通腎氣固即不為治至其時亦自止若治之早者則早止也亦有至老而不止者余目擊十數人矣余族且三人皆乏嗣總由下元虛冷良可徴矣劉守真謂有熱客腎部干於厥隂廷孔鬱結極甚不能宣通故遺失不能收禁愚謂既鬱結極甚不能宣通則小便所出者僅點滴而已所出必短澀疼痛色必黃赤安能直遂長清不收不禁哉內經謂膀胱約而為癃不約為遺溺不禁由是參之守真之論只可言淋乃暫有之疾非遺失日久者可擬余不佞僭為辨雞腸散治小兒尿床遺溺不自知覺雞腸燒牡蠣煆白茯苓真桑螵蛸炒各五錢桂心龍骨各二錢半右每服三錢薑棗煎服雞䏶脛散治遺尿雞䏶脛一具雞腸燒豬胞炙焦右為末男用雌女用雄每服一二錢酒調下破故紙散治下元虛冷遺尿破故紙炒為末一二錢白湯調服益智仁散治同上亦治白濁益智仁白茯苓等分右為末每服一錢空心米飲下又方五倍子一半生用一半燒存性為末雪糕為丸白湯下補原丸治下元虛􅉵小水不禁或如脂膏桑螵蛸益智仁人參仙茅山茱茰肉兔絲子乾山藥巴戟右為末各照常製芡實粉為丸蓮肉湯送下七八十丸遺尿方破故紙益智仁烏藥各三錢白茯苓茯神各一錢右為末空心米飲下一錢外腎光腫門小兒隂腫多由甘肥不節濕熱下流或啼哭怒氣不順或失坐冷地皆能致之丹溪謂脫囊腫大墜下不收以紫蘇莖葉為末水調荷葉包之又謂一人傳此方用野白紫蘇為末濕則乾摻乾則香油調敷雖皮潰而核欲墜悉有神功桃仁丸治怒氣不順啼哭鬱氣結於肝經發為隂腫或為偏墜或水竇不通亦能發腫此方主之桃仁去皮微炒桂心黑豆微炒白蒺藜炒研去刺牡丹皮大黃各等分右為末煉蜜丸麻子大每服五丸或七九丸青皮木香蔥白煎湯入鹽少許送下或煎大流氣飲研青木香送下亦可丹溪用木通甘草黃連當歸黃芩煎服牡蠣散治小兒外腎腫大莖物光明牡蠣煅為細末以津唾調塗腫處即消又方加地龍末一分如外腎熱者以雞子清調敷又方治小兒卵腫桃仁研如泥津唾調敷青木香丸寬中快膈腹脅疼痛心下堅痞腸中水聲隂腫偏墜黑豆炒一兩五錢青木香補骨脂炒蓽澄茄檳榔各四兩先將檳榔用粟米包外再以濕紙裹煨令焦去飯取檳榔同前藥為末滴水丸菉豆大每服二十丸白湯下又方治偏墜防風牡丹皮右為末酒調服一二錢立效或白湯入鹽下又方治偏墜五苓散內加防風牡丹皮極效有熱者服三黃丸三白散治膀胱藴熱風濕相承發為隂腫小便不利白豆炒二兩桑白皮白术木通陳皮各五錢右為末每二錢薑湯調服蟬退散隂囊忽腫或坐地多時感受風濕或為蟲蟻所吹用蟬退五錢水一碗煎湯薰洗腫處腫消痛止須洗二三次後服五苓散以燈心湯調服又方蔥地上蚯蚓糞為末煎甘草汁調敷腫上或薄荷汁調亦妙痢門小兒痢疾外感少而內傷多故曰無積不成痢也但當審諦新久虛實若新起而腹痛手不可近後重裏急日夜頻迸小水短少稠粘之物若膿若血不計遍數者急宜下之下後看輕重再為調補噤口者審其從時令之氣而來體必發熱用人參敗毒散加陳倉米有熱毒薰蒸胃口虛而不納榖或乾噦嘔惡者以辰砂益元散用生薑汁調燈心湯送下若痢久而腸胃虛弱者但當補養氣血蓋虛回而痢自止也脾胃健飲食進痢自旋止日數雖多而無誤於事也小便不利者當利之清六丸佳人參敗毒散治四時不正之氣發為寒熱瘧痢或遍身作痛嘔噦惡心噤口方見丹毒赤遊加陳皮薑棗香脯治小兒刮腸下痢噤口不食閉口合眼至重危困精豬肉一兩批薄片膩粉將豬肉於炭火上慢炙旋鋪膩粉令勻成脯每以少許與吃如未知吃且放鼻邊自然要吃此方治胃口有毒食之神效百一選方治噤口痢蓮肉去殼留心碾為末每服半錢陳米飲調下此是毒氣上衝心肺借此以通心氣便覺思食山藥散治噤口痢乾山藥一兩半炒熟半生用為末白湯調二錢服之嘔噦立止茅花湯治吐血下血鼻衄血痢黑痢茅花一大把水煎服無花用根代之枳殼寬腸散順氣治痢甘草炙六錢枳殼炒二兩四錢右為末每服一錢空心白湯調下烏梅湯治下痢津液少臟腑虛燥煩渴引飲及諸病後煩渴引飲無度烏梅肉微炒五錢白茯苓木瓜各一兩右每三錢薑一片水煎服清六丸治血痢小水短少及泄瀉此方專清六腑濕熱故名清六內用紅麯者以其能消食積而化淤血也桂府白滑石飛過六兩炙甘草一兩紅麯炒五錢右滴水為丸燈心湯下二三十丸芍藥湯治赤白膿血裏急後重腹中疼痛劉守真云行血則便膿自愈調氣而後重自除此方是也白芍藥二錢當歸一錢酒連酒芩各八分木香檳榔各五分肉桂四分甘草二分右水煎服小水短少日夜後重者加枳殼升麻桃仁各一錢滑石三錢若積滯重而熱盛者加大黃一錢保和丸治食積痢腹疼不知餓用此消之山查神麯各二兩陳皮半夏各一兩蘿蔔子連翹炒各五錢右末仍以神麯糊為丸菉豆大每服一錢白湯下小香連丸治裏急後重腹疼赤白痢黃連吳茱茰各一兩同炒只用連木香二錢訶子煨去核五錢右為末麯糊為丸菉豆大每三十丸米飲下地榆散治赤痢無糞鮮紅點滴而下地榆蜜炒訶肉煨甘草各等分右為末每服一錢米飲調下地榆飲治熱痢腹痛赤白頻併地榆二錢甘草白芍藥當歸各一錢枳殼炒一錢半黃連吳茱茰炒一錢右水煎服茯苓白术散治寒痢所下清白如魚凍者脾弱不思飲食茯苓三錢白术人參木通枳殼甘草炒各一錢肉果煨桂心各一錢半訶肉二錢陳皮二錢右每三五錢燈心煎服朴附丸治寒痢滑泄不禁厚朴製大附子炮乾薑炮陳皮各等分右為末粟米糊為丸每服五七分或一錢米飲下又方木香一錢黃連吳茱茰炒三錢粟殼去蒂蕚蜜炒二錢殭蠶炒一錢甘草三錢右銼以生薑三錢同炒爆乾為末米飲調下赤生地黃湯下白烏梅湯下如有熱小柴胡湯解之養臟湯治冷熱不調下痢赤白或如膿血魚腦裏急後重腹臍㽱痛脫肛如臟腑滑泄夜起及日久虛寒加大附子三片粟殼蜜炒三錢人參當歸肉桂肉果煨白术訶肉煨炙甘草各一錢木香芍藥各一錢半右每三五錢水煎服忌酒麵生冷胃風湯治風冷乘虛干於腸胃水榖不化泄瀉腹脅虛滿腸鳴㽱痛下如豆汁或純瘀血白术芍藥川芎人參當歸肉桂茯苓各等分右每服三錢入粟米一錢水煎服芍藥柏皮丸治一切膿血惡痢窘痛白芍藥黃柏各一兩當歸黃連枳殼各五錢右為末滴水丸菉豆大白湯下三黃熟艾湯治積熱下痢赤色及治傷寒四五日大下熱痢諸藥不效者黃連黃芩黃柏各七錢熟艾半雞子大右每服三錢水煎服噤口痢人參黃連各一錢石蓮子三分右為末擦牙關二三次即能食丹溪用人參川黃連二味煎濃服之但得一呷入腹即愈此加石蓮子亦有理豆蔲散治嬰孩腸胃脆弱糟粕不聚瀉痢不止或赤或白冷熱不調日夜頻併愈而又發神效但忌葷腥生冷肉豆蔲煨一個胡粉炒二錢龍骨生一錢枯礬一錢右為末每服一錢米飲調下或以薄糊丸麻子大每服五六十丸議曰胡粉即真鉛粉也出韶州者名韶粉出定州者名定粉總名光粉其性殢故用以殢其腸令不虛滑豆蔲溫臟之藥安和腸胃龍骨白礬澀腸止痢凡虛滑日夜無度者服之隨時痊愈神效雞青丸治嬰孩一切痢疾不拘冷熱皆效木香二錢生黃連五分肉豆蔲生一個大者右為粗末取雞子青搜和作餅慢火炙黃色變紅者稍乾擘破碾為末白麵糊為丸麻子大每三五十丸米飲下此方功在雞子青大效至聖千金飲子治先吐後瀉後又變痢臍腹㽱痛脅肋脹滿受濕虛鳴膿血五色相雜或如豆汁或如瘀血日夜無度食少肌羸黃茋蜜炙甘草陳皮粟殼蜜炙木香白芍藥地榆蜜炒黑豆炒當歸枳殼炒烏梅淮棗白术訶肉煨黃連各等分右每三五錢水煎服大艾煎丸治小兒虛痢大渴不止艾葉燒存性乾葛粉胡粉炒海螵蛸龍齒各等分右為末煉蜜為丸雞頭子大每服一丸至二丸米飲下术蔲麵治噤口痢一粒飯不食服此效白术五錢肉果炮二枚木香二錢右為末白麵一兩水搜作餅切作條子水煮熟用蔥白生薑鹽各少許和汁與吃看所入多少仍用雞青丸調理炒雞子治休息痢及疳瀉日久不愈雞子一枚先用黃蠟如指大一塊銚內鎔化入雞子拌炒熟空心食之大效剪紅丸治痢鮮血側柏葉槐花枳殼各炒荆芥穗各等分右醋糊丸糯米湯下瘧門小兒瘧痢治同大人惟劑輕小耳當於大人科參治兹但收集數方以備緩急不重論也緣其症不外於外感內傷二者而已外感有六經之形症用和解六經之劑治之內傷有胸腹飽滿晝輕夜重之標凖只以二陳湯加健脾消導之劑治之蓋無痰不作瘧也數發之後乃為截之虛弱者補之然初發二三日之間必須導痰運脾和解為主切不可遽投補截設汗不周頭疼未徹則表邪未盡解也苟痰不清胸腹不暢則內傷未盡鎔也補之截之是間其邪而塞其去路其變也曷勝言哉和解六經之劑詳於大人科第八卷中清脾飲治疸瘧熱而不寒或熱多寒少膈滿不能食口苦舌乾煩渴小便黃赤大便不利青皮厚朴製白术草果煨柴胡茯苓半夏黃芩甘草各等分右生薑三片水煎服養胃湯治外感風寒內傷生冷溫中快膈山嵐瘴氣寒瘧嘔逆人參蒼术厚朴半夏藿香草果煨去殼茯苓各五分陳皮七分甘草二分右薑三片棗一枚烏梅一枚煎服香葛飲治嬰孩夾食夾驚傷寒四時瘟疫瘧疾香附子炒紫蘇葉各一兩橘紅青皮葛根各五錢炙甘草二錢五分右每三五錢薑蔥白煎服露星飲治久瘧成癆以此截之秦芁柴胡白术茯苓檳榔常山酒炒一次醋炒一次黃芩甘草半夏麯官桂各等分右用酒醋水各半碗煎七分露一宿臨發五更服之鬼哭飲截瘧常山製大腹皮白茯苓鱉甲醋炙甘草右桃栁枝各七條水煎臨發空心五更服南斗散治痰瘧常山製白芷南星生各等分右酒煎臨發五更服白术截瘧飲治虛弱久瘧脾虛嘔吐不思飲食不拘寒熱極效白术一半生用一半炒用四錢橘紅麥芽各二錢烏梅一枚右薑五片水煎臨發日五更服何首烏丸治久瘧隂虛熱多寒少以此補而截之何首烏為末鱉血為丸黃豆大辰砂為衣臨發五更白湯送下二丸截法不拘寒熱瘧端陽日製桃葉尖東南方者四十九片半夏四十九粒為末搗桃葉尖為九雄黃為衣晒乾貯瓶中封固臨用取一丸綿裹塞鼻中男左女右鱉甲飲子治瘧久不愈腹左有塊名曰瘧母鱉甲醋炙白术黃芩草果檳榔芎藭橘紅甘草厚朴白芍藥各等分右薑棗煎服青黃散消瘧母如神青黛澄去灰上雄黃研細飛過右等分為極細末每一嵗用一分空心及夜淡醋湯調下塊消其八即止屢驗屢效銅壁山人治瘧母用月蟾丸木香人參黃茋當歸桔梗黃連三稜醋煨莪术同上鱉甲醋炙乾蟾煅史君子苦棟根皮訶子肉夜明沙枳實緑礬醋煅各等分右為末醋糊丸陳米飲下又截法寒多熱少者俱以平胃散加常山草果截之此內傷瘧熱多寒少者俱以白虎湯加常山草果截之寒熱相半者俱以小柴胡湯加常山草果截之此外感瘧吃泥門小兒吃泥乃胃中熱丹溪用石膏黃芩陳皮茯苓白术煎服而愈徐氏用宣治一兒食泥土困睡泄瀉遍身如疥此脾經內外疳也以六君子湯肥兒丸而愈吃生米門吃生米者此胃中有蟲亦宜健脾清熱肥兒丸佳蓋吃泥吃米皆疳之漸當於疳門尋治大蘆薈丸等方酌而用之毋使臨期鞅掌也蒼术丸治吃生米蒼术米泔浸一日為末􅔻餅糊為丸梧子大每服五十丸米飲下一日三服耳門生生子曰小兒耳疾多屬風熱上壅亦有因於沭浴水入耳中水濕停久摶於氣血醖而為熱化為膿汁湯氏云耳有五般常出黃膿者為停耳出紅膿者為膿耳出白膿者為纏耳疳臭者為伍耳耳內虛鳴出青膿者為震耳症雖五般病源一也皆由風水入耳而因有積熱上壅而成若不早治久則成聾宜胭脂膏治之仍服化痰退熱等劑即愈也孫季子朋來曰此五者不可謂全無分别詳其名觀其色其間必有説也愚僣剖之停耳者為水濕之氣久停耳中與氣血摶擊醖為熱膿蓋脾主濕又脾之色黃以始為停濕所致故曰停耳膿耳者心主血脈血熱化為紅膿心之色赤故曰膿耳纒耳者肺主氣肺之色白肺氣不利纒壅上焦化為白膿故曰纒耳伍耳者耳內疳臭蓋耳為腎之外候小兒腎未充足偶為氣忤逆於經隧心主臭心氣不得下降腎氣不得上通故醖而為疳臭也震耳者易曰震為雷或為雷聲震動故耳中虛鳴肝之色青故出青膿也此因五臟有所感觸隨臟為名故有此五色之相應也既有此五臟之因須推五臟之治庶為治本若謂症雖五般病源一也則豫未敢首肯蔓荆子湯治內熱耳出膿汁升麻木通麥門冬赤芍藥生地黃前胡甘菊甘草桑白皮赤茯苓蔓荆子各等分右薑棗煎食後服清上散治上焦風熱耳出膿汁頭面瘡癤方見風熱門當歸龍薈丸治肝膽風熱耳中鳴出青膿名曰震耳大便祕小便黃常服宣通血氣調順隂陽當歸龍膽草柴胡青黛各五錢梔子一兩膽星麝香五分大黃蘆薈各五錢酒芩黃柏酒連各一兩木香二錢五分右煉蜜丸小豆大每二十丸薑湯送下清黃散治耳出黃膿名曰停耳內有風熱外為水濕所干醖久而成防風滑石飛各五錢甘草炙一錢梔子酒炒三錢藿香二錢酒連二錢右為末白湯調二錢食後服清心丹治耳出紅膿名曰膿耳及舌上生瘡如楊梅狀者黃連酒炒三錢滑石飛六錢甘草辰砂飛各一錢薄荷六分犀角屑二錢右為末每用一錢五分蜜拌薄荷湯下夜再服清白散治肺熱痰火上壅耳出白膿名曰纒耳兼治咳嗽桑白皮蜜炒地骨皮各三錢甘草一錢貝母二錢寒水石煅三錢天花粉酒芩天門冬各一錢五分右為末以蜜水調食後服或白通草煎湯下尤妙交感丹治耳中疳臭名曰伍耳或怒氣上逆上下不得宣通遂成聾聵香附子童便浸透炒三錢茯神黃連各二錢桂心一錢甘菊花一錢右為末每一錢五分燈心湯調下禹糧丸治停耳出膿水禹餘糧煅醋淬七次海螵蛸去背上硬骨百草霜伏龍肝各二錢五分大附子去皮臍生用一枚右為末以綿裹如貟眼核大安耳內日再易之如不瘥乃有蟲也龍骨散治諸膿耳枯礬龍骨胭脂丕各一錢麝香少許右為細末先以棉裹杖子拭去耳中膿再吹一字入耳中日再加海螵蛸一錢尤妙羊角散治耳內膿汁不乾山羊角燒存性為末每吹二三分入內一日二次三日全瘳滋隂地黃丸治耳虛鳴膿汁不乾腎隂不足熟地黃一兩白茯苓四錢山茱茰五錢甘菊四錢牡丹皮四錢何首烏黑豆蒸三次黃柏各四錢右煉蜜丸梧子大每服三五十丸龜胸龜背門古方皆屬之於肺謂受邪喘久所致又乳母多食辛熱胎毒於兒感之於肺由肺脹大而胸髙滿如龜狀也蓋胸膈之上乃肺之分野又肺主皮毛若背受風邪客於脊骨故背髙而僂傴又或兒坐太早亦能致之然此多成痼疾考之古法惟有百合丹枳殼防風丸及灸肺俞膈俞二冗而已别無治法百合丹治胸髙脹滿其狀如龜川大黃煨天門冬杏仁百合木通桑白皮甜葶藶軟石膏右為末煉蜜丸菉豆大每服五丸白湯臨睡服枳殼防風丸治客風入背如龜髙聳枳殼防風獨活前胡麻黃當歸大黃煨各一錢右麵糊丸黍米大米飲下松蕊丹治初生不暇護背為客風吹脊入於骨內或坐早所致松花枳殼防風獨活各一兩麻黃前胡川大黃桂枝各五錢右為末煉蜜丸黍米大每十丸米飲下灸法肺俞冗第三椎下兩傍各一寸半膈俞冗第七椎下兩傍各一寸半以小兒中指量中節為一寸每灸艾炷如小麥粒大各灸三五壯龜尿法點背腫髙處節間取烏龜置於新荷葉上用鏡照之其尿自出針點脊俞中若龜尿不出用豬毛插入鼻中其尿即出蟲門小兒好食肥甘生冷傷於脾胃脾胃既傷則不能運化精微而生濕熱濕熱久則生蟲也發則腹中疼痛上下往來無有休止或亦攻心則合眼啼哭撲手仰身神思悶亂嘔噦涎沫或吐清水四肢羸困面色青黃飲食難進不生肌膚或寒或熱沉沉默默不的知其病之所在不早療則腹中子母轉轉相生蟲長一尺足能殺人觀周嵗已前小兒鮮有此苦者良由飲乳不食肥甘生冷蟲無從而生也即是觀之蟲之生於濕熱肥甘也不亦明乎豫故述此生蟲之源以為今之為乳母者姑息之戒化蟲丸治蟲咬心痛來去不定不思飲食鶴虱檳榔胡粉苦楝根取東行小枝各五錢明礬半枯半生三錢五分右為末麵糊丸菉豆大三嵗者服三十丸白湯入香油二滴吞下食前服如有小蟲皆化為水大蟲即從大便而下初服甚效史君子丸治小兒五疳脾胃不和心腹脹時或㽱痛不進飲食漸至羸瘦厚朴陳皮史君子肉湯浸去黑衣各一兩甘草川芎各二錢五分白芍藥五錢右為末煉蜜丸皂子大三嵗已上一丸米飲下烏梅丸治蛔厥當吐今反靜而復煩此為臟寒蛔上入其膈須臾復上得食而嘔又煩蛔聞食當自吐及治久痢烏梅三十三個乾薑炮一兩二錢黃連二兩川椒當歸各四錢細辛人參大附子炮去皮臍桂枝黃柏各七錢右為末用酒浸烏梅肉一宿蒸飯搗為丸麻子大每十丸日二次忌生冷檳榔丸檳榔鶴虱貫衆乾漆炒焦存性蕪荑雷丸雄黃飛史君子肉川楝子肉木香黃丹錫灰輕粉少許巴霜二個右為末酒煮麵糊為丸黍米大五更早用豬肉蔥油煎將肉細嚼勿吞下但只引蟲頭向上便將肉汁調化蟲散或吞檳榔丸至已時取下蟲方進飲食化蟲散先將豬肝油炙令兒聞其香味引蟲頭向上則藥可行雷丸鶴虱甘草大黃生各一錢史君子肉十枚右末用豬肉煮汁調五更服疳門生生子曰小兒疳症最為重候顧疳字從甘明其嗜貪甘肥成積生蟲損傷脾胃脾胃一虛百病蜂起古稱五疳言五臟之疳也五疳之外其名甚多如曰疳氣曰疳虛曰疳熱曰丁奚曰哺露曰腦疳曰脊疳曰無辜之類不勝枚舉蓋脾胃虛則停積積則生熱或瀉或痢或風或瘧生疳生蟲二十已下其病為疳二十已上其病為癆症雖多種源一而𣲖殊也而治總在脾胃為重五臟皆受氣於脾胃賴坤元以資生也又有乳母未斷乳時先耽身孕兒飲孕乳久為魃病以其疳成肉消顱大髮穗腿枯形肖傀儡若魃然也又有母體虛弱氣血不足乳汁不充強餵粥飯耗傷形氣皆成疳兆楊錢二公治論極正採録於左以為法眼楊氏倓子曰疳之受病皆虛使然熱者虛中之熱冷者虛中之冷積者虛中之積治熱不可妄表過涼治冷不可峻溫驟補治積不可用霸峻取錢氏仲陽曰小兒初病為肥熱疳熱則涼之久病為冷瘦疳冷則溫之小兒易虛易實過寒則生冷過溫則生熱峻取則重傷脾胃上醫處其消積和胃滋血調氣隨順藥餌以扶持之病家調節乳食以禆養之使營衛調和臟腑充實若或過焉君子未保其往也積者疳之母由積而虛謂之疳極凡有積者無不壯熱腳冷若積而虛甚則先扶胃使胃氣充實方與微利急以和胃之藥扶虛救裏如白豆蔲蘿蔔子砂仁蓬术消積等劑踈利之藥也脅腹癖痛亦虛中之積先寒後熱飲水不食或飲水而致喘嗽凡熱疳以胡黃連丸冷疳以木香丸冷熱疳以通神丸主之疳在外耳鼻生瘡者以蘭香散諸瘡白粉散主之銅壁山人曰凡治疳不必細分五疳但虛則補之熱則清之冷則溫之吐則治吐利則治利積則治積蟲則治蟲不出集聖丸一方加減用之屢試屢驗矧此方收聚藥品極為工緻誠醫中之王道疳門之火棗也業幼科者則亦當知其所自哉生熟地黃丸治肝疳白膜遮睛合面而卧肉色青黃髮穗筋青腦熱嬴瘦生地黃熟地黃各五錢川芎赤茯苓黃連杏仁半夏天麻甘草當歸枳殼炒地骨皮各二錢五分右每三五錢薑三片黑豆二十粒水煎服地黃丸治腎疳極瘦遍身瘡疥發寒熱時頭熱腳冷熟地黃八錢山藥山茱茰各四錢澤瀉牡丹皮白茯苓各三錢右為末蜜丸梧子大每服十五丸白湯下又方治同上無山茱茰茯苓澤瀉加史君子川練子茯苓丸茯神蘆薈琥珀黃連赤茯苓各三錢釣藤鈎逺志薑煮乾蟾煅麝香少許石菖蒲各一錢右粟米糊丸麻子大每一二十丸薄荷湯下神效換肌丸治脾疳肌瘦潮熱盜汗飲食易傷臟腑糟粕飲食不化頭大腹急黃連炒鱉甲醋炙肉果煨訶肉煨二錢五分麝香一分五釐麥芽炒神麯史君子肉煨各五錢右為末麵糊丸麻子大米飲下看大小服靈脂丸治脾疳食疳白豆䓻麥芽五靈脂砂仁蓬术煨青皮陳皮史君子各二錢乾蟾煅三錢右為末米糊丸麻子大米湯下清肺湯治肺疳咳嗽氣逆多啼壯熱惡寒桑白皮蜜炒五錢紫蘇前胡黃芩當歸麥門冬連翹防風桔梗茯苓生地甘草各二錢五分右每五錢水煎服黃連肥兒丸治一切疳及疳眼赤腫昏暗雀盲或經月眼合不開黃連一兩蕪荑麥芽神麯各五錢青皮史君子肉各二錢五分右各炒為末豬膽汁丸麻子大每十五丸米湯下大蘆薈丸治疳殺蟲和胃止瀉胡黃連黃連白蕪荑蘆薈木香青皮雷丸白者鶴虱炒各五錢麝香二錢右為末粟米飯丸菉豆大米飲下二三十丸香蔲丸治疳瀉黃連薑汁炒三錢肉果煨木香訶肉砂仁茯苓右為末飯丸麻子大每二三十丸米飲下加味肥兒丸治諸疳身黃肚急痞塊泄瀉瘦弱胡黃連史君子肉三稜莪术各煨木香香附青皮炒陳皮檳榔麥芽炒神麯炒各一兩川黃連蘆薈各五錢右為末神麯糊為丸菉豆大米飲空心下三五十丸小兒無熱去胡黃連泄瀉加人參茯苓肉果加味胡黃連丸治疳疾一切虛痢諸藥無功此方極效胡黃連蘆薈川黃連肉果桂心人參辰砂史君子木香鈎藤龍齒茯苓各等分麝香少許右為末用獖豬膽汁二枚取汁和藥令勻却裝入膽袋內以繩扎之更入茛菪子二錢微炒黃丹一錢二味研末入前藥和勻搗五百杵丸菉豆大米飲吞下五七丸治一切十二種疳痢無辜疳亦佳蚵蚾丸治無辜諸疳一服虛熱退二服渴止三服瀉利住蟾蜍一隻打死置桶中取糞蟲入桶一日一夜將蟲取起以布袋盛安急流水中一宿取出瓦上焙為末入麝香一字飯為丸麻子大每三五七丸米飲下此方極驗木香丸治疳痢冷熱不調五色雜下裏急後重黃連二錢木香厚朴製砂仁夜明沙訶肉各一錢右為末粳米飯丸麻子大每服二三十丸艾薑湯下十全丹治丁奚哺露青皮陳皮莪术煨川芎五靈脂白豆仁檳榔蘆薈各五錢木香史君子乾蟾灰各二錢右為末豬膽汁浸糕糊丸麻子大每服二三十丸米飲下有熱薄荷湯下五疳良方治疳黃連蕪荑神麯麥芽陳皮木香乾蟾煅存性各一兩檳榔二枚史君子二枚肉果二枚麝香一分右為末以豬膽汁二枚入好酒打糊為丸芥子大米飲下二三十丸天麻丸治肝疳風疳疳眼青黛黃連天麻五靈脂川芎夜明沙炒蘆薈各二錢龍膽草防風蟬退各一錢五分去足嘴全蝎炙二枚麝香少許乾蟾頭炙二錢右為末豬膽汁浸糕丸麻子大每二十丸薄荷湯下地黃清肺飲治肺熱疳􅉶蝕為穿孔臭或生瘜肉或鼻生瘡桑白皮蜜炒五錢紫蘇前胡防風赤茯苓片芩當歸連翹桔梗天門冬生地甘草各二錢右水煎食後服次服化􅉶丸化􅉶丸蕪荑蘆薈青黛川芎蝦蟆灰白芷胡黃連各等分右為末豬膽汁浸糕糊丸麻子大每服二三十丸食後卧服以杏仁湯吞下其鼻常用熊膽泡湯小筆蘸洗俟前藥各進數服却用青黛川歸赤小豆瓜蒂地榆黃連蘆薈各等分雄黃少許為細末吹入收功下蟲丸治疳蛔諸蟲木香桃仁去皮尖蕪荑炒檳榔各一錢鶴虱炒一錢輕粉五錢乾蟾灰三錢史君子肉五十枚煨白苦楝根皮酒浸焙貫衆各二錢右為末麵糊丸麻子大每三十丸空心清肉汁下治疳勞脊勞加川歸黃連各二錢五分龍膽丸治腦疳熱餅瘡龍膽草升麻苦楝根皮防風赤茯苓蘆薈油髮灰各二錢青黛黃連各三錢右為末豬膽汁浸糕丸麻子大每二十丸薄荷湯下食後仍以蘆薈末吹入鼻中鱉血煎治疳勞蕪荑柴胡川芎各一兩人參五錢胡連川連各二錢史君子二十一枚右用鱉血一盞吳茱茰一兩拌二連淹一宿次早炒乾去茱茰只用二連俱為末粟米糊丸麻子大每二三十丸白湯下鱉甲丸治無辜疳腹中毒起四肢瘦削鱉甲醋炙黃連枳殼夜明沙各炒五錢訶肉一枚一生一熟麝香二分蝎虎炙一錢右為末蜜丸菉豆大每服五丸米湯下日三服梅肉丸治諸疳煩渴飲水不休定粉龍膽草烏梅肉黃連炒各等分右煉蜜丸黍米大每二三十丸白湯下五疳消食丸治五疳八痢殺腹臟蟲療疳勞及走馬牙疳唇爛肚大青筋此藥大能健脾進食華顔色長肌肉麥芽史君子黃連蕪荑各炒陳皮龍膽草各等分右為末粟米糊丸如粟米大每服二三十丸空心米飲下不拘時蘭香散治小兒走馬疳牙齧潰爛以至崩破出血齒落者輕粉蘭香子各一錢蜜陀僧炒醋淬五錢右為末傅齒及齦立效傅齒立效散鴨嘴膽礬匙上煅紅一錢麝香少許右研極細末以少許傅牙齒齦上又方用蟾酥一字加麝香傅之地骨皮散治腎疳齦㬽牙齒肉腐臭鮮血常出生乾地黃五錢真地骨皮北細辛各二錢半五倍子炒焦二錢右為末每以少許傅之頻用效亦可服大效史君檳榔丸治嬰孩食肉太早損傷脾胃水榖不分積滯不化傅為疳候肉果檳榔生宣連胡連陳皮青皮川楝肉炒神麯蕪荑炒去皮麥芽炒木香夜明沙炒蘆薈川芎各一錢麝香一右為末雄豬膽汁薄荷汁為丸麻子大每三五十丸米飲下肥肌丸治一切疳氣肌瘦體弱神困乏力常服殺蟲消疳開胃進食黃連香附酒炒陳皮各二錢半川楝子肉炒川芎各五錢木香二錢右為末紅麯糊為丸麻子大每服三五十丸米飲下通神丸治冷熱疳胡連川連各二錢木香蕪荑炒丁香肉果生史君子肉煨各一錢大蟾蜍一隻銼水煮爛研膏右為末膏和丸麻子大每十五丸米飲下取交妳一切疳毒夜明沙五錢精豬肉三兩碎切同入瓶水煮爛與兒食之汁亦飲之取下腹中胎毒次用生薑四兩和皮切炒黃色再用黃連一兩二味為細末煮麵糊為丸黍米大米飲下三五十丸布袋丸治諸疳面黃腹大飲食不潤肌膚此方豫平日用加阿魏五錢極效夜明沙蕪荑史君子肉各二兩白术甘草各炒茯苓人參蘆薈各五錢右為末􅔻餅為丸彈子大每一丸以生絹袋盛用精豬肉二兩同入瓦􅀈煮極爛聽兒食肉飲汁其藥取起懸於風處次日再用如聖丸治冷熱疳瀉極神效胡連川連蕪荑史君子肉各一兩麝香五分蟾蜍五隻酒煮成膏右為末以膏和為丸麻子大每服三十丸人參湯下肉棗散治肉疳而瘡侵入口鼻棗肉二枚入青礬如核大火煆存性為末入麝香少許香油調塗煮肝散治疳眼翳膜羞明不見物夜明沙蛤粉榖精草各一兩右為末每服一錢五七嵗二錢用雄豬肝如匙大一塊批開摻藥在內攤勻麻扎定米泔水半碗煮肝熟撈肝將汁傾在碗內將目薰之其肝分作三次食之即將肝汁送下三次不拘時如大人雀目空心食之至夜便能見物如患久不效再製服即見效黛連蘆薈丸小兒食甘甜飲食食則生蟲生疳以此治之胡連蘆薈川連炒史君子各五錢神麯炒一兩阿魏青黛各一錢麝香少許右為末糊丸黍米大米飲下四味肥兒丸治嘔吐不食腹脹成疳作瀉不止或食積脾疳目生雲翳口舌生瘡牙齦腐爛發熱瘦怯遍身生瘡小便澄白腹大青筋一切疳候川連蕪荑神麯麥芽各等分右為末糊丸桐子大每二三十丸白湯下銅壁山人黃公集聖丸治一切疳症附加減法於後屢試屢驗蘆薈五靈脂夜明沙炒砂仁橘紅木香莪术煨史君子肉各二錢川連川芎乾蟾炙各三錢當歸青皮各一錢半因於虛者加人參二錢白术三錢去莪术青皮因於熱者加龍膽草三錢去砂仁莪术因於吐瀉下痢者加白术二錢肉果煨訶肉各一錢五分去青皮莪术因於積痛者加煨三稜川楝子肉小茴香各二錢去當歸川芎因於瘧者加鱉甲醋炙三錢因於蟲者加白蕪荑一錢五分川楝子肉二錢去當歸川芎因於渴者加人參白术各二錢去莪术砂仁右為細末用雄豬膽汁二個和麵糊為丸看大小服米飲送下豫按此方乃十全丹去檳榔白豆仁加黃連夜明沙砂仁尤為有理方名十全功收十全也兹改集聖者集治疳之聖品也此方不熱不寒補不致滯消不致耗至穩至妥故有屢試屢驗之語云又豬肝散治疳積痼而體羸弱不經下者用此補而下之下後再以參苓白术散之類調理雄豬肝不見水者四兩用竹刀批開將新荷葉晒乾為末二錢摻入肝內重湯煮熟以肝與兒食之空心服至已午時取下惡物從大便而出不動臟腑極佳極佳癎門錢仲陽云凡治五癎皆隨臟治之每臟各有一獸之形證並用五色丸治之此治小病者發而重者死病甚者亦死若反折上竄其聲如犬症屬肝也目瞪吐舌其聲如羊症屬心也目直腹痛其聲如牛症屬脾也驚跳反折手縱其聲如雞症屬肺也肢體如尸口吐涎沫其聲如豬症屬腎也生生子曰參前論雖以五獸配屬五臟亦是以意測之耳觀其並用五色丸槩治之且謂發重者及病甚者皆死再無别治法豈謂一五色丸悉能之耶抑謂此病為不治之症殆無可奈何耶將為略之耶考之上古未有五獸之分惟朱丹溪乃曰癎症大率屬痰與驚不必分五等尋火尋痰分多少而治無有不愈有熱者以涼藥清其心有痰者可用吐法吐後以東垣安神丸及平肝之藥青黛柴胡川芎之類丹溪此論亦極當理癎病與急慢多相似而實非癎發時驀然仆地作聲作搐或目上視醒吐涎沫急慢症則不然也蓋驚發後即止癎發或一年一度或一季一度或一月一度或三五日再發或受驚而再發或勞心勞力而再發驚則無此之類也癎有隂陽若病初作時先身熱開目瘈瘲驚啼叫喊而後發脈浮者為陽癎仆地多仰內在六腑外在皮膚故易治若病先身冷目半開不驚瘈不啼叫而作脈沉者為隂癎驀然墜伏此內在五臟骨髓故難治夫陽癎不因吐下由其內有痰熱客於心胸之間因聞大驚而作若熱盛雖不聞驚亦自作也隂癎其始也亦本於痰熱醫以寒涼藥攻下太過損傷脾胃乃變而為隂非癎本有隂寒症也戴原禮曰癎有五無非痰涎壅塞迷悶孔竅發則頭旋顛倒手足搐搦口眼相引胸背僵直叫吼吐沫食頃乃蘇宜星香散加全蝎孫季子朋來曰凡治驚風顛癎之症而辰砂雄黃金箔水銀鉛粉等劑不可以久服也緣此皆治有餘之症驚搐初發胃氣尚壯痰邪方盛非有慓悍踈利之劑為之先鋒不可以祛去也稍久則不宜用蓋小兒臟腑脆弱易致虛耳前劑皆傷脾者丹溪云氣虛之人有痰胃氣亦賴所養卒不可便攻攻盡反易生而多惟健脾胃以全運化之職則新痰不生兼佐之以消痰之劑則風自定故不専以鎮心攻痰為主且心者一身之主神明出焉智慧之所由生也鎮心之劑過多則神志奪而聰明窒塞內經曰主不明則十二官危余往往見多服驚風鎮心之藥者驚定之後癡呆愚鈍寡言寡笑靈覺寂無啾然可憫詎思前藥之所誤哉幼幼之心當知所慎又有食癎原從飲食過傷而得後復傷飲食則發其外症噯吐酸氣或大便餿臭治法先當吐其食俟定後宜以下積藥看輕重下之積去則不復發五色丸又名五癎丸硃砂五錢雄黃珍珠各一兩右各為細末再以鉛二兩入銚鎔化投汞二錢五分攪硬研末和勻煉蜜為丸麻子大每服三四丸薄荷湯下牛黃丸治風癎因汗出解脫風邪乘虛迷悶搐掣涎潮屈指如算數膽星全蝎焙蟬退各二錢半防風白附子天麻麝香殭蠶炒各一錢五分右為末棗肉為丸水銀五分研細入藥丸如菉豆大每服二丸荆芥生薑湯下消風丸治風癎先宜用此膽星羌活獨活防風天麻人參荆芥川芎細辛各一錢右為末蜜丸梧子大每二丸薄荷紫蘇湯化下比金丸治驚癎先宜用此人參琥珀茯苓逺志去心薑汁炒硃砂天麻石菖蒲川芎南星青黛各一錢麝香右為末蜜丸梧子大每二丸薄荷湯下化風丹涼風化痰退熱定搐膽星羌活獨活防風天麻人參川芎荆芥粉草各一錢全蝎一枚右為末蜜丸皂角子大每一丸薄荷湯化下妙聖丸治食癎因驚而傷食吐乳發熱大便酸臭代赭石煆醋淬二錢半巴霜三錢雄黃全蝎辰砂輕粉麝香各一錢杏仁炒二錢右為末棗肉為丸梧子大每一二丸木賊湯下斷癎丹治癎瘥後復發症候多端連綿不止黃茋蜜炙鈎藤細辛甘草炙各五錢蛇退酒炙二寸蟬退四個牛黃一錢右為末棗肉為丸麻子大人參湯下每服十數丸看兒大小茯神湯治膽氣虛寒頭疼目眩心神恐懼不能獨處或是驚癎茯神酸棗仁炒黃茋柏子仁白芍藥炒五味子各一兩桂心熟地人參炙甘草各五錢右每五錢水煎服養心湯治心血虛怯驚癎或驚悸怔忡盜汗無寐發熱煩躁黃茋茯苓茯神半夏麯當歸川芎官桂柏子仁酸棗仁五味子人參各三錢炙甘草一錢五分右薑棗煎服妙香散治心氣不足驚癎或精神恍惚虛煩少寐盜汗等症辰砂三錢麝香一錢木香煨二錢半茯苓山藥茯神逺志黃茋炒各一兩桔梗炙甘草人參各五錢右為末每服一錢溫酒或白湯下五癎丸得效方露蜂房焙石緑各一兩桂心逺志肉人參各五錢硃砂一錢右為末粥丸梧桐子大每二三十丸白湯下參星湯治虛而癎久不愈者人參五錢南星炮一兩右為末每服一錢看大小薑棗湯下日二次銅壁山人治諸癎發歇無時乾地龍焙五錢虎睛一對人參天竺黃代赭石煅醋淬辰砂鐵粉各二錢半輕粉五分雄黃一錢五分金銀箔各三十片牛黃一錢琥珀三錢膽星逺志石菖蒲白附子各三錢殭蠶一錢右為末蒸餅糊為丸菉豆大菖蒲紫蘇湯下赤水元珠卷二十六
