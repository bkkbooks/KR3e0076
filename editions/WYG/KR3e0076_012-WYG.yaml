body:
  text: 赤水元珠卷十二明孫一奎撰痺門生生子曰按内經靈樞所云痺證有臟腑營衞筋脈肌皮骨及俞合刺法論包甚廣而世之認痺症者絶少丹溪擬名痛風編門論治是從内經寒氣多者為痛痺論得其一也其有不痛及各臟腑俞合等証世皆不詳載者意其以風寒濕三氣為病之本散寓於各証之下隨各証而分治之如胞痺寓淋腸痺寓飱泄心痺寓噫氣肺痺寓喘滿之類皆是然則痺之不名也久矣宜乎其有認為痿認為風認為脚氣同治者此不務研經㫖而惟務求同俗也可慨夫予今列經㫖於篇首以全軒岐舊意以痛風復痛痺以昭中古諸腎証治得痺之一俾合前後而考之庶可因名而循其實也設不復之則痛者固可以為風而於不痛者獨不可以為風乎抑凡見筋骨作痛而亦有血虚有陰火有痰涎者又皆可以風名之乎在丹溪諸公必自能融㑹體認其如因名迷實之弊流害已久名不正則言不順予故不能無容言也後之明哲幸鑒予心黄帝問曰痺之安生岐伯對曰風寒濕三氣雜至合而為痺也其風氣勝者為行痺行痺者行而不定也今稱為走注疼痛及厯節風之類是也寒氣勝者為痛痺痛痺者疼痛苦楚世稱為痛風及白虎飛尸之類是也濕氣勝者為著痺著痺者著而不移世稱為麻木不仁必著而不移劉河間所謂氣之道路著而麻者得矣或痛著一處始終不移者是也啟𤣥子註曰風則陽受之故為痺行寒則陰受之濕則皮肉筋骨受之故為痺著而不去也故乃痺從風寒濕之所生也帝曰其有五者何也岐伯曰以冬遇此者為骨痺以春遇此者為筋痺以夏遇此者為脈痺以至陰遇此者為肌痺以秋遇此者為皮痺此皆以所遇之時所客之處命名非行痺痛痺著痺之外又别有此五痺也以時令配五臟所合而言也帝曰内舎五臟六腑何氣使然啟𤣥子註曰言皮肉筋脈骨痺以四時之外遇然内居腑臟何以致之岐伯曰五臟皆有合病久而不去者内舎於其合也故骨痺不已復感於邪内舎於腎筋痺不已復感於邪内舎於脈脈痺不已復感於邪内舎於心肌痺不已復感於邪内舎於脾皮痺不已復感於邪内舎於肺所謂痺者各以其時重感於風寒濕之氣也凡痺之客五臟者肺痺者煩滿喘而嘔心痺者脈不通煩則心下皷暴上氣而喘嗌亁善厥氣上則恐肝痺者夜臥則驚多飲數小便上為引如懐孕腎痺者善脹尻以代踵脊以代頭脾痺者四肢解堕發欬嘔汁上為大塞腸痺者數飲而出不得中氣喘争時飱泄胞痺者少腹膀胱按之内痛若沃以湯澁於小便上為清涕陰氣者静則神藏躁則消亡飲食自倍腸胃乃傷淫氣喘息痺聚在肺淫氣憂思痺聚在心淫氣遺溺痺聚在腎淫氣乏竭痺聚在肝淫氣肌絶痺聚在脾王註淫氣謂氣之妄行者各随藏之所主而入為痺也諸痺不已亦益内也其風氣勝者其人易已也帝曰痺其時有死者或疼久者或易已者其故何也岐伯曰其入臟者死其留連筋骨間者疼久其留皮膚間者易已帝曰其客於六腑者何也岐伯曰此亦其飲食居處為其病本也六腑亦各有俞風寒濕氣中其俞而飲食應之循俞而入各舎其腑也帝曰以鍼治之奈何岐伯曰五臟有俞六腑有合循脈之分各有所發各随其故則病瘳也甲乙經以随為治帝曰營衞之氣亦令人痺乎岐伯曰營者水榖之精氣也和調於五臟洒陳於六腑乃能入於脈也故循脈上下貫五臟絡六腑也衞者水穀之悍氣也其氣慓疾滑利不能入於脈也故循皮膚之中分肉之間熏於盲膜散於胷腹逆其氣則病從其氣則愈不與風寒濕氣合故不為痺也帝曰善痺或痛或不痛或不仁或寒或熱或燥或濕其故何也岐伯曰痛者寒氣多也有寒故痛也其不痛不仁者痛久入深營衛之行濇經絡時疎故不通甲乙經作痛皮膚不營故為不仁其寒者陽氣少陰氣多與病相益故寒也其熱者陽氣多陰氣少病氣勝陽遭陰故為痺熱其多汗而濡者此其逢濕甚也陽氣少陰氣盛兩氣相感故汗出而濡也帝曰夫痺之為病不痛何也岐伯曰痺在於骨則重在於脈則血凝而不流在於筋則屈不伸在於肉則不仁在皮則寒故具此五者則不痛也凡痺之類逢寒則急逢熱則縱帝曰善刺痺穴法冬感風寒濕者為骨痺久不已則内入於腎病腎脹足攣尻以代踵身踡脊以代頭取太溪委中春感風寒濕者為筋痺久不已則内入於肝病臥則驚多飲數小便取太衝陽陵泉夏感風寒濕者為脈痺久不已則内入於心病心下滿暴喘嗌乾善噫恐懼取太陵少海長夏感風寒濕者為肉痺久不已則内入於脾病解堕發咳嘔汁取太白三里秋感風寒濕者為皮痺久不已則内入於肺病煩滿喘嘔取太淵合谷靈樞黄帝問於岐伯曰周痺之在身也上下移徙隨脉其上下左右相應間不容空願聞此痛在血脈之中邪將在分肉之間乎何以致是其痛之移也間不及下鍼其搐痛之時不及定治而痛已止矣何道使然願聞其故岐伯答曰此衆痺也非周痺也黄帝曰願聞衆痺岐伯曰此各在其處更發更止更居更起以右應左以左應右非能周也更發更休也帝曰善此痛安在何因而有名岐伯曰風寒濕氣客於外分肉之間迫切而為沫沫得寒則聚聚則排分肉而分裂也分裂則痛痛則神歸之神歸之則熱熱則痛解痛解則厥厥則他痺發發則如是此内則不在臟而外未發於皮獨居分肉之間真氣不能周故命曰衆痺仲景金櫃要略論血痺乃尊榮人骨弱肌膚盛重困疲癆汗出臥不時動搖加被㣲風遂得之但以脈自㣲濇在寸口闗上小𦂳宜鍼引陽氣令脈和𦂳去則愈血痺陰陽俱㣲寸口闗上㣲尺中小𦂳外証身體不仁如風痺狀黄茋桂枝五物湯主之嚴用和曰痺証因體虚腠理空疎受之而成逢寒則急逢熱則縱随所受邪氣而生証也診其脈大而濇為痺脈來急亦為痺脈濇而𦂳者亦為痺又有風血痺陰邪入於血經故也劉宗厚曰人之感三氣而為痺者以其形虚血虚耳但有在肌皮血脈淺深之異故入藏者死緣痺之為証有筋攣不伸肌肉不仁者與風証絶相似故世俗類於風痿痺証通治此千古之弊也大抵固當分其所因風則陽受之痺感風寒濕之氣則陰受之為病多重痛沈著患者易得難去如錢仲陽為宋之一代明醫自患周痺止能移於手足為之偏廢不能盡去可見其為難治也况今世俗多類於風証通治宜乎不能得其病情也統㫖曰風痺者逰行上下随其虚邪與血氣相搏聚於闗節筋脈弛縱而不收也宜防風湯寒痺者四肢攣痛闗節浮腫宜五積散濕痺者留而不移汗多四肢緩弱皮膚不仁精神昏塞者宜茯苓川芎湯熱痺者臟腑移熱復遇外邪客搏經絡留而不行陽遭其陰故㿏痺翕然而悶肌肉熱極體上如䑕走之狀唇口反裂皮膚色變宜升麻湯三氣合而為痺則皮膚頑厚或肌肉痠痛此為邪中周身搏於血脈積年不已則成癮疹風瘡搔之不痛頭髮脫落治宜疎風凉血腸痺者數飲而小便不通中氣喘争時作飱泄宜五苓散加桑白皮木通麥門冬或呉茱萸散木香丸胞痺者少腹膀胱按之内痛若沃以湯濇於小便上為清涕宜腎著湯腎瀝湯方見淋閉門血痺者邪入於陰血之分其狀體常如被風所以骨弱勞瘦汗出臥則不能搖動也宜當歸湯周痺者在血脈之中上下逰行周身俱痛宜觸痺湯大豆孽湯支飲者手足麻痺臂痛不舉多睡眩冒忍尿不便膝冷成痺也宜茯苓湯東垣云身體沈重走注疼痛濕熱相搏而風熱鬱不得伸附著於有形也宜蒼术黄栢之類行痺治劑即走注疼痛仲景桂枝芍藥知母湯治諸肢節疼痛身體尫羸脚腫如脫頭眩短氣兀兀欲吐痛風神效桂枝知母防風各四兩芍藥三兩甘草麻黄附子炮各二兩生薑白术各五兩水七升煮取二升温服一日三服烏頭湯厯節風不可屈伸疼痛麻黄芍藥黄茋各三兩甘草炙川烏五枚㕮咀以蜜二升煎取一升即去烏頭水三升煎一升去渣納蜜再煎七合不時盡服之河間防風湯治行痺走注無定痛風神效防風當歸赤茯苓杏仁去皮尖炒各一錢甘草桂各五分黄芩秦芁葛根各二分麻黄去節五分水酒各二盞棗三枚薑五片煎一盞去渣温服本事方薏苡仁散治濕傷腎腎不能生肝肝自生風遂成風濕流注四肢筋骨或入左肩顒肌肉疼痛漸入左指薏苡一兩當歸芎藭乾薑甘草官桂川烏防風白术茵芋即山藥麻黄獨活各五錢右末每服一錢空心臨臥酒調下一日三服麝香丸治白虎歴節風疼痛逰走無定狀如蟲嚙晝静夜劇及一切足疼痛川烏大者三箇生用全蝎二十一箇生用黒豆二十一箇生用地龍五錢右入麝香半字同研匀糯米糊為丸菉豆大每服七丸甚者十丸夜臥令膈空温酒下㣲出冷汗一身便瘥予得此方凡是歴節及不測痰痛一二服便瘥在歙州日有一貴家婦人遍身走注疼痛至夜則發如蟲嚙其肌多作鬼邪治予曰此正歴節風病也三服愈丹溪龍虎丹治走注疼痛或麻木不遂半身疼痛蒼术草烏白芷各一兩右末水拌待發熱過再入乳香二錢當歸牛膝各半兩酒糊為丸彈子大酒化下無擇附子八物湯治歴節風四肢疼痛如鎚鍛不可忍附子炮去皮臍乾薑炮芍藥茯苓半夏桂心各三兩白术四兩人參三兩每服五六錢水煎加味二妙散痛風走注疼痛黄栢酒炒蒼术酒炒各二錢水煎調酒洗葳靈仙末羚羊角􅁅臣蒼术佐白芥子使生薑一片入藥末一錢擂碎以前藥再温服東垣和血散痛湯治兩手十指一指疼了一指疼疼後又腫骨頭裏痛膝痛左膝痛了右膝痛發時多則五日少則三日晝輕夜重痛時覺熱行則痛輕腫却重註云先血後氣乃先痛後腫形傷氣也羌活升麻麻黄去節各一錢半桃仁十箇柴胡防風黄栢知母酒炒各一錢黄連酒炒防已各六分猪苓獨活各五分當歸一分甘草炙二分紅花一分分二服水煎食前熱服羅太無治真定府張大素好嗜酒五月間病手指節腫痛屈伸不利膝臏亦然心下痞滿身體沈重不欲飲食食即欲吐面色痿黄精神減少至六月間求予治之診其脈沉而緩緩者脾也内經云諸濕腫滿皆屬脾土仲景云濕流闗節肢體煩痛此之謂也宜以大羌活湯主之羌活升麻各一錢獨活七分蒼术防風甘草葳靈仙茯苓當歸澤瀉各五分分二帖水煎食前一服食後一服忌酒麪生冷硬物牛蒡子湯治風熱成歴節手指赤腫麻木甚則攻肩背兩膝遇暑熱或大便閉牛蒡子新豆䜴炒羌活各三兩生地二兩半黄茋一兩半為末湯調二錢空心食前日三服此病胸膈生痰久則赤腫附著肢節久久不退遂成厲風此孫真人預戒也宜早治之河間大荳孽散治周痺走注五臟留滯胃中結聚益氣出毒潤澤皮毛補腎大豆孽一升炒香熟為末每服五分温酒調下空心服加至一錢日三服本草云大荳消淤血破婦人惡血治熱痺筋攣膝痛古人多用酒沃豆孽取汗蓋表藥也犀角湯治熱毒流入四肢歴節腫痛犀角二兩羚羊角一兩黄芩梔子射干大黄升麻各四兩豉一升毎七八錢水二鍾煎服張子和治一稅官風寒濕痺腰脚沈重浮腫夜則痛甚兩足惡寒經五六月間猶綿􅅶靴足膝皮膚少有跣露則冷氣襲之流入經絡其病轉劇走注上下往來無定其痛極處便攣急而腫起肉色不變腠理如蟲行每遇風冷病必轉增食減肌體瘦之起須人扶所服者烏附薑桂種種燥熱燔針著灸莫知其數前後三年不愈一日子脈之其兩手皆沉滑有力先以導水丸通經散各一服是夜㵼三十餘行痛減半漸服赤茯苓湯川芎湯防風湯此三方在宣明論中治痺方是也日三服煎七八錢漐漐然汗出余欲作玲瓏竈法薫蒸血熱必增極諸汗法古方中多有之惟以吐法者世罕知之丹溪控涎散治身及脇走痛痰挾死血加桃仁泥丸治走注疼痛葳靈仙梔子炒蒼术當歸各一錢川芎七分肉桂一分桃仁七箇甘草五分生薑五片水二盞煎半乾入童便半盞竹瀝半盞熱服忌肉雞麪定痛方治一切風濕痺痛乳香沒藥地龍木鼈子肉金星石五靈脂等分蜜丸彈子大毎一丸臨臥酒下升麻湯治熱痺肌肉熱極體上如䑕走唇口反縱皮毛黑兼治諸風升麻三兩茯神人參防風犀角鎊羚羊角羌活各一兩官桂五錢每服五六錢生薑一塊搗碎竹瀝少許同煎至一盞温服八珍丸治痛風走注脚氣頭風乳香没藥代赭石穿山甲生川各三錢羌活草烏生用各五錢全蝎二十一箇炒川烏生用不去皮尖一兩右末醋糊丸梧子大每服十一丸四妙散治痛風走注葳靈仙酒浸五錢白芥子一錢蒼耳子一錢五分又云是蒼木羊角灰三錢右末毎服一錢薑一大片搗汁入湯調服二妙散同調尤妙濟生羌活湯治白虎歴節風毒攻注骨節疼痛發作不定羌活二兩附子炮去皮臍秦芁桂心甘草炙木香牛膝酒浸桃仁骨碎補川芎當歸防風各一兩薑五片毎服五六錢水煎痛痺丹溪編為痛風門今改之以復葯從經㫖也丹溪痛風論曰痛風者四肢骨節走痛也他方謂之白虎歴節風夫氣行脈外血行脈内晝行陽二十五度夜行陰二十五度此平人之造化也得寒則行遲而不及得熱則行速而太過内傷於七情外傷於六氣則氣之運或遲或速而疾作矣彼痛風者大率因血受熱已自沸騰或再涉冷受濕取凉或坐臥當風熱血得寒汚濁凝澁所以作痛夜痛甚者行於陰也治當以辛熱之劑流散寒濕開發腠理則血行氣和而愈然亦有數種治法不能無少異也因濕痰濁血流注為病以其在下焦道路逺非烏附氣壯者不能行故用為引經若以為主治非惟無益而有殺人之毒此病必行氣流濕舒風導滯血㭪新血降陽升陰治有先後須明腫與不腫可也不可食肉肉屬火大能動火素有火盛者小水不能制若食肉厚味下有遺溺不已上有痞悶之甚雖魚麪醬醋酒皆斷之先以二陳湯加酒浸白芍藥少佐以黄連降心火看作何應而為之區處生生子曰按丹溪不以痺分門而以痛風分門謂血先受熱而後受冷濕乃所以為痛夜痛甚行於陰也及戒人不可徒以烏附為主斯言不惟補前人之餘藴而猶有深意存焉者實懲時俗與脚氣痿証混治之悞而另立痿門脚氣門分治之而又另分麻木為一門者此尤有見也麻木固亦有濕有痰所致者而氣血不足居多分而治之良有特識設一槩而作風寒濕治則虚虚之禍無有窮已不獨麻木為然而行痛著三痺其中未能無虚虚者或久作風寒濕治用疎風剛燥之劑太過而氣血為之暗損或氣血先虚而後受邪經曰邪之所凑其氣必虚此皆不可以不慎也陳無擇謂有支飲作痺此均有補於經文者誠以今之患痛痺者厯之毎毎如丹溪無擇所論治騐數條猶其精工故畢録之以為法大法用蒼术南星川芎白芷當歸黄芩在上者加羌活桂枝桔梗葳靈仙在下者加牛膝防已木通黄栢治痛風取薄桂者以其味淡獨此能横行手臂㑯南星蒼术等藥至痛處一方四物湯加桃仁牛膝陳皮茯苓甘草白芷龍膽草在上屬風在下屬濕加藥同俱倍之桂等分無桔梗氣虚者加蒼术龜板痰加南星血虚加芎歸佐以桃仁紅花因痰者二陳湯加酒炒黄芩羌活蒼术因濕者蒼白术之類佐以竹瀝及行氣藥或曰有濕鬰而周身走痛者或闗節間痛遇陰寒即發當作濕鬰治因於風者小續命湯極驗因血虚者芎歸之類佐以桃仁紅花肥人多是濕與痰飲流注經絡瘦人多是血虚與熱下部有濕腫痛防已龍膽草黄栢知母固是捷藥若肥人病此宜蒼术白术南星滑石茯苓之類瘦人宜當歸紅花桃仁牛膝㯽榔等同用上中下痛風黄栢酒炒蒼术米泔浸一宿南星各二兩神麴炒台芎各一兩龍膽草五分白芷防已桃仁各五錢葳靈仙酒洗桂枝羌活各三錢紅花酒洗一錢五分右為末麴糊丸食前下百丸葳靈仙治上體痛風虚弱勿用肢節腫痛痛屬火腫屬濕兼受風寒而發動於經絡之中濕熱流注肢節之間而無已也用麻黄去根節赤芍藥各一錢防風荆芥羌活獨活白芷蒼术葳靈仙片芩枳實桔梗乾葛川芎各五分甘草歸尾升麻各三分下焦加酒炒黄栢婦人加酒炒紅花腫多加㯽榔大腹皮澤㵼更加没藥一錢定痛尤妙一云脨濇數者有瘀血宜桃仁紅花芎歸及大黄㣲利之氣血兩虚有痰濁陰火痛風人參山藥海石南星各一兩白术熟地黄栢炒黑龜板酒炙各二兩乾薑炭瑣陽各五錢右為末酒糊丸二妙散治筋骨疼痛因濕熱者有氣者加氣藥血虚加血藥痛甚者加生薑汁熱辣服之黄栢炒蒼术米泔浸炒右為末沸湯入薑汁調服二物皆有雄壯之氣表實者加酒少許佐之若痰帶熱者先以舟車丸或導水丸神芎丸下伐後以趂痛散服之一法二妙為君加甘草羌活各二錢陳皮芍藥各一錢酒炒葳靈仙半錢服之佳趂痛散乳香没藥桃仁紅花當歸羌活地龍酒炒牛膝酒洗甘草五靈脂酒炒香附童便浸右為末每服二錢酒調或加酒炒芩栢潛行散黄栢酒浸為末入湯藥調服治酒濕痰痛風黄栢酒炒葳靈仙酒炒各五錢蒼术羌活甘草三錢陳皮芍藥各一錢右為末每服一錢或二錢沸湯入薑汁調服治氣實表實骨節痛方滑石飛六錢甘草一錢香附片芩各三錢右為末薑汁糊丸梧子大毎服五七十丸白湯吞下治食積肩腿痛龜板酒浸炙一兩酒栢葉香附五錢辣芥子凌霄花一錢半右末酒糊為丸桐子大煎四物湯加陳皮甘草湯下丹溪治一男子家貧多勞秋凉忽渾身發熱兩臂􅈩及腕兩足并跨皆疼痛如煅晝輕夜劇醫與風藥則増痛與血藥則不效惟待斃而已脈之兩手俱濇而數右甚於左飲食則如平時形瘦削蓋大痛而瘦非病也用蒼术酒黄栢各一錢生附子一片生甘草三分麻黄五分研桃仁五箇作一帖煎入薑汁些少令辣服至四帖後去附子加牛膝一錢至八帖後來告急云氣上喘促不得睡痛似㣲減意其血虚因服麻黄過劑陽虚被發動而上奔當與補血鎮墜及酸劑收之遂以四物湯加川芎芍藥人參二錢五味子十二粒與二帖服之喘随定是夜遂安三日脈之數減大半澁脈如舊問其痛則曰不減然呻吟之聲却無察其起居則疲弱無力病人却自謂不弱遂以四物湯加牛膝白术人參桃仁陳皮甘草㯽榔入薑三片煎服如此藥與五十帖而安一月後因負重擔復痛作飲食亦減再與此藥加黄茋三分又二十帖全愈一人年踰六十性急作勞患兩腿痛動作則痛甚視之曰此兼虚証當補血則病自安遂與四物加桃仁陳皮牛膝生甘草煎入薑研潛行散熱飲三四十帖而安何縣長年四十餘形瘦性急因作勞背痛臂疼骨節疼足心發熱可與四物湯帶熱下大補丸保和丸共六十粒食前服一婦人脚疼怕冷夜劇日輕生地白芍歸尾各五錢黄栢炒黄芩白术右分四帖水煎帶熱服鮑子年二十餘因患血痢用澁藥取效後患痛風喊叫撼隣里予視之曰此惡血入經絡證血受濕熱久為凝濁所下未盡留滯隧道所以作痛經久不治恐成枯細遂與四物湯桃仁紅花牛膝黄芩陳皮甘草煎生薑汁研潛行散入少酒飲之數十帖又與刺委中出黒血近三合而安朱閫内年三十味厚性急患痛風攣縮數月醫不應予視之曰此挾痰與氣症當和血疎痰導氣病自安遂以潛行散入生甘草牛膝枳殻通草陳皮桃仁薑汁煎飲半年而安陸郎左腿义骨舊痛小便赤澁此積憂痰涎所為白术枳殻赤芍一錢條芩連翹通草甘草稍三分右剉水煎服一婦脚义骨痛蒼术白术陳皮芍藥三分木通二錢甘草五分分二服送大補丸五十丸右丹溪治痛風法主於血熱血虚血汚或挾痰皆不離四物潛行牛膝甘草桃仁陳皮蒼术薑汁而随症加減發前人之餘藴醫世俗之所不能醫其有功於後人也大矣凡痛在胃之脈絡者宜解食毒許學士醫檢正患鼻額間痛或麻痺不仁如是數年忽一日連口唇頰車髮際皆痛不開口言語飲食皆妨在額與頰上常如糊手觸之則痛予作足陽明經絡受風毒𫝊入經絡血凝滯而不行故有此症或者以排風小續命透髄丹之類與之皆不效製此犀角升麻湯贈之數日愈犀角十而一錢升麻防風羌活各三兩川芎白附子白芷黄芩各五錢甘草一分右用四大錢水煎服食後臨臥各一服一日共服四次夫足陽明胃也經云腸胃為市又云陽明多血多氣胃之中腥羶五味無所不納如市㕓無所不有也以其腐熟飲食之毒聚於胃此方以犀角為主解飲食之毒也陽明經絡環唇挾舌起於鼻合額中循頰車上耳前過客主人循髮際至額顱今所患皆一經絡也故以升麻佐之餘藥皆滌降風熱升麻黄芩專入胃經稍通者自能曉海藏四物蒼术各半湯治肢腫不能舉動四物湯蒼术各半兩各煎服效與活血丹相表裏活血丹治遍身骨節疼痛如神與蒼术四物各半湯相表裏熟地黄三兩當歸白术白芍續斷人參各一兩右末酒糊丸如桐子大東垣蒼术復煎散治寒濕相合腦户痛惡寒項脊强肩背胛卯痛膝臏痛無力行步能食身沈重其脈沈緩洪上急蒼术四兩水二碗煎至二大盞去漁入下藥羌活一錢升麻柴胡藁本澤㵼白术各五分黄栢三分紅花一分右用蒼术二盞煎至一大盞空心温服㣲汗為效忌酒麪緩筋湯治目如火腫痛兩足及伏菟骨筋痛膝少力身重腰痛夜惡寒痰𠻳項頸筋骨背急痛目多眵淚食不下羌活獨活各二錢藁本麻黄草􅅳黄栢黄芩歸身生地柴胡各三分生甘草二分升麻三分炙甘草熟地黄各二分蘇木一分蒼术五分水二鍾煎一鍾熱服羅太無活血應痛丸治風濕客於腎經血脈凝滯腰背腫痛不能轉側皮膚不仁遍身麻木上攻頭目虚腫耳目常鳴下注膝重痛少力行履艱難項背拘急不得舒暢常服和血脈壯筋骨使氣脈宣通金毛狗脊去毛六兩蒼术米泔浸十兩香附炒十二兩陳皮九兩没藥一兩二錢草烏炮二兩五錢葳靈仙三兩右末酒糊為丸桐子大毎服十五丸不拘時温酒或熱湯送下忌食桃李雀鴿諸血物烏靈丸久患風寒痛風及麻木行步艱難五靈脂二兩川烏一兩炮去皮臍右末酒糊為丸桐子大毎服十丸加至五十丸空心温酒下忌冷物史丞相遇仙方諸般痛風手足艱難筋骨疼痛口眼喎斜言語蹇澁附子炮去皮臍川烏製同當歸川芎肉蓯蓉酒浸焙杜仲薑汁炒羌活黄茋人參白术白蒺藜牛膝酒浸防風天麻白茯苓狗脊炒去毛萆薢續斷獨活肉桂赤芍藥各一兩虎脛骨酥炙二兩五錢右以生絹袋盛之用無灰酒浸宻封瓶口春三日夏二日秋七日冬十日取出晒焙乾為末酒糊丸桐子大用浸藥酒一盞空心送下五十丸忌生冷油膩荳腐麪食發風物五加皮酒治風濕遍身疼痛俗名痛風或腫或癱或脚氣不能履動者五加皮不拘多少入白麪内同釀白酒飲之效丹溪治環跳痛不已防生附骨疽方以蒼术佐黄栢之辛行以青皮冬加桂枝夏加黄芩體虚加杜仲牛膝以甘草為使大料煎入酒深者恐术栢桂枝十數帖發不動以少黄連一二帖又不動者恐毒將成撅地成坑以火煅紅沃以小便赤體坐其上以被席圍包下體使熱蒸腠理開血氣暢而愈仲景治婦人六十二種風及腹中血氣刺痛以紅藍花酒主之紅花一味以酒一大碗煎減半頓服一半頃之再服虎骨丸治經絡凝滯骨節疼痛筋脈攣急遇陰寒愈痛乳香没藥各另研赤芍藥熟地當歸虎脛骨酥炙黄血竭五錢右末用木𤓰一枚切破去核入乳香末在内以麻線􅅶定勿令透氣好酒六升煮酒盡取木𤓰去皮研如泥更入熟蜜少許杵和為丸桐子大每服五十丸看病上下服麒麟散治寒濕𫝊於經絡疼痛不可忍血竭乳香没藥白芍當歸各六錢水蛭杵碎炒令烟盡麝香各三錢虎脛骨酥炙黄五錢右為末和匀每服二三錢食前温酒調下統㫖云痛痺五積散佳四肢攣痛闗節浮腫殊效治白虎厯節風及腫痛者以釅醋五升熱􅋩三四沸切葱白二三升煮一沸濾出布帛包裏患處熨之以瘥為度嚴氏蠲痺湯治身體煩疼四肢項背拘急或疼或痛重舉動艱難手足冷痺腰腿沈重筋脈無力當歸芍藥黄茋羌活片子薑黄各一兩五錢甘草炙五錢每服六七錢薑棗煎服獨活寄生湯治肝腎虚弱感風濕致痺兩脛緩縱痺弱不仁方出脚氣門河間茯苓湯寒氣勝者為痛痺宜通氣温經尤治四肢疼痛拘倦浮腫赤茯苓桑白皮各二兩防風官桂川芎芍藥麻黄去節各一兩半毎服六七錢棗一枚水煎服繼以薑粥投之汗出愈脚跟痛有血熱有痰血熱者四物加黄栢知母牛膝之類痰用二陳加南星黄栢防已肩背痛附臂痛肩背痛不可囬顧者此太陽氣鬱而不行或脊痛項强腰似折項似拔者此足太陽經不通二者俱宜通氣防風湯有因濕熱肩背沉重而痛者當歸拈痛湯有因汗出小便數而欠者風熱乗脾脾氣鬱而肩背痛也當㵼風熱則愈宜升麻柴胡湯有痰飲流注肩背作痛宜星香散或導痰湯有腎氣不循故道氣逆挾背而上致肩背作痛宜和氣飲加鹽炒小茴香少許有勞力或看書著棋久坐而致脊背疼者補中益氣湯或八物湯加黄茋背者胸之府肺主氣居胸中肺氣滯則血脈泣肺氣虚則不能運行陽道肺中有痰流注肩背皆能作脹疼肩背痛乃肺分野之病經云西風生於秋病在肺俞在肩背故秋氣者病在肩背大過為病在外則令人逆氣背痛愠愠然也臂痛臂為風寒濕所搏或痰流氣滯或因提挈重物皆致臂痛有腫者有不腫者因於風寒宜五積散加羌活因於濕蠲痺湯多加蒼术因於痰導痰湯因於氣烏藥順氣散因提重傷筋用刼勞散或和氣飲加薑黄蓋薑黄能入臂故也有人坐臥為風濕所襲但遇外有寒邪所侵即痛者宜羌活散有飲酒太過濕痰流注者用二陳加南星蒼术桔梗枳殻桂枝酒芩有血不榮於筋者用四物加薑黄秦芁羌活有氣血凝滯經絡不行所致者舒筋湯控涎散治肩背臂痛如神方在行痺控涎丹加去油木鼈子一兩桂五錢治臂痛每服二十丸加至三十丸妙丹溪治臂痛南星半夏白术香附酒芩各一錢蒼术二錢陳皮茯苓各五分葳靈仙三分甘草少許花麴散治臂痛紅花炒神麴炒為末酒調下薑黄散治臂痛非風非痰薑黄甘草羌活各一兩白术二兩腰已下痛者加海桐皮當歸芍藥東垣治臂痛分六道經絡看痛在何經絡之間以行本經藥通其氣血血氣通則愈矣若表上諸痛若便擬下之則不可當詳細辨之右東垣云認經絡用藥蓋以兩手伸直其臂貼身垂下大指居前小指居後而定之則其臂臑之前廉痛者屬陽明經以升麻白芷乾葛行之後廉痛者屬太陽經以藁本羌活行之外廉痛者屬少陽以柴胡行之内廉痛者屬厥陰以柴胡青皮行之内前廉痛者屬太陰以升麻白芷葱白行之内後廉痛者屬少陰以細辛獨活行之并用灸法視其何經而取之也通氣防風湯肩背痛不可囬顧者此太陽氣鬱而不行以風藥散之脊痛項强腰似折項似拔者此足大陽經不通也羌活獨活各一錢藁本防風甘草各五分川芎蔓荆子各三分水煎服當歸拈痛湯濕熱為病肢節煩痛肩背沉重胷膈不利及遍身疼痛下注於足脛痛腫不可忍方在脚氣門加減當歸飲子治肩背忽痛當歸防風柴胡生地大黄各一兩半芍藥黄芩人參各一兩黄連五錢滑石六兩甘草一兩三錢每服六七錢水煎人參益肺散治肩背痛汗出小便數而少者風熱乗肺肺氣鬱甚也當㵼風熱則愈升麻柴胡黄茋各一錢防風羌活人參甘草陳皮各五分藁本三分青皮黄芩白豆􅅳各三分水煎服如面色白脫色氣短者勿服舒筋湯臂痛不能舉有人常左臂痛或以為飲以為風以為濕諸藥悉試繼以針艾俱不效得此方服之而愈蓋是氣血凝滯經絡不行所致非風非飲非濕腰以下食前服腰以上食後服又名通氣飲子片子薑黄四兩如無用嫩莪术代也甘草炙羌活各一兩赤芍藥海桐皮去外皮白术當歸各二兩毎服五錢薑三片水煎臨服入磨沈香少許治背痛薑黄四兩甘草炙羌活白术各一兩每服一兩水煎防風飲子治項筋急痛諸藥不效者黄茋附子甘草蒼术陳皮羌活防風桔梗等分每服五錢薑一片水煎丹溪治一男子忽患背胛縫有一線痛起上肩跨至胷前側脇而止其痛晝夜不歇不可忍脈弦而數重取豁大左大於右夫背胛小腸經也此必思慮傷心心臟未病而腑小腸先病故從背胛起及慮不能决又歸之於膽故痛至胸脇而止乃小腸火乗膽木子來乗母是為實邪詢之果因謀事不遂所致故用人參四分木通二分煎湯吞龍膽丸數服而愈著痺治劑麻木同經謂濕氣勝者為著痺河間曰著者留著其處而不去或四肢麻木拘攣也經又曰其不痛不仁者病久入深營衞之行澁經絡時疎故不痛皮膚不榮故為不仁夫所謂不仁者或周身或四肢淫淫然麻木不知痛痒如繩札縳初解之狀古方名為麻痺者是也靈樞曰衛氣不行則為麻木丹溪曰麻是氣虚木是濕痰死血然則曰麻曰木者以不仁中分而為二也雖然亦有氣血俱虚但麻而不木者亦有虚而感濕麻木兼作者又有因虚而感風寒濕三氣乗之故周身掣痛麻木併作者古方謂之周痺治法宜先汗而後補也當以類而推治丹溪云十指麻木乃胃中有濕痰死血宜二陳湯加蒼术白术桃仁紅花附子脈法脈沈而濡屬氣虚闗前得之麻在上體闗後得之麻在下體也脈浮而緩者屬濕為麻痺脈𦂳而緩屬寒為痛痺脈濇而芤屬死血為木不知痛痒東垣神效黄茋湯治渾身麻木不仁或左或右半身麻木或面或頭或手臂或脚腿麻木不仁並皆治之又治兩目𦂳急縮小羞明畏日隱澁難開或視物無力睛痛昏花手不得近或目少睛光或目熱如火服五六帖神效黄茋蔓荆子各二兩人參甘草炙白芍藥各一兩陳皮五錢每服五六錢如小便淋澁加澤㵼五分如有大熱症加黄栢三錢酒炒四次如麻木不仁雖有熱不加黄栢再加黄茋一兩如眼縮小去芍藥忌酒醋濕麪葱韮蒜大料等物及淡滲生冷硬物麻木重甚者加芍藥一兩木通一兩芍藥補氣湯治皮膚間有麻木此肺氣不行也黄茋橘紅甘草炙各一兩白芍藥一兩半澤㵼五錢毎服一兩水煎如肌肉麻必待㵼營氣而愈如濕熱相合四肢沉痛當㵼濕熱此㓗古立效神方東垣治杜彦逵患左手右腿麻木大指次指亦嘗麻木至腕已三四年矣諸醫不效脈之曰麻者氣之虚也真氣弱不能流通填塞經絡四肢俱虚故生麻木不仁與一藥決三日效遂製人參益氣湯服二日便覺手心熱手指中間如氣滿脹至三日後又覺兩手指中間皮肉如不敢觸者似痒痛滿脹之意知其氣已遍至乃於兩手指甲傍各以三稜針一刺之㣲見血如黍粘許則痺自息矣又為處第二第三方服之全安人參益氣湯治五六月間兩手麻木四肢倦怠惰嗜臥乃濕熱傷元氣也黄茋八錢人參甘草生各五錢芍藥升麻各三錢柴胡二錢半五味子一百二十粒甘草炙二錢每六七錢水煎空心服服後令少睡於麻痺處按摩屈伸少時午飯前一服日二第二次藥煎服如前黄茋八錢紅花五分陳皮一錢澤㵼一錢第三次服藥黄茋六錢黄栢一錢三分橘紅三錢白芍藥五錢升麻澤㵼各二錢黄芩八錢五味子百粒甘草炙一分生四分分四帖煎服如前秋凉去五味子冬月去黄芩效除濕補氣湯治左腿麻木沈重黄茋八錢甘草梢六錢升麻梢柴胡當歸澤㵼各二錢五味子百二十粒紅花二錢半青皮四錢陳皮一錢分四服水煎熱服治趙節使年七旬病體熱麻股膝無力飲食有汗妄喜笑善飢痰涎不利舌强難言聲啞不鳴身重如山診得左脈洪大有力是邪客於經絡兩臂外有數瘢遂問其故對以燃香所致予曰君之病皆此也夫人之十二經灌溉周身終而復始蓋手之三陽從手至表上行至頭加之以火邪并於陽勢甚熾焉故邪熱毒行散於周身而熱麻經云胃中有熱則蟲動蟲動則胃緩胃緩則廉泉開故涎下熱傷元氣而沈重無力飲食入胃慓悍之氣不循常度故多汗心火盛則妄喜笑脾胃熱則消穀善饑肺金衰則聲啞不鳴仲景云㣲數之脈慎不可灸焦枯傷筋血難復也君奉飬以膏粱之味無故加以火毒熱傷於經絡而為此病明矣乃製清陽補氣湯服之不旬日而愈清陽補氣湯蒼术四錢藁本知母酒浸當歸甘草生各二錢柴胡黄栢酒浸黄茋各三錢升麻六錢陳皮二錢半五味子一錢半每七錢水煎空心服治李正夫人病診得六脈中俱弦洪緩相合按之無力弦在其上是風熱下陷入陰中陽道不行其症閉目則渾身麻木晝減夜甚覺而目開則麻木漸退久則絶止常開其目此病不作懼其麻木不敢合眼故不得眠身體皆重時有痰𠻳覺胷中常是有痰而不利時煩躁短促而喘肌膚充盛飲食大小便如常惟畏麻木不敢合眼為最苦觀其色脈形病相應而不逆内經曰陽盛瞑目而動輕陰病閉目而静重又云諸脈皆屬於目靈樞曰開目則陽道行陽氣遍布周身合目則陽道閉而不行如晝夜之分知其陽衰而陰旺也且麻木為風雖三尺之童皆以為然細校之則非如久坐而起亦有麻木假如繩縳繫之人釋之覺麻木作而不敢動久則自己以此驗之非有風邪乃氣不行也不須治風當補其肺中之氣則麻木自去矣知其經絡隂火乗其陽分火動於中為麻木也當兼去陰火則愈矣時痰𠻳者秋凉在外濕在上作也當實其皮毛以温劑身重脈緩者濕氣伏匿而作也時見躁作當升陽助氣益血㣲㵼陰火去濕通行經脈調其陰陽則非五臟六腑之本有邪也補氣升陽和中湯主之補氣升陽和中湯黄茋五錢人參白芍各三錢甘草炙佛耳草各四錢陳皮白术歸身各二錢甘草生去腎熱黄栢酒浸除濕㵼火白茯苓除濕導火澤㵼同上升麻行陽明經柴胡草豆􅅳益陽退寒各一錢每服三五錢水煎稍熱服八帖愈温經除濕湯李夫人冬寒霜時病作四肢無力乃痿厥濕熱在下焦也醋心者是濁氣不降欲滿也合眼麻木者陽道不行也開眼不麻木者目開助陽道故陰寒之氣少退也頭旋眩運者風氣下陷於血分不伸越而作也羌活七分獨活當歸麻黄去節黄栢各三分白芍三錢柴胡黄連黄茋草豆􅅳神麴木香各二分陳皮蒼术各二錢人參甘草炙白术猪苓澤㵼各一錢升麻五分分二服水煎熱服治肢節沈重疼痛無力之聖藥也濕氣風症不退眩運麻木不已除風濕羌活湯主之羌活防風各一兩柴胡獨活甘草炙各五分藁本陳皮黄栢川芎各三分蒼术黄茋各一錢猪苓澤㵼各二分茯苓二錢黄連一分升麻每服五六錢水煎熱服量虚實用如不盡症候依加減法用之濟世茯苓湯治停飲支飲手足麻痺多睡眩冒赤茯苓半夏陳皮各一兩枳實炒桔梗甘草炙各半兩毎服五六錢薑三片水煎宣明茯苓川芎湯治著痺濕地水氣甚重著而不去多汗而濡者著痺留注不去四肢麻木拘攣浮腫赤茯苓防風川芎麻黄芍藥桑白皮甘草炙官桂當歸各五分棗三枚水煎服如欲出汗以粥投之五痺湯風寒濕之氣客留肌體手足緩弱麻頑不仁片子薑黄一兩羌活白术防己各二兩甘草炙五錢每五六錢薑三片水煎服續斷丸本事方治風濕流注四肢浮腫肌肉麻痺川續斷當歸萆薢天麻防風大附子各一兩川芎七錢半乳香没藥各五分煉蜜為丸梧子大每四十丸温酒米飲任下又增減續斷丸治寒濕之氣痺滯闗節麻木疼痛人參防風鹿角膠白术炒各七兩黄茋續斷苡仁山芋牡丹皮麥門冬地黄桂心山茱萸白茯苓石斛各二兩蜜丸桐子大每服六七十丸空心酒下三痺湯治血氣澁滯手足拘攣風痺等疾川續斷杜仲薑汁炒防風桂心人參當歸白茯苓白芍藥甘草黄茋牛膝細辛各一兩川獨活川芎秦芁生地各五錢每服六七錢薑三片棗一枚水煎濟生黄茋酒治風濕癢痛筋脈攣急身體頑麻黄茋當歸白术虎骨萆薢雲母粉木香防風官桂天麻石斛茵芋葉仙靈脾川續斷白芍藥甘草炙各一兩用絹袋盛以好酒一斗浸之春五夏三秋七冬十日每服一盞温飲之常令酒氣相續為佳宣明防風天麻散治風麻痺走注肢節疼痛中風偏枯或暴瘖難語内外風熱壅塞天麻甘草羌活防風白芷川芎歸尾草烏頭白附子荆芥穗各五錢滑石二兩右末熱酒化蜜少許調半錢加至一錢覺藥力運行㣲麻為度煉蜜丸彈子大熱酒化下半丸或一丸細嚼白湯下衍義方治風冷氣血閉手足體疼痛冷麻五靈脂二兩没藥一兩川烏頭一兩半死去皮乳香五錢右末水丸彈子大每一丸生薑酒磨服河間前胡散治榮虚衞實肌肉不仁致令㿏重名曰肉苛前胡白芷細辛官桂白术川芎各三兩附子炮呉茱萸當歸川椒去子并閉口者生用各二兩以茶酒三升拌匀同窨一宿以煉成猪脂膏五斤入藥煎候白芷黄紫色濾其渣成膏病在處摩之凢癥瘕瘡痍皆治併去諸風瘡痒痛傷折墜損凢摩内皆可用之呉茱萸散呉茱萸肉豆䓻麫裹煨乾薑甘草炙神麴炒砂仁各一兩白术厚朴薑製陳皮各二錢為末每服二錢空心米飲調下腎瀝湯麥門冬五加皮犀角各一錢半杜仲桔梗赤芍藥木通各一錢桑螵蛸一箇水二鍾入羊腎少許煎至八分食前服加味五痺湯治五臟痺症人參茯苓當歸白芍川芎各一錢肝心腎痺倍之五味子十五粒細辛七分白术一錢脾痺倍之甘草五分薑一片水煎食逺服肝痺加酸棗仁柴胡心痺加逺志茯神麥冬犀角脾痺加厚朴枳實砂仁神麴肺痺加半夏紫苑杏仁麻黄腎痺加獨活官桂杜仲牛膝黄茋萆薢活絡丹治手足攣拳筋脈不舒皆風邪濕毒留滯經絡渾身走注疼痛南星川芎草鳥地龍各六兩乳香沒藥各二兩為末酒糊丸桐子大每服五七十丸空心酒下清凉潤燥湯治風熱血燥麻木當歸生地各一錢半黄連黄芩芍藥川芎各一錢天麻防風羌活荆芥各八分細辛六分甘草五分水煎服麻甚者加川烏炮過三分以行經絡止麻清痰飲治口舌麻木延及口角頭面者黄連一錢二分貝母𤓰蔞仁黄芩茯苓桔梗枳殻橘紅南星用白礬皂角生薑同煮透各一錢天麻甘草細辛各五分血虚加當歸一錢水煎入薑汁一匙竹瀝三四匙食逺服經驗三妙丸治濕熱下流兩脚麻木如火熱蒼术六兩黄栢四兩酒炒川牛膝酒浸二兩麪糊丸桐子大毎服五七十丸空心淡鹽湯下仲景治血痺桂枝五物湯血痺陰陽俱㣲外証身體不仁如風痺狀黄茋桂枝芍藥各三兩生薑六兩大棗十二枚水六升煮取二升温服七合日三服木香丸腸痺腹疞痛時發飡泄氣不消化小便秘澁木香白术官桂蕪荑良薑訶子皮各一兩附子炮厚朴肉􅅳各二兩乾薑三分甘草五錢半為末麴麪糊丸桐子大每服二十丸空心薑湯吞下鶴膝風羅太無蛜􅖉丸蛜􅖉用頭尾全者一條桃仁生白附子阿魏桂心安息桃仁同研白芷各一兩乳香沒藥已上童便酒浸炒熟各三分北漏蘆當歸白芍牛膝羌活地骨皮葳靈仙各一兩蜜為丸彈子大空心酒化下一丸昔人有病風痓手足指節皆如桃李痛不可忍服之悉愈宣明方安息用胡龜穰仝研丹溪治一人年七十患膝腫痛此血虚而挾濕熱也生地當歸頭白芍蒼术黄栢炒各三錢川芎桂二錢木通一錢半分四帖水煎熱服又一人年近三十厚味多怒秋間髀樞左右一㸃發痛延及膝晝静夜劇痛劇惡寒口或渴或不渴或痞或不痞醫多用風藥兼用補血至次年春其膝漸腫痛愈甚食愈減形瘦至春末膝腫大不可屈伸其脈左弦大頗實寸濇甚大率皆數知其小便必數而短乃作飲食痰積在太陽陽明治之炒栢一兩生甘草梢犀角屑蒼术鹽炒各三錢川芎二錢陳皮牛膝木通芍藥各五錢遇暄熱加條芩三錢為細末每三錢與生薑汁同研多少以水盪起煎令沸帶熱食前飲之一日夜四次至半月後數脈漸減痛漸輕去犀角加牛膝龜板半兩當歸半兩如前服又半月腫漸減食漸進不惡寒惟脚膝痠軟未能久立久行去蒼术黄芩時當夏熱加炒黄栢至一兩半依本方内加牛膝春夏用莖葉冬用根杵取汁用之效尤速須斷酒肉濕麪胡椒當仲夏加生地半兩冬加茱萸桂枝接骨丹治諸風及鶴膝風防風牛膝當歸虎骨酥炙各一兩枸杞子二兩半羌活獨活龜板秦芁萆薢松節二蠶沙各一兩茄根二兩蒼术四兩酒糊丸空心服脚筋急痛淡酒煮木𤓰令爛作粥様用裹痛處冷則易一宿三五度便瘥攣經云肝氣熱則筋膜乾筋膜乾則筋急而攣又曰濕熱不攘大筋緛短小筋弛長緛短為拘弛為痿丹溪曰大筋緛短者熱傷血也不能飬筋故為拘攣小筋弛長者濕傷筋不能束骨故為痿弱攣皆屬於肝肝主筋故也丹溪治王秀濕熱大作脚痛後手筋拘攣足乏力生地當歸川芎白术各二錢蒼术一錢半木通甘草炙三分煎湯下大補丸三十丸其大補丸炒煖用薏苡仁散治筋脈拘攣久風濕痺薏苡仁一斗搗散以水二升取末數匙作粥空腹食之衍義云筋急拘攣有兩等内經大筋受熱則縮而短故攣急不伸則可用薏苡仁若因寒筋急則不可用也有寒攣經曰寒多則筋攣骨痛本事云張徳操内子昔患筋攣脚不得伸屈逾年動則令抱持求醫於泗水楊吉老曰此筋病下三方一年而愈治筋極飬血地黄丸春夏服之熟地蔓荆各一分山茱萸五錢狗脊地膚子白术乾漆蠐螬炒天雄車前子各三錢萆薢山芋即山藥澤㵼牛膝各一兩為末煉蜜丸桐子大毎服七十丸酒下治筋痺肢節束痛羚羊湯秋服之羚羊角肉桂附子獨活各一兩三錢半白芍藥防風芎藭各一兩每服五七錢水煎薑三片一日三服治寒冷濕痺留於筋脈縮不能轉側烏頭湯冬用之大烏頭細辛川椒甘草秦芁附子官桂白芍各七分乾薑防風當歸白茯苓各一兩獨活一兩三錢半每服三錢棗二枚水煎空心服千金薏苡湯治筋攣不可屈伸苡仁白斂芍藥桂心乾薑酸棗仁甘草牛膝各一兩附子三枚醇酒二斗漬一宿㣲火煎三沸毎一升日三服扶杖起行不耐酒服五合活血通經湯董監軍臈雪初霽因事到真定忽覺風氣暴作六脈俱弦甚按之洪實有力其症手攣急大便閉澁面赤熱此風寒始加於身也四肢者脾也風寒傷之則攣痺乃風淫未疾而寒在外也内經云寒則筋攣正此謂也平素多酒實熱乗於腸胃之間内則手足陽明受邪外則足太陰脾經受風寒之邪用桂枝甘草以却其寒邪而緩其急搐用黄栢之苦寒以㵼實熱而潤燥急救腎水用升麻葛根以升陽氣行手足陽明之經不令遏絶更以桂枝辛熱入手陽明之經為引用潤燥復以芍藥甘草専補脾氣使不受風寒之邪而退木邪専益肺金也加人參以補元氣為之輔佐加當歸身去裏急而和血潤燥名之曰活血通經湯升麻葛根當歸人參甘草炙各一錢桂枝黄栢酒炒各二錢白芍藥五分水煎熱服令煖房中近火摩搓其手乃愈虚攣經所謂虚邪搏於筋則為筋攣又云脈弗榮則筋急仲景云血虚則筋急此皆血脈弗榮於筋而筋成攣故丹溪治攣用四物加減本事方治筋急極用飬血地黄丸蓋本乎此也丹溪治一村夫背傴僂而足攣已成廢人脈之兩手皆沉弦而濇遂以戴人煨腎散與之上吐下㵼過月餘久吐㵼交作如此凡三帖然後平復煨腎散甘遂末三錢獖猪腰子細批破鹽椒淹透摻藥末在内荷葉包裹火内燒熟温酒嚼下蒼耳湯治風濕痺四肢拘攣蒼耳子三兩搗末水一升半煎七合服木𤓰粥裹筋痛處佳方見鶴膝一身盡痛綱目云一身盡痛其病暴似傷寒屬濕痺並見傷寒太陽症門其留連難已者於此求之寒而一身痛者甘草附子湯熱而痛者當歸拈痛湯甘草附子湯治風濕相搏骨節煩疼掣痛不能屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身㣲腫者甘草白术各一兩桂枝二兩附子炮一枚分四帖水煎服活人書云身腫者加防風一兩悸氣小便不利者加白茯苓一兩半東垣當歸拈痛湯治濕熱相搏肩背沉重疼痛上熱胷膈不利及遍身疼痛方見脚氣門東垣麻黄桂枝升麻湯李夫人患渾身麻木睡覺則少減開目久則全已閉目則麻木復至此症用藥已全去又因家事不和心中煩惱遍身骨節疼身體沈重飲食減少腹中氣不轉運麻黄人參升麻黄茋各五分桂枝甘草炙白术茯苓澤㵼各三分陳皮半夏草豆􅅳厚朴黄栢附子各二分木香生薑各一分水煎熱服本事方治遍身皆痛如勞者若傷寒身體痛者不可服但少年虚損冷憊老人諸疾皆治之人參黄茋附子炮甘草木香羌活知母芍藥前胡川芎枳殻桔梗白术當歸茯苓半夏各五錢柴胡鼈甲醋炙各一兩酸棗仁桂心各三分杏仁炒五分毎服二錢薑三片烏梅三箇葱白三寸同煎空心服産後身痛薤白趂痛散産後氣弱血滯遍身疼痛身熱頭疼當歸牛膝桂心白术黄茋獨活生薑各五錢甘草薤白各三錢五分毎服五六錢水煎五積散加酒煎治感寒頭疼身痛方見傷寒與四物湯各半服之治一身痛甚穏加桃仁治腰痛逐敗血去風濕大全牛膝散産後遍身青腫疼痛及衆疾牛膝大麥芽為細末以新瓦壦子中填一層麥芽一層牛膝如此填滿用鹽泥固濟火煅赤放冷研末但是産後諸疾熱酒調下二錢金棗丹治一切風熱等症川烏生用去皮臍兩頭尖防風白芷獨活蔓荆子荆芥各四兩白术羌活細辛各五錢全蝎殭蠶天麻葳靈仙各二兩雄黄木香乳香各一兩蒼术八兩川芎五兩何首烏一兩八錢沒藥草烏各一兩半藁本二兩半當歸三兩右末糯米糊丸棗様大金箔為衣每服一錠傷風流涕好酒化下中風不語生薑湯下左癱右瘓好酒調下白虎厯節風遍身走痛生薑湯或好酒下破傷風昏倒在地牙闗𦂳急好酒調服仍磨敷患處雷頭風并乾癬麻痺温酒調服洗頭風酒服偏正頭風及夾腦風研末吹鼻中吐涎再用生薑汁調藥塗兩太陽穴仍用茶清調服風狗咬傷噙水洗浄敷之蜈蚣傷噙水洗過敷之蛇傷入白礬少許敷患處就以津唾調搽亦可蝎咬唾調搽痔漏口潄漿水洗過敷之多年惡瘡口不合者口潄鹽水洗過敷之徐收喘𠻳桑白皮湯調服紅絲魚眼褲脚腦疽發背疔瘡裡外㾾瘡用自己小便洗過井水調敷薄紙貼上再用裏外搽之丹瘤井花水調藥䳘毛掃二三次不發炙瘡噙水洗過貼上二三次起發方止赤水元珠卷十二
