body:
  text: 赤水元珠卷六明孫一奎撰吐酸門論吐酸屬熱内經曰諸嘔吐酸皆屬於熱又云少陽之勝嘔酸夫酸者肝木之味也内火勝制金不能平木木自甚故為酸也如飲食熱則易於酸矣是以肝熱則口酸或言為寒者但謂傷生冷硬物而喜噫醋吐酸故俗主於和脾胃豈知人之傷於寒也則為病熱葢寒傷皮毛則腠理閉宻陽氣怫鬱而為熱故傷寒熱在表以麻黄湯發散使腠理開通汗泄熱退而愈也凡内傷冷物者或積陰勝陽而為病寒或寒熱相搏而致腸胃陽氣怫鬱而為熱亦有内傷冷物而反病熱得汗泄身凉而愈也或微而止為中酸俗謂之醋心法宜温藥散之亦猶解表之義若久喜酸不已則不宜温之宜以寒藥下之後以凉劑調之結散熱去則氣和也所以中酸不宜食粘滑油膩者謂能令氣鬱不通暢也宜糲食菜蔬使氣通利則酸自不作矣論雜病吐酸與病機外邪不同發明云病機吐酸皆屬於熱此上焦受外來客邪也胃氣不受外邪故嘔仲景以生薑半夏治之以雜病論之嘔吐酸水者甚則酸水浸其心不任其苦其次則吐出酸水令上下牙酸澁不能相對以大辛熱藥療之必減吐酸是吐出酸水也酸味者収氣也西方肺金旺也寒水乃金之子子能令母實故用大鹹熱之劑瀉其子以辛熱為之佐而瀉肺之實以病機作熱攻之誤矣蓋雜病醋心濁氣不降欲為中滿寒藥豈能治之乎辯素問東垣論酸不同丹溪云或曰吐酸素問明以為熱東垣又言為寒何也予曰吐酸與吞酸不同吐酸是吐出酸水如醋平時津液隨上升之氣鬱積而成鬱積之久濕中生熱故從火化遂作酸味非熱而何其有鬱積之久不能自湧而出伏於肺胃之間咯不得上嚥不得下肌表得風寒則内熱愈鬱而酸味刺心肌表温暖腠理開發或得香熱湯丸津液得行亦可暫解非寒而何素問言熱者言其本也東垣言寒者言其末也但東垣不言外得風寒而作収氣立說欲瀉金之實又謂寒藥不可治酸而用安胃湯加減二陳湯俱犯丁香且無治鬱結濕熱之法為未合經意予常治吞酸用黄連茱萸各炒隨時令迭其佐使蒼朮茯苓為輔佐湯浸炊餅為小丸吞之仍教糲食蔬菜自養則病易安劉宗厚曰謹按吐酸一證以病機言之則屬於熱以臟腑論之則脾胃受病以内邪言之則痰飲宿食之所為故治法熱者寒之脾惡濕以苦燥之有痰飲者清之分利之有宿食者消之導之驅逐之局方不察斯故以噫醋吞酸醋心吐酸水之證並入於氣門中率用温熱之藥豈吐酸專主於寒而無他證也故此一門以叙河間東垣丹溪之論其病源治法無餘藴矣停飲門許學士云余苦有二疾一下血一膈中停飲下血有時而止停飲則無時始因年少時夜坐作文左向伏几案是以飲食多墜左邊半夜以後稍困乏必飲酒二三盞仍向左邊側睡壯盛時殊不覺病三五年後覺酒止從左邊下漉漉有聲脇痛飲食減十数日必嘔數升酸水暑月止是右體有汗漐漐常潤左邊痛處絶燥遍訪名醫及海上方服之少驗間或中病止得月餘復作其補如天雄附子􅈨石其利如牽牛甘遂大㦸備嘗之矣予揣度之已成癖囊如潦水之有科臼不盈不行必盈科而行也清者可行濁者依前停蓄葢下無路以出之也是以積之五七日必嘔而出稍寛數日復作脾土惡濕而水則流濕莫若燥脾以勝濕崇土以填科臼則疾當去矣於是悉屏諸藥止服蒼朮三月而除自此後不復發嘔胸膈寛飲啖如故暑月汗周體而身涼飲亦從中下前此飲漬其肝目亦多昏眩其後燈下能書細字皆蒼术之力也故名其方曰神朮丸其蒼朮一觔去皮切末用之白芝蔴半兩水二盞研濾取汁大棗十五枚煮爛去皮核研以蔴汁成稀膏和入搜臼杵熟丸如梧子大每日空心白湯吞五七十丸一日服二三次忌桃李雀鴿初服時膈間必微燥且以蒼朮製之覺燥甚再進山梔子散一服久之自不燥也予服半年以後止用燥烈味極辛者削去皮不浸極有力亦自然不燥山梔散用山梔一味乾之為末沸湯㸃服故知久坐不可伏向一邊時宜運動亦調息之法脉經云胃脉虚主胃中冷苦吞酸頭痛寸口脉遲上焦有寒心痛喉酸吐酸水宜服附子湯生薑湯茱萸丸關脉沈心下有冷氣痞滿吞酸據此亦有胃冷吞酸者張子和治張風村一田叟嘔酸水十餘年乃留飲証也醫皆以燥劑治之不效更以艾火燔針刺之中脘臍胻瘡未嘗合予以苦劑越之出其涎如膠者二三升談笑而愈噫腐噯酸或每晨吐酸水數口或膈間常如酸蜇皆飲食傷胃所致平胃散加神麴麥芽茯苓半夏口吐清水乃胃中濕熱所為宜平胃㪚加白术茯苓滑石半夏不宜純用凉藥亦有胃寒而然者理中湯主之食鬱有痰二陳加南星黄芩香附之類治酸必用吳茱萸者乃順其性而折之戴元禮云濕熱在胃口上飲食入胃被温熱鬱遏其食不得傳化故作酸也如糓肉在器則易酸也治寒酸温胃之劑東垣藿香安胃㪚治脾胃虚弱不進飲食嘔吐不待腐熟藿香丁香人參各二錢半陳皮五錢右為末每服二錢生薑湯下加減二陳湯治痰飲為患嘔吐頭眩心悸或因食生冷脾胃不和丁香一兩半夏陳皮各五兩茯苓三兩甘草兩半每服五六錢入生薑煎服三因麴朮丸治中脘宿食留飲酸蜇心痛口吐清水神麴炒三兩蒼朮米泔浸三宿洗淨晒乾炒一兩五錢陳皮一兩一方有砂仁一兩右為末生薑汁打神麴糊為丸薑湯下加味平胃散治吞酸食鬱所致平胃散加炒神麴麥芽薑棗煎服治吞酸因傷冷物所致治食後吐酸水同乾薑炒二兩吳茱萸炒二兩為末酒服方寸匕一日二服治噫酢咽方吳茱萸半斤生薑三兩人參二兩棗十二枚水六升煮二升分三次食前服治吐酸清水方蒼术陳壁土炒白朮茯苓滑石陳皮各等分水煎服聖惠方乾薑丸治酒癖停飲吐酸水乾薑葛根枳殻橘紅前胡各五錢白朮半夏麴各一兩吳茱萸甘草各二錢半右為末煉蜜丸桐子大每五十丸米飲下三生丸治中風痰涎眩瞑嘔吐酸水頭疼惡心半夏二兩南星白附子各一兩右並生為末滴水丸梧子大以生麪裹為衣陰乾每服十丸至二十丸生薑湯下治熱之劑丹溪方一方加炒山梔仁三錢吳茱萸去枝梗炒乾陳皮黄苓陳土炒各五錢黄連陳土炒一兩蒼朮七錢半一方有桔梗茯苓各一兩右末神麴糊丸菉豆大每服一錢半白湯下黄連清化丸黄連一兩吳茱萸一錢桃仁二十四枚陳皮五錢半夏一兩半右為末神麴糊丸菉豆大每服百丸薑湯下參茱丸治濕而帶氣者濕熱甚者用之為向導上可治吞酸下可治自痢六一㪚一料吳茱茰一兩製為末飯丸丹溪又云噫氣吞酸此係食鬱有熱火氣沖上黄芩為君南星半夏陳皮為佐熱加青黛解表之劑丹溪治一人因外感凉氣與宿食相搏心下酸戚嘔清水後有紅青皮枳殻紫蘇木通甘草各三錢黄芩桔梗各一錢半人參二錢麻黄五分加薑水煎服寛中攻下之劑透膈湯治脾胃不和中脘氣滯胸膈滿悶噎塞不通噫氣吞酸脇肋刺脹嘔逆痰涎飲食不下木香砂仁檳榔枳殻厚樸白荳仁半夏青皮陳皮甘草大黄朴硝各等分每服一兩生薑三片棗一枚煎至一盞熱服痰飲膠固稠粘者痰也清而稀薄者飲也痰飲為病所感不同有因氣脉鬱塞而得之者有因脾胃虚弱不能運行水穀而得之者有因痛飲飽食停滯胃中而得之者有因風寒暑濕之氣入脾相搏而成之者有因七情失節藏氣不行鬱而成之者所感不同病變甚多或為喘為欬為嘔為泄眩暈嘈煩悸忪隕穫寒熱疼痛腫滿攣癖癃閉痞膈如風如癲皆痰飲之所致也飲有六曰懸飲溢飲支飲痰飲留飲伏飲懸飲者飲水流於脇咳嗽引痛溢飲者飲水流於四肢當汗不汗身體疼重支飲欬逆倚息短氣不得臥其形如腫痰飲者其人素盛今瘦腸間漉漉有聲留飲者其人背寒如手大或短氣而渴四肢歴節痛脇下痛引缺盆咳嗽則轉甚伏飲者膈滿喘欬嘔吐發則寒熱腰背痛目疾出其人振振惡寒身瞤惕東垣謂痰飲皆濕熱相乗如濕在心經為熱痰結而為膠其色紅濕在肝經為風痰其色青如沬濕在脾經為濕痰濕久為熱其色黄濕在肺經為氣痰其色白咯出如米粒濕在腎經為寒痰其色如唾王隠君云痰清白者為寒黄濁者為熱熱鬱之甚或至帶血血敗則黒口吐白血者不治白血者桃花色也子和云入肺則多嗽入大腸則為泄入腎則為湧水水在上則面浮在下則胕腫在中則為痞膈痰逆人之停飲留於胃脘皆由胃氣虚弱飲水飲酒不能傳化結為痰飲行疾而漉漉有聲者自有癖􅇸在胃内飲水則滲入停蓄於其間其狀若胞􅇸不可速去然亦不能為速害若見變証百端在上焦須以瓜蒂散吐之在胃脘宜十棗湯下之然後以温藥温胃氣丁香茯苓半夏以蕩散水飲仍宜丁香半夏湯以拔其根熱痰則多煩熱風痰多成癱瘓竒症冷痰多成骨痺濕痰多成倦怠軟弱驚痰多成心痛癲疾飲痰多脇痛臂痛食積痰多成癖塊痞滿或心下如停冰雪心氣冷痛或脊上每日一條如線之冷起或渾身習習如蟲行或胸腹間如有二氣之交紐又或如烟火上衝頭目烘熱或風毒脚氣或嘔冷涎綠水黒汁甚為勞瘵肺癰膓毒種種不一皆痰飲之所為也嚴氏云人之氣道貴乎順順則津液流通决無痰飲之患自潤下從小便中出矣又有病人元有痰積其氣因痰而結滯者則又必先逐去痰結滯氣自行豈可執一王隠君云津液既凝為痰不復周潤三焦故口燥咽乾大便秘面如枯骨毛髪焦槁婦人則因此月水不通若能逐去敗痰自然服藥有效脾土上應於天亦屬濕化所以水糓津液不行即停聚而為痰飲夫人之病痰火者十居八九老人不宜速降其火虚人不宜盡去其痰攻之太甚則病轉劇而致危殆須以固元氣為本有病喜吐痰唾服八味丸而見效者叔和云腎寒多唾蓋腎為水之官腎能攝水腎氣温和則水液潤下腎氣虚寒則邪水溢上故用八味丸以温利之活人書云中脘有痰亦令人憎寒發熱惡風自汗胸膈痞滿有類傷寒但頭不痛項不强為異丹溪云風痰多見竒症凡風痰病必用風痰藥白附子天麻雄黄牛黄僵蠶皂角之類濕痰多見倦怠軟弱濕痰宜用蒼白二术又用油炒半夏熱痰多挾風外症為多用青黛黄連天花粉大快膈上熱痰痰因火盛逆上者治火為先白术黄芩石膏之類中氣不足加參朮食積痰神麴麥蘖山查欲吐食積痰用蘿蔔子油炒為末漿水調下探而吐之食積痰必用攻若氣虚者用補氣藥送老痰海石半夏瓜蔞香附五棓子佐他藥大治頑痰鬱痰僵蠶杏仁瓜蔞訶子貝母五棓子痰而脾虚者清中氣二陳湯加白朮之類兼用升提藥内傷挾痰必用參朮蓍之類多用薑汁傳送或加半夏之類虚甚加竹瀝眩暈嘈雜乃火動其痰用二陳湯加梔子芩連之類噫氣吞酸此係食鬱有熱火氣上動以黄芩為君南星半夏橘紅為臣熱多加青黛喉中如有物咯不出咽不下此老痰也重者吐之用瓜蒂散氣實用荆瀝仲景用半朴茯薑治之神驗痰結核在咽喉中燥不能出入化痰藥内加鹹藥軟堅之味瓜蔞仁杏仁海石桔梗連翹少佐以風化硝薑蜜丸噙化凡人身上中下有塊是痰問其平日好食何物吐下後方用藥痰之為物隨氣升降無處不到痰在腸胃間可下而愈痰在經絡中非吐不可出吐中就有發散意痰在膈上必用吐之瀉亦不出痰膠固及脉浮者俱用吐法痰在脇下非白芥子不能逹痰在皮裏膜外用薑汁竹瀝導之痰在四肢非竹瀝不能開二陳湯善治一身之痰如在下加下引藥在上加上引藥潤下丸降痰最妙青礞石丸重在風化硝小胃丹能逐貫胃痰積然不宜多服蒼朮治痰飲成窠􅇸者極效海粉能治熱痰降濕痰軟結痰消頑痰最效可入丸子不可入煎藥枳實㵼痰能衝牆壁竹瀝能治膈間有痰或癲狂或健㤀或風痰最效又能養血荆瀝治痰稍重用此二味效速且穏當二瀝治痰結在皮裏膜外及經絡必佐以薑汁韮汁治血滯不行中焦有飲取自然汁冷飲三四盞以寛胸中煩躁不寧後自愈氣實熱痰吐難得出或成塊或吐咯不出及兼氣鬱者難治中焦有痰胃氣亦賴所養卒不便虚若攻之盡則虚矣凡治痰用利藥過多致脾氣下虚則痰反易生而多矣丹溪云痰之為病方論少有細述者近惟三因略言亦無加減法夫痰之源不一有因痰而生熱者有因熱而生痰者有因氣而生者有因風而生者有因驚而生者有積飲而生者有多食而成者有因暑而生者有傷冷物而成者有脾虚而成者有飲酒而成者其為病也驚痰則成心包痛顛疾熱痰則煩躁頭風爛眼燥結怔忡懊憹驚眩風痰成癱瘓大風眩暈暗風悶亂飲痰成脇痛四肢不舉每日嘔吐食痰成瘧痢口出臭氣冷痰骨痺四肢不舉氣刺痛酒痰飲酒不消但得酒次日又吐脾虚生痰食不美反胃嘔吐氣痰攻注走刺不定婦人於驚痰最多葢因産内交接月事方行其驚因虚而入結成塊者為驚痰必有一塊在腹發則如身孕轉動跳躍痛不可忍凡人手臂或動不得或骨節遍身痛坐臥不能此痰入骨也有人脚氣久不治骨節痛與脚氣藥不效此痰病也凡傷寒病後嘔吐藥不得入亦因初病膈中有涎痰也或因下之太早而遂議其非痰未為確論傷寒發黄亦是痰病葢因熱搏而成凡大便秘者亦是痰結左右關脉滑大者膈中有痰也可吐之怕吐者消息下之凡人每日背上一條如線而寒起者宜吐下之凡病百藥不效其關上脉伏而大者痰也用妙應丸加減法方見走注疼痛即控涎丹洞虚子論痰之為病成偏頭風成雷頭風成太陽頭痛眩運如坐舟車精神恍惚或口眼瞤動或睂稜耳輪俱癢或頷腮四肢逰風腫硬似疼非疼或渾身燥癢搔之則隠疹隨生皮毛烘熱色如錦斑或齒頰似癢似痛而疼無定所滿口牙浮痛癢不一或噯氣吞酸鼻聞焦臭喉間荳腥氣心煩鼻塞咽嗌不利咯之不出咽之不下或因噴􅅉而出或因舉動而唾其痰如墨又如破絮或如桃膠或如蜆肉或心下如停水鐡閉滯妨悶噯􅅉連聲狀如膈氣或寢夢刑戮刀兵劒㦸或夢入人家四壁圍繞暫得一竇百計得出則不知何所或夢在燒人地上四面烟火枯骨焦氣撲鼻無路可出或不因觸發忿怒悲啼雨淚而寤或時郊行忽見天邊兩月交輝或見金光數道回頭無有或足膝酸軟或骨節腰腎疼痛呼吸難任或四肢肌骨間痛如撃戮乍起乍止並無常所或不時手痺麻痛狀如風濕或臥如芒刺不安或如毛蟲所螫或四肢不舉或手足重滯或眼如薑蜇膠粘癢澁開闔甚難或陰晴交變之時胸痞氣結或齒癢咽痛口糜舌爛及其奮然而發則噴􅅉連聲初則涕唾稠粘次則清水如注或眼前黒暗腦後風聲耳内蟬鳴眼瞤肉惕惟洞虚子備此疾苦述甚詳悉乃能治療病勢之來則胸腹間如有二氣交紐噎塞煩鬱有如烟火上衝頭面烘熱眼花耳鳴涎痰涕淚並從肺胃間湧起凜然毛竪噴􅅉千百然後徧身煩躁則去衣凍體稍止片時或春秋乍凉之時多加衣衾亦得暫緩或頓飲氷水而定或痛飲一醉而終不能逐去病根乃得神秘沈香丸方屢獲大效愈人數萬但不欲輕傳匪人故以隠語括之詩曰甑裏翻身甲帶金于今頭戴草堂深相逢二八求斤正硝煅青礞倍若沈十七兩中零半兩水丸梧子意須斟驅除怪病安心志水瀉雙身却不任大黄蒸八兩黄芩八兩青礞石一兩硝煅如金色沈香半兩右為末水丸如梧子大白湯食後空心服治飲之劑心下有痰飲胸脇支滿目眩苓桂朮甘草湯主之茯苓四錢桂枝白术各三錢甘草二錢水煎服小便自利短氣有微飲當從小便去之亦前湯主之病者脉伏其人欲自利利反快雖利心下續堅滿此為留飲欲去故也甘草半夏湯主之甘遂去心麵裹煮令透晒乾大者三枚半夏十二枚製芍藥五枚甘草如指大一枚炙以水二升煮去半升去柤以蜜半升和藥汁煎取八合頓服之懸飲十棗湯主之芫花洗淨醋拌經宿炒令黒勿焦甘遂同前製去心大㦸去皮長流水煮一時洗淨晒乾各等分為末以水一升五合先煮肥大棗十枚取八合去渣納藥末强盛人五分平旦服之不下更加五分下後以糜粥調之溢飲者當發其汗大小青龍湯主之大青龍湯麻黄去節六錢桂枝去皮二錢甘草炙二錢杏仁四枚去皮尖石膏二錢研碎生薑二錢大棗二枚水三碗半煎去渣温服取微汗汗多者温粉撲之小青龍湯麻黄去節三錢五味子半夏各二錢乾薑甘草炙細辛桂枝去皮各三錢水七碗煮麻黄至六碗去沫内諸藥煮取二碗膈間支飲其人喘滿心下痞堅面色黧黒其脉沈緊得之數十日醫吐下之不愈木防己湯主之虚者即愈實者三日復發復愈不愈者宜防己湯去石膏加茯苓芒硝湯主之微利則愈木防己石膏各三錢桂枝二錢人參四錢水三碗煎一碗温服加茯苓四錢芒硝三錢去石膏名防己苓硝湯心下有支飲其人苦冒眩澤瀉湯主之澤瀉五錢白朮二錢水碗半煎一碗温再服支飲胸滿者厚朴大黄湯主之厚朴三錢大黄六錢枳實五分水煎温服支飲不得息葶藶大棗瀉肺湯主之葶藶炒令黄色搗丸如彈丸大大棗十二枚先以水三升煮棗至二升去棗内葶藶煮取一升頓服嘔家本渇渇者為欲解今反不渇心下有支飲故也小半夏湯主之方在嘔吐門腹滿口乾舌燥此腸間有水氣巳椒藶黄丸主之防己椒目葶藶炒大黄各一兩右為末蜜丸如梧子大先服一丸日三服稍增口中有津液渴者加芒硝五錢卒嘔吐心下痞膈間有水眩悸者半夏加茯苓湯主之方見嘔吐門假令瘦人臍下悸吐涎沫而顛眩此水也五苓散主之白朮茯苓猪苓各三錢澤瀉一錢桂二錢右為末白飲服方寸匕日三服飲暖水汗出愈水氣去後心胸間虚氣滿不能食茯苓飲消痰氣能令食茯苓人參白朮各三錢陳皮二錢半枳實生薑各四錢水煎連進三服每一服後如人行八九里復進欬逆倚息不得臥小青龍湯主之青龍湯服後多唾口燥寸脉沈尺脉微手足厥逆氣從小腹上衝胸咽手足痺其面翕然如醉狀因復下流陰股小便難時復冒者與茯苓五味甘草湯主之茯苓桂枝各四錢甘草炙三錢五味子五錢作三服衝氣即降而反更欬胸滿者苓甘五味薑辛湯主之茯苓四錢五味子五錢甘草乾薑各三錢細辛三錢水三鍾煎一鍾日三服欬滿即止而更復渴衝氣復發者以細辛乾薑為熱藥也服之當遂渴而渴反止者為支飲也支飲者法當冒冒者必嘔嘔者復納半夏以去其水芩甘五味薑辛夏湯主之茯苓五味子半夏各四錢甘草細辛乾薑各二錢水煎日三服水去嘔止其人形腫者加杏仁主之其症應納麻黄以其人遂痺故不納之若逆而納之者必厥所以然者以其血虚麻黄發其陽故也若面熱如醉此為胃熱上衝薫其面前方加大黄三錢以利之先渴後嘔為水停心下此屬飲家小半夏茯苓湯主之半夏三錢茯苓一錢半生薑十片水煎服五飲湯治五飲最效旋覆花人參橘紅枳實白朮茯苓厚朴製半夏製澤瀉猪苓前胡桂心白芍藥甘草炙各等分每兩分二服薑十片水二盞煎去渣温服無時忌肉食生冷等物因酒成飲加葛花砂仁治心腹中脘痰水冷氣心下汪洋嘈雜腸鳴多唾口中清水自出脇肋急脹痛不欲食此胃氣虚冷所致其脉沈弦細遲旋覆花湯細辛陳皮桂心人參甘草桔梗芍藥半夏旋覆花各半兩赤茯苓每服四錢薑七片煎去渣温服木香半夏丸治痰涎上湧心胸不利常服消痰寛膈半夏一兩木香七錢陳皮茯苓薑屑人參白附子草䓻各五錢右為末麵糊丸食後生薑湯下五十丸降痰丸治三焦氣澁下痰飲消食利膈痞滿欬唾稠粘面熱目赤支體倦怠不思飲食常服升降滯氣消化痰涎木香檳榔青皮陳皮枳殻麩炒大黄半夏湯泡京三稜黒牽牛各一兩右為末麵糊丸食後薑湯下吐劑治哮嗽妙方砒霜麵海螵蛸各一錢為末水調作餅子慢火炙黄再研令細每服一字用井花水作一呷服良久吐出為度小兒減半忌食熱物凡吐寒痰藜蘆瓜蒂吐不透者用附子尖妙瓜蒂散赤小豆瓜蒂炒等分右末香豉一合水二盞煮作稀粥去渣取三之一和末一錢頓服之不吐少加得快吐乃止三聖散防風瓜蒂各三兩藜蘆去苖及心或一兩或半兩右為各粗末每服約半兩以韲汁三碗先用二碗煎三五沸去韲汁次入一碗煎至三沸却將原二盞同一處煎二沸去渣放温徐徐服之不必盡劑以吐為度稀涎散猪牙皂角不蛀者去皮弦一兩炙用之綠礬半兩藜蘆半兩白􅈨一兩右為末每服一錢温水下治濕和中之劑枳朮湯枳實半兩白朮二兩水煎作三服桔梗半夏湯桔梗半夏陳皮生薑水煎服導痰湯治一切痰涎壅盛胞膈留飲痞塞不通二陳湯加枳實南星改白茯用赤茯苓此方加桔梗一兩木香一兩沈香半兩名二香導痰湯又方無二香加人參瓜蔞仁神术丸治痰飲方在吐酸停飲門茯苓澤瀉湯小半夏加茯苓湯並見前治風痰之劑玉壺丸治痰飲方在頭痛門水煮金花丸治風痰頭眩嘔吐咳嗽南星半夏各一兩生用寒水石二兩白麵三兩天麻五錢雄黄一錢滴水丸菉豆大每服五七十丸日乾煎漿水沸下藥煮浮為度漉出淡漿水浸另用薑湯下通聖加半夏亦可服熱痰之劑小陷胸湯半夏黄連瓜蔞仁水煎服半夏丸瓜蔞仁半夏製各一兩薑汁打糊丸小黄丸人參黄芩南星半夏生薑薑汁糊丸寒痰之劑消飲丸兼治宿酒停飲胸滿嘔逆目視􅍃􅍃腹中水聲痛不思飲食白朮五兩茯苓二兩枳實七錢乾薑一兩右煉蜜丸菉豆大每服温水下三十丸化痰丸半夏三兩陳皮乾薑白朮各一兩薑汁糊丸薑湯下二十丸温中化痰丸青皮陳皮乾薑良薑倍朮丸治五飲乾薑肉桂各半斤白朮一斤為末蜜丸小荳大每服二三十丸米飲下丁香半夏丸檳榔一兩半丁香半夏各一兩細辛乾薑人參各半兩薑汁糊丸每服三十丸薑湯下薑桂丸南星半夏官桂各一兩糊丸菉豆大薑湯下五七十丸理氣之劑四七湯治同六合半夏五兩茯苓四兩蘇葉厚朴各三兩薑棗煎三仙丸南星半夏各五兩香附四兩糊丸薑湯下四十丸蘇子降氣湯前胡厚朴陳皮甘草川歸桂各二兩蘇子半夏各五兩薑棗煎六合湯治七情氣鬱結成痰涎狀如破絮或如梅核咯不出嚥不下嘔逆惡心陳皮半夏茯苓厚朴香附紫蘇莖等分每服四錢生薑三片水煎服加味化痰丸人參白朮半夏製茯苓桔梗各一兩枳實香附前胡甘草半兩右為細末用半夏末薑汁糊丸每服五十丸白薑湯下二生湯治胃冷有痰附子生去皮臍半夏生各等分每服四錢水二盞生薑十片煎至七分温服加木香少許尤佳水玉湯治睂稜骨痛不可忍此痰厥也半夏製每服三錢薑十片煎八分食後温服又宜服温膽湯仲景茯苓飲治胸停水飲吐水氣滿不飲食白朮茯苓各一兩人參七錢半陳皮枳實各五錢每服水二鍾生薑一錢煎七分服又方治痰飲吐水無時節者其源以飲冷過度遂令脾胃氣弱食不消化飲食入胃則皆變冷水反吐不停赤石脂一觔搗篩服方寸七酒飲任服稍稍加至三錢七服盡一觔終身不吐冷水又不下利補五臟令人肥健有人痰飲服諸藥不效服此即痊二賢散此消痰飲之要藥也陳皮二兩甘草半兩為末每服二錢沸湯下治一切痰方陳皮一觔去穰取紅淨外以甘草鹽各四兩水五碗慢火煮乾焙為末白湯㸃服清健丸治一切痰飲枳實白术各二兩陳皮半夏南星山查各一兩白芥子黄芩蒼术各一兩半川連川歸砂仁各五錢右為末用神麴五兩為粉取竹瀝二碗薑汁半盞煮糊丸梧子大每服八九十丸白湯送下竹瀝逹痰丸半夏滚薑湯泡透去皮臍瓦上微火炒二兩白茯苓去皮二兩陳皮去白二兩大黄酒浸透晒乾二兩白术黄芩酒炒各三兩甘草炙人參青礞石各一兩搗碎用燄硝一兩煅如金色沈香五錢右為細末用竹瀝一大碗半生薑汁二盞和匀入鍋内火熬一刻許令熟將前藥和搗為稀醬様磁器盛晒乾仍以竹瀝薑汁如前法搗匀和晒乾如此三次仍前竹瀝薑汁和丸如小豆大每服一百食逺白米湯下能運痰從大便出不損元氣神妙神妙半夏利膈丸治風痰頭疼目眩咽膈不利涕唾稠粘並治酒過停飲嘔逆惡心胷脇引痛腹内有聲半夏湯泡三兩白附子生用二兩天南星生用一兩半白术茯苓去皮白礬人參去蘆滑石各一兩貝母一兩右為末麵糊丸梧子大每服三十丸食後薑湯下八味丸治脾虚不得克制腎水多吐痰唾而不咳者附子泡去皮臍桂心各一兩山茱萸肉山藥各四兩白茯苓澤瀉牡丹皮各三兩懐熟地黄八兩右為末蜜丸梧子大每服五十丸空心鹽湯下葉氏分涎湯治風痰留滯膈間喘滿惡心涎唾不利橘紅人參桔梗枳實半夏湯洗七次令軟毎个切四片用薑汁浸一夕天南星去外皮濕紙包灰火煨香熟取出各等分薑十片每服三錢水一盞煎食後服指迷茯苓丸治中脘留伏痰飲臂痛難舉手足不得轉移半夏二兩茯苓一兩枳殻去穰麩炒五錢風化硝二錢半右為末薑汁麵糊丸梧桐子大每服三十丸薑湯下辰砂祛痰丸治酒食過多酸鹹作成痰飲聚於胸中凝則嘔逆惡心流則臂痛頭目昏眩腰脚疼痛深則左癱右瘓淺則蹶然倒地此藥神效硃砂一兩水飛一半入藥一半為衣半夏四兩生薑四兩與半夏製作餅隂乾陳皮白礬生荆芥各一兩為末薑汁糊丸梧桐子大每食後服五十丸薑湯吞下忌動風動氣物檳榔散治胸膈停滯痰飲腹中虚鳴食不消化時或嘔逆杏仁去皮尖旋覆花去枝梗半夏湯洗七次檳榔桔梗去蘆炒白术乾薑炮橘紅各一兩甘草炙人參各半兩吳仙丹百一選方治痰飲上氣不思飲食小便不通頭目昏眩吳茱萸湯泡白茯苓各等分右為末蜜丸梧子大每服三十丸滾湯温酒任下辰砂化痰丸治風化痰安神定志利咽膈清頭目白礬枯辰砂飛各五錢天南星泡一兩半夏洗三兩右為末以薑汁麵糊丸梧子大辰砂為衣每服二十丸薑湯下防風丸治風痰上攻頭痛惡心項急目眩旋暈痰涎壅滯昏憒天麻酒浸一夜甘草炙川芎各一兩防風各一兩硃砂五錢為衣右為末麵糊丸梧子大每服一錢荆芥湯下控涎丹一名妙應丸凡人忽胸背手脚頸項腰胯隠痛不可忍連筋骨牽引釣痛坐臥不寧時時走易不定俗醫不曉謂之走注便用風藥及針灸皆無益又疑是風毒結聚欲作癰疽亂治亦非也此乃是痰涎伏在心膈上下變疾狀或令人頭痛不可舉或神思昏倦多睡或飲食無味痰唾稠粘夜聞喉中如鋸聲口流唾涎手脚重腿冷痺氣不通誤認為癱瘓亦非也凡有此疾但用是藥不過數服其疾如失甘遂去心紫大㦸去皮真白芥子各一兩右為末煮糊丸梧子大晒乾臨臥淡薑湯或滾水下五七丸至十丸痰猛氣實加丸數不妨其效如神附加減法脚氣加明松脂一錢檳榔木瓜各一兩卷栢半兩先以鹽水煎半日次日白水煮半日同前藥為丸每服二十丸加至四五十丸再服下惡物立効驚痰加硃砂全蝎各二錢每用八九丸常與之三五服去盡酒痰加雄黄全蝎各二錢每服十丸走注腰痛加核桃三箇燒灰每服三十丸加至五十丸温酒下脚氣走注於前方内加吳茱萸驚氣成塊者加穿山甲炒鼈甲燒各三錢𤣥胡索蓬术各四錢每服五十丸加至七十丸以利為度腎痺痛加木鼈子去殻研一兩桂半兩熱痰加盆硝等分每服三兩丸寒痰加胡椒丁香蝎桂各等分每服二十五丸茯苓半夏湯治胃氣虚弱身重有痰惡心欲吐風邪羈絆於脾胃之間當先實脾胃方在嘔門御愛紫宸湯解宿酒嘔噦惡心痰唾進飲食木香半兩檀香俱不見火藿香砂仁葛花茯苓官桂各一兩陳皮乾葛良薑丁香不見火炙甘草各二兩每服四錢水煎不拘時服柴胡半夏湯治痰症不敢見風眼澁頭痛有痰眼黒惡心兀兀欲吐風來覺皮肉緊手足重難舉居暖處有微汗便減如見風即復作一名補肝湯柴胡蒼术各一錢半半夏二錢半茯苓二錢神麴炒藁本各一錢升麻五分薑五片水煎食逺服枇杷葉散治痰逆此藥温胃思食青皮去穰炒草豆􅅳各半兩前胡枇杷葉人參半夏湯泡茯苓去皮大腹皮白朮厚朴去粗皮薑汁炒各一兩薑三片每服四錢水煎不拘時熱服清氣化痰丸治上焦痰火壅盛或𠻳或喘煩熱口乾胸膈痞塞天南星三兩半夏湯泡黄連黄芩各五兩茯苓栝蔞仁去殻杏仁去皮尖各四兩陳皮枳實麩炒各六兩甘草二兩右為末薑汁煮麵糊丸梧子大每服七十丸食後薑湯下清氣化痰丸清利胸膈順氣化痰寛中健脾消導飲食治痰之聖藥也半夏半斤南星六兩枯蔞黄連紫蘇子炒蘿蔔子炒枳實麩炒橘紅山查各四兩乾薑生香附子炒甘草炙黄芩各二兩右將南星切作十字塊半夏每箇切作二塊皂莢六兩白礬三兩多用水將南星半夏皂莢白礬一處浸三宿煮南星透為度只將南星半夏晒乾同衆藥為末水糊丸梧子大每服七八十丸加至百丸食遠或臨睡茶清下怔忡驚悸門生生子曰怔忡者心中惕惕然動不自安也驚者從外而入或耳聞異聲目擊異物動而懼也悸者中心畏怯動而怕驚也怔忡止於心不自安悸則心既動而又恐恐然畏懼如人將捕之驚而駭也治怔忡之法惟當益其心血壯其神氣治驚悸則有諸經之証當分别治之治驚之法内經曰驚者平之平常也使平日常見常聞則何驚之有張子和治衞德新之妻被盜而驚乃以平法治之良愈黄帝曰足陽明病惡人與火聞木音則惕然而驚鐘鼔不為動聞木音而動何也岐伯曰陽明者胃也胃者土也土惡木故驚也又曰東方青色入通于肝其病發驚駭脾移熱於肝則為驚衂臥而驚者屬肝臥則血歸於肝今血不靜血不歸肝故驚悸於臥也仲景曰食少飲多水停心下甚者則悸微者短氣飲水多必心下悸五飲停蓄閉於中脘最使人驚悸痰飲驚悸皆屬於脾土東垣云六脉俱大按之空虚必面赤善驚上熱乃手少陰心之脉也此氣盛多而亡血以甘寒鎮墜之劑瀉火與氣以墜氣浮以甘辛温微苦峻補其血熟地生地茈胡升麻白芍丹皮川芎黄蓍之類以防血溢上竭甘寒鎮墜之劑謂丹砂之類丹溪云怔忡大槩屬血虚與痰有慮便動者屬虚時作時止痰因火動瘦人多是血虚肥人多是痰飲真覺心跳者是血少宜四物安神之類又曰病自驚而得者驚則神不守舎舎空得液則成痰也血氣入舎則痰拒其神不得歸焉控涎丹加辰砂逺志猪心血丸治勞役心跳大虚症歸身白芍側栢川芎各五錢陳皮甘草黄連各二錢硃砂一錢右用猪心血為丸温膽湯治心膽虚怯觸事易驚或夢寐不祥遂致心驚膽懾氣鬱生涎涎與氣摶變生諸症或短氣悸乏或自汗此膽虚不能制脾則脾之水飲作矣半夏橘紅竹茹枳實妙各一兩甘草炙一兩白茯苓一兩半每服五錢薑五片棗一枚水一盞煎七分食前服仲景半夏麻黄湯治心下悸半夏麻黄等分為末煉蜜丸小荳大飲服三丸鎮心丸治驚悸辰砂用黄松節油浸龍齒用逺志苗醋煮右只取辰砂龍齒等分為末猪心血為丸芡實大每服一丸以麥門冬葉菉豆燈心白蜜水煎豆熟為度臨臥湯下小兒磨化半丸量歲數與之蜜佗僧散治驚氣入心絡不能語者昔有為狼及大蛇所驚皆服此而安蜜佗僧研極細末茶調下一錢匕服即愈寒水石散治因驚心氣不行鬱而生涎結為飲遂為大疾忪悸少遇驚則發尤宜服之寒水石煅滑石飛生甘草各等分為末每服二錢熱則新汲水下怯寒則薑棗湯下加龍腦少許尤佳定志丸心氣不足驚悸恐怯石菖蒲炒逺志去心茯苓各二兩人參一兩辰砂五錢為衣為末蜜丸梧子大每服五十丸米飲下安神鎮心丸治驚悸消風痰石菖蒲逺志人參茯神川芎山藥麥門冬鐡粉天麻半夏南星茯苓各一兩細辛辰砂各五錢右為末生薑五兩取汁入水煮糊為丸菉豆大另以硃砂為衣每服二十五丸夜臥生薑湯下小兒減半茯苓丸治驚悸方在癲門東垣羌活勝濕湯治臥而多驚悸多魘冐邪在少陽厥陰也加柴胡五分如淋加澤瀉五分此下焦風寒二經合病也經曰肝腎之病同一治為俱在下焦非風藥行經不可也羌活獨活防風藁本各一錢蔓荆子三分川芎二分甘草炙五分水二鍾煎服東垣硃砂安神丸治外物所驚宜鎮平之黄連一錢半甘草炙當歸生地各五分硃砂一錢飛右為細末浸蒸餅為丸黍米大硃砂為衣每服十五丸食後津唾嚥下一方當歸地黄各一錢心澹澹動綱目云澹澹因痰動也心澹澹動者謂不怕驚而心自動也驚恐亦曰心中澹澹恐謂怕驚而心亦動也其澹澹自動之病屬二經一屬厥陰心主經曰心主手厥陰之脉是動則病心中澹澹大動面赤目黄喜笑不休視盛虚寒熱陷下取之是刺灸之法也又曰太陽司天寒淫所勝病心澹澹大動胸脇胃脘不安治以甘熱是運氣之寒傷心主也其二屬少陽病經云一陽發病少氣喜欬善噫其傳為心掣故也怒怒在陰陽為陰遏而不得伸也經云陰出之陽則怒又云血并於上氣并於下心煩寃善怒東垣云多怒者風熱陷下於地是也怒屬肝膽經云在臟為肝在志為怒又云肝藏血血有餘則怒又云膽為怒丹溪治怒方香附末六兩甘草末一兩右和匀每服五錢白湯調下運氣怒皆屬木太過内經曰陽氣者大怒則形氣絶而血菀於上使人薄厥又云暴怒傷陽怒則氣逆甚則嘔血及飱泄是也生生子曰面青善怒亦是肝氣太過當益肺金以制之毋徒平木此五行勝復之理用藥之法亦當要識此意不然必不能杜根也善太息運氣善太息皆屬燥邪傷膽經云陽明在泉燥淫所勝病善太息又云陽明之盛太息嘔苦又云少陰司天地乃燥淒愴數至脇痛善太息是也内經善太息皆取心膽二經岐伯曰憂思則心系急心系急則氣道約約則不利故太息以出之又曰膽病者善太息口苦嘔宿汁視足少陽脉之陷下者灸之徐仲子士偉曰家君肄業過勞場屋屢北志堅不懈吐衂盈盆虚羸骨立夜臥合睫則夢爭鬬轉鬬轉負恐畏之態無可名狀呼號之聲轟然若雷而不能騰出於口家人侍睡者莫不縮首伸舌如是者十年所矣每五七夜必一發過勞則連發發尤猛歴訪師友多作心血不足治惟補心安神補心安神藥投之漠如也終莫識為何症捫心苦思思每逹旦更幾寒暑矣一日偶觀素問藏氣法時篇論有曰肝病令人善怒虚則目􅍃􅍃無所見耳無所聞善恐如人將捕之恍然警悟乃知為魂逰症也何言之夫夜臥屬氣於肝肝主藏血藏魂者作文既苦衂血過多則魂失養惟是交睫若魘則夢爭鬬肝虚則膽怯故多負多恐也非峻補不奏功又思草木之劑不堪任使乃以鹿角膠三錢侵晨酒鎔服五日而睡臥安半月而肌肉生一月而神氣完始能出戸厥後每見血症虚憊者崩中眩暈者投前劑莫不響應夫人徒知鹿角膠補虚之功勝於參蓍而不知鹿角膠可以峻補肝血葢血盛而䰟自安也恐生生子曰恐與驚悸相似實非驚悸也張子和云驚者為自不知恐者為自知故也葢驚者聞響即驚恐者心中恍恍然自知如人將捕之狀及不能獨自坐臥必須人為伴侶方不恐懼或夜必用燈照無燈燭亦恐懼者是也臟腑恐有四一曰腎經云在臟為腎在志為恐又云精氣并於腎則恐是也二曰肝膽經云肝藏血血不足則恐戴人曰膽者敢也驚怕則膽傷矣葢肝膽實則怒而勇敢肝膽虚則善怒而不敢也三曰胃經云胃為恐四曰心經云心怵惕思慮則傷神傷神則恐懼自失周本心年六十歲形氣俱實因大恐正月間染病心不自安如人將捕之狀夜臥亦不安兩年後欲飲以人參白术當歸身為君陳皮為佐加鹽炒黄柏炙𤣥參各少許煎服月餘而安經云恐傷腎丹溪用鹽炒黄栢炙𤣥參引參歸等藥入補腎足少陰絡也治膽虚常多畏恐不能獨臥如人捕之狀頭目不利人參枳殻桂心甘菊茯神五味子山茱萸枸杞子各三分栢子仁熟地黄各一兩右為末每服二錢温酒調服治膽虚冷目眩頭疼心神恐畏不能獨處胸中滿悶茯神一兩枳殻半兩遠志防風細辛白术人參前胡桂心甘菊熟地黄各三分右為末每服三錢水一盞薑三片煎六分温服不拘老幼皆可服治膽虚目暗喉痛數唾眼目眩冒五色所障夢見被人爭訟恐惧面色變者補膽防風湯防風一錢細辛川芎茯苓甘草獨活前胡各八分人參七分棗二枚水煎食前服運氣善恐皆屬肝木虚經云木不及曰委和委和之紀其病淫動注恐是也生生子曰經云恐傷腎予在苕見一友人與一女子私合正值陽敗之際為人驚破恐懼走歸精流不止而斃又觀六十家小說載一女子與一少年亦如上故事特掲附此以為好色傷生者之戒善悲内經云在臟為肺在志為悲又云精氣并于肺則悲是也肺虚補母仲景云婦人臟躁喜悲傷欲哭象如鬼神所附數欠伸甘麥大棗湯主之甘草三兩小麥一升大棗十枚水六升煮三升分三服亦補脾氣許學士治一婦人數欠無故悲泣不止或謂之有祟祈禳請禱備至終不應予忽憶金櫃有一證云婦人臟躁悲傷欲哭象如鬼神靈數欠伸者宜甘麥大棗湯予急令治藥盡劑而愈古人識病制方種種絶妙如此運氣云悲證皆屬寒水攻心經云火不及曰伏明伏明之紀其病昏惑悲㤀從水化也又云太陽司天寒氣下臨心氣上從喜悲數欠又云太陽司天寒淫所勝善悲時眩仆又云太陽之復甚則入心善㤀善悲治以諸熱是也妊娠善悲綱目述管先生治一妊娠四五箇月臟躁悲傷遇晝則慘感淚下數欠象若神靈如有所憑醫與巫皆無益與仲景大棗湯一投而愈赤水元珠卷六
