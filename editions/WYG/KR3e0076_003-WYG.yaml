body:
  text: 赤水元珠卷三明孫一奎撰頭痛生生子曰頭為諸陽之首至清至髙之處也苟外無風寒霧露之觸内無痰火濕熱之薰必無痛也既有内外之因當循内外之治凢頭痛當分三隂三陽諸血虚頭痛當歸川芎主之諸氣虛頭痛人參黄耆主之兼見何症以佐使之藥濟之此立方之大法也血氣俱虚於調中益氣湯加川芎蔓荆子細辛其效如神濕厥頭痛清空膏主之諸厥逆頭痛羌活附子湯主之濕熱在頭者以苦吐之世有真頭痛旦發夕死夕發旦死原其受病乃氣血虛極以致風寒暑濕之氣得以犯之名曰厥頭痛痛引腦巔䧟於泥丸宫中非藥所能愈葢其根本先絶也丹溪曰頭痛多主於痰痛甚者火也有可吐者亦有可下者東垣曰經云東風生於春病在肝俞在頸項故春氣者病在頭又諸陽㑹於頭面如足太陽經之脈起於目内眥上額交巔直入絡腦還出别下項病衝痛又足少陽之脈起於目鋭眥上抵頭角病則頭角額痛夫風從上受之風寒傷上邪從外入客于經絡令人振寒頭痛身重惡寒治在風池風府有調其隂陽不足則補有餘則瀉汗之則愈此傷寒頭痛也如氣上不下頭痛巔疾者下虛上實也過在足少隂巨陽甚則入腎寒濕頭痛也有厥逆頭痛者所犯大寒内至骨髓髓以腦為主腦逆故令頭痛齒亦痛有心煩頭痛者病在膈中過在手巨陽少隂乃濕熱頭痛也凡頭痛皆以風藥治之者搃其大體言之也髙巔之上惟風可到或味之薄者隂中之陽自地升天者也然亦有三隂三陽之異太陽經頭痛惡風寒脈浮𦂳川芎獨活之類主之少陽經頭痛脈弦細往來寒熱柴胡黄芩主之陽明經頭痛自汗發熱不惡寒脈浮緩長實者升麻葛根石膏白芷主之太隂經頭痛必有痰體重或腹痛為痰癖脈沈緩者蒼术半夏南星主之少隂經頭痛三隂三陽經不流行而足寒氣逆為寒厥其脈沈細麻黄附子細辛湯主之厥隂經頭疼項痛或吐痰沫冷厥其脈浮緩呉茱萸湯主之丹溪云勞役下虚之人似傷寒發熱汗出兩太陽作痛宜補中益氣湯多加川歸川芎甚者加知母蔓荆子又云自魚尾上攻而痛属血虛川芎川歸酒黄栢諸經氣滯亦能作痛王節齋曰久頭痛病畧感風寒便發寒月須重綿厚帕包裹者此属鬱熱本熱而標寒世人不識率用辛温解散之藥暫時得效誤認為寒殊不知因其本有鬱熱毛竅常疎故風寒易入外寒束其内熱閉逆而為痛辛熱之藥雖能開通閉逆散其標之寒邪然以熱濟熱病本益深惡寒愈甚矣唯當㵼火涼血為主而佐以辛温散表之劑以從其標則病可愈而根可除也郭茂恂之婦産七日不食始言頭痛頭痛已又心痛作既而目睛痛如割如刺更作更止相去無瞬息間每頭痛甚欲取大石壓之良乆漸定心痛作則以十指抓壁血流滿掌痛定目復痛又以兩手自剜取之如是十日不已衆醫無計進黑龍丹半粒疾少間中夜再服之服即下瞑目寢如平昔至平旦下一行約三升許如蝗䖝子三疾減半已刻又行如前則頓愈矣頭重東垣紅荳散治頭重極佳方見雷頭風門秘方茶調散風熱上攻頭目昏痛及頭風熱痛不可忍片芩二兩酒拌炒三次不可令焦小川芎一兩細芽茶三錢白芷五錢薄荷三錢荆芥穗四錢頭巔及腦痛加細辛藁本蔓荆子各三錢右為細末每服二三錢用茶清調下頭風丹溪云属痰者多有熱有風有血虛在左属風薄荷荆芥血虚川芎當歸在右属痰蒼术半夏熱則酒芩為主冲和膏偏正頭風腫痛并眼痛者塗上立止如神紫荆皮炒五兩獨活去莭炒三兩赤芍炒二兩白芷一兩菖蒲一兩右為末葱頭煎濃湯調塗藥到痛止又方酒芩一兩蒼术羌活防風各五錢細辛二錢蒼耳三錢右為末每服三錢生薑一大片同擂均茶湯盪起服之又方酒芩五錢蒼术二錢半羌活蒼耳川芎甘草生酒黄連各一錢半半夏麯三錢半炒右為末服法同前頭痒風屑髪黄用大黄酒浸炒為末茶調服川芎散偏頭痛頭風神効甘菊石膏川芎各三錢為末每服一錢茶清調下一方有白殭蠶六錢生用經驗方頭風頭痛藿香防風各二兩辰砂薄荷各一兩天麻白术白附子白芷各一兩五錢右為末糊丸梧子大每服三十丸白湯下菊花茶調散諸風頭目昏重偏正頭風鼻塞菊花川芎荆芥穗羌活甘草白芷各二兩細辛一兩防風一兩洗浄蟬螁殭蠶薄荷各五錢右為末每服二錢食後用茶清調下有一婦人患偏頭痛一邊鼻塞不聞香臭常流清涕或作臭氣一陣服遍治頭痛藥如芎蝎皆不效人無識此病者或曰腦癰偶有善醫云但服局方芎犀丸不十數服忽作􅅉涕突出一鋌稠膿其疾自愈方見鼻淵秘方貼頭風熱痛大黄朴硝各等分右為末井底坭和揑作餅貼兩太陽穴神效否則防壊目祛風清上丸風熱上攻眉稜骨痛酒芩二錢白芷一錢半防風一錢柴胡一錢荆芥八分川芎一錢二分羌活一錢甘草五分水二鍾煎八分食後服芎辛導痰湯痰厥頭痛川芎細辛南星各一錢半半夏二錢陳皮茯苓片芩酒炒各一錢二分枳實一錢甘草五分如挾風熱甚者加石膏三錢菊花一錢水二鍾薑三片煎至八分食後服清空膏偏正頭痛年深及療風濕熱痛上壅損目及腦痛年深不止羌活防風各一兩柴胡七錢川芎五錢甘草炙一兩半黄連炒一兩黄芩三兩一半炒一半酒製右為細末每服二錢熱盞内入茶少許湯調如膏抹在口内少用白湯送下臨卧服如苦頭痛每服中加細辛二錢如太隂脈緩有痰名曰痰厥頭痛加羌活防風川芎甘草又加半夏一兩半如偏正頭痛服之不愈減羌活防風川芎一半加柴胡一倍如發熱惡熱而渴正陽明頭痛只與白虎湯加白芷小清空膏諸般頭痛惟血虚頭痛不治用片芩細切酒拌晒乾為末茶清調下酒亦可補氣湯服前藥之後服此藥黄耆八兩甘草炙當歸身各二錢柴胡升麻各二分細辛少許麻黄炒苦丁香各五分水煎服安神湯頭旋眼黑頭痛羌活一兩防風二錢半柴胡五錢酒黄栢一兩酒知母酒生地升麻各五錢黄耆二兩甘草半生半熟四錢右咀㕮每服半兩水二大盞煎至一盞半加蔓荆子五分川芎三分再煎至一盞臨卧時去渣熱服右東垣丹溪治虛熱頭痛大率皆以酒芩酒連酒栢加風劑也川芎散頭風偏正頭風昏眩川芎細辛羌活槐花甘草炙石膏炙各五錢荆芥薄荷菊花防風茵陳各一兩右為細末每服二錢食後茶清調下日三服石膏散頭痛不可忍麻黄去根節石膏各一兩何首烏五分葛根七錢半右為細末每服三錢生薑三片水煎稍熱服又方亦名石膏散頭痛川芎石膏白芷各等分右為細末每服四錢熱茶清調下荆芥散治頭風王太醫方荆芥石膏煅各等分右為細末每服二錢薑三片葱白三寸連鬚使水一盞煎七分食後服玉真丸寒濕為多腎氣不足氣逆上行頭疼不可忍謂之腎厥其脈舉之則弦按之則堅硫黄二兩石膏半夏湯洗硝研各二兩俱為細末研勻生薑糊為丸梧子大隂乾每服二十丸薑湯或米飲下更炙闗元百壯良方中黄丸子亦佳虚寒甚者去石膏用鍾乳粉一兩玉壺丸風濕頭痛亦作痰患半夏南星天麻為末白麵丸服二錢殭蠶散偏正頭痛併夾腦風連兩太陽頭痛白殭蠶為末用葱茶調服乳香盞落散男子婦人偏正頭痛不可忍大有神效此風盛疎散而痛宜酸以收之御米殻去蒂四兩陳皮甘草炙桔梗去蘆柴胡各一兩右為細末每服二錢水一鍾入燈心十莖長四指同煎七分温服治時氣頭痛不止用朴硝二兩為末生油調塗於頂上治頭内如䖝蛀響各天白蟻用茶子細末吹鼻中如聖散眼目偏痛頭風麻黄燒灰半兩盆硝二錢半麝香腦子各少許右為細末搐之神效治頭風餅子五倍子全蝎土狗七介右為末醋糊作如錢大餅子發時再用醋潤透貼太陽穴上炙熱貼之驗甚仍用帕子縛之啜濃茶睡覺則愈一竒散産後頭痛用當歸川芎為細末每服二錢水一盞煎七分温服治産後身熱頭痛肚痛陳皮白术白芍各二錢黄芩二錢半川芎一錢乾薑牡丹皮甘草各一錢五分荆芥五分分四帖煎服芎附散産後敗血作梗頭痛諸藥不效大附子一枚釅醋一碗用火四畔炙透蘸醋令盡去皮臍加川芎一兩並為細末每服一錢茶清調下東垣曰濕熱在頭而頭痛者必以苦吐之若用上項搐鼻藥而涎少者必兼吐法治之邪在胃而頭痛者必下之其症必兼膈痞或動作則痛甚或右手脈滑盛者是也新沭中風為首風頭面多汗惡風當先風一日則病甚至其風日則少愈大川芎丸主之風氣循風府而上則為腦風項背怯寒腦户極冷神聖散主之大川芎丸首風旋暈弦急外合陽氣風寒相摶胃膈痰飲偏正頭疼身體拘倦川芎一兩天麻四兩為末煉蜜丸每兩作十丸每服一丸細嚼茶酒下食後服神聖散腦風邪氣留飲不散項背怯寒頭痛不可忍者麻黄去節細辛去苗乾葛生一半炒一半藿香葉各等分右為末每服二錢煮荆芥薄荷酒調下茶亦得併治血風症大全黑龍丹産後寒凝血滯或胞衣不下或汚血奔心危急惡疾垂死者但灌藥入口便活妙通神聖當歸五靈脂川芎良薑熟地各三兩右研末入罐鹽泥固濟抿口炭十觔煅令通赤冷定取開成黑糟色細研入後藥百草霜五錢硫黄乳香各一兩花蕋石琥珀各三錢右五味為末并前和勻丸如芡􅧙大每服一丸雷頭風俗名非古也張子和曰雷頭風者結核塊於頭上而作痛者是也可用茶調散吐之次用神芎丸下之然後服烏荆丸及愈風餅子之類消風散熱是其治也如涼膈散之類又云雷頭風是頭上有赤腫結核或如酸􅀥狀可用排針出血則愈矣生生子曰所謂雷頭風者必是痰結核塊或先暗有於頭上然後隨遇而發或勞役或酒色或食煿炙動風發毒之物感而發之或紅或腫而痛作矣急則治其標針而血出風散火滅痛因減去或有之也若先無結塊痰核卒然發寒熱而腫痛者乃風毒也不可不察茶調散又名二仙散𤓰蒂茶葉為末每服二錢虀汁調服乃取吐藥也神芎散實者下之是也能去膈上滯痰大黄黄芩各二兩牽牛活石各四兩為細末滴水為丸如小豆大温水下十五丸每服加十丸以利為度日三服愈風餅子川烏川芎甘菊白芷薄荷防風細辛天麻羌活荆芥甘草各等分為細末水浸蒸餅為劑􅑃作餅子每服三五餅細嚼茶酒送下不拘時候保命集云夫治雷頭風諸藥不效者為與症不相對也葢雷頭風者震卦主之震仰盂故予製藥内加荷葉者象震之形其色又青乃述類象形當煎局方中升麻湯主之治頭面疙瘩增寒拘急發熱狀如傷寒升麻蒼术薄荷為細末每服五錢水一鍾煎七分温服食後或燒全荷葉一個研細調藥服之生生子曰按二公方論俱以結核疙瘩而用風藥論治且指震為雷為譬固美矣恐猶未盡善也夫此病未有不因於痰火者葢痰生熱熱生風故也核塊疙瘩皆有形可徵痰火上升壅於氣道兼於風化則自然有聲輕則或如蟬之鳴重則或如雷之響故以聲如雷而為名也或以其發如雷之迅速也設如前論盡作風熱治之恐認標而忘其本也予故附痰火一方于後以俟明哲評之白殭蠶五錢粉草二錢半夏牙皂薑汁煮一兩連翹五錢片芩七錢酒炒陳皮去白鹽煮桔梗各五錢大黄酒蒸九次二兩薄荷葉三錢白芷二錢天麻五錢酒浸青礞石二錢俱為細末水浸􅔻餅為丸如緑荳大食後臨卧茶吞二錢以痰利為度然後用清痰降火煎藥調理紅荳散頭重如山此濕氣在頭也麻黄根炒苦丁香各五分紅豆十粒羌活燒連翹各二錢右五味為細末鼻内搐之頭風屑肝經風盛也大便實瀉青丸主之虚則消風散主之消風散諸風上攻頭目昏痛項背拘急肢體煩痛肌肉蠕動目眩旋運耳簫蟬鳴眼澁好睡鼻塞多􅅉皮膚頑麻燥痒癮疹又治婦人血風頭皮腫痒眉骨疼旋欲倒痰逆惡心川芎羌活人參茯苓白殭蠶藿香荆芥甘草蟬殻去土各二兩厚朴薑製陳皮去白各五錢防風右為細末每服二錢茶清調下如久病偏頭風每日三服便覺輕減如脱著沐浴暴感風寒頭痛身重寒熱倦疼用荆芥茶清調下半盞不拘服之小兒虚風目澁昏倦及急慢驚風用乳香荆芥湯治風屑極燥痒無時此乃氣虚風邪侵於皮表用藜蘆不拘多少為末先于無風處洗頭候將乾時用末摻之須用入髪至皮乃𦂳縛之一日夜次日即不燥痒如尚有些少可再用一次立效頭上白屑極多山荳根油浸塗或以乳汁調又方白芷零零香各等分為末如前法用之候三五五日箆去敷二三次終始不生大頭病頭痛腫大如斗是也大率多是天行時疫病泰和年東垣以監納濟源税時長夏多疫癘初覺増寒體重次傳面目腫盛目不能開上喘咽喉不利舌乾口燥俗云大頭天行親戚不相訪問如染之多不救張縣丞亦得此症至五六日醫以承氣湯加板藍根下之稍緩翼日其病如故下之又緩終莫能愈漸至危篤或曰李明之存心於醫可以請治遂命診視具説其由曰夫身半已上天之氣也身半已下地之氣也此雖邪熱客於心肺之間上攻頭而為腫盛以承氣下之瀉胃中之實熱是誅罰無過殊不知適其病所為故遂處方用黄連黄芩味苦寒瀉心肺間熱以為君橘紅𤣥參苦寒生甘草甘寒瀉火補氣以為臣連翹鼠粘子薄荷葉苦辛平板藍根味甘寒馬屁勃白殭蠶味苦平散腫消毒定喘以為佐新升麻柴胡苦平行少陽陽明二經不得伸桔梗味辛温為舟楫不令下行共為細末用湯調時時服之拌蜜為丸噙化之服盡良愈因嘆曰往者不可追來者猶可及凡他所有是病者皆書方以貼之全治甚衆普濟消毒飲黄芩黄連各五錢人參三錢橘紅𤣥參各二錢連翹鼠粘子板藍根馬屁勃各一錢甘草生柴胡桔梗各二錢白殭蠶炒升麻各一錢為細末服如前法或加防風薄荷當歸身川芎每服五錢水煎食後時時熱服如大便硬加酒煨大黄一錢以利之腫熱甚者宜砭刺之生生子曰觀消毒飲以普濟二字為命名之首書告四方使人人得躋夀域者君子之存心也乃今時之醫偶獲一未穩之方就括囊緘口自秘終身為徼利之計視此普濟消毒飲寧不自愧於心乎大頭病者雖在身半以上熱伏于經以感天地四時非節瘟疫之氣所著以成至于潰裂膿出而又染他人所以謂之疫癘也大扺足陽明甚則逆傳視其腫勢在何部分隨其經而取之濕熱為腫火盛為痛此邪發於首多在兩耳前後所先見出者為主為根治之宜早藥不宜速恐過其病所謂上熱未除中寒已作有傷人命矣此疾是自内而之外者是為血病況頭部分受邪見於無形之處至髙之分當先緩而後急先緩者謂邪氣在上著無形之部分既著無形所傳無定若用重劑大瀉之則其邪不去反過其病矣雖用緩藥若又急服之或食前或頓服或失緩體則藥不能除病矣當徐徐漬無形之邪或藥性氣味形體擬象服餌皆須不離緩體及寒藥或酒炒浸之類是也後急者謂前緩劑已經髙分瀉邪氣入於中是到隂部染於有形質之所若不速去反損隂也此却為客邪當急去之是治客以急且治主當緩者謂陽邪在上隂邪在下各為本家病也若急治之不惟不能解其紛而反致其亂矣此所以治主當緩也治客當急者謂陽分受陽邪隂分受隂邪主也隂分受陽邪陽分受隂邪客也凡所謂客者當急去之此治客以急也假令少陽陽明之為病少陽者諸邪出於耳前後也陽明者首面大腫也先以黄芩黄連甘草通炒過剉煎少少不住服呷之或服畢再用大黄或酒浸或煨又以䑕粘子新瓦上炒香㕮咀煎去渣内芒硝各等分亦細細呷之當食後用徐得㣲利又邪氣已只服前藥如不已再服後藥依前次第用之取大便利邪已則止如陽明渴者加石膏少陽渴者加𤓰蔞根陽明行經加升麻葛根芍藥之類太陽行經加羌活防風荆芥之類選而加之並與上藥均合不可獨用散也黑白散大頭病如神烏黑蛇酒浸白花蛇去頭尾酒浸雄黄二兩大黄煨五錢為細末每服一二錢白湯調下治疫毒頭重者甘桔湯加䑕粘子大黄芒硝大頭天行病羌活酒芩酒蒸大黄大頭風用井底泥調大黄芒硝塗之又方治大頭疫如神貫衆三錢葛根二錢甘草一錢半白殭蠶炒一錢水煎服極佳加黑荳三錢尤妙面門靈樞經曰面熱者足陽明病十二經脈三百六十五絡其血氣皆上於面而走空竅其精陽氣上走於目而為睛其别氣走於耳而為聽其宗氣上出鼻而為臭其濁出於胃走唇舌而為味其氣之津液皆上薰於面而皮又厚其肉堅故天熱甚寒不能勝之也青紅黄白黑五色以應五臟是以外侯驗内症也東垣曰飲食不節則胃病胃病則氣短精神少而生大熱有時而火上獨燎其面丹溪曰面熱因胃熱有鬱火面寒因胃虚咳逆停息不得卧面熱如醉此為胃熱上冲薰其面以茯苓桂枝甘草五味湯加大黄利之羅氏治楊郎中之内五十一歲身體肥盛己酉春患頭目昏悶面赤熱多服清上藥不效請治診其脈洪大而有力内經云面熱者足陽明病脈經云陽明經氣盛有餘則身已前皆熱況其人素膏粱積熱於胃陽明經多血多氣本實則風熱上行諸陽皆㑹於頭目故面熱之病生矣先以調胃承氣湯七錢加黄連三錢犀角一錢踈下三兩行徹其本熱次以升麻加黄連湯去經絡中風熱上行如此則標本之邪俱退矣升麻加黄連湯升麻葛根各一錢白芷七分甘草炙白芍各五分酒黄連四分生犀角末川芎荆芥穗薄荷各三分用水半盞先浸川芎荆芥穗薄荷外都作一服水二盞煎一盞入先浸三味同煎至七分食後温服數服愈忌酒麵五辛物面寒尼長老六十歲體瘦弱十月間病頭面惡寒不敢當風行諸治不效脈短細而㣲且年髙向素食日惟茶菓而已陽明之經本虚脈經云氣不足則身已前皆寒慄又加看誦損氣由此胃氣虚經絡之氣亦虚不能上榮頭面故惡風寒先以附子理中丸温其中氣次以升麻湯加附子主之升麻葛根白芷黄耆附子炮各七分甘草炙人參草豈􅅳各五分益智仁三分水一鍾半連鬚葱頭二莖煎至一鍾温服數服良愈升麻湯辨或曰升麻加黄連湯治面熱升麻加附子湯治面寒有何依據荅曰出自仲景雲岐子註傷寒論中辨葛根湯云尺寸俱長者陽明受病也當二三日發以其脈夾鼻絡於目故身熱目疼鼻乾不得眠此陽明經受病也始於鼻交頞中從頭至足行身之前為表之裏陽明經標熱本實從標脈浮而長從本脈沈而實陽明為病蒸蒸而熱不惡寒身熱為標病陽明本實者胃中燥鼻乾目痛為本病陽明為肌肉之本禁不可發汗在本者不禁下發之則變黄症太陽主表營衞是也營衞之下肌肉属陽明二陽并病葛根湯主之衞者桂枝營者麻黄營衞之中桂枝麻黄各半湯主之營衞之下肌肉之分者葛根湯主之又名解肌湯故陽明為肌肉之本非專於發汗止汗之治桂枝麻黄兩方互併為一方加葛根者便作葛根湯故營衞肌肉之次也桂枝芍藥生薑甘草大棗止汗有麻黄桂枝甘草發汗葛根味薄獨加一味者非發汗止汗也從葛根以解肌故名葛根湯錢仲陽制升麻湯治傷寒瘟疫風熱壯熱頭痛肢體痛瘡疹已發未發用葛根為君升麻為佐甘草芍藥安其中氣朱奉議作活人書將升麻列作陽明經解藥予胗楊氏婦陽明經標本俱實先攻其裏後瀉經絡中風熱故用升麻湯加黄連以寒治熱也尼長老陽明經標本俱虚先實其裏次行經絡故用升麻湯加附子以熱治寒也仲景乃羣方之祖信哉面上有熱毒惡瘡治以栢連散胡粉黄栢炙黄連各等分右為末面脂調敷猪脂亦好面上肺風瘡以無灰酒濃磨鹿角尖敷之指爪爬破面皮生薑自然汁調輕粉敷破處更無痕玉容散面上黑䵟雀班甘松三柰茅香各五錢白芷白薑蚕白芨白蘝白附子天花粉各一兩防風藁本零陵香各三錢肥皂二个菉豆粉一兩為極細末毎洗面用之秘方面上雀班櫻桃枝紫背浮萍白梅肉猪牙皂角等分焙乾為末每洗面時用之七八日後其班皆沒神效一方加鷹屎少許尤妙服藥在後防風通聖散風熱上攻面熱胃風湯虚風症能食麻木牙闗急搐目瞤動胃中有風熱攻面故面獨腫白芷一錢二分升麻一錢五分葛根蒼术各八分甘草三分柴胡藁本羌活黄栢各五分草荳􅅳五分蔓荆子二分麻黄八分白殭蠶三分川歸一錢五分水二鍾煎八分食逺服丹溪治一婦人面頰兩腮熱腫膈壅之病也乾葛桔梗一錢半升麻一錢蘇葉一錢半薄荷一錢甘草炙七分薑一片水煎食後服一人登厠被臭氣薰觸隱忍良久明日滿面皆黑色月餘不散相士斷云不出月外必死至期無恙拉孫召先生治教以沈檀香各一兩剉碎安爐中燒薰帳内以被葢定令病者瞑目端坐候香盡方可出帳明日引鑑照之面上黑色漸散矣頰車病平江陳氏因驚駭後常用手指甲搯住兩頰遂兩頰破損心懊憹不安脈數而實諸藥不愈用活幼口義牛黄清心涼膈丸數服如失凢伸欠頰車蹉但開不能合以酒飲之令大醉睡中吹皂角末搐其鼻􅅉透即自止東垣云咽痛頷腫脈洪大面赤者羌活勝濕湯加黄芩桔梗甘草各五分如耳鳴目黄頰頷腫頭肩臑肘臂外後亷痛面赤脈洪大者以羌活防風甘草藁本通其經血加黄連黄芩消其腫以人參黄耆益其元氣而瀉其火邪丹溪治兩腮腫用細辛草烏等分為末入蚌粉以猪脂調敷口含白梅置腮邊良久腫退出涎患立消矣消時腫必先向下濟世方治痄腮車前草栢子仁竹葉杵碎熱敷患處腮腫用赤小豆醋調敷之千金方卒中風頭面腫杵杏仁如膏敷之又方痄腮如神雞子清調赤荳末及喉下諸般腫痛用蝸牛飛麵研勻貼腫處目門生生子曰治目有專門以其㸃藥精妙及動針手法慣熟外此不過一理耳經曰目得血而能視是血不可以不養也又曰目者神之主是神不可以不安也又曰目者腎之竅是腎不可以不秘也又曰東方青色入通於肝開竅於目藏精於肝肝和則目能辨五色也又曰心合脈諸脈皆貫於目東垣曰夫五臟六腑之脈皆禀受於脾土而上貫於目脾者諸隂之首也目者血氣之宗也故脾虚則五臟之精氣皆失所司不能歸明於目矣可見五臟之精華皆輸於目而見於外足以驗夫臟腑之根於内者標本之虚實矣經云瞳子黑眼法於隂白眼赤脈法於陽故隂陽合傳於精明此則眼具隂陽也又曰五臟六腑之精氣皆上注於目而為之精精之窠為眼骨之精為瞳子筋之精為黑眼血之精為絡其窠氣之精為白眼肌肉之精為約東褁擷筋骨氣血之精而與脈并為系上属於腦後出於項中此眼具五臟六腑也後世以内外皆属心上下兩臉属脾白眼属肺黑眼属肝瞳人属腎謂之五輪葢本諸此也又有八廓之説無義無據今不得刪入焉陽主散陽虚則眼楞急而為倒睫拳毛隂主歛隂虚則瞳子散大而為目昏眼花保命集云在腑為表當除風散熱在臟為裏當養血安神如暴失明昏澁翳膜眵淚班入眼皆表也風熱也宜表散以去之如昏弱不欲視物内瞳見黑花瞳散皆裏也血少神勞腎虚也宜養血補水安神以調之除風散熱者㵼青丸主之養血安神者定志丸主之婦人地黄丸主之或有體肥氣盛風熱上行目昏澁者槐子散主之此由胸中濁氣上行也重則為痰厥亦能損目若常使胸中氣清自無此病也又有因目疾服涼藥多氣因損者久之眼漸昏弱乍明乍暗不能視物此則失血驗也地黄丸消氣定志丸相須而養之視物不明見黑花者腎氣弱也駐景丸主之或有暴失明者謂眼居諸陽交之㑹也而隂反閉之此風邪内滿當有不測之患也目閉不開者足太陽之脈為目上綱足陽明之脈為目下綱平則約束熱則筋縱故目不能為之開也治風熱之劑本事方睛痛難忍者川歸防風細辛薄荷各等分每服二錢麥門冬湯調下食後日午及夜各一服菊花散肝腎風毒氣上衝眼疼甘菊花芕莉大力子炒各一兩甘草一兩五錢為細末每服二錢槐子散體肥氣盛風熱上行目昏澁槐子黄芩木賊蒼术各等分為細末食後茶調下川芎散風熱目眩熱腫胸中不利川芎槐子各一兩為末氣滯下利薑湯調目疾茶清調熱上攻水煎服潔古方治赤暴發腫散熱飲子防風羌活黄芩各一兩黄連一兩每服五錢水二盞煎温服如大便秘加大黄一兩如痛甚加川歸地黄煩躁不得卧加梔子一兩洗肝散風毒上攻赤目腫痛難開癮澁眵淚薄荷葉川歸防風羌活甘草炙梔子大黄川芎各等分為末每服二錢熱水調服養血和血䟱風之劑龍膽湯目暴赤雲翳疼痛不可忍者四物湯各五錢羌活防風各三錢龍膽草防已各二錢益氣聰明湯飲食不節勞傷形體脾胃不足内障耳鳴或多年視物昏暗令目廣大久服無内障耳鳴耳聾之患又令精神倍常飲食加倍身體輕徤耳目聰明黄耆五錢甘草炙六錢人參五錢葛根升麻三錢白芍黄栢酒洗四次炒各一兩蔓荆子一錢半每服五錢水煎卧時熱服五更再煎服之得睡更妙如煩亂或有熱春月漸加黄栢夏月倍之如脾胃弱去之熱減少用但有熱或麻木或上壅頭目三兩服後其熱皆除又治老人腰以下沈重疼痛此藥久服治人上身反有精神兩足輕浮不知髙下空心服之少加黄栢輕浮自減小兒減服多則壅滿若治倒睫去黄栢芍藥忌烟火酸物地黄丸眼小昏澁因發而久不能瘥防風羌活當歸地黄人參茯苓黄芩黄連各等分毎服五七錢水煎温服東垣助陽和血補氣湯眼赤熱壅白睛紅眵淚不疼痛惟隱澁難開此服寒藥太過而真氣不能通九竅也故眼昏不明防風七分黄耆一錢甘草炙蔓荆子五分歸身五分白芷二分柴胡升麻各七分水鍾半煎一鍾臨卧時服避風及忌食冷物補氣血之劑丹溪方治勞力後兩眼上星右眼獨昏此熱傷血也白术當歸生地木通黄連酒浸黄芩酒浸炒黄栢炒各二兩甘草炙四錢分三帖水煎服大熱加白芍藥倒睫拳毛其毛入眼中央是也防風飲子黄連炒甘草炙人參各一錢歸身一錢五分葛根防風各五分細辛葉蔓荆子各三分水煎臨卧温服連翹飲子目中溜火惡日與火隱澁小角偏𦂳久視昏花迎風有淚蔓荆子甘草連翹人參紅葵花生地當歸身各三錢酒芩防風羌活黄耆各五分升麻一錢柴胡二分水煎稍熱服前方治倒睫拳毛此方治眼楞𦂳急縮小者即倒睫拳毛之漸也葢陽虚則眼楞𦂳急隂虚則瞳子散大故東垣治眼楞𦂳用參耆補氣為君佐以辛味䟱散之而忌芍藥五味之酸收也治瞳子散大用地黄補血為君佐以酸味收歛之而忌茺蔚子青葙子之辛散一開一闔大有徑庭矣外障經云目痛赤脈從上下者太陽病從下上者陽明病從外走内者少陽病凢赤脈翳初從上而下者属太陽以其主表其病必連眉稜骨痛或腦項痛或半邊頭腫治法宜温之散之如簡要夏枯草散東垣選竒湯之類簡要夏枯草散目珠痛至夜則痛甚或用苦寒眼藥㸃上反疼甚者神效葢目珠者連目本目系属厥隂經夜疼甚及苦寒㸃之反甚者夜與寒皆隂故也丹溪謂夏枯草禀純陽之氣故治厥隂目疼如神又治眉稜骨痛目翳從上下者累效治翳必與退雲丸相兼服尤妙夏枯草香附子各二兩甘草四錢右為細末每服一錢五分茶清調下纔下咽即痛減東垣選竒湯眉稜骨痛目醫從上下者尤妙防風羌活各三分甘草三錢夏月生用酒芩一錢冬不用如能食及熱痛加之分作三服水煎食後稍熱服當徐徐服之羊肝丸目翳從下上者從内眥出外者神效又補肝氣虚弱羯羊肝一具新瓦盆中煿了焙之肝若大只用一半甘菊羌活栢子仁細辛官桂白术黄連一兩半五味子五錢煉蜜為丸桐子大空心温湯下三十丸東垣神仙退雲丸一切翳暈内外脹昏無睛者累效又治翳從外眥入内此為少陽主於半表裏也宜和解之此方神妙川芎川歸各一兩半犀角酒洗枳實川楝子蟬螁甘菊各六錢薄荷葉不見火𤓰婁仁生者各六錢蛇螁蜜蒙花荆芥穗各二錢此三味與甘草同焙乾去甘草不用地骨皮白芕莉炒去刺羌活生地酒洗焙乾各一錢木賊一兩半去莭童便浸一夜焙乾為細末煉蜜丸每一兩分作十丸米湯調服日進二三丸食後服婦人當歸湯有氣者木香湯下在人消息之内障内障者在睛裏昏暗與無患之人相似惟瞳人裏有隱隱青白者無隱隱青白者亦有之人卒然目無精光者此陽氣太虛也丹溪治一人目忽不見物他無所苦起坐飲食如故此氣虚也急煎人參膏與之服二日目方見他醫與青礞石藥予曰今夜死矣已而果然又一人生平好飲熱酒忽目瞑脈澁此因熱酒所傷胃氣汚濁之血死在其中而然也遂以蘇木作湯調人參膏與之服二日鼻内及手掌皆紫黑余曰此病退矣滯血已行乃與四物加蘇木桃仁紅花陳皮煎調人參末服數日而愈又一男子五十五歲九月間早起忽開目無光視物不見急就睡片時却能見人竟不能辨其何人何物飲食減半神息極倦脈之緩大四至之上重按則散而無力余作受濕治詢之果因卧濕地上半箇月遂得此症用白术為君黄耆茯苓陳皮為臣附子為佐十餘帖而愈右三方治目不明皆為陽虚氣脱而用補氣之藥追回者也經云上焦開發宣五穀味薰膚充身澤毛若霧露之溉是謂氣又曰五氣入鼻藏於心肺上使五色脩明聲音能彰今氣既脱宜乎目之不明也東垣人參補胃湯勞役飲食不節内障神效黄耆人參各一兩甘草炙八錢蔓荆子二錢白芍三錢黄栢三錢酒㳯四次炒四次每服五錢水一大盞煎七分稍熱服三五服兩眼廣大視物如常惟覺兩脚踏地不知髙下火體升發故也病減住服七日再服此藥冝春間服之補隂血之劑復明散治内障黄耆一錢半川芎五分柴胡連翹甘草生地各一錢歸身二錢蒼术五分陳皮五分黄栢水二鍾煎至一鍾食後稍熱服忌濕麵及大辛熱之物熟地黄丸血弱氣虚不能養心致火旺於隂分瞳子散大風熱上攻頭目遍頭腫悶視物昏花法當養血涼血收歛散火而風熱自除矣地黄一兩歸身五錢柴胡八錢天門冬地骨皮五味子黄連各三錢生地酒洗八錢黄芩五錢枳殻炒人參甘草炙各二錢煉蜜丸如菉荳大每服百丸茶湯下食後服日服二次大忌辛辣物而助火又忌寒涼物以損胃氣則藥不上行也瞳子散大亦有因食辛熱及煿炙助火之物積於胸中火旺則精散則視物亦大矣益隂腎氣丸此壯水之主以鎮陽光也山茱茰一兩茯苓二錢半五味子五錢熟地二兩山藥五錢澤㵼二錢半牡丹皮五錢生地一兩酒洗歸身五錢為末蜜丸桐子大硃砂為衣毎服五七十丸淡鹽湯送下寳鑑甘菊丸男子腎虚眼目昏暗或見黑花常服明目暖水臟活血駐顔壯筋骨甘菊花熟地各二兩枸杞四兩山藥五錢煉蜜丸如梧桐子大每服三四十丸空心食後服百㸃膏眼翳遮瞳人視物不明如覺雲氣障蔽川歸六分黄連二錢水一碗煎至半碗再入後藥甘草稍六分防風八分㽔仁去皮尖三分右除㽔仁另研外同熬滴入水中不散去渣入好蜜少許再煎少時為度極要病人心静㸃之至目㣲痛為度一日五六次臨卧㸃之尤妙名百㸃膏欲頻㸃之使藥力相續也寳鑑還睛散努肉攀睛翳膜昏澁川芎龍膽草草决明石决明枳實野菊花野麻子白茯苓炙甘草蒺莉川椒炒去核仙靈脾荆芥木賊茵陳已上各一兩為末毎服二錢食後茶清調下一日三服忌魚肉及熱麵蕎麥等物一方有楮實子無仙靈枳實二味滋隂地黄丸瞳子散大黄睛視物無的或卒然見非常之處熟地一兩生地一兩半柴胡八錢天門冬甘草枳殻各三錢人參地骨皮各二錢五味子黄連各三錢黄芩歸身各五錢蜜丸菉荳大毎服百丸温茶清送下日進二次此補左腎之藥也駐景丸肝腎氣虚面目昏暗視物不明車前子五味子枸杞子各二兩熟地當歸各五兩楮實子川椒炒各一兩兔絲子酒浸製半觔為末蜜丸如梧桐子大每服三十丸食前温酒下菊睛丸肝腎不足眼目昏暗常見黑花多泪補右腎不足枸杞子三兩蓯蓉酒浸炒巴㦸各一兩甘菊蜜丸如桐子大每服五十丸食後酒鹽湯任下煮肝散治雀目青蛤粉夜明砂穀精草各等分右細末每五七錢入猪肝内煮熟細嚼茶清送下鼻門東垣曰金匱真言論云西方白色入通於肺開竅於鼻藏精於肺夫十二經脈三百六十五絡其氣血皆上升於面而走空竅其宗氣出於鼻而為臭難經云肺氣通於鼻肺和則鼻知香臭矣夫謂陽氣宗氣者皆胃中生發之氣也其名雖異其理則一若因飢飽勞役損傷脾胃生發之氣弱則營運之氣不能上升邪塞孔竅故鼻不利而不聞香臭也宜養胃實營氣陽氣宗氣上升鼻管則通矣又一説難經云心主五臭肺主諸氣鼻者肺竅也反聞香臭者何也葢以竅言之肺也以用言之心也因衞氣失守寒邪客於頭面鼻亦受之不能為用是不聞香臭矣經云五氣入鼻藏於心肺心肺有病而鼻為之不利也潔古曰視聽明而清涼香臭辨而温煖治法宜先散寒邪後補胃氣使心肺之氣得以交通則鼻利而香聞矣麗澤通氣散鼻不聞香臭羌活獨活防風升麻葛根各二錢麻黄一錢不去節冬月加之蒼术三錢川椒一錢白芷黄耆各四錢炙甘草二錢右每服一兩水二鍾生薑三片棗二枚葱白三寸煎至一鍾稍熱服行坐之間宜避風寒温肺湯鼻不聞香臭升麻黄耆各二錢葛根羌活甘草防風各一錢麻黄不去節四錢丁香一分右作二服水二大鍾葱白三根煎至一鍾稍熱服治鼻不聞香臭多年不愈者皆效生葱分作三段早用葱白午用中段晩用葱末段塞入鼻中令氣透方效出本事方陳無澤通草散鼻塞不通不聞香臭并鼻塞肉通草細辛附子各等分為末蜜和綿褁少許納入鼻内丹溪曰鼻為肺之竅因心肺上病而不利有寒有熱寒傷皮毛熱壅清道氣為之不利寒則表之熱則芩連又曰面皮紫黑面為陽中之陽鼻居面中一身之血運至面鼻皆為至清至精之血多酒之人酒氣薫蒸熱血得冷則凝汚而不行故血紫黑治宜化滯血生新血四物湯加酒芩紅花酒拌又加茯苓陳皮甘草生薑煎調五靈脂末服氣弱加黄耆酒浸酒齄鼻治法亦然陳無擇曰鼻頭白者亡血也赤者熱血也粉黄散肺熱赤瘰俗曰酒齄鼻硫黄入蘿蔔内糠火煨一宿取出加輕粉烏頭尖各少許為末以酥油調不時敷鼻瘜肉濟世方云瘜肉因胃中有食積熱痰流注宜治其本消痰積是也蝴蝶礬二錢細辛一錢白芷五分右為末以舊綿裹藥納鼻中頻頻換又方蝴蝶礬三分虢丹一分細辛一錢照此法塞鼻三因方單用枯礬末面脂用綿裹少許納鼻中數換瘜肉與藥消落細辛白芷甘草加消痰積之藥服之為效辛荑膏鼻生塞肉窒塞不通有時疼痛辛荑葉二兩細辛木通木香白芷杏仁湯泡去皮尖各五錢右用羊髓猪脂二兩和藥於石器内慢火熬成膏取赤黄色於冷水入龍腦射香各一錢為丸綿裹入鼻中數日脱落良愈此方有理羅太無輕黄散瘜肉輕粉杏仁去皮尖一錢雄黄五錢麝香少許右四味各為細末先用杏仁研如泥後入雄黄麝香同研極細磁器收勿走氣不拘逺近夜卧用筯頭㸃粳米大在鼻中瘜肉上隔一日夜一次半月見效又方𤓰蒂細辛各等分右為細末以綿包如荳許塞鼻中須臾即通有人患瘜肉垂出鼻外用此藥則化為黄水㸃滴至盡三四日愈聖惠方單用陳𤓰蒂以羊脂和傅上日三次效濟世方久患鼻瘡膿極臭者用百草霜研末冷水調服三錢鼻鼽鼻淵或問生生子曰汪石山醫案載鼻流濁涕症條云後見數人亦皆不治今人尚有治之而愈者吾竊疑焉或生或死其故何也意者猶治之未工耶抑猶有可生者而石山之忽耶願吾子悉以曉我予曰石山先生之學出於儒而述吾醫宗之大成者豈有此治而未工耶原其意或謂病之深者言也若特由今之可治而愈者石山又豈少略之耶或曰何如而深之不治也予曰易云大哉乾元萬物資始至哉坤元萬物資生夫謂坤元者人之胃氣是也經曰營者水榖之精氣衞者水榖之悍氣皆藉胃氣以為養人之所以運動升降不息不死者賴此營於中衞於外而胃氣以為之樞也胃氣者榖氣也故經曰飲食入胃遊溢精氣上輸於脾脾氣散精上輸於肺通調水道下輸膀胱水精四布五經並行五臟隂陽揆度以為常也又曰五味入口藏於腸胃以養五氣氣和而生津液相成神乃自生即是而知人之不死者賴胃氣上升變化氣血以養五臟之神然後精明察色聽聲辨味剖臭而九竅有所用矣一出一入一升一降一呼一吸略不少間今鼻流濁涕者必腎隂虛而不能納氣歸元故火無所畏上迫肺金由是津液之氣不得降下并於空竅轉濁為涕而為逆流矣由此腎肝愈虚則有升而無降有陽而無隂也經曰出入廢則神機化滅升降息則氣力孤危是時也仍不能杜謀慮絶作巧塞視聽以無源之腎肝而日勞此三者又將何藉而以濟其運用耶隂虚則病隂絶則死良以此夫或曰誠如是又何治之而猶有愈者予曰此必治之早者也戒怒以養陽絶慾以養隂斷煿炙逺酒麵以防作熱然後假之以良醫保肺為君開鬱順氣為臣補隂養血為佐俾火息金清降令胥行氣暢鬱分清竅無壅陽開隂闔相依相附臟腑各司乃職升降不匱是自慎以培其根藥餌以却其病間有可愈者苟或驕恣不慎與夫委醫於隂絶源涸之後雖倉扁亦不能使其生又何石山之致疑焉腦漏散鼻流清濁涕積年不愈川芎荆芥防風乾薑白芷甘松各一兩羌活甘草各半兩為末毎服二錢食後茶清下葱附丸肺寒腦冷鼻流清涕川附子去皮生用一枚細辛半兩葱汁打糊為丸如梧桐子大每服十四丸薑蘇湯下川烏散治腦漏防風細辛白附子茯苓川烏菖蒲乾薑白芷川芎甘草節各等分為末每服三錢嚼生葱白湯調下芎犀丸偏正頭疼及一邊不聞香臭常流清涕或作臭氣一陣及噴啑稠膿川芎硃砂研内一兩為衣石膏研薄荷各四兩人參茯苓甘草炙細辛各二兩犀角生用鎊梔子各一兩阿膠蛤粉炒一兩半麥冬去心三兩為末煉蜜丸如彈子大用硃砂為衣每服一丸或二丸食後茶清任下腦漏有老人腎經虚寒使然者用八味丸及煖腎之劑而愈黑附子炮去皮川芎細辛呉茱茰乾薑各五錢桂心一兩皂角屑五錢右將猪脂六兩煎油先一宿以醋浸前藥取入猪脂内同煎以附子黄色為度用綿蘸藥塞鼻中瘥耳門耳聾耳鳴經曰耳者腎之竅也腎主藏精者也故精脱者則耳聾以腎藏精而氣通于耳耳者宗脈之所聚也保命集云以竅言之水也以聲言之金也以經言之手足少陽俱㑹其中也有從内不能聽者主也有從外不能入者經也腎和則能聞五音矣羅謙甫以精脱耳聾之候為顴頰色黑也耳聾少氣嗌乾者肺虚也東垣曰頭痛耳鳴九竅不利腸胃之所生也腸胃不足故氣弱不充傷寒及大病之後多有此症以補中益氣湯治之耳聾多恐者肝虚也經云肝虚則目􅍃􅍃無所見耳無所聞善恐治法用四物湯加防風羌活柴胡菖蒲茯神等分煎湯服二十餘帖然後却以杜壬薑蝎散開之本草云肝虚則生薑補之是也丹溪曰大病後耳聾須用補隂降火有隂虚火動而聾者宜四物湯加黄栢之類生生子曰大病後則氣血俱虚然必胗兩手之脈孰勝而為之治斯無弊矣若脈大而無力或右手細小沈弱者皆陽氣大虚也正宜甘溫之劑倣陽生隂長之義少加血藥佐之可也若純視為隂虚而用滋隂降火之劑則陽氣愈弱而犯東垣伐生生之戒非惟耳聾不痊而反増惡心胸滿泄瀉之患矣若獨以隂虚火動而用滋隂降火者此正治法也予又何敢言氣逆耳聾有三肝與手太陽少陽也經云肝氣逆則頭痛耳聾不聰頰腫又云太陽所謂浮為聾者皆在氣也羅謙甫云手太陽氣厥而耳聾者其候聾而耳内氣滿也手少陽氣厥而耳聾者其候耳内渾渾焞焞此皆氣逆而聾也治法宜四物湯吞龍㑹丸降火及復元通氣散調氣散是也丹溪治法痰火風熱者滚痰丸通聖散之類聾病必用四物龍㑹養隂亦有濕熱痰者㯽榔神芎丸耳中閧閧然亦是隂虚凡臟氣逆而為厥聾必有眩昏之症風聾必有頭痛之症勞役傷其氣血淫慾耗其精元昏昏瞶瞶是謂勞聾必有虚損之症其聲嘈嘈眼見黑花此虚聾也劉宗厚曰凢耳鳴症或如蟬噪之聲或如鐘鼓之響或是閉塞此是痰火上升鬱於耳中而為鳴鬱甚則壅閉矣治宜清痰降火又有因大怒而得宜順氣聰耳湯有因於風而得其鳴如輪車閧然或氣掉眩宜袪風芎芷散熱則加酒芩連喬有腎虚鳴者其鳴不甚宜滋腎丸虎潛丸大補隂丸八物湯加黄栢知母肝火動者當歸龍㑹丸飲酒人宜木香㯽榔丸素問金匱真言論南方赤色入通于心開竅于耳藏精于心此又耳為心之竅也素問脈解篇曰陽氣萬物盛上而躍故耳鳴也益氣聰耳湯飢飽勞役脾胃不足得耳聾之患柴胡升麻蔓荆子葛根各一錢半人參黄耆甘草各二錢黄栢芍藥水二鍾煎八分食逺服清神散頭目不清耳常重聽甘菊花白殭蠶各五錢羌活荆芥穗木通川芎各四兩木香防風各三錢石菖蒲四錢甘草二錢為末每服三錢茶清調下通氣散氣閉耳聾木通木香枳殻菖蒲各五錢川芎柴胡陳皮各二錢白芷羌活殭蠶炒全蝎蟬螁各二錢甘草錢半穿山甲炮三錢為末每服三錢酒調下荆芥散風熱上壅耳閉或耳鳴及出膿防風荆芥升麻甘菊木通黄芩炒羌活甘草蔓荆子水煎服寳鑑薑蝎散耳聾因腎虚所致十年内一服愈乾蝎四十九个去蠆洗焙去風熱生薑切片如蝎大四十九片開痰二味銀石器内炒至乾為末向晩勿食夜卧至二更時以酒調服徐徐服盡盡量飲至五更時耳中聞百攅笙响便自此有聞一法五更濃煎葱白湯一盞服先三日服黑錫丹效又蝎先用糯米半升同炒又用薑四十九片放蝎上同炒去米薑不用只用蝎寳鑑犀角湯風毒壅熱胸心痰滯兩耳虚聾頭重目眩神效犀角屑甘菊花前胡枳殻炒菖蒲羌活澤瀉木通生地各五錢麥冬二兩甘草炙一錢右為末每服三錢水煎食後温服茯神散上焦風熱耳或聾或鳴四肢滿急昏悶不利茯神一兩羌活柴胡蔓荆子薏苡仁防風菖蒲五味黄耆各五錢麥冬一兩甘草炙薄荷各三錢為末每服三錢入生薑三片煎至五分食後温服地黄湯因瘡毒後腎經熱右耳聽事不真每心中拂意則轉覺重虛鳴疼痛生地一兩半枳殻羌活桑白皮一兩甘草防風黄芩木通各五錢磁石搗碎水淘二三十次去盡赤汁為度二兩為粗末每服四錢用水煎去渣日三服不拘時候寳鑑蠟彈丸耳虛聾白茯苓二兩山藥炒三兩杏仁炒一兩半去皮尖三味研末和勻用黄蠟十兩熔化為丸如彈子大鹽湯嚼下有人止以黄蠟細嚼㸃好建茶送下亦効山藥茯苓杏仁皆属于太陽山藥大補隂氣惟杏仁利氣乃補中有通也少氣嗌乾者門冬五味人參湯嚼下多飲酒人耳鳴木香㯽榔丸加枳殻柴胡大黄甘草南星桔梗青皮荆芥不愈四物湯耳鳴必用當歸龍㑹丸氣實者神芎丸加㯽榔一兩下之耳濕腫痛涼隔散加酒炒大黄半兩酒浸黄芩防風荆芥羌活外以桑螵蛸一個炙存性麝香二分枯凢胭脂俱為末摻之耳腫痛丹溪治耳腫痛黄水出而臭桔梗麻黄羌活大黄酒炒三錢木通甘草茯苓一錢半分三帖熱服寳鑑解熱飲子氣虚熱壅耳内聾閉徹痛膿血赤芍白芍各五錢川歸甘草炙大黄蒸木鼈子每服四五錢水一盞煎七分食後卧時服詳此方乃清涼飲子加木鼈子也濟世方䁎耳膿不止陳皮燈上燒灰為末麝香少許二味和勻每用少許先用綿拭耳中膿淨却上藥又方杏仁泥治耳中病及有水出杏仁炒令黑為末葱涎搜和如棗核大綿包塞耳復元通氣散諸氣澁耳聾腹癰便􅏴瘡疽無頭止痛消腫青皮陳皮去白四兩甘草三寸半炙連翹一兩為末熱酒調下治耳作痛不可忍者用磨刀鐵漿滴入耳中即愈屢用屢驗生生子曰治耳聾之症多不獲捷效者其故有三皆人自不攝養也不禁慾不戒性不戒酒及煿炙厚味以故服藥罔效也慾傷精精脱則耳聾怒則氣逆氣逆則厥厥氣相摶故為氣聾酒性大熱助火消隂煿炙厚味皆助火生痰者痰火上壅清竅閉塞鬱而為熱熱久則潰而為膿亦有燥火旺不作膿而成乾膜盯矃之類聀皆由于人之自索予故書于方末庶病者知有所警焉口門生生子曰經云脾開竅於口藏精於脾脾和則口能知五味矣此脾之所主於口也又曰胃足陽明之脈挾口下交承漿又云手陽明大腸之脈挾口交人中此二陽所挾於口也又曰有病口苦名曰膽痺葢肝主謀慮膽主决斷為清淨之府是以事事皆取决於膽也膽或不决為之恚怒則氣上逆膽汁上溢故口苦或熱甚而使然也東垣曰内經云膀胱移熱於小腸膈腸不便上為口糜好飲酒人多有此疾易老用五苓散導赤散相合服之神效劉河間曰肝熱則口酸心熱則口苦脾熱則口乾肺熱則口辛腎熱則口醎胃熱則口淡或曰口臭者亦胃熱為之生生子曰口者五臟六腑所貫通也為脾之竅臟腑之氣皆由此出入若户門也難經謂唇為飛門齒為户門㑹厭為吸門義本諸此故臟腑有偏勝之疾則口有偏勝之症也肝熱口酸者用小柴胡湯加黄連呉茱茰青皮甚者當歸龍㑹丸心熱口苦或口舌生瘡者黄連瀉心湯涼膈散脾熱口乾者三黄丸瀉黄丸肺熱口辛者甘桔湯瀉白散加前胡山梔腎熱口醎者滋腎丸大補隂丸滋隂降火湯胃熱口淡者清胃散加石膏有謀慮不决肝移熱於膽而口苦者用益膽湯加柴胡龍膽草或龍膽瀉肝湯有脾胃氣弱木乗土位而口酸者用伐肝補脾湯有膀胱移熱於小腸而口糜潰爛者用柴胡地骨散實者大黄朴硝以利之或導赤五苓加黄連兼服大抵口舌生瘡初起不可便用涼藥敷摻恐寒凝不消久而難愈必須先用辛輕升散之劑而後清涼或視其所因而分治之或有中氣不足致虚陽口瘡者又當從理中湯加附子治之此又不可不知也升麻散上膈熱壅口舌生瘡先用此升發升麻一兩半赤芍藥人參桔梗葛根薄荷防風各一錢甘草五分薑一片水煎食後服三黄丸三焦實熱黄芩春四兩夏秋六兩冬三兩黄連春四兩夏五兩秋三兩冬三兩大黄春三兩夏一兩秋二兩冬五兩為末煉蜜丸梧桐子大每服百丸食逺白湯送下加味龍膽瀉肝湯膽痺口苦柴胡一錢黄芩七分生甘草人參黄連天門冬膽草山梔各五分五味子七粒麥冬知母各五分水煎服忌辛熱物大効移熱湯治口糜即五苓散合導赤散胡黄連散口糜胡黄連五分藿香一錢細辛二錢黄連三錢為末每用五分乾摻口内漱而吐之加味甘露飲男婦小兒胃經客熱口臭牙宣赤眼口瘡一切疼痛及上焦消渴喉腥等症丹溪云此心肺胃藥也熟地生地天冬麥冬枇杷葉去毛黄芩各一兩茵陳枳殻石斛甘草各一兩犀角三錢為粗末每服三五錢水煎食後臨卧温服此方得自一品之家其間加犀角一味尤為有理百發百中香薷湯口臭香薷一把煎濃湯稍稍含之丹溪云香薷能治口臭寳鑑瀉白散治肺熱喉腥一人膏粱而飲因勞心過度肺氣有傷以致氣出腥臭涕唾調粘咽嗌不利口苦乾燥以加減瀉白散治之良愈桑白皮三錢地骨皮甘草炙各一錢半知母七分黄芩五分五味子三十粒麥冬五分桔梗二錢作一服水二大鍾煎一鍾食後服日進二次張子和云一人年二十餘歲病口中氣出臭如登厠雖親戚莫肯對語戴人曰肺金本主腥金為火所乗火主臭應便如是久則成腐腐者腎也此亢極則反兼水化病在上冝湧之以茶調散湧去其七夜以舟車丸濬川丸五七行比旦而臭斷黄連升麻湯口舌生瘡升麻一錢半黄連三錢為細末綿裹入口内含津液嚥下衍義栢皮散川栢蜜炙為末一分青黛一分研勻入生龍腦一字研勻治心脾熱舌頰生瘡摻上有涎即吐之治口瘡砂仁火煅存性為末摻上即愈又方㯽榔火煅存性為末入輕粉𫝊之又方取桑樹汁先以髪拭口即以汁𫝊之東垣化毒法凢口瘡無論新舊遇夜卧將自己兩腎丸以手攊𦂳左右交手揉三五十度但遇夜睡覺行之如此三五度良愈因酒而生者一夜愈久病諸口瘡三二夜愈如鼻流清涕惡寒者攊二腎丸向上揉之數夜可愈益膽湯黄芩甘草炙人參各一錢官桂苦參酒炒茯苓各五分逺志八分水煎食逺服伐肝補脾湯黄連一錢二分芍藥柴胡各一錢青皮八分白术一錢半人參八分白茯苓一錢甘草炙五分水煎食前服柴胡地骨散柴胡地骨皮各五分水煎食逺温服赴筵散細辛黄栢炒各等分為末摻患處吐涎乃愈瀉白散滋腎丸滋陰降火湯俱見火門大補陰丸見虚損清胃散方見牙門治口瘡黄栢炙同細辛各二錢研極細傳之噙少時當即滿口有涎吐之少刻又𫝊又噙如是五七次立愈綠袍散大人小兒口瘡多不效者黄栢四兩甘草炙一兩青黛一兩右先取二味為末入青黛同研勻乾貼五倍子治口瘡以末搽之便可飲食治口瘡以膽礬一塊用百沸湯泡開含潄一夕可瘥八分治口瘡以好墨研螻蛄極細傅之立效胡氏方螻蛄走小腸膀胱其効甚捷因力峻氣猛隂虚氣上致瘡者戒用惟體實有熱在上焦者用之内府治口臭方連翹為末糊丸食蒜韮之後茶吞二三錢口中濁氣化為清氣妙絶治少陽口瘡半夏散聲絶不出者是寒遏截陽氣不伸半夏製一兩桂烏頭各一字同煎一盞分作二服治太隂口瘡甘礬散以甘草二寸白礬栗子大含化咽津治赤口瘡乳香散以乳香沒藥各一錢白礬半錢銅綠少許研為末摻之治白口瘡沒藥散以乳香沒藥雄黄各一錢輕粉半錢巴荳霜少許為末摻之紅芍藥散心痛口瘡紫桔紅蒼三錢四兩五服安康右件紫苑桔梗紅芍藥蒼术各等分為細末羊肝四兩批開摻藥末三錢用麻扎定火内燒令熟空心食之大效白湯送下小兒口瘡遍白者及風疳瘡蝕透者以白殭蠶洗淨炒令黄色為末用蜜和𫝊之立效多效散治唇𦂳瘡及疹訶子肉五倍子各等分為細末乾貼上效唇上生瘡用白梅瓣貼之神效如開裂出血者即止唇𦂳燥裂生瘡以青皮燒灰猪脂調塗唇六腑之華在唇經云脾胃大腸小腸三焦膀胱者倉廩之本營之居也其華在唇四白肝脈督脈衝脈任脈皆絡唇者也一有受邪則唇亦為之病風則動寒則𦂳燥則乾裂氣鬱則生瘡血少則澁而無血色治法内理脾胃外敷以藥無不愈矣又傷寒狐惑上唇生瘡䖝食其臟下唇有瘡䖝食其肛皆當以類而推大抵與口病相須而治也唇瘡以甑上滴下汁傅之屢效舌門生生子曰經云舌乃心之苗葢以心為根蒂也心為一身之君主則又為一身之根蒂而舌又為一身之苗也故傷寒一科每每倚舌為寳鑑以驗表裏臟腑虚實生死敖氏之金鏡録是也經曰心脈系舌本脾脈絡舌旁繫舌下故舌病多二經之所致也心熱則生瘡脾熱則强硬滑胎舌尖腫脹叠厚為重舌舌腫硬而不柔和挺然脹滿或出口者為木舌乃二經之火上壅急以針砭刺出毒血以殺其標然後以瀉心脾之藥治其本可也然不獨心脾之經肝脈亦絡舌本故傷寒邪熱傳至厥隂經則舌卷囊縮除此之外大槩口舌之病皆相近治法亦不甚外當與口部相叅施治則盡其用矣順氣豁痰湯舌痺或麻此因痰氣滯于心胞絡半夏用白礬生薑皂角煮過一錢半茯苓橘紅𤓰蔞去油貝母黄連桔梗枳殻各一錢香附童便浸七分甘草四分薑三片水煎服𤣥參升麻湯心脾壅熱舌上生瘡木舌舌腫或連頰項兩邊腫痛𤣥參升麻生犀角鎊為末赤芍藥桔梗貫衆黄芩各一錢甘草七分水煎服大便秘結加大黄二錢舌無故自痺者不可作風熱治由心血不足用理中湯合四物湯治之昔有人舌上生瘡久蝕成穴累服涼藥不效此亦下元虛寒以致虚火不降投養正丹遂得愈舌上血出不止名曰舌衂詳在血門血虚舌麻者四物湯加黄連舌出口數寸以氷片為末敷愈舌脹滿口不能發聲者蒲黄敷愈舌腫脹口不能開合以萆麻子綿紙取去油就將此紙作撚燈上㸃著吹滅將烟薫之良久則消已上三條皆出醫説齒門生生子曰齒者骨之餘腎之標寄于齦養于氣血上齦属足陽明胃下齦属手陽明大腸是知齒者骨也本乎乾元以資始也齦者肉也本乎坤元以資生也譬之木生于土就藉土以為養也若動搖脱落乃腎之本虛以致標亦虚至于生䖝浮腫牙宣出血臭穢腐爛者腸胃濕熱壅盛也虚者補之濕熱者㵼之清之外以末藥擦之如風寒外束者解散之除腎氣虚衰精元不固齒無所養浮豁不堅隱隱而痛外其餘腫爛出血生䖝等症皆腸胃之疾甚而齗爛齒落者猶土崩而木倒也其治在齗齗堅則齒自固矣大補隂丸滋隂降火湯六味地黄九皆治隂虛火動牙痛不堅牢而脱落者方見虚損門清胃散胃熱及食辛熱之物致使上下牙痛牽引頭腦面熱齒惡熱者當歸生地黄連各八分升麻三錢牡丹皮一錢五分水二鍾煎八分食後服頭腦痛加川芎八分甚者加石膏白芷定痛羌活湯風熱攻注牙根腫痛羌活防風川芎生地各一錢升麻一錢二分細辛荆芥獨活薄荷各六分石膏二錢甘草五分水煎食後服惡熱飲者加龍膽草酒洗一錢半惡風作痛加白豆蔲黄連各五分濕熱甚者加黄連一錢山梔一錢安腎丸腎虚牙齒豁落隱痛久服固精補陽青鹽炒補骨脂鹽水炒山藥石斛白茯苓兔絲子酒炒巴㦸去心杜仲薑汁炒各一兩肉蓯蓉酒浸白蒺藜炒各二兩右煉蜜丸梧桐子大每服七八十丸空心淡鹽湯下經驗石膏湯胃有實熱牙痛或上牙腫痛升麻知母各一錢石膏一錢半大黄酒蒸二錢山枝薄荷茯苓連翹各八分朴硝六分甘草五分水煎食逺服頻頻口嚥即愈百效湯腸胃壅熱風熱牙齦腫痛頰車皆腫升麻葛根白芷酒芩桔梗各一錢防風薄荷各五分石膏三錢甘草六分天花粉八分細辛四分薑三片水煎食後頻頻少服之頭疼及項頸痛者加羌活一錢發寒熱者加柴胡一錢屢效擦牙定痛散一切牙痛風熱腫痛薄荷葉天花粉樟腦各等分右為細末擦患處効止痛方牙疼并齦腫痛將軍一兩川椒胡椒樟腦各三錢右為末不時擦之吐去苦水為美氣虚牙痛者脾胃不足或服寒涼藥過多抑遏陽氣於脾土之中身反發熱者當以補中益氣湯或調中益氣湯火鬱湯消息治之牙痛方猪蹄甲入鹽填滿火煆焦為末擦上立愈又方乾茄蒂為末搽上效咽喉門經云一陽一隂結謂之喉痺一隂乃手厥隂心包絡之脈一陽乃手少陽三焦之脈二脈並絡于喉氣熱内結故為喉痺喉主天氣咽主地氣地氣通于嗌嗌即咽之低處也咽喉者水榖之道路也喉嚨者氣之所以上下者也㑹厭者聲音之户也懸癰者音聲之闗也張子和云咽與喉㑹厭與舌此四者同在一門而其用各異喉以納氣故喉氣通于天咽以納食故咽氣通于地㑹厭管乎其上以開闢掩其喉則其食下不掩之其喉錯必舌抵上齶則㑹厭能閉其喉矣四者交相為用闕一則飲食廢而死矣生生子曰經云喉痺者謂喉中呼吸不通言語不出而天氣閉塞也云咽痛者云嗌痛者謂咽喉不能納唾與食而地氣閉也云喉痺咽嗌痛者謂咽喉諸病天地之氣並閉塞也葢病喉痺者必兼咽嗌痛病咽嗌痛不能兼喉痺也今喉咽俱病方並入喉痺門中實鑑荆芥湯咽喉腫痛語聲不出嚥之痛甚荆芥五錢桔梗二兩甘草一兩毎服四五錢水煎食後温服按此即甘桔湯也海藏云治咽痛以甘桔湯加大力子竹茹妙本事方治中風急喉痺欲死者白殭蠶為極細末生薑自然汁調下喉愈寳鑑馬鞭散喉痺咽腫連頰吐氣數者馬鞭草本草云味辛涼破血主癥瘕血癖通月經搗自然汁嚥一合許即愈孫召先生方治急喉閉猪牙皂角白礬黄連各等分新瓦上焙乾為末每用五分吹入喉中吐出膿血立愈急喉痺其聲如鼾有如痰在喉中響者此為肺絶之候速宜人參膏救之用竹瀝薑汁調下獨參湯亦可若服之早者十全七八次則十全三四遲則十不救一也丹溪曰喉痛并瘡多属虚火遊行無制用人參黄栢蜜炙荆芥氣虚人參竹瀝血虚四物竹瀝咽喉燥痛四物湯加桔梗荆芥黄栢知母立止喉舌之疾皆属火熱雖有數種之名輕重之異乃火之㣲甚故也㣲而輕者可以緩治甚而重者惟用針砭刺血最為上䇿治喉痺用青艾汁灌下愈喉痛必用荆芥隂火炎上必用𤣥參又方茜草根一兩一服此所謂治血中之火也咽中瘡腫萆麻子一粒去皮浄朴硝一錢同研新汲水作一服連進二三服效本事利膈湯虚損上壅脾肺有熱咽喉生瘡雞蘇葉荆芥防風桔梗人參甘草大力子炒各一兩為細末每一錢沸湯㸃服如咽痛口瘡甚者加殭蠶一兩東垣桔梗湯咽腫㣲覺痛聲破季冬用之麻黄連莭五分桔梗甘草各一錢黄芩白殭蠶各三錢馬屁勃一兩桂枝少許當歸身水二鍾煎一鍾食後稍熱徐徐呷之三因發聲散咽痛煩悶咽物即痛不宜寒涼藥過泄之此煩悶乃虚熱也𤓰蔞一枚白殭蠶㣲炒五分桔梗七錢半甘草炒三錢右用細末少許乾摻咽喉中若腫痛左右有紅或止一邊紅紫長大水米難下用此一錢朴硝一錢和勻摻喉中咽津如喉中生赤腫或有小白頭瘡用前散一錢七白礬細研五分乾摻三因蜜附子法感寒咽閉不能咽大附子一枚生去皮臍切作大片蜜塗炙令黄口含嚥津甘味盡更以附子片塗蜜炙用以效為度已上皆散寒之劑也丹溪治咽痛諸藥不效者此非咽痛乃是鼻中生一條紅線如髪懸一黑泡大如櫻珠垂掛到咽門而止口中飲食不入維用探取土牛膝根獨條肥大者搗碎入好醋三五滴同研細滴入鼻中二三㸃即絲斷珠破吐出瘀血立安愚按治喉疾藥皆大同小異不過䟱風清熱散毒破血激痰而已明乎此則凡單蛾雙蛾之症皆可類推也丹溪噙化丸治痰結核在咽必用醎能軟堅之味𤓰蔞仁青黛杏仁海蛤粉桔梗連翹風化散硝右為末薑蜜丸噙化梅核氣生生子曰梅核氣者喉中介介如梗狀又曰痰結塊在喉間吐之不出嚥之不下者是也丹溪噙化丸正治此等症也仲景半夏厚朴湯治婦人咽中如有炙臠半夏一升厚朴三兩茯苓生薑各四兩蘇葉二兩右以水七升煮取四升分温四服日三夜一三子調氣丸治梅核氣蘇子白芥子蘿卜子半夏麯滑石飛各一兩前胡六錢桂心三錢黄芩黄連各五錢生訶子三錢桔梗七錢甘草四錢橘紅明礬硼砂𤣥明粉各二錢煮乾二兩右為末生薑汁少許竹瀝一碗打糊為丸菉豆大食後白湯下一錢日三服清咽益元丸益元散一兩牛黄五分百藥煎三錢右以甘草桔梗煎濃汁為丸芡􅧙大隂乾每噙化一丸妙大匕氣湯治梅核氣極佳方現氣門赤水元珠卷三
