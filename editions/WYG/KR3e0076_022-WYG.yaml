水煎服又方白茅根濃煎湯吞酒蒸黄連丸加味清胃散方見前姙娠胎水腫滿産乳集云姙娠三月足腫至腿出水飲食不甘似水腫謂之子氣至分娩方消者此脾胃氣虚或衝經有血風亦有脾虚水氣流溢或因㵼痢臓府虚寒或因瘧疾飲水脾虚濕漬或因水漬於胞不能分利皆致腿足腫肚腹腫也薛氏曰若胸滿腹脹小便不通遍身浮腫用鯉魚湯脾胃虚弱佐以四君子若面目虚浮肢體如水氣用全生白术散如未應用六君子湯脾虚濕熱下部作腫補中益氣湯加茯苓若飲食失宜嘔吐泄㵼六君子湯腿足發腫喘悶不安或指縫出水天仙藤散脾胃虚弱兼四君子湯如未應補中益氣湯若脾肺氣滯加味歸脾湯佐以加味逍遥散一姙婦毎至五月肢體倦怠飲食無味先兩足腫漸至遍身後及頭面此脾肺氣虚朝用補中益氣夕用六君子加蘇梗而愈凡治姙婦毋泥月數但見某經症即用本藥為善天仙藤散婦人有水氣而成胎以致兩腿足浮腫天仙藤畧洗炒香附子炒陳皮烏藥軟白辣者佳甘草各五分右毎服五錢生薑木𤓰蘇葉各三片水煎日三服澤㵼散姙娠遍身浮腫上氣喘急大便不通小便赤澁澤瀉桑皮炒木通枳殻炒赤茯苓梹榔各五分右薑水煎服防己散脾虚遍身浮腫腹脹喘促小便不利防己三錢桑皮炒紫蘇莖葉赤茯苓各五分木香二分右薑水煎服千金鯉魚湯姙娠腹大胎間有水氣白术五兩茯苓四兩當歸芍藥各三兩右㕮咀先以小鯉魚一尾如食法煮取汁二盞入藥五錢薑七片橘皮少許煎七分空心服腎著湯治姙娠腰脚腫茯苓白术各八分乾薑炮甘草各一錢杏仁五分右水煎服五皮散治胎水腫滿大腹皮桑白皮炒生薑皮茯苓皮橘皮各一錢木香二分右水煎服全生白术散姙娠面目浮腫四肢腫如水氣名曰胎氣又名胎腫白术一兩生薑皮大腹皮陳皮白茯苓各五錢為末毎服二錢米飲下治姙娠脚浮腫因脾衰血化成水以生料平胃散薑棗水煎服或為末紫蘇葉湯調下二錢日二服以腫退為度腹内鐘鳴良方曰孕婦腹内鳴用鼠穴中土為末入麝香酒調服二錢立愈或黄連煎濃汁常飲之薛氏曰兒在腹中哭産寳方亦用空房中鼠穴土或黄連煎濃汁飲之即止又云臍帶上疙瘩兒含口中因産婦登髙舉臂脱出兒口以此作聲令姙婦曲腰就地如拾物狀仍復原入兒口即止然黄連性寒麝香開竅當斟酌用之龔彦德孕癰方治孕癰用烏藥五錢水一鍾煎七分入牛皮膠一兩煎化温服或薏苡仁煮汁飲之薛氏曰按孕癰即是腹内患癰如前法治之倘不應宜用牡丹皮散或薏苡仁湯薏苡仁湯又名𤓰子仁湯治腸癰腹中㽲痛煩毒不安或脹滿不食小便澁婦人産后虛熱多有此病縱非癰但疑似間便可服桃仁二錢一方用冬𤓰子仁無冬𤓰子以括蔞代之姚氏去桃仁用杏仁崔氏加芒硝薏苡仁括蔞仁各三錢牡丹皮二錢右作一劑水煎服牡丹皮散治腸癰冷症腹濡而痛時時利膿丹皮人参天麻白茯黄茋炒白芷苡仁桃仁去皮尖當歸洗炒川芎各一錢炙甘草官桂各五分木香三分右水煎服臟燥悲傷許學士云一婦無故數次悲泣是為臟燥用大棗湯而愈又程虎卿内姙娠五月惨慼悲傷亦投大棗湯而痊薛氏曰或因寒水攻心或肺有風邪者治當審察一婦無故自悲用大棗湯二劑而痊後又復患用前湯佐以四君子加山梔而安一姙婦悲哀煩躁其夫詢之云我無故但自欲悲耳用淡竹茹湯為主佐以八珍湯而安大棗湯甘草三兩小麥三兩大棗十枚淡竹茹湯姙娠心虚驚悸臟燥悲傷或作虚煩麥冬小麥半夏湯炮各一錢半人参白茯各一錢甘草五分加薑棗竹茹水煎服又方治臟燥悲哭紅棗燒存性為末米飲調下二錢姙娠十月宜服滑胎湯藥滑胎枳殻散入月服之令胎痩易産昔湖陽公主毎産累日不下南山道人進此方枳殻麩炒二兩炙甘草一兩右為末毎服二錢空心沸湯調下日三服凡孕六七月宜服之温隠居加當歸木香等分又方治同上兼治諸疾下氣寛膈枳殻麩炒五兩甘草一兩半香附子炒三兩右為末毎服二錢白湯調下又方易産滑胎車前子為末或酒或米飲調下一錢神寢丸臨月服之神效通明乳香半兩另末枳殻麩炒一兩為末右蜜丸梧子大毎空心酒服三十丸榆白皮散滑胎易生榆白皮甘草各二兩葵子一兩右為末毎以五錢水煎服保氣散寛氣進食痩胎易産或居處失宜頓仆胎動若胎痛胎漏兼服佛手散香附木香各四兩山藥二兩砂仁粉草各一兩益智蘇葉各半兩為末毎服二錢白湯調下薛氏云神寢丸枳殻散併此方入月宜常服保産無憂散姙娠身居安逸口厭甘肥憂樂不常食物不節致胞胎肥厚根蒂堅牢入月服之易生當歸川芎白芍枳炒乳香各三錢木香甘草血餘即髪灰以獖猪心血和之各一錢半右為末毎服三錢水煎日二服神效姙娠臨月以猪肚一具煮爛徐徐食盡令易産一産論一曰正産懐胎十月滿足忽腰腹作陣疼痛相次胎氣頓䧟至於臍腹痛極乃至腰間重痛谷道挺併繼之漿破血出兒乃遂生此名正産二曰傷産懐胎未産一月已前忽然臍腹疼痛有似欲産仍却無事是名試月非正産也又名曰弄痛凡産母未有正産之候切不可令人抱腰亦不可令産母妄亂用力若兒身未順纔方轉動便教産母空亂用力使子錯路忽横忽倒不能正生皆由産母用力於未當用力之所致也直待兒身順適逼臨産户始可用力一送令兒趂力生下綱目曰右傷産一法最為切要忽輕忽也凡十月未足臨産腹痛或作或止或痛不甚者名曰弄痛非正産之候或腹雖痛甚而腰不甚者非正産之候胎髙未䧟下者非正産之候穀道未挺併者非正産之候水漿未破血未出者非正産之候漿血雖出而腹不痛非正産之候凡未有正産之候且令扶行耐忍如不能行或凭物坐之或安臨之或且服安胎藥一二帖即安得安即止慎勿妄服催生藥又勿愴惶致令産母憂恐而挫其志務要産母寛心存養調停令老誠練逹穏母先説諭之如覺心中煩悶可取白􅁡一匙新汲水調下切勿妄亂用力先困乏其母直待子逼門户腰重痛極眼中如火糓道挺迸方是正産候也此時始可用力并服催生藥也予男婦于未産一月已前腰腹俱痛全似將産其痛至甚但遇已時稍止如此十餘日計無所出因閲此條遂與安胎藥加參术數服間與肉味養之由是平復不痛又二十餘日始産一男設若此際亂動亂用力并服催生等藥則立見其危矣三曰催産若婦欲産漿破血下已見是為正産之候但却未生即可服催生藥催之忽有經及數日産母困苦亦可服藥以助産母之正氣令兒速生也四曰凍産凡冬月天冷産母經血得冷則凝以致兒子不能生下此害最深但冬月産者下身不可脱去綿衣尤不可坐卧寒處當滿房著火常有煖氣令産母背身向火令臍下腿膝間常煖血得熱則流動使兒易生此名凍産五曰熱産凡盛夏之月産婦要温凉得所不可恣意取凉傷損胎氣亦不令房中人多恐熱逼襲産母使産母血沸而有發熱頭痛面赤昏昏如醉乃至不知人事此名熱産六曰横産凡兒先或露手或先露臂此乃産母未當用力而用之過也兒身未順用力一逼遂至身横不能生下當令産母安然仰卧後令看生之人先推其手令入直上漸漸逼身以中指摩其肩推上而正之或以指攀其耳而正之須是産母仰卧然後推兒徐徐正之候其身正煎催生藥一盞飲之方可用力令送兒下此名横産七曰倒産凡産母胎氣不足闗鍵不牢用力太早致令兒子不能逥轉便直下先露其足當令産母仰卧令看生之人推其足入不可令産母用分毫力亦不得驚恐使兒自順去八曰偏産兒身未正産母用力一逼致令兒頭偏柱左腿或偏柱右腿故頭雖露偏柱一畔不能生下當令産母仰卧次令看生之人輕輕推兒近上以手正其頭令兒頭頂端正然後令産母用力一送即便生下若是小兒頭腦後骨偏柱穀道只露其額當令㸔生之人以綿衣炙温裹手於穀道外方輕輕推兒頭令正便令産母用力送兒生也此名偏産九曰礙産兒身已順而露正頂不能生下葢因兒身逥轉肚帶攀其肩以此露正頂而不能生下當令産母仰卧令看生之人輕輕推兒近上徐徐引手以中指按兒肩下撥其肚帶仍須候兒身正順方令産母用力一送使兒生下此名礙産右横産倒産偏産礙産四法若㸔生之人非精良妙手不可依用此法恐恣其愚以悮人命也按倒産者今時徃徃随其倒足生下並無後患子母雙全不必依推足復上之法亦可又礙産者徃徃有肚帶纒在兒頂上而兒頭自出在産門外看生之人以手撥其肚帶從兒頭頂過而下之者又有肚帶纒在頂上一匝而兒與胞衣自然同下者皆無妨不必以此礙産法復入産門内撥下也十曰坐産臨産時髙處繋一手巾令産母以手攀之輕輕屈足坐身令兒生下非坐在物上也此名坐産十一曰盤腸産趙都運恭人毎産則大腸先出然後産子既産之後其腸不收甚以為苦名曰盤腸産醫不能料偶在建昌得一坐婆施一法而收之其法以醋半盞新汲水七分和匀噀産母面毎噀一縮三噀收盡此良法也丹溪治産後腸不收香油五斤煎熱盆盛俟温令産母坐油盆中約一頓食時以皂角末吹入鼻中􅅉作立上又方萆麻子十四粒去殻研如膏貼産母頭頂心上其腸上即揩去又方腸出盛以潔浄漆器濃煎黄茋湯浸之即收催生催生柞木飲子難産或胎爛腹中腹悶神效生柞木一尺剉甘草大者五寸右水三鍾封罐口煎一鍾半候胎順産門徐徐温服即時分娩更無諸苦催生如神散治横生逆産其功甚大百草霜白芷不見火等分右為末毎服三錢至胎順産門以童便米醋和為膏加沸湯調下或童便酒煎進二服然血得黒即止此藥大能固血而免血乾甚妙如聖散黄蜀葵花焙為末熱酒調下二錢若漏血胎乾胞澁難産併進三服即産如無花用子半合末之温酒服尤妙若打撲胎死紅花酒調下順生丹治同上兎腦髄去皮膜研膏明乳香一兩另末母丁香二兩麝香一錢右以兎腦子丸雞頭子大隂乾毎服一丸温水下又方透明乳香一塊如皂子大為末腰痛時用冷水醋少許調服扶立令兩手握大石燕二枚口念醫靈藥聖三遍行數步用坐産法便生更無痛楚神效薛氏曰其法士人視之似迂然用之者稱騐甚治逆産蛇退一條順下完全者蠶退紙一張右共入新瓦罐内鹽泥固濟煆存性為末煎榆白皮湯下一錢三服覺痛便生又方伏龍肝研末毎服一錢酒調下兒戴土而下又方魚膠一尺許新瓦上煆灰陳醋調服立下胞漿先乾胎澁不下急服大料四物湯滋其血氣并濃煎葱湯薫洗産户更用油燭塗産户内却服前藥神妙乳砂丹明乳香為末以猪心血丸梧桐子大硃砂為衣隂乾毎服二丸嚼碎冷酒下良久未生再服或以蓮葉蒂七個水煎化服二丸尤妙良久未生再服交骨不開産門不閉交骨不開産門不閉皆由元氣素弱胎前失於調攝以致血氣不能運逹而然交骨不開隂氣虚也用加味芎歸湯補中益氣湯産門不閉氣血俱虚也用十全大補湯一婦交骨不開兩日未生服加味芎歸湯一劑即時而産彼後以此方傳與人服應手而效一婦生平分娩最易至四十歲姙娠下血甚多産門不開與前湯一劑又以無憂散斤許煎熟時時飲之以助其血而生一産婦玉門不閉發熱惡寒十全大補加五味子數劑而寒熱退又以補中益氣加五味子數劑而玉門歛若初産腫脹或焮痛而不閉者用加味逍遥散若腫既消而不閉者用補中益氣湯切忌寒凉之劑一婦脾胃素弱兼有肝火産後玉户腫痛寒熱作渇嘔吐不食敷大黄等藥服驅利之劑腫及於臀虚症蜂起此真氣虚也先用六君子以固脾胃乃以補中益氣湯升舉而消一産婦失治腫潰不已形體消痩飲食少思朝寒暮熱自汗盗汗半年矣予用補中益氣加茯苓半夏以健脾胃膿水漸少飲食漸進用歸脾湯以解脾欝共五十餘劑元氣復而瘡亦愈矣一産婦玉門不閉小便淋瀝腹中一物攻動脇下或脹或痛用加味逍遥散加車前子而安一産婦子宫腫大二日方收損落一片殊類猪肝面黄體倦飲食無味内熱晡熱自汗盗汗用十全大補湯二十餘劑諸症悉愈仍復生育加味芎歸湯治交骨不開不能生産川芎川歸各一兩龜板一個炙婦人頭髪燒存性一握右為散毎服一兩水煎服約人行五里即生縱死胎亦下産難方論郭稽中曰産難者因兒轉身將兒枕血塊破碎與胞中敗血壅滯兒身不能便利是以難産急以勝金散消敗其血使兒易生陳無擇云多因兒未轉順坐草太早或努力太過以致胞衣破而血水乾産路澁而難下宜先服催生如神散以固其血設或逆生横産當按法施治勝金散催生如神麝香一錢豆豉一兩為末秤鎚燒赤淬酒下下死胎方一穏婆之女勤苦負重姙娠腹中隂冷重墜口中甚穢予意其胎已死令視其舌青黑與朴硝一兩許服之化下穢水而安一婦胎死腹中服朴硝下穢水肢體倦怠氣息奄奄用四君子為主佐以四物薑桂調補而安又方以利斧燒紅置酒中待温飲之其胎便下又方錫粉水銀各一錢棗肉為丸豆許大水吞立下又方平胃散五錢酒水各一盞煎至一盞投朴硝五錢再煎三五沸温服其胎即化水而去寳慶方云凡欲斷臍帶先以繫物墜下後可斷之否則胞衣上即冲心而死産難生死脉訣欲産之婦脉離經沉細而滑也同名夜半覺痛應分誕來日下午定知生身重體熱寒又頻舌根之色黑復青反舌上冷定知死腹中須遣子歸􅁳面赤舌青細尋看母活子死定應難唇口俱青沫又出子母俱死緫髙判面青舌赤沫出頻母死子活是知真不信若能㸔應驗尋之賢哲不虚陳新産之脉緩活吉實大弦急死來侵若得沉重小者吉忽若堅牢命不停寸口澁疾不調死沉細附骨不絶生審㸔此候分明記長須念此向心經胞衣不出郭稽中曰胎衣不下者因氣疲憊不能努出或血入衣中脹大而不能下以致心胸脹痛喘急速服奪命丹血散脹消其衣自下牛膝散亦效一婦胎衣不出胸腹脹痛手不敢近用滚酒下失笑散一帖惡露胞衣並下一婦胞衣不出腹痛手按之稍緩此氣虚不能送出也用無憂散而下前症常詢諸穏婆云冝服益母丸或就以産婦頭髪入口作嘔其衣自出不出者必死然前法甚效奪命丹大附子炮半兩牡丹皮一兩乾漆炒煙盡一錢大黄一兩為末醋煎大黄成膏丸梧子大温酒吞七丸花蕋石散治産后敗血不盡血迷血暈胎衣不下至死心頭煖者急用一服即化水而出其効如神花蕋石一斤上色硫黄四両右和匀以紙泥封固瓦礶内炭火煆赤次日取出細研毎服一錢童便熱酒下牛膝散治胎衣不出腹中脹痛急服此藥腐化而下緩則不救川芎朴硝牛膝蒲黄各三兩川歸一兩半桂心五錢右毎服五錢薑三片生地一錢水煎服又方紅花一兩酒煮濃汁服又方鹿角鎊三錢為末葱湯調服又方取産母鞋底烘熱熨小腹上下二七次産後血暈良方曰産後血暈乃血入肝經甚至眼花昏悶用黑神散主之下血過多用清魂散補之或以醋湯細飲或預燒秤鎚以醋沃之或釅醋塗口鼻或燒漆器薫之使産母鼻吸其氣庶無此患薛氏曰若惡露上行用失笑散血下過多芎歸湯若過勞所傷補中益氣湯血虚極用清魂散大凡産後口眼喎斜等症當大補氣血為主而兼以治痰若脾胃虚弱用六君子湯苟於七月之前服安胎飲至八九月間加大腹皮黄楊頭元氣虚弱八珍湯臨産用無憂散則無前患一婦八月胎下墜或動面黄體倦飲食少思此脾氣虚弱用補中益氣湯倍白术加蘇梗三十餘劑而安産後眩暈胸滿咳嗽用四物加茯苓半夏桔梗而愈一婦因飲酒惡露甚多患血暈口出酒氣此血得酒熱而妄行虚而作暈也以佛手散加煨甘葛二錢一劑而痊酒性慓悍入月及産後不宜飲恐致前症奪命丹治血暈腹痛没藥血竭為末等分毎服二錢熱童便冲酒下清魂散産後氣血暴損虚火妄動血随火上以致心神昏亂口噤眼花甚至悶絶而甦澤蘭葉人参各一錢荆芥三錢川芎一錢右各另為末毎服一二錢熱湯和酒調灌之一方五靈脂半生半炒為末毎服二錢温酒灌入即甦一方荆芥為末童便調服一方神麯末毎服二錢熱水調服一方韮菜切入瓶内注熱醋以瓶口對鼻薫之一方半夏為末丸豆大入鼻中即醒亦治五絶佛手散治産後去血眩暈欲絶又治血崩不止又能治胎痛安生胎而落死胎神效川芎酒洗當歸酒浸各五錢酒水各一鍾煎至一鍾服産後顛狂産後顛狂乃敗血上冲用大聖澤蘭散加砂仁末三分煎酸棗仁湯調下或硃砂為末二錢乳汁調和入紫項活地龍一條滚二三沸去之入酒再用重湯煮温分三服薛氏曰乃血虚神不守舍非補養元氣不可一産婦患前症或用大聖澤蘭湯而愈後又怔忡妄言其痰甚多用茯苓散補其心虚頓愈又用八珍湯加逺志茯神養其氣血而瘥一産婦亦患此用化痰安神等藥病益甚神思消爍余以為心脾血氣不足用大劑参术芎歸茯神酸棗仁四斤餘而安乃以歸脾湯五十餘劑而愈茯苓散治産後心虚忪悸言語錯亂健忘少睡或自汗盗汗人参炙甘草芍藥炒當歸生薑各八分逺志茯苓各一錢桂心六分麥冬五分大棗二枚水煎温服抱膽丸治産後遇驚發狂或遇經行發狂水銀二兩黒鉛一兩五錢硃砂乳香各一兩右將黑鉛入銚内火熔化俟稍冷下水銀擾成砂子再入乳香硃砂乘熱用柳木槌研匀丸雞頭子大毎服一丸薄荷湯下得睡勿驚覺來即安妙香散亦善此症属火者多不可槩視為瘀血及虚治也童便極好或冲入凉血藥中用之屢屢見效産後狂言譫語産後狂言譫語乃心血虚也用硃砂末酒調下龍虎丹参丸琥珀地黄丸亦可如驚悸歌哭顛狂等症當恭治之一産婦形體甚倦時發譫語用栢子仁散稍愈又用加味歸脾湯而愈又因怒仍狂言脇痛小便下血用加味逍遥散以清肝火養肝血頓瘥又佐以加味歸脾湯而安治敗血上衝發熱狂走脉虚大者乾荷葉生地丹皮各等分濃煎湯調生蒲黄二錢服之即止妙香散治産後語言錯亂用生地當歸煎湯調服立效炙甘草人参桔梗各五錢茯苓茯神山藥薑汁炒黄茋逺志各一兩辰砂三錢麝香二錢木香二錢半右為末毎服二錢温酒調服又能治心氣不足精神恍惚虚煩少睡盗汗夢與鬼交等症産後不語産後不語因心氣虚而不能通津於舌則舌强不能言語者宜服七珍散餘當推其所因而治之可也七珍散人参石菖蒲生地川芎各一兩細辛一錢防風辰砂另研各五錢為末毎一錢薄荷湯調服胡氏孤鳳散治産後閉目不語用之即效生白礬為末毎服一錢熱酒調下産後不語人参石蓮肉石菖蒲等分毎以五錢水煎服保産神方此方傳自異人屢有竒騐弗以庸方視之凡婦有孕至二三月外毎月服一劑臨産之月多服數劑當安則安當産則産甚至或横生或倒生或數日不下及産後驚風隂脱無乳諸症服之無不神騐當歸一錢五分白芍一錢二分冬月止用一錢真川芎一錢四分厚朴薑汁炒黄茋真蘄艾各七分兎絲子一錢四分枳殻麩炒六分羌活甘草各五分真川貝母一錢荆芥穗八分右十二味照數撮定不可多少方騐外薑三片水二碗煎七分温服赤水元珠卷二十二
