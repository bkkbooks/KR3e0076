body:
  text: 赤水元珠卷二十五明孫一奎撰小兒門諸雜症大方脉可以槩治者兹不復錄所錄惟異於大方脉者省繁瑣便應治也顧余不文然幼科但當闡明證候選擇良方俾婦人女子皆可通曉庶為法㫖初誕門小兒初誕猶如嫩蕋嬌花切當調䕶得宜庶無不測之症古謂初離母體口有液毒啼聲未出急用絲綿裹指拭去口中濁穢為妙此固良法然倉卒多不暇及且亦多有拭之而不見物古人有落地解毒法囘氣法將䕶法種種森立蒐輯於左以為保生良式甘草法臨月預備甘草少許以綿裹之臨産時用沸湯浸盞内俟兒落地未出聲時急取綿裹指頭蘸甘草汁拭其口次用硃蜜法硃蜜法用甘草湯飛過硃砂末三五分以蜂蜜拌勻旋抺口中使其嚥下不獨鎮心安神能解一切胎熱惡物之毒免痘熱之患又秘法用本兒落下臍帶瓦上焙燥為末入辰砂黄連甘草各末五分和勻蜜拌作三五次塗乳母乳上俟兒吞之必使一日夜吞盡次日惡毒皆從大便而出日後不但痘疹稀踈竟有不出痘者俟臍帶落下即便製服在六七八日之間為妙其辰砂必須研極細末以甘草湯飛過任服無害此方一以解毒一以補養盖臍帶乃有生初之河車也繫於母之命門兩腎之所主乃以腎補腎腎既充足即不受邪故無他日變黑歸腎之症亦無􅇟門不合之疾生一兒即得一兒真保生最上一乗良法斷臍法千金論云凡結束所留臍帶大約六寸長則傷肌又斷臍切不可用刀割蓋鐡器寒冷恐傷生氣只湏隔单衣咬斷後將暖氣呵七口庶無内弔之疾必先用熟湯浴過方斷臍若斷後浴之恐水氣入内令兒腹疼囘氣法初生氣欲絶不能啼者必是難産或冐寒所致急以綿絮包裹抱懐中未可斷臍且置炭火上燒之仍作大紙撚蘸芝麻油㸃着於臍帶上徃來遍燎之使火氣入臍則腹中温煖更用熱醋湯盪洗臍帶須臾氣囘啼哭如常方可浴洗斷臍切記戒灸北方誕後三日毎用艾灸􅇟門以免驚風緣北方地土嚴寒故俗灸之以禦寒善調䕶者何必令兒受此一翻痛苦也今南方每亦倣傚予屢見灸後發熱大小便秘因而驚搐遂致不救良切憫焉殆無事生事也詎思南方地熱躭孕者又不斷慾食淡厚味是貪恣情肆意胎已受毒加之以灸是以油濟火也曷克當之浴兒法第三日浴兒予每用五枝湯極妙五枝湯者桑槐榆桃栁是也各取嫩枝三寸長者二三十節煎湯看冷熱入猪膽汁二箇浴之周嵗内可免瘡疥丹毒又可以避邪惡盖三日浴兒俗禮也倘兒生脆弱遲十數日或半月亦無害擇晴明吉日於無風房内浴之兒生下地即不啼哭不能吞乳奄奄如死者急㸔喉間懸癰前㬽上有一泡用指摘破以帛拭去惡血勿令嚥下即能通聲吞乳初生大小便不通腹脹欲絶者急令人温湯潄淨口吸咂兒之前後心臍下兩手足心共七處每處吸咂五七口取紅赤色氣透為度氣透則便自通輕號散初生大便不通輕粉二錢生蜜拌熱湯調㸃兒口中一二次立通初生六七日不小便葱白三四寸搗爛人乳拌入兒口内再與乳吮嚥下即通楊氏曰小兒在胎受病非一大抵裏氣藴結壅閉不通宜早取下胎毒千金論曰小兒始生其氣尚盛若遇疾病即須下之下不及時必成别症凡下胎毒只宜用淡豆豉濃煎汁與三五口其毒自下又能助養脾氣消化乳食初出胞胎而不吮乳者或由産母過度胎中受寒則令兒腹痛故不吮乳亦由口中惡物拭之不及嚥下腹中致令嘔吐茯苓丸木香散治之茯苓丸治惡血入腹腹脹氣短不能吮乳赤茯苓黄連枳殻炒各等分右為末煉蜜丸梧子大每一丸乳汁磨下冷者去黄連木香散治惡穢入腹嘔吐不止木香乾薑茯苓木𤓰甘草炙丁香各等分右為末每服一錢生薑一片水煎綿蘸揑入口中效竒方治初生不乳及不小便葱號散葱白一寸四界破之以乳汁砂䂪内煎灌之立效小兒初生榖道不通多致不救非藥石可治曽有人以銀筯頭燒紅穿通其竅大便始出亦有用玉簪穿通者初生下週身無皮俱是紅肉宜速取白秈米粉遍身撲之其皮漸生一日撲三四次以皮遍為度初生下遍身如魚泡或如水晶擦破則水滲流以蜜佗僧研極細炒過乾摻仍服蘓合香丸初生六七日後隂囊收縮入腹啼哭不止者受寒所致盖寒則收引也硫黄吴茱茰各五錢為細末研大蒜調塗臍下仍以蛇床子微炒帛包熨其囊即下初生受風鼻塞不能吮乳不可輕易發散惟大天南星為末生薑自然汁調成膏貼於􅇟門即愈又方草烏皂莢為末葱汁搗膏貼於􅇟門效噤風撮口臍風三症一種病也噤風者眼閉口噤啼聲漸少舌上聚肉如粟米狀吮乳不得口吐白沫大小便皆通盖由胎中感受熱氣毒流心脾故形現於喉舌也或生下復為風邪搏擊所致一百二十日已前見此皆名噤風撮口者面目黄赤氣自喘急啼聲不出盖由胎氣挾熱兼之風邪入臍流毒心脾之經故令舌强唇青聚口撮面妙於吮乳若口出白沫四肢冷者不可救也其或肚脹青筋弔腸卵疝内氣引痛皆腸胃結滯不通治宜踈利盖撮口最為惡候月内見之尤急候也臍風者非獨謂斷臍之時為水濕風邪所乘多因胎中受熱兼之風濕所激遂令肚脹臍腫身體重而四肢柔直啼而不乳甚則發為風搐若臍邊青黒兼之撮口乃是内搐不治爪甲黒者即死其或熱在胸膛伸引努氣亦令臍腫可與千金龍膽湯此三症受病之源皆縁胎毒大概裏氣壅滯搃宜取下胎毒為好不可因循畏手畏足姑息悮事古方天麻丸定命丹朱銀丸可量與之雖危多活每見臍風撮口七日内見之百難一生凡見此三症急看口中齒齦上有小白㸃如粟米大即宜以温水蘸帛裹指揩去或用銀簪挑去即能開口吮乳不必服藥此感之淺者也感之重者照後方按治安臍散治臍中汁出或赤腫白石脂研極細一日三度傅之或用油頭髪燒灰傅或當歸末傅亦佳千金龍膽湯治胎驚月内氣盛發熱臍風撮口壯熱四肢搐掣發熱大吐及變蒸不解中惡客忤鬼氣并諸驚癎悉皆治之十嵗已下皆可服有魃氣者加人參當歸兒大者一嵗加五錢龍胆草鈎藤柴胡黄芩桔梗芍藥茯苓甘草各五錢􅎙螂二枚去足翅炙大黄煨二錢半右每服二錢水煎去半服之以漸加之俟大便行即止直指方加防風麥門冬以導心熱黄芩減半加北棗無􅎙螂亦可控痰散治噤風先用此吐風涎次與益脾散和胃蝎尾銅青各五分硃砂一錢膩粉一字麝香一分為細末每服一字茶清調下或用甘草湯吐痰亦可甘草湯治撮口取吐風痰甘草三錢水煎服令吐出痰涎却以猪乳㸃入口中即愈益脾散和胃進乳白茯苓人參草果煨木香濕紙包煨甘草陳皮厚朴薑製蘇子炒各等分右每服二三錢看大小水煎服辰砂膏治眼閉口噤啼聲不出吮乳不得口吐白沫大小便皆通辰砂三錢硼砂牙硝各一錢半𤣥明粉二錢麝香一字全蝎珍珠各一錢右為細末厚油紙包封自成膏每服一荳許粒薄荷金銀湯下月内用乳汁調傅乳母妳上令兒吮下天麻丸斷臍後為水濕風冷所乗入臍流於心脾遂令肚脹臍腫四肢柔直日夜多啼不能吮乳此藥利驚化痰凢釣腸鎖肚撮口並效南星炮二錢白附子炮牙硝天麻五靈脂全蝎炙各一錢輕粉五分巴霜一字右為稀糊丸麻子大每服三丸薄荷生薑湯送下定命丹治急驚天釣撮口通利痰熱一方無冰片全蝎七箇天麻南星炮白附子炮各二錢半硃砂青黛各一錢半輕粉麝香各五分冰片一字右為末粟米糊為丸菉豆大每服一丸荆芥薄荷湯化下先研半分吹入鼻中殭蠶散治撮口殭蠶直者二条去嘴水洗妙為末用蜜調傅唇口中立效蝎梢散治胎風撮口臍風及百日内急驚風并諸痰症蝎梢四十九箇殭蚕去嘴洗去系薑汁炒四十九條冰片麝香各一字右蝎梢每一個用薄荷葉包線扎定砂䂪内炒至薄荷乾為度仝殭蚕研細入冰麝和勻用赤雄雞肝二片煎湯調下一二分牛黄散治初生七日内口噤牛黄一錢為末以竹瀝調一字灌之更以猪乳㸃入口中撮風散治撮口蜈蚣赤足者炙半條鉤藤硃砂蝎梢殭蠶炒各一錢麝香一字右為末每服一字用竹瀝調下立聖散治噤口蝎梢七個乾蜘蛛一個去嘴足以竹瀝浸一夜炙焦用膩粉少許為末研勻毎服一字乳汁調時時滴入口中蜈蚣散治口噤不開不能吮乳赤脚蜈蚣炙焦去頭足半條為末入麝香少許以猪乳一合分三服盖猪乳治小兒口噤最良凡取猪乳須令小猪兒吮喫方其吃時將小猪後脚提起其口即開急捋取之即得乳也非此法不能得蜘蛛散炙焦去嘴足一枚為末猪乳調灌神効亦治牙疳加麝香神效硃銀丸治臍風壮熱痰盛翻眼口噤取下胎中藴受之毒亦治驚積量病用之全蝎一錢白附子炮錢半南星炮硃砂一字牛黄蘆薈各五分天漿子麝香各五分冰片一字殭蠶炒十條水銀一錢蒸棗肉研如泥鉛霜五分和水銀研右為末粟米糊為丸如芥子大每一丸薄荷湯下如未利加至二三丸麝香散治臍風撮口赤脚蜈蚣酒炙半條川烏頭尖三個麝香少許右為末每服半字金銀湯調下立聖散治臍風撮口赤蜈蚣一條酒炙蝎梢七個瞿麥五分殭蠶七個炒右為末先用鵞毛管吹少許入鼻啼哭則可治仍用薄荷湯調三五分臍突光腫臍汁不乾附腸癰生生子曰小兒月内旬日臍突光腫如吹捻動微響赤腫虚大可畏此由初生先斷其帶束縛不𦂳浴洗之時濕入所致用外消散敷之臍汁不乾者内有濕熱及血熱而然宜涼血收濕之藥摻之無不效者惟腸癰一症亦令臍中汁出小腹腫硬按之則痛小便澁以淋時時汗出惡寒身皮甲錯肚皮𦂳急如腫之狀按之濡或發熱無汗洒淅惡寒皆其候也甚者腹皮脹大轉側腹有水聲或遶臍生瘡或膿從臍出或大便膿血必有一足不能步皆為惡候山梔五苓散治小兒臍突梔子仁炒白术炒茯苓猪苓澤瀉各一錢肉桂五分右為細末每五七分蜜湯或燈心湯調下二荳散治臍突赤小荳豆豉天南星製白歛各等分右為細末每以五分芭蕉自然汁調敷臍四傍一日一次三日三次但得小便下白物即消外消散治臍突光腫如泡大黄牡蠣煅各五錢朴硝一錢右為末多用田螺浸水調一二錢敷臍上其水從小便而下即消封臍散治臍中汁出紅綿灰龍骨煅髪灰面粉炒各一錢胭脂丕一分右為末乾摻濕處丹礬散治同上黄丹枯礬右等分為細末敷上即乾又方蜜佗僧炒貝母桑螵蛸焙右為末摻之妙又方墻上多年白螺殻燒為末摻之佳消癰蒼耳湯但小腹作痛惡寒肚皮𦂳急一脚不能舉步即是腸癰蒼耳子二錢甘草五分杏仁薄荷𤓰蔞各一錢水酒各一鍾煎服其渣包敷臍上二服見效有膿者加木香當歸各五分四聖散治腸癰乳癰一切癰疽便毒神效黄𤓰蔞一枚甘草四錢没藥三錢乳香二錢酒煎分二次服大便微溏瀉下惡物為妙薏苡仁湯治腸癰腹中疼小便澁苡仁𤓰蔞仁丹皮桃仁各三錢水煎食前服神仙蠟礬丸治腸癰有膿者極效空心酒吞五六十丸太乙膏為丸梧子大每空心酒下六七十丸腸癰頓瘳鵞口白屑初生百日口中生白㸃不計其數拭之則去少刻復有口角流涎水日夜啼哭不乳是也亦由胎熱或乳母嗜貪煿炙酒麵貽熱於兒用甘草黄連各一錢煎濃湯以帛裹指口中拭去再不復發又方桑樹枝條如煎竹瀝法煎汁洗之亦佳又方黄丹為極細末用竹瀝調塗口中洗之其白㸃即落一日洗二三次再以辰砂益元散燈心湯調下則不再作神妙鼻風傷􅇟凡乳母夜睡鼻孔切不可與兒頭相近恐呼吸鼻風吹其􅇟門疾變百出慎之慎之通闗散治鼻風吹􅇟令兒鼻塞不能吮乳香附子炒白殭蠶炒各三分川芎七分荆芥四分細辛二分牙皂一分右為末生葱白去鬚搗碎調藥塗􅇟上佳潮熱潮熱者今日發過明日復來如潮水之有信也有一日一發二日一發三日一發或一日兩發似瘧非瘧皆由調䕶失宜或冐風寒或傷乳食或發瘡疥或隂陽不和或虛熱骨蒸皆當認證速治亦有外感内傷以致臟腑壅滯而成實證當從權下之一傷寒之後餘熱不解者宜脫甲散兼小柴胡湯一内傷癖塊不消脾胃不和而成潮熱先服脫甲散次搨氣下之後調胃氣一營衛有熱隂陽不和發為潮熱一瘡疹後餘毒不解藴成潮熱宜大連翹飲更與助胃氣則安梨漿飲子治潮熱及營熱衞熱兩日一發三日一發五臟藴熱瘧熱夜發癉瘧獨熱青蒿苗童便浸三次洗淨晒乾柴胡人參前胡黄芩秦芁甘草或加生地黄右看大小三五錢水煎入生藕生梨薄荷葉煎服脫甲散治傷寒體熱頭目昏沉不思飲食夾驚夾食寒熱大小便閉煩躁作渇冷汗妄流膈滿腹急日夜大熱并傷風傷暑驚癎客忤疳熱柴胡當歸龍膽草茯苓知母甘草川芎各三錢人參二錢右看大小每服三五錢加連鬚葱白三根水煎服此方散熱扶表救裏表虛者汗不妄出裏熱令不閉結外則通闗内則開渠經絡踈通臟腑無滯熱在表裏之間施無不可積𫝊驚癎之候用攻必效地骨皮散治虛熱潮熱傷寒壮熱知母柴胡人參甘草茯苓半夏地骨皮各等分右水煎加薑有驚熱加蟬蛻天麻黄芩秦芁飲子治症如前即上方加秦芁鱉甲飲治潮熱骨蒸盗汗咳嗽多渇心躁多驚面色黄痩鱉甲炙地骨皮秦芁柴胡枳殻炒知母當歸各等分右每服三五錢加桃栁枝各三寸烏梅一枚水煎服犀角飲治骨蒸潮熱盗汗肌痩犀角屑鱉甲炙柴胡知母地骨皮胡黄連各五分大黄桃枝各二錢半右水煎服靈犀飲治小兒骨蒸潮熱盗汗咳嗽不食多渇面黄消痩犀角秦芁甘草羌活柴胡地骨皮胡黄連各五錢茯苓人參各一兩右每服三五錢加烏梅竹葉煎服柴胡散治骨蒸潮熱面黄痩弱柴胡地骨皮甘草各等分右水煎服青蒿散治肌熱潮熱青蒿三錢甘草一錢烏梅一枚小麥五十粒右水煎分三次服大連翹飲治胎熱大小便不利諸般瘡癤丹毒臍風瘡疹壮熱連翹瞿麥荆芥木通當歸赤芍藥防風柴胡滑石炙甘草蟬蛻各一錢山梔黄芩各五分右看大小每加紫草煎服熱甚加大黄風熱内素有熱或又冒風發熱咳嗽面赤氣粗大便秘結者但宜平平和解使表裏踈通其熱即退踈風枳殻湯極效踈風枳殻湯紫蘇枳殻各三錢杏仁去皮尖二錢水煎頻頻與服以大便通利熱退為度熱甚者加黄芩若大便仍不行用䓤煎湯洗其腰腹取熟䓤以臍上下揩之使其氣透則通利矣或用生葱尖絍入榖道立通清上散治胎熱眼睛腫赤糞色稠黄肚熱啼哭及身上紅腫或頭頂瘡癤耳出膿汁皆胎毒也此方神驗川鬱金甘草北桔梗天花粉乾葛薄荷葉右各等分為末入蜜拌勻白湯下三五七分或一錢仍用艾葉煎濃湯温浸足底以引其熱下行看小兒外症形色音聲脉息經云五臟有五色皆見於面素問曰神之變也其華在面又云視其五色黄赤為熱白為寒青黒為痛此所謂視而可見者也錢仲陽云左頰為肝右頰為肺額上為心鼻上為脾下頦為腎赤者熱隨症治之眼上赤脉下貫瞳人􅇟門腫起兼及坐坑鼻乾黒燥肚大筋青目多直視覩不轉睛指甲黒色口作鵶聲虛舌出口嚙齒咬人魚口氣急啼不作聲蛔蟲既出必是死形用藥速救十無一生此吐蛔乃傷寒症故言凶若傷食吐蛔乃是常事要知兒病生與死總觀面上色音聲唇青耳黒人難救哭聲不響赴隂君聲輕者氣清弱也重濁者痛也風也髙喊者熱將狂聲急者神驚也聲塞者痰也聲戰者寒也聲噎者氣不順也喘者氣促也噴􅅉者知其風呵欠者知其倦亦主風隂陽相雜也診脉歌小兒有病須憑脉一指三闗定真息浮洪風熱數多驚虛冷沉遲實有積左手浮洪風邪所感右手滑大乳食過傷數熱遲寒以意推詳浮表沉裏㸔症投湯㸔顱􅇟要畧凢㸔嬰孩百日已後周嵗已前視其􅇟而對其症則補瀉用藥調治可斷其吉凶矣􅇟門青筋脉虛不榮􅇟門常陷滑泄便便􅇟門腫起風痰不止􅇟門乆冷吐利青青􅇟門虛軟顛癎不免􅇟門扁濶暴瀉易脫􅇟門歪長風作即亡􅇟門連額驚風易得顱􅇟未充怕熱怕寒顱􅇟緩收胎氣不周顱􅇟動數神氣昏弱顱􅇟寛大受疾恐害顱􅇟未合筋骨柔弱顱􅇟陷者始因臟腑有熱渇飲水漿致成泄痢乆則氣虛用狗頭骨炙黄為末雞子清調敷之􅇟腫者乳哺不常致寒熱乗於脾家其氣上衝􅇟為之脹髙如堆垜若寒氣上衝則堅硬熱氣上衝則柔軟寒則温之熱則涼之封􅇟散防風栢子仁白芨各一兩右末乳汁調塗􅇟上十日愈凢解顱之症乃腎氣虛弱腦髓不實不能收歛急用地黄丸補之外用大天南星微炮為末米醋調敷於絹帛上貼之三辛散治解顱北細辛桂心各五錢乾薑七錢右為末乳汁調敷􅇟上乾則再塗俟兒面赤則愈烏附膏治􅇟門陷川烏大附子各去皮臍尖五錢雄黄水飛二錢右極細末生葱搗爛調成膏貼􅇟上地黄丸治顱解不合腎元不充人參二錢懐熟地黄四錢鹿茸酒炙懐山藥茯苓丹皮山茱茰肉各三錢右末煉蜜丸芡實大每用人參湯化下一丸傷乳小兒吮乳過飽腹脹不乳者不必他藥只用大麥芽炒煎湯服之如惡吐加陳皮發熱者加枳實如大便不通加梹榔盖氣下則乳自消也不必用大黄巴豆霜之類入門㸔症歌五指稍頭冷驚來不可當若還中指熱必定是傷寒中指獨自冷麻痘症相𫝊女右男分左叮嚀仔細㸔變蒸生生子曰古謂三十二日一變生一臟六十四日一蒸生一腑三百二十日十變五蒸畢則臟腑完而人始全也大意謂人有三百六十五骨度而合周天之數以期歳該之云云也愚謂嬰孩離母則腑臓已自具足豈待變蒸完而後始生哉觀其下地㘞然一聲便能呼吸飲乳大小便一如大人設臟不完啼聲安出又安能飲乳而成大小便哉由是推之所謂變蒸者乃氣血按月交㑹煆煉使臟腑之精神志意魂魄逓長靈覺漸生爾氣血有太過有不及故寒熱之發有輕重有晏早不然觀今之嬰孩未嘗月月如其所云三十二日必一變六十四日必一蒸也發寒熱者百中僅一二耳間或有之亦不過將息失宜或傷風傷乳而偶與時㑹耳雖不服藥隨亦自愈兹姑採什數方以備參用若謂生臟生腑之助則其謬也不辯自知清解湯變蒸熱多寒少面赤息粗有似傷風表裏無汗或發癮疹咳嗽並皆治之柴胡五分前胡四分酒芩五分甘草炙三分葛根三分杏仁四分枳殻三分白芍藥七分右水煎服柴胡湯治變蒸骨熱心煩啼呌不已人參甘草炙麥門冬去心各二錢防風龍胆草各一錢柴胡三錢右每服三錢水煎服惺惺散治變蒸發熱或咳𠻳痰涎鼻塞聲重瘡疹發熱人參白术茯苓甘草芍藥桔梗細辛麥芽各等分右每服一錢加薑煎服當歸散治變蒸有寒無熱當歸二錢木香桂心人參甘草炙各一錢右每服二三錢薑棗水煎服調氣散治變蒸吐瀉不乳多啼木香香附酒製人參橘紅藿香甘草右各等分每服三錢薑二片棗一枚水煎服明驚風篇孫仲子泰來曰驚者病之名風者病之象言其抽搐有似於風之動而為名也生生子曰小兒之症莫大於驚風以其疾顧盼間暴若雷迅而電逝也緣其致疾之由有二極須體認不可循俗只曰驚風驚風云耳何言之夫驚有因外因内外至者或耳聞異聲目擊異物驀然仆地者是也内生者由痰生熱熱生風也所得之由既殊療治之法必異治外須當養神治内自宜清降予慨今之専門偶獲一方便大言曰治急慢驚風如神急慢二字漫無分别視之得無太易易乎不思急屬陽陽為熱為實慢屬隂隂為虛為寒顧治法實熱即當清當瀉虚寒即宜温宜補盖治寒之劑不能治熱治熱之劑不能治寒聖哲莫能越其矩也世無大丹曷能以一藥槩能治其寒熱虛實者乎急慢二字閒有能言之者至於内外之因鮮有知之者矣予故揭而論之以補其畧急驚風生生子曰急驚風者乃有數種之殊須當細察觀古人治法有云鎮驚者有云利驚者有云涼驚定驚截驚者究其法明是教人要知邪之入於何經識投劑有此數等之緩急也盖邪之入心則面紅頰赤惕惕夜啼邪之入肝則面目俱青眼竄上視邪之入腎則面黒惡呌嚙齒咬牙邪之入肺面色淡白喘息氣乏邪之入脾面色淡黄嘔吐不食此亦大約言之耳仍當審其兼症盖此疾之發其始未有不由於痰熱者雖有五臟之殊尤重在心肝二臟内積痰熱外挾風邪風火交爭血亂氣併呼吸賁鬰関竅壅塞面赤努氣百脉凝澁總由痰涎膠固而肝風心火無所踈泄故頭揺眉掣目斜上視搐掣不休名曰急驚症固暴烈乃為陽症陽盛則多動而症實熱故列已上數法非若慢驚隂症者所可比也急驚須當急治先宜通関通闗後且與截風定搐設仍不定乃議下之痰熱既降又當養胃安神若搐定而仍有微邪但用輕劑消痰清熱則破竹之勢自當迎刃而解也孫季子朋來曰夫治急驚當下即下第不可過用寒涼及巴霜水銀芒硝輩蕩滌太驟盖已上諸劑與腦麝等藥醫家有所急而用之殆亦不得已也疾去即止若不當用而用或當用而過用慢驚之成率多由此可不慎哉凡欲下之際須當細問前師已下未下或曽經吐瀉否也設已經下及曽吐瀉者不敢再擬下劑只須驅風化痰清熱令其自已不可峻攻重傷胃氣若體認未明不可孟浪施治先與通闗嚏驚輩以開其竅次用人參羌活散定搐散在意選擇下劑亦有三等輕則利驚丸稍重則用踈風散柴胡加大黄湯重則用天麻丸牛黄涼膈丸下後和胃補氣用生氣散茯苓二陳湯蘓合香丸之類寧心定志丸全蝎散温膽湯此等不寒不熱袪風鎮驚之餘酌而繼之以防再發庶稱良師凡急驚鼻衂者乃陽明經中熱壅將散從血而解此易治口中吐血者乃心血為熱迫妄行難治犀角湯加滑石牡丹皮黄連山梔凡急驚抽搐聼其自發自止切不可令人𦂳抱束繋之恐他日有痼疾以氣不得流通故也通闗散治驚風搐搦闗竅不通南星炮一錢麝香一字牙皂二條赤蜈蚣炙一条殭蠶炒一錢右為末生薑汁拌擦牙或筯引滴入藥二三㸃吐出涎闗自開􅅉驚散半夏一錢猪牙皂角末五分右為末每用少許吹入鼻中􅅉出立甦全蝎散治驚風不語通竅豁痰全蝎七枚各用紫蘓葉包塗蜜炙去葉再換葉炙右為末每服一字薑汁入蜜少許拌勻灌入口中開牙散細辛南星朴硝各一錢全蝎五枚麝香五分右為末以少許用烏梅肉揉和擦牙外用細辛皂角荆芥為末吹入鼻中人參羌活散治驚風熱涎潮牙闗𦂳急或中風柴胡去蘆五錢地骨皮天麻酒炙人參芎藭獨活枳殻茯苓羌活桔梗各五錢甘草三分右每服三五錢生薑薄荷湯調服加蟬退治驚熱體硬加麻黄乾葛苡仁鉤藤飲治一切驚風潮搐神思昏迷目瞪上視但是驚風變易皆效麻黄去節甘草蟬退五枚去翅足升麻川芎龍膽草各二錢天竺黄鉤藤羌活獨活防風各三錢右每服三五錢加竹葉七片薄荷葉五片水煎服琥珀散治急慢驚風涎潮昏冐目瞪抽搐内釣肚疼及和順痘瘡小可驚哭眠卧不安入口立效又治驚癎常服安心定志辰砂琥珀牛黄殭蠶炒全蝎去毒天麻南星牛膽製白附子炮蟬退代赭石乳香各一錢麝香一字右為末三嵗半字薄荷金銀湯下慢驚加附子天麻防風丸治一切驚風壯熱痰盛恐怖殭蠶炒五錢天麻酒煨防風人參各一兩牛黄一錢全蝎五錢辰砂雄黄各二錢半炙甘草一兩麝香一錢半右為末煉蜜丸桐子大每三五丸薄荷湯下金箔鎮心丸治風痰壅盛發熱心神恍惚急驚搐搦雄黄辰砂天竺黄各一錢茯苓膽南星人參各二錢山藥一錢半牛黄麝香各五分金箔五片右末煉蜜為丸梧桐子大金箔為衣每服一丸燈心鉤藤薄荷湯下常服定志安心涼驚丸治驚疳有熱發搐心神恍惚牙