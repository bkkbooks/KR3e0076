body:
  text: 赤水元珠醫家類提要臣等謹案赤水元珠三十卷明孫一奎撰一奎字文垣號東宿又號生生子休寧人是編分門七十每門又各條分縷析如風門則有傷風真中風類中風瘖痱之别寒門則有中寒惡寒之殊大㫖専以明証為主故于寒熱虚實表裏氣血八者諄諄致意其辨古今病証名稱相混之處尤為明析惟第十卷怯損勞瘵門附方外還丹専講運氣補液之法殊非岐黄正道盖一奎以醫術遊公卿間不免以是投其所好遂為全書之大瑕是足惜耳原本卷末附醫㫖緒餘二卷醫案五卷今别自為帙焦氏經籍志載孫一奎赤水元珠十卷醫㫖緒餘二卷而不及醫案或所見非全本歟乾隆四十四年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀赤水元珠原序盖謂三五之道非人不𫝊而非人之至者尤不得其傳是故太上聖人知隂陽之機察寒暑之候辯愚民之冷燠定卉物之温凉為之濟人者不勞而受沉痾者得效矣嗟乎世道頼此人也久矣吾心思若人亦久矣時休陽孫生探天地五行之奥採百家同異之龜觀易必尋易之源講書必求書之要凢所以濟人利命者一以心學為本誠所稱上古之胎醫中之伯者生平不妄交與在家惟註方言有醫㫖緒餘數百言率皆辨衆論以歸於中眀先天太極之圖發前賢証候之秘又於先世所未名之疾未有之方為之補其闕而增其所未盡其有功於人夫豈負薪之勞壺飱之賜哉書成請題於余余曰文以載道文而無道焉以宰之吾人所羞稱也今生之所纂者率皆闡幽發㣲㑹通之中而得其觧昔黄帝求道多方索之不得而象㒺得之於赤水若生所註信有本矣名之曰赤水元珠不亦宜乎然則世之藝何捨鈞天大樂而審笙敔薄大臠之味而嚼草根乎雖然語云莫前弗開莫後弗𫝊而為生之廼𦙍廼孫者又當敬承大志永保於無疆之休可也其若生之意否孫生叩首曰善遂書之孫生休人名一奎字文垣東宿乃其號也羅浮道人題凢例一是書專以明証為主葢醫難於認証不難於用藥凢証不拘大小輕重俱有寒熱虚實表裏氣血八箇字苟能於此八箇字認得真切豈必無古方可循即於十二經藥性中表裡寒熱温凉間摘出治之自然權變合宜不失勝算故古謂審証猶審敵知己知彼百戰百勝矣一所引諸書名及諸家姓氏者欲人知所有自且一証之中經書多有發之未盡者前賢或觸目感悟掲而補之俾後學得以宗倣後之人不䆒前人盡心用意處反謂某長於此而短於彼某善於補而不善於攻廼以補其缺略者反指以為偏駁豈知本之學哉且又不贄師訪友局守一家之說濫稱專門焉能擴充愚故不揣管陋毎於一症之間有經文可據者即以經文為首引無經文者采取各家之言為証是則宗之非則黜之間有誤後人惑來世者則援摭格言輿論以折其𠂻庶見前人補缺之意匪偏而後之取法者得以履其正也一辨証原經文有单立篇目則原依其篇目有混稱未析者或古今名稱不同如古經以風寒濕三氣雜至而成痺立名丹溪廼改痺為痛風又如膓澼泄利膓風臓毒混論而未析如此者甚多設不辨而正之何所適従茲以各証經文混論者列之於前以為之綱以今人嘗稱者析之於後而為之目目下各列治法庶古今照貫攻治不紊緩急檢閲免致疑滯一婦人臓腑經絡七情六氣感病與男子無以異治法亦然所異惟胞門子户月汛胎産隂挺崩漏赤白𢃄内外吹爾茲特標婦人門五卷使知同異端緒大方經畧庶家技不得稱擅塲局夫不得呼專秘隨俗為變醫之能事斯無愧於扁鵲也與一治小兒法惟臍風哯乳盤膓内弔驚疳痘疹為差别餘皆與大方脉同但臓腑脆薄劑宜較小爾三嵗内者不形於診然虎口三闗之紋亦難盡憑當於聲色動静哭笑大小便叅之四嵗後便可以一指按於經渠列缺之上診左右手脉孰大孰小孰浮孰沉以辨内外二傷卒多應騐不可謂全不闗於診也至如痘疹尤小兒𦂳要方術及外科并列門後以統其治用寓無可無不可之意云一採用經史國典羣書諸雜家言統計二百六十五種非徒騁博洽資口吻也以為不廣搜逺引不足發明天人合一之㫖與聖賢立功立命之意夫古之人有不為良相愿為良醫也者此何以故子輿氏曰老吾老以及人之老㓜吾㓜以及人之㓜然則恵溥當時澤流後世是惟相與醫廼克踐之矣一醫家著輯汗牛充棟不能一一購置但取其書可宗法萬世無弊者一部中採數條一門中採數法數方以為嚆矢要之縁辭契意神而明之存乎其人而已况登彼㟁者航筏尚可棄乎一醫寄生死之關非知性命者不足與有言也儒之窮理盡性以至於命固當取以折衷而老氏性命兼修釋氏眀心見性道理自可叅觀故兼採二氏為翼夫知三教之所以者于醫學思過半矣一醫要先識人身内景臓腑形質手足經上下宗氣營氣衛氣呼吸出納三焦終始及各經表裏隂陽金木水火土部位配合命名之義上下不得錯綜一經不得两配與河洛周易靈素洪範黄庭性理諸家合一不背洞悉源委始能言標本而測病機若因内景不眀羣書不究局局然守草根樹皮之末方左右牴牾逢原謂何如命門三焦包絡相火及手足經配合自難經已下紛紛不决者余不揣菲謭于醫㫖緒餘中僣為剖析似與靈素洪範太極百家照徹相貫敢以俟之具法眼者一醫道肇自炎帝之本草與黄帝之内經伊尹之湯液而周禮登之天官冡宰誠重之也諸如上池金匱青囊或神或僊不可枚舉其顯在六卿廊廟者齊則禇澄唐則王珪李世勣陸宣公狄梁公劉禹錫李兵部宋則文潞公蘇子瞻朱紫陽我明則劉誠意咸有著述此皆上古良相之芳躅逸人之髙致逮今風斯為下厠之技流烏知醫之所自耶噫道無汙隆顧人力行何如耳宣尼有言人能𢎞道非道𢎞人吾黨共朂之哉
