body:
  text: 赤水元珠卷五明孫一奎撰水脹通論􅂕樞經曰水榖入於口輸於腸胃其液别為五天寒衣薄則為溺與氣天熱衣厚則為汗悲哀氣并則為泣中焦胃緩則為唾邪氣内逆則氣為之閉塞而不行不行則為水脹余知其然也不知其何由生願聞其道岐伯曰五榖之津液和合而為膏者内渗入於􅇧空補益腦髄而下流於隂股隂陽不和則使液溢而下流於隂髄液皆减而下下過度則虚下􅂈度謂房勞􅂈度也故腰背痛而脛痠隂陽氣道不通四海塞閉三焦不㵼津液不化水榖并行腸胃之中别於廻腸留於下焦不得渗膀胱則下焦脹水溢則為水脹黄帝問於岐伯曰水與膚脹皷脹腸覃石瘕何以别之岐伯荅曰水始起也目窠上微腫如新卧起之状其頸脉動時欬隂股間寒足頸腫腹乃大其水已成矣以手按其腹随手而起如裹水之状此其候也帝曰膚脹何以候之岐伯曰膚脹者寒氣客於皮膚之間􅠻􅠻然不堅腹大身盡腫皮厚按其股窅然而不起腹色不變此其候也皷脹何如岐伯曰腹脹身皆大大與腹脹等也色蒼黄腹筋起此其候也腸覃何如岐伯曰寒氣客於腸外與衞氣相摶氣不得榮因有所擊癖而内著惡氣乃起瘜肉乃生其始生也大如鷄卵稍以益大至其成如懐子之状久者離嵗按之則堅推之則移月事以時下此其候也石瘕何如岐伯曰石瘕生於胞中寒氣客於子門子門閉塞不得通惡血當㵼不㵼衃以留止日以益大状如懐子月事不以時下皆生於女子可導而下帝曰膚脹皷脹可刺耶岐伯曰先刺其脹之血絡後調其經刺去其血絡也石水臍以下腫其脉沉本事方云臍腹四肢悉腫者為水但腹脹四肢不甚腫為蠱蠱即皷脹也綱目云水脹皆本於房勞􅂈度水腫出素問水熱穴論黄帝問曰少隂何以主腎腎何以主水岐伯對曰腎者至隂也至隂者盛水也肺者太隂也少隂者冬脉也故其本在腎其末在肺皆積水也帝曰腎何以能聚水而生病岐伯曰腎者胃之闗也闗門不利故聚水而從其類也上下溢於皮膚故為胕腫胕腫者聚水而生病也帝曰諸水皆生於腎乎岐伯曰腎者牝臓也地氣上者属於腎而生水液也故曰至隂勇而勞甚腎汗出腎汗出逢於風内不得入於臓腑外不得越於皮膚客於𤣥府行於皮裏𫝊為胕腫本之於腎名曰風水所謂𤣥府汗孔也帝曰水俞五十七處者是何主也岐伯曰腎俞五十七穴積隂之所聚也水所從出入也尻上五行行五者此腎俞故水病下為胻腫大腹上為喘呼不得卧者標本俱病故肺為喘呼腎為水腫肺為逆不得卧分為相輸俱受者水氣之所留也肺腎之標本其上下分為相輸相應之病而俱受者縁此二臟乃水氣之所留故也伏莵上各二行行五者此腎之街也三隂之所交結於脚也踝上各一行行六者此腎脉之下行也名曰太衝凡五十七穴者皆臟之隂結水之所容也尻上五行行五脊中一懸樞一命門一腰俞一長强一大腸俞一小腸俞一膀胱俞二中膂内俞一白環俞二胃倉二盲門二志室二胞盲二秩邉二伏莵上各二行行五中注二四滿二氣穴二大赫二外陵二大巨二水道二歸来二踝上各一行行六太衝二復溜二隂榖二照海二交信二築賔二甲乙經云身腫關門主之水腫脹皮腫三里主之風水膝腫巨虚上亷主之風水面胕腫顔黒解溪主之風水面胕腫衡陽主之水中留飲胸脇支滿刺䧟谷出血立已面胕腫上星主之先取譩譆後取天牖風池水腫人中盡滿唇反者死水溝主之水腫大臍平炙臍中無理不治内經曰三隂結謂之水王註云謂脾肺之脉俱寒結也又曰下焦溢而為水王註曰下焦為分注之所氣窒不㵼則溢而為水黄帝問曰有病腎風者靣胕龎然壅害於言可刺否岐伯曰虚不當刺不當刺而刺後五日其氣必至帝曰其至何如岐伯曰至必少氣時熱時熱從胸背上至頭汗出手熱口乾苦渇小便黄目下腫難以行月事不来煩而不能食不能正偃正偃則咳病名曰風水論在刺法中帝曰願聞其説岐伯曰邪之所凑其氣必虚隂虚者陽必凑之故水氣時熱而汗出也小便黄者少腹中有熱也不能正偃者胃中不和也正偃則欬甚上廹肺也諸有水氣者㣲腫先見於目下也曰何以言之岐伯曰水者隂也目者亦隂也腹者至隂之所居故水在腹者必使目下腫也真氣上逆故口苦舌乾卧不得正偃正偃則咳出清水也諸水病者不得卧卧則驚驚則咳甚也腹中鳴者病本於胃也薄脾則煩不能食食不能下者胃脘膈也身重難以行者胃脉在足也月事不来者胞脉閉也胞脉者属心而絡於胞中今氣上廹肺心氣不得下通故月事不来也針經曰肢脛者人之管以趨翔也莖垂者身中之機隂精之候津液之道也故飲食不節喜怒不時津液内溢乃下流於睪血道不通日大不休俛仰不便趨不能此荣然有水上不下也劉宗厚曰按内經諸水氣皆諸臓本病也針經所引則又主飲食及七情等因皆致之可見病機之㣲矣但有濕腫氣腫初亦頗相似然以手按之成凹不能即起者濕也濕與水有㣲甚之意况有氣腫及諸水形証不同要在臨症詳審也水腫有陽水隂水之分若脉来沉伏靣色青白不煩渇小便澁而清大便溏泄為隂水治宜實脾脉来沉數靣色赤黄或煩渇小便赤而難大便秘治宜踈氣蕩滌論水氣証治大法内經曰不從毫毛病生於内者隂氣内盛陽氣竭絶不得入於腹中故言五臓陽以竭也津液者水也充郭皮中隂蓄於内水氣脹滿上攻於肺肺氣孤危魄者肺神腎為水害子不救母故云其魄獨居也夫隂精損削于内陽氣耗减於外則三焦閉溢水道不通水滿皮膚身體否腫故云形不可與衣相保也凡此之類皆四肢脉數急而内皷動於肺中也肺動者謂氣急而欬也如是者皆水氣格拒於腹膜之内浮腫施張於身形之外欲窮標本其可得乎平治權衡謂察脉浮沉也脉浮為在表脉沉為在􅂻在裏者泄之在表者汗之故云開鬼門潔净府也去宛陳莝謂去積久之水物猶如草莝之不可留於身中也劉宗厚曰按經論水氣証治至為機宻故云開鬼門潔净府然鬼門者猶幽𤣥之謂有毛竅而不見其開闔邪氣感入邪與正相摶毛竅閉塞而寒熱作為病客於表故宜發汗遣邪氣以開鬼門也此亦發汗之别稱泄諸病在表之通例也净府者謂膀胱内無入孔而外有出竅為清净津液之府憑腎氣蔵氣化水榖之精而渗入脬中氣約成溺出也夫腎主下焦司闔闢開竅二隂肺脾之氣通調水道下輸膀胱氣化水行而自清净否則便澁或濁或淋為水氣溢於腠理為膚腫諸病若宛屈陳莝壅滯身中當泄去是物而潔净宜此二法在表者汗之在裏者㵼之權衡于治也雖然經云水病本之于肺腎二經而古今方論並不以治水獨㵼腎氣為説者何盖腎隂奉行降令為生化之源而常不足至隂精損削於内生氣不能運化至為胕腫其氣索矣况肺弱而母氣孤危者乎故東垣曰若治以甘淡渗泄陽藥獨陽無隂其欲化得乎此探擷已上治例之妙也如積飲留飲傷脾若土之于雨中則為坭矣或因七情所致手足太隂俱病身浮腫似水氣用燥脾導氣之劑即愈一則若坭土之得和風暖日水濕去而陽化自然萬物生長一則肺氣開泄渗道通利水氣不濡于脾矣此正諸濕腫滿皆属脾土諸氣膹欝皆属於肺而與隂陽為病水氣機之不同故亦不待開鬼門潔净府而已也原病式謂水腫為濕熱實甚故治以辛苦寒藥葢以辛㪚結而苦燥濕以寒除熱而随其利濕去結㪚熱退氣和而愈而謂脾虚不能制水之説為非丹溪以水腫由脾虚不能制水故水漬妄行當以参术補脾使脾健則自能轉運而水自行但宜補中行濕利小便為上劉宗厚曰按劉河間以水腫為濕熱謂在表有熱宜汗謂在裏有熱宜下治法宜開鬼門潔净府盖言有餘之証然也丹溪以脾虚不能制水治當補中行濕利小便盖言不足之証然也若夫滋腎制火之説愚切以為未當盖補腎之藥乃隂滯柔潤適以滋濕耳豈理也哉今治此証但脾虚受濕為不足所致者宜燥脾土兼利小便若夫氣欝飲食濕熱所致者禁不得妄下証雖可下又當權其輕重不可􅂈用芫花大㦸甘遂猛峻之劑暫時快利水氣復来而無以治之也少壮充實脉洪大有力者當導厺其水年老虚人得此惟當補中行濕為先設或元氣下䧟者即又當升提之古方十種証候以短氣不得卧為心水兩脇疼痛為肝水大便鴨溏為肺水四肢苦重為脾水腰痛足冷為腎水口苦咽乾為膽水乍虚乍實為大腸水腹急肢瘦為膀胱水小便秘澁為胃水小腹急滿為小腸水以此十水為正水外有風水皮水石水黄汗風水又有風腫氣腫血腫風腫者皮粗麻木不仁走注疼痛氣腫者皮厚四肢痩削腹脇脹膨至若煩躁潄水迷忘驚狂嘔逆煩悶皮間有紅縷赤㾗者此血腫也㜏人經脉壅閉敗血停腐尤多見此姙娠亦有氣遏水道而虚腫者此但順氣安脾飲食無阻既産而腫自消若産後發虚則虚退而告殂矣大抵浮腫之脉帶數即是虚寒潜止其間乆必沉伏沉伏則陽虚隂實為水必矣靣龎然浮腫疼痛其色炲黒多汗惡風者属腎風治見風􅔻諸唇黒則傷脾缺盆平則傷心臍出則傷肝足心平則傷腎背平則傷肺凡此五傷必不可治大凡水腫先起於腹而後散於四肢者生先起於四肢而後入腹者死至若皷脹而肚上青筋脹滿而大便􅉸泄乆瘧而轉作虚浮又兼見前五傷則死矣與夫男從脚上腫而上女從上腫而下或肉硬或掌心平而無紋皆不治論生死脉法水病脉洪大者可治㣲細者不可治水病賬閉其脉浮大數者生沉細虚小者死水病腹大如皷脉虚者死實者生脉經叙諸水形症原出金匱要畧病有風水有皮水有正水有石水有黄汗寸口脉沉􅉸者中有水氣靣目腫大有熱或身體反重而酸或惡風一身悉腫脉浮不渇續自汗出而無大熱者皆為風水風水其脉自浮外症􅇧節疼痛惡風皮水其脉亦浮外症胕腫按之沒指不惡風其腹如皷不渇當發其汗皮水之為病四肢腫水氣在皮膚中四肢聶聶動者防已茯苓湯主之正水其脉沉遲外証自喘石水其脉自沉外証腹滿不喘黄汗其脉沉遅身發熱胸滿四肢頭靣腫乆不愈必致癰膿心水者其身重而少氣不得卧煩而躁其人隂腫肝水者其腹大不能自轉側脇下腹痛時時津液㣲生小便續通肺水者其身腫小便難時時鴨溏脾水者其腹大四肢苦重津液不生但苦少氣小便難腎水者其腹大臍腫腰痛不得溺隂下濕如牛鼻上汗其足逆冷靣瘦裏水者一身靣目黄腫其脉沉小便不利故令病水也仲景曰諸水身半以下腫者當利小便身半已上當發汗經云身半已上天氣主之身半以下地氣主之天氣主之者其在皮也故汗而發之問肌肉之外皮膚之裏首至足一身皆腫者當作何治荅曰亦宜汗之也與身半以上同法身半以上汗之者尺寸之天地也故汗之肌肉之外皮膚之裏一身盡腫者從天而汗之此表裡之浮沉凡治之法當如是也肺心肝腎中州已上俱宜汗中州已下皆宜汗如小便利而渇不宜汗不宜下以其重亡津液故也王海蔵曰觀髙低内外輕重表裡随經補㵼要當謹察肺胃腎三經病即􅂒也夫水氣者胃土不能制腎水逆而上行𫝊入于肝故令人腫治者惟知泄水而不知益胃故多下之强令水出不依天度流轉故胃愈虚食不滋味則發而不能治也莫若行其所無事則為上計不可不知凡補胃不可使之壅滯如本草叙赤小荳治水腫通氣補脾胃之類是也羅太無治許魯齋藥案云魯齋年五十八靣目肢體浮腫大便溏多腹脹腸鳴時痛飲食减少脉得弦細而緩年少時多服牽牛大黄藥靣目四肢時有浮腫今因隂雨故大發予曰當運之氣出自中焦者胃也胃氣弱不能布散水榖之氣营飬臓府經絡皮毛故氣行而濇為浮腫大便溏多而腹脹腸鳴皆濕氣勝也四時五臓皆以胃氣為本五臓有胃氣則和平而安若胃氣虚弱不能運動滋飬五臓則五臓脉不和平本臓之氣盛者其脉獨見輕則病􅂈甚則病死故經曰真臓之脉弦無胃氣則死今幸未至於甚尚可調補人知服牽牛大黄為一時之快不知其為終身之害也遂以平胃散加白术茯苓草荳􅅳仁數服而腹脹溏泄腸鳴時痛皆愈飲食進止有四肢浮腫以導滯通經湯主之良愈導滯通經湯治脾濕而氣不宣通靣目手足浮腫陳皮白术桑白皮木香各五錢茯苓一兩右每服六七錢水煎食前服霖雨時加澤㵼一兩丹溪治水腫多以二陳加白术人参蒼术為主佐以黄芩麥冬炒梔子制肝木若腹脹少佐以厚朴氣不運加木香木通氣若䧟下加升麻柴胡提之随病加减必湏補中行濕二陳治濕加升提之藥能使大便潤而小便長産後必湏以大補血氣為主少佐蒼术茯苓使水自降用大劑白术補脾若壅滿用半夏陳皮香附監之有熱當清肺金麥門冬黄芩之属一方用山梔去皮取仁炒槌碎米湯送下一抄若胃熱病在上者帶皮用治熱水腫山梔子五錢木香一錢半白术二錢半取急流水煎服水脹用大㦸香薷濃煎汁成膏丸去暑利小水大㦸為末􅀥肉丸十丸泄小水刼實者綱目述丹溪治水腫得效之法十五條其法大率以甘草佐白术参陳等劑補中氣為君木通􅉸石郁李仁海金沙行水為臣厚朴大腹皮蘓梗通滯意為佐使如氣不升浮惡寒脉沉者探吐以提之頭靣光腫加麻黄㣲汗之挾積氣者佐以保和温中抑青等丸磨之挾熱者佐以黄芩之類清之挾瘡癕者佐以連翹犀角㪚之而随証加减也仲景曰寸口脉沉而遅沉則為水遅則為寒寒水相摶趺陽脉伏水榖不化膽氣衰則鶩溏胃氣衰則身腫少隂脉細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分仲景治水大法風水脉浮身重汗出惡風者防已黄茋湯主之防已一兩黄茋一兩二錢五分白术七錢五分甘草炙五錢右每服五錢生薑四片棗一枚水煎温服良乆冄服腹痛加白芍藥因濕為腫者前湯調下五苓散又前湯治風濕脉浮為在表其人或頭汗出外無表証惟腰以下常重而腫難以屈伸腰以上俱和者並效風水惡風一身悉腫脬浮不渇自汗出而無實熱者越婢湯主之治裏水加白术四兩麻黄去節六兩石膏半斤生薑三兩大􅀥十二枚甘草二兩右五味以水六升先煮麻黄抹去上沫入諸藥煮取三升分温三服惡風者加大附子一枚炮古今録騐治風水加术四兩皮水為病四肢腫水氣在皮膚中四肢聶聶動者防已加茯苓湯主之防已黄茋桂枝各三兩茯苓六兩甘草炙二兩右五味水六升煮取三升分温三服裏水為病越婢加术湯主之又甘草麻黄湯亦主之甘草炙二兩麻黄去節四兩水五升先煮麻黄去渣沫内甘草煮取三升温服一升被覆出汗汗不出再服慎風寒水之為病其脉沉小属少隂浮者為風無水虚脹者為氣水發其汗即已脉沉者宜附子麻黄湯浮者宜杏子湯附子麻黄湯附子一枚炮去皮臍切作八片麻黄去節甘草炙各三兩水七升先煮麻黄冄沸去上沫内諸藥煮取二升半温服八合日三服隂陽結邪多隂少陽名曰石水小腹腫石水者謂冬月水氷如石之時故曰石水也火墓於盛冬陽氣㣲故石水而死也腎肝並沉為石水並浮為風水黄汗之為病身體腫發熱汗出而渇状如風水汗沾衣色其黄如蘗汁脉自沉問曰從何得之以汗出入水中浴汗從孔中入得之黄汗者黄茋芍藥桂枝苦酒湯主之黄茋五兩芍藥三兩桂枝去浮皮三兩苦酒一升水七升煮三升温服一升當心煩也至六七日乃觧若心煩不止者以苦酒阻故也黄汗之為病兩頸自冷假令發熱此属歴節食已汗出又身常暮卧盗汗出者此榮氣也若汗出已反發熱者乆乆其身必甲錯發熱不止者必生惡瘡若身重汗已出輙輕者乆乆其身瞤瞤即胸中痛有又從腰已上必汗出下無汗腰下弛痛如有物在皮中状劇者不能食身疼重煩躁小便不利此為黄汗桂枝加黄茋湯主之桂枝去浮皮生薑芍藥各三兩甘草炙二兩黄茋右入􅀥十二枚擘以水八升煮取三升温服一升湏臾飲熱稀粥一升以助藥力被覆取汗不汗更服之師曰寸口脉遲而澁遲則為寒澁則為虚不足趺陽脉㣲而遲㣲則為氣遲則為寒寒氣不足則手足厥冷則營衞不利營衞不利則腹滿胸鳴相逐氣轉膀胱營衞俱勞陽氣不通則身冷隂氣不通則􅇧痛陽前通則惡寒隂前通則脾不仁隂陽相得其氣乃行大氣一轉其氣乃㪚實則失氣虚則遺溺名曰氣分氣分心下堅大如盤如旋杯水飲所作桂枝去芍藥加麻黄附子細辛湯主之桂枝去浮皮生薑麻黄去節細辛各二兩甘草炙一兩大棗二十枚擘附子二枚炮去皮切八片右水七升先煮麻黄去沫内諸藥煮取二升分温三服當汗出如䖝行皮中愈心下堅大如盤如旋杯水飲所作枳术湯主之枳實白术各三兩右二味水五升煮取三升分温三服腹中耎即當㪚也靣目浮腫喘嗽痰涎葶藶大棗㵼肺湯主之甜葶藶苦葶藶等分大棗腰已下有水氣牡蠣澤㵼㪚兩脇下有水氣腹中雷鳴生薑㵼心湯十􅀥湯大㦸芫芲甘遂各等分三花神祐丸十棗湯加牽牛大黄輕粉水丸服除濕丹神祐丸加乳香沒藥𤣥青丹神祐丸加黄連黄栢青黛已上四方不可輕用必㸔其有實候乃用之眀理趂痛丸治水氣浮腫又治脚氣上攻風毒走注疼痛神效白芥子生為末肥甘遂生為末生大黄各末一兩右用白麺一兩半滴水丸作餅子􅏼令黄不可􅂈焦為末醋糊丸梧桐子大冷酒下二十丸不拘時量虚實加减紫苑㪚木香人参白术紫苑川芎各二兩右粗末生薑烏梅煎服次日又一服調胃白术澤㵼散治痰病化為水氣𫝊為水皷不能食白术澤㵼芍藥陳皮茯苓生薑木香梹榔各等分一法加白术本藥各半治臍腹上腫如神心下痞者加枳實下盛者加㯽榔胡洽方治支飲澼飲于十􅀥湯中加大黄甘草五兩同煎服之故以相反之劑欲其上下俱去也郁李仁破澼氣能下四肢水大抵去水藥多泄熱當求脉之虚實下之消腫散治水氣喘呼不得卧煩熱躁渇大小便不利大黄蒸山梔炒甘草炙乾葛陳皮麻黄川芎馬牙硝各等分為末蜜湯調下二錢又方千金子二百五十粒薑三片滚水煎空心服以利為度集成尊重丸治蠱証水腫氣腫喘急小水赤澁大便秘結一切中滿单腹皷脹人参沉香丁香木香梹榔車前子葶藶子各四錢胡椒蝎梢􅉸石海金沙赤茯苓白豆䓻各一錢半蘿蔔子六錢郁李仁一兩二錢右為末薑汁糊丸梧桐子每服三丸薑湯下一日服三次簡易方治蠱脹身乾黒瘦多渇煩悶馬鞭草細剉晒乾勿見火以酒煮味出去渣温服立效不善酒者水煎亦可六月半時採元戎神方烏鷄子一枚去頂取清黄汁調膩粉一大錢令勻内殻中以蒸餅劑裹之蒸熟去殻取熟黄二葶藶等分炒為末與上并黄蒸餅等為丸荳大每服三五十丸車前子湯下小便澁不通瞿麥湯下又攻擊泄下之劑去菀陳莝之法也許學士十腫水病并根源証状方法一青水先從左右肋腫起根在肝大㦸二赤水先從舌根起根在心葶藶子三黄水從腰腹起根在脾甘遂炒四白水從脚腫起根在肺桑白皮五黒水從外腎腫起根在腎連翹六𤣥水從靣腫起根在外腎芫芲醋炒七風水從四肢腫起根在􅇧澤㵼八石水從腎腫起根在膀胱藁本九高水從小腹腫起根小腸巴豆去皮油十氣水或盛或衰起根在腹赤小豆右十般腫病各有根源種種不同㸔十腫病根除一味倍多餘九味等分逐味依法修治焙為細末煉蜜丸如梧子大用赤茯苓湯吞下三丸不拘時候每日三服忌塩一百二十日縁塩能化水也又忌魚鰕麺食一切毒物及生冷房室甚效用此方獲瘥後更服後来補藥補藥方肉桂去粗皮乾薑肉豆䓻赤茯苓去皮莪术醋煮川芎桔梗各等分依法製服一方無茯苓莪术有青皮白术梹榔俱等分為末每服三錢百沸湯㸃服空心食前日午晩各一服前項二方治水腫病甚效予試用之百發百中獲濟無數治腫滿小便不利茯苓散郁李仁四錢梹榔二錢白术一錢赤茯苓一錢甘遂切片炒一錢陳皮一錢半右為末每服一錢薑􅀥湯調下已上三方許學士試效者治水腫無逾此矣雄黄神金散雄黄葶藶􅟙米炒熟去米一兩澤㵼椒目减半大㦸巴㦸茯苓芫芲醋浸一日炒甘遂桑皮各一兩右為末空心用井花水調服每一錢加至五錢以利為度忌塩醋生冷油膩之物從脚腫加葶藶肚腫加椒目從隂腫加澤㵼靣腫加茯苓從心腫根在肋加䧺黄從肢腫根在皮加甘遂從口腫根在小腸加巴㦸從腰腫根在腎加大㦸從膝腫根在肝加芫芲三白散治膀胱藴熱風濕相乗隂囊腫大二便不利白丑二兩桑白皮白术陳皮木通各等分為末每服二錢空心薑湯調下小児减半秘方治皷脹如神氣皷則放屁水皷則下水而愈大㦸白商陸甘遂各三錢陳皮二錢大腹皮梹榔白术海帶海藻各二兩為末每用三錢和白麺三兩水拌做一塊分作三小塊每塊捍碗口大薄餅一箇共作三箇無油锅内烙熟空心服一餅酒送下茶􅂈口坐卧忌風生冷油膩塩一箇月不能斷葷者不可治也此藥試􅂈每用一餅僅行水四五度並不瘦人一方用乾鷄屎一升炒黄好酒三碗淬下煮作一碗絹濾去渣飲之少頃腹中氣大轉腸鳴從大便利下脚膝及蹄上下先皺起漸漸消至腹如一次消不盡冄服一劑以田螺二枚滚酒内渫熟食之即止後以温粥調飬而安此方治一切水氣濕發腫效三因消腫丸治水腫喘滿小便不利􅉸石木通白术黒丑炒茯苓半夏陳皮各一錢木香􅜰麥丁香各五分為末酒糊丸梧子大每五十丸灯心麦門湯下葶藶丸治涌水証如溢囊裹裡漿或遍身腫滿按腹不堅疾行則濯濯有聲或喘欬不定葶藶炒澤㵼椒目桑白皮木猪苓杏仁各五錢為末煉蜜丸梧子大每二三十丸葱白湯下不拘時服以利為度局方神助散治十種水氣靣目四肢浮腫以手按之随手而起欬嗽喘急不得安卧小便赤澁大便不利黒丑末澤㵼各一兩椒目一兩半猪苓二兩葶藶三兩右為末葱白三莖水煎入酒調服三錢薏苡根散治水腫薏苡根君木香㯽榔黒丑右為末酒調服妙聖恵氣寳丸又名順氣丸治腰脇俱病如抱一甕肌膚堅硬按之如皷脚腫不能屈伸自頭至膻中瘦脊露􅇧胷膈痞悶四肢無力木香茴香炒羌活木𤓰川芎當歸陳皮炒梹榔地􅇧皮各一兩大黄一兩半黒丑二兩皂角四兩右為末熬皂角膏為丸梧子大每六十丸温酒下一方無木𤓰生薑灯心湯下治一切氣血凝滯風毒熾盛脚氣走注作腫或大便閉脚氣入腹滿悶寒熱徃来状如傷寒並宜服之簡易方治水蠱不問年月深者大㦸當歸陳皮各一兩水二升煮七分頓服利二三斗即愈元戎方治十種水氣垂死鯉魚一頭重一斤者和葱白冬𤓰羮食之又治皷氣方􅉸石輕粉各一錢槐花一錢半右不犯鉄氣為細末生地黄自然汁生薑自然汁停滴在藥中為丸梧桐子大一日服三丸次日服四丸五日以下早辰只一服用生地黄汁温送下小便中水盡為度得睡後日服嘉禾散十日永不冄發治隂水腫之劑五皮散治風濕客於脾經氣血凝滯以致面目俱浮四肢腫滿心腹膨脹上氣喘促五加皮地􅇧皮生薑皮大腹皮茯苓皮水煎熱服一方加牽牛澹寮方無地􅇧皮五加皮加陳皮桑白皮白术木香散治腫滿喘嗽欲變成水病者不能食不能卧小便秘白术猪苓甘草澤㵼赤茯苓各五錢木香梹榔各三錢橘紅二兩官桂二錢􅉸石三兩右每服一兩半生薑三片水煎温服一方加木通㧞萃聖靈丹治脾肺有濕喘滿風盛小便赤澁苦葶藶炒四兩防已二錢赤茯苓麺炒木香梹榔木通人参各一錢五分為末以棗肉丸梧子大每服五十丸桑白皮湯下續随子丸治通身虚腫喘悶不快人参防已赤茯苓麺炒續随子木香梹榔海金沙另炒各五錢苦葶藶四兩右為末棗肉丸梧子大每五十丸桑皮湯下退腫搨氣散治積水驚水或飲水􅂈多停積于脾故四肢而身熱用藥惟内消其腫自退赤豆陳皮蘿蔔子甘草炙各五錢木香二錢半每服一兩生薑三片棗一枚水煎食前服復元丹治水腫皮膚盈溢心腹堅脹喘急不得正偃正偃則咳嗽腿腹冷口苦舌乾小便不利夢中虚驚不得安卧附子炮木香煨茴香炒川椒炒去汗獨活厚朴白术炒吴茱茰炒桂心各一兩澤㵼一兩半肉果煨梹榔各五錢為末糊丸梧子大每服五十丸紫蘓湯下一日三服先便旋利如傾次乃腫潰喘止此藥能助真火以飬真土運樞機禁慾絶塩半年乃不再作當歸散治同前川芎赤芍藥牡丹皮白术赤茯苓陳皮梹榔木香桂心木通各等分為末脚膝頭靣腫大小便不快每服二錢水一鍾紫蘓葉二片木𤓰一片同煎八分温服日三服稍覺愈只早晩服二次但覺氣下小便長是效臓虚去梹榔臍凸加大腹皮猪苓各一兩忌鷄魚肉酸醎之物及海味大半夏湯治土不能制水水則干腸胃溢於皮膚漉漉有聲怔忡喘息名曰水脹橘紅半夏茯苓甘草桔梗梹榔各等分每服五錢薑三片水煎服赤茯苓丸治同上木香五錢苦葶藶炒四兩防已二兩赤茯苓二兩為末棗肉丸梧子大每服三十丸桑皮湯下人参葶藶丸治一切水腫及喘滿不可當者人参一兩苦葶藶炒四兩為末棗肉丸梧子大每三十丸桑白皮湯下神秘湯治水氣上乗于肺肺得水而浮水腫不卧卧則喘白茯苓木香各五錢桑白皮紫蘓葉陳皮人参各七錢薑七片水三鍾煎鍾半食後分五服無碍丸治脾病横流四肢腫滿木香半兩蓬术炮三稜炮梹榔郁李仁炮去皮各一兩大腹皮二兩為末麥芽麺糊為丸梧子大每服三十丸生薑湯吞下香蘓散治水氣虚腫小便赤澁陳皮去白一兩防已木通紫蘓葉各錢右為末每服二錢薑三片水煎食前服小葶藶丸治腫滿腹大四肢枯痩小便澁濁甜葶藶炒薺菜根等分為末煉蜜丸弹子大每服一丸陳皮湯嚼下只三丸小便清數病愈牡蠣澤㵼散治脾胃氣虚不能約制腎水水溢下焦腰以下腫牡蠣炒澤㵼蜀漆洗去腥葶藶炒𤓰蒌根白商陸根海藻洗等分為末白湯調服方寸七小便利止後服踈鑿飲子治水氣遍身浮腫喘呼氣急煩渇大小便不利服熱藥不得者澤㵼赤小豆白商陸大腹皮茯苓羌活椒目木通秦芁梹榔等分薑五片水煎服大橘皮湯治濕熱内攻腹脹水腫小便不利大便􅉸泄陳皮一兩半木香二錢半􅉸石六兩梹榔三錢茯苓一兩猪苓白术澤㵼肉桂各五錢甘草三錢生薑五片水煎服實脾散厚朴白术木𤓰附子炮木香茯苓大腹子草果仁乾薑炮各一兩甘草炙五錢薑五片棗一枚水煎服加味枳术湯治氣為痰飲所膈心下堅脹名曰氣分枳殻白术陳皮梹榔桔梗木香桂紫蘓梗葉五􅂕脂炒各二分半夏茯苓甘草各一分半薑三片水煎服調榮散治瘀血化為水四肢浮腫皮肉赤紋名曰血分細辛莪术桂赤芍川歸川芎𤣥胡索白芷大腹皮桑白皮梹榔􅜰麥穂陳皮赤茯苓葶藶炒大黄煨各一分甘草炙一分半每服五錢薑棗煎食前服大荳湯治風水通身腫百節痛惡風自汗眼合不得短氣欲絶其脉浮大荳杏仁去皮尖炒麻黄防風防已猪苓各四兩澤㵼黄茋烏頭炮各三兩半夏茯苓白术各五兩甘遂炒甘草炙各一兩每服五錢薑七片水二鍾酒半鍾煎一鍾服以大小便利為度如不利加生大㦸五兩葶藶炒香二兩無不利矣内甘遂甘草本相反故用之以成功屡試屡效非泛常所可測也澤漆湯治石水四肢痩腹腫不喘其脉沉澤漆洗去腥五兩桑白皮六兩射干米泔水浸黄芩茯苓白术各四兩澤㵼防己各二兩每服五錢水三鍾先用黒豆一合煎至二鍾入藥同煎七分空心食前服一日三次附子菉荳湯治寒客皮膚殻殻然而堅腹大身腫按之陷而不起色不變病名膚脹一劑未知冄作大附子大者一枚生去皮臍菉荳二兩生薑一兩切水二鍾煎一鍾分三服空心午晩各一服葶藶防已丸治靣目浮腫肺氣喘咳不安小便赤澁防己一兩木通葶歴杏仁去皮尖麸炒貝母煨各一兩右為末棗肉丸梧子大每服五十丸食逺服桑白皮煎湯送下酒腫丸治酒腫及脾虚發腫蘿蔔十枚皂角五枚二味用水煮乾去皂角将蘿蔔搗爛蒸餅糊為丸芡實大蘿蔔煎湯如意送下犀角湯治結陽症四肢腫滿熱菀不散或毒攻注犀角𤣥参連翹柴胡各五分芒硝三錢升麻木通各一錢沉香射干甘草炙各七分麥門冬三錢分二服水煎消腫湯治水腫喘滿大小便不利白术山梔各五錢赤茯苓蘿蔔子各三錢葶藶椒目蘓子各一錢沉香三分木香五分水煎服又方繼前服已上二方神效葶藶二錢椒目一錢猪苓一錢半澤㵼八分葱白三根水煎吞牽牛末為丸則大小便俱通二竒方白术五錢滑石三錢水煎服七服全愈白茯苓湯治水腫開鬼門㓗净府机要方白茯苓澤㵼各二兩郁李仁五錢水煎臨服入生薑自然汁服或作粥飯或和􅋗作粿食之五七日後俟脹下乃與白术散又方大田螺大蒜生車前草和研為膏作大餅敷于臍上少頃水從小便出􅂾日愈病機白术散服前白茯苓湯利後以此補之白术澤㵼各五錢為末以茯苓三錢煎湯調下或丸服亦可每三十丸從少至多後以黄茋建中湯之類調補脹滿門一名皷脹内經曰諸濕腫滿皆属于脾盖言脾虚不能運化此脹滿之所由生也又曰濁氣在上則生䐜脹此清濁相干而為脹也其中亦有寒熱之分靈樞曰脹者皆因厥氣在下寒氣逆上榮氣留止真邪相攻兩氣相摶合而為脹又曰内虚不足中寒濕令人中滿又曰胃中寒則腹滿針經云脹取三陽三陽者足太陽膀胱寒水為脹也此皆以脹為寒也内經曰諸腹脹大皆属于熱丹溪曰七情内傷六滛外侵飲食不節房勞致虚脾土受傷轉輸失職胃雖受谷不能運化故陽自升隂自降而成天地不交之否清濁相混隧道壅塞濕欝為熱熱又生濕濕熱相生遂成脹滿經曰皷脹是也以其外雖堅滿中空無物有似於皷又名蠱者若䖝侵食有蠱之義是以脹滿為熱也陽熱為邪則身體有熱腹滿而咽乾隂寒為邪則吐不下食脹滿而自利又有榖脹水脹氣脹血脹不可不别失飢傷飽痞悶停酸旦食暮不能食者是為榖脹脾土受濕不能制水水漬於腸胃而溢於肌膚漉漉有聲怔忡喘息是為水脹七情欝結氣道壅隔上不得降下不得升身腫大而四肢痩削是為氣脹煩躁漱水迷忘驚狂痛悶嘔惡虚汗厥逆小便多大便黑婦人尤多見之是為血脹又有五臓六腑之脹出靈樞脹論萹全文在醫㫖緒餘靈樞曰心脹煩心短氣卧不安肺脹虚滿而喘咳肝脹脇下滿而痛引小腹脾脹善􅎪四肢煩悦體重不能勝衣卧不安腎脹腹滿引背央央然腰髀痛胃脹腹滿胃脘痛鼻聞焦臭防於食大便難大腸脹腸鳴而痛濯濯冬日而重感於寒則餐泄不化小腸脹小腹䐜脹引腰而痛膀胱脹少腹滿而氣癃三焦脹氣滿於皮膚中輕輕然而不堅膽脹者脇下痛脹口中苦善太息大概有虛實之辨實者腹中常脹外堅内痛按之不䧟法當踈利虚者時脹時减虚氣留滯按之則濡法當以温藥和之又有五積乆而成脹滿者有外感寒邪𫝊入於裏寒變為熱作胃實而脹滿者有痎瘧乆而成脹滿者治療之法在體認詳明按而治之可也乆病羸乏變為脹滿喘息不得及腫脹而肌肉崩潰足脛流水唇黒缺盆平臍突背平足心滿此數者皆為五臓損敗不治之症也陳無擇曰脹滿皆臓氣不平勝乗相因為病如怒傷肝肝尅脾脾氣不正必脹于胃名曰勝尅怒乗肺肺氣不𫝊必脹於大腸名曰乗尅丹溪戒云醫家不察虚實急於作效病者苦于脹急喜行利藥以求通快不知寛得一日半日其腫愈甚病邪深矣真氣傷矣脉訣舉要曰脹滿脉弦脾制於肝洪數熱脹遲弱隂寒浮為虚滿𦂳則中實浮則可治虚則危急丹溪云宜大補中氣行濕此乃脾虚之甚必湏近音樂斷厚味大劑人参白术佐以陳皮茯苓蒼术之類有脉實堅人壮盛者或可攻之便可収補用参术為主凡補氣必帶厚朴寛滿以其味辛能散其結也湏用薑汁製之肥胖人初脹未乆以胃苓湯服如靣白人腹脹是氣虚宜参术厚朴陳皮如痩人腹脹是熱宜黄連厚朴香附白芍如因有故蓄血而腹脹者宜抵當丸下死血如因有食積而腹脹有熱者用木香梹榔丸有寒者用木香厚朴丁香砂仁神麯香附如因外寒束内熱而腹脹者用藿香麻黄升麻乾葛桂枝因大怒而腹脹者宜青皮陳皮香附木香梔子仁蘆薈實者按之堅湏下之次消之次補之虚者温之升之補之朝寛暮急血虚暮寛朝急氣虚終日急氣血俱虚腹脹不寛滿者食肉多用黄連一兩阿魏半兩醋浸􅔻餅為丸同温中丸白术湯下食肉多三補丸料内加香附半夏麯蒸餅糊丸服皷脹說生生子曰脹滿之疾榖食不消小便不利腹皮脹急而光内空空然如皷是矣俗知謂之皷脹不察其致之者有由也内經曰脹取三陽三陽者足太陽寒水膀胱經也靈樞經曰下焦溢而為水靈蘭秘典曰膀胱者州都之官津液蔵焉氣化則能出矣歴考三書可見小便之不利由下焦原氣虚寒以致濕氣壅遏於膚裡膜外之間不得發越勢必腫滿是腫滿之疾起于下元虚寒也若非温補下元則小便何能獨利且夫人之胃如釡甑然釡底火旺則熱氣薰蒸甑炊易熟若徒有水而無火則無氣上升物何由熟即此可以例觀矣故治脹滿者先宜温補下元使火氣盛而濕氣蒸發胃中温煖穀食易化則滿可寛矣夫清氣既升則濁氣自降濁氣降則為小便也小便利脹有不消乎語謂地氣上為雲天氣下為雨惟此氣流水斯為雲為雨也今之醫者一遇此疾則曰内經有言諸濕腫滿皆属脾土土虚則濕停濕停則渗透肌膚遍身腫滿不可不通利也輟用利小便及補中之劑如五苓散胃苓湯加木通車前子大腹皮滑石之類法未為爽謬不然顧服之愈多而小便愈少腫脹愈急何故哉不温補下元而徒以通利之藥施之也果若此豈惟不效則下元益虚真氣益弱死期且至安望其有瘳乎余嘗䆒心靈素叅㑹易理憬然有得於中且施之病者随試輟效故筆之於冊以公我之同志補壮原湯于後治氣脹之劑平肝飲子専治喜怒不節肝氣不平邪乗脾胃心腹脹滿頭運嘔逆脉来浮弦防風桂心枳殻赤芍桔梗炒各一兩人参甘草炙梹榔當歸酒洗川芎陳皮各五錢每服五六錢薑五片水煎服紫蘇飲子治憂思􅂈度致傷脾胃心腹膨脹喘促煩悶腸鳴氣走漉漉有聲大小便不利脉虚𦂳而澁方在痞門調中順氣丸治怒氣傷肝三焦痞滯水飲停積脇下虚滿或時刺痛木香白豆仁青皮橘紅三稜炮各一兩半夏泡大腹子各二兩砂仁梹榔沉香各五錢糊丸梧子大每服三五十丸陳皮湯下木香順氣湯治濁氣在上則生䐜脹及七情所傷陳皮厚朴各四分川歸五分草豆􅅳麺煨去皮木香蒼术米泔洗各三分青皮益智仁白茯苓澤㵼半夏泡乾生薑吴茱茰升麻柴胡各二分加薑水煎服直指橘皮湯治七情所傷中脘不快腹脇脹滿香附米半夏橘紅各二兩甘草七錢半每服一兩薑五片棗二枚水煎服四製枳榖丸治腹脹皷疾陳枳殻去穣四兩分四製同一兩用蒼术一兩同炒一兩乾漆一兩炒一兩用茴香一兩同炒一一兩用蘿苩子兩同炒以炒枳殻黄色為度去同炒藥只用枳壳為末却将蒼术等四味煎湯去渣打麺糊為丸梧子大每服五十丸米飲湯吞下烏藥順氣散脹滿痞塞七情憂思所致此方如神天台烏藥香附沉香砂仁橘紅半夏為末每服二錢灯心湯調寛中八寳散治仝前方木香歸尾蘿蔔子真蘓子梹榔砂仁各一錢半沉香牙皂各一錢共為末每服一錢或二錢黄酒調下小水不利并水腫加苦葶藶子末一錢五分螻蛄後叚炙末一錢入前方内治寒脹之劑大正氣湯治脾胃虚寒外為風寒濕氣擾動心腹脹滿藿香厚朴陳皮半夏白术各二錢半梹榔桂枝枳殻乾薑炮各一錢三分甘草炙五分分作二帖薑三片水煎服大半夏湯治肝氣大盛尅勝於脾脾欝不行結聚涎沫胃中脹滿其脉弦遲半夏桂心各五兩附子炮人参甘草炙厚朴川歸茯苓枳實各二兩川椒炒去汗用開口無目者八百粒每服四五錢薑棗煎服沉香降氣湯治中脘脹滿時吐脇疼每噫則覺氣快不噫則悶漸覺靣浮磨梹榔入紫蘓同煎下神保丸五七粒香附一兩沉香五分砂仁二錢粉草三錢右為末每服一錢入塩少許沸湯服神保丸治諸寒積脹滿急痛大便不利木香胡椒一錢全蝎七個巴豆十粒去皮心研右為末􅔻餅丸麻子大硃砂為衣每服五丸腰脇疼痛茴香酒下餘陳皮湯下順氣木香散治氣不升降嘔逆惡心胸脇痞悶脇肋脹滿及酒食所傷噎食吞酸心脾疼大便不調及媍人血氣刺痛一切冷氣服此寛中利氣和胃進食丁香砂仁良薑桂心乾薑炮甘草炙橘紅厚朴蒼术桔梗茴香炒各三兩每服五七錢加薑棗水煎服蓽澄茄丸治痞滿脹痛榖脹氣脹通用蓽澄茄白豆􅅳砂仁青皮蘿蔔子木香各二分肉豆􅅳茴香炒丁香桂各一分半陳皮三分右為末􅋗糊丸梧子大每服三十丸陳皮湯吞下導氣丸治諸痞塞腹脹如皷大便秘結等症又腎氣小腸氣痛功效尤㨗青皮水蛭等分同炒去水蛭莪术䖟虫等分同炒去䖟虫梹榔斑猫同炒去斑猫胡椒茴香同炒去茴香三稜乾漆炒去乾漆吴茱茰黑丑同炒去黑丑赤芍藥川椒同炒去川椒石菖蒲桃仁同炒去􅊝仁乾薑䃃砂同炒去䃃砂大附子青塩同炒去青塩右十味為末酒糊為丸梧子大每服五十丸加至七十丸紫蘓湯下沉香飲治腹脹氣喘坐卧不安沉香木香枳殻各五錢蘿蔔子炒一兩每服五錢薑三片水煎服木香化滯湯破滯氣心腹滿悶甘草炙白檀香藿香陳皮桔梗大腹皮茯苓白荳仁各二分砂仁人参青皮梹榔木香薑黄白术各四分水煎服縮砂飲治氣脹氣蠱等病如神蘿蔔子研汁砂仁不拘多少以蘿蔔子汁浸透炒乾又浸又炒不厭次多愈多愈妙為細末每服一錢米飲下四炒丸治年髙人患皷脹獨只腹脹肢體如柴舉動乏力木香梹榔各一兩五錢二味剉如芡實大四製一分用蘿蔔子一兩同炒深黄色去蘿蔔子不用一分用乾漆一兩炒烟盡去漆一分用茴香一兩炒深黄色去茴香一分用莪术一兩炒黄色去术右只留木香梹榔為末以四味同炒藥煎湯打糊為丸菉豆大每服七八十丸米飲下中滿分消湯治中滿寒脹寒疝大小便不通隂躁足不収四肢厥冷食入反出下虚中滿腹中寒心痞下寒沉厥奔豚益智仁半夏木香茯苓升麻各七錢五分川烏人参青皮當歸生薑柴胡乾薑黄連蓽澄茄各五錢黄茋吴茱茰草豆􅅳厚朴各五錢右每服一兩水煎温服大忌房勞湿麺生冷一方有麻黄澤㵼各二錢五分黄栢五分錢氏塌氣丸胡椒一兩蝎梢半兩為細末麺糊丸如粟米大每服五七丸至一二十丸陳米飲下木香塌氣丸治单腹脹丁香胡椒各二錢蝎尾半兩枳實一兩白牽牛一兩郁李仁四錢木香梹榔各半兩為末飯丸菉豆大每服十丸至十五丸陳皮生薑湯任下木香散治魚腹脹木香青皮白术薑黄草豆􅅳各半兩阿魏蓽澄茄各一兩右末醋糊丸菉豆大每服二十丸生薑湯下又方治皷氣大癩蝦蟆一隻新瓦二片相合鉄線纒定盛在内外用塩坭固濟慢火煆存性為末温酒調服下三五錢治熱脹之劑中滿分消丸治中滿皷脹氣脹大熱脹水脹人参白术薑黄黄芩黄連半夏炮枳實麩炒各五錢甘草炙猪苓各一錢茯苓砂仁乾生薑各二錢厚朴姜製一兩知母炒四錢澤㵼橘紅各三錢右研茯苓澤㵼生薑各為末餘共為末和匀􅔻餅為丸梧子大每服百丸白湯吞下沉香交泰丸治濁氣在上而擾清陽之氣欝而不伸為䐜脹沉香白术橘紅各三錢茯苓澤㵼枳實去穣炒吴茱茰湯洗當歸酒浸青皮去白木香各一錢大黄酒浸一兩厚朴薑製五錢湯浸􅔻餅為丸梧子大每服七八十丸白湯下㣲利即止廣茂潰堅湯治中滿腹脹内有積塊堅硬如石令人坐卧不安大小便澁滯上氣喘促遍身虚腫厚朴黄芩益智草豆􅅳當歸各五錢吴茱茰紅花酒洗升麻廣茂各二錢甘草柴胡澤㵼神曲炒陳皮青皮各三錢黄連六錢半夏七錢每服七錢薑三片水煎服渇者加葛根四錢鷄屎醴飲治皷脹旦食暮不能食痞滿壅塞雄鷄屎臈月取晒乾一兩川芎一兩二味各為極細末和匀􅋗糊丸梧子大每服五十丸温酒下又方加大黄一兩每服二錢薑湯下推氣丸治三焦痞塞氣不能降胸脇脹滿大便秘小便赤陳皮梹榔枳實黄芩大黄黒丑生等分為末蜜丸梧子大每服五七十丸臨睡白湯下大異香散治榖脹失飢傷飽痞悶停酸早食暮不能食陳皮青皮京三稜莪术益智仁香附子藿香半夏曲桔梗各五錢枳殻五錢甘草炙三分每服五六錢薑棗煎服木香分氣丸善治脾胃不和心腹脹滿兩脇膨脝胸膈注滿痰嗽喘急刺心乾嘔咽㗋不利飲食不化並皆治之亦治榖脹木香梹榔青皮莪术煨當歸黄連白术枳殻麸炒橘紅肉果乾生𤣥胡索京三稜煨赤茯苓秋冬加丁香炒各等分為末麺糊丸小豆大每服三五十丸生湯下忌生冷茄子馬齒莧補下元之劑壮原湯治下焦虚寒中滿腫脹小水不利上氣喘急隂􅇸兩腿皆腫或靣有浮氣人参白术各二錢茯苓破故紙各一錢桂心大附子乾薑砂仁各五分陳皮七分水煎食逺服有痰加半夏一錢㗋中痰聲加桑白皮一錢咳嗽亦加脚趺靣腫加薏苡仁二錢中氣不轉運不知餓加厚朴木香氣欝不舒加沉香烏藥臨服磨入氣虚甚者人参加作五錢大附子加作一錢半汗多者再加桂枝五分白芍藥酒炒􅂈八分若夏月喘乏無力或汗多者加麥門冬一錢五味子十一粒夜夢不安者加逺志一錢兩脇氣硬加白芥子八分若靣浮腫脇下氣硬加白芥子紫蘓子五分若身重不能轉動加蒼术一錢澤㵼七分湿盛加桑白皮赤小荳治血脹人参芎歸湯治小便多大便黒痛悶喘惡名曰血脹當歸半夏三分川芎一兩莪术煨甘草炙木香砂仁烏藥各五錢人参桂五靈脂炒各一分每服三五錢紫蘓葉四片薑五片棗一枚水煎服一方治血皷腹脹如盆三稜煨莪术乾漆炒􅃄盡牛膝去芦酒洗䖟虫糯米炒琥珀肉桂硇砂水蛭石灰炒赤大黄各等分為末用生地黄自然汁和米醋調匀為丸梧子大每服十丸空心温酒下童便下亦可鷄屎醴散治旦食暮不能食血脹痞滿大黄桃仁去皮尖乾鷄屎醴等分為末每服一錢生薑三片煎調食後臨睡服治積塊不消發為脹滿之劑治五蠱脹丸忌塩四十日官桂歸尾橘紅梹榔枳壳炒莪术炒三稜炒大黄酒煮青皮黒丑君白商陸君芫花君大㦸甘遂去心麺包煮赤小豆椒目木香砂仁乾漆炒􅃄盡君枳實炒酒糊為丸梧子大初服三日每服九十丸過三日服八九十丸又過三日服七十丸每用葱七根煎湯送下空心服以行四五次為度行後以温粥補之不行而吐者亦妙次用補法補方青皮桔梗莪术三稜枳實枳壳木香砂仁茯苓梹榔陳皮芍藥細辛歸尾人参香附等分每服四五錢水煎服湏要過四五十日後方許食塩醤食塩用藥法鯽魚去腸将五苓散末入魚腹中焙乾為末白湯調服方許食塩已上三方乃一宗方極峻利非積固體厚者未敢謾試姑録此以偹恭考温白丸治心腹積聚心下堅結大如杯碗傍攻兩脇心痛食不消化桔梗柴胡菖蒲紫苑黄連乾薑桂皮茯苓川椒吴茱茰巴豆去皮心膜去油炒人参厚朴各五錢川烏炮二兩五錢皂莢去皮子炙五錢右為末入巴霜和匀煉蜜為丸梧子大每服三十丸紫蘓湯下取下積滯如魚腦爛綿而安小梹榔丸治脾虚腹脹不進飲食快氣寛中蘿蔔子炒梹榔煨黒丑炒木香各五錢為末􅋗糊丸梧子大每服三四十丸薑湯下治蠱脹将愈内有痞塊用此消之青皮枳壳三稜莪术蒼术厚朴桂皮香附各一兩砂仁草果針砂白芷各五錢烏藥乾漆乾薑各一兩歸尾一兩半梹榔一兩木香二錢半阿魏一錢一方有录礬一斤陳皮一兩為末棗肉丸梧子大每空心好酒吞下五十丸漸加至二錢治脾虚之劑強中湯治痰生冷􅂈飲寒漿有傷脾胃遂成腹脹心下痞滿有妨飲食甚則腹痛乾薑炮白术各二兩青皮去白人参丁香各三兩草果仁附子泡去皮臍厚朴姜製五錢甘草炙五錢每服四五錢薑棗煎服嘔者加半夏如食麺腹脹加蘿蔔子各五錢温胃湯治憂思欝結脾肺氣凝大腸與胃氣不平脹滿冲咳食不得下脉虚而𦂳濇附子炮歸尾厚朴生人参陳皮白芍甘草炙各一兩乾薑兩二錢半川椒二錢半炒每服五六錢水煎服草荳􅅳湯治腹中虚脹澤㵼一分木香三分神麯四分半夏枳實益智草豆䓻黄茋春夏不用甘草各五分青皮陳皮各六分茯苓當歸各七分生薑三片水煎服冬再加黄茋五七分通氣生姜丸治三焦虚脹人参茯苓神麯炒麥芽炒各兩半官桂歸尾陳皮炒六兩半夏洗一兩生薑去皮切六兩厚朴六兩右為末以生薑汁煮􅋗糊為丸梧子大每服三十丸空心食前米飲下治脹而喘嗽之劑定喘葶藶丸治皷脹喘嗽葶藶木香貝母等分為末􅔻餅糊丸梧子大硃砂為衣煎桑白皮湯下或即以四味為末仍以桑白皮湯下尤妙附雜方敷藥治腹硬如石或隂􅇸腫大先用熟水煎甘草後以藥敷肚上大㦸芫花甘遂海藻各等分為末醋調塗或用白􅋗調藥敷肚上慰法治腹脹如皷澁如木皮様杜烏藥并葉荆芥蒼术菵草山茵陳二蚕沙松毛橘葉椒目烏頭赤豆樹葉藠各等分作二次炒熟以布袋盛熨之冷又炒熨三四十度或復用煎水薫洗或服神保丸㣲溏泄其氣獨聖散治脾胃不足􅂈食生冷心腹痛脹塩五合以水一升煎化頓服自然吐即定食􅋗多腹中飽脹以熱酒和生薑汁飲一二盃即消桂香丸治大人小兒􅂈食雜菓腹脹氣急肉桂不見火一兩麝香另研一分為末飯丸菉豆大小兒七丸大人十五丸白湯下二三服神效西来方治腹中積塊作脹作痛大小便不利硼砂二錢苦葶藶子海金沙各三錢乳香一錢半沒藥牙皂各錢半梹榔陳皮三稜各二錢莪术二錢半木香一錢共為末每服五分滚水調下䖝蠱生生子曰按皷症内經靈樞水脹萹只有水與膚脹皷脹腸覃石瘕石水六者又脹論萹載五臓六腑皆有脹状甚著後代諸書論脹鮮有發明予在吴下時有同志友吴生諱震號九宜者慱雅君子也每與予討論多善予一日偶談及皷脹乃詰予曰皷有䖝否乎予卒不敢應俛思乆之對曰或有之當以疑辭對者盖以目未見而書無考也按許學士本事方云臍腹四肢悉腫者為水但只腹脹而四肢不甚腫者為蠱註謂蠱即皷脹也由是叅之古人曾以蠱脹同名矣且蠱以三䖝為首豈無㫖哉愚謂皷脹即今云氣虚中滿是也以其外堅内空腹皮綳急有似于皷故以皷脹名也彼蠱症者中實有物積聚已久濕熱生䖝理或有之吴生曰子質何其敏也予堂嫂病皷三載腹大如箕時或脹痛四肢痩削三吴名劑歴嘗不瘳吴俗死者多用火𦵏焼至腹忽响聲如炮人皆駭然乃見䖝從腹中炮出髙二三丈許焼所之天為昏俄而墜地細視之皆蛔也不下千萬數大者長尺餘䖝腹中復生小䖝多者十五六條或十數條或五六條䖝在人腹中蕃息若此曷不令人脹哉區區藥劑豈易瘳哉顧蠱以多䖝為首于義始見許之以蠱名皷者㫖可徴矣惜乎諸書未有言及子既為後人立言幸繹數方以偹後之治皷疾者知有此蠱字義也予聞之恍然如夣始覺然猶未親見其異也嵗萬厯癸巳赴督漕理刑吴比部之召而至淮隂有王鄉宦者其子年十六新娶後腹脹大按之有塊形如稍𤓰四肢痩削發熱晝夜不退已年半矣族醫惟以退熱消腫之劑投之其脹愈大其熱愈熾甚且喉中兩耳俱瘡余診視之脉滑數望其唇則紅其腹則疼又多嗜肥甘余思諸凡腹疼者唇色淡不嗜飲食今若此得非䖝乎投以阿魏積塊丸服之果下䖝數十大者二一紅一黒長尺餘䖝身紅線自首貫尾䖝腹中有䖝大者數條小者亦三四條䖝下則熱漸减脹漸消三下而愈此余所親治者益信前聞之不虚也世之竒症書所未載者大率類此胡可以未聞未見者而輕議之也余因紀其聞見贅其方於皷症之末治䖝蠱之劑八毒赤丸治男婦染著神鬼謂之鬼疰病服之甚效治䖝積蠱脹如神䧺黄另研礬石硃砂另研牡丹皮附子炮藜蘆巴豆各一兩蜈蚣一条右為末煉蜜丸如小豆大每服五七丸至十丸冷水送下無時昔有副使許可道至雄州請醫㸔脉乍大乍小乍短乍長氣血不均邪氣傷正本官説去路至邯郸驛中夜夢一婦人著青衣不見靣用手于脇下打了一拳遂一㸃痛往来不止寒熱不食乃鬼驚也可服八毒赤丸本官言讀名醫録中㸔李子豫八毒赤丸為殺鬼杖子遂與藥三粒臨卧服明旦下清水二斗立效製藥時宜志誠齋戒紫金丹治䖝蠱并䖝積大黄梹榔各三兩半蒼术貫仲牙皂香附各三兩三稜雷丸黒丑各二兩史君子一兩半白蕪荑苦楝根皮各二兩半右為末每服三錢五更時沙糖湯調服至天明下䖝積不問黄腫皷脹心痛一服即效小児减半㸔大小輕重又方治仝黒丑五靈脂好酒煮梹榔各五錢大黄一兩阿魏二錢桃仁去皮尖研如泥不拘分兩但可丸為率右為末以桃仁膏為丸梧子大每服二錢白湯送下積塊丸治癥瘕積聚癖塊一應難消難化腹中飽脹或䖝積疼痛皆能取效若神不傷元氣京三稜莪术各用醋煨自然銅蛇􅅤石各焼紅醋淬七次二錢䧺黄蜈蚣全用焙燥各一錢二分辰砂八分木香一錢半鉄華粉用糯米醋炒一錢蘆薈天竺黄阿魏全蝎洗全用焙乾各四錢沉香八分氷片五分右為極細末用䧺猪胆汁煉為丸黒狗胆汁尤妙丸如梧桐子大或服七八分重者一錢五更酒送下塊消即止不必盡劑痞氣門内經曰大隂所至為積飲痞隔痞者心下痞滿而不能食也仲景云滿而不痛為痞滿而痛為結胸劉河間曰痞與否同不通泰也謂精神營衞血氣津液出入流行之紋理閉宻而為痞也東垣曰脾無積血不痞夫痞者心下滿而不痛是也太隂者湿土也主壅塞乃土来心下為痞滿也傷寒下太早亦為痞乃因寒傷其營營者血也心主血邪入於本故為心下痞悶仲景立㵼心湯數方皆用黄連以㵼心下之土邪其效如响應桴故活人書云審知是痞先用桔梗枳殻湯非以此専治痞也盖因先從錯下必成痞症是邪氣将䧟而欲􅂈胸中故先用截㪚其邪氣使不致于痞先之一字早用之義也若已成痞而用之則失之晩矣不惟不能消痞而反損胸中之正氣則當以仲景痞藥治之經云察其邪氣所在而調治之正謂此也非止傷寒如此至于酒積雜病下之太􅂈亦作痞盖下多亡隂亡隂者謂脾胃水榖之隂亡也故胸中之氣因虚下䧟于心之分野故至心下痞宜升胃氣以血藥兼之若全用氣藥治之則其痞益甚甚而復下之氣愈下降必變為中滿皷脹皆非其治也又有虚實之殊如實痞大便閉者厚朴枳實湯主之虚痞大便利者白芍陳皮湯主之如飲食所傷痞悶者當消導去其胸中窒塞上逆兀兀欲吐者則吐之所謂在上者因而越之是也王海蔵曰治痞獨益中州脾土以血藥兼之其法無以加矣傷寒痞者從血中来雜病痞者亦從血中来雖俱為血症大抵傷寒之症從外至内從有形至無形故無形氣症以苦泄之有形血症以辛甘㪚之中滿者勿食甘不滿者復當食也中滿者腹脹也如自覺滿而外無腹脹之形即非中滿乃不滿也不滿者病也當以甘治之可也綱目云無形氣症以苦泄之者枳實黄連之類是也有形血症以辛甘㪚之者仲景人参湯之類是也劉宗厚曰痞之為病由隂伏陽蓄氣血不運而成處心下位中央腹滿痞塞皆土之病也與脹滿有輕重之分痞則内覺痞悶而外無脹急之形脹滿則外有形也前人所論皆指悮下而致之亦有不因悮下而然者如中氣虚弱不能運化精㣲則為痞飲食痰積不能施化則為痞濕熱太盛土乗心下則為痞既痞與濕同治惟上下分消其氣如果有内實之症庶可畧與踈導世人痞塞喜行利藥以求速效暫時通快痞若再作益以滋甚是不察夫下多亡隂之意也統㫖曰痞有虚實之殊而又有濕有熱有痰有欝有風寒不消有脾胃虚弱有飲食􅂈傷者當求所因而分治之如實痞大便閉以黄連枳實厚朴苦以泄之虚痞大便利以芍藥陳皮酸以収之濕者四肢困重小便短少宜蒼术茯苓半夏滑石澤㵼以渗之欝者則流滯不通食難消化宜撫芎香附蒼术枳實以開之熱則煩渇溺赤用黄連黄芩葛根升麻以發之便結者即而利之痰則胸中窒塞用半夏𤓰蒌枳實黄連以豁之欲吐者因而越之飲食後因冐風不消而痞宜吴茱茰砂仁草豆蔲藿香温以化之脾胃弱而轉運不調為痞宜四君子湯等甘以補之飲食􅂈傷則腹飽噯氣而致痞塞者又當以青皮枳實厚朴山查麯蘖以消導之至於痰挟血成窠􅇸而痞者用桃仁紅花香附大黄之類若脉右闗多弦弦而遅者必心下堅此肝木尅脾土欝結涎閉於臓腑氣不舒則痞木香順氣湯如下多則亡隂而痞者四物加参苓白术升麻柴胡少佐以陳皮枳殻監制或大病後元氣未復而痞補中益氣湯加陳皮凡此痞滿不可執全在活法詳脉證虚實而治之也劉河間曰三隂三陽之標本治各不同有用寒藥而為熱痞大黄黄連之類也有用寒熱藥者隂與陽不和而痞大黄黄連加附子之類也有用辛熱藥多而寒藥少者隂盛陽虚而痞半夏生薑甘草㵼心三方之類㵼心湯者非㵼心火之熱乃㵼心下之痞也通而論之其藥陽多而隂少盖病發于隂而得之有大黄黄連㵼心湯獨為隂心下痞而脉疾一証桂枝後用從太陽浮弱所變餘皆隂陽雜用直格云傷寒裏之隂分已受熱邪是病發于隂也或熱㣲而下証未全誤下之早則裏熱除去表熱乗虚入裡而作痞也故仲景攻痞多用大黄黄連黄芩寒藥爾後或加乾薑附子之類者是以辛熱佐其寒藥欲令開發痞之怫熱結滯也非攻寒耳劉宗厚曰河間論㵼心湯分隂陽寒熱多少而用藥可謂詳切矣而此論則専主於熱二者似乎不同要之各有所當盖直格是言其受病之本河間是論其用藥之標若以為痞有隂寒之症耶則仲景㵼心五方何皆用黄芩黄連之類若以為痞無隂陽之異耶何㵼心湯又有兼用附子乾薑半夏生薑之類者也一言其本一言其標而已治熱之劑仲景大黄黄連㵼心湯治心下痞按之濡其脉闗上浮或寸沉闗浮而有熱者大黄二兩黄連一兩右剉以麻沸湯漬之須臾絞去渣分温冄服劉宗厚云此少隂經藥也出陽明例成無已云大黄黄連以導㵼心下之虚熱以麻沸湯漬服者取其氣薄而泄虚熱也又按伊尹湯液論大黄黄連黄芩湯共三味今監本無黄芩脱落之也又保命集無黄芩加甘草一兩散寒㵼熱之劑仲景附子㵼心湯治心下痞而復惡寒汗出脉沉遲也大黄二兩黄連黄芩各一兩附子一枚炮去皮臍别取汁右剉以麻沸湯浸之須臾絞去渣内附子汁分温再服半夏㵼心湯治汗下後身寒痞滿而嘔飲食不下脉㣲按之不痛非柴胡症半夏半升泡黄芩乾薑人参各三兩黄連一兩大棗十二枚甘草炙二兩右七味以水一斗煮取六升去渣再煮取三升温分三次服生薑㵼心湯治汗下後胃中不和乾噫食臭自利腸鳴脇下有水氣而心下痞滿即半夏㵼心湯加生薑四兩乾薑只用一兩甘草㵼心湯治下之後腹中雷鳴心下痞硬再下之痞益甚此非結熱以胃中虚客氣上逆也即半夏㵼心湯去人参甘草加作四兩劉宗厚云以上諸㵼心湯元戎云手少隂藥也以其心下痞故入陽明例况服梔子黄芩黄柏大黄為上下通經之劑安得不例陽明乎秘藏大消痞丸治一切心下痞悶及積年久不愈者黄連炒黄芩各六錢薑黄白术各一錢甘草炙砂仁乾生薑神麯炒各一錢人参二錢枳實炒五錢橘紅二錢澤㵼三錢厚朴製二錢猪苓一錢半半夏四錢右為末􅔻餅糊為丸梧桐子大每五十丸漸加至百丸白湯送下枳實消痞丸治右闗脉浮弦心下虚痞惡食懶倦開胃進食枳實黄連各五錢乾生薑二錢厚朴製四錢人参白术半夏麯甘草炙各三錢茯苓二錢大麥麺二錢右為末􅔻餅糊丸梧桐子大每服五六十丸白湯送下失笑丸少茯苓治仝劉宗厚云以上二方並半夏㵼心湯加减法也内有枳實湯四君子五苓平胃等利􅊜消痞補虚之藥也温中散飲之劑枳實理中丸治中脘痞滯氣不宣通積寒停飲食不消化人参乾薑炮白术枳實甘草炙各一兩右為末煉蜜丸如鷄子黄大每服一丸細嚼白湯下或沸湯化下活人書有茯苓理氣之劑活人桔梗枳殻湯治傷寒痞氣胸滿欲絶桔梗枳殻去穰炒各三兩右剉水煎分作二服此手太隂經藥也活人書云審知是痞先用此湯無不騐也縁枳壳行氣下膈故效海蔵云活人用此非治痞也審知錯下必成痞是氣将䧟于胸中故先用此使不致于痞也若已成痞復而用之則失之晩而胸中之氣愈痞矣先之一字預早之意也宣明梹榔散治傷寒隂症下後成痞滿而不痛按之虚軟梹榔枳殻等分為末每服三錢煎黄連湯調下寳鑑三脘痞氣丸治三焦痞滯水餘停積脇下虚滿木香白豆仁青皮炒京三稜炮半夏橘紅梹榔砂仁沉香各五錢大腹皮一兩為末􅎘糊丸梧桐子大每服五六十丸食後陳皮湯送下東垣木香消痞丸治因憂思氣結中脘腹皮厚㣲痛心下痞滿不思飲食木香紅花乾薑各五錢柴胡四錢橘紅三錢當歸尾二錢半夏甘草炙各一兩為末􅔻餅糊丸菉豆大白湯送下七八十丸七氣湯治憂思欝結心腹悶方見氣門兼治濕熱之劑東垣黄連消痞丸治心下痞滿壅塞不散煩熱喘促不寧黄連黄芩澤㵼各一兩枳實炒半夏各七錢乾薑二錢白术茯苓甘草炙各三錢薑黄一錢猪苓右為末􅔻餅糊為丸梧桐子大每服五七十丸食前白湯下蘓橘飲治氣壅發虚浮腫甚效陳紫蘓十四業全陳皮二片砂仁六枚甘草六寸生薑十片棗五個右水煎服紫蘓飲子治憂思傷脾心腹膨脹喘促胸滿腸鳴氣走漉漉有聲大小便不利脉虚𦂳而濇蘓子一兩木通半夏厚朴木香草果陳皮枳實人参白术粉草大腹皮各五錢每服五錢薑棗煎服陳橘皮散治腹内諸痞脹橘紅紫蘓大腹皮各一兩漢防己五錢木香五錢梹榔木通赤茯苓各三分每服五錢加薑煎服雜治東垣木香消痞湯治因憂思欝結中脘腹皮急㣲疼心下痞滿不思飲食食亦不化常覺痞悶柴胡木香各七分半夏生薑枳實各一錢陳皮八分甘草炙五分歸尾二錢草豆仁一錢紅花少許水煎食前熱服忌酒􅋗等物王海蔵云少隂下痢靣赤心下痞㵼心湯加减例易老单用黄連㵼心湯用錢氏法後随証加减煩者加山梔燥者加香豉嘔加半夏滿加枳實厚朴腹疼加芍藥脉遲加附子下焦寒加乾薑大便硬加大黄如用薑附先煎令熟使熱不僣後加黄連同用内傷之劑枳术丸治痞消食強胃枳實去穰麸炒黄色一兩白术二兩為末以荷葉裹焼飯為丸梧桐子大每服五七十丸橘紅枳术丸治老而元氣虚弱飲食不消臓腑不調心下痞悶前方加橘紅一兩古庵橘連枳术丸補脾和胃㵼火消痰即前方再加薑黄黄連一兩平補之劑平補枳术丸調中補血氣消痞清熱白术三兩白芍酒炒一兩半陳皮枳實去穰炒黄連薑汁炒各一兩人参木香各五錢右為末荷葉打米糊丸梧桐子大每服六七十丸米飲下古庵云白术補脾氣為君白芍藥補脾血為臣陳皮以和胃枳實消痞黄連清熱為佐人参以補元氣木香以調諸氣為使如此平補氣血均去痰火兼通氣道則病邪日消而脾胃日壮矣丹溪云心下痞湏用枳實黄連此亦是苦以泄之攻補兼施之劑東垣黄茋補中湯脾虚不能渗濕内痞外浮人参八分黄茋甘草白术蒼术陳皮各五分茯苓猪苓澤㵼各三分水煎温服送下大消痞丸補中益氣湯治中氣虚心下痞脉緩有痰而痞加半夏黄連脉弦四肢滿閉便難心下痞加柴胡黄連甘草大便秘燥加黄連桃仁少加大黄歸身心下痞悶者加白芍藥黄連心下痞腹脹加五味子白芍藥砂仁天寒月加乾薑或肉桂心下痞中寒者加附子黄連心下痞嘔逆者加黄連生薑陳皮假如冬月冄加黄連入丁香藿香葉能食而心下痞加黄連五分枳實三錢如不食心下痞者勿加止照本方服之食已而心下痞别服橘皮枳术丸治痰之劑濟生𤓰蒌實丸治胸膈痞痛徹背脇脹喘急妨悶𤓰蒌實研枳實去穰麸炒半夏桔梗各等分為末薑汁打糊為丸梧子大每服五七十丸食後淡薑湯下按此方𤓰蒌以潤肺降痰枳壳破滯氣半夏豁痰燥􅊜桔梗開膈載藥可謂善治痞悶喘急矣然痰因火動者加黄連尤妙盖黄連佐枳壳消痞甚速赤水元珠卷五
