body:
  text: 赤水元珠卷二十明孫一奎撰婦人門薛氏校注合宜禁忌凡例一云丹溪謂白芍藥性寒味酸産後宜忌恐伐生生之氣若用之於大補湯八珍等湯內以酒拌炒用無妨凡屬脾胃虛寒虛弱面色痿黃者俱宜酒拌炒用一通經丸若脾胃無虧暴怒氣逆或生冷所傷隂血凝滯月經不通者宜暫用之若脾胃虛弱不能生血者宜用六君當歸若因脾胃鬱火內耗其血者宜用歸脾湯若因脾肝鬱怒氣血傷而月經不通者宜加味逍遙散一艾附丸若脾胃虛寒隂血不足氣逆發熱月經不調或胎氣不成者宜暫用之若肝腎虧損隂虛發熱月經不調或崩漏帶下或便血吐衄小便淋澀或晡熱內熱寒熱往來或盜汗自汗不時倐熱宜用六味地黃丸若兼脾氣不足飲食少思者佐以六君子湯一四物湯若脾經血燥發熱或月經不調宜暫用之若因脾經虛熱肝經怒火所致宜四君子佐加味逍遙散若因脾經氣虛血弱晡熱內熱宜用八珍湯加柴胡丹皮若因元氣下陷而致諸症宜補中益氣湯一人參橘皮湯若胎前氣痞痰滯作嘔不食者宜暫用之若脾胃氣虛胸膈痞脹痰停作嘔飲食少思者宜半夏茯苓湯若因怒動肝火尅制脾土而致前症者宜六君子加柴胡山梔枳殼脾胃虛寒者六君子加木香砂仁內半夏治脾胃虛諸症尤當用一紫蘇順氣飲若胎動不安元氣無虧者宜暫用之若因脾氣虛弱者宜六君子加紫蘇枳殼鬱結傷脾者宜四君子加柴胡山梔蘇梗鬱怒傷肝脾者六君子加柴胡黃芩枳殼一四物膠艾湯若內熱胎痛下血不止者宜暫用之若因肝經風熱而下血者用防風子芩丸若因肝火血熱宜加味逍遙散若脾經鬱火宜加味歸脾湯若因肝氣虛陷宜補中益氣湯倍加升麻柴胡若因事下血者宜八珍湯加膠艾一黃芩白术二味為安胎之藥若脾胃藴熱中氣無虧者宜暫用之凡屬脾胃虛痞飲食少思或泄瀉嘔吐面色痿黃肢體倦怠者宜六君子湯一達生散若厚味安逸者宜用若芻蕘勞役者不宜用一妊娠腹痛須驗其面赤舌青者此胎已死用平胃散加朴硝三錢下之下後隨用八珍大補等湯調補之若唇口俱青吐出痰沫者子母俱死也若面舌俱青者母死子活産下亦死一小續命湯若外中風邪腰背反傷筋脈瘈瘲者宜暫用之若産後失血過多陽火熾盛虛熱生風者宜八珍湯加鈎藤丹皮如不應當用四君子湯加當歸丹皮鈎藤若陽氣脫陷者宜補中益氣湯如不應急加附子氣虛血敗者宜用十全大補湯如不應急加附子亦有生者一澤蘭湯若産後惡露腹痛胸滿少氣宜用之若體倦面黃食少少寐而惡露不止宜加味歸脾湯若氣血虛損而惡露上攻先用失笑散後用八珍湯禁用黑神散奪命丹之類一産後口鼻起黑氣鼻衄者是胃氣虛敗而血滯也急用二味參蘇飲多有生者宫人孀婦治驗一婦人年三十有七早孀居兩腿骨作痛晡熱體倦月經不調或發寒熱數年矣一日頸項兩側結核兩脅脹痛此係肝經鬱火而成也先用小柴胡湯合四物數劑肝症頓愈又用加味逍遙散加澤蘭乳香沒藥三十劑血症漸痊再用加味歸脾湯年餘而安一孀婦兩腿作痛或用除濕化痰等藥遍身作痛而無定處此血症也不信乃服流氣飲之類而殁一放出宫人年四十餘臀腿內股作痛晡熱口乾月經不調此係肝經血少不能養經絡而然也宜加味逍遙散加澤蘭葉五十帖諸症稍緩又以歸脾湯二百餘劑而痊一放出宫人臀腿腫痛內熱晡熱惡寒體倦咳嗽胸痞月經過期而少彼以為氣毒流注服清熱理氣之劑益甚此肝經瘀血停留所致蓋肝經上貫鬲布脅肋循喉嚨下循膕內臁繞隂器抵少腹主治之法但當補其所不勝而制其所勝補者脾也制者肝也經曰虛即補之實則瀉之此定法也彼不信仍服前藥遂致不起婦人症與男子無以異也所異者月水胎産崩帶等症耳今惟搜其異與赤緊者集為一門餘雜症治同男子當於雜症門中求之兹不重録調經門岐伯曰女子七嵗腎氣盛齒更髮長二七而天癸至任脈通太衝脈盛月事以時下天謂天真之氣癸為壬癸之水故云天癸也然衝為血海任主胞胎二脈流通經血漸盈應時而下常以三旬一見以像月盈則虧也若遇經行最宜謹慎否則與産後症相類若經行惱怒勞役則氣血錯亂經脈不行多致癆瘵等疾若逆於頭面肢體之間則重痛不寧若怒氣傷肝則頭暈脅痛嘔血而瘰􅊓癰瘍若經血內滲則竅穴淋瀝無已然此六淫外侵而變症百出犯時微若秋毫成患重如山嶽可不畏哉禇澄遺書曰飲食五味養骨髓肌肉毛髮男子為陽陽中必有隂隂中之數八故一八而陽精升二八而陽精溢女子為隂隂中必有陽陽中之數七故一七而隂血升二七而隂血溢皆飲食五味之實透也方其升也智慮開明齒牙更始髮黃者黑筋弱者強暨其溢也凡充身體手足耳目之餘雖針芥之厯無有不下凡子形肖父母者以其精血嘗於父母之身無所不厯也是以父一肢廢則子一肢不肖其父母一目虧則子一目不肖其母然雌烏牝獸無天癸而成胎何也鳥獸精血往來尾間也精未通而御女以通其精則五體有不滿之處異日有難狀之疾隂已痿而思色以降其精則精不出而內敗小便澀而為淋精已耗而復竭之則大小便牽痛愈痛即愈便愈便即愈痛女人天癸既至十年無男子合則不調未踰十年思男子合亦不調不調則舊血不出新血誤行或漬而入骨或變而為腫後雖合而難子合多則瀝枯虛人産衆則血枯殺人觀其精血思過半矣夫血者水榖之精氣也和調五臟灑陳六腑男子化而為精女人上為乳汁下為經水故雖心主血肝藏血亦皆統攝於脾補脾和胃血自生矣凡經行之際禁用苦寒辛散之藥飲食亦然王子亨方論曰經者常候也謂候其一身之隂陽愆伏知其安危故每月一至太過不及皆為不調陽太過則先期而至隂不及則後時而來其有乍多乍少斷絶不行崩漏不止皆由隂陽衰盛所致故曰血氣和平則樂有子和則隂陽不爭月水以時下也薛氏曰經云脾統血肝藏血婦人多因恚怒傷肝鬱結傷脾所致當從二經為主而參以前論治之産寶方序論曰大率治病先論其所主男子調其氣女人調其血氣血者人之神也然婦人以血為基本苟能謹于調護則血氣宣行其神自清月水為期血凝成孕若脾胃虛弱不能飲食榮衛不足月經不行肌膚黃燥面無光澤寒熱腹痛難於子息或帶下崩漏血不流行則成瘕症經水或紫或黑論丹溪曰經水者隂血也隂必從陽故其色赤稟火色也血為氣之配氣熱即熱氣寒即寒氣升則升氣降即降氣凝則凝氣滯則滯氣清則清氣濁即濁往往見有成塊者氣之凝也將行而痛者氣之滯也來後作痛者氣血俱虛也色淡者亦虛也而有水混之也錯經妄行者氣之亂也紫者氣之熱也黑者熱之甚也今人但見其紫者黑者作痛者成塊者率指為風冷而行溫熱之劑則禍不旋踵矣良由病原論月水諸病皆曰風冷乘之宜其相習而成俗也或曰黑北方水色也紫淡於黑非冷而何豫曰經云亢則害承乃制熱甚者必兼水化所以熱則紫甚則黑也况婦人性執而見鄙嗜欲加倍臟腑厥陽之火無日不起非熱而何若曰風冷必須外得設或有之蓋千百一二者也治經水紫黑為熱例海藏四物芩連湯治經水如黑豆汁四物湯四兩黃芩黃連各一兩為末醋糊為丸服丹溪治月水黑口渴倦怠脈不勻似數黃柏炒黃芩各三錢甘草二錢赤芍藥香附各半兩右醋糊丸白湯下五六十丸一婦二十嵗月水二月不行忽行小腹痛有塊血紫色白芍白术陳皮各半兩黃芩川芎木通各二錢甘草五分右水煎服一婦氣滯血澀脈不澀經不調或前或後紫色兩大腿外臁麻木或時癢而生瘡大便祕滯火麻仁桃仁芍藥各二兩枳殼葳靈仙白术歸頭訶子肉生地陳皮各五錢大黃煨七錢為末粥丸梧子大白湯下五六十丸調經之劑局方四物湯治衝任虛損月水不調臍腹疞痛當歸川芎白芍藥熟地黃各等分水煎服逍遙散治血虛煩熱月水不調臍腹脹痛潮熱咳嗽炙甘草五分當歸茯苓白芍白术柴胡各一錢右加薄荷葉生薑水煎服膠艾湯治勞傷血氣衝任虛損月水過多淋瀝不斷阿膠炒川芎炙甘草各五分當歸艾葉炒各一錢熟地白芍各二錢水煎服溫經湯婦人血海虛寒月水不利繞臍疼痛桂枝桃仁湯萬病几皆可用當歸川芎芍藥桂心丹皮莪术各五分人參甘草牛膝各一錢水煎服丹溪加味四物湯調經例經候過而作痛血氣俱虛也宜本方對四君子將來而痛者血實也本方加桃仁黃連香附經水不及期者血熱也本方加黃連過期者血少也本方加參术有痰加半夏陳皮過期紫黑有塊者血熱也必作痛加香附黃連過期而淡色者痰多也芎歸二味入二陳湯紫色成塊者熱也本方加黃連柴胡肥人不及日數而多痰者乃血虛有熱本方加香附南星半夏黃連白术瘦人血枯經閉者本方加桃仁紅花或越鞠丸四物加減調經例經水微少漸漸不通手足煩痛肌漸瘦生潮熱脈微數本方去川芎地黃加澤蘭葉三倍甘草半分經水過多本方去熟地加生地經行身熱脈數頭昏本方加黃芩柴胡各半兩經行微少或脹或疼四肢疼痛加𤣥胡沒藥經候不調心腹疞痛只用芎歸二味名君臣散元戎加味四物湯氣充經脈故月事頻併臍下多痛本方加芍藥經欲行臍腹絞痛本方加𤣥胡檳榔苦練木香經水過多本方加黃芩白术經水澀少本方加葵花紅花經水適來適斷或往來寒熱宜先服小柴胡去寒熱後以四物湯和之簡易當歸散經候不勻或三四月不行或一月再至或天癸已過期經脈不調川歸白芍川芎黃芩白术各半兩山茱萸肉半兩右為末每服空心溫酒調二錢日三服寶鑑生地黃丸治婦人血實厥隂脈弦而長惡風體倦乍寒乍熱面赤心忪或時自汗如傷寒狀宜服抑陽藥生地二兩柴胡秦芁黃芩各半兩芍藥一兩右為末蜜丸梧子大烏豆湯吞三四十丸日三服薑黃散治血臟久冷月水不調臍腹刺痛當歸丹皮𤣥胡各二兩芍藥三兩川芎紅花桂心莪术各一兩川薑黃四兩右為末每服一錢酒水同煎服理氣之劑淡寮煮附丸經候不調血氣刺痛腹脅膨脹頭暈惡心崩漏帶下並宜服之香附子擦去毛米醋浸一日磁器煮醋盡炒乾右醋糊為丸梧子大每服五十丸淡醋湯下艾附丸治同前艾葉四兩川歸二兩香附子一斤照上製為丸服亦同嚴氏抑氣散婦人氣盛於血變生諸症頭暈膈滿香附四兩茯神炙甘草各一兩陳皮二兩右為末每食逺沸湯調下二錢正氣天香散治婦人一切氣氣上凑心心胸攻築脅肋刺痛月水不調台烏藥二錢香附八錢陳皮蘇葉各一錢乾薑半錢右分二帖水煎服丹溪治一婦年四十八因有白帶口渴月經多初血黑色後來血淡倦怠食少臍上急白术一錢半紅花豆許陳皮一錢木通黃芩各五分縮砂炙甘草各三分枳殼五分白芍一錢水煎吞保和丸三十丸抑青丸二十丸經水過多黃芩炒芍藥炒各一兩黃柏炒三錢龜板炙一兩香附二錢半椿根白皮七錢半酒糊為丸白湯吞五六十丸一婦脈弦而大不數形肥初夏倦怠月經來時多此稟受弱氣不足以攝血故行多也黃茋陳皮各一錢白术錢半人參五分炙甘草三分水煎服四物加熟地當歸湯治經水少而色和四物湯四兩熟地當歸各一兩丹溪抑氣丸臨經之時腹痛以四物湯加𤣥胡索陳皮丹皮甘草痛甚以豆淋酒下痛輕以童便香附入條芩為丸又一婦年四十月水不調行時腹痛行後又有三四淋瀝皆穢水口渴面黃倦怠無力白术一兩歸身尾六錢陳皮七錢黃連三錢木通黃茋黃芩各二錢炙甘草一錢分八帖水煎吞五靈丸四十粒桂枝桃仁湯經前腹痛不可忍桂枝芍藥生地各二錢桃仁四枚甘草一錢薑三片棗一枚水煎服又方當歸𤣥胡索每服三錢薑三片水煎稍熱服本事方治婦人月經壅滯每發心腹臍疞痛不可忍及治産後惡露不快血上搶心迷悶不省人事氣絶欲死者琥珀散京三稜蓬莪术赤芍藥劉寄奴牡丹皮熟地黃官桂真蒲黃菊花當歸各一兩右前五味用烏豆一升生薑半斤切片米醋四升同煮豆爛為度焙乾入後五味同為末每服二錢溫酒調下空心食前服一方不用菊花蒲黃用烏藥𤣥胡索亦佳豫家之祕方也若是尋常血氣痛只一服産後血衝心二服便下常服尤佳豫前後救人急切不少此藥亦宜多合以救人交加散治營衛不和月經湛濁逐散惡血腹痛經血諸疾並皆治之生薑二斤生地二斤二味製白芍藥當歸桂心各一兩紅花炒無惡血不用沒藥另研各半兩蒲黃隔紙炒𤣥胡索醋紙包用布擦去皮各一兩右將地黃汁炒生薑滓薑汁炒地黃渣各焙乾用諸藥為細末每服三錢溫酒調下若月經不依常蘇木煎酒調下若腰痛砂糖酒調下交加地黃丸治婦人經不調血塊氣痞肚腹疼痛生地老薑各一斤𤣥胡當歸川芎芍藥各二兩明沒藥木香各一兩桃仁去皮尖人參各兩半香附半斤右為末先以薑汁浸地黃渣地黃汁浸生薑渣晒乾皆以汁盡為度共十一味作一處晒乾研為末醋糊為丸空心以薑湯下一婦患經血紫黑一月二次行不思食口苦時發熱麥冬歸身白芍陳皮白术各一兩人參地黃茯苓各半兩木通三錢生甘草一錢右分十帖食前熱飲下抑青與㸃各十五丸益母草膏益母草未結子時採來搗汁熬膏每用半杯和酒或薑汁調服大治汚血及月經不調肥人不及期而多痰者血虛有熱南星白术蒼术黃連香附川芎作丸服婦人血脈不調往來寒熱狀如勞倦川歸川芎甘草黃茋官桂各一兩熟地白术白芍各二錢柴胡阿膠各半兩右每服五錢棗一枚水煎空心溫服為末白湯調下亦得常服則無帶下極調血脈養子宫終身無病薛氏曰有脾經血燥而經先期者加味逍遙散脾經鬱火先期者歸脾湯肝經怒火而先至者加味小柴胡湯血分有熱而先至者加味四物湯勞役火動補中益氣湯有脾經血虛而後至者人參養榮湯肝經血少而後至者六味地黃丸氣虛血弱者八珍湯蓋血生于脾土故云脾統血凡血病當用苦甘之劑以助陽氣而生隂血也經行臍腹痛甚以桃仁桂枝湯一劑而瘥經行腹先痛用局方七氣湯送來復丹局方積氣丸痃癖癥瘕諸氣亦效丹參丸調經養血金陵一家専製此與四製杜仲丸兩京甚重此二藥丹參淨四兩酒浸一宿日晒乾大川芎一兩半川歸身酒浸二兩淨天台烏藥一兩香附三兩童便浸炒七次只用淨末一兩右為末煉蜜為丸梧子大每空心酒吞七十丸經水當止不止婦人四十九嵗已後天癸當住每月却行或過多不止乃血熱也宜芩心丸黃芩心枝條二兩米泔浸七日炙乾又浸又炙如此七次為末醋丸梧子大每服七十丸空心溫酒送下日三良方曰婦人月水不斷淋瀝腹痛或因勞損氣血而傷衝任或因經行而合隂陽以致外邪客於胞內滯於血海故也但調養元氣病邪自愈若攻其邪則元氣反傷矣薛氏曰前症若是鬱結傷脾用歸脾湯恚怒傷肝逍遙散肝火妄動加味四物湯脾氣虛弱六君子湯元氣下陷補中益氣湯熱傷元氣加麥冬五味黃柏炒黑許學士云經脈過期不及腰腹疼痛或七七數盡而月經仍下者宜用簡易當歸散治之方見調經氣虛者去黃芩加桂心一兩黃芩湯治經血不止方出崩居經婦人月水當三旬一見今三月始一至名曰居經脈經曰少隂脈微而遲微則無精遲則隂中寒澀即血不來此為居經三月一來脈經曰婦人年已五十一旦而清血二三日不止何以治之師曰此婦人前絶生經水不下今反清血此為居經不須治當自止經水下常五日止者五日愈月經不通出婦人良方婦人月水不通或因醉飽入房或因勞役過度或因吐血失血傷損肝脾但滋其化源其經自通若小便不利若頭眩痛腰背作痛足寒時痛久而血結于內變為癥瘕若血水相併脾胃虛弱壅滯不通變為水腫若脾氣衰弱不能制水水漬肌肉變為腫滿當益其津液犬補脾胃方可保生東垣曰經閉不行有三婦人脾胃久虛形體羸弱氣血俱衰而致經水斷絶不行或病中消胃熱善食漸瘦津液不生夫經者血脈津液所化津液既絶為熱所爍肌肉漸瘦時見渴燥血海枯竭病名曰血枯經絶宜瀉胃之燥熱補益氣血經自行矣此症或經適行而有子子亦不安為胎病者有矣或心包脈洪數躁作時見大便祕澀小便雖清不利而經水閉絶不行乃血海乾枯宜調血脈除包絡中火邪而經自行矣或因勞心心火上行月事不來者胞脈閉也包脈者屬心而絡于包中今氣上迫肺心氣不得下通故月事不來宜安心補血瀉火經自行矣潔古曰女子月事不來者先瀉心火血自下也內經曰二陽之病發心脾有不得隱曲故女子不月其𫝊為風消王啓𤣥注曰大腸胃熱也心脾受之心主血心病即血不流脾主味脾病即味不化味不化則精不足故其病即不能隱曲脾土已虧即風邪勝而氣愈消也又經曰月事不來者胞脈閉也宜先服降心火之劑後服局中五補丸後以衛生湯治脾養血也五補丸補諸虛安五臟堅骨髓養精神熟地人參牛膝白茯苓地骨皮各等分右煉蜜丸梧子大每服五十丸溫酒空心服衛生湯當歸白芍各二兩黃茋三兩甘草一兩每服五錢水煎空心服如虛者加人參一兩按東垣潔古治血枯之法皆主於補血瀉火也補血者四物之類瀉火者東垣分上下中故火在中則善食消渴治以調胃承氣之類火在下則大小便祕澀治以玉燭之類玉燭者四物與調胃承氣等分也火在上則得于勞心治以芩連及三和之類三和者四物涼膈當歸等分也潔古先服降心火之劑者蓋亦芩連三和玉燭之類後服五補衛生者亦補氣之劑也黃帝曰有病胸脅支滿者妨于食病至則先聞腥臊臭出清液先唾血四肢清目眩時時前後血病名為何何以得之岐伯曰病名血枯此得之少年時有所大脫血若醉入房中氣竭肝傷故月事衰少不來也帝曰治之奈何岐伯曰以四烏鰂骨一蘆茹二味并合之丸以雀卵大如小豆以五丸為后飯飲以鮑魚汁利腸中及傷肝也王啓𤣥注云烏鰂魚骨主血閉蘆茹主散惡血雀卵主血痿鮑魚主瘀血河間宣明論方烏鰂魚骨蘆茹各等分雀卵不拘數和丸小豆大每服五丸至十丸煎鮑魚湯下食後日三服壓以美膳養生必用論曰女子十四天癸至任脈通月事以時于是有子天癸者物之自然月者以月至經者有常也其來過與不及皆謂之病若榮血虧損不能滋養百骸即髮落面黃羸瘦燥熱燥氣盛則金受邪金受邪則為咳為嗽為肺癰為肺痿必矣但助胃壯氣則榮血生而經自行須慎飲食調七情保神氣庶可得生若暴怒氣逆經閉不行當用行氣破血之劑劉宗厚曰榮者水榖之精氣和調于五臟灑陳于六腑乃能入于脈也源源而來生化于脾總統于心藏受于肝宣布于肺施泄于腎灌溉一身目得之而能視耳得之而能聽手得之而能握足得之而能步臟得之而能液腑得之而能氣注之于脈少則澀充則實常以飲食滋養則陽生隂長變化而為血諸經恃此則百脈長養耗竭則百脈空虛可不慎哉若隂氣一傷變症百出妄行于上即吐衄衰涸於下則癃閉血滲腸間則為腸風隂虛陽摶即為崩濕蒸熱瘀則為滯下熱極腐化即為膿血火極似水則血紫黑熱勝于隂發為瘡瘍濕滯于血則為痛癢癮疹蓄之在上則善忘蓄之在下則善狂冦宗奭曰夫人之生以氣血為本人之病未有不先傷其氣血者若室女童男積想在心思慮過度多致勞損男子即神色消散女子即月水先閉且心病即不能養脾故不嗜食脾虛即金虧故發嗽腎水絶則木氣不榮而四肢乾痿故多怒鬢髮焦筋骨痿若五臟𫝊遍則死苟或自能改易心志用藥扶持庶可保生切不可用青蒿虻蟲等涼血行血宜柏子仁丸澤蘭湯益隂血制虛火也按內經五榖入于胃其糟粕津液宗氣分為三隧故宗氣積于胸中出于喉嚨以貫心脈而行呼吸營氣者泌其津液注之于脈化以為血以營四末內養五臟六腑若服苦寒之劑復傷胃氣是犯生生之戒必致於不起也薛氏曰按經水隂血也屬衝任二脈上為乳汁下為月水其為患有因脾虛而不能生血者有因脾鬱而血不行者有因胃火而血消燥者有因脾胃損而血少者有因勞傷心而血少者有因怒傷肝而血少者有因腎水少不能生肝而血少者有因肺氣虛不能行血者治療之法若脾虛而不能行者調而補之脾鬱而不行者開而補之胃火而不行清而補之脾胃損而不行溫而補之勞傷心血而不行逸而補之怒傷肝而不行和而補之肺氣虛而不行補脾胃腎虛而不行補脾肺經云損其肺者益其氣損其心者調其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精皆當審而治之蕭氏曰經云氣上迫肺則心氣不得下通故月事不來今用連朴之類𨗳痰降火使氣不上迫于肺故心氣下通而月事來也丹溪治一婦久瘧食少經閉兩手無脈每日與三花神祐丸十餘粒津咽之月餘食進脈出又半月脈愈又一月經行亦此意也豫嘗體此治陳婦二十嵗形肥痞塞不食每日卧至未牌喫一盞粥粥後必吐水半碗復卧經閉三月前時忽通黑色脈之辰時寸關滑皆有力午後關滑寸不滑詢之因乘怒飲食而致遂以白术一兩半厚朴黃連枳實各一兩半夏茯苓陳皮山查人參滑石各八錢縮砂香附桃仁各半兩紅花二錢分十帖各入薑汁三匙日進之間三日以神祐丸神祕沉香丸微下之至十二日吐止食漸進四十日平復如故又汪氏年三十餘形瘦亦痞不食吐水經不通以前方加參术歸為君煎熟入竹瀝半盞薑汁服之但不用神祐丸下亦平復若咳嗽寒熱而經閉者當于咳門求之張子和曰凡月事不來用茶調散吐之次用玉燭散芎歸湯三和湯桂芩白术散之類降心火益腎水開胃進食分隂陽利水道之藥也一婦月事不行寒熱往來口乾頰赤飲食少旦暮間咳一二聲諸公皆用虻蟲水蛭乾漆碙砂芫青紅娘子沒藥血竭之類惟豫不然古方雖有此法奈病人服之臍腹必發痛飲食不進乃命止藥飲食稍進內經曰二陽之病發心脾心受之則血不流故不月既心受積熱宜抑火升水流濕潤燥開胃誘食乃涌出痰一二升下泄水五六行濕水上下皆去血氣自然湍流月事不為水濕所隔則依期而至矣亦不用虻蟲水蛭有毒之藥如用之則月經縱來小溲反閉他症生矣凡精血不足宜補之以食大忌有毒之藥偏勝而致天閼多矣一婦三十四嵗經水不行寒熱往來面色痿黃唇焦頰赤時咳二三聲問其所服之藥黑神散烏金丸燒肝散四物湯鱉甲散建中湯寧肺散針灸千百轉劇家人意倦不欲求治豫憫之先涌痰五六升午前涌畢午後食進餘症悉除後三日復輕涌之又去痰一二升食益進不數日又下通經散瀉訖一二升後數日去死皮數重小者如麩片大者如葦膜不一月經水自行神氣大康室女月水不通用雄鼠屎一兩燒存性為細末空心溫酒調下一錢神效仲景礬石丸婦人經水閉不利臟堅癖不止中有乾血下白物礬石枯三錢杏仁二錢半二味末之蜜丸棗核大內隂中劇者再內之琥珀散治心膈迷悶肚腹撮痛月信不通等疾烏藥二兩當歸蓬术醋煨各一兩右為末溫酒調下二錢萬病丸月經瘀閉臍腹作痛及産後癥瘕等病乾漆炒烟出青白為度牛膝酒浸焙各一兩為末生地黃汁一升砂器慢火熬膏丸梧子大每服二十丸空心米飲下紅花當歸散經候不行腰胯重痛小腹堅硬紅花當歸尾紫葳牛膝炙甘草蘇木各二錢白芷桂心各一錢半赤芍炒一兩劉寄奴苗五錢為末酒調服三錢柏子仁丸柏子仁炒另研牛膝酒洗炒卷柏各半兩澤蘭葉一兩右蜜丸梧子大每服三十丸空心米飲下澤蘭湯澤蘭葉二錢當歸芍藥各一錢炒炙甘草五分水煎服茯苓補心湯治婦人心氣虛耗不能主血又不能制乎肺金氣得以乘乎肝木肝既虧損則血不能藏漸致精血枯涸月事不調此方專補心元之虛抑其肺氣調和營衛滋養血脈前方參蘇飲內除木香餘與四物湯對勻每服五錢以薑棗煎溫服此方常進用以治宫娥多效牛膝散治月水不利臍腹作痛或小腹引腰氣攻胸膈牛膝桂心赤芍炒桃仁𤣥胡索炒川歸丹皮各一兩右為末每服一錢酒調服或每服五錢水煎服地黃通經丸治月經不行或産後惡露臍腹作痛熟地四兩虻蟲去頭翅炒水蛭糯米同炒黃去米桃仁去皮尖各五十枚右煉蜜丸梧子大每服五七丸空心酒下牡丹皮散婦人月水不利臍腹疼痛丹皮大黃炒各一兩赤芍生地桃仁川歸桂心赤茯苓白术各七錢半石葦去毛木香各半兩右每服五七錢薑三片水煎空心服本事通經丸婦人室女月水不通疼痛或成血瘕桂心青皮去白大黃炒乾薑川椒川烏乾漆莪术川歸桃仁各等分為末先將四錢用米醋熬成膏和餘末調勻搗千杵丸如梧子大晒乾每服二十丸淡醋湯下加至三十丸溫酒亦得厚朴湯治月水不通屢試有驗因氣滯痞嘔結痰在上寒熱厚朴薑汁炙香切細濃煎去渣空心服不過三四劑瘥丹溪積痰傷經不行夜則妄語瓜蔞子一兩黃連五錢吳茱萸一錢半桃仁五十枚紅麯二錢縮砂三兩山查末薑汁􅔻餅糊為丸軀肥脂滿經閉者導痰湯加芎連不可服地黃如用以薑汁炒過即二陳加枳實黃連是也一婦年二十餘兩年經閉食少乏力黃連二兩白术一錢半陳皮滑石各一錢黃芩半兩木通三分桃仁十二枝炙甘草少許水煎服瘀血鬱滯經閉或臨經時腰疼腹痛宜四物加紅花桃仁莪术𤣥胡香附木香發熱加黃芩柴胡瘀血作痛經閉不行丸藥方香附醋煮四兩瓦楞子煅二兩醋煮一晝夜桃仁二兩丹皮大黃蒸川歸各一兩川芎紅花各半兩為末􅔻餅丸梧子大空心溫酒下三五十丸經水過期不行𤣥胡索一錢香附枳殼各五分為末杜牛膝汁半鍾空心調服當歸散治經脈不通川歸川山甲灰炒蒲黃炒各半兩辰砂一錢麝香少許右為末酒調服二錢菖蒲丸血積心脾作痛九莭菖蒲六兩吳茱萸炒香附子各四兩右為末醋打神麯糊為丸梧子大每服五十丸薑湯下沒藥散血氣不行心腹疼痛或走注痛月經不調發熱晡熱並宜用之紅花沒藥川歸𤣥胡炒右各等分為末每服二錢童便酒調下葳靈仙散凡冷氣滯血少小腹疼痛或經行遇怒腹脹痛宜用之葳靈仙一兩川歸沒藥木香桂心各五錢為末每服一錢熱酒調下當歸散凡血積小腹痛或因氣逆月經不行肚腹作痛川歸炒赤芍沒藥枳殼麩炒劉寄奴𤣥胡各等分為末每服一錢酒調下加味建中湯血海受寒小腹作痛桂心半兩白芍一兩炙甘草二錢半吳茱萸當歸𤣥胡丹皮各五錢每服五錢加薑棗水煎食前服滋血湯婦人血熱氣虛經候澀滯不通肢體麻木肌熱生瘡渾身癢倦將成癆瘵不可妄服藥餌宜以此滋養自能通利馬鞭草荆芥穗各四兩桂心枳殼川芎川歸丹皮赤芍各一兩每服五錢烏梅一枚水煎食前服如有此症服半月經脈自通百病皆愈出適宜方崩生生子曰崩者謂傾陷之勢而不可遏俗曰血山崩謂血暴下如山之崩壞也又曰血海敗蓋衝任二脈為血之海附于陽明陽明者土也土位乎中故又曰崩中內經隂陽别論云隂虛陽摶謂之崩東垣曰婦人脾胃虛損致尺部脈沉細而數或沉弦而洪大有力寸關脈亦然皆由脾胃有虧下陷于腎與隂火相合濕熱下迫經漏不止其色紫黑如夏腐肉之臭中有白帶者脈必弦細寒作于中中有赤帶者其脈洪數疾熱明矣必腰痛或臍下痛臨經欲行先見寒熱往來兩脅急縮兼脾胃症出見或四肢困熱心煩不得眠心下急宜大補脾胃而升舉血氣可一服而愈或人故貴脫勢人事疏少或先富後貧心氣不足其火大熾旺于血脈之中又致脾胃飲食失莭火乘其中形質肌肉容顔似不病者此心病不行於診故脾胃症顯矣故經水不時而下或暴下不止治當先說惡死之言勸諭令拒死而心不動以大補氣血之藥補養脾胃微加鎮墜心火之藥治其心補隂瀉陽經自止矣痿論云悲哀太甚則胞絡絶胞絡絶則陽氣內動發則心下崩數溲血也故本病曰大經空虛發則肌痺𫝊為脈痿此之謂也良方論曰婦人崩中由臟腑傷損衝任血氣俱虛故也衝任為經脈之海血氣之行外循經絡內營臟腑若無傷損則隂陽和平而氣調適若勞動過多致臟腑俱傷而衝任之氣虛不能約制其經血故忽然暴下或由隂陽相搏為熱所乘攻傷衝任血得熱則流散甚者致于昏悶其脈數小則為順洪大為逆大法當補脾胃為主薛氏曰經云陽絡傷則血外溢隂絡傷則血內溢又云脾統血肝藏血治法前症因脾胃虧損不攝血歸元用六君子加芎歸柴胡若肝經之火而血下行用奇效四物湯或四物加柴梔苓术若肝經風熱而血妄行用加味逍遙散或小柴胡梔芍丹皮若怒動肝火而血沸騰亦用前藥若脾經鬱結而血不歸經用歸脾加柴梔丹皮若悲傷胞絡而血下崩用四君加柴梔升麻故東垣先生云凡下血症須用四君以收功厥言㫖哉若大吐血毋以脈論當急用獨參湯救之若潮熱咳嗽脈數乃元氣虛弱假熱之脈尤當用人參溫補此等症候無不由脾胃先損故脈洪大察其有胃氣能受補則可救苟用寒涼止血之藥復傷脾胃反不能攝血歸源是速其危也丹溪曰血崩亦有因涎鬱胸中清氣不升故經脈壅遏而降下非開涎不足以行氣非氣升則血不能歸隧道此論血泄之義甚明蓋開胸膈濁涎則清氣升清氣升則血歸隧道不崩矣故其證或腹滿如孕或臍腹疞痛或血結成片或血出即快止即悶或臍上動其治法宜開結痰行滯氣消瘀血又曰勞動過傷臟腑衝任之氣虛不能約制其經血故忽然而下謂之崩中暴下當宜大補氣血之藥舉養脾胃微加鎮墜之劑治其心補隂瀉陽經自止矣急即治其標用白芷湯調百草霜末甚者棕櫚灰後用四物湯加炒乾薑調理因勞者用參蓍帶升補藥因寒者用乾薑因熱者用黃芩崩過多者先以五靈脂末一服當分寒熱蓋五靈脂能止能行紫色成塊者為熱四物湯加黃連之類崩中用香附白芷丸服氣虛血虛者皆以四物湯加參茋漏下為熱而虛四物加黃連崩中白帶用椒目末又用石灰炒去灰為未茜草少許粥丸服經血逆行或血腥或唾血或吐血用韭菜汁服效治血崩血瘕或經行産後心腹脅痛五靈脂炒烟盡為末每服一錢溫酒調或用三錢水酒童便煎服治風熱血崩荆芥穗燈火燒焦為末每服三錢童便調服又治産後昏暈俱妙獨聖散治肝經有風血崩防風去乂蘆為末每服二錢空心食前酒煮白麵清飲調下極驗神應散治血虛內熱血不歸經而崩桂心燒存性為末每服一二錢米飲調下又方陳槐花一兩百草霜半兩為末每服一二錢燒紅鐡稱鎚淬酒調下簡易黃芩湯崩中下血陽乘隂經水沸溢黃芩為末每一二錢燒稱鎚淬酒調下或用此酒吞芩心丸亦妙伏龍肝散治氣血勞傷衝任經虛血非時崩下臍腹疼痛脈遲弱食或少或赤白帶下伏龍肝赤石脂麥冬各一兩炙甘草半兩川芎三兩當歸乾薑七錢半桂心半兩艾葉三兩熟地二兩每服六錢棗一枚水煎服羅氏備金散治婦人血崩不止香附子炒四兩歸尾一兩二錢五靈脂炒一兩空心酒調服五錢立效本事方治下血不止或成五色崩漏香附子舂去皮毛中斷之略炒為末每服二錢用清米飲調下此方徐氏𫝊其內人有是疾遍服藥不效後服此遂愈須久服為佳亦治産後腹痛大是婦人仙藥常服益血調氣大全方用醋煮出焙乾為末醋糊為丸梧子大每服五十丸米飲送下數墮胎者此藥尤妙前藥用乾荷藥濃煎湯調吞更佳縮砂散治血崩縮砂仁不拘多少於新瓦上炒香為末米飲調下三錢治血崩不止五靈脂炒加當歸酒同煎或水酒童便各半盞同煎服又方水煎五靈脂半乾去渣清再熬成膏入神麯末為丸梧子大空心溫酒下三五十丸便止又方鹿茸醋炙當歸各二錢蒲黃炒半兩為末酒調五錢日三仲景桂枝茯苓丸治婦人有癥在臍上動下血不止桂枝茯苓桃仁去皮尖炒芍藥丹皮去心各等分為末煉蜜為丸梧桐子大每服十丸日三以止為度又婦人陷經漏下色黑膠薑湯主之即芎歸膠艾湯芎藭阿膠甘草各二兩艾葉當歸各三兩芍藥四兩熟地右水五升清酒三升煮取三升去渣內膠令消盡溫服一升日三不瘥更煮一料一云加乾薑一兩東垣益胃升陽湯血脫益氣古人之法也先補胃氣以助生長故曰陽生隂長諸甘藥為之先務舉世皆以為補氣殊不知甘能生血此陽生隂長之理也故先理胃氣人身之內榖氣為寶黃茋二錢人參嗽者去之神麯炒各一錢半升麻柴胡各五分白术三錢當歸身甘草炙陳皮一錢生黃芩二錢伏瀉盛暑之金肺逆秋涼不用右每服五錢如食添再加之如食減於五錢內減一二錢不可多服水煎服一方有生地如腹痛每服內加白芍二分中桂少許如口乾渴加葛根二分先服此益胃升陽湯不止却服後柴胡調經湯大舉大升之也柴胡調經湯治經水不止下皆鮮血頂筋急腦痛脊骨强痛不思飲食羌活獨活藁本升麻各五分蒼术一錢葛根當歸甘草炙各三分柴胡七分紅花少許水煎稍熱服取微汗立止又嘗治一老婦血崩不止流流不絶滿床皆血上床不得者三月矣腹滿如孕乃作虛挾痰積瘀血治之用四物四兩參术各一兩甘草半兩以補虛香附三兩半夏兩半茯苓陳皮枳實砂仁𤣥胡各一兩以破痰積汚血分二十帖每帖煎乾加乾荷葉側柏葉湯再煎服之服盡良愈今再不發如神雲岐子柏黃散療經血不止黃芩一兩二錢半側柏葉蒲黃各一兩伏龍肝一兩水二升煎取八合分為二服又方崩中不止結作血片如雞肝色碎爛芎藭一錢二分阿膠青竹茹各八分續斷地榆小薊根各三分當歸六分生地伏龍肝各一錢一分水九盞煎三盞分三服一婦經漏不止四物加黃連黃柏鹿角膠童便數劑而愈緣此婦素服不得參芪後又小産血崩不止亦以前劑進之而安大全方崩中下血不止小腹痛白芍藥酒炒二兩側柏葉微炒六兩右水一升煎取六合入酒五合煎取五合空心分為二服一方為細末酒調二錢一方有鹿角膠等分酒調治白帶臍腹痛治經血不止歌曰婦人經血正淋漓舊蕊蓮蓬燒作灰熱酒一杯調八字自然安樂更無疑經驗方百草霜二錢狗膽汁拌勻分作二服以當歸酒調下黃芩湯治經血不止黃芩五分川歸側柏葉蒲黃各四分艾葉一分生地二錢半伏龍肝二錢生薑三片水煎服經驗方治血崩不止右用黃連解毒湯加艾葉服無不效者南嶽魏夫人濟隂丹治婦人血氣久冷無子數經墮胎皆因衝任之脈虛損胞內宿挾疾病經水不時暴下不止月內再行或前或後或崩中漏下三十六疾積瘕癖臍下冷痛小便白濁以上疾症皆令孕育不成以致絶嗣常服令人有孕及生子充實産後百日內常服能去百病去宿血生新血木香煨茯苓京墨燒紅醋淬研末桃仁去皮尖炒各一兩秦芃炙甘草人參桔梗炒藁本石斛酒浸焙蠶退紙燒存性各二兩乾薑炮牡丹皮桂心川歸細辛川芎各一兩半川椒去目炒出汗山藥各七錢半一方三兩澤蘭葉熟地香附炒各四兩大豆黃卷炒半升蒼术米泔浸去皮炒八兩糯米炒一升右為末蜜丸每兩分作六丸每服一丸嚼細食前溫酒醋任下此藥用之纍效血崩服之即止向有經候不行者二年腹內一似懷孕時或鼓動但脈弦疾非妊脈耳遂令服至半劑下血塊一盂自後服盡經候竟調若經病久無子者服之即孕且生子充實但服至有孕便當住服或脾胃素弱不宜用蜜丸則以醋煮薄麵糊為丸如梧子大每服五十丸溫酒醋湯任下赤白帶下機要云赤者熱入小腸白者熱入大腸其本實熱寃結於脈不散故為赤白帶下也寃屈也結也屈滯而病熱不散先以十棗湯下之後服苦練丸大𤣥胡散調下之熱去濕除病自愈也劉宗厚曰此論有餘之症也良方論云婦人帶下其名有五因經行産後風邪入胞門𫝊於臟腑而致之若傷足厥隂肝經色如青泥傷於手少隂心經色如紅津傷於手太隂肺經形如白涕傷於足太隂脾經黃如爛瓜傷足少隂腎經黑如衃血人有帶脈橫於腰間如束帶之狀病生於此故名為帶生生子曰按此論前既云傷於肝則色青傷於心則色赤云云是五臟皆能令人帶下也抑何待於奇經之帶脈病而後然歟緣帶乃有形之病如衣帶之狀所下之物亦必成條或成片而象之也雖有赤白之殊皆濕痰瘀血所致若局定指竒經帶脈之名而始名之為帶下得無太泥乎哉考之難經二十九難曰竒經之為病何如云云帶之為病腹滿腰溶溶若坐水中滑伯仁注曰任脈起胞門行腹故病苦內結男為七疝女為瘕聚帶脈回身一周故病如是觀乎是在任脈則有男女之分在帶脈則無男女之分據乎是則凡帶脈所生之病乃男女均有之疾初非硬指帶脈之名為婦人今日所謂白物淫淫而下之帶也又按內經骨空篇曰任脈為病男子內結七疝女子帶下瘕聚亦是以任脈主帶下而不以帶脈名帶下也故後之厯代諸公所治亦不泥於帶脈豫故辨而明之庶臨症者而毋以名拘焉劉宗厚曰按良方此論言風氣寒熱傷於諸臟致症似言外邪大抵此症多有本於隂虛陽竭營氣不升經脈凝澀衛氣下陷精氣纍滯於下焦奇經之分藴積而成其病或醉飽房勞服食燥劑所致也白物如涕之狀故言帶者亦病形也經云帶脈為病而得名而白者屬氣赤屬血東垣舉脈訣曰崩中日久為白帶漏下多時骨木枯言崩中者始病血崩久則血少復亡其陽故白滑之物下流不止此可見未得全拘於帶脈矣詳病亦有濕痰流注於下焦或肝腎隂淫之濕勝或因驚恐而水乘土位濁液下流或思慕為筋痿內經所謂二陽之病發心脾是也或餘經濕熱屈滯於少腹之下而病本殊則皆為氣血虛損營衛之精氣纍治而成其病標一也前人立論殆盡病機則治法無定若戴人以帶下得兩手脈俱滑大而有力乃上用宣去痰飲下以導水丸泄濕熱繼以淡劑滲之此為瀉實也如其諸脈微細或沉緊而澀按之空虛或洪大而澀按之無力正為元氣不足隂虛筋痿虛極中寒等症東垣有補陽調經固真等例乃兼其虛也丹溪先生治因濕痰下注用海石南星椿根皮之類較之前人下之而復吐以提其氣或發中兼補補中兼利燥中兼升發潤中兼益氣溫而兼收澀之例不同蓋病機有輕重淺深之異耳仲景曰婦人帶下六極之病脈浮則為腸鳴腹滿緊則為腹中痛數則為隂中癢痛洪則生瘡弦則隂疼掣痛又曰帶下有三門一胞門二龍門三玉門已産屬胞門未産屬龍門未嫁女屬玉門脈經問曰未出門女有三病何謂也師曰一病者經水初下隂中熱或有當風或有扇者二病者或以寒水洗之三病者或見丹下驚怖得病屬帶下又問曰婦人年五十所病下痢數十日不止暮則發熱少腹裏急痛腹滿手掌熱唇口乾燥何也師曰此病屬帶下何以故曽經半産瘀血在少腹中不去何以知之其症唇口乾燥故知之當與溫經湯內經曰脾𫝊之腎病名疝瘕少腹寃熱而痛出白一名白蠱當此之時可按可藥啓𤣥子注曰出白溲出白液也蓋便濁白帶之類許學士云凡婦人有白帶多致不産育速宜治之衍義治帶下并腸有敗膿淋露不已腥穢殊甚遂至臍腹更增冷痛此蓋敗膿血所致卒無已期須以此排膿白芷一兩單葉紅蜀葵根二兩白芍藥白枯礬另為末各半兩同以蠟丸如梧桐子大空心及飯前米飲下十丸或十五丸俟膿盡仍别以補藥佐之本事方治下元冷赤白帶下不問逺年近日盡效龍骨五錢舶上硫黃三錢半右為末每服半錢無灰酒下空心調服一日三服伏龍肝散治赤白帶下久不瘥肌瘦瘁黃棕櫚燒存性伏龍肝屋梁上塵懸長者炒烟盡出火毒右等分為末入龍腦麝香各少許每服二錢酒或醋調服病十年者半年可安有人經年崩漏不止諸藥不效脈濡微與此藥兼香礬丸服之即愈香礬丸白礬四兩香附子二兩黃狗頭骨灰四兩右為末粥丸梧子大每服三十丸東垣補經固真湯白文舉正室白帶常漏久矣諸藥不效診得右尺極微其白帶下流不止脈經云崩中日久為白帶漏下多時骨木枯言崩中者始病血崩久則血少復亡其陽故白滑之物下流不止是本血海將枯津液復亡乾枯不能滋養筋骨以本部行經為引用為使以大辛甘油膩之藥潤其枯燥而益津液以大辛熱之氣味補其陽道生其血脈以苦寒之藥泄其肺而救上熱傷氣以人參補之以微苦溫之藥為佐而益元氣名曰補經固真湯柴胡甘草炙陳皮郁李仁另研生黃芩另入各一錢人參乾薑各二錢白葵花去蕚七朵右除黃芩外以水二大盞煎至一盞七分再入黃芩同煎至一盞空心熱服以早膳壓之桂附湯治白帶腥臭多悲不樂大寒肉桂一錢大附子三錢黃柏知母各五分如少食常飽有時似腹脹加白芍藥五分如不思飲食加五味子二十粒如煩惱面上麻木如蟲行乃胃中元氣極虛加黃茋一錢人參七分炙甘草二分升麻五分作一服水二鍾煎至一鍾食逺熱服酒煮當歸丸治頽疝白帶下注腳氣腰以下如在氷雪中以火焙炕重厚綿衣蓋上猶寒不任冷之極也面白如枯魚之象肌如刀削消瘦之速也小便不止與白帶長流而不禁固自不知覺面白目青藍如菜色目昏昏無所見身重如山行步欹側不能安地腿膝枯細大便祕結口不能言無力之極食不下心下痞煩心懊憹不任其苦面停垢背惡寒小便遺而不知此上中下三陽真氣俱竭故噦嘔不止胃寒之極也其脈沉緊而澀按之空虛若脈洪大而澀按之無力猶為中寒之症况按之空虛者乎按之不鼓是為隂寒之極也其空虛乃血氣俱虛之極也當歸一兩茴香半兩黑附子炮去皮臍良薑各七錢右四味銼以好酒一升半煎至酒盡為度炭火焙乾為細末入後藥炒黃鹽丁香各半兩全蝎三錢柴胡二錢升麻根木香各一錢苦練子炙甘草各五分𤣥胡索四錢俱為末與前四味和勻酒煮麵糊為丸梧子大每服二十丸餓肚淡醋湯下忌油膩冷物酒麵當歸附子湯治臍下冷痛赤白帶下柴胡七分良薑乾薑黑附子各一錢升麻蝎梢各五分炙甘草六分當歸二錢炒黃鹽三分黃柏二分每服五錢水煎服為丸子亦可右炒鹽例東垣回陽丹注云必用炒黃鹽無則不效蓋寒疝之要藥也固真丸治白帶久下不止臍腹冷痛其寒捫之如氷隂中亦然目中溜火上壅視物昏昏無所見齒皆惡熱飲痛須得黃連末擦之乃止惟喜乾食大惡湯飲此病皆寒濕乘其胞內故喜乾而惡濕肝經隂火上溢走於標故上壅而目溜火腎水侵肝而上溢故目中昏昏無所見齒惡熱飲者是少陽陽明中伏火也當大瀉寒濕以丸藥治之故曰寒在下焦治主宜緩大忌湯散以酒制白石脂白龍骨以枯其濕以炮薑大辛熱瀉寒水以黃柏之大寒為因用又為鄉導治法云古者雖重罪不絶人之後又為之伏其所主先其所因之意又瀉齒中惡熱飲也以柴胡為本經之使以芍藥半錢以導之又恐辛熱之藥太甚損其肝經故微瀉之以當歸之辛溫大和血脈此用藥之法備矣白石脂燒赤水飛研細晒乾柴胡各一錢炮薑四錢黃柏酒洗白芍各五分龍骨酒煮水飛二錢當歸酒洗三錢右為末水煮稀糊為丸芡實子大每服三十丸空腹時滚湯送下即以美膳壓之忌生冷硬物酒濕麵補真潤腸湯治白帶隂户中痛控心而急痛身黃皮緩身重如山隂中如氷一名助陽湯即前固真湯减人參加防風髙良薑海藏香附六合湯治赤白帶下即四物加茴香桂也大全方治赤白帶下年深月久不瘥白芍藥二兩乾薑半兩各炒黃色為末米飲下二錢日二服丹溪治赤白帶下大法或十棗湯神祐丸或玉燭散皆可用之虗者不可峻攻實者可行血虗加減四物湯氣虗以人參白术陳皮間與之主治燥濕為先濕甚者固腸丸隂火動者諸藥中加炒黃柏滑者加龍骨赤石脂滯者加葵花白者治白赤者治赤性躁者加黃連寒月少加薑附臨機應變先須斷厚味帶下與夢遺同法治之肥人有帶多是濕痰用海石半夏南星黃柏炒青黛蒼术川芎瘦人帶病少如有者多是濕熱用炒柏蛤粉滑石川芎青黛樗皮帶漏俱是胃中痰積流下滲入膀胱出於大腸小腸宜升提甚者上必用吐以提其氣下用二陳湯加白术蒼术治結痰白帶以小胃湯半饑半飽津液下數丸俟鬱行却服補藥白术一兩蒼术半兩紅白葵花二錢半白芍藥七錢半右􅔻餅為丸空心煎四物湯吞二十丸一婦年七十形瘦善啖白帶食前薑湯吞大補丸五十丸一二次午膳後及臨卧時各與小胃丹十五丸愈乳香散治赤白帶下草果一枚去皮入乳香一小塊用麵包煨焦存性連麵為末每服二錢重者三錢陳皮湯調下帶下不止用椒目白芷治白帶以椒目為末米飲下樗皮丸治赤白帶有濕熱者白芍五錢良薑炒灰三錢黃柏炒成灰二錢椿皮一兩半右為末粥丸每服三五十丸米飲下治白帶因濕熱而勝下者蒼术鹽炒白芍藥滑石各兩枳殼甘草各三錢椿根皮炒乾薑炮各二兩地榆半兩為末粥丸米飲下治帶下椿根皮二兩神麯炒麩麯炒黃柏炒蒼术各一兩白芍一兩半滑石枳殼各五錢右為末糊丸梧子大空心服五十丸赤白帶皆屬於血有出於大小腸之分黃荆子炒焦為末米飲調三錢固腸丸治濕氣下利大便血白帶去脾胃陳積之後用此以燥下濕亦不曽單用看病作湯使椿根白皮為末粥糊為丸此藥性涼而燥須炒用一方加滑石一半地榆膏治赤白帶下骨立者地榆一斤用水三升煎至一半去渣再煎如稠餳空心服三合日二次治漏下五色地榆三兩用醋一升煮十餘沸稍熱食前服一合治白帶因七情所傷脈數者黃連炒側柏酒蒸黃柏炒各半兩香附醋炒白术炒白芍各一兩白芷燒存性三錢椿根皮炒二兩木香三錢為末粥丸米飲下千金方治赤白帶下三葉酸漿草隂乾為末空心溫酒下三錢丹溪治赤白帶龜板酒炙二兩黃柏炒一兩乾薑炒一兩梔子二錢半右酒糊為丸每服七十丸日二服又方治帶下脈數者枸杞根一斤生地五斤右以水一斗煮取五升分五服治帶下赤白腰痛或少腹痛有熱者樗皮二兩𤣥胡索桃仁側柏葉茴香當歸川練肉各半兩香附八錢官桂烏藥各三錢麥皮曲炒一兩右為末酒糊為丸每服六十丸神效白芷散治下元虛弱赤白帶下或經行不止等症白芷一兩海螵蛸二枚燒胎髮五丸煆為末每服二錢酒調下東垣坐藥龍鹽膏丁香川烏炮木香各一錢半全蝎五枚良薑木通各一錢枯礬五分龍骨茴香歸稍炒黃鹽防己酒洗紅豆肉桂各二錢厚朴三錢𤣥胡索五錢右為末煉蜜丸彈子大綿裹留絲在外納隂户內又方勝隂丹為上藥力小再取三錢內加行性熱藥三賴子川烏大椒各五分柴胡羌活各二錢全蝎三枚大蒜破故紙與蒜同焙各一錢升麻枯礬各二分麝香少許甘松三分右為細末同前制用又方回陽丹全蝎升麻甘松各二分羌活草烏頭各三分水蛭焙乾三條虻蟲三枚去翅足炒川烏柴胡各七分大椒蓽撥枯礬三賴各五分大蒜破故紙各二錢炒黃鹽一錢此必用之藥去之則不效右為細末依前制如指尖大綿包納隂户中覺臍下暖為效丹溪治胡安人白帶下月經甚多食少倦怠面黃經中有如血塊者有如筋膜者與參术等補血氣調脾胃後諸症皆退惟帶未止以樗皮丸主之張戴人治一婦帶下連綿不絶白物或來已三載矣兩手脈俱滑大有力六七至常上熱口乾眩暈時嘔酢水乃寒痰在胸中以瓜蒂散吐出冷痰二三升皆酢水也間如黃涎狀如爛膠次以漿粥養其胃氣又次用導水禹功以瀉其下然後以淡劑滲泄之藥利其水道不數日而愈又息城李左衙之室病白帶如水窈漏中綿綿不絶穢臭之氣不可近面黃食減已三年矣諸醫皆云積冷陽起石硫黃薑附之藥重重燥補汚水轉多戴人斷之曰此帶濁水本熱乘太陽經其寒水不禁固故如此也夫水自髙而趨下宜先絶其上源乃涌痰二三升次日下沃水斗餘行三遍汗出周身至明旦病人云汚已不下矣次用寒涼之劑服及半載産一男仲景溫經湯吳茱萸三兩川歸芎藭芍藥人參桂枝阿膠丹皮生薑甘草各二兩半夏半升麥冬一升右十二味水一斗煮取三升分溫三服亦主婦人少腹寒久不受胎兼取崩中去血或月水過多及至期不來五靈散治赤白帶下五靈脂半生半炒為末酒調服大全方治白帶茅花炒一握棕櫚灰三寸嫩蓮葉三葉甘草莭一錢右為末空心酒調方寸匕益母散治帶下赤白惡露下不止益母草開花時採搗為末空心酒服二錢日三服又方治白帶用白芷以石灰炒去灰茜草少許粥糊丸服又方白芍藥炒黑為末每服三錢匕酒調下丹溪治赤白帶用生狗頭骨燒存性為末酒調服或入藥服千金方治帶下雲母為末溫水調服三方寸匕立見神效妊娠白帶蒼术三錢白芷黃芩炒各二錢黃連炒黃柏炒樗根皮炒各一錢半山茱萸各二錢半白芍二錢半為末糊丸空心酒服五十丸寡婦師尼寒熱如瘧倉公𫝊與禇氏論皆云師尼寡婦獨隂無陽欲心萌而未遂是以懨懨成病以致乍寒乍熱而類瘧狀久則為勞又有經閉白淫痰逆頭風膈氣痞悶面䵟瘦瘠等症皆寡婦之病診其脈獨肝部弦出寸口而上魚際皆血盛所致經云男子精盛則思室女人血盛則懷胎觀其精血思過半矣薛氏曰前症若肝脈弦出魚際用生地黃丸血虛佐以四物湯若兼怒動肝火而寒熱佐以加味逍遙散若虧損肝經而寒熱佐以八珍湯若虧損元氣而寒熱佐以補中益氣湯若鬱傷脾氣而寒熱佐以濟生歸脾湯治一寡婦不時寒熱脈上魚際此血盛之症用小柴胡湯加生地黃治之而愈但畏風寒此脾胃氣虛用加味歸脾湯補中益氣湯兼服而安一婦因夫久出經商發寒熱月經旬日方止服降火涼血藥內熱益甚自汗盜汗月經頻數豫曰內熱自汗乃脾氣虛弱也月經頻數乃血不歸脾也用歸脾湯六味丸而愈一室女寒熱肝脈弦長而出寸口用小柴湯加生地烏梅治之而愈既嫁而諸症悉痊一室女久患寒熱月經失期以小柴湯加生地治之少愈更以生地黃丸而痊生地黃丸許學士云有一師尼惡風體倦乍寒乍熱面赤心煩大小柴胡湯雜進其病益劇豫診視之曰三部脈無寒邪但肝脈弦長而上魚際服此丸而愈柴胡秦芁黃芩各五錢生地二兩赤芍藥一兩右為末煉蜜為丸梧子大每服三十丸烏梅湯下一日三服逍遙散治日夜虛熱脈微細地骨皮甘草黃芩川芎各二錢北柴胡五錢香附三錢右水煎空心服加竹葉十片柴胡散治寒熱往來此隂陽相勝隂勝則寒陽勝則熱或是胎前雜病但服此湯如燒湯潑雪北柴胡黃芩甘草各三錢地骨皮一錢荆芥桂各二錢水煎服再仍服小柴胡湯三五帖夢與鬼交人稟五行秀氣而生承五臟神氣而養若調理失莭氣血虛衰則鬼邪干其正隱避而不欲見人時獨言笑或時悲泣是其候也脈息遲伏或如鳥啄或綿綿而來不知度數面顔不變亦其候也薛氏曰前症多由七情虧損心血神無所護而然也宜安神定志等藥則正氣復而神自安若脈來乍大乍小乍短乍長亦為鬼祟也宜灸鬼哭冗以患人兩手拇指相並用線緊扎當合縫處半肉半甲間灼艾灸七壯若果是邪祟病者即乞求免灸云我自去矣茯神散治妄有所見言語雜亂時或昏昧痰熱茯神炒一兩半茯苓人參石菖蒲各一錢赤小豆五分右水煎服桃仁丸治鬼魅交通辰砂另研檳榔當歸桃仁各三錢水銀一錢棗肉一枚研令星盡麝香阿魏麵包煨沉香各半兩右為末煉蜜為丸梧桐子大每服十丸空心桃仁湯下辟瘟丹虎頭骨二兩辰砂雄黃雌黃鬼臼皂莢蕪荑仁鬼箭羽藜蘆各一兩右為末蜜丸彈子大囊盛十丸男左女右繫臂上及用一丸當病人户前燒之一切邪鬼不敢近妙香散治心氣不足精神恍惚虛煩少睡盜汗等症甘草炙人參桔梗各半兩黃茋茯神去皮心茯苓逺志去心炒山藥薑汁炙各一兩辰砂三錢麝香二錢木香二錢半右為末每服二錢溫酒調服治婦人與鬼交松脂雄黃先熔松脂乃入雄黃以虎爪不住手攪得所取如雞子黃大令患人卧以被蓋取藥薰之惟露頭在外勿令泄氣又不可過熱鹿角散男女夢與鬼交精神恍惚者鹿角屑三指撮日二服酒下亦治遺精婦人被妖魅狐猫祟迷惑不肯言鬼鹿角屑以水服方寸匕即言實也桃鳬一名桃奴一名梟景是過年樹上不落乾桃子味苦微溫主殺百鬼精物療中惡腹痛殺精魅五毒不祥正月採之熱入血室婦人傷寒傷風發熱經水適來晝則安靜暮則譫語有瘧狀此為熱入血室治者無犯胃氣及上二焦宜服小柴胡湯薛氏治一婦經行感冒風邪晝則安靜夜則譫語此熱入血室也以小柴胡加生地治之頓安但內熱頭暈用補中益氣湯加蔓荆子而愈後因惱怒寒熱譫語胸肋脹痛小便頻數月經先期此肝火血熱妄行以加味逍遙散加生地黃而愈一婦因怒寒熱頭痛譫言妄語至夜益甚月經暴至此怒動肝火用加味逍遙散加生地治之神思頓清又用補中益氣湯而痊一婦經行感冒譫語或用發散寒涼之劑前症益甚月經不止肚腹作痛嘔吐不食痰涎自出此熱入血室而藥復傷胃用香砂六君子歸脾湯而安乾薑柴胡湯治婦人傷寒經脈方來熱入血室寒熱如瘧或狂言見鬼柴胡一錢桂枝三分牡蠣煅乾薑炮甘草炙各三分瓜蔞根五分水煎汗出而愈海蛤散治婦人傷寒血結胸膈宜服此藥及針期門冗海蛤滑石煅水飛甘草各二分芒硝一兩右為末每服二錢用雞子清調下小腸通利其結血自散更用桂枝紅花湯發其汗則愈桂枝紅花湯治傷寒發熱口燥舌乾經脈不行桂枝芍藥炙甘草各一錢紅花二錢右薑棗水煎服良久更進汗出可解加味逍遙散肝脾血虛有熱遍身搔癢或口燥咽乾發熱盜汗食少嗜卧小便澀滯等症又治瘰􅊓流注虛熱等瘡熱入血室等症炙甘草當歸炒芍藥酒炒茯苓白术炒各一錢柴胡丹皮山梔炒各五分水煎服逍遙散即前方去丹皮山梔加味小柴胡湯治經水適來傷寒或經水適止傷寒晝則明了夜則發熱譫妄如狂即小柴胡加生地黃牡丹皮心胸嘈雜婦人嘈雜此脾胃鬱火痰滯血液淚汗而成用猪血炒食之乃以血導血而使之歸源耳旋覆花湯尤善薛氏曰若因食鬱用六君子山查山梔若因胃熱用二陳薑炒芩連若因六鬱用越鞠丸若因氣滯用四七湯桔梗枳殼大抵此症屬病氣元氣俱不足須用六君子為主少佐以治痰之藥若以火治之必變吞酸中滿一婦飲食少思胸中嘈雜頭暈吐痰此中氣虛而有熱用六君子湯加炒黑梔子桔梗而愈後因勞役頭暈發熱吐痰不食用補中益氣加半夏茯苓天麻而痊一婦中脘嘈雜口中辛辣或咳嗽吐痰發喘面色或白或赤此脾氣虛而肺中伏火也用六君子加山梔桔梗柴胡及炒黑片芩治之愈一婦嘈雜吞酸少食大便不結此脾氣虛寒而下陷用補中益氣湯加茯苓半夏炮薑漸愈又常服人參理中丸而安一婦飲食後嘈雜吞酸此食鬱為痰用六君子送越鞠丸漸愈又用加味歸脾湯而痊後因怒兩脅脹痛中脘作酸四君子湯送左金丸漸安仍用六君子湯送越鞠丸而痊旋覆花湯治脾胃虛寒中脘停痰汪洋嘈雜腸鳴多唾嘔吐不食脅肋脹痛脈沉遲弦細細辛旋覆花橘紅桂心人參炙甘草苦梗白芍半夏各五分赤茯苓三分用水加薑煎服又心胸嘈雜茯苓補心湯最妙茯苓補心湯治面色黃瘁五心煩熱咳血吐血及嘈雜潮熱等症半夏前胡紫蘇茯苓人參枳殼炒桔梗炒炙甘草乾葛各五分川芎川歸白芍陳皮各一錢熟地黃一錢半入薑棗水煎服痃癖疝瘕婦人痃癖因元氣虛弱而邪氣積聚蓋痃癖者在腹內近臍左右有筋脈急痛如臂如指如痃之狀癖者僻在兩脅之間有時而痛皆隂陽不和經絡痞膈飲食停滯冷氣固結而成也婦人臟腑調和經脈循環則月水以時故能生子而無病若乘外邪而合隂陽則小腹胸脅腰背皆相引而痛月事不調隂中腫脹小便淋􅅹面色黃黑則疝瘕生矣疝者痛也瘕者假也脈弦急者生虛弱者死尺脈澀浮牢為血實氣虛腹痛逆氣上行此為胞中有惡血久則結成瘕也張子和曰遺溺閉癃隂痿脬痺精滑白淫皆男子之疝也若血涸月事不行行後小腹有塊或時動移前隂突出後隂痔􅜊皆女子之疝也但女子不謂之疝而謂之瘕婦人積年血癥由寒溫失莭脾胃虛弱月水不通相結盤牢久則腹脅苦痛宜用三稜煎主之治痃癖神效以獖猪肝一具重十餘兩用巴豆仁五十枚入肝內用釅醋三碗慢火熬乾研爛量入三稜末丸作梧子大每服五丸食前熱酒下經行腹痛乃痃癖癥瘕局方積氣丸妙蘆㑹丸治疳癖肌肉消瘦發熱潮熱飲食少思口乾作渴或肝疳食積口鼻生瘡牙齦蝕爛等症蘆㑹胡黃連黃連炒焦木香白蕪荑炒青皮各五錢當歸茯苓陳皮各一兩半炙甘草七錢右為末米糊丸梧子大每服七八十丸米湯下麝香丸治痃癖冷氣心腹作痛麝香二錢另研五靈脂炒阿魏五錢麵包煨麵熟桃仁三稜醋製各二兩芫花醋炒檳榔各一兩莪木醋煨桂心沒藥木香當歸各五錢右為末飯丸梧子大每服十丸淡醋湯下阿魏膏治一切痞塊更服胡連丸羌活獨活𤣥參官桂赤芍生地穿山甲兩頭尖大黃白芷天麻各五錢紅花四錢木鱉子去殼十枚亂髮五錢槐柳桃枝各三錢右用香油二斤四兩煎黑去渣入髮油內煎髮化仍去渣徐下黃丹煎軟硬得中入芒硝阿魏蘇合香油乳香沒藥各五錢麝香三錢調勻成膏攤貼患處內服丸藥凡貼膏藥先用朴硝隨患處鋪平半指厚以紙蓋用熱尉斗尉之良久如硝耗再加尉之二時許方貼膏藥若是肝積加盧㑹末同尉乾漆散治疝瘕脅肋疼痛乾漆炒令烟盡木香芫花醋炒赤芍桂心川歸川芎琥珀各五錢大黃炒二兩牛膝一兩桃仁去皮尖一兩另研麝香一錢右為末每服一錢溫酒調下桃仁煎治血瘕桃仁大黃炒各一兩虻蟲炒黑五錢朴硝一兩右為末以醇醋一鍾石器中煮三分下前三味不住手攪煎至可丸下朴硝丸梧子大不吃晚食五更初溫酒下五丸日午下穢物如未見再服仍以調氣血藥補之此方乃峻劑也下血塊血積甚速氣血虛者慎之大硝石丸治七癥八瘕當用此藥去之不令人困大黃四兩硝石三兩人參一兩甘草八錢右為末苦酒一升石器中先入大黃煎膏入餘藥丸梧子大每服三十丸米飲下三日一服宜下赤物蟠䓤散治寒氣不散疝瘕脹痛脅肋痛甚神效男子婦人脾胃虛冷氣滯不行延胡索肉桂乾薑炮各四分蒼术术泔水浸一宿焙甘草各二錢砂仁檳榔丁皮各一錢三稜煨莪术煨茯苓青皮去白各七分連根䓤白一莖水二鍾煎至熱服寶鑑蒺藜湯治隂疝小腹作痛小便不利手足逆冷或脅腹悶痛蒺藜子去刺大附子炮梔子仁各半兩右為末每服三錢水煎食前服穿山甲散治癥痞瘀血心腹作痛穿山甲灰炒燥鱉甲醋炙赤芍大黃炒乾漆炒無烟桂心各一兩川芎芫花醋炒歸尾各半兩麝香一錢右為末每服一錢酒調下三稜煎治血癥血瘕食積痰滯三稜醋浸炒莪术製同上各三兩青皮去白半夏麥芽炒各一兩右用好醋一鍾煮乾焙為末醋糊丸梧子大每服三四十丸淡醋湯下痰積生薑湯下脬轉小便不利婦人脬轉或內熱𫝊搏於脬或忍小便氣逆於內以致小腹急痛不得小便甚者至死薛氏曰前症不問男女孕婦轉筋小便不利命在反掌非八味丸不能救一婦因鬱怒小便滴瀝漸至小腹腫脹痰咳喘促用八味丸料煎服小便即利而痊䓤白湯治氣滯小便不通腹脹欲死陳皮三兩葵子一兩䓤白一握水煎分三服八味丸治轉脬小便不通殊有神效但世所不用以致誤人方見虛損滑石散脬轉數日不通滑石一兩寒水石二兩葵子一合右研以水一斗煮至五升每服一升即通利又方亂髮煆葵子車前子各等分酒調下二錢强忍小便致脬轉尿不利困篤欲死滑石二兩髮灰一兩為末每服三錢桃白皮一斤細切搗熟入水三盞絞取汁調服千金翼用杏仁去皮尖二十枚麩皮炒黃嚼細水送下立通一方皂角為末吹鼻內取嚏石葦湯治脬轉小便不通及小便實熱氣滯淋瀝石葦黃芩炒木通葵子榆白皮瞿麥甘草各五分加生薑水煎服小便數薛氏曰小便數頻若肝經火動用逍遙散加龍膽草車前子膀胱火動六味地黃丸加麥門冬五味子肝腎濕熱龍膽瀉肝湯鬱傷肝脾加味逍遙散加味歸脾湯脾肺氣虛補中益氣加麥冬五味肝經血虛加味逍遙散腎氣虛敗鹿茸散如不應用八味丸桑螵蛸散治腎氣虛寒小便數少或時頻數或夜間尤數桑螵蛸炒三十枚鹿茸炙牡蠣煅炙甘草炙黃茋右為末每服二三錢食前空心用薑湯調下日二服縮泉丸治脬氣虛寒小便頻數或遺尿不住小兒尤效烏藥益智仁各等分為末酒煮山藥糊為丸梧子大每服七十丸鹽酒或米飲下鹿茸散治腎氣虛寒便溺數甚或夜間頻數遺溺鹿茸炙烏賊魚骨桑寄生川歸龍骨煅各二兩白芍炒附子炮各三錢桑螵蛸炙五錢右為末每服二錢空心并食前溫酒調下作丸亦可遺尿失禁附小便出屎此名交腸病也內經曰胞移熱於膀胱則癃溺血膀胱不利為癃不約為遺溺注云膀胱為津液之府水注由之然足三焦脈實約下焦而不通則不得小便足三焦脈虛不約下焦則遺溺也靈樞曰足三焦者太陽之别也並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺良方曰此乃心腎之氣失其常度故有便道澀而遺者有失禁而不知自遺者亦有傷産傷膀胱不時而遺者有脬寒臟冷而不自知者薛氏曰設肝腎虛熱廷孔痿痺用六味丸如不應用加減八味丸陽氣虛憊膀胱積冷用鹿茸丸如不應用八味丸若脾氣虛弱不能禁止用補中益氣湯加山藥山茱萸五味若肺氣虛寒前湯加桂附此症屬虛熱者多真寒者少治宜審察一婦小便自遺或時不利日晡益甚此肝熱隂挺不能約制用六味丸料加白术黃柏酒炒黑七分知母五分數劑諸症悉愈若誤用分利之藥愈損真隂必致不起一老婦患前症惡寒體倦四肢逆冷余以為陽氣虛寒用補中益氣湯加附三劑不應遂以參附湯四劑稍應仍以前藥而安附子計用四枚人參三斤許一婦病愈後小便出屎此隂陽失於𫝊送名大小腸交也先用五苓散二劑而愈又用補中益氣湯而安鹿茸丸治陽氣虛小便白濁滑數不禁或臍腹隂冷大便不實鹿茸炙椒紅桂心石斛附子炮牡蠣煅補骨脂炒肉蓯蓉雞肫皮炙沉香各一兩桑螵蛸炙三錢右為末酒糊丸梧子大每服三十丸空心溫酒下祕元丹治陽氣虛小便不禁或夜多小便頻數白龍骨煆三兩訶子十枚去核砂仁一兩右為末糯粥丸梧子大空心鹽湯下五十丸酒亦可又方鹿角鎊屑炒為末每服三五錢空心熱酒調下又方雞䏶胵炙為末每服二三錢空心食前酒調下日三次又方桑螵蛸酒炒為末每服二錢空心薑湯調下赤水元珠卷二十
