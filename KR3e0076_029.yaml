body:
  text: 赤水元珠卷二十九明孫一奎撰外科門小引生生子曰外科最重者莫如癰疽最急者莫如喉風疔腫患之者生死立見其餘瘡癤皆可緩圖非若上三証急若風火也䆒其受病之源經云營氣不從逆於肉理乃生癰腫又曰膏粱之變足生大疔又曰六府不從留結為癰又曰諸痛痒瘡瘍皆屬心火大抵皆氣血虚弱藴鬰熱毒調養失宜之所致也予固非専門外科盖常咨訪推䆒頗知治法大體茲採前人所論癰疽証治載列卷首疔瘡腫瘍次之陶節庵癰疽經薛立齋外科精要二書實外科權輿業是者不可不使之隨嚢檢視能熟此二書鮮有敗事予固特舉歴試有功者掲出以告同志云瘡科總論夫癰疽瘡癤者皆由氣血不和喜怒不時飲食不節寒暑不調使五臓六腑之氣怫鬰於内以致隂陽乖錯氣血凝滯而發也亦有久服丹石燥熱之藥熱毒結深而為癰疽也夫癰疽之疾多生於膏粱富貴之人以其平昔所食肥膩炙􅏼安坐不勞嗜慾無節以致虚邪熱毒内攻煎熬氣血而成也癰者壅也大而高起屬乎陽其脉浮數疽者沮也平而内發屬乎隂其脉沉數瘡者總名也癤者有頭小瘡也經云諸痛痒瘡皆屬心火葢心主血而行氣若氣血凝滯挟心火之熱而生癰疽之類也然所感有淺深故所發有輕重大小之不同也六腑積熱騰出於外肌肉之間其發暴甚皮腫光軟侵袤廣大者癰也五臓風毒積熱攻注於肌骨其發猛惡初生一頭如㾦㿔白色焦枯觸之而痛應心者疽也熱發於皮膚之間浮腫根小不過二三寸者癤也夫癰發於六腑若燎原之火外潰肌肉疽生於五臟沉澀難療若陶室之燧内消骨髄癰則易療惟難将息而遲瘥疽則難療而易痊夫諸瘡之中惟背疽疔瘡最為急症其次莫如腦疽腸癰喉癰之類亦其急者也至若瘰癧懸癰痔漏諸瘡之類其症可緩而治也又有疥癬㾾瘡風疳之類雖云俱屬瘡類而其輕重緩急自有不同也夫癰疽之疾要須察其是虚是實是冷是熱或重或輕對証用藥無失先後次序凡人年四十以上頭項鬢頥背膂腰脅或筋骨之上所視不見之處稍有瘡癤便不可輕易待之若視之怠慢以為常疾每見至㣲至著䘮命者多矣便宜速急治之庻㡬得救譬之救火初起則易救至於燎原之勢不可撲滅矣其理亦由是也凡瘡未破毒攻臓腑一毫熱藥斷不可用此是先後次第之妙訣也夫瘡有五善七惡不可不辨若動息自寧飲食知味一善也便利調匀二善也膿潰腫消色鮮不臭三善也神彩精明語聲清亮四善也體氣和平五善也如煩躁時𠻳腹痛渴甚泄利無度小便如淋一惡也膿血大泄焮痛尤甚臭惡難近二惡也喘粗短氣恍惚嗜卧三惡也未潰先黒久䧟面青唇黯便汚者四惡也肩項不便四肢沉重五惡也不能下食服藥而嘔食不知味六惡也聲嘶色脫唇鼻青黑面目四肢浮腫七惡也更有氣噫痞塞欬逆身冷自汗無時目瞪耳聾恍惚驚悸語言頻錯皆惡証也五善見三則差七惡見四必危若五善并至則吉而安七惡全見必危而死矣已上所論大綱其諸証候治法列論於後五發癰疽論夫五發癰疽者謂發背發腦發鬢發眉發頥是也人之一身氣血周流而無間稍有壅聚莫不随所至而發焉又豈特五者哉夫發背者乃五臓風熱六腑邪毒灌於筋骨之間發於經絡之内榮衛虚損氣血衰殘所致也其發初如粟米大最不可輕忽後必大發也若初起紅腫高起者後必不為害故曰外形如粟中可容谷外貎如錢裏可着拳如惡毒深滿膿血交粘用藥可痊若膿臭穢無絲此血敗氣衰陽絶隂盛必難療理治初起或隂塌不起便可用艾多灸或隔蒜灸之如痛灸至痒如痒灸至痛此最妙法也若疽瘡已成亦可用火針烙開瘡口則易治也若瘡髙起為癰則易治平䧟為疽則難治癰疽形症已具前總論中兹不復論至如發腦發眉發髩發鬚發頥地位不同然皆由内臓伏陽結滯邪毒上壅随其經絡地分而發也其諸發癰初起皆宜宣散熱毒要須㸔人元氣虚實而治之庻不悞矣若元氣實者亦可用大黄之劑泄去毒氣或用漏蘆五香連翹之類皆可用内托十宣之類補之亦有隂瘡寒塌不起雖云用灸然亦不可服寒凉之劑亦宜以煖藥温之全在活法不可執一也其敷貼洗藥具方于下隨症用焉外科精要曰癰疽既灸即服藥以䕶腑臓如䕶心𣪚凡有疽疾早進數服使毒氣外出而無嘔吐之患否則咽喉口舌生瘡或黑爛如菌若瘡發四五日之後宜間用别藥治之又曰䕶心散乃解金石發疽之藥若發熱焮腫作渇飲冷而嘔者宜之若發熱焮腫作渴飲湯而嘔者不宜用之盖脾虚停痰或寒邪内侵或痛傷脾胃宜用六君子湯若喉舌生瘡或口乾作渇或小便頻數宜用六味丸大凡諸瘡作嘔若飲冷便秘是熱毒也黄連消毒散觧之飲冷便和是胃火也竹葉石膏湯清之懶食飲湯是胃虚也補中益氣湯補之大便不實喜飲熱湯是脾胃虚寒也六君子加炮薑以温之常見脾胃虚弱者用䕶心𣪚反致胃寒嘔惡其喉舌生瘡乃腎水枯涸虚火炎上其証甚惡急用加减八味丸多有得生者又曰癰疽嘔逆是毒氣冲心非脾胃之冷當服内托𣪚楊氏云鼻衂初愈不曾表汗毒在經絡則背大疽自肩下連腰脇腫硬如石其色紫黑以凉藥投之終夜大嘔連進托裏散嘔止瘡潰赤水淋漓四十日而愈又有患癧者痛過輙嘔服托裏即止今有疽病不服此藥者故引楊氏之言以觧世人之惑華佗癰疽瘡腫論夫癰疽瘡腫之作皆五臓六腑蓄毒不流非獨因榮衛壅塞而發也其行也有處其止也有歸假令發於喉舌者心之毒發於皮毛者肺之毒發於肌肉者脾之毒發於骨髓者腎之毒發於下者隂中之毒發於上者陽中之毒發於外者六腑之毒發於内者五臓之毒故内曰壊外曰潰上曰從下曰逆發於上者得之速發於下者得之緩感於六腑則易治感於五臓則難瘳又近骨者多冷近膚者多熱近骨者久不愈則化成血蟲近膚者久不愈則𫝊氣成漏成蟲則多痒少痛或先痒後痛成漏則多痛少痒或不痛不痒内虚外實者多痛少痒血不止則多死潰膿則多生或嘔逆無度飲食無時皆癰疽使然症候多端要當詳治薛立齋曰瘡瘍生蟲乃肝經風熱其成漏乃元氣虚弱其出血乃脾虚有火其潰膿乃元氣充實至於嘔逆等症屬脾胃虧損所致當調補元氣庻保無虞背疽其源有五一天行二瘦弱氣滯三怒氣四腎氣虚五飲冷酒食炙􅏼服丹藥治癰疽用藥大綱一初患癰疽便服内托𣪚以免後來口舌生瘡仍用騎竹馬或隔蒜灸一服五香連翹湯如大便踈快即止仍量人虚實一癰疽潰後宜服排膿内補散若嘔逆木香湯下一癰疽初作便宜灼艾及麥飯石膏塗四圍中留口出毒如瘡小通𫝊之既潰用神異膏貼之一癰疽已潰日用猪蹄湯淋洗將愈之際三日一次一癰疽將歛宜用神異膏如毒未盡不可遽用生肌之劑一癰疽將安宜用加味十全湯補其氣血庻肌肉易生一背疽多先渇而後發或先疽而後渇不救者多矣若服加减八味丸非特杜絶渇疾抑亦大滋氣血生長肌肉一癰疽嘔逆有二一因初發不服内托散伏熱在心一因脾氣不正伏熱在心者則心煩身熱焮腫作痛宜用内托𣪚三兩服之脾氣不正者則不煩熱或聞穢氣作嘔宜用嘉禾𣪚如有寒熱用不換金正氣𣪚五更初兼服山藥丸以補腎癰疽用香藥調治論伍氏曰氣血聞香則行聞臭則逆大抵瘡瘍多因營氣不從逆於肉理鬰結為膿得香則氣血流行故服五香連翹湯萬金𣪚金粉𣪚凡瘡本腥穢又聞臭觸則愈甚若毒入胃則咳逆古人用之可謂有理且如飲食調令香美以益脾土養其真元可保無虞矣五發癰疽通治方漏蘆湯治一切惡瘡毒腫丹瘤瘰癧疔腫魚臍五發癰疽初覺一二日便如傷寒頭疼煩渇拘急惡寒肢體疼痛四肢沉重恍惚悶亂坐卧不寕皮膚壯熱大便閉小便赤黄並皆服之姙婦勿服漏蘆白歛黄芩麻黄去節枳實去白炒升麻芍藥炙甘草朴硝各一兩大黄二兩右每服三五錢㸔虚實用水煎空心熱服五香連翹湯治諸瘡腫初覺一二日便厥喉咽塞發寒熱乳香木香木通大黄各一錢半連翹沉香獨活桑寄生丁香射干升麻麝香另研各一錢甘草五分薑三片水煎不拘時服托裏䕶心𣪚治諸疔腫發背曾經汗下毒氣攻心迷悶嘔吐而痛可服二三服乳香一兩菉豆粉四兩和勻每服三錢甘草湯調服神仙蠟礬丸此藥不問老㓜皆可服之服至一兩已上無不取效最止疼痛不動臓腑委是神效活人不可勝數白礬明亮者一兩研黄蠟七錢鎔化提起待少冷入礬末不住手攪勻右衆手丸如梧桐子大倘蠟冷不能丸以滚湯頓之便軟每服二十丸漸加至三四十丸白湯或酒吞下如未破即内消已破即便合如服金石發動致疾更用白礬末一兩匙頭温酒調下亦三五服見效有人遍身生瘡狀如蛇頭服此亦效諸書皆􅀈神奇但一日之中服近百粒則方有功此藥能防毒氣内攻盖能䕶膜也切不可欺其淺近而忽之始終服過半觔必能萬全瘡愈後服之尤佳一方治蛇咬只鎔化白礬乘熱滴傷處痛即止毒氣即赶出立見效驗要知白礬大能觧毒也千金托裏𣪚治一切瘡腫發背疔毒若氣血虚而不能作膿或潰後膿清痛仍不减最宜服此便能排膿止痛黄蓍一兩半厚朴防風桔梗各二兩連翹二兩二錢木香沒藥各三錢乳香二錢當歸五錢川芎白芷芍藥官桂人参甘草各一兩右為細末每服三錢酒一大盞煎三二沸温服十六味流氣飲治無名惡瘡癰疽等症川芎當歸芍藥防風人参木香黄茋官桂桔梗白芷梹榔厚朴烏藥紫蘇枳殻甘草各一錢右作一帖水煎食逺服内托羌活湯治尻臀生癰堅硬腫痛大作羗活黄栢酒製各二錢防風歸尾藁本連翹蒼术陳皮炙甘草各一錢肉桂三分黄茋一錢半水一鍾酒半鍾煎八分食前服清心内固金粉𣪚一名金花散専治惡瘡熱盛焮痛煩躁作渇此藥觧毒辰砂另研白茯芩人参甘草各三錢菉豆粉四兩雄黄一錢氷片白荳仁朴硝各五錢麝香與氷片各一錢另研右以参苓荳䓻為末入研藥和匀每服一錢半蜜湯調下麥飯石膏方又名鹿角膏白麥飯石其石顔色黄白像麥飯團者研細末聼用鹿角要活者自觧者不用截作二三寸長炭火内煨令烟盡為度研為細末白歛為細末右將麥飯石用炭火煅紅以好米醋淬之如此煆淬十次研為極細末毎用二兩白斂末二兩鹿角灰末四兩同入乳鉢乳令無聲方有效驗若研不細敷上作痛若研得極細如眼藥一般極能止痛排膿收口量藥末多寡用經年好米醋入銀石器内煎令魚眼沸却旋旋入前三味藥末在内用竹箆子不住手攪熬一二時久令稀稠得所傾出磁盆候冷以紙盖宻勿惹塵灰毎用時先用猪蹄湯洗去癰瘡上膿血至净以故帛挹乾以鵞翎拂藥膏塗敷四圍凡有赤處盡塗之但留中心一竅如錢大以出毒氣膿血如瘡未潰能令内消如已潰則排膿如湍水逐日見瘡口收歛如患瘡久肌肉腐爛筋骨出露用舊布片塗藥以貼瘡上但肉膜纔穿亦能取安洗瘡勿以手觸動嫩肉仍忌口氣及有腋氣之人并月婦皆令忌之此方但得好帶盖鹿角好麥飯石精䖍修合勝用他藥多矣仍可熬取好米醋一大碗候逐日用藥於瘡上俟乾便以鵝毛蘸醋拂潤勿令𦂳也初用須一日一洗換十日後兩日一換排膿内補十宣𣪚一名十竒散一名内補散治癰疽瘡癤未成者速散已成者速潰敗膿自出無用手擠惡肉自去不用刀針服藥後其痛頓减效驗如神人参當歸黄耆各二兩甘草川芎防風厚朴薑汁炒苦梗白芷薄桂各一兩右為末每服三錢酒調下日夜各數服以多為妙服至瘡口潰更服為嘉不飲酒人濃煎木香湯調下然終不若酒力之勝或飲酒不多能勉強以木香湯兼酒調下亦可乳香黄耆散治一切惡瘡癰疽發背疔瘡痛疼不可忍者或未成者速散已成者速潰不假刀砭其惡自下又打撲損傷筋骨疼痛並皆治之黄耆當歸川芎麻黄去根節甘草人参芍藥各一兩嬰粟殻蜜炙陳皮各一兩乳香沒藥各五錢每服五六錢水煎服黄耆湯治一切瘡腫癰疽並宜服之黄耆川歸酒洗各一兩大黄芍藥陳皮炙甘草各五錢右加生薑三片水煎服托裏内補散専治一切惡瘡潰爛出膿之後宜服之人参川歸川芎白芍甘草白芷防風白术茯苓官桂黄耆金銀花各等分水煎服䕶心散治毒氣冲心嘔吐又名不二散炙甘草硃砂飛各一錢菉荳粉炒二錢為細末作一帖白湯調下當歸連翹散清熱觧毒通潤大小便當歸連翹梔子仁芍藥金銀花各一兩黄芩五錢右每服五錢水二鍾煎七分空心温服如欲通大便加大黄二錢待藥煎將熟入之再煎一二沸服之托裏散治一切惡瘡發背疔疽便毒始發脉洪絃實數腫甚欲作膿者當歸括蔞根一錢半大黄三錢皂角刺牡蠣朴硝連翹各一錢半金銀花赤芍藥黄芩各一錢水酒各一鍾煎服乳香止痛散治一切瘡腫疼痛不止乳香沒藥各一錢丁香五分粟殻白芷陳皮炙甘草水煎服加味當歸飲子古云諸瘡皆屬心火火鬰則發之當歸生地升麻各五錢防風二錢半荆芥穂何首烏各一錢柴胡白芍藥川芎羌活黄耆各三錢紅花蘇木甘草各一錢每服五錢生薑三片煎或沐浴取㣲汗效速使血氣通暢服藥應效托裏温中湯治瘡為寒變而内䧟者膿出清觧皮膚凉心下痞滿腸鳴切痛大便微溏食則嘔氣短促吃逆不絶不得安卧時有昏憒丁香沉香茴香陳皮益智仁各一錢木香一錢半羌活良薑炮三錢黑附子炮去皮臍四錢炙甘草二錢薑三片水煎服忌生冷猪蹄湯治一切癰疽并諸腫毒消毒氣去惡肉凡瘡有口便須用此湯洗黄芩白芷赤芍藥川歸羌活生甘草露蜂房有蜂兒者各等分先将獖猪前蹄兩隻重一觔只用白水三升煮軟將汁分作二次澄去靣上油并下肉渣每次用藥一兩投於汁中再用文武火煎十數沸去渣以故帛蘸湯温温徐揩瘡上死肉惡血隨湯而下洗净訖以帛拭乾仍避風忌人口氣吹之有狐臭人及月婦猫犬並不宜入病人房中洗瘡切忌手觸洗疽之方甚多惟此方極效其用露蜂房甚有理盖以毒攻毒也麥門冬湯癰疽潰後膿水不絶麥門冬黄蓍五味子人参官桂當歸逺志白苓芎藭各一兩炙甘草三錢薑一片棗二枚水煎四虎散治發疽腫硬厚如牛皮按之痛天南星草烏頭半夏生用狼毒各等分為細末醋蜜調敷留頭出氣内托散諸腫毒惡瘡一服立愈便毒尤效大黄牡蠣各五錢甘草三錢括蔞仁二兩如無用山梔子亦可右分三帖水煎服鐵井攔治無名腫毒背疽以此圍之留口出氣芙蓉葉重陽前收蒼耳端午前收燒存性為末以蜜水調上五香湯諸瘡入腹托裏丁香木香沉香乳香各一兩人参一兩另加麝香三錢嘔惡者去之加藿香右為細末每服三錢水一盞煎六分空心熱服總録聖恵千金外臺治諸瘡腫方中皆載此方大同小異大抵専治毒氣入腹煩悶氣不通者其餘熱結昏昧口燥咽乾大便硬小便澁者未可與服止痛當歸湯治腦疽發背穿潰疼痛當歸黄蓍人参官桂芍藥炙甘草生地各一兩每服五錢水煎服金銀花散發背惡瘡托裏止痛排膿金銀花無花藤葉代之四兩甘草八錢分為三帖酒水各半煎服㧞毒散治熱毒丹腫逰走不定寒水石生用石膏生用各四兩黄栢甘草各一兩為細末新汲水調掃之或油調塗之或紙花上攤貼以凉水潤之寸金丹二名返魂丹三名再生丸四名追命丹六名来甦丹七名知命丹八名得道丸非人勿示若有人患毒身未爛者與三丸服之嚥下便活如口噤斡開研化灌之下喉立生治發背腦疽癰腫遍身附骨腫痛先覺時飲水口中煩渴發熱四肢沉重身體壯熱射香一分乳香輕粉烏金石雄黄狗寳沒藥各一錢蟾酥二錢粉霜黄蠟各三錢硇砂五錢鯉魚胆乾用狗膽各一枚頭男胎乳一盞金頭蜈蚣七條酥炙全用右俱為細末以黄蠟熬成膏子和勻為丸菉豆大小兒丸如芥子大每服一丸病重者加三丸白丁香七枚研爛新汲水調送下被盖出汗勿令透風凡服藥後喫白粥𤓰虀就睡大妙頭瘡腫痛不過三服定痛托裏散一切瘡腫疼痛不可忍如年少氣實先用踈利後服此藥川芎川歸乳香白芍藥沒藥與乳香各一錢半官桂一錢御米殻去筋膜炒二錢水煎服柞木飲子發背癰疽已成未成並宜服之乾柞木葉四兩乾荷葉心蒂萱草根甘草節地榆各一兩右為末每服五錢水煎服早晩各進一服内托千金散癰疽發背腦疽乳癰諸瘡癤未成者自散已成者即潰人参川歸黄蓍川芎防風白芍官桂桔梗白芷甘草括蔞金銀花各等分痛甚者加當歸乳香沒藥芍藥每服七八錢水煎臨服加好酒半盞温服日進二三服若瘡口有黑血出及有汗出者此藥之功也牛膠飲截癰疽惡瘡發險處服之使毒氣不𫝊於内不𫝊惡症牛皮膠通明好者净洗乾秤四兩為則右用酒一碗入膠納重湯頓令膠攪勻傾出更浸酒隨意飲盡若善飲者以醉為度亦用酒煎却浸以白湯飲盡為佳此法活人甚多國老膏一切癰疽俱發預期服之能消腫逐毒使毒氣不内攻功效不具述大甘草有粉者二斤槌今碎河水浸一宿揉令漿汁濃去渣再用綿濾過銀石器内慢火熬成膏以磁礶收之每服一二匙無灰酒侵入或白湯亦可不拘時服曾服丹劑燥藥亦觧之或微利無妨逺志酒一切􅏴疽發背惡毒有死血隂毒在中則不痛敷之則痛有憂怒等氣積而内攻則痛不可忍敷之則不痛或熱藴在内熱逼人手不可近敷之即清凉或氣虚血冷潰而不歛敷之即歛此乃韓大夫宅用以救人極騐若七情内鬰不問虚實治之必騐逺志米泔浸洗去心苖右為細末酒一盞調藥末三錢遲頃澄清飲之以渣敷病處忍冬酒癰疽發背初起時便當服此不拘症發何處及婦人乳癰服之皆有奇效外以麥飯石膏及神異膏塗之其效若神忍冬藤生取一大握以葉入砂盆内爛研入好酒或生酒尤佳調和稀稠得所塗敷四圍中心留一大竅出氣仍用忍冬藤五兩用木搥㣲搗不可碎甘草節一兩右入砂瓶内水二碗文武火慢慢煎至一碗入無灰好酒一大碗再煎十數沸去渣分為三次服一日服盡如病勢重一日夜再進一劑服至大小腸通利藥力乃到若無生者用乾者終不及生者力大而效速其功勝於紅内消神仙截法癰疽發背一切惡毒預服此藥毒氣不内攻可保無虞真麻油一斤銀石器煎十數沸傾出冷用右以無灰酒兩碗侵入油重湯温稍熱通口急服一日盡之為妙或疾發數日者亦宜急服之佳此法乃呉侍御家云三代用之無不騐又聞獵者云凡悮中藥箭急飲麻油則藥毒不行後於西山親見一人被虎箭穿股呌號不忍急以此灌之良久遂定又聞鄭學諭曾用之效黄蓍丸治因用針砭傷其經絡白濃赤汁逗留不止生黄蓍八錢川歸三錢木香沉香肉桂乳香各一錢右諸香並不見火為細末用菉豆粉生薑汁煮糊為丸梧桐子大温水吞四五十丸忍冬丸療渇疾旣愈之後須預防發癰疽大宜服此忍冬藤根莖花葉皆可用以無灰好酒浸以糠火煨一宿取出晒乾入甘草少許研為細末以所浸酒打麺糊為丸梧桐子大每服五十丸至百丸不拘時酒飲任下此藥不特治癰疽大能止渇并治五痔諸癭等疾援生膏治諸般惡瘡及瘰癧䑕瘻纔起者㸃破即愈血竭乳香沒藥各一錢蟾酥輕粉各三錢雄黄五錢麝香五分右用蕎麥稭灰或真炭灰一斗三升淋灰湯八九碗用栗柴或桑柴文武火煎作三碗取一碗收留二碗盛於好磁器内候温将前七味藥研為極細末入灰湯内用鐵瓢或桑桞枝攪再以好風化石灰一升入藥灰湯内攪勻取出候冷過宿盛於小白磁礶内凡遇諸惡瘡㸃在當頭一日二次次日又一次瘡頭食破約五分血水出為妙恐日久藥乾將前收留灰湯入之烏龍膏一名烏金散一切腫毒癰疽收赤暈木鼈子去壳半夏各二兩小粉四兩草烏五錢右於鐵銚内慢火炒令轉焦為細末出火毒再研以水調稀稠得所敷毒四圍留頂出氣或以醋調亦得透膿散諸癰疽瘡及貼骨癰不破者不必刀針以此㸃之不移時其膿自透累騐蛾口繭子出蛾有口者右燒存性以酒調服切記只用一枚不可多用如用二三枚即有二三口也慎之此方絶騐勿忽通門散一切瘡疽無頭腫痛山梔子三錢大黄二錢牡蠣炒五錢地龍去土三錢炙甘草五錢每服六七錢水煎服以利為度乳香拔毒散一切瘡腫癰疽消毒黄芩各二兩黄栢地骨皮乳香沒藥各二錢為末凉水調攤貼腫處效立效散發背諸癰癤瘰癧乳癰與前方間服神效皂角刺不用枯者剉而久炒生粉草二兩乳香五錢沒藥一兩括蔞五枚取肉炒右為末每服二錢無灰酒調下灸法癰疽初發小㸃一二日間急以大蒜頭横切如錢貼其中心以小艾炷灸之五壯而止若形狀稍大以黄稈紙蘸酒全貼㸔先乾處為筋脚於脚處灸之或兩處先乾皆灸但五七壯而止又法屈指從四圍尋按遇痛處是根就此處重按深入自覺輕快即此灸之更於别處灸若腫大即搗蒜餅焙乾蘸法醋灸熱更換頻罨或以熨斗火於蒜上熨之逐次更換熱餅頻熨如覺患處走散以綿帛覆盖勿令氣泄俟少間敷藥凡癰疽腫大如鱉之形湏㸔頭向上下先灸其前兩脚次灸其尾或紅筋走𦂳而長從盡處灸之須留頭并後兩脚勿灸設盡灸之不惟火氣壅聚彼毒無所走散反攻入裏也倘辯認不明以白芷三分漢椒桑白皮各一錢連根葱白十根新水煎入酸醋半盞淋洗少頃其筋自見可以辯認頭尾萬病觧毒丸癰疽發背魚臍毒瘡藥毒草毒挑生蛇毒獸毒諸惡瘡病五倍子五錢山荳根山慈姑一兩全蝎五錢紅牙大㦸七錢麝香一錢續隨子取仁去油取霜各半兩硃砂雄黄各二錢右件先以前五味入木臼搗羅為細末次研後四味夾和糯米糊丸分作三十五丸端午七夕重陽臈日净室修合每服一丸生薑蜜水磨下井水浸研敷患處觧毒收瘡救病神妙硃砂雄黄乃瘍醫五毒攻乃瘍中物也加味八味丸降心火生腎水治諸渇疾癰疽未發前已瘥渇症通用熟地黄焙二兩山藥微炒山茱萸蒸取肉焙各一兩辣桂去粗皮五錢澤㵼截作塊酒蘸磁器盛甑内蒸五次剉焙牡丹皮焙白茯苓各八錢五味子慢火焙乾研兩半右為細末煉蜜候冷和丸如梧桐子大每服三十丸空心鹽湯下神仙太乙膏治癰疽及一切惡瘡軟癤不問年月深淺已未成膿並宜治之蛇虎傷蜈犬咬傷湯火刀斧所傷皆可内服外貼如發背先以温水洗瘡净軟綿拭乾却用緋帛攤膏藥貼瘡即用冷水下血氣不通温酒送下赤白帶下當歸酒下咳𠻳及喉閉纒喉風並用新綿裹膏藥置口中含化一切風赤眼用膏揑作小餅貼太陽穴後服以山梔子湯送下打撲傷損外貼内服橘皮湯腰膝痛者患處貼之内服鹽湯送下唾血者桑白皮湯下諸痛先以鹽湯洗净諸血量大小以紙攤貼每服一丸如櫻桃大蛤粉為衣其膏可收十年不壊愈久愈烈一方久逺瘰癧同上瘻瘡鹽湯洗净貼酒下一丸婦人血脉不通甘草湯下一切瘡癤并腫痛及疥癩别煉油少許和膏塗之𤣥参白芷當歸赤芍藥肉桂去粗皮大黄生地黄各一兩右剉碎用麻油二觔浸春五夏三秋七冬十火熬黑色濾去渣入黄丹一觔青桞枝不住手攪候滴水中成珠不粘手為度傾入磁器中以磚盖口掘子窖埋隂樹下以土覆三日出火毒欲服丸如鷄頭子大神異膏治發背癰疽諸般惡瘡癤其效如神治疽疾先以麥飯石膏塗敷俟其瘡根脚漸收放徑寸大脚用神異膏貼之收口此藥隨其人病深淺取效合時不可與婦人鷄犬猫厭穢物見之𤣥参半兩杏仁去皮尖切一兩露蜂房净炒一兩用有蜂兒者為妙男子亂髪洗净焙乾五錢綿黄蓍三分全蛇退鹽水洗焙五錢黄丹飛細五兩右用真麻油一觔用髪入銀銚中文武火熬候髪焦鎔盡以杏仁投入候變黑色用好綿濾去渣再將所熬清油入銚内然後入𤣥参黄茋慢火熬一二時取出銚子安冷爐上半時久火力稍息旋入露蜂房蛇退二味將栁枝急攪却移銚放火上不住手攪慢火熬至紫黄色用綿濾過復入清油在銚内乘冷投黄丹急攪片時又移銚於火上以文武火慢火熬不住手桞枝攪千餘轉候藥油變黑色滴水中凝結成珠則是膏成就若珠子稀再熬少時必候其得所然後磁器内收封待用或恐偶然火熬太過稍硬難用却少將臈熬麻油在内以磁器盛封盖於甑上蒸乘熱攪調收用膏藥熬成了須連所盛磁器置净水中出火毒一晝夜歇三日方可用日換二次夜換一次熬此膏藥極難於火候須耐㸔火𦂳慢火猛則藥中火發不特失藥性又傷人靣目救助不及千萬謹戒膏藥方甚多不下數十治疽之神無出此方千金不換杖瘡尤妙萬金膏治癰疽發背諸般瘡癤從髙墜堕打撲傷損脚膝生瘡逺年㾾瘡痔漏一切惡瘡又云専治發背神妙不可具言或初覺若做瘡用牛皮膠令稀稠得所如藥化攤在毛頭紙上於初覺處或有做瘡處貼次用軟布帕子二條於釅米醋内煮令熱漉出互相於膠紙上乗熱蒸熨不可令布帕冷布帕二條不可都齊漉出常留一條於醋内煮候蒸熨得一條冷時却取醋内煮者熨之俟冷却又於醋内取熱布蒸熨庻幾常得熱布替換即易見效若瘡痒乃是藥攻其病須忍痒不止直候膿出將盡即濃煎貫衆湯候温洗去膠紙次日依前更洗若上有膿又如前法蒸熨雖連數日蒸熨不妨但要瘡中膿盡瘡乾為度然後用生肌紅玉散掺在瘡上即以萬金膏貼毎日一上或兩上每用再蒸熨並如前先鋪膠紙於瘡上了亦如前用貫衆湯洗去膠紙龍骨鱉甲𤣥参黄栢草烏黄連烏賊魚骨黄芩白芨白蘝猪牙皂角木鼈子當歸白芷川芎厚朴去粗皮槐枝桞枝各四寸長二十一條乳香另研沒藥另研各半兩黄丹水飛净炒過一斤八兩清麻油四斤入前藥熬赤色去柤秤净油三斤右除乳沒丹外餘藥入油内慢火煎候白芷焦色去粗入黄丹一半不住手攪令微黑色更入黄丹仍攪待滴入水中成珠不粘手為度攪温下乳沒末攪勻磁器盛用時量瘡大小攤紙貼之治諸惡瘡加自然銅肉桂各一分一方無當歸磨風膏治頭靣五發瘡腫疥癬等疾及湯泡傷磨風止痛㓕瘢㾗白附子白芍藥白茯芩零令香白芨白蘞白芷白檀藿香升麻細辛黄耆甘草杏仁去皮尖各一兩腦子括蔞根一兩大括蔞二兩去皮黄臈芝麻油右前十四味剉油内浸百日於臈日木火炭上銀石器内煎至白芷㣲黄色離火入括蔞二味着内煮百沸重綿濾去柤再慢火上煉油香下削净黄蠟鎔開為度傾在磁器内收貯上掺腦子宻封旋用磨風塗之金絲萬應膏治攧撲傷損手足肩背并寒濕脚氣疼痛不可忍小兒脾疳㵼痢咳𠻳不肯服藥者瀝清二斤半威靈仙二兩萆麻子二百枚去皮殻黄臈二兩木鼈子二十八枚去壳切片沒藥乳香各一兩麻油夏二兩春秋各四兩右先將瀝清同威靈仙下鍋熬化以槐桞枝攪候焦黄色重綿濾過以瀝清入水盆候冷成塊取出秤二觔净再下鍋鎔開下麻油黄臈萆麻子泥不住手槐桞枝攪勻須慢火滴入水中不粘手扯拔如金絲狀方可如硬旋再加油少許如軟加瀝清試得如法却下乳香沒藥末起鍋在炭火上再用槐桞枝攪數百次又以粗布漉下水盆内扯拔如金絲頻換水却用小銚盛頓如落馬墜車被傷疼痛處穴上灸熱貼透骨肉為驗連換熱水數次浴之則熱血聚處自消小兒脾疳㵼痢貼肚上咳𠻳貼背心上洗藥神硝散専治癰疽潰爛臭穢朴硝一兩蛇床子二兩研破右二味和勻每用三錢水一碗煎三五沸通手洗瘡上用後藥掺之聖效散收歛瘡口黄栢一兩去粗皮炒赤色穿山甲一兩炒黄色梹榔木香各半兩炒黄色右為末每用少許候大膿出盡洗浄方可乾掺瘡上阿膠飲一切癰疽癤毒牛膠剉蛤粉炒成珠粉草各一兩橘紅五錢分三帖水煎服家藏神騐血竭膏當歸酒洗白芷大黄黄連黄栢木鼈子去殻皂角杏仁露蜂房各一兩乳香沒藥血竭各二兩血餘一兩飛丹一斤麻油二斤右除乳沒血竭餘藥入油熬焦去渣熬至滴水成珠下丹將桞樹棍不住手攪軟硬得中入乳香等攪勻即成膏矣薛立齋云血竭取其以毒攻毒也若惡瘀已去毒氣既消宜用神效當歸膏以其生肌續筋也李氏云癰疽不服内托散及失宣通内毒以致咽喉口舌生瘡甚則生紅黑菌害人甚速當用琥珀犀角膏治之向有患此症者諸法不效與此藥一日而安琥珀犀角膏真琥珀犀角辰砂飛茯苓各二錢氷片二分半人参三錢酸棗炒二錢右為末煉蜜丸彈子大每服一丸麥門冬湯化下李氏云癰疽不服托裏之藥熱毒内攻喉舌生瘡甚至黑爛當服犀角散以觧其毒犀角屑𤣥参升麻黄蓍赤芍麥門冬去心生粉草當歸各一兩大黄㣲炒三兩右為粗末每服三錢水煎薛氏云前方破血降火内踈之劑也若其脉沉寒大便秘結發熱作渴喜飲冷者屬熱蓄於内方可用之若其脉虚浮大便不結發熱作渇畏飲冷者乃屬血虚於外可用當歸補血湯若尺脉洪數而無力發熱作渴小便頻數者屬腎水不足虚火上炎宜用加减八味丸盖此症多因腎水虧虚火上炎故也内托黄耆丸治針砭所傷惡寒發熱膿水不止肌肉不生瘡口不歛黄耆八兩川歸酒洗三兩肉桂心木香沉香各一兩菉荳末四兩乳香右為末以薑汁打菉荳末糊為丸白湯吞薛氏云若肌肉傷而瘡口不斂用六君子湯以補脾胃若氣虚惡寒而瘡口不斂用補中益氣湯以補脾肺若血虚發熱而瘡口不斂用四物参朮以滋肝脾若膿多而瘡口不斂用八珍湯或十全大補湯以養血氣經云脾主肌肉如前藥未應但用四君歸蓍以補脾胃更不應乃下元陽虚急用八味丸以壯火生土若脉數發渇者難治此真氣虚而邪氣實也李氏云近有數人病背疽或先寒後熱先熱後寒或連日或間日必嘔痰大汗而止皆用柴胡常山不應乃脾氣不正復感寒邪痰盛而作遂先用不換金正氣散次用排膿内補散木香湯三日而愈若外邪既去而仍嘔不止宜用六君子湯以補脾胃大凡胃氣虚而作嘔者必喜温熱毒内攻而作嘔者必喜冷治當辯之家𫝊不換金正氣散治感冐風寒或傷生冷或瘴􅒻或疫癘蒼术米泔浸炒四兩厚朴薑汁拌炒四兩炙粉草二兩橘紅三兩藿香葉半夏薑制二兩木香濕紙包煨人参白茯苓各一兩右每服五錢加薑棗水煎服凢疽愈後忽發渇而不救者十有八九或先渴而患疽者尤為難治急用加减八味丸可免前患如能乆服永不作渇亦無疽症且氣血皆壯真神劑也薛氏云前症屬腎水枯涸虚火上炎口乾作渴飲水無度或舌黄作裂小便頻數或痰氣上壅煩躁不寧或二三年先作渇飲水或口舌生瘡兩足發熱多痰或瘡愈三年而口乾作渴小便頻數急用前藥多有復生者能逆知其因預服前丸可免此患若兼手足厥冷真陽虚也宜服八味丸大凢瘡後審其腎水不足用加减八味丸中氣虚弱用補中益氣湯氣血虚弱用十全大補湯陽氣虚寒加薑桂如不應用八味丸加减八味丸熟地黄八兩乾山藥山茱茰去核五味子炒各四兩肉桂一兩牡丹皮白茯苓各三兩澤㵼切片蒸五次焙三兩右煉蜜為丸梧子大每服八十丸五更未言語前白湯下黄耆六一散黄耆六兩粉草半生半炙一兩右為末每服二錢空心日午白湯調下不應作大劑水煎服薛氏云忍冬丸觧熱毒消渴之藥也六一湯補氣虚作渇之藥用之無有不騐五味子湯腎水枯涸口燥舌乾五味子麥門冬各一兩黄蓍炒三兩人参二兩炙甘草五錢右每服五錢水煎服此方乃滋其化元之劑設腎水既涸虚火上炎燥渇須佐以加减八味丸李氏云疽疾將安每日當服十全大補湯以補氣血宜與排膿内補十宣散相間服薛氏云潰瘍屬氣血俱虚補之固當若患腫瘍而氣血虚弱者尤宜預補否則潰而不歛凡大病之後氣血未復多致再發若不調補必變為他症而危或悞以為瘡毒復發反行攻伐速其斃也深可戒諸神效托裏散治一切癰疽發背腸癰黄耆塩水炙忍冬葉當歸各五錢粉草二錢右酒煎服渣敷患處此乃托裏消毒之良劑也神效𤓰蔞散治乳癰瘰癧與立效散相間服黄𤓰蔞一枚杵碎當歸尾甘草節五錢沒藥另研一錢右用酒三碗煎一碗分三次服未成即消已成即潰立效散治癰疽瘰癧皂角刺半斤炒赤粉草二兩乳香沒藥另末各一兩黄𤓰蔞五個連皮研碎右每服一兩好酒煎服薛氏云二方治癰疽瘰癧觧毒止痛通用之良劑也若瘰癧寒熱焮痛腫赤乃肝經氣病當清肝火以養肝血若寒熱既止而核不消乃肝經之血亦病也當養肝血以清肝火若初如豆粒着於筋肉色不變内熱口乾精神倦怠久不消潰乃脾肝虧損當健脾土培肝木外臺秘要云肝腎虚熱則生癧矣病機云瘰癧不係膏粱丹毒因虚勞氣鬰所致補形氣調經脉其瘡自消若悞下之必先犯病禁經禁矣緑雲散治五發毒瘡於背腦或手足此方治金石發疽果有神效鳳尾草形如鳳尾葉背有金星炙乾一兩粉草一錢用酒一碗煎三五沸入冷酒一碗飲之以醉為度立效清凉膏治一切瘡瘍膿去後用之當歸二兩白芷白芨木鼈子去殻黄栢乳香白蘞白膠各五錢黄丹净五兩麻油十二兩右入油煎黑去柤入黄丹以槐桞枝不住手順攪再煎成膏乃下乳香等藥碧油膏止痛排膿灸後用此桃枝桞枝桑枝槐枝乳香血竭各五錢黄丹净四兩右用麻油十兩照常法煎成膏入乳香等任貼神效酒煎散治一切瘡瘍其效如神人参沒藥當歸尾各一兩甘草括蔞一枚半生半炒右以酒三碗煎二碗分四服柤焙乾加當歸末一兩酒糊丸桐子大每服五十丸以酒下善消毒活血經騐方治金石發癰黑鉛一斤甘草三兩右用酒一斗置磁器内先以甘草置在一邉另將鉛鎔投酒一邉取鉛再鎔仍投九度取酒飲醉寝即愈治癰疽用生甘草為末酒調二錢服連進數服自消前方乃清熱消毒之劑若因膏粱積熱金石蓄毒血氣壅滯者最宜如脾胃虚血氣痞滯者不宜概用恐胃寒故也升麻湯肺癰胸乳間作痛嘔吐膿血腥穢升麻苦梗薏仁地榆黄芩赤芍丹皮甘草各等分水煎服榖道前後生癰謂之懸癰粉草一兩截斷以澗水浸潤炙令透内細剉無灰酒煎服有人患此已破服兩劑瘡即愈崔氏云治手足甲疽或因修甲傷肉或因損足成瘡潰爛上脚用緑礬置鐵板上煅色赤如金者為真沸定取出研末以鹽湯洗搽之薛氏云前症即脫疽也此方固有良騐尤當調元氣為善大抵此症先醇酒炙􅏼膏粱厚味傷脾或房勞虧損腎水故有先渴而後患有先患而後渴者若色赤作痛自潰可治黑色不潰不治色赤作痛者先用隔蒜灸活命飲托裏散再用十全大補湯加减八味丸色黯不痛者隔蒜灸桑枝灸亦用十全大補湯加减八味丸則毒氣不致上侵元氣不致虧損庻可保生亦有因修手足口咬等傷者若元氣怯弱或犯勞事外塗寒凉内服尅伐損傷脾胃患處不潰色黯上延亦多致死重者須觧去當以脚刀轉觧周􅀈輕拽使筋隨骨出而毒得洩否則毒筋内斷仍上潰雖去無益且偏僻之處氣血罕到藥難導逹况攻毒之劑先傷脾胃反損元氣不若灸法為良重者湏觧毒為善故孫真人云在肉則剜在指則截雖親之遺體不忍毁傷然不如是則勢必至於夭歿非體親之心也况患處已壊雖觧不痛又何憚而不為乎女子亦有此患多因鬰怒虧損肝脾所致治法與前同疔瘡多生四肢發黄疱中或紫黑必先痒后痛先寒后熱也夫疔瘡者皆臓腑積受熱毒邪氣相摶於經絡之間以致血凝滯注於毛孔手足頭靣各隨五臓部分而發也其形如粟米或疼或痒以致遍身麻木頭眩寒熱時生嘔逆甚則四肢沉重心驚眼花盖疔腫初發時突起如疔盖故謂之疔含蓄毒氣突出寸許痛痒異常一二日間害人甚速是尤在癰疽之上也内經以白疔發於右鼻赤疔發於舌根黄疔發於口唇黑疔發於耳前青疔發於目下盖取五色之應五臓各有所屬部位而已然或肩或腰或足發無定處如在手足頭靣及骨節間者最急其餘猶可緩也凡疔瘡皆宜刺瘡中心至痛處又刺四邉十餘刺令惡血出乃敷藥藥力方得入於針孔中則佳若不刺破藥力不能入又㸔口中頰邊舌上有赤黑如珠子者是也諸疔名目雖多其治法略同初起宜以針刺出毒血將蟾酥丸或迴疔錠子之類從針孔絍入之上用膏藥貼之仍服飛龍奪命丹發汗及五香連翹漏蘆湯之類并清心之劑盖諸瘡皆屬心火心清則毒氣消散而易愈矣追毒丹取黄去疔頭追膿毒立效蟾酥用酒化蜈蚣酒炙硇砂白丁香各一錢無此味加巴豆雄黄二錢輕粉一錢硃砂二錢為衣巴豆七粒去殻不去油右為末用酒打糊為丸麥子大兩頭尖入於針破口内用水沉膏貼之後用膏藥及生肌藥追出膿血毒物又有如黑䧟漏瘡者四圍死敗肉不去不生肌者不可治也亦用此藥追毒去死肌敗肉生新肉愈矣小者用一粒大者加用之病輕者不必用針只以手指甲爬動於瘡頂上安此藥水沉膏貼之其瘡即時紅腫為度去其敗肉為妙用之神騐水沉膏將白芨末放在盞内用水沉下去用紙貼之如用膏不可用生肌藥凡用拈㸃之藥用此膏圍貼則不傷好肉追疔奪命丹能立取效騐使腫内消羌活獨活青皮君防風君黄連赤芍細辛甘草節蟬退殭蠶金線重樓澤蘭金銀花各等分有膿加何首烏白芷要通利加青木香大黄梔子牽牛毒在下加木𤓰各等分右每服五錢先將一貼加澤蘭金銀花各一兩生薑十片同藥擂爛好酒鏇之熱服不善酒者水煎仍以酒水各一盞半生薑十片煎至熱服之汗出為度病退再加大黄二錢煎熱取利一兩次去餘毒為妙此方以藥味觀之甚若不切然效速如神萬不失一百發百中如有别証再出宜隨加减治之若心煩嘔吐加甘草節一錢菉荳粉一錢酸漿水下嘔逆惡心加乳香荳粉甘草湯下飛龍奪命丹治疔瘡發背腦疽乳癰附骨疽一切無頭腫毒惡瘡服之便有頭不痛者服之便痛已成者服之立愈此乃惡症藥中至寳病危者服之立安萬無失一係神人之秘方不可輕忽血竭一錢蟾酥乾者二錢酒化乳香沒藥銅录硃砂為衣各二錢雄黄三錢輕粉五分膽礬寒水石各一錢麝香氷片各五分海羊二十一條即蝸牛蜈蚣一條酒炙去頭足右為末先將海羊連殻研如泥和前藥為丸菉豆大或加酒打麺糊每服二丸先用葱白三寸爛嚼吐於手心男左女右將藥包在葱内無灰酒三四盞送下避風處被盖出汗約人行五里許再以熱酒數盃催之以汗出為度服前藥二丸即消如汗不出重者再服二丸汗出即效三五日重者再進二丸即愈如疔走黄過心者難治汗出冷者亦死如病人不能嚼葱擂碎裹藥以熱酒吞下服此藥後忌服冷水冷物黄𤓰茄子猪魚鷄鵞羊濕麺一切發毒動風之物不可食之及月婦狐臭人見之此藥活人萬萬誠外科匙鑰㧞黄藥用真取蟾酥飛羅麺為丸梧子大可將一丸放在靣前舌下即時黄出百二散又名䕶心散治發疔煩躁手足不住發狂者急宜服之方在癰疽門蟾酥膏治疔新蟾酥以白麺黄丹搜作劑圓如麥顆大用指甲爬動瘡上挿入重者針破瘡頭用一粒内之仍以水沉膏貼囬瘡錠子治疔瘡大妙草烏頭一兩蟾酥巴豆七箇去皮麝香一字右為細末麺糊和就揑作錠子如有惡瘡透疔不痛無血者用針深刺至痛處有血出以此拰之上用膏貼疔瘡四畔拰之其疔二三日自然㧞出此藥最宜𦂳用此証大抵與傷寒頗類其中亦有可針鎌砭射出血者亦有乆而敗爛出膿者其間變異百端不可不慎也内托連翹散疔瘡出時皮色不變不疼痛按揺不動身發寒熱便是此瘡有水疔魚臍疔紫燕疔火疔諸般疔瘡如瘡黄於黄上用針刺仍服内托散自然消散連翹生地白芷赤芍各一兩大黄山梔去頂蒂薄荷各七錢朴硝二兩黄芩五錢甘草一兩半每服一兩燈心竹葉各十莖水煎服其人喘加人参少許大病只三四服愈如服下心煩嘔者以䕶心散止之䕶心散甘草五錢菉荳粉一兩為末分作二次酸虀水下破棺丹治疔走黄不止川歸赤芍藥山梔仁牽牛各二兩半連翹牡蠣金銀花紫花地丁各一兩半京三稜甘草各二兩大黄三兩半右為末煉蜜丸彈子大每服一丸童便化開服忌飲酒及生冷治疔走了黄打滚將死者牡蠣大黄木通山梔子金銀花連翹牛蒡子地骨皮乳香沒藥括蔞皂角刺每服五錢壯實者加朴硝用水一碗酒半碗煎服此乃救命仙方也鐵粉散治冷疔瘡經久不效用此大妙多年生鐵炒過三錢松脂一錢黄丹輕粉各五分麝香一分右為細末清油調塗瘡口立效走馬赴筵丹治疔瘡沒藥乳香硼砂碙砂雄黄輕粉各三錢氷片一分麝香一分右為細末蟾酥汁和為丸黄米大每服一丸温酒送下立效金砂散取疔瘡道人頭㣲炒一兩即蒼耳子碙砂三錢半雄黄三錢蟾酥以多為妙右將瘡四圍刺破以少油調藥末置於瘡内緋帛封之數日疔自出蒼耳散治一切疔腫神效蒼耳草根莖苖子但取一色便可用燒存性研細末用好米醋米泔澄淀和如泥隨瘡大小塗上厚二分乾即易之不過十度即㧞根出須針破塗之加雄黄尤妙蒼耳與白梅研爛貼疔上拔去根毒氣入腹嘔吐者搗蒼耳汁飲之立效治疔最有效用蟬退殭蠶為末醋調塗四圍留瘡口俟根出稍長然後拔去再用藥塗海藏方單用殭蠶為末津調塗亦佳治疔危篤者二服即愈輕者一服立效土蜂房一小窠全此物能利大小便蛇蛻一條全用瓦器盛塩泥固濟火煅存性研為細末每服一錢空心好酒調下少頃腹中大痛痛止其瘡已化黄水矣仍服后方五聖散大黄一兩生薑皂角刺金銀花各二兩𤓰蔞一枚甘草一兩用好酒二升煎八分不拘時服治疔瘡最驗蒼耳臭牡丹各一大握搗爛新汲水調服㵼下黑水即愈單用蒼耳葉搗汁和童便服一日三次立效肘後方疔腫垂死者一服立效菊花葉紫莖者一握搗取汁一升入口即活此神騐根莖葉花皆可用蒼耳散治疔瘡累用神效蒼耳根三兩五錢烏梅五箇帶鬚葱三根用酒二鍾煎至一鍾熱服出汗後不散然後用勝金散勝金散取鐵銹炒為末每服四錢或三五六錢用􅀢水滚過停冷調服不吐為佳反花瘡瘡有努肉凸出者是也聖恵方治諸瘡努肉如蛇頭出數寸者硫黄末敷之即縮肘後方治瘡有肉突出烏梅燒灰敷立消又方白梅肉杵細入蜜揑成餅貼之妙又方馬齒莧燒灰研末猪脂調敷瘡突出寸許根如小荳或大如梅者用花脚蜘蛛絲纒其根則漸乾而自脫落又方甘草半生半炒枯礬人中白宻佗僧各等分右為細末以童便半盞用無灰酒和熬竹箆攪成膏塗瘡上日三五次經騐方胭脂丕貝母各三錢胡粉二錢半白硼砂沒藥各二錢為末先用温漿水洗後服藥雜瘡諸惡瘡入心腹嘔逆藥食不下菉豆粉半兩乾胭脂三錢定粉二錢為細末新水調下效天泡瘡通聖散及蚯蚓泥畧炒蜜調敷妙若從肚皮起者裏熱發外速服通聖散天行斑瘡須臾遍身皆戴白漿此惡毒氣永徽四年此瘡自西域東流於海内但煮葵菜葉以蒜虀啖之即止人靣瘡昔有人左膊有瘡如靣歴試諸方惟後以貝母為末水調灌之数日乃結痂遂愈足指内生鷄眼子用鷄胃中食揩之餘者以石壓之立騐天泡瘡小麥炒焦為末以生桐油調敷效若神速治一切瘡疥神異膏全蠍去尾洗七枚蛇床子取末三錢皂角一錠巴豆去殻七粒麻油一兩黄﨟半兩雄黄另研末三錢輕粉另研五分右先用全蝎皂角巴豆煎油黑色去柤入䗶化開取出俟冷入雄黄輕粉蛇床子末攪勻成膏毎用少許搽瘡上湏先以苦参湯洗過絶妙苦参湯苦参蛇床子白礬荆芥各等分煎湯温洗治漏瘡不收口五倍子末血竭末填塞之效治一切瘡葵花散葵花梔子黄連黄栢各等分為末冷水調貼痛處百合散治頥頦瘡一名獨骨瘡百合黄栢各一兩白芨二錢半萆麻子五十粒為末朴硝水和餅貼日三五次靣上耳邊生浸滛瘡久不愈出黄水名香瓣瘡羖羊鬚荆芥乾棗去核各二錢俱燒存性研末入膩粉半錢每用少許清油調搽先以温湯净洗拭乾塗藥二三次效亦治大人小兒兩脗生瘡附子散治冷瘡日夜發歇疼痛附子半兩炮去皮臍川椒去目雄黄研末各二錢半枯礬七錢半右為末麻油調敷瘡上日二次白蒺藜散熱毒瘡瘙痒心神壅躁白蘚皮白蒺藜炒去刺防風去芦川大黄炒赤芍藥梔子麥冬條芩𤣥参桔梗前胡炙甘草各一兩為末每服二錢食後薄荷湯調服七寶散熱汗浸漬成瘡痒痛不止黄蓍川歸防風荆芥穂地骨皮木通各二兩明礬一兩每用一兩水煎五六沸去柤稍熱渫淋患處拭乾避風東垣此方曾治推車客皮膚皺裂不任痛兩手不能執轅足不能履地因製此藥與之即效明日遂行自是屢用屢效玉女英治瘡痒痛滑石五分菉荳粉㣲炒四兩右末之用綿包撲上妙一方加棗葉一兩連翹飲治諸惡瘡紅赤痛痒心煩口乾及婦人血風赤斑圓㸃開爛成瘡痒痛流黄水連翹生地川歸括蔞根荆芥黄芩赤芍麥冬瞿麥术通大力子炒防風山梔川芎甘草各等分每服五六錢水煎加燈心二十莖不拘時服紫花地丁散諸惡毒瘡腫痛如神川歸紫花地丁大黄赤芍藥金銀花黄蓍各半兩甘草根二錢每服一兩水酒各一碗煎服水銀膏月蝕瘡多在兩耳及竅邉隨月盈虚水銀二錢半黄連末胡粉松脂各半兩猪脂四兩右先熬猪脂令沸入松脂諸藥及水銀攪令勻磁器收先以鹽湯洗净塗上日三五度治甲疽瘡录礬散緑礬燒赤五錢盧薈一錢半麝香二分半俱為末以絹袋盛包患指扎定以差為度漆瘡生蠏取黄塗之效又方湯浸茫硝冷洗之效明礬湯洗亦妙又方生紫蘓擦之累效又人乳汁敷之好又方乾荷葉一斤水一斗煮濃汁洗瘡上日三瘥又方無名異末水調服代指手指甲頭腫痛烏梅肉并仁研爛醋調稀入指浸之愈升麻和氣飲治瘡腫癤疥痒痛升麻桔梗蒼术乾葛甘草大黄煨各一錢陳皮二錢當歸半夏茯苓白芷乾薑枳殻各五分白芍一錢半右作一服水煎服當歸飲子治瘡痒疥癬濕毒風燥當歸川芎防風白芍生地蒺藜荆芥各一錢半何首烏黄蓍甘草各一錢右作一帖水煎食逺服為末亦可除濕散大治一切風毒疥癬癩痒狀如癩風苦参何首烏荆芥穂蔓荆子薄荷各一兩白芷烏蛇酒浸一宿焙乾天麻川芎防風各半兩右為末每服三錢酒調下日進三次六日一浴令汗出血氣宣通一月膚澤如故一掃散一切瘡疥但相對而生者便是不問乾濕痒痛日近年深用之立效藜蘆皮二兩雄黄五錢輕粉十帖蚌粉水粉各一兩為末用大鯽魚一對入麻油煎熟去魚攤冷調藥搽瘡若效遲加信末少許研杏仁十粒近隂處勿加消毒飲丹溪云消毒散氣表藥也防風一兩甘草二兩荆芥穂三兩大力子四兩每服五錢水煎服治皮膚風熱遍身生病丙穩禾疹大力子浮萍等分為末薄荷湯調下二錢日再東垣云每風瘡大風病相似好桑葉洗蒸一宿日乾為末白湯調服二錢殭蠶散治風遍身病丙穩禾疹痛疼成瘡白殭蠶洗焙黄為末每服一錢酒調服一日三次立瘥衍義方有人病遍身風熱細疹痒痛不可任連腦脛臍腹及近隂處皆然涎痰多夜不得卧苦参末一兩皂角二兩水一大升揉取汁銀石器熬成膏和苦参為丸如梧桐子大每服二十丸温水吞次日便愈小兒靣瘡通靣爛無完膚膿水流漓百藥不效陳年臈猪脂不入鹽者敷之若神治諸般瘡疥加减法腫多加白芷開鬰痛多加白芷方觧石痒多加枯礬隂囊瘡加呉茱茰濕多香油調乾痒出血加大黄黄連猪脂調蟲多加蕪荑錫灰梹榔藜蘆斑猫紅色加黄丹青色加青黛在上加通聖散在下部多用濬川丸下之脚腫多出血加血分濕熱藥膿胞瘡治熱為主帶燥濕黄芩黄連大黄各三錢蛇床子寒水石二錢黄丹五分白礬一錢輕粉白芷無名異各少許木香少許痛者加為細末麻油調搽蟲瘡如癬狀退熱殺蟲為主乾疥瘡開鬰為主加吳茱茰蕪荑黑狗脊殺䖝樟腦一錢松脂頭上多加之白礬雄黄硫黄水銀殺蟲黄連方觧石一分蛇床子定痒殺松皮灰膿多及栢油謂搽濕多加之疥癩瘡春天發焦疥開鬰為主不宜􅎲破枯礬吳茱茰各二錢樟腦五分輕粉十帖寒水石二錢半蛇床子二錢黄栢大黄各錢硫黄一錢梹榔一錢右為末猪脂調搽治瘑疥濕瘡浸淫日乆痒不可忍搔之黄水出瘥後復發取羊蹄根去皮細切熬熟以米醋和先洗净傅上一時再以冷水洗之日一傅瘥若為末傳尤妙外䑓秘要治疥取羊蹄根和猪脂塗上或着鹽少許即結痂愈千金翼治遍身風痒生瘡疥茵陳煎濃洗立效衍義云有人患遍身生熱毒瘡痛而不痒手足尤甚至頸而止粘着衣被曉夕不得睡痛不可忍以菖蒲三斗剉日乾之為末布席上使恣卧其間仍以衣被覆之既不粘衣被又復得睡不五七日其瘡如失應手神騐浸滛瘡痛不可忍者發寒熱大薊末水敷瘡上乾則易之外䑓秘要治卒發疥秘騐方風化石灰和醋漿水調塗隨手即减一法用石灰炒紅出火氣香油調敷千金方淋石灰汁洗之木香散一切惡瘡多時不歛此能生肌肉止痛木香梹榔黄連各半兩白芷三錢為末先洗每日一次乾掺有水出勿訝未效再掺又方加地骨皮先於瘡上用温漿水洗濕拭乾上藥妙不可言概治下疳瘡如神洗諸瘡疥取冬𤓰藤或皮煎湯洗妙治風癩瘡黄水瘡此方神效用新竹筒十箇内裝黑豆一層頭髪一層數層至滿以稻糠皮火煨之於火盆内週圍同火煨竹筒内汁滴出以盞接之鵝翎蘸掃於瘡上數日即愈神仙活命飲治一切惡瘡癰疽腫毒穿山甲蛤粉炒黄色净六分貝母去心八分甘草節六分防風去皮蘆五分沒藥六分赤芍藥六分白芷五分當歸尾一錢乳香一錢天花粉八分金銀花一錢陳皮三錢右作一服用無灰酒一大碗慢火煎令出氣量上下食前後服如患人能飲酒者服藥後隨意飲三兩盃為妙詩曰真人妙訣世間稀一切癰疽總可醫消腫如同湯沃雪化膿立見肉生肌消毒散治一切惡瘡赤腫疼痛掃之如神黄連五錢地骨皮一兩朴硝三兩右為末每用三五分水一盞煎至七分去渣停冷用鷄翎掃之立效婦人隂瘡仲景云少隂脉滑而數者隂中即生瘡狼牙湯洗之狼牙二兩濃煎以綿纒筯頭浸湯瀝洗隂中一日三度治隂蝕瘡洗榻散甘草一兩乾漆一兩黄芩地黄當歸芍藥各二兩龜甲五兩右細切以水七升煮取一半去渣以綿帛納湯中用榻瘡處良乆即易日二度每榻湯可作十里許即挹乾捻取甘濕散薄敷瘡上使徧可經半日又以湯榻榻訖如前敷藥有一婢此疾蝕處作兩瘡深半寸用此湯并後甘濕散不經七日平復甚效甘濕散蚺蛇胆青木香硫黄鐵精麝香臨時加入縁麝辟蛇毒若入早則蚺膽無力也右等分為末每取一錢井花水調日再服先令便利了即以後方桃枝薰下部訖然後取藥如碁子安竹管内入下部中日再度桃枝薰法取東南桃枝五七枝將枝頭輕敲碎綿纒之蘸硫黄末数轉令厚又截一竹筒先入下部中却將桃枝藥燒着入筒内薰之仲景云蛇床子散濕隂中之主藥蛇床子仁為末以白粉少許和勻相得如棗大納入戸中自然濕散荳胚散隂蝕瘡菉豆粉蝦蟆灰各二錢半胭脂胚一錢二分右為細末乾掺沐浴長春散男子下元隂濕乆冷隂囊左右夜痒􅎲之則喜住之則痛成瘡流水為害甚苦此方極效及治婦人隂濕子宫久冷牡蠣蛇床子破故紙紫梢花乾荷葉官桂各等分每用一兩半水一小鍋入葱白數莖煎八分先薰後洗却用後津調散津調散治妬精瘡婦人隂濕瘡膿汁淋漓臭爛黄連欵冬花各等分麝香少許為細末或先以地骨皮蛇床子煎湯洗軟帛拭乾津調敷之忌生湯洗妬精瘡青黛欵冬花等分麝香少許為末先以桑白皮地骨皮煎湯洗軟帛拭乾津唾調末藥敷婦人玉户疳瘡及小兒走馬牙疳活蜘蛛一枚以生薄荷葉或乾者包蜘蛛燒存性為末酒調服之妙妙如小兒走馬牙疳以此搽之效癬丹溪云初起發熱者防風通聖散去硝黄加浮萍皂角刺羅太無何首烏散若脾肺風毒攻腫遍身癬變成病丙穩禾疹搔之成瘡或肩背拘急肌肉頑痺手足皴裂風氣上攻頭靣生瘡及治紫白癜風頑麻風症荆芥穂蔓荆子葳靈仙何首烏炙甘草防風車前子各等分為末每服一錢食後温酒調下白湯亦可癬在頸項間后延上至耳成濕癬他治不應以蘆薈一兩甘草半兩和勻先用温漿水洗癬拭乾敷之效一方蘆薈大黄輕粉雄黄蛇床子川槿皮梹榔為末先刮破癬醋調塗之乾癬積年生痂疕搔之黄水出每逢隂雨即痒用狼毒末塗之栢脂膏治乾癬栢油一斤黄臈半斤杏仁四十五粒朴硝一抄右件鐵器内用老生薑葱白三根一順攪五七次煎沸濾過成膏搽之又方山荳根末臘猪脂調塗之祛濕散多年濕癬大有神功蠶沙四兩薄荷半兩為末掺之或用生油調搽羌活膏治頑癬疥癩風瘡成片流黄水乆不瘥羌活獨活明礬白蘚皮硫黄狼毒各一兩黄丹白附子蛇床子各半兩輕粉二錢半為細末油調成膏搽之八寶散治風癩松皮頑癬久不瘥神效藿香檳榔破故紙大腹皮雄黄輕粉硫黄枯礬各等分為末油調搽日三五次痒即搽之香疥藥治風疥癬瘡黄水瘡牛皮癬輕粉水銀樟腦各三錢大風子四十九枚川椒四十九粒杏仁二十一粒桕油一對為細末疥用絹包於瘡上熨之黄水瘡乾掺神效一抹散治乾癬不瘥天南星草烏頭各用生者一枚為末以羊蹄根搗取汁調塗不過三次妙絶牛皮癬及乆年頑癬神方紅粉霜五分明礬一錢蜜陀僧三錢川槿皮一錢杏仁去皮油一錢為末津唾調搽一日三次三日全愈脚瘡皮厚如癬或流黄水黄水延處即爛浸滛年久不愈者此方屢試屢騐瘡癬俱佳紅棗二枚去核將皂礬一錢納棗中以苧蔴𦂳扎用好酒二碗慢火煮成膏不要攪動膏成去棗不用以膏塗患處二三度全愈若浸淫瘡初塗時略疼少刻便止其瘡就結乾痂妙甚臁瘡夫臁瘡者皆由腎臓虚寒風邪毒氣外攻三里之傍灌於隂交之側風熱毒氣流注兩脚生瘡腫爛疼痛臭穢步履艱難此瘡生於臁骨為重以其骨上肉少皮薄故難愈至有多年無已口開濶皮爛肉現臭穢可畏治法當先取蟲然後敷藥如隔紙膏麝香輕粉散之類須翹足端坐勿多行履庻可全愈矣隔紙膏治内外臁瘡當歸白芷黄連五倍子雄黄沒藥海螵蛸血竭白芨白歛黄蘖厚朴已上各五錢黄丹乳香二錢半研輕粉一錢右為細末用清油紙貼藥敷瘡上絹帛縳定有膿水觧開刮去不潔再貼藥如此数次即愈須先用燒塩湯洗净片帛拭乾待片時水氣乾然後貼藥又隔紙膏專治臁瘡如神務要用絹帛縳得着實貼肉方好過兩日取抺净翻貼之滴乳沒藥各二錢黄丹炒紫色降真香灰各兩半已上俱另為細末真黄䗶一兩真蜂蜜一茶盞右將黄丹入銅鏇内炒紫色次下降真香灰末攪令勻却下蜜黄䗶另熬化傾入油蜜攪令極匀然後下乳香沒藥輕粉片腦再用銅匙攪之又勻待藥稀稠得所取出磁碗收盛勿令泄氣臨用㸔瘡大小攤之油紙綿紙尤佳竹紙不耐藥在中紙在外翻覆貼之治臁瘡久不愈龍骨二錢半乾猪糞半兩燒存性輕粉少許梹榔半兩乳香沒藥各一錢右為細末先以燒鹽湯洗瘡以軟絹帛拭乾清油調敷瘡濕則掺之秘𫝊隔紙膏治年月深乆臁瘡不愈者老松香樟腦谷丹炒水龍骨即舊船石灰輕粉久不愈加白芷川芎海螵蛸總為細末鎔化松香加少清油和之以油紙隨瘡大小糊袋盛藥夾之用水洗净縳在瘡口上二日定四日一換若單用白芷川芎螵蛸三味煎水洗之立效屢驗方枯礬三錢墨煤煉存性一兩研勻以生桐油做隔紙膏貼之先以五棓子川椒葱三味煎湯洗拭乾貼藥一日一換七日全愈又方治似臁非臁蜂蜜四兩嫩松香一錢二分先將蜜鎔滴水成珠次入松香末攪勻如上法做貼洗亦同又方麻油二兩熬至滴水成珠又將蜂蜜四兩熬至滴水成珠將油攙入又將伏龍肝四兩為末入内攪勻成膏先將瘡洗浄以膏塗之一日一二次其效甚速又方冬青葉臈猪膽百草霜二味和勻將冬青葉與本人嚼爛先將瘡用椒葱湯洗净乃以膽霜敷後却敷冬青葉三四次便愈粉麝散治内外臁臭爛数十年不愈者生龜一枚去肉取殻醋一盌炙醋盡為度煅令白烟盡存性以盌盖在地上出火毒為細末入輕粉麝香拌勻臨用先以葱水洗乾敷藥妙絶妙絶又方新起未久者甚好玉簮花葉小便浸貼一日一換五日愈諸凡癰毒惡瘡多年臭爛成坑不收口者此方極佳一七成功乳香沒藥各五錢天靈盖煆一兩右為極細末掺之神靈鮑清溪之子患痘後腦癰肉爛成坑骨露不收口百藥無功敷此立效赤水元珠卷二十九
