body:
  text: 赤水元珠卷十一明孫一奎撰鬱證門鬱脈多沈伏鬱在上則見於寸鬱在中則見於闗鬱在下則見於尺左右皆然鬱脈或促或結或澁滑伯仁云氣血食積痰飲一有留滯於其間則脈必因之而止澁矣但當求其有神所謂神者胃氣也夫鬱者結滯而不通暢之謂當升而不得升當降而不得降當變化而不得變化所以為鬱氣血沖和百病不生一有怫鬱諸病生焉丹溪云病之屬鬱者十常八九但病有因别臟所乗而為鬱者有不因别臟所乗而本氣自鬱者此五鬱也又有氣鬱血鬱痰鬱食鬱火鬱濕鬱六者此六鬱也蒼术香附子川芎總解諸鬱故製越鞠丸通治之随證加入諸藥按蒼术氣味雄壯辛烈開發水穀之氣乃足陽明太陰之藥香附子下氣最速乃陰血中快氣之藥一升一降足以解散其鬱川芎直達三焦俾生發之氣上行頭目下行血海通陰陽氣血之使也况蒼术尤能徑入諸經疎泄陽明之濕故諸鬱用之多效王汝言云丹溪治病不出乎氣血痰三者故用藥之要有三氣用四君子湯血用四物湯痰用二陳湯久病屬鬱故立治鬱之方曰越鞠丸蓋氣血痰三病多有兼鬱者或悞藥雜亂而成鬱故用三方治病時以鬱法㕘之氣病兼鬱用四君子加開鬱藥血病痰病亦然五臟本氣自鬱証心鬱者神氣昏昧心胸㣲悶主事健忘治宜肉桂黄連石菖蒲肝鬱者兩脇㣲膨噯氣連連有聲治宜青皮川芎呉茱萸脾鬱者中脘㣲滿生涎少食四肢無力治宜陳皮半夏蒼术肺鬱者皮毛燥而不潤欲𠻳而無痰治宜桔梗麻黄豆豉腎鬱者小腹㣲硬精髓乏少或濁或淋不能久立治宜肉桂茯苓小茴香又有膽鬱者口苦身㣲潮熱往來惕惕然如人將捕之治宜柴胡竹茹乾薑氣鬱者其狀胸滿脇痛脈沈而澁宜二陳湯加蒼术川芎香附子或分心氣飲木香分氣飲七氣湯之類血鬱者其狀四肢無力能食便血脈沈澁而芤宜四物湯加桃仁紅花川芎牡丹皮香附子或越鞠丸痰鬱者其狀動則喘寸口脈沈而滑宜二陳湯加南星海石枳殻香附子𤓰蔞仁或化痰丸食鬱者其狀噯酸胸滿腹脹不能食或嘔酸水惡聞食氣宜二陳湯加蒼术神麴麥芽山查香附子或保和丸火鬱者其狀瞀悶小便赤澁脈沈而數骨髓中熱肌痺熱捫之烙手宜二陳湯加黄連青黛貝母香附子川芎蒼术山梔子或火鬱湯濕鬱者其狀周身腫痛或闗節痛陰雨則發體重頭重痛脈沈而細宜白芷二术茯苓川芎香附子或升陽除濕湯又有素虚之人一旦事不如意頭目眩暈精神短少筋痿氣急有似虚證先當開鬱順氣其病自愈宜交感丹不效用歸脾湯分心氣飲木通青皮半夏陳皮茯苓甘草桂桑白皮大腹皮羌活紫蘇生薑燈草大棗水煎服交感丹香附子童便浸七口晒乾醋炒黄一斤茯神去皮心人乳浸日晒夜露七日夜四兩右為末煉蜜丸彈子大空心滚湯細嚼一丸開鬱湯香附子蒼术川芎貝母神麴山梔子陳皮半夏茯苓甘草炙生薑水煎服氣加木香枳殻檳榔紫蘇血加桃仁紅花牡丹皮痰加南星食加山查麥芽砂仁熱加黄連黄芩柴胡濕加羌活倍蒼术嚴用和云人之氣道貴乎順順則百脈流通氣鬱者胸脇痛脈沈澁濕鬱者周身走疼或闗節痛遇陰寒則發脈沈細痰鬱者動則喘咳寸口脈沈滑熱鬱者瞀悶小便赤脈沈數血鬱者四肢無力能食便紅脈沈數食鬱者噯酸腹飽不能食人迎脈平和氣口脈𦂳盛蒼术撫芎摠解諸鬱隨症加入諸藥凡鬱皆在中焦以蒼术撫芎開提其氣以升之假如食在氣上提其氣則食自降餘倣此氣鬱香附童便浸蒼术米泔浸撫芎濕鬱白芷蒼术川芎茯苓痰鬱海石香附南星薑製𤓰蔞熱鬱山梔炒青黛香附蒼术撫芎血鬱桃仁去皮紅花青黛川芎香附食鬱蒼术香附山查神麴針砂醋製春加川芎夏加苦參秋冬加呉茱萸越鞠丸又名芎术丸總解諸鬱蒼术香附撫芎神麴梔子炒為末滴水為丸菉豆大痿證門痿痿謂痿弱無力以運動帝曰五臟使人痿何也岐伯曰肺主身之皮毛心主身之血脈肝主身之筋膜脾主身之肌肉腎主身之骨髓故肺熱葉焦則皮毛虚弱急薄著則生痿躄也王注肺熱則腎受熱氣故足孿躄不得仲以行也心氣熱則下脈厥而上上則下脈虚虚則生脈痿樞折挈脛縱而不任地也肝氣熱則膽泄口苦筋膜乾則筋急而攣發為筋痿脾氣熱則胃乾而渴肌肉不仁發為肉痿腎氣熱則腰脊不舉骨枯而髓減發為骨痿曰何以得之曰肺者臟之長也為心之蓋也有所失亡所求不得則發肺鳴鳴則肺熱葉焦肺藏氣志若不揚則氣鬱氣鬱不利故喘息有聲而肺熱葉焦也故曰五臟因肺熱葉焦發為痿躄此之謂也悲哀太甚則胞絡絶胞絡絶則陽氣内動發則心下崩數溲血也故本病曰本病古經篇名也大經大經脈也以溺血故空虚脈虚則熱内薄衞氣盛榮氣㣲故發為䏎痺後漸脈痿故曰𫝊為脈痿也大經空虚發為肌痺𫝊為脈痿思想無窮所願不得意淫於外入房太甚宗筋弛縱發為筋痿及為白淫也故下經曰筋痿者生於肝使内也下經古經名使内謂勞役筋内費竭精氣也有漸於濕以水為事若有所留居處相濕肌肉濡漬痺而不仁發為肉痿故下經曰肉痿者得之濕地也地之濕氣感則害人皮肉筋脈此則謂害肉也有所逺行勞倦逢大熱而渴渴則陽氣内伐謂伐腹中之隂氣也内伐則熱舎於腎腎者水臟也今水不勝火則骨枯而髓虚故足不任身發為骨痿故下經曰骨痿者生於大熱也曰何以别之曰肺熱者色白而毛敗心熱者色赤而絡脈溢肝熱者色蒼而𤓰枯脾熱者色黄而肉濡動腎熱者色黑而齒稿曰如夫子言可矣論言治痿者獨取陽明何也曰陽明五臟六腑之海主閏宗筋宗筋主束骨而利機闗也宗筋謂陰毛中横骨上下臍兩傍之竪筋也上絡胞膈下貫髖尻又級於背腹上頭項故云宗筋主束骨利機闗然腰者腎之大闗節所以司屈故曰機闗衝脈者經脈之海也十二經之海主滲灌谿谷與陽明合於宗筋陰陽總宗筋之會㑹於氣街而陽明為之長皆屬於帶脈而絡於督脈故陽明虚則宗筋縱帶脈不引故足痿不用也曰治之奈何曰各補其榮而通其輸調其虚實和其逆順筋脈骨肉各以其時受月則病已矣時受月謂受氣時月如肝王甲乙心王丙丁之類也痿論素問帝曰脾病而四肢不用何也岐伯曰四肢皆稟氣於胃而不得至經必因於脾乃得稟也今脾病不能為胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉曰脾與胃以膜相連耳而能為之行其津液何也岐伯曰足太陰者三陰也其脈貫胃屬脾絡嗌故太陰為之行氣於三陰手足三陰之經陽明者表也五臟六腑之海也亦為之行氣於三陽手足三陽之經也臟腑各因其經而受氣於陽明故為胃行其津液四肢不得稟水穀氣日以益衰陰道不利筋骨肌肉無氣以生故不用焉太陰陽明篇劉河間曰四肢不舉俗曰癱緩故經所謂脾太過則令人四肢不舉又曰土太過則敦阜阜髙也敦厚也既厚而又髙則令除去此真所謂膏粱之疾其治則㵼令氣弱陽衰土平而愈或三化湯調胃承氣湯選而用之若脾虚則不用也經所謂土不及則卑陷卑下也陷坑也故脾病四肢不舉四肢皆稟氣於胃而不能至經必因於脾乃能受稟今脾病不能與胃行其津液四肢不得稟水穀氣氣日以衰脈道不利筋骨肌肉皆無氣以生故不用焉其治可十全散加減四物去邪留正脾實病痿經云脾病者肉痿足不收又云脾脈太過則令人四肢不舉又云其犯雨濕之地則為痿者是也夫所謂實謂太過者皆指脾之濕邪而言也今採補通榮俞穴法於左肺熱葉焦則肺喘鳴生痿躄色白而毛敗者補其榮魚際通其俞大淵至秋病已心熱生脈痿數溲血樞不相提挈脛縱不能任用於地色赤而絡脈溢者補其榮勞宫通其俞太陵至夏病已肝熱生筋痿下白淫口苦筋急攣色蒼而爪枯者補其榮行間通其俞太衝至春病已腎熱生骨痿足不任身腰脊不舉骨枯髓減色黑而齒稿者補其榮然谷通其俞太溪至冬病已脾熱生肉痿乾渴肌肉不仁色黄而蠕動者補其榮大都通其俞太白至長夏病已又痿躄足不收取之少陽陽明之别經云足少陽之别名曰光明去踝五寸别走厥陰虚則痿躄坐不能起取之所别也又云淫濼脞痿不能久立治少陽之維在外踝上五寸又云足陽明之别名曰豐隆去踝八寸别走太陰其病虚則足不收脛枯取之所别者是也骨痿懈惰取足少隂髄海經云少氣身漯漯也言吸吸也骨痠懈惰不能動補足少陰又云腦為髓之海其俞上在於其蓋下在風腑髄海不足則腦轉耳鳴脛痠懈怠安臥審其俞而調其虚實者是也百節弛縱取脾手太陽之絡經云脾之大絡名曰大包出淵腋下腋三寸布胸脇虚則百節盡皆縱此脈若羅絡之血者取之脾之大絡也又云手太陽之别名曰支正上脘五寸實則節弛肘廢取之所别者是也甲乙經曰痿不相知太白主之一云耳重骨痿不相知足下緩失履衝陽主之足緩不收痿不能行不能言手足痿躄不能行地倉主之腎脈㣲滑為骨痿坐不能起起則目無所見陳無擇曰人身有皮毛血脈筋膜肌肉骨髓以成其形内則有肝心脾肺腎以主之若隨情妄用喜怒勞佚致内藏精血虚耗使皮血筋骨肉痿弱無力以運動故致痿躄狀與柔風脚氣相類柔風脚氣皆外因痿則内臟不足所致也論治痿獨取陽明之㫖生生子曰内經治痿獨取陽明之法乃治痿之大槩也原其病皆自肺中來在於方萌之時故獨治陽明使宗筋閏能束骨而利機闗之意是澄其源而流自清之謂也設五痿之疾既痼而陽明虛宗筋縱帶脈不引足痿不用之時而獨治陽明斯亦晩矣當即其五痿之所主者而㕘治之庶得以盡其用也按内經陽明虚帶脈不引之後帝曰治之奈何岐伯曰各補其榮而通其俞調其虚實和其逆順筋脈骨肉各以其時受月則病已矣此雖兼針刺而言實治痿之綱領也林氏曰考之内經皮肉肌骨脈五痿分屬五臟如無擇所云者似又當分治之可也治陽明之法只可治脾肺若夫肝之筋痿心之脈痿腎之骨痿其受病又自不同豈可只取陽明而治之乎故治筋痿宜養其肝脈痿宜益其心骨痿宜滋其腎不可執一而論也經亦曰各補其榮而通其俞調其虚實云云此可以見治法之不専於陽明也東垣清燥湯治濕熱成痿以燥金受濕熱之邪是絶寒水生化之源源絶則腎涸痿厥之病大作腰以下痿軟癱瘓不能運動方在暑門注夏類健步丸治膝中無力屈伸不得腰背腿脚沈重行步艱難羌活柴胡滑石甘草炙防風𤓰蔞根酒沈各五分澤㵼三分酒防已川烏酒苦參各一錢肉桂五分右為末酒糊丸桐子大每服七十丸空心煎愈風湯送下愈風湯方在中風門三因加味四斤丸治肝腎虚弱熱淫於内致筋骨痿弱不能勝持蓯蓉酒浸鹿茸燎去毛切酥炙五味子洒洗兔絲子酒煮透炒另研熟地黄牛膝木𤓰天麻各一兩右為末煉蜜丸桐子大温酒或米飲下五十丸劉宗厚曰按此熱淫於内而用温補何也然陰血衰弱血不養筋筋緩不能自持陽燥熱淫於内故用此養陽滋陰陰實則水升火降矣藿香養胃湯胃虚不食四肢痿弱行立不能皆由陽明虚宗筋失養之故也藿香人參茯苓各乙錢白术二錢半夏麴苡仁山藥各八分蓽澄茄砂仁神麴陳皮各六分甘草炙四分薑三片棗二枚水煎服大防風湯氣血兩虚風濕相挾麻痺痿弱或久病痢後脚弱緩痛不能行履或兩脚腫痛足脛枯腊名鶴膝風症其效如神川歸熟地白芍杜仲薑汁炒黄茋白术各一錢人參防風川芎牛膝各七分羌活附子甘草炙各四分薑三片棗二枚水煎服鹿角膠丸治血氣虚弱兩足痿軟久臥床褥神效常服補腎益精壯筋骨鹿角膠一斤鹿角霜熟地黄各半斤當歸四兩牛膝兔絲子人參茯苓白术杜仲製各二兩龜板酥炙虎脛骨酥炙各一兩半右為末將鹿角膠用無灰酒熔化為丸桐子大毎服百丸空心淡鹽湯送下丹溪云有濕熱有痰有血虚有氣弱亦有死血者有食積妨碍不降者上文論痿䞘於肺熱實痿之木論治法之大要也而此云然者益以其發而為病所因所挾或有不同主治亦各當若其所重也東垣取黄栢蒼术為下部要藥丹溪即此意以治痿蹷痛風取效甚多濕熱東垣健步九加燥濕降火之劑黄栢黄芩蒼术濕痰二陳湯加蒼白术黄芩黄栢之類入竹瀝薑汁血虚四物加蒼术黄栢下補陰丸氣虚四君子湯加蒼术黄芩黄栢已上方法雖所主有不同而降火清全所謂治法之大要而無不同也虎潛丸補腎丸皆治骨痿之劑也肉痿當以清燥湯治之五加皮酒治筋痿拘攣疼痛不便屈伸五加皮半斤蒼耳子六兩枸杞子苡仁各四兩生地黄二兩木香五錢以好酒一大罈將藥用囊盛懸罈中浸七日取出焙亁為末煉蜜丸桐子大空心酒吞八九十丸其酒聴飲但常使酒氣頻相接為妙大生脈湯治心熱脈痿脛縱不任地人參麥冬五味子天冬黄栢川歸牛膝紅花枸杞子生地水煎服有汗加黄茋王啓𤣥𫝊𤣥珠耘苗丹三方序曰張長沙戒人妄服燥烈之藥謂藥勢偏有所助勝尅流變則真病生焉猶憫苗不長而揠之者也若稟血不强合服此而不服是不耘苗者也故名耘苗丹此丹養五臟補不足秘固真元均調二氣和暢榮衞保神守中五味子半斤巴㦸去心逺志去心枸杞子山藥茯苓肉蓯蓉酒浸百部酒浸一宿焙杜仲炒蛇床子栢子仁兔絲子酒浸另研防風各二兩右為末蜜丸桐子大食前温酒鹽湯任下三十丸春乾棗湯下夏加五味子四兩秋加枸杞子六兩四季月加肉蓯蓉六兩衞生湯補虚勞强五臟除煩熱養真元退邪熱順血脈黄茋八兩當歸白芍各四兩甘草炙一兩年老加酒半盞同水煎何首烏酒治骨軟風腰膝痛行履不得遍身搔痒何首烏大而有花者同牛膝各一斤以好酒一升浸七宿焙亁於木臼搗末蜜丸毎日空心食前酒下三五十丸蕭炳丹參酒方治風軟脚弱可逐奔馬故曰奔馬草極效丹參不拘多少酒浸服下本事治筋骨諸疾手足不遂行動不得遍身風瘡左經丸草烏白大者去皮臍木鼈去殻白膠香五靈脂各二兩半斑猫五杖去頭足趐醋炒右為末用黒豆去皮生為末一升醋糊同前藥共和匀為丸雞豆子大毎服一丸温酒磨下治筋骨疾但未曾經針傷損者三五服立効此藥曾醫一人軟風不能行不十日見功專治心腎肝三經通小便除淋瀝通營衛活經絡此方因净聖寺僧得之大有竒交所治乃温痰汚血為病又方治丈夫酒色過度下焦虚憊足膝軟乏小便滑數外腎濕痒五味子五兩兔絲子酒浸透研炒山藥石蓮肉茴香各二兩白茯苓一兩右糊丸梧子大毎五十丸温酒或鹽湯下空心服如脚氣及膝無力者木𤓰酒空心下六十丸下午再服妙龍虎丹治痿瑣陽七錢半敗龜板虎骨黄栢俱酒炙亁薑一錢半金箔十斤神麴如懶言語加山藥七錢右稬米粉糊為丸空心白湯吞下丹溪補益丸治痿白术二兩龜板瑣陽各酒炙生地歸身牛膝白芍俱酒浸各一兩陳皮亁薑各七錢半黄栢炒虎骨酒炙茯苓各五錢五味子二錢甘草炙一錢兔絲子酒蒸研如糊入餘藥末晒乾右以新鮮紫河車為丸如無紫河車用猪骨髓為丸亦可神龜滋陰丸治足痿龜板酒炙黄栢知母各酒炒二兩拘杞子五味子瑣陽各一兩乾薑半兩煉蜜丸梧子大空心鹽湯下七十丸與龍虎丹相兼服妙丹溪治痢後脚弱漸細蒼术一兩白芍龜板酒炙二兩半黄栢五錢酒炒右粥丸以四物湯加陳皮甘草煎湯吞劉河間十全散者蓋治氣血俱虚而四肢不用也治男子婦人諸虚不足五勞七傷不進飲食久病虚損時發潮熱氣攻骨脊拘急疼痛夜夢遺精面色痿黄脚膝無力喘𠻳中滿脾腎氣弱五心煩悶並治人參黄茋白术茯苓甘草肉桂當歸川芎熟地白芍藥各等分右為粗末毎服二大錢生薑三片棗二枚水一盞煎七分不拘時温服桂芍藥甘草小建中湯也加黄茋即黄茋建中湯也人參白术茯苓甘草四君子湯也當歸川芎地黄芍藥四物湯也以其氣血俱衰陰陽並弱法天地之成數故名曰十全散狀元丸治下元陽氣大虚及脾有寒濕足膝痿弱大便不實濕動生痰面色黄白惡風懶語一切倦弱及陰痿不起飲食不思虚弱等症此方得遂州仙茅或漢中仙茅為君妙不可言屢騐昔在呉下治行人公孫質庵老先生患痿不出户者三年用此收功仕至江右憲副山茱萸肉杜仲鹽水炒各四兩破故紙鹽水炒龜板酒炙各三兩鹿葺酒炙兔絲子酒浸透研炒逺志肉去心二兩頭二蚕沙炒人參各二兩茯苓一兩半大附子童便煮麪煨七錢俱製净藥以乾山藥粉四兩打糊為丸梧桐子大空心淡鹽湯或酒送下五六十丸下午再服右方服後須痛斷房失以培其根勿恃此藥壯陽而助其春興自取其憊也叮之戒之金剛丸治腎損骨痿不能起牀益精補腎萆薢杜仲炒蓯蓉酒浸兔絲子酒浸等分右末酒煮猪腰子為丸桐子大毎服五七十丸空心酒下脚氣門脚氣内經曰諸濕腫滿皆屬脾土又曰傷於濕者下先受之蓋脾主四肢足居於下而多受其濕濕鬱成熱濕熱相搏其痛作矣古無脚氣之說内經名厥兩漢間名緩風宋齊之後謂之脚氣有從外感而得者有從内傷而致者其為濕熱之患則一而已北方髙燥多飲􅀈酪肉食及酻酒濕熱之物下流足腔所致南方卑下濕氣迷滿山澤血氣虚弱之人或遇房失及負重逺行衝冒雨雪寒濕乗虚而襲遂成此症大抵風寒暑濕之氣中於諸陽病在外其診多在足外踝及足背宜散之而愈中於諸陰病在裏其診多在足内踝及膁内宜温利之外症自汗走注為風勝無汗疼痛攣急為寒勝腫滿重著為濕勝煩渴熱頑為暑勝如四氣兼有但推其多者為勝寒則温之熱則寒之在表則散在裏則下若大虚氣乏間作補湯隨病冷熱而用之不可拘執不得服補藥之說大抵麻者為風痛者為寒腫者為濕痺論云寒勝則蟲熱勝則縱蟲者皮膚中如蟲行之狀嚴氏曰脚氣南北所感雖有内外之殊然皆由腎虚而生婦人病此者亦由血海虚而得之發明曰南方自外而入者止於下脛腫痛北方自内而致者乃或至於手節也治法初用解散次必推蕩大便以導其邪氣又曰脚氣濕熱勝者成水泡瘡或成赤腫丹毒或如疝氣攻上引下脈法浮為風𦂳為寒緩細為濕洪數為熱又沈而弦者亦為風沈而𦂳者為寒沈細為濕沈數為熱又曰脈弦者風濡弱者濕洪數者熱遲者寒㣲者虚牢堅者實結則因氣散則因憂𦂳則因怒細則因悲入心則謬妄嘔吐食不入睡不安左寸脈乍大乍小乍有乍無者死入腎則腰脚腫小便不通呻吟目與額皆黒氣沖胸而喘左尺脈絶者死千金翼云外臺總録所録皆謂南方卑濕露霧之地其民腠理疎陽氣不能外固因而履之則清濕襲虚病起於下此因血虚氣弱受清濕之邪氣與血并行於膚腠邪氣盛正氣少故血氣濇濇則痺虚則弱故令痺弱也後人名曰脚氣針經云有道以來有道以去治之多以灸炳為佳以導引濕氣外出及飲醪醴以通經散邪所製之方寒藥少熱藥多用麻黄川烏薑附之屬内經云濕淫於外以苦發之麻黄苦温發之者也川烏辛熱走而不能守通行經絡薑附辛甘大熱助陽退陰亦能散清濕之邪又察足之三陰三陽是何經絡所起以引用藥為主治復審六氣中何氣當之擇其佐使孫真人云醫者意也随時增損初無定方真知言哉東垣曰異法方宜論云北方者其地髙陵居風寒冷冽其俗飲􅀈酪而肉食凡飲􅀈酪以飲多飲速者為能經云因而大飲則氣逆又云食入於陰長氣於陽今乃反行陽道是為逆也夫乳酪醇酒濕熱之屬加以奉養太過亦滋其濕水性潤下氣不能呴故下注於足脛積久而作腫痛此飲食下流之所致也通評虚實論云穀入多而氣少濕居下也况􅀈酪醇酒之濕熱甚於穀者也至真要大論云太陰之勝火氣内鬱流散於外足脛胕腫飲發於中胕腫於下此之謂也若飲自倍脾胃乃傷胃氣不能施化脾氣不能四布故下流乗其肝腎之位注於足脛加之房事不節邪氣乗虚遂成痼疾孫真人云古人少有此疾自永嘉南渡衣纓士人多有之亦此意也活人云脚氣屬冷者小續命湯煎成入生薑自然汁服之最快丹溪曰脚氣須用升提藥隨氣血用當歸拈痛湯治濕熱為病肢節煩痛肩背沈重胸膈不利遍身疼痛流注手足痛不可忍羌活甘草炙黄苓酒炒茵陳酒炒各五錢當歸身苦參酒洗人參升麻葛根蒼术各二錢猪苓澤㵼知母防風各三錢白术一錢半毎用一兩水煎不拘時服羅太無治中書粘年四旬體魁梧丙辰春從征楊州脚氣忽作遍身肢體㣲腫其痛手不可近足脛尤甚履不任穿跣以騎馬空兩鐙而以竹器盛之以困急來告予思内經有云飲發於中胕腫於下又云諸痛為實血實者宜決之以三稜針數刺其腫上血突出髙二尺餘漸漸如線流於地約半升許其色黑紫頃時腫消痛減以當歸拈痛湯一兩半服之其夜得睡明日再服而愈蒼术丸治亁濕脚氣筋脈拘攣疼痛不能行蒼术米泔浸炒四兩乳香没藥各二兩另研青鹽牛膝各五錢熟艾四錢川烏三錢全蝎炒二錢右為細末共研藥和匀以木𤓰一個大者切一頭留作蓋去穰入上件藥於内蓋定安木𤓰於黑豆中蒸令極爛取出去皮連藥研成膏却入生蒼术末拌匀丸如桐子大毎服五十丸空心木𤓰湯下以温鹽酒亦可日三服忌血與蒜丹溪脚氣腫痛方黄栢酒炒蒼术鹽炒川芎生地白术甘草梢黄連犀角防風木通㯽榔熱加黄芩痰加竹瀝薑汁時令熱加石膏大便秘加桃仁小便澁加牛膝食積流注者蒼术黄栢防已南星白芷犀角㯽榔川芎血虚加牛膝龜板如尋常腫者專主濕熱肥人加痰藥一婦人足腫黄栢蒼术生地川芎牛膝酒洗龍膽草南星脚弱筋痛牛膝二兩白芍藥一兩半黄栢炒知母炒龜板酒炙各一兩甘草炙五錢酒糊為丸便溺阻澁心下痞滿者宜㣲下之東垣曰楊太受云脚氣之疾自古皆用疎下為疾壅故也然不可太過恐傷脾胃使營運之氣不能上行反又下注為脚氣又不可不及則壅不能消散今立三方於後詳而用之羌活導滯湯脚氣初發一身盡痛或肢節腫痛便溺阻隔先以此導之後用當歸拈痛湯大黄酒煨一兩羌活獨活各五錢川歸防已各三錢枳實麩炒二錢毎服七錢水煎服取㣲利則已量虚實加減開結導飲丸飲食不消心下痞悶陳皮白术茯苓澤㵼麥孽酒麴半夏各一兩枳實青皮乾薑各五錢如有積塊者加巴豆霜一錢右為末􅔻餅糊丸梧子大毎服五十丸温湯下又方治濕熱并諸濕邪腿膝重痛足脛浮腫甘遂葳靈仙葶藶㯽榔赤芍澤㵼乳香各二兩没藥一兩牽牛大㦸炒三兩陳皮四兩右為末麪糊為丸梧子大毎服五十丸加至七十丸食前温水送下得更衣止後服忌酒二日又忌麪及甘草三兩日食温淡粥以補胃氣乙巳春廉平章年三十八身體充肥脚氣始發頭面渾身肢節㣲腫皆赤色足脛腫痛不可忍不敢扶䇿手著皮膚其痛轉甚起而復臥臥而復起晝夜苦楚難以名狀求予治之平章以北土髙寒故多飲酒積久傷脾不能運化飲食下流之所致投以當歸拈痛湯一兩二錢其痛減半再服腫痛悉除只右手指末㣲赤腫以三薐針刺於𤓰甲端多出黑血赤腫全去不數日因食濕麪肢體覺疼再以大黄枳實湯治之大黄酒煨三錢羌活一錢半當歸一錢枳實五分夫脚氣之疾皆水濕之為也麪滋其濕血壅而不行故肢節煩疼内經曰風能勝濕羌活辛温透闗節去濕故以為君主血留而不行則當歸之辛温散壅止痛枳實之苦寒治痞消食以為臣大黄苦寒以導麪之濕熱併治諸老血留結取其峻駛以為使也右只作一服水一盞半煎八分空心食前服利下兩行痛止控涎丹方見痰飲門治脚氣加胭脂一錢㯽榔木𤓰各一兩卷栢五錢先以鹽水煮半日次日白水煮半日同前藥為丸毎服三十丸加至四五十丸取下惡物立效衍義云有人嗜酒日須五七十盃後患脚氣甚危或教以巴㦸半兩稬米同炒去米不用大黄一兩剉炒同為末煉蜜為丸梧子大温水下五七十丸仍戒酒遂愈本事方治風氣積滯成脚氣常覺㣲腫發則或痛茵芋丸茵芋炒苡仁各五錢郁李仁一兩牽牛生三兩取頭末兩半右為末煉蜜丸梧子大毎服三十丸薑棗湯下未利再加十丸日三服以快利為度白粥補之三因千金丹治脚氣上攻心腎相撃足心隱痛小腹不仁煩渴小便秘或利闗節攣皮疼痛神効肉蓯蓉石斛各酒浸狗脊去毛萆薢茯苓牛膝洒洗地仙子逺志去心炒各一兩杜仲去皮炒熟地各三兩右煉蜜丸如梧子大毎服五十丸温酒鹽湯任下本事療丈夫腰脚痺緩急行履不穏者以萆薢二十四分合杜仲八分為末毎日温酒和服三錢匕增至五錢忌牛肉活人苡仁酒治脚痺苡仁牛膝各二兩海桐皮五加皮獨活防風杜仲各一兩熟地一兩半白术五錢右為粗末入絹袋内用好酒五升浸春秋冬二七日夏月七日分作數服逐帖浸酒空心毎服一盞或半盞日三四服常令酒氣醺醺不絶久服覺皮膚下如數百條蟲行即是風濕氣散丹溪治一婦人血少多氣大便後脚痛而麻當歸二錢半芍藥白术各二錢陳皮青皮各一錢地黄一錢半川芎五分甘草二分桃仁十八枚右分二帖水煎服韓彦正暴得疾手足不舉諸醫皆以為風針手足亦不知痛召孫尚證之尚曰此脚氣耳用㯽榔末三錢生薑三片亁紫蘇七葉陳皮三錢水煎服數帖而安㯽榔散治脚腫陳皮蒼术炒等分水一大碗酒半盞同煎去渣調檳榔末二錢聖惠方治脚氣及風寒濕四肢攣急脚疼不可踐地紫蘇六兩搗碎水三升研取汁以蘇子汁煮粳米粥二合和葱豉椒薑食之即止濟世方治一切脚氣神竒穿山甲前兩足者燒存性研細入麝少許多少隨人斟酌要服此藥須去他事在晩不可進飲食候至夜深腹空時調服坐臥随意及雞嗚又一服痛立止過一二日便能步履如常極妙如神千金方治脚氣十二風痺不能行松葉酒松葉六十斤剉細以水四石煮取四斗九升以釀米五斗如常法另煮松葉汁以漬米并饙飯釀封頭七日後澄飲之取醉得此酒力者甚衆濟世方諸般脚氣一服除根防風羌活蟬退各三分薄荷五分紫蘇四分右為末毎服五錢以無灰酒半碗熱服訖服至一時久即煎後藥湯傾桶内披厚衣於桶上坐勿令走氣將脚腿薰之當自下而上汗出直至頂門其出如水盡為度薰洗紫蘇半斤忍冬花四兩木饅頭七個蘇木二兩右為粗末以水一鍾煎數沸桶盛分三度添用只一次洗完永除根東垣曰活人云凡脚氣服補藥及用湯渫洗皆醫之大禁也為南方外感濕氣乗虚襲人為腫痛而言非為北方内受濕氣注下腫痛而言也蓋濕氣不能外達宜淋渫開導泄越其邪名曰導氣除濕湯葳靈仙防風荆芥穗當歸地骨皮升麻白芍蒴藋葉各等分水二斗煮取一斗五升乗熱淋洗五味敗毒散治三陽經脚氣流注脚踝上熱腫寒熱如瘧自汗或無汗羌活獨活前胡柴胡枳殻桔梗甘草人參茯苓川芎大黄蒼术等分毎服四錢薑三片薄荷頭一個水鍾半煎一鍾熱服皮肌瘙痒加蟬退八味丸治少陰腎經脚氣腰脊疼小指之下連足心循内踝入跟中腨内膕中内膁皆疼上沖胸咽嘔吐自汗小腹不仁善恐此症最急以腎乗心水克火死不旋腫方在虚怯門紫蘇散治風毒脚氣腹内痰惡脚重虛腫紫蘇木通桑白皮茴香各一兩枳殻二兩羌活獨活荆芥穗木𤓰青皮甘草各半兩大腹子十箇毎服三錢薑三片葱白一莖水煎服桑白皮散治脚氣盛發浮腫小便赤澁腹滿氣急桑白皮郁李仁各一兩赤茯苓二兩木香防已大腹子各半兩紫蘇子木通㯽榔青皮各七錢半毎服三錢薑水煎薏苡散治脚氣弱痺腫滿心下急大便澁薏苡仁防風川芎防已猪苓郁李仁火麻仁檳榔羚羊角屑各一兩枳實七錢甘草五錢桑白皮二兩為末毎服三錢熟水調下紫蘇子湯通治脚氣中滿喘急嘔吐自汗紫蘇子炒前胡半夏厚朴甘草炙川歸黄芩各二兩桂心桔梗各三兩虚甚者加炮附子乙兩每服六錢薑七片棗二枚水煎食後服茱萸丸治脚氣入腹脹不仁喘悶欲死呉茱萸洗木𤓰去穰切片乾右酒糊為丸梧子大每服五十九至百丸酒或米湯下或以木𤓰蒸爛研膏為丸尤妙卷栢散治逺年脚氣難治此方特效體虚人減半服卷栢随用先以鹽水煮半日次用冷水煮半日大上焙乾取東向者佳黑牽牛取頭末㯽榔甘遂右各為末不得相雜每服各一錢惟㯽榔末二錢五更初濃煎葱白湯下至已時取下惡物如魚凍隨吃淡粥病安更宜服後藥後方大腹子三兩木𤓰二兩半蘇子炒㯽榔荆芥穗烏藥陳皮蘇葉各一兩蘿蔔子炒五錢沈香三錢桑白皮炒枳殻麩炒各兩半每服三錢薑五片煎服㯽榔湯治脚氣順氣防壅㯽榔香附子陳皮蘇葉木𤓰五加皮粉草各一兩每服四錢薑五片煎服婦人脚氣多由血虚加川歸半兩室女多因血實加赤芍藥一兩半大便秘結虚弱者加枳實盛者加大黄一方治脚氣沖心大便秘宜服三黄散加土烏藥春夏常服妙木𤓰茱萸湯治脚氣入腹困悶欲死腹脹喘急木𤓰㯽榔各二兩呉茱萸湯洗七次炒一兩每服四錢水煎食前服大木𤓰二枚吳茱萸五兩二味併用水四碗煎一碗分二服如人行十里久再進一服或汗或吐或㵼即瘥不拘時服三將軍丸治脚氣入腹沖心大便不通呉茱萸木𤓰大黄各等分大黄或随其病加減右米糊丸如菉豆大毎五十丸粳米枳殻湯下未應加丸數再服以通為度杉木節湯治脚氣沖心或心脇有塊毒勝痰逆痞滿喘急汗流搐搦昏悶上視咬齒甚至垂絶不知人杉木節一大升橘葉一升無葉用皮亦可大腹子七个連皮剉碎右以童子小便三升煎一升半分二服若一服得快利停後服木通散治脚氣服熱藥太過小便不通臍下脹川歸梔子赤芍赤茯苓甘草各一兩每服三錢水煎蒼术散治一切脚氣蒼术米泔浸一日夜鹽炒過黄栢去皮酒浸一日夜炙焦毎服四錢水鍾半煎一鍾日進三四服烏藥酒治一切脚氣發動土烏藥用粗皮揩净以瓦片刮下屑收於磁器内以好酒一升浸一宿次日空心去藥只將磁器内所浸藥酒熱湯上坐温入生麝香少許尤妙一服即安無麝香則多服服後溏泄病去升麻散治脚氣升麻獨活蒼术牡丹皮等分右每服半兩酒煎空心服如痛甚者加麝香治六經脚氣發起赤腫者五苓散一帖内用桂枝蘇木比上藥多些生薑搗一塊水二鍾煎一鍾空心連進三服至午時即不痛矣治久患脚氣下體虚冷者五積散一帖水二鍾半煎一鍾攪下末藥同服龍骨虎骨乳香沒藥五靈脂各一錢為末右空心連進三服見下肢節漸煖即愈輕脚丸逐風去濕消腫行血止痛地膚子桃仁各一兩麩炒白术赤茯苓赤芍藥紫蘇葉葫蘆巴猪苓澤㵼㯽榔枳實茴香各半兩右煉蜜丸梧子大每三五十丸空心紫蘇湯下漸加至百丸神效塗法猪牙皂角不蛀者大皂角不蛀者南木香各等分右為末醋濃調先於腫上不腫處用藥圍塗之闊三四寸若圍然截斷毒氣不使沖上次塗下面腫只留脚尖不塗仍剪脚甲出毒氣時時用醋潤之凡用小續命湯活絡湯須兩料候通身得汗如續命湯香疾乃去體活絡湯治寒濕脚氣及一切疼痛諸疾白术杜仲各六錢牛膝附子炮各五錢甘草人參官桂各二錢半川薑炮七錢半川歸一兩二錢每五錢水煎病在上食後病在下食前服椒囊法川椒二三斤實於疎布囊中置火踏上跣足踏椒囊久久全愈一方加切片㯽榔并熟艾各三之一尤妙治脚氣止痛草烏為末同酒糟搗爛貼薑汁調草烏貼亦可薑汁調赤小豆南星末塗時吃熟蘿蔔令飽以下氣治脚氣止痛用牛皮膠一塊剉碎同麥麩炒成珠研細末每用酒調下一錢其痛立止如大便秘結者服搜風順氣丸亦可脚氣沖心為厥逆丹溪云脚氣衝心宜四物湯加炒栢再宜湧泉穴用附子末津唾調傅上以艾灸泄引其熱下行脚氣衝心用白㯽榔一箇如雞心大者為末用童便生薑汁温酒共半盞調作一服廣利方不用薑汁酒但用童便五合調服再服治沖心悶亂不知人三脘散治脚氣沖心腹氣飽悶大便秘澁者最良獨活白术木𤓰焙乾大腹皮炙黄紫蘇各一兩沈香木香川芎㯽榔麪包煨熟各七錢半甘草炙半兩橘紅三分毎二錢水煎分三服取便利為效大腹子散治風毒脚氣肢節煩疼心神壅悶大腹皮桑白皮赤芍藥木通紫蘇羌活獨活木𤓰荆芥青皮各一兩每服四錢薑五片葱白七寸水煎空心温服韋宙方療脚氣浮腫心腹滿大小便不通氣急喘息者以郁李仁十二分搗碎水研取汁薏苡仁搗碎如粟米取三合以米作粥空腹食之佳凡脚氣之病始起甚㣲多不令人識也食飲嬉戯氣力如故惟卒起脚屈弱不能動此為異耳凡脚氣之候見食嘔吐憎聞食氣或有腹痛下利或大小便閉濇不通或胸中衝悸不欲見光明或精神昏憒或喜迷忘語言錯亂或壯熱頭痛或身體極冷痛煩或覺轉筋或腫或不腫或背腿頑痺或時緩縱不随或復百節攣急或小腹不仁此皆脚氣狀貌也脚氣有腫者有不腫者其小腹頑痺不仁者多不腫小腹頑後不過三五日即令人嘔吐者名脚氣入心如此者死在旦夕其人黑瘦者易治肥大肉厚赤白者難愈黑人耐風濕赤白人不耐風濕瘦人肉硬肥人肉軟則受病難愈凡脚氣覺病候有異决然氣急即須大言使其恐懼而氣下行為妙治之稍緩則氣上入胸脇逆滿氣上肩息急者死不旋踵寛者數日必死不可不急治也但見心下急氣喘不停或自汗數出或乍寒乍熱其脈促短而數嘔吐不止者死治腎臟風壅積腰膝沈重葳靈仙末蜜和丸梧桐子大初服酒下八十丸平明㣲利惡物如青膿桃膠即是風毒積滯也如未動夜再服一百丸取下後吃粥補之一月仍當服温補藥治腎臟風攻注脚膝方連珠甘遂一兩木鼈子一雌雄去殻右為末獖猪腰子二箇批開用藥末一錢摻匀濕紙包數重火煨熟放温五更初細嚼米飲下積水多則利多少則利少宜軟飯將息若患一脚須看左右如左脚用左邊腰子右脚用右邊腰子藥末止許一錢壬子年在昆陵有姓馬鬻酒者宿患腎臟風今一足發腫如瓠自腰以下巨細通為一律痛不可忍欲轉側面人挾持方可動或者欲以鈹刀决之予曰不可吾有藥如上法服之辰巳間下膿水數升即時痛止腫退一月後尚拄拐而行予再以赤烏散令塗貼其膝方愈後十年至昆陵率其子列拜以謝云向脚疾至今不復作雖積年腎臟風併以失去今健步自若矣本草云有人重病足不履地者十年良醫殫技莫能治所親置之道傍以求救者遇一逰僧見之告曰此疾一藥可治但不知此土有否因為之入山求索果得葳靈仙也使服之數日能步履其後山人鄧思濟知之遂著其法云採得陰乾月餘搗篩温清酒和二錢匕空心服之如人本性殺藥可加及六錢匕利過兩行則減之病除乃停服其性甚善不觸諸藥但惡茶及麪湯以甘草梔子代飲白濁門生生子曰白濁乃小病今人亦有一二年不愈者皆是用藥無律今將吃𦂳要處次第條陳庶初學者有取則焉大抵屬濕熱為多縁中宫不清痰濁下流滲入膀胱治當審小便痛與不痛若小便將行而痛者氣之滯也行後而痛者氣之陷也若小便頻數而痛此名淋濁治以二陳湯加木通山梔升麻柴胡之類若只濁而不痛宜燥中宫之濕二陳湯加蒼白术桔梗升麻之類提之即愈若久濁而不痛為虚宜補中益氣湯陰虚下脫者加牡蠣山茱萸澁之久而陰虚腰膝痠疼六味地黄丸挾熱者加黄栢知母挾寒者加桂心兔絲子川巴㦸之類虚甚者加鹿茸有心脾二經不足但經思慮其濁愈甚者宜定志丸善飲酒人濕熱下流用白螺螄殻火煅醋淬為末三錢用乾葛青蒿苦參酒炒各三錢煎湯調下治法以二陳湯加白术蒼术黄栢升麻柴胡木通石菖蒲加生薑三片燈心二十根食前服前方加白葵花三五朶極妙白雞冠花亦佳凡治淋濁二症先當用此以清中宫濕熱痰氣即易愈丹溪云二陳湯加升提之法能使大便潤而小便長此端本澄源之意服二三帖然後看氣血孰虚乃用對症之藥此最萬全法也時醫好用滲利之藥殊不知久濁不愈者多陰虚而滲利在所當忌又不可先用補劑及止澁之藥蓋此症始未有不因於濕熱下流者補澁太早反閉其邪濁愈甚矣由是有積年累月不效者皆治法失先後次第故也丹溪加減珍珠粉丸治便濁極妙凡治便濁先時以此丸合前湯兼服其效甚連蛤粉青黛此二味主胃中濁氣下流降入膀胱樗皮大燥濕熱滑石黄栢亁薑鹽水炒褐色味苦斂肺氣下降使生隂血右等分炒神麴糊為丸梧子大空心下三五十丸秘𫝊二竒湯治便濁疼痛神效兼治偏墜升麻烏藥煎湯食前服若小便前痛者以烏藥三錢升麻減半加小茴香五分黄栢五分木通五分龍膽草五分漢防已三分若小便後痛者用升麻三錢烏藥減半仍加黄栢五分柴胡五分若服前藥頭覺作運此陰虚因升動其火故也急以六味地黄丸料加黄栢知母麥門冬治之一服而愈若服前藥胸中飽悶此必中宫有痰宜二陳湯加香附白术炒麴消之茯苓丸治心氣不足思慮太過腎經虚損其陽不固溺有餘瀝小便白濁夢寐頻泄兔絲子酒浸研五兩石蓮子去壳三兩白茯苓去皮二兩右酒糊丸梧子大每三十丸鹽湯下常服亦能補虚金箔丸治下焦虚小便白濁白淫夜多異夢遺泄補骨脂炒韮菜子炒晩蠶蛾肉蓯蓉山茱萸桑螵蛸兔絲子酒浸牛膝酒浸龍骨各一兩為細末煉蜜丸梧桐子大金箔為衣毎服三十丸空心温酒下萆薢分清飲治白濁小便凝如脂油光彩不定凝脚如糊益智仁川萆薢石菖蒲烏藥各等分毎四五錢水煎臨服入鹽少許一方加茯苓甘草定志丸治心氣不足脾弱不能攝精心腎不交小便白濁逺志去心虚净以甘草湯煮石菖蒲白茯苓人參山藥打糊為丸食逺白湯送下五六十丸夢遺門附精滑不禁丹溪曰夢遺主熱精滑主濕熱許學士曰治夢遺有數種有下元虚憊精元不禁者有年壯氣盛久曠經絡壅滯者有情慾淫動所願不遂者名曰白淫虚憊不禁者宜補澁壅滯者宜清心以决其壅所願不遂者宜清痰熱以猪苓丸治之正如瓶中煎湯氣盛盈溢者如瓶中湯沸而溢慾動心邪者如瓶傾側而出虚憊不禁者如瓶中有罅而漏不可一槩用藥也内經云主閉藏者腎也又云腎藏精腎衰則不能管攝故妄行而出精不時也又曰思想無窮所願不得意淫於外入房太甚宗筋弛縱發為白淫夢遺等症先賢治法有五用辰砂磁石龍骨之類鎮墜神之浮逰是其一也其二思想結成痰飲迷於心竅而遺者許學士以猪苓丸導利其痰是也其三思想傷陰者潔古以珍珠粉丸降火補陰是也其四思想傷陽者羅謙甫以鹿茸蓯蓉兔絲子等補陽之藥是也其五陰陽俱虚者丹溪治一人形瘦便濁夢遺作心虚治用珍珠粉丸定志丸内傷氣血不能固守以致夢遺精滑便濁不禁者當補以八珍湯加減吞樗根皮丸予嘗治一少年夢遺無度且精滑甚玉莖纔舉其精即流目見婦人精即注下夫婦之私皆廢背心痛如被槌兩耳皆聾腰痠膝軟此大虚症也用補天丸加止澁之藥鹿茸沙苑蒺藜白䗶之類服之一月精固二月耳聰而背心痛止次年育女仲景云夫失精家少腹弦急陰頭寒冷目眩髮落脈極芤虚遲為清穀亡血失精脈得諸芤動㣲𦂳男子失精女子夢交以桂枝龍骨牡蠣湯主之桂枝白芍藥生薑牡蠣煅龍骨煅各三兩甘草二兩大棗十二枚作八帖水煎服猪苓丸半夏一兩剉如豆大猪苓二兩先將一半炒半夏色黄不令焦出火毒取半夏為末糊丸桐子大候乾更用前一半猪苓末子同炒㣲烈入砂瓶内養之空心温酒鹽湯下三四十丸常服於申未間温酒下蕭氏云此古方也今盛行於時而人多莫測其用蓋半夏有利性而猪苓導水縁腎司閉藏久用澁藥及有鬱滯用之使氣通而鬱散予醫囊中嘗貯此藥緩急與人三五服皆随手而騐又云詳治夢遺方屬鬱滯者居大半庸醫不知其鬱但用龍骨牡蠣等濇劑固脫殊不知愈濇愈鬱其病反甚常治一壯年夢遺白濁少腹有氣沖上毎日腰熱卯作酉凉腰熱作則手足冷前陰無氣腰熱退則前陰氣耕手足温平旦多泄屁暮多噫時振隔一旬二旬必遺脈朝弦滑而大午後洪大予知其有鬱滯也先用沉香和中丸大下之次用四物湯吞滋腎丸百粒若稍與蛤粉等濇藥則遺與濁反甚或一夜二遺遂改用導赤散大劑煎湯服之遺濁皆止漸安又一中年夢遺醫或與濇藥反甚連遺數夜愚先與神芎丸大下之却再製此猪苓丸服之皆得全安又丹溪先生治鎮守萬户蕭伯善便濁精滑不禁百藥不效試倒倉法而安於此見夢遺屬鬱者多矣嘗治丁氏一友壯年體肥而色蒼善飲酒常兼人之食毎五日則夢遺一度准准如此醫近一年罔效季冬就予治診左弦數右三部皆滑數知其酒多濕熱重况厚味生痰但清其濕熱或可愈也乃製一方名曰端本丸苦參二兩木草苦參解酒毒補隂氣清溼熱補隂最捷川黄栢二兩牡蠣蛤粉白螺螄殻煅各一兩此三味燥濕熱清痰葛根一兩解酒熱而引清氣上升青蒿一兩清熱而利小便是上下分消其濕也以神麴糊為丸梧子大空心及食前白湯吞下七十丸服至第五夜竟不遺至十九夜又被酒過醉其夜又遺乃令却酒一月未終劑而精固矣次年生子端木丸至今行丸百發百中潔古珍珠粉丸治白淫夢遺精滑不收年壯節憊精滿者降火補隂為主黄栢一斤新瓦上炒赤真蛤粉一斤滴水丸如梧子大毎服一百丸空心温酒送下法曰陽盛故精泄也黄栢降火蛤粉鹹而補腎陰丹溪云精滑不禁用蛤粉青黛香附黄栢知母之類大鳳髓丹治心火太盛陽狂不已又補腎水真陰虚損心有所欲速於感動應之於腎疾於施泄此方固真元降心火益腎水大有神效黄栢炒二兩縮砂一兩甘草半兩半夏炒猪苓茯苓蓮蕋益智仁各三錢五分右神麴糊丸梧子大毎服七十丸若只用黄栢甘草縮砂三味名正鳳髄丹若只用黄栢甘草二味名小鳳髄丹古人云㵼心者非也乃㵼心包絡相火益腎水之劑許學士清心丸治經絡熱夢遺心忪恍惚膈熱黄栢一兩研為末加生腦子一錢同研極細煉蜜丸梧子大每服十丸至十五丸濃煎麥門冬湯下大智禪師云夢遺不可全作虚冷治亦有經絡熱而得之者嘗治一男子至夜脊心熱夢遺用珍珠粉丸猪苓丸遺止終服紫雪脊熱始除又一男子脈洪腰熱遺精沉香和中丸下之導赤散治其火而愈由此知身有熱而夢遺者皆熱遺也治夢遺之藥若清之不止者為虚寒愚壯年得夢遺症每四五夜必一遺累用鳳髄丹秘真丸雖少效終不能除根後改用石菖蒲逺志韮子桑螵蛸益智酸棗仁牡蠣龍骨瑣陽等劑為丸服良愈又一中年男子夢遺以珍珠粉丸等藥與服了無效亦以逺志菖蒲等劑服之隨手而愈矣河間秘真丸治白淫小便不止精氣不固及有餘瀝或夢寐多泄龍骨一兩另研硃砂一兩研細留一分為衣大訶子皮五枚縮砂五錢右麪糊為丸菉豆大每服一二十丸空心温酒白湯下不可多服恐太秘也思想外淫者宜鎮心導滯補虚此方得之矣五苓丸治虚而泄精脈弦大累與加減八物湯吞秘真丸及珍珠粉丸精泄不止後用五棓子濇脫之功敏於龍骨蛤粉矣海藏烏金散治夢泄精滑不禁九肋鼈甲毎用二枚以清酒一碗童便三盞葱白七寸同煎七分服之日進二次此亦補隂意也木草云主心腹癥瘕堅積東垣治男子夢與鬼交心神恍惚刮鹿角屑為末三錢酒調下日進二服本草云鹿角逐惡氣惡血然亦是補劑否則何能治此婦人良方鎖精丸治下元虚弱小便白濁白淫白帶淋漓小便頻數破故紙炒五味子炒白茯苓青鹽各等分右酒糊丸梧子大每三十丸鹽酒或鹽湯下固精丸治胞冷虚寒小便白濁白淫夢遺等症兔絲子酒浸蒸炒五味子炒白茯苓桑螵蛸牡蠣龍骨各煅韮子炒白石脂各等分酒糊丸梧子大毎七十丸空心鹽湯送下汗門附頭汗手足汗無汗治汗之法有數種各列治於後陽虚自汗者宜嚴氏茋附湯黄茋建中湯陰虚盜汗者當歸六黄湯熱甚盜汗者正氣湯濕勝自汗者表虚不任風寒者周衞湯痰熱者凉膈散或滚痰丸飲食飽甚汗出於胃宜消其食詳所飽何物以枳實山查之類治之驚而奪精汗出於心宜紫石英小草龍骨酸棗仁人參之類搖體勞苦汗出於脾宜歸脾湯或當歸補血湯疾走恐懼汗出於肝宜龍齒酸棗仁當歸枸杞山茱萸之類持重逺行汗出於腎以山藥山茱萸熟地黄鹿角膠羊脊髄之類東垣治汗春夏用黄茋秋冬用桂枝此亦是治自汗法也夏月汗多口渴氣喘促者及陰虚注夏體熱自汗或盜汗者急以生脈散加黃茋治之六味地黄丸加知母龍骨牡蠣治勞損盜汗殊妙茋附湯治陽氣大虚汗出不止肢體倦怠黃茋去蘆蜜炙大附子炮去皮臍各等分每服四錢薑十片水一鍾煎八分食前温服丹溪治陽虚汗多者人參黄茋少佐桂枝湯甚者附子亦可用按此即東垣黄茋建中湯意也東垣當歸六黄湯治陰虚盜汗之聖藥也當歸黄連黄芩黄栢黄茋生地黄熟地黄各等分毎服七錢水煎服東垣正氣湯治熱在陰分盜汗黄栢炒二錢知母三錢甘草一錢水煎食逺服許學士人參丸通治諸虚補精氣止肝邪平補五臟虚羸六腑怯弱充肌膚進飲食止虚汗人參白术茯苓山藥石斛五味子黄茋取頭末各一兩為細末蜜丸梧子大每服三十丸空心食前米飲下久服不熱尤宜少年東垣周衞湯治濕勝自汗補衞氣虚弱表虚不任風寒黄茋麻黄根各一錢生甘草當歸梢生黄芩半夏各五分猪苓羌活各七分麥門冬生地黄各三分五味子七粒紅花蘇木各一分水煎温熱服中風症必自汗汗多不得重發汗故禁用麻黄而用根節也羌活勝濕湯治濕勝自汗惡寒重添厚衣心胸悶躁頭目昏憒壅塞飲食減濕熱大盛汗出不休以風藥去其濕以甘草㵼其熱甘草炙三錢黄茋七分生甘草五分生黄芩酒黄芩防風各三分人參三錢以取氣益胃已上藥㵼胸中之熱獨活二分川芎藁本各三分升麻柴胡各五分已上風藥勝其溼細辛羌活蔓荆子各三分薄荷一分已上清利頭目右水二鍾煎鍾半纔入後四味細辛等藥再煎至一鍾熱服一服而止諸症悉去凉膈散方見熱火門滚痰丸方見痰門附雜方陳無擇牡蠣散治諸虚不足及新病暴虚津液不固體常自汗許學士云亦治盜汗不止黄茋麻黄根牡蠣煅研各二錢右水煎入浮小麥一百粒不拘時服河間白术散治飲酒中風汗多不可單衣食則汗出如洗久不治必成消渴症牡蠣煅二錢白术一兩二錢防風二兩半為末毎服一錢温水調下不計時如惡風倍防風白术如多汗面腫倍牡蠣丹溪白术湯治盜汗白术四兩分作四製一兩黄芪同炒一兩石斛同炒一兩牡蠣同炒一兩麩皮同炒各味炒黄色餘藥不用只用白术研末毎服三錢用粟米煎湯送下藥盡為效濟世良方治盜汗山藥為末臨臥酒調下三錢衍義云椒目治盜汗尤切將椒目㣲炒搗細末用五錢以生猪上唇煎湯一合調匀臨臥服無有不效蓋椒目能行水治水蠱尤勝治盜汗桑葉為末茶服之治藥不應者累靈出醫說豆豉能治久盜汗以一升㣲炒令香清酒二升漬兩三日取汁任人服之不瘥更作三兩劑即止愚謂此方出綱目必是傷風表中有風邪以致毛腠不開豆䜴原能發汗㪚邪以邪散而腠理閉也今取其能治久盜汗豈豆䜴亦能補隂乎録此以備叅考衍義以煅過牡蠣麻黄根等分同研細末治盜汗及陰汗頭汗王海藏云頭汗出劑頸而還血症也額上偏多何謂也曰首者六陽之所會也熱薰蒸則汗出也額上偏多以部分左頰屬肝右頰屬肺鼻屬中州頤屬腎額屬心三焦之火涸其腎水溝渠之餘迫而上入於心之分故發為頭汗而額上偏多者屬心之部而為血症也至於雜症陰火迫腎水上行入於心為盜汗或自汗𫝊而為頭汗出者或心下痞者俱同血症例治之無問傷寒雜病酒積下之而心下痞者皆血症也可㕘痞門同治生生子曰頭汗亦非止血之一字可盡予族伯每飲食入腹則登時頭面汗出如雨劑頸而還稍頃自收此胃中有熱陽氣虚甚而然何則頭面屬陽明為多飲食入胃沖動其熱如霧露之升騰越出而為汗經謂雲出天氣雨出地氣是也觀海藏以痞症為對俱同血症例治之縁其以下多亡陰謂亡陰而陽失依附故飛越也今益脾土而以血藥兼之可謂得治法之本矣手足汗手足汗乃脾胃濕熱内鬰所致脾胃主四肢亦有腸胃中有實熱者仲景承氣症謂手足濈濈然汗出乃腸胃熱甚而傍達四肢也東垣安胃湯治因飲食汗出日久心中虚風虚邪久則令人半身不遂見偏風痿痺之病先除其汗慓悍之氣按而收之黄連五味子烏梅去核生甘草各一錢炙甘草六分升麻四分水二鍾煎一鍾食逺温服忌濕麪五辛大料發熱之物治脚汗白礬亁葛等分每用五六錢水三碗煎十數沸洗逐日洗一次纏三五日自然無汗無汗丹溪曰盛夏浴食無汗為表實一人脈濇而短重取而弱此久受濕傷且多年無汗遇勞身熱倦怠如沙病狀蒼术白术芍藥甘草紅花各五錢陳皮六兩當歸身二兩分六帖薑三片煎服治夏月無汗成久𠻳病半蘇散半夏紫蘇葉二味為末入蛤粉神麴蜆殻灰等分為末以桃仁泥五錢𤓰蔞穰一枚為丸先服三抝湯三帖却服此丸臨臥白湯送下七十丸治虚勞自汗不止芍藥黄茋湯黄茋二兩白芍藥白术各一兩半甘草一兩每服五錢煨薑三片棗一枚水煎服參术散治同前陽虚甚者加附子人參一兩半白术二兩桂心七錢每服五錢水煎服消痺門啟𤣥子註痺為消熱病也渴而多飲為上消消穀善饑為中消渴而便數有脂膏為下消東垣曰上消者舌上赤裂大渴引飲經曰心移熱於肺傳為膈消是也以白虎湯加人參主之潔古曰上消者上焦受病又謂之膈消多飲水而少食大便如常小便清利知其燥在上焦治宜流濕以潤其燥上消者經謂之膈消渴而多飲是也治上中下三消水火圖上消熬猪肚湯羊肉冬𤓰湯上消手太陰大渴不止麥門冬飲子化水丹中消調胃承氣湯癉成消中而數小便消中足陽明胃熱消榖善饑易老順氣散下消益火之源以消陰翳則便溺有節腎氣丸地黄丸腎消足少陰飲少溲多小便如膏内化丸鳳髓丹壯水之主以制陽光則渴飲不思東垣論消渴末𫝊能食者必發腦疽背瘡不能食者必𫝊中滿鼓脹聖濟總録皆為必死不治之症惟潔古分而治之能食而渴者白虎加人參湯主之不能食而渴者錢氏白术散倍加葛根主之上中既平不復𫝊下消矣前人用藥厥有㫖哉或曰末𫝊瘡疽者何也此火邪勝也其瘡痛甚而不潰或赤水者是也經曰有形而不痛者陽之類也急攻其陽無攻其陰治在下焦元氣得强者生失强者死末𫝊中滿者何也以寒治熱雖方士不能廢繩墨而更其道也然臟腑有逺近心肺位近宜制小其服腎肝位逺宜制大其服皆適其至所為故知過與不及皆誅罰無過之地也如膈消中消制之太急速過病所久而成中滿之疾正謂上熱未除中寒復生非藥之罪失其緩急之宜也處方之際宜加審焉總録論消渴有三種一曰渴而飲水多小便數有脂似麩片而甜者消渴病也二者吃食多不甚渴小便少有似油而數者消中病也三者雖渴飲水不能多腿脚瘦小痿弱小便數此腎消也特忌房勞千金方云消渇病宜慎者有三一忌酒二忌房勞三忌鹹食及麪能慎此三者雖不服藥亦可自愈消渇之人愈與未愈嘗須慮患大癰必於骨節間忽發􅏴疽而卒内經云熱中消中不可服膏粱芳草石藥石藥發瘨芳草發狂芳草之氣美石藥之氣悍二者其氣急疾堅勁故非緩心和人不可以服此二者東垣謂滑石治渴本為竅不利而用之以燥能亡津液也天令濕氣太過者當用之若無濕而用之是犯禁也小便不利而渇知内有溼也小便自利而渴知内有燥也濕宜泄之燥宜潤之内經云脈實大病久可治脈懸小堅病久不可治又脈經曰消渴脈數大者生細小浮短者死上消治例渴而多飲為上消丹溪云治消渴養氣降火生血為主𤓰蔞根治消渴之神藥心移熱於肺𫝊為膈消人參石膏湯治膈消上焦煩渴不欲多食人參五錢石膏一兩知母七錢甘草四錢每五錢水煎食後温服潔古治能食而渴者白虎倍加人參湯主之王海藏治脾胃虚弱大渴不止而食少小便不利大便不調精神短少腹窄狹如繩束白茯苓橘紅各一兩生薑五錢右煉蜜丸彈子大每二丸空心白湯化服忌生冷硬物怒發思慮過度如脈弦或腹中急甚者加甘草三錢易老門冬飲子治老弱虚人大渴人參枸杞子白茯苓甘草各三分五味子麥門冬各五錢加薑水煎服之羅太無門冬飲子治膈消胸滿心煩精神短少多為消渴知母甘草炙𤓰蔞仁五味子人參葛根茯神生地麥門冬各一兩每五錢加竹葉十四片同煎服火府丹治消渴本事方云一卒病渴日飲水三斗不食者三月心中煩悶時孟冬予謂心中有伏熱與此丹數服毎服五十丸温水下越二日來謝云當日三服渴止又次日三服飲食如故此方本治淋用以治渴得效信乎藥要變通曷能執一丹溪治消渴泄㵼先用白芍藥白术各炒為末調服後隨症用藥錢氏加減地骨皮散治上消知母柴胡甘草炙半夏地骨皮赤茯苓黄茋石膏黄芩桔梗白芍藥毎三錢薑五片水煎食逺服東垣止渴潤燥湯治消渴大便亁燥喜温飲陰頭縮舌上白燥唇裂口乾眼澁難開及於黑處如見浮雲升麻一錢半柴胡七分甘草五分紅花少許杏仁六箇研桃仁研麻仁研防風歸身荆芥穗黄栢知母石膏各一錢熟地二錢川椒細辛各一分水煎食逺熱服化水丹治手足少陰渴飲不止或心痛者本事治飲冷水多者川烏臍大者四枚炮去皮甘草炙一兩牡蠣生用三兩蛤粉用厚者炮六兩為細末醋浸蒸餅為丸每服十五丸新水下心痛者醋湯下立愈飲水一石者一服愈王海藏此藥能化停水甘草石膏湯治渴病全愈再劇舌白滑㣲腫咽喉嚥唾覺痛嗌腫時渴飲冷白沫如膠飲冷乃止升麻一錢半柴胡七分甘草梢五分石膏六分黄栢桃仁防風荆芥穗生地知母當歸身各一錢杏仁六枚熟地黄連各三分細辛一分紅花少許川椒三粒水煎食後熱服丹溪云消渴病退後而燥渴不解此有餘熱在肺經可用參苓甘草少許生薑汁冷服虚者可用人參湯東垣六經渴治例太陽經渴其脈浮無汗者五苓散滑石之類主之陽明經渴其脈長有汗者白虎湯凉膈散之類主之少陽經渴其脈弦而嘔者小柴胡湯加𤓰蔞之類主之太陰經渴其脈細不欲飲縱飲思湯不思水者四君子湯理中湯之類主之少陰經渴其脈沉細自利者猪苓湯三黄丸之類主之厥陰經渴其脈㣲引飲者宜少少與之聖濟治時氣煩渴用生藕汁一盞入蜜一合和匀分為三服中消治例消穀善飢為中消癉成為消中胃中熱則消榖善飢東垣曰消渴中消自古只治燥止渴悞矣殊不知内經云三陽結謂之消三陽者足太陽也又手陽明大腸主津液所生病熱則目黄口乾是津液不足也足陽明主血所生病熱則消穀善飢血中伏火是血不足也結者津液不足結而不潤皆燥熱為病也此因數食甘美而多肥故其氣上溢轉為消渴治之以蘭除陳氣也不可服膏粱芳草石藥其氣悍烈能助熱燥也越人云邪在六府則陽脈不和陽脈不和則氣留之氣留之則陽脈盛矣陽脈太虚則陰氣不得榮也故肌肉皮膚而消削也素問有病口甘者病名為何何以得之岐伯曰此五氣之溢也名曰脾癉夫五味入口藏於胃脾為之行其精氣津液在脾故令人口甘也此肥美之所發也此人必數食甘美而多肥也肥者令人多熱甘者令人中滿故其氣上溢轉為消渴治之以蘭除陳氣也潔古治胃熱善消水穀以甘辛降火之劑治之用黄連末生地白藕各自然汁牛乳各一升熬成膏和黄連末一斤丸如桐子大毎服三十丸白湯下日進十服河間猪肚丸治消渴猪肚一具黄連一兩天花粉四兩麥門冬四兩知母一兩為細末納猪肚中線縫置甑中蒸極爛乗熱於石臼中杵可丸為度如硬加蜜丸如桐子大毎服三十丸漸加至四十丸渴則進之三因方多梁米杜仲本草云猪肚能補中益氣止渴調胃承氣湯治消中渴而飲多食此初起時宜服之三黄丸治三焦熱渴易老順利散治中熱在胃而能食小便赤黄㣲利至不欲食為效不可多服厚朴枳實各一兩大黄煨四兩每服五錢水煎食逺服大腸移熱於胃善食而瘦又謂之食㑊食㑊者謂食移易而過不生肌膚亦易飢也束垣云善食而瘦者胃伏大邪於氣分則能食胖虚則肌肉削也胃移熱於膽亦曰食㑊河間參蒲丸治食㑊胃中結熱消穀善飢不生肌肉人參菖蒲赤茯苓逺志地骨皮牛膝酒浸各一兩右煉蜜丸毎服二十丸米飲下下消治例渴而小便數有膏為下消羅太無治張芸夫四十五嵗病消渴舌上赤裂飲水無度小便數多先師以此方治之良愈消渴多𫝊瘡瘍為不救之疾既效後亦無患享年七十五而終名之曰生津甘露飲子治消渴上下齒麻舌硬赤爛腫痛食不下腹時脹滿疼痛渾身色黄目白睛黄甚則四肢痿弱無力面塵脫色脇下急痛善嚏善怒健忘臋内腰背疼兩丸冷甚生津甘露飲子一方石膏用一兩二錢石膏一錢二分人參甘草生山梔白豆蔲白芷連翹蓽澄茄黄連薑黄藿香炙甘草杏仁木香各一錢白葵麥冬當歸身蘭香柴胡各五分黄栢酒炒一錢五分升麻根知母酒炒各二錢桔梗三錢全蝎二枚去毒右為末湯浸蒸餅和匀揑作餅子晒乾杵碎如黄米大毎服二錢挑於掌内以舌䑛之津液送下或白湯食後服之神效凡消渴為病燥熱之氣勝也内經云熱淫所勝佐以甘苦以甘㵼之熱則傷氣氣傷則無潤折熱補氣非甘寒之劑不能故以石膏之甘寒為君啟𤣥子曰壯水之主以鎮陽光故以栢連梔子知母之苦寒㵼熱補水為臣以當歸杏仁麥門冬全蝎連翹白葵蘭香甘草甘寒和血潤燥為佐柴胡升麻苦平行陽明少陽二經蓽澄茄白豆蔲木香藿香反佐以取之又用桔梗為舟楫使浮而不下也東垣和血飬氣湯治口渴舌乾小便數舌上赤裂此藥生津除燥生肌又名地黄飲子黄連酒炒生地各七分紅花少許黄栢酒炒一錢升麻一錢甘草炙防已酒洗各三分桃仁六枚當歸四分知母酒煮羌活各五分麻黄根三分口渴舌乾再加杏仁六枚生甘草三分小便數加石膏六分右作一服水煎稍熱忌酒麪房失清凉飲子治消中能食而瘦口舌乾自汗大便結小便數羌活梢柴胡梢甘草梢知母酒裂黄茋黄芩酒炒各一錢升麻梢四分防風梢防已生地酒洗各五分當歸六分石膏龍膽草黄栢各一錢五分紅花少許桃仁杏仁各五枚甘草炙一錢水二鍾酒一小盞煎服甘露膏治消渴飲水極多善食而瘦大便結燥小便頻數又名蘭香飲子石膏二錢知母一錢五分甘草生防風各一錢炙甘草人參半夏蘭香白豆蔲升麻桔梗連翹各五分右浸蒸餅為丸或揑作餅子晒乾碎如米大毎用淡薑湯下二錢黄連末治消渴要藥加天花粉末人乳生地黄汁生藕汁二味為膏入山藥末搜和以薑汁和煉蜜為膏徐徐桃於舌上以白湯少許送下亦可能食而渴者加石膏治消渴以天花粉為末用人乳汁生韮汁煎膏丸如菉豆大每服百丸食後白湯下肘後方治消渴小便多者煮𤓰蔞根汁飲之良濟世方云治消渴無方可治者用天花粉大烏頭炒等分為細末蒸餅丸毎服百丸黒豆湯下已上四方皆以天花粉為君本草主消渴止小便通月水乳汁夫既能止小便又能通月水知其流濕潤燥治消渴之要藥也千金地黄丸治腎渴黄連四兩為末生地半斤取汁連渣拌黄連末和匀晒乾用為細末煉蜜為丸食後麥門冬湯下五六十丸麥門冬湯治消渴日夜飲水無度飲下即溲麥門冬黄連冬𤓰各二兩每服五錢水煎去渣温服若無乾冬𤓰用新冬𤓰肉三斤去穰分作十二片為十二服每服用一片劈破水煎日三服冬𤓰飲子治消渴能食而飲水多小便如脂麩片日夜無度冬𤓰一枚黄連十兩為細末先以冬𤓰破開去穰摻黄連末在内却用頂蓋定於熱灰中煨熟去皮切細爛研絞汁每服一盞至二盞日三服夜一服三消丸用好黄連為細末不拘多少切冬𤓰肉研取自然汁和成餅陰亁再為細末用汁浸和加七次即用為末仍以𤓰汁為丸煎大麥仁湯送下尋常渴疾只一服效已上五方黄連冬𤓰為君丹溪云冬𤓰性走而急久病與陰虚者忌之又有黄連為佐用者尤當裁酌治消渴飲水不止小便數用田螺五升水一斗浸一宿渴則飲之每日一度易水換螺為妙又方以水煮取汁飲之螺亦聴食愚按已上諸方列於下消之例觀其用藥在上中為多亦是端本澄源之意上中既平不復𫝊下消矣故於真陰虚腎消之病而又自有補下焦之藥也用藥者宜審焉張子和治飲水百杯尚猶未足小便如沙或如杏色此方三五日小便毒大注下十日除根此方子和自云此重劑也試有騐水銀四錢錫二錢熔化同水銀炒成砂子牡蠣知母蜜佗僧紫苑苦參貝母各一兩天花粉半斤黄丹半兩俱為細末用雄猪肚婦人用獖猪肚一具納藥於内以麻線縫之用新瓦二片繩縛一二遭别用米一升天花粉末半升於新水内煮熟取出放冷不用米及天花粉只將猪肚併肚中藥爛搗和為丸如硬加蜜食前米湯下三四十丸三因方無貝母河間胡粉散治大渴百方不痊者亦治腎消黄丹胡粉澤㵼石膏赤石脂白石脂各五錢天花粉二兩半甘草一兩蜜為丸菉豆大每服十五丸至二十丸止多則腹痛日進二服葛根湯治消渴消腎日飲石水者葛根三兩𤓰蔞根黄丹各二兩大附子炮去皮臍一兩蜜丸桐子大每十丸日進三服春夏去附子六味地黄丸治腎消效經騐方治消不止下元虚者用牛膝五兩細剉為末生地黄汁五升畫晒夜浸以汁盡為度蜜丸空心温酒下三十丸久服壯筋骨駐顔色黑鬚髮生津液仲景治消渴小便反多如飲水一斗腎氣丸主之張子和治腎渴以腎氣丸本方加山藥一味外桂附從四時加減冬用一兩春秋用三錢夏用一錢又法腎氣丸去附子加五味子一兩半張子和治諸虚不足胸中煩悸時常消渴唇口乾燥或先渴而欲發瘡或病癰疽而後渴宜用黄茋湯多服方見癰疽門凡消渴而小便反多有脂者皆腎氣不管攝津液也宜多服黄茋黄茋乃補氣之要藥外臺秘要治消腎小便數鹿角一具炙焦搗為極細末酒服方寸匕漸漸加之心移熱於肺消者飲一溲二不治腎臟消爍氣無所攝故飲一溲二也口燥咽乾此尋常口乾者非前消渴症也本事方以黄茋湯治心煩躁不生津液不思飲食黄茋人參五味子麥門冬熟地甘草白芍藥各三兩白茯苓一兩天門冬五錢毎服三錢薑棗烏梅同煎食後服燥熱咽乾忌南星半夏又渴者不得利小便是以五苓散在所當禁也赤水元珠卷十一
