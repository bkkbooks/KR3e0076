body:
  text: 赤水元珠卷五明孫一奎撰水脹通論靈樞經曰水榖入於口輸於腸胃其液别為五天寒衣薄則為溺與氣天熱衣厚則為汗悲哀氣并則為泣中焦胃緩則為唾邪氣內逆則氣為之閉塞而不行不行則為水脹余知其然也不知其何由生願聞其道岐伯曰五榖之津液和合而為膏者內滲入於骨空補益腦髓而下流於隂股隂陽不和則使液溢而下流於隂髓液皆減而下下過度則虛下過度謂房勞過度也故腰背痛而脛痠隂陽氣道不通四海塞閉三焦不㵼津液不化水榖并行腸胃之中别於回腸留於下焦不得滲膀胱則下焦脹水溢則為水脹黃帝問於岐伯曰水與膚脹鼓脹腸覃石瘕何以别之岐伯答曰水始起也目窠上微腫如新卧起之狀其頸脈動時咳隂股間寒足頸腫腹乃大其水已成矣以手按其腹隨手而起如裹水之狀此其候也帝曰膚脹何以候之岐伯曰膚脹者寒氣客於皮膚之間􅠻􅠻然不堅腹大身盡腫皮厚按其股窅然而不起腹色不變此其候也鼓脹何如岐伯曰腹脹身皆大大與腹脹等也色蒼黃腹筋起此其候也腸覃何如岐伯曰寒氣客於腸外與衛氣相摶氣不得榮因有所擊癖而內著惡氣乃起瘜肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離嵗按之則堅推之則移月事以時下此其候也石瘕何如岐伯曰石瘕生於胞中寒氣客於子門子門閉塞不得通惡血當㵼不㵼衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下帝曰膚脹鼓脹可刺耶岐伯曰先刺其脹之血絡後調其經刺去其血絡也石水臍以下腫其脈沉本事方云臍腹四肢悉腫者為水但腹脹四肢不甚腫為蠱蠱即鼓脹也綱目云水脹皆本於房勞過度水腫出素問水熱穴論黃帝問曰少隂何以主腎腎何以主水岐伯對曰腎者至隂也至隂者盛水也肺者太隂也少隂者冬脈也故其本在腎其末在肺皆積水也帝曰腎何以能聚水而生病岐伯曰腎者胃之關也關門不利故聚水而從其類也上下溢於皮膚故為胕腫胕腫者聚水而生病也帝曰諸水皆生於腎乎岐伯曰腎者牝臟也地氣上者屬於腎而生水液也故曰至隂勇而勞甚腎汗出腎汗出逢於風內不得入於臟腑外不得越於皮膚客於玄府行於皮裏傳為胕腫本之於腎名曰風水所謂玄府汗孔也帝曰水俞五十七處者是何主也岐伯曰腎俞五十七穴積隂之所聚也水所從出入也尻上五行行五者此腎俞故水病下為胻腫大腹上為喘呼不得卧者標本俱病故肺為喘呼腎為水腫肺為逆不得卧分為相輸俱受者水氣之所留也肺腎之標本其上下分為相輸相應之病而俱受者緣此二臟乃水氣之所留故也伏莵上各二行行五者此腎之街也三隂之所交結於腳也踝上各一行行六者此腎脈之下行也名曰太衝凡五十七穴者皆臟之隂結水之所容也尻上五行行五脊中一懸樞一命門一腰俞一長強一大腸俞一小腸俞一膀胱俞二中膂內俞一白環俞二胃倉二盲門二志室二胞盲二秩邉二伏莵上各二行行五中注二四滿二氣穴二大赫二外陵二大巨二水道二歸來二踝上各一行行六太衝二復溜二隂榖二照海二交信二築賔二甲乙經云身腫關門主之水腫脹皮腫三里主之風水膝腫巨虛上亷主之風水面胕腫顔黑解溪主之風水面胕腫衡陽主之水中留飲胸脅支滿刺陷谷出血立已面胕腫上星主之先取譩嘻後取天牖風池水腫人中盡滿唇反者死水溝主之水腫大臍平炙臍中無理不治內經曰三隂結謂之水王注云謂脾肺之脈俱寒結也又曰下焦溢而為水王注曰下焦為分注之所氣窒不㵼則溢而為水黃帝問曰有病腎風者靣胕龎然壅害於言可刺否岐伯曰虛不當刺不當刺而刺後五日其氣必至帝曰其至何如岐伯曰至必少氣時熱時熱從胸背上至頭汗出手熱口乾苦渴小便黃目下腫難以行月事不來煩而不能食不能正偃正偃則咳病名曰風水論在刺法中帝曰願聞其説岐伯曰邪之所湊其氣必虛隂虛者陽必湊之故水氣時熱而汗出也小便黃者少腹中有熱也不能正偃者胃中不和也正偃則咳甚上迫肺也諸有水氣者微腫先見於目下也曰何以言之岐伯曰水者隂也目者亦隂也腹者至隂之所居故水在腹者必使目下腫也真氣上逆故口苦舌乾卧不得正偃正偃則咳出清水也諸水病者不得卧卧則驚驚則咳甚也腹中鳴者病本於胃也薄脾則煩不能食食不能下者胃脘膈也身重難以行者胃脈在足也月事不來者胞脈閉也胞脈者屬心而絡於胞中今氣上迫肺心氣不得下通故月事不來也針經曰肢脛者人之管以趨翔也莖垂者身中之機隂精之候津液之道也故飲食不節喜怒不時津液內溢乃下流於睪血道不通日大不休俯仰不便趨不能此榮然有水上不下也劉宗厚曰按內經諸水氣皆諸臟本病也針經所引則又主飲食及七情等因皆致之可見病機之微矣但有濕腫氣腫初亦頗相似然以手按之成凹不能即起者濕也濕與水有微甚之意况有氣腫及諸水形證不同要在臨症詳審也水腫有陽水隂水之分若脈來沉伏靣色青白不煩渴小便澀而清大便溏泄為隂水治宜實脾脈來沉數靣色赤黃或煩渴小便赤而難大便祕治宜踈氣蕩滌論水氣證治大法內經曰不從毫毛病生於內者隂氣內盛陽氣竭絶不得入於腹中故言五臟陽以竭也津液者水也充郭皮中隂蓄於內水氣脹滿上攻於肺肺氣孤危魄者肺神腎為水害子不救母故云其魄獨居也夫隂精損削于內陽氣耗減於外則三焦閉溢水道不通水滿皮膚身體否腫故云形不可與衣相保也凡此之類皆四肢脈數急而內鼓動於肺中也肺動者謂氣急而咳也如是者皆水氣格拒於腹膜之內浮腫施張於身形之外欲窮標本其可得乎平治權衡謂察脈浮沉也脈浮為在表脈沉為在裡在裏者泄之在表者汗之故云開鬼門潔淨府也去宛陳莝謂去積久之水物猶如草莝之不可留於身中也劉宗厚曰按經論水氣證治至為機密故云開鬼門潔淨府然鬼門者猶幽玄之謂有毛竅而不見其開闔邪氣感入邪與正相摶毛竅閉塞而寒熱作為病客於表故宜發汗遣邪氣以開鬼門也此亦發汗之别稱泄諸病在表之通例也淨府者謂膀胱內無入孔而外有出竅為清淨津液之府憑腎氣藏氣化水榖之精而滲入脬中氣約成溺出也夫腎主下焦司闔闢開竅二隂肺脾之氣通調水道下輸膀胱氣化水行而自清淨否則便澀或濁或淋為水氣溢於腠理為膚腫諸病若宛屈陳莝壅滯身中當泄去是物而潔淨宜此二法在表者汗之在裏者㵼之權衡于治也雖然經云水病本之于肺腎二經而古今方論並不以治水獨㵼腎氣為説者何蓋腎隂奉行降令為生化之源而常不足至隂精損削於內生氣不能運化至為胕腫其氣索矣况肺弱而母氣孤危者乎故東垣曰若治以甘淡滲泄陽藥獨陽無隂其欲化得乎此探擷已上治例之妙也如積飲留飲傷脾若土之于雨中則為泥矣或因七情所致手足太隂俱病身浮腫似水氣用燥脾導氣之劑即愈一則若泥土之得和風暖日水濕去而陽化自然萬物生長一則肺氣開泄滲道通利水氣不濡于脾矣此正諸濕腫滿皆屬脾土諸氣膹鬱皆屬於肺而與隂陽為病水氣機之不同故亦不待開鬼門潔淨府而已也原病式謂水腫為濕熱實甚故治以辛苦寒藥蓋以辛散結而苦燥濕以寒除熱而隨其利濕去結散熱退氣和而愈而謂脾虛不能制水之説為非丹溪以水腫由脾虛不能制水故水漬妄行當以參术補脾使脾健則自能轉運而水自行但宜補中行濕利小便為上劉宗厚曰按劉河間以水腫為濕熱謂在表有熱宜汗謂在裏有熱宜下治法宜開鬼門潔淨府蓋言有餘之證然也丹溪以脾虛不能制水治當補中行濕利小便蓋言不足之證然也若夫滋腎制火之説愚切以為未當蓋補腎之藥乃隂滯柔潤適以滋濕耳豈理也哉今治此證但脾虛受濕為不足所致者宜燥脾土兼利小便若夫氣鬱飲食濕熱所致者禁不得妄下證雖可下又當權其輕重不可過用芫花大戟甘遂猛峻之劑暫時快利水氣復來而無以治之也少壯充實脈洪大有力者當導厺其水年老虛人得此惟當補中行濕為先設或元氣下陷者即又當升提之古方十種證候以短氣不得卧為心水兩脅疼痛為肝水大便鴨溏為肺水四肢苦重為脾水腰痛足冷為腎水口苦咽乾為膽水乍虛乍實為大腸水腹急肢瘦為膀胱水小便祕澀為胃水小腹急滿為小腸水以此十水為正水外有風水皮水石水黃汗風水又有風腫氣腫血腫風腫者皮粗麻木不仁走注疼痛氣腫者皮厚四肢瘦削腹脅脹膨至若煩躁潄水迷忘驚狂嘔逆煩悶皮間有紅縷赤䀶者此血腫也妘人經脈壅閉敗血停腐尤多見此妊娠亦有氣遏水道而虛腫者此但順氣安脾飲食無阻既産而腫自消若産後發虛則虛退而告殂矣大抵浮腫之脈帶數即是虛寒潛止其間久必沉伏沉伏則陽虛隂實為水必矣靣龎然浮腫疼痛其色炲黑多汗惡風者屬腎風治見風􅔻諸唇黑則傷脾缺盆平則傷心臍出則傷肝足心平則傷腎背平則傷肺凡此五傷必不可治大凡水腫先起於腹而後散於四肢者生先起於四肢而後入腹者死至若鼓脹而肚上青筋脹滿而大便􅉸泄久瘧而轉作虛浮又兼見前五傷則死矣與夫男從腳上腫而上女從上腫而下或肉硬或掌心平而無紋皆不治論生死脈法水病脈洪大者可治微細者不可治水病帳閉其脈浮大數者生沉細虛小者死水病腹大如鼓脈虛者死實者生脈經敘諸水形症原出金匱要略病有風水有皮水有正水有石水有黃汗寸口脈沉􅉸者中有水氣靣目腫大有熱或身體反重而酸或惡風一身悉腫脈浮不渴續自汗出而無大熱者皆為風水風水其脈自浮外症骨節疼痛惡風皮水其脈亦浮外症胕腫按之沒指不惡風其腹如鼓不渴當發其汗皮水之為病四肢腫水氣在皮膚中四肢聶聶動者防已茯苓湯主之正水其脈沉遲外證自喘石水其脈自沉外證腹滿不喘黃汗其脈沉遲身發熱胸滿四肢頭靣腫久不愈必致癰膿心水者其身重而少氣不得卧煩而躁其人隂腫肝水者其腹大不能自轉側脅下腹痛時時津液微生小便續通肺水者其身腫小便難時時鴨溏脾水者其腹大四肢苦重津液不生但苦少氣小便難腎水者其腹大臍腫腰痛不得溺隂下濕如牛鼻上汗其足逆冷靣瘦裏水者一身靣目黃腫其脈沉小便不利故令病水也仲景曰諸水身半以下腫者當利小便身半已上當發汗經云身半已上天氣主之身半以下地氣主之天氣主之者其在皮也故汗而發之問肌肉之外皮膚之裏首至足一身皆腫者當作何治答曰亦宜汗之也與身半以上同法身半以上汗之者尺寸之天地也故汗之肌肉之外皮膚之裏一身盡腫者從天而汗之此表裡之浮沉凡治之法當如是也肺心肝腎中州已上俱宜汗中州已下皆宜汗如小便利而渴不宜汗不宜下以其重亡津液故也王海藏曰觀髙低內外輕重表裡隨經補㵼要當謹察肺胃腎三經病即􅂒也夫水氣者胃土不能制腎水逆而上行傳入于肝故令人腫治者惟知泄水而不知益胃故多下之強令水出不依天度流轉故胃愈虛食不滋味則發而不能治也莫若行其所無事則為上計不可不知凡補胃不可使之壅滯如本草敘赤小豆治水腫通氣補脾胃之類是也羅太無治許魯齋藥案云魯齋年五十八靣目肢體浮腫大便溏多腹脹腸鳴時痛飲食減少脈得弦細而緩年少時多服牽牛大黃藥靣目四肢時有浮腫今因隂雨故大發豫曰當運之氣出自中焦者胃也胃氣弱不能布散水榖之氣營飬臟府經絡皮毛故氣行而澀為浮腫大便溏多而腹脹腸鳴皆濕氣勝也四時五臟皆以胃氣為本五臟有胃氣則和平而安若胃氣虛弱不能運動滋飬五臟則五臟脈不和平本臟之氣盛者其脈獨見輕則病過甚則病死故經曰真臟之脈弦無胃氣則死今幸未至於甚尚可調補人知服牽牛大黃為一時之快不知其為終身之害也遂以平胃散加白术茯苓草豆蔲仁數服而腹脹溏泄腸鳴時痛皆愈飲食進止有四肢浮腫以導滯通經湯主之良愈導滯通經湯治脾濕而氣不宣通靣目手足浮腫陳皮白术桑白皮木香各五錢茯苓一兩右每服六七錢水煎食前服霖雨時加澤㵼一兩丹溪治水腫多以二陳加白术人參蒼术為主佐以黃芩麥冬炒梔子制肝木若腹脹少佐以厚朴氣不運加木香木通氣若陷下加升麻柴胡提之隨病加減必須補中行濕二陳治濕加升提之藥能使大便潤而小便長産後必須以大補血氣為主少佐蒼术茯苓使水自降用大劑白术補脾若壅滿用半夏陳皮香附監之有熱當清肺金麥門冬黃芩之屬一方用山梔去皮取仁炒槌碎米湯送下一抄若胃熱病在上者帶皮用治熱水腫山梔子五錢木香一錢半白术二錢半取急流水煎服水脹用大戟香薷濃煎汁成膏丸去暑利小水大戟為末棗肉丸十丸泄小水劫實者綱目述丹溪治水腫得效之法十五條其法大率以甘草佐白术參陳等劑補中氣為君木通􅉸石郁李仁海金沙行水為臣厚朴大腹皮蘇梗通滯意為佐使如氣不升浮惡寒脈沉者探吐以提之頭靣光腫加麻黃微汗之挾積氣者佐以保和溫中抑青等丸磨之挾熱者佐以黃芩之類清之挾瘡癕者佐以連翹犀角散之而隨證加減也仲景曰寸口脈沉而遲沉則為水遲則為寒寒水相摶趺陽脈伏水榖不化膽氣衰則鶩溏胃氣衰則身腫少隂脈細男子則小便不利婦人則經水不通經為血血不利則為水名曰血分仲景治水大法風水脈浮身重汗出惡風者防已黃茋湯主之防已一兩黃茋一兩二錢五分白术七錢五分甘草炙五錢右每服五錢生薑四片棗一枚水煎溫服良久冉服腹痛加白芍藥因濕為腫者前湯調下五苓散又前湯治風濕脈浮為在表其人或頭汗出外無表證惟腰以下常重而腫難以屈伸腰以上俱和者並效風水惡風一身悉腫脬浮不渴自汗出而無實熱者越婢湯主之治裏水加白术四兩麻黃去節六兩石膏半斤生薑三兩大棗十二枚甘草二兩右五味以水六升先煮麻黃抹去上沫入諸藥煮取三升分溫三服惡風者加大附子一枚炮古今録驗治風水加术四兩皮水為病四肢腫水氣在皮膚中四肢聶聶動者防已加茯苓湯主之防已黃茋桂枝各三兩茯苓六兩甘草炙二兩右五味水六升煮取三升分溫三服裏水為病越婢加术湯主之又甘草麻黃湯亦主之甘草炙二兩麻黃去節四兩水五升先煮麻黃去渣沫內甘草煮取三升溫服一升被覆出汗汗不出再服慎風寒水之為病其脈沉小屬少隂浮者為風無水虛脹者為氣水發其汗即已脈沉者宜附子麻黃湯浮者宜杏子湯附子麻黃湯附子一枚炮去皮臍切作八片麻黃去節甘草炙各三兩水七升先煮麻黃冉沸去上沫內諸藥煮取二升半溫服八合日三服隂陽結邪多隂少陽名曰石水小腹腫石水者謂冬月水氷如石之時故曰石水也火墓於盛冬陽氣微故石水而死也腎肝並沉為石水並浮為風水黃汗之為病身體腫發熱汗出而渴狀如風水汗沾衣色其黃如蘗汁脈自沉問曰從何得之以汗出入水中浴汗從孔中入得之黃汗者黃茋芍藥桂枝苦酒湯主之黃茋五兩芍藥三兩桂枝去浮皮三兩苦酒一升水七升煮三升溫服一升當心煩也至六七日乃解若心煩不止者以苦酒阻故也黃汗之為病兩頸自冷假令發熱此屬歷節食已汗出又身常暮卧盜汗出者此榮氣也若汗出已反發熱者久久其身必甲錯發熱不止者必生惡瘡若身重汗已出輒輕者久久其身瞤瞤即胸中痛有又從腰已上必汗出下無汗腰下弛痛如有物在皮中狀劇者不能食身疼重煩躁小便不利此為黃汗桂枝加黃茋湯主之桂枝去浮皮生薑芍藥各三兩甘草炙二兩黃茋右入棗十二枚擘以水八升煮取三升溫服一升須臾飲熱稀粥一升以助藥力被覆取汗不汗更服之師曰寸口脈遲而澀遲則為寒澀則為虛不足趺陽脈微而遲微則為氣遲則為寒寒氣不足則手足厥冷則營衛不利營衛不利則腹滿胸鳴相逐氣轉膀胱營衛俱勞陽氣不通則身冷隂氣不通則骨痛陽前通則惡寒隂前通則脾不仁隂陽相得其氣乃行大氣一轉其氣乃散實則失氣虛則遺溺名曰氣分氣分心下堅大如盤如旋杯水飲所作桂枝去芍藥加麻黃附子細辛湯主之桂枝去浮皮生薑麻黃去節細辛各二兩甘草炙一兩大棗二十枚擘附子二枚炮去皮切八片右水七升先煮麻黃去沫內諸藥煮取二升分溫三服當汗出如蟲行皮中愈心下堅大如盤如旋杯水飲所作枳术湯主之枳實白术各三兩右二味水五升煮取三升分溫三服腹中耎即當散也靣目浮腫喘嗽痰涎葶藶大棗㵼肺湯主之甜葶藶苦葶藶等分大棗腰已下有水氣牡蠣澤㵼散兩脅下有水氣腹中雷鳴生薑㵼心湯十棗湯大戟芫花甘遂各等分三花神祐丸十棗湯加牽牛大黃輕粉水丸服除濕丹神祐丸加乳香沒藥玄青丹神祐丸加黃連黃柏青黛已上四方不可輕用必看其有實候乃用之眀理趂痛丸治水氣浮腫又治腳氣上攻風毒走注疼痛神效白芥子生為末肥甘遂生為末生大黃各末一兩右用白麵一兩半滴水丸作餅子􅏼令黃不可過焦為末醋糊丸梧桐子大冷酒下二十丸不拘時量虛實加減紫苑散木香人參白术紫苑川芎各二兩右粗末生薑烏梅煎服次日又一服調胃白术澤㵼散治痰病化為水氣傳為水鼓不能食白术澤㵼芍藥陳皮茯苓生薑木香檳榔各等分一法加白术本藥各半治臍腹上腫如神心下痞者加枳實下盛者加檳榔胡洽方治支飲澼飲于十棗湯中加大黃甘草五兩同煎服之故以相反之劑欲其上下俱去也郁李仁破澼氣能下四肢水大抵去水藥多泄熱當求脈之虛實下之消腫散治水氣喘呼不得卧煩熱躁渴大小便不利大黃蒸山梔炒甘草炙乾葛陳皮麻黃川芎馬牙硝各等分為末蜜湯調下二錢又方千金子二百五十粒薑三片滚水煎空心服以利為度集成尊重丸治蠱證水腫氣腫喘急小水赤澀大便祕結一切中滿單腹鼓脹人參沉香丁香木香檳榔車前子葶藶子各四錢胡椒蝎梢􅉸石海金沙赤茯苓白豆䓻各一錢半蘿蔔子六錢郁李仁一兩二錢右為末薑汁糊丸梧桐子每服三丸薑湯下一日服三次簡易方治蠱脹身乾黑瘦多渴煩悶馬鞭草細銼晒乾勿見火以酒煮味出去渣溫服立效不善酒者水煎亦可六月半時採元戎神方烏雞子一枚去頂取清黃汁調膩粉一大錢令勻內殼中以蒸餅劑裹之蒸熟去殼取熟黃二葶藶等分炒為末與上并黃蒸餅等為丸豆大每服三五十丸車前子湯下小便澀不通瞿麥湯下又攻擊泄下之劑去菀陳莝之法也許學士十腫水病并根源證狀方法一青水先從左右肋腫起根在肝大戟二赤水先從舌根起根在心葶藶子三黃水從腰腹起根在脾甘遂炒四白水從腳腫起根在肺桑白皮五黑水從外腎腫起根在腎連翹六玄水從靣腫起根在外腎芫花醋炒七風水從四肢腫起根在骨澤㵼八石水從腎腫起根在膀胱藁本九高水從小腹腫起根小腸巴豆去皮油十氣水或盛或衰起根在腹赤小豆右十般腫病各有根源種種不同看十腫病根除一味倍多餘九味等分逐味依法修治焙為細末煉蜜丸如梧子大用赤茯苓湯吞下三丸不拘時候每日三服忌鹽一百二十日緣鹽能化水也又忌魚蝦麵食一切毒物及生冷房室甚效用此方獲瘥後更服後來補藥補藥方肉桂去粗皮乾薑肉豆䓻赤茯苓去皮莪术醋煮川芎桔梗各等分依法製服一方無茯苓莪术有青皮白术檳榔俱等分為末每服三錢百沸湯點服空心食前日午晚各一服前項二方治水腫病甚效豫試用之百發百中獲濟無數治腫滿小便不利茯苓散郁李仁四錢檳榔二錢白术一錢赤茯苓一錢甘遂切片炒一錢陳皮一錢半右為末每服一錢薑棗湯調下已上三方許學士試效者治水腫無逾此矣雄黃神金散雄黃葶藶􅟙米炒熟去米一兩澤㵼椒目減半大戟巴戟茯苓芫花醋浸一日炒甘遂桑皮各一兩右為末空心用井花水調服每一錢加至五錢以利為度忌鹽醋生冷油膩之物從腳腫加葶藶肚腫加椒目從隂腫加澤㵼靣腫加茯苓從心腫根在肋加雄黃從肢腫根在皮加甘遂從口腫根在小腸加巴戟從腰腫根在腎加大戟從膝腫根在肝加芫花三白散治膀胱藴熱風濕相乘隂囊腫大二便不利白丑二兩桑白皮白术陳皮木通各等分為末每服二錢空心薑湯調下小兒減半祕方治鼓脹如神氣鼓則放屁水鼓則下水而愈大戟白商陸甘遂各三錢陳皮二錢大腹皮檳榔白术海帶海藻各二兩為末每用三錢和白麵三兩水拌做一塊分作三小塊每塊捍碗口大薄餅一箇共作三箇無油鍋內烙熟空心服一餅酒送下茶過口坐卧忌風生冷油膩鹽一箇月不能斷葷者不可治也此藥試過每用一餅僅行水四五度並不瘦人一方用乾雞屎一升炒黃好酒三碗淬下煮作一碗絹濾去渣飲之少頃腹中氣大轉腸鳴從大便利下腳膝及蹄上下先皺起漸漸消至腹如一次消不盡冉服一劑以田螺二枚滚酒內泄熟食之即止後以溫粥調飬而安此方治一切水氣濕發腫效三因消腫丸治水腫喘滿小便不利􅉸石木通白术黑丑炒茯苓半夏陳皮各一錢木香􅜰麥丁香各五分為末酒糊丸梧子大每五十丸燈心麥門湯下葶藶丸治涌水證如溢囊裹裡漿或遍身腫滿按腹不堅疾行則濯濯有聲或喘咳不定葶藶炒澤㵼椒目桑白皮木豬苓杏仁各五錢為末煉蜜丸梧子大每二三十丸蔥白湯下不拘時服以利為度局方神助散治十種水氣靣目四肢浮腫以手按之隨手而起咳嗽喘急不得安卧小便赤澀大便不利黑丑末澤㵼各一兩椒目一兩半豬苓二兩葶藶三兩右為末蔥白三莖水煎入酒調服三錢薏苡根散治水腫薏苡根君木香檳榔黑丑右為末酒調服妙聖惠氣寶丸又名順氣丸治腰脅俱病如抱一甕肌膚堅硬按之如鼓腳腫不能屈伸自頭至膻中瘦脊露骨胸膈痞悶四肢無力木香茴香炒羌活木瓜川芎當歸陳皮炒檳榔地骨皮各一兩大黃一兩半黑丑二兩皂角四兩右為末熬皂角膏為丸梧子大每六十丸溫酒下一方無木瓜生薑燈心湯下治一切氣血凝滯風毒熾盛腳氣走注作腫或大便閉腳氣入腹滿悶寒熱往來狀如傷寒並宜服之簡易方治水蠱不問年月深者大戟當歸陳皮各一兩水二升煮七分頓服利二三斗即愈元戎方治十種水氣垂死鯉魚一頭重一斤者和蔥白冬瓜羮食之又治鼓氣方􅉸石輕粉各一錢槐花一錢半右不犯鐵氣為細末生地黃自然汁生薑自然汁停滴在藥中為丸梧桐子大一日服三丸次日服四丸五日以下早辰只一服用生地黃汁溫送下小便中水盡為度得睡後日服嘉禾散十日永不冉發治隂水腫之劑五皮散治風濕客於脾經氣血凝滯以致面目俱浮四肢腫滿心腹膨脹上氣喘促五加皮地骨皮生薑皮大腹皮茯苓皮水煎熱服一方加牽牛淡寮方無地骨皮五加皮加陳皮桑白皮白术木香散治腫滿喘嗽欲變成水病者不能食不能卧小便祕白术豬苓甘草澤㵼赤茯苓各五錢木香檳榔各三錢橘紅二兩官桂二錢􅉸石三兩右每服一兩半生薑三片水煎溫服一方加木通拔萃聖靈丹治脾肺有濕喘滿風盛小便赤澀苦葶藶炒四兩防已二錢赤茯苓麵炒木香檳榔木通人參各一錢五分為末以棗肉丸梧子大每服五十丸桑白皮湯下續隨子丸治通身虛腫喘悶不快人參防已赤茯苓麵炒續隨子木香檳榔海金沙另炒各五錢苦葶藶四兩右為末棗肉丸梧子大每五十丸桑皮湯下退腫拓氣散治積水驚水或飲水過多停積于脾故四肢而身熱用藥惟內消其腫自退赤豆陳皮蘿蔔子甘草炙各五錢木香二錢半每服一兩生薑三片棗一枚水煎食前服復元丹治水腫皮膚盈溢心腹堅脹喘急不得正偃正偃則咳嗽腿腹冷口苦舌乾小便不利夢中虛驚不得安卧附子炮木香煨茴香炒川椒炒去汗獨活厚朴白术炒吳茱茰炒桂心各一兩澤㵼一兩半肉果煨檳榔各五錢為末糊丸梧子大每服五十丸紫蘇湯下一日三服先便旋利如傾次乃腫潰喘止此藥能助真火以飬真土運樞機禁欲絶鹽半年乃不再作當歸散治同前川芎赤芍藥牡丹皮白术赤茯苓陳皮檳榔木香桂心木通各等分為末腳膝頭靣腫大小便不快每服二錢水一鍾紫蘇葉二片木瓜一片同煎八分溫服日三服稍覺愈只早晚服二次但覺氣下小便長是效臟虛去檳榔臍凸加大腹皮豬苓各一兩忌雞魚肉酸醎之物及海味大半夏湯治土不能制水水則干腸胃溢於皮膚漉漉有聲怔忡喘息名曰水脹橘紅半夏茯苓甘草桔梗檳榔各等分每服五錢薑三片水煎服赤茯苓丸治同上木香五錢苦葶藶炒四兩防已二兩赤茯苓二兩為末棗肉丸梧子大每服三十丸桑皮湯下人參葶藶丸治一切水腫及喘滿不可當者人參一兩苦葶藶炒四兩為末棗肉丸梧子大每三十丸桑白皮湯下神祕湯治水氣上乘于肺肺得水而浮水腫不卧卧則喘白茯苓木香各五錢桑白皮紫蘇葉陳皮人參各七錢薑七片水三鍾煎鍾半食後分五服無礙丸治脾病橫流四肢腫滿木香半兩蓬术炮三稜炮檳榔郁李仁炮去皮各一兩大腹皮二兩為末麥芽麵糊為丸梧子大每服三十丸生薑湯吞下香蘇散治水氣虛腫小便赤澀陳皮去白一兩防已木通紫蘇葉各錢右為末每服二錢薑三片水煎食前服小葶藶丸治腫滿腹大四肢枯瘦小便澀濁甜葶藶炒薺菜根等分為末煉蜜丸彈子大每服一丸陳皮湯嚼下只三丸小便清數病愈牡蠣澤㵼散治脾胃氣虛不能約制腎水水溢下焦腰以下腫牡蠣炒澤㵼蜀漆洗去腥葶藶炒瓜蔞根白商陸根海藻洗等分為末白湯調服方寸七小便利止後服踈鑿飲子治水氣遍身浮腫喘呼氣急煩渴大小便不利服熱藥不得者澤㵼赤小豆白商陸大腹皮茯苓羌活椒目木通秦芁檳榔等分薑五片水煎服大橘皮湯治濕熱內攻腹脹水腫小便不利大便􅉸泄陳皮一兩半木香二錢半􅉸石六兩檳榔三錢茯苓一兩豬苓白术澤㵼肉桂各五錢甘草三錢生薑五片水煎服實脾散厚朴白术木瓜附子炮木香茯苓大腹子草果仁乾薑炮各一兩甘草炙五錢薑五片棗一枚水煎服加味枳术湯治氣為痰飲所膈心下堅脹名曰氣分枳殼白术陳皮檳榔桔梗木香桂紫蘇梗葉五靈脂炒各二分半夏茯苓甘草各一分半薑三片水煎服調榮散治瘀血化為水四肢浮腫皮肉赤紋名曰血分細辛莪术桂赤芍川歸川芎玄胡索白芷大腹皮桑白皮檳榔􅜰麥穗陳皮赤茯苓葶藶炒大黃煨各一分甘草炙一分半每服五錢薑棗煎食前服大豆湯治風水通身腫百節痛惡風自汗眼合不得短氣欲絶其脈浮大豆杏仁去皮尖炒麻黃防風防已豬苓各四兩澤㵼黃茋烏頭炮各三兩半夏茯苓白术各五兩甘遂炒甘草炙各一兩每服五錢薑七片水二鍾酒半鍾煎一鍾服以大小便利為度如不利加生大戟五兩葶藶炒香二兩無不利矣內甘遂甘草本相反故用之以成功屢試屢效非泛常所可測也澤漆湯治石水四肢瘦腹腫不喘其脈沉澤漆洗去腥五兩桑白皮六兩射干米泔水浸黃芩茯苓白术各四兩澤㵼防己各二兩每服五錢水三鍾先用黑豆一合煎至二鍾入藥同煎七分空心食前服一日三次附子菉豆湯治寒客皮膚殼殼然而堅腹大身腫按之陷而不起色不變病名膚脹一劑未知冉作大附子大者一枚生去皮臍菉豆二兩生薑一兩切水二鍾煎一鍾分三服空心午晚各一服葶藶防已丸治靣目浮腫肺氣喘咳不安小便赤澀防己一兩木通葶歷杏仁去皮尖麩炒貝母煨各一兩右為末棗肉丸梧子大每服五十丸食逺服桑白皮煎湯送下酒腫丸治酒腫及脾虛發腫蘿蔔十枚皂角五枚二味用水煮乾去皂角將蘿蔔搗爛蒸餅糊為丸芡實大蘿蔔煎湯如意送下犀角湯治結陽症四肢腫滿熱菀不散或毒攻注犀角玄參連翹柴胡各五分芒硝三錢升麻木通各一錢沉香射干甘草炙各七分麥門冬三錢分二服水煎消腫湯治水腫喘滿大小便不利白术山梔各五錢赤茯苓蘿蔔子各三錢葶藶椒目蘇子各一錢沉香三分木香五分水煎服又方繼前服已上二方神效葶藶二錢椒目一錢豬苓一錢半澤㵼八分蔥白三根水煎吞牽牛末為丸則大小便俱通二竒方白术五錢滑石三錢水煎服七服全愈白茯苓湯治水腫開鬼門潔淨府機要方白茯苓澤㵼各二兩郁李仁五錢水煎臨服入生薑自然汁服或作粥飯或和麵作粿食之五七日後俟脹下乃與白术散又方大田螺大蒜生車前草和研為膏作大餅敷于臍上少頃水從小便出𢾗日愈病機白术散服前白茯苓湯利後以此補之白术澤㵼各五錢為末以茯苓三錢煎湯調下或丸服亦可每三十丸從少至多後以黃茋建中湯之類調補脹滿門一名鼓脹內經曰諸濕腫滿皆屬于脾蓋言脾虛不能運化此脹滿之所由生也又曰濁氣在上則生䐜脹此清濁相干而為脹也其中亦有寒熱之分靈樞曰脹者皆因厥氣在下寒氣逆上榮氣留止真邪相攻兩氣相摶合而為脹又曰內虛不足中寒濕令人中滿又曰胃中寒則腹滿針經云脹取三陽三陽者足太陽膀胱寒水為脹也此皆以脹為寒也內經曰諸腹脹大皆屬于熱丹溪曰七情內傷六淫外侵飲食不節房勞致虛脾土受傷轉輸失職胃雖受谷不能運化故陽自升隂自降而成天地不交之否清濁相混隧道壅塞濕鬱為熱熱又生濕濕熱相生遂成脹滿經曰鼓脹是也以其外雖堅滿中空無物有似於鼓又名蠱者若蟲侵食有蠱之義是以脹滿為熱也陽熱為邪則身體有熱腹滿而咽乾隂寒為邪則吐不下食脹滿而自利又有榖脹水脹氣脹血脹不可不别失飢傷飽痞悶停酸旦食暮不能食者是為榖脹脾土受濕不能制水水漬於腸胃而溢於肌膚漉漉有聲怔忡喘息是為水脹七情鬱結氣道壅隔上不得降下不得升身腫大而四肢瘦削是為氣脹煩躁漱水迷忘驚狂痛悶嘔惡虛汗厥逆小便多大便黑婦人尤多見之是為血脹又有五臟六腑之脹出靈樞脹論萹全文在醫旨緒餘靈樞曰心脹煩心短氣卧不安肺脹虛滿而喘咳肝脹脅下滿而痛引小腹脾脹善􅎪四肢煩悅體重不能勝衣卧不安腎脹腹滿引背央央然腰髀痛胃脹腹滿胃脘痛鼻聞焦臭防於食大便難大腸脹腸鳴而痛濯濯冬日而重感於寒則餐泄不化小腸脹小腹䐜脹引腰而痛膀胱脹少腹滿而氣癃三焦脹氣滿於皮膚中輕輕然而不堅膽脹者脅下痛脹口中苦善太息大概有虛實之辨實者腹中常脹外堅內痛按之不陷法當踈利虛者時脹時減虛氣留滯按之則濡法當以溫藥和之又有五積久而成脹滿者有外感寒邪傳入於裏寒變為熱作胃實而脹滿者有痎瘧久而成脹滿者治療之法在體認詳明按而治之可也久病羸乏變為脹滿喘息不得及腫脹而肌肉崩潰足脛流水唇黑缺盆平臍突背平足心滿此數者皆為五臟損敗不治之症也陳無擇曰脹滿皆臟氣不平勝乘相因為病如怒傷肝肝尅脾脾氣不正必脹于胃名曰勝尅怒乘肺肺氣不傳必脹於大腸名曰乘尅丹溪戒云醫家不察虛實急於作效病者苦于脹急喜行利藥以求通快不知寬得一日半日其腫愈甚病邪深矣真氣傷矣脈訣舉要曰脹滿脈弦脾制於肝洪數熱脹遲弱隂寒浮為虛滿緊則中實浮則可治虛則危急丹溪云宜大補中氣行濕此乃脾虛之甚必須近音樂斷厚味大劑人參白术佐以陳皮茯苓蒼术之類有脈實堅人壯盛者或可攻之便可收補用參术為主凡補氣必帶厚朴寬滿以其味辛能散其結也須用薑汁製之肥胖人初脹未久以胃苓湯服如靣白人腹脹是氣虛宜參术厚朴陳皮如瘦人腹脹是熱宜黃連厚朴香附白芍如因有故蓄血而腹脹者宜抵當丸下死血如因有食積而腹脹有熱者用木香檳榔丸有寒者用木香厚朴丁香砂仁神麯香附如因外寒束內熱而腹脹者用藿香麻黃升麻乾葛桂枝因大怒而腹脹者宜青皮陳皮香附木香梔子仁蘆薈實者按之堅須下之次消之次補之虛者溫之升之補之朝寬暮急血虛暮寬朝急氣虛終日急氣血俱虛腹脹不寬滿者食肉多用黃連一兩阿魏半兩醋浸􅔻餅為丸同溫中丸白术湯下食肉多三補丸料內加香附半夏麯蒸餅糊丸服鼓脹説生生子曰脹滿之疾榖食不消小便不利腹皮脹急而光內空空然如鼓是矣俗知謂之鼓脹不察其致之者有由也內經曰脹取三陽三陽者足太陽寒水膀胱經也靈樞經曰下焦溢而為水靈蘭祕典曰膀胱者州都之官津液藏焉氣化則能出矣歷考三書可見小便之不利由下焦原氣虛寒以致濕氣壅遏於膚裡膜外之間不得發越勢必腫滿是腫滿之疾起于下元虛寒也若非溫補下元則小便何能獨利且夫人之胃如釡甑然釡底火旺則熱氣薰蒸甑炊易熟若徒有水而無火則無氣上升物何由熟即此可以例觀矣故治脹滿者先宜溫補下元使火氣盛而濕氣蒸發胃中溫暖穀食易化則滿可寬矣夫清氣既升則濁氣自降濁氣降則為小便也小便利脹有不消乎語謂地氣上為雲天氣下為雨惟此氣流水斯為雲為雨也今之醫者一遇此疾則曰內經有言諸濕腫滿皆屬脾土土虛則濕停濕停則滲透肌膚遍身腫滿不可不通利也輟用利小便及補中之劑如五苓散胃苓湯加木通車前子大腹皮滑石之類法未為爽謬不然顧服之愈多而小便愈少腫脹愈急何故哉不溫補下元而徒以通利之藥施之也果若此豈惟不效則下元益虛真氣益弱死期且至安望其有瘳乎余嘗究心靈素參會易理憬然有得於中且施之病者隨試輟效故筆之於册以公我之同志補壯原湯于後治氣脹之劑平肝飲子専治喜怒不節肝氣不平邪乘脾胃心腹脹滿頭運嘔逆脈來浮弦防風桂心枳殼赤芍桔梗炒各一兩人參甘草炙檳榔當歸酒洗川芎陳皮各五錢每服五六錢薑五片水煎服紫蘇飲子治憂思過度致傷脾胃心腹膨脹喘促煩悶腸鳴氣走漉漉有聲大小便不利脈虛緊而澀方在痞門調中順氣丸治怒氣傷肝三焦痞滯水飲停積脅下虛滿或時刺痛木香白豆仁青皮橘紅三稜炮各一兩半夏泡大腹子各二兩砂仁檳榔沉香各五錢糊丸梧子大每服三五十丸陳皮湯下木香順氣湯治濁氣在上則生䐜脹及七情所傷陳皮厚朴各四分川歸五分草豆蔲麵煨去皮木香蒼术米泔洗各三分青皮益智仁白茯苓澤㵼半夏泡乾生薑吳茱茰升麻柴胡各二分加薑水煎服直指橘皮湯治七情所傷中脘不快腹脅脹滿香附米半夏橘紅各二兩甘草七錢半每服一兩薑五片棗二枚水煎服四製枳榖丸治腹脹鼓疾陳枳殼去穰四兩分四製同一兩用蒼术一兩同炒一兩乾漆一兩炒一兩用茴香一兩同炒一一兩用蘿苩子兩同炒以炒枳殼黃色為度去同炒藥只用枳壳為末却將蒼术等四味煎湯去渣打麵糊為丸梧子大每服五十丸米飲湯吞下烏藥順氣散脹滿痞塞七情憂思所致此方如神天台烏藥香附沉香砂仁橘紅半夏為末每服二錢燈心湯調寬中八寶散治同前方木香歸尾蘿蔔子真蘇子檳榔砂仁各一錢半沉香牙皂各一錢共為末每服一錢或二錢黃酒調下小水不利并水腫加苦葶藶子末一錢五分螻蛄後假炙末一錢入前方內治寒脹之劑大正氣湯治脾胃虛寒外為風寒濕氣擾動心腹脹滿藿香厚朴陳皮半夏白术各二錢半檳榔桂枝枳殼乾薑炮各一錢三分甘草炙五分分作二帖薑三片水煎服大半夏湯治肝氣大盛尅勝於脾脾鬱不行結聚涎沫胃中脹滿其脈弦遲半夏桂心各五兩附子炮人參甘草炙厚朴川歸茯苓枳實各二兩川椒炒去汗用開口無目者八百粒每服四五錢薑棗煎服沉香降氣湯治中脘脹滿時吐脅疼每噫則覺氣快不噫則悶漸覺靣浮磨檳榔入紫蘇同煎下神保丸五七粒香附一兩沉香五分砂仁二錢粉草三錢右為末每服一錢入鹽少許沸湯服神保丸治諸寒積脹滿急痛大便不利木香胡椒一錢全蝎七個巴豆十粒去皮心研右為末􅔻餅丸麻子大硃砂為衣每服五丸腰脅疼痛茴香酒下餘陳皮湯下順氣木香散治氣不升降嘔逆惡心胸脅痞悶脅肋脹滿及酒食所傷噎食吞酸心脾疼大便不調及婦人血氣刺痛一切冷氣服此寬中利氣和胃進食丁香砂仁良薑桂心乾薑炮甘草炙橘紅厚朴蒼术桔梗茴香炒各三兩每服五七錢加薑棗水煎服蓽澄茄丸治痞滿脹痛榖脹氣脹通用蓽澄茄白豆蔲砂仁青皮蘿蔔子木香各二分肉豆蔲茴香炒丁香桂各一分半陳皮三分右為末麵糊丸梧子大每服三十丸陳皮湯吞下導氣丸治諸痞塞腹脹如鼓大便祕結等症又腎氣小腸氣痛功效尤捷青皮水蛭等分同炒去水蛭莪术虻蟲等分同炒去虻蟲檳榔斑貓同炒去斑貓胡椒茴香同炒去茴香三稜乾漆炒去乾漆吳茱茰黑丑同炒去黑丑赤芍藥川椒同炒去川椒石菖蒲桃仁同炒去桃仁乾薑䃃砂同炒去䃃砂大附子青鹽同炒去青鹽右十味為末酒糊為丸梧子大每服五十丸加至七十丸紫蘇湯下沉香飲治腹脹氣喘坐卧不安沉香木香枳殼各五錢蘿蔔子炒一兩每服五錢薑三片水煎服木香化滯湯破滯氣心腹滿悶甘草炙白檀香藿香陳皮桔梗大腹皮茯苓白豆仁各二分砂仁人參青皮檳榔木香薑黃白术各四分水煎服縮砂飲治氣脹氣蠱等病如神蘿蔔子研汁砂仁不拘多少以蘿蔔子汁浸透炒乾又浸又炒不厭次多愈多愈妙為細末每服一錢米飲下四炒丸治年髙人患鼓脹獨只腹脹肢體如柴舉動乏力木香檳榔各一兩五錢二味銼如芡實大四製一分用蘿蔔子一兩同炒深黃色去蘿蔔子不用一分用乾漆一兩炒煙盡去漆一分用茴香一兩炒深黃色去茴香一分用莪术一兩炒黃色去术右只留木香檳榔為末以四味同炒藥煎湯打糊為丸菉豆大每服七八十丸米飲下中滿分消湯治中滿寒脹寒疝大小便不通隂躁足不收四肢厥冷食入反出下虛中滿腹中寒心痞下寒沉厥奔豚益智仁半夏木香茯苓升麻各七錢五分川烏人參青皮當歸生薑柴胡乾薑黃連蓽澄茄各五錢黃茋吳茱茰草豆蔲厚朴各五錢右每服一兩水煎溫服大忌房勞濕麵生冷一方有麻黃澤㵼各二錢五分黃柏五分錢氏塌氣丸胡椒一兩蝎梢半兩為細末麵糊丸如粟米大每服五七丸至一二十丸陳米飲下木香塌氣丸治單腹脹丁香胡椒各二錢蝎尾半兩枳實一兩白牽牛一兩郁李仁四錢木香檳榔各半兩為末飯丸菉豆大每服十丸至十五丸陳皮生薑湯任下木香散治魚腹脹木香青皮白术薑黃草豆蔲各半兩阿魏蓽澄茄各一兩右末醋糊丸菉豆大每服二十丸生薑湯下又方治鼓氣大癩蝦蟆一隻新瓦二片相合鐵線纒定盛在內外用鹽泥固濟慢火煆存性為末溫酒調服下三五錢治熱脹之劑中滿分消丸治中滿鼓脹氣脹大熱脹水脹人參白术薑黃黃芩黃連半夏炮枳實麩炒各五錢甘草炙豬苓各一錢茯苓砂仁乾生薑各二錢厚朴薑製一兩知母炒四錢澤㵼橘紅各三錢右研茯苓澤㵼生薑各為末餘共為末和勻􅔻餅為丸梧子大每服百丸白湯吞下沉香交泰丸治濁氣在上而擾清陽之氣鬱而不伸為䐜脹沉香白术橘紅各三錢茯苓澤㵼枳實去穰炒吳茱茰湯洗當歸酒浸青皮去白木香各一錢大黃酒浸一兩厚朴薑製五錢湯浸􅔻餅為丸梧子大每服七八十丸白湯下微利即止廣茂潰堅湯治中滿腹脹內有積塊堅硬如石令人坐卧不安大小便澀滯上氣喘促遍身虛腫厚朴黃芩益智草豆蔲當歸各五錢吳茱茰紅花酒洗升麻廣茂各二錢甘草柴胡澤㵼神曲炒陳皮青皮各三錢黃連六錢半夏七錢每服七錢薑三片水煎服渴者加葛根四錢雞屎醴飲治鼓脹旦食暮不能食痞滿壅塞雄雞屎臘月取晒乾一兩川芎一兩二味各為極細末和勻麵糊丸梧子大每服五十丸溫酒下又方加大黃一兩每服二錢薑湯下推氣丸治三焦痞塞氣不能降胸脅脹滿大便祕小便赤陳皮檳榔枳實黃芩大黃黑丑生等分為末蜜丸梧子大每服五七十丸臨睡白湯下大異香散治榖脹失飢傷飽痞悶停酸早食暮不能食陳皮青皮京三稜莪术益智仁香附子藿香半夏曲桔梗各五錢枳殼五錢甘草炙三分每服五六錢薑棗煎服木香分氣丸善治脾胃不和心腹脹滿兩脅膨脝胸膈注滿痰嗽喘急刺心乾嘔咽喉不利飲食不化並皆治之亦治榖脹木香檳榔青皮莪术煨當歸黃連白术枳殼麩炒橘紅肉果乾生玄胡索京三稜煨赤茯苓秋冬加丁香炒各等分為末麵糊丸小豆大每服三五十丸生湯下忌生冷茄子馬齒莧補下元之劑壯原湯治下焦虛寒中滿腫脹小水不利上氣喘急隂囊兩腿皆腫或靣有浮氣人參白术各二錢茯苓破故紙各一錢桂心大附子乾薑砂仁各五分陳皮七分水煎食逺服有痰加半夏一錢喉中痰聲加桑白皮一錢咳嗽亦加腳趺靣腫加薏苡仁二錢中氣不轉運不知餓加厚朴木香氣鬱不舒加沉香烏藥臨服磨入氣虛甚者人參加作五錢大附子加作一錢半汗多者再加桂枝五分白芍藥酒炒過八分若夏月喘乏無力或汗多者加麥門冬一錢五味子十一粒夜夢不安者加逺志一錢兩脅氣硬加白芥子八分若靣浮腫脅下氣硬加白芥子紫蘇子五分若身重不能轉動加蒼术一錢澤㵼七分濕盛加桑白皮赤小豆治血脹人參芎歸湯治小便多大便黑痛悶喘惡名曰血脹當歸半夏三分川芎一兩莪术煨甘草炙木香砂仁烏藥各五錢人參桂五靈脂炒各一分每服三五錢紫蘇葉四片薑五片棗一枚水煎服一方治血鼓腹脹如盆三稜煨莪术乾漆炒煙盡牛膝去蘆酒洗虻蟲糯米炒琥珀肉桂硇砂水蛭石灰炒赤大黃各等分為末用生地黃自然汁和米醋調勻為丸梧子大每服十丸空心溫酒下童便下亦可雞屎醴散治旦食暮不能食血脹痞滿大黃桃仁去皮尖乾雞屎醴等分為末每服一錢生薑三片煎調食後臨睡服治積塊不消發為脹滿之劑治五蠱脹丸忌鹽四十日官桂歸尾橘紅檳榔枳壳炒莪术炒三稜炒大黃酒煮青皮黑丑君白商陸君芫花君大戟甘遂去心麵包煮赤小豆椒目木香砂仁乾漆炒煙盡君枳實炒酒糊為丸梧子大初服三日每服九十丸過三日服八九十丸又過三日服七十丸每用蔥七根煎湯送下空心服以行四五次為度行後以溫粥補之不行而吐者亦妙次用補法補方青皮桔梗莪术三稜枳實枳壳木香砂仁茯苓檳榔陳皮芍藥細辛歸尾人參香附等分每服四五錢水煎服須要過四五十日後方許食鹽醬食鹽用藥法鯽魚去腸將五苓散末入魚腹中焙乾為末白湯調服方許食鹽已上三方乃一宗方極峻利非積固體厚者未敢謾試姑録此以偹恭考溫白丸治心腹積聚心下堅結大如杯碗傍攻兩脅心痛食不消化桔梗柴胡菖蒲紫苑黃連乾薑桂皮茯苓川椒吳茱茰巴豆去皮心膜去油炒人參厚朴各五錢川烏炮二兩五錢皂莢去皮子炙五錢右為末入巴霜和勻煉蜜為丸梧子大每服三十丸紫蘇湯下取下積滯如魚腦爛綿而安小檳榔丸治脾虛腹脹不進飲食快氣寬中蘿蔔子炒檳榔煨黑丑炒木香各五錢為末麵糊丸梧子大每服三四十丸薑湯下治蠱脹將愈內有痞塊用此消之青皮枳壳三稜莪术蒼术厚朴桂皮香附各一兩砂仁草果針砂白芷各五錢烏藥乾漆乾薑各一兩歸尾一兩半檳榔一兩木香二錢半阿魏一錢一方有録礬一斤陳皮一兩為末棗肉丸梧子大每空心好酒吞下五十丸漸加至二錢治脾虛之劑強中湯治痰生冷過飲寒漿有傷脾胃遂成腹脹心下痞滿有妨飲食甚則腹痛乾薑炮白术各二兩青皮去白人參丁香各三兩草果仁附子泡去皮臍厚朴薑製五錢甘草炙五錢每服四五錢薑棗煎服嘔者加半夏如食麵腹脹加蘿蔔子各五錢溫胃湯治憂思鬱結脾肺氣凝大腸與胃氣不平脹滿沖咳食不得下脈虛而緊澀附子炮歸尾厚朴生人參陳皮白芍甘草炙各一兩乾薑兩二錢半川椒二錢半炒每服五六錢水煎服草豆蔲湯治腹中虛脹澤㵼一分木香三分神麯四分半夏枳實益智草豆䓻黃茋春夏不用甘草各五分青皮陳皮各六分茯苓當歸各七分生薑三片水煎服冬再加黃茋五七分通氣生薑丸治三焦虛脹人參茯苓神麯炒麥芽炒各兩半官桂歸尾陳皮炒六兩半夏洗一兩生薑去皮切六兩厚朴六兩右為末以生薑汁煮麵糊為丸梧子大每服三十丸空心食前米飲下治脹而喘嗽之劑定喘葶藶丸治鼓脹喘嗽葶藶木香貝母等分為末􅔻餅糊丸梧子大硃砂為衣煎桑白皮湯下或即以四味為末仍以桑白皮湯下尤妙附雜方敷藥治腹硬如石或隂囊腫大先用熟水煎甘草後以藥敷肚上大戟芫花甘遂海藻各等分為末醋調塗或用白麵調藥敷肚上慰法治腹脹如鼓澀如木皮樣杜烏藥并葉荆芥蒼术菵草山茵陳二蠶沙松毛橘葉椒目烏頭赤豆樹葉藠各等分作二次炒熟以布袋盛尉之冷又炒尉三四十度或復用煎水薰洗或服神保丸微溏泄其氣獨聖散治脾胃不足過食生冷心腹痛脹鹽五合以水一升煎化頓服自然吐即定食麵多腹中飽脹以熱酒和生薑汁飲一二杯即消桂香丸治大人小兒過食雜果腹脹氣急肉桂不見火一兩麝香另研一分為末飯丸菉豆大小兒七丸大人十五丸白湯下二三服神效西來方治腹中積塊作脹作痛大小便不利硼砂二錢苦葶藶子海金沙各三錢乳香一錢半沒藥牙皂各錢半檳榔陳皮三稜各二錢莪术二錢半木香一錢共為末每服五分滚水調下蟲蠱生生子曰按鼓症內經靈樞水脹萹只有水與膚脹鼓脹腸覃石瘕石水六者又脹論萹載五臟六腑皆有脹狀甚著後代諸書論脹鮮有發明豫在吳下時有同志友吳生諱震號九宜者慱雅君子也每與豫討論多善豫一日偶談及鼓脹乃詰豫曰鼓有蟲否乎豫卒不敢應俯思久之對曰或有之當以疑辭對者蓋以目未見而書無考也按許學士本事方云臍腹四肢悉腫者為水但只腹脹而四肢不甚腫者為蠱注謂蠱即鼓脹也由是參之古人曾以蠱脹同名矣且蠱以三蟲為首豈無旨哉愚謂鼓脹即今云氣虛中滿是也以其外堅內空腹皮綳急有似于鼓故以鼓脹名也彼蠱症者中實有物積聚已久濕熱生蟲理或有之吳生曰子質何其敏也豫堂嫂病鼓三載腹大如箕時或脹痛四肢瘦削三吳名劑歷嘗不瘳吳俗死者多用火葬燒至腹忽響聲如炮人皆駭然乃見蟲從腹中炮出髙二三丈許燒所之天為昏俄而墜地細視之皆蛔也不下千萬數大者長尺餘蟲腹中復生小蟲多者十五六條或十數條或五六條蟲在人腹中蕃息若此曷不令人脹哉區區藥劑豈易瘳哉顧蠱以多蟲為首于義始見許之以蠱名鼓者旨可徴矣惜乎諸書未有言及子既為後人立言幸繹數方以偹後之治鼓疾者知有此蠱字義也豫聞之恍然如夢始覺然猶未親見其異也嵗萬厯癸巳赴督漕理刑吳比部之召而至淮隂有王鄉宦者其子年十六新娶後腹脹大按之有塊形如稍瓜四肢瘦削發熱晝夜不退已年半矣族醫惟以退熱消腫之劑投之其脹愈大其熱愈熾甚且喉中兩耳俱瘡余診視之脈滑數望其唇則紅其腹則疼又多嗜肥甘余思諸凡腹疼者唇色淡不嗜飲食今若此得非蟲乎投以阿魏積塊丸服之果下蟲數十大者二一紅一黑長尺餘蟲身紅線自首貫尾蟲腹中有蟲大者數條小者亦三四條蟲下則熱漸減脹漸消三下而愈此余所親治者益信前聞之不虛也世之竒症書所未載者大率類此胡可以未聞未見者而輕議之也余因紀其聞見贅其方於鼓症之末治蟲蠱之劑八毒赤丸治男婦染著神鬼謂之鬼疰病服之甚效治蟲積蠱脹如神雄黃另研礬石硃砂另研牡丹皮附子炮藜蘆巴豆各一兩蜈蚣一條右為末煉蜜丸如小豆大每服五七丸至十丸冷水送下無時昔有副使許可道至雄州請醫看脈乍大乍小乍短乍長氣血不均邪氣傷正本官説去路至邯鄲驛中夜夢一婦人著青衣不見靣用手于脅下打了一拳遂一點痛往來不止寒熱不食乃鬼驚也可服八毒赤丸本官言讀名醫録中看李子豫八毒赤丸為殺鬼杖子遂與藥三粒臨卧服明旦下清水二斗立效製藥時宜志誠齋戒紫金丹治蟲蠱并蟲積大黃檳榔各三兩半蒼术貫仲牙皂香附各三兩三稜雷丸黑丑各二兩史君子一兩半白蕪荑苦楝根皮各二兩半右為末每服三錢五更時沙糖湯調服至天明下蟲積不問黃腫鼓脹心痛一服即效小兒減半看大小輕重又方治同黑丑五靈脂好酒煮檳榔各五錢大黃一兩阿魏二錢桃仁去皮尖研如泥不拘分兩但可丸為率右為末以桃仁膏為丸梧子大每服二錢白湯送下積塊丸治癥瘕積聚癖塊一應難消難化腹中飽脹或蟲積疼痛皆能取效若神不傷元氣京三稜莪术各用醋煨自然銅蛇含石各燒紅醋淬七次二錢雄黃蜈蚣全用焙燥各一錢二分辰砂八分木香一錢半鐵華粉用糯米醋炒一錢蘆薈天竺黃阿魏全蝎洗全用焙乾各四錢沉香八分氷片五分右為極細末用雄豬膽汁煉為丸黑狗膽汁尤妙丸如梧桐子大或服七八分重者一錢五更酒送下塊消即止不必盡劑痞氣門內經曰大隂所至為積飲痞隔痞者心下痞滿而不能食也仲景云滿而不痛為痞滿而痛為結胸劉河間曰痞與否同不通泰也謂精神營衛血氣津液出入流行之紋理閉密而為痞也東垣曰脾無積血不痞夫痞者心下滿而不痛是也太隂者濕土也主壅塞乃土來心下為痞滿也傷寒下太早亦為痞乃因寒傷其營營者血也心主血邪入於本故為心下痞悶仲景立㵼心湯數方皆用黃連以㵼心下之土邪其效如響應桴故活人書云審知是痞先用桔梗枳殼湯非以此専治痞也蓋因先從錯下必成痞症是邪氣將陷而欲過胸中故先用截散其邪氣使不致于痞先之一字早用之義也若已成痞而用之則失之晚矣不惟不能消痞而反損胸中之正氣則當以仲景痞藥治之經云察其邪氣所在而調治之正謂此也非止傷寒如此至于酒積雜病下之太過亦作痞蓋下多亡隂亡隂者謂脾胃水榖之隂亡也故胸中之氣因虛下陷于心之分野故至心下痞宜升胃氣以血藥兼之若全用氣藥治之則其痞益甚甚而復下之氣愈下降必變為中滿鼓脹皆非其治也又有虛實之殊如實痞大便閉者厚朴枳實湯主之虛痞大便利者白芍陳皮湯主之如飲食所傷痞悶者當消導去其胸中窒塞上逆兀兀欲吐者則吐之所謂在上者因而越之是也王海藏曰治痞獨益中州脾土以血藥兼之其法無以加矣傷寒痞者從血中來雜病痞者亦從血中來雖俱為血症大抵傷寒之症從外至內從有形至無形故無形氣症以苦泄之有形血症以辛甘散之中滿者勿食甘不滿者復當食也中滿者腹脹也如自覺滿而外無腹脹之形即非中滿乃不滿也不滿者病也當以甘治之可也綱目云無形氣症以苦泄之者枳實黃連之類是也有形血症以辛甘散之者仲景人參湯之類是也劉宗厚曰痞之為病由隂伏陽蓄氣血不運而成處心下位中央腹滿痞塞皆土之病也與脹滿有輕重之分痞則內覺痞悶而外無脹急之形脹滿則外有形也前人所論皆指悮下而致之亦有不因悮下而然者如中氣虛弱不能運化精微則為痞飲食痰積不能施化則為痞濕熱太盛土乘心下則為痞既痞與濕同治惟上下分消其氣如果有內實之症庶可略與踈導世人痞塞喜行利藥以求速效暫時通快痞若再作益以滋甚是不察夫下多亡隂之意也統旨曰痞有虛實之殊而又有濕有熱有痰有鬱有風寒不消有脾胃虛弱有飲食過傷者當求所因而分治之如實痞大便閉以黃連枳實厚朴苦以泄之虛痞大便利以芍藥陳皮酸以收之濕者四肢困重小便短少宜蒼术茯苓半夏滑石澤㵼以滲之鬱者則流滯不通食難消化宜撫芎香附蒼术枳實以開之熱則煩渴溺赤用黃連黃芩葛根升麻以發之便結者即而利之痰則胸中窒塞用半夏瓜蔞枳實黃連以豁之欲吐者因而越之飲食後因冒風不消而痞宜吳茱茰砂仁草豆蔲藿香溫以化之脾胃弱而轉運不調為痞宜四君子湯等甘以補之飲食過傷則腹飽噯氣而致痞塞者又當以青皮枳實厚朴山查麯蘖以消導之至於痰挾血成窠囊而痞者用桃仁紅花香附大黃之類若脈右關多弦弦而遲者必心下堅此肝木尅脾土鬱結涎閉於臟腑氣不舒則痞木香順氣湯如下多則亡隂而痞者四物加參苓白术升麻柴胡少佐以陳皮枳殼監制或大病後元氣未復而痞補中益氣湯加陳皮凡此痞滿不可執全在活法詳脈證虛實而治之也劉河間曰三隂三陽之標本治各不同有用寒藥而為熱痞大黃黃連之類也有用寒熱藥者隂與陽不和而痞大黃黃連加附子之類也有用辛熱藥多而寒藥少者隂盛陽虛而痞半夏生薑甘草㵼心三方之類㵼心湯者非㵼心火之熱乃㵼心下之痞也通而論之其藥陽多而隂少蓋病發于隂而得之有大黃黃連㵼心湯獨為隂心下痞而脈疾一證桂枝後用從太陽浮弱所變餘皆隂陽雜用直格云傷寒裏之隂分已受熱邪是病發于隂也或熱微而下證未全誤下之早則裏熱除去表熱乘虛入裡而作痞也故仲景攻痞多用大黃黃連黃芩寒藥爾後或加乾薑附子之類者是以辛熱佐其寒藥欲令開發痞之怫熱結滯也非攻寒耳劉宗厚曰河間論㵼心湯分隂陽寒熱多少而用藥可謂詳切矣而此論則専主於熱二者似乎不同要之各有所當蓋直格是言其受病之本河間是論其用藥之標若以為痞有隂寒之症耶則仲景㵼心五方何皆用黃芩黃連之類若以為痞無隂陽之異耶何㵼心湯又有兼用附子乾薑半夏生薑之類者也一言其本一言其標而已治熱之劑仲景大黃黃連㵼心湯治心下痞按之濡其脈關上浮或寸沉關浮而有熱者大黃二兩黃連一兩右銼以麻沸湯漬之須臾絞去渣分溫冉服劉宗厚云此少隂經藥也出陽明例成無已云大黃黃連以導㵼心下之虛熱以麻沸湯漬服者取其氣薄而泄虛熱也又按伊尹湯液論大黃黃連黃芩湯共三味今監本無黃芩脫落之也又保命集無黃芩加甘草一兩散寒㵼熱之劑仲景附子㵼心湯治心下痞而復惡寒汗出脈沉遲也大黃二兩黃連黃芩各一兩附子一枚炮去皮臍别取汁右銼以麻沸湯浸之須臾絞去渣內附子汁分溫再服半夏㵼心湯治汗下後身寒痞滿而嘔飲食不下脈微按之不痛非柴胡症半夏半升泡黃芩乾薑人參各三兩黃連一兩大棗十二枚甘草炙二兩右七味以水一斗煮取六升去渣再煮取三升溫分三次服生薑㵼心湯治汗下後胃中不和乾噫食臭自利腸鳴脅下有水氣而心下痞滿即半夏㵼心湯加生薑四兩乾薑只用一兩甘草㵼心湯治下之後腹中雷鳴心下痞硬再下之痞益甚此非結熱以胃中虛客氣上逆也即半夏㵼心湯去人參甘草加作四兩劉宗厚云以上諸㵼心湯元戎云手少隂藥也以其心下痞故入陽明例况服梔子黃芩黃柏大黃為上下通經之劑安得不例陽明乎祕藏大消痞丸治一切心下痞悶及積年久不愈者黃連炒黃芩各六錢薑黃白术各一錢甘草炙砂仁乾生薑神麯炒各一錢人參二錢枳實炒五錢橘紅二錢澤㵼三錢厚朴製二錢豬苓一錢半半夏四錢右為末􅔻餅糊為丸梧桐子大每五十丸漸加至百丸白湯送下枳實消痞丸治右關脈浮弦心下虛痞惡食懶倦開胃進食枳實黃連各五錢乾生薑二錢厚朴製四錢人參白术半夏麯甘草炙各三錢茯苓二錢大麥麵二錢右為末􅔻餅糊丸梧桐子大每服五六十丸白湯送下失笑丸少茯苓治同劉宗厚云以上二方並半夏㵼心湯加減法也內有枳實湯四君子五苓平胃等利􅊜消痞補虛之藥也溫中散飲之劑枳實理中丸治中脘痞滯氣不宣通積寒停飲食不消化人參乾薑炮白术枳實甘草炙各一兩右為末煉蜜丸如雞子黃大每服一丸細嚼白湯下或沸湯化下活人書有茯苓理氣之劑活人桔梗枳殼湯治傷寒痞氣胸滿欲絶桔梗枳殼去穰炒各三兩右銼水煎分作二服此手太隂經藥也活人書云審知是痞先用此湯無不驗也緣枳壳行氣下膈故效海藏云活人用此非治痞也審知錯下必成痞是氣將陷于胸中故先用此使不致于痞也若已成痞復而用之則失之晚而胸中之氣愈痞矣先之一字預早之意也宣明檳榔散治傷寒隂症下後成痞滿而不痛按之虛軟檳榔枳殼等分為末每服三錢煎黃連湯調下寶鑑三脘痞氣丸治三焦痞滯水餘停積脅下虛滿木香白豆仁青皮炒京三稜炮半夏橘紅檳榔砂仁沉香各五錢大腹皮一兩為末麯糊丸梧桐子大每服五六十丸食後陳皮湯送下東垣木香消痞丸治因憂思氣結中脘腹皮厚微痛心下痞滿不思飲食木香紅花乾薑各五錢柴胡四錢橘紅三錢當歸尾二錢半夏甘草炙各一兩為末􅔻餅糊丸菉豆大白湯送下七八十丸七氣湯治憂思鬱結心腹悶方見氣門兼治濕熱之劑東垣黃連消痞丸治心下痞滿壅塞不散煩熱喘促不寧黃連黃芩澤㵼各一兩枳實炒半夏各七錢乾薑二錢白术茯苓甘草炙各三錢薑黃一錢豬苓右為末􅔻餅糊為丸梧桐子大每服五七十丸食前白湯下蘇橘飲治氣壅發虛浮腫甚效陳紫蘇十四業全陳皮二片砂仁六枚甘草六寸生薑十片棗五個右水煎服紫蘇飲子治憂思傷脾心腹膨脹喘促胸滿腸鳴氣走漉漉有聲大小便不利脈虛緊而澀蘇子一兩木通半夏厚朴木香草果陳皮枳實人參白术粉草大腹皮各五錢每服五錢薑棗煎服陳橘皮散治腹內諸痞脹橘紅紫蘇大腹皮各一兩漢防己五錢木香五錢檳榔木通赤茯苓各三分每服五錢加薑煎服雜治東垣木香消痞湯治因憂思鬱結中脘腹皮急微疼心下痞滿不思飲食食亦不化常覺痞悶柴胡木香各七分半夏生薑枳實各一錢陳皮八分甘草炙五分歸尾二錢草豆仁一錢紅花少許水煎食前熱服忌酒麵等物王海藏云少隂下痢靣赤心下痞㵼心湯加減例易老單用黃連㵼心湯用錢氏法後隨證加減煩者加山梔燥者加香豉嘔加半夏滿加枳實厚朴腹疼加芍藥脈遲加附子下焦寒加乾薑大便硬加大黃如用薑附先煎令熟使熱不僣後加黃連同用內傷之劑枳术丸治痞消食強胃枳實去穰麩炒黃色一兩白术二兩為末以荷葉裹燒飯為丸梧桐子大每服五七十丸橘紅枳术丸治老而元氣虛弱飲食不消臟腑不調心下痞悶前方加橘紅一兩古庵橘連枳术丸補脾和胃㵼火消痰即前方再加薑黃黃連一兩平補之劑平補枳术丸調中補血氣消痞清熱白术三兩白芍酒炒一兩半陳皮枳實去穰炒黃連薑汁炒各一兩人參木香各五錢右為末荷葉打米糊丸梧桐子大每服六七十丸米飲下古庵云白术補脾氣為君白芍藥補脾血為臣陳皮以和胃枳實消痞黃連清熱為佐人參以補元氣木香以調諸氣為使如此平補氣血均去痰火兼通氣道則病邪日消而脾胃日壯矣丹溪云心下痞須用枳實黃連此亦是苦以泄之攻補兼施之劑東垣黃茋補中湯脾虛不能滲濕內痞外浮人參八分黃茋甘草白术蒼术陳皮各五分茯苓豬苓澤㵼各三分水煎溫服送下大消痞丸補中益氣湯治中氣虛心下痞脈緩有痰而痞加半夏黃連脈弦四肢滿閉便難心下痞加柴胡黃連甘草大便祕燥加黃連桃仁少加大黃歸身心下痞悶者加白芍藥黃連心下痞腹脹加五味子白芍藥砂仁天寒月加乾薑或肉桂心下痞中寒者加附子黃連心下痞嘔逆者加黃連生薑陳皮假如冬月冉加黃連入丁香藿香葉能食而心下痞加黃連五分枳實三錢如不食心下痞者勿加止照本方服之食已而心下痞别服橘皮枳术丸治痰之劑濟生瓜蔞實丸治胸膈痞痛徹背脅脹喘急妨悶瓜蔞實研枳實去穰麩炒半夏桔梗各等分為末薑汁打糊為丸梧子大每服五七十丸食後淡薑湯下按此方瓜蔞以潤肺降痰枳壳破滯氣半夏豁痰燥􅊜桔梗開膈載藥可謂善治痞悶喘急矣然痰因火動者加黃連尤妙蓋黃連佐枳壳消痞甚速赤水元珠卷五
