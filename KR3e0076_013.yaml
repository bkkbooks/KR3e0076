body:
  text: 赤水元珠卷十三眀孫一奎撰內傷門茲以傷飲傷食為一門而勞心竭力不足之症則節抄東垣脾胃論附之傷飲傷食生生子曰傷飲傷食之症多是有餘當另標一門不當與內傷門混治何者夫內傷二字乃病機總辭凡諸勞心勞神耗竭精氣及損傷營衛臟腑筋骨血脈莫不皆內傷病也故古人有五勞七傷之謂斯為不足之疾證多類似東垣內外傷辨惑已詳之矣夫有餘當消不足當補天壤懸絶症涉疑似而又溷為一門恐初學於有餘中之不足不足中之有餘及純有餘純不足之證茫無分别則用藥未免有虛虛實實之悮豫故所以另標為一門庶幾易於尋治也且也此證所患甚多緊關妙處只三節隨輕重緩急治之百發百中初食傷之時填塞胸膈脹滿疼痛急宜用吐法吐而出之緣食未入於胃停積膈間吐之甚易經謂在上者因而越之是也食已下膈入胃則不可用吐法强吐之亦不能盡出又不宜遽用下藥下之早則傷中氣胃既為飲食所傷又復能受藥之傷乎而清純沖和之氣并為之下陷故曰雜病酒積下之早亦作痞氣惟當健脾消導俟其盡入大腸而痛在臍腹乃可用下法下之經謂在下者引而竭之是也是皆順其勢而利導之殊易為力故治亦無所悮也東垣曰隂陽應象論云水穀之寒熱感則害人六腑痺論云隂氣者靜則神藏躁則消亡飲食自倍腸胃乃傷此乃混言之也分之為二飲也食也飲也者水也無形之氣也因而大飲則氣逆形寒飲冷則傷肺肺病則為喘咳為腫為水㵼輕則當發汗利小便使上下分消其濕解酲湯五苓散生薑半夏枳實白术之類是也如重而蓄積為物也有形之血也如生氣通天論云因而飽食筋胍橫解腸癖為痔又云食傷太隂厥隂寸口大於人迎兩倍三倍者或嘔吐或痞滿或下痢腸澼當分寒熱輕重治之輕則內消重則除下如傷寒物者半夏神麯乾薑三稜廣茂巴豆之類主之如傷熱物者枳實白术青皮陳皮麥孽黃連大黃之類主之亦有宜吐者隂陽應象論云在上者因而越之瓜蒂散之屬然而不可過劑過則反傷腸胃蓋先因飲食自傷又加之以藥過故腸胃復傷而氣不䏻化食愈難消矣漸至羸困故五常正大論云大毒治病十去其六小毒治病十去其七常毒治病十去其八無毒治病十去其九不可過之此聖人之深戒傷飲多以五苓散為主五苓散治飲煩渴飲水過多或水入即吐心中淡淡停濕在內小便不利方見暑門治傷冷飲者煎五苓散送半夏枳木丸治傷飲不惡寒胸中微覺夯悶身重飲食不化者或小便不利者五苓散去桂依前斟酌服之如瘀熱在裏身發黃疸食前濃煎茵陳湯調服愈除濕散傷馬牛乳酪及氷水一切冷物半夏湯炮乾薑各三錢車前子炒澤㵼各五錢甘草炙紅花各二錢茯苓七錢右為細末每服二錢食前白湯調下導飲丸治水飲吳茱萸三錢白茯苓蒼术各一兩黃連五錢獨活七錢右為細末神麯糊丸服丹溪茱萸丸治飲白滑石六兩甘草吳茱萸各一兩水丸服傷酒東垣曰酒者大熱有毒氣味俱陽乃無形之物也若傷之只當發散汗出則愈矣其次莫如利小便乃上下分消其濕今之病酒者往往服酒癥丸大熱之藥下之又有用牽牛大黃下之者是無形元氣受病反下有形隂血乖悮甚矣酒性大熱已傷元氣而復重㵼之亦損腎水真隂及有形隂血俱為不足如此則隂血愈虛真水愈弱陽毒之熱大旺反增其隂火是以元氣消爍折人長命不然則虛損之病成矣酒疸下之早久則為黑疸慎不可犯宜以葛花解酲湯主之王海藏曰治酒病宜發汗若只利小便炎熖不肯下行故曰火鬱則發之以辛溫散之是從其體性也是知利小便則濕去熱不去若動大便尤為疏陋蓋大便者有形質之物酒者無形之水從汗而發之是為近理濕熱俱去故治以苦溫發其火也佐以苦寒除其濕也統㫖曰傷酒惡心嘔逆吐出宿酒昏冒眩暈頭痛如破宜二陳湯加黃連乾葛煎服或沖和湯縮脾湯五苓散用乾葛煎湯調服久困於酒遂成酒積腹痛泄㵼或暴飲有灰酒亦䏻致之並宜酒煮黃連丸多飲結成酒癖腹中有塊隨氣上下沖和湯加黃連蓬术酒停胸膈為痰飲者枳實半夏湯加麯孽用吐法尤妙劉宗厚曰酒者是有形之物即水飲同體也今言無形元氣受病不得傷于有形隂血者蓋謂酒者濕熱之物入胃則臟氣俱熱逐氣升降之際而半有消耗之矣至傷於腸胃則升之不散降之不下鬱於氣分無形之地位故言無形之物非若水飲性體全降於腸胃中也若今人之飲醇酒則便少此其可驗是以傷則宜汗之㵼之不得用重峻下劑蓋此等藥不能入氣分反傷有形隂血耳但斯意隱然使人不能無疑故或有辨之者兹不復具然昔人有用下劑者蓋或有酒飲傷積日久而汗之泄之不䏻愈則重峻下劑而或可哉故用者自宜對症詳審勿以辭害意可也東垣葛花解酲湯飲酒太過嘔吐痰逆心神煩亂胸膈痞塞手足戰搖飲食減少小便不利青皮三分木香橘紅各五分人參茯苓猪苓各一錢神麯炒澤㵼乾薑白术各二錢白豆蔲葛花砂仁各五錢右為細末每服三錢白湯調下但得微汗則酒病去矣此蓋不得已而用之豈可恃此酗飲成病自損元氣惟病酒者宜之丹溪烏梅丸治酒毒化痰消食烏梅一斤半夏白礬各八兩生薑二兩右為細末以新瓦二片夾定火焙三日夜為度次入神麯麥芽陳皮青皮莪术枳殼丁皮大腹子各四兩糊丸每服四五十丸湯下潔古百杯丸酒停胸中膈氣痞滿面色黃黑將成癖疾飲食不進日漸羸瘦如欲飲者先服不醉生薑一斤去皮切片以鹽二兩淹一宿焙乾橘紅乾薑各三兩木香茴香炮各一錢廣茂炮三錢益智仁二十粒丁香五十粒砂仁白豆蔲各三十粒甘草炙三稜炮各二錢右煉蜜丸每一兩作五丸硃砂為衣薑湯嚼下酒煮黃連丸方見下血門濟世方酒積烏梅丸烏梅一兩青木香四錢砂仁五錢巴豆霜一錢半夏麯七錢枳實五錢杏仁三錢黃連一兩酒浸一宿右􅔻餅糊為丸菉豆大每服八丸白湯下傷食生生子曰傷食痛急者用前上中下三法不痛而發熱頭疼痞悶者究其所傷何物寒熱孰多而為之治今收各家方法詳列於後東垣脾胃論中已具者兹不復入但于彼參治可也丹溪曰傷食惡食者胸中有物宜導痰補脾用二陳湯加白术山查川芎蒼术服之憂抑傷脾不思飲食炒黃連酒炒芍藥同清六丸末加香附以薑汁浸蒸餅糊為丸服統㫖曰傷食胸膈痞塞吐逆咽酸噫敗卵臭畏食頭疼發熱惡寒病似傷寒但身不痛氣口脈緊盛治中湯加砂仁或十香丸潔古枳术丸治痞積消食强胃王海藏云本仲景枳术湯也今易老改為丸治老幼虛弱飲食不化或臟腑軟弱者枳實去白麩炒一兩白术二兩右為末荷葉包燒飯為丸桐子大每服五十丸白术湯下服白术者本意不取其食速但久服令人胃氣強食不復傷也麯蘖枳术丸為人強食所致心胸滿悶不快神麯炒麥蘖炒枳實炒各一兩白术二兩右為末荷葉燒飯為丸每服五十丸木香枳术丸破滯氣消飲食開胃木香枳實各一兩白术二兩照上法為丸服又方開胃進食木香三錢人參乾薑各一錢半枳實一兩白术二兩為末照上法為丸白湯吞五十丸檳榔丸消食破滯氣檳榔三錢木香人參各二錢陳皮五錢甘草一錢右蒸餅糊為丸每服五十丸羅太無檳榔木香丸疏三焦寬胸膈破痰飲快意潤腸方在氣門丹溪保和丸治食積酒積山查肉一兩半夏薑製蘿蔔子炒黃連姜汁炒橘紅神麯各五錢麥芽炒三錢右神麯糊為丸每服七八十丸薑湯下大安丸脾經消導之劑山查二兩神麯炒半夏製茯苓各一兩陳皮連翹蘿蔔子炒各五錢白术二兩右神麯糊為丸每服五十丸白术丸治傷豆粉濕􅔇油膩之物白术半夏製神麯枳實各一兩炒橘紅七錢黃芩五錢枯礬三錢右浸蒸餅糊為丸量所傷多寡加減服之如素食多用乾姜故以黃芩㵼之半夏枳术丸治因冷食內傷半夏薑製二兩枳實炒白术各一兩右末荷葉飯為丸一方有澤㵼一兩為小便淋也木香乾薑枳术丸破滯氣消寒飲食木香三錢乾薑炮五錢枳實炒一兩白术二兩右荷葉飯為丸每服五十丸丁香爛飯丸治食傷太隂又治卒心痛胃疼丁香甘草炙三稜炮廣茂炮木香各二錢丁皮新汲水洗净砂仁益智仁各三錢香附五錢右浸蒸餅糊為丸每服七十丸香砂和中湯治飲食所傷脾胃嘔吐胸滿噯噫或胸腹脹疼藿香砂仁各一錢半蒼术二錢厚朴陳皮半夏茯苓青皮枳實麩炒各一錢甘草三分大便㵼去枳實青皮加麥蘖山查水二鍾薑三片煎八分食逺服加味枳术丸白术米泔浸四兩枳實去白麩炒二兩陳皮半夏泡神麯炒麥芽炒山查肉各一兩半如胃寒或冬月加砂仁一兩氣滯不行加木香五錢常有痰火又兼胸膈痞悶加黃連薑汁炒茯苓各一兩右末荷葉飯為丸每服五六十丸化食養脾湯人參白茯苓陳皮半夏神麯炒麥芽炒山查各一錢砂仁八分甘草三分白术一錢半胸膈痞脹甚者加厚朴枳實各一錢胃脘痛加草蔲仁一錢氣滯痰盛者去人參加香附一錢半夏倍之水三鍾薑三片煎八分食逺服祕方思食調中丸脾胃久弱飲食不消氣滯胸膈痞悶嘔逆痰水白术米泔浸二兩人參七錢木香五錢砂仁香附陳皮半夏麯炒神麯炒麥芽炒各一兩甘草炙四錢右末陳米糊為丸梧子大每服百丸白湯下治中湯即理中湯加青皮陳皮十香丸傷飲食胸膈腹疼或氣滯積聚皆可服甘松炒益智仁炒香附子各四兩京三稜二兩莪术二兩青皮陳皮各三兩砂仁一兩半木香甘草炒一兩水浸蒸餅糊為丸梧子大每服五十丸薑湯下枳實半夏湯枳實麩炒半夏泡各五錢薑五片水二鍾煎服治心腹膨脝多食積所致南星薑製半夏薑製瓜蔞仁各一兩半香附童便浸一兩黃連薑汁炒三兩青䝉石煆蘿蔔子炒連翹陳皮各五錢麝香少許右末神麯糊為丸治因􅔇內傷發熱頭痛作吐白术一錢半白芍陳皮蒼术各一錢茯苓黃連人參甘草各五分薑三片口渴加葛根二錢楊氏家藏豆蔲橘紅散溫脾養胃升降隂陽和三焦化宿食丁香木香各一兩人參白豆仁厚朴薑製橘紅神麯炒乾薑炒半夏麯甘草炒霍香白术各五錢每服五七錢薑三片棗一枚水煎服紅丸子溫脾胃消寒冷食積併治冷瘧京三稜莪术陳皮去白青皮去白各五斤乾薑炮胡椒各二斤右末醋煮糊為丸梧子大以礬紅為衣每服二十丸食後薑湯下消食化氣香殼丸醒脾去積順氣化痰青皮炒陳皮炒各四兩蘿蔔子炒木香三稜炒蓬术神麯麥芽各一兩炒枳殼炒二兩半夏二兩半枳實炒一兩香附子醋炒一兩半檳榔山查草果各一兩陳倉米一升同巴豆二十粒炒黃色去巴豆不用右末醋糊丸梧子大每服四五十丸漸加至七十丸食後白湯下青橘皮散食過飽痞悶消食化氣醒酒青橘皮去白炒葛根一兩砂仁五錢為細末濃茶調服寬中丸治胸膈痞悶停滯飲食山查肉蒸熟為末丸服除濕益氣湯傷濕麵心腹滿悶肢體沈重枳實麩炒白术黃芩各一兩蘿蔔子炒半兩神麯一兩紅花三錢荷葉飯為丸菉豆大每服六十丸白湯下二黃丸傷熱食痞悶兀兀欲吐煩亂不安黃芩二兩黃連酒炒一兩升麻柴胡各三錢甘草二錢枳實炒五錢􅔻餅糊為丸每服七十丸薑湯下白术和胃丸病久不能食而臟腑或結或溏此由胃虛弱也常服則和中理氣消痰去濕熱飲食厚朴炒半夏各一兩白术一兩二錢陳皮八錢檳榔枳實各二錢半木香一錢人參七錢甘草炙三錢右末薑汁浸蒸餅糊為丸梧子大每服五十丸白湯送下吳梅坡沖和健脾丸益心開胃健脾寬胸順氣進食和中資扶三焦培植五內凡體缺强盛者多服大有益也慎勿以人參見疑膈氣膈食翻胃噎食中滿者亦效白术炒四兩白豆蔲一兩拌白术末勺飯上蒸人參三兩陳皮三兩同參飯上蒸白茯苓二兩山查肉二兩石斛鹽水洗同茯苓山查飯上蒸熟甘草綿紙上炒焦黃色七錢右各自為末麥芽粉打糊為丸每服五十丸白湯下家傳三因沖和丸養心扶脾疏肝開胃暢達三焦通貫五臟贊坎離有升降之能和表裏無壅塞之患利用一元斡旋五內家𫝊四世之祕也歌曰醫家綱領在三因多少鑽研那得真發出肺肝𤣥妙處信乎一決勝千金人參石斛白豆仁廣陳皮各為末各一兩山查肉末二兩已上五味合研勻碗盛碟蓋飯上蒸熟取起待冷方開此乃調胃補心接丹田之氣也逺志甘草湯泡去心取末一兩山梔炒焦色取末二兩香附童便浸半日洗净醋炒末二兩此三味共研勻如上法蒸熟勿令泄氣乃透暢心胞達膈間之滯氣也海石末二兩蒼术米泔浸洗去浮皮炒黃取末二兩此二味如上法同蒸乃消痰飲而通內外之用也川芎末二兩北柴胡末一兩青黛一兩此三味和勻蒸如上法乃疏肝鬱調達者也夫心為脾母補心則土有力肝為脾賊平賊則土乃和故曰安穀則昌用穀蘖取粉打糊為丸梧子大晒乾用益元散五錢水飛過神砂五錢為衣食後少頃白湯下量人大小輕重丸數服之常用五十丸胃開氣順稍覺舒泰則減數服之可與補中益氣湯六君子湯相兼服此丸不犯炎涼久服無妨平康為度不拘內外諸病服其該科之藥而兼此丸每日一服則胃和脾壯行諸藥以健成功此祕妙之囑慎毋忽焉參苓造化糕人參二兩虛者用四兩白茯苓四兩乾山藥芡實蓮肉去皮心炒苡仁炒白扁豆炒各半斤糯米打白炒五升白糖霜二斤半右為末磁瓶收貯每用四五錢白湯隨加白糖霜調服一日三四次此平調脾胃久服精神倍加吐法瓜蒂散上部有脈下部無脈其人當吐不吐者死瓜蒂赤小豆為末每服一錢匕溫漿水調下取吐為度設兩手脈不絶無者不可便用此藥恐損元氣令人胃氣不復若止胸中窒塞不通以指探去之如不得吐者以物探吐之得吐則已如是食不得去者方用此藥吐之攻下之劑偹急丸療心腹諸疼卒百病大黃乾薑巴豆去皮各一兩右擇精品者為末蜜和搗千杵丸如小豆大每服三丸大小量之若中惡客忤心腹脹滿卒痛如錐刀刺痛氣急口噤尸厥卒死者以酒或湯服之口噤以物攪開灌之藥一下咽須臾差如未差更與三丸以腹中鳴轉即吐下便愈若口噤須折齒灌之忌蘆筍猪肉冷水肥膩之物易水張先生又名獨行丸乃急劑也神妙列仙散飲酒所傷以致遍身疼痛腰腳強跛手足頑麻胃脘疼痛胸膈滿悶肚腹膨脹嘔吐㵼痢及酒食停久或一切積聚黃疸熱鼓並皆治之沈香木香茴香炒檳榔各一錢扁蓄三錢大黃微炒一兩麥芽一兩半瞿麥五錢右末每服三五錢五更熱酒調下能飲者多飲二三杯不妨仰面卧手義胸前至天眀取下大便如魚腦小便如血效忌生冷硬物葷腥惟啖米粥木香和中丸和脾胃消宿食利胸膈化痰涎除膈熱進飲食木香黃芩青䝉石枳殼檳榔青皮橘紅各五錢白滑石二兩沈香二錢大黃一兩一錢黑牽牛取頭末二兩三錢右末水丸梧子大每服五十丸薑湯或茶清下木香檳榔丸一切氣滯心腹痞滿脅肋脹悶大小便結澀不利者木香檳榔青皮去白陳皮去白枳殼莪术煨黃連黃柏各一兩香附大黃炒黑丑取頭末各三兩右末水丸梧子大每服六十丸生薑湯下以利為度枳實導滯丸傷濕熱之物不得施化痞悶不安茯苓黃芩白术黃連各三錢澤㵼二錢大黃一兩枳實炒神麯各五錢右蒸餅糊丸菉豆大每服七十丸三黃枳术丸傷食肉濕麵辛辣厚味之物填塞悶亂黃芩二兩黃連大黃煨神麯炒白术陳皮各一兩枳實炒五錢􅔻餅為丸服如上海藏神應丸一切冷物冷水及潼乳酪小腹痛腸鳴水穀不化巴豆杏仁乾薑百草霜各五錢木香丁香各二錢黃蠟一兩先將黃蠟用醋煮去渣將巴豆杏仁同炒黑烟盡研如泥將蠟再上火入少油溶化入在杏仁等藥內攪勻旋下丁香等藥研勻搓作挺子油紙裹了旋丸每用三五丸食前米飲下祕方化滯丸理一切氣化一切積奪造化有通塞之功調隂陽有補㵼之妙久堅沈疴磨之自消暴積乍留導之立去丁香去苞木香青皮去白橘紅黃連各二錢半京三稜煨莪术煨各五錢半夏麯二錢五分俱為末巴豆去壳滚湯泡過再研開去心膜以瓦器用好酒煮乾用六錢研細和前藥末再研入後藥烏梅肉厚者去核焙乾為末用五錢以米醋調略清慢火熬成膏入前藥右共和勻以麵糊為丸粟米大每服五七丸人盛者十丸五更陳皮湯下常服磨積不欲㵼者津液咽下停食飽悶枳殼湯下但有所積物取本物煎湯冷下因食吐不止津液咽下即止食㵼不休及霍亂嘔吐俱用冷水下赤痢甘草湯冷下白痢乾姜湯冷下心痛石菖蒲湯下小腸氣痛茴香酒下婦人血氣當歸湯下若欲攻積熱姜湯下仍加丸數末利再服㵼不止飲冷水一口立止小兒量嵗數加減服疳積米飲下孕婦勿服此藥得熱則行冷則止丹溪小胃丹芫化好醋拌勻過一宿於瓦器上不住手炒至黑色勿令焦甘遂濕麵包水浸半日洗晒乾一云水浸冬七日春秋五日或用水煮亦可大㦸水煮一時洗晒乾各半兩大黃濕紙包煨勿焦焙乾再以酒潤炒熟焙乾一兩半黃柏炒三兩右末以白术膏丸蘿蔔子大臨卧津液吞下或白湯送下取其膈上濕痰熱積以意消息之欲利空心服一方加木香檳榔各五錢􅔻餅糊為丸每服七八十丸東垣蠲飲枳實丸逐飲消痰導氣清膈枳實炒半夏製橘紅各二兩黑丑取頭末三兩右末麵糊為丸每五十丸食後薑湯下如所食在膈間兀兀欲吐及鬱悶亂以物探吐甚者用瓜蒂散海藏金露丸肉傷心痞氣不升降水穀不消大黃一兩枳實炒五錢桔梗二兩黑丑二錢半右末荷葉燒飯丸每服白湯下三五十丸常服減半一方薑糊丸傷狗肉不消心下堅硬或腹脹口乾發熱妄語水煮蘆根汁飲之傷魚鱠及生鮓停在胸膈不化必成癥瘕馬鞭草搗汁飲之飲生薑汁亦消橄欖煎湯飲之亦佳傷豆腐以蘿蔔煮食或用蘿蔔子煎湯飲之消傷蟹用紫蘇生薑煎湯飲傷瓜果以健脾消食之劑內加麝香服之立消不能食生生子曰不能食者由脾胃餒弱或病後而脾胃之氣未復或痰客中焦以故不思食非心下痞滿而惡食也治當補益以開豁之丹溪導痰運脾之法皆是也下元虛亦令人不思食宋黃山谷刀筆手柬載云有將兔絲子淘淨炒乾日服數匙酒下服之十日飲食如湯沃雪又有服補脾藥不效用二神丸治之愈羅謙甫曰脾胃弱而飲食難任者不可一槩用尅伐之劑宜錢氏異功散補之自然能食或嗜食太過傷脾而痞滿嘔逆權用枳术丸一服慎勿多服昔人有治久瘧後食少汗多先用補劑加黃連枳實月餘食反不進汗亦不止因悟謙甫之言純用補劑又令粥多于藥氣虛甚者加附子一二分佐之錢氏異功散治脾胃虛弱難任飲食人參白术茯苓粉草橘紅木香各等分加薑棗煎服二神丸脾胃虛弱全不思食服補脾藥不效者破故紙炒四兩肉果生二兩右末肥棗四十九枚生薑四兩切片煮爛去薑剝去棗核研膏入藥末和丸桐子大每服四十丸鹽湯下積聚門黃帝針經百病始生得三云積者蓋厥氣生足悅悅生脛寒脛寒則血脈凝澀凝澀則寒氣上入腸胃則䐜脹䐜脹則腸外之汁沫迫聚不得散日以成積卒然多飲食則腸滿起居不節用力過度則絡脈傷陽絡傷則血外溢血外溢則衄血隂絡傷則血內溢血內溢則後血腸胃之絡傷則血溢于腸外有寒汁沫與血相摶則并合凝聚不得散而成積矣或外傷于寒內傷于憂怒則氣上逆氣上逆則六輸不通溫氣不行凝血藴裹不散津液凝澀滲著而不去而成積矣難經云肝之積名曰肥氣肥氣以季夏戊己日得之何以言之肺病傳于肝肝當傳脾脾季夏適王王者不受邪肝復欲還肺肺不肯受故留結為積故知肥氣以季夏戊己日得之心之積名曰伏梁云云脾之積名曰痞氣云云肺之積名曰息賁云云腎之積名曰奔豚云云並見本方滑伯仁曰越人之意蓋以五行之道推其理勢之所有者演而成文爾初不必論其感亦不必論其還不還與其必然否也請以所勝傳不勝及王者不受邪遂留結為積觀之則不以詞害意而思過半矣論婦人腸覃石􅛎水脹篇云石􅛎何如岐伯曰石􅛎生于胞中寒氣客于子門子門閉塞氣不通惡血當㵼不㵼衃以留止日以益大狀如懷子月事不以時下皆生于女子可導而下寶鑑曰夫膀胱者津液之府也氣化則出矣今寒客于子門氣塞不通血壅不流而衃以止之結硬如石是名石􅛎也此氣先病而血後病故月事不來則可宣導而下出者也故難經云任之為病其內苦結男子為七疝女子為􅛎聚此之謂也非大辛之藥不能已可服見睍丹腸覃何如岐伯曰寒氣客于腸外與衛相摶氣不得營因有所繫痞而內著惡氣乃起瘜肉乃生其始生也大如雞卵稍以益大至其成如懷子之狀久者離嵗按之則堅推之則移月事以時下此其候也夫腸者大腸也覃者延也大腸以傳道為事乃肺之府府主衛衛為氣氣得熱則泄寒則凝今寒客於大腸故衛氣不營有所繫止而結瘕在內貼著其延久不已是名腸覃也氣散則清氣聚則濁結為􅛎聚所以惡氣發起瘜肉乃生小漸益大至期而鼓其腹則如懷子狀也此氣病而血未病故月不斷以時下本非妊娠可以此為辨矣劉宗厚曰按此謂石􅛎為血壅不流故月事不來腸覃為氣聚而濁結成瘕故血未病月水不斷而知此二積之異然亦有諸積所致或有病􅏴膿而似此二證者不可不察也丹溪曰痞塊在中為痰飲在右為食積一云痰積在左為血塊氣不能作塊成聚塊乃有形之物痰與食積死血而成也用醋煮海石醋煮三稜蓬术桃仁紅花五靈脂香附之類為丸石􅜮白术湯吞下瓦壟子能消血塊次消痰石􅜮一物有痰積有塊可用洗滌垢膩又能消食積治塊當降火消食積食積即痰也行死血塊塊去須大補凡積病不可用下藥徒損真氣病亦不去當用消積藥使之融化則根除矣凡婦人有塊多是血生生子曰積聚一證難經以某日得積及不受欲還之說後人皆難尊信此下諸書雖亦各有發眀終未有能擴其藴而可為萬世法者近汪子良特揭而辨之乃分表裏邪正臟腑內外日積日聚及著治驗數條多有啓悟與丹溪治案可相表裏深有功於難經者而後人得以此取則焉幸亦大矣謹述於左汪子良曰嘗讀難經積聚之說而疑之雖有及於病情而其說自相矛盾有膠固而難通豫慮後學之悮于承用也為之辨論附以積聚常變之法亦有自效於匡救之忠已乎五十五難曰積者隂氣也聚者陽氣也故隂沈而伏陽浮而動氣之所積名曰積氣之所聚名曰聚故積者五臟之所生聚者六腑之所成積者隂氣也其始發有常處聚者陽氣也其始發無根本上下無所留止其痛無常處又五十六難曰肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發咳連年不已以季夏戊己日得之何以言之肺病𫝊脾脾季夏適旺旺者不受邪肝復欲還肺肺不肯受故留結為積故知肥氣以季夏戊己日得之心之積名曰伏梁起臍上大如臂上至心下久不愈令人煩心以秋庚辛日得之何以言之腎病傳心心當傳肺肺秋適旺旺者不受邪心復欲還腎腎不肯受故留結為積故知伏梁以庚辛日得之脾之積名曰痞氣在胃脘覆大如盆久不愈令人四肢不收發黃疸飲食不為肌膚以冬壬癸日得之何以言之肝病𫝊脾脾當𫝊腎腎以冬適旺旺者不受邪脾復欲還肝肝不肯受故留結為積故知痞氣以冬壬癸日得之肺之積名曰息賁在右脅下覆大如杯久不已令人灑灑寒熱喘嗽發肺􅏴以春甲乙日得之何以言之心病傳肺肺當𫝊肝肝以春適旺旺者不受邪肺復欲還心心不肯受故留結為積故知息賁以春甲乙日得之腎之積名曰奔豚發於少腹上至心下或上或下無時久不已令人喘逆骨痿少氣以夏丙丁日得之何以言之脾病傳腎腎當𫝊心心以夏適旺旺者不受邪腎復欲還脾脾不肯受故留結為積故知奔豚以夏丙丁日得之夫謂積者隂氣也聚者陽氣也是以血氣分隂陽也殊不知隂血陽氣也皆能成積但臟腑所主之不同耳心肝多主于血丹溪所謂在左屬血是也脾肺多主於氣本文所謂肺積息賁者是也息者氣之息也是陽氣亦能成積況又曰氣之所積名曰積與其積隂之說不相合矣又謂積者五臟之所生也聚者六腑之所成也殊不知有形質之物積滯不行則為之積五臟六腑俱有之如仲景所謂熱結膀胱摶血畜積下焦其人如狂小腹滿硬而小便自利抵當湯主之又東垣所謂食積腸胃腹滿卒痛者偹急丸下之是六腑之位亦有其積豈謂積于臟乎至論肝積肥氣夫肥氣者言其皮裏膜外有塊以致皮膚有肥滿之狀所謂瘧母是也此肝之外積非肝之內積也又謂脾積痞氣夫脾居於右脅今積在於心膈之位乃與本文積在本位之說不相合矣又謂腎積賁豚發於少腹上至心下若豚狀或上或下無時乃與聚證走動相類與本文積屬隂沈伏之比不相合矣且五臟之積未言所因治何所據又謂肝積於季夏戊己日得之之類其說之失眀者自當知之愚謂積伏而有常處其症靜也因於血氣痰食水火之所成聚者對散而言散而無形或集為有象其症動也因於氣虛不能運行之所致作於腹中者屬內作於皮膚四肢者屬外如血積左脅作痛日輕夜甚其脈沈澀者所謂在左屬血治用芎歸紅花蘇木麝香肉桂莪术之類又有火鬱左脅而痛甚者治用當歸龍㑹丸之類又有裏熟畜水在於左脅而作痛者如仲景所謂心下痞硬痛引脅下乾嘔短氣汗出不惡寒者十棗湯主之又有食積右脅而作痛者所謂在右屬食丹溪曰右脅一條降起作痛色不紅者此食積也豫嘗用補中益氣湯去陳皮加青皮草果木香之類又有食塊積於右脅而不痛者宜治消導為主如白术枳實三稜莪术砂仁吳茱萸之類又有痰飲積於心膻作痛才食熱辣湯則暫止而脈沈滑治用白螺丸之類又有氣積胸中而為脹痛喘急脈沈者治用紫蘇杏仁之類又有水積胸膈作痛手不可近身凉脈沈緊者治用陷胸湯之類又有濕鬱心膈而為痞滿者治用大消痞丸之類所謂五臟之積者如此又有積于六府之位者余嘗治一人膈下大痛有塊不移嘔吐不食吐兼腹痛此中焦吐也從於積用紫沈丸下之而愈又嘗治一人腹中大痛不移才得大便其痛稍減兩尺脈沈弦而澀他醫作房後隂症治之弗應余曰據其尺脈隂沈當作隂症治之據其大便去後而痛減者此食積也用備急丸下之而已又嘗治一婦産後將及一月小腹之位有塊如雞卵作痛日輕夜重嘔吐寒熱此血積也治用芎歸肉桂莪术乳沒琥珀麝香之類一服而塊消諸症悉退又寶鑑云寒氣客於子門則氣塞不通血壅不流而衃以止之結硬如石是名石瘕見睍丸主之又云清濁之氣結聚腸外成如懷妊按之則堅推之則移月事以時下名曰腸覃晞露丸又嘗治一婦人經閉三月臍下脹痛不移他醫作血積治弗效豫曰此氣虛不能上升而陷於下也丹溪所謂陽病極於下者此也治用人參陳皮而安又嘗治一人臍左有塊不痛或時降起此亦食積也治用白术三稜莪术砂仁吳茱萸木香神麯糊丸服之外於塊上灸之而消又嘗治一人小腹左邊有塊堅痛不移大便燥結或因惱怒辛苦即作膈痛嘔吐不食諸醫罔效已一年餘余作痰火治用順氣消痞丸逺志肉酒炒黃連薑製厚朴各二兩海藻昆布青皮山查肉神麯蒼术川歸枳實各一兩𤣥眀粉六兩同牛肉一斤切碎煮熟焙乾同前諸藥為末醋煮蒸餅糊為丸每服二錢空心湯下未及一月而塊消痛止又治一人右脅塊痛用三補丸加梔子蒼术服至半月而愈所謂六府之積者如此其餘菜果酒肉寒冷等積可類推焉腑之積甚者倒倉法治之此皆內積之症治者也又有外積者作于皮膚四肢之位也如􅏴疽瘰癧瘧母之類治各從其所宜夫􅏴疽屬陽者仙方活命飲之類屬隂者內托復煎湯之類瘰癧未消者破結散之類已破者如神散之類瘧母又名肥氣宜降痰火之劑余嘗治一人瘧後左脅之下皮裏膜外有塊大如掌許用七胰散治之瓦壟子煅天蓼花子各二兩為末猪胰七箇針亂刺孔同𤣥眀粉四兩煮熟入前二末搗爛焙乾為末每服二錢酒下為丸服亦可服之而效此皆外積之症治者也且以聚病言之夫內聚者腹中走痛也由於氣虛不能運行故耳余嘗治一人腹中有塊作痛或上或下或有或無此聚也治用人參黃茋白术當歸枳殼木香之類而止此內聚之症治者也又有外聚者亦由氣衰滯於四肢百節作痛痛作隨腫痛退腫消經曰先痛而後腫者氣傷形也此也治用補氣散邪之劑如人參黃茋白术為君佐以羌活五加皮薏苡仁之類此外聚之症治者也由是觀之積者由于氣血痰食水火之所成而有臟腑外內之分也聚者由于氣虛不運之所致而表裏邪正之别也則常變虛實之治得矣難經之說云乎哉湯氏三稜散治積氣肚痛砂仁甘草炒益智仁炒去壳三稜莪术青皮去穰炒各等分右末白湯㸃下散聚湯久氣積聚狀如癥瘕隨氣上下心腹絞痛攻刺腰脅小腹填脹大小便不利半夏檳榔當歸各三分陳皮杏仁去皮尖炒桂各二兩茯苓甘草炙附子炮川芎枳殼厚朴吳茱萸湯洗各一兩大黃看勢輕重用每服四錢水煎大便利者去大黃大七氣湯治同上京三稜蓬术陳皮益志香附各一兩半肉桂霍香甘草青皮桔梗各三兩每服五錢水煎𤣥胡丸內消癥瘕氣結蟲煩心腹脹痛𤣥胡索川歸青皮木香雄黃飛另研檳榔廣术炮各四兩京三稜炮六兩右末入雄黃拌勻糊丸梧子大每服三十丸薑湯下不拘時木香三稜散和胃進食消化生冷物心腹刺痛木香神麯炒各一兩京三稜炮甘草炙各二兩廣茂六兩益志橘紅各四兩右末每二錢入鹽沸湯㸃服五食丸虛實積氣蠱脹積塊水氣年深癥瘕大㦸去皮甘遂生各半兩牙皂去皮子生芫花醋浸一宿炒黃胡椒各一兩巴豆去心膜醋煮二十箇研半兩右末入巴豆和勻糊丸菉豆大每服五七丸氣實者十丸夜卧水一鍾用白米白麵黑豆生菜猪肉各少許煎至半鍾去渣用湯下藥忌油膩粘滑物聖散子逺年積塊及婦人乾血氣碙砂麥蘖各六兩大黃八兩乾漆燒過萹蓄茴香炒檳榔各一兩如婦人乾血氣加川山甲二兩炮右細末每三錢溫酒調下仰卧此藥只在心頭至天眀大便如魚腸小便赤為驗並無毒神效小兒用一錢十五以上二錢空心服之更效荆蓬煎丸破痰癖消癥塊及冷熱積聚順氣消食木香檳榔枳殼青皮茴香三稜各二兩酒浸冬三日夏一日廣茂二兩醋浸冬三日夏一日以去皮巴豆二十箇同炒黃色去巴豆不用右末糊丸如菉豆大每服三十丸薑湯下三稜丸治五穀等積食陳倉米一兩巴豆五枚去殼同炒焦色去巴豆不用陳皮三稜各一兩砂仁各二錢麥芽木香一錢右末醋糊丸菉豆大每十五丸至二十丸姜湯食逺服麯蘖丸治熱酒積噫酸脅痛神麯麥芽各一兩黃連五錢同巴豆五粒炒黃色同用右末沸湯和丸桐子大每五十丸食逺薑湯送下一方治冷酒積平胃散加丁香砂仁麥芽神麯薑棗鹽煎服水積丸甘遂一錢為末以猪糟頭肉一兩細切搗爛和末作一丸紙褁火煨令香熟取出臨卧嚼細酒咽下取下病根若治酒積用棗湯吞下涎積炒粉丸積聚涎塊結於心腹乾嘔刺痛蚌粉一兩巴豆七枚去壳及膜右二味同炒赤色去巴豆以醋丸桐子大丈夫臍腹痛炒茴香酒下二十丸婦人血氣薑酒下敗血沖心童便和當歸酒服常服薑湯下茶積丸治茶積飲食減少面黃腹痛陳倉米半升巴豆七粒去壳同炒赤色去巴豆青皮陳皮各二兩右末醋丸如菉豆大每二十丸食後淡姜湯下又方花椒為末麵糊丸桐子大每二十丸茶湯任下茶癖散治茶積黃芩石膏升麻等分為末每三錢砂糖湯調下鱉甲桃仁煎丸治諸積桃仁泡去皮尖五兩水研漉汁三升三稜煨木香檳榔青皮各一兩鱉甲醋炙黃三兩右末將桃仁汁慢火熬二升再加醋一升再熬如糊和藥丸桐子大每服七十丸淡醋湯下空心食前日二服晞露丸感寒氣凝結腸外久為癥瘕疼痛名腸覃廣术三稜各一兩酒浸用巴豆三十粒去壳同术稜炒黃色去巴豆不用乾漆炒川烏炮各五錢茴香炒青皮雄黃各三錢川山甲炮二錢碙砂四錢研輕粉一錢麝香五分右薑汁糊丸桐子大每服二三十丸空心薑湯下阿魏丸諸積聚癥瘕痞塊山查南星皂角水浸半夏同上麥芽神麯黃連薑炒各一兩連翹炒阿魏醋浸瓜蔞貝母各五錢石磏風化硝蘿蔔子胡黃連各二錢半右末薑汁浸􅔻餅糊為丸桐子大每服五十丸薑湯下見睍丸婦人石瘕狀如懷子者大附子炮鬼箭羽紫石英各三錢肉桂𤣥胡索澤㵼木香各二錢血竭水蛭一錢炒烟盡檳榔二錢半桃仁三十枚炒三稜五錢大黃二錢同三稜酒浸一宿焙右末酒糊丸桐子大每三十丸食前鹽湯或酒下脾積膏治諸積神效雞子五枚阿魏五分黃蠟一兩鍋內一處煎分作十服溫湯空心服諸物不忌設腹痛是積化動十日後當有血大便中出是其效也剪紅丸專治久積有蟲者雷丸檳榔三稜莪术各醋煮木香蕪荑黑丑狗脊大黃史君子鶴虱牙皂錫灰茵陳黃丹各等分為末以茵陳煎湯為丸梧子大外以黃丹為衣大人每服三錢小兒每用一錢空心以酒下福建者以冷茶吞奇驗方黑羊肝一副入左顧牡蠣三錢黃蠟一兩水煮肝爛食肝并湯空心食肝盡即效但不厭其苦須多服效敷方蕎麥麵水調圍硬處內用皮硝葱重重鋪三層以火尉之日三次外服橘半枳术丸加莪术又方以紅麯為糟將生威靈仙同搗極爛敷之外覺痞塊消即拭去遲恐壞肌膚尉痞方吳茱萸三升研碎酒煮熟以布包尉癥上冷更妙更畨尉之癥逐移走尉之消乃止二仙膏貼痞氣及積塊眀礬雄黃為末先將二兩水糊和成膏貼患處俟大便如膿下即愈未愈再以二兩和膏貼之即效七胰散汪子良論中七胰散有瓦楞子只用皮硝七錢每一錢擦一胰醃七日鐵器上焙乾燥為末又水紅花子只用七錢無瓦楞子羅太無乾柿丸取虛實積下膈甚妙硃砂飛為衣沒藥牙皂去皮弦子為末乾薑炮乾漆炒烟盡三稜炮輕粉青礞石煆各一錢巴豆三十粒去皮膜醋煮十沸水銀一錢鉛一錢結成砂子右末和勻飯丸菉豆大煎柿蒂湯冷下三丸或五丸有孕婦人勿服神功助化散男婦腹中痞塊不拘氣血食積所成萹蓄麥芽各五錢瞿麥穗甘草各五分木香一錢半沈香神麯各二錢半大黃二兩右末和勻男以淡竹葉甘草等分煎湯及無灰酒同調服婦以紅花燈心當歸等分煎湯及無灰酒同調服俱酒多於湯忌油膩動氣之物及房事一月其藥夜服大小便見惡物為度此方神妙不可盡述紅丸子大人脾積氣滯胸膈滿悶面黃腹脹四肢無力酒積不食乾嘔不止脾連心胸及兩乳痛婦人脾血積氣諸般血癥氣塊及小兒食積骨瘦面黃腹脹氣急不嗜飲食漸成脾虛並宜服之方見傷食二賢散進食消積塊橘紅一斤净甘草四兩鹽半兩用水三四碗從早煮至夜以爛為度水乾則添日乾為末淡薑湯調下有塊者加薑黃半兩氣滯者加香附二兩俱同前藥煮氣虛者加沈香半兩噤口痢加蓮肉二兩去心俱另入小三稜煎食瘕酒癖血癥氣塊時發刺痛全不思飲食積不消心腹堅脹痰逆嘔噦噫酢吞酸京三稜蓬术各四兩芫花一兩去梗葉右同入甕器中用米醋五升浸滿封器以炭火煨令乾取出稜术將芫花以餘醋炒令微焦焙乾為末醋糊丸菉豆大每十五丸姜湯下猪腰子方治腹中有塊猪腰子一雙切薄片木鱉子肉一兩與猪腰片相間縛定外用濕紙包火煨熟去紙擂盆內搗如泥入黃連末和丸每二十丸烏梅甘草湯下第二服二十五丸三服三十丸漸加至以痛為度大便利其塊自消神效元戎溫白丸治心腹積聚久壅痞塊大如杯碗黃疸嘔吐滿悶上氣腹脹心下堅結上搶心傍及脅十種水病八種痞塞翻胃吐逆噎膈五種淋疾九種心疼積食不消成瘧連年不瘥及一切風身體頑痺不知痛癢或半身不遂眉髮墮落七十二種風三十六種遁尸疰忤癲癎或婦人諸疾斷續不生下淋瀝五邪失心憂愁思慮不樂飲食無味月水不調及一切病有似懷孕羸瘦困弊或歌如鬼所使等症川烏去皮臍炮二兩半紫苑菖蒲柴胡厚朴製吳茱萸桔梗皂策去弦子炒茯苓乾薑炮人參黃連巴豆去油研炒桂蜀椒去目炒各五錢右末入巴豆令勻密丸桐子大每三丸薑湯下食後臨卧服加至五六丸止肝之積肥氣溫白丸加柴胡川芎治之心之積伏梁溫白丸加菖蒲桃仁黃連治之脾之積痞氣溫白丸加乾薑吳茱萸治之肺之積息賁溫白丸加人參紫苑治之腎之積奔豚溫白丸加丁香茯苓逺志治之肥氣丸肝之積在左脅下如覆杯脈弦而細青皮當歸蒼术各一錢半蛇含石煆醋淬七次蓬术三稜鐵孕粉各二兩與三稜蓬术同入醋煮一伏時右末醋煮米糊丸菉豆大每四十丸當歸酒送下伏梁在心下結聚不散用桃奴三兩為末空心溫酒調下桃奴樹上乾桃子是也正月採經冬不落者肺喘久不愈為息賁五靈丸五靈脂二兩半木香半兩馬兜鈴炒一兩葶藶右末棗肉丸桐子大每二十丸姜湯下日三本事云肺之積曰息賁在右脅下大如杯令人灑灑寒熱喘嗽發肺􅏴棗膏丸葶藶子陳皮桔梗各等分右下二味末入葶藶研勻煮肥棗肉和丸桐子大每五七丸米飲下豫嘗患停飲久漬肺經食已必嚏喘覺肺系大急服此良驗當歸丸治婦人月經不調血積當歸赤芍川芎熟地京三稜廣茂各五分神麯百草霜各二錢半右末酒糊丸桐子大溫水下尚書媳婦馬氏年三十二腹中血塊作疼經五六年形已骨立衆皆曰不可為奈其未死何家甚貧而大小愍之一日召杜至告杜曰但以濟物為懷則可業已請召眀公非所言也遂以少物帛贈杜杜不受曰但服其藥必獲安無以是為疑遂示方用沒藥牛膝乾漆當歸各半兩碙砂木香水蛭炒紅娘子炒紅花牡丹皮硃砂各一分海馬一箇班猫去翅足炒十四箇為末酒醋各半升熬為膏每日天眀用一皂子大酒醋化下一月病退六十日漸安果如其言黑神丸神麯茴香各四兩木香川椒炒香出汗丁香各半兩檳榔四箇乾漆六兩半生半熟用薑湯煮半日令香右除椒漆外五物皆半生半炒為細末用前生熟漆和丸彈子大又用茴香十二兩鋪隂地䕃乾候外乾并茴香收器中至乾去茴香用治腎氣膀胱痃癖及疝墜五膈血崩産後諸血漏下赤白並一丸分四服死胎一丸皆綿灰酒下若難産炒葵子四十粒杵碎酒煎下諸疾不過三服痃氣十服膈氣癥癖五服血瘕三丸一婦有塊如杯每發痛不可忍諸藥莫愈投此丸三服杯塊盡消終身不復作矣沒藥散治一切血氣臍腹作痛産後惡露兒枕痛血竭沒藥並細研桂心當歸蒲黃紅花木香𤣥胡索乾漆炒赤芍各等分右細末每服二錢熱酒調下食前血塊沖心痛甚者以大順散三錢酒調服即止牡丹散婦人久虛羸瘦血塊走注心腹疼痛牡丹皮𤣥胡索桂心當歸各一兩牛膝赤芍藥莪术各三兩京三稜一兩半每服三錢水酒各半盞煎服芍藥湯治産後諸積不可攻宜養去熱芍藥一斤黃芩茯苓各六兩右每服半兩水煎日三服帝曰病脅下滿氣逆二三載不已是為何病岐伯曰病名曰息積此不妨於食不可刺灸祇為導引服藥藥不能獨治也奇病論王注云氣逆息難故名息積也用息賁法治之亦可磨積丸胡椒一百五十粒木香二錢半全蝎十枚去毒右末粟米糊丸菉豆大每十五丸陳皮湯下化氣湯治息積木香砂仁桂心各二錢半甘草炙茴香炒丁香皮青皮陳皮乾薑蓬术炮各半兩沈香胡椒各錢右末每服二錢薑蘇鹽湯調下婦人醋湯服肝之積肥氣丸治積在左脅下如覆杯有頭足久不愈令人咳逆㾬瘧連年不已厚朴半兩黃連七錢柴胡二兩椒四錢巴霜五分川烏炮去皮臍一錢二分乾薑五分皂角去皮弦子煨一錢半白茯苓一錢半廣茂炮昆布人參各二錢半甘草三錢右除茯苓皂角巴豆外為極細末再另研巴霜旋入和勻煉蜜丸桐子大初服二丸一日加一丸二日加二丸漸加至大便微溏再從兩丸加服周而復始積減大半勿服右後積藥依此法服之春夏秋冬另有加減法在各條下秋冬加厚朴一半通前重一兩減黃連一錢半若治風癎於一料中加人參茯苓菖蒲各三錢黃連只依春用七錢雖秋冬不減淡醋湯空心服下加減肥氣丸治同前仲夏合此柴胡厚朴各半兩黃連一兩川椒甘草各五分肉桂川烏各二錢巴霜六錢乾薑人參各半兩右細末旋入巴霜研勻煉蜜丸桐子大初服二丸一日加一丸二日加二丸漸加至大便微溏再從二丸加服空心淡醋湯下大便利秋冬去乾姜半錢加厚朴一倍減黃連一半心之積伏梁丸起臍上大如臂上至心下久不愈令人心煩黃連一兩半人參厚朴去皮姜製各半兩黃芩三錢肉桂紅豆茯神丹參各一錢菖蒲乾薑巴霜川烏炮去皮臍各五分右末研巴霜旋入和勻煉蜜丸桐子大初服二丸日加一丸漸加至大便溏從二丸加服食逺淡黃連湯下周而復始積減半勿服秋冬加厚朴半兩減黃連半兩黃芩不用鱉甲湯治伏梁積氣心下如臂痞痛不消小便不利鱉甲去裙醋炙黃色三稜大腹皮芍藥當歸柴胡生地各一兩官桂生薑切片焙乾各三分每服三錢水一大盞入生薑木香半錢同煎至八分空心溫服脾之積痞氣丸在胃脘腹大如盤久不愈令人四肢不收發黃疸飲食不為肌膚厚朴製半生半炒黃連八錢吳茱萸黃芩白术各三錢白茯苓另為末澤㵼各一錢巴豆霜另研四分乾薑炮縮砂茵陳各一錢半川烏炮去皮臍川椒炒各五分桂四分人參一錢右末旋入巴霜茯苓和勻煉蜜丸桐子大初服二丸日加一丸漸加至大便微溏再從二丸加服食逺淡甘草湯下周而復始積減大半勿服加減痞氣丸孟秋合此黃芩酒炒益智吳茱萸歸尾橘紅附子各三分厚朴一錢黃連酒炒半夏紅花各五分青皮廣茂神麯茯苓昆布熟地人參炙甘草巴霜葛根各二分澤㵼右末蒸餅糊丸桐子大初服二丸日加一丸加至大便微溏再從二丸加服淡甘草湯下宣眀白术丸治息積脅下氣逆妨悶喘息不便呼吸引痛不已不可針灸宜導引服藥爾白术枳實官桂各一兩半人參二兩桔梗醋炒陳皮甘草各一錢為末煉蜜丸桐子大每服二十丸溫酒下日三服加減息賁丸仲夏合此其積為病寒熱喘咳氣上奔脈澀失精亡血氣滯則短氣血凝泣則寒熱相參氣分寒血分熱治宜益元氣泄隂火破氣消其堅也川烏乾葛桔梗白豆冦各一錢人參桂枝各二錢陳皮八錢黃連一兩三錢紫苑厚朴茯苓川椒炒去汗京三稜天門冬去心各一錢半青皮七分紅花少許巴豆霜四分右末􅔻餅糊為丸桐子大初服二丸日加一丸加至大便微溏從二丸加服食前薑湯下忌酒麵辛辣生冷物腎之積奔豚丸發於小腹上至心下若豚狀或上下無時久不已令人喘逆骨痿少氣及男子內結七疝女子瘕聚帶下苦棟酒煮三錢黃連炒五錢白茯苓澤㵼菖蒲各二錢川烏炮丁香各五分𤣥胡索一錢半全蝎附子獨活各一錢巴豆霜四分厚朴薑製七錢肉桂三分右末旋入巴豆霜茯苓和勻蜜丸桐子大服法如前食逺淡鹽湯下秋冬加厚朴半兩如積熱堅大先服前藥不減於一料中加牡蠣三錢疝帶勿加如大積大聚消其大半乃止藥過劑則死如積滿腹或半腹先治其所起是何積當先服本臟積藥諸疾自愈是其本也餘積皆然如服藥人覺熱加黃連如服藥人氣短加厚朴如服藥人悶亂減桂治積要法許學士云大抵治積或以所惡者攻之所喜者誘之則易愈如碙砂水銀治肉積神麯麥蘖治酒積水蛭虻蟲治血積木香檳榔治氣積甘遂牽牛治水積雄黃膩粉治痰積巴豆礞石治食積各從其類也若用羣隊之藥分其勢則難取效須要認得分眀是何積聚兼見何證然後增加佐使之藥不爾反有所損要在臨時通變也治積當察其所痛以知其病有餘不足可補可㵼無逆天時詳臟腑之髙下如寒者熱之結者散之客者逐之留者行之堅者削之强者奪之醎以耎之苦以㵼之全真氣藥補之隨其所積而行之節飲食慎起居和其中外可使必已不然遽以大毒之劑攻之積不能除反傷正氣終難復也可不慎歟治魚蟹積香蘇散多加生薑陳皮橄欖煎服果菜積平胃散加丁香麝香為末鹽湯調服索粉積紫蘇濃煎汁加杏仁泥服即消麵積阿魏丸濃煎羅蔔子湯下糍糕傷積酒麯五錢木香一錢為末鹽湯調服口有酒香是效治婦人血塊有孕難服峻藥香附子四兩醋煮桃仁一兩去皮尖海石二兩醋煮白术一兩神麯糊為丸奇方治一切癥􅛎積聚鱉甲一兩醋煮三稜五錢炮白术五錢青皮桃仁紅花昆布各二錢香附醋煮七錢右末糊丸梧子大每一錢煎白术湯下治中脘有塊中常跳動橘紅四錢桃仁去皮尖二錢木通一錢白术八錢水煎服治中脘水飲積塊堅大如盤白术二兩枳實七枚分三服水煎治小兒疳積大安丸加胡黃連末五錢神麯糊丸黍丸黍米大米飲下丹溪治一人肚左邊帶脅下有塊先吃匾食牛乳者成氣痛又因酒肉塊大如桃食減三分之一滑石五錢白术四錢陳皮三稜各三錢蘿蔔子黃連連翹各一錢乾葛二錢半桃仁二十枚甘草炙一錢半黃芩一錢分三帖水煎服一婦脅下有塊大如掌脈澀時作熱此虛中有氣積先與補虛次與磨積藥白芍藥當歸尾各四錢白术三錢青皮川芎木通各一錢甘草五分水煎服磨積藥三稜醋煮一錢青皮枳實桃仁大黃各五錢桂枝一錢半海藻醋煮三錢神麯糊為丸梧子大每服五十丸一人有塊在脅內有痰熱汗不得泄兩脈大而散軟此挾虛症三稜五錢黃連白术連翹木通各三錢人參二錢半桂川芎各一錢甘草五分水煎吞下保和丸一婦瘧後左脅下有塊小便少厚朴柴胡各二錢三稜青皮木通各五錢白术六錢半甘草五分姜一片水煎服一人因飽食牛肉豆腐患嘔吐又不節飲食右脅下生一塊漸長大如掌痛發則見痛止則伏脈弦數性急塊上不可按按之愈痛痛則必吐黃酸苦水此足太隂食積濕痰荔枝核二枚燒山梔仁五枚炒枳實十五枚山查九枚吳茱萸炒九粒一方有人參急流水一盞煎沸入生薑汁服四帖止其痛却與消塊藥消塊藥方半夏末六錢皂角六枚水煮取汁拌半夏末晒乾黃連炒五錢石碱二錢右末以糖毬膏為丸胡椒大驚風成塊者妙應丸加川山甲炒鱉甲燒各三錢𤣥胡索蓬术各四錢每服五十丸加至七十丸以利為度妙應丸即控涎丹方見痰門酒積方纍效即烏梅丸方出傷飲門愆義有人病心腹悶煩彌二嵗診曰腹有蠱誤食髮而然令餌雄黃一劑少刻吐一蜿如拇指無目燒之有髮氣乃愈此殺毒蟲之驗也丹溪治食積死血痰積成塊在兩脅動作腹鳴嘈雜眩運身熱時作時止黃連一兩半吳茱萸益智仁同炒山梔半兩炒川芎神麯桃仁去皮尖三稜蓬术各半兩並醋煮香附童便浸山查各一兩蘿蔔子炒一兩半一方有青皮半兩白芥子炒一兩半右麵糊丸治婦人血塊牛膝根切焙乾酒煎溫服效腸覃生於腸外月事時下石瘕生於胞中月事不以時下二病皆似蠱脹並見脹門産後消血塊滑石三錢沒藥二錢血竭一錢右末醋糊丸如惡露不下以五靈脂為細末麵糊丸白湯下陳皮湯下妙又方消血塊香附童便浸桃仁去皮尖為末醋糊丸陳無擇云導引法隨意行之皆可愚謂或按摩滿處或手足相屈伸或八段錦或六字氣之類以氣通為效赤水元珠卷十三
