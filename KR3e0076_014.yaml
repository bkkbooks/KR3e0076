body:
  text: 赤水元珠卷十四眀孫一奎撰癲狂癎門此三證大㫖已於醫㫖緒餘中詳明之矣當參看生生子曰靈樞云癲癎瘈瘲不知所苦兩蹻之下男陽女隂後人以癲癎為一門者迹此也又曰暴攣癎眩足不任身取天柱後人言風癎者迹此也眀癲症書云多喜為癲多怒為狂難經謂重隂者癲重陽者狂素問厥論篇曰陽眀之厥則癲疾欲走呼腹滿不得卧面赤而熱妄見而妄言長刺節論篇曰病之初也嵗一發不治月一發不治月四五發名曰癲病又通評虛實論篇曰癲疾厥狂久逆之所生也脈摶大滑久自己小堅急死不治虛可治實則死靈樞癲狂篇曰癲疾始生先不樂頭重痛視舉目赤甚則極已而煩心啼呼喘悸先反僵因而脊痛又有骨癲筋癲脈癲嘔多沃沫氣下泄者不治又曰癲疾者疾發如狂者死不治據此言疾發如狂者死不治可見癲狂非一病也素問奇病論篇黃帝曰人生而有病癲疾者病名何安所得之岐伯曰病名為胎病此得之在母腹中時其母有所大驚氣上而不下精氣并居故令子發為癲疾啓𤣥子注曰癲謂上巔即頭首也綱目曰以其病在頭巔故曰巔疾治之者或吐痰而就髙越之或鎮墜痰而從髙抑之或內消其痰邪使氣不逆或隨風寒暑濕之法用輕劑發散上焦或針灸頭中脈絡而導其氣皆可使頭巔脈道流通孔竅開發而不致昏眩也是知癲癎之癲與厥成癲疾眩冒癲疾之癲一疾也王注悮分癲為二疾獨孫真人始能一之今特冠此氣亂頭癲等經文於癲癎篇首使人知疾有所歸而治有所據也玉機微義曰按內經言癲而不言癎古方以癲癎或併言或言風癎或言風癲或言癲狂所指不一蓋癎病歸于五臟癲病屬之於心故今以風癎另立一門而癲狂合為一門也生生子曰按此以風癎另立一門眀其不與癲狂相類則是之矣而云癲狂合為一門今終集考之並無癲狂門目豈未之補歟孫兆治相國寺僧充忽患癲疾半年名醫皆不效召孫療之孫曰但有醎物儘與食之但待云渴可來取藥今夜睡著眀日便愈也至夜僧果渴孫乃與酒一角調藥一服與之有頃再索酒與之半角其僧遂睡兩晝夜乃覺人事如故僧謝之問其治法曰衆人能安神矣而不能使神昏得睡此乃靈苑方中硃砂酸棗仁乳香散也人不能用耳辰砂散治風痰諸癎狂言妄走精神恍惚思慮迷亂乍歌乍哭飲食失常疾發仆地吐沫戴目魂魄不守醫藥無驗辰砂光眀有墻壁者一兩酸棗仁微炒半兩乳香半兩各為末右量患人能飲酒幾何先令恣飲但勿令吐至靜室中以前藥都作一帖溫酒調下作一盞調之令頓飲如飲酒素少者但隨量取醉服藥訖便安置床枕令卧病淺者半日至一日病深者二三日令家人伺之鼻息勻調但勿喚覺亦不可驚觸使覺須待其自醒則神魄定矣萬一驚寤不可復治正肅吳公少時心病服此一劑五日方寤遂瘥經云悲哀動中則傷魂魂傷則狂妄不精不精則不正此悲哀傷魂而狂當用溫藥補魂之陽仲景方以地黃湯本事驚氣丸之類即是也經云喜樂無極則傷魄魄傷則狂狂者意不存人此喜樂傷魄而狂當用凉藥補魄之隂辰砂鬱金白礬之類是也濟世方治失心鬱金七兩須四川蟬肚者乃真眀礬三兩為末薄糊為丸桐子大每六十丸湯水任下昔有婦人癲狂數年不愈後遇至人授此方初服覺心胸中有物脫去神氣灑然再服頓蘇至人云此病憂驚得之痰裹心竅此藥能去鬱疾眀狂症靈樞癲狂篇曰狂之始生也先自悲也喜忘善怒善恐得之憂飢及狂之發少卧不飢自髙賢也自辨智也自貴倨也善罵詈日夜不休狂言驚善笑好歌樂妄行不休者得之大恐目妄見耳妄聞善呼多食善見鬼神善笑而不發于外者得之有所大喜林億公曰狂為痰火盛實癲為心血不足狂病宜大吐下生生子曰據此言心血不足者乃醫治攻尅太過以致中氣餒弱而神志不定非癲病一起初便有此不足症也丹溪曰神不守舍狂言妄作經年不愈如心經蓄熱當清心除熱如痰逆心竅當去痰寧心大率多因痰結於心胸間治當鎮心神開痰結亦有中邪而成此疾者大槩是熱又曰狂病宜大吐下則除之素問云陽厥強怒飲以鐵落狂怒出于肝肝屬木鐵落金也以金制木之意豫曽用數次果效考本草能治鬼打鬼注安心神治驚邪主癲癎鎮心熱狂走除胸膈中熱氣痰涎病能篇帝曰有病狂怒者此病安生岐伯曰生于陽也帝曰陽何以使人狂岐伯曰陽氣者因暴折而難決故善怒也病名曰陽厥曰何以知之曰陽眀者常動巨陽少陽不動不動而動大疾此其候也曰治之奈何曰奪其食即已夫食入於隂長氣于陽故奪其食即已使之服以生鐵落為飲生鐵落者下氣疾也夫狂之為病少卧少卧則衛獨行陽不行隂故陽盛隂虛令昏其神得睡則衛得入於隂而隂得衛填則不虛陽無衛助不盛故隂陽均平而愈矣王海藏治許氏病陽厥狂怒罵詈親疏或哭或歌六脈舉按無力身表如氷石發則呌呼聲髙內經云奪其食即已因不與之食乃以大承氣湯下之得臟腑積穢數升狂稍寧數日復發下如此五七次行大便數斗疾瘥身溫脈生良愈此內經奪食法也保命當歸承氣湯當歸大黃各一兩芒硝七錢甘草五錢右每二兩水一大碗姜五片棗十枚煎至一半溫服若陽狂奔走罵詈不知親疏此陽有餘隂不足大黃芒硝去胃中實熱當歸補血益隂甘草緩中加薑棗者胃屬土此引入胃也經所謂微者逆之甚者從之此之謂也以大利為度微緩以瓜蒂散入防風末藜蘆末吐之其病立安後用調心散洗心散涼膈散解毒湯等調之安眀癎症生生子曰癎痰火所致前人有稱為風癎者劉河間謂由熱甚而風燥為其兼化涎溢胸膈而瘈瘲昏冒僵仆也東垣曰病癎者涎沫出于口冷汗出于身清涕出于鼻皆陽蹻隂蹻督衝四脈之邪上行腎不任煎熬沸騰上行為之也此奇邪為病不係五行隂陽十二經所拘當從督衝二蹻四穴奇邪之法治之癎症亦從衝任督三脈氣逆而發者當尋此三脈治之督脈尋長強撅骨間灸之任脈尋氣海隂交衝脈附足少隂脈上行去中行各五分隂交穴乃任脈隂衝之㑹潔古曰晝發灸陽蹻夜發灸隂蹻各二七壯陽蹻起於跟中循外踝上行入風池申脈穴也隂蹻亦起于跟中循內踝上行至咽喉交貫衝脈照海穴也劉宗厚曰癎與痓略相類而實不同其病發身軟時醒者謂之癎身強直反張如弓不時醒者謂之痓癎病隨其痰之潮作故有時而醒痓病比癎為甚而有挾虛者故因其昏冒而遂致亡者多矣綱目曰癲癎即頭眩痰在膈間則眩微不仆痰溢膈上則眩甚仆倒于地而不知人名之曰癲癎徐嗣伯云大人曰癲小兒曰癎其實一疾也然與中風中寒中暑尸厥等仆倒不同凡癲癎仆時口中作聲將省時吐涎沫省後又復發時作時止而不休息中風中寒中暑尸厥之類則仆時無聲省時無涎沫後不復發間有發者亦非如癲癎常發狀也千金方云病先身熱掣瘲驚啼呌喚而後發癎脈浮者為陽癎病在六腑外在肌膚猶易治也病先身冷不驚掣不啼呼而病發時脈沈者為隂癎病在五臟內在骨髓為難治也劉宗厚謂此論癎之隂陽後世有認為寒熱者悮也蓋此疾皆以痰熱所作而得在表而淺為陽故云易治入裏而深為隂故曰難治乃表裏淺深之謂非寒熱之謂也張子和曰夫癎病不至目瞪如愚者用三聖散投之更用火盆于暖室中令汗吐下三法並行次服通聖散百餘日則愈矣至于目瞪愚者不可治內經曰神不守謂神亂也大凡此疾乃肝經有熱吐後可服㵼青丸下之劉宗厚謂多由風痰膠固胸膈上下故大法先宜吐之吐後可用清熱之藥如東垣安神丸守真龍㑹丸之類皆可服不獨通聖散也痰實在裏不解宜導痰清熱亦不獨㵼青丸也劉宗厚曰按癎病古方或云風或云驚癎或云癲癎由此疾與中風顛狂急慢驚相類故命名不同也原其所由或在母腹中受驚或因聞大驚而得蓋小兒神氣尚弱驚則神不守舍舍空則痰涎歸之或飲食失節脾胃有傷積為痰飲以致痰迷心竅而作者治法必當尋火尋痰而論前人多用鎮墜清心之藥固可以治熱可以清痰若有頑痰膠固者此藥未易驅逐在上者必先用吐吐後方宜服此更有痰實在裏者亦宜下之隨病輕重而用也或曰癎有隂陽何也豫曰此與急慢驚者可同論也陽癎不因吐下由其有痰有熱客于心胸之間因聞大驚而作若盛熱雖不聞驚亦自作也宜用寒藥以攻治之隂癎亦本于痰熱所作醫以寒凉攻下太過損傷脾胃變而成隂宜用溫平補胃燥痰之藥治之若曰不因壞症而有隂陽之分則是指痰熱所客表裏臟腑淺深而言癎病豈本自有隂寒者哉丹溪曰癎屬驚與痰不必分五等大率行痰為主黃芩黃連瓜蔞半夏南星隨痰火多少治之無有不愈有熱以凉藥清其心此症必用吐吐後用平肝之藥青黛柴胡川芎之類素問大奇論篇云心脈滿大癎瘈筋攣肝脈小急癎瘈筋攣凡灸癎必須先下之乃可灸不然則氣不通能殺人針則不拘鳩尾穴必髙手乃可下針但宜灸亦不可多壯壯多則令人健忘心癎面赤心下熱短氣喘息灸巨缺三壯肝癎面青反視手足搖動灸丘墟三壯脾癎面黃腹大善利胃脘并脘傍一寸各三壯衝陽隱白肺癎面白口吐沫灸肺俞少商少陽各三壯腎癎面黑正直視身不搖如尸厥金户少海至隂湧泉各三壯刺一分治癲之劑始治多用攻痰法繼以養心壯神補劑收功礬丹丸治五癲五癎無拘隂陽冷熱虢丹晉礬各一兩右用磚鑿一窠可容二兩許先安丹在下次安礬在上以炭五斤煅令炭盡取出研細以不經水猪心血為丸如菉豆大每服十丸至二十丸橘皮湯下元戎二白丸治癲與癎白礬一兩以濕麵包蒸熟去麵入輕粉三五分量虛實加減丸如桐子大每服二三十丸生薑湯下小兒丸小些鴟頭丸皂角五條酥炙鴟頭一枚燒存性虢丹五錢研細右末糯米糊為丸菉豆大每服十五丸加至二十丸米飲下神應丸治風癲久服其痰隨糞而下生眀礬一兩臘茶五錢右末蜜丸桐子大每服三十丸臘茶下乳硃丹乳香硃砂飛右用乳香熔化拌和硃砂丸如龍眼大每服一丸以側柏葉浸酒磨化溫服天冬散治風癲脅痛耳鳴吐逆天門冬去心皮乾為末酒調下二錢寶鑑龍腦安神丸治男婦五種癲癎無問逺近發作無時地骨皮麥門冬桑白皮甘草人參各二兩茯神三兩馬牙硝二錢麝香氷片各三錢牛黃五錢烏犀一兩硃砂二錢金箔大者五帖右細末煉蜜丸彈子大金箔為衣如風癎病冬月溫水化下夏月涼水化下不拘時二三嵗者日進二服小兒一丸分作二服虛勞發熱咳嗽新汲水化下茯苓丸常服治心疾良驗人參石菖蒲逺志茯神茯苓辰砂飛南星半夏麯真鐵粉各等分右末薑汁打糊丸桐子大另用辰砂為衣每服十丸加至三十丸夜卧薑湯下養心湯治心虛血少驚惕癲癡黃茋炙茯苓茯神半夏川歸川芎各五錢酸棗仁柏子仁五味子人參逺志桂心各二錢半甘草炙四錢加薑棗水煎服加赤茯苓檳榔治停水怔悸星黃湯治心風及邪祟南星大黃等分水煎服吐痰蕊珠丸治心恙及邪祟猪心血硃砂一兩乾青靛花一匙先將猪心血同靛花研勻入硃砂末和丸桐子大每二十丸茶酒任下甚者不過三服治癲癎經驗方一宗四方先服此一劑伐邪竹茹一錢半夏麯八分枳實橘紅甘草炙各五分山梔炒黑一錢半𤣥眀粉燈草各三分加薑棗水煎服第二次服方可服三劑又服前方一劑又再服此方三劑人參一錢半黃茋五分歸身一錢百合二錢半酸棗仁生三分熟酸棗仁四分貝母小草各一錢麥門冬五分白芍藥吳茱萸炒過八分甘草梢三分茯神酒紅花各二分薑三片棗二枚水煎服弔三方服前二方半月覺神氣稍完繼服此藥紫河車一具洗淨砂鍋煮爛入鹽少許與服後半月勿服藥覺少減又服前方一劑第二方三劑又再服下項丸藥仍將前二藥間服丸藥方牛膽南星八錢真牛黃四錢辰砂三錢真麝香三分煮甘草膏為丸芡實大金箔為衣薄荷湯下五丸清神湯治痰迷包絡心熱癲癡茯神黃連各二錢酸棗仁炒石菖蒲柏子仁肉逺志各一錢甘草五分水煎服痰盛者加南星半夏橘紅瓜蔞竹瀝姜汁海藏治癲癎狂邪不欲眠自賢自智妄行不休此方能安五臟下心氣白雄雞一隻煮熟五味調和作羮粥食之仲景防已地黃湯治病如狂狀妄行獨語不休無寒熱其脈浮防已一錢桂枝防風各三錢甘草二錢右以酒一杯漬一宿絞取汁生地黃二斤蒸之如斗米飯久以銅器盛其汁更絞地黃汁和勻分二服效一醉膏治心恙無灰酒二碗香油四兩和勻用楊栁枝二十條逐條攪一二百下候香油與酒相入成膏煎至八分灌之熟睡則醒時或吐下即安矣治狂之劑㵼心湯治心受積熱讝語發狂踰牆上屋大黃黃芩黃連每四錢水煎服㵼數行然後用安神藥調理苦參丸治狂發無時披髮大呌殺人不避水火苦參為末蜜丸梧子大每服十五丸薄荷湯下調胃承氣湯治狂方在火熱門大承氣湯治陽眀大實發狂方在傷寒門抱膽丸治癲狂不定非輕劑所能愈者水銀二兩黑鉛一兩半辰砂乳香各一兩右將鉛入銚內熔化離火略冷入水銀攪硬研碎入辰砂乳香乘熱用栁木槌擂勻丸如芡實大每服一丸燈心湯下病者得睡切莫驚動覺來即安再進一丸又方以猪心血為丸井水吞下用治狂言妄語牛黃㵼心湯治心經邪熱狂言妄語心神不安牛黃氷片硃砂各一錢半大黃生一兩右末每服三錢生姜蜜水調下六神散治發狂此二方皆禁方寒水石黃連童便炒各一兩丹皮三錢青礞石煆過龍膽草各五錢氷片二分右末童便調下鎮心丹治驚悸自汗心煩短氣喜怒悲惡不自知忘魂失魄狀若神靈所憑及男子遺泄女子帶下辰砂飛白礬枯右末水丸雞豆大每一丸人參湯下婦人熱入血室發狂不認人以保命集牛黃膏妙牛黃二錢半硃砂鬱金丹皮各三錢甘草氷片各一錢右末煉蜜丸棗子大新汲水化下本事方寧志膏治狂不睡人參酸棗仁各一兩辰砂五錢乳香二錢半右末煉蜜丸彈子大每一丸薄荷湯化下豫族弟緣兵火失心與此方服二十丸良愈親舊多傳去服之皆驗治癎之劑碧霞丹治五種癎疾時作搐掣痰涎壅塞牙關緊急心神迷悶目睛上視石碌研九度飛一兩附子尖七枚烏頭尖七枚蝎梢七枚右末麵糊丸芡實大每用薄荷湯化下一丸更以酒半合溫服之須臾吐出痰涎然後隨症治之口噤者斡開灌之仲景風引湯除熱治癲癎又治大人風引少小驚癎瘈瘲日數十發醫所不療又治腳風大黃龍骨乾薑各四兩桂枝三兩甘草牡蠣各二兩寒水石赤石脂白石脂滑石石膏紫石英各六兩右粗末以韋囊盛之取三指撮井花水三升煮三沸溫服一升治風熱瘈瘲食後量多少呷之無不效不用渣犀角丸治風癲癎發作有時揚手擲足口吐痰涎不省人事暗倒屈伸犀角末五錢赤石脂三兩朴硝二兩白殭蠶一兩薄荷葉一兩右末麵糊丸梧子大每服二十丸至三十丸溫水下日三服不拘時如覺痰多即減數忌油膩煿炙楊氏家藏五癎丸治癲癎不問新久並宜服之南星泡烏蛇肉酒浸一宿去皮骨焙乾白礬各一兩辰砂二錢半全蝎二錢去尾炒半夏酒洗焙二兩雄黃一錢半蜈蚣半條去頭足炙殭蠶炒兩半白附子炮半兩麝香三錢皂角四兩右先將皂角搗碎水半升揉汁與白礬同熬乾為末入各藥末以姜汁打麵糊丸桐子大每服三十丸姜湯下丹溪金凡丸治諸癎眀礬鬱金防風牙皂角各一兩川芎二兩蜈蚣一條右末蒸餅糊丸梧子大空心茶下十五丸一日除根錢氏五色丸治五癎辰砂五錢水銀二錢半雄黃飛珍珠一兩鉛三兩同水銀結砂子右末蜜丸麻子大每四五丸金銀薄荷湯下三因六珍丹治風癎失性顛倒欲死或作五畜等聲掣縱吐沫久而方蘇丹砂五錢水銀一兩半鉛二兩與水銀結砂子雄黃雌黃珍珠各一兩右細末煉蜜丸梧子大每服三五丸薑棗湯下丸此藥須要搗二三萬杵不然難丸嚴氏控涎丸治諸癎久不愈頑涎聚散無時生川烏半夏殭蠶不炒以生薑自然汁浸一夕各五錢全蝎去尾七枚鐵粉三錢甘遂二錢半右生薑自然汁打薄糊為丸菉豆大硃砂為衣每服十五丸食後薑湯下忌甘草此下痰劑也千金龍膽湯治嬰兒血脈盛實四肢驚掣發熱并諸驚癎龍膽草鈎藤柴胡黃芩桂枝芍藥茯苓甘草各六銖螳蜋二枚大黃一兩右水一升煮取五合服之本事人參散治諸癎并慢脾風神昏痰盛人參五錢南星一兩切片以生姜汁并漿水浸煮過性晒乾為末右每服一錢薑三片水煎服加冬瓜仁少許斷癎丹治因驚成癎者黃茋鈎藤細辛半夏南星菖蒲各三錢蟬退甘草桂心逺志防風露蜂房各二錢杏仁二錢半煉蜜丸菉豆大用硃砂麝少許為衣每服二十丸棗湯下日二服夜一服甘遂丸甘遂不蛀者三錢為細末將猪心剖開入甘遂以線縛定用紙裹數層慢火煨熟不可令焦取甘遂乘潤入辰砂末一錢搗勻作四丸每服一丸猪心煮湯下蛇黃丸蛇黃小者二十枚以猪膽汁拌勻入火煆通紅取出地上出火毒研極細右用狗膽一枚取汁和粟米飯丸菉豆大每服十五丸溫酒下吐涎乃效蛇黃丹治諸癎及小兒急驚風蛇黃四枚磁盞內煅紅以猪膽汁一碗淬乾白附子南星辰砂另研麝香各五錢右末糯米糊丸桐子大每服量大小或一二丸或三五丸溫酒米湯任下當歸龍膽丸治腎水隂虛風熱藴積時發驚悸癎搐即龍薈丸方在脅痛門補胃燥痰丸治隂癎服涼藥太過損傷脾胃白术二錢蒼术陳皮半夏南星茯苓各一錢半木香一錢藿香七分甘草四分甚者加附子五分姜五片水煎服寶鑑沈香天麻丸治一小兒四嵗因長老摩頂受記生人念咒恐懼發搐痰涎有聲目多白睛强項背一時許方醒後每見皂衣人即發多服犀硃腦麝鎮墜之藥已四年餘無功又添行步動作神思如癡脈沈弦而急針經云心脈滿大癎瘈筋攣病久氣弱多服鎮墜寒凉之劑復損正氣故添動作如癡先灸兩蹻各二七壯次服此藥又肝脈小急蓋小兒神氣尚弱因而被驚神思無依又動于肝肝主筋故癎瘈筋攣沈香益智川烏各二錢天麻防風半夏附子炮各三錢羌活五錢甘草當歸殭蠶各一錢半獨活四錢經云恐則氣下精氣怯而上焦閉以羌活獨活苦溫引氣上行又入太陽為引用以為君天麻防風辛溫以散之當歸甘草辛甘溫以補氣血之不足養胃氣以為臣附子川烏益智大辛溫行陽退隂又治客寒傷胃腎主五液入脾為涎以生薑半夏燥濕化痰沈香辛溫體重氣清去怯安神故以為使每服五錢生薑三片水煎去渣溫服食前三劑愈劉宗厚曰按癎症本從熱治然亦有壞症而成隂者如錢仲陽所治王氏子吐㵼諸醫藥下之至虛變慢驚手足瘈瘲而身冷醫復與八正散錢氏曰不能食而胃中虛若利大小便即死久則脾腎俱虛當身冷而閉目必用益黃散史君子丸補脾遂能飲食後又不語錢氏以地黃丸補腎一月而安皆此意也此方用大熱之藥乃從權以救前治之失非常治之道也蜜他僧治暗風癲癎以開痰迷心竅蜜他僧成塊者纒以鐵線又用鐵線掛火中煅紅用酒醋一升淬盡出火毒為極細末每服一錢麝香湯調下許學士驚氣丸發則牙關緊急涎潮昏塞醒則精神若癡附子木香殭蠶白花蛇橘紅天麻麻黃乾蝎天南星薑汁浸一夜各五錢蘇子一兩殊砂二錢半為衣右為末加氷麝少許煉蜜丸如龍眼大每服一丸金銀薄荷湯化下溫酒亦可此豫家祕方也一軍人犯法臨刑得釋縛精神頓失如癡與一丸服訖而寐及覺病已失矣一婦因避盜失心數年授此方不終劑而愈又一婦狂厥者十年諸治不驗豫授此方去附子加鐵落亦不終劑而愈鐵粉非但化痰鎮心至如摧抑肝邪特異若多恚怒肝邪大盛鐵粉能制伏之此金制木之意也顫振門生生子曰顫振者非寒禁鼓栗乃木火上盛腎隂不充下虛上實實為痰火虛則腎虧法則清上補下新寨馬叟年五十九因秋缺稅官杖六十得驚氣成風搐已三年矣病大發則手足顫掉不能持物食則令人代哺口目張睒唇舌嚼爛抖擻之狀如線引傀儡每發市人皆聚觀夜卧發熱衣被盡蹇遍身燥癢中熱而反外寒久欲自盡手不能繩傾産求醫至破其家而病益堅叟之子邑中舊小吏也以父母病訊戴人戴人曰此病甚易治若隆暑時不過一涌再涌奪則愈矣今已秋寒可三之如未更刺腧穴必愈先以通聖散汗之繼服涌劑則痰一二升至晚又下五七行其疾小愈待五日再一涌出痰三四升如雞黃成塊狀如湯熱叟以手顫不能自探妻與代探咽嗌腫傷昏憒如醉約一二時許稍稍省又下數行立覺足輕顫減熱亦不作足亦能步手能巾櫛自持匙筯未至三涌病去如濯病後但覺極寒戴人曰當以食補之久則自退蓋大疾之去衛氣未復故宜以散風導氣之藥切不可以熱劑溫之恐反成他病也生生子曰據戴人此治非真知其為痰火盛實者莫敢如此療也木之有餘由金之衰弱病既久恐亦有始同而終異者況吐汗下之後謂絶不必補養得乎病之輕者或可用補金平木清痰調氣之法在人自斟酌之摧肝丸鎮火平肝消痰定顫膽星鈎藤黃連酒炒滑石飛鐵華粉各一兩青黛三錢殭蠶炒五錢天麻酒洗二兩辰砂飛五錢大甘草二錢右末以竹瀝一碗薑汁少許打糊丸菉豆大食後及夜茶下一錢五分忌雞羊本事鈎藤散治肝厥頭搖眩運能清頭目鈎藤陳皮半夏麥冬茯苓各七分人參甘菊勿悮用野菊花防風各五分石膏一錢甘草三分薑二片水煎服參术湯氣虛顫掉人參白术黃茋各二錢茯苓甘草陳皮各一錢甚者加附子水煎服統㫖祕方補心丸心虛手振當歸生地各一兩半川芎甘草人參各一兩柏子仁酸棗仁各三兩逺志去心二兩半辰砂飛膽星各五錢金箔二十片麝香一錢琥珀三錢石菖蒲六錢茯神去皮心七錢為末􅔻餅糊丸菉豆大辰砂為衣每七八十丸津唾咽下或姜湯下統㫖祕方定心丸老人戰動風氣所致及血虛而振天麻蒸熟秦艽去蘆全蝎去頭尾細辛各一兩熟地生地川歸川芎芍藥各二兩防風荆芥各七錢白术黃茋各兩半葳靈仙酒洗五錢為末酒糊丸梧子大每服七八十丸食逺白湯或酒送下瘈瘲門生生子曰瘈縮也瘲伸也伸縮不止手如拽鋸搐之類也汗多不止為虛無汗能食為實內經曰心脈急甚者為瘈瘲此心經虛寒治宜補心牛黃散之類又曰心脈滿大癎瘈筋攣此心火實熱也治宜㵼心火涼驚丸主之又曰肝脈小急亦癎瘈筋攣此肝虛也冝續斷丸主之若肝脈盛宜救脾加減建中湯內經謂脾脈急甚亦為瘈瘲此脾虛肝乘之而瘈也故宜實土㵼木之劑建中湯是也劉河澗曰諸熱瞀瘈皆屬于火熱勝風搏并于經絡風主動而不寧風火相乘是以瞀瘈生矣治以祛風滌熱之劑折其火熱瞀瘈立愈若妄加灼艾或飲以發表之劑則死不旋踵矣東垣人參益氣湯熱傷元氣四肢困倦手指麻木時時瘈瘲黃茋二錢甘草炙升麻各五分柴胡六分五味子三十粒甘草生五分人參一錢二分白芍七分水煎服獨活湯風虛昏瞶不自知覺手足瘈瘲或為熱血虛不能服發汗藥及中風自汗尤宜服之獨活羌活人參防風川歸細辛茯神逺志半夏桂心白薇菖蒲川芎各五錢甘草炙二錢半每一兩薑五片煎溫服胃風飲虛風症能食麻木牙關緊急手足瘈瘲目肉蠕瞤胃中有風面腫白芷一錢二分升麻二錢葛根蒼术蔓荆子川歸身各一錢甘草柴胡藁本羌活草豆仁黃柏麻黃不去節各五分薑三片棗二枚水煎溫服千金薯蕷丸腎氣虛弱風氣百疾頭眩驚悸瘈瘲薯蕷草八分當歸十分桂心七分神曲炒熟地黃人參各十分川芎芍藥白术麥冬杏仁各六分甘草二十分柴胡桔梗茯苓各五分鹿角膠七分乾薑白斂各三分防風黃芩各六分大豆黃卷七分大棗百枚為膏右末和棗膏加煉蜜丸如彈子大空心酒服一丸日三服續斷丸肝勞虛寒脅痛脹滿眼昏不食攣縮瘈瘲續斷酒浸川芎川歸半夏薑製橘紅乾薑炮各一兩桂心甘草炙各五錢右末煉蜜丸桐子大每百丸白湯下牛黃散心虛風筋脈攣搐神昏語澀牛黃氷片硃砂麝各一錢蟬退烏蛇肉各一兩全蝎炒殭蠶炒桑螵蛸羚羊角天麻阿膠防風甘菊桂心細辛蔓荆子側子去皮獨活犀角各五錢麻黃七錢半右為末和勻再研每服一錢豆淋酒下續命煮散風氣留滯心中昏瞶四肢無力口眼瞤動或時搐搦或渴或自汗防風獨活當歸人參細辛葛根熟地黃芍藥川芎甘草逺志荆芥半夏各五錢官桂七錢半每一兩薑三片煎汗多者加牡蠣一錢半獨活散治風熱化痰細辛石膏甘草炙各五錢獨活防風藁本旋覆花川芎蔓荆子各一錢右每服三錢薑三片水煎服痓門附勞風生生子曰內經云肺移熱于腎傳為柔痓痓古云痙徑切之謂也仲景諸公傷寒書皆以為太陽風濕所致亦有兼陽眀經者仲景謂汗下過多及瘡家發汗過度皆成痓此指外感之邪原係傷寒家法也陳無擇張子和諸公云亦有風火痰熱之內因者謂此病多由亡血筋無所營故邪得以所襲丹溪謂比癎為虛此皆指內傷之症也觀剛柔二字則亦當有虛實之别大抵剛者多從外感柔者多從內傷故治斯疾者但眀知從外感而來則用傷寒家法若從雜症而來則用陳無擇丹溪劉宗厚張子和諸家之法庶表裏詳盡始無遺此失彼之患矣內經云諸痓項強皆屬于濕王注太陽傷濕又云諸暴強直皆屬于風王注陽內鬱而隂行于外劉宗厚云按內經言痓肺腎太陽督脈與夫六氣皆能為之大抵皆主于濕仲景云太陽病發熱無汗反惡寒者名曰剛痓成無已曰痓者痙也強也千金曰太陽中風重感寒濕則變痓太陽病發熱無汗為表實則不當惡寒今反惡寒者則太陽中風重感于寒為痓病也以表實感寒故曰剛痓太陽病發熱汗出不惡寒者名曰柔痓成無已曰太陽病發熱汗出為表虛則當惡寒其不惡寒者為陽眀病今發熱汗出而不惡寒者非陽眀證則是太陽中風重感于濕為柔痓也表虛感濕故曰柔痓太陽病發熱脈沈而細者名曰痓成無已曰太陽主表太陽病發熱為表病脈當浮大今脈反沈細既不愈則太陽中風重感于濕而為痓也金匱要略曰太陽病其證備身體強兀兀然脈反沈細此為痓括蔞桂枝湯主之太陽病發汗太多因致痓成無已曰太陽病發汗太多則亡陽內經曰陽氣者精則養神柔則養筋陽微不能養筋則筋脈緊急而成痓也病身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨搖頭卒口噤背反張者痓病也成無已曰太陽中風為純中風也太陽中寒為純傷寒也皆不作痓惟是太陽中風重感寒濕乃變為痓也身熱足寒者寒濕傷下也時頭熱面赤目脈赤風傷于上也頭搖風主動也獨頭搖者頭為諸陽之㑹風傷陽也若純傷風者身亦為動搖手足為之搐搦此皆內挾寒溫故頭搖也口噤者寒主急也卒口噤者不常噤也有時而緩若風寒相摶則口噤而不時開此皆加之風濕故卒口噤也足太陽之脈起于目內眥上額交巔上其支别者從巔入絡腦還出别下項循肩膞內夾脊抵腰中下貫臀以下至足風寒客于經中則筋脈拘急故頸項強急而背反張也風病下之則痓復發汗必拘急瘡家雖身疼痛不可發汗汗出則痓劉宗厚曰按此謂汗下而致痓則不專于風寒濕之外傳矣是又因壞證而成也發汗下之太過皆亡津液損血之所由也劉宗厚曰按痓症屬風寒濕所傷有汗者脈必浮緩無汗者脈必浮緊若其脈沈細者濕所傷也堅直上下行皆緊之象也發汗已其脈如蛇亡津液而無胃氣之象也子和云吕君玉妻年三十病風搐目眩角弓反張數日不食諸醫皆作驚風暗風風癎治之以南星雄黃烏附用之不效戴人曰諸風掉眩皆屬肝木曲直搖動風之用也陽主動隂主靜由火盛制金金衰不能平木肝木茂而自病因湧風痰二三升次以寒劑下十餘行又以排針刺百㑹穴出血一杯愈劉宗厚曰按風搐本與痓症不同而痓症屬濕土極必兼風木動搖之化風搐屬木木極必見金燥緊斂之形要之亦可同論故取此條以證痓病不專風寒濕之外至亦有風火熱之內作者也三因方云夫人之筋各隨經絡結束于身血氣內虛外為風寒濕熱之所中則痓以風散氣故有汗而不惡寒曰柔痓寒泣血無汗而惡寒曰剛痓原其所因多由亡血筋無所營故邪得以襲之所以傷寒汗下過多與夫病瘡人及産後致于斯疾者槩可見矣診其脈皆沈伏弦緊但陽緩隂急則久久拘攣隂緩陽急則反張强直二證各異不可不别丹溪曰痓切不可作風治兼用風藥大率與癎相似比癎為甚為虛宜帶補多是氣虛有火有痰宜用人參竹瀝之類一男子二十餘嵗患痘瘡靨謝後忽患口噤不開四肢強直不能屈時或繞臍腹痛一陳則冷汗如雨痛定則汗止時作時休其脈弦緊而急如真弦狀向知此子極勤苦意其因勞倦傷血山居多風寒乘虛而感又因痘瘡其血愈虛當用辛溫養血辛凉散風遂以當歸芍藥為君川芎青皮鈎藤為臣白术陳皮甘草為佐桂枝木香黃連為使更加紅花少許服二十帖而安王海藏云發汗太過多因致痓身熱足寒項強惡寒頭熱面腫目赤頭搖口噤背反張者太陽痓也若頭低視下手足牽引肘膝相搆陽眀痓也若一目或左右邪視并一手足搐搦者少陽痓也汗之止之和之下之各隨其經可使必已在表無汗宜汗之有汗宜止之陽眀痓屬裏宜下之少陽痓半表半裏宜和之所謂各隨其經也劉宗厚曰謹按傷寒痓病活人以太陽中風又感寒濕而致則專于外邪所傷然仲景亦有汗下過多之戒則又出于壞證所成矣蓋外邪所傷者通宜解散仲景言剛柔活人分隂陽難知論經絡等諸方詳矣至于治壞證補虛救失之法諸方則亡也又千金謂溫病熱入腎中亦為痓小兒病癎熱盛亦為痓若此治法俱未見之也況此二者之外又有血氣本虛之人如産後汗出多而變痓者或因七情怒氣而發痓者或因濕熱內盛痰涎壅遏經絡而作痓者治各不同也大抵傷寒有外邪之可解宜用風藥發散風寒又風藥亦能勝濕耳至于邪熱入腎亦非風藥之所能療也其內證作痓本無外邪前人豈可仍用風藥處治惟宜補血降火敦土平木清痰去濕隨證而用不可不察也海藏云若汗後不解乍靜乍躁目直視口噤往來寒熱脈弦者少陽風痓宜柴胡防風湯柴胡防風各一兩人參黃芩各五錢半夏製六錢生薑甘草各六錢半棗三枚每服一兩水煎服若發汗過多發熱頭面搖卒口噤背反張者太陽兼陽眀也宜去風養血防風當歸散主之防風當歸川芎地黃每服一兩水煎神术湯治剛痓解利無汗蒼术三錢防風二錢甘草一錢薑葱水煎服白术湯加桂心黃茋治柔痓解利有汗白术三兩防風二兩甘草一兩每服五錢薑三片水煎服一日二服漸漸汗止為解仲景葛根湯太陽無汗而小便少氣上衝胸口噤不得語欲作剛痓者葛根四兩麻黃生薑各三兩桂枝芍藥甘草各二兩大棗十二枚每服五錢煎服取微汗若發熱無汗惡寒名曰剛痓宜麻黃加獨活防風湯麻黃桂枝各一兩芍藥三兩甘草五錢獨活防風各一兩每服一兩水煎溫服瓜蔞桂枝湯太陽病其證偹身體強兀兀然脈反沈遲此為柔痓瓜蔞根甘草芍藥各二兩桂枝生薑各三兩大棗十二枚水九升煎取三升分三服取微汗汗不出啜粥發之海藏治發汗自汗而不惡寒者名柔痓宜桂枝加川芎防風湯桂枝芍藥生薑各一兩半甘草防風川芎各一兩大棗六枚每服一兩水煎服凡剛柔二痓皆可與小續命湯但要識加減法若柔痓自汗者去麻黃夏間及病有熱者減桂枝一半冬及初春去黃芩千金續命湯卒中半身不遂手足拘急不得屈伸身體冷或智或癡或身強直不語或生或死狂言不可名狀角弓反張或欲得食或不用食大小便不利皆療之人參桂心川歸獨活黃芩甘草炙乾薑炮各七錢半石膏一兩半杏仁四十枚以水九升煮取三升分溫三服日二服無汗者加麻黃若汗後不解乍靜乍躁目直視口噤往來寒熱脈弦者少陽風痓宜柴胡加防風湯柴胡防風各一兩人參黃芩各五錢半夏六錢生薑甘草各六錢半棗三枚每服一兩水煎倉公當歸湯賊風口噤角弓反張痓證川歸防風各七錢半獨活一兩半附子一枚細辛五錢麻黃一兩三錢酒五升煮取三升服一升口不開者格口納之一服當蘇二服小汗三服大汗活人八物白术散隂痓一二日面腫手足厥冷筋脈拘急汗不出恐隂氣內傷麻黃白术茯苓五味子羌活各五錢桂心附子各三分良薑一分每四錢薑五片水煎服附子散隂痓手足厥逆筋脈拘急汗出不止頭項强直頭搖口噤桂心川芎各三錢附子炮白术各一兩獨活五錢每三錢棗一枚水煎服桂心白术湯隂痓手足厥冷筋脈拘急汗出不止白术防風甘草桂心川芎附子每五錢薑五片棗二枚水煎溫服丹溪治虛婦因怒手足強直十指如束右手脈弦虛左手脈弦大而強稍堅此風木攻脾土宜速㵼肝氣助肺金補脾土之隂黃連二錢南星白术人參黃芩天麻川芎木通陳皮青皮各五錢甘草一分水煎入姜汁辣服肘後方中風體強直不得屈伸反覆刮枳樹皮細切一升以酒二升浸一宿每日溫服半升酒盡再作即枳實樹皮去風濕效千金方治口噤手足不隨而手體強直伏龍肝五升以水七升攪勻取汁飲之痓痙辨生生子曰丹溪云痓當作痙傳寫之悮耳考之諸書亦未有能辨之詳注之確者惟郭雍氏云痙與痓當是二病謂昔劉寅氏有言病以時發者謂之痙不以時發者謂之痓似亦未能詳悉厥後以其所歷見及治之效與不效者反覆考核二症之名二字之義其用心可謂至勤至懇者矣然終未能昭著允若故後之人疑其為二症者不亦宜乎愚按靈素仲景以下諸書云痓云痙字雖兩般治多雷同殆亦不必犁而為二也苦辨之則愈支離膚見謂痓乃病之名痙乃病之狀原其有剛柔二種以病發之時而經筋脈絡僵徑角弓反張故曰痙痙是徑急也是以其病發之狀象而名之也不然何歷代諸公或以治痓之方治痙或以治痙之方治痓諸皆能效治既同而不殊則症當一而不二也焉用分勞風即痓之類丹溪曰痓比癎為虛蓋因勞汗遇風內挾太陽寒濕之邪治亦與痓同法但當視其所勞則知虛在何臟如房勞則腎虛汗出腠理開風入皮腠得寒則閉風不能出與水俱行其人當目下腫如卧蠶之狀戴人云腎主水其經至于目下故也不禁房室則死眀其虛在腎也所以關于太陽何也太陽主寒其經最在外腠理得寒則閉故太陽先受邪也治宜八物白术散倉公當歸湯黃茋湯汗多氣虛發痓黃茋蜜炙二錢人參白术茯苓白芍炒各一錢甘草炙八分桂枝五分水煎服當歸散血虛及去血過多發痓當歸酒洗二錢川芎熟地防風黃茋各一錢芍藥一錢半甘草四分水煎服理氣平肝散七情所傷發痓烏藥香附各一錢半青皮枳殼芍藥川芎柴胡木香各一錢甘草薑三片水煎服木香磨水二匙加入清痰湯痰火攻作項強口噤角張反痓山梔黃芩半夏炮橘紅茯苓瓜蔞仁枳殼貝母香附童便浸各一錢甘草五分水煎入竹瀝薑汁各三四匙食逺服去濕清熱散白术二錢蒼术二錢半澤㵼茯苓天花粉山梔各一錢羌活七分甘草四分水煎服芎枳丸治勞風強上冥視肺熱上壅唾稠川芎枳殼等分為末蜜丸桐子大每服三五十丸食後溫水下日三服祛風清金散肺熱壅盛痰唾如膿防風括蔞根桔梗枳殼旋覆花川芎各一錢山梔黃芩貝母瓜蔞仁炒茯苓天門冬麥門冬橘紅各八分五味子十五粒甘草四分水煎服生生子曰按內經評熱病論篇帝曰勞風之病何如岐伯曰勞風發在肺下其為病也使人強上冥視唾出若涕惡風而振寒此為勞風之病帝曰治之奈何岐伯曰以救俯仰巨陽引精者三日中年者五日不精者七日咳出清黃涕其狀如膿大如彈丸從口中若鼻中出不出則傷肺傷肺則死也引精謂目中之精眀引動䏻辨人與物也啓𤣥子注曰勞風者從勞風生故曰勞風勞謂腎勞也腎脈者從腎上貫肝膈入肺中故腎勞風生上居肺下也強上好仰也冥視謂合眼視不眀也腎精不足外吸膀胱膀胱氣不能上營故使人頭項強而視不眀也肺被風薄勞氣上薰故令唾出若鼻涕狀腎氣不足陽氣內攻勞熱相合故惡風而振寒肺傷則營衛散解魄不內治故死林氏謂強上者似角弓反張也冥視者目開不見物也凡痓病皆同不識人或反視斜視也治法當與痓同千金方冥視作目眩不得卧靈樞曰病而不得眠者何氣使然岐伯曰衛氣不得入于隂常留于陽留于陽則陽氣滿陽氣滿則陽蹻盛不得入于隂則隂氣虛故目不瞑矣大惑論黃帝問于伯髙曰夫邪氣之客人也或令人目不瞑不卧出者何氣使然伯髙曰五穀入於胃也其糟粕津液宗氣分為三隧故宗氣積于胸中出於喉嚨以貫心脈而行呼吸焉營氣者祕其津液注之於脈化以為血以榮四末內注五臟六腑以應刻數焉衛氣者出其悍氣之漂疾而先行于四末分肉皮膚之間而不休者也晝日行于陽夜行于隂常從足少隂之分間行于五臟六腑今厥氣客于五臟六腑則衛氣獨衛其外行于陽不得入於隂行于陽則陽氣盛陽氣盛則陽蹻陷不得入于隂隂虛故目不瞑黃帝曰善治之奈何伯髙曰補其不足㵼其有餘調其虛實以通其道而去其邪飲以半夏湯一劑隂陽已通其卧立至黃帝曰善此所謂決瀆壅塞經絡大通隂陽和得者也願聞其方伯髙曰其湯方以流水千里以外者八升揚之萬遍取其清者五升煮之炊以葦薪火沸置秫米一升治半夏五合徐炊令竭為一升半去其滓飲汁一小杯日三稍益以知為度故其病新發者覆杯則卧汗出則已矣久者三飲而已矣此去飲之劑也內經曰胃不和則卧不安帝曰人之不能偃卧者何也岐伯曰肺者臟之蓋也肺氣盛則肺大肺大則不能偃卧王海藏云膽虛不眠寒也聖惠方酸棗仁炒為末以竹葉湯調服張子和治一富家婦人因思慮過甚二年不得寐無藥可療其夫求治脈之兩手俱緩此脾受邪也脾主思故也乃與其夫約以怒激之多取其財飲酒數日不處一法而去其婦大怒汗出是夜困眠如此者八九日不寤自是食其脈得平此怒勝思故也腫病令人不得卧卧則驚驚則咳甚此水氣凌肺也溫膽湯治大病後虛煩不得眠或則驚悸極效丹溪治煩不得眠益元散加牛黃服之有心血不足而不寐者用益榮湯仲景酸棗湯治虛煩不得眠酸棗仁二升甘草一兩知母茯苓川芎各二兩水八升煮酸棗仁得六升納諸藥煎取三升分溫三服一方加生薑二兩本事鱉甲丸膽虛不得眠四肢無力酸棗仁鱉甲羌活牛膝黃茋人參五味子各等分蜜丸梧子大每四五十丸溫酒下聖惠酸棗地黃湯骨蒸勞煩心不得眠酸棗仁一兩水一大碗半研絞取汁下米二合煮粥熟再入地黃汁一合更煮過不計時服之六物湯治振悸不得眠四君子加酸棗仁生薑煎服許學士珍珠母丸肝虛內受風邪卧則寬散而不收狀若驚悸珍珠母另研末三錢當歸熟地各一兩半人參茯苓酸棗仁柏子仁犀角各一兩沈香龍齒各五錢為末蜜丸梧子大辰砂為衣每四五十丸金銀薄荷湯下日午及夜服一方多虎睛一對麝香一錢獨活湯治同前相兼服獨活羌活人參前胡細辛半夏酸棗仁沙參茯苓甘草五味子各等分每七錢薑三片烏梅一箇不拘時煎服紹興癸丑豫待次四眀有董生者患神氣不寧每卧則魂飛揚覺身在牀而神魂離體驚悸多魘通夕無寐更醫不效豫為診視詢之曰醫作何病治董曰衆皆以為心病豫曰以脈言之肝經受邪非心病也肝氣因虛邪氣襲之肝藏魂者也遊魂為變平人肝不受邪卧則魂歸于肝神靜而得寐今肝有邪魂不得歸是以卧則魂飛揚若離體也肝主怒故小怒則劇董欣然曰前此未之聞雖未服藥已覺沈疴去體矣願求治之豫曰公且持此說與衆醫議所治之方而徐質之閲旬日復至云醫遍議古今方無與病相對者故豫處此二方以贈服一月而病悉除此方用真珠母為君龍齒佐之真珠母入肝經為第一龍齒與肝同類也龍齒虎睛今人例以為鎮心藥殊不知龍齒安魂虎睛定魄各言其類也蓋東方蒼龍木也屬肝而藏魂西方白虎金也屬肺而藏魄龍能變化故魂遊而不定虎能專靜故魄止而有守豫謂治魄不寧者宜以虎睛治魂飛揚者宜以龍齒萬物有成理而不失在夫人達之而已益榮湯血不足不寐及怔忡驚悸當歸黃茋逺志酸棗仁炒茯神柏子仁麥冬白芍人參紫石英各一錢木香七分甘草五分薑三片棗二枚水煎服多卧黃帝曰人之多卧者何氣使然岐伯曰此人腸胃大而皮膚濕而分肉不解焉腸胃大則衛氣留久皮膚濕則分肉不解其行遲夫胃氣者晝常行于陽夜行于隂故陽氣盡則寐隂氣盡則寤故腸胃大則衛氣行留久皮膚濕分肉不解則行遲留于隂也久其氣不精則目瞑故多卧矣其腸胃小皮膚滑以緩分肉解則衛氣留于陽也久故少瞑焉黃帝曰其非常經也卒然多卧者何氣使然岐伯曰邪氣留于上焦上焦閉而不通已食若飲湯衛氣留久於隂而不行故卒然多卧焉大惑篇海藏曰膽實多睡熱也生棗湯治膽熱多睡生酸棗仁為末茶薑汁調服又方生酸棗仁一兩臘茶二兩以生薑汁塗炙微焦為末每服二錢水七分煎六分溫服醒睡湯酸棗仁沙參各一錢半麥冬一錢茯神甘草各五分薑一片水煎服煩躁門仲景云煩屬肺躁屬腎火入於肺則煩入于腎則躁大抵煩躁皆心火為病火旺則金爍而水虧也惟火獨存故肺腎合而為煩躁又脾經絡于心中心經起于脾中二經相摶濕熱生煩夫煩者擾擾心亂兀兀欲吐怔忡不安成無已曰煩為擾亂而煩躁為憤怒而躁合而言之煩躁為熱也析而言之煩陽也躁隂也煩為熱之輕者躁為熱之甚者陳無擇曰內熱為煩外熱為躁又曰虛煩身不覺熱頭目昏疼口乾咽燥不渴清清不寐皆虛煩也婁英曰先賢治煩躁齊作有屬熱者有屬寒者獨煩而不躁者多屬熱惟悸而煩者為虛寒躁不煩者多屬寒惟火邪者為熱蓋煩者心中煩或胸中煩皆內熱也躁者身體手足躁擾或祼體不欲近衣或欲坐井中為外熱也內熱者有本之熱故多屬熱外熱者多是無根之火故屬寒也生生子曰仲景成無已二公所論煩躁皆為火熱是祖內經夫熱病皆傷寒之類也乃傷寒家語言其邪自外而入至于煩躁皆為熱候豫謂躁有隂陽煩有虛實陶節庵曰先煩而躁者為實先悸而煩者為虛又曰煩漸生躁有隂陽虛實之别心熱則煩陽實隂虛腎熱則躁隂實陽虛煩為熱輕躁為熱重此亦傷寒家語也雜症之煩躁又各有虛實寒熱不同須當分别而治虛煩者心中擾亂精神不能任持似脹不脹悒悒悶悶飲食不甘美睡卧不安寧者是也治以養心血鎮火安神之劑如安神丸之類實煩者或心火燔盛或水飲痰涎停于胸膈壅悶不安者是也治以消痰逐飲散邪之劑如梔子豆豉湯蠲飲湯五苓散之類陽躁者煩渴欲飲憤激躁怒二便不利經云諸躁狂越皆屬于火者是也治如丹溪用妙香丸之類隂躁者渴不欲飲極其躁擾或上熱下寒此為隂盛格陽為陽氣虛􅉵不能復入皇皇欲坐井中者是也治以理中湯四逆湯之類大抵煩症多屬于虛經曰夏脈者心也其不及令人煩心又云肝腎脾虛皆令人體重煩寃迹是知煩多由于虛也當尋傷寒法外之治今録治方于左以備採用內外俱虛身冷而汗出微嘔而煩擾手足厥逆不得安靜者死熱病七八日其脈微細小便不利加暴口燥脈代舌黑焦乾者死保命集云起卧不安睡不穩謂之煩宜梔豉湯竹葉石膏湯活人書云但獨熱者虛煩也諸虛煩熱與傷寒相似但不惡寒身不疼痛故知非傷寒也不可發汗頭不痛脈不緊數故知非裏實也不可下病此者內外皆不可攻攻之必遂煩渴當與竹葉湯若嘔者與陳皮湯一劑不愈再與之孫真人云此法數用有效陳皮湯陳皮一兩半甘草炙竹茹各五錢人參一錢半每服七錢薑三片棗二枚水煎服淡竹茹湯心虛悶頭疼短氣內熱不解心中悶亂及産婦心虛驚悸煩悶欲絶麥門冬去心小麥各二兩半甘草炙一兩人參茯苓各一兩半半夏湯洗二兩每服四錢薑七片棗二枚淡竹茹一塊水煎服東垣硃砂安神丸心亂煩熱怔忡心神顛倒兀兀欲吐胸中氣亂而熱有似懊憹之狀皆膈上血中伏熱蒸蒸不安宜用權法以鎮隂火之浮行以養上焦之元氣用甘草之甘溫補之當歸生地又為長生隂血之聖藥黃連去心煩除濕熱硃砂納浮遊而安神眀方見怔忡門仲景下痢後更煩按之心下濡者為虛煩也梔豉湯主之丹溪治一女子年二十餘嵗在室素強健六月間發煩悶困􅉵不食發時欲入井六脈皆沈細而弱數兩日後微渴衆以為病暑治不效四五日加嘔而人瘦手心極熱喜在隂處漸成伏脈時妄語豫急製局方妙香丸如桐子大以井水下一丸半日許大便藥已出病無退減遂以麝香水洗藥以針穿三竅次日以凉水送下半日許大便下稠痰數升是夜得睡困頓伏枕旬日而愈因記金匱云昔肥而今瘦者痰也遂作此藥治之妙香丸丹溪云疏決腸胃制伏木火藥也辰砂飛五兩牛黃龍腦膩粉麝研各一兩巴豆二百五十粒去皮膜炒熟研金箔九十片右研勻煉黃蠟六兩入好蜜三分同煉令勻為丸每兩作三十丸如要此藥速行針刺一眼子冷水浸少時服效更速小兒百病丸如菉豆大逺志湯治心虛煩熱夜卧不寧及病後虛煩逺志去心黃茋當歸麥冬石斛酸棗仁炒各一錢二分人參茯神各七分甘草五分水煎服煩甚者加竹葉知母竹葉湯傷寒大病後及霍亂吐㵼後心虛煩悶內熱不解竹葉麥冬人參茯苓小麥半夏各一兩甘草五錢每六錢薑五片水煎服小草湯虛勞憂思過度遺精白濁虛煩不安小草黃茋川歸麥冬石斛酸棗仁各一兩人參甘草各五錢每六錢薑五片水煎服地仙散傷寒後伏暑後煩熱不安及虛勞不安地骨皮二兩防風一兩甘草五錢每六錢薑五片水煎服竹茹麥冬湯大病後表裏俱虛內無津液煩渴心躁及諸虛煩熱與傷寒相似但不惡寒身不痛不可汗下者淡竹葉麥門冬等分每八錢水煎酸棗仁湯霍亂吐下後增劇虛勞煩擾奔氣在胸中不得眠或發寒熱頭疼暈悶酸棗仁一兩七錢半人參桂心各二錢半知母茯苓各三錢石膏五錢甘草二錢每七錢薑棗煎服人參竹茹湯胃口有熱嘔吐咳逆虛煩不安人參五錢半夏一兩分二帖加薑七片陳皮二錢半竹茹一錢水煎服竹茹石膏湯大病後餘熱煩悶溫膽湯大病後虛煩不得眠及驚悸五苓散水停心下作驚悸煩悶清心蓮子飲方見癃閉門梔子豆豉湯治邪在上焦四逆湯理中湯健忘門戴元禮曰健忘者為事有始無終言談不知首尾此以為病之名非比生成之愚頑也靈樞經曰人之善忘者何氣使然岐伯曰上氣不足下氣有餘腸胃實而心氣虛虛則榮衛留于下久之不以時上故善忘也丹溪心法曰此證皆由憂思過度損其心胸以致神舍不清遇事多忘病在心脾凡思傷脾以故令人轉盼遺忘治之以歸脾湯須兼理心脾神寧意定其證自除也歸脾湯思慮過度勞傷心脾健忘怔忡白术茯神黃茋酸棗仁各一兩人參木香各五錢甘草炙二錢半每六錢薑三片棗二枚圓眼肉五枚水煎服定志丸心氣不定恍惚多忘逺志石菖蒲各二兩人參一兩白茯苓三兩右末煉蜜丸梧子大硃砂為衣每服三十丸米飲下一方加茯神加味茯苓湯痰迷心竅健忘失事二陳湯加益智仁香附人參薑水煎服讀書丸健忘服之日記千萬言石菖蒲兔絲子逺志各一兩地骨皮二兩生地五味子川芎各一兩為末薄糊丸梧子大每服七八十丸臨卧白湯下孔子大聖枕中湯常服令人聰眀龜甲龍骨逺志菖蒲各等分為末酒服方寸匕日三服聖惠千金翼同補心虛治健忘令人耳目聰眀以戊子日服之開心不忘菖蒲逺志各等分為末每服方寸匕常服令人耳目聰眀從外見裏令人長生去三百病毒不能為害二丹丸安神定志和血治健忘熟地黃天門冬丹參各一兩半茯苓甘草各一兩逺志人參各五錢麥門冬一兩右末煉蜜丸梧子大硃砂五錢為衣每服五十丸白湯下又讀書方菖蒲逺志桂甘草地骨人參巴㦸天倍煮茯苓糊丸服讀書日記萬千言狀元丸教子第一方菖蒲去毛逺志甘草水煮去心各一兩白茯神去木皮巴㦸天水煮去心五錢人參地骨皮去心各三錢右末用白茯苓去皮二兩糯米二兩共為粉用石菖蒲三錢煎濃湯去渣打糊為丸每食後午時臨睡各服三五十丸赤水元珠卷十四
