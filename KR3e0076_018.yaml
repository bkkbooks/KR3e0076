body:
  text: 赤水元珠卷十八明孫一奎撰痰證外證増寒壯熱惡風自汗胸滿氣上衝咽不得息頭不疼項不强若涎多者亦隠隠頭疼脈有寸浮者亦有寸伏者以意㕘之柴胡半夏湯金沸草散大半夏湯氣上衝𤓰蒂散吐之此亦風痰證也如食積痰虚損痰不用此藥傷食亦頭疼惡寒身熱但左手脈平和右手脈𦂳盛知為食大橘皮二陳湯心腹滿脹大柴胡湯下之胸滿嘔吐者瓜蒂散吐之亦夾食傷寒也全傷食者恐不可用柴胡虚煩諸虚煩熱與傷寒相似但不惡寒頭不疼身不痛為異耳表既虚不可汗裏不實不可下叔和云虚煩有熱不可攻脚氣傷寒𫝊足不𫝊手所以寒濕之氣蒸于足發則類傷寒其證頭疼身熱肢節痛大便閉或嘔但初病時起于脚膝屈弱不能移動為異耳感於寒所患必冷越婢小續命湯入生薑汁最妙感于暑所患是熱小續命去附子減桂一半脚腫木𤓰散檳榔散大便秘脾約丸論傷寒用藥法則標本逆從之既明五劑之藥須用識且如表汗用麻黄無葱白不發吐痰用𤓰蒂無豉不湧去實熱用大黄無枳實不通温經用附子無乾薑不熱甚則以泥清水加葱白煎之竹瀝無薑汁不能行經絡蜜導無皂角不能通秘結非半夏薑汁不能止嘔吐非人參竹葉不能止虛煩非小柴胡不能和解表裏非五苓散不能通利小便非天花粉乾葛不能消渇解肌非人參麥門冬五味不能生脈補元非犀角地黄不能止上焦之吐衂非桃仁承氣不能破下焦之瘀血非黄蓍桂枝不能實表間虚汗非茯苓白术不能去濕助脾非茵陳不能去黄疸非承氣不能制定發狂非枳桔不能除痞滿非陷胸不能開結胸非羌活不能治四時之感冐身疼非人參敗毒不能治春温非四逆不能治隂厥非人參白虎不能化斑非理中烏梅不能治蚘厥非桂枝麻黄不能除冬月之惡寒熱隨汗解非薑附湯不能止隂寒之泄利非大柴胡不能去實熱之妄言隂陽咳嗽上氣喘息用加減小青龍分表裏而可汗下此傷寒用藥之大法也隂經用藥格法太隂脾土性惡寒濕非乾薑白术不能燥濕也少隂腎水性惡寒燥非附子不能温潤厥隂肝木藏血榮筋非芍藥甘草不能滋養此經常之道治傷寒看證大畧凡證有頭疼惡寒皆是傷寒無則皆否也何則蓋傷寒則惡寒傷食則惡食理固然也但風從上来陽先受之寒從下来隂先受之風與寒常相因而感冐之時則又不同及其證之外見者則一也一提金脈要人之隂陽即為先天人之氣血即為後天脈者非血非氣乃血氣之先即營行之道路又問曰既知先後天之脈理須明持脈之要曰舉曰按曰尋三字若此不明即隂陽表裏虗實何以别之持脈者輕手循之曰舉重手取之曰按不輕不重委曲求之曰尋截江網論脈雜病以弦為陽傷寒以弦為隂雜病以緩為弱傷寒以緩為和兩手無脈曰雙伏一手無脈曰單伏必有正汗也寸口陽脈中或見沉細者但無力者為陽中伏隂尺部隂脈中或見沉數者為隂中伏陽寸口數大有力為重陽尺部沉細無力為重隂寸脈浮而有力主寒邪表實宜汗浮而無力主風邪表虗宜實尺脈沉而有力主陽邪在裏為實宜下無力主隂邪在裏為虗宜温寸脈弱而無力切忌發吐尺脈弱而無力切忌汗下初按来疾去遲名曰内虛外實去疾来遲名曰内實外虗尺寸俱同名曰緩緩者和而生也汗下後脈静者生躁亂身熱者死乃邪氣勝也温之後脈来歇至者正氣脱而不復生也純絃之脈名曰負負者死按之解索名曰隂陽離離者死隂病見陽脈者生陽病見隂脈者死傷寒撮要論脈左右手脈俱急𦂳盛是夾食傷寒右手脈来空虗左手脈来𦂳盛是勞力傷寒左手脈来𦂳右手洪滑或寸脈沉伏身熱惡寒隠隠頭痛喘咳煩悶胸脇體痛是夾痰傷寒左手脈来𦂳濇右手脈沉數心胸脇下小腹有痛處是血欝内傷外感六經圖及傷寒撮要一提金六經正治㨗法足太陽經委中穴在膕中央約紋動脈陷中膕中央即膝後相對腿灣中也目内眥在面前眼内邊神庭在中間額上額額角也此圖玉枕至隂二穴膀胱經穴也風府穴督脈穴也膀胱與督脈會于頂顛連於風府太陽症項强故併及之足太陽膀胱經圖頭為諸陽之首故多𫝊變受病為先也其脈起于目内眥從頭下至項連風府行身之背終于足也其證頭頂痛項强腰疼骨節痛經曰太陽頭痛脈浮項背强而惡寒嘔逆身疼或已發熱或未發熱者俱宜發表不可輙下之表邪乘虗内陷𫝊變不可勝數又不可利小便利之則引熱入裏其害不淺若本病煩熱小便不利者乃利之則不禁如小便自利如常則不可利也凡有汗不得再發汗汗多不得利小便足太陽起于目内眥上額過神庭彎至玉枕過項夾背脊由後亷而下至小趾外側至隂穴止太陽經見證法假如先起惡寒者本病已後發熱者標病若有一毫頭痛惡寒身熱不拘日數多少便宜發散自然熱退身凉有何變證此處寒熱標本指病之先後言上文本病煩熱之本字指六經標本言不可混看辯證法表虗自汗者為風傷衞氣宜實表表實無汗者為寒傷營血宜發表診脈法診脈大凡皮膚之上輕手按之便得曰浮脈浮𦂳有力為傷寒脈浮緩無力為傷風用藥法冬月正傷寒用升陽發表湯即加減麻黄湯冬月傷風用疎邪實表湯即加減桂枝湯春秋無汗用羗活冲和湯發表有汗用加減冲和湯實表腹痛小建中湯痛甚桂枝加大黄湯夏月無汗用神术湯有汗用前加減冲和湯此圖神庭穴督脈穴也陽明經神庭過故載之足陽明胃經圖乃兩陽合明于前也一曰府者居中土也萬物所歸也其脈起于鼻額上頭額絡于目循于面行身之前終于足也經曰傷寒二日陽明脈大又曰尺寸俱長者陽明受病也足陽明起于鼻兩傍上頭維從乳中近外傍而下前臁梁丘穴至大趾次趾之端厲兌穴止陽明經見證法頭額痛目痛鼻乾不眠微惡寒是足陽明胃經受病假如先起目痛惡寒身熱者陽明經本病已後潮熱自汗讝語發渇大便實者正陽明胃府標病夫本宜解肌標宜急下看消息用之辯證法目痛鼻乾微惡寒身熱病在經潮熱自汗讝語發渇便實不惡寒病在腑診脈法按至皮膚之下肌肉之間畧重按之乃得之脈見微洪為經病按至筋骨之間重按之乃得脈見沉數為腑病用藥法微惡寒自然目眶痛鼻乾不眠者用柴葛解肌湯即加減葛根解肌湯渇而有汗不解者如神白虎湯即加減白虎湯潮熱讝語發渇掲去衣被揚手擲足斑黄狂亂不惡寒反怕熱大便實者輕則大柴胡湯重則三承氣湯選用俱在秘方六一順氣湯加減治之足少陽膽經其脈起于目鋭眥上頭角絡耳中循胸脇行身之側終于足也前有陽明後有太陽居二陽之中所以居半表裏經曰尺寸俱弦者足少陽受病其證頭痛目眩口苦胸滿耳聾脇痛或心煩喜嘔或胸中煩悶而不嘔或心下病鞭或寒熱往来或發熱寅申時尤盛或身微熱者皆少陽也凡頭角痛耳中痛耳中烘烘而鳴耳之上前後腫痛皆少陽所主部分其火為之也若口苦者少陽之膽熱脇下鞭者少陽之結也足少陽起于目鋭眥上頭角絡耳中過乳外傍從兩脇由外臁而下至小指次指之端竅隂穴止少陽經見證法假如先起惡寒身熱耳聾脇痛者本病已後嘔而舌乾口苦者標病縁膽無出入病在半表半裏之間止宜小柴胡湯加減和解表裡治之再無别湯本方有加減法此經有三禁不可汗下利也若治之得法有何壞證當須識此毋致忽焉辯證法耳聾脇痛寒熱嘔而口苦舌乾便屬半表半裏證不從標本從乎中治診脈法按至皮膚之下肌肉之間畧重按之乃得脈見弦數本經用藥法耳聾脇痛寒熱嘔而口苦舌乾者用柴胡雙解飲即加減小柴胡湯若陽明少陽合病則脈弦而長此湯加葛根芍藥此圖膻中穴任脈穴也太隂脈過此故載之足大隂脾經圖脾為中榮宫之坤土也其脈始于足大指上行至腹絡于嗌連舌本行身之前也若寒邪卒中直入本經者一時便發腹痛或吐或利宜温之如四日而發腹滿嗌乾者此𫝊經之邪也宜和之若太陽病下之早因而腹痛者此悞下之而𫝊也凡治太隂症自利不渇脈沉細手足冷急温之若脈浮者可發汗宜桂枝湯主之若發熱脈數者少陽之邪未解小柴胡湯主之如自利不渇者臟有寒也宜理中湯甚者加附子重則囬陽救急湯即加減四逆湯腹滿嘔吐食不下者宜治中湯手足冷脈沉細者宜四逆湯若𫝊經邪熱内陷腹痛者宜桂枝芍藥湯主之足太隂從足大趾隐白穴由内臁而上環小腹上乳内傍膻中其别從乳外近厥隂而上至喉下人迎止又云凡陽經𫝊来之邪終是陽明腑證皆不當和亦不可用桂枝只三承氣選用其用桂枝者中在隂經未入隂府也太隂經見證法腹滿自利津不到咽手足温者是足太隂脾經受證假如先起腹滿咽乾者本病已後身目黄標病内有寒熱所分不可混治臨病之際用在得宜辯證法腹滿咽乾發黄者屬腑熱自利不渇或嘔吐者屬臟寒診脈法重手按至肌肉之下筋骨之間方得脈沉而有力宜當下脈見沉而無力宜當温用藥法腹滿咽乾手足温腹痛者桂枝大黄湯即加減桂枝湯身目黄者茵陳大黄湯即加減茵陳湯自利不渇或嘔吐者加味理中飲重則囬陽急救湯即加減四逆湯足少隂腎經圖為人身之根蒂也其脈始于足心上行貫脊循喉絡舌本散舌下注心中行身之前也若因慾事腎虗者寒直中之也其證一二日便發故發熱脈沉足冷或惡寒倦卧宜温經散寒若五六日而發躁舌乾者此𫝊經之熱邪宜急下之恐腎水乾也如其脈沉細足冷者又不可下急温之脈沉疾有力者乃可下之凡少隂飲水而小便色白者下虗有寒引水自救非熱宜温之蓋少隂傷寒多因勞傷腎經之所致有𦂳有慢其害甚速宜温之不可以寒凉之藥妄投之也但脈沉足冷雖發熱者急宜温腎以扶元氣足少隂起于足心湧泉穴由内臁而上在太隂經之後行入乳内傍近膻中至喉下人迎止少隂經見證假如先起舌乾口者本病已後讝語大便實者標病至隂經則難拘定法或可温而或可下因分直中者寒證𫝊經者熱症是其發前人之所未發也診脈法重手按至肌肉之下筋骨之間方得脈見沉實有力宜當下脈見沉遲無力宜當温用藥法口燥咽乾渇而讝語大便實或遶臍鞭痛或下利純清水心下鞭痛者俱是邪熱燥屎使然急用六一順氣湯分輕重下之即承氣湯有加減法無熱惡寒厥冷勌卧不渇或腹痛嘔吐㵼利沉重或隂毒手指甲唇青嘔逆絞痛身如被杖面如刀刮戰慄者俱是寒邪中裏使然急用囬陽救急湯温之即四逆湯有加減法此圖一經從缺盆下乳上入裏會於頂巔足厥隂肝經圖厥者盡也六經之尾也其脈起于足大指上環隂器抵小腹循脇肋上口唇與督脈㑹于巔頂行身之前側也若本經不足寒邪直中之也一日便發吐利小腹痛寒甚者唇青厥冷囊縮急宜温之并著艾灸丹田氣海以温之若六七日發煩滿囊拳者此𫝊經熱邪厥深熱亦深也若脈沉疾有力者宜急下之若脈微細者不可下也凡傷寒𫝊至厥隂經則病勢極矣然死生在於須臾可不謹察之也大抵熱深厥亦深則舌卷囊縮隂寒冷極亦舌卷囊縮也當要仔細而辯其冷熱之治其法微矣足厥隂起足大趾大敦穴由内臁而上在太隂經之前行入小腹過脇下從乳外傍彎入乳内傍至中脘而止其入裏行者㑹于巔頂也圖内不載厥隂經見證法假如先起消渇煩滿者本病已後舌卷囊縮者標病亦有寒熱兩端不可槩作熱治辯證法煩滿囊拳消渇者屬熱口涎沫不渇厥冷者屬寒似瘧不嘔清便必自愈用藥法消渇煩滿舌卷囊縮大便實手足乍冷乍温者急用六乙順氣湯下之即承氣湯有加減法口吐涎沫或四肢厥冷不温過乎肘膝不渇小腹絞痛嘔逆者急用茱萸四逆湯即囬陽救急湯有加減法煎藥法一發汗藥先煎麻黄一二沸後入餘藥同煎一止汗藥先煎桂枝一和解藥先煎柴胡一下藥先煎滚水入枳實一温藥先煎乾薑一行血藥先煎桃仁一利水藥先煎猪苓一止㵼藥先煎炒白术一消渇藥先煎天花粉一止痛藥先煎白芍藥一發黄藥先煎茵陳一發斑藥先煎青黛一發狂藥先煎石羔一止嘔藥先煎半夏一勞力感寒先煎黄茋一濕症藥先煎蒼术一感冐傷寒先煎羌活一暑症藥先煎香薷一痓病藥先煎防風一腹如雷鳴藥先煎煨生薑已上俱以主病者先煎餘藥俱後入同煎刼病法一傷寒發狂奔走人難制伏先於病人處生火一盆用醋一碗傾於火上其烟冲入鼻内即安方可察其陽狂隂躁親切用藥無差若初起頭疼發熱惡寒方除已後登髙而歌棄衣而走踰牆上屋罵詈呌喊大渇欲死脈来有力乃因邪熱𫝊裏陽盛發狂當用寒藥下之此為陽狂凡見舌卷囊縮者不治若病起無頭疼身微熱面赤戴陽煩躁脈来沉微無力欲坐卧於泥水中乃因寒熱而發躁手指甲面色青黒冷汗不止心腹結鞭如石躁渇欲死即隂證似陽當用熱藥温之此為隂躁凡見厥冷下利讝語者不治須詳脈来有力無力此為良法一傷寒腹中痛甚將凉水一盞與病人飲之其痛稍可者屬熱當用凉藥清之清之不已而或遶臍鞭痛大便結實煩渇屬燥屎急用寒藥下之若食痛同治法若小腹鞭痛小水自利大便黒身目黄者屬蓄血亦用寒劑加行血藥下盡黒物則愈此三者皆痛隨利減之法也若飲水愈加作痛屬寒當用温藥和之和之不已而或四肢厥冷腹痛嘔吐㵼利急用熱藥救之須詳脈来有力無力此為良法一傷寒直中隂經真寒證甚重而無脈或吐㵼脱元而無脈用好酒薑汁各半盞與病人服之其脈来者可治當察其脈用藥不拘脈浮沉大小但指下出見者生如用此法脈不至者必死又當問病人何處有痛證要知痛甚者脈必伏宜隨病制宜方為吉兆如無痛證用此法而脈不至者不為吉兆尤當問病人若平素原無正取脈須用覆手取之脈必見也此屬反闗脈診法與正取法同若平素正取有脈後因病診之無脈者亦當覆手取之而脈出者隂陽錯亂也宜和合隂陽如覆取正取俱無脈者必死此為良法一傷寒舌上生胎不拘滑白黄黒俱用井水浸青布片於舌上洗浄後用生薑片子時時蘸水刮之其胎自退凡見舌生黒胎芒刺者必死此熱毒入深十有九死是腎水尅心火也若發黄者用生薑柤時時週身擦之其黄退若心胸脇下有邪氣結實滿悶鞭痛用生薑一片搗柤去汁炒微燥帶潤用絹包於患處款款熨之稍可又將柤和匀前汁炒乾再熨許久豁然寛快俱為良法一傷寒鼻衂成流久不止者將山梔炒黒為細末吹入鼻中外將水紙搭於鼻冲其血自止若㸃滴其血不成流者其邪在經未解照後秘方用藥不在此法一傷寒熱邪在裏服轉藥後鹽炒麩皮一升將絹包於病人腹上款款熨之使藥氣得熱則行大便易通矣一傷寒吐血不止用韭汁磨京墨呷下其血見黒必止如無韭汁用鷄子青亦可正謂赤屬火而黒屬水也一傷寒直中隂經真寒證或隂毒證身如被杖腹中絞痛嘔逆沉重不知人事四體堅冷如石氷指甲唇青藥不得入口六脈沉細或無脈欲絶者將葱縳一握切去根葉取白三寸許如餅先用麝香半分填於臍中後放葱餅於臍上以火熨之連換二三餅稍醒灌入生薑汁煎服回陽救急湯如不醒再灸闗元氣海二三十壯使熱氣通其内逼邪出于外以復陽氣如用此法手足温和汗出即醒者為有生也如用此法手足不温汗不出不省人事必死一傷寒熱病熱邪𫝊裏亢極無解用黄連煎水一盞放井中頓冷浸青布搭于胸中徐徐換之待熱勢稍退即除不可久漬夏月用此法冬月不宜用一傷寒服藥轉吐出不納者隨用竹管重捺内闗後將生薑自然汁半盞熱飲其吐即止大凡服寒藥熱飲熱藥寒飲中和之劑温和服之如要取汗雖辛甘之劑亦宜熱服如要止汗雖辛甘温之劑亦宜温服此為良法内闗中掌後腕二寸厥隂心包相火之經一中風痰厥昏迷卒倒不省人事欲絶者先用皂莢末撚紙燒烟冲入鼻有嚏可治隨用吐痰法用皂莢末五分半夏白礬各三分為細末薑汁調服探吐後服導痰湯加減治之無嚏不可治此為良法一治乾霍亂不得吐者用滚湯一碗入皂莢末三分鹽一撮調服探吐切莫與米湯與之即死是穀氣反助邪氣也一中寒卒倒昏迷不醒者先用熱酒薑汁各半盞灌入稍醒後服加味理中飲為效如不飲酒人止用薑汁灌之依此法調治冬月有之餘月不多見製藥法一用附子去皮臍先用鹽水薑汁各半盞用砂鍋煮七沸後入黄連甘草各半兩再加童便半盞再煮七沸住火良久撈起入磁器盛貯伏地氣一晝夜取出晒乾以備後用庶無毒害頂圓臍正一兩一枚者佳一用川大黄須錦紋者佳剉成飲片用酒拌均燥乾後用不傷隂血如年壯實熱者生用不須製一用麻黄去節先滚醋湯畧浸片時撈起以備後用庶免大發如冬月嚴寒腠理至宻當生用不須製一用吳茱茰將鹽水拌均炒燥庶無小毒一用附子後身目紅者乃附子之過用蘿蔔搗水濾汁二大盞入黄連甘草各半兩犀角三錢煎至八分服之以解附子毒其紅即除如解遲必血從耳口鼻出者必死無蘿蔔用蘿蔔子搗水取汁亦可如無蘿蔔子用澄清泥漿水亦可也一用大黄後㵼利不止者用烏梅二枚炒粳米一撮乾薑三錢人參炒白术各半兩生附子皮一錢半甘草一錢升麻少許燈心一握水二大鍾煎之去渣後入炒陳壁土一匙調服即愈取土氣以助胃氣也一用麻黄後汗出不止者將病人髪披水盆中足露出外用炒糯米半升龍骨牡蠣藁本防風各一兩為細末周身撲之隨後秘方用藥免致亡陽而死此為良法羌活冲和湯治太陽傷風有汗脈浮緩羌活白芷黄芩甘草各一半防風白术生地各一錢半川芎五分右如前煎法若一服汗仍未止加黄茋一錢半芍藥一錢仍未止以小柴胡加桂枝芍藥各一錢葛根湯治太陽陽明項背强急無汗惡風脈帶弦浮而發熱又治太陽與陽明合病必自利此湯並主之葛根一錢甘草麻黄各二錢去節湯泡二次水二鍾薑四片棗二枚煎畧微覆取汗獨活散治傷寒温熱等症羌活獨活防風枳殻黄芩麻黄泡一次人參細辛茯苓炙甘草蔓荆子甘菊花石膏水二鍾薑三片薄荷五葉煎敗毒散治傷寒温疫風温頭目昏眩四肢疼痛増寒壯熱項强目睛疼尋常風眩拘急羌活獨活前胡柴胡川芎枳殻桔梗茯苓人參甘草各等分水二鍾如常煎服六神通解散麻黄黄芩滑石各二兩石膏一兩甘草一兩半蒼术四兩治時行三日前加葱白香豉煎服而汗之立效中病即止不可盡劑升麻湯治傷寒中風頭疼増寒壯熱肢體疼痛發熱惡寒鼻中乾不得卧兼治寒暄不時人多疾疫及暴熱之頃忽然變寒身體疼痛頭重如石升麻甘草芍藥葛根各等分每服七八錢煎如常法若老人去芍藥加柴胡茯苓人參各一錢五積散治隂經傷冷脾胃不和感冐寒邪蒼术二十四兩桔梗十二兩陳皮八兩白芷茯苓各四兩甘草枳殻炒各五兩肉桂人參川芎各二兩厚樸半夏芍藥當歸麻黄乾薑各三兩右十六味除枳壳肉桂陳皮其餘共一處生搗為粗末用酒拌匀晒乾分作六分大鍋内文武火炒令黄色不得焦擲冷入殻桂陳皮和匀每服五錢水二鍾薑三片煎一鍾服婦人血風證因崩漏大脱血或前後血因而涸燥其熱未除尋衣摸床撮空閉目不省人事揚手擲足揺動不安錯語失神脈弦浮而虚内有燥熱之極氣粗鼻乾而不潤上下通燥此為難治宜服生地黄黄連湯治男子去血多亦有此症其妙不可容言生地黄黄連湯川芎生地當歸各七分赤芍藥梔子黄芩黄連各三分防風每服五錢水煎清飲徐徐呷之如脈實可加大黄下之大承氣湯氣藥也自外而之内者用之生地黄黄連湯血藥也自内而之外者用之氣血合病循衣撮空治同自氣而之血血而復之氣者大承氣湯下之自血而之氣氣而復之血者生地黄黄連湯主之二者俱不大便此是承氣湯對子又與三黄石膏湯表裏皆是三焦胞絡相火之用也病既危急只得以此湯降血中火耳不拘婦人男子去血過多而有此症者皆宜服之無不效者秘用三十七方就註三十七槌法升麻發表湯即麻黄湯附加減法治冬月正傷寒頭疼發熱惡寒脊强脈浮𦂳無汗為表症此足太陽膀胱經受邪當發汗以頭如斧劈身如火熾者宜此湯有汗者勿用麻黄桂枝甘草杏仁升麻川芎防風白芷羌活本經發熱惡寒頭痛無汗而喘者本方加乾葛去升麻本經發熱惡寒身體痛者本方加蒼术芍藥去杏仁本經惡寒發熱身痒面赤者以其不得小便出故也本方去白芷升麻杏仁加柴胡芍藥本經頭痛發熱惡寒胸中飽悶者本方加枳殻桔梗本經感寒深重服湯不作汗者再宜服至二三劑而汗不出者死本經汗後不解者宜再服量症輕重用麻黄升麻分多寡為當水二鍾薑三片葱白二莖槌法加江西豆豉一撮煎之熱服取汗有神宜厚被覆首凡中病即止不得多服多則反加别病疎邪實表湯即桂枝湯附加減法治冬月正傷風頭痛發熱惡寒脊强脈浮緩自汗為表症此足太陽膀胱經受邪當實表散邪無汗者不可服桂枝芍藥甘草防風川芎羌活白术如汗不止加黄茋喘加杏仁柴胡胸中飽悶加枳殻桔梗水二鍾薑三片棗二枚槌法加膠飴二匙温服羌活冲和湯以代桂枝麻黄青龍各半等湯此太陽經之神藥也治春夏秋非時感冐暴寒頭痛發熱惡寒脊强無汗脈浮𦂳此足太陽膀胱經受邪是表症宜發散不與冬時正傷寒同治此湯非獨治三時暴寒春可治温夏可治熱秋可治濕治雜症亦有神也冬寒亦可用惟黄芩須輕投耳羌活蒼术各一錢半防風黄芩川芎白芷甘草生地黄各一錢細辛五分不可多水二鍾煎八分熱服温被蓋覆取微汗濕土司天加蒼术一錢五分天久淫雨亦加如渇加石膏三錢知母一錢不渇不加冬月禁之如胸中飽悶加桔梗枳殻去生地夏月加石膏知母名神术湯如服此湯後不作汗本方加蘇葉喘而惡寒身熱本方加杏仁生地汗後不解宜服要汗下兼行加大黄乃釡底抽薪之法其春夏秋感冐非時傷寒亦有頭疼惡寒身熱脈浮緩自汗宜實表本方去蒼术加白术汗不止加黄茋即加減冲和湯再不止以小柴胡加桂枝芍藥一錢有神槌法薑三片棗二枚煎至一鍾加葱白搗汁五匙再煎一二沸如發汗熱服止汗温服柴葛解肌湯即葛根湯附加減法治足陽明胃經受邪目痛鼻乾不眠微頭疼眼眶痛脈来微洪宜解肌屬陽明經病其正陽明腑病别有治法柴胡葛根甘草黄芩芍藥羌活白芷桔梗本經無汗惡寒甚者去黄芩加麻黄冬月宜加春宜少夏秋去之加蘇葉本經有汗而渇者治法在如神白虎湯下即白虎湯水二鍾薑三片棗二枚槌法加石膏末一撮煎之熱服柴胡雙解散即小柴胡湯附加減法足少陽膽經受證耳聾脇痛寒熱嘔而口苦脈来弦數屬半表半裏宜和解此經無出入有三禁不可汗下利也止有小柴胡一湯隨病加減再無别湯柴胡黄芩半夏甘草人參陳皮芍藥若只小柴胡湯無芍藥本經症小便不利加茯苓脇痛加青皮本經嘔者入薑汁竹茹痰多加𤓰蔞貝母寒熱似瘧加桂渇加天花粉知母齒燥無津液加石膏嗽者加五味金沸草壞症加鱉甲本經症心下飽悶未經下者非結胸乃表邪𫝊至胸中未入乎腑證雖滿悶尚為在表只消小柴胡加枳梗未效就以本方對小陷胸加枳桔一服虗煩類傷寒證本方加竹葉炒粳米本經與陽明合病本方加葛根芍藥婦人熱入血室加當歸紅花男人熱入血室加生地黄老婦人傷寒無表證其熱勝者本方加大黄甚者加芒硝水二鍾薑一片棗二枚槌法加生艾汁三匙煎之温服小柴胡湯證註釋治太陽病十日已去脈細而嗜卧外雖已解設胸滿痛與服之若脈浮者麻黄湯傷寒五六日来徃寒熱胸脇若痛黙黙不飲食心煩喜嘔或煩而不嘔或渇或腹中痛或脇下痞鞭或心悸小便不利或不渇身有微熱者此湯主之血氣弱腠理開邪氣因與正氣相搏結于胸下邪正分争徃来寒熱休作有時黙黙不飲食臟腑相連其痛必下邪髙痛下致使嘔也此湯主之服柴胡湯已渇者屬陽明以法治之傷寒五六日身熱惡風頭項强脇下滿手足温而渇者此湯主之傷寒陽脈濇隂脈弦腹中急痛先與小建中湯不差者此湯主之太陽病過經十餘日發汗吐下後四五日柴胡湯證仍在者先與小柴胡湯嘔不止心下欝微煩者為未解也與大柴胡湯下之則愈婦人中風七八日續得寒熱發作有時經水適㫁者此為熱入血室其血必結致如瘧狀此湯主之傷寒五六日頭汗出微惡寒手足冷心下滿不欲食大便硬脈細者為陽微結必有表復有裏脈沉亦裏也汗出為陽微假令純隂結不得復有外症悉入在裏此為半在表半在裏也脈雖沉𦂳不得為少隂病所以然者隂不得有汗也今頭汗出故知非少隂可與此湯設不了了得尿而解傷寒五六日嘔而發熱者柴胡湯症具而以他藥下之柴胡症在者復與小柴胡湯心下痞為逆必蒸蒸而振却發熱汗出而解若心下滿而腹痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞氣柴胡不中與之宜半夏㵼心湯已上屬太隂經末後五六日嘔而發熱至太隂經一段俱太隂證節菴併及者見太隂證柴胡亦有當與不當與者陽明病發潮熱大便溏小便自可胸脇不利者與此湯陽明病脇下鞭滿不大便而嘔舌上白胎皆可與之上焦得通津液得下腎氣因和濈然汗出而解陽明中風脈弦浮大而短氣腹部滿脇下及心痛久按之氣不通鼻乾不得卧一身及目悉黄小便難有潮熱時時噦身前後腫刺之少差外不解病過十日脈續浮者此湯主之已上屬陽明經太陽病不解轉入少陽脇下滿乾嘔不能食徃来寒熱尚未吐下脈沉𦂳者此湯主之若已吐下後發汗温鍼讝語小柴胡湯證罷此為壞證知犯何逆以法治之已上屬少陽經嘔而發熱宜服此湯傷寒已後更發熱此湯主之若脈浮者以汗解之屬陽易差後勞復脈證彭用光加減法如胸中煩而不嘔去半夏人參加𤓰蔞仁煩者熱也嘔者逆氣也今煩而不嘔則熱聚而氣不逆邪氣欲漸成實也參甘恐補去之無助熱夏味辛散去之以無逆氣也𤓰蔞仁苦寒用之以通欎熱于胸中若渇者去半夏恐燥津液加人參之甘潤𤓰蔞根之苦潤相合則津液生而渇已也若腹中痛去黄芩加芍藥寒邪入裏裏氣不足寒邪壅則腹中痛芩苦寒性堅而寒中去之則中氣易和芍藥味酸而和中加之則裏氣得通而腹痛自愈如脇下痞鞭去大棗之甘温恐令滿加牡礪之酸鹹則痞消而鞭輭矣若心下悸小便不利者去黄芩之苦寒恐蓄水浸行加茯苓之甘淡能滲利則津液通矣若不渇外有微熱去人參微熱恐有表邪加桂枝取汗發散表邪也若欬者去人參大棗生薑加五味子乾薑肺氣逆則欬參棗薑甘温中則肺氣愈逆故去之用五味子之酸收斂肺氣乾薑之辛熱以散内之寒氣則欬自止若加葛根芍藥治少陽陽明合病頭畧痛發熱耳聾脇痛或徃来寒熱如瘧和解散治之和解散即小柴胡湯加減如嘔逆加薑九片陳皮一錢如頭痛惡寒加羌活防風各一錢寒熱間作加桂枝一錢夏月中暑發熱頭痛加黄連一錢春天温病時行加生地黄川升麻一錢瘧疾或先寒後熱加川常山尖檳榔半錢各要未發時煎服傷寒惡寒頭項强發熱前方冲和湯内去細辛蒼术加白术二錢桂枝大黄湯即桂枝湯加大黄附加減法治足太隂脾經受症腹滿而痛咽乾而渇手足温脈来沉而有力此因邪熱從陽經𫝊入隂經桂枝芍藥甘草大黄枳實柴胡本經腹滿不惡寒而喘者加大腹皮去甘草水二鍾薑一片棗二枚槌法臨服入檳榔磨水三匙熱服中云看此證不如三承氣湯選用或一日初𫝊太隂乃可觀仲景書或者邪中隂經而留于腹者也不然必外證未全除可也不然此方亦當用在壞證例非本經藥也直説陽症𫝊来者誤也加味理中飲即理中湯附加減法治太隂脾經受證自利不渇手足温身無熱脈来沉而無力此屬臟寒乾薑白术人參甘草肉桂陳皮茯苓厥隂消渇氣上衝心饑不欲食食即吐蚘腹痛大便實者本方加大黄蜜少許利之本經腹濡滿時減者本方去甘草本經嘔者入半夏薑汁本經倦卧沉重利不止少加附子利後身體痛者急温之加附子自利腹痛者入木香磨薑汁調服和之水二鍾薑一片棗二枚槌法臨服入炒陳壁土一匙調服取土氣以助胃氣茵陳將軍湯即茵陳湯附加減法治足太隂脾經腹滿身目發黄小水不利大便實發渇或頭汗劑頸而還脈来沉重者宜用大黄茵陳山梔甘草厚樸黄芩枳實大便自調者去大黄厚朴加大腹皮利小便清為效水二鍾薑一片槌法加燈草一握熱服導赤飲即五苓散附加減法治小水不利小腹滿或下焦蓄熱或引飲過多或小水短赤而渇脈沉數者以利小便為先惟汗後亡津液與陽明汗多者則以利小便為戒茯苓猪苓澤㵼桂枝白术甘草滑石山梔中濕身目黄者加茵陳水結胸證加木通燈心如小水不利而見頭汗出者乃陽脱也此死證自得病起無熱但狂言煩躁不安精采不與人相當此湯治之此因熱結膀胱太陽經之裏症也一名太陽本病水二鍾薑一片燈心二十莖槌法入鹽二字六一順氣湯以代大承氣小承氣調胃承氣大柴胡三乙承氣湯大陷胸等湯之神藥也舉世無人知此竒妙耳秘之莫與俗人言附加減法治傷寒熱邪𫝊裏大便結實口燥咽乾怕熱讝語掲衣狂妄揚手擲足斑黄陽厥潮熱自汗胸腹滿硬遶臍疼痛等症悉皆治之大黄枳實厚樸甘草黄芩柴胡芒硝芍藥潮熱自汗讝語發渇揚手擲足掲去衣被狂妄斑黄大便實者俱屬正陽明胃腑病依本方口燥咽乾大便實屬少隂依本方下利純清心下鞭痛而渇者屬少隂依本方怕熱發渇讝妄手足乍冷乍温大便實者陽厥證屬厥隂依本方舌卷囊縮者難治須急下之熱病目不明謂腎水已竭不能照物病已篤矣惟宜急下依本方目中不了了即目不明也轉屎氣者謂下泄也有燥屎焉當下依本方如更衣者止後服不必盡劑不更衣宜再少與大便通者愈若結胸證心下鞭痛手不可近燥渇讝語大便實者依本方去甘草加甘遂桔梗凡傷寒過經及老弱併血氣兩虗之人或婦人産後有下症或有下後不解或有表症未除而裏症又急不得不下者用此湯去芒硝下之即吉蓋恐轉藥硝性燥急故有此戒大凡傷寒邪熱𫝊裏結實須看熱氣淺深用藥今之庸俗不分當急下可少與宜微和胃氣之論一槩用大黄芒硝亂投湯劑下之因兹枉死者多矣余謂傷寒之邪𫝊来非一治之則殊耳病有三焦俱傷者則痞滿燥實堅全俱宜大承氣湯厚樸苦温以去痞枳實苦寒以泄滿芒硝醎寒以潤燥軟堅大黄苦寒以泄實去熱病斯愈矣邪在中焦則有燥實堅三證故用調胃承氣湯以甘草和中芒硝潤燥大黄泄實不用枳樸恐傷上焦虗無氤氲之元氣調胃之名自此立矣上焦受傷則痞而實用小承氣湯枳實厚樸之能除痞大黄之泄實去芒硝不傷下焦血分之真隂謂不伐其根本也若夫大柴胡湯則有表症尚未除而裏症又急不得不下者只得以此湯通表裏而緩治之猶有老弱及血氣兩虗之人亦宜用此故經云轉藥孰𦂳有芒硝者𦂳也大承氣最𦂳小承氣次之調胃承氣又次之大柴胡又次之其大柴胡加大黄小柴胡加芒硝方為轉藥蓋為病輕者設也仲景又云蕩滌傷寒熱積皆用湯液切禁丸藥不可不知也右先將水二鍾滚三沸後入藥煎至八分槌法臨服時入鐵銹水三匙調服立效取鐵性沉重之義最能墜熱開結有神此千金不𫝊之秘如神白虎湯即白虎湯附加減法治身熱渇而有汗不解或經汗過渇不解脈来微洪石膏知母人參甘草山梔麥冬五味心煩者加竹茹一團如大渇心煩背惡寒者依本方去山梔加天花粉無渇不可服此藥為大忌水二鍾薑一片棗一枚槌法加淡竹葉十片三黄石膏湯此湯治傷寒後五心煩熱舌燥表裏皆實怫欎陽毒發斑黄身如塗朱眼珠如火狂呌欲走十指皮脱六脈洪大滑數燥渇欲死鼻乾面赤齒黄過經不解已成壞症表裏皆熱欲發其汗病熱不退又復下之大便遂頻小便不利亦有錯治温症而成此症者又八九日已經汗下後脈洪數身壯熱拘急沉重欲治其内由表未解欲發其表則裏症又急趦趄不能措手待斃而已殊不知熱在三焦閉塞經絡津液營衛不通遂成此症又治汗下後三焦生熱脈洪數讝語不休晝夜喘息鼻時加衂身目俱黄狂呌欲走者通用此湯治之有神石膏一兩半黄芩黄連黄栢各七錢山梔麻黄香豉二合每服一兩水二鍾薑三片棗二枚槌法入細茶一撮煎之熱服未中病再服三黄巨勝湯此湯治陽毒發斑狂亂妄言大渇呌喊目赤脈數大便燥實不通上氣喘急舌卷囊縮難治者權以此湯刼之三黄石膏湯内去麻黄香䜴加大黄芒硝是也水二鍾薑一片棗二枚槌法臨服入泥漿清水二匙調服即安冲和靈寳飲治兩感傷寒起于頭痛惡寒發熱口燥舌乾以陽先受病多者先以此湯探之中病即愈羌活防風川芎生地細辛黄芩柴胡甘草乾葛白芷石膏水二鍾煨生薑三片棗二枚槌法入黒豆一撮煎之温服取微汗為愈如不愈表症多而甚急者方可用麻黄葛根為解表如裏多而甚急者先以調胃承氣為攻裏是也如以隂經自中病發熱下利身疼痛脈沉細無力不渇倦卧昏重者又當先救裏温之回陽救急湯是分表裏寒熱而治此其權變大法古云兩感雖為死證復有可救之理乃用藥先後寒熱之劑及發表攻理之序不明故枉死者多矣此方良可桃仁承氣對子即桃仁承氣湯附加減法治熱邪𫝊裏熱蓄膀胱其人如狂小水自利大便黒小腹滿痛身目黄讝語燥渇為蓄血證脈沉有力宜此湯下盡黒物即愈未服前而血自下者為欲愈不宜服桃仁桂枝芒硝大黄芍藥柴胡青皮當歸甘草枳實水二鍾薑三片槌法臨服入蘇木煎汁三匙服消毒青黛飲治熱邪𫝊裏裏實表虗血熱不散熱氣乗于皮膚而為斑也輕則如疹子重則如錦紋重甚則斑爛皮膚或本屬陽悮投熱藥或當下不下或下後未解皆能致此不可發汗重令開泄更加斑爛也然而斑之方萌與蚊跡相類發斑多見於胸腹蚊跡只在於手足陽脈洪大病人昏憒先紅後赤者斑也脈不洪大病人自静先紅後黄者蚊也其或大便自利短氣怫欎氣短燥屎不通又如菓實靨者盧醫復生不能施其巧矣凡汗下不解足冷耳聾煩悶咳便是發斑之候黄連甘草石膏知母柴胡𤣥參生地山梔犀角青黛人參水二鍾薑一片棗二枚槌法臨服入苦酒一匙大便實者去人參加大黄生地黄連湯治鼻衂成流久不止者或熱毒入深吐血不止黄芩山梔桔梗甘草生地黄連柴胡川芎芍藥犀角如無升麻代之水二鍾棗二枚煎八分槌法臨服入茅根搗汁磨京墨調服如無茅根以藕搗汁亦可外用刼法水紙搭于鼻冲加味犀角地黄湯治煩躁漱水不下咽者屬上焦有瘀血犀角生地芍藥甘草桔梗牡丹皮陳皮紅花當歸水二鍾薑三片槌法臨服入生藕節搗汁三匙温服囬陽救急湯即四逆湯附加減法治寒邪直中隂經真寒證初病起無身熱無頭疼止則惡寒四肢厥冷戰慄腹疼吐㵼不渇引衣自蓋踡卧沉重或手指甲唇青或口吐涎沫或至無脈或脈来沉遲無力熟附子乾薑人參甘草白术肉桂陳皮五味茯苓半夏嘔吐涎沫或小腹痛加鹽炒吳茱茰無脈者加猪胆汁一匙嘔吐不止加薑汁泄㵼不止加升麻黄茋水二鍾薑三片煎之臨服加麝香三釐調服中病以手足温和即止不得多服多則反加别病矣如未止可用前理中飲加減治之無妨囬陽反本湯治隂盛格陽隂極發躁微渇面赤欲坐卧於泥水井中脈来無力或脈全無欲絶者附子乾薑甘草人參麥門冬五味臘茶陳皮面戴陽者下虗也加葱七莖黄連少許用澄清泥漿水二鍾煎之臨服入蜜五匙頓冷服之取汗為效柴胡百合湯治瘥後昏沉發熱渇而錯語失神及百合勞復等證柴胡人參黄芩甘草知母百合生地陳皮渇加天花粉胸中煩熱加山梔頭微疼加羌活川芎嘔吐加薑汁炒半夏胸中飽悶加枳殻桔梗食復者加枳實黄連甚重大便實者加大黄胸中虗煩加竹茹竹葉瘥後乾嘔錯語失神呻吟睡不安者加黄連犀角咳喘加杏仁百合甚加麻黄心中驚愓為血少加當歸茯神逺志虗汗加黄茋疲倦加白术腹中雷鳴加煨生薑勞復時熱不除加葶藶烏梅生艾汁水二鍾棗一枚薑三片槌法加醋炙鱉甲煎之温服如聖散治剛柔二痓頭揺口噤身反張手足攣搐頭面赤項强急與瘈瘲同此法羌活防風川芎白芷柴胡芍藥甘草當歸烏藥半夏黄芩有汗是柔痓加白术桂枝無汗是剛痓加麻黄蒼术口噤咬牙者如大便實者入大黄利之水二鍾薑三片煎之臨服入薑汁竹瀝温服温經益元湯治因汗後太虗頭眩振振然欲擗地并肉瞤筋愓及因發汗太多衞虗亡陽汗不止或下後利不止身疼痛者併皆治之熟地人參白术黄茋甘草芍藥當歸生地茯苓陳皮肉桂大附子如飽悶加枳殻去地黄如瘦人去芍藥有熱去附子利不止加炒白术升麻陳壁土去當歸地黄嘔者加薑汁製半夏渇者加天花粉汗後惡風寒屬表虗去附子肉桂生地加桂枝膠飴水二鍾薑三片棗一枚加糯米一撮槌法煎之温服逍遥湯治有汗傷寒瘥後血氣未平勞動助熱復還於經絡有因與婦人交接淫慾而復發不易有病者謂之勞復内交接淫慾而無病人反得病者謂之隂陽易余曽見舌出數寸而死者多矣此症最難治必宜此湯人參知母竹青卵縮腹痛倍加黄連甘草滑石生地韭根柴胡犀角水二鍾薑三片棗二枚煎之臨服入燒裩襠末一錢半調服有粘汗出為效不粘汗出再服以小水利隂頭腫則愈升陽散火湯治有患人乂手冐胸尋衣摸牀讝語昏沉不醒人事不可呼為風證而用風藥悞死者多矣蓋汗熱乗于肺金元氣虗不能自主持名曰撮空證小便利者可治小便不利者不可治人參當歸柴胡芍藥黄芩甘草白术麥冬陳皮茯神有痰加薑製半夏大便燥實讝語發渇加大黄泄漏者加升麻炒白术水二鍾薑三片棗一枚槌法入金首飾煎之熱服再造飲治有患頭疼發熱項脊强惡寒無汗用發汗藥二三劑汗不出者苟不識此不論時令遂以麻黄重藥及火刼取汗悞人死者多矣殊不知陽虗不作汗故有此證名曰無陽證黄茋人參桂枝甘草細辛熟附子羌活防風川芎煨生薑夏月加黄芩石膏冬月不加水二鍾棗二枚煎至一鍾槌法加炒芍藥一撮煎三沸温服黄龍湯治有患心下鞭痛下利純清水讝語發渇身熱殊不識此證但見下利便呼為漏底傷寒而便用熱藥止之就如抱薪救火悞人死者多矣殊不知此因熱邪𫝊裏胃中燥屎結實此利非内寒而利乃逐日自飲湯藥而利也宜急下之名曰結熱利證身有熱者宜用此湯身無熱者用前六一順氣湯大黄芒硝枳實厚樸甘草人參當歸年老氣血虗者去芒硝水二鍾薑三片棗二枚煎之後再加桔梗煎一沸熱服調營養氣湯即加減補中益氣湯治有患頭疼身熱惡寒微渇濈然汗出身痛脚腿酸疼沉倦脈空浮而無力不可因見頭疼惡寒發熱便呼為正傷寒而大發其汗所以輕變重而害人者多矣此勞力内傷氣血外感寒邪宜少辛甘温之劑則愈名曰勞力感寒證故經云勞者温之損者温之温能除大熱正此謂也有下證者大柴胡湯下之則緩人參黄茋當歸生地川芎柴胡陳皮甘草細辛羌活防風白术元氣不足者加升麻少許須知元氣不足者至隂之下求其升口渇加天花粉知母喘嗽加杏仁去升麻汗不止加芍藥去升麻細辛胸中煩熱加山梔竹茹乾嘔加薑汁炒半夏胸中飽悶加桔梗枳殻去生地甘草黄茋白术少許痰盛者加𤓰蔞仁貝母去防風細辛腹痛去茋术加芍藥乾薑和之有因血欎内傷腹有痛處或大便黒加桃仁紅花去芍辛羌防黄茋白术甚者加大黄下盡瘀血則愈後去大黄調理水二鍾薑三片棗二枚槌法入葱白二莖煎之温服導赤各半湯治患傷寒後心下不鞭腹中不滿大小便如常身無寒熱漸變神昏不語或睡中獨語一二句目赤唇焦舌乾不飲水稀粥與之則嚥不與即不思形如醉人俗不識此而悞人者多矣殊不知熱𫝊手少隂心也心火上而迫肺所以神昏名越經證黄連山梔黄芩滑石甘草知母犀角茯神麥冬人參水二鍾薑棗煎之加燈心一握煎沸熱服益元湯治有患身熱頭疼全無不煩便作躁悶面赤飲水不得入口不識者呼為熱證而用凉藥遂至悞人殊不知元氣虗弱是無根虗火泛上名曰戴陽證熟附子甘草乾薑人參五味麥冬黄連知母葱艾水二鍾薑一片棗二枚槌法臨服入童便三匙頓冷服桂苓飲治有患初得病無熱狂言煩躁不安精采不與人相當切勿呼為狂發悞用下藥死者多矣此因熱結膀胱名如狂證猪苓澤㵼桂枝甘草白术知母黄栢山梔蕀葉水二鍾薑三片煎一鍾槌法再加滑石末一錢煎三沸温服取微汗為效當歸活血湯有患無頭疼無惡寒止則身熱渇小水利大便黒口出無倫語設如不識呼為熱證而用凉劑則悞矣殊不知内𫝊心脾二經使人昏迷沉重故名挾血如見祟當歸赤芍甘草紅花桂心乾薑枳殻生地人參柴胡桃仁服三帖後去桃仁紅花乾薑桂心加白术茯苓水二鍾薑一片煎之槌法入酒三匙調服加味導痰湯有患憎寒壯熱頭疼昏沉迷悶上氣喘急口出涎沫庸醫皆作傷寒治之多悞殊不知此因内傷七情以致痰迷心竅神不守舍神出舍空空則痰生也名曰挾痰如見祟痰症類傷寒與此同治法茯苓半夏南星枳實黄芩𤓰蔞仁白术陳皮甘草桔梗人參黄連年力壯盛先用吐痰法後服此湯水二鍾薑三片棗二枚槌法臨服入竹瀝薑汁温服加減調中飲治食積類傷寒頭疼發熱惡寒氣口脈𦂳盛但身不痛此為異耳經云飲食自倍腸胃乃傷輕則消化重即吐下此良法也蒼术厚朴陳皮甘草白术山查神麯枳實草菓黄連乾薑腹中疼加桃仁痛甚大便實熱加大黄下之去山查草菓神麯乾薑心中兀兀欲吐者與乾霍亂同吐法用滚水一碗入鹽一撮皂角末五分探吐水二鍾薑一片臨服入木香磨汁調服即效加減續命湯治脚氣類傷寒頭疼身熱惡寒支節痛便秘嘔逆脚軟屈弱不能轉動但起於脚膝耳禁用補劑及淋洗防風芍藥白术川芎防己桂枝甘草麻黄蒼术羌活暑中三陽所患必熱脈来數去附子桂枝麻黄加黄栢黄芩柴胡寒中三隂所患必冷脈来遲加附子起于濕者脈来弱加牛膝木𤓰起于風者脈来浮加獨活元氣虗加人參少許大便實者加大黄水二鍾薑一片棗二枚燈心二十莖槌法臨服入薑汁調服芩連消毒飲時天行大頭病發熱惡寒頭項腫痛脈洪取作痰症治之其喉痺者亦照此方治柴胡甘草桔梗黄芩川芎荆芥黄連防風羌活枳殻連翹射干白芷先加大黄濾去一二次後依本方去大黄加人參當歸水二鍾薑三片煎一鍾加鼠粘子一撮再煎一沸槌法入竹瀝薑汁調服初起不可用大黄末後不減方可量加加味六神通解散治時行三月後謂之晚發頭痛身熱惡寒脈洪數先用冲和湯不愈後服此湯麻黄甘草石膏黄芩滑石蒼术川芎羌活細辛水二鍾薑三片槌法入豆䜴一撮葱白二莖煎之熱服取汗中病即止赤水元珠卷十八
