粟米糊為丸梧子大金箔為衣每一丸薄荷湯下蟬蝎散治急未盡而慢將來全蝎去毒七枚蟬退二十一枚甘草炙二錢半天南星炮一枚右為末每服五分薑棗煎服聚寶丹治初傳慢而未脫陽者人參茯神琥珀天麻殭蠶炒防風南星炮白附子生全蝎炒烏蛇肉酒浸焙各一錢硃砂五分麝香一字右為末蜜丸梧子大每一丸石菖蒲湯下神寶既濟丹分隂陽平冷熱定吐瀉豁痰涎硫黃火硝五靈脂青皮陳皮半夏麯右將硫黃火硝用磁罐鎔化攪勻冷定取下同諸藥各等分為末粟米糊為丸麻子大每服五丸米飲下惺惺散治吐瀉後脾弱內虛人參茯苓木香天麻扁豆炒全蝎炙陳米炒右各等分每服三錢薑棗煎服大醒脾散治吐瀉脾困不食南星茯苓橘紅全蝎炙粉草蓮肉白附子人參木香陳米炒右每服三錢薑棗煎服醒脾散治吐瀉脾困不思乳食人參全蝎天麻茯苓木香菖蒲蓮肉白术甘草炙白附子右每服二三錢薑棗煎服术附湯治風濕相搏身體煩痛不能轉側不嘔不渴大便實小便利虛風頭目眩重暖四肢補中助陽氣止自汗白术四兩甘草炙二兩大附子炮去皮臍一兩半右每服三錢水薑棗煎服烏沉湯治慢驚驅風助胃天麻人參川芎全蝎炙南星炮木香沉香各一錢甘草炙右每服一錢水薑煎服星香全蝎散治慢驚風昏迷痰搐南星木香人參橘紅各一錢全蝎炙甘草炙各五分右每服二錢紫蘇薑棗煎服有熱加防風定命飲治慢驚吐瀉困沉欲傳慢脾通用半夏茯苓木香生薑末天麻各三錢白术甘草炙各一錢右為末薑棗湯調下五分溫白丸驅風豁痰人參防風白附子殭蠶全蝎炙各一錢南星炮天麻各二錢右為末麵糊為丸梧子大每薑湯送下一丸鉤藤散治吐利脾胃氣虛生慢風藤鈎七錢蟬退天麻防風蝎尾人參各五錢麻黃去節殭蠶炒甘草川芎各二錢半麝香少許右水煎寒多加白附子五分可與後蟬退鈎藤飲兼看對症用蟬退鉤藤飲治肚痛驚啼鉤藤天麻茯苓川芎芍藥各二錢甘草蟬退各一錢右加燈心水煎服礞石散又名奪命散大能利痰不問隂陽慢脾風涎潮壅盛塞於咽間其響如潮百藥不能過其咽命在須臾但先用此藥入喉痰即墜下功有萬全起危篤之疾布斡旋之功青礞石火硝煅過為極細末若急驚風痰上壅身熱如火用薄荷自然汁入蜜調微溫服之良久其藥裹痰墜下痰涎與藥雜和稠粘而墜下也次服退風祛熱截驚等藥又方以稀糊丸菉豆大每服二丸急風薄荷荆芥湯下慢脾風木香湯磨下慢驚慢脾虛風亦痰涎潮上塞住咽喉藥石俱不能下用此以青州白丸子再研為末稀糊為丸入熟蜜湯調下其涎即墜入腹次服治慢驚藥其痰立下不動臟腑不傷真氣惟見其藥裹痰而下始知此劑之神烏蝎四君子湯即四君子湯加川烏全蝎為末每服五七分薑棗調下再服去川烏星蘇散治慢脾風口噤不語痰熱及諸驚風口噤大南星一枚炮為末每服三字薑四片紫蘇五葉同煎入雄豬膽汁少許溫和服凡不語者大小便須要調導慢脾風不語只用南星以人參石菖蒲為佐異功散溫中和氣吐瀉不思飲食即治中湯加木香薑棗煎服隂癎散祛風豁痰回陽正胃白附子生黑附子生南星生半夏生右各等分銼散井水浸七日逐日換水浸去水乾入全蝎末二錢同研為末每服三分生薑湯下至聖保命丹治驚風內釣肚腹堅硬夜多啼哭眼目上視手足抽掣不省人事全蝎去毒十四枚防風膽星蟬退殭蠶炒天麻各二錢白附子炒辰砂各一錢麝香五分右為末糯米飲丸芡實大金箔十片為衣每一丸鈎藤燈心湯下有熱加牛黃冰片硼砂一方有羌活二錢此藥常服鎮心化痰夜啼客忤躽啼夜啼者臟寒也隂盛於夜則冷動而痛故夜啼不休鉤藤散主之又有心熱煩啼必面色赤舌胎小便赤澀鈎藤散去木香當歸加辰砂末木通煎湯調下客忤者嬰兒神氣脆嫩外邪易而觸之或眼見犬畜異物耳聽異聲或入神廟而見凶惡神像或入暴喪之家觸而忤之故夜多驚悸睡卧中驚跳啼哭因晝之所觸而有夜之所感也其候驚啼口出青白黃沫面色變易喘急腹痛反側瘈瘲有似驚癎但目不上竄耳視其口中懸癰左右有小小腫核即以竹針刺破治惟辟邪散驚安神為上凡客忤中惡急作醋炭或焚降香皂角等薰之速服蘇合香丸立蘇蓋心藏神神安則五臟和而愈也躽啼者兒在胎時母失將養傷於風冷既生之後冷氣停留復因乳哺不節邪與正搏故腹痛躽張蹙氣而啼也牛黃丸主之冷甚者理中丸溫之鉤藤散鉤藤茯神茯苓川芎當歸木香各一錢甘草五分右每三錢薑棗煎服乳頭散治夜啼不止腹中疼痛黃茋當歸甘草赤芍木香各等分右為末每塗少許乳頭上令兒吮之火花膏治夜啼臟冷而痛也燈花三顆硼砂辰砂各少許右為末熟蜜調成膏塗乳上令兒吮之蟬退膏蟬退二十七枚去毒辰砂少許右為末煉蜜丸令兒吮六神散治面青腹疼啼哭口中冷氣四肢冷曲腰而啼大便泄瀉及不吮乳人參山藥白术各五錢甘草炙二錢茯苓扁豆炒各一兩右為末每服二錢薑棗煎服又方當歸白芍人參各二錢半甘草桔梗陳皮各一錢右每二三錢水煎時時服之雄麝散治客忤腹痛危急雄黃一錢乳香五分麝香一字右為末每一字刺雞冠血調灌黃土散治小兒客忤伏龍肝蚯蚓糞各等分右水調塗小兒頭上及五心上為良龍齒散治拗哭肚疼驚熱龍齒蟬退鉤藤羌活茯苓人參天麻防風全蝎各等分右為末燈心湯調下雄黃散治中惡客忤雄黃研水飛細末用桃樹枝煎湯調灌又方治同上蘇合香丸拌雄黃麝香末用降真香煎湯化下立蘇丹毒赤遊風腫孫仲子泰來曰小兒丹毒赤逰風者書謂半周一嵗之間不宜頻頻洗浴恐濕熱之氣鬱蒸不散發為丹毒愚謂此固一説也總由妊母血熱漬流於胎胎受熱毒藴於腠理或乳母好食酒麵煎炙辛熱等物皆能致之發於四肢者易為調治發於頭面胸背令兒煩躁脹悶身如火灼古謂入心者死以其毒劇火盛故也亦有濕熱滯於皮膚搏擊氣血發為丹毒入腹入囊總成凶兆良由包裹失宜復為風邪所襲發為白丹逰腫壯熱增寒鼻塞胸悶息氣喘急咳嗽吐逆種種之緣一受於母之血熱為內因一為頻洗脫著失宜為外因知內外之因明合治之法庶幾有藉手焉大連翹湯治胎毒丹毒赤逰方見潮熱清上散加升麻治胎毒丹毒逰赤腫方見風熱防已散治丹毒赤逰風入腹入腎防其殺人漢防已五錢朴硝犀角黃芩黃茋升麻各七錢右每服二三錢加竹葉五片煎服一方無朴硝有澤瀉葛根白术散治一切赤白丹毒白术茯苓各錢二木香甘草各錢一赤芍藥葛根各三錢枳殼二錢半右每三錢水煎服惺芎散治赤逰腫中氣弱不可服寒涼者即四君子湯加桔梗水煎服冰黃散治赤逰腫毒朴硝大黃各一錢右為末新汲水調敷毒上白玉散治赤逰丹毒滑石寒水石各一兩右為末醋調塗腫處或逰至外腎有破損者用水調塗又方治赤逰丹毒青黛井水入蜜調塗無青黛以靛塗之又方治赤白丹毒或用寒涼塗之不效者用此良愈伏龍肝為極細末以熟雞子黃熬為油調塗升麻湯治外因洗浴脫著失宜增寒壯熱丹毒逰腫并時行熱毒發斑等症升麻乾葛白芍各三錢甘草一錢半右每服三四錢水煎服熱盛加黃芩咽痛加桔梗發斑加玄參敗毒散治時行熱毒胃虛冷丹毒治噤口痢加陳倉米一撮羌活獨活前胡柴胡人參茯苓川芎甘草桔梗枳殼各等分右每服三四錢生薑薄荷煎服心紅散治赤逰丹毒心紅即水銀升之銀硃也用馬齒莧搗汁調塗乾則以汁潤之極妙又方治一切胎毒赤丹芭蕉根大塊者搗汁塗之乾則再塗畏寒者或冬月則頓稍溫塗之口瘡孫季子朋來曰口瘡或宿稟胎毒或乳母過食煿炙熱藴心脾不能發泄而然凡用服藥雖知是熱亦不可過用寒涼恐上熱未除中寒復生也惟輕清味薄之劑緩緩治之如權衡在手輕重自如加減瀉黃散治心脾熱盛口瘡山梔子一兩防風一兩藿香七錢石膏五錢連翹甘草七錢半升麻三錢右蜜酒微炒水煎服小便短澀加滑石木通青黛散治鵝口口瘡重㬽不能吮乳及治咽喉腫塞黃連黃柏各五錢青黛二錢牙硝辰砂各一錢雄黃牛黃蓬砂各五分冰片少許右為極細末先以薄荷汁拭口後搽此末一二分如搽寒涼藥不效口中一片白漫漫者此中焦虛而熱不得下降內服四君子加炮薑葛根外以熟雞子黃同亂髮熬油用綿纒筯頭蘸油洗之立能止痛取效重舌木舌弄舌腫㬽腫齦重舌亦為心脾藴熱所致蓋脾脈絡於舌底舌為心苗心脾有熱則血氣沸騰火性炎上如風潮之上壅故熱毒附於舌根而肉壅腫疊出短小如舌者是也著頰裏及上㬽而腫者名腫㬽齒齗上腫者為腫齗此二者皆宜針破出血即愈也木舌者臟腑壅滯挾心脾之熱上衝故令舌尖腫大塞滿口中或僵硬如木不能轉掉不能言語若不急治必致殞命古方用萆麻子肉搗研以綿紙取油將紙抄成條點火復吹滅以煙薰之即消弄舌者脾虛微熱津液不足時時舒舌此不可用涼藥宜補中氣使生津液則愈矣青黛散治口瘡重舌不能吮乳重㬽鵝口方見口瘡硼砂散治舌上白胎舌上乾黑硼砂為末冰片少許摻之或用生蜜調塗舌上妙千金方治重舌黃柏用竹瀝浸一宿點舌上瀉黃散治心脾熱盛重舌重㬽等症方見口瘡茱茰膏治心脾熱唇口生瘡重舌木舌等症用此以引其熱下行或兼服連翹飲子仍與金絲膏刷口內舌上立效吳茱茰為末米醋調塗腳心更以厚紙貼之繫定金絲膏治小兒口瘡大效黃丹一錢生蜜一兩右和勻深甌盛甑內蒸黑為度每用少許刷口內語遲小兒四五嵗不能言者蓋心之聲為言皆由在胎時其母卒有驚怖內動母之心氣不足則兒之心氣不充故語遲也法當養心菖蒲丸佳菖蒲丸石菖蒲二錢人參五錢麥門冬去心丹參逺志去心薑汁炒天門冬去心赤石脂各三錢直指方有當歸川芎硃砂右為末煉蜜丸麻子大每服三十丸又方酸棗仁五錢逺志去心甘草三錢湯煮乾乾山藥五錢人參白茯神去心皮各五錢歸身五錢石菖蒲二錢丹參三錢石斛去根飯上蒸三錢右為末圓眼肉煎湯調下每服一錢斷乳法畫眉膏梔子三枚炒存性雌黃辰砂各少許右為末入輕粉少許麻油調勻候兒睡濃時塗其兩眉上醒來自然不吃乳未效再塗則效行遲內經云足得血而能步設未經跌撲損傷及發驚搐強被束縛者乃下元不足也蓋腎主骨肝主筋下元不足則筋骨痿弱不能行動宜用峻補下元有疳弱而不能行者當從疳治腎氣丸治下元不足行遲懷地黃酒蒸熟四兩乾山藥山茱茰肉各二兩茯苓澤瀉牡丹皮去心各一兩半右為末煉蜜丸空心淡鹽湯下五十丸地黃丸峻補下元方見顱囟虎骨丸治腳軟行遲虎脛骨好酒炙熟地酸棗仁酒炒茯苓桂心防風川芎牛膝右各等分為末蜜丸麻子大木瓜湯下三十丸牛膝散治三嵗不能行走五加皮六錢牛膝木瓜各五錢右為末每一錢酒調下項軟項軟者乃督脈虛而筋骨不收斂也督脈係足太陽膀胱經所主古方多從風治以其頭重頸軟頭不得正而墜前墜後也愚謂但補督脈則其氣血充盛自能收持也前虎骨丸地黃丸皆可任之天柱丸治項風氣起頸軟頭不得正或去前或去後蛇含石醋煅七次一兩川鬱金三錢麝香少許右搗飯為丸芡實大每一丸荆芥湯化下五皮散治項軟五加皮為末酒調塗敷頸骨上再用酒調服亦治行遲滯頤滯頤者涎自口角流出而滯於頤間也此由脾冷涎多脾虛不能攝其津液泛而溢出漬滯頤間濕淫紅赤惟當溫脾益黃散溫脾散皆治之亦有脾熱者但清其熱則涎自不泛上寒熱二字在人看其面色審其兼症問其二便庶治不偏溫脾丹治滯頤半夏丁香木香各一兩炮薑白术青皮陳皮各五錢右為末麵糊丸黍米大一嵗十丸米湯下溫脾丹治同上半夏人參肉果白术炮薑甘草各五錢丁香一兩右每服二三錢水煎服清脾散治同上白术白滑石飛各五錢甘草一錢黃連酒炒二錢扁豆炒茯苓各三錢葛根一錢半石斛三錢右為末每服一錢燈心湯化下赤水元珠卷二十五
