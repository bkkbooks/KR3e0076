body:
  text: 赤水元珠卷二十四明孫一奎撰耳立齊曰耳瘡屬手少陽三焦及足厥隂肝經血虛風熱或怒動肝火而致若發熱焮痛屬三焦厥隂風熱用柴胡清肝散若寒熱作痛或作嘔吐乃肝火傷脾用益脾清肝散若口乾足熱為肝腎隂虛用益隂腎氣丸若月經先期為血熱用加味逍遙散過期為血虛用八珍湯食少體倦為鬱火加味歸脾湯惡寒發熱肢體倦怠為氣血俱虛用十全大補湯慎不可專治其外復傷氣血也一婦耳內外腫痛胸膈不利寒熱往來小便不調此肝火傷血先用龍膽瀉肝湯四劑諸症頓退又用加味逍遙散而痊又因怒復作用柴胡而安一寡婦耳內外作痛不時寒熱脉上魚際此血盛之症用小柴胡加生地以抑其血而愈又項間結核如貫珠寒熱晡熱用加味歸脾湯加味逍遙散調補肝脾而愈一女子耳下腫赤寒熱口苦月經不調小腹內結一塊此肝火氣滯而血凝也先用小柴胡加山梔川芎丹皮又用柴胡清肝散而痊小柴胡湯治肝膽經症寒熱往來晡熱潮熱身熱默默不欲飲食或怒火口苦耳聾咳嗽發熱脅下作痛甚者轉側不便兩脅痞悶或瀉痢咳嗽或吐酸食苦水皆用此藥主之柴胡二錢黃芩炒一錢人參半夏各七分炙甘草五分薑三片水煎服加味小柴胡湯治肝膽經風熱前後腫痛或結核焮痛或寒熱晡熱或經候不調等症即前小柴胡湯加山梔丹皮益脾清肝散治肝經之症寒熱體痛脾胃虛弱人參白术炒茯苓各一錢炙甘草柴胡各五分川芎川歸黃茋各一錢丹皮七分水煎服梔子清肝散治三焦及肝膽經風熱耳內作癢或生瘡出水或脅肋胸乳作痛寒熱往來柴胡山梔炒丹皮各一錢茯苓川芎芍藥當歸牛旁子炒各七分白术炒甘草各五分水煎服柴胡清肝散治肝膽三焦風熱怒火以致項胸作痛或頭目不清或耳前後腫痛或寒熱體痛柴胡黃芩炒甘草各五分人參山梔炒川芎各一錢連翹桔梗各八分水煎服犀角地黃湯治上焦有熱口舌生瘡發熱或血妄行或吐衄或下血犀角生地白芍藥黃芩炒牡丹皮黃連炒各一錢水煎服因怒而患者加柴胡山梔犀角升麻湯治陽明經風熱牙疼或唇頰腫痛或手足少陽經風熱連耳作痛犀角升麻防風羌活各一錢白附子五分川芎白芷黃芩炒各七分甘草五分水煎服當歸川芎散治手足少陽經血虛瘡症或風熱耳內癢痛生瘡出水或頭目不清寒熱少食或經水不調胸膈不利腹脅痞痛小便不調當歸川芎柴胡白术炒芍藥炒各一錢山梔炒一錢二分丹皮茯苓各八分蔓荆子甘草各五分水煎服雜方加味地黃丸治肝腎隂虛諸症或耳內癢痛出水或眼昏痰喘或熱渴便澀等症乾山藥山茱茰牡丹皮澤瀉柴胡白茯苓熟地黃生地五味子各等分為末右將煉蜜為丸梧子大每服百丸空心白湯下如不應用加減八味丸人參養榮湯治潰瘍寒熱四肢倦怠體瘦少食面黃氣短不能收斂大瘡愈後多服之庶不變他症也白芍藥一錢五分人參陳皮黃茋炒桂心川歸白术炒炙甘草各一錢熟地五味炒茯苓各七分逺志去心炒五分入薑棗水煎服瀉青丸治肝經實火脅乳作痛或惡寒發熱大便祕結川歸龍膽草炒焦川芎山梔炒大黃炒羌活防風各等分右為末蜜丸梧子大每服三四丸白湯下若隂血不足肝火血燥用四物加山梔柴胡或逍遙散加丹皮山梔若腎水虧損不能生肝木而筋攣結核或肢節攣搐或似中風延痰上湧用六味丸料煎服生地黃丸治師尼寡婦室女乍寒乍熱或頸間結核肝脉弦長直出魚際生地秦芁黃芩硬柴胡各五分赤芍藥一兩右煉蜜為丸梧子大每服三十丸烏梅湯下連翹飲子治肝膽經氣滯瘰癧結核或乳內結核者連翹川芎瓜蔞仁橘葉皂角刺炒青皮甘草節桃仁各一錢水煎服散腫潰堅湯治瘰癧堅硬氣血無虧者升麻連翹川歸尾白芍葛根三稜酒拌微炒廣术各三分龍膽草桔梗炒昆布知母酒炒瓜蔞仁各五分柴胡四分黃芩酒炒五分炙甘草二分右水煎服必效散治瘰癧未成者消已潰者斂須元氣無虧者可服孕婦勿服南蓬砂二錢半輕粉一錢斑猫四十枚去頭足同糯米炒去米麝香五分巴豆五粒去殼心膜白檳榔一枚右為末每服一錢五更用滚湯調下如小水澀滯或微疼此癧毒欲下也進益元散一服即下此方斑猫巴豆似為峻厲然用巴豆乃解斑猫巴豆用者勿畏也益元散滑石飛六錢甘草一錢各為末每服一二錢白湯調下琥珀膏治頸項或腋下初結小核漸如連珠潰而膿水不絶或漏症者琥珀一兩丁香桂心硃砂木香松香俱為末白芷防風當歸木通木鱉子肉各五錢麻油二斤將后五味入油煎熬藥焦濾去渣徐徐入黃丹再熬軟硬得所入前末藥即成膏矣針頭散治一切頑瘡內有瘀肉或癧核不化瘡口不合宜此藥腐之赤石脂五錢乳香白丁香砒霜生用黃丹各一錢輕粉麝香各五錢蜈蚣一條為末搽瘀肉上其肉自化若瘡口小用糊和作細條隂乾絍之凡瘡久不合者內有膿管必須用之結核方論婦人結核皆因鬱怒虧損肝脾或因胎産經行失於調護或因暴怒觸動肝火若結於項側耳前後或胸脅腫痛或發寒熱屬膽經風熱怒火冝用柴胡清肝散加鈎藤山梔以養血氣清肝火若結于肉理其色不變晡熱內熱屬肝火血虛宜加味逍遙散加龍膽草以養肝血清肝火或結于肢節或纍纍如貫珠其色不變亦肝火血燥而筋攣宜用柴芍參苓散加鈎藤以養血氣佐以六味丸以生腎水若時消時作此氣滯而痰結也用歸脾六君二湯以調和脾肺之氣並佐以海藻丸若潰而核不腐或肉不生或膿水清稀肌寒肉冷自汗盜汗寒熱內熱面色痿黃食少體倦便利不調者五臟皆虛也但用補中益氣加味六君子二湯調補脾胃以滋諸臟則各症自退故經云形傷則痛氣傷則腫慎不可輕用行氣破血而復傷也一婦項結核寒熱頭痛脅脹乳痛內熱口苦小便頻數屬肝火血虛用加味四物而愈又用加味逍遙散調補肝脾而安一婦耳內耳後項側結核作痛寒熱口苦月經不調此肝膽經火而傷脾胃也用四君柴胡丹皮及六味丸而愈一婦項患五核時常寒熱肝脉弦長而出寸口此血盛無偶之症也用小柴胡湯加生地烏梅而愈加味逍遙散治肝脾血虛有熱遍身搔癢或口燥咽乾發熱盜汗食少嗜卧小便澀滯等症又治瘰癧流注虛熱等瘡炙甘草當歸炒芍藥酒炒茯苓白术炒各一錢柴胡牡丹皮山梔炒五分水煎服逍遙散即前方減丹皮山梔歸脾湯治脾經失血少寐發熱盜汗或思慮傷脾不能攝血以致妄行或健忘怔忡驚悸不寐或心脾傷痛嗜卧少食或憂思傷脾血虛發熱或肢體作痛大便不調或經候不准晡熱內熱或瘰癧流注不能消散潰斂人參白术炒黃茋炒茯苓當歸逺志酸棗仁炒各一錢木香炙甘草各五分龍眼肉三枚薑棗水煎服加味歸脾湯即前方加山梔柴胡柴术參苓湯治肝火血熱遍身搔癢或起赤暈或筋攣結核白术人參茯苓各一錢柴胡川芎山梔炒芍藥炒甘草炒各五分熟地當歸各八分水煎服柴芍參苓散治肝膽經部分結核瘰癧瘤瘊等症或肝血燥脾氣虛弱發熱少食柴胡芍藥炒人參茯苓白术炒山梔炒陳皮當歸各一錢丹皮甘草各五分薑棗水煎服清肝益榮湯治肝膽經風熱血燥筋攣結核或作瘊子柴胡薏苡仁茯苓木瓜熟地各一錢山梔龍膽草白术炒各五分川芎川歸芍藥炒各一錢甘草三分水煎服清熱凉血飲治風熱血燥丹毒等證大便祕結當歸川芎大黃炒芍藥炒生地各一錢水煎服神效開核散消癭塊甚效沉香木香各二錢橘紅四兩珍珠四十九粒入罐封固煅赤存性出火毒猪靨子四十九枚豚猪生項間如棗子大為末每服一錢臨卧酒調徐徐咽下輕者三五服重者十服可愈切忌酸醎油膩滯氣之物須用除日于靜室修合海藻散堅丸治肝經癭瘤海藻昆布各二兩小麥四兩醋煮晒乾柴胡二兩龍膽酒拌炒焦二兩為末蜜丸梧子大每服三十丸臨卧白湯送下噙化咽之尤妙凡患瘰癧服調治之藥未應宜佐以前二藥益氣養榮湯懷抱抑鬱瘰癧流注或四肢患腫肉色不變或日晡發熱或潰而不斂人參茯苓陳皮貝母香附川歸川芎黃茋鹽水拌炒熟地芍藥炒各一錢炙甘草桔梗炒各五分白术炒二錢入薑水煎服木香餅治氣滯結腫閃肭風寒所傷作痛木香為末五錢生地一兩搗地黃膏和勻量患大小作餅子置患處以熱尉斗尉之腫痛悉退當歸飲治熱血病丙穩禾疹癢痛膿水淋漓發熱等症當歸白芍藥川芎生地白蒺藜炒黃芪各一錢防風荆芥何首烏忌鐡甘草各五分水煎服赤白逰風婦人赤白逰風屬肝經鬱火血燥生風或脾經鬱結血虛生熱或腠理不密風邪外襲其症或疙瘩瘙癢或膿水淋漓白屬氣而赤屬血因得風而逰行也若肝經血燥用柴胡清肝散肝經怒火用梔子清肝散肝經血熱用加味四物湯肝火血虛六味丸脾經鬱熱加味歸脾湯肝脾血虛風熱加味逍遙散若因風邪鬱熱所致用荆防敗毒散或專用袪風之劑肝血愈燥則血隨火化反為敗症矣一婦身如丹毒搔破膿水淋漓熱渴頭暈晡時益甚用加味逍遙散而愈一女赤暈如霞作癢發熱用加味小柴胡加生地連翹丹皮而愈大凡女子天癸未至婦人月經不調受驚著惱多有此症消風散治風寒病丙穩禾疹癢痛或膿水淋漓頭皮腫癢荆芥穗炙甘草陳皮人參茯苓白殭蠶炒防風芎藭藿香羌活蟬蛻各一錢厚朴薑制五分水煎服大連翹飲治風熱熱毒赤白逰風表裏皆受患者連翹瞿麥荆芥木通蟬蛻甘草赤芍防風柴胡滑石山梔炒黃芩炒川歸一錢水煎服婦人􅴖痃一名便癰俗名㾦子一名便毒婦人􅴖痃或肝經濕熱下注或鬱怒傷損脾肝其外症或拗小腹腫痛或玉門焮腫作痛或寒熱往來增寒壯熱其內症或小便澀滯或腹內急痛或小腹痞悶或上攻兩脅或晡熱重墜若兩拗小腹腫痛肝經濕熱壅滯也用龍膽瀉肝湯玉門腫脹肝火血虛也用加味逍遙散及龍膽瀉肝湯加木香若槩投散血攻毒之劑則誤甚矣一婦人拗中赤腫脹痛此膿內作用托裏消毒散加此數劑潰而膿清寒熱乃氣血復虛用托裏散而寒熱止用十全大補湯百餘劑而斂一婦人腹拗腫痛寒熱口苦或時帶下此肝經濕熱不利也用龍膽瀉肝湯而腫痛消用加味逍遙散而寒熱退一婦人腹拗腫痛小水不利時或胸乳作痛脅腹作脹此肝火氣滯用四物柴胡青皮𤣥胡木香而愈一婦人兩拗腫痛腹內一塊不時上攻月經不調小便不利余以為肝脾氣滯而血傷以四君子加芎歸柴胡山梔而愈後因鬱怒前症復作兼胸滿腹脹盜汗此肝木甚而傷脾土也用加味歸脾湯下蘆薈丸而痊一婦人隂中如梗兩拗腫痛寒熱不食小便頻數小腹重墜余以為肝脾鬱怒所致先以補中益氣加茯苓山梔車前子青皮以清肝火升脾氣更以加味歸脾湯調理脾鬱而愈龍膽㵼肝湯治肝經濕熱兩拗腫痛或腹中疼痛或小水澀滯等症龍膽草酒拌炒黃澤瀉各一錢車前子炒生地黃酒拌木通山梔炒黃芩甘草各五分右水煎服九味柴胡湯治肝經濕熱下注便毒腫痛或小腹脅肋結核凡肝膽經部分一切瘡瘍或風熱結核瘰癧柴胡黃芩炒各一錢人參山梔炒半夏龍膽草炒焦川歸芍藥炒甘草各五分右水煎服蘆薈丸治肝氣不和尅侮脾胃而患諸症或三焦肝膽經風熱目生雲翳或疳熱瘰癧耳內生瘡寒熱作痛肌體消瘦發熱作渴飲食少思肚腹不調或牙齦蝕落頰腮腐爛下部生瘡等症蘆薈五錢胡黃連當歸芍藥炒龍膽草酒浸炒焦川芎蕪荑各一兩木香甘草炒各三錢右為末用米糊丸麻子大每服五十丸滚湯下鶴膝風婦人鶴膝風症因胎産經行失調或鬱怒虧損肝脾而為外邪所傷或先腿腳牽痛先或肢體筋攣既而膝漸大腿漸細如鶴膝之狀而名之也若髙腫赤痛者易治若漫腫不赤痛者難治二三月潰而膿稠者易治半載後潰而膿清者難治設先攻伐虧損元氣尤為難治也大要當固元氣為主而佐以大防風湯若食少體倦者六君子湯為主晡熱內熱者逍遙散為主寒熱往來者八珍湯發熱惡寒者十全大補湯不寐而驚悸者歸脾湯月經過期者補中益氣為主月經先期者加味逍遙散為主凡潰後當大補脾胃若膿出反痛或寒熱煩渴等症皆屬氣血虧損一切主于補培庶保終吉一婦患鶴膝兩拗中腿股筋牽作痛內熱寒熱此肝火氣滯之症先用加味小柴胡湯四劑後以加味逍遙為主佐以大防風湯而消又患痢後兩膝腫痛寒熱往來用十全大補湯為主佐以大防風湯而全消大防風湯治隂虛邪襲腿膝腫痛等症防風附子炮牛膝白术炒羌活人參各一錢川芎一錢五分桂心黃茋炒各一錢芍藥炒杜仲薑製各一錢甘草五分熟地一錢半水煎服黑丸子一名和風定痛丸治跌撲墜墮筋骨疼痛或瘀血壅腫或外感風寒肢體作痛若流注膝風初結服之自消若潰而膿清與補氣血藥自斂孕婦勿服百草霜白芍各一兩南星川烏各炮三錢白蘞赤小豆各二兩半白芨川歸骨碎補炒各八錢牛膝六錢右為末酒糊丸桐子大每服三十丸鹽湯溫酒送下聖愈湯治血虛心煩睡卧不寧或五心發熱熟地黃生地黃黃茋炒人參川芎川歸各一錢水煎服八味丸治火衰不能生土以致脾胃虛寒而患流注鶴膝等症不能消潰收斂或飲食少思或食而不化或臍腹疼痛夜多漩溺益火之原以消隂翳即此方也熟地黃自製乃佳八兩山茱茰肉山藥各四兩茯苓牡丹皮澤㵼各三兩桂心去粗皮能補腎而引虛火下行歸原一兩大附子用一兩五錢重者切四塊用童便浸數日火煨切看無白星為度右為末蜜丸桐子大每服七八十丸滚湯下婦人足跟瘡腫足跟足指腫痛足心發熱者皆因胎産經行失于調攝虧損足三隂經虛熱所致若腫痛或出膿用六味丸為主佐以八珍湯胃虛懶食佐以六君子湯寒熱內熱佐以逍遙散晡熱益甚頭目不清佐以補中益氣湯痰盛作渴或口舌生瘡亦用前二藥以滋化源大凡發熱內熱晡熱自汗盜汗等症皆因虛假熱也故丹溪謂火起九泉隂虛之極也蓋足跟乃督脉發源之所腎一經所過之地若不求其屬而泛用寒凉則誤甚矣然俗謂為兔嚙瘡者蓋獵人被兔咬足跟久而不斂氣血瀝盡其人必死男子酒色過度者亦多患此症一婦兩足發熱足跟作痛日晡熱甚此腎肝血虛用逍遙散六味丸五十餘劑諸症悉退六味丸此壯水制火之劑治腎虛發熱作渴小便淋祕痰壅失瘖咳嗽吐血頭目暈眩眼花耳聾咽喉燥痛口舌瘡裂齒不堅固腰腿痿軟五臟虧損自汗盜汗便血諸血凡肝經不足之症尤當用之蓋水能生木故也此水泛為痰之聖藥血虛發熱之神劑又治肝腎精血不足虛熱不能起床即仲景八味丸去附子桂心肺癰婦人肺癰因外內藴熱或七情鬱火誤行汗下重亡津液以致肺氣受傷而惡風咳嗽鼻塞項强胸脅脹滿呼吸不利吐痰臭濁膿血腥穢若咳嗽喘急寒邪在表也小青龍湯咳嗽胸脹寒邪內壅也葶藶大棗㵼肺湯脅脹咳唾腥臭膿已成也桔梗湯咳喘短氣或小便短少肺氣虛也佐以參茋補肺湯體倦少食或喘嗽短氣脾肺虛也佐以參术補脾湯作渴飲冷午前嗽甚胃火盛也竹葉石膏湯作渴內熱午後嗽甚隂血虛也六味丸四物湯口乾飲湯體倦少食胃氣虛也補中益氣湯加五味麥冬口乾內熱咳嗽痰涎腎水虛也六味丸益氣湯黃昏熱或嗽甚隂火熾也六味丸四物湯加五味麥冬五更嗽或痰甚脾肺虛也六君子湯嗽而不得眠及兩脅疼肝火血虛也六味丸益氣湯大凡前症因外淫所侵當祛邪而實上因心火太過當伐木而補金若肺氣虛弱當補脾土而生肺金若隂火上炎當補脾肺以滋腎水然而發熱喘嗽咳唾膿血飲食不入皆脾土不能生肺金肺金不能生腎水之敗症苟能純補脾土而生諸臟多有復生者若用寒凉脾胃復傷則肺金失養腎水益涸虛火上炎薰蒸于肺吾未見其能生之者其唾膿血脉浮大面色赤者俱難治若隂火妄動或勞嗽吐膿血者尤難治若膿自止脉浮短澀及始萌者易治一婦素血氣發熱咳嗽服痰火之劑後吐膿血面赤脉數其勢甚危此膿成而氣血虛也用八珍湯補元氣桔梗湯治肺癰而愈青龍湯肺受風邪咳嗽喘急半夏乾薑細辛麻黃去根節肉桂芍藥炙甘草各一錢五味子炒五分大附子炮五分水煎服葶藶大棗瀉肺湯治肺癰胸膈脹滿上氣喘急或身面浮腫鼻塞聲重用葶藶炒黃研末每服三錢先用棗十枚水煎入藥再煎食後服桔梗湯治肺癰咳而胸膈隱痛胸次腫滿咽乾口燥煩悶作渴濁唾腥臭桔梗枳殼苡仁桑皮各炒當歸貝母瓜蔞仁甘草節防已去皮各一錢黃茋鹽水炒百合蒸各一錢半五味子炒甜葶藶炒地骨皮知母杏仁各五分薑水煎服人參補肺湯治肺癰腎水不足虛火上炎咳唾膿血發熱作渴小便不調人參黃茋炒白术茯苓陳皮川歸各一錢山茱茰山藥各二錢五味子麥冬炙甘草各七分丹皮一錢熟地一錢半薑水煎服參茋補脾湯治肺症因脾氣虛弱咳唾膿涎中滿不食宜兼服此藥以補脾土生肺金人參白术各二錢黃茋炙二錢半茯苓川歸陳皮各一錢升麻三分五味子四分炙甘草薑水煎服人參平肺散治心火尅肺金患肺痿咳嗽喘嘔痰涎壅盛胸膈痞滿咽嗌不利方見嗽門腸癰婦人腸癰因經行産後瘀血或七情飲食所致其證小便如淋發熱惡風身皮甲錯腹皮腫急按之軟如腫狀或腹脹大轉側有水聲或繞臍生瘡或大便出膿其脉遲緊者膿未成用活命飲以解其毒脉滑數者膿已成用雲母膏以下其膿若二年間遍身微腫大便與臍出膿此息積之症也多致不救內經云腸癰為病不可驚驚則腸斷而死其坐卧轉側宜徐緩時常少飲稀粥靜養調理庶可保生一婦人小腹腫痛小便如淋此毒結于內用神效瓜蔞散二劑少愈又以薏仁湯二劑乃痊一婦小腹痛而有塊脉芤而澀此瘀血為患以四物加𤣥胡索紅花桃仁牛膝木香二劑血下而愈一婦小腹脹痛大便祕澀轉側有水聲脉洪數用薏苡梅仁湯一帖下去瘀血諸症頓退以薏苡仁湯二帖而瘥一婦小腹脹痛小便不利脉滑數此膿已成服太乙膏五錢膿大下脹痛悉退以瓜蔞散蠟礬丸托裏藥而安一婦因經水多服藥止之致腹作痛以失笑散二帖而瘳又用加味逍遙散數劑而經調一産婦惡露停滯小腹作痛服瓜仁湯下瘀血而痊凡瘀血停滯急宜行之緩則腐化為膿最為難治若流注關節則患骨疽多為敗症瓜子仁湯治惡露未盡或經行瘀血停滯小腹作疼或成腸癰等症方在孕癰卷敗醬散治脉數身無熱腹無積聚按之軟濡此為腸癰乃久積隂冷所成苡仁二兩半附子炮半兩敗醬草一兩二錢半每服四錢水煎服以小便利為度牡丹湯即牡丹皮散治腸癰腹軟而痛時下膿血方在孕癰卷千金大黃牡丹湯治腸癰小腹堅腫按之則痛肉色如故或焮赤微腫小便頻數汗多增寒脉遲緊未成膿者宜服之梅仁湯治腸癰壅痛大便祕澀二方在外科腸癰門神仙䗶礬丸最解毒止痛方在癰疽門失笑散産後心腹絞痛或血迷心竅不知人事及尋常腹內瘀血積血作痛五靈脂炒蒲黃炒等分為末每服二錢酒調下乳癰乳岩經云乳頭屬足厥隂肝經乳房屬足陽明胃經若乳房忽壅腫痛結核色赤數日之外焮痛脹潰稠膿湧出膿盡而愈此屬膽胃熱毒氣血壅滯名曰乳癰為易治若初起內結小核或如鱉棋子不赤不痛積之歲月漸大巉岩崩破如熟榴或內潰深洞血水滴瀝此屬肝脾鬱怒氣血虧損名曰乳岩為難療治法焮痛寒熱宜發表散邪腫焮痛甚宜踈肝清胃或不作膿成不潰宜用托裏或肌肉不生膿水清稀冝補脾胃或膿出反痛惡寒發熱宜補氣血或腫焮作痛晡熱內熱宜補隂血或飲食少思時作嘔吐宜補胃氣或飲食難化泄㵼腹痛宜補脾氣或勞碌腫痛宜補氣血怒氣痛腫宜養肝血甚不可用尅伐之劑復傷脾胃也乳岩初患用益氣養榮湯加味逍遙加味歸脾可以內消若用行氣破血之劑則速其亡一婦內熱脅脹兩乳不時作痛口內不時辛辣若卧而起急則臍下牽痛此帶脉病也小柴胡加青皮黃連山梔二劑而安一婦先熱渴至夜尤甚後兩乳忽腫肝脉洪數乃熱入血分用加味小柴胡湯而愈一婦膿清腫硬面黃少食內熱晡熱自汗盜汗月經不行此肝脾氣血俱虛也用十全大補加逺志貝母及補中益氣各三十餘劑外用葱尉法而消一婦久鬱左乳內結核如杏三月不消心脉澀脾脉大按之無力此肝脾氣血虧損以八珍加貝母逺志香附柴胡青皮桔梗五十餘帖而消一婦右乳內結三核年餘不消朝寒暮熱飲食不甘此肝脾氣血虧損內服益氣養榮湯外以木香餅尉之年餘血氣復而消一婦乳內結核年餘晡熱食少此血氣不足欲用益氣養榮湯彼欲效速另服行破之劑潰出清膿而殁一婦乳內結核如栗亦服前藥大如覆碗堅硬如石出血水而殁神效瓜蔞散治乳癰及一切癰疽初起腫痛即消膿成即潰膿出則愈瓜蔞一箇爛研生粉草當歸酒洗各半兩乳香沒藥各一錢用酒煎服良久再服若肝經血虛結核久而不消佐以四物柴胡升麻白术茯苓甘草若肝脾氣血虛弱佐以四君芎歸柴胡升麻若憂鬱傷脾氣血虧損佐以歸脾湯玉露散治産後乳脉不行或身體壯熱頭目昏痛大便澀滯等症人參茯苓桔梗炒川芎白芷當歸芍藥各一錢甘草五分右水煎服乳癰初發貝母為末每服二錢熱酒下即以二手覆按卓上垂二乳向下良久自通赤水元珠卷二十四
