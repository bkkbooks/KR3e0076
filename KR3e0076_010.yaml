body:
  text: 赤水元珠卷十明孫一奎撰虛怯虛損勞瘵門總論生生子曰虛是氣血不足怯是不能任勞損是五臟虧損由虛而至怯至損皆自漸而深治之須極體認不可輕易投劑少有差誤則輕者反重重者死矣古患虛怯者雖是不治之症尚或延過二三年今之患虛怯者周歲半載之間卒不可救深可憫也求其死速之由有三大愆不容不急講也病家欲求速效不久任師屢更屢試殊不知虛者精氣奪也須多服補藥非假以歲月不見功病者厭其效遲更師調理故屢換而屢試之後師窺前方之不效疑非其症又更方治詎思其藥力之未逮也由是脾胃轉傷遂至不救猶恨天下無良師也此其一愆也乃愆之小者也自丹溪倡陽有餘隂不足及相火易動之論而明醫雜著和之統㫖大㫖又和之故今之人才見虛弱發熱一委之隂虛火動開場便用滋隂降火不分陽虛隂虛脾胃勇怯一槩用黃柏知母生熟地黃天麥門冬牛膝天花粉五味子童便之類胃強而隂血不足者間或無虞胃弱氣虛而無實熱者服此純隂苦寒之劑其火愈熾甚至惡心胸滿咳嗽痰沫泄㵼聲啞而斃哀哉叩其師則曰書以隂虛火動著其症吾以滋隂降火應其病病之不起天也雖屢試屢死而師家病家終莫能醒其藥之誤而一歸之天吁天何寃也丹溪陽有餘隂不足之論蓋為當時局方溫補之藥害人故著此以救一時之弊至於按病投劑隂虛則補隂陽虛則補陽曷嘗固執又曷嘗隄防流害一至於此據經云火欎則發之又曰輕者可降重則從其性而升之蓋火之性上炎以輕揚之劑鼓之則易散也若不察而一以降火為言將逆其性而使之愈熾矣故曰甘溫去大熱是也按東垣書只有升陽散火湯火欎湯二方並無滋隂降火之法豈賢如東垣者尚昧此滋隂降火之法歟緣脾胃喜溫而惡寒形寒飲冷則傷肺體既虛弱膚腠不密易致風邪由此咳嗽潮熱故以輕揚之劑投之其熱頓釋熱退即以補劑收其功時師暗于此理動藉開口則曰丹溪諸公云云人身之虛皆隂虛也故任前藥而不疑不思滋隂降火之藥皆斂肺助濕滯痰損脾者風邪火熱皆莫能散愈投愈咳愈進愈熱也此弊吳浙間尤罹其毒蓋王節齊吳茭山何大英皆浙産益易見信故耳此其二愆也乃愆之大者也膏粱之家厚味相競內多積聚丹溪曰蒸蒸發熱積病最多嗜欲者中心實怯故每迎師用藥喜補而憚攻抑不知積之不去熱之不去也多補則重閉其氣是資其邪而益其病也初起未久胃氣尚强急當推之而後議補則無反顧之憂若失機㑹遷延日遠莫能為計欲補則無成功欲攻則胃氣已壞畏首畏尾待死而已此其三愆也乃愆之中者也豫壯歲患此百師莫能瘳幸遇至人指示軒岐要領病之禁忌恬淡內觀三年乃起是以深悟此三大愆不敢自祕謹將縝密授受治法吐露篇末以惠蒼生不識同志者寧少易其故轍否耶凡治虛損之症當從難經治法損其肺者益其氣損其心者調其營衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精此治損之法也今人樂看方書不究竟經義一遇虛熱之症動輒便是滋隂降火顧生平所藴不過是明醫雜著諸症辨疑活人指掌等小書識見淺近易于觀覽元宋已前諸大家之㫖有至老未嘗觸目者間有涉獵丹溪則又僅能用其粗而略其精丹溪治隂虛之法固未嘗純棄人參莭齊則畏之如虎汪石山病用參蓍論及營衛論云丹溪言陽有餘而隂不足者乃對待之言是大槩之論隂虛乃營中之隂氣虛非特言腎隂也此言發前人之所未發深有功于丹溪者近代諸公所云隂虛非精則血故用劑惟養血滋隂也豫既詳之于前復申之于後誠重人命而懲其偏亦欲同志者有所警悟也治虛損之症再要識得利害丹溪云脉數而無力者難治大肉脫甚者難治肺脹欎遏不得眠者難治形瘦脉大胸中多氣者死㵼而加汗者死熱不為汗衰者死不為泄减者死嗽而下泄上喘者死股肉全消者死左不得眠者肝脹右不得眠者肺脹又嗽而㗋疼聲啞糞門瘻瘡者死皆不治之症脉訣舉要曰骨蒸勞熱脉數而虛熱而澀小必殞其軀加汗加咳非藥可除治虛損之症吃緊處工夫只在保護脾胃為上如和解攻裏二法義之所當用者雖老弱久病亦所不避乃撥亂反正之意惟要用捨得冝有先攻而後補者有先補而後攻者有攻補並行者當攻則攻當補則補如丹溪治一人久嗽吐紅發熱消瘦衆以為瘵脉弦數日輕夜重行倒倉法而愈次年生子滑伯仁治宋無逸病瘧瘠損饘粥難下咽者六十餘日殆甚脉數關上尤弦疾久體瘠而神完是積熱居脾且滯于飲食法當下衆疑而難之藥再進而疾去其半繼以甘露飲白虎湯而安觀此乃當攻則攻也縱久病瘦弱法有所不避也丹溪治一人咳嗽惡寒胸痞口乾心微疼脉浮緊而數左大于右蓋表盛裏虛問其素嗜酒肉有積後因行房涉寒冒雨忍飢繼以飽食先以人參四錢麻黃連根莭一錢半與二三帖嗽止寒除改用厚朴青皮陳皮瓜蔞半夏為丸參湯下二十服而痞除汪石山治一人年弱冠房勞後忽灑灑惡寒自汗發熱頭背胃脘皆痛唇赤舌强嘔吐眼胞青色午後譫語發熱小便長初日脉皆細弱而數次日脉浮弦而數醫以手按臍下痛議欲下之石山曰此疫也疫兼兩感內傷重外感輕耳臍下痛者腎水虧若用利藥是殺之也古人云疫有補有降有散兹冝合補降二法以清暑益氣湯除蒼术澤㵼加地黃而安此當補則補也夫業醫者膽欲大而心欲小毅然獨斷于𠂻病所當㵼則須㵼之幸無曰虛弱者何敢弄險經曰有故無損亦無損也設務姑息而一惟調補是務此猶南宋和議之說豈知邪正不兩立王業不偏安然不伐賊王業亦亡坐而待亡孰若伐之古人以醫譬國豈徒語哉抱拙子曰內經云今人未及半百而衰以酒為漿以妄為常醉以入房欲竭其精耗散其真則人之根源從此而虛損矣五臟六腑如何不弱五勞六極七傷如何不至勞傷既至則隂陽虧寒熱作飲食减脉道乖故虛勞之脉有浮而大者微而弱者弦而數者夫脉浮而大者血氣未衰病勢未羸大肉未消飲食未减雖有寒熱諸邪猶可以治若脉微弱者血氣已衰病勢已羸飲食减骨肉枯寒熱蒸嘔泄作于此則滋補兩難何易下手單弦猶可若帶雙弦則為賊邪侵脾尤為難治加數則正氣已竭病必殆矣善治者當病勢未深之時調養脾胃安鎮心神滋補腎水俾心腎氣交脾胃充實飲食日進血氣自生病無不差又如經曰精不足者補之以味味隂也補精以隂求其本也然味乃榖粟菜果出于天賦自然冲和之味故有益人補隂之功非醯醬烹飪偏厚之味出于人為者也又經曰形不足者溫之以氣溫養也溫存以養使氣自充氣充則形完矣今醫失補之道輕則鹿茸雄桂重則起石丹砂加之灼艾補燥其水夫五行之氣水特其一耳一水不勝五火况又加以熱劑則水愈涸而火轉盛久而咳痰咳血潮熱煩渴喜冷猶且喜補不已如此死者醫殺之耳夫凉劑能養水清火熱劑能燥水助火勞為熱證明矣還可用補乎然五臟氣血虛損補劑雖不可無用之亦必有道必先治其諸蟲痰飲宿癖一一除盡方可以服補劑不爾必不得力其體虛者最易感風邪尤當先行和解微利微下從其緩而治之次則隨證調之若邪氣未除便行溫補邪氣得補遂入經絡致死不治如此死者何啻千萬惟無蟲痰積癖之人其脉舉按無力而弱者方可補之然五臟雖皆有勞心腎為多心主血腎主精精竭血燥心腎虛矣腎氣虛則水走于下心氣缺則火炎于上火炎上則為痰為嗽為煩熱為口乾為咯血為上氣為嘔逆為盜汗為耳鳴目眩為睡中驚悸水走下則為腰痛為腳弱為泄㵼為赤白濁為遺精夢泄為小便滑數為皮毛焦枯皆虛勞變證生于心腎者也故補法當以調心補腎為先惟冝溫養以緩取效不冝用峻烈之劑經又曰脾者孤臟以灌四旁又曰五臟皆禀氣于胃脾胃健順運納五榖雖有虛勞復之亦速脾胃苟虛若不先補益而便用補本臟之藥則脾不能納化滯而不行用力多而成功少也故治虛勞者須先健順脾胃然後徐用本臟補藥無不成功否則不效疑其為誤更法治之以此誤人者可勝計哉然病人亦須愛惜身命堅心定志絶房室息妄想戒惱怒節飲食以自培其根否則雖服良藥無益也抱拙子曰按勞瘵之證曰骨蒸殗殢伏連尸疰勞疰蟲疰毒疰熱疰冷疰食疰鬼疰若骨髓熱者為骨蒸半卧半起者為殗殢五臟內傳為伏連諸疰者即今之傳尸也蓋疰者注也自上注下與前人相似故曰疰其變多種大槩令人寒熱沉沉默默不的知其所苦而無處不患若寒熱自汗面白目乾口苦神昏善恐不能獨卧傳在肝也若寒熱面黑鼻燥善忘大便祕澀口舌生瘡傳在心也若寒熱面青唇黃舌本强硬言語不出飲食無味羸瘦吐涎傳在脾也若寒熱面赤鼻白乾燥毛折咯嗽喘急吐涎膿血傳在肺也若寒熱面黃耳焦腳胻痠痛小便白濁遺瀝腹痛傳在腎也此皆傳尸勞瘵之所苦者然世人聞其名則神驚而志恐一抱其病謂之必死無生往往淹延竟至不救傷哉此病四方之民皆有之然東南之民患者接踵有傳染而殞絶子孫者西北之民百無一二是何故耶蓋西北之地土厚水深居民食麵啖肉不嗜湯飲居禀實臟腑固東南之地土薄水淺居民食米啖魚多嗜湯飲居禀弱臟腑滑所禀既殊血氣亦異方土之所致也凡人一身之間三尸九蟲均有之矣人呼則呼人吸則吸北人肌肉厚膚腠密有以滋養隱而不動南人肌肉薄膚腠踈無以滋養動而不隱不隱則害人始而呼吸血氣血氣既少呼吸真氣真氣已衰其蟲亦困將隨人殞獨肺蟲一種則禀殺厲之氣已成靈物人將氣絶飛遁而出變化不測一著虛衰之人則至于死所以謂之傳尸癆瘵古方雖有狸骨獺肝天靈蓋等藥未嘗見效惟在辨證分明氣血未憊精神未散脉不弦數之時早用崔氏灸四花穴法及藥證相對必有所濟若妄意不察凡遇寒熱咳嗽便以鱉甲黃蓍為補虛羸之主宰殊不知因風得補非勞成勞或以柴胡黃芩為解勞熱之先鋒殊不知因虛得寒不損成損或以地黃當歸為滋血之良方殊不知此藥性滯大能損脾或以人參白术為補氣之佳品殊不知此藥力善補偏用無功大要須知傳尸之證乃異常怪病必患者能異常調攝醫者能至誠合神或藥之或艾之則有不測之神以助之而此病可瘳矣若患者如常而調攝醫者如常而療理雖藥之艾之神亦不知助病必不可差矣如以為難治之病而即棄之非仁術也其可乎哉近世童男室女多患勞怯或失血咳嗽或惡寒潮熱脉弦而數此等之證皆勞心失血之所致乃治者虛則參蓍桂附反補其陽而愈耗其隂嗽則枳殼杏仁桑白皮不顧其腎虛而反㵼其肺是損其至高之氣也隂血既虧氣盛似火乃內虛無邪之熱俗用芩連梔子豈不損其胃哉隂虛潮熱與有邪之熱不同俗用柴胡薄荷于衛寧無傷乎脾隂既虧痰盛似火半夏陳皮南星勝濕之劑能治耶隂火旺則其人不食又豈香砂麥芽消導之劑可治耶至于思慮內傷經絡失血停胸亦非側柏棕灰之可止也世俗皆治其標而未治其本安望其能效耶今詳抑火有三法有㵼有降有滋隂芩連梔子㵼火之藥㵼其有餘黃柏知母降火之藥補其不足天麥門冬生熟地黃當歸助隂生血滋隂之藥川芎芍藥推陳致新行血之藥非甘草白术難以約脾非陳皮青皮無以導氣以逺志酸棗仁可收其心以柴胡白芍藥可伐其木用括蔞貝母而消此痰用阿膠五味而痊此嗽石蓮芡實治夢遺秦芁養血退其熱茜根藕汁止其血此數味滋隂降火之聖藥其間果是氣虛血少當入參茋氣分不虛决不可入惟寒濕痰氣禁用此方餘者但能知加减决得其冝又能靜心節養無不大效生生子曰石山醫案行世六十餘年矣內辨王汝言忌用參茋論極其確切而時師尚膠滋隂降火之偏甘棄參茋寧守滋隂降火之說縱至脾胃泄㵼痞脹浮腫痰喘氣逆惡心聲啞雖死無恨豫目擊如斯而死者何下數十百人故不得不揭石山之書痛言而極論之石山此辨亦丹溪發揮救時之意豈得已哉石山之書既行而人尚循習如故何也豫意時師或未見石山書也或者曰子言實匡時之語也苐未免有多言之病豫曰吾亦深知多言之足病也且子之不疾固而獨病豫之多言亦過矣見孺子之入井孰不欲以手引之况接踵而入井乎接踵而入井安得盡以手而引之豫將圖以塞其井也多言惡足病辨明醫雜著忌用參蓍論出石山醫案按汝言王公撰次明醫雜著其中有曰若酒色過度傷損肺腎真隂咳嗽吐痰衄血咳血等症此皆隂血虛而陽火旺也冝甘苦寒之藥生血降火若過服參蓍等甘溫之藥則死不可治蓋甘溫助氣氣屬陽陽旺則隂愈消故也又云咳嗽見血多是肺受熱邪氣得熱而變為火火盛而隂血不寧從火上升治冝滋隂降火忌用人參等補氣之藥又撰次本草集要云人參入手太隂而能補火故肺受火邪咳嗽及隂虛火動勞嗽吐血者忌用之誤用多致不救豫常考其所序固皆本之丹溪然丹溪豫無間然矣而王氏未免有可議者丹溪曰治病必分血氣氣病補血雖不中病亦無害也血病補氣則血愈虛散矣此所以來王氏陽旺則隂愈消之說也丹溪又曰補氣用人參然蒼黑人多服之恐反助火邪而爍真隂此所以又來王氏咳嗽見血多是火盛隂虛忌用人參補氣之論而集要復有人參補火肺受火邪勞嗽吐血等症忌用人參之戒也夫王氏之書雖出丹溪但過于矯揉而又失之于偏也不曰誤服參蓍多致不救則曰多服參蓍死不可治言之不足又復申之惟恐人以咳嗽失血為氣虛不作隂虛主治也篇末雖亦有氣虛咳血之言又恐人因此言復以咳嗽失血為氣虛故即繼之曰但此症不多爾是以愈來後人之惑使凡遇咳血雖屬氣虛終以前言為主而參蓍竟莫敢用也殊不知丹溪立法立言活潑潑地何嘗滯于一隅于此故曰血病忌用參蓍于他章則又曰虛火可補參术生甘草之類又曰火急甚者兼㵼兼緩參术亦可是丹溪治火亦未嘗廢人參而不用王氏何獨但知人參補火而不知人參能㵼火邪丹溪又曰隂虛喘嗽或吐紅者四物加人參黃柏知母五味子麥門冬又曰好色之人元氣虛咳嗽不愈瓊玉膏肺虛甚者人參膏凡此皆酒色過傷肺腎咳嗽吐血症也丹溪亦每用人參治之而無疑王氏何獨畏人參如虎邪叮嚀告戒筆不絶書冝乎後人印定耳目確守不移一遇咳嗽血症不問人之勇怯症之所兼動以王氏藉口更執其書以證致使良工為之掣肘病雖冝用亦不敢用惟求免夫病家之怨尤耳病者亦甘心忍受苦寒之藥縱至上吐下㵼去死不逺亦莫知其為藥所害興言及此良可悲哉兹取丹溪嘗治驗者以證之一人咳嗽惡寒胸痞口乾心微痛脉浮緊而數左大于右蓋表盛裏虛聞其素嗜酒肉有積後因行房涉寒冒雨忍飢繼以飽食先以人參四錢麻黃連根節錢半與二三帖嗽止寒除改用厚朴青皮陳皮瓜蔞半夏為丸參湯送下二十服而痞除夫既咳嗽嗜酒不可謂肺無火也復因行房感冒不可謂隂不虛也初服人參四錢再用參湯送藥不可謂不多服也何如不死又一人患乾咳嗽聲啞用人參橘紅各錢半半夏麯一錢白术二錢知母瓜蔞桔梗地骨皮各五分夏加黃芩五分入薑仍與四物加炒柏童便竹瀝薑汁二藥晝夜相間服兩月聲出而愈夫患乾咳嗽聲啞不可謂肺無火邪也不可謂隂不受傷也服人參兩月不可謂不多也又何如不死又一壯年因勞倦不得睡咳痰如膿聲不出時春寒醫與小青龍湯㗋中有血絲腥氣逆上漸有血線自口右邊出晝夜十餘次脉弦大散弱左大為甚此勞倦感寒强以辛甘燥熱之劑動其血不治恐成肺痿遂以參蓍歸术芍藥陳皮生甘草帶節麻黃煎入藕汁服二日嗽止去麻黃與四日血除但脉散未收食少倦甚前藥除藕汁加黃芩砂仁半夏半月而愈夫咳嗽如膿聲不出者不可謂肺不熱也又以甘辛燥熱動其血不可謂血不病也服參蓍亦不可謂不多也又復何如而不死凡此諸病以王氏言之未免皆作酒色傷隂而用滋隂㵼火之藥然而丹溪率以參蓍等劑治之而愈並不見其助火增病者蓋病有所當用不得不用也雖勞嗽吐紅亦有所不避焉耳古今治癆莫過于葛可久其保真湯獨參湯何嘗廢人參而不用但詳其所挾之症何如耳豈可謂其甘溫助火一切棄而不用哉肺受火邪忌用人參其源又出于海藏本草湯液之所云而丹溪實繹其義不期流弊至于此又嘗因是而推廣之丹溪曰蒼黑之人多服參蓍恐助火邪而爍真隂肥白之人多服冉好此固然矣考其嘗治一人形瘦色黑素多酒不困年半百有别館一日大惡寒發戰言渴不飲脉大而弱又右關稍實略數重則澀以王氏觀之以形色論之正合滋隂㵼火之法而丹溪謂此酒熱內欎不得外泄由表熱而虛也用黃芪二兩乾葛一兩煎飲之大汗而愈既不以蒼黑忌用參茋為拘亦不以酒色傷隂忌服參茋為禁是知丹溪立言以示人者法之常施治而不以法為拘者善應變也王氏但知其立法之常而未察其治不以法為拘之變故於參茋等劑每每畏首畏尾若不敢投蓋亦未之考也雜著所制諸方雖未盡廢參茋察其用處必須脉細微而遲者方始用也然而東垣丹溪之用參茋亦不専在于此東垣曰血虛脉大症象白虎誤服白虎湯者必死乃用黃茋六錢當歸一錢名曰當歸補血湯以治之是血虛脉大東垣亦嘗用黃茋矣丹溪曰一人滯下一夕昏仆目上視溲注汗泄脉大無倫此隂虛陽暴絶也蓋得之病後酒色灸氣海服人參數斤而愈是隂虛脉大丹溪亦嘗用人參矣豈必脉之細微遲者而後用哉考之本草仲景治亡血脉虛以人參補之取其隂生于陽甘能生血故血虛氣弱仲景以人參補之是知人參不惟補氣亦能補血况藥之為用又無定體以補血佐之則補血以補氣佐之則補氣是以黃茋雖専補氣以當歸引之亦從而補血矣是以東垣用黃茋六錢只以當歸一錢佐之則名曰補血湯可見黃茋功力雖大分兩雖多為當歸所引不得不從之補血矣矧人參功兼補血者耶人參性味不過甘溫非辛熱比也稍以寒涼佐之必不至助火如此之甚積溫成熱若中病則已亦無是也夫芎歸味辛甘溫或用治勞熱血虛之病並無所疑然辛主耗散本非血虛所冝彼人參甘溫而味不辛比之芎歸孰輕而孰重哉抑勞嗽吐血隂虛之病亦有始終不用人參莫克全其生者何也或肉食不節則古人所謂厚味厝熱也或房勞不逺則古人所謂縱欲傷生也二者不謹而獨致畏于人參是謂不能三年之喪而緦小功之察何其謬邪噫醫之用藥固所當審不可輕視人之死生如咳嗽失血等症若果脾胃强健飲食無阻則當從王氏所論與之滋隂㵼火固無不可設或上兼嘔逆中妨飲食下生泄㵼汗自泄而洗洗惡寒四肢倦而兀兀多睡則又當從隂虛陽虛權其輕重而兼治之可也苟不知此而専主乎王氏未免陷于一偏而有無窮之患矣故豫不得不極論之莫辭乎僣踰之罪焉虛損治法脉虛者以牛膝紅花川芎補之骨虛者蓯蓉瑣陽虎骨補之筋虛木瓜杜仲破故紙龜板補之肉虛山藥大棗甘草皮毛虛者括蔞桂枝黃茋氣虛人參黃茋附子血虛當歸地黃芍藥津虛天花粉𤣥參升麻麥冬髓虛五味子地黃當歸補之秦越人曰損其肺者益其氣四君子加黃茋麥冬五味子山藥之類損其心者益其營衛八珍湯加枸杞子酸棗仁石斛柏子仁損其脾者調其飲食適其寒溫二陳湯或加白术益智白芍砂仁人參損其肝者緩其中四物湯倍加白芍甘草枸杞子山茱茰損其腎者熟地黃牛膝人參五味子兔絲子蓯蓉之類此補五臟虛損之大槩也凡心虛者恍惚憂煩少顔色或驚悸多汗冝人參養營湯歸神丹養心丸之類虛而熱煩而渴者十全大補湯心懸如大飢之狀者平補鎮心丹主之肺虛者呼吸少氣閧然喘乏咳嗽嗌乾冝以紫苑散調其氣若短氣少氣不足以息者四君子湯氣促氣短上焦虛而熱者加生脉散虛而寒者十全大補湯表虛不任風寒者黃茋建中湯皮膚灼熱不耐風寒補中益氣湯皮膚乾燥日漸黑瘦麥門冬飲子咽㗋乾者亦同津液不到咽者四君子加五味子桔梗脾虛者面黃肌瘦吐利清冷腹脹腸鳴四肢無力飲食少進冝益黃散或參苓白术散加木香藿香附子食後便卧精神短少補中益氣湯加砂仁手足痠軟行步欹側四君子湯黃茋湯手足顫振筋惕肉􅀈似風以十全大補湯手足痠軟不耐勞役一有動作多汗困熱十全大補湯臟腑不調中氣不運病久不能食理中丸少加附子肝虛者目眩筋攣面青恐懼如人將捕之狀冝六味地黃丸加牛膝肉桂人參川歸木瓜主之眼昏少精神無比山藥丸目中溜火視物昏花寢汗憎風行步不正卧而多驚補益腎肝丸視物不明筋弱隂痿隂下濕癢八味地黃丸腎虛者背脊腰膝厥逆而痛耳鳴精滑小便頻數冝八味地黃丸去附子加鹿茸五味子山藥以生其精若腰背肩脾頭痛不任房事十全大補湯腰胯腿膝無力牛膝丸腳膝痠軟下元虛冷八味地黃丸腳弱脛痠無比山藥丸腎冷精虛陽事不舉還少丹離珠丹金鎖正元丹三才封體丹選用夢遺白濁巴㦸丸小便如泔寒精自出小兔絲子丸小便頻而遺十全大補湯加益智東垣謂補腎不若補脾緣脾處于中焦上交于心下交于腎道家交媾心腎以脾為黃婆正是此意何柏齊曰丹溪論虛損之症歸之隂虛其言亦有所取蓋以精血為隂也但所製補隂丸専用寒涼則偏矣夫五榖化為精血非火不能虛損之微者真火尚存服寒涼猶可虛損之甚者真火已虧藥用寒涼豈能使之化為精血以補其虛乎或問士大夫率喜服補隂丸何也曰虛損之症皆下寒上熱所謂火水不交者也其重感于寒者則下焦作痛不感寒者則不痛至于上焦燥熱則一也上焦方苦煩熱初得寒涼則暫快遂以為藥之功故喜服之久而下注則下元愈寒火熱為寒迫而上行使上焦復熱愈甚展轉反覆遂致沉痼而不可救蓋暗受其害而不覺也然則治之奈何曰補以寒涼佐以溫熱補三佐二空心涼服所謂熱因寒用者也久則精生熱退而病愈矣雖然虛損之疾起于過用必慎房勞簡思慮節飲食庶服藥有功毋獨恃藥餌也生生子曰心者萬化萬物萬象之主內經靈蘭祕典曰心者君主之官神明出焉主明則下安主不明則十二官危是故五臟系皆通于心心通五臟系也五藏一有不平心即應之補心之方前哲固不少矣然未能貫通乎五臟也惟趙敬齊有補心丸一方極其縝密可以為法特附于此以為凖標補心丸麥冬二兩半逺志甘草湯煮石菖蒲香附子童便浸二兩天冬括蔞根白术貝母熟地茯神地骨皮各一兩半人參川歸牛膝黃蓍各一兩木通八錢右方能安養心神又治心氣不足驚恐健忘俱為細末大棗肉為丸梧桐子大每酒或圓眼湯吞五七十丸此方不但補心兼治五臟無偏勝之弊可以久服論精氣奪則虛奪謂精氣减少如奪去也出內經通評虛實論人禀冲和之氣而生身有三曰元精曰元氣曰元神者本身中之真精真氣真脉也夫精乃臟腑之真非榮血之比故曰天癸氣乃臟腑之大經為靜靜之主故曰神機脉為天真委和之一氣經謂其名有三曰命之本氣之神形之道其機運升降皆隨氣而動因血而榮精氣資始相生不失以養一身為人之司命形質之體用也至若精不足則氣失資化氣不足則血失所榮血不足則氣無所附天真散亂則氣精神無禀命矣是以相生長養之道精化氣氣生神而皆禀乎身之腑臟之真也夫氣血從乎營衛營衛又宗乎經隧營衛者精氣之化為先天清濁之始經隧者胃之水榖之化此經隧不能生營衛營衛不能不散而養經脉經脉不能不順而資天真為生養􅉼容造化形質理之然也凡人之視聽言動壯壽皆此理之常也疾病盲瞶關格夭折皆此理之失也故有精神氣血不足則病真脉散亂則死者皆由平日攝養之過與不及動止之過踰常度也經云出入廢則神機化滅升降息則氣立孤危然房勞甚則精血竭而神無所依氣無所附則忽致暴絶也竊嘗第究先哲經義濟生微㫖益氣之補肺補精之滋腎皆資其化源也蓋人精血而常不足加之數奪其真資化失則榮氣乃虛虛則衛氣不固精亦滑脫腎氣竭而隂微不能與胃氣上升以接清陽之氣故病多頭重或痛氣弱而食少元氣下陷脉即微弱外欲絶而虛洪或見損脉此實元精不足之所致非有外感賊邪之病也論形氣不足有餘用補㵼法東垣曰黃帝云形氣之逆順奈何岐伯曰形氣不足病氣有餘是邪勝也急㵼之形氣有餘病氣不足急補之形氣不足病氣不足此隂陽俱不足也不可刺之刺之重不足重不足則隂陽俱竭血氣皆盡五臟空虛筋骨髓枯老者絶滅壯者不復矣形氣有餘病氣有餘此謂隂陽俱有餘也急㵼其邪調其虛實故曰有餘者㵼之不足者補之此之謂也夫形氣者氣謂口鼻中喘息也形謂皮肉筋骨血脉也形勝者為有餘消瘦者為不足其氣者審口鼻中氣勞役如故為氣有餘也若喘息氣促氣短或不足以息者為不足故曰形氣也乃人之身形中氣血也當補當㵼全不在于此只在病勢潮作之時病氣增加者是邪氣勝也急當㵼之如潮作之時精神困弱言語無力及懶語者是真氣不足急當補之若病人形氣不足病來潮作之時病氣亦不足此乃隂陽俱不足也禁用針冝補之以甘藥不可以盡劑不已臍下一寸五分氣海穴取之已上出玉機微義癆瘵癆瘵之病非止一端其始也未有不由氣體虛弱勞傷心腎又有外感風寒暑濕之氣或先為瘧疾以致咳嗽邪氣入裏失于調理又不能保養過于房勞傷于飲食而成勞瘵之候其為證也令人肌肉羸瘦皮毛乾枯寒熱盜汗遺泄白濁或腹中有塊或腦後兩邊有小結核或聚或散或咳吐膿血其傳變不可勝言也治冝保和湯保真湯秦芁扶羸湯黃茋鱉甲散清骨散之類選用節齊云男子三十嵗前後色欲過度損傷精血必主隂虛火動之病睡中盜汗午後發熱哈哈咳嗽倦怠無力飲食少進甚則痰涎帶血咯唾出血或咳血吐血衄血身熱脉沉數肌肉消瘦此名癆瘵最重難治輕者用藥數十服重者期以嵗月然必病人愛命堅心定志絶房室息妄想戒惱怒節飲食以自培其根否則雖服良藥無效也此病治之于蚤則易若到肌肉消爍沉困著床尺脉沉取細數則難為矣丹溪云此隂虛之極痰與血病亦或有蟲者其傳尸一證不可云無傳尸一證最為惡疾世有闔門盡死古方雖有天靈蓋等散専治此疾其得生者亦千百中之一二耳𤣥珠經曰骨蒸之極聲嗄咽痛面黧脉躁直視汗出如珠喘乏氣促出而無入毛焦唇反此皆不治之症雖有神醫亦無如之何矣千金方云夫衆疾聚積皆起于虛虛生百病積者五臟之所積聚者六腑之所聚如斯等疾多從舊方不假增損虛而勞其弊萬端冝應隨病增减聊復審其冷熱記其增損之主耳虛勞而頭痛復熱加枸杞萎㽔虛而欲吐加人參虛而不安亦加人參虛而多夢紛紜加龍骨虛而多熱加地黃牡蠣地膚子甘草虛而冷加當歸芎藭乾虛而損加鍾棘刺蓯蓉巴㦸天虛而大熱加黃芩天門冬虛而多忘加茯神逺志虛而驚悸不安加龍齒沙參紫石英小草若冷則用紫石英小草若客熱則用沙參龍齒不冷不熱皆用之虛而口乾加麥門冬虛而吸吸加胡麻覆盆子柏子仁虛而多氣兼微咳加五味子大棗虛而身强腰中不利加磁石杜仲虛而多冷加桂心吳茱茰附子烏頭虛而勞小便赤加黃芩虛而客熱加地骨皮黃茋虛而冷黃茋虛而痰復有氣用生半夏枳實虛而小腸利加桑螵蛸龍骨雞肶胵聊叙增减之一隅處方者冝凖此四君子湯治真氣虛弱及短氣脉弱人參黃茋白术茯苓等分為粗末每服五錢水一盞煎至七分食逺溫服生脉散人參五味子麥門冬益氣丸治語言多損氣懶語補上益氣麥門冬去心人參各三錢橘紅桔梗炙甘草各五錢五味子二十一粒右為極細末水浸􅔻餅為丸雞頭子大每服一丸細嚼津唾咽下人參黃茋湯人參二錢黃茋白术陳皮去白各一錢甘草五分當歸茯苓各一錢右㕮咀水煎空心服四物湯益營衛滋氣血熟地黃補血如臍下痛非此不能除乃通腎經之藥當歸如血刺痛非此不除川芎治風泄肝木也如血虛頭疼非此不能除芍藥和血右為粗末水煎三才丸天門冬地黃人參等分為末蜜丸空心服八物湯偶方四物四君子二方和合也白术茯苓人參黃茋當歸芍藥川芎地黃右為散每用五錢水煎食後服虛勞憂思諸不足黃茋建中湯主之黃茋三兩桂枝二兩芍藥六兩甘草炙二兩大棗十二枚生薑二兩膠飴一升右水七升煮取三升去渣納膠飴更上微火消解溫服一升日三服氣短胸滿者加生薑腹滿者去棗加茯苓一兩半及療肺虛損不足補氣加半夏一兩東垣治脉弦自汗四肢發熱或皮毛枯槁髮脫落冝黃茋建中湯仲景虛勞裏急悸衄腹中痛夢失精四肢酸疼手足煩熱咽口乾燥小建中湯主之桂枝甘草炙各三錢白芍藥六錢大棗二枚生薑二錢阿膠炒一合水煎服雙和散補血益氣治虛勞少力黃茋熟地黃當歸川芎各一錢白芍藥錢半官桂甘草各七分右為粗末每服四大錢水一鍾半生薑三片棗三枚煎至八分服此是建中四物二方凡傷寒瘧疾中暑大疾之後虛勞氣乏以此調治皆驗不熱不冷溫而有補十全大補散治心肺損男子婦人諸虛不足五勞七傷不進飲食久病虛損時發潮熱氣攻骨脊拘急疼痛夜夢遺精面色痿黃腳膝無力喘嗽中滿脾腎氣弱五心煩悶並皆治之方見痿門八物湯治心肺虛損皮聚而毛落血脉虛損婦人月水愆期益氣和血方見前金剛丸治腎損骨痿不能起床益精補腎方在痿門牛膝丸治肝腎損骨痿不能起床筋緩不能收持冝益精緩中牛膝酒浸蓽薢杜仲炒蓯蓉酒浸兔絲子酒浸沙苑蒺藜防風等分桂一分右末酒煮猪腰子為丸桐子大每服五七十丸空心酒下煨腎丸治肝腎損及脾食榖不化冝益精緩中消榖及腰痛不起者神效即牛膝丸加葫蘆巴補骨脂丸法亦同右隂陽虛損諸方蓋謂虛而無熱者設也若虛而有熱者作虛熱治之補腎丸龜板酒炙四兩知母酒浸炒黃柏炒焦各三兩乾薑一兩右為末粥丸一方無有側柏葉用地黃膏為丸補血丸龜板酒炙黃黃柏炒知母炒各三兩生乾薑一兩杜牛膝二兩為末粥丸固真丸龜板醋炙二兩虎骨酥炙一兩蒼耳酒蒸九次三兩生地薑汁製炒柏皮半兩烏藥半兩乾薑三錢為末薑汁糊丸三才封髓丹降心火益腎水麥門冬去心熟地人參各半兩黃柏炒三兩炙甘草七錢半縮砂仁一兩半為細末糊丸梧子大每服五十丸用蓯蓉半兩作片酒浸一宿次日煎三五沸去渣送下空心服八味丸治腎氣虛乏下元傷憊臍下疼痛夜多漩溺腳膝緩弱面色痿黃或黧黑及虛勞不足渴欲飲水腰重疼痛小腹急痛小便不利並冝服之脾惡濕腎惡燥古人制方益腎皆濕潤之藥也故八味丸仲景謂之腎氣丸以熟地黃為主熟地黃半斤肉桂附子各一兩牡丹皮澤㵼白茯苓各三兩山茱茰四兩乾山藥四兩右八味為細末煉蜜丸皆君主之藥也若不依易老加减服之終不得效若加五味子為腎氣丸述類象形之劑也益火之源以消隂翳壯水之主以制陽光此補五臟不足之劑易老迭為賔主是得仲景立方之心拘之以地黃為君則不效也錢氏地黃丸加减法如陽事多痿不振依今方然夏月减附子三停精完全减桂附只六味血虛隂衰熟地黃為君精滑山茱茰為君小便或多或少或赤或黃或白茯苓為君小便淋漓澤㵼為君心虛腸胃積熱心火熾盛心氣不足牡丹皮為君皮膚澀乾山藥為君已上言為君者其分兩用八兩其乾地黃只依為臣分兩餘皆同離珠丹又名神珠丹治下焦陽氣虛乏臍下冷痛足胻寒杜仲炒去絲三兩萆薢二兩訶子炮五個龍骨一兩破故紙巴㦸酒浸去心各三兩胡桃一百個去皮硃砂另研一兩半縮砂仁半兩右為末酒為丸梧桐子大硃砂為衣每服三十丸空心溫鹽湯任下水芝丸又名玉女長春不老丹牛膝根汁蒼耳根汁各二碗不可入水和一處磁器熬成膏如稠蜜金櫻子為末半斤用不去皮蓮子實入雄猪肚內蒸熟取蓮子晒乾四兩和前二味膏子丸如梧子大溫酒下二十丸一月身和暖一月覺精神服一料驗甚龍虎丸補下焦白芍陳皮各二兩瑣陽當歸各一兩半知母酒炒熟地各三兩虎骨酒浸酥炙一兩黃柏半斤鹽炒龜板四兩酒浸酥炙右為末酒煮羊肉搗汁丸服冬月加乾薑半兩補隂丸黃柏側柏烏藥葉各二兩苦參三兩龜板酒炙五兩黃連半兩冬加乾薑夏加縮砂右為末地黃膏丸梧子大又方黃柏半斤鹽酒炒知母酒浸炒熟地各三兩陳皮白芍炒龜板四兩酒浸炙牛膝各二兩瑣陽當歸各一兩半虎骨一兩酒浸酥炙為末酒煮羊肉為丸每服五十丸鹽湯下冬加乾薑半兩又方治體弱肌肥壯血虛脉大龜板三兩生地白芍各一兩半側柏酒浸烏藥葉酒蒸各七錢半右除生地細切熬膏餘皆作末同搗為丸以白术四錢香附一錢半煎湯下瑣陽丸龜板炙知母酒炒黃柏酒炒各一兩虎骨炙牛膝酒浸杜仲薑炒瑣陽酒浸五錢破故紙續斷酒浸各二錢半當歸一兩地黃二兩為末酒糊丸梧子大每服五十丸補心丸硃砂二錢半瓜蔞五錢黃連三錢歸身尾三錢半右為末猪心血為丸濟隂丸黃柏酒炒二兩七錢龜板炙一兩三錢半陳皮虎骨酥炙各七錢當歸知母酒炒瑣陽各一兩牛膝兔絲子酒浸各一兩三錢半山藥白芍砂仁杜仲炒黃茋鹽水炒各七錢破故紙炒三錢半枸杞子五錢熟地七錢右為末以芐黃膏為丸每服七十丸茯神湯治脉虛極或咳則心痛㗋中介介或腫人參黃茋茯神逺志麥冬通草桔梗甘草等分薑三片水煎無比山藥丸治諸虛百損五勞七傷肌體消瘦膚燥脉弱赤石脂茯苓澤㵼山茱茰牛膝酒浸巴㦸去心各一兩山藥杜仲炒去兔絲子熟地各三兩蓯蓉四兩酒浸五味子二兩右為末煉蜜丸梧子大每服五十丸空心酒下還少丹大補真氣虛損肌體瘦弱肉蓯蓉逺志去心茴香巴㦸山藥枸杞石菖蒲熟地牛膝杜仲炒楮實茯苓五味子山茱茰各等分為末煉蜜同棗肉為丸梧子大每服三五十丸溫酒或鹽湯下日三服此藥平補力衰體倦小便渾濁冝服之有熱加山梔子一兩心氣不寧加麥冬一兩少精神倍加五味子一兩陽弱加續斷一兩巴㦸丸治腎肝俱虛收斂精氣補戢真陽充肌膚進食止汗五味子巴㦸去心蓯蓉人參熟地白术兔絲子覆盆子益智炒骨碎補去毛茴香各一兩白龍骨二錢半牡蠣煆二錢右為末煉蜜丸梧子大每服五十丸空心鹽湯下八味定志丸補益心神安定魂魄治痰去胸中邪熱理肺腎人參菖蒲逺志茯神茯苓各一兩白术麥冬各半兩硃砂一錢牛黃二錢另研右為末煉蜜為丸梧子大每以米飲下三十丸若髓竭不足加生地當歸若肺氣不足加天麥二冬五味子若心氣不足加人參茯神菖蒲若脾氣不足加白术白芍益志若肝氣不足加天麻川芎若腎氣不足加熟地逺志牡丹皮若膽氣不足加細辛酸棗仁地榆若神昏不足加硃砂茯神預知子海藏大五補丸補諸虛不足天冬麥冬茯神逺志菖蒲人參益智枸杞子地骨皮熟地黃右為末蜜丸梧子