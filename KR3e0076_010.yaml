氣又五味子酸以收之此雖陽盛而不燥熱乃是五臟虛損于內故可益血收氣此藥類象品方也丹溪云虛勞皆積熱做成始健時可用子和法日後羸敗四物湯加减送消積丸使熱不作也蒸蒸發熱積病最多退實熱勞積痰方鱉甲龜板側柏半夏瓜蔞仁黃柏黃連右為末炊餅丸又濕痰發熱黃芩炒黃連炒香附生蒼术右為末瓜蔞穰為丸羅太無柴胡飲子解一切肌骨蒸熱寒熱往來及傷寒發汗不解或汗後餘熱勞復或婦人經病不快産後但有如此之症並冝服之黃芩甘草炙大黃芍藥柴胡人參當歸各五錢薑三片水煎服保命集防風當歸飲子治煩熱皮膚索澤食後煎服空心冝以此飲子下地黃丸柴胡人參黃芩甘草防風大黃當歸芍藥各五錢滑石二錢每服五錢水一盞半薑三片煎服如痰嗽加半夏如大便黃米榖完出驚悸溺血淋閉咳血衄血自汗頭痛積熱肺痿後與大金花丸大金花丸黃柏黃芩黃連山梔子生用各一兩右為末水丸小豆大每服百丸溫水下日二三服或大便實加大黃自利如中外熱此藥作散煎服名解毒湯或腹痛嘔吐欲作利者每服解毒湯半兩加半夏茯苓厚朴各三錢薑三片如白膿後重下利者加大黃三錢麥煎散治少男室女骨蒸婦人風血攻疰四肢赤茯苓當歸乾漆鱉甲酥炙大黃煨常山柴胡白术生地石膏各一兩甘草右為末每服三錢小麥五十粒水煎食後臨卧服若有虛汗加麻黃根一兩東坡云此黃州吳判官療骨蒸黃瘦口臭肌熱盜汗極效吳君寶之不肯妄傳地骨皮枳殼散骨蒸壯熱肌肉消爍少力多困夜多盜汗地骨皮蓁芁柴胡枳殼知母當歸鱉甲酸炙等分右桃栁枝頭各七箇薑三片烏梅一箇水煎臨卧服羅氏蓁芁鱉甲散骨蒸壯熱肌肉消瘦舌紅頰赤目倦盜汗鱉甲酥炙柴胡地骨皮各一兩知母秦芁當歸各五錢右為粗末每服五錢水一盞入烏梅一箇青蒿五葉同煎至七分早晚各一服人參地骨皮散治臟中積冷營中熱按之不足舉之有餘隂不足而陽有餘也地骨皮人參柴胡生地各一兩半茯苓五錢知母石膏各一兩每服一兩生薑三片水煎細細服人參柴胡散邪熱客于經絡肌熱痰嗽五心煩躁頭目昏痛夜有盜汗婦人虛勞骨蒸尤冝白茯苓白术柴胡半夏曲當歸人參乾葛甘草炙赤芍藥各等分每服五錢生薑五片棗三枚水煎乘熱服許學士云但有勞症皆可服熱退即止大扺透骨葛根第一柴胡次之一方有黃芩五錢海藏六合湯治婦人骨蒸當歸白芍藥川芎地黃已上補血地骨皮㵼腎火牡丹皮㵼包絡火各等分水煎服外方治骨蒸桃仁一百二十枚去皮留尖研為丸平旦井花水服令盡服訖隨量飲酒仍須吃水甚效隔日一服百日不得食肉羅氏逍遙散血虛勞倦五心煩熱頰赤盜汗室女血弱營衛不和月水不調痰嗽潮熱肌體羸瘦漸成骨蒸白术茯苓芍藥當歸柴胡甘草炙薄荷少許生薑一片水煎服蒸病治者各隨經虛實內外淺深加减冝古今録驗五蒸湯茯苓甘草人參竹葉地黃葛根知母黃芩石膏粳米二合水三盞小麥二合煎至二盞去小麥納藥煎至一盞溫服隨症加减于後忌海藻菘萊蕪荑大醋實熱加黃芩黃連黃柏大黃虛熱氣加烏梅秦芁柴胡蛤蚧小麥血加青蒿鱉甲紫苑肺蒸鼻乾加烏梅天冬麥冬紫苑大腸右鼻孔乾痛加大黃芒硝皮蒸舌白唾血加石膏桑白皮膚蒸昏昧嗜卧加牡丹皮氣蒸鼻乾喘促遍身氣熱加人參黃芩山梔心蒸舌乾加黃連生地小腸下唇焦加赤茯苓生地木通血蒸髮焦加生地當歸桂心童便脉蒸唾白浪語脉絡溢脉緩急不調加當歸生地脾蒸唇焦加白芍木瓜苦參胃蒸舌下痛加石膏大黃芒硝乾葛粳米肉蒸食無味而嘔煩躁不安加白芍肝蒸眼黑加川芎當歸前胡膽蒸眼色白加柴胡括蔞筋蒸甲焦加當歸川芎三焦蒸乍寒乍熱加石膏竹葉腎蒸兩耳焦加生地石膏知母寒水石膀胱蒸右耳焦加澤㵼茯苓滑石腦蒸頭眩熱悶加生地防風羌活髓蒸髓枯骨中蒸加生地當歸天門冬骨蒸齒黑腰痛足逆冷疳蟲食藏加鱉甲地骨皮生地牡丹皮當歸臀蒸肢細趺腫藏府皆熱加石膏黃柏胞蒸小便黃赤加澤㵼茯苓生地沉香滑石凡此諸症皆熱病後食肥甘油膩房事飲酒犯之而成久蒸不除變成疳病死期近矣牡丹皮治無汗之骨蒸能㵼隂中之火知母治有汗之骨蒸衍義治骨蒸勞用薄荷汁與衆藥熬成膏經驗方治勞燒香法𤣥參一斤甘松六兩為末煉蜜一斤和勻入磁瓶內封閉地中埋窨半日取出更以炭末六兩煉蜜六兩再和勻復入瓶封窨五日取出燒使鼻中常聞香氣或于房中或床下燒之癆瘵頓愈傳尸癆華他治傳尸癆大乙明月丹其病肌瘦面黃嘔吐咳嗽不安先燒安息香令烟出病人吸之若不嗽者非傳尸也不可用此藥雄黃木香各五錢天靈蓋炙鱉甲酥炙各一兩兔屎二兩輕粉二錢半右為末用法酒一大升大黃末一錢三分熬膏入前藥為丸彈子大硃砂為衣五更初服勿令人知以童便和酒化一丸服如人行十里許必吐出蟲狀如燈心細長及如爛瓜子又如蝦蟇狀各不同未效次日再服以應為度紫庭治傳尸伏尸皆有須用乳香薰病人之手乃仰手掌以帛覆其上薰良久手背上出毛長寸許白而黃者可治紅者稍難青黑者即死最驗若薰之良久無毛者即非此症乃屬癆瘵虛損即用前參茋溫補之藥取傳尸伏尸癆蟲法天靈蓋十字解者酥炙為末三分安息香五錢虎糞骨人骨為上獸骨次之酥炙五錢鱉甲大者九斤醋炙一兩桃仁去皮尖二錢半麝香另研檳榔一錢青蒿苖六兩䜴三百粒葱頭一百二十枚童便半碗楓葉二十一葉桃桞東南枝如筯頭大者各七條各七寸右先將青蒿桃栁葱頭用水二官升煎半乾去渣入靈蓋虎糞骨鱉甲安息香童便煎取汁去渣約有四五合將檳榔麝香研勻調作一服早晨空心服以被蓋之使汗出恐汗內有細蟲以白紙拭之投火中須㬰必下如有蟲以大火焚之棄流水所用藥勿令病人知之半月後血氣復完再進一服依前法三次無蟲乃止以美酒食調理其病自愈又一方有阿魏五錢右天靈蓋古人不得已而用也如得已可勿用陳無擇治癆蟲法桃枝桞枝桑枝梅枝石榴枝各七莖長四寸青松一小握右用童便一升半葱白七莖去頭葉煎及一半去渣别入安息香阿魏各一分煎一鍾濾去渣調辰砂末半錢檳榔一分麝香一字分作二服調下五更初一服五更三㸃時一服至已牌後取下蟲色紅者可治青者不治見有所下即進稀粥飲溫暖將息不可食粉麵生冷毒物合時須擇良日不得令猫犬孝服穢惡婦人見之濟生神人阿魏散治骨蒸傳尸等寒熱羸瘦困倦喘嗽阿魏三錢青蒿一握研東北方桃枝一握甘草如病人中指許大男左女右細銼右以童便二升半隔夜浸藥明旦煎取一大升空心溫服分為三服每次調入檳榔末三分如人行十里再進一服男病女煎女病男煎合藥時忌孝子孕婦病人及腥穢雞犬等物服後忌油膩濕麵生冷硬物服至一二劑則吐出蟲子或㵼出更不須服餘藥若未吐利即當盡服病在上則吐在下則利所出蟲如馬尾人髮即愈服藥後覺五臟虛魂魄不安即以白茯苓湯補之白茯苓湯茯苓一錢人參犀角各五錢逺志去心龍骨防風去蘆各二錢甘草三分生地麥門冬去心各四錢大棗七枚右以水二大盞煎作八分作三次溫服如人行十里一服仍避風寒若覺未安隔日更作一劑已上藥餌須連服之羅氏紫河車丸治傳尸癆三月必效其餘癆症只消數服紫河車一具米泔浸一宿洗净焙乾鱉甲醋炙桔梗胡黃連白芍藥大黃龍膽草敗鼓皮心醋炙黃藥子貝母知母已上各二錢半芒硝犀角莪术各一錢半辰砂二錢右為末煉蜜丸梧子大辰砂為衣空心溫酒服四十丸肘後方治尸疰鬼疰病用桃仁五十枚研碎以水煮取四升作一服盡當吐如病不盡二三日再服又方以獺瓜屑為末酒服之其蟲即去妙妙蜈蚣散赤腳蜈蚣以竹筒盛薑汁浸焙乾一條烏雞糞二錢半將雞于五日前以火麻子餧之然后取其糞用檳榔二錢半辰砂一錢二分半麝香一錢另研右五味研為細末和勻入煎藥內服凡合藥冝六甲建除日忌孝子雞犬婦人見之亦不可與患者知如利下惡物併蟲急用火燒其病者所穿衣服被褥盡燒之食葱粥將息以復元氣務要清心靜養方外還丹生生子曰余遊方之外殆五十有年所矣至人難遇大藥難煉抱朴子曰不得金丹若服草木之藥及修小術可以延年遲死但不得仙也顧人之難得者生釋曰生死事大無常迅速凡為道者常患於晚不患於早也余故採仙經要語以示人之攝養須當及時藥餌須早修製不可盡委之天命蓋人定亦可以勝天也仙經曰養生以不傷為本傷之一字包括甚廣非獨五味七情過多為傷諸如才所不逮而困思之為傷力所不勝而强舉之為傷汲汲所欲之為傷久談言笑之為傷寢息失時之為傷沉醉嘔吐之為傷飽食即卧之為傷跳走喘乏之為傷勉强色欲之為傷凡言傷者亦不便覺也久則損壽耳是以養生之家唾不及逺行不疾步耳不極聽目不極視坐不至久卧不及疲先寒而衣先熱而解不欲極飢而食食不過飽不欲極渴而飲飲不過多凡食過則結積聚飲過則成痰癖不欲甚勞甚逸不欲起晚不欲汗流不欲多睡不欲多啖生冷不欲飲酒當風不欲數數沐浴冬不極寒夏不窮凉不露卧星下不眠中見肩大寒大熱大霧大風皆不欲冒之故善攝生者卧起有四時之早晚興居有至和之常制調利筋骨有偃仰之方杜疾間邪有吞吐之術流行營衛有補㵼之法節宣勞逸有與奪之要忍怒以全隂氣抑喜以養陽氣然後先服草木以救虧缺後服金丹以定無窮長生之理盡於此矣還丹祕要論夫還丹者乃返本還原之道人禀父精母血而生初為赤子時元精元氣元神無不純全及其年漸長成蓋因眼耳口鼻門所誘一靈真性被色聲香味所觸習染深固以是日復日嵗復嵗元精化為交感精元氣化為呼吸氣元神化為思慮神此三元分泄難復天真故祖師垂言立教載諸丹經示人以修補之法精損則以精補氣損則以氣補神損則以神補是用返本還元之道以復之且復者何也以全精為深根以全氣為固蒂以全神為妙合能全此三者實為身中之真藥物也諸如以天地為爐鼎以日月為水火以烏兔為藥物以隂陽為化機以龍虎為妙用以子午為二至以卯酉為二分此皆法象譬喻其實無過身心意三者身係乎精心係乎氣意係乎神返者返此三者而逆行還者還此三者而復真也三全合真乃曰還丹也固精法止夢遺生生子曰精不可以不祕不祕則無以全乎神夫精神者猶隂陽然相依相附不可時刻相離也養生之家全貴祕精然祕精之法妙在水火既濟倘久曠不泄淫火萌動陽剛時舉苟無一法制之安能攝養若强以固澀之藥澀之恐防作病當用升降之法制之不惟精固其陽可以立痿陽痿則精亦隨歸原永無他患勝如服藥逺矣其法開天門塞地户息心靜念以意想於兩足湧泉穴烘烘然微熱隨以意導之從兩內膁而上兩腿入兩跨乃用氣縮身一提如忍大便之狀升至腰俞又微微縮脅提起自雙關夾脊而上直至後項玉枕關略昻頭導至泥丸宫百㑹穴內略聚氣一聚隨又降自額門天庭穴兩眉間分從兩太陽順下將至鼻間即當卷舌尖緘在金津玉液二竅勿使真氣從口漏泄速以鼻吸清氣輕輕然咽從喉下送之心管之內略待氣定又即直送至丹田氣海之中水火自然既濟陽事立痿如此三升三降精氣歸原久久行之自然不泄庶可行功飬攝至妙至妙藥貴同類仙經曰同類易收功非種難為巧兹求同類之藥配合之方以為補益之助得之者宜寶之取紅鉛法凡擇女鼎忌犯十惡須用五善調養百日不可食五葷三厭辛熱等物算他生年月日至五千四百八十日足天應星地應潮紅光滿面發火燒身癸將至矣預備金銀槖籥形如偃月器樣時至即繫合虎穴令騎坐空竅凳上不可欹側倒卧已降取下再換一器外用絹帛以收其餘看器中有一㸃硬子紅如硃砂者乃黍米珠也急取出以真土為衣金銀器合貯否則氣泄化為黃水不堪用矣餘不成粒者為紅鉛聽後製用次早以乳煎湯服之凡覺精神昏悶四大不收渾身火熱急取初生蟠桃乳服之以解燥渴得此一度百病蠲除精神强壯益壽延年誠人元服食之妙品也近有十二三嵗而來者有十六七嵗而來者皆由禀受氣偏調養失宜但可作首經金鉛而已取梅子法夫梅子者乃癸水之先氣五臟之精粹也凡取之須預養女子不使喧譁歌舞以致失墜五千四百八十日之前但見兩臉生花印堂紅見身熱氣粗腰膝痠疼癸將降矣即與槖籥如上法用之俟其降取視中有一㸃結硬如桃紅色者即是急取出以真土為衣如癸水中不見令黃婆視鼎內有血絲懸弔如小櫻桃者以中指挑斷取出真土為衣乳煎湯服之如覺燥渴困悶以頭生男乳解之餘紅鉛另製製首經金鉛法取女子真正首經或器或帛以童便洗下對加清水量投晉礬如紅鉛一碗用礬一錢攪百餘轉澄清去水又打澄去水盡量入頭生無病乳置金銀盤或磁盤內紙糊口曬乾或金銀罐內鹽泥封口小火養三日取出為末乳膏為丸一鼎可作九丸或十五丸真土為衣擇吉日净身心夜半無灰酒或乳送下三丸凡服鉛藥須存神定意默固守中如覺燥熱以乳解之七日不可出户一月戒勞欲此三品皆可延命一品黍米珠二品梅子三品首經金鉛此外功效緩矣犬四大流行其間人賴之以營養百骸酬酢萬事虧喪之後真陽一衰百病叠出故假未破女子之隂以補助虧缺之陽正所謂採隂補陽之義上三等皆純氣未耗為同類之妙品故特表於先焉生取梅子法照前擇鼎癸將動時急以寶珠丹服之與彼槖籥騎坐定額上輕拍兜掌其經即降已降可照前取梅子法一樣取之取出以真土為衣銀盒收貯如經不至可服寶珠丹催之降而後止如無真土或硃砂金箔亦可乳湯服之其功亦妙以其氣全故也製紅鉛法先以烏梅一斤煎水一桶去梅冷定如得紅鉛一斤用梅湯三碗多寡量用洗下紅鉛再對加井水攪百餘轉蓋定澄去清水如此七次或九次去羶穢氣盡預以盆貯灰按實灰上鋪絹絹上鋪紙傾鉛紙上滲去水日乾為末配合服之助血養神功效甚大製白鉛法照前用梅湯洗下少加礬攪澄去水如此五七次用乾菉豆粉置碗內按實中做一圓池傾鉛池內滲乾取出如未白仍以梅湯攪澄去水豆粉滲乾以白為度晒極乾研細銀器收貯早晚單服或配藥或乳膏丸服此藥不作燥熱安神益氣功難盡述製靈鉛法將所取紅鉛量多少以燒酒洗下如紅鉛一碗燒酒二碗攪百轉澄清去酒再用酒一碗仍攪澄去酒再用清水攪澄去酒味磁盤晒乾其鉛如牛黃色不泄元氣配金乳粉為丸每五更酒下五分自覺身體輕健精神倍常陽事興壯丹書云先補氣後補血補得丹田溫溫熱上至頂門泥丸宫下至腳底湧泉穴一身四大俱補完致使精神無漏泄正此之謂也凡女子首經為金鉛二為紅鉛三則後天紅鉛矣已上諸品皆能益補真氣真氣既足更求伏氣之法長生之道在是矣製真土法秋分後取山東地方人糞在野地上揀擇方圓成顆粒者稀片不用晒乾木槌打碎火燒存性入缸中河水煎滚冲泡攪之待冷以布濾去黑查將汁露天熬乾連鍋煆紫色烟盡退火取起研末再用秋露水淋煎乾鏟出入陽城罐內鐵燈盞蓋口鹽泥封固大火打一炷香取出研末仍用露水紙淋煎乾打三炷香如此九次或七次五次取出其土形如氷雪氣味香美聽配藥用此藥能擒制真鉛歸我黃舍補食之妙藥也山東人多食黍稷故用之寶珠丹催經極妙當門子一粒樟腦五分紫梢花去梗丁香大力子急性子各一錢斑猫一對去翅足紅娘子一對去翅足右共為細末每服半分無灰酒送下不降再服催之梅落即止煉乳膏法取頭生男一二日內小兒未食者擠下銀鍋煉成膏不可火大恐乳焦則力减或慢火焙乾或晒乾為粉即蟠桃乳製金乳粉法取頭生美鼎乳須嬰兒有神氣年在三七內者擠下乳對同露水攪百轉露一夜水乳自分去水磁盤晒乾漸積聽用取乳酥法取乳同上每乳一碗入秋石半分攪勻飯上蒸熟取出冷定面上結如腐皮者是酥挑出晒乾酥下乳晒乾亦可對酒服又取乳粉法將乳於磁盤內晒乾為粉配藥或單服皆妙取碧玉仙桃法即初生嬰兒口中血毬也收生之際預以綿裹食指甘草湯蘸濕俟兒頭出牝户速於口中取出如杏核大紅似硃砂者是也一名混元丹一名萬年糧若待落地即吞下矣全在收生婆手快方可取得以乳膏為粉裹之沉香盒收貯盒底內盛硃汞浮仙桃汞上蓋密懸弔井中一夜以解胎火次早煎乳陳黃精酒吞一枚避風將養覺燥熱用乳解之此乃父母姤精元始之氣能補人真一之精消除沉痼宿疾功效難盡配方具後取交梨火棗法嬰兒臍帶內有米大珠十餘顆是也取出入沉香盒內照前去胎火配合丸藥功效亞於仙桃或同首經用之殊妙取後天月月一枝花此藥雖是後天渣滓然亦精氣所結服之亦可壯陽却疾擇年三七以內美鼎身無疾苦經事調勻者槖籥接下視中有成粒如枸杞子樣者急以真土為衣銀器收貯乳酒送下或配後混元毬霜丸服或配混元丹服又妙每月服二三粒亦可使人精神無敗久服可以生子詩曰月月一枝花隂山是我家有人認得我還精大補他隂煉秋石法置缸三四口於靜處每缸貯龍虎二水五分加井水五分明礬二兩白术二兩松柏葉各二兩栁棍五根一扎順攪千餘轉蓋定待澄清傾去清水又滿加井水以絹濾去渣又攪又澄又傾如此十餘次直候水香為止去水盡米篩內鋪薄紙傾渾龍虎水於紙上日乾如粉之白為上用磁罐收貯此藥専治咳嗽痰火虛弱症聽後配用陽煉秋石法砌灶二口於露天安大鍋一口次小鍋一口洗去鏽以前所積二水每入五杓於大鍋文火煎之撇去油沫盡起置小鍋中如此煎完就於小釜內文火慢煎鐵鏟不住手鏟之勿使生底候成黑膏子以小缸一口合之周圍鹽泥封固留一孔看水氣盡有青氣金星飛出急以泥塞之濕布蓋缸底以水潤之文火燒至釜底紫色為度冷定去封口泥盡將升上缸的已汞或紅黑白各色各收取候用將黑膏另入釜內煅烟盡通紅冷定研細下滚水泡之或露水雪水尤妙篩鋪薄紙濾去黑不用看淋下水清碧以磁盤煎出净石如略黃色仍前煎乾淋過直候清同井水方以磁盤文火漸煎乾少乾日乾其色白如雪即陽煉龍虎石也或入藥服或代鹽入肉蔬中食之滋補甚大久又服之陽精堅固肌體潤澤又陽煉法先用鹽泥羊毛固濟陽城罐十餘箇隂乾聽用將二水桑柴煎成黑粉入罐內鐵盞蓋口鐵線扎緊鹽泥固縫三釘支起百眼爐從文至武打火三炷香盞內頻以水激之香盡退火冷定取開升盞上者另收聽後打黃芽罐內石取出研末滚水淋過銀鍋煎乾如此九次入磁罐蠟封口墜井中三日出火毒每日空心白滚湯下三五分此石乃人身五臟之精以法煉成大能生腎中之隂水壯丹田之元氣實人元之丹藥也書云九熬九煉大還丹人得餌之壽延長正此謂也秋石氷片法將前淋出極清的水不拘多少入大白磁罐蓋口緊密於冬至後極寒天埋露天地中凍七日取出傾水於另器取水晒乾銀器收貯空心服之其味甜淡大能消痰降火補氣生津煉伏火黃芽法以前所凍龍虎石秋露水淋過打火九次形同白玉方入陽城罐內明爐武火化成清汁將前所取已汞㸃之以白㸃白以紅㸃紅以黑㸃黑待汁清取出成一餅其色難定或紅或白或黑或紫丹書云其白容易得一黑最難求所以外備五色內滋五臟乃養生之妙藥也取秋石水花法凡磁盤煎龍虎水時看煎至六分時候飛起圎泡急用銀匙挑起白綿紙晒乾銀器收貯此水花乃先天輕清之藥服之令人肌膚光瑩身體輕健煉黃芽法取小白磁罐口如錢大者以猪毛泥固濟隂乾入前所取已汞五錢或一兩用白碟底打成圓錢坐口上鐵線扎緊鹽泥封固火炙乾三釘支起二指高百眼爐先文火次略武打三炷香蓋上以水激之香盡取出其芽升在蓋上金色一餅取下此乃龍虎初絃之氣名曰金花又號黃芽服之令人五臟生精元神壯實功效彌大煉白雪法照前取黃芽法一樣封固打火黃芽乃初陽之氣易飛易走宜火小火小則色變輕黃白雪乃二陽之氣火宜略大其色變白此火候之妙造化自然非人力所能為也火足取出成餅如白玉之狀此龍虎至英之氣名曰玉英又號白雪服之補三田助五臟蠲病除痰補益非小晒甜秋石法擇僻處築一臺高三尺五寸上置缸五口按五行積龍虎水五滿缸於三伏天晒露遇雨蓋之晒至半缸併作三缸以按三才仍晒至三中之一併一缸以象太極又晒至二三斗方入不見水新磚十二塊以合十二時夜浸日晒水盡為度先掃净隂靜空房一間噴水濕地竹片鋪地側竪磚於竹片上上用筐蓋待生白霜鵝毛掃下貯銀器內又生又掃盡而止此石不經水火不泄元氣又受日月精華較之火煆功效尤大取秋石氷法臘月極寒天將雪水淋清龍虎石茶碗各盛半碗置露天中次早水面氷結以小刀貼碗輕劃挑出大磁盤內日乾此氷花侵晨噙化少許極能生津化痰功效甚速餘水以銀鍋煎乾原是秋石製混元毬甜石法照前晒甜秋石法一樣待乾至大半缸投混元毬十數箇於內密蓋之待至來年伏天取出毬來日中曝晒伏盡剖開毬內取雪玉英其味甘美大能補心血化痰涎缸底生結如氷者取出晒乾功力亦與毬內者同毬研末猶可入補藥取秋石精英法擇童男十六童女十四嵗調養於冬至日積起九九日止桑柴火煎成黑膏子入磁罐封口待夏至日取出晒乾研細以秋天荷葉五榖上露水拌浸鋪大磁盤內晒乾勿動夜露日收隂室其藥自生出盤邊上其色紅黃其味如水取下再加露水拌晒直至不生方止所取精英再以秋露拌晒復使生出色淡味甜為佳盡則止以首經乳汁拌濕入潔淨磁盤內日晒夜露盤上架水晶珠五枚以吸日月精華每日加頭生男乳女子首經一次晒至八月十六日止收貯聽用名曰水中金實養生最上一乘之神品也取秋露水法八月朔起至二十三日止每日天未明時以極净布拭五榖荷葉上露水揑出新缸中或新罈內密封久窨不敗取雪水法取十二月入臘後雪貯新缸中或新罈內密封可留五六年不敗三妙丹乳酥紅鉛秋石各等分為丸空心每服三分所謂乳補氣鉛補血石補精精氣充足何病之有三元丹金鉛一鼎仙桃一枚乳粉二錢五分為丸空心服之久服可為人仙五精丸隂煉石陽煉石乳粉紅鉛仙桃混元毬霜共為丸芥子大真土為衣空心乳酒下三分補真膏黃精山藥懷地黃熟地黃天冬麥冬蓮肉巨勝子柏子仁松子仁何首烏人參茯苓絲子杜仲各一錢肉蓯蓉五錢五味子三錢黃柏三兩鹽酒童便各製一半白术四兩當歸三兩甘草陳皮砂仁知母白芍川芎鹿茸小茴蒼术各五錢已上各製净入銀罈中封口露水熬出濃汁綿濾去渣丹入銀罈封固慢火熬成膏聽用紫虛延齡丹碧玉仙桃男女各三枚交梨火棗男女各三十六枚秋石精英一兩四錢補真膏四兩右擇天德合月德續世益後福生黃道吉日煉蜜和丸搗三百杵丸如梧子大每空心面東服九丸沉香黃精煎酒對乳下此藥能却寒暑填精髓有返老還童之功髮白轉黑之驗服之久久功交自見一七痊宿患三七精神强七七功難比量凡紅鉛秋石仙桃諸品皆可配滋補藥中同故止録此數方以為式耳辨鍾乳石鍾乳石本草云甘溫無毒主治咳逆上氣明目益精安五臟通百節利九竅益氣補虛損療腳弱疼冷下焦傷竭强隂久服延年益壽好顔色不老令人有子治泄精寒嗽壯元氣益陽事通聲補五勞七傷補髓治消渴引飲生生子曰按鍾乳石本天地冲和之氣融結而成故服食之可以壯元陽而療百病也栁子厚博洽人也目擊當時服食者之有功姑載入文集以廣其傳朱丹溪乃謂金石之藥不可過服以譏子厚之多事斯猶不識鍾乳之妙大非衆石比倫衆石體質堅頑必假火煅煉始乃可服由久經火煉則石之性從火而化為燥烈者矣夫鍾乳之為物服食不必煅煉入腹便化即從營衛之氣流行而至各臟緣以氣補氣故無凝滯以不經火亦無燥烈此古聖所以命名為鍾乳也蓋鍾者聚也云乳者亦非獨謂其形象乳極言其補養之功用氣味象乳也丹溪不惟不識水煉之法玩其辭猶不識鍾乳乃冲和之氣融結而成悉以石類慓悍氣偏目之殆亦智者千慮一失也據本草所載明目益精安五臟補虛損久服延年益壽等語豈神農伊尹之神聖其所慎反不逮丹溪哉此亦可槩見矣余厯驗有功故特表出以為養生補益之一助云煉鍾乳法取上好潔白有蟬翼紋鍾乳石打碎入金銀罐中內著水浸高二指重湯煮五七日夜乾則添水七日足再換清水煮一日則其性皆純矣取出研極細末玉槌著水研之極其光膩㸃於舌上即化無半毫渣滓之聲可為眼藥為度工夫全在細上以磁罐收貯聽用鍾乳丸治丈夫衰老陽絶肢冷氣乏减食腰痛腳痺久服延年益壽全神駐顔鍾乳粉三兩絲子水淘净酒浸三日焙乾石斛去根各一兩吳茱茰湯泡七次五錢為末煉蜜和丸梧桐子大每服七丸空心溫酒或米湯下一日二服服訖忌食參术及一切臭敗之物初服七日不可犯房失庶藥有功七日外聽行鍾乳煎治同上鍾乳粉三兩以夾絹袋盛之牛乳一大碗煎减三之一取乳飲之一日一服次日用酒將袋淋净再入牛乳照前煎服一袋可煎三十度則力盡再換其用過者和麵餵烏骨雌雞使其生蛋食之有益五子全鹿丸補五臟養精神填骨髓壯元陽健筋骨多生育延年益壽功效非常金櫻子去核枸杞子酒洗去蒂絲子製如前黃柏去粗皮各五斤白茯苓去皮牛膝去蘆杜仲去粗皮薑汁炒各二斤車前子洗净一斤五味子酒洗一斤半右俱粗末用角鹿一隻取血拌藥晒乾其角煎膠肉與五臟煮極爛將藥末拌勻搗成餅焙乾骨用油炙酥皮煮成膠將前餅復磨為細末用鹿角膠及鹿皮膠加酒拌勻再加煉蜜為丸梧桐子大每空心及下午食前淡鹽湯送下七八十丸寒月酒下紫石英散抱朴子云紫石英久服成仙本草云壯神氣此方治虛怯驚悸飲食不進成癆者服之有竒功紫石英五兩打成粗米粒以水一斗煎取三升澄清去渣將汁作羔粥食之服盡再煎五料見功久服能駐顔住世隂症隂毒下元虛冷元氣將絶及陽痿不起諸虛弱者服此可回陽復命硫黃一兩青鹽二錢同為細末用蒸餅為丸菉豆大每服五丸或十丸空心酒下即以食壓之神效駐顔小還丹諸虛百損男子婦人久服返老還童功效殊常真仙品也鹿角霜八兩龜板霜八兩虎脛骨好酒炙六兩天門冬酒洗去心熟地黃各四兩人參去蘆二兩松子仁二兩柏子仁二兩紫河車一具焙乾鹿角膠龜板膠各四兩酒化開同前藥為丸梧桐子大每空心秋石湯送下五六七十丸按此方用龜鹿虎者以其多壽也能壯人之筋骨用天冬地黃人參者法象三才以補人之精髓用紫河車以補人之元神松柏耐嵗寒皆足以養神氣非泛常草木可比故有駐顔延算之功素有火者加雄猪膽汁五枚煉熟入之以寓降火之意赤水元珠卷十
