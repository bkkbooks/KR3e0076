body:
  text: 赤水元珠卷三十明孫一奎撰便毒疳瘡楊梅瘡夫便毒生於小腹下兩腿合縫之間其毒初發寒熱交作腿間腫起疼痛是也夫腎為作強之官所藏者精與智也男女大慾不能直遂其志故敗精摶血留聚經隧乃結為便毒矣盖腿與小腹合縫之間精氣所出之道路也或觸景而動心或夢寐而不洩旣不得偶合隂陽又不能忘情息念故精與血交滯而成腫結也初起切不可用寒凉之藥恐氣血愈滯不淂宣通反成大患惟當開鬰散氣清利熱毒使精血宣暢則自然愈矣生生子曰按前論盖思想無窮所願不遂者設也此固一說而意猶未完果如此論當僧尼孀婦宫人曠夫多有此患然予目擊啇賈中野合不潔淫妓便搆此疾或疳瘡或楊梅者亦由慾火内熾一旦交合不潔為淫火冲動膚腠開通是以受毒初發之時慎不宜以敗毒之藥㵼之何也毒邪非虚不入若復虚胃氣則毒邪下䧟治之非彌年累月不愈也㨗法只宜發汗其次利小便膚腠所感之邪汗易散也隂莖腿縫皆肝經絡肝腎主下焦又肝主小便使毒邪從小便中出所治皆順也故治之不旬日便可奏功若曾已發汗利小便體厚邪固而不得宣通者乃以破毒活血調氣之劑攻之俟毒氣宣通隨以補劑托之亦不失先後着也此予歴試良騐特附於斯便毒之劑退毒散治便毒腫結穿山甲蘸醋炙焦五錢木猪腰子醋微炙三錢為末每服二錢食前老酒調下次以醋煮肥皂研膏敷之妙木猪腰子即木猪苓䨇觧散治便毒内藴熱氣外挟寒邪精血交滯腫結疼痛桂皮川大黄白芍藥澤㵼牽牛炒取頭末桃仁去皮炒各二錢甘草一錢分做二帖生薑五片煎食前日二服先小便快熱從小便出後大便利皆是稠毒敷藥方治便毒腫痛雄黄乳香各二兩黄栢一兩為末新汲水調敷腫處自消括蔞散治便毒等惡瘡括蔞一箇去皮牛蒡子炒金銀花各三錢生薑甘草各半兩右忌銅鐵器搥碎以酒一大碗煎數沸空心温服微利為度三物湯治便癰牡蠣大黄山梔子各等分為末酒水一大盞煎七分空心温服露一宿尤妙四神散治便毒初起寒熱欲成癰疽服此神效大黄木鱉子殭蠶貝母各二錢半用酒水各一鍾煎至一鍾食前熱服若得汗下為妙止痛妙絶飲治便毒腫硬不消不潰疼痛無已此方一服立能止痛人参五錢大黄五錢酒水各一鍾煎至一鍾入乳香沒藥末各一錢空心食前服曾經㵼後而痛腫如故者此胃氣已弱但當補托胃氣使氣血充實邪乃消釋已潰者亦以此補之生肉人参黄耆各一錢粉草五分防風五分柴胡五分當歸一錢赤芍五分桂枝四分白芷棗一枚水煎服立消散消便毒癰腫如神全蝎炒核桃去殻肉只用隔膜炒等分為末空心酒調下三錢下午再服三日全愈消毒五聖湯治便毒腫疼神效五靈脂白殭蠶鬰金貝母大黄各三錢酒水各半煎服連服三帖立愈下疳之劑七寶㯽榔散玉莖疳瘡或漸至蝕透久不愈者㯽榔蜜佗僧雄黄輕粉黄連黄栢朴硝各等分為末先將葱白漿水洗净軟帛挹乾如瘡濕乾掺如乾少油調搽玉粉散疳瘡痛不止蜜佗僧寒水石煅滑石各半兩膩粉麝香各少許右為末油調敷濕則乾掺金銀花散治下疳金銀花荆芥朴硝蛇床子甘松白芷㯽榔每用五錢水煎加葱白二根數沸盆盛先薰後洗一聼上藥敷藥妙方多年墻上白螺殻炒竹蛀屑等分研極細每一錢入梅花片二釐敷此藥就不痛先以川椒芽茶飛鹽煎湯入小口瓶内將玉莖挿入瓶中先薰後洗治下疰象皮燒灰存性如乾用油調敷瘡上補遺蛀榦瘡用黑油傘紙燒灰出火毒𫝊於瘡上便結靨甚妙治外腎隂瘡抱鷄蛋殻黄連輕粉各等分為細末用煎過清油調敷楊梅瘡之劑初起者宜清表之荆芥防風升麻葛根甘草川芎蟬退當歸柴胡酒芩連翹白蘚皮皂角刺各八分猪胰子二枚先以土茯苓四兩煎湯復煎前藥七日見效又方癩蛤蚆三隻去腸雜入雄猪肚内苧麻扎縳水煮極爛食之蛤蚆亦聼食三五次除根又方嫩羊七八斤一隻者如常宰治去腸雜以土茯苓一斤槌碎入腹中苧麻縳定水煮極爛聼食湯准茶淘飯絶妙絶妙服此後其毒皆發出頭靣俱腫五日後自消七日全愈神應散肥皂核燒存性五錢另研為末荆芥何首烏天花粉防風苦参各一兩薄荷葉五錢共為末每日用新鮮白土茯苓八兩雄猪肉四兩入前末藥五分肥皂核末子一分共用水七碗煮爛去渣其肉聼食湯准茶服不過十日全愈再無他餘症如善肉者可作大劑與之擦藥方極佳水銀明礬各一兩杏仁大黄各二兩膽礬三錢俱為細末用香油拌勻擦手心脚心前後心每日擦三次不可見風擦至七日口中熱氣出或喉嚨作疼乃藥力到也以後解毒藥二帖除根防風荆芥穂牛蒡子参生地連翹黄芩黄連大黄三錢白蘚皮各一錢土茯苓四兩水六碗煎三碗不拘時服㸃廣瘡方杏仁去皮取霜真輕粉各一錢雄黄辰砂各五分為極細末以雄猪胆汁調搽一日三次三日愈楊梅瘋十年二十年筋骨風泡腫痛土茯苓三斤川椒二錢甘草三錢黑鉛一斤青藤三錢右以好酒入罈將藥用袋盛煮服之妙洗楊梅瘡方臭梧桐野菊花金銀花三味煎湯入舊馬桶内薰之一日二次有痔漏加枸杞子楊梅瘡并楊梅風方川歸防風牛膝羌活甘草木𤓰金銀花皂莢子熟地川芎各一錢土茯苓四兩水五鍾煎三鍾分三次服加味遺粮湯治楊梅瘡風毒及悞服輕粉癱瘓筋骨疼痛不能動履者服此除根防風木𤓰木通苡仁白蘚皮金銀花各五分皂筴子四分如虚弱加人参當歸各七分土茯苓二兩即仙遺粮也右以水煎空心服一日三服輕者十日可愈重者必四十日痊楊梅漏猪蹄子湯治楊梅漏牙皂去皮絃炒麻黄防風連翹地黄各三分牙硝一分半土茯苓四兩雄猪前蹄一隻水三碗同藥煮熟聼食湯亦盡喫半月全愈又方皂角五錢金銀花五錢土茯苓四兩大肥皂核燒存性為末每用三釐前藥煎熟調服膏藥猪油熬去渣一兩加香油三錢同熬離火稍冷加乳香沒藥各五錢攪勻再入孩兒茶七錢攪勻又入氷片一分輕粉五分麝香一分待冷做膏藥貼之十全大補湯加防風與前方相兼服之庻虚弱者易收功也几漏瘡膿水既多故屬不足治宜補養為先金瘡治金瘡血不止半夏風化石灰鬱金右為末掺上血即止又方以風化石灰韮葉嫩者同搗入鵝血調和成餅風處隂乾為末傅之血止亦無㾗若無鵞血亦可崔氏療金瘡刀斧傷破血不止風化石灰一升千葉紅石榴花半斤搗成餅如上法隂乾為末掺之潔古刀箭傷乳香五分沒藥三分俱為細末掺之極能止血止痛又方生晩蠶蛾風化石灰二味搗勻成餅隂乾為末傅之極能止血生肌定痛本事方治金瘡血不止血竭為細末掺之立止生肌華佗方治惡瘡金瘡刀斧傷上好降真香為末𫝊之入水並無傷㾗絶妙鬼遺方治金瘡腸出欲入之磁石滑石各三兩為細末白米飲送下方寸匕日再服杖瘡鬼代丹受杖不痛無名異乳香沒藥地龍去土自然銅煆醋淬木鱉子去殻各等分煉蜜為丸彈子大温酒化下一丸任打不痛乳香散治杖瘡神效自然銅醋淬七次五錢乳香沒藥各三錢茴香四錢當歸五錢為末每服五錢温酒調下若受杖後腹中痛或發熱及杖瘡痛甚如火以鷄鳴散下去惡血立愈潔古沒藥散治杖瘡止痛極佳且令瘡不移蜜佗僧乳香沒藥各一兩半乾胭脂一兩半膩粉半兩為細末入梅花氷片一錢或五分燒葱與全羊骨髓同搗研如泥攤在緋帛上貼之妙又方生地黄黄栢童便加韮菜汁調敷又方不破者以韮菜葱頭杵貼冷即易之膏藥用紫荆皮乳香沒藥生地黄大黄黄栢之類又方用野苧根嫩者不拘多少洗净同鹽擂碎敷上神效傷重者多用鹽杖瘡丹此方佳妙不可言劉寄奴末六錢馬鞭草末四錢蜜調敷如潰者乾掺之丹溪云杖瘡用黄栢生地紫荆皮敷此皆要藥也若血熱作痛宜凉藥去瘀血為先須下鷄鳴散凍瘡張子和曰經云寒瘡流水俗呼為凍瘡或經年不愈者用野中净土晒乾以大蒜研如泥揑作餅子如大觀錢厚量瘡大小貼之以艾火加於餅上灸之不計壯數以泥乾為度又易濕餅子灸不拘多少直灸至瘡痂覺痛痒是瘡可治也然後口含漿水洗漬用鷄翎二十莖縳作刷子於瘡上刷洗净以此洗刷不致肌肉損傷也用軟帛拭乾以木香梹榔散敷之如夏月醫之更妙治凍瘡用茄根燒灰淋水洗净再用雀兒腦髓塗之又方用蜜佗僧為末以煎熟桐油調敷羅太無如神散治凍瘡皮爛不可忍用川大黄為末新水調掃凍瘡上痛立止張子和治女僮足有凍瘡令服舟車丸濬川散大下之遂愈人或疑之戴人云火降則寒消何疑之有冬月脚折皮裂行歩疼痛以温湯洗拭乾將黄䗶一兩鎔化投松香末三分攪勻每用少許安刀頭上溶化滴入折中經宿即愈神效神效又方五倍子為末以牛骨髓填縫内即好治脚指縫爛瘡撏鵞時取鵞掌黄皮燒存性為末濕則掺之犬咬凡犬咬湏以人尿洗净以頭垢傅傷處又用熟牛糞塗於外衍義方用杏仁嚼爛罨傷處以帛縳定立好數數騐過紫蘇葉嚼碎塗之亦好又方先以鹽水洗用萆麻子去殻以井水研成膏貼傷處虎骨屑敷之亦好又方黄荆葉罨瘡上即安又方煨生薑乗熱擦之尤妙犬咬破傷風腫人参於桑柴火上燒成灰傅之良愈羅太無蟬花散治夏月犬傷及諸般損傷蛆蟲極盛臭惡不可近者蛇退皮一兩火燒存性蟬蛻五錢青黛五錢細辛二錢半右為細末每服三錢酒調下如六畜損傷成瘡用酒灌下如犬咬傷用酵子和服其蛆皆化為水蠅子不敢再落其上又以寒水石末乾掺上風犬咬羅太無定風散治風犬咬先口噙漿水洗净用綿拭乾貼藥更不再發大有神效天南星生防風等分為細末乾上再不潰膿功難盡述濟世方治風犬咬用核桃殻半箇將野人乾糞填滿以榆皮盖定罨於傷處再以艾於核桃上灸之二七壯即愈永不再發或用野犬糞灸仍㧞去頂上紅髪癲狗咬方用斑猫七枚去頭足翅以糯米少許於新瓦上同炒以米黄香為度去米不用以斑猫研碎好酒調下能飲酒人再進一盃㸔傷上下服當日必有毒物從小便出如小狗狀如未下次日再進如又不下又進之以毒物出為度若進至七服雖毒不下亦無害矣服藥後腹中必不安小便莖中刺痛不必慮此毒為藥攻將下耳痛甚者以蕪青一匙煎甘草湯送下即止如無蕪青青黛亦可疾愈後急以香白芷五錢雄黄二錢半為末搗韮根自然汁湯酒調下去斑猫毒以水净潄口嚼生葱白罨傷處留小竅出毒氣不可用他草藥罨忌犬猪羊及發風毒物小兒量嵗數加减斑猫能治食癲狗肉致病者治同即愈或過二三年再發治亦如前治癲狗所傷用斑猫二十一枚去頭翅足用稬米一勺先將七枚入米内微火炒不令焦赤去此斑猫換新斑猫七枚入前米内炒令斑猫色變復去之又換新斑猫七枚如前法炒以米出青烟為度去斑猫不用以米為末以冷水入清油少許空心調服頃又再進一服以小便利下惡物為度如不利再進一服利後腹肚疼痛急以冷水調青錠服之以解其毒否則有傷或煎黄連水亦可不宜便食熱物或以益元散水調服解之尤妙又方取小兒胎髪炒香為末傅用野菊研細酒調服盡醉立效又方治癲犬所傷或經久復發無藥可療者用之極騐雄黄五錢麝香五分研末勻用酒調二錢服如不肯服者則撚其鼻而灌之服藥後必使得睡切勿驚起任其自醒候利下惡物再進前藥則見效矣風犬咬後毒發如狗呌者百方不治於化人塲中取頭頂骨燒末敷之立愈風犬咬毒發如狗呌百方不應者以人骨燒末之水下方寸七雖煩亂者亦效又方治風犬咬不急治則生小狗必殺人雄黄蟬蛻等分為末調敷傷處立愈虎傷人生葛根汁服妙并洗傷處或用白礬末納瘡口痛立止馬咬薄荷汁塗之妙猪咬松脂鎔作餅貼之或以黄連甘草節煎湯洗立效箭傷劉寄奴散治箭傷及金瘡口用此並無疤㾗右劉寄奴為極細末掺之又法治箭鏃傷及金瘡傷松樹老懸皮生為末風化灰煉紅和勻傅之收口止血神效又法治毒箭傷破欲死者藍汁敷之如無用靛青搽瘡口立效又法桑葉隂乾為末若急用焙乾亦可搽刀箭傷處佳布智兒從元太祖征回回身中數矢血流滿體太祖命取一牛剖其腹納之牛腹中浸熱血内移時遂甦李挺從伯顔征郢州砲傷左脇矢貫於胸㡬絶伯顔令剖水牛腹納其中良久甦上二治出元史諸方書無載特掲附此蛇傷毒蛇沙虱所傷眼合口噤手足強直毒已入内急用蒼耳草研汁和酒服渣厚敷患處又治毒蛇咬急取癩蝦蟇搗爛敷上帛縳之又法治蛇悞入人口中不出用刀急破開蛇尾將川椒一粒入内隨即裹籠縳之須臾就出人咬傷治被人咬破指頭痛不可忍久則爛脫手指并手掌諸方書所不載急用人尿入瓶將患指浸在内一宿即愈如潰爛者用尅蛇龜殻燒灰敷之若無龜以鱉殻燒灰敷亦可瘰􅕅門附馬刀癭瘤結核瘰􅕅者結聚成核初如荳粒漸成梅李累累相連大小無定結於頸項夾喉之間增寒壯熱強痛腫硬不消有風毒熱毒之異其候多縁忿怒氣逆憂思悒鬰所致初覺便當服散腫潰堅湯或五香連翹湯漏蘆湯之類散之或用大黄牡蠣湯踈利三兩行瘡上可用十香膏之類貼之及諸淋洗敷貼等藥治之庻得消散若不散可服内消丸消之或隔蒜灸之馬刀瘡亦生於項腋之間下脇延及隂胯形如瘰􅕅而長於􅕅不可認作流注治之皆肝膽怒鬰之所致也俱當清肝膽之火調氣開鬰以醎軟之劑附之繼以養氣血流動經絡之劑收功不可徒務斑猫等毒劑攻逐致成癆怯慎之柴胡連翹湯治男婦瘰􅕅馬刀瘡柴胡連翹知母酒炒黄芩酒炒各五錢黄栢酒炒生地炙甘草各三錢中桂三分大力子一錢瞿麥穂六錢川歸尾一錢五分右剉如麻豆大每服三錢或五錢水二大盞煎至一盞去渣食後熱服薄荷丹解瘰􅕅風熱之毒自小便出毒後常須服此薄荷皂角不蛀者去絃皮連翹蔓荆子荆芥京三稜煨何首烏米泔浸各一兩右為末好豉二兩半以米醋煎沸灑豉淹令軟研如糊和丸桐子大每服三十丸食後熱水下每日一服病雖愈仍常服以消餘毒神秘散治瘰􅕅斑猫去頭足翅麵炒二十八枚荆芥穂直殭蠶炒去系嘴黑丑微炒取末各一錢右為細末每服一錢五更好酒調下日中當取下惡物如不下次日五更再進一服或更不下第三日五更先食秫米粥一碗次服此藥其毒决下如小便痛澁以葱茶解之或木通燈草煎湯導之楊氏家藏方頭晩先將滑石末一錢用米飲調服半夜時又一服至五更服神秘散㸔虚實或二三錢第三日仍以燈心湯調琥珀末一錢如小便痛用青黛一錢甘草湯調下即止蝙蝠散治瘰􅕅多年不瘥蝙蝠一箇猫頭一箇右同燒作灰撒上黑荳其骨灰化為細末濕即乾掺乾則油調敷之内服五香連翹湯效白花蛇散治九漏瘰􅕅發於項腋之間或痛或不痛白花蛇酒浸去皮骨焙二兩生犀角二錢牽牛半生半炒一兩青皮五錢右為末每服一錢入膩粉五分五更糯米飲調服已時下惡物乃瘰􅕅之根也更候十日再服一服忌發風熱毒物已成瘡者一日便見効四聖散瘰􅕅服白花蛇散轉利後此藥調之永去其根海藻洗石决明煅羗活瞿麥穂各等分右為細末每服二錢米湯調下清水盡為度散腫潰堅湯治馬刀瘡結硬如石或在耳下至缺盆中或至肩上或於脇下皆手足少陽經中及瘰􅕅遍於頦或至頬車堅而不潰在足陽明經中所出或二瘡已破乃流膿水並皆治之卧時服藥斟酌病人飲食多少大便軟硬以意消息治之昆布桔梗各半兩廣茂㣲炒京三稜酒洗炒連翹各三錢升麻六分黄連白芍葛根各二錢歸尾柴胡甘草各五分龍胆草酒洗炒四錢黄芩酒洗一錢五分一半生一半炒右每服六錢先水浸半日煎熱服於卧處伸足在髙處頭微低每噙一口作十次嚥至服畢依常安卧取藥在胸中停留也另配半料為細末煉蜜為丸菉荳大每服一百丸或一百五十丸就以此藥送下瞿麥飲子治瘰􅕅馬刀此方須久服乃交瞿麥穂半斤連翹一斤每服一兩水煎食後服海菜丸治瘰􅕅生於頭項上交接名蛇盤􅕅宜當早治之海藻菜蕎麥炒白殭蠶㣲炒去系嘴右等分為細末海藻菜旋炒研篩湯泡白梅取肉减半用所泡湯為丸如梧子大每服六七十丸食後臨卧米飲送下其毒自大便泄出若與淡菜連服為妙盖淡菜生於海藻上亦治此病忌豆腐鷄羊酒麵日五六服蜂房膏治熱毒氣毒結成瘰􅕅露蜂房炙蛇蛻𤣥参蛇床子黄蓍各三錢杏仁二兩半亂髪鷄子大飛丹黄䗶各二兩先將前五味剉細綿裹用酒少許浸一宿勿令酒多用油半斤内杏仁亂髪煎髪消盡濾去渣再煎然後下丹䗶再熬成膏傾倒於磁盆中取貼瘡上一日一換㯽榔散治氣毒瘰􅕅心膈壅悶不下飲食梹榔前胡赤茯苓牛蒡子炒各一兩人参枳殻去白炒沉香防風各五錢炙甘草二錢每服五錢生薑一片水煎服射干連翹湯治瘰􅕅寒熱射干連翹𤣥参赤芍木香升麻前胡山梔仁川歸炙甘草各一兩大黄炒二兩每服五錢水煎服氣盛加茫硝少許服之括蔞子散治瘰􅕅初腫疼痛寒熱四肢不寜括蔞子連翹何首烏大力子微炒大黄微炒皂角子仁白螺殻梔子仁牽牛㣲炒甘草生各一兩為細末食後温酒下二錢内消丸瘡腫初生及瘰􅕅結核熱毒鬰滯服令内消大效青皮陳皮牽牛取頭末各二兩薄荷葉八兩皂角八兩不蛀者去粗皮槌碎水煮軟揉汁熬膏右為末以皂角膏和為丸菉豆大每服三十丸食後荆芥湯下皂角煎丸治風毒瘰􅕅皂角不蛀者三十條内十條泡黒十條酥炙用十條水煮軟揉汁用何首烏𤣥参薄荷葉各四兩右為末與前膏子同煉蜜為丸豌豆大每服三四十丸食後白湯下柴胡通經湯治小兒項側有瘡堅而不潰名曰馬刀柴胡歸尾生甘草連翹黄芩牛蒡子京三稜桔梗各一錢半黄連一錢紅花少許水二鍾煎服此方亦治瘰􅕅乃是攻裏内消之劑消腫瘡治馬刀瘡黄蓍括蔞根各一錢半連翹三錢歸尾紅花少許甘草各一錢右分作二帖水煎服十香膏治五發惡瘡結核瘰􅕅疳瘻疽痔沉香麝香各一錢木香丁香乳香甘松霍香零陵香安息香白芷各五錢為細末川歸川芎黄耆木通芍藥細辛升麻白蘞獨活川椒藁本菖蒲木鱉子厚朴商陸根官桂栢子仁桃仁松子仁杏仁各五錢槐枝桑枝桞枝松枝各二兩沒藥輕粉雄黄硃砂雲母石犀角血餘灰枯礬各二兩另研末真酥油羊腎脂猪油各二兩飛丹一斤麻油三斤右如常法煎成膏藥以緋帛攤貼如腸胃癰疽可作丸子如梧子大每服七丸空心温酒吞救苦勝靈丹治馬刀挾癭從耳下或耳後下頭至肩上或入缺盆中者乃手足少陽經之分野其瘰􅕅在於頦下或至頰車乃足陽明經之分野受心脾之邪而作也今將二証合治之黄蓍一錢䕶皮毛實腠理活血氣實表補元氣乃瘡家之聖藥真漏蘆五分人参三分補肺氣如氣短及不調而喘者加之升麻一錢歸身三分葛根五分此三味俱是陽明本經藥甘草五分能調中和諸藥㵼火益胃連翹一錢此一味乃十二經瘡中之藥不可無者散血結氣聚此瘡家之神藥也牡丹皮三分去腸胃中留滯宿血生地熟地各三分此三味諸經中和血生血凉血之藥也白芍藥三分如夏月倍用之補中益氣治腹痛如冬月寒証勿用肉桂能散結聚如隂症瘡瘍用之此寒因熱用之意又為隂寒覆盖其瘡用辛熱去之煩躁者勿用柴胡功同連翹如瘡不在少陽經勿用羗活一錢黍粘子三分無腫不用昆布二分味醎若堅硬甚者用能軟堅也京三稜炮二分廣茂三分此二味瘡堅硬甚者用之不硬者勿用獨活防風各一錢此二味勻羗活必闗手足太陽症脊痛項強不可回顧防風辛温如瘡在膈上雖無手足太陽症亦當用之為能散結去上焦風邪助黄蓍立功也黄連炒三分治煩悶神麯炒二分食不消化者用之麥芽一錢消食健脾益智仁二分如唾多者胃不和也或吐沫吐食胃中寒者加之無則勿用厚朴薑炒一錢二分如腹脹加之黄栢炒三分如有熱或腿脚無力加之如煩躁欲去衣者此腎中伏火也更宜加用右為細末湯浸蒸餅揑作餅子晒乾搗如米粒大每服三錢白湯下如氣不順加橘紅甚者加木香少許量病人虚實消息之毋令藥多妨其飲食此治之大法也如止在陽明分者去柴胡黍粘子餘皆用之如在少陽分為馬刀挾癭獨活漏蘆升麻葛根加瞿麥三分如本人氣素弱其病勢來時氣盛而不短促不可因其平素宜作氣盛治之乃從病變治之權也加黄芩黄連黄栢知母防己視邪氣上中下擇而用之假令在上焦止用黄芩半酒洗半生用在中焦加黄連如在下焦加酒製黄栢防己之類如大便不通滋其邪盛者加酒製大黄利之如大便燥者加桃仁泥大黄如風結燥不行者加麻仁大黄以潤之如風澁而大便不行者加煨皂角仁大黄秦芁利之如脉澁覺身亦氣澁而大便不通者加郁李仁大黄以除風燥如隂寒症為寒結秘而大便不通以局方半硫丸或加炮附子乾薑煎氷冷服之大抵用藥之法不惟瘡瘍一家凡諸疾病氣素怯弱者當去苦寒之劑多加人参黄蓍甘草之類以㵼火而補元氣餘皆倣此玉燭散和血通經能使瘰􅕅自消及治室女經不行頸多結核川歸芍藥大黄甘草熟地茫硝黄芩川芎各等分每服五錢薑三片水煎服日進一服七八日效治瘰􅕅未破者如神百藥不應者累效杏樹葉隂乾為末二分人中白煆為末二分半蝙蝠焙乾為末二分半白花蛇蛻煅存性二分半蜜蜂七枚焙為末右將杏樹葉末用清水調再入四味末藥和勻敷患處却將皮紙一張以針刺孔貼藥上如乾用清水就紙上刷之每一晝夜換藥一次如靣上發熱服清凉飲子數帖自退敗毒瘰􅕅方神效白膠香海螵蛸降真香用中心無土乾者右等分為末搽患處外以濕紙揜之一夕而退已破者蜜蜂一十一枚蛇退七分半蜈蚣二條端午收者右用麻油四兩將前藥入油内以文武火熬成入光粉二兩用桑枝七條如筯大者急攪候冷出火氣七日方可用紙攤貼已上二方乃鄭義門累騐者不須服藥貼此五七日便消海藏方治項後側少陽經中疙􅜀不辨肉色不問大小及月日久逺或有赤硬腫痛生山藥去皮一塊萆麻子一枚右研勻攤貼之如神丹溪云山藥生者能消腫硬極佳極佳清凉餅子生山茨菇良薑等分搗為餅罨之能散去寒熱或以生茨菇磨調酒服大妙此藥大能散􅕅如神本事方治瘰􅕅䑕􅕅蝲蝟皮瓦上炒研為末加輕粉乾敷治頸上核塊動者夏枯草末六錢甘草末一錢右和勻每服一錢至二錢茶清調下肘後方治頷下瘰􅕅如梅李大宜速消之海藻一斤酒一升浸數日稍稍飲之文武膏治瘰􅕅桑椹黑熟者二斗以布袋絞取汁瓦器中熬成膏白湯化下一匙一日三服紅者晒乾為末白湯調服結核獨形而小核者劉守真云結核者火氣熱甚則鬰結堅硬如菓中核也不須潰發但熱氣散則自消丹溪云結核或在頸項在臂在身如腫毒者乃痰注於皮裏膜外之間結聚而不散也問其平日好食何物吐下後用藥散之結核在頸項方直殭蠶炒大黄酒浸青黛膽星各等分右為末蜜丸噙結核在下頦二陳湯加連翹防風川芎酒芩蒼术皂角刺羌蠶麝香行太隂厥隂之積痰使結核自消甚㨗濟世方治頦下結核不消經騐方大蜘蛛不拘㡬枚以好酒浸之研爛同浸酌酒去渣臨卧温熱服之海藏生山藥萆麻子方佳方在􅕅門癭氣氣結於項久留不去而項為脹大丹溪曰癭氣先須斷厚味海藻洗一兩黄連二兩右為末以少許置掌上時時舌䑛之津咽下如消三之二須止後服又方黄栢二兩海藻一兩不用黄連亦佳治癭氣結核磊磊腫硬昆布一兩洗去醎為末每用一錢綿裹於好醋中浸過食之咽津藥味盡再噙之肘後方治頸下卒結囊欲成癭海藻一斤洗過酒浸飲之破結散治五癭極佳麥麵四分松蘿半夏貝母海藻洗龍胆草海蛤通草昆布枯礬各三分右為末酒服一錢日三忌鯽魚猪肉五辛生菜毒物二十日愈玉壺散治三種癭海藻洗海帶洗昆布雷丸各一兩青鹽廣茂各五錢右為末煉蜜丸芡實大噙化人参化癭丹海帶洗海藻洗海蛤昆布四味皆焙澤㵼炒連翹各一兩猪靨羊靨各十枚右為末蜜丸芡實大臨睡噙化一二丸忌油膩寶金散治癭氣無不瘥猪羊靨十對暖水洗去脂膜後晒乾為細末海藻洗海帶各三兩丁香木香琥珀研麝香研各一分珍珠研五錢右先將各味為細末配和勻再重羅過每服一錢熱酒一盞調服夜睡時須垂頭而睡若童男女十服效大人一日見效有孕者忌之海帶丸治癭久不消海藻貝母陳皮青皮各等分右為末煉蜜丸彈子大食後噙化一丸大效治癭氣神效方海藻海帶昆布蒲黄各二錢猪靨子五枚焙乾右為末每服二錢半臨睡以酒調服且不用枕頭三日無擇曰癭多着於肩項瘤則隨氣凝結此等皆年數深逺浸大浸長堅硬不可移者名曰石癭皮色不變者名曰肉癭筋脉露結者名曰筋癭赤脉交結者名曰血癭隨憂愁消長者名曰氣癭五癭皆不可妄决破决破則膿血崩潰多致夭枉瘤瘤有六骨瘤脂瘤肉瘤膿瘤血瘤粉瘤膿瘤即膠瘤也惟粉瘤與膿瘤可决餘皆不可决潰肉瘤尤不可治治則殺人㸃瘤方神騐桑炭灰棗木灰黄荆灰桐殻灰各二升半蕎麥灰炒右以沸湯淋汁五碗許澄清入斑猫四十箇穿山甲五片乳香氷片不拘多少後入煎作二碗以磁器盛之臨用時入新石灰調成膏敷瘤上乾則以清水潤之其效若神丹溪治丹瘤萆麻子去殻研入麵一匙水調搽之甚妙消瘤方用向陽槐枝於菜油燈盞火上以槐枝薰熱浸油熨瘤上如法熨數次其瘤自消腸癰門附胃脘癰夫腸癰者乃隂陽偏勝喜怒無時伏於臟腑之中結在腸胃之内血凝氣滯回旋失度不能通行聚結成癰致生腫痛孫真人云卒得腸癰而不曉其病候錯則殺人其病初起覺腹中微痛小腹腫而強抑之則痛小便澁似淋時時汗出復惡寒其身皮甲錯腹皮𦂳急如腫之狀按之濡或發熱無汗灑淅惡寒皆其候也其脉洪數者為有膿也可下脉遲𦂳者未有膿不可下也甚者腹脹轉側有水聲或遶臍生癰汁從臍出或大便下膿血或一足不能舉凡此皆為惡候胃脘癰者經曰胃脉沉細沉細者氣逆逆者人迎反盛則熱聚於胃口而不行故胃脘為癰也治法亦與腸癰頗同初以踈利之藥導其滯次以排膿消毒托裏之藥調之此其大法也脉經問曰羽林婦何以知腸有膿師曰脉滑而數滑則為實數則為熱滑則為榮數則為衛衛數下降榮滑上升榮衛相干血為敗濁小腹痞堅小便或澁或自汗出或復惡寒膿為已成設脉遲𦂳則為瘀血血下即安薏苡附子敗醬散治身甲錯腹皮急如腹脹本無積聚身熱脉數者附子炮二分敗醬五分薏苡一錢右為末每服一錢水煎頓服小便當下而愈三因方苡仁附子同前敗醬一兩二錢五分每用四錢水一盞半煎七分去渣空心服千金大黄牡丹湯治腸癰小腹痞堅或偏在膀胱左右其色白堅大如掌熱小便自調時自汗出脉遲堅者未成膿可下之當有血脉數則膿已成不復可下大黄四兩牡丹皮三兩芒硝二兩冬𤓰仁一升桃仁五十枚右水五升煮一升頓服當下膿血無擇薏苡湯腸癰腹中痛煩躁不安或脹滿不食小便澁婦人産後虚熱多有此病縱非癰但疑是者便可與或有差亦無妨冬𤓰子四兩薏苡五兩牡丹皮桃仁各三兩如無冬𤓰仁以𤓰蔞代之每服五錢水煎服姚氏去桃仁用杏仁崔氏加芒硝二兩醫按曰女子腹痛百方不治脉滑數時作熱腹微急孫尚診曰腹痛脉當沉細今脉滑數此腸癰也以雲母膏一兩作丸如梧桐子大用牛皮膠鎔化温酒調膠水吞丸子下餉時服盡下膿血一盆而安昔一婦人腸中痛不可忍大便從小便中出楊吉老之壻李生診之曰夫芤脉見於寸部者乃積血在胸今芤見於闗乃腸生癰也乃出雲母膏作百十丸煎黄耆湯吞下利膿血數升而安右腸癰五方丹溪所集也前三方置於萹首者盖亦腫瘍㵼利例也後二方用膠黄蓍煎湯吞藥者乃潰瘍補例也四聖散一名神效括蔞散治腸癰癰疽五發乳癰便毒服之神應大生𤓰蔞一枚去皮粉草研末四錢乳香研末一錢沒藥研末三錢右用好酒二大碗漫火煎至一碗分作二次兩日服盡大便順導惡物妙若乾𤓰蔞則用兩枚若疾甚者再服以退為度此方極佳牡丹皮散腸癰冷症腹濡而痛時時利膿丹皮人参天麻白茯黄耆木香川歸桃仁去皮尖川芎官桂各三分白芷苡仁甘草右用水煎温服梅仁湯腸癰裏急隠痛大便閉澁梅核仁四十九枚去皮尖大黄三兩牡丹皮一兩七錢五分冬𤓰仁四兩芒硝二兩半犀角鎊一兩半每服七錢水煎服下利膿血三兩行為度神仙䗶礬丸治腸癰神妙此藥不拘老㓜皆可服之無不取效最止疼痛不動臟腑乃内托之藥也方見癰疽門丹溪曰腸癰大腸有熱積死血流注桃仁承氣湯加連翹秦芁近肛門破入風者難治用防風之類河間射干湯治胃脘癰人迎脉逆而盛𠻳膿血營衛不流熱聚胃口成癰梔子仁赤茯苓射干去毛升麻各一兩赤芍一兩半白术五錢每服五錢水煎將熟入生地黄汁一合蜜半合再煎温服不拘時復元通氣散治諸氣澁耳聾腹癰便癰瘡疽無頭止痛消腫青皮陳皮各四兩甘草三寸半生半炙穿山甲炒𤓰蔞根各二兩金銀花一兩連翹一兩右為末熱酒調下痔漏門痔者肛門内外有㿔脹疼者是也東垣謂濕熱風燥四氣相合而致也痔有五種謂牡痔牝痔脉痔腸痔血痔也古方又有酒痔氣痔蟲痔翻花痔鼠妳螻蛄等痔之名不一究其所因亦不過久嗜辛熱炙􅏼新酒及房勞憂思藴積熱毒憤鬰之氣所致也或藏於肛門之内或突於肛門之外若藴毒深者其狀大藴毒淺者其狀小大者如蓮花鷄冠核桃之狀小者如牛妳鷄心櫻桃之類久而不愈有妨行坐或出鮮血或流膿水則成漏矣治法在外者宜㸃之洗之在内者宜祛其風而除其濕消其熱而解其毒斯得治之法矣東垣秦芁蒼术湯治痔疾若破謂之痔漏大便閉澁必作大病此由風熱乗食飽不通氣逼大腸而作也受病者燥氣也為病者胃濕也胃刑大腸則化燥火以乗燥熱之實勝風附熱而來是濕熱風燥四氣相合故大腸頭成塊者濕也作大病者風也若大便燥結者主病兼受火邪也熱結不通去燥屎者其西方肺主諸氣其體收下亦助疾病為邪須當破氣藥兼之治法全矣服之其疾立愈不可作丸以剉湯與之效如神秦芁一錢去蘆澤㵼三分蒼术製七分防風根五分桃仁去皮一錢另研當歸根三分酒洗第二服藥用身黄栢去皮酒洗五分大黄少許惟大便秘澁亦可多用梹榔一錢細末調服之皂角仁燒存性去皮一錢搗細末調下服之右除梹榔桃仁皂角仁三味候煎成藥研勻調入外餘㕮咀作一服水三盞煎至一盞二分去渣入前三味再上火煎至一盞空心熱服待少時以美膳壓之不犯胃氣也服藥日忌生冷硬物及酒麵大料物乾薑之類犯之則藥無效如有白膿加五朶白葵花須除蕚去心細剪入青皮五分不去白入上藥同煎又用木香三分為細末同梹榔等三味再上藥同煎依上法服餌古人以此疾多以嵗月除之此藥一服立愈若病乆者再服必愈秦芁白术丸秦芁去蘆歸梢酒洗桃仁酒浸去皮尖另研各一兩地榆三錢澤㵼皂角仁燒存性去皮各半兩枳實麸炒白术各半兩右為細末和桃仁泥研勻煎熱沸湯􅔇糊丸鷄豆大焙乾白湯下空心宿食消盡服之少時以美膳壓忌生冷硬物冷水菜并濕􅔇酒及五辣辛熱大料物之類犯之則藥無騐十服必愈蒼术澤㵼丸蒼术四兩去皮澤㵼枳實秦芁各二兩地榆皂角子燒存性各一兩右為細末燒餅為丸如桐子大每服三十丸米飲湯或酒下一婦人産後痔作瘡有頭如蒜頭大或下鮮血或紫血大便疼與黑神散又多食肉太飽此濕熱在大腸郁李仁去皮麻仁槐角各七錢枳實皂角仁五錢為末蒼术歸尾生地各三錢大黄炒一錢右分六帖内三仁另研煎服又方治痔用鷄冠花不拘多少濃煎湯每服一盞空心服本草云鷄冠花性凉治㵼血丹溪治畨花痔頭向上是大腸熱甚收縮為主用四物解毒加枳殻白术槐角秦芁治畨花痔荆芥防風朴硝右煎藥湯洗之次用木鱉子鬰金研末龍腦些少水調塗上痔藥膏子治外痔畨花脫出黄水不止腫痛病並用銀濶箆蘸藥塗𫝊日一次重者五七次立愈先用藥水洗拭乾却𫝊此膏用真桑灰不拘多少淋濃汁兩碗熬至一碗却入草烏片大黄片各二錢再漫火熬至半碗入甘草一錢數沸下净細石灰半匙頭不可多畧沸三五次用絹一重花紙二重如絞漆狀濾過再熬成膏候冷用真胆礬五分研極細末放入膏中用瓦器盛貯封之臨用入龍腦末和勻𫝊之治腸痔鱉甲丸鱉甲蝟皮炙焦黑穿山甲炙焦白礬枯附子猪牙皂角各半兩炙焦存性二分右細末研勻蒸餅丸如桐子大米飲下二十丸食前日三服又方槐花炒白礬枯各一兩附子五錢右細末研勻蒸餅丸如桐子大每服二十丸米飲下食前日三服丹溪治二十三年不愈者三服止用蓮花蕋散蓮花蕋黑牽牛頭末各一兩半當歸半兩礬紅少許右為末先忌食肉五七日空心令食肉一頓就取温酒下三錢約兩時辰取下膿血或蟲是效海藏外臺治五十歳痔不瘥塗熊胆取瘥神效諸方不及此七聖丸治大腸疼痛不可忍王叔和云積氣生於脾藏傍大腸疼痛陣難當漸交稍㵼三焦濕莫漫多方立紀綱羗活一兩梹榔木香川芎桂枝去皮各半兩大黄八錢煨郁李仁去皮另研一兩右除郁李仁另研外為細末煉蜜丸桐子大驗虚實臨時斟酌丸數白湯下取大便微利一服而愈切禁不得多利大便若大便大行其病滋甚治鼠痔結核作渇疼痛方皂角炙穿山甲黄耆荆芥槐子木香蝟皮鱉甲醋炒桔梗露蜂房炒焦芍藥各一兩大黄五錢右為末煉蜜丸桐子大每服三十丸温酒下食前日三服未止加至四五十丸治痔疾下血疼痛不止以玩月沙不拘多少漫火熬令黄色為末每二錢入乳香五分空心温酒調下日三四服瘥秦芁羗活湯治痔漏成塊下垂疙􅜀不任其痒升麻根柴胡甘草炙麻黄根各五分黄蓍秦芁各一錢防風根七分藁本三分細辛炒紅花炒羗活根一錢三分水煎服治痔有蟲咬榖道痒或下膿血多取槐白皮濃煎汁安盆中坐薰之塞其榖道湯冷更暖之良久欲大便當蟲出不過三度即愈如用末綿裹納下部淋渫藥治下部痔腫大腸頭痒痛葳靈仙枳殻麸炒各一兩右為粗末熬水薰洗冷即再煖臨卧避風洗三次挹乾貼蒲黄散丹溪治腸風痔漏有蟲如絲細黑頭取去除根瞿麥半斤猪牙皂角一寸右為末入猪腰子一雙内用米泔煮空心食之少頃肚痛上攻蟲皆堕出作地坑埋之薄粥補之當歸郁李仁湯治痔漏大便硬努出大腸頭下垂多血苦痛不能忍皂角仁另研細末調服郁李仁秦芁各一錢麻子仁一錢半當歸梢生地黄蒼术各五分澤㵼三分枳實七分大黄三錢煨右除皂角仁研細末餘藥剉如麻豆大水三大盞煎一盞去渣入皂角末調在内空心食前候宿食消盡服之忌風寒處大小便如欲凉大腸寛大腸則用枳殻去穰入巴豆鐵線纒煮透去巴豆入藥用若丸藥則搗爛用煎藥則乾用治腸痔每大便下血槐樹上木耳取末之飲服方寸瘥日三服良治腸痔多年不瘥下血不止木賊枳殻各二兩乾薑一兩大黄一分四味並剉一處入銚子内炒黑色存性三分搗羅温粟米湯調食前服二錢匕甚妙治痔漏瘡方鷄子一個煮熟去黄取白切炒明礬如皂角子大匙上枯過用三分右為末用温湯洗净拭乾用紙撚㸃藥送入瘡孔内立效日三易又方穿山甲一兩燒存性肉荳蔲仁三箇同為末米飲調二錢服治氣痔膿血甚者刺蝟皮一兩燒服中病即已不必盡劑治痔神應散治五種腸風下血上厠蔞前有血名外痔糞後有血名内痔大腸不收名脫肛榖道四靣有努肉名妳痔頭上有孔漏出名腸風並治之黄牛角腮一枚酌中老搥碎蛇蛻皮一條白者猪牙皂角七莖穿山甲七片刺蝟皮一兩剉右五味細剉入甕瓶内以黄泥封固候乾先用小火燒令烟出後用大火煆令通赤為度取出攤開候冷搗羅為末服時先令患者臨卧時細嚼胡桃仁一個如糊用無灰好酒一盞送下不可言語便睡至五更時以温酒調下藥末三錢至辰時更進一服雖年久不過三服立效丹溪治腸風痔漏如神大樹木上寄生葉取乾為末酒水米飲任下或丸桐子大服三十丸亦可千金方治五痔方蒼耳莖葉以五月五日採乾為末水服方寸匕或丸桐子大服之立效洗痔疼用荆芥朴硝桑寄生定痛解毒去風凉大腸熱安胎如腫者加附子木鱉子研極細調服而愈又方五棓子朴硝桑寄生蓮房水煎洗一方加百部煎洗洗痔方輕者用朝東馬齒莧劉寄奴濃煎湯薰待温却用手洗拭乾重者加大青葉梗乾者一半同煎丹溪治痔痒用灰莧帶根煎濃湯先薰後洗又方取河水頻洗用蝸牛塗之一方治痔用雄鷄胆片腦和勻貼之一方熊胆塗之神效蒲黄散治下部痔漏蒲黄血竭半兩右為細末每用少許貼於患處薰痔法蝟皮切方三指大雄黄棗大研熟艾鷄子大右為末用瓦器以灰實一半如燒香法安長桶内坐其上薰之烟氣從口出為佳凡三度薰永瘥勿犯風冷忌鷄肉毒物丹溪治痔瘡大蒜十片頭垢揑成餅子先安頭垢餅於痔頭上外安蒜片以艾灸之本事方治一判官乗騾入駱谷有痔疾因此大作其狀如胡𤓰貫於腸頭熱如溏灰火至驛僵仆主驛吏云此病予曾患来須灸即瘥用桞枝濃煎湯先洗痔便以艾炷其上連灸三五壯忽覺一道熱氣入腸中因轉㵼鮮血穰物一時出至痛楚㵼後遂失胡𤓰所在登騾而馳去無擇云腸癖如痔如大澤中有小山突出為痔人於九竅中凡有小肉突出皆曰痔不特於肛門邉生有鼻痔眼痔牙痔等其狀不一方書分出五種曰牡曰牝曰脉曰腸曰氣牝痔者肛邉生瘡腫突出一日數枚膿潰即散牡痔者肛邊發露肉珠狀如鼠妳時時滴漬膿血脉痔者腸口顆顆發㿔且痛且痒出血淋漓腸痔者腸内結核有血寒熱徃来登溷脫肛氣痔者遇恐怒則發肛門腫痛氣散則愈又方有酒痔每遇飲酒發動瘡腫痛而流血血痔則每遇大便清血堕下而不止宜解熱調血順氣為主若乆不愈必至穿穴為漏矣治痔切勿用生砒毒氣入腹反至奄忽忌喫生冷硬物冷菜之類及酒濕麵五辣辛熱大料物及乾薑之類犯之無效此東垣格言也秦芁防風湯治痔漏每大便時疼痛秦芁防風歸身白术各一錢半甘草炙澤㵼六分黄栢五分大黄煨陳皮各三分柴胡升麻各三分桃仁三十箇去尖另研紅花少許右水煎空心熱服烏金散治痔漏穿山甲蝟皮燒存性黄牛角腮剉碎炒黄牙皂角槐子皂筴刺枳殻貫衆阿膠各等分右為細末每服錢半用胡桃肉爛研併調酒食前服大腸熱荆芥湯下漏血不止川歸湯下蝟皮丸治諸痔出血裏急後重川歸川芎白芍枳殻各五錢槐花炒三錢艾葉炒地榆黄耆白礬枯貫衆各半兩蝟皮一兩炙焦大皂角一條醋炙猪後蹄垂甲十箇炙焦蜂房炒焦二錢五分穿山甲炒焦二錢五分皂角刺畧燒一錢五分一方有蟬退洗净畧燒二錢右為末醋糊丸如桐子大每服七十丸逐瘀湯治熱痔通利大小便取下黑物川芎赤芍生地白芷五靈脂枳殻阿膠蓬术炮茯苓茯神木通生甘草各一分大黄生桃仁去皮各一分半每服三錢薑三片蜜三匙煎服以利為度汚血作疼通用釣腸丸治乆新諸痔肛邉腫疼或痒挾虚寒而作者括蔞二節燒存性蝟皮剉碎礶内燒存性二箇白礬緑礬枯胡桃仁十五箇燒存性白附子生半夏南星鷄冠花五兩燒枳殻附子去皮臍訶子去核各二兩右為末醋麵糊丸梧子大每服二十丸空心臨卧温酒下槐角丸治諸痔出血及痔頭上有孔名曰瘻槐角炒一兩地榆八兩川歸八兩黄芩八兩防風八兩枳殻八兩右為末酒糊丸如梧子大每服五十丸米飲下乾葛湯治酒痔白乾葛枳殻半夏茯苓生地各半兩黄芩甘草各一分杏仁五錢每服三錢黑豆百粒薑五片白梅一個水煎服橘皮湯治氣痔陳皮枳殻川芎槐花炒各半兩梹榔木香桃仁紫蘇莖葉香附甘草炙各一錢半每服三錢薑棗煎服黑玉丹治腸風及痔漏頭疼不可忍用此去蟲㧞根三五服見效蝟皮剉八兩猪懸蹄百隻牛角腮八兩槐角二兩雷丸脂麻各二兩亂髪皂角煎湯洗焙敗棕剉各二兩苦楝根剉二兩半右用磁礶内燒存性研細末入乳香一兩麝香四錢研合和匀酒糊丸如桐子大每服五十丸先細嚼胡桃一枚以温酒吞下日二服甚者日三服空心及食前服又方治同上人参黄耆炙生地川歸川芎條芩升麻枳殻槐角各等分右為細末麵和丸如桐子大每服三十丸空心米湯下敷藥蝸牛膏蝸牛一枚腦子麝香各少許掺之用磁合盛次早取汁附之一方熊胆一錢麝香一分片腦五厘共為細末㸃田中大螺數枚碗盛候汁出取以㸃之一方寒水石朴硝共為末以津調手指㸃藥附痔上一方蝟皮燒灰生酒油和附治腸痔下部者如蟲蝕炙末用一方治諸痔用穿山甲自尾根盡處數除三鱗不用取第四五大鱗横三行燒存性為末入麝香少許臘茶一匙同調空心服以澄下濃者附瘡上其冷如氷冷永不痛大效肘後方治漏蜂房一枚炙黄赤色為末每用一錢臈猪脂調附瘡上一方用兎絲子炒黄黑色為末用少許和鷄子黄調附亦治榖道中赤腫一用木鱉子槌去油煎湯洗一用槐桞枝煎湯洗又方飲酒多之人生痔三黄丸以生地黄汁為丸空心淡酒吞下三五十丸立效二八通𤣥丹梅東先生方宣連八兩用茱萸四兩炒去茱萸川歸二兩烏梅肉槐角枳殻各二兩右為末以雄猪肚一箇洗净入藥在内外以韮菜四五斤包其肚用水醋共數碗煮肚熟為度去韮菜并肚以藥爛搗丸如桐子大每服空心白湯下五七十丸蟲痔用鰻魚乾燒烟薰之蟲盡死而愈治榖道邉生瘡久不愈者用鷄内金燒灰存性研細末乾貼患處如神皂角煎丸治内痔漏腸頭裏靣生核寒熱徃来滿尺皂角二梃去弦核醋炙白礬煅刺蝟皮炙黄薏苡仁白芷各一兩桃仁去皮炒甜葶􅏣炒川芎桔梗各半兩猪後蹄垂甲十枚燒存性右為細末煉蜜丸如桐子大每服五十丸空心用桑白皮煎湯送下㧞毒散敷痔腫毒處大黄黄蘗白芨石膏黄芩黄連白蘝梔子朴硝各等分右為末用井花水調塗湯火門凡湯火傷急向火炙雖極痛強忍一時即不痛慎勿以冷物塌之及井底泥𫝊之使熱氣不出爛入肌肉火燒以好酒洗之再以鹽傅其上如皮塌者以酒熬牛皮膠傳之熱酒傷用糯米粉炒黑末酒調𫝊之治湯火灼未成瘡者用艾白根燒灰鷄子黄和敷之如成瘡用白蜜封之以竹中取膜貼上日三次治湯火瘡麸皮炒黑灰為末𫝊上神妙此方有補性始終皆可用治湯火瘡取舊烹銀爐中燒過焦黄土研細如粉以生薑調於帛上貼之痛止一方用鎔銀鍋子細末油調𫝊上佳保生救苦散治火燒熱油損或至皮肉脫及一切狗嚙損傷并刀斧傷用生寒水石不拘多少為極細末調塗之或乾上然不如油調塗其痛立止並不作膿無分毫釐苦楚日近完復永無破傷風症氷霜散治火燒皮爛大痛寒水石生牡蠣燒朴硝青黛輕粉各等分右為細末新水或小油調塗立止治火燒桐油水銀各等分右二件以栁條不住手攪成膏再入大黄石羔二末和以牛皮膠入少水鎔開外用猫兒肚底毛細剪掺上貼之以青黛𫝊之妙治湯火瘡爛者以黄蜀葵花落者净器收之入水些少待爛成水𫝊上神妙熱油燒外痛以蜜傅之立安梅師方治湯火瘡至妙用劉寄奴為末先以􅟙米漿鷄翎掃傷處後以藥末搽上不痛且無㾗大凡湯傷先用鹽末掺之䕶肉不壊然後傅藥又方以榆白皮末猪脂油塗瘡愈顛撲損傷門按發明經云夫從髙墜下惡血留於内不分十二經絡聖人俱作風中肝經留於脇下以中風療之血者皆肝之所主惡血必歸於肝不問何經之傷必留於脇下盖肝主血故也痛甚則必有自汗但人汗出皆為風症諸痛皆屬於肝木况敗血凝澁從其所屬入於肝也從髙墜下逆其所行之血氣非肝而何以破血行經藥治之内經云肝脉搏堅而長色不青當病堕若搏因血在脇下令人嘔逆金匱云寸口脉浮微而澁然當亡血若汗出設不汗出者當身有瘡被刀斧所傷亡血故也金瘡出血脉沉小者生浮大者死砍瘡出血一二石者脉大二十日死砍刺出血不止者其脉止脉来大者七日死滑細者生從髙顛仆内有血腹脹滿脉弦者生小弱者死劉宗厚云按破傷有瘀血在内脉堅強實則生虚小弱者死若亡血過多脉虚細小者生浮大數實者死亦皆為脉病不相應也子和云諸落馬墜井打撲傷損閃肭損折杖瘡腫發焮痛不止者可峻下二三十行痛止腫消宜以通經散𨗳水丸等藥或加湯劑瀉之後服和血消腫散毒之藥劉宗厚曰按子和於堕車落馬杖瘡閃肭者俱用峻下其有心恙牙闗𦂳急者云是驚涎堵塞於上俱用三聖散先吐後下其法雖峻然果有驚涎瘀血停留於内焮痛腫脹發於外者亦奏㨗功但於出血過多老弱之人脉虚大者亦當求責又曰謹按打撲金刄損傷是不因動氣而病生於外外受有形之物所傷乃血肉筋骨受病非如六滛七情為病有在氣在血之分也所以損傷一症専從血論但須分其有瘀血停積而亡血過多之症盖打撲墜堕皮不破而内損者必有瘀血若金刄傷皮出血或致亡血過多二者不可同法而治有瘀血者宜攻利之若亡血者兼補而行之又察其傷有上下輕重淺深之異經絡氣血多少之殊惟宜先逐瘀血通經絡和血止痛然後調氣養血補益胃氣無不效也頃見圍城中軍士被傷不問頭靣手足胸背輕重治者例以大黄等藥利之後大黄缺少甚者遂以巴豆代之以為不於初時瀉去毒氣後則多致危殆至於略人手指亦悉以藥利之殊不知大黄之藥惟與有瘀血者相宜其有亡血過多元氣胃氣虚弱之人不可服也其巴豆大熱有毒止能破堅逐積用於此疾尤非切當所以有服下藥過後其脉愈見堅大治者不察又以為瘀血未盡而復下之因而夭折人命可不慎歟凡損傷切不可食冷水血見寒則凝但一系血入心即死以攻下瘀血之劑治之金櫃治馬墜及一切筋骨損方大黄一兩酒浸緋帛如手大燒存性亂髪如鷄子大燒存性炊單布一尺燒灰敗蒲一把二寸桃仁四十九粒去皮尖甘草炙如中指節七味以童便煎成入酒一大盞次下大黄去滓分温三服先剉敗蒲席半領煎湯浴衣被覆斯須通利痛楚立瘥復元活血湯從髙墜下惡血留於脇下疼痛實不可忍柴胡五錢當歸六錢甘草穿山甲炮各二錢大黄一兩酒浸桃仁五十枚去皮尖紅花𤓰蔞根各二錢右件桃仁研爛剉如豆大每服一兩水二鍾半酒半鍾煎至七分食前服以利為度得利後痛或未盡服乳香神應散靈樞云墜堕惡血留於脇下則傷肝肝胆之經行於脇下屬厥隂少陽宜以柴胡為引用為君以當歸活血脉又急者痛也以甘草緩其急亦能生新血陽生隂長故也為臣穿山甲括蔞根桃仁紅花破血潤血為之佐大黄酒製以蕩滌敗血為之使當歸𨗳滯散治損傷瘀血大便不通紅腫暗青疼痛昏悶畜血内壅欲死大黄一兩當歸三錢麝香少許右二味為細末入麝香和勻每服三錢熱酒調下其瘀血自下若骨節傷折疼痛以定痛接骨紫金丹治之定痛乳香神應散東垣方治從髙墜下疼痛不可忍及腹中疼痛乳香沒藥雄黑豆桑白皮獨科栗子各一兩破故紙炒二兩當歸一兩水蛭半兩右為末每服五錢醋一盞沙石器内煎至六分入麝香少許温服定痛接骨紫金丹麝香沒藥紅娘子各一錢半烏藥二錢半地龍去土二錢半川烏草烏炮各一兩五靈脂半兩木鱉子去殻半兩茴香二錢半黑丑五分生用骨碎補威靈仙金毛狗脊防風自然銅醋淬煆紅七次各五錢禹餘粮四錢陳皮青皮各二錢五分右為細末醋糊丸桐子大每服十丸至二十丸温酒送下三因鷄鳴散從髙墜下及木石所壓凡是損傷瘀血凝滯疼痛欲死兼以此藥推陳致新神效此方治血滯於肺部氣分也大黄酒浸一兩杏仁三十粒去皮尖右研細酒一碗煎至六分去滓鷄鳴時服至晩取下瘀血即愈若便覺氣絶取藥不及急劈開口以熱小便灌之王海藏云若登髙墜下撞打及傷心腹胸中積血不散以上中下三焦部分分之以易老犀角地黄湯桃仁承氣湯抵當湯丸之類下之亦有以小便同煎治之者更有内加生地當歸煎服者亦有加大黄者惟智者擇之潔古巴㦸湯治從髙墜下及打撲内損昏冐嗜卧不能飲食此謂血閉臟腑不通巴㦸去心大黄各半兩當歸地黄芍藥川芎各一兩右水煎以利為度嚴氏奪命散治刀刄所傷及從髙墜下木石壓損瘀血凝滯心腹疼痛大小便不通水蛭用石灰拌慢火炒令黄色半兩黑丑二兩右為末每服二錢熱酒調下約行四五里再用熱酒調黑丑末二錢催之須下惡血成塊以盡為度破血止痛行經之劑破血散治乗馬損傷跌其脊骨惡血留於脇下其痛苦楚不能轉側羌活防風桂各一錢柴胡連翹各二錢歸稍二錢水蛭炒烟盡研二錢麝香少許另研右分作二服每服二大錢酒水一盞除水蛭麝香外另研如泥煎餘藥一大盞調二味食前服地龍散治腰脊痛或打撲損傷從髙墜下惡血留於太陽經中令人腰脊或脛腨臂腰中痛不可忍中桂地龍各四分羗活二錢黄栢甘草各一錢蘇木六分麻黄五分桃仁六枚歸梢一分每服五錢水煎服三因加味芎藭湯治打傷敗血入胃嘔吐黑血川芎當歸白芍百合浸半日荆芥穂各等分右水酒各半煎服元戎加味四物湯治虚人損傷不禁下者四物湯加穿山甲水煎服花蕋石散治一切金刄箭鏃傷及打撲傷損猫犬咬傷或至死血瘀傷處以藥掺之其血化為黄水再掺藥便活不疼痛如内損血入臟腑煎童子小便入酒少許調一大盞服之立效若牛觝腸出不損者急納腸入用細系或桑白皮為線縫合肚皮縫上掺藥血止立活如無桑白皮用生麻縷亦可並不可封裹瘡口恐作膿血如瘡乾以津液潤之然後掺藥婦人産後敗血不盡血迷血暈惡血奔心胎死腹中胎衣不下至死者但心後覺煖急以童子小便調一盞取下惡物如肝片終身不患血風血氣症若膈上有血化為黄水即時吐出或随大便出石硫黄四兩花蕋石二兩右二味相拌合勻先用紙筋和鹽泥固濟瓦礶子一箇内可容藥候泥乾入藥在内再用泥封口候乾安在四方磚上上書八卦五行字用炭一秤籠叠周匝自巳午時從下着火漸漸上徹直至經宿火冷炭盡又經宿出礶細研以絹羅子篩極細磁盒盛之依法使用雜方本事方治打撲墜損惡血攻心悶亂疼痛水仙散未展荷葉隂乾一味為末食前以熱童便一盞調下三錢以利下惡物為度經騐方治打撲損筋傷骨折黄栢一兩半夏五錢右為細末用生薑自然汁調如稀糊敷以紙花貼如乾再敷如骨折先以絹帛封縳次用杉樹皮束定良久痛止即痒覺熱乃是血活筋骨復舊輕者三五日重者不過旬日矣本事方治跌仆傷筋損骨痛不可忍此方乃神龜相授生地為末藏𤓰薑糟各一斤生地四兩切右都炒令勻熱以布裹罨傷折處冷則易之神效治打撲内損筋骨疼痛乳香沒藥芍藥川芎川椒去子及閉口者當歸各半兩自然銅煅三錢右為細末用黄䗶四兩鎔開入藥末不住手攪勻濕丸如彈子大每服一丸用好酒煎開消盡乗熱一服吃盡㸔何處痛向痛處卧霎時服三五丸立效衍義云沒藥通滯血打傷撲損疼痛皆以酒化服夫血滯𨗳而行之則痛腫消焉肘後方治被打瘀血在骨節下出者生鐵一斤酒五升煎取一升飲之丹溪治一人因上山惡血瘀入内損傷食少脉弦治宜活血和氣川芎三錢青皮二錢芍藥滑石各一錢丹皮五分炙甘草一錢桃仁七枚研水煎服之綴耳鼻法治擦落耳鼻用髪入礶子鹽泥固濟煆為末乗急以所擦落耳鼻蘸灰綴定以軟帛縳定立效肩穿法凡負重擔肩破者剪猫兒頭上毛不語唾粘之逺行脚打泡以生麵水調為糊貼過夜即乾不可擦破又方用飯粘搗貼以紙覆之過夜次日平復效抵金丹跌撲傷損閃扭出骨竅等症蠶沙炒黄菉豆粉炒黄各四兩枯礬二兩四錢右為末釅醋調敷患處厚紙貼之絹帛綁扎換敷三四次即愈忌産婦秘𫝊神效散治跌撲損傷骨折骨碎筋斷疼痛不可忍者此藥極能理傷續斷累騐若神用路上或墻脚下過往人便溺處經乆碎瓦片取來洗净火煅醋淬五七次瓦黄色為度以刀刮細末每服三錢好酒調服不可以藥微賤而輕忽其功也一字散治跌撲傷損功效同前半兩錢五枚火煆醋淬四十九次甜𤓰子仁五錢珍珠二錢右為末每服一字好酒調下治跌撲傷損用蟹二隻連殻搗爛好酒二碗濃煎去渣飲之留渣敷患處治損傷神效治跌傷骨折急取雄鷄一隻量患人酒量多少成一碗半碗將鷄刺血於酒中温之令患人熱飲其痛立止驗甚癘風内經云脉風成癘此疾非止肺腎二臟有之以其病發於鼻俗呼為肺風也鼻凖赤而脹大乃血随氣化也氣不施則血聚血聚則肉潰而生蟲此屬厥隂當以藥䟱之可用局方升麻湯下錢氏㵼青丸是也餘病各隨經而治之癘風成癩樺皮散主之從少至多服五七月後灸承漿七壯瘡愈勿止藥再灸同止承漿一名懸漿在唇下宛宛中足陽明任脉之㑹療偏風口喎靣腫消渴口齒疳蝕蟲瘡灸之佳每灸七壯至七七壯止灸則血脉宣通其風應時而愈艾炷如小竹筋頭大不可灸破血肉但令當脉灸亦能愈疾樺皮散治肺臟風毒遍身瘡疥及病丙穩禾疹瘙痒杏仁泡去皮尖水一碗煮至五分取出晒乾另研末荆芥穂各二兩枳殻去穰炭火燒存性樺皮燒存性各四兩炙甘草五錢右五味為末每服二錢食後温酒調下日進三次凌霄散治癘風神效蟬退地龍去土焙白殭蠶全蝎各七箇凌霄花五錢右為末每服二錢酒調下無時常宜浴每浴坐於湯中浸一時久服藥神效四聖保命丹大黄五錢黄栢八兩苦参荆芥各四兩乾蟾一隻煆𤓰蔞根防風各五錢輕粉二錢右為末每服一錢茶清一盞調下空心日午臨卧各一服服五七日後先於牙縫内出臭黄涎渾身疼痛次後便利膿血病根悉去加减何首烏散治紫白癜風筋骨疼痛四肢少力眼紅無白鼻梁崩壊皮膚瘡疥及手足皴裂睡卧不安行步艱辛何首烏蔓荆子石菖蒲荆芥穂甘菊花枸杞子葳靈仙苦参各五錢右為末每服三錢蜜茶調下無時参毛丸治大麻風苦参一斤鵞毛半斤煆存性為末陳米糊為丸梧桐子大每服五十丸酒送下一日二次仙方鯪鯉散此方治大麻風極妙絶勝他方寳之穿山甲活者大約重十觔為妙剖開肚不去腸雜以真生漆一觔塗在肚内隂乾七日用泥包火煆存性研極細末每服三分或五分火酒調下用真青布被上下盖之出汗臭不可聞不得見風待汗乾被上俱是小蟲服十日眉毛復出身上膿水瘡皆愈一月即脫體除根愈風散治一切惡風癩疾除鼻梁崩壊者不治外其餘不問新久無不收功淡豆豉真輕粉枳殻俱為末每服一二錢五更空心糯米湯調下至早飯後稍覺困倦欲睡不睡乃藥力搜風使然當逐下惡物再服後鶴虱丸調理鶴虱丸治大麻風不拘年月以效為度鶴虱二兩防風一兩地榆麻黄去節雄黄另研天麻各半兩右為細末醋和為丸梧桐子大每服三十五丸酒下日三忌鷄猪魚蒜粘滑油膩燒炙胡椒房失能如此調養則萬全矣若初𧺫三五年者十全八九如縱恣無忌憚者則不能收全功癘瘡方明礬末黄蠟新鮮土茯苓過路珍珠草紫背天葵根子各一兩右為末煉化黄蠟加生蜜糖拌搗為丸梧子大每服三十丸米飲下初服一日三次後只一日一次又秘方治大麻風癩疾死人蛆蟲洗净罁片上焙乾為末每用一二錢用皂角刺煎濃湯調下若腫而有疙􅜀者乃陽明經濕熱壅盛先以防風通聖散服二三帖然後再服此藥盖此藥有補功以皂針為引故能逹表能乆服之極有神功非泛常草木可比倫也用遭横死者於檢屍場中問仵人買之極多不難赤水元珠卷三十
