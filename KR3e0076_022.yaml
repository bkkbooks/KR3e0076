body:
  text: 赤水元珠卷二十二明孫一奎撰妊娠煩燥口乾足太隂脾之經其氣通於口手少隂心之經其氣通於舌若臟腑不調氣血不和以致內熱乘於心脾津液消爍故心煩口乾也與子煩大同小異宜用益母丸即前一味知母丸是也一妊婦煩熱咽疼用知母散加山梔清肺而愈后又內熱咳嗽小便自遺用補中益氣加麥門冬山枝以補肺氣滋腎水而痊知母散治煩燥悶亂口乾知母麥冬黃茋炒子芩炒赤茯苓各一錢甘草水煎入竹􅅹一合再煎一沸服之人參黃茋散治身熱煩燥口乾人參黃芪炒葛根秦芁赤茯苓麥冬各一錢知母甘草各五分右薑三片竹葉十四片水煎服妊娠風痙子癎妊娠體虛受風而傷足太陽經遇風寒相搏則口噤背強甚則腰反張名之曰痙須臾自醒良久復作又名曰子冒又類子癎生生子曰風痙乃外邪從足太陽而入有剛柔之分當從仲景法於傷寒門中求治子癎乃痰涎所致是內臟所生治當分别薛氏曰若心經風熱用鉤藤湯肝脾血虛加味逍遙散肝脾鬱怒加味歸脾湯氣逆痰滯紫蘇飲肝火風熱鉤藤散脾鬱痰滯二陳薑汁竹瀝若兼症相雜看所兼重輕分治一妊婦出汗口噤腰背反張時作時止此怒動肝火也用加味逍遙散漸愈又用鉤藤散而止更以四君加鉤藤山梔柴胡而安一妊婦因怒忽仆地良久而蘇吐痰發搐口噤項強用羚羊角散漸愈更用鉤藤散始痊又用歸脾湯全安羚羊角散治妊娠冒悶角弓反張及子癎子冒風痙等症羚羊角獨活酸棗仁炒五加皮防風川芎苡仁炒川歸洗杏仁去皮尖茯神各五分炙甘草木香各二分右薑水煎服鈎藤湯方見胎動不安卷雲箕子葛根湯妊娠臨月因發風痙忽悶憒不識人吐逆眩倒併治子癎葛根貝母丹皮防風川歸川芎茯苓桂心澤瀉甘草各一兩獨活石膏人參各三兩右以水九升煮取三升分作三服貝母令人易産未臨月升麻代之此症多由風寒濕乘虛而感皆從太陽經治活人獨活防風湯治太陽有汗名柔痓桂枝獨活防風各一兩芍藥三兩甘草半兩右每服一兩水煎溫服防風葛根湯治太陽無汗名曰剛痓葛根四兩麻黃三兩芍藥防風各二兩桂枝一兩每服一兩先煮麻沸去上沫入餘藥同煎溫服妊娠瘈瘲瘈者筋脈急而縮也瘲者筋脈緩而伸也一縮一伸手足相引搐搦不已大抵與嬰孩發搐相似此症多屬風風主搖動駱龍吉云心主脈肝主筋心屬火肝屬木木主風風火相熾則為瘈瘲也治法若因風熱用鉤藤湯加柴胡山梔黃芩白术以平肝木降心火養血氣若風痰上壅加竹瀝南星半夏若風邪急搐加全蝎殭蠶氣血虧損用八珍湯倍加鉤藤山梔若抽搐無力戴眼反折汗出如珠者肝氣絶也皆不治薛氏治一妊婦四肢不能伸服袪風燥濕之劑遺屎痰甚四肢抽搐乃肝火血燥用八珍湯倍加炒黑黃芩佐以鉤藤湯而安後因怒前症復作小便下血寒熱少寐飲食少思用鈎藤散加山枝柴胡而血止續用加味逍遙散寒熱退而得寐用六君子湯加芍藥鉤藤飲食進而漸安鉤藤散治肝厥頭暈鉤藤鈎陳皮炒半夏麥冬茯苓茯神人參甘菊防風各一錢炙甘草三分石膏煆二錢薑三片水煎服妊鬼胎人由臟府失調血氣不充營衛虛損則精神衰弱而鬼魅之類得以乘之亦如懷妊之狀故名曰鬼胎也薛氏曰一婦經閉八月肚腹漸大面色或青或黃用胎症之藥不應薛診視之曰面青脈澀寒熱往來肝經血病也面黃腹大食少體倦脾經血病也此鬱怒傷肝脾之症非胎也不信仍用胎劑無功乃與加味歸脾湯逍遙散各二十餘劑諸症稍愈彼欲速效别服通經丸一服下血昏潰自汗惡寒手足俱冷嘔逆不食用人參炮薑二劑漸愈又用十全大補湯五十餘劑而安治此症大抵要看虛實實者可攻涉虛者必於補中兼消而佐以雄黃丸之類行而散之雄黃丸治鬼胎瘀血腹痛雄黃鬼臼去毛莽草丹砂巴霜獺肝炙黃各半兩蜥蜴一枚炙蜈蚣一條炙右為末蜜丸梧子大每服二丸空心溫酒下日二服或下蛇鱉之類治鬼胎及血氣痛不可忍斑貓去頭翅足用糯米炒延胡索炒等分為末溫酒下五分以去穢物為度空心服斬邪丹治鬼胎大如抱甕吳茱茰川烏秦芁柴胡殭蠶芫花醋炒巴戟巴仁各一兩為末蜜丸梧子大每服七丸蜜酒下取下惡物妊娠不語此名曰瘖黃帝曰人有重身九月而瘖此為何也岐伯對曰胞之脈絡絶也帝曰何以言之岐伯曰胞絡者繫於腎少隂之脈貫腎繫舌本故不能言帝曰治之奈何岐伯曰無治也當十月復此至人窮理之言患此者當靜以待之不必驚惶而亂投劑十月分娩後當自語也妊娠傷寒熱病防損胎良方曰非節之氣傷於妊娠熱毒侵損胞胎若不早治多致墮胎漏血則子母之命亦不能全矣薛氏曰此亦當分六經為主相參而治妊娠傷寒身痛壯熱蔥白一升前胡葛根石膏各二兩半青黛一兩半升麻二兩梔子十二枚水煎分三服妊娠傷寒大小便閉結前胡二兩半大黃石膏各五兩山梔十枚知母黃芩茯苓生薑各二兩水煎分三服妊娠傷寒發斑忽黑小便如血其胎欲落山梔升麻各四兩青黛二兩生地四兩石膏八兩蔥白一升黃芩三兩水煎分三服又用井中泥塗心下乾則易妊娠熱病先宜白术散以安其胎傷寒亦然白术黃芩炒各二錢加薑棗水煎服若四肢厥逆隂症也不可服妊娠傷寒生生子曰妊娠傷寒所干甚大治之不早及治不如法多傷胎損母古人以四物加入引經散邪之劑可選而用之然亦不能盡其變兹録以補之阿膠散治時氣傷寒先服此以安胎却以主藥相間服阿膠炒白术炒桑寄生人參茯苓右為末每服一錢糯米飲調下日三服前胡湯治傷寒頭痛壯熱肢節煩痛石膏一錢前胡甜竹茹梔子炒黃芩炒大青知母各五分加蔥白水煎服蘇木湯傷寒時行灑浙寒振或兼噦者赤芍橘紅黃芩炒黃連炒甘草蘇木各五分水煎服汗出即瘥如胎不安更服阿膠散黃龍湯妊娠寒熱頭疼默默不食脅痛嘔痰及産後傷風熱入胞宫寒熱如瘧或經水適來及勞復熱不解散者柴胡二錢黃芩炒人參甘草各一錢水煎服柴胡石膏湯頭疼惡寒身熱拘急口乾柴胡二錢甘草一錢石膏三錢薑水煎服若氣虛加人參枳實散傷寒四五六日腹脹少食腰疼體重枳實炒三錢陳皮一錢麥冬錢半薑蔥水煎服旋覆花湯傷寒頭目旋疼壯熱心躁旋覆花赤芍甘草各五分前胡石膏各一錢麻黃去根節白术人參黃芩各三分薑水煎麥門冬湯傷寒壯熱嘔逆頭疼胎氣不安人參石膏各一錢半前胡黃芩各五分葛根麥冬各一錢加薑棗竹茹水煎服梔子大青湯發斑變黑尿便血升麻梔子大青杏仁黃芩各一錢加蔥白三寸水煎服白术湯傷寒煩熱頭痛胎動或時吐逆不食白术橘紅麥冬人參前胡川芎甘草半夏赤茯苓各五分薑竹茹水煎服芎蘇散治外感風寒壯熱頭疼心胸煩悶紫蘇葉川芎白术白芍麥門冬陳皮乾葛各五分甘草炙三分右薑蔥白水煎服參蘇散治症同上妊娠時行病四季之間反常如春寒夏冷秋熱冬暖乃非其時而有其氣者謂時行不正之氣也感之者少長三五相似甚至沿門闔境相類妊娠患之重者多致損胎亦當與傷寒熱病參治秦芁散治時氣五六日不得汗口渴飲水狂言嘔逆秦芁柴胡各五分石膏一錢犀角赤茯苓前胡甘草葛根升麻黃芩各四分加淡竹茹水煎服葛根飲子時氣煩熱口乾頭疼乾葛麻黃去根節各半兩石膏一兩豆䜴一合白米半升梔子十四粒蔥白二莖水煎分三服汗出為效消熱飲子治時氣六七日大小便不利芒硝一兩細研葵子二兩水煎分三次以利為效人參敗毒散治四時傷風頭痛發熱咳嗽此方即倉廪湯減陳倉米是也過時熱病冬時觸冒嚴寒即病曰傷寒不即病而毒藏於肌骨之間至春發為溫病至夏發為熱病也妊娠患之多致墮胎熱病與暑病相似但熱病脈實暑病脈虛治當審察治妊娠熱病頭痛嘔吐煩悶人參一方無竹茹葛根各一兩蘆根二兩知母三兩麥冬一兩半每服五錢蔥白三寸水煎服梔子仁飲治病發斑黑色小便如血氣喘急胎欲墮梔子升麻石膏生地各二兩黃芩一兩大青八錢每服五錢蔥白七寸豉四十九粒水煎服大黃飲治熱病六七日大小便祕澀大黃微炒石膏各一兩知母前胡赤茯各七錢半梔子甘草黃芩各五錢生地黃一兩半每服七錢水煎服蘆根湯治熱病頭痛心煩嘔吐知母四兩竹茹三兩每服五錢生蘆根一握同糯米一撮水煎服梔子五物湯治妊婦傷寒壯熱頭痛梔子前胡知母各二兩黃芩一兩石膏四兩每服五六錢水煎服升麻六物湯治傷寒斑黑溺血升麻梔子各二兩大青杏仁黃芩各一兩每服五錢蔥白五寸水煎服又方伏龍肝為末每服一錢水調下外用水調塗臍下又方蘆根煮汁時服一盞熱病胎死腹中良方曰熱病以致胎死腹中不能出者但服黑神散胎自下矣陳無擇先生曰當視其産母若面赤舌青其子已死面青舌赤母死子生唇青吐味子母俱死若雙胎或一死一活用黑神散薛氏曰竊謂前症宜補助産母使其胎自下黑神散恐大熱不宜輕用果胎已死者用平胃散加朴硝水銀下之最為穩當庶不併傷生者生生子曰前症妊母既因熱傷其胎矣必其母衝任熱極營衛枯稿其胎乃死猶之藤枯而瓜焦也仍以熱藥下之寧不重傷妊母乎薛公評之當也而良方每每謂妊婦致疾多起於寒按其逐月所著養胎之方籍熱藥為主是亦一偏也其間豈無挾熱者乎故丹溪曰虛曰熱謂涼血則血循經而胎得以滋養血熱則沸騰也今此症始既曰熱病胎死腹中矣又復以熱藥下之意者恐以死胎不下為急而不暇顧其母耶不然必為用寒涼治熱太過而中氣虛寒熱劑為不得已用之也否則何陳無擇之髙哲寧肯從而主之黑神散又名烏金散桂心當歸芍藥甘草炙乾薑炮生地各一兩黑豆炒去皮二兩大附子炮去皮臍半兩為末每服二錢溫酒下又方治胎死腹中紅花酒煮汁濃飲之二三碗效又方伏龍肝為末溫酒下二錢白湯下亦可又方朴硝為末童便和熱酒調下一二錢立下妊娠瘧疾妊娠病瘧乃夏傷於暑客於皮膚至秋而發陽盛則熱隂盛則寒隂陽相離寒熱俱作妊娠而作多傷於胎當於瘧症門尋治薛氏曰若木侮土久而不愈用六君子為主佐以安胎藥乃恭三隂三陽經而治之即瘧症門仲景方劉守真分經治療法也清脾飲小柴胡湯逍遙散補中益氣湯選而用之極為穩當黃芩白术陳皮三味煎湯服亦佳妊娠泄㵼良方論曰妊娠泄㵼或青或白水穀不化腹痛腸鳴謂之洞瀉水榖不化喜飲嘔逆謂之協熱下利並以五苓散利小便次以黃連阿膠丸或三黃熟艾湯以安之若㵼黃有沫腸鳴腹痛脈沉緊數用戊巳丸和之噯腐不食胃脈沉緊用感應丸下之後調和脾胃若風冷水穀不化如豆汁用胃氣湯寒冷臍下隂冷理中湯治中湯伏暑心煩渴瀉水用四苓散傷濕泄瀉小便自利用不換金正氣散胃苓湯此四症之大略也仍參泄瀉門互治生生子曰前症豫見之屢矣人皆以為小疾忽而不治及生子率多虛弱豫姪婦每懷妊必瀉治亦不愈分娩後又自止也其生子也脆而白無血色得非胎虛之故歟豫因思之妊娠則月水蓄之以養胎血亦濕類也以停濕故㵼經曰濕勝則濡泄是也治宜健脾燥濕后孕以白术半夏等為丸與之而安薛氏曰按前症若米食所傷用六君加穀蘖麵食所傷六君加麥蘖肉食所傷六君加山查若兼寒熱作嘔乃肝木侮脾土用六君加柴胡生薑兼嘔吐腹痛手足逆冷乃寒水侮土六君加薑桂不應用錢氏益黃散若元氣下陷發熱作渴肢體倦怠用補中益氣湯若泄瀉色黃乃脾土之真色用六君加木香肉果若作嘔不食腹痛惡寒乃中焦虛寒用六君加木香薑桂若㵼在五更侵晨飲食少思